body:
  text: 卷十六嘈雜論嘈雜由脾土受傷準繩云嘈雜與吞酸一類皆由肺受火傷不能平木木挾相火乘肺則脾沖和之氣索矣谷之精微不行濁液攢聚為痰為飲其痰亦或從火木之成化酸肝木搖動中土故中土擾擾不寧而為嘈雜如飢狀每求食以自救苟得少食則嘈雜亦少止止而復作蓋土虛不禁木所搖故治法必當補土伐木治痰飲若不以補土為君務攻其邪久久而虛必變為反胃為瀉為痞滿為眩暈等病矣論嘈雜痰火為患虞氏曰胃為水穀之海無物不受若濕面魚腥水果生冷以及烹飪調和黏滑難化等物恣食無節朝傷暮損而成清痰稠飲滯於中宮故為嘈雜為吞酸其證似飢非飢似痛非痛而有懊憹不自寧之況其病或兼噯氣或兼痞滿或兼噁心漸至胃脘作痛甚則為翻胃膈噎實痰火之為患也治法以南星半夏橘紅之類消其痰以芩連梔子石膏知母之類降其火以蒼朮白朮芍藥之類建脾行濕壯其本元而又忌口節欲無有不安者也吳氏曰嘈雜火證也而痰次之終歲嘈雜者必夭夭者何也熯萬物者莫若火也熯火盛貌論嘈雜雜治法食鬱嘈雜者枳朮丸加山楂麥芽有熱加炒梔子薑炒黃連二味乃必用之藥也停飲者曲術丸胸滿者大安丸保和丸脈洪大者火多二陳湯加薑汁炒山梔黃連脈滑大者痰多二陳湯加南星瓜蔞芩連梔子肥人嘈雜者二陳湯少加撫芎蒼朮白朮炒梔子脈弦細身倦怠者六君子湯加撫芎蒼朮白朮薑汁炒梔子濕痰氣滯不喜食用三補丸加蒼朮倍香附有用克伐藥過多不能食精神漸減四君子湯加白芍陳皮薑汁炒黃連心懸懸如飢欲食之時勿與以食只服三聖丸佳心下嘈雜者導飲丸最妙眩暈嘈雜者是火動其痰也二陳湯加梔子芩連五更嘈者思慮傷血分也四物湯加香附貝母山梔黃連甘草脈法右寸關脈緊而滑兩寸弦滑胸中有留飲寸脈橫者膈上有橫積也右關弦急甚者木乘土位欲作胃反難治治食鬱嘈雜方消食清郁湯治嘈雜悶亂噁心發熱頭痛陳皮半夏薑汁炒白茯苓神麯炒麥芽炒山楂去核香附米川芎枳殼去穰麩炒梔子炒黃連薑汁炒蒼朮米泔浸藿香甘草各等分上銼生薑三片水煎服香砂平胃散治食鬱嘈雜蒼朮米泔浸炒厚朴薑製陳皮去白甘草炙香附砂仁黃連炒山梔炒川芎白芍藥辰砂各等分水煎服曲術丸治停飲宿食嘈雜神麯炒三兩蒼朮米泔炒一兩半陳皮一兩上為末生薑汁煮神麯糊丸如緑豆大每服七十丸薑湯下交泰丸治胸中痞悶嘈雜大便稀則胸中頗快大便堅則胸中痞悶難當不思飲食白朮土炒黃連薑汁炒吳茱萸湯泡各二兩枳實麩炒一兩歸尾酒洗三錢三分大黃用當歸紅花吳茱萸乾漆各一兩煎水浸大黃一晝夜切碎曬乾仍以酒拌曬九蒸九曬用四兩上為細末薑汁打神麯糊丸如緑豆大每服七八十丸白湯下不拘時安脾丸治嘈雜及吐食脈弦者肝乘於脾而吐乃由脾土之虛宜治風安脾無羈絆於脾故飲食自下半夏一兩檳榔二錢雄黃一錢半上為末薑汁和蒸餅為丸如桐子大小兒丸黍米大薑湯下從少至多漸加服之以得其吐能食為度治氣鬱嘈雜方三聖丸治氣鬱嘈雜神效白朮四兩橘紅一兩黃連炒五錢上為細末神麯糊丸如緑豆大每服五十丸食遠津咽下或薑湯下香連丹治久郁心胸痞痛或嘈雜干噎吞酸香附黃連各四兩上為末神麯糊丸如桐子大每服七十丸白湯下加味三補丸治鬱火嘈雜此方亦良黃芩黃連黃柏香附醋浸五日倍用蒼朮泔浸七日各一兩上為末丸服治痰火嘈雜方芩連二陳湯治痰因火動胃口作嘈陳皮半夏薑製茯苓甘草炙南星黃芩黃連山梔子炒上銼加生薑三片水煎服熱多加青黛一方二陳湯止加黃芩梔子加味二陳湯治肥人嘈雜陳皮半夏茯苓甘草炙撫芎蒼朮白朮山梔子炒上銼加生薑煎服祛痰火丸治胃中痰火噯氣嘈雜南星半夏各薑湯泡七次香附童便浸軟石膏梔子炒各等分上為細末薑汁浸蒸餅丸如桐子大每服五十丸薑湯下或加生薑煎服亦可痰火越鞠丸治痰因火動令人嘈雜蒼朮米泔浸七日撫芎香附童便浸山梔子炒黑瓜蔞仁去油南星牛膽者海浮石研水飛青黛水飛過上為末神麯糊丸服治血虛嘈雜方養血四物湯治血虛嘈雜當歸川芎白芍藥熟地黃人參茯苓半夏黃連梔子炒甘草炙上銼加生薑煎服或去人參加香附貝母甚效當歸補血湯治心中血少而嘈兼治驚悸怔忡當歸芍藥生地黃熟地黃各三錢人參五分白朮白茯苓麥門冬去心山梔仁炒陳皮各八分甘草辰砂研末臨服入各三分烏梅一個去核炒米百粒上銼一劑加棗二枚水煎溫服
