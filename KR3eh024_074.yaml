body:
  text: 卷七十四脅痛論虞氏曰內經云肝病者兩脅下痛引小腹令人善怒虛則目䀮䀮無所見耳聵聵無所聞善恐如人將捕之又曰怒則氣逆虛則嘔血及飧泄故氣上逆蓋心生血肝納血因大怒而血不歸經或隨氣而上出於口鼻或留於本經而為脅痛又或歲木太過而本氣自甚或歲金有餘而木氣被郁皆能令人脅痛經曰病脅下滿氣逆二三歲不已病名曰息積積不在中而在脅之下者初起微小久而至大則脅滿氣逆喘促息難故名息積今人有積在左脅之下俗名為痞者其即此證是乃肝木有餘之證也外有傷寒發寒熱而脅痛者足少陽膽足厥陰肝二經病也治以小柴胡湯無有不效者或有清痰食積流注脅下而為痛者或有登高墜僕死血阻滯為痛者又有飲食失節勞役過度以致脾土虛乏肝木得以乘其土位而為胃脘當心而痛上支兩脅痛膈噎不通飲食不下之證醫者宜於各類推而治之毋認假以為真也丹溪曰脅痛屬木氣實肝火盛有死血有痰流注木氣實用川芎蒼朮青皮當歸肝火盛用當歸龍薈丸是瀉火要藥左金丸瀉肝火行濕為熱甚之佐也死血宜破血行氣用留尖桃仁紅花川芎香附之類痰流注用二陳湯加南星蒼朮川芎肝苦急急食辛以散之用撫芎蒼朮或小柴胡湯脅痛發寒熱者用小柴胡湯右脅痛用推氣散左脅痛以柴胡為君加佐使藥兩脅走痛或可用控涎丹咳嗽脅痛者二陳湯加南星香附青皮青黛薑汁有氣鬱而胸脅痛者看其脈沉澀當作郁治痛而不得伸舒者蜜丸龍薈丸最快脅下有食積一條扛起用吳茱萸炒黃連一身氣痛及脅痛痰挾死血控涎丹加桃仁泥丸服氣弱人脅下痛脈數緊或弦多從勞役怒氣得者八物湯加木香青皮或又加桂肥白人氣虛寒熱脅痛用參耆柴胡黃芩木香青皮瘦人寒熱脅痛多怒者必瘀血宜桃仁紅花柴胡青皮大黃寒熱脅痛似有積塊者必飽食勞力所致宜龍薈丸解痛外以琥珀膏貼或以芥子水研敷或以吳茱萸醋研敷或以炒韭尉丹溪活套云凡脅痛者多是肝木有餘也宜用小柴胡湯加青皮川芎芍藥龍膽草甚者煎成正藥入麝香青黛痰流注者本方倍半夏加橘紅南星蒼白朮茯苓川芎之類瘀血作痛者小柴胡合四物湯加桃仁紅花或乳香沒藥煎服痛甚而元氣壯實者桃仁承氣湯下之而愈性急多怒之人時常腹脅作痛者小柴胡加川芎芍藥青皮之類煎服甚者以煎藥送下當歸龍薈丸其效甚速戴云曾有人脅痛連膈服氣藥不效後用辛熱補劑下黑錫丹方愈此乃虛寒作痛也李氏曰脅痛本是肝病宜分左右虛實治之左右者陰陽之道路也左肝陽血陰右肺陰氣陽實者肝氣實也痛則手足煩躁不安臥小柴胡湯加芎歸白芍藥蒼朮青皮龍膽草或單黃連丸虛者肝血虛也痛則悠悠不止耳目䀮聵善恐如人將捕四物湯加柴胡梢或五積散去麻黃加青木香青皮虛甚成損脅下常一點痛不止者名干脅痛甚危八物湯加木香青皮桂心有火去桂加山梔或吳茱萸水炒黃連左脅痛屬怒火與死血大怒逆氣及謀慮不決或外感風邪皆令肝火動甚脅痛難忍古茱連丸當歸龍薈丸輕者小柴胡加黃連牡蠣枳殼瘀血必歸肝經夜痛或午後發者是小柴胡湯合四物湯加桃仁紅花乳香沒藥痛甚者枳芎散便堅黑者桃仁承氣湯或瀉青丸皮痛吐血者熱傷肝也小柴胡湯加芎歸生地黃外用韭菜尉脅及琥珀膏貼右脅痛屬食積痰飲七情食積脅下如扛挭起一條作痛神保丸枳實煎湯下輕者保和丸痰飲流注肝經喘咳引痛者二陳湯加南星蒼朮川芎柴胡白芥子或入青黛少許薑汁三匙痰甚者控涎丹如胸背脅痛喘急妨悶者瓜蔞實丸飲水停滯脅下如插痛者濃煎蔥白湯調枳殼煮散甚者用傷寒水證治法七情凝滯如有物刺痛氣促嘔吐者分氣紫蘇飲流氣飲子調中順氣丸鬱氣挾食連乳痛者推氣散鹽煎散悲哀傷者枳實煮散四味枳實散一塊氣丸素有郁者越鞠丸而脅痛常兼左右證濕熱盛則兩脅痛當歸龍薈丸諸脅痛皆效如痛不可舒伸者用此丸二錢半加薑黃桃仁各五錢蜜丸或煎服外感脅痛寒熱者小柴胡湯加枳梗詳傷寒脅痛二三年不已者乃痰瘀結成積塊肝積肥氣肺積息賁發作有時雖皆肝木有餘不可峻攻宜枳朮丸加官桂陳皮桔梗甘草蜜丸服或復元通聖散敷脅臊方選要曰脅痛者厥陰肝經所為也其病自兩脅下痛引小腹亦當視內外所感之邪而治之若因暴怒傷觸悲哀氣結飲食過度冷熱失調顛仆傷形或痰積流注於脅與血相搏皆能為痛此內因也若傷寒少陽耳聾脅痛風寒所襲而為脅痛此外因也治之當以散結順氣化痰和血為主平肝而導其滯則無不愈矣方氏曰左脅痛胃脘痛二證婦人多有之以其憂思忿怒之氣素蓄於中發則上衝被濕痰死血阻滯其氣而不得條達故作痛也故治婦人諸痛諸疾必以行氣開鬱為主而破血散火兼之庶得法矣脈法脈經曰肝脈搏堅而長色不清當病墜墮若搏因血在脅下令人喘逆若軟而散其色澤者當病溢飲溢飲者暴渴多飲而溢入肌皮腸胃之外也肝脈沉之而急浮之亦然苦脅下痛有氣支滿引少腹而痛時小便難苦目弦頭痛腰背痛足為逆寒時癃婦人月水不來時無時有得之少時有所墜墮脈雙弦者肝氣有餘兩脅作痛脈訣曰兩脅疼痛脈必雙弦緊細弦者多怒氣偏沉澀而急痰瘀之愆治肝實脅痛方當歸龍薈丸治內有濕熱兩脅痛甚伐肝木瀉肝火太盛之要藥肝實者宜之當歸龍膽草梔子仁黃連黃芩各一兩大黃酒製蘆薈青黛各五錢木香二錢半麝香五分另研上為細末神麯糊丸如桐子大每服二十丸薑湯下痛甚者烘熱服一方加柴胡五錢青皮一兩柴胡瀉肝湯治鬱怒傷肝脅肋痛在左者柴胡當歸各一錢二分青皮麩炒芍藥各一錢黃連炒山梔子炒龍膽草酒洗各八分甘草五分上咀片水煎服柴胡疏肝散柴胡青皮醋炒各二錢川芎芍藥煨枳殼麩炒香附各一錢半甘草炙五分上作一服水煎服一方青皮作陳皮瀉青丸治肝經鬱熱兩脅因怒作痛目自腫疼手循衣領大便祕澀龍膽草三錢川芎當歸山梔子大黃羌活防風各五分上為末煉蜜丸如芡實大每服一二丸竹葉薄荷煎湯下左金丸瀉肝火行濕為熱甚之反佐黃連六錢吳茱萸一錢上為細末湯浸蒸餅為丸如緑豆大每服三五十丸淡薑湯下抑青丸瀉肝火黃連半斤上為末蒸餅丸服治肝虛脅痛方加味補中益氣湯治元氣虛極脅或刺痛人參黃耆白朮甘草當歸陳皮升麻柴胡白芍藥龍膽草青皮枳殼香附子川芎上銼加生薑三片水煎服丹溪方治氣弱人脅下痛脈細緊或弦多從怒氣勞役得人參茯苓川芎各八分白朮芍藥青皮生地姜酒炒各一錢當歸一錢半甘草木香各五分上㕮咀水煎服或加桂一方治肥白人氣虛而脅痛發熱者人參七分黃耆黃芩各八分柴胡青皮各一錢木香六分川芎五分小柴胡合四物湯治脅痛每日至夜身熱或陰虛發熱柴胡黃芩半夏人參甘草當歸川芎白芍藥熟地砂仁炒龍膽草青皮乾葛上銼加生薑三片水煎服陰虛甚加黃柏知母勻氣散專治脅痛山梔子熟地砂仁炒茯苓細辛川芎桂心各等分上研為末加羊脂煎服芎葛湯治脅下疼痛不可忍兼治肺弱川芎乾葛桂枝細辛枳殼人參芍藥麻黃防風各一錢甘草五分上銼加生薑三片水煎溫服桂枝散治因驚傷肝脅骨里疼痛不已枳殼小者一兩桂枝半兩上為細末每服二錢薑棗湯調下枳殼煮散治因悲哀煩腦傷肝兩脅骨痛筋脈拘急腰腳重滯股脅牽痛四肢不舉漸至背脊攣急大治脅痛枳殼川芎防風細辛桔梗各八分甘草四分乾葛三分上㕮咀加生薑水煎服四味枳實散治肝氣不足兩脅疼枳實一兩人參川芎芍藥各五錢上為末每服二錢薑棗湯調服治氣滯脅痛方枳芎散治左脅疼痛不可忍者此方和血利氣枳實川芎各半兩粉草炙二錢半上為末每服二錢薑棗湯或酒調下推氣散治右脅痛脹滿不食此肝經移病於肺片薑黃枳殼麩炒桂心各五錢甘草炙三錢上為末每服二錢薑棗湯下酒亦可分氣紫蘇飲治腹脅疼痛氣促喘急紫蘇葉桔梗陳皮大腹皮黑豆水洗淨桑白皮茯苓各一錢五味子十五粒草果仁八分甘草炙四分上銼加生薑三片白鹽少許水煎食前服調中順氣丸治三焦氣滯水飲停積脅下虛滿或時刺痛木香白豆蔻青皮去白陳皮去白三稜炮各一兩大腹皮半夏湯泡七次各二兩砂仁檳榔沉香各五錢上為末水糊丸如桐子大每服三十丸至五十丸陳皮煎湯下沉香導氣散治一切氣不升降脅肋刺痛痞塞沉香檳榔各二錢半人參訶子煨去核大腹皮炒各五錢白朮烏藥紫蘇葉香附子炒神麯炒麥蘖炒各一兩陳皮去白薑黃甘草各四兩京三稜煨蓬莪朮煨益智仁炒厚朴薑製各二兩上為細末每服二錢食前沸湯熱服鹽煎散治男婦形寒飲冷胸脅心腹㽲痛及膀胱腸氣痛當歸川芎芍藥三稜莪朮青皮枳殼茯苓厚朴神麯麥芽小茴香木香各八分冷痛加官桂上銼每服四錢加蔥白一根食鹽少許水煎服一方治脅下疼痛如神效小茴香炒一兩枳殼麩炒五錢上為末每服二錢鹽湯調下一方治脅痛枳殼草豆蔻赤芍藥香附烏藥砂仁各等分上為細末沸湯調下二錢或銼二錢水煎熱服一方治婦人脅痛白芍藥肉桂玄胡索炒各二兩香附子四兩醋一碗鹽一兩煮乾上為末每服二錢空心滾湯調下治食積脅痛方香砂平胃散治食積脅痛香附陳皮去白枳實麩炒山楂一錢麥芽炒各一錢砂仁木香各五分乾薑檳榔甘草炙各三分青皮去白一錢上銼加生薑水煎服異香散治腹脅膨脹痞悶噎塞疼痛蓬朮煨京三稜煨益智仁甘草各一錢青皮陳皮各五分石蓮肉厚朴薑製三分上銼加生薑三片大棗一枚白鹽少許水煎服神保丸治心膈脅下痛大便不通氣噎宿食不消木香胡椒各二錢半乾蠍七枚巴豆十枚去皮心膜研上為末湯浸蒸餅為丸麻子大硃砂為衣每服五丸茶酒任下治痰積脅痛方加味二陳湯治痰飲流注作脅痛蒼朮米泔浸炒陳皮各一錢半半夏薑製南星薑製各一錢茯苓川芎各七分甘草五分上銼加生薑三片水煎服咳嗽而痛者去蒼朮川芎加香附青皮青黛薑汁控涎丹治兩脅走痛有痰積者甘遂去心大戟去皮白芥子各等分上為末糊丸如桐子大每服五十丸至百丸食後臨臥淡湯下治死血脅痛方疏肝飲治左脅下痛肝積死血或因怒氣所傷或跌撲閃挫所致黃連吳茱萸煎汁炒二錢柴胡當歸各一錢半青皮桃仁研如泥枳殼麩炒各一錢川芎白芍藥各七分紅花五分上銼一劑水煎食遠服活血湯治死血脅下痛歸尾赤芍藥桃仁牡丹皮玄胡索青皮香附枳殼去穰各一錢川芎七分官桂紅花木香各五分甘草二分上銼加生薑一片水煎服丹溪方治死血作痛瘦人多怒者常患此當歸梢酒洗一錢半芍藥香附各一錢川芎酒洗柴胡青皮紅花各八分桃仁九個上㕮咀水煎服破血散疼湯治乘馬損傷跌其脊骨惡血流於脅下其痛苦楚不能轉側妨於飲食羌活防風中桂各一錢蘇木一錢半連翹當歸梢柴胡各一錢二分水蛭三錢炒去煙盡另研麝香少許另研上銼分作二服每服酒二大盞水一大盞煎作一盞去渣上火合稍熱調下水蛭麝香空心服之兩服立愈
