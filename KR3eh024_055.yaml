body:
  text: 卷五十五健忘論袖珍論曰健忘者謂陡然而忘其事也此證皆主於心脾二經蓋心之官則思脾亦主思此由思慮過度有傷心脾而得也傷於心則真氣耗散神不守舍傷於脾則胃氣虛憊而慮愈深二者皆能令人健忘也治之須兼理心脾神凝意定其證自除丹溪云精神短少者多亦有痰者戴氏曰健忘者為事有始無終言談不知首尾此以為病之名非生成之愚頑不知人事者李氏曰驚悸久則怔忡怔忡久則健忘三證雖有淺深然皆心脾血少神虧清氣不足痰火濁氣上攻引神歸舍丹主之亦有所稟陰魂不足善忘者當大補氣血及定志丸如老年神衰者加減固本丸天王補心丹蔭按經云腎者作強之官技巧出焉心者君主之官神明出焉腎主智腎虛則智不足故善忘其前言又心藏神神明不充則遇事遺忘也健忘之證大概由於心腎不交法當補之歸脾湯十補丸主之亦有痰因火動痰客心包者此乃神志昏憒與健忘證稍不相同法當清心開竅二陳湯加竹瀝薑汁並硃砂安神丸主之又按驚者驚駭也悸者心動也皆發於心而肝腎因之經云東方青色入通乎肝其病發驚駭驚雖屬肝然心有主持則不驚矣心驚然後膽怯乃一定之理也心氣熱硃砂安神丸主之心氣虛安神定志丸主之悸為心動謂之怔忡心築築而跳搖搖而動也皆由心虛挾痰所致定志丸加半夏橘紅主之然必須節飲食戒思慮慎房勞凝神定志養心固精再服藥餌未有不瘳之理毋謂七情之病而忽視之也倘諱疾忌醫百不避忌雖扁鵲華佗復生亦無如之何矣可不畏哉治方歸脾湯治思慮過度勞傷心脾健忘怔忡人參黃耆龍眼肉酸棗仁白茯神去木白朮各一錢木香甘草炙各五分一方加遠志一錢當歸五分尤妙上作一服加生薑三片棗一枚水煎服加減補心湯治諸虛健忘等證白茯苓歸身白芍藥生地酒洗陳皮遠志酸棗仁黃柏知母麥門冬去心各五錢人參白朮石菖蒲甘草各三錢上銼每服一兩水煎三六九日服暑月尤宜加味安志丸治虛憊精神恍惚心思昏憒氣虛不足健忘怔忡人參白茯苓遠志菖蒲酸棗仁去油黃連各一兩當歸酒洗八錢柏子仁一兩去油木香四兩生地黃酒洗各八錢硃砂水飛一兩二錢半入藥半為衣上為末煉蜜丸如綠豆大半飢時用麥門冬去心煎湯下五六十丸定志丸治心氣不足恍惚多忘遠志去骨菖蒲各二兩人參茯苓各三兩上為末煉蜜丸如桐子大硃砂為衣每服二十丸米飲下一方加茯神聰明湯治不善記而多忘者白茯神去木遠志甘草水煮去骨石菖蒲一寸九節者各三兩上為細末每日用三五錢煎湯空心食後服一日八九次久久日誦千言狀元丸開心通竅定志凝神多記石菖蒲地骨皮白茯神去木人參去蘆三錢遠志甘草水煮去心各一兩巴戟天去骨五錢上為細末用白茯苓二兩糯米二兩共打粉外用石菖蒲三錢打碎煎濃湯煮糊為丸如桐子大每服三十五丸食後午時臨臥白湯下安志膏治心神恍惚一時健忘人參酸棗仁炒各一錢辰砂研細水飛乳香另研各半兩上為末和勻煉蜜丸如彈子大每服一丸空心溫酒或棗湯下聖惠方補心虛治健忘令人耳目聰明開心不忘菖蒲遠志各等分上為細末每服方寸匕用戊子日服人參遠志丸治心氣不足驚悸健忘神思不安天門冬去心白茯苓菖蒲各七錢半人參遠志去心酸棗仁黃耆各半兩桔梗丹砂官桂去皮各二錢半以下酸棗仁柏子仁俱去油上為末煉蜜丸如綠豆大每服二十丸至三十丸米湯下加減固本丸治中風後健忘養神益志和血益腠理丹參天門冬去心熟地砂仁炒人參遠志去心硃砂另研石菖蒲各五錢麥門冬去心白茯苓各一兩上為末煉蜜丸如桐子大硃砂為衣每服五十丸至百丸空心煎愈風湯下常服白湯下即二丹丸加菖蒲天王補心丹安心保神益血固精壯力強志令人不忘除怔忡定驚悸清三焦化痰涎祛煩熱療咽乾育養心神當歸酒浸五味子麥門冬去心天門冬去心柏子仁酸棗仁各一兩人參白茯苓玄參丹參桔梗遠志各五錢黃連酒洗炒二兩生地黃四兩姜酒炒上為末煉蜜丸如桐子大用硃砂為衣每服三二十丸臨臥燈心竹葉煎湯下此方聞人侍御之所常服故提學南畿心神甚勞而不傷此丹之功也劉松石中丞所傳有石菖蒲熟地黃杜仲百部茯神甘草六味一方有石菖蒲枸杞子無黃連柏子養心丸安心保神益血固精祛煩熱除驚悸長聰明久服令人不忘柏子仁微蒸去殼玄參酒洗各二兩枸杞子水洗三兩麥門冬去心茯神去木熟地黃酒蒸當歸酒洗各一兩甘草石菖蒲洗淨酸棗仁各五錢去油上除柏子仁熟地黃蒸過石臼內搗如泥余俱為細末煉蜜為丸如桐子大每服四五十丸臨睡白湯下讀書丸治健忘服之日記萬言石菖蒲菟絲子酒煮遠志去心生地黃酒炒五味子川芎各一兩地骨皮二兩上為細末薄糊丸如桐子大每服七八十丸臨臥白湯下孔子大聖枕中方治學問易忘服之令人聰明敗龜板酥炙龍骨研末入雞腹中煮一宿遠志去心菖蒲九節者各等分上為細末每服一錢酒調下日三服仁熟散治膽虛常多恐畏不能獨臥頭目不利怔忡健忘人參枳殼五味子桂心山茱萸茯神甘菊花枸杞子各三錢柏子仁熟地黃各一兩上為細末每服二錢溫酒調服加味茯苓湯治痰迷心竅健忘失事半夏湯泡陳皮各二錢白茯苓一錢半益智香附人參各一錢甘草五分上作一服加生薑三片水煎食遠服養神湯勤讀苦辛之士服此麥門冬去心天門冬去心石菖蒲去毛各二錢當歸貝母去心白朮甘草知母陳皮炒各一錢丹參黃連薑汁炒各五分五味子九粒上作一服加生薑水煎不拘時當茶以爽神氣通竅孔也補益四物湯辛苦讀書而有房勞服此當歸生地酒炒白朮玄參各一錢白芍藥川芎黃柏炒知母白茯苓麥門冬去心陳皮山梔仁炒甘草各五分上作一服加生薑三片水煎半飢空心服
