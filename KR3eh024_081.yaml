body:
  text: 卷八十一痹證論內經曰風寒濕三氣雜至合而為痹也痹者閉也三氣雜至則壅閉經絡血氣不行而病為痹即痛風不仁之屬其風氣勝者為行痹遊行不定走注歷節疼痛之類寒氣勝者為痛痹陰寒之氣客於肌肉筋骨之間則凝結不散陽氣不行故痛不可當亦名痛風骨節攣痛也濕氣勝者為著痹也肢體重著不移或為疼痛或為頑木不仁濕從土化病多發於肌肉浮腫重墜其有五者以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹遇此者指上文之三氣也冬主骨春主筋夏主脈土旺之時主肌肉秋主皮故邪氣之至各有所應其內舍五臟六腑者五臟皆有合病久而不去者內舍於其合也皮肉筋骨脈皆有五臟之合病在外而久不去則各因其合而內連於臟矣故骨痹不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時重平聲感於風寒濕之氣也舍者邪入而居之也時調氣王之時五臟各有所應也病久不去而復感於邪氣必更深故內舍其合而入於臟凡痹之客五臟肺痹者煩滿喘而嘔肺在上焦其脈循胃口故為煩滿喘而嘔心痹者脈不通煩則心下故暴上氣而喘嗌乾善噫厥氣上則恐心合脈而痹氣居之故脈不通心脈起於心中其支者上挾咽其直者卻上肺故病此諸證厥氣陰氣也心火衰則邪乘之故神怯而恐肝痹者夜臥則驚多飲數小便上為引如懷肝藏魂肝氣痹則魂不安故主夜臥驚駭肝脈下者過陰器抵少腹上者循喉嚨之後上入頑顙故為病如此腎痹者善脹尻以代踵脊以代頭腎者胃之關腎氣痹則陰邪乘胃故腹善脹尻以代踵者足攣不能伸也脊以代頭者身僂不能直也以腎脈入跟中上腨內出膕內廉貫脊屬腎故為是病脾痹者四肢懈惰發咳嘔汁上為大塞脾主四肢故令懈惰其脈屬脾絡胃上膈挾咽今其氣痹不行故發咳嘔汁甚則上焦否隔為大塞不通也腸痹者數飲而出不得中氣喘爭時發飧泄腸痹者兼大小腸而言腸間病痹則下焦之氣不化故雖數飲而水不得出水不出則本末俱病故與中氣喘爭蓋其清濁不分故時發飧泄胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕胞膀胱之脬也膀胱氣閉故按之則內痛水閉不行則蓄而為熱故若沃以湯且澀於小便也膀胱之脈從巔入絡腦故上為清涕胞脬俱音拋又五脈五臟之痹見素問五臟生成論又曰痹之為病不痛何也痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在於皮則寒故具此五者則不痛也具此五者則筋骨皮肉血脈之間氣無不痹故不得為痛凡痹之類逢寒則蟲逢熱則縱蟲謂皮中如蟲行縱謂縱緩不相就蟲甲乙經作急於義為得蓋逢寒則筋攣故急逢熱則筋弛故縱也蔭按風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹既曰勝則受病有偏重矣治行痹者散風為主而以除寒祛濕佐之大抵添以補血之劑所謂治風先治血血行風自滅也治痛痹者散寒為主而以疏風燥濕佐之大抵添以補火之劑所謂熱則流通寒則凝塞通則不痛痛則不通也治著痹者燥濕為主而以祛風散寒佐之大抵添以補脾之劑蓋土旺則濕勝而氣足自無頑麻也通用蠲痹湯加減主之痛甚者佐以松枝酒又有患痹日久腿足枯細膝頭腫大名曰鶴膝風此三陰本虧寒邪襲於經絡遂成斯證宜服虎膠丸外貼普救萬應膏則漸次可愈失此不治則成痼疾而為廢人矣患者知之袖珍論曰凡痹病目有五種筋痹脈痹骨痹皮痹肌痹是也多由體虛之人腠理空疏為風寒濕三氣所侵不能隨時驅散留滯經絡久而為痹其為病也寒多則掣痛風多則引注濕多則重著其病在筋者則屈而不能伸應乎肝其證夜臥多驚飲食少小便數其病在脈者則血凝而不流應乎心其證令人痿黃心下鼓氣卒然逆喘不通嗌乾善噫其病在骨者則重而不能舉應乎腎其證手足不遂而多痛心腹脹滿其病在皮者多寒遇寒則急遇熱則縱應乎肺其證皮膚無所知覺氣奔喘滿其病在肌肉者多不仁應乎脾其證四肢懈怠發咳嘔吐診其脈大而澀或來急而緊俱為脾之候也治之當辨其所感風寒濕三氣注於何部分其表裡須從偏勝者主以藥餌又有停蓄支飲亦令人痹又當隨證治之至如白虎歷節遍身痛者無非風寒濕三氣乘之巢氏曰飲酒當風汗出入水遂成斯疾久而不愈令人骨節蹉跌恐為癲癇之病如有此證治之宜早李氏曰痹者氣閉塞不通流也或痛癢或麻痹或手足緩弱與痿相類但痿屬內因血虛火盛肺焦而成痹屬風寒濕三氣侵入而成然外邪非血氣虛則不入此所以痹久亦能痿又痹為中風之一但純乎中風則陽受之痹兼風寒濕三氣則陰受之所以為病更重觀宋明醫錢仲陽自患周痹偏廢不能全愈可見經言春為筋痹夏為脈痹夏為肌肉痹秋為皮痹冬為骨痹言皮脈肌筋骨各以時而受風寒濕之邪也大概風濕多侵乎上有肩背麻木手腕硬痛寒濕多侵乎下腳腿木重若上下俱得身如板夾腳如石墜須分風寒濕多少治之風多痛走不定寒多掣痛周身拘急手足冷痹與痛風無異濕多浮腫重著一處不移風多烏藥順氣散三痹湯越婢湯單稀簽丸寒多五積散加天麻附子或蠲痹湯寒濕五積交加散濕多川芎茯苓湯當歸拈痛湯防己黃耆湯羌活勝濕湯續斷丸又冷痹身寒不熱腰腳沉冷即寒痹之甚者三痹湯合三五七散或舒筋湯附子理中湯又熱痹或濕生熱或風寒鬱熱身上如鼠走唇口反縱肌肉變色宣明升麻湯風寒濕熱痹二妙蒼柏散等分加虎脛骨防風減半水煎服初起強硬作痛者宜疏風豁痰沉重者宜流濕行氣久病須分氣血虛實痰瘀多少治之氣虛痹者關節不充一身如從水中出陽虛陰盛也四君子湯加肉桂生附或川附丸血虛痹者皮膚不仁濟生防風湯或黃耆建中湯去飴加桂枝挾瘀血者四物湯加桃仁紅花竹瀝薑汁挾痰者手足麻痹多睡眩暈濟生茯苓湯或二陳湯加竹瀝薑汁腎脂枯涸不行髓少精弱凍栗攣急者十全大補湯地仙丹通用五痹湯擦痹法初病驟用參耆歸地則氣血滯而邪郁經絡不散虛者烏頭粥行濕流氣散主之凡味酸傷筋則緩味鹼傷骨則痿令人發熱變為痛痹麻木等證慎疾者須戒魚腥麵醬酒醋肉屬陽助火但可量吃若厚味過多下必遺溺上必痞悶先用二陳湯加芍藥黃連降火然後用本證藥吳氏曰痿證大都主熱痹證大都主寒然痿證亦有寒者痹證亦有熱者此不可泥也脈法脈大而澀為痹脈急亦為痹肺脈微為肺痹心脈微為心痹右寸沉而遲澀為皮痹左寸結而不流利為血痹右關脈舉按皆無力而澀為肉痹左關脈弦緊而數浮沉有力為筋痹遲為寒數為熱濡為濕滑為痰豁大弦小為虛少陰脈浮弱則血不足風血相搏即疼痛如掣脈訣舉要曰風寒濕氣合而為痹浮澀而緊三脈乃備治方五痹湯治風寒濕之氣客留肌體手足緩弱麻痹不仁羌活白朮薑黃防己各二錢甘草炙一錢上作一服加生薑七片水煎病在上食後服病在下食前服蠲痹湯治冷痹手足腰痛沉重身體煩疼背項拘急一云治濕氣著於肌肉致榮衛之氣不榮令人痹而不仁發為肉痹當歸酒浸黃耆防風各二錢半羌活赤芍藥酒炒薑黃酒炒甘草各五分上作一服加生薑五片棗二枚水煎食前服一方無防風甘附散治五種痹痛身體臂間發作不定者黃耆白朮當歸熟地砂仁炒川芎柴胡防風附子桂心甘草各等分上銼水煎服濟生防風湯治血痹肌痹皮痹防風一錢當歸赤茯苓獨活赤芍藥黃芩秦艽各五分甘草桂心杏仁去皮尖各二分半上㕮咀作一服加生薑五片水煎不拘時服濟生茯苓湯治停蓄支飲手足麻痹多睡眩冒半夏赤茯苓陳皮各二錢枳殼麩炒桔梗甘草炙各一錢上作一服加生薑五片水煎服不拘時宣明茯苓湯治寒氣勝者為痛痹四肢疼痛拘攣浮腫赤茯苓桑白皮各二兩防風官桂川芎芍藥麻黃去節各一兩上為末每服五錢加棗一枚水煎服以薑粥投之汁泄為度川芎茯苓湯治濕氣勝者為著痹留注不去四肢麻木拘攣浮腫赤茯苓一錢半桑白皮防風蒼朮米泔浸一宿炒當歸酒洗芍藥煨麻黃各一錢川芎一錢二分官桂五分甘草炙四分上銼每服五錢加棗三枚水煎溫服如欲汗以粥投之宣明麻黃湯治熱痹肌肉熱極體上如鼠走唇口反縱皮色俱變兼諸風證升麻三錢茯神去木人參防風犀角鎊羚羊角鎊羌活各一錢官桂三分上作一服加生薑三片水煎入竹瀝少許溫服茯神湯治心痹神思昏塞四肢不利胸中煩悶時復恐悸茯神羌活麻黃去根節麥門冬去心龍齒各一兩遠志去心犀角屑薏苡仁人參蔓荊子防風各七錢半赤芍藥甘草炙各五錢上㕮咀每服五錢加生薑五片水煎不拘時服舒筋散治臂痛亦治腰下疾片子薑黃四兩甘草炙羌活各一兩白朮海桐皮當歸赤芍藥各三兩上㕮咀每服一兩水煎服如腰以下空心服腰以上食後服行濕流氣散治風寒濕氣痹證身如板夾麻木不仁或手足痠軟蒼朮羌活防風川烏各一兩薏苡仁二兩白茯苓一兩半上為末每服二錢溫酒或蔥湯調下三痹湯治血氣澀滯手足拘攣風痹等疾杜仲薑汁炒防風桂心川續斷人參當歸秦艽生地薑酒炒茯苓川芎黃耆細辛芍藥獨活牛膝甘草炙各等分上銼每服一兩加生薑三片棗二枚水煎不拘時服續斷丸治風濕流注四肢浮腫肌肉麻痹續斷當歸炒萆薢附子炮去皮臍防風天麻各一兩川芎七錢半乳香另研沒藥另研各五錢上為細末煉蜜丸如桐子大每服四十丸空心溫酒米飲下增損續斷丸治寒濕之氣痹滯關節麻木疼痛人參防風山茱萸鹿角膠白朮炮各七兩麥門冬乾地黃各三兩白茯苓黃耆續斷薏苡仁山萸石斛各二兩牡丹皮桂心各一兩上為末煉蜜丸如桐子大每服五十丸空心溫酒下川附丸治氣痹川烏附子官桂川椒菖蒲甘草各一兩骨碎補天麻白朮各五錢上為末煉蜜丸如桐子大每服三十丸食前溫酒下日三服巴戟天湯治冷痹腳膝疼痛行步艱難巴戟天去心三兩附子炮去皮臍甘草炙五加皮各二兩牛膝酒浸焙石斛去根萆薢白茯苓防風各一兩半上㕮咀每服五錢水煎服三妙丸治三陰血虛足心如火熱漸烘腰胯及濕熱麻痹疼痛痿軟等證皆效蒼朮六兩黃柏四兩牛膝二兩上為末酒糊丸如桐子大每服七十丸至一百丸空心薑湯或鹽湯下一方加當歸防己虎脛骨龜板各一兩名加味三妙丸血虛加血藥氣虛加氣藥擒虎丹治風寒濕走注痹腰膝重痛五靈脂荊芥川烏炮去皮臍當歸酒浸焙白膠香自然銅火煅醋淬七次研各二兩上為細末酒煮糊丸如桐子大每服二十丸溫酒食後服日進三服乳香宣經丸治風寒濕痹四肢拘攣筋骨疼痛行步艱難腳氣諸疾並宜服之乳香另研附子炮去皮臍木香不見火各八錢五靈脂一兩黑豆三合生用草烏去皮尖炒川楝子取肉微炒茴香炒各二兩防風陳皮去白黑牽牛生用威靈仙洗去土烏藥萆薢各四兩上為細末酒煮麵糊為丸如桐子大每服三十丸漸加至五七十丸空心溫酒送下千金萆麻湯專治風濕癱瘓手足不仁半身不遂周身麻木痠疼口眼歪斜皆效萆麻一味秋夏用葉春冬用子一二十斤入甑內置大鍋上蒸半熟取起先將綿布數尺雙摺浸入湯內取出乘熱敷患處卻將前藥熱鋪布上一層候溫再換熱藥一層如此蒸換必以換者汗出為度重者蒸五次輕者蒸三次即愈內服疏風和血之劑擦痹法萆麻子三兩活地龍七條甘草甘遂各一兩麝香一錢上搗爛於瓷器內築實勿泄氣臨用先將薑蔥各一兩搗爛包患處次用薑汁化此藥一雞子黃大擦半時久一日三次二三年者效婦人尤神又治方松枝酒治白虎歷節風走注疼痛或如蟲行諸般風氣松節桑枝桑寄生鉤藤續斷天麻金毛狗脊虎骨秦艽青木香海風藤菊花五加皮各一兩當歸三兩上銼每藥一兩用生酒二斤煮退火七日飲痛若在下加牛膝虎骨膠丸治鶴膝風並治癱瘓諸證虎骨二斤銼碎洗淨用嫩桑枝金毛狗脊去毛白菊花去蒂各十兩秦艽二兩煎水熬虎骨成膠收起如蜜樣和藥為丸如不足量加蜜煉大熟地四兩當歸三兩牛膝山藥茯苓杜仲枸杞續斷桑寄生各二兩熟附子七錢厚肉桂去皮不見火五錢丹皮澤瀉各八錢人參二兩貧者以黃耆四兩代之上為末以虎骨膠為丸每早開水下三錢普救萬應全膏治一切風氣走注疼痛以及白虎歷節風鶴膝風寒濕流注癰疽發背療瘡瘰癧跌打損傷腹中食積痞塊多年瘧母頑痰瘀血停蓄腹痛泄利小兒疳積女人癥瘕諸證並貼患處咳嗽瘧疾貼背脊心第七椎嘗制此膏普送取效神速倘貼後起泡出水此病氣本深盡為藥力拔出吉兆也不必疑懼記之記之藿香白芷當歸尾貝母大楓子制木香白蘞烏藥生地蘿蔔子丁香白及殭蠶細辛萆麻子苦參肉桂蟬退丁皮白鮮皮羌活桂枝全蠍赤芍高良薑元參南星鱉甲荊芥兩頭尖獨活蘇木枳殼連翹威靈仙桃仁牛膝紅花續斷花百頭杏仁蒼朮艾絨藁本骨碎補川芎黃芩麻黃甘草黑山梔川烏附子牙皂半夏草烏紫荊皮青風藤以上各一兩五錢大黃三兩蜈蚣三十五條蛇脫五條槐枝桃枝柳枝桑枝楝枝楮枝以上各三十五寸男人血餘三兩以上各俱浸油內真麻油十五斤用二十兩稱稱松香一百斤穰皮濾淨百草霜十斤細研篩過上銼冬浸九宿春秋七宿夏五宿分數次入鍋文武火熬以藥枯油膏滴水成珠為度濾去渣重稱每藥油十二兩下濾淨片子松香四斤同熬至滴水不散每鍋下百草霜細末六兩勿住手攪俟火候成則傾入壇中以棒攪和成塊用兩人拔數次瓷壇收貯治一切風寒濕氣瘡疽等證其效如神一方治瘡疽用血丹收更妙每油一斤用丹六兩
