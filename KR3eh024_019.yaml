body:
  text: 卷十九吐利論成無己云若止嘔吐而利經謂之吐利是也上吐下利躁擾煩亂乃謂之霍亂其與但稱吐利者有異也蓋暴於旦夕者為霍亂可數日久者為吐利綱目以霍亂與傷寒吐利合為一門今仍分為二而以徐而日久者入此門脈經云心乘肝必吐利內經云厥陰所至為嘔泄又云木太過曰發生木氣有餘發生盛也發生之紀上徵則其氣逆其病吐利是風木之為吐利者也上徵者司天見少陰君火少陽相火木氣有餘而上行生火子居母上是為氣逆故其為病如此又云水太過曰流衍衍滿而溢也流衍之紀其動漂泄沃湧是寒水之為吐利者也漂浮於上也泄瀉於下也沃灌也湧溢也金匱云乾嘔而利者黃芩加半夏生薑湯主之黃芩湯亦主之海藏云上吐下瀉不止當渴而反不渴脈微細而弱者理中湯主之丹溪云泄瀉或嘔吐生薑汁湯調六一散服潔古云有痰而泄利不止甚則嘔而欲吐利下而不能食由風痰羈絆脾胃之間水煮金花丸主之診法經云咳嘔腹痛且發泄其脈絶是逆也治乾嘔下利方黃芩加半夏生薑湯治乾嘔而利者黃芩芍藥各三兩半夏半斤甘草炙二兩生薑四兩大棗二十個上六味以水一斗煮取三升去渣溫服一升日再夜一服黃芩湯治乾嘔下利黃芩人參乾薑各三兩桂枝一兩大棗十二個半夏半兩上六味以水六升煮取三升溫分三服治虛寒吐利方理中湯上吐下利不止當渴而反不渴脈微細而弱者屬寒理中湯主之人參白朮乾薑甘草炙各一錢上加生薑煎服益中膏止吐瀉人參白朮茯苓陳皮甘草訶子木香藿香砂仁肉豆蔻各等分上為細末煉蜜丸如彈子大每服一丸米飲化開空心服治濕熱吐利方六一散治嘔吐泄瀉屬濕熱者滑石六兩甘草一兩上為細末每服三錢生薑汁湯調服丹溪方治一丈夫因辛苦發熱腰腳疼吐瀉交作白朮陳皮滑石各三錢木通柴胡各錢半人參一錢甘草五分上銼水煎服治風痰吐利方水煮金花丸治有痰而瀉利不止甚則嘔而欲吐利下而不能食由風痰羈絆脾胃之間半夏湯泡南星湯洗寒水石燒存性各一兩天麻半兩雄黃一錢半白麵四兩上為末滴水丸如桐子大
