body:
  text: 卷四十五癇證論樓氏曰癲癇即頭眩也痰在膈間則眩微不僕痰溢膈上則眩甚仆倒於地而不知人名之曰癲癇然與中風中寒中暑尸厥等仆倒不同凡癲癇僕時口中作聲將省時吐涎沫省後又復發時作時止而不休息中風中寒中暑尸厥之類則僕時無聲省時無涎沫省後不復再發間有發者亦如癲癇之常法也又曰凡癲癇及中風中寒中暑中濕氣厥尸厥而昏眩倒僕不省人事者皆由邪氣逆上陽分而亂於頭中也癲癇者痰邪逆上也中風寒暑濕及氣厥尸厥者亦風寒暑濕等邪氣逆上也邪氣逆上則頭中氣亂頭中氣亂則脈道閉塞孔竅不通故耳不聞聲目不識人而昏眩無知仆倒於地也治之者或吐痰而就高越之或鎮墜痰而從高抑之或內消痰邪使氣不逆或隨風寒暑濕之法用輕劑發散上焦或針灸頭中脈絡而導其氣皆可使頭巔脈道流通孔竅開發而不致昏眩也吳氏曰癇疾之原得之於驚或在母腹之時或在有生之後必以驚恐而致疾故曰驚癇蓋恐則氣下驚則氣亂恐氣歸腎驚氣歸心並於心腎則肝脾獨虛肝虛則生風脾虛則生痰蓄極而通其發也暴故令風痰上湧而癇作矣虞氏曰內經謂巨陽之厥則踵首頭重足不能行發為眴僕是蓋陽氣逆亂故令人卒然暴僕而不知人氣復則蘇此則癇之類也病獨主乎痰眴音縣目搐也昏亂之貌原病式曰風癇之作者由熱甚而風燥為其兼化涎溢胸膈燥爍而瘛瘲昏冒僵仆也孫真人云病先身熱掣瘲驚啼叫喚而後發癇脈浮者為陽癇病在六腑外在肌膚猶易治也病先身冷不驚掣不啼呼而病發時脈沉者為陰癇病在五臟內在骨髓難治也丹溪曰癇證大率屬痰與驚不必分五等大法行痰為主用黃連南星瓜蔞半夏尋火尋痰分多少而治無不愈者有熱者以涼藥清其心有痰者必用吐法吐後用東垣安神丸及平肝之藥青黛柴胡川芎之類諸先生講癇理甚詳明惟彥修先生之語真金石也蔭平昔尊此法治愈者不少並未分五癇之說戴氏曰癇有五無非痰涎壅塞迷悶孔竅發則頭旋顛倒手足搐搦口眼相引胸背強直叫吼吐沫食頃乃蘇宜星香散加全蠍趙氏曰諸書有以病因風驚食為三癇者有以癇象馬牛羊雞豬為五癇者夫三癇專主小兒言故有夫該盡者五癇雖有分配五臟之說於經概無所據而立方施治又未見有五者之分此丹溪所以云不必分五也葉氏曰或問癇有陰陽何也陽癇不因吐下由其有痰熱客於心胃之間因聞大驚而作若熱盛雖不聞驚亦自作也宜用清熱化痰之藥以攻治之陰癇亦本於痰熱所作醫以寒涼攻下大過損傷脾胃因而成陰宜用溫平補胃燥痰之藥治之癇病豈本自有陰寒者哉李氏曰癇與顛狂相似但癇病時發時止邪流五臟顛狂經久不愈邪全歸心癇有陰陽總只是痰內傷最多外感極少蓋傷飲食積為痰火上迷心竅驚恐憂怒則火盛神不守舍舍空痰塞故發則頭旋卒倒手足搐搦口眼相引胸背強直叫吼吐涎食頃乃醒若神脫目瞪如愚癡者不治癇久必歸於五臟肝癇面青頭搖喜驚作雞鳴狀心癇面赤口張搖頭馬嘶脾癇面黃下利吐舌羊吼肺癇面白吐沫腹脹牛吼腎癇面黑直視如只豬叫此五癇病狀偶類之耳其實痰火與驚三者而已肥人多痰動則有聲沫出風痰星香散加全蠍三枚姜煎服或追風祛痰丸五生丸驚痰紫石散驚氣丸抱龍丸三癇丸引神歸舍丹壽星丸因怒者順氣導痰湯加葛蒲辰砂因憂思者妙香散食痰醒脾散瘦人火盛面赤者防風當歸飲或小調中湯加南星或滾痰丸瀉青丸牛黃清心丸龍腦安神丸升金龍膽湯痰火俱盛者豬心丸溫酒下上吐下利去頑痰老痰為妙通用斷癇丹活虎丹蝙蝠散控涎丸紫金錠癇本痰熱挾驚宜寒藥清心降火化痰為主故古法用二陳湯加瓜蔞南星黃連探吐吐後必服硃砂安神丸以降南方之火當歸龍薈丸以平東方之木但化痰必先順氣順氣必先調中頑痰膠固非辛溫熱藥為佐何以開導是以古方治驚癇皆有溫劑又如錢仲陽治小兒癇經吐瀉及服涼藥過多身冷閉目不食後用益黃散補中能食次服腎氣丸補北方腎水能語此雖從權以救癇之壞證亦可以為成法論瘛瘲河間曰諸熱瞀瘛皆屬於火熱勝風搏並於經絡風主動而不安風火相乘是以瞀瘛生矣治法祛風滌熱之劑折其火熱瞀瘛可愈若妄加灼艾或飲以發表之劑則死不旋踵矣學者臨證審焉蔭按綱目云瘛者筋脈急也瘲者筋脈緩也急則引而縮緩則縱而伸或伸動而不止者名曰瘛瘲俗謂之發搐是也癲癇風痙破傷風三證皆能瘛瘲但癲癇則仆地不省風痙瘛瘲則角弓反張破傷風瘛瘲則有瘡口竊謂瘛者屬肝經風熱血燥或肝火妄動血傷瘲者屬肝經血氣不足或肝火汗多亡血以致手足伸縮不已抽搐不利若因風熱血燥用羚羊角散加鉤藤鉤山梔若肝火妄動用四物湯加白朮茯苓柴胡牡丹皮鉤藤鉤山梔若肝經血氣不足用八珍湯加鉤藤鉤山梔若肝火亡血用逍遙散加鉤藤鉤山梔牡丹皮如不應用六味地黃丸以補腎水生肝木為主佐以前劑治之若其脈長弦者是肝之本脈也則易治其脈短澀者是肺金克肝木也則難治其面色青中見黑者是水生木也當自愈青中見白者是金剋木也必難愈樓氏曰筋脈相引而急名曰瘛瘲俗謂之搐是也素問云心脈急甚者為瘛瘲此心火虛寒也治宜補心牛黃散主之靈樞經云心脈滿大癇瘛筋攣此心火實熱也治宜瀉心火涼驚丸主之若肝脈盛者先救脾宜加減建中湯素問云脾脈急甚者亦為瘛瘲此脾虛肝乘之而瘛瘲也故宜實土瀉肝木之劑論顫振黃帝曰人之顫者何氣使然岐伯曰胃氣不實則諸脈虛諸脈虛則筋脈懈墮筋脈懈墮則行陰用力不復故為顫因其所在補分肉間樓氏曰顫搖也振動也風火相乘動搖之象比之瘛瘲其勢力緩內經云諸風掉眩皆屬於肝掉即顫振之謂也又曰諸禁鼓栗如喪神守皆屬於熱鼓栗亦動搖之意也此證多因風熱相合亦有風寒所中者亦有風挾濕痰者治各不同也綱目云顫振與瘛瘲相類但瘛瘲則手足牽引而或伸或屈顫振則但顫動而不伸屈也胃虛有痰用參朮以補氣茯苓半夏以行痰如實熱積滯用張子和三法薛氏曰諸風掉眩皆屬於肝治法若肝木實熱用瀉青丸肝木虛熱用六味丸肺金克肝木用瀉白散肝木虛弱用逍遙散加參朮鉤藤鉤脾血虛弱用六君子湯加芎歸鉤藤鉤胃氣虛弱用補中益氣湯加鉤藤鉤若婦人産後顫振乃氣血虧損虛火益盛而生風也切不可以風論必當大補斯無誤矣脈法脈經曰脈虛弦為驚為風癇治風癇方加味續命湯治風癇發則仆地悶動無知嚼舌吐沫背反張目上視手足搐搦或作六畜聲者此方主之麻黃防風龍齒各一錢防己附子炮石膏桂枝各一錢陳皮去白紫蘇各五分竹瀝合一生薑汁十匙生苄汁半合苄音戶地黃也上水煎服防風通聖散治風熱作癇防風川芎當歸芍藥大黃芒硝連翹薄荷麻黃不去節各五錢桔梗黃芩石膏各一兩白朮山梔子荊芥穗各二錢半滑石三兩甘草一兩上為粗末每服一兩加生薑煎服日再服追風丹治風癇及破傷風暗風川芎半夏湯泡七次桔梗附子炮去皮臍薄荷葉川烏白附子各二兩細辛魚鰾人參硃砂另研各六錢麝香另研四錢南星一錢白花蛇酒浸去皮骨一兩蜈蚣金頭赤足四條炙黃大蠍尾去鉤二錢生用上為末生薑汁和劑為錠每服一錠溫酒化下以汗出為度追風祛痰丸治諸風癇喑風防風天麻殭蠶白附子牙皂各一兩全蠍木香白礬各五錢半夏曲六兩南星三兩用白礬皂角水各浸一半過宿加虎睛一對微炒尤妙上為末薑汁糊丸如桐子大硃砂七錢半為衣每服七八十丸食遠臨臥薄荷湯下或薑湯下鬱金丹治癇疾川芎二兩防風鬱金豬牙皂角明礬各一兩蜈蚣黃腳赤腳各一條上為細末蒸餅為丸如桐子大空心茶清下十五丸烏頭丸治五風癇病川烏草烏天仙子五靈脂各二兩黑豆一升中風加附子半兩上為細末滴水和丸如桐子大每服五七丸溫水下珠子辰砂丹治風癇久不愈者薯蕷人參遠志防風紫石英茯神虎骨虎睛龍腦五味子石菖蒲丹參細辛各二錢半珠子末四錢上為細末麵糊丸如桐子大用硃砂二錢研細為衣每服三十五丸煎金銀花湯下日進三服忌魚肉濕面動風之物五癇丸治癲癇發作不問新久並宜服之全蠍去毒炒二錢皂角四兩槌碎水半升將汁與白礬一同熬干半夏湯泡七次二兩南星炮白礬烏蛇酒浸去骨焙乾白殭蠶炒去絲各一兩白附子炮半兩蜈蚣半條去頭足雄黃一錢半另研硃砂二錢半另研麝香三錢另研上為末薑汁煮麵糊丸如桐子大每服三十丸薑湯下驚氣丸治心受風邪涎潮昏塞牙關緊閉醒則精神若癡及驚憂積氣並治紫蘇橘紅各二兩附子去皮臍天麻白殭蠶炒麻黃去根節南星薑汁浸宿白花蛇酒浸炙熱去皮骨各半兩南木香一兩硃砂研一錢半乾蠍去針微炒一錢上為末入腦麝各少許研極勻煉蜜杵丸如龍眼大每服一丸用金錢薄荷湯化下或溫酒下蔭按此劫劑也不得已而用之猶中風證風火陽邪而用烏附肥白多痰人猶可黑瘦多火人斷不可用犀角丸治風癲癇發作有時揚手擲足口吐痰涎不省人事暗倒屈伸犀角末半兩赤石脂三兩朴硝二兩白殭蠶薄荷葉各一兩上為末麵糊丸如桐子大每服二十丸至三十丸溫水下日三服不拘時如覺痰多即減數忌油膩炙煿斷癇丹治癇既愈而後復作黃耆鉤藤細辛甘草各五錢蛇退三寸蟬退四枚牛黃一字上為末棗肉丸如桐子大小兒麻子大每二十丸人參煎湯下隨人大小加減三癇丸治小兒一百二十種驚癇荊芥穗二兩白礬一兩半生半枯上為末麵糊丸如黍米大硃砂為衣每二十丸薑湯下豬心丸治風疾癲癇及婦人心風血迷神效甘遂堅實不蛀者一錢上為末用雄豬心一個取管頭血三條和甘遂末將心劈作兩瓣入前甘遂在內用線縛定外以濕紙荷葉包裹慢火煨熟不可過度取出甘遂入硃砂五分同研分作四丸每服一丸用煨豬心煎湯化下後三丸別用豬心煎湯下重者只依本方輕者加蘇合香丸一粒過半日不動又進一服如大便已下惡物即止後劑急與補脾助胃如換硃砂一錢甘遂五分酒下可以吐利痰涎加味導痰湯治痰迷心竅驚癇南星薑湯泡半夏薑湯泡各二錢枳實麩炒黃芩橘紅茯苓各一錢天麻全蠍黃連各七分甘草四分上銼水煎加竹瀝二匙薑汁半酒盞食遠服星香散治痰癇南星薑湯泡八錢木香一錢全蠍去頭腳二錢上為細末每服四錢用薑湯調服壽星丸治心膽被驚神不守舍痰迷心竅健忘妄見南星一斤先焙地坑通紅赤火以酒五碗傾入候滲盡入南星於內以盆蓋之勿令泄氣次日取出為末琥珀另研硃砂另研各一兩上和勻以豬心血和薑汁糊丸如桐子大每服三十丸人參菖蒲煎湯下五生丸治癇有痰及陰脈弦細而緩南星半夏川烏白附子大豆生用各一兩上為末薑汁打糊丸如桐子大每服三丸至五丸淡薑湯下清心滾痰丸治癲癇驚狂一切怪證神效大黃酒蒸黃芩各四兩青礞石硝石犀角皂角硃砂各五錢沉香二錢半麝香五分上為細末水丸桐子大硃砂為衣每服七十丸溫水下硃砂滾痰丸治五癇等證硃砂白礬生用赤石脂硝石上為細末研蒜膏為丸如緑豆大每服三十丸食後荊芥湯下元戎二白丸治痰涎為患以致癲癇狂妄驚悸等證白礬一兩輕粉一字或半錢量虛實加減上用生蒸餅劑裹蒸熟去皮可丸入輕粉丸如桐子大每服二三十丸生薑湯下小兒黍米大碧霞丹治痰涎壅塞牙關緊急目睛上視癲癇狂妄等證石緑半兩研九度飛附子尖烏頭尖蠍梢各二十個上為末麵糊丸如雞頭大每服一丸薄荷湯下更以溫水半合飲之須臾吐出痰涎後隨證以他藥治之口噤者擀開灌之控涎丸治諸癇久不愈者頑涎結聚變生諸證並皆治之全蠍去毒七枚鐵粉三錢另研半夏殭蠶生薑汁浸川烏生用各五錢甘遂二錢半麵裹煨上為細末薑汁打糊丸如緑豆大硃砂為衣每服十五丸食後生薑湯下忌甘草引神歸舍丹治心氣不足並治心風南星三兩生用附子七錢炮去皮臍硃砂一兩上為末用豬心血並麵糊為丸如桐子大每服五十丸萱草根煎湯下子午時各一服治驚癇方歸神丹治癲癇諸疾驚悸神不守舍硃砂顆塊二兩豬心內酒蒸羅參當歸白茯苓酸棗仁各二兩遠志薑製琥珀龍齒各一兩金箔銀箔各二十片上為細末酒糊丸如桐子大每服二三十丸麥門冬湯下炒酸棗仁亦可安神丹清熱養氣血不時潮作者可服天麻人參陳皮白朮歸身茯神荊芥殭蠶炒獨活遠志去心麥門冬去心犀角酸棗仁炒辰砂另研生地酒炒黃連各五錢半夏南星石膏各一兩甘草炙川芎白附子鬱金牛黃珍珠各三錢金箔三十片上為末酒糊丸如桐子大每服五十丸白湯下龍腦安神丸治男女五般癲癇無問遠近發作無時茯神去木三兩人參地骨皮甘草麥門冬去心桑白皮各二兩烏犀角一兩硃砂二兩龍腦麝香牛黃各三錢馬牙硝二錢金箔三十五片上為細末煉蜜丸如彈子大金箔為衣每服一丸不拘時用溫水化下小兒半丸夏日涼水化服參朱丸治風癇大有神效人參蛤粉硃砂各等分上為細末豬心血為丸如桐子大每服三十丸金銀煎湯下食遠服一云金銀薄荷湯下鎮心丹一名神應丹治諸癇辰砂好者不拘多少上研細以豬心血和勻以蒸餅裹劑蒸熟取出為丸如梧桐子大每服一丸食後臨臥煎人參湯下活虎丹治年久驚癇顛狂此藥能補心神氣血不足心安則病自瘥矣硃砂片腦麝香各少許上三味研勻取蠍虎一個剪去四足爪連血搗爛和藥先用古礞石散控下痰涎次用薄荷煎湯調前藥作一丸化下一方用硃砂末入瓶內捉蠍虎於內養月餘其身赤色取出陰乾為末每一二分酒調服兼治小兒撮口蝙蝠散治癇用大蝙蝠一個以硃砂三錢填入腹內以新瓦盛火炙令酥為度候冷為細末每一個分作四服空心白湯下氣弱及年幼者分作五服錢氏五色丸治諸癇硃砂半兩雄黃熬珍珠另研各一兩水銀二錢鉛三兩同水銀熬上和勻研極細麵糊丸如麻子大每服三四丸前金銀薄荷湯下虎睛丸治癇疾發作涎潮搐搦精神恍惚時作譫語犀角鎊屑大黃遠志去心各一兩梔子仁半兩虎睛一對微炒上為末煉蜜丸如緑豆大每服二十丸食後溫酒下礬丹丸治五癲百癇無問陰陽冷熱虢丹晉礬各一兩上用磚鑿一窠可容二兩許先安丹在下次安礬在上以炭五斤熾令炭盡取出細研以不經水豬心血為丸如緑豆大每服十丸至二十丸橘皮湯下利驚丸治驚癇氣實者青黛輕粉各一錢牽牛末五錢天竺黃二錢上為細末煉蜜丸如黍米大每服一錢得利止後服補胃燥痰湯治陰癇服涼藥太過損傷脾胃白朮二錢蒼朮米泔浸炒陳皮半夏薑湯泡南星薑湯泡茯苓各一錢半木香一錢藿香七分甘草四分甚者加附子五分童便制上加生薑五片水煎食前服治瘛瘲方人參益氣湯治熱傷元氣四肢困倦手指麻木時時瘛瘲黃耆二錢人參一錢二分白芍七分五味子三十粒柴胡六分升麻生甘草炙甘草各五分上㕮咀作一服水煎熱服獨活湯治風虛昏憒不自覺知手足瘛瘲或為寒熱血虛不能服發汗藥及中風自汗尤宜服之獨活羌活人參防風當歸細辛茯神遠志半夏桂心白薇菖蒲川芎各半兩甘草二錢半上銼每服一兩加生薑五片水煎食後溫服續命煮散治風氣留滯心中昏憒四肢無力口眼瞤動或時搐搦或渴或自汗防風獨活當歸人參細辛葛根芍藥川芎熟地砂仁炒遠志荊芥半夏甘草各半兩官桂七錢半上銼每服一兩加生薑三片水煎通口服汗多者加牡蠣粉一錢半獨活散消風化痰治瘛瘲顫振獨活防風川芎旋覆花藁本蔓荊子各一兩細辛石膏研甘草炙各半兩上為細末每服三錢加生薑三片水煎食後服胃風湯治虛風證能食麻手牙關緊急手足瘛瘲目肉蠕瞤胃中有風面腫升麻二錢白芷一錢二分葛根蒼朮當歸身蔓荊子各一錢麻黃不去節羌活藁本柴胡草豆蔻黃柏甘草炙各五分上㕮咀加生薑棗二枚水煎溫服牛黃散治心虛風筋脈攣搐神昏語澀牛黃龍腦硃砂麝香各一錢蟬脫烏蛇肉酒浸各一兩全蠍炒殭蠶炒桑螵蛸羚羊角阿膠炒天麻細辛側子炮去皮獨活去蘆防風甘菊花蔓荊子桂心犀角各半兩麻黃七錢半上為細末和勻再研每服一錢豆淋酒下薯蕷丸治虛勞不足風氣百疾頭目眩冒驚悸狂癲薯蕷二十八分當歸熟地砂仁炒神麯炒人參各十分甘草二十分白芍白朮麥冬杏仁防風黃芩各六分川芎柴胡桔梗茯苓各五分鹿角膠大豆黃卷桂心各七分乾薑白蘞各三分大棗一百枚為膏上為末棗膏和煉蜜丸如彈子大每服一丸空腹酒下日三服續斷丸治肝勞虛寒脅痛脹滿眼昏不食攣縮瘛瘲續斷酒浸川芎當歸酒浸半夏薑湯泡橘紅乾薑炮各一兩桂心甘草各半兩上為細末蜜丸如桐子大每服百丸白滾湯下羚羊角散治風濕血燥手足瘛瘲羚羊角鎊獨活酸棗仁炒五加皮防風薏苡仁炒當歸酒浸川芎茯神去木杏仁去皮尖各五分木香甘草各二分鉤藤鉤山梔各五分上銼加生薑水煎服加味逍遙散治肝火亡血手足瘛瘲及血虛有熱遍身瘙癢當歸芍藥酒炒白朮茯苓甘草炙柴胡各一錢牡丹皮山梔子炒鉤藤鉤各五分上㕮咀作一服加生薑三片薄荷少許水煎食遠或臨臥服治顫振方三因獨活散治氣虛感風或驚恐相乘肝膽受邪使上氣不守正位致頭招搖手足顫掉漸成目昏獨活地骨皮細辛川芎甘菊花防風甘草炙等分上銼每服三錢水煎去渣入竹瀝少許再煎一二沸食後溫服日二服本事星附散治中風無言而手足軃曳軃音妥垂下也脈虛浮而數天南星薑汁浸透半夏薑汁浸透黑附子白附子炮川烏炮白殭蠶炒沒藥人參白茯苓各等分上為粗末每服二錢酒水各一盞同煎至八分熱進三二服汗出即瘥茯苓丸治手臂抽牽或戰掉不能舉物服此藥立愈又治臂痛如神茯苓半夏薑製二兩枳殼麩炒半兩風化硝一兩上為末薑汁糊丸如桐子大每服二十丸食後薑湯下加味補中益氣湯治胃氣虛弱顫振黃耆人參白朮甘草炙當歸陳皮柴胡升麻鉤藤鉤上銼水煎服參朮湯治氣虛顫掉人參白朮黃耆各二錢白茯苓炙甘草陳皮各一錢甚者加附子一錢童便制上水煎食遠服補心丸治心虛手振當歸酒洗生地黃各一兩半川芎粉甘草人參各一兩遠志去心二兩半酸棗仁炒柏子仁炒去油各三兩茯神去木七錢石菖蒲六錢硃砂另研牛膽南星各五錢麝香一錢金箔二十片琥珀三錢上為細末蒸餅糊為丸如緑豆大硃砂為衣每服七八十丸津唾咽下或薑湯送下定振丸治老人戰動皆因風氣所致及血虛而振天麻蒸熟秦艽去蘆全蠍去頭尾細辛熟地黃生地酒炒當歸川芎芍藥煨各二兩防風去蘆荊芥各七錢白朮黃耆各一兩半威靈仙酒洗五錢上為末酒糊丸如桐子大每服七八十丸食遠白湯或溫酒下本事青鹽丸治肝腎虛損腰膝無力顫振軃曳茴香三兩菟絲子四兩酒浸煮乾山藥二兩青鹽一兩上為末酒糊丸如桐子大每服五七十丸溫酒或鹽湯下常服壯筋力進飲食一婦人素患足軃曳久服此藥履地如故金牙酒療積年八風五疰舉身軃曳行步跛躄不能收持跛音播行不正也躄音闢兩足不能行也金牙碎如米粒用小絹袋盛地膚子無子用莖葉亦可一方用蛇床子熟地黃蒴藋根附子防風細辛莽草各四兩川椒四合羌活一斤一方用獨活上十味㕮咀盛以絹袋用酒四斗於磁器中泥封固勿令泄氣春夏三四宿秋冬六七宿酒成去滓日服一合常令酒氣相接不盡一劑病無不愈
