body:
  text: 卷三十三三消論東垣曰陰陽別論云二陽結謂之消脈要精微論云疸成為消中疸謂濕熱也熱積於中故變為消中也夫二陽者陽明也手陽明大腸主津液病消則目黃口乾是津不足也足陽明胃主血熱則消穀善飢血中伏火乃血不足也結者津液不足結而不潤皆燥熱為病也此因數食甘美而多肥故其氣上溢轉為消渴治之以蘭除陳氣也不可服膏粱芳草石藥其氣慓悍能助燥熱也越人云邪在六腑則陽脈不合陽脈不合則氣留之氣留之則陽脈盛矣陽脈大盛則陰氣不得營也故皮膚肌肉消削是也經云凡治消疸僕擊偏枯痿厥氣滿發逆肥貴人則膏粱之疾也岐伯曰脈實病久可治脈弦小病久不可治後分為三消高消者舌上赤裂大渴引飲經云心移熱於肺傳於膈消者是也以調胃承氣湯三黃丸治之下消者煩躁引飲耳輪焦乾小便如膏叔和云焦煩水易虧此腎消也以六味地黃丸治之總録所謂末傳能食者必發腦疽背瘡不能食者必傳中滿鼓脹皆為不治之證潔古老人分而治之能食而渴者加白虎人參湯不能食而渴者錢氏白朮散倍加葛根治之上中既平不復傳下消矣前人用藥厥有旨哉或曰未傳瘡疽者何也此火邪勝也其瘡痛甚而不潰或赤水者是也經云有形而不痛陽之類也急攻其陽無攻其陰治在下焦元氣得強者生失強者死未傳中滿者何也以寒治熱雖方士不能廢其繩墨而更其道也然臟腑有遠近心肺位近宜制小其服腎肝位遠宜制大其服皆適其所至所為故知過與不宜皆誅罰無過之地也如高消中消制之太急速過病所久而成中滿之病正謂上熱未除中寒復生者非藥之罪失其緩急之治也處方之際宜加意焉劉宗厚曰消渴小便多者蓋燥熱太甚而三焦腸胃之腠理拂鬱結滯緻密壅塞而水液不能浸潤於外以養乎百體故腸胃之外燥熱太甚雖多飲水入於腸胃之內終不能浸潤於外故渴不止而小便多水液既不能浸潤於外則陰燥竭無以自養故久而多變為聾盲瘡瘍痤痱而危殆也治此疾者宜補腎水陰寒之虛而瀉心火陽熱之實除腸胃燥熱之甚濟肌體津液之衰使道路散而不結津液生而不枯氣血利而不澀則病自己矣婁氏曰上消者經謂之膈消膈消渴而多飲是也中消者經謂之消中消中者渴而飲食俱多或不渴而獨食是也下消者經謂之腎消腎消者飲一溲二其溲如膏油即膈消消中之傳變王注謂肺臟消燥氣無所持是也蓋肺藏氣肺無病則氣能管攝津液而津液之精微者收養筋骨血脈余者為溲肺病則津液無氣管攝而精微亦隨溲下故飲一溲二而溲如膏油也筋骨血脈無津液以養之故其病漸成形瘦焦乾也然肺病本於腎虛腎虛則心寡於畏妄行凌肺而移寒與之然後肺病消故仲景治渴而小便反多用腎氣丸補腎救肺後人因名之腎消以補腎也或曰經既云肺消死不治仲景復用腎氣丸治之何也曰飲一溲二者死不治若飲一未至溲二者病尚淺猶或可治故仲景腎氣丸治飲水一斗小便亦一斗之證若小便過所飲者亦無及矣丹溪曰上消者肺也多飲水而少食大小便如常中消者胃也多飲食而小便赤黃下消者腎也小便濁淋如膏之狀又曰上焦渴是心火刑煉肺金而作渴法當降火清金宜蘭香葉白葵花白豆蔻蓽澄茄升麻黃柏引清氣升而渴止中焦渴飲食入胃傳送太急不生津液食已則飢胃中有熱宜用黃芩石膏下焦渴者肝腎二經有熱必是小便頻數宜用五味子知母黃柏玄參以養陰兼養肺降火生血為主大法黃連天花粉二味為末藕汁人乳汁生地黃汁佐以蜜薑汁為膏和二末徐徐留舌上以白湯少許送下能食者加石膏天花粉治消渴之聖藥也三消皆忌用半夏血虛亦忌用消渴苦泄瀉先用白朮白芍藥炒為末調服後卻服諸汁膏李氏曰經云二陽結謂之消渴二陽者手陽明大腸主津液足陽明胃主血津血不足發為消渴又有燥結者肺與大腸為表裡也有氣分渴者因外感傳裡或服食煎燥熱耗津液喜飲冷水當與寒涼滲劑以清利其熱熱去則陰生而渴自止矣有血分渴者因內傷勞役精神耗散胃氣不升或病後胃虛亡津或餘熱在肺口乾作渴喜飲熱湯當與甘溫酸劑以滋益其陰陰生則燥除而渴自止矣所謂消者燒也如火烹燒物也三消上中既平不復傳下上輕中重下危總皆肺被火邪熏蒸日久氣血凝滯故能食者末傳癰疽水自溢也不能食者末傳脹滿火自炎也皆危熱在上焦心肺煩燥舌赤唇紅少食引飲小便數者四物湯合生脈散加天花粉地黃汁藕汁乳汁酒客加葛根能食者白虎加人參湯不食者錢氏白朮散清心蓮子飲又膈滿者謂之膈消麥門冬飲子火留肉分變為癰腫者忍冬藤丸黃耆六一湯益元散熱蓄中焦脾胃消穀善飢不甚渴小便赤數大便硬者四物湯加知母黃柏石膏黃芩滑石以降火熱甚者調胃承氣湯三黃丸初病寒中陰勝陽郁後變為熱中者升麻葛根湯瀉黃散濕積毒者消渴痞丸虛者錢氏白朮散便閉者當歸潤燥湯泄瀉者白朮芍藥湯上中二消者蘭香飲子心火乘脾者黃連豬肚丸肝侵氣衝肌熱不食食即吐蛔者烏梅丸鐵粉丸有蟲耗其津液者單苦楝湯水停於下變為胕腫者五苓散或去桂加人參尤妙熱伏下焦腎分精竭引水自救隨即溺下小便混濁如膏淋然腿膝枯細面黑耳焦形瘦者四物湯加知母黃柏五味子元參人乳汁善調水火或補陰丸腎氣丸先天坎離丸八味丸去附子加五味子元菟丸鹿菟丸夢授天王補心丹威喜丸妙香散單繭絲湯或十全大補湯去桂倍地黃加知母黃柏上熱下冷者清心連子飲有五味過度之人真氣既盡邪氣獨留陽道興強不交精泄者謂之強中小便或油膩或赤黃或泔白或渴而且利或渴而不利或不渴而利飲食滋味入腹如湯澆雪隨小便而出落於溝中結如白脂肌膚日瘦者無治法治渴初宜養肺降心久則滋腎養脾蓋本在腎標在肺腎暖則氣上升而肺潤腎冷則氣不升而肺焦故腎氣丸為消渴良方也然心腎皆通乎脾養脾則津液自生參苓白朮散是也三消通用單文蛤為末水調服回津止渴單瓜蔞根丸消渴神藥大忌半夏燥劑抑論水包天地人身臟腑亦津液真水所包然有形者凡水也兌也坤也無形者天一所生之水氣也坎也乾也能以無形之水沃無形之火是謂能濟雜病渴多虛熱實熱者少凡渴後忌針灸令瘡口出水而死或云渴禁半夏渴不宜汗蔭按三消之證皆燥熱結聚也治上消者宜潤其肺兼清其胃治中消者宜清其胃兼滋其腎治下消者宜滋其腎兼補其肺勿專執本經而治也然消渴病宜慎者有三一飲酒二房勞三鹹食及面能慎此三者雖不服藥亦自可愈脈法脈經曰趺陽脈浮而數浮則為氣數則消穀而緊氣盛則溲數溲數則緊緊數相摶則為消渴男子消渴小便反多以致飲水一斗小便一斗腎氣丸主之心脈滑為渴心脈微小為消疸消疸脈實大病久可治懸小堅急病久不可治脈數大者生沉小者生實而堅大死細而浮短者死治上消方人參白虎湯治能食而渴者人參五錢石膏一兩知母七錢甘草四錢上每服一兩入粳米一撮水煎食後溫服東垣加黃芩杏仁宣明麥門冬飲子治心移熱於肺傳為膈消胸滿心煩津液短少燥渴引飲麥門冬去心天花粉一方作瓜蔞仁知母各一錢半五味子十五粒生地酒炒人參茯神去皮木葛根各一錢甘草五分上㕮咀入竹葉十四片水煎食遠服一方通治三消上消加藕汁人乳桔梗山梔中消加石膏黃連黃芩下消加黃柏熟地黃去葛根脾胃弱或大便瀉加白朮茯苓血虛或大便燥加當歸芍藥氣虛加黃耆白朮倍參如胃弱不能受寒涼之藥加白蔻砂仁以從其治小便不利加滑石澤瀉易老麥門冬飲子治老弱虛人大渴人參枸杞子白茯苓甘草各七錢半五味子麥門冬去心各半兩上銼每服一兩加生薑水煎服錢氏白朮散治虛熱而渴不能食者人參白朮白茯苓甘草各一兩乾葛二兩藿香一兩去土木香半兩上為末每服三錢水煎溫服如飲水多多與服之一方加北五味柴胡各半兩治消中消穀善飢清心蓮子飲治心經蘊熱作渴小便或赤澀或濁黃芩麥門冬地骨皮車前子甘草各三錢蓮子茯苓黃耆柴胡人參各三錢半上㕮咀水煎服枸杞湯治渴而利者枸杞枝葉一斤黃連瓜蔞根甘草石膏各三兩上㕮咀以水一斗煮取三升分五服日三夜二劇者多合渴即飲之乾地黃湯治消渴茯神黃耆瓜蔞根甘草麥冬去心各三兩乾地黃薑酒炒五兩上㕮咀以水八升煮取二升半去渣分三服日進一劑服十劑愈六神湯治三消渴疾黃耆瓜蔞根乾葛連粉枇杷葉甘草各等分上㕮咀每服一兩水煎空心服小便不利加茯苓地黃飲子治消渴咽乾而煩躁天門冬去心麥門冬去心黃耆蜜炙人參生乾地黃酒洗熟乾地黃澤瀉石斛去根炒枇杷葉去毛炒枳殼麩炒甘草炙各等分上㕮咀每服三錢水煎食後服甘露湯治煩渴口乾百藥煎白乾葛各三錢烏梅五味子天花粉各一錢甘草半錢上㕮咀水煎服硃砂黃連丸治心經蘊熱或因飲酒過多發為消渴硃砂二兩另研宣黃連三兩生地薑酒炒二兩上為末煉蜜丸如桐子大每服五十丸燈心棗子湯送下川黃連丸治消謁川黃連五兩天花粉麥門冬去心各二兩半上為末用生地黃汁並牛乳夾和搗丸如桐子大每服三十丸粳米湯送下玉泉丸治煩渴口乾麥門冬去心人參茯苓黃耆半生半蜜炙烏梅焙甘草各一兩瓜蔞根乾葛各一兩半上為末煉蜜丸如彈子大每服一丸溫湯嚼下火府丹治消渴生地酒洗木通黃芩甘草上為末煉蜜丸如桐子大每服二十粒木通煎湯下樓氏曰一卒病渴日飲水三斗不食者心中煩悶時已十月豫謂心中有伏熱與此藥數服每服五十丸溫水下越二日來謝云當日三服渴止又次日三服飲食如故此方本治淋用以治渴效信乎藥要變通用之和血益氣湯一名地黃飲子治口乾舌燥小便數舌上赤色此藥生津液除乾燥生肌肉柴胡炙甘草生甘草麻黃根各三分當歸梢酒洗四兩知母酒洗漢防己酒洗羌活各五分石膏六分生地黃酒洗七分黃連酒洗八分黃柏升麻各一錢杏仁桃仁各六個紅花少許上㕮咀作一服水煎溫服忌酒醋熱濕面等物黃耆六一湯治諸虛不足胸中煩悸常消渴或先渴而欲發癰疽或病癰疽而作渴並宜服之黃耆蜜炙六兩甘草炙一兩上每服三錢水煎服大黃甘草飲子治男子婦人一切消渴不能止者大黃一兩半甘草大者四兩大豆五升煮三沸淘去苦水再煮上用井水一桶將煎藥同煮三五時如稠強更添水煮豆軟為度盛於盆中放冷令病人食豆渴飲湯汁無時候食盡如渴燥止罷服藥不止依前再煮食之不過三劑其病悉愈止渴潤燥湯治消渴大便乾燥喜溫飲陰頭短縮舌上白燥唇裂口乾眼澀難開及於黑處如見浮雲升麻一錢半柴胡七分歸身黃柏知母石膏防風荊芥穗麻仁桃仁各一錢熟地黃二錢甘草梢五分杏仁六個細辛小椒各一分紅花少許上銼水煎食後熱服玉壺丸治消渴引飲無度人參瓜蔞根各等分上為末煉蜜丸如桐子大每服三四十丸麥門冬湯下浮萍丸治消渴虛熱大焦干浮萍瓜蔞根各等分上為末以人乳汁和丸如桐子大每服二十丸空心飲下日三服三年病者三日愈瓜蔞湯治消渴小便多瓜蔞根薄切炙五兩上以水五升煮取四升隨意飲瓜蔞丸瓜蔞根薄切用人乳汁拌蒸竹瀝拌曬上為末煉蜜丸如彈子大噙化或丸如緑豆大每服一百丸米飲下竹根湯竹根銼碎以水煮飲之千里漿一名水葫蘆木瓜紫蘇葉桂各一兩烏梅肉赤茯苓各二兩一方有神麯豆粉上為末煉蜜丸如彈子大噙化一丸咽下又方百藥煎烏梅肉紫蘇葉人參麥門冬甘草各等分上為細末煉蜜丸如彈子大噙化芷梅湯烏梅肉甘草各七錢半百藥煎一兩白芷半兩白檀三錢上為細末湯點服文蛤散治渴欲飲水不止者文蛤一味為末以沸湯和服方寸匕陳無擇以文蛤為五味子神效散治渴疾飲水不止白浮石蛤粉蟬殼各等分上為末鯽魚膽七個調三錢不拘時服又方治消渴白浮石舶上青苔各等分麝香少許上為末每服二錢溫湯下治中消方調胃承氣湯治中消渴而飲食多大黃芒硝甘草各等分上銼每服臨期斟酌多少先煮大黃甘草二味熟去渣下芒硝再煮二三沸服之以利為度未利再服三黃丸治消渴不生肌肉而能食春三月黃芩四兩大黃二兩黃連四兩夏三月黃芩六兩大黃一兩黃連一兩秋三月黃芩六兩大黃二兩黃連三兩冬三月黃芩三兩大黃五兩黃連三兩上三味隨時加減搗為細末煉蜜為丸如大豆大每服五丸日三服不去加七丸服一月病愈順利散治中熱在胃而能食小便赤黃以此微利至不欲食為效不可多利厚朴枳實各一兩大黃煨四兩上每服五錢水煎食遠服黃連豬肚丸治消渴強中亦能清心補養豬肚一個雄豬者黃連瓜蔞根各四兩麥門冬去心知母各二兩一方有粱米茯神各四兩上為細末納豬肚中線縫置甑中蒸極爛乘熱於石臼中搗為丸如硬加少煉蜜丸如桐子大每服一百丸食後米飲下清涼飲子治消中能食而瘦口舌乾自汗大便結燥小便頻數升麻四分防風生甘草漢防己生地酒洗五分當歸身柴胡羌活炙甘草黃耆酒知母酒黃芩各一錢龍膽草酒洗石膏黃柏各一錢半紅花少許桃仁五個杏仁十個上㕮咀作一服水二盞酒一匙煎至一盞稍熱食遠服人參白朮湯治胃膈疸熱煩滿飢不欲食疸成為消中善食而瘦燥熱鬱甚而成消渴多飲水而小便數兼療一切陰虛陽實風熱燥郁頭目昏眩中風偏枯酒過積毒腸胃燥澀並傷寒雜病産後煩渴氣液不得宣通人參白朮當歸芍藥大黃梔子荊芥穗薄荷桔梗知母澤瀉各五錢茯苓連翹瓜蔞根乾葛各一兩甘草三兩藿香葉青木香官桂各二錢半石膏四兩寒水石二兩白滑石半斤上為細末每服抄五錢水一茶盞入芒硝半兩生薑三片煎至半盞絞汁入蜜少許溫服漸加至十錢得臟腑流利取效如常服以意加減如自利者去大黃芒硝參蒲丸治食㑊胃中結熱消穀善食不生肌肉或云大腸移熱於胃善食而瘦謂之食㑊胃移熱於膽亦曰食㑊人參赤茯苓菖蒲遠志地骨皮牛膝酒洗各一兩上為末煉蜜丸如桐子大每服二十丸米飲下蘭香飲子一名甘露膏治消渴飲水極多善食而瘦自汗大便祕結小便頻數石膏三錢知母生甘草防風各四錢炙甘草人參蘭香葉白豆蔻連翹桔梗升麻各五分半夏二分上為末蒸餅為丸或捏成餅曬乾為末淡薑湯調下鐵粉丸治臟腑枯燥口乾引飲小便如脂鐵粉水飛雞肶胵炙焦黃連各三兩牡蠣二兩上為末蜜調成劑以酥塗杵熟丸如桐子大每三十丸加至四十丸粟米飲下苦楝湯治渴有蟲者苦楝根去皮焙乾上入麝香少許水煎空心服雖困頓不妨自便下蟲狀如蛔蟲其色真紅而渴頓止消渴痞丸治中消或挾諸血腸風心脅脹滿嘔吐痿弱濕熱積毒等證黃連青黛乾葛各一兩黃芩大黃黃柏山梔子薄荷藿香厚朴茴香各五錢木香辣桂各二錢半牽牛二兩自利去大黃牽牛上為末水丸如小豆大小兒麻仁大每服十丸溫水下治下消方加味四物湯丹溪云三消多屬血虛不生津液俱宜四物湯為主隨上中下加他藥治之當歸川芎芍藥熟地黃各一錢上銼一服水煎服上消加人參五味子麥門冬天花粉煎入生藕汁生地黃汁人乳飲酒人加葛花汁中消加知母石膏滑石寒水石以降胃火下消加黃柏知母熟地黃五味子之類以滋腎水又間飲燥絲湯為上策宣補丸一名茯神丸治腎消渴小便數者茯神黃耆人參麥門冬甘草黃連知母瓜蔞根各三兩菟絲子二合肉蓯蓉石膏乾地黃各六兩上為末以牛膽三合和蜜丸如桐子大每服三十丸煎茆根湯送下日二服漸加至五十丸六味地黃丸治下消乾山藥山茱萸各四兩牡丹皮澤瀉白茯苓各三兩熟地黃八兩上為末煉蜜丸如桐子大每服五十丸空心滾湯下加減八味丸治心腎不交消渴引飲山藥山茱萸牡丹皮澤瀉白茯苓熟地黃肉桂五味子上為末煉蜜丸服加減腎氣丸治腎氣不足心火上炎口舌乾燥多渴引飲茱萸肉白茯苓牡丹皮熟地黃酒蒸五味子澤瀉鹿角鎊山藥炒各一兩官桂沉香不見火各半兩弱甚者加附子半兩兼進黃耆湯上為末煉蜜丸如桐子大每服七十丸鹽湯米飲任下千金地黃丸治腎渴黃連四兩為末生地黃半斤研取汁連渣拌黃連末和勻曬乾上為細末煉蜜丸如桐子大食後麥冬湯下五六十丸鹿菟丸治飲酒積熱熏蒸五臟津血枯燥小便頻多肌肉消爍專嗜冷物寒漿鹿茸一兩菟絲子山藥各二兩上為末煉蜜丸桐子大每服三十丸米飲鹽湯或人參煎湯任下玄菟丹治腎水枯竭津液不生消渴諸證菟絲子酒浸搗爛焙乾為末十兩白茯苓去皮二兩干連肉酒浸三兩五味子酒浸焙半兩上為末別研山藥末六兩將浸藥余酒更添煮糊和藥搗千杵丸如桐子大每服五十丸空心米湯下夢遺白濁服之亦好鹿茸丸治失志傷腎腎虛消渴小便無度鹿茸去毛炙七錢半雞肶胵麩炒七錢半麥門冬去心二兩熟地黃黃耆五味子肉蓯蓉酒浸山茱萸破故紙炒牛膝酒浸人參各七錢半白茯苓地骨皮玄參各五錢上為末煉蜜丸如桐子大每服三十丸米湯下一方治腎消小便不禁日多至一二斗或如血色麥門冬乾地黃各八錢乾薑四兩蒺藜子續斷桂心各二兩甘草一兩上㕮咀以水一斗煮取二升五合分三服一方治消渴不止下元虛者牛膝五兩銼碎為末生地黃取汁五升上和一處晝曝夜浸以汁盡為度煉丸桐子大每服三十丸空心溫酒下麥門冬湯治消渴日夜飲水無度飲下即溲麥門冬去心黃連冬瓜各二兩上為粗末每服五錢水煎服若冬瓜無干者用新冬瓜肉三斤去穰分作十二片為十二服每服用瓜一片劈破水煎日三服冬瓜飲子治消渴能食而飲水多小便如脂麩片日夜無度冬瓜一枚黃連十兩為細末上先以冬瓜破開去穰摻黃連末在內卻用頂蓋定於熱灰中煨熟去皮切細爛研絞汁每服一盞至二盞日三夜一蔭按丹溪云冬瓜性走而急久病與陰虛者忌之黃連丸治消渴飲水無度小便頻數黃連淨半斤用無灰好酒浸一宿次日蒸一伏時取出曬乾用上為細末滴水丸如桐子大白湯下五六十丸人參散治腎消善飲而不食小便頻數白濁如膏人參一分白朮澤瀉瓜蔞根桔梗梔子連翹各二分葛根黃芩大黃薄荷白茯苓各五分甘草七分石膏一錢滑石寒水石各一錢半砂仁三分上細切作一服水煎入蜜少許再煎二三沸去渣食前服鹿角散治消中日夜尿七八升者用鹿角炙令黃焦為末以酒服五分七日三次漸加至方寸匕一方治渴而小便數貝母六分一作知母茯苓瓜蔞根各四分鉛丹雞肶胵中黃皮十四枚上為末飲服方寸匕日三次瘥後常服尤佳長服則去鉛丹以蜜丸之用麥冬飲下繅絲湯治腎消白濁及上中二消飢渴不生肌肉其效如神蓋此屬火有陰之用能瀉膀胱中相火引飲水上潮於口而不渴也用原蠶即再養晚蠶也取繅絲湯飲之如無繅湯以繭殼絲綿煮湯代之忌食鹽物神白散即六一散治真陰素虛損多服金石等藥或嗜炙煿咸物遂成消渴滑石六兩甘草一兩上為細末每服三錢溫水調服如大渴欲飲冷水者新汲水尤妙烏粉丸治消渴無力可治者天花粉大烏頭炒各等分上為細末蒸餅丸如桐子大每服百丸黑豆湯下葛根丸治消渴消腎日飲碩水者此反佐法也葛根三兩瓜蔞根黃丹各二兩附子炮去皮臍一兩上為末煉蜜丸如桐子大每服十丸日進三服春夏去附子胡粉散治大渴百方不痊者亦治腎消胡粉黃丹澤瀉石膏赤石脂白石脂各半兩瓜蔞根二兩半甘草一兩上㕮咀水煎日二服如腹痛減之為丸服尤妙每服十丸多則腹痛子和方治飲水百杯尚猶未足小便如砂或如杏色服此方三五日小便大出毒注下十日除根子和自云此重劑也試有驗水銀四錢錫二錢同水銀炒成珠子牡蠣密陀僧知母紫菀苦參貝母各一兩黃丹半兩瓜蔞根半斤上為細末男子用不生兒的母豬肚婦人用豶豬肚一個納藥於內以麻線縫之用新瓦二片繩緊一二遭別用米一升瓜蔞根末半斤於新水內煮熟取出放冷不用米及瓜蔞只將豬肚並肚中藥末搗爛和為丸如硬加蜜如桐子大每服三四十丸煎水飲下三因方無貝母治消渴愈後諸病方辛潤緩肌湯一名清神補氣湯治消渴證才愈止有口乾腹不能努此藥主之生地酒洗細辛各一分熟地黃三分石膏四分黃柏酒炒黃連酒炒生甘草知母各五分柴胡七分當歸身荊芥穗桃仁防風各一錢升麻一錢半紅花少許杏仁六個花椒兩個上㕮咀作一服水煎食遠稍熱服瓊玉膏治三消最好愈後亦可常服方見虛損門忍冬丸治消渴既愈之後預防發癰疽之患用忍冬草不拘多少根莖花葉皆可用置瓶罐內用無灰好酒浸以粳火煨一宿取出曬乾入甘草少許研為細末以所浸酒打麵糊為丸如桐子大每服一百丸溫酒米飲任下不拘時五豆湯解酒毒止消渴能發小兒痘疹不出並解發渴之後成瘡痍者黑豆黃豆緑豆青豆赤小豆各五升乾葛一斤甘草一斤貫衆半斤上前藥俱不銼用水五斗五升臘八日用大鍋熬至熟濾出豆汁另以瓷甕盛箬葉紙重封春夏月間酒後渴隨意飲大人渴後或成瘡瘍小兒痘瘡不出皆可飲最效
