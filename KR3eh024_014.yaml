body:
  text: 卷十四噫氣論噫為火土氣鬱準繩云內經所謂噫即今所謂噯氣也宣明五氣論曰心為噫痹論曰心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫至真要大論曰太陽司天少陰之復皆為噦噫刺禁論刺中心一日死其動為噫陰陽別論二陽一陰發病主驚駭背痛善噫善欠名曰風厥脈解太陰所謂上走心為噫者陰盛而上走於陽明陽明絡屬心故曰上走心為噫也此乃噫從心出者也至真要大論曰厥陰在泉腹脹善噫得後與氣則快然如衰玉版論太陰終者善噫靈樞云足太陰是動病腹脹善噫又云寒氣客於胃厥逆從下上散復出於胃故為噫仲景謂上焦受中焦氣未和不能消是故能噫衛出上焦又云上焦不歸者噫而酢酸不歸不至也上焦之氣不至其部則物不能傳化故噫而吞酸由是觀之噫者是火土之氣鬱而不得發故噫而出王注解心為噫之義象火炎上煙隨焰出如痰閉膈間中氣不得伸而噯者亦土氣內郁也論噫氣雜治法仲景云痞而噫旋覆代赭湯主之本事方心下蓄積痞悶或作痛多噫敗卵氣枳殼散主之丹溪云胃中有實火膈上有稠痰故成噯氣用二陳湯加香附梔子仁黃連蘇子前胡青黛瓜蔞或丸或湯服之又云噫氣吞酸此係食鬱有熱火氣衝上用黃芩為君南星半夏陳皮為佐熱多加青黛李氏曰氣盛實噯食罷噯轉腐氣甚則物亦噯轉多傷食濕熱所致二陳湯加蒼朮神麯麥芽薑炒黃連或保和丸不因飲食常噯者虛也蓋胃有濁氣膈有濕痰俱能發噯六君子湯加沉香為君厚朴蘇子為臣吳茱萸為使久者勻氣丸或蘇合香丸甚者靈砂以鎮墜之葉氏曰亦有食才下咽未及運化胃氣抑而作噯一兩聲者此氣升也不須治脈法寸口脈弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於膈上寸脈緊寒之實也寒在上焦胸中必滿而噫趺陽脈微而澀微無胃氣澀即傷脾寒在膈而反下之寒積不消胃微脾傷穀氣不行食已自噫寒在胸膈上虛下實穀氣不通為閉塞之病趺陽脈微澀及寸脈緊而噫者皆屬寒太陰終者腹脹閉噫氣嘔逆治方加味二陳湯隨證加用半夏陳皮白茯苓甘草炙各一錢上加生薑煎服痰加南星香附火加軟石膏梔子宿食加山楂枳實蒼朮薑炒黃連星半湯治噫氣胃中有火有痰南星制半夏軟石膏香附各等分上銼加生薑水煎服或薑汁浸蒸餅作丸亦可一方加炒梔子或單用石膏醋糊丸服枳殼散治心下蓄積痞悶或作痛多噫敗卵氣枳殼白朮各半兩香附一兩檳榔二錢上為細末每服二錢米飲調下日三服不拘時加味六君子湯治胃有濁氣膈有濕痰不因飲食時常虛噯人參白朮茯苓甘草半夏陳皮沉香厚朴紫蘇子吳茱萸上銼水煎服勻氣丸治氣虛濁升多噯草豆蔻橘皮沉香人參各五錢益智仁檀香大腹子各一兩上為末飯丸如桐子大每服八十丸淡薑湯下加減理中湯治胃寒噯氣白朮陳皮乾薑炮甘草炙木香茴香益智香附厚朴上銼加生薑煎服破郁丹治婦人噯氣胸緊連十餘聲不盡噯出氣心頭略寬不噯即緊香附米醋煮梔子仁炒各四兩黃連薑汁炒二兩枳實麩炒檳榔青皮去穰莪朮瓜蔞仁蘇子各一兩上為末水丸如桐子大每服三十丸食後滾水送下丹溪方治宣州人與前方證皆除氣上築心膈噫氣稍寬脈之右關弱短左關左尺長洪大而數此肝有熱宜瀉肝補脾白朮二錢半青皮一錢木通五分甘草二分上銼水煎下保和丸十五粒抑青丸二十粒
