body:
  text: 卷七十六疝氣論虞氏論曰經曰腎脈大急沉肝脈大急沉皆為疝疝者寒氣結聚所為脈急者挾肝邪脈沉者在陰分沉急而大陰邪盛也肝腎之脈絡小腹結於陰器寒邪居之故當病疝心脈搏滑急為心疝肺脈沉搏為肺疝病疝而心脈搏滑急者寒挾肝邪乘心也肺脈沉搏者寒挾肝邪乘肺也三陽急為瘕三陰急為疝太陽受寒血凝為瘕太陰受寒氣聚為疝凡脈急者皆邪盛也又曰任脈為病男子內結七疝任脈自前陰上毛際行腹裡故為病如此夫所謂七疝者寒水筋血氣狐㿉者是也子和曰寒疝其狀囊冷結硬如石陰莖不舉或控睪丸而痛得於坐臥濕地或寒月涉水或冒雨雪或坐臥磚石或風冷處使內過勞宜以溫劑下之久而無子水疝其狀腎囊腫痛陰汗時出或囊腫而狀如水晶或囊癢而搔出黃水或少腹中按之作水聲得於飲水醉酒使內過勞汗出而遇風寒濕之氣聚於囊中故水多令人為卒疝宜以逐水之劑下之筋疝其狀陰莖腫脹或潰或膿或痛而裡急筋縮或莖中作痛痛極則癢或挺縱不收或白物如精隨溲而下得於房室勞傷及邪術所使宜以降心之劑下之血疝其狀如黃瓜在少腹兩旁橫骨兩端約中俗名便癰得之於重感春夏大燠勞動使內氣血流溢滲入脬囊留而不去結成癰腫腫少血多宜以和血之劑下之氣疝其狀上連腎區下及陰囊或因號哭忿怒則氣鬱之而脹號哭怒罷則氣散者是也有一治法以針出氣而愈者然針有得失宜以散氣之藥下之或小兒有此名曰偏墜得於父已年老或年少多病陰痿精怯強力入房因而有子胎中病也此疝不治惟築賓一穴內踝上五寸腨分肉中灸五壯狐疝其狀如瓦臥則入小腹行立則出小腹入囊中狐畫則出穴而溺夜則入穴而不溺此疝出入往來上下正與狐相類也亦與氣疝大同小異宜以逐氣流濕之劑下之㿉疝其狀陰囊腫縋如升如斗不癢不痛者是也得之地氣卑濕所生故江淮之間湫塘之處多有之宜以去濕之劑下之女子陰戶突出雖亦此類乃熱則不禁固也不可便認為虛寒而澀之燥之補之本名曰瘕宜以苦下之以苦堅之蔭按子和論七疝病源至為詳悉但其處方一以攻下之法為主治不能使人無疑耳既曰多由房勞致虛而作豈可一例施以攻下之法乎大抵七疝為病若非房勞所致即是遠行辛苦涉水履冰熱血得寒而凝滯於小腸膀胱之分或濕熱乘虛而流入於足厥陰之經古方一以為寒而純用烏附等藥為治丹溪先生獨斷為濕熱此發古人之所未發者也夫熱鬱於中而寒束於外宜其有非常之痛故治法宜驅逐本經之濕熱消導下焦之痰血而以寒因熱用之法立方處治即邪易伏而病易退也其攻下之法愚未敢試而行之以俟識者再詳焉況葉氏曰氣因寒聚為疝其名有七寒水筋血氣狐㿉是也初發熱或頭疼身熱或憎寒壯熱重者逆上攻心疼痛嘔吐手足冷脈沉急必先以祛散寒邪兼佐疏肝消疝之劑使邪氣伏而病易退也若按以子和所立攻下之法恐病未除而先虛元氣其不傾者鮮矣學者宜致思焉痛有定處即有形之積非濕熱死血而何若無形之氣作痛則走注滿腹而流散遍身矣丹溪曰疝氣睪丸連小腹急痛也有痛在睪丸者有痛在五樞穴邊者皆足厥陰之經也或無形無聲或有形如瓜有聲如蛙自素問而下皆以為寒蓋寒主收引經絡得寒則引而不行所以作痛然亦有踢冰涉水終身不病此者無熱在內故也大抵此證始於濕熱在經鬱而至久又得寒氣外束不得疏散所以作痛若只作寒論恐為未備其初致濕熱之故蓋太勞則火起於筋醉飽則火起於胃房勞則火起於腎大怒則火起於肝火鬱之久濕氣便盛濁液凝聚併入血隧流於厥陰肝屬木性急速火性又暴烈為寒所束宜其痛甚而暴也有用川烏頭梔子等分作湯服之其效亦敏後因此方隨形證加減與之無不驗蓋川烏頭治外束之寒梔子仁治內郁之熱也又有挾虛而發者其脈不甚沉緊而豁大無力者是也其痛亦輕惟覺重墜牽引耳當以參朮為君疏導藥佐之蓋疏導藥即桃仁山楂枳實梔仁茱萸川楝元胡索丁香木香之類宜灸大敦穴在足大脂爪甲後一韭葉聚毛間食積與瘀血成痛者梔子桃仁山楂枳實茱萸為末川流水入薑汁作湯調服下部㿉氣不痛之方細思非痛斷房事與厚味不可用藥唯促其壽若蒼朮神麯白芷山楂川芎枳實半夏皆要藥人視其藥皆鄙賤之物已啟慢心又不能斷欲以愛護其根本非惟無益而反被其害者多矣且其藥宜隨時月寒熱更按君臣佐使加減大抵㿉疝屬濕多蒼朮神麯白芷山楂川芎枳實半夏南星有熱加山梔一兩堅硬加朴硝半兩秋冬加吳茱萸二錢半神麯糊丸葉氏曰疝病古方有以為小腸氣者有以為膀胱氣者惟子和丹溪專主肝經而言其理大同蓋小腸氣小腸之病膀胱氣膀胱之病疝氣肝經之病三者自是不一昔人以小腸膀胱氣為疝者誤也殊不知足厥陰之經環陰器抵少腹人之病此者其發睪丸脹痛而連及小腹則疝氣之繫於肝經也可知矣且小腸氣俗謂之橫弦堅弦繞臍走注少腹攻刺而膀胱氣則在毛際之上小腹之分作痛與疝氣之有形如瓜有聲如蛙或上於腹或下於囊者不同也但小腸膀胱因經絡並於厥陰之經所以受病連於肝則亦下控引睪丸為痛然只是二經之病不可以為疝也李氏曰疝氣本屬濕熱標則屬寒蓋緣醉飽勞役房欲忿怒動火火鬱久則生濕津液凝為痰瘀流入肝經肝性急速又暴為外寒所束是以痛甚有專言寒者論其標耳大要熱者遇熱則發二便赤澀小便肛門俱熱外腎累垂玉莖挺急寒者遇寒則發二便皆利脅腹清冷外腎緊縮又有冷熱不調者外腎小腹或冷或熱二便或閉或利局方多以為小腸氣膀胱氣腎氣者亦自其標末而言其實主於肝也蓋肝環陰器而上入小腸又肝腸所屬於下與衝任督相附腎與膀胱為臟腑其氣相通運為外腎繫於睪丸此三經相連相會然肝主經睪丸雖名外腎非厥陰環而引之與玉莖無由伸縮在女子則為纂戶經云小腹控睪引腰脊上衝心邪在小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃熏肝散於肓結於臍控引也睪陰丸也小腸連於小腹若其邪盛則厥逆自下上衝心肺熏於肝胃引於腰脊下及肓臍睪系之間也肓者凡腔腹肉理之間上下空隙之處皆謂之肓及論三臟脈皆以滑為疝每云風疝者非外風也乃肝木陽臟氣動之風論三陽疝發寒熱言膀胱非受病之處必傳於肝而後為疝又明堂穴法治疝皆厥陰部分可見疝主肝經小腸多氣少血之經忿怒憂思起於肝而心氣因之鬱結心與小腸為表裡膜外氣聚無出攻及膀胱腎納氣房勞過度敗精蓄為邪水氣滯入里包絡真氣膀胱氣脹然皆肝所主也所以發病不特外腎小腹作痛或攻刺腰脅或遊走胸背或搶心痛或繞臍痛男子遺精女子不月令人羸瘦少氣灑淅寒熱食少嘔吐吞酸久則遂成暴吐甚則角弓反張咬牙戰汗冷汗流不止者難治疝有睪丸痛者有連小腹痛者感冷觸怒則塊氣逆上囊根心和氣平則塊物自循膋系歸入囊中㿉疝有四種腸㿉即小腸氣吊外腎偏墜腫癢卵㿉玉莖腫硬引臍絞痛甚則陰縮肢冷囊上生瘡或癰二證出水不止者死氣㿉素有濕熱因怒激起相火昏眩手搐如狂面黑睪丸能左右相過氣疝飲萸連梔石丸寒冷者五積散蟠蔥散當歸四逆湯木香勻氣散青木香丸茱萸內消丸黑錫丸水㿉外腎腫大如斗如升不痛不癢得於卑濕五苓散加小茴韭汁丸單竹葉湯熱者三白散橘核散久者橘核丸㿉疝之中又有木腎者有偏墜者木腎堅硬頑痹不痛乃心火不降腎水不溫活腎丸四制茱萸丸四炒川楝丸或單用雄楮樹葉不結子者是曬乾為末酒糊丸如桐子大每服五十丸空心鹽湯下又有跌傷驚氣與敗血攻入者當消瘀血偏墜腫有大小偏左多瘀血怒火或腎氣虛橫偏右多濕痰食積是知㿉疝證兼七疝治宜詳審故特細言之外治摩腰膏小兒偏墜牡丹皮散婦人子宮突出有寒濕者澤蘭葉散金液丹有熱則不固者小柴胡湯合四物湯加龍膽草青皮疝雖濕熱然生於陰起於下四氣每先傷足三陰部分所以遇外感而發風證小腸陰筋注痛甚有汗身痛烏頭桂枝湯有泄者四君子湯加羌活附子寒證心痛筋縮肢冷食已則吐古梔附湯五積散加吳茱萸小茴及食鹽少許四制茱萸丸硫荔丸暑證小腹脹急溺澀香薷飲加瞿麥木通濕證身重小便不利大便或溏五苓散最妙濕熱入里暴痛難當者加減柴苓湯加減八正散濕盛者導水丸三白散或復元通聖散加黑醜虛者十味蒼柏散在表有寒熱者柴胡桂枝湯七情疝乍滿乍減濕熱者氣疝飲古萸連丸寒冷者蟠蔥散生料木香勻氣散通用五苓散豬苓澤瀉分陰陽以和心與小腸白朮利腰臍間濕及死血茯苓利膀胱水木得桂則枯故用以伐肝木風換桂枝寒加紫蘇生薑鹽少許暑加白芍藥濕加白朮小腸氣加小茴香膀胱氣加金鈴子橘核腎氣加檳榔木通少許凡疝痛走注無形屬氣痛有常處有形乃濕痰食積瘀血下聚而成痰疝海石香附二味薑汁調服痰飲食積者守效丸食積瘀血者梔桃枳楂散失笑散食積挾熱者積疝丸食積挾虛者八味茴香丸虛疝暴癢四君子湯加川楝子茴香枳實山楂山梔按之不痛者加肉桂薑汁按之不定者用桂枝烏頭山梔為末薑汁糊丸薑湯下大能劫痛久者三萸內消丸凡虛疝不宜預補經云邪之所湊其氣必虛留而不去其病則實必瀉其所蓄之熱而後補之是以諸方多借巴豆氣者此也虛甚上為吐逆下有遺精者危要知濕熱為病俱宜瀉南補北不可妄用剛劑久成癥瘕腹滿氣積如臂者白蔥散或理中湯加阿魏腹痛有塊加臍傍者聚香飲子葫蘆巴丸腹痛有塊附臍下者金鈴丸欲作奔豚者茯苓桂甘湯奔豚疝痛者大七氣湯加炒牽牛通用二陳湯加薑汁積加枳實山楂熱加山梔痛加橘核瘀血加元胡索桃仁郁加木香茴香川楝子痛甚加乳香沒藥荔枝核腎大如斗加茴香青皮昆布海藻為丸服水疝加豬苓澤瀉以逐水筋疝加黃連白朮茯苓以降火血疝合四物湯以調血不愈清肝益榮湯或清暑益氣湯氣疝加柴胡青皮香附行氣狐疝加青皮香附蒼朮逐水流經更以蜘蛛十四枚桂枝五錢為末蜜丸米飲下㿉疝加白朮蒼朮豬苓澤瀉煎調荔枝散寒疝加吳茱萸薑桂溫散常用辛平破血消痰積之劑橘核散辛溫散氣溫散之劑五炒川楝丸四炒川楝丸金鈴丸四味茴香散古元蠍散辰砂一粒丹神聖代針散選用脈法內經曰肝脈大急沉皆為疝心脈搏滑急為心疝肺脈沉搏為肺疝又三陽急為瘕三陰急為疝又太陰脈滑則病脾風疝陽明脈滑則病心風疝太陽脈滑則病腎風疝少陽脈滑則病肝風疝脈經曰寸口弦緊為寒疝弦則衛氣不行衛氣不行則惡寒緊則不飲食厥陽脈浮而遲浮則為風虛遲則為寒疝繞臍痛若發則自汗出手足受寒其脈沉脈訣舉要曰疝脈弦急積聚在裡牢急者生弱急者死沉遲浮澀疝瘕寒痛痛甚則伏或細或動治濕熱疝方丹溪加減二陳湯凡治七疝多用熱藥而獲效者即內經從治之法耳須用寒涼藥監製之不可純用大熱之劑如烏頭附子之類久服多服必變劇不可治矣但宜以二陳湯為主佐以諸藥陳皮去白半夏洗泡七次白茯苓甘草炙枳實麩炒橘核梔子炒山楂各等分上銼水煎入生薑汁熱辣飲之如有瘀血作痛者加玄胡索桃仁泥如有氣作痛者加木香茴香楝實等藥如六脈沉細手足厥冷者加附子乾薑肉桂之類以佐之如睪丸痛甚者加荔枝核乳香沒藥為細末調入本方煎內或另用順流水調服亦可如木腎腫大如升斗者本方去甘草加海藻昆布荔枝核