為末醋糊丸如酸棗大以硃砂為衣每服一丸男子酒下婦人醋湯下服罷又服神聖代針散神聖代針散乳香沒藥當歸香白芷川芎各半兩蚖青一兩去翅足即青紅娘子上為細末更研每服一字病甚者半錢先點好茶一盞收撒藥末在茶上不得吹攪立地細細急呷之心驚欲死者小腸氣搐得如角弓膀胱腫硬一切氣刺虛痛並婦人血癖血迷血暈血刺衝心胎衣不下難產但一切痛疾服之有大神效只是要詳疾證用藥元蠍散治小腸疝氣元胡索鹽炒五錢全蠍一錢上為末每服一錢酒調服荔核散治腎大如斗三劑除根荔枝核茴香青皮等分上銼散炒令黃色勿焦傾地上出火毒為末每服二錢酒調下馬功散治寒疝黑牽牛頭末一錢小茴香二錢半木香一錢上共為末每服三錢薑汁調下青木香丸黑牽牛炒取頭末二兩檳榔二兩粟米飯裹煨去飯青木香半兩破故紙炒蓽澄茄各二兩上為末水煮稀糊丸如桐子大每服三十丸熟水下蕩疝丸黑牽牛取頭末破故紙炒小茴香炒川楝子去核炒各一兩青皮陳皮各三錢莪朮木香各四錢上為末酒糊丸如桐子大每服五十丸空心溫酒下神妙丸治疝氣小腸氣膀胱氣盤腸氣水腎氣偏墜硫黃溶化傾入水中撈起研細末三分荔枝核打碎炒黃色一錢半川芎鹽水煮撈起切片五分大茴香一錢半吳茱萸鹽酒炒木香沉香乳香橘核各一錢上為末酒糊丸如桐子大每服五十丸空心米湯下酒亦可三香酒治偏墜氣極痛者一服即愈南木香小茴香八角茴香川楝肉各三錢上合作一服鍋內炒至香入連須蔥白五根用水一碗淬入鍋內以碗罩住候煎至半碗取去渣加好酒半碗合和入炒鹽一茶匙空心熱服神效豬脬丸治諸疝除根用黑雄豬腰子一對不見水去膜切碎以大小茴香末各二兩同豬腰拌勻再以前豬尿脬一個入腰子於內扎定用酒三碗於砂鍋內懸煮至半碗取起焙乾為末將余酒打糊丸如桐子大每服五十丸溫酒下竹茹湯治交接勞復卵腫腹痛欲絕用竹茹一兩水煎濃汁服之治氣疝方聚香飲子治七情所傷遂成七疝心腹脹痛引腰連脅不可俯仰檀香木香乳香沉香丁香藿香各一錢川烏炮延胡索炒桔梗炒桂心片薑黃甘草各五分上作一服加生薑三片棗一枚水煎食前服氣疝飲黃連用吳茱萸水浸炒一錢人參白朮各七分白芍藥陳皮各五分甘草二分上加生薑三片水煎服木香導氣丸治男子小腸氣肚痛一切氣積以補下元虛冷脾胃不和並宜服之木香八角茴香乳香川楝子丁香香附子破故紙胡蘆巴荊三稜甘草各一兩杜仲二兩上為細末酒糊丸如桐子大每服三十丸加至五十丸空心溫酒或鹽湯下日進三服立效散治疝氣川芎川楝子青皮去白舶上茴香黑牽牛炒桃仁各一兩上為末每服二錢無灰酒一盞煎七分溫服失笑散治小腸氣痛及婦人血氣痛欲死者五靈脂蒲黃炒各等分上為末每服二錢先用醋一合熬藥成膏水一盞煎服治積疝方積疝丸山楂一兩茴香柴胡各二錢牡丹皮一錢上為末酒糊丸如桐子大每服五六十丸鹽湯下茴香散治膀胱氣痛茴香金鈴子肉蓬朮三稜各一兩甘草炙半兩上為細末每服二錢食前熱酒調下丹溪方一人疝痛作腹內塊痛止疝痛止塊痛作三稜蓬朮醋煮炒曲薑黃南星各一兩山楂二兩木香沉香香附各三兩黃連用茱萸炒五錢蘿蔔子桃仁山梔枳核炒各半兩上為末薑汁蒸餅為丸服十補丸治小腸寒疝膀胱伏梁奔豚痃氣等證附子一兩用防風一兩銼如黑豆大鹽四兩黑豆一合炒附子裂去諸藥留附子去皮尖胡蘆巴木香巴戟去心川楝子炮去油官桂去皮延胡索蓽澄茄舶上茴香炒破故紙炒各一兩上為末用糯粉酒打糊丸如桐子大辰砂為衣每服五十丸空心酒下婦人醋湯下加益智子亦可狼毒丸治七疝久而不愈發作無時臍腹堅硬刺痛不已芫花醋炒狼毒炒川烏炮去皮臍各一兩全蠍去毒九枚三稜乾薑炮椒紅炒沒藥鱉甲醋煮乾漆炮煙盡各半兩上為末醋糊丸如桐子大每服四十丸空心薑湯溫酒任下甚者以鹽半斤炒極熱以故帛包熨痛處治㿉疝方橘核丸治四種㿉疝卵核腫脹偏有大小或堅硬如石或引臍腹絞痛甚則膚囊腫脹或成瘡癰潰爛輕則時出黃水橘核海藻昆布海帶桃仁川楝子各一兩厚朴玄胡索枳實桂心木香木通各五錢上為末酒糊丸如桐子大每服六十丸溫酒鹽湯任下如虛寒加川烏腫久不消加硇砂少許有熱氣滯加黑醜大黃海藻潰堅丸治木腎如斗結硬如石海藻洗昆布洗川楝子去核吳茱萸湯泡七次各一兩木香荔枝核炒青皮醋炒玄胡索炒肉桂炒各五錢小茴香五錢海帶洗橘核炒桃仁麩炒去皮尖各一兩木通七錢上為末酒糊丸如桐子大每服六七十丸空心鹽湯酒任下馬藺花丸治七疝㿉氣及婦人陰㿉墜下小兒偏墜等證無有不效者馬藺花醋炒川楝子橘核海藻海帶昆布以上俱用酒洗桃仁去皮尖各一兩厚朴薑製木通枳實炒玄胡索肉桂木香檳榔各半兩上為細末酒糊丸如桐子大每服五七十丸或酒或姜鹽湯下如脈沉細手足逆冷者加川烏頭五錢丹溪方治㿉疝南星山楂蒼朮各二兩白芷半夏制枳核神麯各一兩海藻昆布各半兩玄明粉吳茱萸各二錢上為末酒糊丸服又方治木腎不痛枸杞子南星半夏黃柏酒炒蒼朮鹽炒山楂白芷神麯炒滑石炒昆布吳茱萸上為末酒糊丸如桐子大每服七十丸空心鹽湯下又方治木腎楮樹葉又云楊樹雄者曬乾為末酒糊丸如桐子大每服五十丸空心鹽湯下丹溪方下部㿉氣不痛之方細思非痛斷房事與厚味不可用藥惟促其壽若蒼朮神麯白芷山楂川芎枳實半夏皆要藥人視其藥皆鄙賤之物以啟慢心又不能斷欲以愛護其根本非徒無益而反被其害者多矣且其藥宜隨時月寒濕更按君臣佐使加減大抵㿉疝屬濕多蒼朮神麯白芷山楂川芎枳實半夏南星上為末神麯糊為丸服有熱加山梔一兩堅硬加朴硝半兩秋冬加吳茱萸二錢半海蛤丸治㿉疝海蛤醋淬三次當歸海金砂膩粉硇砂各一錢海藻粉霜各五分水蛭二十一條炒青黛滑石乳香各一錢硃砂二錢另為末地龍二十一條去頭足上為細末鹽水煮麵糊為丸如小豆大硃砂為衣每服十丸空心煎燈心湯下之小便下冷膿惡物乃效卻以黃連紫河車板藍根各二錢煎湯漱口以固牙齒去板藍根加管仲地黃膏子丸治男子婦人臍下奔豚氣塊小腹疼痛卵痛即控睪相似漸成腫陰陰痛上衝心腹不可忍者宜服此藥血竭沉香木香莪朮炮玄胡索蛤蚧人參當歸川芎川楝續斷白朮全蠍茴香炒柴胡吳茱萸沒藥以上分兩不定隨證加減用之氣多者加青皮血多者加肉桂上為細末地黃膏子丸如桐子大每服二十丸日加一丸至三十丸空心溫酒下安息香丸治陰氣下墜痛脹卵核腫大堅硬如石痛不能忍者玄胡索炒海藻洗昆布洗青皮去白茴香炒川楝子去核馬藺花各一兩半木香半兩不見火大戟酒浸三宿切片焙乾三錢半沒藥一錢半另研麝香一錢另研上為細末另將硇砂真阿魏真安息香三味各二錢半用酒一盞醋一盞淘去砂石另用酒醋合一盞熬成膏子和丸如綠豆大每服十丸至十五丸空心用綿子灰調酒下大戟丸治陰㿉腫脹或小腸氣痛大戟去皮銼碎炒黃半兩胡蘆巴炒四兩木香一兩川楝子五兩附子炮去皮臍茴香訶子煨去核檳榔半兩麝香另研半兩上為細末獨取川楝以好酒二升蔥頭七枚長三四寸煮川楝軟去皮核取肉和上件藥杵丸如桐子大空心溫酒下十丸潮發疼痛炒姜熱酒下十五丸抵聖丸治陰㿉腫滿赤腫大便秘欲飲水按之臍腹痛者下之續隨子薏苡仁郁李仁茵芋白牽牛略炒各一錢上為末滴水丸如桐子大每服五丸用博濟方香姜飲嚥下黃昏服五更利下惡物效外治方五葉散洗疝痛立效枇杷葉野紫蘇葉椒葉蒼耳葉水晶蒲桃葉上不拘多少量水煎湯浴洗綿包取汗法治偏墜用乾薑桂各一兩為末以綿一兩水三大碗同煮二十餘沸起曬乾又煮水盡為度用干綿包陰丸汗出數次漸愈雄黃散治陰腫大如斗核痛人所不能治雄黃一兩研礬二兩甘草生半兩上銼散以水五升煎洗失笑散治腎腫荊芥穗一兩朴硝二兩上為粗末蘿蔔蔥同煎湯淋洗一方治陰疝或偏墜大小子痛欲死者木鱉子一斤取肉釅醋磨黃柏末芙蓉葉末上調敷核上痛即止一方治外腎腫痛大黃末醋和除之干即易之一方治男子陰腫大如升核痛人所不能治者搗馬鞭草塗之一方治男子陰腫大如斗者核痛人所不能治者蔓菁根搗敷之伏龍肝撒法土足以防水燥足以勝濕治水疝亦良即灶心土為細末撒之腎囊一方治腎囊濕瘡密陀僧乾薑滑石上為末擦囊上又方吳茱萸樟腦蛇床子各半兩寒水石三錢輕粉十盝黃柏硫黃白礬檳榔白芷各二錢上為末先用吳茱萸煎湯洗後以麻油調擦又方治腎上風濕瘡及兩腿全蠍檳榔蛇床子硫黃各一錢上為細末用麻油調入手心擦熱用手抱囊一頃次擦藥兩腿上按摩法治外腎因撲損而傷睪丸偏大有時疼痛者中有瘀血名曰血疝於夜分之時自以一手托其下一手按其上由輕至重丸弄百回彌月之間瘀血盡散陳氣皆行誠妙術也雖年深日久無不愈之治女疝方澤蘭葉散治婦人寒濕或服水銀以致子宮翻出腫濕及風虛勞冷氣攻心腹疼痛肢節拘急體瘦無力經候不調飲食減少澤蘭葉二兩牡丹皮柏子仁赤芍藥續斷各五錢當歸玄胡索桂心附子牛膝川芎桃仁乾漆琥珀沒藥木香各三分麝香一分上為末每服二錢溫酒調服治小兒疝方牡丹皮散治小兒外腎偏墜牡丹皮防風各等分上為末每服二錢溫酒或鹽湯調服外用鹽湯洗之木香補腎丸淮生地四兩酒煮搗膏菟絲子肉蓯蓉黃精黑棗肉牛膝蛇床子微炒茯苓遠志各一兩二錢當歸身二兩四錢丁香三錢大茴香木香各六錢枸杞子一兩五錢巴戟杜仲各一兩青鹽五錢人參五錢上為丸如桐子大空心服之效
