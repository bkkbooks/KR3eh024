body:
  text: 卷六十六傳尸勞論華他中藏經曰傳尸者非謂一門相染而成也人之血氣衰弱臟腑虛羸中於鬼氣因感其邪遂成其病其候咳嗽不止或胸膈脹悶或肢體疼痛或肌膚消瘦或飲食不入或吐利不定或吐膿血或嗜水漿或好歌詠或愛悲愁或顛風發渴或便溺艱難或因酒食而遇或因風雨而來或問病弔喪而得或朝走暮遊而得或因氣聚或因血行或露臥于田野或偶會於園林鍾此病死之氣染而為疾故曰傳尸也醫說云傳尸勞者蓋緣尸注及挾邪精鬼氣而成者也經曰人有三虛逢年之衰遇月之空失時之和乍感生死之氣或犯鬼物之精大概使人淋漓沉沉默默的不知其所苦而無處不惡積月纍年漸就頓滯既死之後又復傳注他人者是也茲又須用通神明去惡氣諸藥以治之經曰草木鹹得其性鬼神無所遁情刳麝剸犀驅曳邪惡飛丹煉石引納清和疑其為此疾而設又曰飛尸者遊走皮膚穿臟腑每發刺痛變作無常遁尸者附骨入肉攻鑿血脈每發不可得近見尸聞喪哀哭便發風尸者淫濯四肢不知痛之所在每發昏沉得風雪便作沉尸者纏骨結臟衝心脅每發絞切遇寒冷便作注尸者舉身沉重精神錯雜常覺昏廢每節氣致變輒成大惡皆宜用忍冬葉數斛煮取濃汁稠煎服之如雞子大一枚日三太乙神精丹蘇和香丸治此病第一直指方云瘵蟲食人骨髓血枯精竭不救者多人能平時愛護元氣保養精血瘵不可得而傳惟夫縱欲多淫精血內耗邪氣外乘是不特男子有傷婦人亦不免矣然而氣虛腹餒最不可入勞瘵之門吊死問喪衣服器用中皆能乘虛而染觸間有婦人入其房睹其人病者思之勞氣隨人染患日久莫不化而為蟲治療之法大抵以保養精血為上去蟲次之安息蘇合阿魏麝犀丹砂雄黃固皆驅伐惡氣之藥亦須以天靈蓋行乎其間蓋尸疰者鬼氣也伏而未起故令淹纏得枯骸枕骨治之鬼氣飛越不復附人於是乎瘥外此則虎牙骨鯉魚頭皆食人之類也其亦枕骨之亞乎要之發用以前當以川芎當歸先立乎根本之地先用芎歸血餘散吞北斗符次用龜甲生犀散取蟲蘇遊論曰傳尸之候先從腎起初受之兩脛痠疼腰背拘急行立腳弱飲食減少兩耳颼颼真似風聲夜臥遺泄陰汗痿弱腎既受訖次傳於心心初受氣夜臥心驚或多恐悸心懸懸氣吸吸欲盡夢見先亡有時盜汗飲食無味口內生瘡心氣煩熱惟欲眠臥朝輕夕重兩頰口唇悉皆紋赤如傅胭脂有時手足五心煩熱心受已次傳於肺肺初受氣咳嗽上氣喘臥益甚鼻口乾燥不聞香臭如或忽聞惟覺朽腐氣有時噁心欲吐肌膚枯燥時或疼痛或似蟲行干皮細起狀如麩片肺既受已次傳於肝肝初受氣兩目胱胱面無血色常欲顰眉視不能遠目常乾澀又時赤痛或復睛黃常欲閣眼及時睡臥不著肝既受已次傳於脾脾初受氣兩脅虛脹食不消化又時瀉利水穀生蟲有時肚痛腹脹雷鳴唇口焦乾或生瘡腫毛髮乾聳無有光潤或時上氣抬肩喘息利赤黑汗見此怔者乃不治也夫骨蒸殗殜伏連尸疰勞疰蟲疰毒疰熱疰冷疰食疰鬼疰盡皆曰傳尸以疰者注也病自上注也其變有二十二種或三十六種或九十九種大略令人寒熱盜汗夢與鬼交遺精白濁發乾而聳或腹內有塊或腦後兩邊有小結復連數個或聚或散沉沉默默咳嗽痰涎或咯膿血如肺痿肺癱狀或腹下利羸瘦困乏不自勝持積月纍年以至於死死復傳注親屬乃至滅門者是也更有飛尸遁尸寒尸喪尸與尸疰謂之五尸及大小附著等證乃挾諸鬼邪而害人其證多端傳變推遷難以推測故自古及今愈此病者十不一得所謂貍骨獺肝天靈蓋銅鎖鼻徒有其說未嘗取效惟膏肓俞四花穴若及早灸之可否幾半晚亦不濟矣本事方云葛稚川言鬼疰者是五尸之一疰又按諸鬼邪為害其變動乃有三十六種至九十九種大略使人淋漓沉沉默默的不知其所苦而無處不惡纍年積月漸就頓滯以至於死傳於傍人乃至滅門覺知是候者急治獺肝一具陰乾取末水服方寸匕日三服效未知再服此方神良天慶觀一法師行考校極精嚴時一婦人投狀述患人有所附須臾乃附語云非我所禍別是一鬼亦自病人命衰為祟耳今已成形在患人肺中為蟲食其肺系故令吐血聲嘶師掠之曰此蟲還有畏忌否久而無語再掠之良久云唯畏獺爪屑為末以酒服之則去矣患家如其言得愈此豫所目見也究其患亦相似獺爪者獺肝之類歟虞氏曰勞瘵二十四種或三十六種名雖不同證亦少異大抵不過咳嗽發熱咯血吐痰等證耳至於侍奉親密之人或同氣連枝之屬薰陶日久受其惡氣多遭傳染名曰傳尸又曰喪尸曰飛尸曰遁尸曰殗殜曰尸注曰鬼注蓋表其傳注酷虐莫能測之名也雖然未有不由氣體虛弱勞傷心腎而得之者初起於一人不謹而後傳注數十百人甚而至於滅族滅門者有之然此病最為可惡其熱毒鬱積之久則生異物惡蟲食人臟腑精華變生諸般奇狀誠可驚駭是以勞傷於肝膽者則為毛蟲如刺蝟瓦蛆之屬食人筋膜勞傷於心與小腸者則為羽蟲如燈蛾蚊蟲禽鳥之形食人血脈勞傷於脾胃者則為裸蟲如嬰孩蚯蚓之類食人肌肉勞傷於肺與大腸者則為介蟲如龜鱉蝦蟹之狀食人膚膏勞傷於腎與膀胱者則為鱗蟲如魚龍䗀蛤𧋎屬之形食人骨髓或挾相火之勢亦如羽蟲之酷者鴟梟之類為狀不一不可勝紀凡人覺有此證便宜早治緩則不及事矣治之之法一則殺其蟲以絶其根本一則補其虛以復其真元分經用藥各有條理務如庖丁解牛動中肯綮無有不愈者也若待病勢已劇元氣已脫雖依古方取蟲滋補患者不能一生但可絶後人之傳注耳王啓玄曰傳尸蠱瘵之證父子兄弟互相傳染甚者絶戶此乃祖父冤債或風水所繫雖有符文法水下蟲之法然蟲去人亡亦未為全美若能平素保養則自愈矣李氏曰傳尸勞蟲一十八種自上注下病與前人相似故又曰注化精血歸於元陽之內變幻種類最多古謂第一代蟲如嬰兒或如鬼或如蝦蟆遇丙丁日食起醉歸心俞第二代蟲如亂髮或如守宮或如蜈蚣或如蝦蟹遇庚辛日食起醉歸肺俞第三代蟲如蚊如蟻或如蜣螂或如刺蝟遇庚辛日食起醉歸厥陰第四代蟲如亂絲或如豬肝或如蚯蚓如蛇虺遇戊己日食起醉歸脾俞第五代蟲如鱉龜或有頭無足或有足無頭或如鼠或如精血遇甲乙日食起醉歸肝俞第六代蟲如馬尾有兩條一雌一雄或如鱉有頭足尾或如爛面或長或短遇醜亥日食起醉歸腎俞周而復始凡取癆蟲依五臟方選用必俟其大醉日方可取之取後隨補各臟只用追病丹以斷其根又有輕者只用鰻鱺魚煮食或紫河車丹陽虛者金液丹最妙取癆蟲法先令病家用皮紙糊一密室不留些子罅隙擇一老成人過遞以安息香水灑其過遞之人身以雄黃雌黃塗耳目口鼻上安排鐵鉗一把布巾一幅用香油二斤以鍋盛頓微煎令沸仍用高桶一個以石灰在桶內生布巾蓋桶口俟月初蟲頭向上卻服取蟲藥五更初一服五更三點時一服服藥後腹如疼痛如刀斧劈不妨至巳時必須下蟲或取下臭穢或膠漆或吐瀉膿血癥塊皆於灰桶中其蟲或從汗出紫蠶苗狀或從耳鼻口中出或小便中出異般形狀不一或青黑或黃紅大者急用鉗取入油中煎當日將油紙里蟲入瓦罐內石灰填實埋於深山遠僻之地免再染人其患人衣被床席並皆棄去焚燒醫人分付藥後亦須遠避其取下蟲白色者食人臟腑脂膏可三十日服藥補之蟲色黃赤者食人血肉可六十日服藥補之蟲色紫黑者食人精髓病傳至腎可謂極矣冀其萬一或為子孫除害則可又蟲頭白者亦難治此危氏說也丹溪謂不必深疑癆蟲須分五臟嘗居肺間正所謂膏之上肓之下針之不到藥之不行只宜早灸膏肓四花為佳若食肺系則咯血吐痰聲嘶思食無厭病患至此未易治療蟲亦氣血凝滯痰與瘀血化成但平補氣血為主加以烏梅青蒿硃砂之類而蟲自亡矣紫河車丹紫河車丸青蒿膏蛤蚧散天靈蓋散選用傳尸之說不必深疑歷觀勞瘵皆因酒色財氣損傷心血以致虛火妄動醫者不分陰陽用藥病家不思疾由自取往往歸咎前人積惡甚則疑及房室器皿墳墓且冤業飛尸遞相傳注古人亦云勞瘵三十六種惟陰德可以斷之不幸患此疾者或入山林或居靜室清心靜坐常焚香叩齒專意保養節食戒欲庶乎病可斷根若不遵此禁忌服藥不效丹溪云傳尸一蟲不可云無傳尸勞瘵寒熱交攻久嗽咯血日久羸瘦先以三拗湯次以清心蓮子飲白蠟塵大殺勞蟲可入丸散藥中用龔氏曰傳尸勞瘵之證乃臟中有蟲咬心肺者名曰瘵此是傳尸疰骨勞疰者注也自上注下骨肉相傳乃自滅門者有之矣蔭按傳尸蟲乃血氣虛弱臟腑羸瘦以致飲食痰血之類停滯不能運化兼之熱氣熏蒸因而變生諸蟲如腐草為螢積水生蛙何嘗有種類相傳也至於既病之後因而傳染他人理亦有之玉堂宗旨論傳尸勞云傳尸勞瘵者蓋由酒色過度飲食不節其心不正憂思郁然業緣所致初覺之時精神恍惚五心煩躁氣候不調心虛夜汗如此十日頓成肌瘦面黃其病皆從心受正氣與毒氣並行臟腑二氣相攻種毒五臟致使血氣凝結變成蟲狀遇陽日長雄陰日長雌遂成勞蟲其蟲有九而六蟲傳六代三蟲不傳乃蝟蟲蛔蟲寸白蟲也其六蟲一旬之中遍行四穴周而復始遇木氣而生立春後一日方食後三日一食五日一退退即還穴醉睡一醉五日一蟲在身占十二穴六蟲共占七十二穴一月之中上十日蟲頭向上從心至頭遊四穴中十日蟲頭向內從心至臍遊四穴下十日蟲頭向下從臍至足遊四穴其蟲先食臟腑脂膏故蟲色白令患人皮聚毛脫七十日後食血肉故蟲色黃赤令患人肌體消瘦飲食不滋膚筋緩不能收一百二十日外食血肉盡故蟲色紫卻傳腎中即食精髓故蟲色黑令患人骨痿不能起坐其蟲積久生毛其毛色鍾五臟五行之氣故毛色花雜傳至三人即能自飛其狀如禽品類亦多人遭此蟲傳染者五內崩損良可哀哉又云蟲頭赤者食肉可治蟲頭口白者食髓難治蟲性靈通臨病深加精審取蟲之後不服補藥徒費醫治所有取蟲符藥待蟲醉日為之又經云六十日者十治七八八十日者十治三四過此已往不復生矣但為後世子孫除害耳取蟲藥方符録及六代補勞藥方次第詳著於後上清紫庭追勞方云三尸九蟲之為害治者不可不知其詳九蟲之內三蟲不傳蝟蛔寸白也其六蟲者或臟種毒而生或親屬習染而傳疾之初覺精神恍惚氣候不調切在戒忌酒色調節飲食如或不然五心煩熱寢汗忪悸如此十日頓成羸瘦面黃光潤此其證也大抵六蟲一旬之中遍行四穴周而復始病經遇木氣而生立春後一日方食起三日一食五日一退方其作苦百節皆痛蟲之食也退即還穴醉睡一醉五日其病乍靜其退醉之日乃可投符用藥不然蟲熟於符藥之後不能治也一蟲在身中占十二穴六蟲共占七十二穴一月之中上十日蟲頭向上從心至頭遊四穴中十日蟲頭向內從心至臍遊四穴下十日蟲頭向下從臍至足遊四穴陽日長雄陰日長雌其食先臟腑脂膏故其色白五臟六腑一經食損即皮聚毛脫婦人即月信不行血脈皆損不能榮五臟六腑也七十日後食人血肉盡故其蟲黃赤損於肌肉故變瘦劣飲食不為肌膚筋緩不能收持一百二十日外血肉食盡故其蟲紫即食精髓傳於腎中食精故其蟲色黑食髓即骨痿不能起於床諸蟲久即生毛毛色雜花鍾孕五臟五行之氣傳之三人即自能飛其狀如禽亦多品類傳入腎經不可救治利藥下蟲後其蟲色白可三十日服補藥其蟲黃赤可六十日服補藥其蟲紫黑此病已極可百二十日服補藥又云蟲頭赤者食患人肉可治頭口白者食患人髓其病難治只宜斷後故經曰六十日者十得七八八十日內治者十得三四過此以往未知生全但可為子孫除害耳第一代勞蟲此為初勞病謂初受其疾不測病源酒食加餐漸覺羸瘦治療蹉跎乃成重病醫人不詳其故誤藥多死此蟲形如嬰兒背上長毛三寸在人身中此蟲形如鬼狀變動在人臟腑中此蟲形如蝦蟆變動在人臟腑中以上諸蟲在人身中縈著之後或大或小令人夢寐顛倒魂魄飛揚精神離散飲食少減形容漸羸四肢痠疼百節勞倦憎寒壯熱背膊拘急頭腦痛疼口苦舌乾面無顏色鼻流清涕虛汗常多行步艱辛眼睛時痛其蟲遇丙丁日食起醉歸心俞穴中四穴輪轉周而復始俟蟲大醉方可醫灸取出蟲後用藥補心用後守靈散第二代勞蟲此為覺勞病謂傳受此病已覺病者患人乃自知夜夢不詳與亡人為伴侶醒後全無情思昏沉似醉神識不安所食味輒成患害或氣痰發動風毒所加四體不和心胸滿悶日漸羸瘦骨節乾枯或嘔酸水或是醋心唇焦口苦鼻寒胸痛背膊痠疼虛汗常出腰膝刺痛如此疾狀須早醫治過時難療致傷性命此蟲形如亂絲長三寸許在人臟腑中此蟲形如蜈蚣或似守宮在人臟腑中此蟲形如蝦蟹在人臟腑中以上諸蟲在人身中令人氣喘唇口多幹咳嗽憎寒心煩壅滿毛髮焦落氣脹吞酸津液漸衰次多虛渴鼻流清水四肢將虛臉赤面黃皮膚枯瘦腰膝無力背脊痠疼吐血唾膿語言不利鼻塞頭痛胸膈多痰重者心悶吐血僵仆在地不能自知其蟲庚辛日食起醉歸肺俞穴中四穴輪轉周而復始候蟲大醉方可治醫取出蟲後即當補肺用後虛成散第三代勞蟲此為傳尸勞病謂傳受病人自尋得知之日漸消瘦頓改容顏日日悽惶夜夜憂死不遇良醫就死伊邇此蟲形如蚊蟻俱遊在臟腑中此蟲形如蜣螂大如碎血片在人臟中此蟲形如刺蝟在人腹中以上諸蟲在人身中令人三焦多昏日常思睡嘔吐苦汁或吐清水或甜或苦黏涎嘗壅腹脹虛鳴臥後多驚口鼻生瘡唇黑麵青日漸消瘦精神恍惚魂魄飛揚飲食不消氣咽聲干目多昏淚其蟲遇庚寅日食起醉歸厥陰穴中四穴輪轉周而復始俟蟲大醉方可治之取出蟲後即當補氣用後氣復散第四代勞蟲此蟲形如亂絲在人腹臟之中此蟲形如豬肝在人腹內此蟲形如蛇虺在人五臟之中以上諸蟲在人身中令人臟腑虛鳴嘔逆傷中痃癖氣塊憎寒壯熱肚大筋生腰背疼痛瀉利無時行履困重四肢焦悴上氣喘急口苦舌乾飲食及水過多喜食酸鹹之物其蟲遇戊己日食起醉歸脾俞穴中四穴輪轉周而復始俟蟲大醉方可治取取出蟲後即當補脾用後魂停散第五代勞蟲此蟲形如鼠似小瓶渾無表裡背面此蟲形如鬼有頭無足有足無頭此蟲變動形如血片在於陽宮以上諸蟲入肝經而歸腎得血而變更也令人多怒氣逆筋骨拳攣四肢解散唇黑麵青憎寒壯熱腰背疼痛起坐無力頭如斧斫眼睛時痛翳膜多淚背膊刺痛力乏虛羸手足乾枯臥著床枕不能起止有似中風肢體頑麻腹內多痛眼見黑花忽然倒地不省人事夢寐不祥覺來遍體虛汗或有面色紅潤如平時者或有通靈而言未來事者其蟲遇癸未日食起醉歸肝俞穴中四穴輪轉周而復始俟蟲大醉方可治之取出蟲後即當補肝用後金明散第六代勞蟲此代蟲有彼足全者千里傳疰所謂飛尸不以常法治也此蟲形如馬尾有兩條一雄一雌此蟲形如龜鱉在人五臟中此蟲形如爛面或長或短或如飛禽以上諸蟲入於腎臟透連脊骨令人思食百味身體尪羸腰膝無力髓寒骨熱四體乾枯眼見火生或多黑暗耳內虛鳴陰汗燥癢冷汗如油夢多鬼交小便黃赤醒後昏沉臍下結硬或奔心胸看物如豔心腹悶亂骨節疼痛食物進退有時喘嗽其蟲遇癸亥日食起醉歸腎俞穴中四穴輪轉周而復始俟蟲大醉方可治之取出蟲後即當補腎用後育嬰散驗勞蟲法華他方傳尸勞肌瘦面黃嘔吐咳嗽不定先燒安息香令煙盡吸之不嗽非傳尸也若煙入口咳而不能禁止乃傳尸也宜用明月丹紫庭方治傳尸伏尸皆有蟲須用乳香薰病人之手乃仰手掌以帛覆其上熏良久手背上出毛長寸許白而黃者可治紅者稍難青黑者即死最驗若熏之良久無毛者即非此證乃屬勞瘵虛損即用前參耆溫補之藥取勞蟲方天靈明月丹治傳尸勞吸安息香不嗽者不可用此藥雄黃木香各半兩天靈蓋炙一兩兔糞二兩鱉甲酥炙一分輕粉一分上為末用法酒一大升大黃末半兩熬膏入前藥為丸如彈子大硃砂為衣五更初服勿令人知以童子小便和酒化一丸如人行二十里許必吐出蟲狀如燈心而細長及寸或如爛李又蝦蟆狀各不同未效次日再服以應為度經驗天靈蓋散治勞瘵取蟲天靈蓋二指大用白檀香煎湯洗酥炙黃色檳榔五個為末阿魏二分另研麝香三分另研辰砂一分另研甘遂二分為末一云不用此味安息香三分研上為細末研勻每服三錢用薤白蔥白十四莖青蒿二握甘草五寸許桃枝柳枝桑白皮石榴根各七寸以童便四大碗擇淨潔處於銀石器內文武火煎至一碗濾去柤分作三盞將前藥末調下五更初服一盞如覺欲吐以白梅肉噙止之五更盡覺臟腑鳴追下蟲及惡物黃水若一服未下如人行五七里又進一服至天明又進一服如瀉不止用龍骨黃連等分為末熟水調下五錢次食白梅粥補之此藥男病女煎女病男煎合藥煎藥俱勿令患者知之恐蟲聞其氣卒難取下亦不許孝子僧人雞犬見之局方蘇合香丸療傳尸骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐利時氣鬼魅瘴瘧赤白暴痢厥血目閉痃癖疔腫驚癇鬼忤中人小兒吐乳大人狐貍等證硃砂研水飛烏犀鎊屑安息香為末香附子去皮青木香白朮沉香各二兩蘇合香油入安息膏熏陸香另研龍腦另研麝香各一兩白檀切訶黎勒煨取皮蓽撥各三兩無灰酒一升熬膏一方同安息香熬膏上為細末入研藥勻用安息香膏並煉白蜜和劑每服旋丸桐子大早取井花水溫冷任意化服四丸老人小兒可服一丸溫酒化服空心服之用蠟紙裹一丸如彈子大緋絹袋當心帶之一切邪神不敢近將軍丸治傳尸勞瘵此藥乃異人傳授纍經纍驗錦文大黃九蒸九曝焙管仲牙皂去皮醋炙桃仁去皮尖檳榔雷丸鱉甲醋炙黃各一兩蕪荑半兩麝香一錢研上為末先將蒿葉二兩東邊桃柳李桑葉各七片水一碗煎七分去柤入蜜一大盞再熬至成膏入前藥末及麝香安息香搗丸如桐子大每服三十丸食前棗湯下神人阿魏散治骨蒸傳尸等寒熱羸勞困倦喘嗽等證不問男婦服之其效如神阿魏三錢青蒿一握研東北方桃枝一握細切甘草如病人中指許大男左女右細銼一方有蔥白三寸名青蒿飲上以童便二升半隔夜浸藥明旦煎取一大升空心溫服分為三服每次調入檳榔末三分如人行十里許再進一服男病女煎女病男煎合藥時忌孝子孕婦病人及腥穢雞犬等物服後忌油膩濕面生冷硬物服至一二劑即吐出蟲子或瀉出更不須服余藥若未吐利即當盡服病在上則吐在下則利皆出蟲如馬尾人發即愈服藥覺五臟虛弱魂魄不安即以後白茯苓湯補之祕方鬼哭飲子專取傳尸勞蟲天靈蓋酥炙黃色鱉甲醋炙黃色柴胡去蘆各二錢半木香一錢二分鼓心醋炙黃青蒿半握阿魏一錢桃仁十一枚另研去皮安息香一錢貫仲二錢半甘草一錢生用上十一味細切杵為粗末先以童子小便二升隔夜浸露星月下至四更時煎至八分去柤分作三服每服調後蜈蚣散一錢五更初溫服即穩臥至三點時又進一服至日出時覺腹中欲利如未利又進一服已利勿服蜈蚣散赤腳蜈蚣以竹簫盛薑汁浸焙乾一條烏雞糞二錢半先將雞於五日前以火麻子煨後取糞檳榔二錢半辰砂一錢二分半麝香一錢另研上以五味研為細末和勻入前煎藥內服凡合藥宜六甲建除日忌婦人孝服雞犬見之亦不可令患者知如利下惡物兼蟲以盆盛之急用火燒殺之其病人所穿衣服及薦褥盡易燒之食蔥粥將息以復元氣百一選方取傳尸勞蟲天靈蓋十字解者酥炙為末三錢安息香半兩虎糞內骨人骨為上獸次之醋炙半兩鱉甲極大者酥炙一兩桃仁去皮尖二錢半麝香一錢另研檳榔二錢半研為末青蒿梢六兩豉三百粒蔥根二十一根打破楓葉二十一片如無亦得東引桃柳枝筋大者各七條各長七寸童便半升上先將青蒿桃柳枝楓葉蔥根用水二官升煎半乾去柤入天靈蓋虎糞骨鱉甲安息香童便同煎取汁去柤約有四五合將檳榔麝香研勻調作一服早晨空腹服以被蓋出汗恐汗內有細蟲以帛子拭之投火中須臾必下如有蟲以大火焚之棄流水中所用藥勿令病者知之半月後氣血復完再進一服依前法三次無蟲乃止以美飲食調理其病自愈此藥如病者未亟可以取安如已亟俟其垂死則令下次已傳染者服之先病雖不可救後來斷不傳染此道人傳李應方也道人云此藥以天靈蓋虎糞內骨為主切須仔細尋覓服藥前一日須盛享城隍求為陰助應曰既求於神何必用藥道人曰不然即揖別西去應以事頗異敬如其言治藥既成設五神位各具飲饌十品如待貴客以享城隍又別列酒食以犒陰兵乃於其家設使者一位於病榻之前服藥食頃臟腑大下得蟲七枚色如紅襖肉而腹白長約一寸闊七分前鋭後方腹下近前有口身之四周有足若魚骨細如針尖而曲已死試取火焚之以鐵火箸扎刺不能入病勢頓減後又服一劑得小蟲四枚自此遂安或云此方必有阿魏一錢五勞麝香散治男子婦人傳尸骨蒸發熱五勞七傷等證天靈蓋麝香各二錢半阿魏一錢另研柴胡一兩犀角屑半兩甘草三寸東引桃枝東引柳枝東引榴枝青蒿各一握薤白蔥白各七寸上細切杵為粗末用童便二升半浸藥一宿明日早煎至一升半去柤分作三服每服入檳榔細末三錢溫服五更初進一服約人行五十里若噁心兀兀欲吐嚼白梅止之三服後瀉出惡物異蟲或身如蟻行不可名狀後用蔥粥止之忌風一月及忌食油膩濕面鹹酸並牛羊雞豬犬肉魚腥年遠重病不過二服全安修合此藥時男病女煎女病男煎忌貓犬雞鵝鴨驢馬僧尼孕婦孝子見之凡取蟲後須以後大補茯苓散補之取尸蟲神仙祕方青桑枝柳枝梅枝桃枝石榴枝各七莖俱長七寸皆取東引者青蒿一握蔥白七莖阿魏一錢另研安息香一錢去石另研上除阿魏安息香二味外余藥用童便一升半煮去一半去柤將阿魏安息香末入內再煎十數沸分作二服調辰硃砂末檳榔末各五分麝香少許另研上三味亦分作二服入前湯內五更初進一服三點時又進一服至已午時必取下蟲其嘴紅者可治青黑者不治但可絶後人之傳注耳取蟲後進軟粥湯和將息忌食生冷毒物仍服紙丸子法凡合此藥不可令患者先知氣味亦不令貓犬孕婦孝子僧尼等不祥人見之芎歸血餘散取尸蟲室女頂上生髮一小團井水洗去油膩法醋浸一宿日中曬乾紙燃火燒存性真川芎半兩當歸三錢木香桃仁水浸去皮焙各二錢安息香雄黃各一錢全蠍二枚江上大鯉魚頭生截斷一枚醋炙酥上為末分作四服每服井水一大碗淨室中煎七分入紅硬真降香末半錢燒北斗符入藥月初五更空心向北目天咒曰瘵神瘵神害我生人吾奉帝敕服藥保身急急如律令咒五遍面北服藥畢南面吸生氣入口腹中燒降香置床底下午時又如前服藥鱉甲生犀散治瘵疾殺瘵蟲取出惡物天靈蓋一具男者色不赤可用女者色赤勿用以檀香煎湯候冷洗咒曰雷公雷靈雷公聖達傳尸即須應急急如律令咒七遍訖次用酥炙黃色生鱉甲一枚去裙酥炙黃虎長牙二枚酥炙如無則用牙關骨半兩安息香桃仁水浸去皮焙檳榔雞心者各半兩生犀角木香甘遂降真香乾漆杵碎炒煙略盡存性阿魏酒浸研各三錢雷丸二錢穿山甲取四趾醋炙焦全蠍三個蚯蚓十條生研和藥上件為末每服半兩先用豉心四十九粒東向桃李桑梅小梢各二莖長七寸生藍青七葉青蒿一小握蔥白連根洗五莖石臼內同杵用井水一碗半煎取一盞入童子尿一盞納藥末煎取七分入麝一字月初旬五更空心溫服即以被覆汗恐汗中有細蟲軟帛拭之即焚其帛少時必瀉蟲以淨桶急鉗取出付烈火焚之並收入磁器中瓦片雄黃蓋之泥和灰扎埋深山絶人行處犀角紫河車丸治傳尸勞三月必平復其餘勞證只消數服神效紫河車一具用米泔浸一宿洗淨焙乾鱉甲酥炙桔梗去蘆胡黃連大黃敗鼓皮心醋炙芍藥貝母去心龍膽草黃藥子知母各二錢半芒硝犀角鎊蓬朮各一錢半硃砂研二錢上為細末煉蜜丸如桐子大硃砂為衣每服二十丸空心食前溫酒服如膈熱食後服重病不過一料一方無芍藥黃藥子二味有甘草二錢苦參黃柏人中白各二錢半或名禁方無比丸或名調鼎方紫河車丹治飛尸鬼疰虛勞羸瘦喘嗽痰氣等證紫河車取首胎男子者一具以皂角水洗淨次放鋼銚子內以米醋泄洗控干用小篾籠盛之周圍以紙密糊不令泄氣以烈火焙乾入後藥人參一兩半白朮炒白茯苓茯神去木當歸熟地黃各一兩木香半兩乳香沒藥各四錢另研硃砂二錢另研麝香二分上為細末和勻酒糊為丸如梧桐子大每服五十丸煎人參湯送下空心服日午再服或煉蜜丸亦可貫衆丸去三尸九蟲貫衆五分殺伏尸蟲乾漆二分略炒厚朴三分殺肺白葫蘆三分殺尸蟲殭蠶四分殺膈蟲雷丸六分殺赤蟲雄黃三分殺蟲狼牙子四分殺胃蟲上件焙乾炒令黃色研為細末煉蜜為丸如桐子大新汲水下五丸三服後漸加至十丸服之二十日百病皆愈三尸九蟲盡滅更無傳注之患耳追蟲丹治瘵病咳血吐痰思食無厭者宜用使君子肉二兩乾漆焙一兩貫衆五錢雄黃一錢硫黃信石各三分上為末分作六服候每早思食之時思肉則用肉思雞則用雞煮熟切碎入小茴末三分拌和先食肉少許後以煮肉汁入藥末調勻服之隨睡即蟲被毒或利或吐出蟲用藥之時勿令病者知之二十四味蓮心散治傳尸勞寒熱交攻久嗽咯血日益羸瘦先以三拗湯次以蓮心散當歸黃耆甘草炙鱉甲醋炙前胡柴胡獨活羌活防風防己茯苓阿膠炒成珠半夏黃芩陳皮官桂赤芍藥杏仁另研麻黃不去根節蓮肉南星川芎枳殼麩炒各半錢芫花醋炒黑色一撮上細切作一服加生薑三片大棗一枚水二盞煎至一盞去柤溫服須待吐有異物芫花漸減少蓋芫花反甘草所以殺蟲炒之所以煅熟去寒妙在此處神授散治諸傳尸勞氣殺蟲去毒此方得之於河南郡王府濟世既久功不可述也川椒二斤擇去合口者與梗略炒出汗上一味為細末每服二錢空心米湯送下或用酒糊為丸如梧桐子大每服二三十丸漸加至八九十丸空心酒下或米湯下凡人得傳尸勞病氣血未甚虛損元氣未盡脫絶者不須多方服食但能早用此藥無有不愈者真濟世之寶也虞氏曰豫嘗治一婦人用花椒二分苦楝根一分丸服尸蟲盡從大便瀉出祕傳取勞蟲禁方啄木禽一隻用硃砂四兩精豬肉四兩將肉切作片子其硃砂杵如緑豆大塊二味拌勻喂禽一晝夜食肉盡為度以鹽泥固濟其禽在內剛火煅一夜來日不見太陽取出不得打破埋入地中二尺許一晝夜取出去鹽泥銀石器內研為細末以無灰酒拌入麝香少許作一服調下置患者於帳中四下緊閉用鐵鉗等候其蟲必從口鼻中出即以鉗鉗入沸油中煎殺之如蟲出之後便進局方喜禾散一服軟粥將息取尸蟲符籙遇仙灸治瘵捷法取癸亥日二更後六神皆聚時解去下衣直身平立以墨點記腰上兩旁陷處謂之腰眼穴然後上床合面臥每穴灸七壯勞蟲或吐或瀉而出取後用火焚之棄於江中以絶傳染取勞蟲後補虛方茯神散不問遠年近日取效下蟲紅色便可治肚下黑次之肚下白色是食髓也萬不一瘥補方服此白茯神去木白茯苓人參遠志去心龍骨肉桂甘草陳皮各一兩當歸五味子各一兩半黃耆二兩上為散分作八服每服入棗七枚生薑二錢用水一升半煎至一升趁前藥後吃亦空心服神效白茯苓湯取蟲後補虛白茯苓一錢人參犀角各五錢遠志防風龍骨各二錢生地酒炒麥門冬去心各四錢甘草三分大棗七枚上以水二大盞煎作八分合分三服溫服如人行十里一服仍避風寒若覺未安隔日更作一劑守靈散補心臟勞極白茯苓丁香訶子去核各一兩桔梗芍藥羌活甘草炙各二錢五分上為細末每服二錢水一盞入銀鐶一雙蔥白三寸同煎至八分溫服虛成散補肺臟勞極枳實去穰麩炒秦艽去蘆白茯苓芍藥麻黃去節玄胡索當歸酒洗茴香炒各半兩甘草炙各二錢半上為細末每服二錢水一盞銀鐶一雙蜜五點煎至八分溫服氣復散補三焦勞極甘草白朮茯苓人參當歸生地酒炒知母五味子麥門冬黃耆沉香訶子枳實橘皮各等分上為末每服二錢水一鍾半煎八分溫服魂停散補脾臟勞極白藥子桔梗人參訶子皮茯苓甘草炙丁香各等分上為細末每服二錢水一盞入蜜一匙煎至八分溫服金明散補肝臟勞極人參知母茯苓秦艽去蘆丁香甘草炙石膏煅各等分上為細末每服二錢水一盞蔥白三寸同煎至八分溫服育嬰散補腎臟勞極香附子炒二錢半梅子一枚炮白蒺藜去角二錢半白茯苓半兩木香甘草炙各一錢上為細末每服二錢水一盞生薑七片蔥白三寸同煎至七分空心服以上六方治心肝脾肺腎取出蟲後補勞之藥也蔭按治勞瘵傳尸飛尸三尸九蟲等證多用天靈蓋紫河車人骨為藥甚哉不仁之至也夫民吾同胞物吾同與除我之疾損人之骨縱使壽長亦必奪算況古人以掩暴骨為陰德而豈能以人骨醫人病乎又煮之炙之解之研之仁術固如此乎且犬不食犬骨而人食人骨可乎況前蘇遊論曰天靈蓋治傳尸徒有其說未嘗取效惟膏肓俞四花穴及早灸之自可平安方技不習灸法不用官藥好奇行怪而以人骨醫人病殘忍傷德恐非仁人之用心也苟有可易定須易之不用
