body:
  text: 卷九十二小便不通論東垣曰小便不通皆邪熱為病分在氣在血而治之以渴與不渴辨之如渴而不利者熱在上焦肺分故也夫小便者足太陽膀胱所主也長生於申申者西方金也金能生水金者肺也肺中伏熱水不能生是絶小便之源也肺氣不能降故用清燥金之正化如雨如露皆從天而降也淡味滲泄之藥茯苓豬苓澤瀉琥珀燈心通草車前子木通瞿麥萹蓄之類以瀉肺火而清肺金滋水之化源也若不渴而不利者熱在下焦血分故也下焦者腎也膀胱也是絶其流而溺不出也經曰無陰則陽無以化須用氣味俱厚陰中之陰之藥治之若用淡滲之劑其性乃陽中之陰非純陰之劑陽無以化也治法當寒因熱用如熱在上焦梔子黃芩中焦黃連白芍下焦黃柏知母之類仲云小便不通腹下痛狀如覆碗痛悶難忍者乃腸胃乾涸膻中氣不下經云膀胱者州都之官津液藏焉氣化則能出矣膻中者臣使之官三焦相火腎為氣海也王注云膀胱津液之腑胞內居之少腹處間毛內藏胞器若得氣海之氣施化則溲便注下氣海之氣不及則隱祕不通故不得便利也先用木香沉香各三錢酒調下或八正散甚則宜上湧之令氣通達便自通利經所謂病在下上取之王注曰熱攻於上不利於下氣盛於上則溫辛散之苦以利之一方煎橘紅茯苓湯調木香沉香末空心服之丹溪曰小便不通有熱有濕有氣結於下宜清宜燥宜升有隔二隔三之治如因肺燥不能生水則清金此隔二如不因肺燥但膀胱有熱則宜瀉膀胱此正治如因脾濕不運而精不升故肺不能生水則當燥脾健胃此隔三清肺用車前子茯苓之類瀉膀胱用黃柏知母之類燥脾健胃用蒼朮白朮之類又曰小便不通屬氣虛血虛有實熱痰氣閉塞皆宜吐之以提其氣氣升則水自降蓋氣承載其水者也氣虛用參朮升麻等先服後吐或就參耆藥中調理吐之血虛用四物湯先服後吐或芎歸湯探吐之痰多二陳湯先服後探吐之痰氣閉塞二陳湯加木香香附探吐之實熱當利之或八正散蓋大便動則小便自然通矣一人小便不通醫用利藥益甚脈右寸弦滑此積痰在肺肺為上焦膀胱為下焦上焦閉則下焦塞如滴水之器上竅閉則下竅無以自通必上竅開而後下竅之水出焉以藥大吐之病即安葉氏曰氣虛血虛與痰氣閉結於下者虛實之情不同丹溪皆用吐法乃急則治其標也至本之虛豈參朮四物之類頃刻下咽遂能補益之耶吾恐病根猶在不久必復作愚意若果氣虛血虛必用大補使其氣盛而施化血生而津潤其便自可以通不必探吐果宜吐者必須先吐候其溺通繼服補劑庶可平復非如痰氣閉結者但吐之而可已此丹溪未盡之意豫表而出之戴氏曰汗多而小便赤澀夏月多有此證盛暑所飲既多小便反澀緣上停為飲外發於汗津道不通小腸澀閉則水不運下用五苓散然有虛勞汗多而反澀者乃是五內枯燥滋腴既去不能生津當以溫養潤肺十全大補湯或養榮湯不可過用利小便蓋汗者心液心主血養血則心得所養汗止津生不必通溺而自清矣諸失精血及患癰毒人或有小便反澀之證亦是枯竭不潤之故也李氏曰經曰膀胱不利為癃候其鼻頭色黃者小便必難腎主水瀦於膀胱泄於小腸實相通也然腎應於心心火盛則小腸熱結熱微則小便難而僅有熱甚則小便閉而絶無宜清熱生津為主單朴硝散五苓散臍下脹者加琥珀或單琥珀為末蜜丸人參茯苓煎湯下或搗生車前子自然汁入蜜一匙調服有利大便行而後小便利者八正散加木香熱盛莖中澀痛者導赤散加山梔大黃或麻子仁丸冷熱尉法虛損久病自汗五內枯燥及諸瘡失血過多者人參養榮湯有精竭不痛莖癢者八味丸有胃弱不能通調水道下輸膀胱及氣虛者四君子湯加黃耆升麻有脾枯亡血及勞傷血虛者四物湯氣血俱虛者八物湯痰涎阻滯氣道不通者導痰湯加升麻忿怒氣結閉遏不通者二陳湯加木香香附木通俱先服一盞後煎渣探吐以提其氣氣升則水自降矣實熱砂糖調牽牛末一二錢探吐尋常小便赤澀宜清心上熱者導赤散加黃連燈心下虛者滋腎丸上盛下虛者清心蓮子飲胞痹即寒淋小便痛引臍腹上有清涕腎著湯熱者瀉腎湯腸痹乃飧泄小便閉澀津液偏滲便宜分利而已脈法脈訣舉要曰鼻頭色黃小便必難脈浮弦澀為不小便治氣分熱小便不通方清肺飲治渴而小便閉或黃或澀邪熱在氣分也茯苓二錢豬苓澤瀉各三錢車前子一錢木通萹蓄各七分琥珀瞿麥通草燈心各二分上為末每服五錢水煎熱服蒲黃湯治心腎有熱小便不通赤茯苓木通車前子桑白皮炒荊芥燈草赤芍藥蒲黃滑石甘草各等分上為末每服二錢蔥白紫蘇煎湯調下食前服葵子散治小便不通黃蜀葵子赤茯苓各二錢上作一服水煎食前服葵子湯治膀胱實熱小便不通赤茯苓去皮木豬苓去皮葵子枳實麩炒瞿麥滑石木通黃芩車前子甘草炙各等分上㕮咀每服四錢加生薑五片水煎服海金沙散治小便淋瀝及下焦濕熱氣不施化或五種淋疾癃閉不通海金沙研木通瞿麥穗滑石通草各半兩杏仁去皮尖麩炒一兩上㕮咀每服一兩燈心二十莖水煎溫服宜氣散治小便不通臍腹急痛木通甘草各三錢梔子二錢葵子滑石各一錢上為末每服半錢燈心湯下食前木通散治小便不通小腹痛不可忍木通滑石各一兩黑牽牛頭末半兩上㕮咀每服三錢燈心十莖蔥白一莖水煎食前服雞蘇飲子治小便不通雞蘇二兩生地黃通草各四兩滑石杏仁去皮尖各二兩冬葵子一兩五錢石韋炙去毛一兩上銼以水六升煎至二升半去渣分三服空心進一服如人行四五里又進一服必通又方治小便不通冬葵子滑石各三兩通草赤茯苓各一兩茅根二兩半芒硝一兩半上細切以水六升煎至二升去渣納芒硝分作三服連進即通集驗方治小便淋瀝不通滑石半斤石韋三兩通草四兩榆莢冬葵子各半升上細切以水一斗煎取三升分作三服頓飲一方加黃芩二兩一方治男子小便不通及孕婦轉胞小便不通冬葵子山梔子炒滑石研各半兩木通三錢上作一服水煎溫服外以冬葵子滑石山梔子為末田螺肉搗膏或生蔥汁調膏貼臍中立通八珍散治大人小兒小便不利或不通大黃木通去皮滑石粉草瞿麥山梔子黃芩荊芥各等分上為末每服一錢薄荷湯調下小兒減服食前加味八正散治膀胱不利為癃癃者小便閉而不通車前子瞿麥萹蓄滑石甘草山梔子木通大黃木香各等分上銼每服三錢入燈心十莖水煎食前服五苓散治中暑脈浮發熱渴而小便不利白茯苓豬苓澤瀉白朮官桂各等分上為末每服五錢水煎服茯苓湯治胃疽陽明積熱食已輒飢面色黃瘦胃滿脅脹小便閉澀赤茯苓陳皮去白澤瀉桑白皮各三分赤芍藥白朮人參官桂各二分石膏八分上銼作一服加生薑五片水煎溫服病甚者加大黃朴硝各一錢茯苓戎鹽湯茯苓半斤白朮二兩戎鹽彈丸大一枚上三味為末白湯調下草蜜湯治心腎有熱小便不通生車前草搗取自然汁半鍾入蜜一匙調下一方治小便不通車前子草一斤水三升煎取一升半分三服一方治小便不通臍下滿悶海金沙一兩臘茶半兩上為末每服三錢生薑甘草湯調下白花散治膀胱有熱小便不通用朴硝不拘多少為細末每服二錢空心煎茴香湯調下琥珀散治老人虛人小便不通用琥珀為末每服一錢以人參茯苓煎湯空心調服或煉蜜丸如桐子大每服十丸赤茯苓湯下治血分熱小便不通方滋腎丸治下焦陰虛腳膝軟無力陰汗陰痿足熱不能履地不渴而小便閉者邪熱在血分也黃柏酒洗焙知母酒洗炒各二兩肉桂二錢上為細末熟水丸如桐子大每服一百丸加至二百丸空心白湯下通關丸治小便不通熱在下焦血分兼治諸淋黃柏知母各酒炒二兩肉桂三錢滑石二兩木通一兩上為末水丸桐子大每服百丸白湯下導氣除濕湯治小便閉塞不通乃血澀致氣不通而竅澀也知母酒洗澤瀉各三錢茯苓滑石炒黃各二錢黃柏酒洗四錢上㕮咀每服五錢水煎空心稍熱服黃連丸治因服熱藥過多小便不利諸藥莫能效者或臍下痛不可忍者黃連炒黃柏炒甘草各等分上㕮咀水煎食前溫服如更不通加知母此藥助氣使氣得化則通矣治轉胞小便不通方二石散治男婦脬轉八九日不得小便者滑石寒水石冬葵子各一盞上用水十盞煎至五盞分作二服冷熱尉法治二便祕塞或淋瀝溺血陰中疼痛此熱氣所致先以冷物尉小腹幾次後以熱物尉之又以冷物尉之自通將理自愈治氣鬱小便不通方加味二陳湯治忿怒氣結閉遏不通陳皮半夏茯苓甘草香附木通各等分上銼水煎服後煎渣探吐以提其氣二香散治氣鬱於下小便隱祕不通木香沉香各等分上為末煎陳皮茯苓湯調下空心服治血鬱小便不通方蒲灰散治汙血小便不利蒲灰七分恐即蒲黃粉滑石三分上二味為末飲服五分方寸匕日三服滑石白魚散滑石亂髮燒白魚各二分衣魚也上為末飲服五分匕日三服發灰散治臍下急滿小便不通頭髮燒灰葵子各等分上研細每用二錢米飲調服訖即炒黑豆葉蓋臍上即通桃仁煎治婦人積血小便不通桃仁大黃朴硝各二兩虻蟲半兩炒黑上為末以醇醋二升半銀石器內慢火煎取一升五合下大黃桃仁虻蟲等不住手攪良久出之丸如桐子大前一日不晚食五更初溫酒吞下五丸日午取下如赤豆汁或如雞肝等狀未下再服見鮮血即止續以調血氣藥補之樓氏曰一貴宦妻妾小便不通臍腹脹痛不可忍衆醫皆作淋治如八正散之類皆不效豫診之曰此血瘕也非顛眩藥不可去用此藥至日午大痛不可忍臥少頃下血塊如拳者數枚小便如黑豆汁一二升痛止得愈此藥猛烈太峻氣虛血弱者宜斟酌用之治痰塞小便不通方二陳湯治痰多小便不通用此探吐陳皮半夏茯苓甘草各等分上銼水煎服升麻導痰湯治痰涎阻滯氣道小便不通南星泡橘紅赤茯苓枳殼甘草各一錢半夏二錢升麻五分上銼水煎服治水氣小便不通方瓜蔞瞿麥丸治小便不利者有水氣其人若渴此方主之瓜蔞根二兩茯苓薯蕷各三兩附子一枚炮瞿麥一兩上為末煉蜜丸如桐子大每服三丸服不知增至七八丸以小便利腹中溫謂之知治虛損小便不通方人參養榮湯治久病自汗五內枯燥及諸瘡失血過多小便不利者人參當歸黃耆白朮陳皮芍藥各一錢熟地黃五味子遠志各七分白茯苓六分桂心甘草各五分上銼加生薑三片棗二枚水煎服加味四君子湯治氣虛及胃弱不能通調水道下輸膀胱致小便不通黃耆升麻人參白朮茯苓甘草炙各一錢上銼水煎服六味地黃丸治腎經虛損小便淋瀝不通熟地黃八兩乾山藥山茱萸茯苓澤瀉各四兩牡丹皮三兩上為末煉蜜丸如桐子大每服百丸空心白湯下如精竭不痛莖癢者用八味丸即本方加肉桂附子各一兩治小便不通雜方一方治小便不通用杏子仁二十一枚研爛水調分作二服效一方雞子中黃一枚服之不過三一方用麻燒灰存性為末黃酒調服登時就通一方治小便不通腹脹疼痛欲死野地蒺藜子不拘多少焙黃色為末溫酒調服一方用蚯蚓五七條研爛投涼水一碗攪勻澄清去泥滓飲水即時通大解熱疾不知人事欲死者服之立效一方治小便不通兩尺脈俱沉微乃陰虛也曾服通利之藥不效者用大附子一個重一兩者炮去皮臍鹽水浸透澤瀉切作四劑每劑燈草七根煎服一方治忍小便致胞轉自取爪甲燒灰米飲服之一方治小便不通數病而微腫取陳久筆頭一枚燒為灰和水服之一方用酸漿草搗汁入蜜同服一方用竹雞草一兩洗淨車前草一兩同於砂盆內擂爛加蜜少許無蜜加鹽少許取汁空心服小便自通竹雞草其葉如竹葉花翠藍色一方治婦人卒不得小便用紫菀末以井花水服三撮便通小便血五撮立止一方治小便不通用炒鹽熱尉小腹冷復易之或以食鹽炒熱放溫填臍中卻以艾灸七壯即時通尤妙一方治小便閟用大田螺生去殼搗細封臍上即通蔥尉法治小便難小腹脹滿不急治殺人用蔥白一斤細銼炒令熱以帕子裹分作兩處更遞尉臍下即通一方治小便難腹滿悶不急療之殺人用秦艽一兩去苗以水一大盞煎取七分去渣每於食前作兩服瘥一方治陰陽關格前後不通利大便小水自行中有轉胞之證諸藥不效無救則脹滿悶亂而死用甘遂為末水調敷臍下內以甘草節煎湯飲之藥汁至臍二藥相反而胞自轉矣小水來如湧泉此救急之良法也一方治傷寒後小便不通用生薑八九塊杵碎水十餘碗麻布五六尺同煎數沸用桶盛至候通手以布頻尉小腹良久恰用紅豆末一匕江茶二匕井花水調服神效小便如注瓜蔞散治腹脹小便不通瓜蔞不拘多少焙乾為末每服二錢熱酒米飲頻頻服以通為度一方用蔥白三寸水煎熱不用蔥入阿膠一片於湯內溶開溫服食前服
