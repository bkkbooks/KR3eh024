body:
  text: 卷四十一積聚癖塊論論曰積者陰氣也五臟所生聚者陽氣也六腑所成故陰沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚積之始發也有常處其痛不離其部上下有所終始左右有所窮處聚之始發也無根本上下無所留止其痛無常處是積聚臟腑陰陽之別也肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳逆痎瘧連歲不已心之積名曰伏梁起臍上如臂上至心下久不愈令人四肢不收發黃疸飲食不為肌膚肺之積名曰息賁在右脅下大如覆杯久不愈令人灑淅寒熱喘咳發肺癰腎之積名曰奔豚發於小腹上至心下若豚狀或上或下無時久不愈令人喘逆骨痿少氣此五積之狀各隨五臟發病故不同也有言積聚者有言癥瘕者有言痃癖者名雖異而病則同也原其所得之由本因六淫七情所幹積久而成也治療之法當察其所痛以知其病有餘不足可補則補可瀉則瀉無逆天時詳臟腑之高下辨積聚之虛實如寒者溫之結者散之客者除之留者行之堅者削之又當節飲食慎起居和其中外使可畢已若驟以大毒之劑攻之積不能除反傷真氣終難治矣故潔古云養正積自除此之謂也小兒癖疾如蛇如豬肝內有血孔通貫外有血筋盤固直通背脊下與臍相對有動脈處為癖之根李東垣曰諸積皆本於喜怒傷臟而陰虛陰既虛矣則風雨襲陰之虛病起於上而生積清濕襲陰之虛病起於下而成積許學士云治積之法或以所惡者攻之或以所喜者誘之則易愈如硇砂水銀治肉積神麯麥芽治酒積水蛭治血積木香檳榔治氣積牽牛甘遂治水積雄黃膩粉治痰積礞石巴豆治食積各從其類也若用群隊之藥分其勢則難取效須要認得分明是何積聚兼見何證然後增加佐使之藥不爾反有所損要在臨時通變也潔古云壯人無積虛人則有之皆由脾胃怯弱氣血兩衰四時有感皆能成積若遽以磨堅破結之藥治之疾似去而人已衰矣乾漆硇砂三稜牽牛大黃之類得藥則暫快藥過則脾胃之真氣消疾暫愈竟何益哉故善治者當先補虛使血氣壯積自消如滿朝皆君子則小人自無容地也不同何臟先調其中使能飲食是其本也根固則積聚自消矣蔭按葉氏曰按潔古養正積自除之語乃為世之治積者好行攻伐之劑故發此以救時之弊也然人之積氣有微甚不同積之微者但養其正正勝則積自消譬之鼠竊狗偷之盜朝政清明彼將自散矣苟或積氣之甚難養其正恐日積月纍之邪根深基固欲其潛消默散不可得也必攻補兼施然後可譬之恃險負固之盜非王化所能服必張我六師以伐之如高宗之於鬼方攻之而克也故治積之法不養其正而徒為攻擊則正氣愈虛邪氣猶在固不可也若養其正而於邪之甚者遂謂其能自除不復攻之亦不可也變而通之存乎其人丹溪曰塊是有形之物氣不能成塊乃痰與食積死血也在中為痰右為食積左為血積大法咸以軟之堅以削之行氣開痰為主治塊用海石三稜莪朮香附俱醋煮桃仁紅花五靈脂之類為丸石鹼白朮湯下蜀葵根煎湯入人參白朮青皮陳皮甘草梢牛膝煎成膏入細研桃仁玄明粉各少許熱飲二服當見塊下重者須補劑後再加減行石鹼去痰積食積洗滌垢膩有功瓦楞子能消血塊亦能消痰瓦楞子即蚶殼也考之本草云蚶殼如屋瓦燒以醋淬三度埋令壞醋膏丸治一切血氣癥瘕積塊不可專用下藥徒損真氣病亦不去當消導使融化行死血塊塊去須大補婦人有塊多是死血凡痞塊在皮裡膜外須用補氣藥及香附開之兼二陳湯先須斷厚味葉氏曰氣無形故不成塊然痰與食積死血多因氣滯而成是氣雖不為塊而所以為塊者實由於氣故治積之法以行氣為先戴氏曰積聚癥瘕有積聚成塊不能移動者是症或有或無或上或下或左或右者是瘕飲癖成塊在腹脅之間病類積聚用破塊藥多不效宜行其飲導痰湯何以知其有飲其人先病口吐涎沫清水或素多痰者是也腹中自若癖瘕隨氣上下未有定處宜散聚湯有正當積聚處內熱如火漸及四肢一日數發二三日又愈此不當攻其熱有原得熱病熱結不散遂成症癖此當兼用去熱之劑李氏曰經云積聚癥瘕痞滿皆太陰濕土之氣始因外感內傷氣鬱而醫誤補留之以成積積者陰氣五臟所主脈沉伏或左或右發有根痛有常處肝積左脅下曰肥氣言風氣有餘而血隨氣不行也令人脅痛痎瘧心積臍上曰伏梁言如梁之橫架心下令人煩心乃火之郁也忌熱藥與灸又腸癰與此相似但身股背腫環臍而痛為癰脾積胃脘稍右曰痞氣言陽氣為濕所蓄也令人黃疸倦怠飲食不為肌膚仍忌熱藥肺積右脅下曰息賁言喘息奔而上行也令人咳嗽肺癰腎積發於小腹或湊心下曰奔豚言若豚之奔沖上下無時也令人喘逆骨痿最為難治諸積勿輕吐下徒損真氣積亦不去奔豚尤不可吐五積古有五方今增損五積丸更妙聚者陽氣六腑所成脈沉結或隱或見發無根痛無常處散聚湯七氣湯香積丸大阿魏丸大安丸加參左屬死血破血為主海石丸或當歸龍薈料五錢加桃仁薑黃各一兩蜜丸右屬氣積調氣為主青皮湯木香分氣丸有積者消積正元散紅丸子小阿魏丸或當歸龍薈丸保和丸俱加鵓鳩屎中乃水穀出入之路飲食七情鬱積成痰石𨢑丸白芥丸積初為寒宜辛溫消導大七氣湯烏臼丸大小溫中丸退黃丸阿魏撞氣丸久則為熱宜辛寒推蕩木香檳榔丸通元二八丹消塊丸通用纂積丹有蟲者妙應丸外治三聖膏三稜煎神效阿魏散陽虛者有積易治惟陰虛難以峻補痞積又忌滯藥止宜早服滋補藥加鱉甲龜板秋石丹午服枳朮丸大安丸或醋鱉丸善消融化為妙若痞積滯冷貫臍誤為沉寒冷痼投以姜附熱藥初服甚與病情相宜久則痞積益甚真氣傷而陰血燥矣其硫附固不可服如知柏門冬寒涼傷脾滯氣亦所不宜古云衰其大半而止又云養正積自除皆為虛損有積而言也平補之外更能斷厚味節色欲戒暴怒正思慮庶乎萬全或問人有積塊疝氣心腹痛等證者雖多服久服附子薑桂等熱藥而不發藥毒不生他病然本病日深者何也王節齊曰諸積諸痛喜溫而惡寒熱藥與病情相合積久成鬱而火邪深矣鬱熱既深則見寒愈逆則見熱愈喜兩熱相從故不生他病所謂亢則害承乃制火極而似水者也然真氣被食陰血乾枯病日深痼而不可為矣世人不識但見投熱不熱認為深寒冷痼而益投之至死不悟悲夫然則治之當如何曰當與從治法內經曰熱因寒用寒因熱用伏其所主先其所因者是也蔭按張雞峰云人之臟腑皆因觸冒以成疾病而脾胃最易受觸蓋日用飲食稍或過多則停積難化冷熱不調則吐嘔泄痢膏粱者為尤甚蓋口腹恣縱不能謹節近用消化藥或論飲食既傷於前難以毒藥反攻其後不復使巴豆硇砂等藥止用麴櫱之類不知古今立方用藥各有主對麴櫱止能消化米穀如肉食有傷則非硇砂阿魏等藥不能治也至於魚蟹過傷則須用橘皮紫蘇生薑果菜有傷則須用丁香桂心水飲傷則須用牽牛芫花固不可一概論也必實其所傷之因對用其藥則無不愈其間輕重則隨患人氣血以增之而已又有一等虛人沉積不可真取當以蠟匱其藥蓋蠟能黏逐其病又可久留腸胃間又不傷氣能消磨至盡也又有脾氣偏虛飲食遲化者止宜助養脾胃則自能消磨不須用克化藥耳病久成積聚癥瘕者須用三稜鱉甲之類寒冷成積者輕則附子厚朴重則礬石硫黃瘀血結塊者則用大黃桃仁之類醫者宜審用之宜慎用之不可大意又按吳氏曰伏翼屎即天鼠之類也又名夜明砂古人治血積每用水蛭虻蟲輩以其善吮血耳然其性毒人多患之而伏翼屎者食蚊而化之者也蚊之吮血不減蛭虻亦可以攻血積本草稱其能下死胎則其能攻血塊也何疑書此以待同志者用之可耳蔭又按症者徵也腹中堅硬按之應手曰癥瘕者猶假也腹中雖硬而忽聚忽散無有常處曰瘕症因傷食瘕是血生痃者在腹內近臍左右各有一條筋脈急痛如臂如指如弦之狀癖者僻側在兩脅之間有時而痛曰癖夫痃之與癖皆陰陽不和經絡痞隔飲食停滯不得宣流邪冷之氣搏結不散得冷則發作疼痛故曰痃癖也大抵積之初固為寒而積之久則為熱矣學者必須分新久之義以施治脈法脈經曰脈來細而附骨者積也來在寸口積在胸中微出寸口積在喉中在關上積在臍傍上關上積在心下微下關積在小腸尺微積在氣衝脈出在右積在右脈出在左積在左脈兩出積在中央各以其部處之也脈來小沉而遲者脾胃中有積聚不下食食則吐肺積脈浮而毛按之辟易心積脈沉而芤上下無常處肝積脈弦而細腎積脈沉而急脈沉重而中散者因寒食成積脈左轉而沉重者氣症積胸中脈右轉出不至寸口者內有肉瘕也又曰左手脈洪症在左右手脈洪症在右頭大者在上頭小者在下脈遲而滑中寒有癥結偏得洪實而滑為積弦緊亦為積為寒痹為疝痛內有積不見脈難治見一脈相應為易治諸不相應為不治脈弦腹中急痛腰背痛相引腹中有寒疝瘕脈弦緊而微細者症也夫寒痹廣癥瘕積聚之脈皆弦緊若在心下即寸弦緊在胃脘即關弦緊在臍下即尺弦緊脈弦小者寒痹診人心腹積聚其脈堅強急者生虛弱者死脈弦而伏者腹中有症不可轉也必死不治脈訣舉要曰胸痞脈滑為有痰結弦伏亦痞澀則氣劣肝積肥氣弦細青色心為伏梁沉芤色赤脾積痞氣浮大而長其色脾土中央之黃肺積息賁浮毛色白奔豚屬腎沉急面黑五臟為積六腑為聚積在本位聚無定處其脈浮牢小而沉實或結或伏為聚為積實強者生沉小者死生死之別病同脈異脈理提綱曰郁脈沉澀積脈弦堅通治一切積聚方仙方香殼丸破痃癖消症塊及冷積木香丁香並不見火各五錢京三稜酒浸一宿青皮去白枳殼麩炒川楝子茴香炒各一兩莪朮一兩切酒浸一宿將三稜莪朮同去殼巴豆三十粒同炒巴豆黃色去巴豆不用上為細末醋糊丸如桐子大用硃砂為衣每服五十丸用薑湯或鹽湯溫酒不拘時任下荊蓬煎丸治癥瘕痃癖冷熱積聚宿食不消嘔吐辛酸久服通利三焦升降陰陽順氣消食京三稜二兩酒浸冬三日夏一日蓬莪二兩切醋浸冬三日夏一日已上二味同以去殼巴豆二十個銀器內炒令黃色去豆不用木香不見火枳殼麩炒青皮去穰茴香微炒檳榔各一兩上為細末姜糊為丸如豌豆大每服三五十丸白湯或生薑湯下食遠服香稜丸治五積六聚氣塊三稜莪朮泡或醋炒青皮陳皮枳殼炒枳實炒蘿蔔子炒香附子黃連神麯炒麥芽炒鱉甲醋炙乾漆炒煙盡為度桃仁杏仁硇砂歸尾木香甘草炙各一兩檳榔六兩山楂四兩上為細末醋糊丸如桐子大每服三五十丸白湯下磨積三稜丸治遠年近日諸般積聚癖痃氣塊或氣積酒積諸般所傷無問男子婦人老幼並宜服之木香不見火麥芽京三稜炮莪朮炮枳殼麩炒石三稜麩皮杏仁麩炒各半兩葛根三錢乾漆炒煙盡三錢雞爪三稜半兩黑牽牛半生半熟白牽牛半生半熟各半兩官桂二錢半丁香香附子縮砂青皮去穰各二錢陳皮去白五錢上為末醋糊丸如桐子大每服二十丸生薑湯下食後溫水下亦得日二服病大者四十日消木香通氣丸治痃癖氣滯心腹痞滿嘔逆咳嗽順氣消痰進飲食消痞人參木香各一兩半元胡索一兩陳皮檳榔黑牽牛各六兩丁香各半兩三稜炮莪朮炮各三兩半夏制茴香炒木通神麯麥芽各二兩青皮一兩上為末水糊丸如小豆大每服三四十丸薑湯下食後日二服元胡索丸治吐利腹脹心腹痛癥瘕氣結心頭不安順三焦和脾胃元胡索當歸青皮去白雄黃飛另研莪朮炮木香檳榔京三稜炮各四兩上為細末入雄黃末水糊丸如桐子大每服六七十丸薑湯下大阿魏丸去諸積南星皂角水浸半夏炮山楂神麯麥芽黃連各一兩連翹阿魏醋浸瓜蔞仁風化硝貝母各五錢石鹼胡黃連白芥子各二錢半蘿蔔子一兩蒸上為末薑汁浸炊餅為丸如桐子大每服三十丸白湯下一方加香附蛤粉治嗽白芥丸治男婦食積死血痰積成塊在兩脅動作腹鳴嘈雜眩暈身熱時作時止白芥子蘿蔔子各一兩半山梔川芎三稜莪朮桃仁香附山楂神麯各一兩青皮五錢黃連一兩半一半用於吳茱萸水炒一半用砂仁水炒上為末蒸餅為丸如桐子大每服七八十丸白湯下千金不換內消丸專治積聚氣蠱胸膈膨脹肚腹飽滿心肋緊束等證蒼朮半斤米浸浸去皮枳殼一兩半溫水浸麩炒青皮水浸去穰三稜醋煮去毛蓬莪醋煮香附炒去毛大茴香炒乾漆醋炒煙盡藿香洗去土陳皮各一兩厚朴姜研砂仁炒去皮破故紙各一兩二錢豬牙皂角去皮弦黑牽牛各二兩草果一兩去皮百草霜一兩上十七味為細末麵糊為丸如桐子大每服七十丸量人稟氣飲食厚薄加減臨臥好酒或茶清或鹽湯白湯任下或不拘時照依前丸數湯引服之暫得一二時間便食飯飲酒自覺肚腹內寬快不分多寡服並無肚腹響泄有健體扶陽之益及治小兒五六歲以上飲食停滯飽滿便用十數丸已上增添咬碎用茶清米湯送下服之即愈此丸男女皆可服惟孕婦不可服破積導飲丸治內有積塊堅硬飲食不消心下痞悶木香檳榔青皮去白陳皮去白枳殼麩炒枳實麩炒莪朮炮半夏湯洗七次神麯炒麥芽炒茯苓乾薑澤瀉甘草炙各五錢牽牛頭末六錢巴豆三十枚去油皮心膜另研上為細末入巴豆霜令勻生薑汁打麵糊為丸如桐子大每服三十丸薑湯下食前莪朮潰堅湯治中滿腹脹內有積塊堅硬如石令人坐臥不安半夏泡七次黃連各六分當歸梢厚朴黃芩各五分莪朮神麯各三分甘草生三分益智仁七分紅花橘皮去白升麻各二分柴胡澤瀉吳茱萸各三分青皮二分如虛渴加葛根二分上㕮咀都作一服水二盞先浸藥少時煎至一盞去渣稍熱服食前忌酒濕面治寒積方大七氣湯治五積六聚狀如癥瘕隨氣上下發作有時心腹疼痛上氣壅塞小腹脹滿大小便不利益智陳皮去白蓬莪京三稜青皮去穰桔梗去殼香附炒去毛藿香葉肉桂各一錢半甘草炙一錢上作一服用水二鍾生薑三片煎至一鍾食前服枳殼散治五種積氣三焦痞塞胸膈滿悶嘔吐痰逆口苦吞酸常服順氣寬中除痃癖消積聚枳殼麩炒益智陳皮京三稜莪朮檳榔肉桂各一錢肉豆蔻厚朴青皮去穰木香不見火乾薑各五分甘草炙五分上作一服水二鍾生薑三片紅棗二枚煎至一鍾不拘時服散聚湯治九氣積聚狀如癥瘕隨氣上下發作有時心腹絞痛攻刺腰脅小腹䐜脹大小便不利半夏湯泡七次檳榔川歸各四分陳皮桂心杏仁去皮尖麩炒茯苓各一錢甘草附子泡去皮臍川芎各五分枳殼去穰麩炒厚朴薑製吳茱萸各一錢半大便不利加大黃酒浸一錢上作一服入生薑三片水煎食遠服蔭按此方名散聚者所以散六腑之聚氣耳益中氣之道熱則弛張弛張弗聚也寒則收引收引則氣斯聚矣故桂心附子吳茱萸辛熱之品也半夏陳皮辛溫之品也川芎當歸杏仁辛潤之品也辛則能散聚熱則能壯氣溫則能和中潤則能澤六腑乃茯苓甘草之甘平可以使之益胃而檳榔枳殼厚朴大黃則皆推陳之品故曰散聚流氣丸治五積六聚癥瘕塊癖留飲以上之疾皆系寒氣客搏於腸胃之間久而停留變成諸疾此藥能消導滯氣通和陰陽消舊飲雖年高氣虛亦宜服之木香川茴香炒紅橘皮去白菖蒲青皮去白蘿蔔子炒莪朮泡檳榔補骨脂炒神麯炒枳殼去穰麩炒蓽澄茄縮砂麥糵曲炒各一兩牽牛炒一兩半上為末水糊丸如桐子大每服五十丸細嚼白豆蔻仁一枚送下食後雞爪三種丸治五臟痃癖氣塊年深者一月取效雞爪三稜石三稜京三稜木香青皮去白陳皮去白各半兩硇砂三錢檳榔肉豆蔻各一兩上為細末生薑汁打麵糊為丸如桐子大每服二十丸生薑湯下空心臨臥各一服忌一切生冷硬黏物硇砂煎丸消磨積塊痃癖一切凝滯老人虛人無妨黑附子二個各重五錢已上者炮切去皮臍剜作盆子木香三錢蓽撥一兩硇砂三錢用水一盞陸續化開納在盆內火上熬干破故紙一兩膈紙微炒上將飛過硇砂末封在附子盆內卻用剜出附子末蓋口用和成白麵約半指厚慢火灰內燒勻黃色去面用木香等為細末卻用原裹附子熟黃面為末醋調煮糊為丸如桐子大每服十五丸至三十丸生薑湯送下此藥內有奇功勝紅丸治脾積氣滯胸膈滿悶氣促不安嘔吐清水大人酒積婦人脾血積小兒食積並皆治之陳皮莪朮二味同醋煮青皮三稜乾薑炮良薑各一兩香附子炒去皮二兩上為末醋糊丸如桐子大每服二十丸生薑湯送下治症丸治丈夫女人小兒年深日近沉積瘕塊面色青黃時上搶心吐水吞酸舌生白沫婦人積年月經不調漸成血氣或血蠱塊中焦之間覆如杯碗連年纍月漸成瘦瘠寒熱往來一切脾胃受寒久不瘥愈之疾並皆治之巴豆五兩去油膜蓬朮三兩醋炙透京三稜三兩醋炙透丁香皮二兩木香一兩半丁香一兩半厚朴三兩制石菖蒲二兩良薑一兩半虻蟲炒一兩半川牛膝一兩香附子四兩炒石蓮子肉二兩薏苡仁一兩使君子三兩去殼上為細末稀麵糊為丸如緑豆大積年癥瘕成塊者第一服用熟水下二十丸自後每日三丸五丸更量虛實加減與之五日去盡積塊若近脾胃有積者每服五丸米飲吞下一服取效婦人血氣成塊及血瘕每服二十丸用蘇木酒童子小便各一半煎五七沸令溫空心吞下自後每日用溫酒下三丸其血塊逐旋消從大小便去盡自知小兒蛔蟲腹痛不能忍日夜叫喚百藥不救者陳皮湯下七丸立效諸蟲皆宜下常服或白湯或薑湯下三五丸中酒及酒積大便鮮臭者白湯與酒各半吞十丸立效如神一切咽塞心下硬痛皆用棗湯下五丸不拘時候木香三稜丸治一切氣悶胸膈痞滿榮衛不和口吐酸水嘔逆噁心飲食不化脅肋疼痛無問久新並皆治之青木香破故紙茴香黑醜甘遂芫花大戟京三稜莪朮川楝子胡蘆巴巴戟各一兩巴豆去皮心不去油二錢陳倉米二合與巴豆同炒黑砂仁一兩半上細切用好米醋二升除砂仁木香外余藥入醋中浸一宿入鍋內煮醋乾盡為度同木香砂仁為細末醋麵糊為丸如江豆大每服五丸或七丸食後服看虛實大小加減丸數隨湯水任下治熱積方硝石丸又名消塊丸治癥瘕痞塊當先下此藥不令人困須量體虛實又治帶下絶産硝石六錢大黃八錢人參甘草各三錢上各為末用陳醋三升置瓷器內先納硝黃不住手攪煮候將干卻下參甘二末和勻為丸如桐子大每服三十丸米湯下四日一服候下如雞肝米泔惡物赤黑色等效下後忌風冷軟粥將息醋煮三稜丸治一切積聚不拘遠年近日治之神效京三稜三兩醋煮透竹筍切曬乾川芎二兩醋煮大黃半兩醋煮濕紙裹煨過上為末醋糊為丸如桐子大每三十丸溫水下不拘時病甚者一月效小者半月效神功助化散治男子婦人腹中痞塊不拘氣血食積所成此方之妙不可盡述地萹蓄五錢瞿麥穗五分神麯二錢半沉香木香各一錢半甘草五分大黃二兩上為細末淨依分兩和勻男以甘草淡竹葉二味等分煎湯及無灰酒同調服酒多於湯婦人用紅花燈心當歸等分煎湯及無灰酒同調服酒多於湯忌油膩動氣之物及房事一月藥須用黃昏服大小便見惡物為度神妙非常誓不輕傳匪人聖散子治遠年積塊及婦人乾血氣硇砂六兩大黃八兩麥芽六兩乾漆燒過萹蓄茴香炒檳榔各一兩如婦人乾血氣加穿山甲二兩炮上為細末每服三錢溫酒調下仰臥此藥只在心頭至天明大便如魚腸小便赤為驗取出並無毒有神效小兒用一錢十五已上五錢空心服之更效遇仙丹治邪熱上攻痰涎壅滯翻胃吐食十膈五噎齁哈酒積蟲積血積氣塊諸般痞積瘡熱腫痛或大小便不利婦人女子面色痿黃鬼注癥瘕誤吞銀鐵銅物悉皆治之此藥有積去積有蟲去蟲不傷元氣亦不損傷臟腑功效不能盡述白牽牛半生半熟頭末四兩白檳榔一兩茵陳五錢蓬朮五錢醋煮三稜五錢醋煮牙皂五錢炙去皮弦上為細末醋糊為丸如緑豆大每服三錢五更時用冷茶下天明可看去後之物數服行後隨以溫粥啖之忌食他物木香和衷丸消腸胃中積聚癥瘕癖塊宣暢三焦開利胸膈主治氣逆上攻心胸脅肋脹滿痞痛四肢六脈拘急身體困倦潤大便利小便和脾氣進飲食木香去腐沉香檳榔枳殼去穰莪朮去皮青皮去穰陳皮去白當歸酒浸黃芩去腐木通去皮黃連去須白豆蔻三稜去皮牙皂連子醋炙郁李仁去皮各一兩大黃蒸四兩縮砂二兩半黃柏去粗皮香附去毛各三兩牽牛末二兩或四兩上為末水丸如桐子大每服一錢半加至三錢生薑湯下或茶酒亦得不拘時候通玄二八丹治積聚止泄痢除拘急之妙藥黃連半斤淨芍藥當歸生地酒炒烏梅各五錢上為末用雄豬肚一個以藥盛於內以線縫之用韭菜二斤鋪底面於鍋內蒸之候湯干再添候蒸一日以藥熟為度就豬肚共用石杵舂搗之糜爛為丸如桐子大每服七十九如治積聚侵晨用薑湯服之稍瀉一二次即除以溫粥補住之如治瀉痢飯後用茶清服之即止此丸以薑湯服之則行以茶清行之則止積聚即肚腹飲食宿滯等疾宣毒丸大黃青皮陳皮蒼朮當歸去頭各一兩黑牽牛四兩上為末煮蘿蔔丸如桐子大每服五十丸溫水臨臥下米粥補之全真丸治三焦氣壅結痞心胸大便不通傷寒下證已服承氣不利服此安穩而通川大黃南枳殼麩炒檳榔黑牽牛半生半熟各半兩上為細末滴水為丸如桐子大每服五七十丸米飲下解毒檳榔丸治男子婦人嘔逆酸水痰涎不利大便膿血口苦煩躁涕唾稠黏嗽血血崩腹脹氣滿手足痿弱四肢無力酒疸食黃口舌生瘡寒熱往來瘧疾腸風痔瘻癥瘕血積諸惡瘡疔疽並皆治之檳榔黃連青皮陳皮木香沉香巴戟去也酒浸當歸白朮枳殼香附子炒甘草炙大黃各二錢半黃柏七錢半牽牛末一兩上為細末滴水為丸如桐子大每服七十丸薑湯下取積丹用好大黃不以多少為末用好酸醋煮膏子為丸如桐子大每服一百丸量虛實大小休吃晚飯用好墨研濃好酒送下次日見膿治暴積方大承氣湯丹溪云一人年六十素好酒八月間因暑熱中得疾兩足冷遏膝上脘有塊如掌牽引脅痛不可眠臥飲食減半卻不渴診之六脈俱沉澀而小按之不為弱皆數而右為甚大便如常小便赤色遂用大承氣湯減大黃之半而熟炒加黃連芍藥川芎乾葛甘草作湯下瓜蔞仁半夏黃連貝母凡至十二貼足冷退至脛塊減半遂止藥至半月飲食復舊諸證悉除承氣湯方見傷寒等門杉木湯柳宗元纂救死方元和十二年二月得腳氣夜半痞絶脅有塊大如石且死因大寒不知人三日家人號哭滎陽鄭詢美傳杉木湯服半食頃大下三次氣通塊散杉木節一大升橘葉一大升無葉以皮代之大腹檳榔七個上合一處搗碎用童便三大升共煮取一升半入二服若一服得快利停後服肘後方治卒暴症腹中有如石刺痛用牛膝一大把並葉酒煮飲之一方治卒暴症腹中有物堅如石痛欲死取蒴藋根一小束洗瀝去水細擘以酒二升漬三宿暖溫服五合至一升日三若欲速得服於熱灰中溫令藥味出服之此方無毒神效上四方所謂暴積急去之如塊除後必用補劑以救其受攻之傷也治久積方萬病紫菀丸療臍腹久患痃癖如碗大及諸黃病每地氣起時上氣衝心繞臍絞痛一切蟲咬十種水病十種蟲病及反胃吐食嘔逆噁心飲食不消天行時病女人多年月經不通或腹如懷孕多血天陰即發又治十二種風頑痹不知年歲晝夜不安夢與鬼交頭多白屑或哭或笑如鬼魅所著腹中生瘡腹痛服之皆效紫菀去苗土吳茱萸湯洗七次焙乾菖蒲柴胡去須厚朴薑製各一兩桔梗去蘆茯苓去皮皂英去皮子炙桂枝乾薑炮黃連去須蜀椒去目及閉口微炒出汗巴豆去皮膜油炒人參去蘆各五錢川烏炮去皮臍三錢羌活獨活防風各一兩上為細末入巴豆研勻煉蜜丸如桐子大每服三丸漸加至五丸七丸生薑湯送下食後臨臥服有孕者不宜服痔漏腸風酒下赤白痢訶子湯下膿血痢米飲湯下墮傷血悶四肢不收酒下蛔蟲咬心檳榔湯下氣噎膈噎荷葉湯送下打撲傷損酒送下中毒掃帚灰甘草湯送下一切風升麻湯送下寸白蟲檳榔湯下霍亂乾薑湯下咳嗽杏仁湯下腰腎痛豆淋酒下陰毒傷寒溫酒下吐逆生薑湯送下飲食氣塊麵湯下時氣井花水下脾風陳皮湯下頭痛水下心痛溫酒下大小便不通燈草湯下因物所傷以本物湯下吐水梨湯下氣病乾薑湯下小兒天吊風搐防風湯下小兒疳痢蔥白湯下小兒乳食傷白湯下月信不通紅花酒下婦人腹痛川芎酒下懷孕半年後胎漏艾湯下有子氣衝心酒下産暈痛溫酒下血氣痛當歸酒下産後心痛腹脹滿豆淋湯下難産益智湯下産後血痢當歸湯下赤白帶下酒煎艾湯下解內外傷寒粥飲下室女血氣不通酒下子死腹中菜子湯下又治小兒驚癇大小癲狂一切風及無孕婦人身上頑麻狀如蟲行四肢俱腫呻吟等疾楊駙馬患風氣衝心飲食吐逆遍身枯瘦日服五丸至二十日瀉出肉塊如蛤蟆五六枚白膿二升愈趙侍郎先食後吐目無所見耳無所聞服五十丸瀉出青蛇五六條四寸許惡膿三升愈王氏患大風病眉墮落掌內生瘡服之半月瀉出癩蟲二升如馬尾長寸許後愈李靈患肥氣病日服五丸經一年瀉出肉鱉二枚愈茹黃門卒中風病發時服藥泄出惡膿四升赤黃水一升一肉蟲如亂髮愈李知府妻梅氏帶下病七年血崩不止骨痿著床日服五丸至十丸十五丸取下膿血五升黃水一升肉塊如雞子狀愈此藥治一切萬病如神惟初有孕者不宜服萬病丸療八種痞病五種癇病十種疰忤七種飛尸十二種蠱毒五種黃病十二種瘧疾十種水病八種大風十一種痹並風入頭眼翳膜漠漠及上氣咳嗽喉中如水雞聲不得臥飲食不作肌膚五臟滯氣積聚不消壅閉不通心腹脹滿及胸背鼓脹氣結四肢流入胸腹又治心膈氣滿時定時發十年二十年不瘥五種下痢疳蟲蛔蟲寸白諸蟲上下冷熱五種痰飲令人多眠睡消瘦無力蔭入骨髓便成漏疾身體氣腫飲食嘔逆腰腿痠疼四肢沉重不能久行久立婦人因産冷入子臟臟中不淨或閉塞不通胞中瘀血冷滯出流不盡時時疼痛為患或因此斷産並小兒赤白下痢及狐臭耳聾鼻塞等病此藥以三丸為一劑不過三劑其病悉除說無窮盡故稱萬病丸牛黃研細黃芩去蘆芫花醋炒赤禹餘糧醋淬研飛雄黃研飛川芎人參去蘆紫菀去蘆頭醋炒蒲黃微炒麝香研當歸去蘆桔梗去蘆大戟銼炒乾薑炮防風去蘆黃連去須硃砂研飛犀角鎊前胡去蘆巴豆去皮心膜炒細辛去苗葶藶炒肉桂去粗皮茯苓去皮桑白皮炒芍藥川椒去目及閉口微炒出汗甘遂各一兩蜈蚣二十二節即去頭足炙石蜥蜴去頭尾足炙四寸芫青二十八枚入大米同炒黃色去頭足上為細末入研藥勻煉蜜為丸如豆大近病及卒病多服積病久疾即少服常服微溏利為度若一歲已下小兒有疾者令乳母服兩小豆大亦以吐利為度卒病欲死服三丸取吐利即瘥卒中惡口噤服二丸漿水下即瘥五疰鬼刺客忤服二丸男女邪病歌哭腹大妊娠者服二丸日三夜一間食服之蠱毒吐血腹如刺服二丸不瘥更服瘧病未發前服一丸未瘥更服諸有痰飲者服三丸冷癖日三服每服三丸皆間食常令微溏利宿食不消服二丸取利癥瘕積聚服二丸日三服拘急心腹脹滿心痛服三丸上氣嘔逆胸膈滿不得臥服二丸不瘥更服大痢服二丸日二服疳䘌服二丸或一丸如杏仁大和醋二合灌下部中水病服三丸日再服間食服之瘥止人弱即隔日服頭痛惡寒服二丸覆取汗傷寒天行服二丸日三服間食服之小便不通服一丸不瘥明日更服大便不通服三丸又納一丸下部中即通耳聾急以棉裹如棗核塞之鼻衄服一丸癰腫疔腫破腫納一丸如麻子大日一敷之赤根自出犯疔腫血出以豬脂和塗有孔則納中瘥癩瘡以醋泔洗訖取藥和豬脂敷之漏瘡有孔以丸納孔中和豬脂敷上痔瘡塗綿箸上納孔中即瘥瘰癘以醋和塗上瘥癬瘡以布揩令汗出以醋和塗上日一易瘥胸背腰脅腫以醋和敷上日一易又服二丸諸冷瘡積年不瘥者以醋和塗之惡刺以一丸納瘡孔中即瘥蝮蛇螫以少許納螫處若毒人腹心煩欲絶者服三丸蜂螫以少許敷之瘥婦人諸疾胞衣不下服二丸小兒驚癇服一丸如米許以塗乳令嗍之以意量之蠍螫以少許敷之瘥小兒乳不消心腹脹滿服一丸如米許塗乳頭令嗍之即瘥乾柿丸取虛實積下膈甚妙硃砂研為衣沒藥研豬牙皂角去皮弦子為細末乾薑炮為末乾漆炒煙盡為末京三稜炮為末青礞石煨為末各一錢水銀一錢鉛一錢炒結砂子輕粉一錢巴豆三十枚去皮膜醋煮十沸上件各研勻軟飯和為丸如緑豆大煎柿蒂湯冷下三五丸加減用婦人有胎不可服神效五食湯取虛實積食氣蠱脹滿積塊水氣年深癖症並皆治之大戟刮去皮甘遂生各半兩豬牙皂角去皮子生用胡椒生各一兩芫花米醋浸一宿一兩巴豆去心膜醋煮二十沸研半兩上除巴豆外杵為末入巴豆再研勻水煮麵糊為丸如緑豆大每服五七丸氣實者十丸夜臥用水一盞入白米白麵黑豆生菜豬肉各少許煎至半盞去渣溫湯下藥取下病忌油膩黏物婦人有胎不可服妙香丸治久遠沉積巴豆取淨三百五十粒炒牛黃片腦膩粉辰砂九兩麝香各七錢半金箔九十個拔萃方無金箔有水銀硇砂按硇砂不可輕用煉不精則殺人慎之上研極細煉臘六兩入蜜七錢半同煉令勻每兩作三十丸每服一丸小兒緑豆大二丸白湯下每吞此丸即成粒從大便出須於初丸時以針穿眼用之庶使藥氣行而成利下之功也治五積方肥氣丸治肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發痎瘧連歲不已厚朴半兩黃連七錢柴胡二兩椒去目閉口不用四錢巴豆霜五分川烏炮去皮臍一錢二分皂角去皮子弦煨一錢半乾薑五分白茯苓一錢半白朮炮昆布人參各二錢半甘草炙三錢上件除茯苓皂角巴豆另末外為極細末和勻煉蜜為丸如桐子大初服二丸淡醋湯下食遠一日加一丸二日漸加兩丸漸至大便微溏再從二丸加服周而復始積減大半勿服秋冬加厚朴一半通前重一兩減黃連一錢半伏梁丸治心之積名曰伏梁起臍上大如臂上至心下久不愈令人煩心黃連一兩半厚朴制人參各半兩黃芩三錢桂一錢乾薑巴豆霜菖蒲各五分紅豆二分川烏頭炮五分茯神丹參炒各一錢上件除巴豆霜外為細末另研豆霜旋入和勻煉蜜為丸如桐子大服如上法淡黃連湯下食遠秋冬加厚朴半兩通前共一兩減黃連半兩只用一兩黃芩不用痞氣丸治脾之積名曰痞氣在胃脘右側覆大如盤久不愈令人四肢不收發黃疸而飲食不為肌膚厚朴四錢半黃連八錢吳茱萸三錢黃芩二錢白茯苓澤瀉人參各一錢川烏頭炮川椒炒各五分茵陳酒炒乾薑炮砂仁各一錢半白朮二分巴豆霜另研桂各四分上除豆霜另研茯苓另末旋入外同為細末煉蜜丸如桐子大服如上法淡甘草湯下食遠息奔丸治肺之積名曰息賁在右脅下大如覆杯久不愈令人灑淅寒熱喘咳發肺癰厚朴薑製八錢黃連炒一兩三錢乾薑炮白茯苓川椒炒去汗紫菀各一錢半桂川烏頭炮去皮臍桔梗白豆蔻陳皮京三稜炮人參二錢天門冬各一兩青皮五分巴豆霜四分上除茯苓巴豆霜各另研旋入外為細末和勻煉蜜丸如桐子大服如上法淡生薑湯下食遠秋冬加厚朴五錢減黃連七錢奔豚丸治腎之積名由奔豚發於小腹上至心下若豚狀或上或下無時久不愈令人喘逆骨痿少氣及男子內結七疝女人瘕聚帶下厚朴薑製七錢黃連五錢白茯苓澤瀉川烏頭菖蒲各二錢丁香各五分苦楝酒煮三錢全蠍元胡索一錢半附子獨活各一錢桂二分巴豆霜四分上除茯苓巴豆霜另為末旋入外余藥為細末煉蜜丸如桐子大服如上法淡鹽湯下食遠服蔭按已上諸方宜隨證加減用之所謂益元氣瀉陰火破滯氣削其堅也如積勢堅大先服前藥不減於一料中加存性牡蠣三錢疝帶勿加如大積大聚消其大半乃止藥過劑則死儻如積滿腹或半腹先治其所起是何積當先服本臟積藥諸疾自愈是治其本也余積皆然儻如服藥人覺熱加黃連覺氣短加厚朴覺悶亂減桂蔭又按東垣百世之師也其制肥氣等丸五方以治五積率以攻下溫熱之品類聚為丸夫五臟積氣闢在腸胃之外而用巴霜厚朴峻劑以攻腸胃之內非其治也皆曰東垣方余直以為非東垣之劑也借曰東垣為之則無脾胃之論矣明者辨之增損肥氣丸治肝積當歸蒼朮各一兩半青皮炒一兩三稜莪朮鐵孕粉各三兩與三稜莪朮同入醋煮一伏時蛇含石醋淬五錢上為末醋煮米糊丸如緑豆大每服四十丸當歸酒下增損伏梁丸治心積枳殼去穰麩炒茯苓厚朴人參白朮半夏三稜煨各等分上為末麵糊丸如桐子每服五十丸米飲下食遠服增損痞氣丸治脾積附子炮赤石脂煨醋淬川椒炒出汗乾薑桂心各半兩大烏頭炮去皮臍二錢半上為末煉蜜丸如桐子大硃砂為衣每十丸米飲下增損息賁湯治肺積半夏湯洗七次吳茱萸湯洗桂心各一錢半人參桑白皮炙苦葶藶各七分甘草炙五分上加生薑七片棗二枚水煎服增損奔豚湯治腎積甘李根皮焙乾乾葛各六分川芎當歸黃芩半夏湯泡七次各一錢芍藥甘草炙各五分上銼生薑煎服蔭按上五方出三因方隨證加減較之東垣方殊為平和用者察之溫白丸治心腹積聚久症癖塊大如杯碗黃疸宿食朝起嘔吐支滿上氣時時腹脹心下堅結上來搶心旁攻兩脅十種水病八種痞塞翻胃吐逆飲食噎塞五種淋疾九種心痛積年食不消化或瘧疾連年不瘥及療一切諸風身體頑痹不知痛癢或半身不遂或眉發墮落及療七十二種風三十六種遁尸疰忤及癲癇或婦人諸疾斷續不生帶下淋瀝五邪失心愁憂思慮意思不樂飲食無味月水不調及腹中一切諸疾有似懷孕連年纍月羸瘦困憊或歌或哭如鬼所使但服此藥無不除愈川烏炮去皮二兩半柴胡去蘆吳茱萸湯泡七次揀淨桔梗菖蒲紫菀去苗藥及土黃連去須乾薑炮肉桂去粗皮皂英去皮於炙巴豆去皮心膜出油炒研各半兩上為細末入巴豆勻煉蜜為丸如桐子大每服三丸生薑湯下食後臨臥服漸加至五七丸此即前萬病紫菀丸減羌活獨活防風潔古治肝之積肥氣加柴胡川芎心之積伏梁加菖蒲黃連桃仁脾之積痞氣加吳茱萸乾薑如肺之積息奔加人參紫菀胃之積奔豚加丁香茯苓遠志勻氣湯治脾之積名曰痞氣胃脘不安肌瘦減食神麯炒郁李仁半生半炒麥芽炒桂心去粗皮厚朴薑製白朮各一兩牽牛一兩半生乾炒良薑炮半兩甘草炙二兩上㕮咀每服五錢水一鍾半生薑三片棗一枚煎至七分食遠服海藏方治伏梁在心下結聚不散桃奴桃實著樹不落者正月採樹上之干桃是也上用三兩為末空心溫酒調下半夏湯治右脅下有塊令人灑淅寒熱咳嗽名之曰肺積息賁此藥主之半夏湯泡七次細辛桑白皮前胡各一錢桔梗貝母柴胡訶子煨去核人參白朮甘草炙各七分上作一服加生薑三片棗二枚水煎食後熱服枳實散治肺積息奔腹脅脹硬咳嗽見血痰黏不利枳實麩炒葶藶隔紙炒紫色木香不見火檳榔訶黎勒去核五味子赤茯苓去皮甘草炙各半兩杏仁一兩去皮尖炒上㕮咀每服七錢生薑三片水煎食後服五靈丸治肺喘久不愈為息奔五靈脂二兩半木香半兩馬兜鈴去殼炒一兩葶藶一兩上為細末棗肉和丸桐子大每服二十丸生薑湯下日三服棗膏丸治肺之積名曰息賁在右脅下大如杯令人灑淅寒熱喘嗽發肺癰葶藶陳皮桔梗各等分上二味為末入葶藶研勻煮肥棗肉和丸如桐子大每服五七丸飲下或患停飲久漬肺經食已必嚏喘覺肺系大急服此良驗葶藶丸定喘急肺積苦葶藶一兩當歸肉桂白蒺藜鱉甲川烏頭乾薑吳茱萸大杏仁茯苓人參各五錢檳榔一兩上為細末煮棗肉和杵丸如桐子大每服二三十丸薑棗湯下日四服不拘時候治食積方保和丸治食積山楂肉二兩神麯炒半夏湯泡白茯苓去皮各一西蘿蔔子炒陳皮連翹各五錢上為末以神麯糊為丸如桐子大每服七八十丸白湯送下加白朮二兩名大安丸痰氣積加莪朮三稜炮各一兩脾胃虛者以補藥下之紅丸子治傷食冷痛京三稜醋煮莪朮醋煮陳皮去白青皮去穰麩炒各五兩乾薑炮胡椒各二兩上為末醋糊為丸如梧桐子大以礬紅為衣每服三十丸食後生薑湯下小兒量大小加減與服紺珠木香檳榔丸治食積腹脹有熱者木香檳榔當歸黃連枳殼青皮黃柏各二兩黃芩陳皮三稜香附牽牛末各二兩莪朮大黃各四兩上為末麵糊丸如桐子大每服五七十丸臨臥薑湯下尋常消導開胃只服三四十丸有寒者加厚朴木香砂仁神麯香附三賢散消積塊進食橘紅一斤半甘草四兩鹽半兩上用水二四碗從早煮至夜以爛為度水乾則添水曬乾為末淡薑湯調下有塊者加薑黃半兩同前藥煮氣滯加香附二兩同煮氣虛者加沉香半兩另入噤口痢者加蓮肉二兩去心另入小三稜煎治食症酒痞血瘕氣塊時發刺痛全不思食積滯不消心腹堅脹痰逆嘔噦噫醋吞酸京三稜蓬朮各四兩芫花一兩去梗葉上同入甕器中用米醋五升浸滿封器口以炭火煨令乾取出稜術將芫花以余醋炒令微焦焙乾為末醋糊丸如緑豆大每服十五丸薑湯下丁香脾積丸治食積心腹膨脹不得克化丁香高良薑米醋煮木香不見火巴豆去殼各半兩蓬朮三兩荊三稜二兩皂角三大挺燒存性青皮去穰一兩上入百草霜三匙同碾為末麵糊為丸如麻子大每服十丸至三十丸止脾積氣陳皮湯下如口吐酸水淡薑湯下嘔吐甘草藿香湯下如小腸氣炒茴香酒下婦人血氣刺痛淡醋湯下治肉積方阿魏丸治肉積及飽食停滯胃壯者宜此脾虛者勿服阿魏二兩醋煮軟另研山楂蘿蔔子神麯麥芽陳皮青皮香附各二兩上為末蒸餅丸服小阿魏丸治肉積山楂二兩黃連一兩三錢連翹一兩阿魏二兩醋煮作糊上為末以醋煮阿魏糊為丸如小豆大每服三十丸白湯送下脾虛者以白朮三錢陳皮茯苓各一錢煎湯送下切不可妄用脾虛之禍疾如反掌治酒積方烏梅丸治酒積消食化痰烏梅一斤生薑一斤半夏白礬各半斤上件石臼搗為細末新瓦兩片夾定火上焙三日夜為度神麯麥芽陳皮青皮莪朮丁皮大腹子枳殼各四兩上共為細末酒糊為丸如桐子大每服四五十丸薑湯下消滯丸治酒食所傷心腹痞悶刺痛積滯不消黑牽牛二兩香附子炒一兩五靈脂一兩上為細末醋糊為丸如桐子大每服五十丸食後薑湯下東垣草豆蔻丸治酒積或傷寒冷之物胃脘痛咽膈不通草豆蔻麩裹煨白朮各一兩大麥芽炒神麯炒黃芩半夏各半兩枳實炒二兩陳皮青皮乾薑各五錢炒鹽半兩上為細末湯浸蒸餅為丸如緑豆大每服一百丸熟水送下蔭按此方乃飲酒過度恣食寒涼之物有痃癖積飲在胸腹間作痛者之所宜也用者審之酒積方纍效烏梅肉一兩半夏曲七錢青木香四錢枳實半兩砂仁半兩杏仁三錢巴豆霜一錢黃連酒炙一宿一兩上為末蒸餅丸如緑豆大每服八丸白湯下不藥法治胸中酒食停積或被人勸飲過多一切時刻心下脹滿只用鹽花擦牙齒溫水漱下不過三次如湯潑雪即時寬暢通快也治茶積方茶癖方治黃病愛吃茶白朮炒蒼朮米泔浸各三兩軟石膏煅一兩白芍藥炒片芩各一兩薄荷葉七錢膽南星陳皮各一兩上為細末砂糖水調神麯糊為丸如桐子大每服五六十丸砂糖水下星術丸治吃茶成癖牛膽南星白朮石膏黃芩芍藥薄荷各等分上為末砂糖調成膏津液化下或為丸服亦好丹溪方治茶癖喜吃茶及吃干茶者石膏黃芩升麻上為末砂糖水調服一方用芍藥不用升麻一方用花椒為末麵糊為丸如桐子大每服十丸茶湯下治痰積方石𨢑丸治痰飲成積半夏一兩用皂角浸透曬乾山楂三兩石鹼三錢上為末粥丸桐子大每服三十丸白湯下開結枳實丸宣導凝滯消化痰飲升降滯氣通行三焦蕩滌脾胃去結潤燥流暢大小腸專主中痞痰涎噁心嘔噦醉飽膈實宿物停積兩脅膨悶咽嗌不利上氣喘嗽等疾枳實去穰麩炒白朮半夏湯泡天南星白礬枯苦葶藶隔紙炒大黃青皮去白各半兩木香一錢黑牽牛頭末一兩皂角去皮子一兩上為細末生薑汁煮麵糊為丸如桐子大每服四十丸溫生薑湯下如婦人乾血氣膈實腫滿或産後有傷面目浮腫小便不利生薑蔥白湯下如單腹脹上喘涎多四肢腫滿食後生薑湯下酒疸溫酒下黃連磨積丸治一切痰飲食積積聚拂鬱脅下悶倦懶惰飲食不消或吐逆噁心眩暈怔忡時作時止用之如神黃連一兩內五錢用吳茱萸同炒五錢用益智仁同炒去二味不用止用黃連梔子炒去皮青皮去穰川芎蒼朮米泔浸七日桃仁去皮存尖白芥子醋浸炒各五錢香附子童便浸炒莪朮酒浸炒山楂肉萊蔔子炒研白朮各一兩三稜用西安府者一兩半上為細末用湯浸蒸餅為丸如桐子大每服五七十丸茶湯任下大阿魏丸治痰食諸積聚南星半夏山楂神麯麥芽黃連各一兩連翹阿膠瓜蔞仁貝母各半兩風化硝石鹼蘿蔔子胡黃連各二錢半上為末薑汁浸蒸餅為丸如桐子大每服三十丸白湯下一方加香附海石治嗽蚶殼丸治一切氣血痰塊癥瘕蚶殼又名瓦壟子火煅醋淬三次上為末醋糊丸薑湯下治水積方芫花丸治瘧母停水結癖腹脅堅痛芫花硃砂各等分上為末煉蜜為丸如小豆大每服十丸濃棗湯送下神效五食湯治積塊水氣方見前久積條治氣積方導氣枳殼丸治氣結不散心胸痞痛氣逆上攻喘急咳嗽分氣逐水功莫盡述枳殼去穰麩炒木通青皮去穰陳皮去白桑白皮炒蘿蔔子炒白牽牛炒茴香炒莪朮煨京三稜煨各等分上為細末生薑汁打麵糊為丸如桐子大每服五十丸橘皮湯下木香化滯湯治因憂氣食濕面結於中脘腹皮微痛心下痞滿不思飲食食之後不散常常痞氣木香不見火草豆蔻柴胡橘皮各一錢半當歸枳實麩炒各一錢半夏湯泡二錢紅花甘草炙各五分上作一服加生薑三片水煎食遠服一法氣結者散之息城司候聞父死於賊乃大悲哭便覺心痛日增不已月餘成塊狀若覆杯大痛不堪藥皆無功議用燔針炷艾病人惡之乃求治於戴人戴人至適巫者在其傍乃學巫者雜以狂言以謔病者至是大笑不忍回面向壁一二日胸中結硬皆散戴人曰內經言憂則氣結喜則百脈舒和又云喜勝悲內經自有此法治驚積方加味妙應丸治驚積成塊甘遂去心大戟去皮白芥子穿山甲炒鱉甲燒各三錢元胡索蓬朮各四錢上為細末糊丸如桐子大每服五十丸至七十丸食後淡薑湯下以利為度治血積方海石丸治死血成塊塊去後須大補之海石三稜莪朮桃仁紅花五靈脂香附石鹼各等分上為末醋糊丸如桐子大每服三十丸白朮湯下一方有蚶殼桃仁承氣湯治瘀血小腹急痛大便不利或譫語口乾漱口不咽遍身黃色小便自利或血結胸中手不敢近腹或寒熱昏迷其人如狂桃仁半兩大黃炒一兩甘草二錢肉桂一錢上銼加生薑水煎服桃仁丸治瘀血不利發熱作渴心腹急滿或肚腹中作痛桃仁四十枚大黃四十枚虹蟲炒去足四十枚水蛭炒焦十枚上為末煉蜜丸如桐子大每服五六十丸空腹熱湯下桃仁煎治婦人經脈不通及血積癥瘕等證桃仁大黃炒各一兩虻蟲炒黑半兩朴硝一兩上為末先用醇醋二升半於銀石器中慢火煎至一升半下桃仁大黃虻蟲不住手攪千下次下朴硝更不住手攪良久出之丸如桐子大前一日不用吃晚飯五更初用溫酒吞下五丸日午取下惡物未見再服見鮮血止即以調氣血藥補之桃奴散治血蠱及瘀血停積婦人經水不通男子跌損撲傷皆效桃奴豭鼠糞元胡索肉桂五靈脂香附各炒過砂仁桃仁各等分上為末每服三錢溫酒調服治脅下積塊方龍薈丸治脅痛有塊當歸龍膽草山梔子黃連黃柏大黃黃芩各一兩蘆薈各半兩大香二錢半麝香五分另研加薑黃桃仁各半兩上為末煉蜜丸如小豆大小兒如麻子大每服二三十丸生薑湯下小阿魏丸治脅下積塊三稜醋炙一兩麝香二分阿魏二錢半上為末醋煮陳倉米粉為丸桐子大神效阿魏散大治痞塊大黃一兩阿魏一錢二分一云二錢二分天竺黃蘆薈白殭蠶各二錢孩兒茶番木鱉子甘草各三錢穿山甲七片炮焦上為細末每服三錢好酒調服如重車行十里許化下膿血即愈或醋調膏貼臍亦好丹溪方治食積死血痰積成塊在兩脅動作腹鳴嘈雜眩暈身熱時作時止黃連一兩半用茱萸益智仁同炒只用黃連山梔半兩炒川芎神麯桃仁去皮三稜蓬朮各半兩並醋煮香附童便浸山楂各一兩蘿蔔子炒一兩半上為末麵糊丸又方有青皮半兩白芥子一兩炒治諸蟲瘕方蟯瘕史記曰臨淄女子薄吾病甚衆醫以為寒熱為當死臣意診其脈曰蟯瘕為病腹大上膚黃粗循之戚戚然臣意飲以芫花一撮即出蟯可數升病已三十日如故蟯得以之於寒濕寒濕氣鬱篤不發化為蟲所以知薄吾病者切其脈循其尺索剌粗而毛焦拳發是蟲氣也其色澤者中臟無邪氣及重病雞子致積北齊褚澄善醫術建元中為吳郡太守民有李道念者以公事自郡澄遙見謂曰汝有奇疾道念曰某得冷疾五年矣澄診其脈曰非冷也由多食雞子所致令取蒜一升服之即吐物如升許涎裹之動挾涎出視乃一雞雛翅距已具而能走澄曰未也盍服其餘從之凡吐十三枚疾乃瘳發瘕劉宋時徐文伯篤好醫術明帝宮人患腰痛牽心發則氣絶衆醫以為肉瘕文伯視之曰此發瘕也以油灌之即吐物如發引之長三尺頭已成蛇又能搖懸柱上水瀝盡惟餘一發而已遂愈唐書甄權弟立言善醫時有尼明律年六十餘患心腹膨脹身體羸瘦已經二年立言診其脈曰腹內有蟲當是誤食發為之耳因令服雄黃須臾吐一蛇如人手小指唯無眼燒之獨有發氣其疾乃愈蛇瘕隋有患者嘗飢而吞食下至胸便即吐出醫作噎疾膈氣翻胃三疾治之無驗有老醫任度視之曰非此三疾蓋因食蛇肉不消而致斯但揣心腹上有蛇形是也病者曰素有大風當求蛇肉食風稍愈行患此疾遂以芒硝大黃一作雄黃合而治之微泄利則愈鱉瘕宋有溫革郎中者自少壯健無疾孰不信醫見方書有云食鱉不可食莧者故並啖之自此苦腹痛每作時幾不知人始疑鱉莧所致而未審也復以二物令小蒼頭並食之遂得疾與革類而委頓尤劇未幾遂死舁其尸置馬廄未斂也忽小鱉無數自上下竅湧出散走廄中惟遇馬溺化為水革聞自視之掊聚衆鱉以馬溺灌之皆化為水革乃自飲馬溺其疾亦愈巢元方亦謂有患鱉瘕者死其主破其腹得一白鱉鱉乃活有乘白馬來看者白馬遂尿灌之隨化為水米瘕乾德中江浙間有慎道恭者肌瘦如癆唯好食米闕之則口中清水出情似憂思食米頓便如常衆醫不辨後遇蜀僧道廣處方以雞屎及白米各半合合共炒為末以水一中盞調頓服良久病者吐出如米形遂瘥病源謂米瘕是也治積補攻法丹溪和胃湯方提領年五十六冬因飲酒後受怒氣於左脅下與臍平作痛自此以後漸成小塊或起或不起起則痛痛止則伏面黃口乾無力食少吃此物便噯此味轉惡風寒脈之左大於右弦澀而長大率左甚重取則全弦此得熱散太多以致胃氣大傷陰血下衰且與和胃湯以補胃氣滋養陰血並下保和丸助其化粕伺胃實陰稍充卻用消塊人參三錢白朮一錢半陳皮一錢芍藥五分乾葛三分歸身五分紅花豆大甘草炙二錢上作一帖下保和丸二十五丸龍薈丸十五丸丹溪方治一人心痛膈有塊白朮二錢青皮芍藥木通川芎蒼朮各一錢甘草五分上作一帖下保和丸三十粒丹溪方治一人左脅下因瘧後食肉與酒而成塊白朮一錢柴胡醋炒一錢茯苓二錢枳殼麩炒五分人參五分上作湯送下阿魏五保和草抑青十與點十攻塊五丹溪方治一人因酒多年濕病脅上有塊腹滑泄小便黃滑石一兩白朮三稜各六錢陳皮五錢黃連豬苓各三錢黃芩木通各二錢防風一半乾薑一錢甘草炙五分上分七帖煎下保和丸二十丹溪方治一丈夫肚左邊帶脅上有塊先吃匾食牛乳者成氣痛又因酒肉塊大如桃食減三分之一滑石半兩白朮四錢陳皮三稜各三錢蘿蔔子連翹黃連各一錢乾葛二錢半桃仁二十個黃芩一錢甘草炙一錢半上分四帖水煎服丹溪方治婦人脅下有塊大如掌脈澀時有熱此虛中有氣積先與補虛次與磨積藥白芍藥歸鬚四錢陳皮白朮各三錢青皮川芎木通各一錢甘草五分上白水煎熱服磨積藥三稜醋煮一錢枳實青皮桃仁各五錢大黃五錢桂枝一錢半海藻醋煮三錢上為細末神麯糊丸如桐子大每服四十丸一方治一婦人左脅下有塊漸長大脈弦而大稍數詢之近亦發熱食亦減倦怠先與補之次攻此塊陳皮柴胡歸頭青皮各五錢白朮一兩半甘草一錢木通三錢半上作八帖服次與攻塊方青皮醋炒三稜醋炒各一兩半桃仁五錢桂枝三錢半海藻酒洗三錢上為末醋打神麯糊為丸又方治一婦瘧後左脅有塊小便少厚朴柴胡各二錢三稜一錢半甘草五分木通五錢白朮六錢半青皮五分上加生薑一片水煎食前熱服上諸方皆補藥與磨積藥相半兼服之蓋為體虛者設也即實人攻下後亦宜用此法補之附外治貼藥三聖膏用風化石灰半斤為末細篩過瓦器中炒令淡紅色提出候熱稍減次下大黃末一兩就爐外炒候熱減入桂心末五錢略炒入米醋攪熬成黑膏厚紙攤貼患處琥珀膏貼塊方見癰疽一方貼積聚塊大黃朴硝各一兩上為末大蒜搗膏和勻貼之一方有阿魏一兩又方貼塊白鴿糞二兩白芷三兩硫黃白蘞木鱉子肉各一兩上為末用面水調和敷患處神應比天膏專貼男子婦人氣聚左右脅下及胸伏梁或血塊或氣結酒色過度有傷五臟致死精神短少肢體羸弱並小兒大人一切痞疾並皆治之黃芩枯者黃耆青皮各五錢陳皮去白三錢烏梅去核八個訶子皮二兩火炮木鱉子十六枚去殼山楂子十六個桃仁二十四個蘇木五錢麝香少許三稜火煨三錢半莪朮火煨三錢半檳榔白豆蔻黃柏牙皂各三錢去皮弦子當歸尾一兩沒藥三錢半乳香二錢半昆布五錢巴豆霜五分甘草二錢半穿山甲十六個用醋炙黃焦上二十四味除麝香沒藥乳香巴豆霜不入將群藥不見鐵器為細末用清香油十四兩黃蠟二兩熬至數沸方將群藥末下入砂鍋內熬滴水不散為度方下麝香等四味用瓷罐盛了量疾小大攤藥貼敷遇癢時用木梳往來搔之不及三七大有效驗貼痞膏錦紋大黃皮硝梔子仁各三錢乳香沒藥各一錢老蔥二枝酒糟三四匙蜂蜜量用上共搗一處成膏攤絹上照疾大小貼之用手帕護住一日一換貼痞積塊朴硝三兩雄黃一兩明礬六錢飛面一合上為細末醋調敷塊上不嘔吐下即瀉之集驗尉症方吳茱萸三升碎之以酒和煮熱布尉症上冷更炒更番用之症移走逐尉之候得乃止
