body:
  text: 卷六十五勞瘵論虞氏曰內經曰陰虛生內熱又曰陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷又曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通而胃氣熱熱氣薰胸中故內熱是故欲養陰而延年者心神宜恬靜而毋躁擾飲食宜適中而無過傷風寒暑濕之謹避行立坐臥之有常何勞怯之有哉惟嗜欲無節起居不時七情六欲之火時動乎中飲食勞倦之過屢傷乎體漸而至於真水枯竭陰火上炎而發蒸蒸之燥熱或寒熱進退似瘧非瘧故古方名曰蒸病或二十四種或三十六種名雖不同證亦少異大抵不過咳嗽發熱咯血吐痰白濁白淫遺精盜汗或心神恍惚夢與鬼交婦人則月閉不通日漸虧羸漸成勞瘵之候夫病此者始不求治姑息日久直至發熱不休形體瘦甚真元已脫然後求醫治療雖倉扁復生莫能救其萬一矣中藏經勞傷論曰勞者勞於神氣傷者傷於形容飢飽過度則傷脾思慮過度則傷心色欲過度則傷腎起居過度則傷肝喜怒悲愁過度則傷肺又風寒暑濕則傷於外飢飽勞役則敗於內晝感之則病榮夜感之則病衛榮衛經行內外交運而各從其晝夜始勞於一一起於二二傳於三三通於四四干其五五復犯一一至於五邪乃深真氣自失使人肌肉消神氣弱飲食減行步難及其如此則雖有命亦不能生也故調神氣論曰調神氣戒酒色節起居少思慮薄滋味者長生之大端耳診其脈甚數甚急甚細甚弱甚微甚濡甚滑甚短甚長甚沉甚浮甚緊甚弦甚洪甚實皆生於勞而傷也王啓玄曰虛者皮毛肌肉筋爪骨髓氣血津液不生也若男女終日勞役神耗力倦飢飽越常喜怒憂思形寒飲冷縱欲恣情素問曰今人未及半百而衰者以酒為漿以妄為常醉以入房以欲竭其精以耗散其真根源從此而虛竭矣五臟六腑如何不弱五勞六極七傷從此而始何謂五勞心勞血損肝勞神損脾勞食損肺勞氣損腎勞精損六極謂筋脈肉皮毛骨瘁損是謂六極七傷難經言之甚詳傷形與氣謂之七傷總而言之為虛是也大抵五行六氣水特五之一耳夫一水既虧豈能勝五火哉虛勞等證蜂起矣其體虛者最易感於邪氣當先和解微利微下之從其緩而治之次則調之醫者不知邪氣加之於身而未除便行補劑邪氣得補遂入經絡致死不治如此誤者何啻千萬良可悲哉內經中本無勞證之説其曰勞者溫之溫者溫存之義不足者補之以味穀肉菜果百味珍羞無非補也今之醫者不通其法惟知大補之道輕則當歸鹿茸雄附重則乳石丹砂加之以灼艾補燥其水水得熱愈涸生火轉甚少而成嗽痰血潮熱煩渴喜冷此則熱證明矣重則失音斷不可救猶且峻補不已如此死者醫殺之耳及遇良工治驗而以清劑解之不合病人之意反行責怪及聞發表攻裡之説畏而不從甘死於庸工熱補之手雖死不悔深可憫也夫涼劑能養水清火熱劑能燥水補火天下之事無出乎理理既明何患病疾之不安勞為熱證明矣還可補乎惟無邪無熱無積之人脈舉按無力而弱者方可補之又必察其胃中及右腎二火虧而用之心虛則動悸恍惚憂煩少色舌強宜養榮湯琥珀定神丸之類以益其心血脾虛面黃肌瘦吐利清冷腹脹腸鳴四肢無力飲食不進宜快脾湯進食丸之類以調其飲食肝虛目昏筋脈拘攣面青恐懼如人將捕之狀宜牛膝益中湯虎骨丹之類以養助其筋脈肺虛呼吸少氣喘乏咳嗽嗌乾宜枳實湯加人參黃耆阿膠蘇子以調其氣腎虛腰背脊膝厥逆而痛神困耳鳴小便頻數精漏宜八味丸加五味子鹿茸去附子用山藥等丸以生其精醫説云五勞者動作勞傷於五臟五臟之氣因傷成病故謂之五勞肺勞之狀短氣而面腫不聞香臭肝勞之狀面目乾黑口苦精神不守恐畏不能獨臥目視不明心勞之狀忽忽喜忘大便難或時溏利口內生瘡脾勞之狀舌根苦直不得咽唾腎勞之狀背難俯仰小便不利黃赤而有餘瀝囊濕生瘡小腹裡急治法肝勞補心氣心勞補脾氣脾勞補肺氣肺勞補腎氣腎勞補肝氣此療子以益母也經曰聖人春夏養陽秋冬養陰以補其根本肝心為陽脾肺腎為陰夫五臟實亦成勞虛則補之實則瀉之又曰六極者筋極主肝脈極主心肉極主脾氣極主肺骨極主腎精極主臟腑筋極之狀令人數轉筋十指手甲皆痛苦倦不能久立脈極之狀忽忽喜忘少顏色眉發墮落肉極之狀飲食無味不生肌肉皮膚枯稿氣極之狀正氣少邪氣多氣不足多喘少言骨極之狀腰脊痠削齒痛手足煩痛不欲行動精極之狀肉虛少氣喜忘鬢衰落然謂之極者病重於勞也治法與治勞同又曰七傷者一曰大怒逆行傷肝二曰憂愁思慮傷心三曰飲食太飽傷脾四曰形寒飲冷傷肺五曰久坐濕地傷腎六曰風雨寒濕傷形七曰大怒恐懼傷志肝傷則少血目暗心傷則苦驚喜忘脾傷則面黃善臥肺傷則短氣咳嗽腎傷則短氣腰痛厥逆下冷形傷則皮膚枯稿志傷則恍惚不樂治法與五勞六極同又曰冷勞之人氣血枯稿表裡俱虛陰陽不和精氣散失則內生寒冷也皆因臟腑久虛積冷之氣遂令宿食不消心腹積聚臍腹痛疼面色痿黃口舌生瘡大腸泄痢手足無力骨節痠疼久而不痊轉加羸瘦故曰冷勞又曰勞動作也郭逢源曰凡人暫爾疲倦通謂之勞而今人以勞為惡疾而惡聞之親戚朋友共為隱諱見其疾狀莫敢呼之殊不知勞之為病初起於動作不能節謹至於疲倦且傷不已漸成大疾凡言虛勞者五勞是也六極七傷為類蓋蒙莊所謂精太用則竭神太勞則弊者是也治法不過補養五臟滋益氣血使之強盛則其疾自去又曰凡虛勞之疾皆緣情欲過度榮衛勞傷致百脈空虛五臟衰損邪氣乘襲致生百疾聖人必假藥石以資氣血密腠理以御諸邪肌肉之虛猶如物體之輕虛如馬勃通草蒲梢燈心之屬是也非滋潤黏膩之物以養之不能實也故前古方中鹿角膠阿膠牛乳鹿髓羊肉飴糖酥酪杏仁煎酒蜜人參當歸地黃麥冬之類者蓋出此意本草云補虛去弱羊肉人參之屬是也所謂虛勞者因勞役過甚而致虛損故謂之虛勞今人才見虛弱疾證悉用燥熱之藥如伏火金石附子薑桂之類致五臟焦枯血色乾涸而致危困皆因此也如虛而兼冷者止可於諸虛勞方中加諸溫熱藥為助可也如此即不失古人之意又曰養生必用方論虛勞不得用涼藥如柴胡鱉甲青蒿麥冬之類皆不用服惟服黃耆建中湯有十餘歲女子因發熱咳嗽喘急小便少後來成腫疾用利水藥得愈然虛羸之甚遂用黃耆建中湯日一服三十餘日遂愈蓋人稟受不同虛勞小便白濁陰臟人服橘皮煎黃耆建中湯獲愈者甚衆至於陽臟人不可用暖藥雖建中湯不甚熱然有肉桂服之稍多亦反致害要之用藥亦量其所稟審其冷熱而不可一概以建中湯治虛勞也謹之又曰氣虛則發厥血虛則發熱厥者手足冷也氣屬陽陽虛則陰湊之故發厥血者陰也血虛則陽湊之故發熱也氣虛發厥者當用溫藥血虛發熱者不宜用涼藥當用溫養氣血之藥以補之宜養陰黃耆建中湯之類是也又有一種病實熱者極而手足厥冷所謂熱深厥亦深此當用涼藥須以脈別之也此最難辨差之毫釐則害人性命戒之李氏曰勞極曰瘵先須辨陰陽熱勞陽病口乾舌瘡咽痛涕唾稠黏手足心煩疼小便黃赤大便燥結虛勞陰病唾痰白色胃逆口惡飲食難化小便多遺精白濁大便溏瀉又有嗽痰仰臥不得者必陰陽兼病也多因十五六歲或二十前後血氣未定酒色虧損精液而成全屬陰虛間有因外感久瘧久嗽而成者多屬陽虛熱勞咽瘡失音者死虛勞瀉不止者死不問陰病陽病日久皆能傳變男子自腎傳心肺肝脾女子自心傳肺肝脾腎五臟復傳六腑而死亦有始終只傳一經者有專著心腎而不傳者大要以脈為證驗輕者六證間作重者六證兼作蓋火蒸於上則為潮熱咳血火動於下則為精濁泄瀉若先見血止血為先其餘流傳變證雖多亦必歸重一經假如現有精濁又加之脛痠腰背拘急知其邪在腎也現有咳血多汗加之驚惕口舌生瘡知其邪在心也現有喘咳嗽血加之皮枯鼻塞聲沉知其邪在肺也現有夢遺加之脅痛多怒頸核知其邪在肝也現有泄瀉加之腹痛痞塊飲食無味四肢倦怠知其邪在脾也當隨邪之所在調之勞熱清骨散內熱保真湯晡熱黃耆鰲甲湯勞血咯血太平丸嗽吐咳咯保和湯血去多三黃補血湯血不止十灰散單花蕊石散勞嗽干嗽人參潤肺丸保和湯太平丸安肺湯肺痿知母茯苓湯肺癰桔梗湯單白及散勞泄白朮膏八珍湯腎氣丸勞汗黃耆散更當干各病本條參究勞者倦也氣血勞倦不運則凝滯疏漏邪氣得以相乘又飲食勞倦所傷則上焦不行下脘不通熱熏胸中而生內熱凡頸上有核腹中有塊或當膝冰冷或無力言動皆痰涎結聚氣血凝滯之所致也故以開關起胃為先蓋關脈閉則氣血乾枯胃氣弱則藥無由行但陽虛不可偏用辛香丁附之類陰虛不可偏用苦寒知柏之類古立有開關散定胃散今亦難用竊其意推之陽病開關清熱利便宜瀉白散加銀柴胡秦艽桔梗木通澤瀉當歸芍藥木香以小便多為病去陰病開關行痰利氣宜二陳湯加便制香附貝母牡丹皮當歸山楂蘇梗及生地黃木香少許以氣清痰少為病減陰陽俱病用參苓白朮散三白湯或二陳湯加白朮神麯麥芽以起脾胃如有泄者尤宜多服久服俟胃氣轉然後依證用藥古方以生犀散防風當歸飲或三補丸單黃連丸治熱勞證然必初起體實而後敢用之也久虛積損成勞陽虛劫勞散十全大補湯人參養榮湯補中益氣湯單人參湯陰虛加味逍遙散滋陰降火湯節齋四物湯補陰丸大造丸補天丸虛甚者瓊玉膏白鳳膏古云服涼藥百無一生飲溲溺萬無一死惟脾胃虛及氣血弱者必以滋補藥中量入童便以代降火之藥今俗非偏用知柏生地滯脾即偏用人參桂附助火治咳輒用兜鈴紫菀款冬青黛牡蠣收澀肝經治血輒用京墨金石寒涼傷其氣血退潮輒用銀柴胡胡黃連消其肌肉遺精輒用龍骨石脂澀燥其精皆不治其本耳蟲亦氣血凝滯痰與瘀血化成但平補氣血為主加以烏梅青蒿硃砂之類而蟲自止矣或紫河車丹紫河車丸青蒿膏蛤蚧散天靈蓋散蔭按傳尸之説不必深泥歷觀勞瘵皆因酒色財氣損傷心血以致虛火妄動醫者不分陰陽用藥病家不思疾由自取往往歸咎前人積惡甚則疑及房屋器皿墳墓且冤業飛尸遞相傳證古人亦云勞瘵三十六種惟陰德可以斷之不幸患此疾者或入山林或居靜室清心靜坐常焚香叩齒專意保養節食戒欲庶乎病可斷根若不遵此禁忌服藥不效丹溪曰此陰虛之極痰與血病有有蟲者其傳尸一證不可云無大法四物湯加童便竹瀝薑汁氣血虛甚發熱成勞者補天丸加治骨蒸藥佐之身瘦屬火因火燒爍也肉脫甚者難治傳尸勞瘵寒熱交攻久嗽咯血日久羸瘦先以三拗湯次以蓮心散白蠟塵治瘵蟲虛勞皆積熱湊成始健時可用子和法日後羸憊四物湯加減送消積丸使熱不作也蒸蒸發熱積病最多小陷胸湯治濕痰發熱極妙丹溪活套云勞極之證五臟必歸重於一經假如足脛痠疼腰背拘急遺精白濁面色黑黃耳輪焦枯脈沉細數知其邪在腎也宜以四物湯加知母黃柏五味麥冬天冬澤瀉杜仲肉桂之類煎入童便韭汁竹瀝服其或心神驚惕怔忡無時盜汗自汗心煩熱悶口舌生瘡唾血面赤脈洪而數知其邪在心也宜以前方去杜仲肉桂澤瀉加茯神胡黃連蓮心遠志菖蒲硃砂之類其或咳嗽喘促衄血嗽血皮膚枯燥鼻塞聲沉時吐痰沫脈微虛而澀數知其邪在肺也宜以四物湯加沙參麥冬五味知母貝母桔梗桑白皮地骨皮款冬花紫菀馬兜鈴百合百部之類煎入童便竹瀝薑汁服其或脅痛目赤面青頰赤多怒虛陽不斂夢與鬼交甚則卵縮筋急脈弦而數知其邪在肝也宜以四物湯加竹茹龍膽草柴胡黃芩青皮竹葉之類其或面色萎黃唇吻焦燥飲食無味腹痛腸鳴瀉利四肢倦怠脈虛濡而數知其邪在脾也宜以四君子湯加酒炒白芍蓮肉薏苡仁乾山藥豬苓澤瀉白扁豆之類凡骨蒸勞熱元氣未脫者灸崔氏四花六穴無有不安者也四花六穴詳見醫學正傳備載於虛勞條之後王節齋曰男子二十前後色欲過度損傷精血必生陰虛火動之病睡中盜汗午後發熱哈哈咳嗽倦怠無力飲食少進甚則痰涎帶血哈哈出血或咳血吐血衄血身熱脈沉數肌肉消瘦此名勞瘵最重難治輕者用藥數十服重者期以歲年然必須病人愛命堅心定志絶房室息妄想戒惱怒節飲食以自培其根否則雖服良藥無用也此病治之干早則易為若到肌肉消爍沉困著床尺脈沉取細數則難為矣又此病大忌服人參若曾服過多者亦難治忌服人參此論太拘若氣虛無火服之何妨但肺熱喘嗽者不宜耳用者洋之或云瘵病至於骨痛痿軟身沉聲啞肺稿面黧或身汗而嗽及脈虛數而小澀者斷不可治脈法脈經曰男子平人脈大為勞極虛亦為勞男子勞乏為病其脈浮大手足煩春夏劇秋冬瘥陰寒精自出足痠軟不能行少陰虛滿男子平人脈虛弱微細者盜汗自出也男子面色薄白主渴及亡血卒喘心悸其脈浮者裡虛也男子脈虛沉弦無寒熱短氣裡急小便不利面色白時時目瞑此人喜衄小腹滿此為勞使之然男子脈微弱而澀為無子精氣清冷也夫失精家小腹強急陰頭寒目眶痛發落脈極虛芤遲為消穀亡血失精脈得諸芤動微緊男子失精女人夢鬼交通脈沉小遲者名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人則半産漏下男子則亡血失精脈訣舉要曰骨蒸勞熱脈數而虛熱而澀小必殞其軀加汗加嗽非藥可除治熱勞方正料生犀散治勞病骨蒸肌瘦日晚潮熱盜汗五心煩躁及大病後餘毒不解兼治勞瘧及小兒疳熱犀角地骨皮秦艽麥冬枳殼大黃柴胡茯苓赤芍桑皮黃耆人參鱉甲醋煮知母各等分上銼每服三錢入陳青蒿一根水煎服有痰加半夏熱輕去大黃加黃芩黃耆鱉甲散治虛勞客熱肌肉消瘦四肢煩熱心悸盜汗減食多渴咳嗽有血鱉甲去裙醋炙天冬去心各五兩知母焙黃耆赤芍各三兩半地骨皮白茯苓秦艽柴胡去蘆各三兩三錢生乾地黃洗焙三兩桑白皮半夏煮紫菀甘草炙各二兩半人參肉桂苦梗各一兩六錢五分上㕮咀每服五錢水煎食後溫服秦艽鱉甲散治骨蒸壯熱肌肉消瘦口紅頰赤困倦盜汗柴胡地骨皮各一兩秦艽知母當歸各半兩鱉甲一兩去裙醋煮上銼每服五錢水一盞入烏梅一個青蒿五葉同煎至七分去渣溫服臨臥空心各服秦艽扶羸湯治肺痿骨蒸已成勞嗽或熱或寒嘎聲不出體虛自汗四肢怠惰柴胡二錢地骨皮一錢半鱉甲米醋炙秦艽當歸洗焙半夏湯泡七次紫菀各一錢甘草五分上㕮咀作一服水二鍾生薑三片烏梅大棗各一枚煎至七分去渣食後溫服熱甚加青蒿汗多加黃耆去半夏生薑柴胡飲子解一切肌骨蒸熱寒熱往來及傷寒發汗不解或汗後餘熱勞復或婦人經病不快産後但有如此之證並宜服之黃芩甘草大黃芍藥柴胡人參當歸各半兩上㕮咀每服五錢水煎熱服防風當歸飲子治煩熱皮膚索澤柴胡人參黃芩甘草防風大黃當歸芍藥各半兩滑石二兩上㕮咀每服五錢水一盞半生薑三片煎七分食後溫服空心宜以此藥下地黃丸如痰嗽加半夏麥煎散治少男室女骨蒸婦人血風攻疰四肢赤苓當歸乾漆鱉甲醋炙常山大黃煨柴胡白朮生地酒炒石膏各一兩甘草半兩上為末每服三錢小麥五十粒水煎食後臨臥服若有虛汗加麻黃根一兩東坡云此黃州吳判官療骨蒸黃瘦口臭肌熱盜汗極效吳君寶之不肯妄傳百勞散治骨蒸勞熱等證天心藤芍藥茯苓半夏湯泡黃耆蜜炙知母當歸酒浸貝母五味子地骨皮黃芩柴胡甘草白芷桔梗人參各等分上㕮咀每服一兩水二鍾生薑三片煎至八分食後服蛤蚧飲子治勞熱蛤蚧一對洗淨酒醋浸炙黃黃芩半兩麻黃不去根節胡黃連秦艽去蘆生甘草生地黃酒洗熟地黃酒洗青蒿人參柴胡去蘆知母酒洗貝母杏仁去皮尖另炒以上各五錢鱉甲一兩酒醋炙桔梗龍膽草木香各二錢半上為細末每服二錢加烏梅薑棗煎服蛤蚧散治勞嗽白茯苓二兩漫火炒桑白皮二兩酥炙黃知母二兩酥醋炙黃杏仁六兩去皮尖炒乾甘草三兩酥醋炙三五次貝母二兩酥醋炙黃蛤蚧一對酥醋內浸透漫火炙七次令黃色不得焦人參一兩酥醋炙黃不得焦乳酥真者四十西切骰子大溶成汁入極酸上好米醋半斤和勻用剝前藥醋不宜太多則稀不堪用上為末每服二錢水一盞煎至七分和渣服忌油膩生冷毒物如久患嗽者初服此藥必陡嗽加甚須服久可安自保養為妙輕骨散治勞嗽烏梅龍膽草胡黃連貝母鱉甲酥炙桔梗秦艽柴胡甘草炙梔子人參青蒿酒煮阿膠炒成珠杏仁去皮尖炒各等分上為末用好京墨一塊以井花水磨調作餅子如大指頭大透風處陰乾二七日每用一餅以井花水磨化又用沒藥五分磨成一盞更加黃柏末二錢同煎數沸傾入盞內頻頻打轉於五更時輕輕起服服後就睡仰臥甚者不過三服五蒸湯治男婦諸虛煩熱蒸痿自汗等證人參黃芩知母生地薑酒炒葛根石膏麥冬粳米各一錢甘草炙五分小麥一撮竹葉十片上銼水煎服五蒸丸治男婦煩蒸潮熱脈數口乾青蒿童便浸地骨皮生地薑酒炒石膏各一兩當歸七錢胡黃連五錢鱉甲一片上為末煉蜜丸如桐子大每服七十丸小麥煎湯下大胡連丸治傳尸勞熱面紅咳嗽等證胡黃連銀柴胡黃芩當歸白芍茯苓陳皮熟地黃知母各一兩人參白朮川芎桔梗甘草地骨皮半夏秦艽各八錢黃耆一兩二錢黃柏五味子各一兩半牛黃三錢犀角二錢上為末煉蜜丸桐子大每服六七十丸清茶下香連豬肚丸治骨蒸疳勞羸瘦勞痢亦宜木香五錢黃連生地酒炒青皮銀柴胡鱉甲各一兩上為末入豬肚索縛定於砂鍋內煮爛搗丸桐子大小兒黍米大柴胡梅連散治骨蒸勞熱三服除根柴胡胡黃連前胡烏梅各二錢上㕮咀作一服用童便二盞豬膽一個豬脊髓一條韭白五分同煎一鍾不拘時服此劫劑胃虛者慎之青蒿飲子治勞瘵骨蒸青蒿一斗五升童便三斗上以文武火熬約童便減去二斗去青蒿再熬至一升入豬膽汁七個或加辰砂檳榔末三五錢再熬數沸甘草末收之每服抄一匙清湯點服極妙一方名草還丹丸如桐子大每服五十丸清骨散治男子婦人五心煩熱欲成勞瘵北柴胡生地酒炒各二兩人參防風熟地黃秦艽赤茯苓各一兩胡黃連半兩薄荷七錢半上每服四錢水煎溫服地骨皮枳殼散治骨蒸壯熱肌肉消瘦少力多困夜多盜汗地骨皮秦艽柴胡枳殼知母當歸鱉甲醋炙黃各等分上為末水一盞桃柳枝頭各七個薑三片烏梅一個去渣臨臥服人參柴胡散治邪熱客於經絡肌熱痰嗽五心煩躁頭目昏痛夜有盜汗及婦人虛勞骨蒸尤宜人參白茯苓白朮柴胡當歸半夏曲乾葛甘草炙芍藥赤各一兩上為細末每服三錢薑四片棗三枚水煎帶熱服許學士云但有勞熱證皆可服熱退即止大抵透肌葛根第一柴胡次之其方多黃芩半兩蔭按以上諸方治虛損復受邪熱皆宜用柴胡衍義云柴胡本經並無一字治勞今人方中治勞鮮有不用者誤人甚多常言病勞有一種真臟虛損復受邪熱因虛而致勞故曰勞者牢也當斟酌之如經驗方治勞熱青蒿煎丸用柴胡正宜服無不效熱去即須急止若無邪熱得此愈甚王海藏云苟無實熱醫取用之不死何待後之用柴胡者宜審諸又大忌芩連柏驟用純苦寒藥反瀉其陽但當用瓊玉膏之類大助陽氣使其復還寅卯之位微加瀉陰火之藥是也上下甲丸退勞熱食積痰鱉甲名上甲龜板名下甲各一兩側柏瓜蔞仁半夏黃連黃柏各五錢上為末炊餅丸服當歸龍薈丸治肝有積痰汙血結熱而勞瘵者其太衝脈必與陽衝脈不相應宜以補陰藥吞此丸神效方見脅痛及火熱門石膏散治熱勞附骨蒸熱四肢微瘦有汗脈長者此方主之石膏上一味為細末如面每夕用新汲水調服方寸匕取身無熱為度蔭按熱勞之證豈曰盡屬陰虛亦有陽邪外襲傳入於骨不能泄越內作骨蒸令人先寒後熱久久漸成羸瘦有汗者胃家實也脈長者陽邪證也石膏寒而清肅者也可以療裡熱昔睦州鄭迪功妻苦有骨蒸內熱之病時發外寒寒過內熱附骨蒸盛之時四肢微瘦足跌腫者其病五臟六腑之中衆醫不瘥因遇處州吳醫看曰請為治之只單用石膏散服後體微涼如故或問東垣言血虛身熱證象白虎誤服白虎者必死非石膏之謂乎答曰若新産失血飢困勞倦之病合禁用之若內熱有汗脈長者則不在禁也用者慎之甘梨漿勞瘵脈數燥渴日瘦者宜服之蓋天一生水所以養萬物者也若火盛而水滅令人五液乾涸則甘梨漿可以急救之此物非惟可以救急曾有回生起死者師云生用之可以涼五火熟用之可以滋五臟童便咳血者以童便一物主之咳血是肺中有竅肺是清肅之臟纖芥不容一有其竅則血滲入肺矣愈滲愈咳愈咳愈滲此為難治褚澄云以寒涼治之百無一生以溲溺治之百不一死故特表而出之又曰血雖陰類運之者其和陽乎所以示人者深矣治冷勞方補火丸冷勞病脊血氣枯竭齒落不已四肢倦怠語言不足者此方主之生硫黃一斤豬臟二尺上將硫黃為細末盡實臟中爛煮三時取出去臟蒸餅為丸如桐子大每服十丸日漸加蔭按吳氏曰凡人之身有真火焉寄於右腎行於三焦出入於甲膽聽命於天君所以溫百骸養臟腑充於七竅者皆此火也是火也萬物之父故曰天非此火不足以生萬物人非此火不能以有生若此火一熄則萬物無父故肉衰而瘠血衰而枯骨衰而齒落筋衰而肢倦氣衰而言微矣硫黃火之精也故用之以補火然其性過熱有毒故用豬臟爛煮以解之或曰世方以寒涼之品治勞而硫黃又世人罕用今治勞而用之誰不驚異余曰寒因熱用熱因寒用有熊氏之經也湯液云硫黃亦號將軍能破邪歸正返滯還清挺出陽精消陰化魄而生魂則先醫亦嘗頌之矣戴元禮氏丹溪之高弟也有言曰諸寒涼皆滯惟有黃連寒而不滯諸熱藥皆燥惟有硫黃熱而不燥則戴氏亦嘗頌之矣奈何拂吾心之理而求同俗乎昔仁和吏早衰服之年逾九十此往昔之驗也表之類編它如范文正公之金液丹得效之玉真丸和劑之來復丹半硫丸靈砂丹百選之二氣丹活人之返陰丹楊氏之紫霞丹往往皆用之但其所主者各有攸當茲不贅耳凡服硫黃者忌豬羊牛血及諸禽獸之血慎之補真丸治房勞過度真火衰弱不能熏蒸脾土致中州不運飲食不進胸膈痞塞或不食脹滿或已食不消大腑溏泄肌肉消瘦古人雖云補腎不如補脾其實補脾不如補腎也胡蘆巴香附陽起石川烏肉蓯蓉菟絲子沉香肉豆蔻五味子各五錢鹿茸巴戟鍾乳粉各一兩上為細末用羊腰子兩對以蔥椒酒煮爛和酒糊搗為丸如梧桐子大每服七十丸空心米飲鹽湯任下鹿茸大補湯治諸虛不足元陽虛冷鹿茸酒炙黃耆蜜炙肉蓯蓉酒浸杜仲炒去絲白茯苓當歸酒浸各一錢白芍酒炒附子炮肉桂石斛酒蒸焙五味子白朮煨半夏制人參各七分半甘草炙五分熟地酒浸一錢半上㕮咀作一服水二鍾生薑三片棗二枚煎至一鍾食前服治虛勞方滋陰降火湯治陰虛火動發熱咳嗽吐痰喘急盜汗口乾此方與六味地黃丸相間服之大補虛勞神效當歸酒洗一錢二分白芍酒炒一錢生地酒洗八分熟地薑汁炒天冬去心麥冬去心白朮去蘆各一錢陳皮七分黃柏蜜水炒知母酒炒各五分甘草炙三分上銼一劑生薑三片大棗一枚水煎臨臥入竹瀝童便薑汁少許同服一方加玄參貝母五味子殊效咳嗽盛加冬花紫菀五味子杏仁喘盛加桑白皮痰盛加薑製半夏貝母瓜蔞仁白茯苓潮熱盛加地骨皮柴胡知母盜汗加酸棗仁牡蠣浮小麥夢遺精滑加龍骨牡蠣山萸赤白濁加白茯苓黃連若兼衄血咳血出於肺也加桑白皮黃芩炒梔子兼嗽血痰血出於脾也加桑皮貝母黃連瓜蔞仁兼嘔血吐血出於胃也加山梔黃連乾薑蒲黃韭汁薑汁兼咯唾血出於腎也加玄參桔梗側柏葉王節齋加減四物湯治色欲證先見潮熱盜汗咳嗽倦怠趁早服之川芎熟地知母天冬去心各一錢白芍當歸白朮各一錢三分黃柏陳皮各七分甘草炙各五分乾薑炒三分生地黃薑酒浸五分上作一服加生薑二片水煎空心溫服潮熱加桑白皮沙參地骨皮盜汗及久病者去川芎加牡蠣酸棗仁浮小麥咳嗽加桑白皮馬兜鈴瓜蔞仁五味子痰加貝母半夏瓜蔞遺精加牡蠣龍骨山萸白濁加茯苓黃連衄咳血加山梔黃芩桑白皮嗽痰血加桑白皮貝母黃連瓜蔞仁嘔吐血加山梔黃連乾薑蒲黃薑汁韭汁咯唾血加桔梗玄參側柏葉外五臟變證如腰背足脛痠疼加杜仲牛膝龜板口舌生瘡驚惕加黃連胡黃連遠志茯神皮枯鼻塞聲沉加桔梗瓜蔞百部脅痛夢遺加龍膽草青皮青黛竹茹頸核加玄參香附貝母腹痛飲食無味去知柏麥冬生地黃倍白芍藥加白朮人參扁豆薏苡仁澤瀉腹塊加鱉甲山楂麥芽此病屬火大便多燥然須節調飲食勿令泄瀉若胃氣復壞泄瀉溏稀則前項寒涼之藥難用矣急宜服調理脾胃藥用白朮茯苓陳皮半夏神麯麥芽甘草等藥俟胃氣復然後用前本病藥收功後可合補陰丸常服之及用葛可久方六物湯治陰虛發熱當歸川芎白芍生地酒炒知母酒炒黃柏炒上銼水煎服甚者加龜板兼氣虛加參耆白朮加白馬脛骨降陰火帶芩連用逍遙散治血虛勞倦五心煩熱頰赤盜汗室女血弱陰虛榮衛不和月水不調痰嗽潮熱肌體羸瘦漸成骨蒸白朮茯苓當歸芍藥柴胡甘草炙上㕮咀加生薑一塊薄荷少許水煎服加山梔子牡丹皮名加味逍遙散加味四物湯治婦人血虛骨蒸當歸白芍川芎地黃酒炒以上補血地骨皮瀉腎火牡丹皮瀉包絡火各等分上㕮咀每服七八錢水煎服人參清肌散治男婦氣虛無汗潮熱煩渴人參白朮茯苓赤芍當歸柴胡半夏曲各一錢甘草炙五分上銼加生薑三片棗一枚水煎服人參地骨皮散治臟中積冷榮中熱脈按不足舉有餘乃陰不足陽有餘也人參地骨皮柴胡生地酒炒黃耆各一錢半知母石膏各一錢茯苓五分上銼加生薑三片水煎服人參麥門冬湯治虛熱煩渴人參麥冬去心小麥茯苓各一錢白芍八分甘草五分竹茹一團上作一服水煎服六味地黃丸治久新憔悴寢汗發熱五臟齊損瘦弱虛煩腸癖下血骨蒸痿弱無力不能運動東垣云治脈沉而虛者熟地黃八兩山茱萸山藥各四兩牡丹皮茯苓澤瀉各三兩上為細末煉蜜丸如桐子大每服五十丸空心溫酒白湯任下加味坎離丸生精養血升水降火王道之劑厚黃柏八兩酒鹽水人乳蜜各浸二兩俱曬乾炒赤知母八兩同上制當歸酒浸白芍酒浸川芎大者水洗各四兩熟地八兩白茯苓四兩打作小塊砂仁二兩以上三味同入絹袋中用好酒二壺煮乾去茯苓砂仁止用地黃上銼片各均鋪開日曬夜露各三度為末用白蜜一斤八兩重湯內煉成珠為丸如桐子大每空心鹽湯下七八十丸冬月溫酒下加味四制黃柏丸此坎離丸四物四君子湯合料也補血補氣滋陰降火治虛勞之聖劑黃柏去皮一斤納鹽水米泔水童便初生男乳各浸四兩夜露日曬取日精月華之氣合陰陽造化之功知母鹽酒浸曬乾白朮白茯苓當歸酒洗川芎山萸酒浸取肉各一兩白芍熟地酒拌蒸各二兩半人參五錢甘草三錢上為細末蜜丸梧桐子大每服五七十丸空心酒下鹽湯亦可滋陰降火丸黃柏一兩半知母蓮肉去心茯神去木人參枸杞各一兩熟地二兩上為細末將地黃搗膏和丸如桐子大每服百丸空心白湯下蔭按男子患虛勞多屬陰虧藥中須用枸杞為當滋陰清化丸清痰火滋化源肺腎乃人身之化源生地黃酒洗熟地黃酒浸天冬去心麥冬去心各二兩白茯苓一兩山藥炒一兩枸杞子白芍酒炒各一兩五味子七錢黃柏鹽酒炒一兩半知母鹽水炒玄參薏苡仁炒各一兩甘草生五分上為細末煉蜜丸如彈子大每服一丸空心噙化咽下有盜汗加黃耆蜜炙七錢痰嗽甚加陳皮貝母各二兩清神甘露丸治男子婦人虛勞不足大骨枯大肉陷皆治之生地黃汁白蓮藕汁生乳汁上三味等分用砂石器內以文武火熬成膏用後藥人參白朮黃連黃耆五味子胡黃連各等分上為細末以前膏子和劑丸如桐子大每服五十丸人參湯下瓊玉膏滋血補氣延年益壽昔人謂一料分十劑可救勞瘵十人人參三十六兩去蘆研為細末白茯苓二十四兩去皮研為淨末白蜜六斤生地黃十六斤搗取汁以盡為度去渣一方加枸杞天冬麥冬各一斤上和勻入銀石器瓶中內用油紙外用竹箬包以軟蔑縛緊瓶口入重湯內懸煮之用桑柴文武火不住手三晝夜入井中浸一日夜出火毒又煮一日出陰毒取出每空心用酒或白湯調下接命膏治男婦氣血虛弱痰火上升及一切虛損人乳二盞香甜白者佳梨汁一盞上二味傾入銀錫鏇中入湯內頓滾有黃沫起開青為度每五更後一服大能補虛消痰生血延壽玄霜雪梨膏生津止渴除咯血吐血嗽血久不止及治勞心動火勞嗽久不愈消痰止嗽清血歸經雪梨六十個去心皮取汁二十鍾酸者不用藕汁十鍾鮮生地搗取汁十鍾麥門冬搗爛煎汁五鍾蘿蔔汁五鍾茅根汁十鍾上六汁再重濾去渣將清汁再入火煎煉入蜜一斤飴糖半斤薑汁半酒盞入火再熬如稀糊則成膏矣如血不止咳嗽加側柏葉搗汁一鍾韭白汁半鍾茜根汁半鍾俱去渣入前汁內煎成膏服之坎離膏治勞瘵發熱陰虛火動咳嗽吐血唾血咯血咳血衄血心慌喘急盜汗黃柏知母各四兩生地薑酒炒熟地砂仁炒天門冬去心麥門冬去心各二兩杏仁去皮七錢胡桃仁去皮四兩蜂蜜四兩上先將黃柏知母童便三碗側柏葉一把煎至四碗去渣又將天麥門冬生熟地黃入汁內添水二碗煎汁去渣再搗如泥另用水一二碗熬熟絞汁入前汁將杏仁桃仁用水擂爛再濾勿留渣同蜜入前汁內用文武火熬成膏瓷器收貯封固入水內去火毒每服三五匙側柏葉煎湯空心調服忌銅鐵器服童便法滋陰降火消瘀血止吐衄咳咯諸血取十二歲以下童子絶其烹炮鹹酸多與米飲以助水道每用一盞入薑汁或韭汁一二點徐徐服之日進二三服寒天則重湯溫服久自有效也一方治骨蒸發熱取三歲童便五升煎取一升以蜜三匙和之每服二碗半日更服此後常取自己小便服之輕者二十日重者五十日瘥一方治男婦怯證男用童女便女用童男便斬頭去尾日進二次用乾燒餅壓之月餘全愈一方治久嗽涕唾肺痿時時寒熱頰赤氣急用童便去頭尾少許五合取大粉甘草一寸四破之浸之露一夜去甘草平旦頓服或入甘草末一錢同服亦可一日一劑童子忌食五辛物蔭按本草小便味鹹氣寒寇宗爽亦謂熱勞方中用之若氣血虛無熱者不宜多服而朱丹溪辨曰小便降火甚速常見一老婦年逾八十貌似四十詢其故常有惡病人教服人尿四十餘年矣且老健無他病而何謂之性寒不宜多服耶凡陰虛火動熱蒸如燎服藥無益者非小便不能除故李時珍云小便方家謂之輪回酒還元湯性溫不寒飲之入胃隨脾之氣上歸於肺下歸水道而入膀胱乃其舊路也故能治肺病引火下行又小便與血同類也故其味鹹而走血治諸血病不可缺也以上諸方治虛勞發熱之劑安嗽膏治陰虛咳嗽火動發熱咯血吐血大斂肺氣天冬去心八兩杏仁去皮貝母去心百部百合各四兩款冬花蕊五兩紫菀三兩雪白朮八兩上俱為粗末長流水煎三次取汁三次去渣入飴糖八兩蜜十六兩再熬又入阿膠四兩白茯苓四兩為末水飛過曬乾二味入前汁內和勻如糊成膏每服三五匙安肺湯治榮衛俱虛發熱自汗肺氣喘急咳嗽痰唾當歸川芎芍藥熟地酒蒸白朮茯苓五味子麥冬去心桑白皮炙甘草炙各五分阿膠一錢二分上作一服入生薑水煎服和肺飲子治咯血後肺虛咳嗽多痰阿膠人參麥冬去心山藥貝母茯苓百合杏仁去皮尖炒甘草炙各一錢上銼作一服入黃蠟如皂子大一塊水煎食後溫服緊菀散治咳中有血虛勞肺痿人參紫菀阿膠蛤粉炒各一錢茯苓知母桔梗各一錢半貝母一錢二分五味子十五粒甘草炙五分上銼水煎食後服天門冬丸治吐血咯血大安肺氣止咳天門冬去心一兩杏仁去皮尖炒貝母茯苓阿膠蛤粉炒各五錢上為細末煉蜜丸如彈子大每服一丸食後臨臥皆可用日進二三丸黃耆散治咳血成勞黃耆麥門冬熟地砂仁炒桔梗白芍各一錢甘草八分上㕮咀作一服水煎服一方加人參五味各六分名五味黃耆散劫勞散治心腎俱虛勞嗽時復三四聲潮熱潮過即有盜汗四肢倦怠體瘦恍惚異夢喉中有血名曰肺痿黃耆蜜炙一錢白芍二錢半人參白茯苓熟地砂仁炒當歸半夏曲五味子阿膠蛤粉炒甘草炙各一錢上作一服用水二鍾生薑三片棗一枚煎八分食遠服團參飲子治憂思喜怒飢飽失宜以致臟氣不安咳唾膿血增寒壯熱肌膚消瘦將成勞瘵人參紫菀阿膠炒成珠細辛款冬花杏仁天冬桑葉經霜者半夏湯泡七次五味子百合蒸各一錢甘草炙五分上作一服用水二鍾生薑三片煎八分食後服因氣而成核者加木香五分吐血有絲者加生地一錢半咳而吐血有痰者加鍾乳粉五分因痰極而咳嗽者加黃耆一錢因損嗽而唾血者加沒藥五分藕節二個咳而嘔逆腹滿不食者加白朮一錢二分仍倍加生薑咳而小便多者加益智仁八分咳而大便溏者用杏仁加白朮一錢咳而氣逆者加陳皮一錢沉香七分蘇子降氣湯治虛陽上攻氣不升降上盛下虛痰涎壅盛喘促短氣咳嗽蘇子五錢陳皮厚朴薑汁炒前胡肉桂各二錢半夏薑製當歸甘草炙各一錢上銼一劑薑三片棗一枚水煎服蔭按虛勞病未有不痰嗽壅盛者而治痰以燥濕之藥治嗽以清火之劑百無一效蓋此痰非脾濕之痰乃濁液聚而為痰也此火非有餘之火乃虛陽升而為火也大抵人身之氣不過一陰一陽陽降陰升水火既濟何痰火之有惟心火炎於上腎水虧於下致陽氣浮而不降陰氣沉而不升此痰嗽喘急之所由而作也此方收斂陽氣使歸下元則陰氣自升火邪自降痰嗽何由而作乎以上諸方治虛勞嗽喘之劑正氣湯治陰虛有火令人盜汗黃柏炒一錢知母炒一錢半甘草炙五分上銼作一服水煎服四制白朮散治盜汗白朮四兩用黃耆石斛牡蠣麥麩各炒一兩去四味不用上止取白朮為末每服三錢粟米飲調下黃耆六一湯治虛人盜汗黃耆六兩甘草一兩上各用蜜炙十數次出火毒每服一兩水煎服玉屏風散治自汗防風黃耆各一錢二味實表白朮二錢燥內濕上作一服水煎服以上諸方虛汗之劑歸脾湯治思慮傷脾血氣大虛或健忘怔忡驚悸盜汗或肢體重痛嗜臥少食人參白朮茯苓黃耆蜜炙龍眼肉當歸遠志去心酸棗仁炒各一錢木香甘草炙各五分上銼作一服水煎服滋陰安神湯治血氣兩虛不時怔忡眩暈當歸川芎白芍熟地砂仁炒人參白朮茯神去木遠志去心酸棗仁去心甘草炙各五分黃連酒炒四分上作一服加生薑三片水煎服滋陰抑火湯治陰火上衝怔忡不已當歸酒洗芍藥煨生地酒炒熟地黃川芎黃連知母各一錢肉桂甘草各五分上銼水煎入童便半盞食前服硃砂安神丸治血虛心煩懊憹驚悸怔忡胸中氣亂硃砂五錢水飛過另研黃連酒洗六錢生地薑酒炒一錢半當歸甘草炙各二錢半上為細末蒸餅為丸如黍米大硃砂為衣每服十五丸食後唾津下蔭按以上諸方治心神怔悸之劑大抵虛勞證多起之於勞心思慮水火不交故治腎必先治心心火既降則腎水自升且不致刑肺金絶生化之源蓋源源本本之道也參苓白朮散治脾胃虛弱飲食不進泄瀉等證人參白朮白茯苓各一錢甘草炙七分山藥炒一錢蓮肉五分白扁豆七分薏苡仁五分砂仁桔梗各五分上為細末每服二錢煎棗湯調下瀉不止加訶子瑞蓮丸治元氣大虛脾胃怯弱泄瀉不止不思飲食乾山藥炒蓮肉去心白朮芡實去殼各二兩楝參五錢白茯苓橘紅白芍酒炒各一兩上為末豭豬肚一個洗淨煮爛搗和為丸如桐子大每服百丸空心米湯下兼服白雪糕二仙糕壯陰益腎水養脾胃人參山藥白茯苓芡實仁蓮肉去皮心各半斤糯米一升粳米三升半蜜半斤白糖半斤上為細末和勻將蜜糖溶化和末摻妥得宜以小木籠炊蒸之上以米一撮成飯則糕成矣取起劃作棋子塊漫火上烘乾作點心或作末貯磁器每早一大匙白沸湯調下以上諸方補脾胃止瀉泄之劑人參黃耆湯治血氣大虛精神短少形羸脈微奄奄欲盡此藥大有補益方見虛損門樂令建中湯治臟腑虛損身體消瘦潮熱自汗將成勞瘵此藥大能退熱補虛生血氣前胡細辛當歸白芍人參陳皮去白麥冬去心桂心黃耆蜜炙茯苓甘草炙各一錢半夏八分上作一服生薑五片棗一枚水煎食遠服十全大補湯治男子婦人諸虛不足五勞七傷此藥性溫補常服生血補脾胃人參黃耆白朮茯苓甘草炙當歸川芎白芍熟地黃肉桂各一錢上㕮咀作一服用水二鍾生薑三片棗二枚煎至八分食遠服人參養榮湯治積勞虛損四肢倦怠肌肉消瘦而少顏色汲汲短氣飲食無味人參當歸陳皮黃耆蜜炙桂心白朮甘草炙各一錢白芍二錢熟地黃酒浸茯苓五味子各七分半遠志去心上作一服生薑三片棗二枚水煎食遠服蔭按世人治虛勞率執陰虛火動之説始終用四物湯加知母黃柏及天麥冬滋陰降火之劑不知此特可用於初病之時蓋初病時止是腎水虛弱心火偏旺而他臟尚實榮衛未損故以此取效耳若病久不愈則五臟俱損真氣消耗重以陰寒之藥能不促之死乎古人云服涼藥百無一生正此之謂也以上諸方俱甘溫之劑蓋甘能生血溫能除大熱以此溫養氣血調和榮衛使陰無偏勝之害則病易痊矣大抵變見偶發之證不妨寒熱偏攻若平時調養之藥必須沖和兼濟此養生之至理不獨治虛勞為然也以上諸方大補氣血之劑補天大造丸治男女諸虛百損補益之功極重大抵男精女血構成非草木金石可比以人補人全天元真氣世所少知紫河車一具用首胎及肥盛無病婦人者先以米泔水擇淨不動筋膜以竹器盛於長流水中浸一刻提回以小瓷盆盛於木甑內文武火蒸自卯至酉極熟如糊取出先傾自然汁在藥內餘用石臼杵擂爛如糊通入藥末內為丸熟地黃酒蒸二兩生地黃酒浸麥冬去心天冬去心牛膝杜仲炙去絲各一兩五錢當歸酒洗黃柏酒炒白朮五味子枸杞子小茴香各一兩陳皮去白七錢半側柏葉焙乾二兩乾薑炮二錢上為細末用河車入煉蜜為丸如桐子大每服七十丸空心鹽湯下有病者日進二服如血虛倍當歸地黃氣血加人參黃耆各一兩骨蒸加地骨皮知母牡丹皮婦人去黃柏加川芎香附條芩河車丸治一切勞瘵虛損骨蒸等證紫河車一具如前制人參一兩白茯苓半兩山藥二兩上為末麵糊入河車丸如桐子大每服三五十丸空心米飲下嗽甚五味子湯下還元秋石丸治諸虛百損秋石一斤白茯苓一斤天冬去心麥冬去心人參生地酒炒熟地砂仁炒枸杞子人乳粉各四兩上為細末煉蜜丸如梧桐子大每服三十丸白湯或酒下秋石四精丸治思慮色欲過度損傷心氣遺精小便數秋石白茯苓各四兩蓮肉芡實各二兩上為末蒸棗肉和丸如桐子大每服三十丸空心鹽湯下接命丹治虛損勞瘵人乳用磁碟曬極熱置乳於中人胞一具曬乾為末上以乳汁調胞末服服後以白粥少少養之或將乳曬乾為粉與人胞末等分棗肉丸服亦可服人乳法每用一吸即以紙塞鼻孔按唇貼齒而漱乳與口津相和然後以鼻內使氣由明堂入腦方可徐徐咽下如此五七吸為一度不漱而吸何異飲酪止於腸胃爾蔭按白飛霞醫通云服人乳大能益心氣補腦髓止消渴治風火證養老尤宜南史載宋何尚之積年勞病飲婦人乳而瘥方術家隱其名謂之仙人酒故服乳歌曰仙家酒仙家酒兩個葫蘆盛一斗五行釀出真醍醐不離人間處處有丹田若是乾涸時咽下重樓潤枯朽清晨能飲一升余返老還童天地久蓋乳乃陰血所化生於脾胃攝於衝任未受孕則下為月水既受孕則留而養胎也已産則赤變為白上為乳汁此造化玄微自然之妙也以上諸方皆以人補人之法蓋虛勞羸瘦真氣消耗者非草木之滋味可補須以此培養庶真元可復而肌肉再生也秋石還元丹久服去百病強骨髓補精血開心益志補暖下元悅色進食久則臍下常如火暖諸般冷病皆愈年久冷勞虛憊者服之亦壯盛用男子小便十石童男尤佳先安大鍋一口於空室中上用深瓦甑接鍋口以紙筋杵石灰泥甑縫並鍋口勿令通風候乾下小便約鍋中七八分以來灶下用焰火煮之若湧出即少少添冷小便候煎乾即人中白也入好罐子內如法固濟入炭爐中煅之旋取二三兩再研如粉煮棗肉和丸如緑豆大每服五七丸漸加至十五丸空心溫酒或鹽湯下其藥常要近火或時復養火三五日則功效更大也秋冰乳粉丸固元陽壯筋骨延年不老卻百病秋冰五錢人乳頭生男女乳汁曬粉各五錢乳香二錢五分麝香一錢上為末煉蜜丸如芡實大金箔為衣烏金紙包黃蠟匱收勿令泄氣每日用乳汁化服一丸仍日飲乳汁助之秋水法用童男童女尿垽各一桶入大鍋內桑柴火熬干刮下入河水一桶攪化隔紙淋過復熬刮下再以水淋煉之如此七次其色如霜或有一斤入罐內上用鐵燈盞蓋定鹽泥固濟升打三炷香看秋石色白如玉再研再如前升打燈盞上用水徐徐擦之不可多多則不結不可少少則不升自辰至未退火冷定其盞上升起者為秋冰味淡而香乃秋石之精英也服之滋腎水固元陽降痰火其不升者即尋常秋石也味鹹苦蘸肉食之亦有小補治五勞方黃耆湯五臟皆有勞勞其肺者短氣虛寒皮毛枯澀津液不通氣力損乏脈來遲緩者此方主之黃耆四兩人參白朮桂心各二兩附子三十株生薑八兩大棗十枚上銼每服一兩水煎服蔭按脈主氣久於悲哀喘咳則成肺勞肺勞故令氣短而聲不長氣為陽陽虛則寒故令虛寒肺主皮毛肺勞則無津液以充膚澤毛故令枯澀氣有餘則物潤津氣不足則無以化液故令口乾而津液不通氣壯則強氣餒則弱今肺為勞傷故氣力損乏脈來遲者為寒緩者為虛黃耆人參甘溫者也故能補氣經曰損其肺者益其氣是故用之桂心附子辛熱者也氣虛則陰湊之而為寒熱能壯氣是故用之白朮薑棗脾胃藥也經曰虛則調其母脾是肺之母是故用之是方也以上件皆是虛寒之證故為合宜若肺熱脈數者非所宜也合主二母散二母散肺勞有熱不能服補氣之劑者此方主之知母去毛炒貝母去心略炒各五錢上共為末水煎服蔭按治肺有二法氣虛而陰湊之則如前方之溫補金衰而火乘之則如此方之滋陰宜溫補者易愈宜滋陰者難療蓋火來乘金謂之賊邪將作肺痿甚是難治是方也二母皆苦寒之品苦能堅金寒能勝熱故昔人主之人參固本丸肺勞虛熱此方調之人參二兩天冬去心炒麥冬去心炒生地薑酒炒熟地黃各四兩砂仁沉香炒上為末煉蜜丸如桐子大每服百丸空心溫湯下蔭按本猶根也肺主氣根于丹田肺畏火而制火必本於腎水故用人參益氣二冬清氣熟地補腎生地涼腎劑之為丸用之於下所謂壯水之主以制陽光是也非固本而何或問補腎何以用人參余曰大氣周流無臟不有故人參之用亦無處不宜今得滋陰之品以君之則亦上行而補下矣天王補心丹過勞其心忽忽喜忘大便難或時溏利口內生瘡者此方主之人參去蘆白茯苓去皮玄參炒丹參炒遠志炒桔梗各五錢生地酒洗四兩五味炒當歸酒洗麥冬去心炒天冬去心炒柏子伯炒去油酸棗仁炒各一兩去油上為細末煉蜜丸如桐子大每服百丸食後臨臥用燈心棗湯下蔭按心者神明之臟過於憂愁思慮久久則成心勞心勞則神明傷矣故忽忽喜忘心主血血濡則大便潤血燥故大便難或時溏利者心火不足以生脾土也口內生瘡者心虛而火內灼也人參養心當歸養心血天麥冬所以益心津生地丹玄所以解心熱柏仁遠志所以養心神五味棗仁所以收心液茯苓能補虛桔梗能利膈諸藥專於補心勞心之人宜常服也此方之傳未考所自偈云昔者志公和尚日夕講經鄧天王憫其勞也錫以此方因得名焉載在經藏今未辨其真偽異日廣求佛典而搜之犀角地黃湯勞心動火吐血衄血者此方主之生犀角鎊生地酒炒白芍藥牡丹皮上銼水煎溫服蔭按心屬火而主脈過勞其心則火妄動而脈湧溢越竅而出則為吐為衄者熱也經曰治病必求其本故以涼心之藥主之生犀能解心熱生地能涼心血白芍丹皮酸寒之物也酸者人肝寒者勝熱所以心病而治肝者肝是心之母木能生火故從肝而治之乃迎奪之兵也四物粱米湯心勞吐衄久服寒涼之劑因壞脾胃者此方主之粱米稻米黍米各一升蠟如彈丸大後入以化為度上水煮服蔭按心是脾之母脾是心之子脾因寒涼而壞則必盜母氣以自養而心益病矣求其不殆得乎故宜調脾益胃調脾莫如穀氣故用稻粱黍米復用蠟者取其厚腸胃云爾此療子益母之義昔之良醫皆用之半夏湯脾勞四肢不用五臟皆乖脹滿肩息舌根苦直不能咽唾者此方主之半夏制宿薑各二兩茯苓去皮白朮土炒杏仁去皮尖炒橘皮去白芍藥炒各五錢竹葉二十片大棗五枚上銼水煎服蔭按脾主消磨五穀若勞倦之後病瘥之餘遇適口之味過於厭飫脾弱不能消磨勞於運化久久則成脾勞脾主四肢故令四肢不用五臟皆受氣於脾脾勞而傷則五臟皆無以稟氣故乖而失其常經曰脾主行氣於三陰脾勞則三陰之氣至胸中而還故令肩息脾之經脈上膈挾咽連舌本散舌下故令舌根苦直不能咽唾半夏甘辛甘則益脾辛則散滯宿薑等之一以醒脾一以製半夏之毒脾喜燥而畏濕故用白朮燥脾茯苓滲濕脾喜通而惡塞故用杏仁利氣橘皮泄氣竹葉氣清能去土中之火芍藥味酸能瀉土中之木大棗之用取其甘而益脾爾補中益氣湯勞倦傷脾中氣不足懶於言語惡食溏泄日漸瘦弱者此方主之人參甘草炙各一錢黃耆蜜炙一錢五分當歸白朮炒陳皮去白柴胡各五分升麻三分上作一服水煎服蔭按脾主四肢故四肢勤動不息又遇飢餒無穀氣以養則傷脾脾傷故令中氣不足懶於言語脾氣不足以勝穀氣故惡食脾弱不足剋制中宮之濕故溏泄脾主肌肉故瘦弱五味入口甘先入脾是方也參耆歸術甘草皆甘物也故可以入脾而補中氣中氣者脾胃之氣也人生與天地相似天地之氣一升則萬物皆生天地之氣一降則萬物皆死故用升麻柴胡為佐以升清陽之氣所以法象乎天地之升生也用陳皮者一能疏通脾胃一能行甘溫之滯也是證黃耆建中湯亦可主用見傷寒門枸杞酒肝勞面目青口苦精神不守恐畏不能獨臥目視不明者此方主之枸杞子一斗酒二斗上二味同煎服蔭按肝者將軍之官謀慮出焉故謀而不決拂而數怒久久則勞其肝肝東方之色也病則色徵於面目故令面目色青口苦者肝移熱於腑而膽汁上溢也肝藏魂肝勞則邪居魂室故令精神不守且恐畏不能獨臥也肝氣通於目肝和則能辨五色矣今肝為勞傷故令目視不明經曰味為陰味厚為陰中之陰枸杞味厚故足以養厥陰之陰煮以純酒取其泱洽氣血而已他如六味地黃丸亦可主用古謂腎肝之病同一治又謂虛則補其母腎是肝之母故地黃丸亦宜六味地黃丸加黃柏知母方腎勞背難俯仰小便不利有餘瀝囊濕生瘡小腹裡急便赤黃者此方主之熟地黃八兩山茱萸去核山藥各四兩澤瀉牡丹皮去木白茯苓各三兩黃柏鹽水炒知母鹽水炒各二兩上為末地黃搗膏同煉蜜丸如桐子大每服百丸空心白湯溫酒任下蔭按腎者藏精之臟也若人強力入房以竭其精久久則成腎勞腎主精精主封填骨髓腎精以入房而竭則骨髓日枯矣故背難俯仰前陰者腎之竅腎氣足則能管攝小便而溲溺惟宜腎氣怯則欲便而不利既便而有餘瀝斯之謂失其開闔之常也腎者水臟傳化失宜則水氣留之水氣留則生濕熱故令囊濕生瘡也小腹裡急者此真水枯而真火無制真水枯則命門之相火無所畏真火無制故灼膀胱少腹之筋膜而作裡急也便赤黃者亦皆火之所為熟地山萸味厚者也味厚為陰中之陰故足以補腎門之陰血山藥茯苓甘淡者也甘能制濕淡能滲濕故足以去腎虛之陰濕澤瀉丹皮鹹寒者也咸能潤下寒能勝熱故足以去腎間之濕熱黃柏知母苦潤者也潤能滋陰苦能濟火故足以服龍雷之相火夫去其灼陰之火滋其濟火之水則腎間之精血日生矣王冰曰壯水之主以制陽光此之謂也治六極方豬膏灑筋極之狀令人數轉筋十指爪甲皆痛苦倦不能久立此方主之豬膏薑汁各二升熬取三升再入酒酒五合上和煎分三服蔭按筋極者數勞四肢筋液耗竭名曰筋極極者甚於勞之名也筋既竭其津液則失其潤養而作徑急故令人數轉筋也爪甲筋之餘筋屬木木極則筋承之故令十指爪甲皆痛亦枝枯萌萎之象也苦倦不能久立者筋敗不能束骨也是疾也若以草木之藥治之卒難責效師曰膏以養筋故假豬膏以潤養之等以薑者非辛不足以達四肢故也復熬以酒者以酒性善行能浹洽氣血無所不之故用之以為煎也人參養榮湯脈極者忽忽喜忘少顏色眉發墜落此方主之人參去蘆黃耆蜜炙陳皮白芍酒炒當歸酒洗甘草炙白茯苓五味子炒遠志去心桂心白朮炒熟地砂仁沉香炒上加薑棗水煎服陰按脈者血之府脈極者血脈空虛之極也此由失血所致心主血脈脈極則無血以養心故令忽忽喜忘榮血有餘則令人悅澤顏色榮血不足則令人色夭而顏色少也眉發者血之所養榮血不足故令眉發墜落人參黃耆白朮茯苓甘草陳皮皆補氣藥也榮血不足而補氣此大易之教陰生於陽之義也陰者五臟之所主故用當歸澤脾芍藥調肝熟地滋腎五味益肺遠志安心五臟和而陰血自生矣桂性辛熱熱者入心而益火辛者入經而利血又心為生脈之源故假之引諸藥入心而養榮血於脈耳十全大補湯肉極者肌肉消瘦皮膚枯稿此方主之人參黃耆白朮白芍熟地酒蒸茯苓當歸川芎甘草各等分桂心少許上銼每服一兩加生薑三片棗一枚煎服蔭按肉極由於陰火久灼者難治宜別主六味地黃丸若由飲食勞倦傷脾而致肉極者宜大補氣血以充之經曰氣主昫之血主濡之故用人參白朮黃耆茯苓甘草甘溫之品以補氣氣盛則能充實於肌肉矣用當歸川芎芍藥地黃以肉桂味厚之品以補血生血則能潤澤其枯生脈散氣極者正氣少邪氣多多喘少言此方主之人參麥冬去心五味子炒各等分上水煎服蔭按肺主氣正氣少故少言邪氣多故多喘此小人道長君子道消之象也人參補肺氣麥冬清肺氣五味斂肺氣一補一清一斂養氣之道畢矣名曰生脈者以脈得氣則充失氣則弱故名之東垣云夏月服生脈散加黃耆甘草令人氣力湧出若東垣者可以醫氣極矣虎骨酒骨極者腰脊痠削齒痛手足煩疼不欲行動此方主之虎骨一具通炙取黃焦汁盡碎如雀腦糯米三石上二味和一處倍用曲如釀酒法釀之酒熟封頭五十日開飲之蔭按腎主骨骨極者骨肉空虛之極也故令腰脊痠削齒者骨之餘故齒亦痛手足煩疼不欲行動皆骨內空虛之徵也以骨治骨求其類也以虎骨者取其壯也釀之以酒者酒性善漬直徹於骨也褚澄云男子天癸未至而御女則四肢有未滿之處異日必有難狀之疾其骨極之類乎龜鹿二仙膠精極者夢泄精遺精瘦削少氣目視不明此方主之鹿角血取者十斤龜板五斤枸杞子三十兩人參十五兩上件用鉛壇如法熬膠初服酒化錢半漸加至三錢空心下蔭按精氣神有身之三寶也師曰精生氣氣生神是以精極則無以生氣故令瘦削少氣氣少則無以生神故令目視不明鹿龜稟陰氣之最完者其角與板又其身聚氣之最勝者故取其膠以補陰精用血氣之屬劑而補之所謂補以類也人參善於固氣氣固則精不遺枸杞善於滋陰陰滋則火不泄此藥行則精日生氣日壯神日旺矣治七傷方加味逍遙散一曰大怒逆氣傷肝肝傷則少血目暗此方主之當歸白芍白朮柴胡茯神甘草各一錢牡丹皮山梔各七分上銼水煎服蔭按經曰肝者將軍之官故主怒怒則氣逆氣逆則血亦逆故少血眼者肝之竅又曰目得血而能視今肝傷少血故令目暗越人云東方常實故肝臟有瀉而無補即使逆氣自復疏之即所以補之也此方名曰逍遙亦是疏散之意柴胡能升所以達其逆也芍藥能收所以損其過也丹梔能瀉所以伐其實也木盛則土衰白朮甘草扶其所不勝也肝傷則血病當歸所以養其血也木實則火燥茯神所以安其心也安神丸二曰憂愁思慮傷心心傷則苦驚喜忘夜不能寐此方主之黃連一兩五錢酒潤硃砂一兩水飛當歸酒洗生地薑酒炒炙甘草各五錢上除硃砂另研余俱為末湯浸蒸餅為丸如黍米大硃砂為衣每服十五丸或二十丸食後唾津咽下或用熟水一口送下亦可蔭按憂愁思慮則火起於心心傷則神不安故苦驚心主血心傷則血不足故喜忘愈傷則憂愁思慮愈不能去故夜不能寐苦可以瀉火故用黃連重可以鎮心故用硃砂生地涼心當歸養血炙甘草者所以益脾脾是心之子用之欲其不食氣於母故耳歸脾湯三曰飲食太飽傷脾脾傷則面黃善臥宜此方主之人參白茯苓龍眼肉酸棗仁去油黃耆白朮各二錢遠志一錢去心木香炙甘草當歸各五分上水煎服蔭按脾者倉稟之官故飲食太飽則傷之中央土色入通於脾脾傷則其本色自見故面黃神者中氣之所生脾傷則神亦倦故喜臥內經曰五味入口先入脾參耆苓朮甘草皆甘物也故用之以補脾虛則補其母龍眼肉酸棗仁遠志所以養心而補母脾氣喜快故用木香脾苦亡血故用當歸此主食去脾傷之妙法也若停食之方則以消磨之劑主之而不專於補益矣附子理中湯四曰形寒飲冷傷肺肺傷則短氣咳嗽脈來微遲者此方主之人參白朮甘草炙乾薑炮附子制各一錢上水煎服蔭按形寒者形氣虛寒也飲冷者復飲冷物也熱則氣壯寒則氣怯今肺為寒冷所傷故令氣短水寒射肺肺不能容故令咳嗽脈來微者為虛遲者為寒損其肺者益其氣故用參朮甘草寒者溫之故用附子乾薑白通加人尿豬膽汁湯五曰久坐濕地傷腎腎傷則短氣腰痛厥逆下冷陰脈微者宜此方主之蔥白四莖乾薑一兩附子一枚人尿五合豬膽汁一合上件同煎服蔭按腎者水臟濕其類也故感之易入而易傷凡人呼吸之氣呼出心與肺吸入腎與肝腎傷則吸微故令短氣腰者腎之府腎傷而腰痛者其勢也濕為陰其氣寒陰並於下則陽格於上故厥逆而下冷尺為陰陰脈微者下部寒也乾薑附子熱物也可以回陽燥濕師曰太陽中天則寒者溫濕者燥故薑附可以治寒濕蔥白辛溫可使通腎氣人尿豬膽性寒而質陰用之者一可以制薑附之熱而不使其燥烈於上焦無病之分一可以同寒濕之性而引薑附直達下焦受病之區此佐以所利和以所宜乃兵家之嚮導也玉屏風散六曰風雨寒濕傷形形傷則皮膚枯稿宜此方主之黃耆防風各一兩白朮二兩上水煎服蔭按外冒風雨則寒濕不免矣以外得之故令傷形而皮膚枯稿然皮膚之間衛氣之所居也靈樞經曰衛氣者所以溫分肉充皮膚肥腠理而司開闔者也故峻補其衛氣而形斯復矣黃耆甘溫補表之聖藥也得防風而功愈速故以防風等之白朮益脾脾主肌肉故以白朮倍之三藥者皆補氣之品內經曰形不足者溫之以氣此之謂也方名曰玉屏風亦是以其補益衛氣足以為吾身之倚襲耳升陽益胃湯七曰大怒恐懼傷志志傷則恍惚不樂宜此方主之羌活獨活防風柴胡白朮茯苓黃耆人參半夏甘草陳皮黃連澤瀉白芍藥上水煎服蔭按怒則氣上恐則氣下一怒一恐拂於膻中則志意不得舒暢故曰傷志志者腎之所主而暢於膻中膻中者兩乳之間心君之分也神心者神明之所出故令不樂下者舉之郁者達之故用羌獨活防風柴胡升舉之品氣乖於中脾胃受病故用參耆苓朮橘半甘芍調胃之品附葛可久先生治勞證十方十藥神書曰夫人之生皆稟天地氤氳之氣在乎保養真元固守根本則萬病不生四體康健若曰不養真元不固根本病疾由是生焉且真元根本則血氣精液是也先師有言曰萬病莫若勞證之難治其由蓋因壯年血氣充實精液完滿之際不能養守惟務酒色豈分飢飽日夜耽嗜無有休息以致耗散真元虛敗精液則嘔血吐痰心熾煩痿骨蒸體熱腎虛精竭面白頰紅口乾咽燥白濁白帶遺精盜汗飲食難進氣力全無謂之火乘金候重則半年而斃輕則一載而傾醫者不究其本不通其妙或用大寒大熱之藥妄投亂進絶不取效殊不知大寒則愈虛其中大熱則愈竭其內所以世之醫勞者萬無一人焉先師用藥治勞如羿之善射無不中的已活者不可數計今將用藥次第續列於後用藥之法如嘔吐咳嗽血者先以十灰散遏住如甚者次以花蕊石散止之大抵血熱則行血冷則凝見黑則止此理然也止血之後患人必疏解其體用獨參湯補之令其熟睡一覺不要驚動睡起病去五六後服諸藥可服保和湯止嗽安肺保養湯補虛除熱太平丸潤肺扶痿消化丸下痰疏氣保和湯內分血盛痰甚喘盛熱甚風盛寒甚六事加味用之保真湯內分驚悸淋濁便澀遺精燥熱盜汗六事加味用之如無不加服藥之法每日三服食前服保真湯三食後服保和湯三藥相同為佳每日仍濃煎薄荷湯灌嗽喉中用太平丸先嚼一丸徐徐咽下次再噙一丸緩緩溶化至上床時亦如此用之蓋夜則肺竅開藥味必流入竅中此緊要訣如痰湧卻先用飴糖拌消化丸一百丸吞下次又依前噙嚼太平丸令其仰面而臥服前七藥後若肺有嗽可煮潤肺膏食之如常服如服七藥之有徐暇者此食之亦佳續煮白鳳膏食之復其真元完其根本全愈之後方合十珍丸服之此謂收功起身之用也上十味如神之妙如仙之靈雖廬醫扁鵲在世不過如此籲時分方脈用藥不過草木金石碌碌之常用耳何以得此通神聖至仙奇異決妙效之藥也昔蒙先師傳授此書在吳中疾證起斃回生何止千餘人只得十灰散花蕊石散獨參湯料之藥則猶蘧然愈豫平生得此妙用未嘗傳與一人豫今漸老恐此方之泯失故録此序名之曰勞證十藥神書留遺子孫用之不許亂傳非人如違父訓以不孝論時至正乙酉年一陽月可久道人書於姑蘇養道山房十灰散治勞證嘔血吐血咯血嗽血先用此道遏之大薊小薊側柏葉荷葉茅草根酋根牡丹皮棕櫚皮山梔仁大黃各等分一方有百草霜上俱燒灰存性研極細末用紙包以碗蓋於地上一夕出火毒用時先將白藕搗絞汁或蘿蔔汁磨真京墨半碗調前藥灰五錢食後服下如病輕用此立效如勞重出血成升斗者用後藥立止如神花蕊石散治勞證五內崩損湧噴血出成升斗者用此藥止之花蕊石火煅過存性研為細末上用童子小便煎溫調服三錢極重者五錢食後服之如男子病和酒半盞女子病和醋半盞一處調藥立止其病化瘀血為黃水服此藥後患人必疏解其體卻煮後藥以補之獨參湯治勞證止血崩後服此藥以補之人參大者二兩上㕮咀用水二鍾棗五枚同煎一盞不拘時細細服之服後宜熟睡一覺後用諸藥除根或云人參肺熱者大忌虛而有火者亦必以天門冬佐之保和湯治勞證久嗽肺燥成痿者服之決效知母貝母去心天門冬去心麥門冬去心款冬花各三錢天花粉薏苡仁杏仁五味子粉草炙馬兜鈴紫菀百合桔梗各二錢阿膠炒當歸地黃生用各一錢紫蘇薄荷各五分上㕮咀各依常法修成粗末每服用三五錢水二鍾半生薑三片共煎一鍾去渣卻用飴糖一匙入藥汁內服每食後進一盞日三服一方有百部無生地黃如血盛痰盛喘盛熱盛寒風盛依後藥加入煎服如服此藥後時與保真湯間服之極妙血盛加蒲黃茜根藕節大薊小薊茅花痰盛加南星半夏橘紅葶藶茯苓枳殼枳實瓜蔞仁喘盛加桑白皮陳皮大腹皮蘇子蘿蔔子葶藶熱盛加大黃山梔子黃連黃芩黃柏連翹寒盛加人參芍藥桂枝麻黃五味子黃蠟片風盛加防風荊芥旋覆花甘菊花香附子細辛上六等依證各入前藥煎服如磁石引針幼兒認母矣無不中效世人治勞證之藥百萬千之方何以及此方神效保真湯治勞證骨蒸體熱虛憊服之決效當歸生地薑酒炒熟地砂仁炒人參白朮黃耆天門冬去心麥門冬去心各三錢赤茯苓五錢白茯苓白芍知母炒黃柏炒五味子柴胡地骨皮各二錢陳皮二錢半赤芍厚朴一方無此味甘草炙各一錢半上二十味依常法修合成粗末每服三五錢用水二鍾薑五片棗五枚蓮子心五枚同煎一盞去渣每日三食前各進三盞如驚悸淋濁便澀遺精燥熱盜汗依後加入前藥如服此藥與前保和湯相間服之極妙驚悸加茯神遠志柏子仁酸棗仁淋濁加萆薢烏藥豬苓澤瀉便澀加苦梗木通石韋萹蓄遺精加龍骨牡蠣蓮心蓮鬚燥熱加石膏滑石青蒿鱉甲盜汗加浮麥牡蠣黃耆麻黃根上六味依證加入前藥內煎服如雨露灌木水土養民無不中效滋補之藥碌碌繁雜何以及此神效太平丸治勞證日久咳嗽肺痿痰湧肺癰並宜噙化服之決除根天門冬去心麥門冬去心知母貝母去心杏仁款冬花各二兩當歸生地薑酒炒熟地砂仁炒黃連阿膠炒成珠各一兩半蒲黃京墨桔梗荊芥一方無此味薄荷各二兩麝香少許上各依常法修制淨為細末煉白蜜熟取訖下諸藥末攪勻再入火內麝香略熬二三沸即丸如彈子大每日三食後濃煎薄荷湯灌嗽喉口細嚼一丸唾津下再噙一丸緩緩溶化上床時噙化如前如痰盛先用飴糖津拌吞下消化丸一百丸後即噙嚼此藥仰面而睡使其藥流入肺竅內則肺清潤其嗽自除此藥服之一日夜嗽止三分二日夜嗽止八分四日夜嗽止十分五日夜全除其嗽七日夜永絶其根大凡咳嗽只用此藥方至靈妙誠篤君子方可傳之消化丸治勞瘵證熱痰湧盛服之立可青礞石三兩火硝三兩火煅黃金色白明礬枯橘紅半夏白茯苓各一兩南星二兩生用薑炒八錢豬牙皂角二兩火炙去皮弦枳實麩炒一兩半枳殼炮去穰薄荷各一兩一方有沉香黃芩各五錢上修製為細末以神麯打糊為丸如梧桐子大每服百丸每夜上床時飴糖津拌吞噙嚼太平丸二藥相攻痰嗽自除潤肺膏治勞證久嗽肺燥肺痿時常服之羯羊肺一具柿霜真酥真粉杏仁去皮尖研各一兩看肺大小白蜜三兩上先將羊肺洗淨次將柿霜杏仁真酥真粉白蜜五味水解薄打攪稠稀得所灌入肺中白水煮熟如常服食與前七藥相間服之亦佳白鳳膏治一切久勞大虛怯極胃憊咳嗽吐痰咯熱血發喘此火乘金位者服之復真元全根本黑嘴白鴨一隻大京棗三升陳煮酒一大壇參苓平胃散一斤上先將鴨扎縛其腳挂起次量患人飲酒多少隨量傾在器中燙溫卻將刀於鴨項刺割開滴血入於酒中攪勻一氣飲之其血酒直入肺經中滋補其肺安止其嗽又將鴨干撏其毛脅下肋間開一孔取出腸雜用紙拭乾肚中次將棗去核每個填參苓平胃散末以皮麻繩扎縛定足裝填入鴨肚腹內用砂甏甕一個放鴨在內四圍用炭火慢煨一瓶酒作三次添入以酒干為度取出隨意食之盡此一鴨不問一切勞證虛憊等決效矣後卻服十珍丸服則生津活血順氣此乃收功起身之妙藥也十珍丸一名補髓丹治一切久勞虛憊髓精血枯氣竭火乘金位者服前藥愈後卻服此藥收功起身之法也豬脊髓一條羊脊髓一條烏骨雞一隻鱉一個上四味制淨去骨留肉用煮酒一大瓶於砂鍋內煮乾熟擂爛再入後藥大山藥五條蓮肉去心半斤京棗百枚柿霜十個上四味修制淨用井花水一大瓶於砂鍋內煮熟擂爛令勻與前熟肉一處再用漫火熬之卻下明阿膠四兩真黃蠟三兩上二味旋旋下與前藥八味和作一處研擂成膏再入平胃散末四君子湯末各四兩知母末黃柏末各一兩上共十兩搜和成劑如硬再入白蜜煉和放青石上用木捶捶打如法勻了丸如桐子大每服一百丸棗湯下不拘時服至半月精神完復氣血津和服至一月飲食倍加起居輕快服至二月百病消除諸虛百損一切虛憊益補服至三月丹田常暖水火既濟服至四月老朽還壯行步如飛服至五月發白返黑齒落更生服至半年漸入仙道久久服之飛升可許此藥不寒不燥溫補平劑一切勞證敗血立便除根真祕傳之妙方也寶而敬之重之附水丘先生紫庭治瘵祕方人有傳尸殗殜伏連五勞七傷二十六蒸其候各異其源不同世醫不明根本妄投藥石可勝嘆哉豫休心雲水遠絶人事遂以所傳樞要精微以示世醫使之明曉夫傳尸勞者男子自腎傳心心而肺肺而肝肝而脾女子自心傳肺肺而肝肝而脾脾而腎五臟復傳六腑而死矣或連及親族至於滅門其源皆由房室飲食過度冷熱不時憂思悲傷有欲不遂驚悸喜懼或大病後行房或臨尸哭泣尸氣所感邪氣一生流傳五臟蠹食傷心雖有諸候其實不離乎心陽腎陰也若明陰陽用藥可以返魂奪命起死回生人知勞之名未知其理人生以血為榮以氣為衛二者運轉而無壅滯勞何由生故勞者倦也血氣倦則不運凝滯疏漏邪氣相乘心受之為盜汗虛汗憂悲恐懼恍惚不安腎受之為骨蒸為鬼交陽虛好色愈甚肝受之為瘰癧脅滿痞聚拳攣拘急風氣乘之為痛疼脾受之為多思慮慕清涼不食多食無味肺受之為氣喘痰涎睡臥不安毛髮焦枯至於六腑亦各有證今人多用涼藥則損胃氣雖盧扁亦難矣豫之所論但在開關把胃何則勞病者血氣不運遂致乾枯此關脈閉也故先用開關藥通其血脈既開關則須起胃蓋五臟皆有胃氣邪氣附之則五臟衰弱若不把胃則他藥何由而行故開關把胃乃治勞妙法也然必須明陰陽且如起胃陽病藥不可過暖陰病藥不可過涼今人言丁香厚朴肉桂蓯蓉可補五臟不知用之則喘息閉嗽如火益熱或以治鬼為先務要當法藥相濟道力資扶然後鬼尸可逐也此論上合黃帝岐扁下明臟腑陰陽非患人有福亦不遭逢寶之總論病證云如夜夢鬼交遺精自泄夢魂不安常見先亡恐怖鬼神思量飲食食至不進目精失白骨節疼痛五心煩熱頭髮作滯面臉時紅如敷胭脂唇紅異常肌膚不潤言語氣短大便祕澀或時溏利小便黃赤或時白濁項生瘰癧腹中氣塊鼻口生瘡口舌乾燥咽喉不利仰臥不得或時氣喘涕唾稠黏上氣憤滿痰吐噁心腹脅妨悶陰中冷痛陰癢生瘡多濕轉筋拘急或憤怒悲啼舌直苦痛目睛時痛盜汗抬肩喘息陽道虛剛如手足心煩疼口乾舌瘡小便黃赤大便難及熱多咽喉痛涎唾黃黏及兼前項一二證即是陽病當用陽病開關散為瀉陽而補陰如大便溏利小便白濁飲食不化胃逆口惡雖有熱痰唾白色及小便多仍兼前項數唾即是陰病當用陰病開關藥凡勞證虛極亦多令人煩躁大小便不利宜兼諸脈證審之陰陽二證皆用起胃散又歌訣云水丘道人年一百煉得龍精並虎魄流傳此法在人間聊向三天助陰德扶危起死莫蹉跎此藥於人有效多不問陰陽並冷熱先將脾胃與安和脾經虛冷易生寒最是難將熱藥攻閉卻大便並上氣為多厚朴與蓯蓉此法精關兩道方病人入口便知良但須仔細看形候莫向陰中錯用陽涕唾稠黏小便赤乾枯四體無筋力烏龍膏子二十丸便似焦枯得甘滴遺精夢泄腹膨高咳嗽陰痛為患勞此病是陰須認識便當急下玉龍膏嗽里痰涎仰臥難陰陽交併候多端卻須兼服訶黎散治取根源病自安七寶丸瀉骨蒸傳尸邪氣陽病可服黃連四兩為細末用豬肚一個洗淨入藥末線縫之用童便五升文火煮令爛干為度以肚細切同藥搗研置風中吹乾丸如桐子大硃砂麝香為衣空心麥冬水下或用陽病開關散咽下無硃砂亦可陽病開關散柴胡去蘆桔梗炒秦艽麥冬去心木通各半兩當歸芍藥木香澤瀉桑白皮蜜炙地骨皮各一兩甘草炙一錢上㕮咀每服三錢水一盞薑三片煎六分空心溫服小便多即病去也陰病開關散當歸赤芍肉桂白芷甘草炙各半兩枳殼三錢木香二錢天南星去皮一錢薑汁浸一宿焙上㕮咀每服三錢薑三片煎七分入無灰酒三分盞童便三分盞又煎七分溫服起胃散陰陽二候皆用黃耆炙二兩白朮炒山藥各一兩人參白芷各五錢上㕮咀每服三錢加木瓜煎或加沉香茯苓甘草各半兩先服此起胃散一二日後不問退否兼玉龍膏服之烏龍膏烏梅去核柴胡紫菀生乾地黃木香各一兩秦艽實好者貝母麩炒去心防風各二錢杏仁五兩麵炒上為末皂角六十片二十片去黑皮醋炙為末二十片燒灰存性二十片湯浸去黑皮用精豬肉剁爛如泥同皂角一處入水五升細揉汁入童便三升無灰酒一升並熬如膏和前藥末為丸如桐子大每服二十丸空心麥門冬湯下甚者二十日效玉龍膏青蒿子柴胡白檳榔各二兩人參生乾地黃肉蓯蓉酒浸一宿炙虎頭骨斫開酒炙黃赤鱉甲湯煮去皮裙酒浸炙黃赤色各一兩龜甲白朮白茯苓木香牡蠣地骨皮各半兩當歸三錢硃砂一錢豆豉心二合又加烏梅肉枳殼上為末卻以杏仁五升壯者以童便浸春夏七日秋冬十日和瓶日中曬每日一換新者日數足以清水淘去皮尖焙乾別以童便一升於銀石器內以文火煎至隨手爛傾入砂盆用柳木槌研爛為膏細布濾過入酥一兩薄荷自然汁二合攪勻和藥用槌擂五百下丸如梧桐子大空心湯下十五丸加至三十丸如覺熱減丸數服熱少還添加減經月日諸證皆退進食安臥面有血色乃藥行也當勤服無怠忌莧菜白粥冷水生血雀鴿等物訶黎散治勞嗽上氣赤茯苓訶黎勒皮各二兩當歸炒檳榔大黃炒各一兩木香吳茱萸湯泡七次各半兩上㕮咀每服三錢生薑三片水一盞煎六分溫服
