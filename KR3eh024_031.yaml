body:
  text: 卷三十一喘急論袖珍論曰人之五臟皆有上氣而肺為之總故經云諸氣皆屬於肺肺居五臟之上而為華蓋喜清肅而不欲窒礙調攝失宜或為風寒暑濕邪氣相干則肺氣脹滿發而為喘呼吸坐臥促迫不安又有因七情之氣相干於五臟鬱而生痰或體弱之人脾腎俱虛不能守養一身之痰皆能令人發喘治療之法當究其源若肺虛肺寒必有氣乏表怯冷痰如冰當溫補之肺實肺熱必有壅盛胸滿外哄上炎當清利之水氣者漉漉有聲怔忪浮腫當逐水利小便驚憂者惕惕悶悶引息鼻張當寬中下氣胃絡不和者宜分氣化痰以和之腎氣虛損者宜助陽接真以補之或感寒邪則驅散之氣鬱則調順之又當於各類求之凡此證脈滑而手足溫者生脈澀而四肢寒者死數者亦死謂其形損故也此嚴氏之説再述於此吳氏曰膈有膠固之痰外有非時之感內有壅塞之氣然後令人哮喘能溫之汗之吐之皆是良法若虛喘之人則宜逡巡調理羸瘦氣弱則宜炎其背腧背腧者背間之腧穴主輸臟氣者也聲粗者為哮外感有餘之疾也宜用表藥氣促者為喘肺虛不足之證也宜用里藥氣壯則痰行氣虛則痰滯故令人喘用六君子湯補氣氣利痰行胡喘之有或惡人參之補而去之此不知虛實之妙者也素問陰陽別論云陰爭於內陽擾於外魄汗未藏四逆而起起則熏肺使人喘鳴逆調論云起居如故而息為音者此肺之絡脈逆也絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音也丹溪曰喘急者氣為火所鬱而為痰在肺胃也有痰者有火炎者有陰虛自小腹下火起而上逆者有氣虛短氣而喘者痰者降痰化氣為主火炎者降心火清肺金陰虛痰喘者補陰降火四物湯加枳殼半夏一云陰虛氣喘四物湯加陳皮甘草些少以降氣補陰白芍藥須用酒浸日乾忌火氣虛發喘以參耆補之凡久喘未發時以扶正氣為主已發以攻邪為主喘急甚者不可用苦寒藥火勝故也宜溫劫之用椒目五七錢研為極細末生薑湯調服喘止之後因痰治痰因火治火上氣喘而燥者為肺脹欲作風水證宜發汗則愈有喘急風痰上逆者千緡湯佳或導痰湯加千緡湯氣實人因服參耆逆多而喘者用三拗湯以瀉氣喘用阿膠宜分虛實若久病發喘必是肺虛故用阿膠人參五味子之類補之若新病氣實而喘者宜桑白皮葶藶之類瀉之戴氏曰痰者凡喘便有痰聲火炎者乍進乍退得食則減食已則喘大概胃中有實火膈上有稠痰得食墜下稠痰喘即止稍久食已入胃反助其火痰再上升喘反大作俗不知此作胃虛治以燥虛之藥以火濟火也昔葉督都患此諸醫作胃虛治之不愈後以導水丸利五六次而安氣短喘急者呼吸急促而無痰聲又有胃虛喘者抬頭擷肚喘而不休者是也李氏曰呼吸急促者謂之喘喉中有響聲者謂之哮虛者氣乏身涼冷痰如冰實者氣壯胸滿身熱便硬經曰諸逆衝上皆屬火虛火宜滋補降氣實火宜清肺瀉胃火炎肺胃喘者乍進乍退得食墜下稠痰則止食已入胃反助火痰上喘反大作宜降火清金導痰湯加芩連山梔杏仁瓜蔞如胃有實火膈上稠痰者導水丸痰喘必有痰聲風痰千緡湯或合導痰湯痰氣蘇子降氣湯四磨湯食積濕痰古二母散神保丸大蘿皂丸驚憂氣鬱惕惕悶悶引息鼻張氣喘呼吸急促而無痰聲者四七湯枳梗湯分氣紫蘇飲四磨湯因服補藥喘者三拗湯外感表邪傳裡裡實不受則氣逆上詳見傷寒尋常感冒風寒相干肺脹逆而喘者隨時令祛散風喘金沸草散麻黃杏仁飲寒喘加減三拗湯藿香正氣散加五味子杏仁或蘇陳九寶飲暑月香葛湯熱證小柴胡湯涼膈散水喘水氣轆轆有聲怔忡者小青龍湯古葶棗散白前湯水腫水氣肺脹而喘然喘必生脹脹必生喘其證相因皆小便不利肺主氣先喘而後脹者宜清金降火而行水次之脾主濕先脹而後喘者宜燥脾行水而清金次之以上諸喘皆有餘之證陰虛喘者血虛則陽無所依附而上奔宜四物湯倍芍藥加人參五味子以收之有小腹下火起衝上而喘者宜降心火補真陰四物二陳湯加知柏枳殼黃芩久病氣短不能接續似喘非喘單人參湯扶脾生脈散調中益氣湯勞涉遠者杏參散飲食熱者葶藶散痰阻短氣者導痰湯濁陰在上清陽陷下咳喘嘔吐者加味瀉白散下元虛冷腎氣不得歸元者九味安腎丸八味丸甚者黑錫丹以鎮墜之煩躁無脈身冷神昏者死胃虛極則氣上逆抬肩擷肚生脈散加杏仁陳皮白朮或理中丸加胡椒救之仲景云發汗如油汗出如珠不流抬肩擷肚喘而不休及胸前高起脈絡散張手足厥冷脈散及數者皆死但婦人喘病尤亟産後榮竭衛氣無依獨聚於肺發喘者死速喘未發時扶正治其本血虛補血氣虛補氣兼以清金降火順氣化痰已發辟邪兼疏痰火蓋喘非風寒乘肺則痰火脹肺風寒祛散痰火疏導但火急甚者亦不可純用苦寒藥宜溫以劫之用椒目五七錢薑湯下喘止後因痰治痰因火治火諸喘不止者小蘿皂丸定息餅子含奇丸定喘化痰散久者人參清肺飲倍粟殼澀之抑考內經云夜行則喘出於腎腎主於夜氣合幽冥故夜行則喘息內從腎出也淫氣病肺夜行腎勞因而喘息氣淫不次則病肺也有所墮恐喘出於肝恐生於肝墮損筋血因而奔喘故出於肝也淫氣害脾肝木妄淫害脾土也有所驚恐喘出於肺驚則心無所倚神無所歸氣亂胸中故喘出於肺也淫氣傷心驚則神越故氣淫反傷心矣渡水跌僕喘出於腎與骨濕氣通腎骨腎主之故度水跌僕喘出腎骨矣跌謂足跌僕謂身倒也當是之時勇者氣行則愈怯者則著而為病也又云邪入六腑身熱喘呼不得臥此喘之名同而所感各異耳羅氏曰華他云盛則為喘減則為枯活人云發喘者氣有餘也凡看文字須要會得本意盛而為喘者非肺氣盛也喘為氣有餘者亦非肺氣有餘也氣盛當認作氣衰有餘當認作不足肺氣果盛又為有餘當肅清下行而不喘以其火入於肺衰與不足而為喘焉故言盛者非言肺氣盛也言肺中之火盛也言有餘者非言肺氣有餘也言肺中之火有餘也故瀉肺以苦寒之劑非瀉肺也瀉肺中之火實補肺也用者不可不知或云凡治喘正發時無痰將愈時卻吐痰者乃痰於正發之時閉塞不通而喘甚當於其時開其痰路則易安也宜桔梗之類及枳殼瓜蔞實杏仁蘇葉前胡等引出其痰候痰出涎退卻調其虛實虛者補以參耆歸術實者瀉以沉香滾痰丸之類是也東垣曰病機云諸痿喘嘔皆屬於上辨云傷寒家論喘嘔以為火熱者是明有餘之邪中於外寒變而為熱心火太旺攻肺故屬於上又膏粱之人奉養太過及過愛少兒亦能積熱於上而為喘咳宜以甘寒之劑治之脈經又云肺盛有餘則咳嗽上氣喘渴煩心胸滿短氣皆衝脈之火行於胸中而作也系在下焦非屬上也蓋雜病不足之邪起於有餘病機之邪自是標本病傳多説飲食勞役喜怒不節水穀之寒熱感則害人六腑皆由中氣不足其填脹腹滿咳喘嘔食不下皆以大甘辛熱之劑治之則立已熱喘則用人參平肺散寒喘則用參蘇溫肺湯又曰平居則氣和平行動則氣促而喘者亦衝脈之火以黃柏知母滋腎藥治之王節齋曰喘與脹二證相因必皆小便不利喘則必生脹脹則必生喘但要識得標本先後先喘而後脹者主於肺先脹而後喘者主於脾何則肺金司降外主皮毛經曰肺朝百脈通調水道下輸膀胱又曰膀胱者州都之官津液藏焉氣化則能出矣是小便之行由於肺氣之降下而輸化也若肺受邪而上喘則失降下之令故小便漸短以致水溢皮膚而生腫滿焉此則喘為本而腫為標治當清金降氣為主而行水次之脾土惡濕外主肌肉土能剋水若脾土受傷不能制水則水濕妄行浸漬肌肉水既上溢則邪反浸肺氣不得降而生喘矣此則腫為本而喘為標治當實脾行水為主而清金次之苟肺證而用燥脾之藥則金得燥而喘愈加脾病而用清金之藥則脾得寒而脹愈甚矣近世治喘腫者但知實脾行水而不知分別脾肺二證豫故為發明之脈法脈滑而手足溫者生脈澀而四肢寒者死滑而浮者生澀而數者死脈宜浮遲不宜急疾脈數有熱喘咳吐血上氣不得臥者死上氣面浮腫肩息脈浮大不治又加刺尤甚咳而上氣肺脹其脈沉心下有水也寸口伏胸中有逆氣尺寸俱沉關上無有者苦心下喘凡喘而不得臥其脈浮按之虛而澀者為陰虛去死不遠慎勿下之下之必死治痰喘方千緡導痰湯治痰喘不能臥人扶而坐一服而安南星一錢半夏七個火炮破皮分四片陳皮赤茯苓枳殼去穰各一錢皂角一寸炙去皮弦甘草炙一寸上銼一劑生薑一指大水煎服降氣化痰湯紫蘇子炒槌碎一錢半前胡半夏湯泡茯苓橘紅桑白皮杏仁炒瓜蔞仁炒各一錢甘草五分上作一服加生薑三片水煎食後服大蘿皂丸治氣喘痰喘風痰食痰酒痰面毒等證南星半夏杏仁瓜蔞仁香附青黛陳皮各五錢蘿蔔子二兩皂角燒灰一兩上為末神麯煮糊為丸桐子大每服六十丸薑湯下小蘿皂丸治喘證最靈妙蘿蔔子二兩蒸皂角五錢煅南星用白礬水浸曬海粉瓜蔞仁各一兩上為末薑汁和蜜搗勻為丸含化止之槐角利膈丸治風勝痰實胸滿及喘滿咳嗽皂角一兩酥炙去皮弦子半夏槐角炒各半兩牽牛子一兩半上同為細末生薑汁打麵糊為丸如桐子大每服三十丸食後生薑湯下定喘化痰湯治喘甚妙用豬蹄甲四十九個每個甲內入半夏白礬各一分置罐內密封勿令煙出火煅通紅去火毒入麝一錢為末每服一錢糯米飲調下小兒五分一方治喘急證發時無痰將愈時卻吐痰者乃痰於證發時閉塞不通故也用此開其痰路則易安桔梗一兩半搗羅為末童便半升煎取四合去滓溫服候痰出喘退卻調其虛實虛者補以參耆歸術實者瀉以沉香滾痰丸之類治火喘方降火清金湯黃芩炒山梔炒各一錢半知母炒貝母去心桑白皮麥門冬去心桔梗各一錢橘紅八分茯苓一錢甘草四分上水二鍾煎八分食後服加味瀉白散治胸膈不利煩熱口乾時時喘嗽桑白皮地骨皮知母陳皮去白青皮去白桔梗去蘆各五錢黃芩甘草各三錢上銼如麻豆大每服五錢水煎食後溫服平氣散治濕熱太盛上攻於肺神氣躁亂故為喘滿邪氣盛則實宜下之白牽牛二兩半生半熟只取頭末一兩青皮去皮檳榔各三錢陳皮去白半兩大黃七錢上為細末每服三錢煎生薑湯一大盞調下蔭按內經曰肺苦氣上逆急食苦以泄之故以白牽牛苦寒瀉氣分濕熱上攻喘滿故以為君陳皮苦溫體輕浮理其肺氣青皮苦辛平散肺中滯氣為臣檳榔辛溫性沉重下痰降氣大黃苦寒蕩滌滿實故以為使加味白虎湯治火痰石膏五錢研知母二錢甘草一錢瓜蔞仁枳殼麩炒黃芩炒各八分上銼入糯米一撮水煎服雙玉散治痰熱而喘痰湧如泉寒水石石膏各等分上為細末人參湯調下三錢食後服葶藶散治過食煎煿或飲酒過度致肺壅喘不得安臥及肺癰咽燥不渴濁唾腥臭甜葶藶炒桔梗去蘆瓜蔞仁川升麻薏苡仁桑白皮炙葛根各一兩甘草炙五錢上每服四錢生薑五片水煎食後溫服人參平肺散治心火刑肺傳為肺痿咳嗽喘嘔痰涎壅盛胸膈痞悶咽嗌不利方見肺痿門治寒喘方加減三拗湯治感冒風寒咳嗽喘急麻黃一錢杏仁桑白皮各七分甘草五分蘇子前胡各三分上生薑三片水煎服如痰盛加南星半夏煩喘加石膏火痰口乾加黃芩瓜蔞仁薄荷寒喘加細辛肉桂氣喘加兜鈴烏梅氣短而喘去麻黃加人參茯苓蘇陳九寶飲治素有喘急遇寒即發咳嗽哮喘夜不得臥方見咳嗽門參蘇溫肺湯治形寒飲冷則傷肺喘煩心胸滿短氣不能宣暢人參肉桂甘草木香五味子陳皮半夏制桑白皮白朮紫蘇莖葉各二兩白茯苓一兩上㕮咀每服五錢生薑三片水煎食後溫服如冬月每服加不去節麻黃半分先煎去沫下諸藥金沸草散治肺經受風頭目昏痛聲重喘嗽涕唾稠黏旋覆花去梗二兩荊芥穗四兩麻黃去節前胡去蘆各三兩甘草炙赤芍藥半夏湯洗七次薑汁浸各一兩上㕮咀每服五錢水一盞薑三片棗一枚煎八分溫服治水喘方小青龍加半夏湯治水喘心下有水氣漉漉有聲怔忡者麻黃芍藥桂枝細辛甘草乾薑各一錢五味子半夏各八分上用水一碗先煮麻黃減去三分去上沫納諸藥再煎去滓溫服古葶棗散治肺癰胸滿喘咳或身面浮腫等證葶藶炒黃為末三錢黑棗十枚上先將棗濃煎湯去棗入葶藶末調勻食後服白前湯治飽逆喘促及水腫短氣脹滿晝夜不得臥喉中常作水雞聲白前二兩紫菀半夏各三兩大戟七合上用水十盞浸一宿明日煎至三盞分三服忌羊肉含奇丸治喘嗽葶藶知母貝母各一兩上為末棗肉砂糖搗丸彈子大每用綿裹一丸含之徐徐咽下治氣喘方定肺湯治上氣喘嗽紫菀五味子橘皮去白半夏制紫蘇子炒杏仁炒去皮尖桑白皮炒甘草炙枳殼麩炒各等分上㕮咀每服一兩生薑五片紫蘇五葉水二盞煎至一盞食後溫服蘇子降氣湯治虛陽上攻氣不升降上盛下虛痰涎壅盛喘促短氣咳嗽蘇子五錢陳皮厚朴薑汁炒前胡肉桂各二錢半夏薑汁浸炒當歸甘草各一錢一方去桂加南星上銼一劑薑三片棗一枚水煎服若加川芎細辛茯苓桔梗名大降氣湯杏蘇飲治上氣喘嗽浮腫紫蘇葉二錢杏仁去皮尖炒一錢半五味子大腹皮烏梅去核紫菀甘草炙各一錢陳皮去白麻黃去節桑白皮炒阿膠桔梗各七分半上作一服用水二鍾生薑五片煎至一鍾食後服玉華散治咳嗽上喘調順肺經清利咽喉安和神氣甜葶藶焙桑白皮炒半夏薑製貝母炮天冬去心馬兜鈴杏仁去皮尖紫菀洗百合蒸人參各一錢百部甘草炙各七分半上作一服生薑三片棗二枚水煎食後服紫蘇子湯治憂思過度邪傷脾肺心腹膨脹喘促煩悶腸鳴氣走漉漉有聲大小便不利脈虛緊而澀紫蘇子半夏湯泡木通大腹皮木香不見火陳皮人參草果仁枳實麩炒白朮厚朴薑製甘草炙各一錢上作一服生薑三片紅棗一枚水煎不拘時服杏參散治墜墮驚恐或渡水跌僕疲極喘息杏仁炒去皮尖人參去蘆橘紅大腹皮檳榔訶子麵煨用肉半夏湯泡桂心不見火紫菀洗桑白皮白朮甘草炙各一錢上作一服用水二鍾生薑三片紫蘇七葉煎至一鍾去渣不拘時服四磨湯治七情鬱結上氣喘急人參檳榔沉香天台烏藥各等分上各濃磨水取七分盞煎三五沸不拘時服一方無人參有枳殼亦佳加木香枳殼為六磨湯有寒者加丁香桂氣滯腹急大便祕澀加枳殼大黃磨服以利為度一方治肺氣有餘火炎痰盛作喘桑白皮杏仁半夏薑製貝母山梔片芩蘇子黃連上咀片水二鍾薑三片煎八分服三拗湯氣實人因服參耆過多而喘者用之麻黃不去根節甘草生杏仁皮尖不去上銼每服五錢薑五片棗二枚水煎服越婢加半夏湯咳而上氣此為肺脹其人喘目如脫狀脈浮大者此湯主之麻黃六兩石膏半斤生薑三兩大棗十五枚甘草一兩半夏半升上六味以水六升先煮麻黃去上沫納諸藥煮取三升分溫三服小青龍加石膏湯肺脹咳而上氣煩躁而喘脈浮者心下有水此湯主之麻黃芍藥桂枝細辛甘草乾薑各三錢五味子半夏各半升石膏二兩上九味以水一斗先煮麻黃去上沫納諸藥煎取三升強壯人服一升羸者減之日三服小兒服四合治氣虛喘方人參定喘湯治肺虛作喘神效人參阿膠麻黃半夏五味子桑白皮甘草各四兩罌粟殼蜜炙二錢上每服三錢加生薑水煎服一方治肺氣不足久嗽而喘人參茯苓麥門冬五味子甘草阿膠款冬花上咀片水二鍾煎八分通口服一方治氣虛短氣而喘白朮半夏薑製甘草麥門冬天門冬人參五味子阿膠一方有蜜炙黃柏地骨皮上咀片水二鍾薑三片煎八分通口服益氣養肺湯治氣虛而喘人參黃耆蜜炙各一錢半五味子十五粒麥冬去心白朮茯苓各一錢阿膠蛤粉炒陳皮半夏各七分甘草五分上用水二鍾煎八分食遠服五味子湯治肺虛作喘脈大者五味子二錢炒人參去蘆麥門冬去心杏仁去皮尖陳皮去白各二錢半上加生薑三片紅棗三枚水煎服六君子湯治氣虛痰喘人參白朮茯苓甘草炙半夏薑製陳皮去白各一錢上銼加生薑三片水煎蔭按氣壯則痰行氣虛則痰滯痰遮氣道故令人喘甘者可以補氣參苓朮草甘物也辛者可以治痰半夏陳皮皆辛物也用甘則氣不虛用辛則痰不滯氣利痰行何喘之有或惡人參之補而去之此不知虛實之妙者也然必有是證方可用不然遺誤非輕治胃虛喘方加味生脈散治胃虛極則氣上逆抬肩擷肚人參麥門冬五味子杏仁陳皮白朮上銼水煎服附子理中湯治脾肺虛寒痰涎壅塞少有動作喘嗽頻促脈來遲細人參甘草炙白朮乾薑炒附子制各一錢一方加胡椒不用附子上銼一劑水煎服此證為虛而脈為寒也虛則宜補參朮甘草所以補虛寒則宜溫乾薑附子所以溫寒治陰虛喘方補陰平肺湯治陰虛火自下逆上而喘黃柏鹽水炒知母當歸酒洗白芍藥麥門冬去心各一錢半五味子十五粒槌碎生地薑酒炒二錢甘草五分上作一服水煎食遠服有痰加橘紅貝母各一錢加味四物二陳湯治陰虛自小腹下火起衝上而喘者宜降心火補真陰當歸川芎生地酒炒白芍藥陳皮半夏茯苓甘草知母黃柏枳殼黃芩上銼生薑三片水煎服加味四物湯治血虛陽無所依附上奔而喘當歸川芎生地薑酒炒各一錢芍藥倍用人參五分五味子五分上銼水煎服天門冬膏降火滋陰清肺補腎之妙劑余官金陵時每半夜後喘促不能眠纍數月不愈一日製此膏服之日三四次一二日頓止天門冬一味不拘多少溫水潤透去皮心於砂鍋內熬取汁其滓用布絞濾搗爛如泥再用水熬如此三次將汁傾放一處量入蜂蜜以甘苦得中為度再用慢火熬至稀糊樣瓷器收貯每用一二匙滾湯點服治久喘方定息餅子治遠年近日喘嗽用皂角三大莢去黑皮刀切開去子每子倉內入巴豆肉一粒以麻縛定用生薑自然汁和蜜塗令周匝慢火炙之又塗又炙以焦黃為度劈開去豆不用又以枯礬一兩萆麻子七粒入倉內薑汁和蜜又塗炙如前去萆礬用皂角為末卻以杏仁二兩研膏與前藥和勻每服一錢用柿干炙過候冷點入藥內細嚼臨臥服忌一切熱毒之物久喘良方用青皮一枚展開去穰入江子一個將麻線系定火上燒盡煙留性為末生薑汁和酒一大呷服之蔭按名醫録云李翰林天台人有莫生患喘病求醫李云病日久矣我與治之乃用前方過口即定實神方也按久喘者肺分有頑痰結氣青皮能破氣江子能攻痰然其性悍厲善於走下耳未可以療上部也今用燒灰存性則大毒已去所存者幾希耳新燒火性炎上可使成功於膈佐之以薑汁則頑痰易利行之以酒則無所不至薑酒既行二物善降久喘之患可使愈於一旦非良方而何經驗祕方治遠年喘急桑木內蠹蟲糞一升炒蘿蔔子半斤炒杏仁半升不去皮尖炒甘草二兩生上共為細末湯浸蒸餅為丸如桐子大每服五七十丸淡薑湯送下定喘丹一名兜鈴丸治男婦久患咳嗽肺氣喘促倚息不得臥齁䶎久嗽亦效馬兜鈴杏仁去皮尖炒另研蟬退洗去土並足翅炒各二兩砒煅另研六錢上為末棗肉為丸如葵子大每服六七丸臨臥用蔥茶清放冷送下忌熱物半日
