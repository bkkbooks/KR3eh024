鹽湯下一方治淋疾或血或白並皆治之蒼朮一斤去皮淨分作四分一分用無灰酒浸一分用陳米醋浸一分用童便浸一分用二淘米泔水浸各三日取出曬乾上為細末用蜂蜜一斤放磁碗內滾水鍋中燉開連碗坐在緑豆內待冷再燉再坐如此三次入藥和為丸如彈子大每服一丸空心白湯或鹽湯細嚼送下不過數服愈茄樹散治放尿有血帶血線茄樹根銼碎用童子小便煎汁服之效一方治小便血不止用萵苣搗爛貼臍立效治石淋方石韋散治砂淋痛甚石韋去毛冬葵子各二兩瞿麥一兩滑石五兩車前子三兩上為細末每服三錢白湯調服日二三服單琥珀散治諸般砂石淋皆效琥珀二錢上研為細末空心蔥白湯調下一二服立效神效琥珀散治石淋水道澀痛頻下砂石琥珀桂心滑石大黃微炒葵子膩粉木通木香不見火磁石煅紅酒淬七次細研水飛過各半兩上為細末每服二錢食前用燈心草蔥白煎湯調下琥珀散治五淋砂石淋滑石二錢琥珀木通當歸木香鬱金萹蓄各一錢上為末每服五錢以蘆葦葉煎湯空心調服如無蘆葦葉以竹葉煎湯送下祕方治砂淋莖中痛石首魚腦骨十個火煨滑石二錢半上為細末每服一錢空心煎木通湯調下未愈再服必待砂出盡乃安一方有琥珀三分石燕丸治石淋多因憂鬱氣注下焦結所食鹹氣而成令人小便磣痛不可忍出砂石而後小便通石燕燒令通赤水中淬三次搗研水飛焙乾滑石石韋去毛瞿麥穗各一兩上為末麵糊丸如桐子大每服五十丸瞿麥燈心煎湯下日三次一方治小便淋痛赤澀下沙石萱草根一握搗取汁服或嫩苗煮食之亦可一方治小便不通淋瀝砂石痛不可忍玉蜀秫即薏苡仁不拘多少根葉子皆可用上用水煎稍熱服夏月冷服亦可一方治石淋導水用螻蛄一枚鹽二兩同於新瓦鋪蓋焙乾研為末溫酒調下一錢匕服之即愈加味調胃承氣湯治砂石淋大黃五錢甘草三錢芒硝一錢半牽牛頭末二錢上作一服水煎食前服張氏小兒年十四歲病約一年半矣得之夏秋發則小便大痛至握其䘒跳躍旋轉號呼不已小便數日不得下下則成砂石大便祕澀肛門脫出一二寸諸醫不能治求治於戴人戴人曰今日治今日效時日在辰巳間矣以調胃承氣僅一兩加牽牛頭末二錢汲河水煎之令作三五度咽之又服苦末丸如芥子許六十丸日加晡上湧下泄一時齊出有膿有血湧泄既覺定令飲新汲水一大盞小便已利一二次矣是夜凡飲新水二三十遍病去九分止哭一次明日困臥如醉自晨至暮猛然起走索食於母歌笑自得頓釋所苦繼以太白散八正散等調理一日大瘥恐暑天失所養留五日而歸戴人曰此下焦結也不吐不下則下焦何以開不令飲水則小便何以利大抵源清則流清也苦末丸未詳考治膏淋方萆薢分清飲治膏濁頻數漩白如油光彩不足者名曰膏淋川萆薢石菖蒲益智仁烏藥各二錢上銼水煎服鹿角霜丸治膏淋多因憂思失志濁氣干清小便淋閉黯如膏脂疲劇筋力或傷寒濕多有此證鹿角霜秋石白茯苓各等分上為末麵糊丸如桐子大每服五十丸空心米湯下菟絲丸治膏淋菟絲子水淘酒浸蒸搗焙桑螵蛸炙各半兩澤瀉一錢上為細末煉蜜丸如桐子大每服二十丸空心米飲下琥珀鬱金丸治心火炎上腎水不升致使水火不得相濟故火獨炎上水流下淋膀胱受心火所熾而浮囊中積熱或癃閉不通或遺泄不禁或白濁如泔水或膏淋如膿或如梔子汁或如砂石米粒或如粉糊相似者俱熱證也此藥悉皆治之大黃酒浸黑牽牛炒頭末黃芩琥珀另研各二兩黃連鬱金各一兩滑石白茯苓各四兩上為末水丸如桐子大每服五十丸空心沸湯下如用消導飲食降心火可加沉香五錢沉香散治膏淋臍下妨悶不得快利沉香陳皮去白黃耆各七錢半瞿麥三兩榆皮韭子滑石各一兩黃芩甘草炙各半兩上為細末每服二錢食前米飲調下海金沙散治膏淋海金沙滑石各五錢甘草一錢上為末每服二錢食前麥門冬湯調服燈心湯亦可治勞淋虛淋方清心蓮子飲治勞淋及上盛下虛心火炎上口苦咽乾煩渴微熱小便赤澀或欲成淋並治之黃耆蜜炙人參白茯苓石蓮肉各一錢車前子麥門冬去心黃芩地骨皮各八分甘草五分上㕮咀水煎服心熱煩躁赤濁去黃耆加白朮澤瀉各一錢發熱加柴胡薄荷一方治氣虛脾虛消渴淋濁人參滑石各一錢白朮一錢半赤茯苓澤瀉各七分麥門冬去心甘草各五分竹葉三十片上銼作一服加燈心二十莖水煎食前服補中益氣湯治膀胱氣虛損不能運用水道故滯而不通而成諸淋黃耆人參白朮甘草炙當歸陳皮各一錢升麻柴胡各五分上銼水煎服加味八物湯治氣虛淋人參白朮白茯苓甘草當歸川芎地黃姜炒芍藥杜牛膝黃耆上銼水煎服一方治老人氣虛而淋溺有餘瀝人參白朮木通山梔子各等分上銼水煎空心服一方治淋病脈沉而大此主勞苦傷血下焦蘊結人參歸尾白芍藥香附各五錢條芩木通各三錢山梔子炒三錢黃耆甘草生用各五分上銼分六帖杜牛膝湯二盞煎取一盞食前熱服滋陰降火湯治火燥血少氣不得降而淋黃柏鹽水炒當歸酒洗各一錢半白芍藥煨一錢二分生地黃知母牛膝各一錢木通甘草梢各一錢上銼水煎食前服一方治小便淋痛脈左大右澀此為勞傷經血勿作淋治可補血行肝經滯血自愈當歸生地黃赤芍藥各一錢川芎條芩甘草梢各三分陳皮木通各五分紅花豆大黃柏炒二分杜牛膝一錢上桃仁泥研滑石同煎待淋病退去滑石桃仁杜牛膝木通入川牛膝代木通分兩倍之益元固真湯治縱欲強留不泄淫精滲下而作淋者人參白茯苓蓮蕊巴戟升麻益智仁黃柏酒炒各二錢山藥澤瀉各一錢半甘草梢二錢上銼水煎空心服地黃丸治腎虛勞膀胱結淋澀生地姜炒黃耆各一兩半人參一兩二錢半防風茯神鹿茸酥炙去毛黃芩去黑心遠志去心瓜蔞各一兩石韋去毛當歸各半兩赤芍藥戎鹽研蒲黃甘草炙各七錢半車前子滑石各二兩上為細末煉蜜丸如桐子大每服二十丸食前溫酒下或鹽湯亦可大補丸治淋證遇房勞即發者黃柏炒褐色上為末水丸桐子大每服五七十丸白湯下治冷淋方生附散治冷淋小便祕澀數起不通竅中疼痛憎寒凜凜多因飲水過度或為寒泣心虛氣耗皆有此證附子生去皮臍滑石各半兩瞿麥半夏湯洗七次木通各七錢半上為末每服二錢加生薑七片燈心二十莖蜜半匙水煎溫服檳榔散治冷淋腹脅脹滿小便急痛檳榔木香不見火當歸炒各半兩母丁香桂心各二錢半豬苓一兩去黑皮龍腦一錢另研上為細末每服一錢生薑蔥煎湯調服不拘時澤瀉散治冷淋小便澀痛脹滿澤瀉雞蘇石韋赤茯苓蒲黃當歸琥珀另研檳榔各一兩枳殼去穰麩炒桑螵蛸炒各半兩官桂去粗皮七錢半上為細末每服二錢亦不拘時用冬葵子煎湯調服或木通煎湯調亦可治莖中痛方一方治淋莖中痛此是肝經氣滯有熱甘草梢半兩青皮黃柏澤瀉各一錢上作一服水煎空心服參苓琥珀湯治小便淋瀝莖中痛不可忍人參川楝子去核柴胡生甘草梢各一錢茯苓一錢半澤瀉一錢二分當歸八分元胡索七分琥珀三分上銼一服水煎空心服一方加青皮黃柏各三分加味六君子湯治苦病淋而莖中痛甚不可忍者人參白朮白茯苓甘草陳皮半夏黃柏知母滑石石韋琥珀上銼水煎服治胞痹方腎瀝湯治胞痹小腹急小便不利桑白皮炒犀角屑杜仲炙去絲五加皮麥門冬去心木通桔梗各一錢赤芍藥五分上銼作一服用水二鍾加羊腎一個切破入竹瀝少許同煎服腎著湯治胞痹小便不通赤茯苓白朮各四兩甘草炙三兩乾薑炮一兩上為末每服五錢水煎溫服日三服千金茯苓丸治胞痹小便內痛赤茯苓防風細辛白朮澤瀉各半兩天花粉紫菀牛膝酒浸黃耆芍藥煨甘草炙各三錢附子炮官桂各二錢山茱萸肉山藥獨活生地黃半夏各一錢上為末煉蜜丸如桐子大每服五六十丸空心溫酒下巴戟丸治胞痹臍腹痛小便不利巴戟去心一兩半桑螵蛸麩炒遠志去心生地黃山藥附子炮續斷肉蓯蓉酒浸各一兩杜仲炙石斛鹿茸酥炙龍骨菟絲子五味子山茱萸官桂各三錢上為細末煉蜜丸如桐子大每服三十丸空心食前溫酒下治婦人淋方一方治婦人諸淋用苦杖根俗呼土牛膝洗淨捶碎一握水五碗煎至一碗去渣入麝香乳香末各少許調服小便內當下砂石剝剝有聲是其效也石韋散治婦人小便卒淋澀石韋黃芩木通白榆皮葵子瞿麥穗甘草各等分上㕮咀每服八錢加生薑三片水煎食前溫服蔭按淋證其感不一或因房勞或因忿怒或因醇酒或因厚味所致夫房勞者陰虛火動也忿怒者氣動生火也醇酒厚味者釀成濕熱也積熱既久熱結下焦所以小便淋瀝欲去不去不去又來而痛不可忍者初則熱淋血淋久則煎熬水液稠濁如脂膏如沙如石也必須用散熱開鬱行氣破血滋陰利小便之藥可也故東垣先生用藥凡例小腹痛用青皮疏肝黃柏滋腎蓋小腹小便乃肝腎部位學者不可不知又子和先生云凡大人小兒痛沙石淋及五種淋瀝閉癃並臍腹痛益元散主之以長流水調下八正散石韋散依方服用此三藥皆可加減服之但諸方中石韋散琥珀散名雖同而藥不一學者臨證審確加減可也大抵此證皆由下焦熱結也下焦結則清陽不升上竅閉下竅塞矣故丹溪用吐法子和用下法不吐何以開不下何以利上竅開下竅自利矣此所謂源清則流清者是也
