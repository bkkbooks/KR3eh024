body:
  text: 卷九十一淋論虞氏曰經曰飲食入胃上輸於脾脾氣散精上歸於肺通調水道下輸膀胱夫膀胱者主足太陽寒水之化其體有下口而無上口者也長生在申是故西方肺金以為之母而資其化也肺金清肅則水道通調而滲營於下耳然肺金又藉脾土健旺以資化源清氣得以上升而歸於肺以運行也故經又曰清陽出上竅濁陰出下竅故清陽不升則濁陰不降而成淋閉之患矣先哲以滴水之器譬之上竅閉則下竅不出此理甚明故東垣使灸百會穴丹溪使吐以提其氣之橫格皆開上竅之法也原其為病之由皆膏粱之味濕熱之物或燒酒炙肉之類郁遏成痰以致脾土受害乏力不能運化精微清濁相混故使肺金無助而水道不清漸成淋閉之候或謂用心太過房勞無節以致心腎不交水火無制清陽不升濁陰不降而成天地不交之否皆先哲之法言也古方有五淋之別氣砂血膏勞是也若夫氣淋為病小便澀滯常有餘瀝不盡砂淋為病陰莖中有砂石而痛溺不得卒出砂出痛止膏淋為病溺濁如膏勞淋為病遇房勞即發痛引氣衝血淋為病遇熱則發甚則溺血候其鼻準色黃者知其為小便難也東垣分在氣在血而治之以渴與不渴而辨之耳如渴而小便不利者熱在上焦氣分肺金主之宜用淡滲之藥茯苓澤瀉琥珀燈心通草車前子瞿麥萹蓄之類以清肺金之氣瀉其火以滋水之上源也不渴而小便不利者熱在下焦血分腎與膀胱主之宜用氣味俱陰之藥知母黃柏之類滋腎丸是也除其熱泄其閉塞以滋膀胱腎水之下源也治淋之法無越於此嚴氏曰五淋氣石血膏勞是也氣淋為病小便常有餘瀝石淋莖中痛尿不得卒出膏淋尿如膏出勞淋勞倦即發痛引氣衝血淋遇熱即發甚則溺血候其鼻頭色黃者小便難也大抵此證多由心腎不交內蘊熱毒或酒後房勞服食燥熱七情鬱結所致也治法並用流行滯氣疏利小便清解邪熱其於調平心火又三者之綱領焉心清則小便自利心平則血不妄行不可過用補劑蓋氣得補而愈脹血得補而愈澀熱得補而愈盛水竇不行加之穀道閉遏未見其有能生者也然而腎氣虛弱囊中受寒亦有挾冷而小便淋澀者其狀先寒栗而後便數成淋蓋冷氣與正氣交爭故也治之當逐散寒邪扶養正氣則自平矣葉氏曰淋與閉不同小便滴瀝澀痛者謂之淋小便急滿不通者謂之閉皆腎與膀胱之病也然五淋之中惟石淋膏淋最難治石淋乃是膀胱蓄熱而成正如湯瓶久在火中底結白磏而不能去理宜清徹積熱使水道通則砂石出而可愈膏淋為因腎臟虛寒精溺俱出如膏或如米泔或如鼻涕此必敗精塞於竅道故便欲出不能而痛治當溫養下元俾精氣固則便自清如常矣丹溪曰淋有五皆屬於熱解熱利小便山梔子之類不可發汗汗之必便血老人氣虛淋閉參術中帶木通山梔有腎虛極而淋者當補腎精而利小便不可獨用利藥亦有死血作淋者用牛膝膏淋用益元散加山梔木通或用梔子一合炒白湯吞之夏月以茴香煎湯調益元散服之痰熱隔滯中焦淋瀝不通用二陳湯煎大碗頓服探吐之以提其氣淋瀝有血因火燥下焦血氣不得降而滲泄之令不行也宜補陰降火以四物湯加知母黃柏或用四物湯煎下滋腎丸有因思慮用心過度致淋辰砂妙香散有小便難澀如淋不通不癢者此亦屬虛宜八味丸陰莖痛乃厥陰氣滯兼熱用甘草梢蓋欲緩其氣耳小便因熱鬱成淋不通用赤茯苓澤瀉黃芩車前子麥門冬肉桂滑石木通甘草梢氣虛者加黃耆木香淋痛加黃柏生地黃夏月煎調益元散葉氏曰淋病多屬於熱亦有因於寒者蓋腎與膀胱屬北方寒水惟寒則歸之故二經寒甚則氣滯而不通有淋瀝之狀其所出之溺必清白而不黃赤此其驗也或曰血淋一證血色鮮者心小腸實熱血色瘀者腎膀胱虛冷冷熱之分用藥大不同矣集略云大凡小腸有氣則小便脹小腸有血則小便澀小腸有熱則小便痛皆不可用補氣之藥李氏曰淋者小便澀痛欲去不去不去又來滴滴不斷皆屬於熱也五淋者氣血石膏勞也氣淋澀滯餘瀝不盡沉香散或益元散加茴香木香檳榔血淋澀痛遇熱則發白薇赤芍等分為末酒調服二錢或犀角地黃湯單車前飲四物湯加知母黃柏選用色鮮者心與小腸實熱也導赤散去甘草加黃芩色如豆汁者腎與膀胱火也五淋散又有一種小便見血而不痛者為溺血非淋也四物湯加山梔滑石牛膝或單苦蕒菜飲單發灰散單琥珀散石淋溺有砂石莖強痛甚單牛膝膏單鱉甲為末酒調服膏淋血凝如膏用黑豆一百二十粒甘草一寸水煎臨熟入滑石末一錢空心溫服或海金砂散勞淋痛引氣衝遇勞則發痛墜及尻透膈散勞傷四物湯加知柏滑石琥珀虛甚者鹿角霜丸熱淋暴淋痛甚八正散或五苓散合敗毒散加味石膏湯急痛者六一散二錢加木香檳榔小茴香各一錢為末服冷淋必先寒栗而後溲便澀數竅中腫痛生附散二木散淋皆屬熱間有冷者外因當風取涼冒暑濕熱鬱滯胞內痿痹神不應用內因七情心腎鬱滯小腸膀胱不利或忿怒房勞忍溺酒肉濕熱下流膀腎干於肝經廷孔鬱結初則熱淋血淋久則火爍為砂石淋如湯壺煎久生磏熱在上焦氣分渴而小便不利者肺中伏熱水不能降宜氣薄淡滲之藥清金瀉火以滋水之上源清肺飲子熱在下焦血分不渴而小便不利者腎與膀胱無陰而陽氣不化水枯火升宜氣味俱陰之藥除熱瀉閉以滋水之下源滋腎丸腎氣丸前消渴以渴為主而分氣血故血分亦有渴者此以淋為主而分氣血故血分有不渴者但渴而多汗亡津又未可以輕滲也治暑淋熱淋血淋山梔仁一味足矣凡淋發汗則死治膏淋砂石淋鬱金琥珀開鬱青皮木香行氣蒲黃牛膝破血黃柏生地黃滋陰東垣用藥凡例小腹痛用青皮疏肝黃柏滋腎蓋小腹小便乃肝腎部位小腹脹滿甚者瀉腎湯火府丹凡小腸有氣則脹有血則澀有熱則痛又土燥水濁宜四君子湯加滑石澤瀉麥門冬淡竹葉痛者六君子湯加知柏石韋琥珀肝經氣滯有熱者用甘草梢五錢青皮黃柏澤瀉各一錢水煎服或三味葶藶散莖痛引脅者參苓琥珀湯腸痛引腰背者磁石湯虛者清肝解鬱湯清肝益榮湯腎虛淋瀝莖中澀痛者加減八味丸以補陰小便頻而黃者四物湯加參朮麥門冬五味子以滋肺腎小便短而黃者補中益氣湯加麥門冬五味子山藥以滋脾腎熱結膀胱者五淋散以清熱脾肺氣燥者苓梔二味以清肺若膀胱陰虛陽無以生者滋陰丸膀胱陽虛陰無以化者腎氣丸精敗竭者童男精未盛而御女老人陰已痿而思色以降其精則精不出而內敗莖中痛澀為淋者八味丸加車前子牛膝煎服若精已竭而復耗之則大小便中牽疼愈疼則愈欲大小便愈便則愈疼倍附子救之凡此當滋化源不可誤用知柏淡滲等劑既瀉真陽復損真陰中氣既弱不能運通水道下輸膀胱者補中益氣湯凡汗多亡津瀉久胃干諸瘡失血俱宜滋補不可過利小便積痰在肺以致膀胱不通譬之水壺上竅閉則下竅不出宜二陳湯探吐或灸百會穴皆以開上竅也蓋膀胱雖主水道而肺金為水之化源也脬系轉戾臍下並急而痛小便不通名曰轉脬有因熱逼或強忍小便氣逆脬轉者二石散加車前子木通等分水煎外用炒鹽尉臍冷即易之因氣者先用良薑蔥白蘇葉煎湯熏洗小腹外腎肛門拭乾伸腳仰臥後用葵子赤茯苓赤芍藥等分入鹽一字煎調蘇合香丸服之忍尿疾走及忍尿飽食者二陳湯探吐忍尿入房者補中益氣湯提之陰虛兩尺脈絶服諸滑利藥不效者腎氣丸陽虛者八味丸或附子澤瀉等分燈心煎服此危證也體薄性急人多有之痹論云胞痹者小腹膀胱按之內痛若沃以湯澀於小便上為清涕夫膀胱為州都之官津液藏焉氣化則能出矣今風寒濕邪氣客於胞中則氣不能化出故胞滿而水道不通其證小腹膀胱按之內痛若沃以湯澀於小便以足太陽經其直行者上交巔入絡腦下灌鼻竅則為清涕也腎瀝湯腎著湯千金茯苓丸選用脈法脈經曰少陰脈數婦人則陰中生瘡男子則為氣淋若脈盛大而實者生虛小而澀者死治諸淋方五淋散治腎氣不足膀胱有熱水道不通淋瀝不出或如膏如砂石或如豆汁或尿血並皆治之赤茯苓一錢二分赤芍藥山梔仁各二錢當歸一錢甘草生用五分條黃芩六分上銼水煎空心服一方加生地黃澤瀉木通滑石車前子各等分八正散治大人小兒心經蘊熱臟腑祕結小便赤澀癃閉不通熱淋血淋膏淋砂淋石淋並皆治之車前子瞿麥萹蓄滑石山梔子大黃木通甘草各等分上㕮咀每服五錢入燈心十莖水煎食前溫服小便淋滴頻數無度加牛膝加味四苓散治諸淋茯苓豬苓澤瀉白朮各五分滑石梔子各一錢甘草二分燈心三十莖上銼水煎空心服加味益元散滑石二錢甘草五分車前子一錢上為末水調服一方益元散加阿膠末一錢石韋散治腎氣不足膀胱有熱水道不通淋瀝不宣出少起數臍腹急痛蓄作有時勞役即發或尿如豆汁或出砂石或莖中痛甚神效石韋去毛瞿麥白朮芍藥木通滑石葵子各一錢當歸甘草王不留行各五分上銼水煎食前服或為末每服三錢空心小麥湯調下一方加山梔赤茯苓地膚草通草湯治諸淋王不留行葵子通草茅根蒲黃當歸桃膠瞿麥滑石各一兩甘草半兩上㕮咀每服四錢加生薑五片水煎服清肺飲子治渴而小便閉澀不利邪熱在上焦氣分茯苓豬苓澤瀉各一錢半麥門冬去心黃芩山梔瞿麥各一錢萹蓄車前子炒另研木通各七分燈心草二十莖琥珀另研五分上銼水煎空心服一方無麥門冬黃芩山梔三味有通草二分通關丸一名滋腎丸治不渴而小便閉熱在下焦血分黃柏酒洗焙乾知母酒洗焙乾各一兩肉桂五分上為細末熟水丸如桐子大每服一百丸空心白湯下須頓兩足令藥易下行也如小便已利莖中如刀刺痛當有惡物下為驗一方加滑石一兩木通五錢滋陰化氣湯治因服熱藥過多小便不利諸藥不效或臍下悶痛難忍黃柏鹽水炒三錢知母鹽水炒二錢黃連炒一錢半甘草梢一錢上銼水煎服食前通滑散治熱結小便赤澀不通水道中痛尿即號啼滑石一兩通草七錢半冬葵子赤茯苓車前子黃芩各半兩上為細末每服五分或一錢食前溫水調下地膚子湯治諸病後體虛觸熱熱結下焦遂成淋疾小便赤澀數起少出莖痛如刺或尿出血地膚子豬苓各一錢半知母黃芩海藻洗通草瞿麥枳實麩炒升麻葵子各一錢上㕮咀作一服加生薑五片水煎溫服車前子散治諸淋小便痛不可忍車前子生半兩淡竹葉赤茯苓燈心草荊芥穗能通竅各二錢上作二服水煎空心服立效散治下焦結熱小便淋閉作痛有時尿血甘草炙三分瞿麥穗一兩山梔子去皮炒半兩上㕮咀每服五錢加生薑三片蔥白三個燈心三十莖水煎食前服榆皮散治小便卒暴淋澀不通榆白皮洗郁李仁去皮尖炒赤茯苓雞蘇葉瞿麥穗梔子仁木通各一錢上㕮咀作一服水煎不拘時服海金沙散治小便淋瀝及下焦濕熱氣不施化或五種淋疾癃閉不通海金沙研木通滑石瞿麥穗各一錢半杏仁去皮尖麩炒二錢上銼作一服加燈心二十莖水煎食前服五淋散治膀胱有熱水道不通淋瀝不止臍腹急痛或尿如豆汁或如砂石膏淋尿血並宜服之山茵陳淡竹葉各一錢木香滑石甘草炙各一錢半山梔子炒赤芍藥赤茯苓各二錢上㕮咀作一服水煎食前服導赤散治心虛蘊熱小便赤澀或成淋痛生地黃四錢木通三錢甘草二錢上作一服加竹葉十片水煎服火府丹治心經蘊熱小便赤澀淋痛生地黃二兩木通黃芩各一兩甘草五分上為細末煉蜜丸如桐子大每服五十丸木通煎湯下海金沙散