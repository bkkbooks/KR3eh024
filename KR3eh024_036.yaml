body:
  text: 卷三十六噎膈翻胃論醫説云古今論膈氣乃有五種謂憂恚胡桂切音惠恨怒也氣寒熱也夫胸中氣結煩悶飲食不下羸瘦無力此名憂膈心下實滿食不消化噫輒醋心大小便不利此名恚膈胸脅逆滿咽喉閉塞噫聞食臭此名氣膈心腹脹滿咳逆腸鳴食不生肌此名寒膈五心中熱口舌生瘡骨煩體重唇乾口燥背痛胸痹此名熱膈噎病亦有五種謂氣憂食勞思也噎者乃噎塞不通心胸不利飲食不下也各隨其證而治之張雞峰曰此病不在外不在內不屬冷不屬熱不是實不是虛所以藥難取效此病緣憂思恚怒動氣傷神氣積於內氣動則諸證悉見氣靜疾候稍平手捫之而不得疾之所在目視之而不知色之所因耳聽之而不知音之所發故針灸服藥皆不見效此乃神意間病也頃京師一士人家有此症勸令靜觀內養將一切用心力事委之他人服藥方得見效潔古曰吐有三氣積寒也皆從三焦論之上焦在胃口上通天氣主納而不出中焦在中脘上通天氣下通地氣主腐熟水穀下焦在臍下下通地氣主出而不納是故上焦吐者皆從於氣氣者天之陽也其脈浮而洪其證食已暴吐渴欲飲水大便燥結氣上衝胸而發痛其治當降氣和中中焦吐者皆從於積有陰有陽食與氣相假為積而痛其脈浮而弦其證或先痛而後吐或先吐而後痛治法當以小毒藥去其積檳榔木香和其氣下焦吐者皆從於寒地道也其脈大而遲其證朝食暮吐暮食朝吐小便清利大便祕而不通治法當以毒藥通其閉塞溫其寒氣大便漸通復以中焦藥和之不令大府祕結而自安也樓氏曰潔古論三焦吐其説蓋本於黃帝所謂氣為上膈食飲入而還出為下膈食晬時乃反出之其上焦食已暴吐者今世謂之嘔吐也中下二焦朝食暮吐暮食朝吐者今世謂之膈氣翻冒也今分嘔吐膈氣為二門晬祖對切音最晬時周時也王太僕曰食不得入是有火也食入反出是無火也又發明曰噎者六腑之所主陽也氣也塞者五臟之所主陰也血也二者皆因陰中伏火而作也劉宗厚曰若三焦傳化失常所致主於氣也若血虧胃脘乾稿所致因於血也塞猶填塞不通之義故發明有治幽門不通噎塞不便通幽湯例蓋陽無陰不能通化陰之失位而陽伏其中傳化不變而反上行矣虞氏曰先哲論膈噎翻胃大率以血液乾稿其或咽喉窒塞食不能下其稿在吸門或食下則胃脘當心而痛須臾吐出食出痛止其稿在賁門此皆上焦之膈噎也其或食物可下良久復出其稿在幽門此中焦之膈噎也其或朝食暮吐暮食朝吐其稿在闌門大小腸之間此下焦之膈噎也雖然亦有斯須輕病而為醫所誤者丹溪論之詳矣闌門臍下攔約水穀分膀胱大腸而為糞溺丹溪曰局方治一切氣冷氣滯氣逆氣上氣悉用香燥熱藥夫周流於人之一身以為主者氣也陽往則陰來陰往則陽來一升一降無有窮已苟內不傷於七情外不感於六淫其為氣也何病之有今曰冷氣滯氣逆氣上氣皆是肺受火邪氣得炎上之化有升無降熏蒸清道甚而至於上焦不納中焦不化下焦不滲展轉變為嘔為吐為膈為噎為痰為飲為翻胃為吞酸夫治寒以熱治熱以寒此正治之法也治熱用熱治寒用寒此反佐之法也詳味局方既非正治又非反佐此愚之所以不能不疑也按原病式曰諸病嘔吐酸皆屬於熱諸積飲痞滿中膈皆屬於濕諸氣逆衝上嘔湧溢食不下皆屬於火諸堅痞腹滿急痛吐腥穢皆屬於寒深契仲景之意觀金匱要略用藥微意可表者汗之可下者利之滯者導之郁者揚之熱者清之寒者溫之偏寒偏熱者反佐而行之挾濕者淡以滲之挾虛者補而養之何嘗例用辛香燥熱之劑以火濟火實實虛虛咎將誰孰或曰脈訣謂熱則生風冷生氣寒主收引今冷氣上衝矣氣逆矣氣滯矣非冷而何吾子引仲景之言而斥其非然則諸氣諸飲諸嘔吐翻胃吞酸等病將無寒病耶豫曰五臟各有火五志激之其火隨起若諸寒為病必須身犯寒氣口食寒物乃為病寒非若諸火病自內作所以氣之病寒者十無一二或曰其餘痰氣嘔吐吞酸噎膈翻胃作熱作火論治於理可通若病人自言冷氣從下而上非冷而何豫曰上升之氣自肝而出中挾相火自下而出其熱為甚自覺其冷非真冷也火極似水積熱之甚陽亢陰微故見此證冷生氣者出高陽生之謬言也若病果因於寒當以去寒之劑治之何至例用辛香燥熱為方不知權變豈不誤人或曰諸氣諸飲與夫嘔吐吞酸膈噎翻胃等症局方未中肯綮然則要略之方果足用乎抑猶有未發者乎豫曰天地之氣化無窮人身之病亦變化無窮仲景之書載道者也醫之良者引例推類可謂無窮之用假令略有加減修合終難俞越矩度夫氣之初病也其端甚微或因些小飲食不謹或因外冒風雨寒暑或內感七情或食味過厚偏助陽氣積成膈熱或資稟素實表密無汗或性急易怒陰火炎上以致津液不行清濁相干氣為之病或痞或痛或不思食或噎噫腐氣或吞酸或嘈雜或膨滿不求本原便認為寒遽以辛香燥熱之劑投之數帖暫得快然以為神方仍前厚味不節將理不謹舊疾被劫暫舒濁液易於攢聚或半月或一月前病復作如此延蔓自氣成積自積成痰此為痰為飲為吞酸之由也痰挾汙血遂成窠囊於是為痞為痛為嘔為噎膈翻胃之次第諸症隆起飲食湯液泥滯不行滲道蹇澀大便或祕或溏下失傳化中焦愈停醫者不察猶孰為冷翻思前藥隨手得快以冀一旦豁然之效不思胃為水穀之海多血多氣氣清和則能受脾為消化之官氣清和則能運今得香熱之藥偏助氣血沸騰其始也胃液凝聚無所容受其久也脾氣耗散傳化漸遲其有胃熱易飢急於得食脾傷不磨鬱積成痛醫者猶曰虛而積寒非尋常草木可療妄以烏附助佐丹劑專意服餌積而久也血液俱耗胃脘乾稿其稿在上近咽之下水飲可行食物難入間或可入入亦不多名之曰噎其稿在下與胃相近食雖可入難盡入胃良久復出名之曰膈亦曰翻胃大便祕小若羊屎然名雖不同病出一體要略論飲有六曰痰飲懸飲溢飲支飲留飲伏飲分別五臟諸證治法至矣盡矣第恨醫者不善處治病者不守禁忌遂使藥助病邪展轉深痼去生漸遠深可哀憫或曰千金諸方治膈噎翻胃未嘗廢薑桂等劑何也豫曰氣之鬱滯久留清道非借香熱不足以行然悉有大黃石膏竹茹芒硝澤瀉前胡朴硝茯苓黃芩蘆根瓜蔞等藥為之佐使其始則同其終則異病邪易伏故易於安或曰胃脘乾稿者古方果可治乎將他有要捷之法或可補先人之未發者乎豫曰古方用人參以補肺御米以解毒竹瀝以清痰乾薑以養血粟米以實胃蜜水以潤燥生薑以去穢正是此意張雞峰亦曰噎當是神思間病惟內觀自養可以治之此言深中病情治法亦為近理夫噎病生於血乾夫血者陰氣也陰主靜內外兩靜則臟腑之火不起而金水二氣有養陰血自生腸胃津液傳化合宜何噎之有又曰翻胃即膈噎膈噎乃翻胃之漸大約有四血虛氣虛有熱有痰病之初起因內傷外感而致痞痛噫酸嘈雜等症醫者率用局方辛香燥劑劫之而愈復作復劫延蔓至久而成噎膈展轉深痼良可哀憫治法用童便韭汁竹瀝牛羊乳驢尿氣虛入四君子血虛入四物有痰用二陳入氣血等藥中切不可用香燥藥宜薄滋味氣虛以四君子為主血虛以四物為主氣血俱虛者則口中多出沫但見沫大出者不治有痰以二陳為主寸關脈沉而澀者以解毒為主二者可治有氣結者用開導之劑有陰火炎上者作陰火治有積血者當消息去之韭汁能下膈中瘀血年少者四物湯清胃脘血血燥不潤故便澀大便澀者難治常令食兔肉則便利年高者不治治必用參朮輩關防氣虛胃虛糞如羊屎者斷不可治大腸無血故也又云一中年婦人翻胃以四物湯加帶白陳皮留尖桃仁生甘草酒紅花濃煎入驢尿以防生蟲與數十貼而安一木匠勤工作而有艾妻且喜酒病翻胃半年面白脈澀不勻重取則大而無力大便燥結形體羸弱精血耗故也取新溫牛乳細飲之每次盡一杯晝夜五七次漸至八九次半月便潤月餘而安然或口乾蓋酒毒未解飲以甘蔗汁少許一人年四十病翻胃二月不喜飲食或不吐或吐涎裹食出得吐則快脈澀重取弦大因多服金石房中藥所致時秋熱以竹瀝御米為粥二三啜而止頻與之遂不吐後以流水煮稀粥少入竹瀝與之間以四物湯加陳皮益其血一人咽膈間常覺有物閉悶飲食防礙脈澀稍沉形色如常豫作曾飲熱酒所致遂以生韭汁每服半盞日三服至二斤而愈一人不能頓食喜頻食一口忽咽膈壅塞大便燥結脈澀似真藏脈喜其形瘦而色紫黑病見乎冬卻有生意以四物湯加白朮陳皮濃煎入桃仁十二粒研再煎沸飲之更多食諸般血以助藥力三十帖而知至五十帖而便潤七十帖而食進百帖而愈一人食必屈曲下膈瀝瀝微痛脈右澀而關沉左卻和此瘀血在胃脘之口氣因鬱而為痰必食物所致詢其去臘日飲點剁酒三盞遂以韭汁半盞冷飲細細呷之盡半斤而愈古方用人參以補肺御米以解毒竹瀝以清痰乾薑以養血粟以實胃蜜以潤燥薑以去穢有治寒者必為當時有實因於寒者用之得效不比局方泛論使凡有此證率用之也挾寒者間或有之今人率因痰氣久誤於醫傳變而成其無寒也明矣集略云夫五噎五膈者或由飲食痰飲七情過用脾胃內虛以吞酸吐酸作痛之始原病式曰嘔湧溢食不下火氣炎上胃膈熱甚則傳化失常故也不可用香燥大熱之劑亦有服耗氣藥過多中氣不運而致者當補氣自運有服通利藥過多致血液耗竭而愈結者當補血潤血自行如痰飲阻滯脈結澀者當清痰瀉熱其火自降有脾胃陽火衰其脈沉細而微者當以辛香之藥溫其氣仍以益陰養胃為主非如局方之惟務燥烈也如實熱太甚承氣三湯可下之脾胃衰虛者禁用大抵養血生津清痰降火潤氣補脾開鬱為上枳朮二陳湯降火以酒炒芩連清痰以竹瀝薑汁開鬱以神麯香附潤氣以麻仁杏子生津以烏梅潤燥少加白蜜其間腸胃燥結至食罷如羊屎者不能為矣調養之法務在戒性安靜張雞峰云噎是神思間病當內觀自養使臟腑之火不起以培金水二氣若不守戒忌厚味房勞之人及年高無血者不愈蔭按夫膈噎翻胃之證因火而成其來有漸病源不一有因思慮過度而動脾火者有因忿怒過度而動肝火者有因久食煎炒而生胃火者有因淫欲忘反而起腎火者蓋火氣炎上熏蒸津液成痰初則痰火未結咽膈乾燥飲食不得流利為膈為噎久則痰火已結胃之上脘不開飲食雖進停滯膈間須臾便出謂之嘔吐至於胃之下脘不開飲食雖進停滯胃中良久方出謂之翻胃丹溪云年高者不治蓋少年氣血未虛用藥劫去痰火病不復生老年氣血已虛用藥劫去痰火雖得暫愈其病復作所以然者氣虛則不能運化而生痰血虛則不能滋潤而生火故也丹溪又云此證切不可用香燥之藥若服之必死宜薄滋味夫證屬熱燥香燥之藥非宜又香散氣燥耗血滋味助火而生痰也豫嘗用霞天膏加於補虛藥中以治此證者一人則吐瀉以去積血一人則吐瀉以去積痰俱獲病安思食但二人俱不能節戒隨啖肥甘終不能免殊不知此證挾虛雖云病去而脾胃尚弱肥甘難化故病復也噫得此證者可不謹哉可不懼哉若用霞天膏吐瀉後宜用人參膏補之又按吳氏曰噎膈者有物噎塞妨礙飲食之名方書稱五噎五膈五噎者氣噎憂噎勞噎食噎思噎也五膈者憂膈恚膈氣膈寒膈熱膈也立言雖曰有五説症其實未周今不拘其説只據世人所有之證立方焉翻胃者胃不能安穀食下即出之名也嗜酒燥暴之人多有此疾若胃脘未枯皆為可治已枯者從容用藥猶可久延若造次不察病理非惟無益而又害之矣張雞峰云內觀靜養深中病情然其中有挾蟲挾血挾痰與食而為患者皆當按法兼治不可忽也李氏曰飲食不下而大便不通名膈噎疏云膈有拒格意即膈食翻胃也玉機云噎塞大便不通通幽湯故以膈噎為題局方以噎近咽膈近胃而遺下焦又妄分十膈五噎皆非經旨病因內傷憂鬱失志及飲食淫欲而動脾胃肝腎之火或因雜病誤服辛香燥藥俱令血液衰耗胃脘枯稿其稿在上焦賁門者食不能下下則胃脘當心而痛須臾吐出乃止賁門即胃脘上口言水穀自此奔入於胃而氣則傳之於肺也其稿在中焦幽門者食物可下良久復出幽門與中脘相近言其位幽僻胃中水穀自此而入小腸也其稿在下焦闌門者朝食暮吐暮食朝吐闌門臍下攔約水穀分水膀胱大腸而為糞溺是大小腸膀胱乃氣血津液流通之道路也經曰三陽結謂之膈小腸熱結則血脈燥大腸熱結則不能便膀胱熱結則津液涸三陽熱結脈必洪數有力前後閉塞下既不通必反而上行所以噎食不下縱下復出乃陽火上行而不下降也實火黃連解毒湯加童便薑汁或益元散入薑汁澄白卻為小丸時時服之溫六丸尤妙甚者陶氏六一承氣湯人參利膈丸虛火衝上食不入者枳梗二陳湯加厚朴白朮及木香少許或古萸蓮丸渴者錢氏白朮散大便閉者導滯通幽湯或參仁丸麻子仁丸當噎未至於膈之時便宜服此防之膏肓之疾豈可怠忽間有身受寒氣口傷冷物以脾胃火衰膈上若冷腸鳴脈必滑微宜暫用丁香煮散五膈湯五噎湯單附子散以劫之若不求其本偏認為寒概用辛香燥藥必至爍陰不救古云膈噎神思間病惟內觀自養之益七情火熾熏蒸津液為痰為積積久則血愈衰針經曰怒氣所至食則氣逆不下勞氣所至為膈噎喘促思氣所至為中痞三焦閉塞咽嗌不利痰飲脈滑或伏二陳湯古參夏湯化痰丸瓜蔞實丸或用黃連吳茱萸貝母瓜蔞仁牛轉草水煎食積脈滑而短枳朮丸加黃連陳皮半夏或狗米平胃丸虎脂平胃丸或用保和丸二錢加薑炒黃連三錢山楂二錢為丸如麻仁大胭脂為衣每六十丸人參煎湯入竹瀝下七情鬱結脈沉而澀飲食喜靜胸背痛者四七湯溫膽湯痞滿煩悶微嗽二便不利者分心氣飲四磨湯或木香檳榔二味等分為末白湯下傷神不睡者十味溫膽湯硃砂安神丸腹脹腸鳴者木香勻氣散有積聚者阿魏撞氣丸惡聞食氣者五膈寬中散氣虛不能運化生痰者脈必緩而無力四君子湯大便祕加蘆根童便氣虛甚者六君子湯加附子大黃酒毒加甘蔗汁單人參湯人參膏尤妙血虛不能滋潤生火者脈必數而無力四物湯加童便竹瀝薑汁大便閉加桃仁紅花有瘀血加壯丹皮韭汁防生蠱加驢尿血虛甚加乾薑血燥加牛羊乳汁不可以人乳代之蓋人乳反有七情飲食之毒火故也氣血俱虛者八物湯主之不問虛實俱以益陰養胃為主庶免後患通用二陳湯加童便竹瀝薑汁韭汁有熱加土炒芩連瓜蔞桔梗七情加香附川芎木香檳榔不納食加麥芽神麯熱結食反上奔加大黃桃仁氣虛合四君子湯血虛合四物湯雜方燒針丸杵粳丸紫金錠霞天膏神仙奪命丹古阿魏散或靈砂燒酒下凡五十歲後血枯糞如羊屎及年少不淡薄飲食不斷絶房室者不治袖珍論曰又有下虛之人氣上控膈令人心下緊滿痞急肌中苦痹緩急如刺不得俯仰名曰胸痞其證類乎五膈又當以嚴氏瓜蔞實丸治之臨證又宜詳審脈法脈經曰寸緊尺澀其人胸滿不能食而吐吐止者為下之故不能食誤言未止者此為翻胃故尺為微澀也寸口脈緊而芤緊則為寒芤則為虛虛寒相搏脈為陰結而遲其人則噎關上脈數其人則吐脈弦者虛也胃氣無餘朝食暮吐暮食朝吐變於胃反寒在於上醫反下之令脈反弦故名曰虛趺陽脈浮而澀浮則虛澀則傷脾脾傷則不磨朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而澀其病難治脈澀而小血不足脈大而弱氣不足戴氏曰翻胃血虛者脈必數而無力氣虛者脈必緩而無力氣血俱虛者則口中多出沫但見沫大出者必死有熱者脈數而有力有痰者脈滑數二者可治血虛者四物為主氣虛者四君子為主熱以解毒為主痰以二陳為主龔氏曰翻胃噎膈寸緊尺澀緊芤或弦虛寒之厄關沉有痰浮澀脾積浮弱氣虛澀小血弱若澀而沉七情所搏又曰脈浮緩者生沉澀者死通治諸膈噎翻胃方加減二陳湯丹溪活套治膈噎翻胃悉用此為主治陳皮半夏茯苓甘草上用水煎加薑汁竹瀝童便韭汁服如胸中覺有熱悶加土炒黃連黃芩瓜蔞仁桔梗如血虛瘦弱之人合四物湯加杏仁泥紅花童便韭汁之類仍不可缺如氣虛肥白人膈噎者合四君子湯亦加竹瀝薑汁為要藥也如飲酒人加砂糖驢尿入內服如朝食暮吐暮食朝吐或食下須臾即吐者此胃可容受而脾不能傳送也或大小腸祕結不通食返而上奔也加酒蒸大黃桃仁之類以潤之脾不磨者加麥芽神麯之類以助化之有因七情鬱結成氣噎者加香附撫芎木香檳榔瓜蔞仁砂仁蔭按膈噎大便燥結用大黃乃急則治其標之劑也仍用四物湯加童便韭汁多飲牛羊乳為上策也但不可以人乳代之蓋人乳內有飲食烹飪之火及七情之火存於中故不可用順氣和中湯治嘔吐翻胃嘈雜吞酸痞悶噫氣噎膈心腹刺痛噁心吐痰水陳皮鹽水炒香附醋浸炒山梔子薑汁炒黑各一錢白朮八分白茯苓七分半夏薑汁浸炒神麯炒各六分黃連薑汁曬乾以豬膽汁拌炒枳實麩炒五分砂仁三分甘草炙二分上銼一劑生薑三片長流水入嬌泥攪澄清水一盅煎至七分入竹瀝童便薑汁不拘時細細溫服如氣虛加人參黃耆各八分如血虛加當歸七分川芎五分如氣惱或氣不舒暢加烏藥五分木香三分如胸膈飽悶加蘿蔔子炒六分如心下嘈雜醋心加吳茱萸四分