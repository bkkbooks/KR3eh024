蔻去皮五個木香人參厚朴薑製赤茯苓桂各半兩甘草炙檳榔訶黎勒青皮陳皮去白郁李仁湯泡去皮尖炒半夏薑製上為極細末每服二錢入鹽少許如茶點服若入薑棗同煎亦佳不拘時丁香附子散治膈氣吐食丁香半兩檳榔一大個黑附子一個半兩者炮去皮硫黃去石胡椒各二錢上先將四味為末次入硫黃再研勻每服二錢用飛硫黃一個去毛翅足腸胃填藥在內用濕紙五七重裹定置慢火內燒熟取出嚼吃後用溫酒送下一日三服不拘時候如不吃酒溫粟米粥飲調下飛硫黃本草無或云蝙蝠呂純陽降筆傳治翻胃方藿香陳皮半夏人參赤茯苓白豆蔻厚朴檳榔蘇子沉香枇杷葉白芥子良薑官桂少許丁皮少許杵頭粳上銼加生薑三片棗一枚水煎服一方治男婦小兒唇青面黃肚裡冷疼引牽小腹以至翻胃嘔吐口苦舌乾少寤多寐腳手牽制不拘年日遠近一切脾冷病悉能除愈人參黃耆鹽炙粉草各一兩白茯苓二兩附子重七錢以上者炮去皮臍上為細末每服三錢鹽湯煎服忌生冷油麵黏膩等毒物無不效者甚妙一婦人年四十餘久患翻胃面目黃黑歷三十餘年醫不能效脾俞諸穴燒灸交遍其病愈甚服此藥七日頓然全愈服至一月遂去其根自是服之不三五服些小脾疾立便瘥平保全胃氣能生肌肉進飲食順榮衛常服大有補益纍試纍驗幸毋忽焉附子散治翻胃用附子一枚極大者放於磚上四面著火漸漸逼熟淬入生薑自然汁中再用火逼再淬約盡生薑汁半碗焙乾入丁香二錢每服二錢水一盞粟米少許同煎七分不過三服瘥斗門方用粟米飲調下一錢服之桂香散治膈氣翻胃諸藥難瘥朝食暮吐甚者食已輒出其效神速此重劑也水銀黑錫各三錢硫黃五錢上三味銚內用柳木槌熬研微火上細研為灰取出入丁香末桂末各二錢生薑末三錢上都一處研勻每服三錢黃米粥飲調下一服效驗蔭按上丁香附子例治翻胃見臟腑有寒者服之丹溪云治翻胃忌甚燥之劑犯之必死設用必與潤血藥相兼服方可漢防己散治五噎漢防己五錢官桂陳皮去白杏仁湯炮去皮各一兩細辛紫蘇羚羊角末各七錢半上為細末每服三錢生薑三片水煎日二服膈氣丸治氣食憂勞思慮五噎麥門冬甘草各五錢人參四錢桂心細辛川椒遠志去心炒各三錢附子乾薑各二錢上為末煉蜜丸如雞頭大綿裹一丸含化食後日三夜三服胸中當熱七日愈膈氣丸治氣食憂勞思慮五噎半夏桔梗各一兩肉桂枳殼各一兩半上為細末薑汁麵糊丸如桐子大薑湯下三十丸食後臥服纏金丹治五種積氣及五噎胸膈不快停痰宿飲半夏南星瓜蔞根馬兜鈴五靈脂各半兩丁香木香沉香檳榔官桂胡椒硇砂研白丁香白豆蔻飛礬各一錢硃砂三錢留半為衣上為細末和勻生薑汁煮糊丸如桐子大每服三丸生薑湯下或干嚼蘿蔔湯下紅豆丸治諸嘔逆膈氣翻胃丁香胡椒砂仁紅豆各二十一個上為細末薑汁糊丸如皂子大每服一丸以大棗一枚去核填藥麵裹燒熟去面細嚼白湯下食前進三服神效六丁丸一名香靈丸治翻胃如神亦治産後嘔不止丁香辰砂另研各六分五靈脂一錢上香脂先研末後入朱再研勻用狗膽或豬膽丸如雞頭大每服一丸生薑陳皮湯磨下吳茱萸丸治寒在膈上膈咽不通吳茱萸草豆蔻各一錢二分益智仁陳皮人參黃耆升麻各八分半夏一錢麥芽一錢半當歸身甘草各六分白殭蠶薑黃澤瀉柴胡各四分青皮木香各二分上為末湯浸蒸餅為丸如緑豆大細嚼三十丸白湯下不拘時勿多飲湯恐速走下則減藥力回生養腎丹治真元虛損心腎不交精神耗散脾土濕敗不能化食五味之物不成津液反成痰涎聚於中脘不能傳導以致大腸燥澀小便反多而赤或時嘔吐酸水久成翻胃結腸之證蒼朮米泔浸三日洗淨曬乾再換浸三日四兩蓮肉酒浸一宿去心四兩上用豶豬肚一個壁土揉擦洗淨入蒼蓮在內以線縫好酒煮爛取入石臼內搗爛捏作小餅烘乾加後藥南星四兩細切薑汁浸一宿以灶心土同炒去土黃土亦可半夏四兩泡去涎曬乾切細好醋浸七日蒸熟橘紅銼以灶心土炒去土不用粟米四兩薑汁浸蒸焙人參白朮白茯苓厚朴薑汁炒莪朮煨醋炒蓽澄茄三稜煨醋炒砂仁白豆蔻穀芽炒麥芽甘草各一兩丁香木香沉香各五錢上為末稀麵糊為丸如桐子大每服六七十丸空心米湯下東垣補真丸治脾胃虛寒飲食少思大便不實胸膈痞悶吞酸噯腐食反不化鹿茸酒浸炒巴戟去心鍾乳粉各一兩胡蘆巴炒肉蓯蓉酒浸焙附子炮去皮臍陽起石煅肉豆蔻麵裹煨菟絲子洗淨酒浸蒸川烏炮去皮沉香五味子各五錢上為末用羊腰子兩對治如食法蔥椒酒煮搗爛入酒糊丸如桐子大每服七十丸空心米飲鹽湯任下治痰膈翻胃方清痰理胃湯枳實麩炒白朮炒半夏湯泡陳皮去白各五分白茯苓一錢甘草三分上銼水二鍾薑三片水煎服清痰加竹瀝薑汁各五茶匙瀉火加薑汁炒黃連五分開鬱加香附米炒神麯炒橘葉青皮各五分嘔吐加藿香砂仁潤氣加杏仁麻子仁炒各五分津少血虛加川歸生地黃各酒洗五分開膈利痰湯治氣結痰壅膈噎飲食不下者半夏茯苓陳皮各一錢半枳實一錢二分桔梗瓜蔞仁去油黃連香附各一錢甘草三分上用水二鍾煎八分加竹瀝半盞薑汁二三匙食前服旋覆花散治胸中痰結痞塞不通不能飲食旋覆花大腹皮附子炮去皮臍木香不見火各五錢赤茯苓白朮前胡半夏泡七次桂心川芎人參各一兩青皮去穰七錢半上㕮咀每服五錢生薑三片水煎食遠服參夏湯治翻胃嘔吐人參三兩半夏六兩上銼每服一兩入白蜜十餘匙水煎溫服瓜蔞實丸治膈噎胸膈痞塞痛徹背脅喘急妨悶瓜蔞實去殼枳殼去穰麩炒半夏湯泡七次桔梗炒各一兩上為細末薑汁米糊丸如桐子大每服五十丸生薑湯下九仙奪命丹治翻胃痰涎壅盛半夏薑製白礬枯過厚朴薑製各五錢南星薑製人參甘草各三錢木香四錢枳殼麩炒豆豉洗過各一兩上為末老米打糊為餅如錢大瓦上焙乾晴夜露過每服一餅細嚼以薑煎平胃散送下忌酒面熏臘一方加阿魏三錢糖裘子五錢神效一方吳茱萸黃連貝母瓜蔞仁牛轉草上丸服三花神佑丸治積痰滿胃食下即吐甘遂芫花大戟拌炒各半兩大黃一兩黑牽牛二兩取頭末輕粉一錢上共為末水丸桐子大每服五丸漸加五丸白湯下以快利止蔭按胃中純是痰則遏下焦少陽之火蓄極而通必作翻胃者勢也以平劑治之則經年不效故用峻厲以下之此大毒類聚為丸瞑眩之劑也惟聲重脈來有力者能行之若言微脈來無力者勿輕與也慎之治食膈翻胃方化滯和中湯治脾胃弱為飲食所傷胸膈噎塞食不運化此藥最好白朮一錢半枳實麩炒半夏湯泡陳皮黃連炒茯苓各一錢厚朴薑汁炒神麯炒麥芽炒山楂各八分砂仁七分甘草三分上作一服加生薑三片水煎食前服加味保和丸治食積膈噎山楂肉一兩半夏薑製陳皮黃連炒蘿蔔子炒各五錢神麯炒三錢麥芽炒二錢上為末酒糊或神麯糊丸如桐子大每服三五十丸白湯下食鬱越鞠丸治食噎膈山梔神麯炒砂仁香附童便制撫芎蒼朮米泔浸七日梔子上為末丸服寬中進食丸滋形氣喜飲食枳實麩炒四兩半夏七錢神麯炒麥芽各五錢半炒人參草豆蔻澤瀉各五錢白茯苓三錢橘皮青皮去白檳榔豬苓乾生薑各二錢半白朮甘草炙各二錢砂仁一錢半木香一錢上為細末湯浸蒸餅為丸如桐子大每服三十丸食後米飲下五膈丸治飲食停積不消胸膈痞氣橘皮二兩大黃牽牛木香各一兩上為末煉蜜丸如桐子大每服四五十丸冷水下此治熱積之劑紫沉丸治中焦吐食由食積與寒氣相格故吐而疼陳皮五錢半夏曲砂仁各三錢烏梅去核丁香杏仁去皮尖檳榔各二錢白朮沉香木香各一錢白豆蔻巴豆霜另研各五分上為細末令勻醋糊丸如黍米大每服五十丸食後薑湯下愈則止小兒另丸厚朴丸主翻胃吐逆飲食噎塞氣上衝心腹中諸疾其藥味即與萬病紫菀丸同厚朴蜀椒去目微炒川烏頭炮去皮各一兩半菖蒲紫菀去土苗吳茱萸湯洗柴胡桔梗茯苓官桂皂角去皮弦炙乾薑炮人參各二兩黃連二兩半巴豆霜半兩另研上為細末入巴豆霜勻煉蜜為劑旋旋丸如梧桐子大每服三丸漸次加至五七丸以利為度生薑湯下食後即臥此方治效與局方溫白丸同及治處暑以後秋冬間下利大效春夏加黃連二兩秋冬再加厚朴二兩棗包內靈丹治男婦小兒胸膈脅肋疼痛腹脹如鼓不思飲食宿食不消膈噎神效白朮當歸川芎半夏杏仁茴香莪朮三稜丁香沉香各五錢良薑官桂川椒胡椒青皮陳皮甘草草烏各二錢木香巴豆去油各三錢上為末醋糊丸如芡實大每一丸用大棗一個去核將藥入內外用紙包水濕煨熟去紙細嚼溫酒下已上三方俱系辛熱毒劑有寒積者宜用若無寒及虛弱人勿輕用也棗肉平胃散開胃進食蒼朮米泔浸五兩厚朴薑製陳皮去白各三兩甘草炙紅棗生薑各二兩上銼拌勻以水浸過面上半寸許煮乾焙燥為末每服二錢空心鹽湯點服一方加人參茯苓太倉丸治脾胃虛弱不進飲食翻胃不食縮砂仁二兩白豆蔻丁香各一兩陳倉米一升黃土炒上為細末用生薑自然汁和丸如桐子大每服一百丸食後淡薑湯下已上數方俱調養脾胃誘進飲食之劑治積膈翻胃方沉香降氣丹治翻胃腹中積塊者黑牽牛三兩取頭末大黃酒蒸檳榔當歸酒浸蒼朮青皮去穰炒烏藥枳殼去穰麩炒香附炒黃連薑汁炒黃芩酒炒各一兩陳皮枳實麩炒砂仁半夏薑汁浸各五錢良薑沉香木香不見火三稜火煨蓬朮火煨各三錢上為末酒糊九如桐子大每服六七十丸淡薑湯送下七情通氣散治十膈五噎腹內久積氣塊傷力嘔吐膨脹此方諸病皆治皂角火炮一兩大黃麵包燒熟二兩當歸二錢半硇砂二錢巴豆六錢去油二錢上為末每服一分或二分量人大小虛實加減用之引用好酒一口調服不飲酒者滾白水亦可引不許多引多動一二行此藥服之不吐則瀉兼治小兒驚風痰響上宮天吊吐痰即愈芫花丸治積聚停飲痰水生蠱則成反胃及變為胃癰其説在靈樞及巢氏病源芫花醋炒一兩牛膝狼牙根桔梗炒黃藜蘆炒檳榔各半兩巴豆十粒炒黑上為細末醋糊為丸如赤豆大每服二三丸加至五七丸食前生薑湯下本事方云此方常服化痰消堅殺蠱豫患飲癖三十年暮年常多雜痰飲來潮遲即吐有時飲半杯酒即止蓋合此症也因讀巢氏病源論酒瘕云飲酒多而食谷少積久漸瘦其病常欲思酒不得酒則吐多睡不復能食是胃中有蠱使然名為酒瘕此藥治之要之須禁酒即易治不禁無益也蒜齏酢治噎方太平御覽云華他行道見一人病噎嗜食而不得下家人車載欲往就醫他聞其呻吟駐車往視語之曰向來道旁賣餅者有蒜齏大酢從取三升飲之病即當瘥即如他言立吐蛇一條懸之車邊欲造他他家小兒戲門前迎見自相謂曰客車邊有物必是遇我公也疾者先入見他壁懸此蛇以十數蓋蒜味辛熱為陽中之陽能令人氣實悶亂而自吐若蠱蛇蠱瘕尤為宜之褚尚書以蒜一升吐李道念之雞雛郭坦之兒食蒜一畦吐消食籠於頃刻蒜之妙用如此今之醫者罕能知之或問何以不用瓜蒂散曰傷寒內熱者宜吐以瓜蒂散之苦寒蟲瘕痼冷者宜吐以蒜醋之辛熱人知苦能吐熱而不知熱能吐寒故特表而出之東坡家藏仙方單用藍靛白湯化下數次效凡用藥內必用藍靛或青黛亦好永徽中絳州有僧病噎妨食數年臨死遺言令破喉視之得一物似魚而有兩頭遍體悉是肉鱗置鉢中跳躍不止時寺中方刈藍試取少靛置鉢中此蠱繞鉢畏走須臾化為水治火膈翻胃方滋陰清膈散治陰火上衝或胃火太盛食不入脈洪數者當歸芍藥煨黃柏鹽水炒黃連各一錢半黃芩梔子生地薑酒炒各一錢甘草三分上銼水煎入童便竹瀝各半盞食前服粉草散治膈上氣壅滯五臟祕塞邪熱玄明粉一斤製法見火門甘草為末二兩上二味和勻每用一錢二分桃花湯或蔥白湯調下回令丸治火膈噎黃連六兩吳茱萸六兩水煮少時曬乾上為末粥丸服薑汁六一丸治實火及飲積翻胃通用滑石六兩甘草二兩上為末用生薑自然汁澄清取白腳丸小丸子時時服之溫六丸治翻胃伐肝邪滑石甘草各二兩乾薑一兩上為末湯浸蒸餅丸服一方治翻胃吐食白礬二兩黃丹一兩上為末入瓦罐內煅令和取出以淨紙盛放地上盆蓋一宿再為末蒸餅丸如桐子大每服五丸至七丸空心溫酒下更量老少虛實與之白堊散治虛熱翻胃用白堊土一斤米醋一升煅土赤入醋內再煅再入以醋乾為度取土一兩入炮薑一錢為末每服一錢米飲下甚者二錢須服四兩有效新瓦散治翻胃用多年瓦一片燒紅入驢尿內淬二十一次研為末倉米飯焦亦為末每用二分飯末一分瓦末蠟精和飯丸以驢尿調平胃散服之吞下螺泥丸治積熱翻胃此方亦良取田中大螺不拘多少用新水養之取其吐出之泥陰乾為丸每服三十丸藿香湯下螺性至涼泥性至冷故可用之清胃吞以藿香湯借其辛芳開胃而已大黃湯治冷涎翻胃其候欲發時先流冷涎次則吐食此乃勞症治不早死在旦夕用大黃一兩生薑自然汁半茶盞炙大黃令燥淬入薑汁中如此淬汁盡切焙為末每服二錢陳米一撮蔥白一莖水一大盞煎七分先食蔥白次服其藥不十日去根八仙膏專治噎食生藕汁生薑汁梨汁蘿蔔汁甘蔗汁生果汁竹瀝蜂蜜上各取一盞合和一處飯甑蒸熟任意食之驢尿一物飲治鬱火翻胃驢尿每服呷二合蔭按炎火鬱於中治以辛香開胃之藥益滋其燥非所宜也驢尿辛膻可使開鬱然為濁陰之所降則可以濟火矣唐貞觀中許奉御及柴蔣等時稱明醫奉敕治其翻胃竭其術竟不能療漸至羸憊死在旦夕忽有一衛士云服驢子小便極驗日服二合午食惟吐一半晡時又服二合人定時食粥吐即定後奏知大內五六人患翻胃一時俱瘥然此物稍有毒服時不可過多盧和著丹溪纂要謂入驢尿以防生蠱此未究理者也專治膈噎方溫肭臍阿芙蓉晚蠶蛾收阿芙蓉將米殼萵苣開花之時當取七八寸齊又用瓷罐蓋之一月生津脂收起治燥膈翻胃方加味四物湯治血虛不能滋潤生火以致膈噎當歸川芎芍藥酒炒生地黃壯丹皮韭汁上銼水煎服大便閉加桃仁紅花加味四物湯治血虛枯燥及婦人翻胃當歸川芎芍藥地黃陳皮帶白甘草生用桃仁留尖紅花酒製上銼水一鍾半煎八分入驢尿以防生蟲當歸養血湯治年老之人陰血枯稿痰火氣結升而不降飲食不下乃成膈噎之病當歸白芍藥煨熟地砂仁炒茯苓各一錢貝母去心瓜蔞仁枳實麩炒陳皮厚朴薑汁炒香附撫芎蘇子炒各七分沉香五分另入黃連用吳茱萸同炒去茱萸不用用黃連八分上銼一劑生薑一片棗二枚水煎竹瀝磨沉香調服生津補血湯治年少胃脘血燥致患膈噎便閉塞而食不下當歸白芍藥炒熟地砂仁炒生地薑酒炒枳實麩炒茯苓各一錢黃連炒陳皮蘇子砂仁貝母去心各七分沉香各五分上銼一劑生薑一片棗一枚水煎竹瀝磨沉香同服人參散治大便祕澀咽塞不通食下便有痰出此血虛腸燥為脾約症人參黃耆枳殼炒桃仁各一錢厚朴八分地黃七分甘草炙少許上銼水煎入竹瀝薑汁飲之又與鎖陽芙蓉二錢桃仁一錢煮粥入竹瀝名潤腸散丹溪方一男子六十自來好色虛甚去秋患吐病或作或止腹結微渴白朮芍藥地黃各一錢人參當歸陳皮枳殼各五分黃芩川芎木通各三分甘草炙二分上銼水煎服神奇散治噎食翻胃三陽枯竭血虛有火當歸川芎白芍藥酒炒生地薑酒炒陳皮半夏白朮枳實麩炒白茯苓赤茯苓赤芍藥香附砂仁藿香檳榔木通豬苓黃芩炒黃柏人乳炒知母人乳炒天門冬去心麥門冬去心粉草烏梅上銼水煎服韭汁牛乳飲治胃脘有死血乾燥枯稿食下作痛翻胃便祕韭汁牛乳各等分上二味合一處時時呷之一方治翻胃要藥韭汁二兩牛乳一盞生薑半兩取汁竹瀝半盞童便一盞上五味和勻頓服或入煎藥內同服尤效祕傳潤腸膏治膈噎大便燥結飲食良久復出及朝食暮吐暮食朝吐者其功甚捷威靈仙新者四兩搗汁四五月開花者生薑四兩搗汁真麻油二兩白砂蜜四兩煎沸掠去上沫上四味同入銀石器內攪勻慢火煎候如餳時時以箸挑食之一料未愈再服一料決效橘杏麻仁丸治翻胃便祕橘皮炙杏仁去皮尖麻仁去殼各三兩郁李仁去殼五錢上陳皮為末三仁俱搗成膏用棗仁去核以石臼納三味搗和丸如桐子大每服五六十丸煎枳實湯下食前服木香順氣丸治翻胃大便閉結檳榔牛膝酒浸三日郁李仁火麻仁各二兩當歸酒浸山藥菟絲子酒製枳殼麩炒白茯苓獨活防風各一兩大黃酒蒸沉香各五錢木香三錢上為末煉蜜丸如桐子大每服二十五丸白滾湯下治血膈翻胃方滋血潤腸湯治血枯及死血在膈飲食不下大便燥結當歸酒洗三錢芍藥煨生地黃各一錢半枳殼麩炒桃仁去皮尖炒紅花酒洗各一錢大黃酒煨二錢上銼作一服水煎入韭芽汁半盞食前服韭汁飲治血噎膈生韭汁醇酒各等盞上二味合一處每服二合日二服生韭汁能解畜血之瘀結佐以醇酒行其勢也神功散治血膈胸腹作痛五靈脂一兩炒莪朮桂心藝臺子炒各半兩上銼每服二錢酒水各半盞煎服本事方治男婦小兒遠年近日翻胃吐食五靈脂一味不拘多少為細末用黃犬膽汁為丸如龍眼大每服一丸好酒半盞溫服不止再服不過三服治膈噎雜方大力奪命丸治膈噎不下食翻胃等症杵頭粳牛轉草各半斤糯米一斤上為末取黃牛口中涎沫加砂糖一二兩為丸如龍眼大入鍋內慢火煮熟食之一方只用近山處黃牛糞尖三個燒灰砂糖酒下一方治氣噎不下飲食枇杷葉去毛炙青皮去穰陳皮去白各等分上為末每服二錢加生薑五片水煎溫服不拘時一方治膈氣噎不下食用陳皮去白不拘多少用大蒜研細和丸如緑豆大每服二十丸至三十丸溫米飲下食後日三服一方蘆根五兩銼水煮服馬剝平胃散治膈噎馬剝兒即王瓜燒存性每服一錢用棗肉平胃散二錢溫酒調服食即可下然後隨病源調理神效鯽魚平胃丸治膈氣用大鯽魚自死者活者不效剖去腸留鱗用大蒜去皮薄切片填之魚腹內仍合魚用濕紙包定次用麻縛之又用熟黃泥厚固日微干炭火慢慢煨熟取出去鱗刺骨用平胃散杵丸如桐子大日曬乾瓶收勿令泄氣每服空心米飲下三十丸一方治噎食用碓嘴上細粳蜜丸如彈子大每服一丸噙化津液咽下一方用白麵二斤半蒸作大饅頭一個頂上開口取空將皂礬裝滿用新瓦四圍遮護饅頭鹽泥封固卻挖土窯安放以文武火燒一晝夜候紅色取出研為細末棗肉丸如桐子大每服二十丸空心酒湯任下忌酒色一方治噎雞谷袋不問多少不可失包內物一粒用泥固濟火煅存性用薑汁炒香附每個入半兩香附末神麯糊丸薑湯送下治噎食方皮硝三錢飛過孩兒茶一錢麝香半分上為細末作三服黃酒送下永除根不發治噎膈方新石灰三錢大黃一錢上用黃酒一鍾煎去渣服酒一方用醋鵝曬乾為末每服一錢火酒空心下即愈永不再發方用活蠍虎一個入燒酒內浸七日將酒頓熟去蠍虎只飲酒即愈治蠱亦同一方治噎食病並回食病用初出窯石灰礦投入鍋中滾水內化開去渣止用清水煮乾炒黃色為度黃色難得牙色亦可用罐收貯黃蠟封口勿令泄氣過一二年的無用凡人四十內外身體壯健者用四分如年老體弱者止用二分或二分半三分為止以好燒酒一二鍾能飲者三四鍾調服此方專治回食病哽咽年深或吐出蠱或下蠱其疾即愈如不吐不下遇發再服一次不發不必服自然痊好治翻胃雜方定生丹雄黃硃砂半夏乳香木香各三錢沉香一錢肉豆蔻三錢阿魏硇砂各五分緑豆四十粒烏梅四十個百草霜三錢為衣上為末將烏梅以熱湯泡令軟剝去核研極爛入藥搗為丸如彈子大百草霜為衣陰乾每用一粒噙化咽下以薑湯漱口復以陳麥餅火燒熟細嚼壓之噙藥即燃官香一炷如香盡藥未化者難治藥先化香未盡者可愈奪命丹治翻胃有起死回生之功裘一個麝香一分孩兒茶二分金絲黃礬三分硃砂春二分夏四分秋六分冬八分裘乃土糖裘即蜣螂所滾之彈丸糞土之下皆有乃彈中有白蠱者如指大如蠐螬一樣將彈少破一點蓋住火煅過大黃色存性不要燒焦了入前藥內並彈共為末燒酒調空心服如覺飢用大小米煮粥漸漸少進一日二三次不可多吃一日徐徐進一碗半足矣慎不可多用多則病復不可治矣忌生冷煎炒厚味蔥蒜酒面炙煿等物及氣惱五十以後一二服即愈煿音博熱也阿魏散治翻胃能起死回生阿魏五錢大路邊幹人糞燒存性五錢半上共為末五更初以生薑片蘸食狗米平胃丸治翻胃諸藥不效者黃犬一條餓數日用生米及粟米飼之取其糞中米淘淨用韭白煎湯煮作粥臨熟入沉香二錢平胃散末為丸服虎脂平胃丸平胃散加生薑棗肉為丸入老鴉爪一半或入虎脂虎肉及肚內糞尤妙一方用生虎肚少存肚內穢糞多用新瓦下盛上蓋周圍紙筋泥封固微火焙乾存性每平胃散末一兩對虎肚末三錢滾白湯調服一粒金丹黃丹三錢水飛三次狗寶一個上與丹共為一丸金箔為衣韭菜湯送下燒針丸此藥清鎮專主吐逆黃丹不以多少研細用小棗煮爛取肉丸如雞頭大每用一丸針簽於燈上燒灰為末乳汁下槿花散治翻胃以千葉白槿花陰乾為末陳米湯調下三五口不轉再服一方治轉食用翻翅雞一隻煮熟去骨入人參當歸鹽各五錢為細末再煮取與食之勿令人共食劉海田治翻胃方用公雞一隻籠住餓一日只與水吃換將腸肚卻用馬蛇兒即野地蠍虎切爛與雞食之取糞焙乾為末每服一錢燒酒送下一方治翻胃不問新久冷熱二症用虎脂半斤切如豆大用清油一斤瓦瓶內浸虎脂一月厚綿紙封口勿令氣泄每用清油一兩入無灰好酒一大鐘調勻不拘時溫服服盡病減其虎脂再添油再浸可治二人若一時無虎脂只用珠子硫黃細研半兩水銀二錢半入硫黃末研至無水銀星再研如黑煤色每服三錢生薑四兩取自然汁入好濃酒一鍾燙熱調空心服厚衾蓋覆當自足趾間汗出遍身皆汗透吐當立止不止再服此藥輕浮難調須先滴酒少許以指緩緩研之旋添酒調金桃酒治翻胃吐酸用古銅四錢敲如米粒大再入核桃肉一斤與前銅同研爛用好燒酒一斤和銅桃入錫瓶內封固瓶口將大鍋貯水安錫瓶於鍋內桑柴慢火煮一周時取出埋地下一二時每日空心服一盞如病重者午後再服一盞十日內即減如神效神灸翻胃法以男左女右手拿棍一條伸手柱棍在地與肩一般高肩上有窩名肩井穴灸三炷即效灸法治翻胃神效膏肓二穴令病人兩手交在兩膊上則脾胃開以手揣摸第四權骨下兩旁各開三寸四肋三間之中按之痠痛是穴灸時手搭兩膊上不可放下灸至百壯為佳膊匹各切音粕脅也又肩膊也後脛骨二膊胳也膻中一穴在膺部中行兩乳中間陷中仰臥取之灸七壯禁針膻音袒膻中者臣使之官喜樂出焉在胸中兩乳間心下有膈膜蔽濁氣三里二穴在膝下三寸胻外廉兩筋間灸七壯翻胃後調理方養血助胃丸治嘔吐翻胃愈後用此養元氣健脾胃生血脈調榮衛清鬱氣收功保後白朮土炒一兩三錢白芍藥鹽水炒一兩二錢當歸酒洗川芎山藥炒蓮肉去皮心各一兩熟地黃薑汁浸炒八錢白茯苓扁豆薑汁炒各六錢人參去蘆五錢甘草炙三錢上為末薑汁打神麯糊為丸如梧桐子大每服六七十丸空心白滾湯下
