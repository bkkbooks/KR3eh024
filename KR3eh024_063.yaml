body:
  text: 卷六十三便血論袖珍論曰人之滋養一身惟氣與血血為榮氣為衛榮行脈中衛行脈外故心生血肝藏之而脾為之統貴乎氣順則血調若內因七情並酒食所傷外為風氣相干則血氣逆亂榮衛失調皆能令人下血風入腸胃者其脈浮下血必在糞前是名近血停積於大腸者其脈沉滯血在糞後又名遠血臟寒者其脈沉微下血無痛積熱者其脈洪數純下鮮血甚則急痛傷濕者脈沉而遲下血如豆汁又有因氣鬱結酒色過度並過食炙膾因毒生蟲亦能令人下血又當以五臟所傷辨其證治風濕則祛之寒則溫之熱則清之停滯則疏滌之氣則調之有毒者解之下血之證非止一端大概得熱而行得寒而止用藥當審之許云如下清血色鮮者腸風也血濁而色黯者臟毒也肛門射如血線者蟲痔也亦有一種下部虛陽氣不升血隨氣而降者丹溪云下血有熱有虛熱用四物湯加炒梔子升麻秦艽阿膠虛用四物湯加乾薑炮升麻溫散之有風邪下血者蓋風傷肝肝主血故也宜升提之腸風獨在胃與大腸出治用黃芩秦艽槐角升麻青黛兼風者蒼朮秦艽芍藥香附定腸風痛用蒼朮滑石當歸生地黃黃芩甘草有傷濕下血者宜行濕清熱脈經謂先下血後見屎是近血先見屎後見血是遠血下血不可純用寒涼藥中加辛味為佐久不愈者後用溫劑必兼升舉藥中加酒浸炒涼藥如酒煮黃連丸之類寒因熱用故也凡用血藥不可單行單止葉氏曰熱則流通虛則下溜故便血屬熱屬虛亦有風傷脾而下陷及濕勝而傷血者熱而下血或鮮或濁宜四物湯加黃芩山梔炒槐花秦艽阿膠虛用四物湯加炒乾薑升麻涼藥隨虛實加減風入腸胃純下清血者宜四物加防風升麻荊芥柴胡升提之濕入腸胃血下如豆汁色者宜四物加蒼白朮黃連黃柏地榆槐花陰虛下血無熱者十全大補湯加止血之劑大抵下血後必以胃藥收功胃氣回血自循於經絡矣又曰血鮮而色清者為腸風邪氣外入隨感而見者也濁而色黯者為臟毒蘊積毒氣久而始見者也二者之證與五痔特介乎毫釐之間腸風臟毒之血自腸臟而來五痔之血自肛門蝕孔處出也其得病之由皆因坐臥風濕醉飽房勞酒面積熱以致榮血失道滲入大腸聚而不散此腸風臟毒之所由作也腸風腹中有痛下清血先當解散腸胃風邪甚者肛門腫疼敗毒散加槐角荊芥或槐花湯枳殼散臟毒腹內略痛濁血兼花紅膿並下或肛門脹腫或大腸頭突出大便難通先以拔毒疏利之劑追出惡血膿水然後以內托並涼血祛風藥量用人虛兼以參耆苓朮助養胃氣薛氏曰經云邪在五臟則陰脈不和陰脈不和則血留之陰氣內結陽絡外傷滲入腸間故便血也針經云陽絡傷則血外溢而吐衄陰絡傷則血內溢而便血皆因飲食失節起居不時七情六淫失宜內傷外感所致若外感則血鮮名曰腸風內傷則血濁名曰臟毒外感而元氣實者人參敗毒散加槐花荊芥以祛邪氣內傷而元氣虛者用六君子湯以補胃氣元氣下陷者補中益氣湯以升舉之憂思傷脾者濟生歸脾湯以解之糞前見血者益氣湯加吳茱萸糞後見血者加黃連陰血不足者宜用四物湯病因多端不能盡述當臨證制宜庶無誤矣丹溪先生云精氣血氣出於穀氣惟大便下血當以胃氣收功治者審之一儒者素善飲不時便血或在糞前或在糞後食少體倦面色痿黃此脾氣虛而不能統血以補中益氣湯加吳茱萸黃連三十餘劑而再不發一男子每怒必便血或吐血即服犀角地黃湯之類余曰此脾虛不能攝血恐不宜用此寒涼之藥彼不信仍服之日加倦怠面色痿黃更用四物芩連牡丹皮之劑飲食少思心煩渴熱吐血如湧竟至不起若用四君子加芎歸或補中益氣湯多有得生者甚夥蔭按李氏曰便血須分內外自外感得者曰腸風隨感隨見所以色鮮多在糞前自大腸氣分來也自內傷得者曰臟毒積久乃來所以色黯多在糞後自小腸血分來也又有不拘糞前後來者氣血俱病也皆因七情六欲飲食不節起居不時或坐臥濕地或醉飽行房或生冷停寒或酒面積熱以致榮血失道滲入大腸經曰結陰者便血一升再結二升三結三升陰主血邪結陰分則血受病故當便血其淺者便血一升則結邪當解若不解而再結以邪盛也故便血二升若又不解邪為尤甚故曰三結三升也蓋邪犯五臟則三陰脈絡不和而結聚血因停留溢則滲入大腸陰非陰寒之謂也針經曰陽絡傷則血外溢而吐衄陰絡傷則血內溢而便溺外感風者色青或純下清血實者人參敗毒散加槐花荊芥虛者不換金正氣散久虛者胃風湯古樗參散苦參丸結陰丹熱者鮮紅用黃芩秦艽槐角升麻青黛等分水煎服酒蒸黃連丸香連丸蒼地丸龜柏丸挾風者藏頭丸暑月黃連香薷飲熱甚則黑者解毒散合四物湯加大黃有瘀血者桃仁承氣湯寒者色黯平胃散合理中湯加葛根升麻益智神麯當歸地榆薑棗煎服毒者病邪蘊久色濁後重疼墜四物湯加木香檳榔或四味香連丸濕者直來不痛白柏丸濕兼熱者古連殼丸又因傷風犯胃飧泄久而濕毒成澼注於大腸傳於少陰名曰腸澼俗呼血箭因其便血即出有力如箭射之遠也又有如篩四散漏下者初起濕熱或發當長夏者當歸和血散涼血地黃湯加木香檳榔久而色紫黑者濕毒甚也升陽除濕和血湯升陽補胃湯或補中益氣湯去柴陳加芥連川芎槐角枳殼內傷飲食腹必脹滿糟粕與血同來平胃散加槐角枳殼當歸烏梅甘草或通玄二八丹虛者六君子湯加芎歸神麯或六神丸內傷勞傷元氣下陷者補中益氣湯脫肛者榆砂湯內傷中氣虛弱者四君湯或單人參湯加炒乾薑少許古卷柏散烏荊丸剪紅丸陽虛甚者礬附丹內傷陰虛血弱者四物湯加乾薑龜柏丸活龜丸內傷脈絡下血者古連殼丸虛者十全大補湯主之內傷憂思怔忡少寢有汗者歸脾湯或寒熱脅痛小便悶墜拘急者逍遙散六君子湯俱加柴胡山梔或木香少許以上糞前俱加吳茱萸糞後俱加黃連二味須用熱湯同浸拌濕再頓滾湯半日久令藥氣相合方妙各揀出若生則偏寒偏熱初起和血祛風濕當歸和血散或涼血地黃湯實者槐角丸黃連阿膠丸虛者加味槐角丸四物坎離丸通用四物湯隨證加余藥又古芎歸湯調血上品加別藥用之婦人胎前患者古芩術湯芎歸湯六一散三方合服産後患者補中益氣湯加吳茱萸黃連或八物湯隨證選用久用補脾補中益氣湯參苓白朮散厚朴煎蓋精氣血皆生於穀氣胃氣一復血自循軌不受補者宜澀劑香梅丸腸風黑散單方糞前酸石榴為末一錢荔枝煎湯下糞後艾葉為末生薑汁下或乾柿燒灰為末米飲下亦好抑考腸風臟毒血自腸臟中來蟲痔之血肛門傍生小竅射如血線來肛門既脫腐血侵淫化為蟲蠹蝕傷腸口滴血淋瀝當以蕪荑艾葉苦楝根等化蟲或燒鰻鱺骨薰之內服黑玉丹鰻音瞞鱺音黎魚也鰻鱺似鱔而腹大脈法內經曰腸澼下膿血脈懸絶則死滑大則生血溫身熱者死脈經曰腸澼下膿血脈沉小留連者生數疾且大有熱者死腸澼脈攣其脈小細安靜者生浮大緊者死脈訣舉要曰便血則芤數則赤黃實脈隆閉熱在膀胱通治下血方四物湯總治一切下血隨證加減當歸川芎白芍藥生地黃各一錢酒洗上銼水煎服祛風加柏葉防風荊芥秦艽槐花蝟皮黃芩地榆枳殼甘草久者加升麻柴胡提之解毒加槐花柏葉荊芥枳殼黃芩黃連糞前近血檳榔枳實槐花條芩瀉大腸火若糞後遠血加木通吳茱萸炒黃連瀉小腸火如熱者加山梔子槐花黃連大下不止加血見愁少許薑汁和服虛者加炒乾薑濕熱加蒼朮秦艽黃芩芍藥挾氣加香附枳殼或單香附丸治腸風下血方加減四物湯治腸風下血側柏葉生地酒洗當歸酒洗川芎各一錢枳殼去穰炒荊芥穗槐花炒甘草炙各五分上㕮咀加生薑三片烏梅一個水煎空心溫服一方有地榆條芩防風各五分槐角丸治五種腸風下血痔瘻脫肛並宜服之槐角炒二兩地榆黃芩當歸酒浸焙防風枳殼去穰麩炒各半斤上為末酒糊丸如桐子大每服五十丸空心米飲下槐花湯治腸風臟毒下血槐花炒側柏葉搗爛焙荊芥穗枳殼麩炒各等分上為末每服三錢空心米飲調下香附散治腸風香附炒一兩枳殼炒七錢半當歸川芎各五錢槐花炒甘草炙各二錢半上為末每服三錢加生薑三片棗一枚水煎溫服丹溪方治腸風下血黃芩秦艽槐角升麻青黛上以水煎服又方治腸風下血滑石當歸生地黃芩蒼朮各等分上以水煎服或以蒼朮生地不犯鐵器為末丸服枳殼散治腸風臟毒下血枳殼去穰麩炒十兩黃連四兩內二兩槐角炒二兩槐花炒去角花甘草五錢上為細末每服二錢空心清米湯調下胃風湯治大人小兒風邪入於腸胃水穀不化泄下鮮血或腸胃濕毒下如豆汁或下瘀血日夜無度人參白朮炒茯苓川芎當歸酒洗白芍藥炒官桂炒各等分上銼每服五錢入粟米百粒水煎空心服小兒量力加減加黃耆甘草熟地黃名十補湯敗毒散治風熱流入大腸經下血不止羌活一錢半獨活前胡柴胡桔梗人參茯苓枳殼川芎各一錢甘草五分上作一服水煎食前服黃連散治腸風下血疼痛不止黃連雞冠花貫衆大黃烏梅各一兩甘草炙七錢半上為末每服二錢用溫米飲調下日三服不拘時一方加枳殼荊芥各一兩滋陰涼血四物湯當歸一錢半川芎生地酒洗黃耆條黃芩槐角子各一錢白芍藥黃連秦艽各八分升麻枳殼各五分甘草三分上銼水煎食前服苦參丸治腸風下血及年久痔漏苦參半斤槐角六兩女貞實四兩歸尾二兩上為末用大豬腸三尺入藥在內兩頭扎住煮爛同枯礬末四兩搗丸桐子大每服三十丸米飲下忌椒醋臟頭丸治腸風下血脫肛槐子一兩牙皂七分黃連四兩糯米一升上為末用雄豬大腸一條去油洗淨將前藥入內兩頭扎住砂鍋內煮爛搗丸如桐子大每服六七十丸米飲下腸風黑散治腸風下血或在糞前後並皆治之荊芥二兩亂髮槐花槐角各一兩燒蝟皮炒甘草炙各一兩半枳殼去白二兩炒一兩上將所燒藥同入瓷瓶內鹽泥固濟燒存三分性出火毒同甘草枳殼搗羅為末每服三錢水一鍾煎七分空心服香梅丸治腸風臟毒下血日久不止烏梅同核燒存性香白芷不見火百藥煎燒存性各等分上為末米糊丸如桐子大每服七十丸空心米飲下治臟毒下血方連蒲散治飲酒過多及食辛辣炙煿以致蘊熱入於腸胃下血色鮮黃連蒲黃炒各一錢二分黃芩當歸生地酒炒枳殼麩炒槐角芍藥川芎甘草五分上銼水煎食前服酒毒加青皮乾葛去枳殼濕毒加蒼白二術加味四物湯治下血有熱當歸川芎芍藥生地酒炒山梔炒升麻秦艽阿膠珠上銼水煎服過多不止者加黃連紅花三黃涼血湯治腸胃積熱下血黃連黃芩黃柏枳殼甘草各一錢生地黃二錢地榆五分上作一服水煎空心服血盛加當歸防風槐角子蒼地丸治積熱便血蒼朮陳皮各一兩半黃連黃柏條芩各七錢半連翹半兩生地膏六兩上為末用地黃膏為丸如桐子大每服五七十丸白湯下芍藥黃連湯治便血腹中痛謂之熱毒芍藥黃連當歸各二錢半淡桂大黃甘草炙各一錢上㕮咀作一服水煎服如痛甚調木香檳榔末各五分服酒煮黃連丸治濕熱酒毒下血黃連十二兩好酒五斤上將黃連細切以銀石器內酒煮干焙為末麵糊為丸如桐子大每服三十丸空心服蒜連丸治臟毒下血鷹爪黃連去須一兩上為末用獨頭蒜一個煨香熟研和入臼杵極爛丸如桐子大每服四十丸空心陳米湯下黃連丸治飲酒過多下血不止黃連二兩赤茯苓阿膠炒各一兩上為末用阿膠調衆手為丸桐子大每服三十丸食後米飲下白柏丸治濕熱下血白朮五錢黃柏生地酒炒白芍藥黃芩地榆香附各二錢上為末蒸餅丸服卷柏散治臟毒即效卷柏葉焙乾黃耆各一兩上為末每服二錢米飲調服一方治腸風臟毒酒痢下血黃連生薑上二味煎湯下二氣丸次服五槐丸方見效一方苦楝根炒黃上為末煉蜜丸米飲下二十丸梅師方治熱毒下血或因食熱物發動赤小豆上杵為末水調服方寸匕一方治卒暴下血用赤小豆一升搗碎水二升絞汁飲之治腸澼濕毒下血方當歸和血湯當歸身升麻各二錢槐花炒青皮各六錢荊芥穗熟地砂仁炒白朮各六分川芎四分上為細末每服三錢米飲調食前服升陽除濕和血湯治腸澼下血作派其血𣹜出有力而遠射四散如篩春二月中旬日下二行腹中大作痛乃陽明氣衝熱毒所作也當升陽去濕熱和血而愈生地酒炒牡丹皮生甘草各五錢炙甘草黃耆各一錢當歸熟地砂仁炒蒼朮秦艽肉桂各三分陳皮升麻各七分白芍藥一錢半上㕮咀作一服水四大盞煎一盞稍熱空心服立效涼血地黃湯夫腸澼者為水穀與血另作一派如𣹜桶湧出也夏月濕熱太甚正當客氣盛而主氣弱故腸澼之病甚也此湯主之黃柏去皮炒知母炒各一錢青皮槐花炒當歸熟地黃各五分砂仁炒上㕮咀作一服水煎溫服如小便澀臍下悶或大便時後重調木香檳榔細末各半錢稍熱每食前空心服如裡急後重又不去者當下之黃連湯治便血腹中不痛者謂之濕毒黃連當歸各五錢炙甘草一錢半上㕮咀每服一兩水煎食前空心服槐角散治腸胃有濕脹滿下血蒼朮厚朴陳皮當歸枳殼各一兩槐角二兩甘草烏梅各半兩上銼每服七八錢水煎空心服治結陰下血方榆砂湯治結陰便血不止漸而極多地榆四錢砂仁七枚另研生甘草一錢半炙甘草一錢上銼作一服水煎溫服結陰丹治腸風臟毒下血枳殼炒威靈仙黃耆陳皮樗根皮何首烏芥穗各等分上為細末酒糊為丸如梧桐子大每服五七十丸陳米飲入醋少許煎過放溫送下大豆酒治便血赤楞黑豆一升炒焦上為末入好酒一鏇去豆末飲酒神效連殼丸治內傷經絡下血用此以解之一料愈黃連枳殼各二兩同用槐花炒過槐花不用上為末蒸餅為丸服椿皮丸臭椿皮刮去粗皮焙十四兩蒼朮枳殼各一兩上為末醋糊丸如桐子大每服三十丸空心食前米飲下玉屑丸治腸風寒濕結陰瀉血久不止槐根白皮去粗皮苦楝根去皮各三兩椿根白皮四兩於九月後二月前取曬乾天南星半夏各半兩並生用威靈仙一兩寒食麵三兩上為末滴水丸如桐子大每服三十丸以水一盞煎沸下丸子煮令浮以匙抄起溫水送下不嚼空心食前服婁氏曰頃年一婦人下血盈盆頓爾疲痿諸藥不效豫曰此正腸風服玉屑丸三服而愈平胃地榆湯治一人因勉強飲酸酒得腹痛次轉泄瀉十餘日便後見血治以瀉熱藥不效此結陰也內經曰邪至五臟則陰脈不和陰脈不和則血留之陰氣內結不得外行血無所稟滲入腸間故便血也以此湯主之蒼朮一錢白朮陳皮茯苓厚朴各五分甘草炙乾薑當歸炒曲白芍藥益智仁人參各三分地榆七錢升麻黑附子炮各一錢葛根五分上作一服加生薑三片棗二枚水煎食前溫服此藥溫中散寒除濕和胃數服病減次服芳香之劑而愈治內虛下血方厚朴煎治氣虛腸薄榮血滲下亦治五痔厚朴生薑各一兩同搗爛炒黃白朮神麯麥芽五味子各一兩同炒黃上為末水糊丸如桐子大疾作時空心米飲下百丸平時只服五十丸蔭按蓋脾胃本無血緣氣虛腸薄自榮衛滲入而下故用厚朴厚腸胃麥芽消酒食白朮導水血自不作是亦以脾胃為主也故服之多取奇效龜柏丸治便血久而致虛腰腳軟痛及麻風瘡癢見於面者龜板二兩酥炙側柏葉芍藥各一兩半椿根皮七錢半升麻香附各五分上為末粥丸以四物湯加白朮黃連甘草陳皮煎湯下人參樗皮散治大腸風虛飲酒過度挾熱下利膿血大腸連肛門痛不可忍多日不瘥人參樗白皮各等分上為末每服三錢空心溫酒或米飲調下忌一切油膩濕面等毒物一婦人飲啖過常蓄毒在臟大便與膿血雜下日夜二三十度大痛連肛門痛不堪任醫者用止血痢藥不效又用腸風藥則益甚如此半年氣血漸弱肌肉消瘦服稍熱藥則腹愈痛血愈下服稍涼藥則泄注氣羸食愈減服溫平藥則病不知減醫術告窮垂命待盡或教以服此藥三服膿血皆定不十服其疾遂愈伏龍肝散一名黃土湯治先糞後血謂之遠血兼止吐衄伏龍肝半斤甘草炙白朮阿膠黃芩乾地黃各三兩千金方作乾薑上㕮咀每服四錢水煎空心服虛者加附子赤小豆當歸散治先血後糞謂之近血赤小豆五兩浸令芽出曝乾當歸一兩上杵為末漿水服方寸匕日三服竹茹湯治婦人汗血吐血尿血下血竹茹熟地黃各二兩砂仁炒人參白芍藥桔梗川芎當歸甘草炙桂心各一兩上㕮咀每服一兩水煎食後服剪紅丸治臟腑虛寒下血不止面色痿黃日久羸瘦東垣謂勞損宜溫此方之義非溫寒之説也當歸酒浸一兩側柏葉炒黃鹿茸火去毛醋煮附子炮去皮臍川續斷酒浸黃耆阿膠蛤粉炒白礬枯各五錢上為末醋煮米糊丸如桐子大每服七十丸空心米飲下礬附丸治陽虛腸風下血當日立止一月除根久服助下元除風氣益臟腑青礬四兩用瓦罐盛火煅食頃候冷入鹽一合硫黃一兩再煅食頃候冷取出附子一兩為末上粟米粥丸如桐子大每服三十丸空心生地黃汁下芎歸湯調血上品川芎當歸各三錢上銼水煎服熱加茯苓槐花冷加茯苓木香補中益氣湯治內傷勞傷元氣下陷便血日久不愈人參黃耆甘草炙白朮當歸各一錢升麻柴胡各五分陳皮七分上銼一服水煎服一人年六十餘便血三年諸藥不效余令服補中益氣湯倍當歸加桃仁二十服而愈十全大補湯治內傷脈絡下血不止屬虛者人參白朮白茯苓甘草炙當歸川芎芍藥生地酒炒黃耆肉桂各一錢上銼一服水煎服歸脾湯治內傷思慮怔忡少寢有汗下血白朮茯神黃耆圓眼肉酸棗仁炒各一兩人參木香各五錢甘草炙二錢半上銼每服四錢加生薑三片棗一枚水煎服收澀止血方固榮散治吐血便血真蒲黃地榆各一兩白芷五錢甘草一錢半上㕮咀每服二錢溫酒調服如氣實人加石膏一兩一方槐花荊芥各等分上為末酒調下一錢仍空心食豬血妙烏梅丸治腸風下血服之立愈真殭蠶烏梅焙乾各一兩上為末薄糊丸如雞頭實大每服百丸食前白湯送下五槐丸治臟毒五倍子槐花百藥煎好者各等分上焙乾為末酒糊丸如桐子大每服二十丸空心米湯下日三服丹溪方治下血白芷五味子上為末粥丸米湯下一方治腸風五倍子白礬各五錢上為末順流水丸如桐子大每服七丸米飲下忌酒一方治糞前有血面色黃石榴皮上為末煎茄子湯調服二錢匕一方治糞後下血不止艾葉不拘多少上為末以生薑自然汁和服一方治丈夫傷血婦人血漏漬入大腸出血草豆蔻檳榔各炒紫色罌粟殼燒灰各等分上為末每服二錢空心米飲調下以上諸方用烏梅五倍白礬等俱收澀之劑蓋酸以收脫之義也黑玉丹治腸風積熱下血不止及蟲蝕腸口滴血淋瀝刺蝟皮制一斤豬懸蹄一百個敗棕八兩銼苦楝根五兩雷丸四兩牛角䚡十一兩銼槐角六兩芝麻四兩亂髮皂角水洗淨焙八兩上銼碎用磁罐內燒存性研為末入乳香二兩麝香八錢研和令勻用酒打麵糊為丸如桐子大每服二十丸先細嚼胡桃一枚空心以溫酒吞下多進得效一方治臟毒當歸枳殼側柏葉陳槐花子百草霜芍藥各一兩上銼碎一處炒令煙微起為末每服二錢空心溫酒調下日午米湯下一方治腸風下血核桃殼繭退皮鞋底赤雞冠花各等分上燒灰為末每服一錢空心溫酒下一方血餘灰鞋底灰豬牙皂角灰各等分上為末酒調三錢匕柏灰散治臟毒下血不止側柏葉一味春東夏南秋西冬北隨方面取之上燒灰調下二錢烏梅丸治便血下血烏梅三兩燒灰存性上為末醋糊丸如梧子大每服七十丸空心米湯下冬榮散治腸風下血夏枯草燒灰存性上為末米飲下或涼水下一方治下血劫劑百藥煎一兩取一半燒為灰上為末糊丸如櫚子大每服六十丸空心米湯下一方治下鮮血山梔子仁燒灰上為末水和一錢匕服一方百草霜上研細酒調下一方治遠年日久腸風下血不止枳殼燒灰存性羊脛燒灰上為末和勻用濃米飲一中盞調下更初一服如人行五里再服立效一方治腸風下血久不止茄蒂燒存性上為末每服三錢匕食前米飲調下一方治腸風絲瓜燒灰存性上為末空心水和一錢匕量大小多少服之一方治瀉血不止桑耳一兩炒令黑上用水一升三合煎取六合去柤空心分作三服一方治腸澼陳年棕桐燒灰上為末百藥煎為丸服一方瓜蔞三個燒灰存性上為末每服三錢空心米飲調下一方治臟毒下血乾柿燒灰上為末米飲調下二錢本草云柿治腸澼解熱毒消宿血一方槐花枳殼各燒灰存性等分上為末新井水為丸米飲下以上諸方俱用燒灰蓋血見黑則止治中蠱下血方唾中見沉者心腹絞痛下血如爛肉者俱為蠱千金方治中蠱下血如雞肝其餘四臟俱壞惟心未毀或鼻破待死取馬蘭根為末每服方寸匕隨吐則出極神此苗似葛蔓緑紫生子似橘子梅氏方治卒中蠱毒下血如雞肝晝夜不絶臟腑敗壞待死用白蘘荷葉密安病人床下勿令病人知覺自呼蠱主姓名百一方治中毒蠱或吐下血者若爛肝取蚯蚓十四枚以苦酒三升漬之蚓死但服其汁已死者皆可治千金翼方治蠱毒下血取蝟毛燒灰為末水服方寸匕當吐蠱毒肘後方療中蠱毒吐血下血皆如爛肝者用苦瓠一枚水二升煮取一升服之吐即愈一方用醋煮消服之神效苦瓠有毒當慎之
