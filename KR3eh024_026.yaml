body:
  text: 卷二十六燥證論原病式曰諸澀枯涸幹徑皴揭澀者物濕則滑澤干則澀滯枯不榮王也涸無水液也干不滋潤也徑不柔和也皴揭皮膚啓裂也皆屬於燥手陽明燥金乃肺與大腸之氣也蓋風熱火同陽也寒燥濕同陰也然燥金雖屬秋陰而異乎寒濕反同其風熱也故火熱勝則金衰而風生風熱勝則火竭而為燥也凡人風病多因熱甚而風燥者為其兼化以熱為其主也蓋肝主於筋而風氣自甚又燥熱加之則筋大燥也燥金主於收斂其脈緊澀故為病徑強緊急而口噤也或病燥熱太甚而脾胃乾涸成消渴者或風熱燥甚怫鬱在表而裡氣平者或善伸數欠筋脈拘急或時惡寒筋惕而搐又或風熱燥並而鬱甚於里故煩滿而為祕結也及風癇之發作者由熱甚而風燥為其兼化涎溢胸膈燥鑠而瘛瘲昏冒僵仆也凡此諸證皆由熱甚而生風燥病各有異者由風熱燥各微甚不等故也所謂中風筋緩者因其風熱甚濕而為燥之甚也然筋緩不收而痿痹故諸膹郁病痿皆屬於肺金乃燥之化也如秋深燥甚則草木萎落而不收病之象也是以掌得血而能持足得血而能步夫燥之為病者血以衰少不能榮養百骸故若是也學者不可不知丹溪曰皮膚皴揭折裂血出大痛或肌膚燥癢者火燥肺金燥之甚也宜以四物湯去川芎加麥門冬人參天花粉黃柏五味子之類治之李氏曰燥有內外外因時值陽明燥令久晴不雨黃埃蔽空令人狂惑皮膚乾枯屑起內因七情火磨或大病吐利亡津或金石燥血或房勞竭精或飲飽勞役損胃或炙煿酒醬厚味皆能偏助火邪消鑠血液六氣風熱火屬陽寒燥濕屬陰但燥雖屬秋陰而反同風熱火化蓋火盛則金被熱傷木無以制而生風風勝濕熱耗津入肝則筋脈徑強緊急口噤發為風癇或手足癱瘓偏枯或十指反而莫能搔癢或為雀目內障入心則昏冒僵仆語言蹇澀入脾則膈滿不食或善飢而瘦或傷積變為水腫鼓脹入肺則毛焦乾脪膹郁咳嗽入腎則津液竭煩渴及骨蒸祕結總皆肺金所主陽明與肺為表裡也表病皮膚皴揭四物湯去川芎合生脈散加知母黃柏天花粉或單天門冬膏如筋攣不能運動者大秦艽湯里病消渴活血潤燥生津飲大抵表裡俱宜甘寒潤劑忌辛香動火及一切發汗之藥經曰燥者潤之養血之謂也蓋燥則血澀而氣液為之凝滯潤則血旺而氣液為之宣通由內神茂而後外色澤矣然積液固能生氣積氣亦能生液氣虛者常用瓊玉膏津虛者單五味子膏血虛者地黃膏凡病遇天燥天燥即久晴不雨也亦宜量加此等潤劑統旨曰燥之為病有風燥有熱燥緣風能勝濕熱能耗液也又有陰血虛津不足而為燥其證或為消渴或為祕結或為筋脈攣急或為肌膚乾澀大法辛以潤之養血滋陰降火則燥病自除身自安矣蔭按葉氏曰燥是陽明之化雖因於風熱所成然究其源多本於血虛津液不足所致何也陰血虛則不能榮潤百體津液衰則無以滋養三焦由是熱邪拂鬱而燥變多端故燥干外皮膚皴揭燥於內精血枯涸燥於上咽鼻焦乾燥於下便溺祕結治之者外以滋益之內以培養之在上清解之在下通潤之務使水液自生而燥不容於不退矣脈法脈緊而澀或浮而弦或芤而虛治方加減四物湯治燥證皮膚皴揭當歸白芍生地黃人參麥冬五味子天花粉知母黃柏上銼水煎服黃耆湯治心中煩躁不生津液不思飲食黃耆熟地白芍五味子麥冬去心各三兩白茯苓一兩人參天冬去心甘草炙各五錢上㕮咀每服三錢加薑棗烏梅同煎食後服清涼飲子治上焦積熱口舌咽鼻乾燥黃芩黃連各二錢當歸芍藥元參薄荷各一錢五分甘草一錢上銼水煎服如大便祕結加大黃二錢和血益氣湯治口乾舌乾小便數舌上赤色此藥生津液除乾燥生肌肉升麻黃柏酒炒各一錢黃連酒炒八分生地黃酒洗七分石膏六分知母酒洗防己酒洗羌活各五分柴胡麻黃根生甘草炙甘草各三分杏仁桃仁各六個紅花少許上㕮咀作一服水煎服忌熱濕面酒醋等物滋燥養榮湯治皮膚皴揭筋燥爪干當歸酒洗二錢生地黃熟地黃白芍藥秦艽黃芩各一錢半防風一錢甘草五分上作一服水煎服生血潤膚飲治體瘦血少秋深燥金用事皮膚坼裂手足枯燥搔之血出痛楚當歸生地黃熟地黃黃耆各一錢天門冬一錢半麥門冬去心一錢五味子九粒片芩酒洗五分瓜蔞仁五分桃仁泥五分酒紅花一分升麻二分上銼水煎服如大便燥結加麻仁郁李仁各一錢當歸潤燥湯治燥渴大便祕澀乾燥結硬兼喜溫飲陰頭退縮舌燥口乾眼澀難開等證升麻一錢半防風當歸荊芥穗知母石膏黃柏桃仁泥麻子仁各一錢熟地黃生甘草炙甘草各三分柴胡七分細辛一分杏仁六個紅花少許小椒三個上㕮咀都作一服水煎熱服食遠忌辛熱物導滯通幽湯治大便燥澀當歸升麻桃仁各一錢二分大黃一錢半生地黃熟地黃各一錢紅花七分炙甘草五分上銼水二鍾煎七分調檳榔末五分食前服一方有麻子仁一錢名潤腸湯潤腸丸能潤燥和血治大便不通當歸梢生地黃枳殼麻仁桃仁各等分上為細末煉蜜丸服大補地黃丸治精血枯涸燥熱熟地黃酒蒸黃柏鹽水炒知母鹽水炒各四兩當歸山藥枸杞子各三兩生地黃二兩半白芍藥山茱萸去核各二兩肉蓯蓉酒浸元參各一兩半上為細末煉蜜丸如桐子大每服七八十丸空心淡鹽湯下瓊脂膏治血虛皮膚枯燥及消渴等證生地黃二十斤洗淨搗取自然汁去渣鹿角膠一斤白沙蜜二斤煎一二沸掠去面上沫真酥油一斤生薑二兩搗取真汁上先以文武火熬地黃汁數沸以絹濾取淨汁又煎二十沸下鹿角膠次下酥油及蜜同煎良久候稠如餳以瓷器收貯每服一二匙空心溫酒調下瓊玉膏治血虛皮膚枯燥及肺熱咳嗽甚者生地黃四斤白沙蜜二斤人參六兩白茯苓十三兩上以地黃搗汁和蜜以人參茯苓為末拌入蜜汁用瓷瓶貯以紙箬包其口用桑柴火煮三晝夜取出再換蠟紙包封十數重沉井底一晝夜
