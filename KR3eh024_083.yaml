body:
  text: 卷八十三癘風論虞氏曰經云風之傷人也或為寒熱或為熱中或為寒中或為癘風癘者有榮氣熱腐其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風又曰風氣與太陽俱入行諸脈腧散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所礙而不行故其肉有不仁也又曰骨節重鬚眉墜名曰大風刺肌肉為故汗出百日大風即癘也其淺者偏腠理故當刺肌肉為故所以泄衛氣之怫熱風從汗散刺骨髓汗出百日刺深者須取骨髓所以泄榮氣之怫熱凡二百日鬚眉生而止針靈樞曰癘風者數刺其腫上已刺以鋭針針其處按出其惡氣腫盡乃止癘風當常刺其腫上已刺之後又必數以鋭針針其患處仍用手按出其惡毒之氣必待腫盡乃可止針蓋毒深氣甚非多刺不可常食方食無食他食食得其法謂之方食無食他食忌動風發毒等物也今觀經之論治分榮衛者如此若古方雖多但混瀉其風熱於榮衛又無先後之分至東垣丹溪始分之活法機要云先樺皮散從少至多服五七日灸承漿穴七壯灸瘡愈再灸再愈三灸之後服二聖散泄熱祛血之風邪戒房室三年病愈此先治其衛後治其榮也試效方治段庫使用補氣瀉榮湯此治榮多於治衛也宋洞虛云疾風有五種即是青黃赤白黑五風其風合五臟五風生五蟲蟲亦分五色蟲食肝眉落食肺鼻崩食脾聲啞食心足底穿膝虛腫食腎耳鳴啾啾耳沿生瘡或痛如針刺倘若食人皮則皮膚頑痹食人筋肢節墮落五風合五臟蟲生致多入於骨髓往來無礙壞於人身名曰疾風疾風者是癘風之根本也自頭面來為順風自兩足起為逆風多因感寒熱與穢濁雜氣而成治法先以雷公散下之以稀粥養半月勿妄動作勞以醉仙散中間或吐或利不必怕怯但腮喉頭面腫吞食不得入旋出惡水或齒縫出臭水血絲或言不得或悶若死難以飲食只稀粥以管吹入或一旬或半月一月面漸白而安重者又與換肌散丹溪云大風病是受天地間殺物之風古人謂之癘風者以其酷烈暴悍可畏耳人得之分在上在下氣受之則在上血受之則在下氣血俱受則在上覆在下然皆不外乎陽明一經陽明胃與大腸也無物不受治者須看其疙瘩與瘡上體先見而多者在上也下體先見而多者在下也在上者以醉仙散取臭涎惡血於齒縫中出在下者以通天再造散取惡物陳蟲於穀道中出後用通聖散調之可用三稜針於委中出血倘若氣血俱受上下同得者甚重自非醫者神手病者鐵心罕能免此夫從上或從下以漸而來者皆可治之證人見其病勢之緩多忽之雖按此法施治病已全愈若不絶味斷色皆不免再發而終於不救也豫曾治五人矣其不死者惟一婦人因貧甚且寡無物可吃耳余皆三兩年後再發孫真人嘗云吾嘗治四五百人終無一人免於死非孫真人不能治蓋無一人能守禁忌耳其婦於本病外又是百餘帖加減四物湯半年之上月經行十分安愈醉仙散須量人大小虛實加減與之證候重而急者須先以再造散下之候補養得還復與此藥須斷鹽醬醋諸般魚腥椒料水果煨燒炙煿及茄子等物只可淡果煮熟時菜並烏梢蛇菜花蛇用淡酒煮熟食之以助藥力外科精要為諸瘡立法而不及癘風蓋風為百病之長以其殘害膚體去死為近一有染此鮮能免者比之瘡瘍治法為難乃不言及夫八方之風起應其時則生物違其時則殺物人之稟受有殺氣者則感而受之如持虛受物後有因起居飲食男女漸成鬱氣二氣積於厥躬脾先受之為濕病濕積之久火氣出焉火氣滋蔓氣濁血汙一云血熱凝結其氣不清化生諸蟲以次傳歷臟腑必死之病而有可生之理其始病者胃氣微傷脾主肌肉流行甚緩傳變以漸或可藉醫藥之功而免謂之必死者非惟醫不知藥悉是不能禁欲可哀也近見粗工用藥佐以大楓子油不知此藥性熱有燥痰之功而傷血至有病將愈而先失明者時珍曰大楓油治瘡有殺蟲劫毒之功用之外塗其功甚捷若內服須炮製如黑膏蔭按劉宗厚曰癘風古方謂之大風惡疾以其瘡痍荼毒膿汁淋瀝眉睫墮落手足指脫頑痹痛癢鼻塌眼爛齒豁唇揭病勢之可畏耳非專以房勞嗜欲飲食積毒之所致何為遽至於是故丹溪亦謂殺物之毒風也蓋其風毒之傷與夫內毒所致皆安然而知之及其病證顯露方始歸咎於此其於外受之風內積之毒豈可得而分治之也故內經刺肌肉刺骨髓以泄榮衛之怫熱靈樞以鋭針刺腫上按出惡氣惡血子和用汗吐下出血之法河間用疏風泄熱之劑俱不分病之所因隨其病之所在以調之也至於丹溪之論雖皆前人之法亦可謂深得病情而善用其法者矣學者宜細觀之若夫用藥之外守禁忌謹調養清心寡欲恬淡內觀又在乎人而不在乎醫也蔭又按方氏曰大風證所因不一或因色欲當風或因醉臥濕地或乘熱脫衣或汗出入水或空心飢餓山行感山嵐瘴氣或勞役奔走途中冒寒雨陰露皆因內傷形體不知避忌外感風濕毒氣入於皮毛血脈肌肉筋骨之間當時罔覺失於驅散停積既久以致榮衛不行內外熏蒸內則生蟲外則生瘡而臟腑經絡皆受患矣古人謂大風疾三因五死三因者一曰風毒二曰濕毒三曰傳染五死者一曰皮死麻木不仁二曰脈死血潰成膿三曰肉死割切不痛四曰筋死手足緩縱五曰骨死鼻梁崩塌與夫眉落眼昏唇翻聲噎甚可畏也所以然者蓋由邪正交攻氣血沸騰而濕痰死血充滿於經絡之中故生蟲生瘡痛癢麻木也治療大法內通臟腑外發經絡而蟲瘡痛癢麻木自出矣亦須首尾斷酒戒色忌食發風動氣葷腥鹽醬炙煿生冷之物清心寡欲方保無虞也薛氏曰大抵此證多由勞傷氣血腠理不密或醉後房勞沐浴或登山涉水外邪所乘衛氣相搏濕熱相去聲火血隨火化而致故淮揚閩廣間多患之近代先哲云感天地肅殺惡氣所致其上體先見或多者毒在上也下體先見或多者毒在下也蓋氣分受邪則上多血分受邪則下多氣血俱受則上下齊見若眉毛先落者毒在肺面發紫泡者毒在肝腳底先痛或穿者毒在腎遍身如癬者毒在脾目先損者毒在心此五臟受病之重者也又一曰皮死麻木不仁二曰肉死針刺不痛三曰血死潰爛四曰筋死指脫五曰骨死鼻柱壞此五臟受病之不可治者也若聲噎目盲尤為難治又治法當辨本證兼證變證類證陰陽虛實而斟酌焉若妄投燥熱之劑膿水淋瀝則肝血愈燥風熱愈熾腎水愈枯相火愈旺反致敗證矣癘瘍所患非止一臟然其氣血無有弗傷兼證無有弗雜況積歲而發現於外須分經絡之上下病勢之虛實不可概施攻毒之藥當先助胃壯氣使根本堅固而後治其瘡可也經云真氣奪則虛邪氣勝則實凡云病屬有餘者當察其元氣不足癘瘍當知有變有類之不同而治法有汗有下有砭刺攻補之不一蓋兼證當審輕重變證當察先後類證當詳真僞而汗下砭刺攻補之法又當量其人之虛實究其病之源委而施治焉蓋虛者形氣虛也實者病氣實而形氣則虛也癘瘍砭刺之法張子和謂一汗抵千針蓋以砭血不如發汗之周遍也然發汗即出血出血即發汗二者一律若惡血凝滯在肌表經絡者宜刺宜汗取委中出血則效若惡毒蘊結於臟腑非蕩滌其內則不能痊若毒在外者非砭刺遍身患處及兩臂腿腕兩手足指縫各出血其毒必不能散若表裡俱受毒者非外砭內泄其毒決不能退若上體患多宜用醉仙散取其內蓄惡血於齒縫中出及刺手指縫並臂腕以去肌表毒血下體患多宜用再造散令惡血陳蟲於穀道中出仍針足指縫並腿腕隔一二日更刺之以血赤為度如有寒濕頭疼等證當大補氣血為主癘瘍服輕粉之劑若腹痛去後兼有膿穢之物不可用藥止之若口舌腫痛穢水時流作渴發熱喜冷此為上焦熱毒宜用瀉黃散若寒熱往來宜用小柴胡湯加知母若口齒縫出血發熱而大便祕結此為熱毒內淫宜用黃連解毒湯若大便調和用局方犀角地黃湯若穢水雖盡口舌不愈或發熱作渴而不飲冷此為虛熱也宜用七味白朮散癘瘍手足腿臂或各指蜷攣者由陰火熾盛虧損氣血當用加味逍遙散加生地黃及換肌散兼服癘瘍生蟲者五方風邪翕合相火制金金衰不能平木木盛所化內食五臟而證見於外也宜用升麻湯送瀉青丸或樺皮散以清肺肝之邪外灸承漿以疏陽明任脈則風熱息而蟲不生矣肝經虛熱者佐以加味逍遙散六味地黃丸又癘瘍久而不愈者有不慎起居飲食內火妄動者有臟腑傷損氣血疲乏者有用攻伐之藥氣愈虧者有不分兼變相雜用藥失宜者有病人諱疾忌醫者癘瘍愈而復發有不戒厚味內熱傷脾者有不戒房勞大動傷腎者有不戒七情血氣傷損者有餘毒未盡兼證俱動者有氣虛六淫外乘者古人云此證百無一生正謂此耳李氏曰癩即內經癘風受天地間肅殺風氣酷烈暴悍最為可畏一因風毒或汗出解衣入水或酒後當風二因濕毒或坐臥濕地或冒雨露三因傳染然未必皆由外也內傷飲食熱毒過甚大寒大熱房勞穢汙以致火動血熱更加外感風寒冷濕而發初起身上虛癢或起白屑紫雲如癜風然癜音殿瘢風斑片也或發紫泡疙瘩流膿上先見者氣分受病上體必多下先見者血分受病下體必多上下俱見者氣血俱病從上而下者為順風從下而上者為逆風但從上從下以漸來者可治頓發者難愈治失其法以致皮死麻木不仁脈死血潰成膿肉死割切不痛筋死手足緩縱骨死鼻梁崩塌與夫眉落眼昏唇翻聲噎甚則蝕傷眼目腐爛玉莖攣蜷肢體病至於此天刑難解胃與大腸無物不受脾主肌肉肺主皮毛瘡痂雖見於皮肉而熱毒必歸於腸胃故發必先治陽明初起宜防風通聖散在上用麻黃以去外毒在下用硝黃以去內毒上下俱見者用輕粉防風通聖散以解表攻裡三五日後即服醉仙散以吐惡涎服後又服防風通聖散去硝黃麻黃多服久服待胃氣稍定用再造散以下其蟲又有宜先下蟲而後吐涎者吐下後仍以防風通聖散量加參耆熟地以固氣血或脾胃弱者白朮當倍用蟲因火盛氣血沸騰充滿經絡外瘡延蔓內蟲攻注蝕心足底穿蝕脾聲噎蝕肺鼻崩蝕腎耳鳴如雷宜先服瀉青丸以瀉肝火次隨證救治虛癢者四物湯加酒芩調浮萍末癢甚加荊芥蟬退瘙癢皮皴白屑者白花蛇丸眉毛落者三蛇丹或柏葉煎眉脫鼻崩者換肌散補氣瀉榮湯蝕眼者蘆薈丸肢節廢者蠲痹散通用凌霄花散胡麻散加味苦參丸大楓丸換骨丸大麻風丸紫雲風丸活神丹腎氣丸四聖不老丹八物湯外治摩風膏浴癩方發落不生者先用生薑擦三次後用半夏為末麻油調擦又曰血風瘡乃三陰經風熱鬱火血燥所致初發疙瘩如丹瘙癢不常抓破成瘡膿水淋瀝內證晡熱盜汗惡寒少食體倦所以不敢妄用風藥大概肝風血燥寒熱作痛者當歸飲加柴胡山梔痛癢寒熱者小柴胡湯加山梔黃連夜熱譫語者小柴胡湯加生地黃肝脾鬱火食少寒熱者八味逍遙散脾虛晡熱盜汗不寐者歸脾湯加山梔熟地黃腎虛有熱作渴咳痰者腎氣丸通用遍身者四物湯加浮萍黃芩等分甚者紫雲風丸瘓骨丸三蛇丹兩足痛癢者當歸拈痛湯如因飲酒後遍身癢如風瘡抓至出血又痛者用蟬退薄荷等分為末每服二錢水酒調服凡身發癢者通用外治摩風膏馬齒莧膏癘風諸藥不效千金耆婆萬病丸極有神驗脈法脈兩寸浮而緊或浮而洪陽脈浮弦陰脈實大脈浮緩者易治洪大而數或沉實者難愈脈沉而病在上脈浮而病在下及無汗者皆為不治之證也治癘風惡癩方醉仙散治大風疾遍身癮疹瘙癢麻木胡麻仁牛蒡子蔓荊子枸杞子各一兩同炒黑色白蒺藜苦參瓜蔞根防風各半兩上為細末每一兩五錢入輕粉二錢拌勻每服一錢茶清調下晨午夕各一服候五七日先於牙縫內出臭涎水渾身覺疼昏悶如醉利下臭物為度仍量人之大小虛實用之病重者須先以再造散下之候元氣將復方用此藥禁忌一切須照前論再造散治大風惡疾鬱金五錢生用錦紋大黃一兩皂角刺獨生黑大者一兩半白牽牛頭末六錢半生半炒上為末每服五錢日未出時面東用無灰酒冷調服當日必泄出蟲如蟲黑色乃是多年赤色乃是近者數日後又進一服直待無蟲乃絶根矣終身不可食牛馬驢騾等肉大忌房事犯者必不救加減通聖散大瀉惡毒穢積又用三稜針看肉黑處及委中紫脈刺出死血不可令出太過恐損真氣後服神仙紫花丸防風去蘆川芎荊芥穗桔梗枳殼麩炒去穰石膏柴胡黃連羌活各五錢連翹白芍藥當歸酒洗浸麻黃去節根湯泡薄荷梔子仁黃芩甘草滑石黃柏各三錢生地黃酒洗熟地黃酒洗各三錢半錦紋大黃六錢芒硝一兩皂角刺一兩獨生者去尖上銼分作八服每服用水一碗半煎至一碗空心服日進二服五六日後又進二服待補養後又行二次然後服丸藥寶鑑換肌散治大風年深不愈以致眉毛脫落鼻梁崩壞服此藥不逾月取效如神白花蛇黑花蛇並酒浸一宿地龍去土各三兩當歸細辛白芷天麻蔓荊子威靈仙荊芥穗甘菊花苦參紫參沙參木賊不灰木川芎白蒺藜天門冬去心赤芍藥定風草何首烏不犯鐵石菖蒲胡麻子草烏頭炮去皮臍蒼朮米泔浸炒甘草木鱉各一兩上為細末每服五錢溫酒調下食後酒多尤妙愈風丹一名三蛇丹治癘疾手足麻木毛落眉脫遍身瘡疹皮膚瘙癢爬之成瘡及一切疥癬風疾苦參一斤取頭末細者四兩土花蛇一條酒浸三日取淨肉曬乾烏梢蛇白花蛇並同上制上為末以皂角一斤寸許銼無灰酒浸一宿去酒以新水一碗捼取濃汁去渣銀石器內熬膏和末丸如桐子大每服六七十丸煎通聖散吞下粥飯壓之日三次三日浴一大汗出為應再三日又浴取汗三浴乃安浴法用五枝湯並浮萍湯四聖保命丹大黃半兩黃柏八兩苦參荊芥各四兩上為末煉蜜和勻分作一百二十丸每服一丸溫酒送下食遠日三服忌肉醬一方用蝦蟆一個燒灰祛風散大蠶沙五升先篩淨水淘三過控干東門蠍虎一條焙乾用白麵四斤拌蠶沙為絡囊曬乾上為末每服一二合熬柏葉湯調服食前日三服黃精丸蒼耳葉紫背浮萍大力子各等分烏蛇肉中半酒浸去皮骨黃精焙前三味生搗汁和二味研細焙乾上為末神麯糊丸如桐子大每服五七十丸溫酒下一方加炒黃柏生苄甘草節生苄即生地又方蒼耳葉浮萍鼠黏子烏蛇肉各等分上用豆淋酒炒為末每服一二錢豆淋酒調下一方治麻風脈大而虛者苦參七錢半蒼耳牛蒡子酒蒸黃柏各二兩黃精浮萍各一兩上為末用烏蛇肉酒煮如無蛇以烏鯉魚亦可糊丸服之候脈實再用通天造散取蟲加味苦參丸治大風瘡及諸風赤白癜風苦參一斤防風荊芥蒼耳子胡麻子半生半炒皂角刺各十兩蔓荊子牛蒡子黃荊子枸杞子何首烏禹餘糧蛇床子各三兩香白芷一兩半上為細末用皂角搗爛熬膏入前藥和為丸如桐子大每服五十丸茶酒任下一方治大風肌頑麻木皮膚瘙癢遍身疥癩癮疥面上遊風或如蟲行紫白癜風或賊風攻疰腿腳生瘡者川烏白芷苦參胡麻炒荊芥防風各三兩何首烏大楓子去殼威靈仙地龍各二兩蔓荊子一兩半當歸川芎獨活羌活白蒺藜赤芍藥白附子山梔子各一兩上為細末先取烏蛇一條用好酒浸煮熟去骨取肉曬乾或焙同為末酒糊丸如桐子大每服四十丸茶湯下一方威靈仙何首烏地松即皺皮草防風蔓荊子荊芥車前子細辛牛蒡子豬牙皂角當歸蒼耳子天麻苦參羌活獨活麻黃澤蘭川芎甘草各等分上為末酒糊丸如桐子大每服四十丸茶酒任下神仙紫花丸治癘風及諸般惡瘡風瘡其效如神但要藥真無有不效者輕者一料可愈重者二三料除根白花蛇一具出蘄黃州黑質白皎龍頭虎口背上二十四個方勝花尾尖有一佛指甲新鮮者佳蛙腐者不堪用去頭尾各四五寸並一個為率連皮骨用一兩半何首烏荊芥穗威靈仙各四錢麻黃連根節胡麻子各一錢蛇床子二錢上六味細切同蛇用無灰酒一大碗浸一宿去蛇床子通曬乾仍還原酒內再浸再曬酒盡為度待曬極干共為細末另包木香沉香定風草即天麻各二錢半麝香一錢半鼻塞聲重者倍之乳香沒藥各一錢明雄黃辰砂大塊者各五分胡天麻豬牙皂角各五錢當歸七錢半肉豆蔻一枚煨人參還瞳子即草決明各一兩上麝至辰砂五味各另研極細不見火其餘草木味亦另研細羅過連前五味和勻另包防風去蘆羌活甘草細辛川芎獨活蒼朮米泔水浸一宿枇杷葉去筋毛焙乾白芍藥白蒺藜金銀花五加皮香白芷苦參各五錢胡麻子白附子酒泔浸炮麻黃川牛膝草烏頭米泔浸炮川烏米泔浸泡石菖蒲上為細末另包總合法用大楓子三斤新鮮者佳髮油黃色者不堪用去殼以瓷罐一個盛之少入無灰酒以皮紙竹箬重重包口勿令泄氣頓滾湯中勿令溢罐口外一物蓋鍋口密封固文武火蒸候黑爛為度杵無渣滓成油分作三分每一分入第一號藥八錢重一分入第二號藥六錢重一分入第三號藥一兩五錢重和勻加糯米飯搗極膠黏丸如梧桐子大曬乾勿見火每服二十丸漸加至五六十丸雞鳴時午時臨臥時各一服清茶送下忌房勞鹹酸酒醋糟醃豬羊雞馬驢肉魚腥煎炒水果五辛姜椒大料辛辣熱物蕎麥緑豆之類若不忌口斷欲則藥無功雖愈再發其餘肉味病愈後一年可食但豬羊雞肉終身用忌此法乃治癩之神方也不可輕忽大楓丸治疥癩大楓子全蠍川芎各一兩半荊芥烏蛇肉苦參防風羌活各二兩獨活一兩當歸鬚大黃各五錢白殭蠶二錢半蟬脫一錢一方無烏蛇大黃余各二兩上如法修製為細末用白米飯搗和為丸如桐子大每服五十丸茶清送下忌咸醬辛辣及一切發物房事白花蛇膏治風疾癩病遍身生瘡白花蛇四兩酒浸天麻七錢半荊芥薄荷各二錢半上為細末用好酒二升蜜四兩銀石器內熬成膏每服一酒盞溫服日三次煎餅壓下急於暖處汗出效消風散第一日服香白芷全蠍人參各一兩上為細末每服二錢先一日午間宜吃粥忌生薑胡椒蔥蒜一切熱性之物晚間不可飲食次日空心溫酒調下覺身漸潰燥為妙追風散第二日服瀉血追蟲大黃錦紋者六兩鬱金小者一兩八錢皂角刺一兩半上為末初服六錢或七錢大楓油一錢半淨朴硝少許入內好酒一碗調化五更空心溫服直待辰時又如前調藥一碗入熟蜜少許勿令患人知先以水與患人盥漱淨然後服藥必以蜜解口忌人與患者同坐臥良久腹中疼為妙後瀉十數次以薄粥補之煩老弱者難治五十歲以下者可治精壯者十日三服謂初一日服消風散初二日服追風散初三日服磨風丸損弱者十日內一服稍痊如壯健人十日內三服每月後二十日一服須要記其日數磨風丸第三日服日進二次川當歸羌活獨活川芎天麻細辛防風荊芥威靈仙麻黃何首烏石荊子牛蒡子車前子皺皮草即地松蒼耳草各一兩上皆不見火曬乾為細末酒煮麵糊為丸如桐子大每服三十丸食前溫酒下服後煎藥熏洗凌霄花散治癘風神效蟬殼地龍炒殭蠶全蠍各七個炒凌霄花半兩上為末每服二錢熱酒調下無時於浴室中常蹲湯中一時許服藥神效樺皮散治肺臟風毒遍身瘡疥又癮疹瘙癢成瘡又治面上風刺及粉刺樺皮燒存性枳殼燒存性各四兩荊芥穗甘草炙半兩杏仁去皮尖另研各二兩上為細末每服二錢食後溫酒調下日進三服升麻湯治諸風熱癩肌肉極熱體上如鼠走口反縱皮毛變皆治升麻三西茯神人參防風犀角鎊羚羊角羌活各一兩肉桂半兩上為粗末每服五錢加生薑三片入竹瀝少許煎至八分溫服二聖散輕者疏風和血以此治之大黃半兩皂角刺三錢燒灰上將皂角刺一二個燒灰研細用大黃半兩煎湯調下二錢早服樺皮散中以升麻下瀉青丸晚服二聖散此為緩治柏葉湯用東南枝上柏葉一稱水一桶沸去渣甕盛起旋熬蠶沙調服初服苦澀三五日後甜十日四肢沉重便赤白痢一月後發出瘡疙瘩破用烏龍散擦之烏龍散烏龍尾即倒懸灰二錢烏雞子皮煅上二味為末用柏油調擦於破瘡上一方治大風眼昏不辨人物眉須自落鼻梁崩塌肌膚生瘡如癬用皂角刺一二斤蒸曬為末食後煎大黃湯調服一錢服一旬後眉發再生肌膚光潤眼目復明一方皂角刺九蒸九曬為末酒調下二錢加味防風通聖散治大風毛脫落肌膚拆裂防風通聖散加苦參天麻蟬脫各等分上銼水煎早晚各一服至百帖必愈忌房事鹽醬葷腥生冷油膩之物除濕消毒飲治濕毒癘風白朮二錢蒼朮酒浸一宿黃連茯苓羌活防風澤瀉苦參各一錢龍膽草七分甘草六分上銼水煎服加味清胃散治熱毒在表以此發散之升麻白芷防風白芍藥乾葛甘草當歸川芎羌活麻黃紫浮萍木賊各等分上銼每服五七錢水煎服透經解攣湯治風熱筋攣骨痛川山甲三錢炮白芷一錢羌活防風荊芥天麻當歸紅花蘇木蟬殼去土甘草各七分連翹川芎各五分上銼水酒各半煎服秦艽地黃湯治風熱血燥筋骨作痛秦艽生地黃當歸川芎羌活防風荊芥白芷升麻白芍藥大力子蒸蔓荊子甘草各一錢上銼水煎服羌活當歸散治風毒血熱頭面生瘡或赤腫或成塊或癮疹瘙癢膿水淋漓羌活當歸川芎升麻白芷防風荊芥連翹鼠黏子蒸黃連酒炒黃芩酒浸炒甘草各一錢上銼酒拌曬乾水煎服羌活白芷散治風熱血燥手掌皺裂或頭面生瘡或遍身腫塊或膿水淋漓羌活白芷軟柴胡荊芥蔓荊子防風豬牙皂角黃芩黃連酒炒甘草各一錢上銼水煎服四生散治腎臟風耳鳴目癢鼻赤齒浮或婦女血風瘡白附子白蒺藜獨活黃耆各等分上為末每服二錢用豬腰子劈開入藥濕紙裹煨熟細嚼鹽湯下風癬酒下為丸亦可升麻湯治風熱身如蟲行或唇反縱裂升麻七錢半人參茯苓防風羌活官桂犀角鎊各二錢上銼每服四錢水煎下瀉青丸當歸飲治血熱癮疹癢痛或膿水淋漓發熱等證當歸白芍藥川芎生地黃防風白蒺藜荊芥各一錢五分半黃耆炒甘草何首烏各一錢上銼水煎服涼血當歸飲治血熱癘風當歸一錢半川芎生地黃芍藥黃芩黃連犀角鎊牡丹皮防風荊芥各一錢甘草七分上銼水煎食遠服祛風養榮湯治疥癩經曰脈風成癘即癩也黃耆枳殼麩炒防風當歸酒洗芍藥生地黃姜酒炒熟地黃砂仁沉香炒地骨皮枸杞子元參各一錢甘草六分上銼水煎食後服濕勝者加白朮茯苓各二錢補氣瀉榮湯治癘風滿面連頸極癢眉毛脫落榮衛府熱者升麻連翹各六分蘇木當歸黃連黃耆全蠍地龍各三分生地黃姜酒炒黃芩各四錢人參二分甘草一分半桃仁三個去皮尖炒桔梗五分麝香少分胡桐淚一分白豆蔻二分虻蟲去翅足炒水蛭炒令煙盡各三個上除連翹另銼胡桐淚白豆蔻二味為細末麝香虻蟲水蛭三味另研余銼如麻豆大都作一服用水二大盞入酒三四匙煎至一盞半入連翹再煎去渣後入白豆蔻等五味再上火煎一二沸早飯後稍熱服忌酒濕面及生冷硬物加味四物湯治麻風當歸川芎芍藥熟地黃砂仁沉香炒羌活防風陳皮甘草上銼水煎服天麻風丸治大麻風初起遍身瘡點五色不知痛癢手足麻木等證苦參三斤當歸皂角刺燒存性各半斤羌活獨活白芷白蘞白蒺藜天花粉何首烏各四兩上為細末另用皂角五斤切細溫酒浸五日去渣用砂鍋慢火熬成膏和藥為丸如桐子大每服百十丸空心酒下紫雲風丸治紫雲血風蓋因血分受濕遍身發紫血疱痛癢有蟲若白水疱則為天疱瘡乃此類之輕者何首烏四兩五加皮殭蠶苦參當歸各二兩全蠍一兩半牛蒡子羌活獨活白芷細辛生地黃姜酒炒漢防己黃連芍藥蟬退防風荊芥蒼朮各一兩上為末煉蜜或酒糊丸如桐子大每服七十丸好酒下或米湯亦可日進三服東坡四神丹一名活神丹治大風神效血虛者可常服羌活元參當歸熟地黃各等分上為末煉蜜丸如桐子大每服五七十丸空心酒下蠲痹散治癩風肢節蜷攣宜此養血祛風羌活獨活皂角刺白芷各五分當歸赤芍藥各一錢土茯苓五錢上銼水煎服白花蛇丸治頭面手足白屑瘡癢皮膚皺燥白花蛇一條酒浸當歸二兩川芎白芍藥生地黃姜酒炒防風荊芥黃芩酒炒連翹胡麻子何首烏升麻羌活桔梗各一兩上為末將浸蛇酒和水打糊丸如桐子大每服七十丸茶清下換骨丸治一切疥癬風疾苦參浮萍各一兩半大黃槐花白芷川芎各一兩二錢蒼朮一兩乳香沒藥沉香木香各三錢麝香五分上為末用麻黃五斤煎膏丸如彈子大每服一丸臨臥溫酒化下忌風二三日一方去蒼麝加當歸防風甘松白花蛇尤妙易老祛風丸治疥癩風瘡黃耆枳殼炒防風芍藥生地黃熟地黃二味酒拌杵膏枸杞子地骨皮甘草上各另為末入二膏加煉蜜丸如桐子大每服七八十丸白湯下一方荊芥穗大黃梔子鬱金地黃杜仲防風羌活獨活白蒺藜各等分上為細末以大楓子油入熟蜜丸如桐子大每服四五十丸茶清送下日三次須守戒三五年養心禁欲蒼耳丸用蒼耳為末以大楓子油丸如桐子大每服三四十丸荊芥清送下茶清亦可一方煉蜜丸苦參酒大能消一切風熱瘡毒理脾補心養氣為瘡科聖藥苦參半斤洗淨銼碎絹袋盛好酒二斗冬春漬一月秋夏十日每服一合日三次常與不絶覺痹即安酒盡以渣曬為末酒糊丸尤妙丹溪曰陶隱居以酒漬飲治惡瘡久服輕身日華子以為殺蟲本草除伏熱養肝膽氣豫嘗以蒼耳葉為君以此為佐酒煮烏蛇為丸如無烏蛇以烏蠡魚代之丸如桐子大每五六十粒加至七八十粒熱茶清吞一二月而安若入紫萍尤捷紫萍多蛭須寒月于山池沼取之淨洗泥略蒸透乾用蒼耳魚用蒼耳草於五月五日或六月六日五更時帶露採搗絞取汁熬成膏作錠子取一斤半重鯉魚一個剖開不去肚腸入藥一錠在內以線縫之用酒二碗慢火煮乾為度令患人吃盡魚不過四五個即愈忌鹽百日花蛇酒用白花蛇一條先蒸糯米二斗缸底先用酒麴次將蛇以絹袋盛之頓於曲上然後以糯米飯和勻頓於蛇上用紙封缸口三七日開取酒將蛇去皮骨焙乾為末每服溫酒一盞調蛇末少許服之仍以酒腳並糟做餅食之一方治手指攣曲節間痛漸至斬落萆麻子去皮黃連銼如豆大各一兩上入小瓶內用水一升浸之水少漸添春夏三日秋冬五日取萆麻拍破平旦時面東以浸藥水服一粒漸加至四五粒微利不妨忌豬肉茹淡屢得神效柏葉丸治大風瘡令眉發再生用柏葉九蒸九曬為末煉蜜丸如桐子大日三服夜一服白湯下每服五六十丸百日後生眉發外治方五枝湯用桃柳桑槐楮五般枝濃煎湯道大缸內浴洗一日坐露頸俟湯如油安矣浮萍湯治惡疾遍身生瘡濃煎浮萍湯浴浸半日大效此神方也如聖散蔓荊子苦參元參紫參厚朴荊芥陳皮沙參麻黃去節各一兩防風白芷威靈仙上為細末每服五錢桃柳枝各一把水五升煎臨臥熱洗忌五辛又方大黃黃芩雄黃各三兩上為末用樟樹葉濃煎湯入藥蒸洗洗藥地骨皮荊芥苦參細辛各等分上銼片每用二兩以水煎熏洗遍身血出為效如洗務要湯寬浸洗良久方佳敷藥治瘡大爛遍身塗之黑狗脊二兩如無以杜仲代之蛇床子一兩寒水石硫黃白礬枯二兩朴硝少許上為末用臘豬油或香油調敷不爛不必敷一方密陀僧白附子蒼耳子細辛白芷各等分上為細末用生薑汁調擦患處洗藥泄洗癘瘡何首烏荊芥防風馬鞭草蔓荊子各等分上銼每用十兩水一斗煎數沸無風處洗出汗解毒散治風瘡解外毒巴豆肉皮硝各一兩黃蜂窩黑狗脊各七錢白芷雄黃豬牙皂角羊蹄根輕粉蟬殼去土枯礬寒水石各五錢上為末臘豬油調擦外毒既去卻擦黃連散蔭按洗藥雖能疏通腠理而損元氣解毒散雖能攻毒而傷良肉不宜多用黃連散治癘瘡清熱解毒黃連五兩五倍子一兩上為末唾津調塗之一方蛇床子根雄黃硫黃白礬草烏各等分上為細末用香油或蜜水調敷患處白丁香散治癘風眼中生胬肉白丁香貝母各等分上為末人乳汁調點眼內子和生眉散治癘風眉毫脫落半夏羊糞各等分上為末薑汁調塗眉稜上一方治大風後生眉毛皂角莢焙乾鹿角燒存性各等分上為細末生薑汁調塗眉上一日二次則生灸法治大風後斷根於腳大拇指斤骨縫間約半寸灸三壯以出毒氣治血風瘡方馬齒莧膏治兩足血風瘡並兩腳背風濕瘡疼癢馬齒莧切碎焙乾五錢黃丹飛黃柏枯白礬孩兒茶各三錢輕粉一錢上為細末和勻後入輕粉用生桐油調攤於厚桐油紙上用蔥椒湯洗淨患處貼之一方治血風瘡川椒貝母白芷蛇床子炒黃丹飛枯白礬黃連各三錢輕粉五錢上為細末生桐油調攤厚油紙上貼瘡扎定七日方開忌胡椒生薑蔥蒜一切熱毒物七珍膏治血氣瘡極癢爬見血者此方極效並治一切惡瘡癰毒先用香油一斤槐枝青者截百段陸續下枝俟煎枯再下熬至滴水成珠次下黃蠟一兩五錢又下定粉十二兩提起微溫方下後藥乳香沒藥輕粉白花蛇孩兒茶各一錢潮腦一兩麝香七分俱為細末上攪勻成膏用水浸一宿去火氣收藏
