body:
  text: 卷四十二蠱毒論李氏曰據方書蠱有數種皆妖昧變惑之氣其怪使然人有造作而得之者多取蟲蛇之類以甕盛之使其自相啖食其間一物獨存者為蠱以酒肉祭之取出放毒於酒餚中以害人毒發令人面目青黃力乏身痛唾吐鮮血小便淋澀大便膿血唇口乾燥胸脅妨滿腹痛如蟲齧又如蟲行病人所食之物皆變化為蟲侵蝕臟腑蝕盡則死死則病氣流注復染旁人人死則精魂反為其家代力致富不知有此事否萬病解毒丹東坡雄礬丸主之或於足小指尖處灸三壯即有物出酒飯得之隨酒飯出肉菜得之隨肉菜出凡中蠱毒不論年月遠近但煮雞卵一枚去殼以銀釵插入卵中併入口中含一飯頃取出視之釵卵俱黑為中毒一法令患人唾津於水沉則是浮則非也又法口含大豆豆脹爛而皮脫者是蠱否則亦非也如出外須用預知子置衣領中遇毒則有聲凡中蠱之人用藥已瘥自後飲食永不得吃冷若飲食帶冷則鬼氣乘之毒蟲復生竟不能救嶺南多有挑生毒者乃挑毒於魚肉菜果酒醋之中以害於人其候初覺胸腹作痛次則漸漸攪刺滿十日則物生能動行上胸痛沉下腹痛在上膈者用膽礬用末五分投入熱茶內溶化通口服之探吐在下焦者用鬱金末二錢米湯調服下惡物後以四君子湯去甘草調之如脅下急腫頃刻生癰大如碗許者用升麻末二錢冷熱水調連服瀉出如蔥根其腫即消後以平胃散兼進白粥調之江南溪澗中有射工毒或因雨潦逐水而入人家含沙射人之影得之寒熱悶亂頭目俱痛亦如中屍卒不能語又有水毒蟲一名溪溫得之病同射工但有爛瘡為射工無瘡為溪溫又有沙蝨細如疥蟲遇陰雨則行出草間著人則入皮里痛如針刺是三者為病朝輕暮重手足冷至肘膝二三日腹中如蟲食人下部臍中生瘡不痛不癢急視下部有瘡赤如截肉者為陽毒最急如鯉魚齒者為陰毒稍緩要皆殺人不過二十日也用蒜擂濃汁煎溫洗之是水毒當發赤斑否則非也當以他藥調治消水毒飲子主之或云中蠱毒者令人心腹絞痛如有物吐出皆如爛肉若不即治食人五臟即死驗令病人唾水沉者即是有人行蠱毒以病人若欲知其姓名者以敗鼓皮燒作末飲服方寸匕須臾自呼蠱家姓名可語之令呼喚將去則愈治之亦有方凡中毒嚼生豆不腥嚼白礬味甘者皆中毒無疑脈法人為百藥所中傷脈浮澀而疾者生微細者死洪大而遲者生治方辰砂丸治蠱毒從酒食中著者端午日合辰砂細研雄黃另研水飛赤腳蜈蚣續隨子各一兩麝香一錢上為末糯米飲為丸如雞頭大若覺中毒即以酒下一丸蛇蠍所傷醋磨敷效東坡雄礬丸治蠱毒及蟲蛇獸等毒神效白礬黃蠟雄黃各等分上將雄礬為末溶化黃蠟為丸如桐子大每服七丸熟水下必效方治蠱毒神效以胡荽根絞汁半升酒和服之立下外臺方治蠱毒土瓜根大如拇指長三寸切以酒半升浸一宿一服當吐下一方治蛇蠱食飲中得之咽中如有物咽不下吐不出悶悶心熱用馬兜鈴煎服即吐出又服麝香一錢匕即吐蠱毒聖惠方治五種蠱毒用馬兜鈴根三兩為末分為三帖水一盞煎五分去渣服當吐蟲出未快再服一方主蠱毒大戟桃白皮火烘乾斑蝥去翅各等分上三物搗篩為散以冷水服半方寸匕其毒即出不出更一服蠱並出此李饒州法大奇若以酒中得則以酒服以食中得則以飲服之一方凡諸蠱多是假毒藥以投之知時宜服此解之通除諸毒藥大豆甘草薺苨上以水煮取汁飲之一方解蠱毒山豆根不拘多少如中藥蠱毒密遣人和水研以禁聲服少許不止再服一方用酒調下二錢一方治食中有蠱毒令人腹內堅痛兩目青黃淋露骨立病變無常用鐵精細研搗雞肝和為丸如桐子大食前或酒後下五丸消水毒飲吳茱萸半升生薑犀角升麻陳皮各一兩烏梅七個上用水七碗煎至二碗分二服雄麝散治五種蠱毒雄黃研麝香研各等分上為末和一處用生羊肺如指大以刀切開內以裹藥吞之丹砂丸治蠱毒巴豆去殼心油一分雄黃另研硃砂另研各五錢藜蘆略炒鬼臼各一分上為末蜜丸如大豆大每服三丸空心薑湯下當轉下惡物並蠱等如煩悶後以鴨為羹食之
