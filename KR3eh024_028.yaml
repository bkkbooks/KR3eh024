罌粟殼去蒂蓋蜜炙各等分上㕮咀每服三錢加生薑棗子各一枚水煎食後溫服貝母散治咳嗽多日不愈貝母去心桑白皮五味子甘草炙各半兩知母一錢半款冬花二兩杏仁去皮尖三兩上㕮咀每服一兩加生薑三片水煎食後溫服或煉蜜丸如龍眼大臨臥噙化貝母湯治嗽久不瘥貝母去心薑製陳皮去白半夏柴胡乾薑生用桂心五味子各一兩黃芩桑白皮各半兩木香甘草各二錢半上為粗末每服五錢加杏仁七個去皮尖生薑七片水煎去渣熱服有姓蔣者其妻積年嗽制此方授之一服瘥以治諸般嗽悉愈人參散治諸咳嗽喘急語言不出年久者四五服近日者三四服神效人參知母貝母半夏杏仁馬兜鈴去皮用肉麻黃不去節各半兩天仙藤二兩上㕮咀每服八錢水二盞烏梅一個蜜一匙煎至八分去渣溫服食後臨臥服忌酒醋雞面咸酸生冷安眠散治上氣咳嗽久而不愈者款冬花麥門冬去心烏梅肉佛耳草各二錢半甘草炙三錢半陳皮去白五錢粟殼蜜炙七錢半上為細末每服三錢水一盞入黃蠟如棗核許同煎至八分去渣臨睡溫服潤肺除嗽飲治遠年咳嗽如神人參杏仁生甘草薄荷各三分五味子九粒款冬花紫菀茸麻黃陳皮去白石膏粉桔梗半夏桑白皮蜜炙枳殼麩炒烏梅粟殼去穰蜜炙各五分上銼加生薑三片細茶一撮水煎服補肺湯治肺虛氣乏久嗽阿膠炒蘇子桔梗半夏制甘草炙各半兩款冬花砂仁紫菀細辛杏仁去皮尖陳皮去白桑白皮炒青皮去白五味子石菖蒲草果各二錢半上㕮咀每服一兩加生薑四片紫蘇三葉水煎溫服安肺散治痰嗽不問新舊麻黃二兩去節甘草二兩炒御米殼四兩去蒂炒黃色上為末每服三錢水一盞入烏梅一個煎七分臨臥溫服一方治多年喘嗽人參麻黃甘草各二兩上為末每服二錢杏子五個擂碎無根水同煎和渣食後服枳殼湯治久痰嗽胸膈不利者多上焦發熱枳殼麩炒三兩桔梗二兩黃芩一兩半上為細末每早取二兩半水三盞煎至一盞日作三服午時一服申時一服臥時一服三日七兩半服盡又服半夏湯生半夏湯用半夏薑製切片每服三錢半水一盞半薑五片煎至一盞食後服一日二三服二三日服了再服枳殼丸盡其痰為度論曰先消胸中痰氣後去膈上痰再與枳朮丸謂首尾合治盡消其氣令痰不復作也二母散治嗽久不愈者常服除根纍效知母貝母去心各等分上為細末老生薑切片蘸藥細嚼白湯下三聖丹治久嗽極效天南星煨裂一兩半夏湯泡七次二兩甘草生用半兩上先以南星二味研為細末用生薑自然汁拌勻盒作曲春秋七日冬十日夏五日取出再入甘草共研為細末別取淡竹瀝一碗將前藥末用竹瀝拌捏作餅子焙乾又將竹瀝沃濕又焙乾如此沃焙十數次待竹瀝盡為度研為極細末用白砂糖調如餳每臨臥抄一匙於口內噙化再用竹瀝漱口咽之一方治多年嗽半夏湯泡七次南星生用杏仁去皮尖甘草生用各等分上㕮咀每服八錢生薑七片棗一枚水煎食後溫服一方治遠年近日一切咳嗽人參五倍子杏仁去皮尖各五錢半夏七錢上用蘿蔔去頂取空以萆麻子去殼四十九粒明礬五錢為末二味入蘿蔔內以頂蓋紙裹煨研丸每服十丸臨臥烏梅湯下久嗽丸子海蛤粉研細膽星杏仁訶子青黛皂角莢上為末薑汁丸如桐子大薑湯下丹溪方久嗽乃痰積久留肺脘黏滯如膠不能升降或挾濕與酒而作香附童便浸殭蠶炒海蛤粉瓜蔞仁蜂房杏仁神麯薑汁竹瀝各等分上為末蜜調噙化一方一老人形實夏月無汗成久嗽痰半夏薑製紫蘇葉各一兩上二味入萍末蜆殼末神麯末以瓜仁桃仁半兩和丸先服三拗湯三帖方服此丸子又方一男子五十歲舊年因暑月入冷水作勞患瘧後得痰嗽次年夏末得弦脈而左手虛叩之必汗少而有痰身時時發熱痰如稠黃膠與下項方藥仍灸大椎風門肺俞五處半夏一兩白朮七錢茯苓六錢黃芩陳皮桔梗枳殼石膏煅各半兩殭蠶炒二錢半五味子一錢半上為末神麯糊丸薑湯下三十丸先與三拗湯加黃芩白朮二帖夜與小胃湯十丸以攪其痰紫參丸紫參甘草桔梗各一兩五味子阿膠炒如珠各半兩肉桂去皮烏梅杏仁去皮尖各二錢半上為末煉蜜丸每兩作十五丸每服一丸用新絹裹定於湯內濕過噙化渣咽下加味百花膏治久嗽不愈紫菀款冬花各一兩百部五錢上為細末每服三錢用生薑三片烏梅一個煎湯調下食後臨臥各一服或蜜丸服亦可人參款化膏治肺受虛寒久嗽不已咽膈滿悶咳嗽痰涎嘔逆噁心腹脅脹滿腰背倦痛或勞虛冷嗽及遠年近日一切嗽病服諸藥不效者皆治人參去蘆款冬花去梗北五味炒紫菀洗去蘆桑白皮麥冬去心各一兩上為末煉蜜丸雞頭實大每服一丸細嚼薑湯下臨臥食後服止嗽瓊珠膏粟殼去蓋筋穰三兩桑白皮元參各七錢貝母去心八錢陳皮桔梗各六錢五味子薄荷各五錢甘草四錢上為極細末煉蜜丸如彈子大每服一丸臨臥白滾湯下杏仁煎治老人久患咳嗽不已睡臥不得者服之立效杏仁去皮尖炒胡桃肉去皮各等分上二味共碾為膏入煉蜜少許搜和得所丸如彈子大每服一丸食後細嚼薑湯下橘薑丸治久患氣嗽聖藥陳皮生薑各二兩上二味同搗焙乾為丸如梧桐子大每服三五十丸食後臨臥米飲送下蔭按火嗽忌用人參半夏陳皮等燥藥氣嗽忌用粟殼豆蔻等澀藥加味二母丸治久嗽勞嗽食積嗽知母貝母二味用巴豆同炒黃色去巴豆不用白礬白及或加麥門冬陳皮阿膠亦好上為末薑汁和蜜為丸含化古二母散治遠年近日諸般咳嗽兼治痰喘知母貝母各一兩巴豆霜十粒上為末每服一字薑三片臨臥細嚼薑湯下便合口睡其嗽即定自胸膈必利下寒聚粥補之馬兜鈴丸治多年喘嗽不止大有神功馬兜鈴去土半夏湯泡七次焙乾杏仁去皮尖麩炒各一兩巴豆二十一粒去皮油研以上除巴豆杏仁另研外余為細末用皂角膏子為丸如桐子大雄黃為衣每十丸臨臥煎烏梅湯下以利為度奪命丹治上氣喘急經歲咳嗽齁䶎久不愈信石一錢白礬二錢白附子三錢南星四錢半夏洗五錢上先用信石與白礬一處於石器內火煅紅出火黃色為度切不可犯鐵器卻和半夏南星白附子末生薑汁麵糊為丸如黍米大硃砂為衣每服七丸小兒三丸井花水吞下忌諸惡毒熱物方氏曰此方治咳嗽痰喘劫劑也蓋肺受火邪氣從火化有升無降加以脾濕生痰則上壅而為喘嗽滿悶不得安臥矣病作之時固宜用此藥以劫痰然病安之後即當用知母茯苓湯或人參五味子散寧肺湯以補虛可也治咳嗽劫藥五味子五錢甘草二錢半五倍子風化硝各一錢上為末蜜丸噙化又云干噙劫嗽丸久嗽失氣此藥亦能用之新咳者不宜用也訶子百藥煎荊芥穗各等分上為末薑蜜丸噙化千金方治三十年咳嗽或飲或咳寒氣嗽雖不同悉治之細辛款冬花防風紫菀各二兩藜蘆二兩川椒五合上六味㕮咀取藜蘆先著銅器中次紫菀次細辛次款冬花次椒以大棗百枚間在諸藥中以水一斗二升微火煮令汁盡出棗曝令燥雞鳴時服半棗不知明旦服一枚以胸中溫為度若強人欲嗽吐者可少增服之便吐膿裹結痰後勿令飲食咳愈止藥藥勢靜乃食不爾令人吐不已沖虛至室丹治男婦日久勞嗽並噤口痢二證諸藥不效者阿芙蓉二錢另研麝二分另研射干即扁竹根七分另研硃砂三分另研狗寶一錢三分火煅七次入燒酒內另研上為極細末燒酒打糊為丸如豆大金箔為衣勞嗽每用一丸擂細用好梨七錢去皮將藥撒在梨上一更時令患者嚼下服畢急睡勿言語次日巳時方飲清米湯三日戒食厚味噤口痢用白砂糖三錢同藥一丸擂細不拘時咽下不忌厚味每一料丸四十六丸不可多少一方療三十年嗽以百部根三十斤搗絞取汁煎之如飴服方寸匕日三服驗一方治久咳嗽上氣十年諸藥治不瘥以蝙蝠除翅足燒令黑為末飲服之柿蘸散治喘嗽咳嗽久不瘥用不蛀皂角一錠去皮弦劈作兩片去子每孔內入去皮巴豆一粒以線扎定童便浸一宿火上炙乾為細末每用一字臨睡用乾柿蘸嚼吃下忌湯水諸物如無干柿以白砂糖代之治久嗽不瘥方兔屎四十九粒硇砂胡桐淚各一錢上為末蜜和丸如桐子大每服三丸以粥飲下日三吐冷物盡即瘥熏藥肺受風寒久嗽非此不能除南星款冬花鵝管石佛耳草雄黃上為末拌艾以薑一厚片留舌上次用艾上燒之須令煙入喉中一方無佛耳草有鬱金又方治風入肺久嗽不止鵝管石雄黃各一分半款冬花佛耳草各一錢半上各另為末卻用紙一幅方方闊四五寸以雞子清塗其中央四旁各懸一寸許不塗然後以鵝管石雄黃摻於雞子清上又以款花佛耳草末摻其上覆之又以一箭箸從不塗紙旁捲起為一紙筒用糊黏牢其旁抽箭箸出焙至燒筒盡為度卻吃茶二三口壓之療久嗽熏法每旦取款冬花如雞子少許蜜拌花使潤納一升鐵鐺中又用一瓦碗鑽一孔孔內安小竹筒或筆管亦得其筒稍長置碗鐺相合及插筒處皆麵糊塗之勿令泄氣鐺下著炭火少時款冬煙自竹管出以口含筒吸取咽之如胸中稍悶須舉頭即將指頭捻竹筒頭勿令漏煙氣出及煙盡止凡如是五日一為之至六日則飽食羊肉餛飩一頓永瘥一方不用鐺碗用有嘴瓦瓶燒藥蓋住瓶口卻以口於瓶嘴吸煙咽之尤捷
