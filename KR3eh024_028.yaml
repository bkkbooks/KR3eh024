body:
  text: 卷二十八咳嗽論袖珍論曰肺為五臟之華蓋聲音之所從出皮毛賴之而潤澤腎水由茲而生養腠理不密外為風寒暑濕之氣所幹皆能令人咳嗽傷風則脈浮憎寒身熱自汗煩躁鼻引清涕欲語未竟而咳傷寒則脈緊無汗惡寒煩躁不渴遇寒而咳傷熱則脈數煩渴引飲咽膈乾燥咳嗽稠黏傷濕則脈細咳則四肢重著骨節煩疼又有七情之氣傷於五臟六腑克於肺經亦能致咳喜傷心者咳而喉中介介如腫狀不已則小腸受之咳狀與氣俱失怒傷肝者咳而兩脅下痛不已則膽受之嘔吐苦汁思傷脾者咳而右脅下痛引至肩背不已則胃受之嘔吐痰沫憂傷肺者咳而喘息有聲甚則唾血不已則大腸受之咳則遺屎恐傷腎者咳則腰背相引而痛不已則膀胱受之咳而遺溺咳而不已三焦受之咳則腹滿不欲食治療之法當詳審其脈證若外感風寒止當發散又須觀病者之虛實用藥若內因七情而得者又當隨其部經之證與氣脈相應脈浮緊為虛寒沉數為實熱弦澀為少血洪滑為多痰咳嗽之脈浮大者易治沉微者難愈大概以順氣為先下痰次之又有停飲而咳者又須消化之切不可驟用罌粟訶子之劑止澀之又有寒邪未除者亦不可便用補藥最忌憂思過度房室勞傷否則多成瘵疾謹之集略曰內經云五臟六腑皆令人咳非獨肺也皮毛者肺之合皮毛先受邪氣邪氣以從其合也故傷肺居多子和以肺傷分六氣不拘於寒咳者氣動也陽也嗽者兼血也陰也其本雖殊其標則一有因勞因肺脹因食積因痰若發熱致嗽或聲嘶者此因血虛受熱大抵人瘦者腠理疏通而多汗泄血液衰少而為燥熱故多勞嗽咳而無痰者此係火鬱之證用苦桔梗類以開之補陰降火實者宣法亦可施也若秋傷於濕積於脾冬必咳嗽夫咳嗽者多因傷肺氣而動脾濕也始關於肺終則聚於胃使人多涕唾而面浮腫氣逆也治法須分新久虛實若外感風寒則當發散參蘇清肺飲之類火熱則清之濕熱則瀉之多痰以順氣為先下痰次之有停飲者又須消化久病便屬虛屬郁氣虛則補氣血虛則補血兼鬱則開鬱滋之潤之斂之降之則治虛之法也若口有腐氣吐濁涎脈數有力名曰肺癰當涼血以桔梗湯闢燥若胸中隱隱而痛脈弱無力名曰肺痿宜養氣用薏苡仁散治嗽之要切不可用烏梅粟殼酸澀之藥其寒邪未除亦不可便用補藥須慎調養忌憂思戒房室薄滋味若性躁及脫營之人終覺難療成無己云咳者謦咳之咳俗謂之嗽者是也肺主氣形寒飲冷則傷之使氣上而不下逆而不收衝擊膈咽令喉中淫淫如癢習習如梗是冷嗽甚者續續不已連連不息坐臥不安言語不竟動引百脈聲聞四近矣潔古云咳無痰而有聲肺氣傷而不清也嗽無聲而有痰脾濕動而生痰也若咳嗽有痰而有聲者因傷肺氣動於脾濕故咳而兼嗽也脾濕者秋傷於濕積於脾也故內經曰秋傷於濕冬必咳嗽大抵素秋之氣宜清而肅若反動之則氣必上衝而為咳嗽甚則動脾濕而為痰也是知脾無留濕雖傷肺氣亦不為痰若有痰而寒少熱多故咳嗽嗽非專主乎肺病以肺主皮毛而司於外故風寒先能傷之也內經曰五臟六腑皆能使人咳非獨肺也各以其時主之而受病焉非其時傳而與之也所病不等寒燥濕風火皆能令人咳惟濕病痰飲入胃留之而不行上入於肺則為嗽假令濕在心經謂之熱痰濕在肝經謂之風痰濕在肺經謂之氣痰濕在腎經謂之寒痰為患不同各宜隨證而治之若咳而無痰者以辛甘溫其肺故咳嗽者治痰為先治痰者下氣為主是以半夏南星勝其痰而咳嗽自安枳殼陳皮利其氣而痰飲自降痰盛而能食者小承氣湯微利之痰盛而不能食者厚朴湯疏導之夏月嗽而發熱者謂之熱嗽小柴胡湯加石膏知母冬月嗽而發寒者謂之寒嗽小青龍湯加杏仁然此為大例更宜隨證隨時加減量其虛實此治法之大要也陳氏曰夫肺為四臟之華蓋內統諸經之氣外司腠理皮毛若外邪入於肺中故令咳嗽當以脈息辨之浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒風者散之濕者燥之熱者涼之寒者溫之虛者補之經曰微寒為嗽寒甚為腸澼古人立方多用乾薑桂心細辛之屬若熱在上焦而咳虛則為肺痿實則為肺癰或因氣血不足或因酒色厚味或因重亡津液燥氣焚金或脈數發熱咳嗽有血宜辛溫建中之屬若用柴胡鱉甲麥冬葶藶等藥則誤矣經曰感於寒微則為咳甚則為泄蓋肺主氣合於皮毛邪傷皮毛則咳為肺病傳於各臟以時受邪肺為嫩臟邪易傷而難治其嗽有肺心脾腎肝風寒支飲膽之十種亦有勞嗽者華他謂之邪嗽孫真人謂之注嗽此因酒色過度勞傷肺經重者咯唾膿血輕者時發時瘥或先嘔血而後嗽或先咳嗽而吐血此又挾邪傳疰孫真人用通氣丸夢與鬼交用四滿丸蛤蚧天靈蓋桃柳枝安息香之類若肺中有蟲入喉癢嗽須以藥含化其蟲即死嗽即止海藏曰肺咳喘息而有音甚則吐血麻黃湯大腸咳而遺矢赤石脂禹餘糧湯桃仁湯不止用豬苓分水散心咳心痛喉中介介鯁狀甚則咽喉痹用桔梗湯小腸咳咳而失氣氣與咳俱失芍藥甘草湯與夏脈不及病同蓋小腸為心之腑故也肝咳兩脅下痛甚不可以轉轉則兩胠音區脅也下滿小柴胡湯膽咳咳嘔膽汁黃芩加半夏生薑湯脾咳右脅下痛陰陰痛引肩背甚則不可以動動則咳劇升麻湯胃咳嘔嘔甚則長蟲出烏梅丸腎咳腰背相引而痛甚則咳涎麻黃附子細辛湯膀胱咳遺溺茯苓甘草湯三焦咳腹滿不欲飲食此皆聚於胃關於肺使人多涕唾而面浮腫氣逆錢氏異功散子和云常仲明病寒熱往來時咳一二聲面黃無力懶思飲食夜多寢汗日漸瘦削諸醫作虛損治之用二十四味燒肝散鹿茸牛膝補養二年口中痰出下部轉虛戴人斷之曰上實也先以湧劑吐痰二三升次以柴胡飲子降火益水不月餘復舊此證何名乃經中雲二陽病也二陽之病發心脾不得隱曲心受之則血不流故女子不月脾受之則味不化故男子少精此二證名異而實同仲明之病味不化也馳口鎮一男子年二十餘歲病勞嗽數年其聲欲出不出戴人問曾服藥否其人曰家貧未嘗服藥戴人曰年壯不妄服藥可治先以苦劑湧之次服舟車浚川丸大下之又服重劑果瘥一田夫病勞嗽一湧一泄已減大半次服人參補肺湯臨臥更服檳榔丸以進食東垣曰難經云肺太過則外證面白善嚏悲愁不樂欲哭其內證喘咳上喝逆氣煩心胸滿煩熱夜則涕出多嚏鼻塞不通肺金大實以子助母也心脾肺皆受寒邪涎出口甘水反侮土寡於畏也腹中大寒名曰寒中痰白作泡肺中氣虛而為大寒子助母也當於肺中瀉腎水非辛熱之藥不退也口甘涎沫者胃中寒而不和以辛甘熱去之飲酒者多有此反化丹溪云咳嗽有風寒有火有勞有痰有肺脹風寒者主發散行痰二陳湯加麻黃杏仁桔梗之類戴氏曰鼻塞聲重惡寒是也風寒鬱熱於肺夜嗽者三拗湯加知母脈大而浮有熱加黃芩生薑聲啞屬寒寒包熱也此言乍感寒而嗽者宜細辛半夏生薑辛以散之肺虛者人參膏阿膠為主陰不足者六味地黃丸為要藥或知母茯苓湯尤妙喘嗽遇冬則發此寒包熱也解表熱自除用枳殼桔梗麻黃防風甘草陳皮紫蘇木通黃芩嚴寒嗽甚加杏仁去黃芩感冷則嗽膈上有痰二陳湯加炒枳殼黃芩桔梗蒼朮麻黃木通生薑火者有聲痰少面赤是也主降火清金化痰黃芩海石瓜蔞青黛桔梗半夏香附訶子青皮之類蜜丸噙化乾咳嗽者系火鬱之甚難治乃痰鬱火邪在肺中用桔梗以開之下用補陰降火不已則成勞須行倒倉法此證多是不得志者有之倒倉法輕用殺人切慎之有痰因火逆上作嗽者必先治其火然亦看痰火孰急若痰急先治痰也勞者盜汗出兼痰多作寒熱是也以補陰為主四物湯加竹瀝薑汁陰虛火動而嗽四物加二陳順而下之加黃柏知母尤妙陰虛喘嗽或吐血者四物湯加知母黃柏五味子人參麥冬桑白皮地骨皮好色之人元氣虛弱咳嗽不愈瓊玉膏肺虛甚者人參膏以生薑陳皮佐之有痰加痰藥此好色腎虛者有之腎虛則水失所養不能制火火勢不退而侮所勝肺金受傷而虛所謂子能令母虛也久嗽勞嗽用貝母知母各一兩以巴豆同炒黃色去巴豆再用白礬白及各一兩為末以生薑一片蘸藥睡時噙化藥盡嚼薑咽之咳嗽聲嘶者乃血虛受熱用青黛蛤粉蜜調服之痰者主豁痰嗽動便有痰聲痰出嗽止是也痰嗽用半夏瓜蔞各五兩貝母桔梗各二兩知母一兩枳殼一兩半為末生薑汁浸蒸餅為丸服一方黃芩一兩半酒洗白芥子去殼滑石各五錢貝母南星各一兩風化硝二錢半蒸餅丸青黛為衣痰多喘嗽白朮半夏蒼朮香附杏仁各一兩黃芩五錢為末薑汁調麵糊為丸服痰嗽因酒傷肺瓜蔞杏仁俱搗為泥黃連為末以竹瀝入紫蘇葉再煎入韭汁調丸服一方用青黛瓜蔞蜜丸噙化以救肺久嗽有積痰留肺脘中如膠氣不能升降或挾濕與酒而作茜根童便浸殭蠶炒海粉瓜蔞仁蜂房杏仁神麯為末薑汁竹瀝調噙化痰嗽氣急蒼朮三兩香附一兩五錢蘿蔔子蒸杏仁瓜蔞仁半夏各一兩黃芩茯苓各五錢川芎三錢丸服食積痰嗽發熱半夏南星為君瓜蔞蘿蔔子為臣青黛海石石鹼為使薑汁浸餅丸服食積痰嗽三補加二母炒為末丸如椒子大以竹瀝薑汁吞之三補芩連柏也二母知貝母也肺脹者主收斂動則喘滿氣急息重是也肺因火傷極遂成郁遏用訶子為主佐以海粉香附青黛杏仁之類肺脹郁遏不得眠者難治凡嗽春是春升之氣夏是火炎上最重秋是濕熱傷肺冬是風寒外束用藥發散之後必以半夏等藥逐去其痰庶不再來早晨嗽多者此胃中有食積至午時火氣流入肺中以知母地骨皮降肺火上半日嗽多者胃中有火貝母石膏降之午後嗽多者屬陰虛四物加知母黃柏先降其火黃昏嗽多者火氣浮於肺不宜用涼劑以五味子五倍子斂而降之嗽而脅痛宜以青皮疏肝氣後以二陳湯加南星香附青黛薑汁一雲實者白芥子之類嗽而心煩六一散加辰砂嗽而失聲潤肺散訶子五味子五倍子黃芩甘草等分為末蜜丸噙化嗽而無聲有痰半夏白朮五味防風枳殼甘草有聲無痰生薑杏仁升麻五味防風桔梗甘草有聲有痰白朮半夏五味防風久不愈者加枳殼阿膠寒熱交作而咳嗽者小柴胡湯加知母之類一方加白芍藥五味子桑白皮陰氣在下陽氣在上咳嗽嘔吐喘促瀉白散加青皮五味人參茯苓粳米熱嗽胸滿小陷胸湯治嗽最要分肺虛實若肺虛久嗽宜五味子款冬花紫菀馬兜鈴之類補之若肺實有火邪宜黃芩天花粉桑白皮杏仁之類瀉之治嗽必用五味子東垣之法然驟用之恐閉住其邪先必發散之或兼用之可也治嗽用訶子味酸苦有收斂降火之功五味子收肺氣乃火熱必用之劑杏仁散肺氣風熱然肺實有熱因於寒者為宜桑白皮瀉肺氣然性不純良用之多者當戒或用馬兜鈴以其去肺熱補肺也多用生薑以其辛能發散也瓜蔞甘能補肺潤肺降氣胸中有痰者以肺受火逼失降下之令今得甘緩潤下之助則痰自降宜其為治嗽之要藥也治嗽多用粟殼不必疑但用先去病根此乃收功後藥也治痢亦同咳逆非蛤粉青黛瓜蔞貝母不除大概有痰者加痰藥口燥咽乾而有痰者不用半夏南星用瓜蔞貝母飲水者不用瓜蔞恐泥膈不鬆快喘嗽不拘老幼久近上壅等疾槐花為末滴水丸如桐子大熟水或薑湯下知母止嗽清肺滋陰降火杏仁瀉肺氣氣虛久嗽者一二服即止嗽而肺氣有餘者宜瀉之桑白皮為主半夏茯苓佐之瀉其有餘補其不足肺脹而嗽或左或右不得眠此痰挾瘀血礙氣而病宜養血以流動乎氣降火疏肝以清痰四物湯加桃仁訶子青皮竹瀝薑汁之類血礙氣作嗽者桃仁去皮尖大黃酒炒薑汁丸服勞嗽即火鬱嗽用訶子能治肺氣因火傷極遂成郁遏脹滿不得眠一邊取其味酸苦有收斂降火之功佐以海石童便浸香附瓜蔞青黛杏仁半夏曲之類薑蜜調噙化必以補陰為主脈郁痰嗽睡不安宜清化丸貝母杏仁為末砂糖入薑汁蒸餅丸噙化治嗽灸天突肺俞二穴大瀉肺氣肺俞穴在三柱骨下兩旁各一寸五分一人患咳嗽惡風寒口燥干心微痛胸脅痞滿脈浮緊而數左大於右蓋表盛裡虛聞其素嗜酒肉有積後因行房涉寒冒雨又忍飢繼以飽食先用人參四錢麻黃連根節一錢半或云此丹溪神方與二三帖嗽止寒除後改用厚朴枳實青皮陳皮瓜蔞仁半夏為丸與二十帖用人參湯下痞滿亦散而愈一人患乾咳嗽聲啞用人參橘紅各一錢半白朮二錢半夏曲一錢茯苓桑白皮天門冬各七分甘草青皮各三分服五帖後去青皮再加五味二十粒知母地骨皮瓜蔞子桔梗各五分作一帖入薑煎夏加黃芩五分仍與四物湯入童便竹瀝薑汁並炒黃柏二藥晝夜相間服兩月聲出而愈一人夜嗽多脈大而浮三拗湯加知母黃芩生薑煎戴氏曰風寒者鼻塞聲重惡寒者是也火者有聲痰少面赤者是也勞者盜汗出兼痰者多作寒熱肺脹者動則喘滿氣急息重痰者嗽動便有痰聲痰出嗽止五者大概耳亦當明其是否也然後用藥蔭按方古庵曰肺主皮毛人之無病之時榮衛周流內氣自皮膚腠理普達於外一或風寒外束則內氣不得外達便從中起所以氣升痰上故咳嗽宜用辛溫辛涼之劑以發散風寒則邪退正復而嗽止也又按肺為華蓋凡飢飽勞役喜怒憂恐與夫飲醇醪食厚味則火升痰上而傷於肺亦作咳嗽宜用清火豁痰之劑則火降痰消而嗽止也又按肺主氣運行血液周流一身金也肺受火邪氣從火化有升無降為嗽為喘久而不治虛極至損則不能運行氣液發為煩熱驚悸咳唾黏涎膿血宜用補虛潤燥開鬱散火之劑則肺得清正而嗽止也故治咳嗽要知新久之異虛實之殊補瀉之宜斯無誤矣李氏曰咳因氣動為聲嗽乃血化為痰肺氣動則咳脾濕動則嗽脾肺俱動則咳嗽俱作然以肺為主故多言咳則包嗽在其中咳必先審肺脈虛實實者浮大有力若沉而滑則痰氣盛也虛者弦大無力若沉細帶數則火鬱極也風乘肺咳則鼻塞聲重口乾喉癢語未竟而咳參蘇飲加桑白皮杏仁或柴胡半夏湯後用諸咳丸如久咳夜咳冬咳風入肺竅者宜熏之寒乘肺咳則胸緊聲啞二陳湯加麻黃杏仁或蘇陳九寶飲華蓋散單生薑丸有寒熱者小柴胡湯又有一種遇寒則咳者謂之寒暄乃寒包熱也解表則除枳梗湯加麻黃防風杏仁陳皮紫蘇木通黃芩如風寒鬱熱夜咳者三拗湯加知母黃芩暑乘肺咳則口燥聲嘶吐沫六一散加辰砂見血者枇杷葉散濕乘肺咳則身重骨節煩疼灑淅五苓散不換金正氣散大抵春氣上升潤肺抑肝夏火上炎清金降火秋濕熱甚清熱瀉濕冬風寒重解表行痰火咳聲多痰少五更咳多者食積濕熱火流肺中瀉白散加知母或古二母散上半午咳多者胃有實火單石膏丸加知母貝母便閉喘渴痰稠者涼膈散敗毒散古芩半丸下半午咳多者陰虛四物湯合二陳湯加知母黃柏麥門冬順而下之如陰虛火燥寒熱盜汗遺精見血者四物湯加竹瀝或滋陰降火湯加味二母丸黃昏咳多者火浮於肺潤肺丸以斂之不可純用涼藥通用二陳湯去半夏加貝母瓜蔞青黛山梔黃芩桑白皮郁咳即火咳久者乾咳無痰乃腎水焦枯邪火獨炎於肺瀉白散加苦梗為君以開之久者訶黎丸虛者腎氣丸不得志者霞天膏如肺燥皮枯瘡癢便閉者活血潤燥生津飲勞咳五勞虛咳也疲極傷肝咳而左脅疼引小腹者二陳湯加芎歸芍藥青皮柴胡草龍膽黃芩竹茹或黃耆建中湯勞神傷心咳而咽乾咯血者劫勞散夢授天王補心丹勞倦傷脾咳而氣短無力者調中益氣湯補中益氣湯叫呼傷肺咳而嘔吐白沫口燥聲嘶者潤肺丸人參清肺飲房勞傷腎咳而腰背痛寒熱者二陳芎歸湯又有一種傳疰癆咳即乾咳勞咳久者宜蛤蚧天靈蓋雄黃硃砂之類須於勞瘵條參之食咳因食積生痰痰氣衝胸腹滿者二陳湯加厚朴山楂麥芽傷生冷以致肺胃不清噯酸吐瀉惡風寒者五積散理中湯異攻散傷煎炒熱物者葶藶散或三補丸加知母貝母傷酒食積者香附瓜蔞青黛丸七情臟氣不平則咳久不已則入六腑怒傷肝咳兩脅下滿入膽則嘔吐苦汁喜傷心咳心痛咽腫入小腸則咳與氣失思傷脾咳右脅引肩背痛甚則不可以動入胃則嘔吐痰沫長蟲憂傷肺咳喘息咽血入大腸則遺糞恐傷腎咳唾涎腰背引痛入膀胱則遺尿入三焦則腹滿不欲食始則關於肺久則聚於胃故也宜二陳湯加瓜蔞蘿蔔子加味瀉白散參蘇飲四七湯蘇子降氣湯團參飲子古橘甘散古橘薑丸加減三奇湯選用痰咳痰出咳止胸膈多滿經曰秋傷於濕冬必咳嗽濕在心謂之熱痰濕在肝謂之風痰濕在肺謂之氣痰濕在腎謂之寒痰惟濕痰入胃上干於肺則必作咳宜千緡湯墜痰丸半瓜丸選用痰鬱肺經咳則涎多或結胸者二陳湯加枳梗瓜蔞黃芩貝母甚者鶴頂丹痰積流入肺脘久咳不得睡者兜鈴丸痰因火動者二陳湯加芩連或清氣化痰丸痰因宿食者化痰丸痰因酒濕者蜂薑丸全因酒者瓜連丸如痰甚能食便閉者小承氣湯下之不能食便閉者厚朴湯或滾痰湯疏導之水咳因飲茶水停蓄為涎上湧身熱胸滿怔忡者小青龍湯身寒脅硬者元武湯結胸者小半夏湯大便閉者十棗湯小便澀者五苓散詳傷寒水證瘀血咳則喉間常有腥氣輕者瀉白散加生地黃山梔子牡丹皮麥門冬桔梗重者桃仁大黃蔞汁為丸服或因打損勞力傷肺遇風寒則咳或見血紫黑色者四物湯去川芎加大黃蘇木為末酒調服利去心肺間瘀血即止後服人參養榮湯調理肺脹滿即痰與瘀血礙氣所以動則喘急或左或右眠一邊不得者是四物湯加桃仁訶子青皮竹瀝薑汁若虛脹喘者單人參膏古百花膏有水停蓄脹者飲水則逆轉不入三白湯加澤瀉桔梗五味子若因火傷極無水以升而脹者必乾咳無痰訶黎丸含化以訶子有收斂降火之功危哉新咳有痰者外感隨時解散無痰者便是火熱只宜清之久咳有痰者燥脾化痰無痰者清金降火蓋外感久則鬱熱內傷久則火炎俱宜開鬱潤燥其又有七情氣逆者則以枳殼香附順氣為先停水宿食者則以南星檳榔分導為要氣血虛者補之斂之苟不治本而浪用兜鈴粟殼澀劑反致纏綿況肺為嬌臟易寒易熱雖人參平藥惟氣虛最宜若肺熱有火及風邪初盛者俱宜沙參或元參代之故咳不拘於寒也久咳曾經利下及勞倦飢飽以致肺胃寒而飲食少進者只理脾而咳自止然腎為氣臟咳嗽動引百骸自覺氣從臍下逆奔而上者乃腎虛氣不歸元宜所服藥中加補骨脂五味子或三味安腎丸陰虛者腎氣丸陽虛者黑錫丹以鎮之凡咳至肺脹及咽瘡失音者必死樓氏曰咳之為病有一咳即出痰者脾不勝濕而痰滑也有連咳十數不能出痰者肺燥勝痰濕也滑者宜南星半夏皂角灰之屬燥其脾若利氣之劑所當忌也澀者宜枳殼紫蘇杏仁之屬利其肺若燥肺之劑所當忌也凡咳嗽面赤胸腹脅常熱惟腿足乍有涼時其脈洪者熱痰在胸膈也宜小陷胸湯礞石丸之類清膈降痰甚而不已者宜吐下其痰熱也面白悲嚏或脅急脹痛或脈沉弦細遲而咳者寒飲在胸腹也宜辛熱去之乾咳嗽者無痰有聲者是也此證本於氣澀澀微者連咳十數聲方有痰出澀甚者雖咳十數聲亦無痰出是為乾咳嗽也潔古蜜煎生薑湯蜜煎陳皮湯與燒生薑胡桃方皆治無痰而嗽者以辛甘潤其肺也如但使青皮陳皮藥皆宜去白本草云陳皮味辛理上氣去痰氣滯塞青皮味苦治下氣二味俱用散三焦氣也故聖惠法治云陳皮去穰穰不除即生痰麻黃髮汗節不去則止汗薛氏曰咳嗽若因氣虛腠理不密六淫所侵當祛外邪而實脾土若因心火太過當代肝木而滋肺金若因肺金氣虛當補脾土而生肺氣若因腎水虛損虛火炎上當補腎肺以滋化源大抵風邪胃火此實熱為患易治惟肺腎虛損此真臟為患最難調治大凡發熱喘嗽或咳唾膿血飲食不入急補脾肺滋腎水多有得生者脈浮大而面色赤者皆難治脈浮短澀者可療千金云凡上氣多有服吐藥得瘥亦有針灸得除者宜深體悟之脈法仲景云人嗽十年其脈弱者可治實大數者死其脈虛者必苦冒其人本自有支飲在胸中故也治屬飲家上氣面浮腫肩息其脈浮大不治又加利尤甚脈浮短者其人肺傷諸氣微少不過一年死法當嗽也咳嗽羸瘦脈形堅大者死咳而脫形身熱脈小堅急以疾是逆也不過十五日死脈經云上氣脈數者死謂其形損故也咳嗽脈浮緊者死浮直者生浮軟者生小沉伏匿者死關上脈微為咳肺脈微急為咳而唾血脈弦澀而咳為少血脈緊者為肺寒雙弦者寒脈浮而緊者為虛寒脈浮而緩者傷風脈細者濕脈數為熱脈沉數為實熱脈弦為水偏弦為飲脈沉為留飲洪滑多痰咳脈浮直者生脈浮濡者生脈緊者死沉小伏匿者死咳而羸瘦脈堅大者死咳而脫形發熱脈小堅急者死凡肌瘦形脫熱不去咳嘔腹脹且泄脈弦急者皆死證也脈訣舉要曰咳嗽所因浮風緊寒數熱細濕房勞澀難右關濡者飲食傷脾左關弦短疲極肝衰浮短肺傷法當咳嗽五臟之嗽各視本部浮緊虛寒沉數實熱洪滑多痰弦澀少血形盛脈細不足以息沉小伏匿皆是死脈惟有浮大而嗽者生外證內脈參考稱停通治諸咳嗽方清金飲杏仁去皮尖白茯苓各一錢橘紅七分五味子桔梗甘草各五分上銼水煎服一方有貝母一錢春多上升之氣宜潤肺抑肝加川芎芍藥半夏各一錢麥門冬炒黃芩知母各五分春若傷風致咳鼻流清涕宜辛涼解散加防風薄荷紫蘇炒黃芩麥門冬各一錢夏多火熱炎上最重宜清金降火加桑白皮知母炒黃芩麥門冬石膏各一錢秋多濕熱傷肺宜清熱瀉濕加蒼朮桑白皮各一錢防風黃芩山梔炒各五分冬多風寒外感宜解表行痰加麻黃桂枝半夏生乾薑防風各一錢肺經素有熱者再加酒炒黃芩知母各五分若發熱頭疼鼻塞聲重再加藁本川芎前胡柴胡各一錢有痰加半夏枳殼風痰再加南星薑汁炒濕痰脾困少食加白朮蒼朮有痰而口燥咽乾勿用半夏南星加知母蜜水拌炒貝母瓜蔞黃芩炒夏月熱痰或素熱有痰加黃芩黃連知母石膏上半日咳者胃中有火加貝母石膏黃連五更嗽者同治黃昏咳者火浮於肺不宜驟用寒涼藥宜加五味子五倍子訶子皮斂而降之若咳嗽久肺虛滋氣補血加人參黃耆阿膠當歸生薑天門冬款冬花馬兜鈴酒芍藥之類肺熱咳嗽去人參用沙參此兼補氣血也若午後咳者屬陰虛即勞嗽也宜補陰降火加川芎當歸芍藥熟地黃黃柏知母竹瀝薑汁天門冬瓜蔞仁貝母此專補陰血也若火鬱嗽謂痰鬱火邪在中宜開鬱消痰用訶子皮便浸香附瓜蔞仁半夏曲海石青黛黃芩為末蜜調為丸噙化仍服前補陰降火湯藥失治則成勞若食積痰積咳嗽者用香附瓜蔞貝母海石青黛半夏曲軟石膏山楂子枳實薑炒黃連為末蜜調噙化若勞嗽見血加阿膠當歸芍藥天門冬知母貝母桑白皮亦於前肺虛陰虛二條擇用除濕湯茯苓一錢桔梗枳殼麩炒各八分半夏桑白皮杏仁去皮尖甘草炙各五分上銼加生薑二片水煎服傷風致咳鼻流清涕加防風羌活薄荷荊芥紫蘇各一錢肺受火邪痰壅口乾加黃芩一錢黃連七分肺受濕痰身重加蒼朮防己山梔炒各五分寒喘痰嗽加麻黃七分惡寒多汗加桂枝防風風寒加南星竹瀝半盞薑汁少許痰氣咳嗽加蘇子貝母各一錢日哺咳者