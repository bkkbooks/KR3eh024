body:
  text: 卷八十九湯火傷論凡湯火傷皮紅未破爛者不可用大寒涼藥反用燒酒掃上以拔其熱毒出外則不爛矣薛氏曰湯火傷若發熱作渴小便赤澀用四物湯加山梔連翹甘草養陰血以消毒若患處肉未死而作痛用四君子湯加川歸山梔連翹甘草健脾胃以消毒若患處肉已死而不潰用八珍湯加白芷甘草補氣血以排膿如未應加肉桂若患處肉死已潰而不收斂用四君子湯加芎歸黃耆健脾胃以生肌如未應加炮薑若小兒患之或目劄頭搖等證用四君子加芎歸山梔健脾胃以清肝木若食後即有此患或腹脹作痛用四君子加山梔山楂神麯壯脾氣以消導大凡初患此證用神效當歸膏敷之輕者自愈重者自腐良肉易生其色赤者乃火毒未盡必擦至色白為度倘患於肢節屈伸之處若敷此且免生痂傷礙新肉復潰難痊倘回祿煙燻致死者以蘿蔔搗汁灌之即蘇以其辛能散氣也治湯火傷外敷方火炙法凡湯火傷急向火炙雖極痛強忍一時即不痛慎勿以冷物塌之及井底泥敷之使熱氣不行爛人肌肉一方治火燒以好酒洗之又以鹽敷其上如皮塌者以酒熬牛皮膠敷之如湯傷以淋過第二次灰渣敷立安一方凡遇湯火所傷先以鹽末和米醋調敷瘡上次以醋泥塗之仍用醋塗不絶暫救痛苦一面急搗生地黃醋調敷瘡上直候疼止須厚至數寸不妨若一用冷水冷物冷泥熱氣得冷氣則卻深摶爛人筋骨慎之四黃散治湯火瘡並杖熱瘡腫痛大黃黃連黃芩黃柏白及各等分上為末水調成膏以鵝翎時塗瘡上痛甚加乳香沒藥冰霜散治火燒皮爛大痛寒水石生牡蠣燒朴硝青黛輕粉各等分上為細末新水或小油調塗立止一方寒水石七兩黃柏黃連黃芩山梔子大黃赤石脂各一兩上為末酒調或鴨子清敷甚者加冰片少許柏葉散治湯火傷痛甚柏葉梔子仁各一兩鉛粉半兩研上為細末以羊骨髓五兩溶化和藥以木槌研良久日塗三五次用燭油調亦可單用側柏葉為末蠟油調敷亦效一方治湯火瘡爛痛柏葉孩兒茶槐子沒藥乳香上為細末清油調擦如濕處干撒神效當歸膏治杖撲湯火瘡毒不問已潰未潰肉雖傷而未壞者用之自愈肉已死者用之自潰新肉易生擦至肉色漸白其毒始盡生肌最速若杖瘡內有瘀血者即用有鋒芒瓷片於患處砭去惡血塗以此藥則疔痂自結死肉自潰又免皴揭之痛殊有神效蓋當歸地黃麻油二蠟主生肌止痛補血續筋與新肉相宜也當歸生地黃各一兩麻油六兩黃蠟一兩上先將當歸地黃入油煎黑去渣入蠟溶化候冷攪勻即成膏矣用白蠟尤妙保生救苦散治火燒湯燙或熱油烙及脫肌肉者寒水石大黃黃柏各三錢上為末香油調塗患處或濕爛干撒東垣方單用寒水石不計多少為極細末油調塗之或幹上其痛立止並不作膿無分毫苦楚日近完復永無破傷風證赤石脂散治湯火所傷赤爛熱痛赤石脂寒水石上為末以新汲水調塗傷處黑白散治湯燙火燒傷百草霜輕粉減半上為末狗油調擦患處立愈一白散治湯燙火燒破痛不可忍生白礬不拘多少香油調擦一方用黑礬一合新汲水和勻頻掃患處緑白散治湯燙火燒疼痛苦參不拘多少為細末每用以小油擦一方治火燒桐油水銀各等分上二件以柳枝不住手攪成膏再入大黃石膏末和以牛皮膠入少水溶開外用貓兒肚底毛細剪撒上貼之清煙膏雞子清磨京墨塗患處上用三層濕紙蓋則不起泡冷如冰效一黃散大黃一味為末蜜水調擦一方治湯所傷止痛生肌大黃當歸各等分上為末以清油調敷濕則干撒一方治湯火傷未成瘡者小麥炒黑膩粉減半上為末油調塗之一方治湯火瘡用發一束香油煎以發盡為度放冷掃患處一方用麩皮炒黑為末敷上神效此方有補性始終皆可用一方用螺螄殼多年乾白者火煅為末撒瘡上一方用蛤蜊殼炙焦黃研細以生香油調膏敷之或以蜜調不膿不痂一方取舊烹銀爐中燒過焦黃土研細如粉以生薑汁調於帛上貼之痛止一方用熔銀鍋之細末油調敷佳一方槐子燒灰香油調上即好或槐皮炒為末亦可一方用劉寄奴為末先以糯米漿雞翎掃傷處後撒藥末在上並不痛亦無痕一方用榆白皮為末豬油調塗愈一方用杉皮燒灰存性為末濕用干撒乾用雞子清調塗一方先以酒洗次以楊梅樹皮為末香油調敷一方用雞子黃十個入銀石器內熬自然油調好粉敷之愈一方治湯火灼未成瘡者用艾白根燒灰雞子黃和敷之如已成瘡白蜜封之以竹中膜貼上日三一方治被湯熱油痛不可忍取廁下黑瘀泥量傷大小斟酌多少次以老薑汁麻油十分之一共研令勻擦傷處立愈一方以青黛敷之妙一方熱油澆外痛以蜜敷之立安一方治湯火瘡爛者黃蜀葵花落者淨器收之入水些少待爛成水敷上神妙一方治火瘡敗壞用雲母粉同生羊髓和塗之一方治火瘡未起梔子仁燒灰麻油和封之厚乃佳如已成瘡燒白糖灰粉敷之燥即瘥黃白散治湯火瘡榆樹根白皮為末一兩黃丹二錢上攪勻看瘡大小用井花水調敷患處若干再以涼水敷之不惟止痛三五日即痊或人家失火燒了畜牲照患處塗之須臾流水出可治不流水是燒得太重不可治也然人被燒亦同此斷一方治中熱油及火燒除外痛丹參八兩細銼以水微調取羊脂二斤煎三上三下以敷瘡上愈一方治熱酒傷糯米粉炒黑為末酒調之治湯火傷內服方加味四物湯治為湯火傷發熱作渴小便赤澀用此養陰血以消毒當歸川芎芍藥生地薑酒炒山梔子連翹甘草上銼水煎服加味四君子湯治湯火傷患處肉未死而作痛用此健脾胃以消毒人參白朮茯苓甘草川芎當歸山梔子連翹上銼水煎服若患處肉死已潰而不收斂者用四君子加芎歸黃耆加味八珍湯治患處肉已死而不潰用此補氣血以排膿人參白朮茯苓甘草當歸川芎白芍地黃酒炒白芷上銼水煎服如未應加肉桂治煙燻方一方治煙燻致死者用蘿蔔搗爛取汁灌之即蘇錦衣楊永興廚下夜間回祿凡睡此房已死將死者灌以蘿蔔汁良久悉愈凡罹此患者以此治之其應如響
