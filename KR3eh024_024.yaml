body:
  text: 卷二十四痰飲論選要論曰痰飲為病所感不同有因氣脈閉塞津液不通水飲留停脾胃鬱結而成痰者有脾胃虛弱不能運行水穀而成痰者有因酒後飲水停滯胃中而成痰者有因風寒濕熱之氣入脾相搏而成痰者或喜怒哀樂之過情飲食起居之不節濕熱內蘊風寒外搏皆為痰飲所得之由不同而所變之病甚多或為寒或為熱或為喘嗽嘔吐或為翻胃膈噎以至為腫滿為眩暈為風癇為噯氣為吞酸為嘈雜為痞膈為疼痛為怔忡此皆痰之為病也又有五飲一曰懸飲者飲水流於脅下咳唾引痛二曰溢飲者飲水流行歸於四肢當汗出而不汗出身體疼重三曰支飲者咳逆倚息短氣不得臥其形如腫四曰痰飲者其人素盛今瘦水走腸間瀝瀝有聲五曰留飲者背惡寒或短氣而渴四肢歷節疼痛脅下痛引缺盆咳嗽轉甚此五飲為病不同也治法懸飲當下之溢飲當發其汗支飲則隨證汗下痰飲則用溫藥從小便利之東垣謂脾土上應於天亦屬濕化所以水穀津液不行即停積而為痰飲也故有五痰之分言其濕熱相乘也如濕在心經為熱痰結而如膠其色紅濕在肝經為風痰其色青如沫濕在脾經為濕痰濕久而熱其色黃濕在肺經為氣痰其色白咯出如米粒濕在腎經為寒痰其色黑如涕由此言之穢氣淫邪乘於脾胃津液不布積為痰飲也亦必從其所乘之氣兼化而為五痰也夫人之氣貴乎順氣順則津液流通而無痰飲之患亦有氣體虛寒不能攝養腎水使邪水溢土多生痰唾又當溫利之八味丸黑錫丹主之或脾胃為物所傷而停積者五套丸破飲丸主之臨病之際更宜詳審集略論曰人之一身氣血清順則津液流通何痰之有痰因腎虛脾濕而生各經有病皆能致痰當隨其各病之根而治之七情鬱結或飲食過傷或色欲無度或六淫侵胃當汗不汗或資稟充實表密無汗皆使津液不行聚為痰飲其為病也為喘為咳為嘔為瀉為眩暈嘈煩忪悸懊憹寒熱疼痛腫滿攣癖癃閉痞膈如風如癲如傷寒狀但頭不痛項不強為異或有似邪祟者種種難名使人口燥咽乾大便秘面如枯骨毛髮焦槁婦人則月水不通王隱君以痰之新久分清濁仲景有四飲之說曰懸溢支痰子和有五痰之論曰風熱濕酒食不可用烏附香燥之藥以致膈噎反胃當順氣為先實脾為本可表者汗之可下者利之在上吐之滯者導之郁者揚之熱者清之寒者溫之濕者燥之頑者軟之食積消之偏熱偏寒者反佐而行之挾濕者淡以滲之挾虛者補而養之中氣虛者則固中氣以運痰若攻之太重則胃氣虛而痰愈盛矣本非虛也治以滋陰退熱之劑不知寒補之藥極滯痰氣反延綿而愈劇也本非風也治以疏風利氣之藥則氣愈虛而痰愈作矣或曰近世當土運是以人無疾而亦痰調養之法平七情以舒郁攝腎水以防邪謹出入以避六淫絕厚味以除蘊熱不能中節豈無壅滯乎仲景云有痰飲有懸飲有溢飲有支飲其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲病痰飲者當以溫藥和之又云心下有痰飲者苓桂甘術湯主之飲後水流在脅下咳唾引痛謂之懸飲病懸飲者十棗湯主之飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲病溢飲者當發其汗大小青龍湯主之咳逆倚息短氣不得臥其形如腫謂之支飲支飲胸滿者厚朴大黃湯主之人咳數年其脈弱者可治實大數者死其脈數者必苦冒眩其人本有支飲在胸中故也治象飲家支飲亦喘而不能臥加短氣其脈平也水在肺吐涎沫欲飲水水在脾少氣身重水在肝脅下支滿嚏而痛水在腎心下悸嘔吐心下痞者胸中有水宜半夏茯苓湯主之嘔家本渴今反不渴心下有支飲故也小半夏湯主之又云先渴卻嘔者水停心下小半夏加茯苓湯主之卒嘔吐心下痞眩悸者膈間有水半夏加茯苓湯主之瘦人臍下有悸吐涎沫而癲眩者此水腠五苓散主之胸滿目眩者苓桂甘術湯主之又云心下有支飲其人苦冒眩澤瀉湯主之膈上病痰滿喘咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤劇必有伏飲脈大心下有留飲其人背寒冷病人臂不時疼痛其脈沉細非風也必有飲在上焦其脈虛者為微勞營衛氣不和故也久久自瘥脈虛茯苓丸不虛控涎丹渴而小便不利宜五苓散主之腹滿口舌乾燥此腸間有水氣己椒藶黃丸主之病者脈伏其人慾自利利反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之小便不利四肢沉重疼痛自利者此為水氣宜用真武湯去芍藥加乾薑主之久病傷寒表不解嘔咳自利者此為水氣宜小青龍湯去麻黃加芫花主之皮膚粗如枯魚之鱗者水飲候也色鮮明者有留飲洞虛子曰痰證一條古今未詳余自幼多病莫識其原或成偏頭風成雷頭風成太陽頭痛眩暈如坐舟車精神恍惚或口眼瞤動或眉稜耳輪俱癢或頜腮四肢遊風腫硬似疼非疼或渾身燥癢搔之則癮疹隨生皮毛烘熱色如錦斑或齒頰似癢似痛而疼無定所滿口牙浮痛癢不一或噯氣吞酸鼻聞焦臭喉覺豆腥氣心煩鼻塞咽嗌不利咯之不出咽之不下或因噴嚏而出或因舉動而唾其痰如墨又如破絮或如桃膠或如蜆肉或心下如停冰鐵閉滯妨悶噯嚏連聲狀如膈氣或足膝痠軟或骨節腰腎疼痛呼吸難任或四肢肌骨間痛如擊戳乍起乍止並無常所或不時手臂麻疼狀如風濕或臥如芒刺不安或如毛蟲所螫或四肢不舉或手足重滯或眼如姜蟄膠黏癢澀開闔甚難或陰晴交變之時胸痞氣結閉而不發則齒癢咽痛口糜舌爛及其奮然而發則噴嚏連聲初則涕唾稠黏次則清水如注或眼前黑暗腦後風聲耳內蟬鳴眼瞤肉惕治之者或曰腠理不密風府受邪或曰上盛下虛或曰虛或曰寒或曰邪熱並無一說對證余自思父母俱有痰疾我稟此疾則與生俱生也當自為計故於靜室默坐熟察病勢之來則於胸腹間如有二氣交紐遂噎塞煩郁有如煙火上衝頭面烘熱眼花耳鳴痰涎涕淚並從肺胃間湧起凜然毛豎噴嚏千百然後遍身煩躁大寒之時即盡去衣衾裸體一凍則稍止片時或春秋乍涼之時則多加衣衾亦暫少緩或頓飲冰水而定或痛飲一醉而安終不能逐去病根故精心內觀反復思慮制滾痰丸因獲大效自是愈人數萬神效殊異但不欲輕傳匪人恐人視為泛常妄自加減不能濟眾也又曰治痰必先理氣蓋憂思損志氣鬱涎凝氣治則痰散也然而痰因氣結氣因痰滯其如痰何余故用滾痰丸逐去滯凝惡物如用兵討叛新民也況有稟賦痰證如嬰兒出腹已有痰涎大善知識頓抱痰疾此豈因氣而然乎故學者不可固執一端不通劉宗厚曰痰之為病仲景論四飲六證無擇敘內外三因俱為切當蓋四飲則敘其因痰而顯諸證者三因則論其因有所傷而生痰者也惟王隱君論人之諸疾悉出於痰此發前人所未論可謂深識痰之情狀而得其奧者矣制滾痰丸一方總治斯疾固為簡便較之仲景三因有表裡內外而分汗下溫利之法則疏闊矣況又有虛實寒熱之不同者哉夫痰病之原有因熱而生痰者亦有因痰而生熱者有因風寒暑濕而得者有因驚而得者有因氣而得者有因飲酒而得者有因食積而得者有脾虛不能運化而生者有腎虛不能降火而生者若熱痰則多煩熱風痰多成癱瘓奇證冷痰多成骨痹濕痰多倦怠軟弱驚痰多成心痛顛疾飲痰多成脅痛臂痛食積痰多成癖塊痞滿其為病狀種種難名王隱君論中頗為詳盡學者但察其病形脈證則知所挾之邪隨其表裡上下虛實以治也若夫子和謂飲無補法必當去水故用吐汗下之三法治人常愈又論熱藥治痰之誤固為詳切亦有挾寒挾虛之證不可不論夫久痰凝結膠固不通狀若寒凝不用溫藥引導必有拒格之患況有風寒外束痰氣內郁者不用溫散亦何以開鬱行滯又有血氣虧乏之人痰客中焦閉塞清道以致四肢百骸發為諸病理宜導去痰滯必當補瀉兼行又難拘於子和之三法也大凡病久淹延卒不便死者多因食積痰飲所致何以然者蓋胃氣亦賴痰積所養飲食雖少胃氣卒不便虛故也亦有治痰用峻利過多則脾氣愈虛津液不運痰反生而愈盛法當補脾胃清中氣則痰自然運化此乃治本之法也謂醫中之王道者正此類也丹溪曰有熱痰有濕痰有酒痰有食積痰有風痰有寒痰有老痰熱痰用青黛黃連及青礞石丸最捷濕痰身多軟而重用蒼朮白朮又曰濕痰用黃芩香附半夏貝母熱痰加瓜蔞青黛酒痰用瓜蔞青黛蜜丸噙化食積痰用神麯麥芽山楂或化痰丸氣虛者用補氣藥送之風痰多見奇證風痰用南星白附子寒痰用半夏盧氏注曰凝結清冷其狀若寒實非寒也然亦有用溫藥者蓋寒因熱用使之為引導而無捍格之患也老痰用海石香附半夏瓜蔞五倍子一云五倍子佐他藥大治頑痰痰結核在咽喉嗽而不能出化痰藥加咸能軟堅之味瓜蔞仁杏仁海石桔梗連翹少佐以朴硝用薑汁蜜丸噙之痰在脅下非白芥子不能達痰在四肢非竹瀝不行痰在皮裡膜外非竹瀝不除氣虛之人有痰非竹瀝不開痰在腸胃間可下而愈用小胃丹痰之為物隨氣升降無處不到脈浮當吐痰在膈上必用吐膠固稠濁者必用吐痰在經絡中者非吐不可出吐中就有發散之意凡吐法宜先升提其氣用防風山梔川芎桔梗芽茶生薑之類或就以此藥探吐吐時必先以布勒腰腹於不通風處行之吐藥用蘿蔔子半升擂和以漿水一碗去渣入少油與蜜溫服或用蝦半斤入醬蔥姜等物料水煮先吃蝦後飲汁少時以鵝翎探吐其鵝翎須先以桐油浸以皂角水洗曬乾待用如服瓜蒂散藜蘆等藥不用探法自吐虛人中焦有痰胃氣亦賴所養卒不可便攻攻盡則愈虛治痰用利藥過多致脾氣下虛則痰反易生而多許學士用蒼朮治痰挾瘀血成窠囊行痰極效二陳湯一身之痰都管治痰要藥也欲下行加引下藥欲上行加引上藥枳實瀉痰能沖牆倒壁黃芩治痰假其下火也天花粉能降上膈熱痰海粉熱痰能降濕痰能燥頑痰能消人中黃飯丸如綠豆大每服十五丸湯下能降陰火清痰治食積痰因火盛逆上治火為先白朮黃芩軟石膏之類久病陰火上升津液生痰不生血宜補陰制相火其痰自除血藥必用薑汁傳送內傷挾痰必用參耆白朮之屬多用薑汁傳送或加半夏虛甚加竹瀝中氣不足加參朮脾虛者宜清中氣以運痰降下二陳湯加白朮之類兼用升麻提起實脾土燥脾濕是治其本痰成塊吐咯不出氣鬱滯者難治凡風痰必用風痰藥如白附子天麻雄黃牛黃片芩殭蠶豬牙皂角之類凡人身上中下有塊者多是痰問其平日好食何物吐下後方用藥眩運嘈雜乃火動其痰用二陳湯加山梔子黃連黃芩之類噫氣吞酸此食鬱有熱火氣上動黃耆為君南星半夏為臣橘皮為使熱多加青黛喉中有物咯不出咽不下此是老痰重者吐之輕者用瓜蔞輩氣實必用荊瀝痰在膈間使人癲狂或健忘或風痰皆用竹瀝亦能養血與荊瀝同功治稍重能食者用此二味效速穩當二瀝治痰結在皮裡膜外及經絡中痰必佐以薑汁韭汁治血滯不行中焦有飲自然汁冷吃兩三銀盞必胸中煩躁不安而後愈參萸丸能消痰又曰痰之為病方論少有細述之者近惟三因略言亦無加減法夫痰之源不一有因痰而生熱者有因熱而生痰者有因氣而生者有因風而生者有因驚而生者有積飲而生者有多食而生者有因暑而生者有傷冷物而成者有脾虛而成者有飲酒而成者其為病也驚痰則成心包痛癲疾熱痰則生煩躁頭風爛眼燥結怔忡懊憹驚眩風痰成癱瘓大風眩暈暗風悶亂飲痰成脅痛四肢不舉每日嘔吐食痰成瘧痢口出臭氣暑痰中暑眩冒黃疸頭痛冷痰骨痹四肢不舉氣刺痛酒痰飲酒不消但得酒次日又吐脾虛生痰食不美反胃嘔吐氣痰攻注走刺不定婦人於驚痰最多蓋因產育交接月事方行其驚因乘而入結成塊者為驚痰必有一塊在腹發則如身孕轉動跳躍痛不可忍凡人手臂或動不得或骨節遍身痛坐臥不安此痰入骨也有人腳氣久不治骨節痛與腳氣藥不效此痰病也凡傷寒病後嘔吐藥不得入亦因初病胸中有痰涎也或因下之太早而遂議其非痰未為確論傷寒發黃亦是痰病蓋因熱搏而成凡大便秘者亦是痰結凡有痰者眼皮及眼下必有菸灰黑色舉目便知不待切脈眼黑而頰赤者熱痰也面大黃色亦熱痰也外證必煩滿膈熱口乾思冷大便秘結小便赤熱久必生風或眩暈耳鳴眼花多虛證治之而用熱藥服久必脈大實發大熱而中風可急下之眼黑而行步呻吟舉動艱難者入骨痰也其證遍體骨節疼痛眼黑而面帶土色四肢痿痹屈伸不便者風濕痰也眼黑而氣短促者驚風痰也左右關脈大者膈中有痰也可吐之怕吐者消息下之凡人每日背上一條如線而寒起者宜吐下之凡人百藥不效其關上脈伏而大者痰也用妙應丸加減法妙應丸即控涎丹葉氏曰飲凡有六懸溢支痰留伏痰飲特六者之一耳人病此而止曰痰飲者蓋停滯既久未有不因氣道閉塞津液不通而為痰多之患者也譬如溝渠壅滯則倒流之水逆上瘀濁臭穢無所不有若不疏決而欲澄清者未之有也或問痰與飲何異曰子和謂飲乃水濕所為久久則變而為痰也是飲為痰之漸痰為飲之積然其得之之源不越乎六淫七情及飲食所治耳痰飲為病變生不一有卒然昏悶口眼喎邪似中而實非中四肢戰曳身如浮雲似虛而實非虛又有人忽患胸背手足頸項腰胯痛不可忍連筋骨牽引吊痛走易不定俗醫謂之走注用風藥針灸不效又疑風毒結聚欲成癰者妄以貼藥亦不效或頭痛不可舉或神意昏倦多睡或飲食無味痰唾稠糊喉中如鋸多流涎沫手足重墜痹冷認為癱瘓者或寒熱往來似瘧非瘧似勞非勞而醫疑惑者凡此數者皆痰飲之為患也乃是頑涎伏在心膈上下變為他疾不可不審治法當以消飲為先痰去飲消則諸證自愈王節齋曰痰屬濕乃津液所化因風寒濕熱之感或七情飲食所傷以致氣逆液濁變為痰飲或吐咯上出或凝滯胸膈或留聚腸胃或客於經絡四肢隨氣升降遍身上下無處不到其為病也為喘為咳為噁心嘔吐為痞隔壅塞關格異病為泄為眩暈為嘈雜怔忡驚悸為癲狂為寒熱為痛腫為癖積或胸間轆轆有聲或背心一點常如冰冷或四肢麻木不仁皆痰所致百病中多有兼痰者世所不知也痰有新久輕重之殊新而輕者形色清白稀薄氣味亦淡久而重者黃濁稠黏凝結咳之難出積成惡味酸辣腥臊鹹苦甚至帶血而出治法痰生於脾胃宜實脾燥濕又隨氣而升宜順氣為先分導次之又氣升屬火順氣在於降火熱痰則清之濕痰則燥之風痰則散之郁痰則開之頑痰則軟之食積痰則消之在上者吐之在中者下之中氣虛者宜固中氣以運痰若攻之太過則胃氣虛而痰愈盛矣王節齋化痰丸論曰痰者病名也人之一身血氣清順則津液流通何痰之有惟夫氣血濁逆則津液不清熏蒸成聚而變為痰焉痰之本水也原於腎痰之動濕也主於脾古人用二陳湯為治痰通用者所以實脾燥濕治其標也然以之而治濕痰寒痰痰飲痰涎則是矣若夫痰因火上肺氣不清咳嗽時作及老痰鬱痰結成黏塊凝滯喉間吐咯難出此等之痰皆因火邪炎上熏於上焦肺氣被郁故其津液之隨氣而升者為火熏蒸凝濁鬱結而成歲月積久根深蒂固故名老名郁而其原則火邪也病在上焦心肺之分咽喉之間非中焦脾胃滋痰冷痰痰飲痰涎之比故湯藥難治亦非半夏茯苓蒼朮枳殼南星等藥所能治也惟開其鬱降其火清潤肺金而消化凝結之痰緩以治之庶可效耳制化痰丸主之李氏曰痰乃津液所成隨氣升降氣血調和則流行不聚內外感傷則壅逆為患新而輕者形色青白稀薄氣味亦淡久而重者黃濁稠黏凝結咯之難出漸成惡味酸辣腥臊鹹苦但痰證初起頭痛發熱類外感外證久則潮咳夜重類內傷陰火又痰飲流注肢節疼痛類風證但痰證胸滿食減肌色如故脈滑不勻不定為異耳人知氣血為病而不知痰病尤多生於脾多四肢倦怠或腹痛腫脹泄瀉名曰濕痰若挾食積瘀血遂成窠囊痞塊又名食痰留於胃脘多嘔吐吞酸嘈雜上衝頭面烘熱名曰火痰若因飲酒乾嘔噯臂脅痛又名酒痰升於肺多毛焦面白如枯骨咽乾口燥咳嗽喘促名曰燥痰久為老痰鬱痰又七情痰滯咽膈多胸脅痞滿名曰氣痰迷於心多怔忡癲狂夢寐奇怪名曰熱痰動於肝多眩暈頭風眼目瞤動昏澀耳輪搔癢脅肋脹痛左癱右瘓麻木倦疲奇證名曰風痰聚於腎多足膝痠軟腰背強痛肢節冷痹骨痛名曰寒痰又名虛痰凡渾身習習如蟲行或身中結核不紅不腫或頸項結核似癧非癧或走馬喉痹或胸腹間如有二氣交扭噎塞煩悶或背中常有一點如冰冷痛或心下冰冷時痛或四肢腫硬似痛非痛或骨節刺痛無常處或吐冷涎綠水黑汁或大小便膿或關格不通以至勞瘵荏苒婦人經閉小兒驚搐皆須先去敗痰然後調理他時鬥家胸骨撲傷刺痛不已散血之劑罔功續以自己小便飲之須臾吐痰其痛立止百病兼病如此風痰外感賊邪或腎枯木動或內風鬱熱色青而光風虛三生飲古龍虎丹風熱小省風湯搜風化痰丸四神丹竹瀝膏寒痰因形寒飲冷色深青黑如灰善唾或喘輕者五積散藿香正氣散重者溫中化痰丸古半硫丸濕痰或外感濕滯或停飲不散色白喘急者千緡湯心痛者單半夏丸或神術丸濕熱色黃者中和丸清膈蒼莎丸在裡者青礞石丸熱痰因厚味積熱或外感誤溫所致色黃甚則帶血或紫清氣化痰丸煎服或大金花丸滾痰丸火痰因飲食衣褥過厚火蒸津液成痰稠濁二陳湯加芩連山梔或抑上丸潤下丸郁痰即火痰鬱於心肺之久者凝滯胸膈稠黏難咯忌南星半夏燥藥宜開鬱降火清金潤肺緩以治之節齋化痰丸謝傳清金丸單貝母丸霞天膏氣痰七情郁成咯之不出咽之不下形如破絮或如梅核四七湯久者換蘇子加黃芩山梔海石三仙丸千金指迷丸食痰因飲食不化結成痞塊橘半枳殼丸痰壅喘急者瓜蔞枳實丸山楂麥芽煎湯下陰虛者黃白丸傷水心中堅大如杯者名曰氣分枳朮丸料煎服痰癖硬如杯時有水聲者神保丸酒痰小調中湯香附瓜蔞青黛丸痰伏胞絡自肺竅嗽出涎伏脾元自口角流出飲生胃腑從食脘吐出五飲六證留飲伏飲合為一也皆因飲水及茶酒停蓄不散再加外邪生冷七情相搏成痰即酒痰久而濕勝者與傷寒水證大同脈多弦滑或伏眼下皮如灰黑痰飲水停腸胃腹響轆轆有聲令人暴肥暴瘦懸飲水流在脅咳嗽則痛懸懸思水溢飲水流四肢身體重痛支飲水停膈上咳逆倚息短氣留飲水停心下背冷如手掌大或短氣而渴四肢歷節疼痛脅痛引缺盆咳嗽轉甚伏飲水停膈滿嘔吐喘嗽發熱惡寒腰背痛淚出或身惕肉瞤仲景治諸飲在皮裡膜外表分者大小青龍湯汗之在胸者瓜蒂散吐之在四肢經絡脅肋者五苓散分利之在腸胃裡分者十棗湯下之此皆治標之霸道也從輕汗以參蘇飲吐以二陳湯加防風桔梗探之分利五飲湯下劑開結枳實丸中間以小半夏湯古葶棗散枳朮丸溫中化痰丸清氣化痰丸半夏溫肺湯隨虛實加減不必太泥古法順氣為先分導次之然氣升屬火因氣動者曰痰氣順氣導痰湯因火動者曰痰火清熱導痰湯因濕動者曰濕痰導痰湯主之通用二陳湯能使大便潤而小便長尤為分導要藥風加南星皂角附子竹瀝寒倍半夏加薑附薑汁火加石膏青黛濕加蒼朮白朮燥加瓜蔞杏仁老郁痰加海石芒硝瓜蔞食積加山楂神麯麥芽停水加檳榔痰在脅下加白芥子以行之痰在四肢加竹瀝痰在經絡用此探吐痰在皮裡膜外加白芥子竹瀝薑汁氣實用荊瀝痰原於腎動於脾客於肺水升火降脾胃調和痰從何生陽虛腎寒不能收攝邪水冷痰溢上或昏暈夜喘上氣者八味丸三味安腎丸黑錫丹以鎮墜之如痰壅發厥者蘇子降氣湯三生飲古硫汞丹脾虛不能運化者宜補中燥濕六君子湯加竹瀝薑汁勞役傷脾失升降者補中益氣湯加半夏竹瀝薑汁氣血虧乏痰客中焦閉塞清道者仍宜溫中燥脾二陳湯氣虛合四君子湯血虛合四物湯陰虛腎火炎上肺燥者二陳湯合四物湯去川芎半夏加貝母麥門冬瓜蔞仁桔梗潤而降之或腎氣丸三一腎氣丸語云痰無補法且老痰凝滯膠固暫用溫藥引導必有拒格之患風寒痰氣內郁不用溫散亦何以開結滯此皆難拘於無補也凡痰喘聲高脈散汗出如油身冰冷者死蔭按夫痰熱之原有因熱而生痰者有因痰而生熱者因熱而生痰者熱則熏蒸津液而成痰因痰而生熱者痰則阻礙氣道而生熱夫熱生痰而痰生熱始終新久之謂也學者辨之脈法要略云脈雙弦者寒飲也肺飲不弦但苦喘短氣脈浮而細滑者傷飲脈弦數有寒飲春夏難治脈沉而弦者懸飲內痛陳無擇曰飲脈皆弦微沉滑或云左右手關前脈浮弦大而實者膈上有稠痰也宜吐之而愈病人百藥不效關上脈浮而大者痰也眼胞及眼下如炭煙燻黑者亦痰也丹溪曰久得澀脈痰飲膠固脈道阻澀也卒難得開必費調理脈訣舉要曰偏弦為飲或沉弦滑或結或伏痰飲中節脈理提綱曰痰脈弦滑通治諸痰方二陳湯治痰飲為患或嘔逆噁心或頭眩心悸或中脘不快或因食生冷飲酒過度脾胃不和並皆治之半夏湯泡七次二錢陳皮去白茯苓各一錢甘草炙五分上銼作一服加生薑三片水煎溫服蔭按惟二陳湯一身之痰無不治但在上加引上藥在下加引下藥引上加升麻防風之類引下加黃柏防己木通之類如偏頭痛在右本方加川芎白芷防風荊芥薄荷升麻之類在左本方合四物湯亦加防風荊芥薄荷細辛蔓荊子柴胡酒片芩之類頂痛者加川芎藁本升麻柴胡蔓荊子細辛薄荷等如痰在腰胯膝下腫痛加蒼朮防己木通黃柏萆薢牛膝之類如痰在胸腹中作痛作痞滿加白朮神麯麥芽砂仁之類如痰在脅下作痛或漉漉有聲加柴胡青皮川芎芍藥之類如痰在經絡中或胸背手足臂膊作痛者在上加防風羌活威靈仙在下加防己牛膝木通之類冬月加烏附行經如風痰壅盛喘急咳嗽不安加防風羌活南星枳殼皂角之類如熱痰為痛腹脹喘滿加黃芩黃連梔子瓜蔞仁滑石石膏竹瀝之類如濕痰身重倦怠加蒼朮白朮南星之類如酒痰加葛根枳殼砂仁神麯麥芽之類食積痰加神麯麥芽山楂炒黃連枳實以消之寒痰加乾薑附子益智草豆蔻之類氣痰加木香檳榔砂仁枳殼烏藥香附之類燥痰加瓜蔞仁杏仁貝母五味子之類陰虛咯血痰嗽加天門冬知母黃柏貝母款冬花紫菀兜鈴之類如痰在中焦作噯氣吞酸胃脘當心而痛或嘔吐清水噁心等證多加白朮蒼朮神麯麥芽川芎砂仁草豆蔻枳實豬苓澤瀉黃連吳茱萸梔子仁木香檳榔之類作丸服之血虛有痰者加天門冬貝母瓜蔞仁香附米竹瀝帶血者再加黃芩白芍藥桑白皮血滯不行中焦有飲者去竹瀝加生薑韭汁氣虛有痰者加人參白朮脾虛者宜補中益氣降痰於內加白朮白芍藥神麯麥芽兼用升麻提起內傷挾痰加人參黃耆白朮之類薑汁傳送或加竹瀝尤妙方古庵曰二陳湯治痰之主藥也如寒痰加附子薑桂濕痰加蒼白二術食積痰加曲芽山楂熱痰加芩連梔子風痰加南星皂角燥痰加瓜蔞青黛郁痰加枳殼香附老痰加海石朴硝此方半夏豁痰燥濕橘皮消痰利氣茯苓降氣滲濕甘草補脾和中可謂體用兼賅標本兩盡之藥也今人但見半夏性燥便以他藥代之殊失立方之旨若果血虛燥證用薑汁製用何妨趙敬齋曰夫二陳湯內有半夏性燥熱若風痰寒痰食痰則相宜若勞疾吐血諸血證皆不可用以其能燥血氣干津液也天道暑熱之時亦當禁用抑痰藥數多何必拘拘二陳湯之半夏哉韓飛霞曰痰分之病半夏為主脾主濕故半夏之辛燥濕也然必造而為曲以生薑自然汁生白礬湯等分共和造麴楮葉包裹風乾然後入藥如風痰以牙皂煮汁去渣煉膏如餳入薑汁如火痰黑色老痰以竹瀝或荊瀝入薑汁濕痰白色寒痰清以老薑煎濃湯加煅白礬三分之一加半夏三兩白礬一兩俱造麴如前法古方二陳湯以此為君世醫因辛反減至少許蓋不造麴之過佐以南星治風痰以薑汁酒浸炒黃連及瓜蔞實香油拌曲略炒之類治火痰以麩炒枳殼枳實薑汁浸蒸大黃海粉之類治老痰以蒼白朮俱米泔薑汁浸炒甚至乾薑烏頭皆治濕痰而常有脾泄者以肉豆蔻配半夏曲加神麯麥芽作丸有奇效枳朮二陳湯半夏橘紅茯苓各一錢甘草枳實麩炒白朮各五分上銼水二鍾加生薑三片煎服隨證加減見前導痰湯治一切痰涎壅盛或胸膈留飲痞塞不通及眩暈等症半夏湯泡二錢南星煨制橘紅枳實麩炒白茯苓各一錢甘草炙五分上銼加生薑五片水煎食後服一方枳實作枳殼如久嗽肺燥熱者去半夏加五味子九枚杏仁泥五分蔭按陶節庵治內傷七情及痰迷心竅神不守舍憎寒壯熱頭痛昏迷如傷寒證如鬼祟狀者以導痰湯加白朮桔梗黃芩黃連瓜蔞仁人參姜三片棗二枚又入薑汁竹瀝溫服惟年力壯盛先用吐痰法次服此半夏湯一名桔梗湯順陰陽消痞滿消酒化痰及治嘔逆吐涎沫半夏薑製橘皮去白桔梗各一兩枳實麩炒半兩上㕮咀每服五錢加生薑五片水煎食遠熱服化痰丸治停痰宿食半夏湯泡人參白朮枳實白茯苓桔梗香附各一兩前胡去蘆甘草各半兩上為末用薑汁煮糊丸如桐子大每服四五十丸薑湯下化痰丸快脾順氣消食化痰南星去皮切塊四兩用皂角生薑白礬各三兩同煮無白星為度取出曬乾皂角不用半夏四兩香附瓜蔞仁去殼另研陳皮去白茯苓紫蘇子炒蘿蔔子炒杏仁去皮尖另研枳殼麩炒各二兩上為末薑汁浸蒸餅為丸如桐子大每服一百丸臨臥或食後用茶湯下酒痰加青皮葛根食積痰加神麯麥芽山楂各二兩氣壅者加沉香五錢熱痰加枯芩青黛各一兩利膈化痰丸治痰火大盛胸膈迷悶嘔吐煩躁頭眩咳嗽南星煨制蛤粉半夏湯泡貝母去心瓜蔞仁香附子童便浸各半兩上為末用豬牙皂角十四挺敲碎水一碗半再用杏仁去皮尖一兩煮水將干去皂角擂杏仁如泥入前藥搜和再入薑汁泡蒸餅丸如綠豆大青黛為衣每服五十丸薑湯下抑痰丸瓜蔞仁一兩半夏二錢貝母三錢上為末蒸餅為丸如麻子大每服一百丸薑湯下半夏丸治痰嗽半夏湯泡七次去皮臍焙乾瓜蔞仁另研各一兩上為細末薑汁糊為丸服單貝母丸治痰要藥貝母一味不拘多少上用童便浸春夏一日秋冬三日洗淨曬乾為末糖霜調和不時服之或白湯調服或加童便制香附為丸亦可法制半夏消飲化痰健脾順氣半夏一斤先以湯泡一遍去皮臍再泡洗七遍焙乾次用白礬六兩硝石四兩煮水六碗卻將半夏入藥水內浸三宿取出又入清水內浸七日取出切片加薄荷四兩甘草二兩用磁器收貯食後生薑湯下法制陳皮潘寅所傳廣陳皮一斤用滾水略泡一時去水刀刮去白以薄為妙曬乾另用烏梅肉五錢青鹽三錢井水七八盞煎至五盞去渣下陳皮同煮半時取起將陳皮曬乾仍下前汁煮又曬以汁盡為度再曬乾量熟蜜浸半月任用治熱痰方清氣化痰湯治一切痰火橘紅白朮各一錢半夏曲貝母白茯苓桔梗香附枳殼麩炒竹茹各八分梔子青黛各五分甘草四分上銼加生薑二片水煎服春夏月火盛時再加芩連各八分余月斟酌清熱化痰湯化熱痰清鬱氣亦可常服半夏薑湯一錢二分枳實香附童便浸貝母去心各一錢半白茯苓山楂各一錢橘紅黃連炒各八分桔梗蒼朮米泔浸各七分甘草二分上銼一服加生薑三片水二鍾煎至一鍾食遠溫服如痰氣壅上加蘇子降氣湯視病之增減消息服之清熱導痰湯治憎寒壯熱頭目昏沉迷悶上氣喘急口出涎沫證類傷寒此因內傷七情以致痰迷心竅神不守舍神出則舍空空則痰自生也黃連枳實瓜蔞仁南星半夏陳皮茯苓桔梗黃芩人參白朮甘草上銼散每服一兩加生薑三片棗一枚水煎入竹瀝薑汁服黃連導痰湯半夏陳皮茯苓甘草黃連枳實上銼加生薑煎服芩連二陳湯橘皮半夏白茯苓白朮黃芩酒炒川芎黃連酒炒天花粉各一錢軟石膏二錢薄荷八分防風羌活各五分甘草炙三錢上銼加生薑三片水煎食遠服加味二陳湯瀉肺胃火消痰止嗽陳皮去白杏仁去皮尖各一錢半白茯苓貝母去心半夏湯泡瓜蔞仁桔梗前胡去蘆片芩各一錢枳殼麩炒石膏各八分甘草炙三分上銼加生薑三片水煎食遠服又加味二陳湯半夏湯泡透白茯苓各一錢半橘紅一錢二分白朮黃芩各一錢香附米童便浸山楂肉各八分甘草炙七分桔梗炒南星炮熟各五分當歸酒洗黃連薑汁炒各六分神麯炒枳實麩炒各四分上銼水煎加薑汁竹瀝食後服又一方加獨活黃柏木瓜蒼朮倍半夏陳皮茯苓桔梗理中豁痰湯治膈上胃中痰最妙白朮白芍藥酒炒各一錢半陳皮八分人參半夏泡透薑汁炒白茯苓瓜蔞仁各一錢天門冬去心大麥芽炒各八分香附米鹽水炒黃連薑汁炒黃芩酒炒桔梗各七分枳實麩炒甘草各五分上銼水二鍾入生薑汁竹瀝三分煎溫服豁痰丸治一切痰疾柴胡半夏洗去滑各四兩黃芩三兩人參風壅者不用赤甘草帶梗紫蘇陳皮去白厚朴薑汁炒南星去臍各二兩薄荷葉一兩半羌活去蘆一兩無怒氣者不用枳殼去穰麩炒上銼每服一兩加生薑三片水煎服王隱君曰余制此劑與滾痰丸相符蓋以小柴胡湯為主合前胡半夏湯以南星紫蘇橘皮厚朴之類出入加減素抱痰及肺氣壅塞者以柴胡為主余者並去柴胡用前胡為主中風者去陳皮入獨活胸膈不利者去陳皮加枳實去穰麩炒更加赤茯苓去皮內外無熱者去黃芩虛弱有內熱者勿去黃芩加南木香一切滾痰氣之藥無有出其上者氣無補法之說正恐藥味窒塞之故是以選用前件品味並是清疏溫利性平有效者也王隱君滾痰丸治濕熱食積一切宿滯之痰及諸般怪證括曰甑里翻身甲卦金於今頭戴草堂深相逢二八求斤正硝煅青礞倍若沉十七兩中零半兩水丸桐子意常斟千般怪證如神效水瀉雙身卻不任大黃酒蒸八兩黃芩酒洗八兩沉香五錢青礞石捶碎焰硝同入小砂罐內瓦片蓋之鐵線束定鹽泥固濟曬乾火煅紅候冷取出色如黃金一兩上為末水丸如桐子大每服三五十丸量病虛實加減多至百丸少至十丸食後溫水下蔭按原方服藥必須臨睡就床用熟水一口許只送過咽即便仰臥令藥在咽膈間徐徐而下如日間病出不測疼不可忍乾嘔噁心必於除差者須是一依臨睡服法多半日不可飲食湯水及不可起身坐行言語直候藥丸除逐上焦痰滯惡物過膈入腹然後動作方能中病每次須連進兩夜先夜所服次日痰物既下三五次者次夜減十丸下一二次者仍服前數下五七次或只二三次而病勢頓已者次夜減二十丸頭夜所服並不下惡物者次夜加十丸壯人病實者多至百九唯狂疾勁實及暴卒惡候多服無妨大抵服罷仰臥咽喉稠涎壅塞不利者乃痰氣泛上藥病相攻之故也少頃藥力既勝自然安貼若暴病服藥下咽即仰臥頓然百骸安靜五臟清平快利不可勝言間有片時倦怠者蓋連日病苦不安一時為藥所勝氣體暫和如醉得醒如睡方起即非虛倦也此藥並不洞泄刮腹大瀉但能取痰積惡物自腸胃次第穿鑿而下腹中糟粕並不相傷詳悉不能備述服者自然知之一切新久失心喪志或癲或狂等證每服一百丸人壯氣盛能飲食狂甚者一百二十丸以上至二三百丸以效為度一切中風癱瘓痰涎壅塞大便或通或結者每服八九十丸人壯氣盛者一百丸常服三二十丸無大便不利之患自有上清下潤之妙一切陽證風毒腳氣遍身遊走疼痛每服八九十丸未效更加十丸一切走刺氣痛每服七八十丸未效加十丸一切無病之人遍身筋骨等處平白疼痛不能名狀者每服七八十丸加至見效為度一切頭痛非頭風證牙疼或浮或癢非風蛀牙證者每服八九十丸一切因風因寒鼻塞聲重等證身體不痛非傷寒證者每服七八十丸痰盛人實者加丸數一切噎氣吞酸至於噯逆膈氣及胸閉或從腹中氣塊衝上嘔吐涎飲如翻胃者每服七八十丸未效再服一切心下怔忡如畏人捕怵惕不安陰陽關格變生乖證每服七十丸人壯病甚至九十丸一切失飢傷飽憂思過慮至於心下嘈雜或噦晝夜飲食無度或只虛飽腹中稍飢並不喜食每服七八十丸至九十丸一切新久痰氣喘嗽或嘔吐涎沫痰結實熱或頭暈目眩每服八九十丸虛老羸瘦者五六十丸未效加十丸一切急慢喉閉赤眼每服八九十丸甚者加丸數再服腮頷腫硬繞項熱核上若瘰癧者正宜服之口糜舌爛咽喉生瘡者每以五六十丸同蜜少許一處嚼破噙睡徐徐嚥下些少口瘡等證只以三二十丸如前噙三二夜即瘥一切遍身無故遊走疼痛或腫或攣痠軟沉滯者每服七八十丸至九十丸皆量其大小虛實輕重任意消息服之一切心氣冷痛如停冰塊或動身散入腹中絞痛上攻頭面腫硬遍身四肢腫起軟浮或痛或癢或穿或不穿或穿而復閉或此消彼長漸成篤疾此係痰毒內攻或使肺爛痰臭或作腸癰內疽每服量虛實加減服之以下惡物立見寬緩一切男子婦人大小虛實久患心疼下連小腹面黃羸瘦痛陣日發必嘔綠水黑汁冷涎乃至氣絕心下溫暖者並量大小多至七八十丸立見生意然後續續進之以瘥為度兼服生津化痰溫中理氣藥以全其功唯豁痰湯加減之法為妙一切荏苒之疾日久男子婦人之患非傷寒內外之證或酒色吐血或月水愆期心煩志亂或腹脹脅疼勞痛耳聵骨節痠痛乾嘔噁心諸般內外疼痛百藥無效病者不能喻其狀方書未嘗載其疾醫者不能別其證並依前法加減服潤下丸降痰甚妙橘紅半斤以水化鹽五錢拌勻以水煮乾為末半夏湯泡二兩南星湯泡黃芩黃連甘草炙各一兩上為細末蒸餅丸如桐子大每服五七十丸白湯下青礞石丸化痰降火一云治食積去濕痰風化硝三錢提淨者冬月絹袋盛懸風前化之茯苓青礞石搗碎焰硝等分同煅金色南星慢火煨裂半夏湯泡七次去皮臍黃芩各五錢上為細末神麯糊入薑汁為丸如桐子大每服三五十丸薑湯下此藥重在風化硝一方加蒼朮五錢滑石一兩一方加枳實倍青礞石一方有白朮無南星清火豁痰丸治上焦鬱火痰涎壅盛胸膈不利咽喉煩躁噎塞如有所哽吐不出咽不下大黃酒蒸九次黃芩酒炒黃連酒炒梔子炒各一兩半白朮枳實炒陳皮鹽水洗各二兩半夏一兩半用白礬皂角生薑水浸貝母一兩三錢白茯苓天花粉神麯炒白芥子炒連翹各一兩青磁石硝煅金色青黛甘草各五錢元明粉七錢沉香二錢南星一錢半同半夏制上為末竹瀝為丸如桐子大每服六七十丸食後茶下逐痰丸紫海蛤如雞子大者一斤火煅紅淬入童便內如此三次為末卻用鮮瓜蔞拌粉搗千餘下乃勻稀稠得宜作餅子將麻繩穿懸當風處吹乾為末四兩南星牛膽制黃連半夏四兩用姜礬者滴香油數點煮令透炒黃色陳皮去白青皮炒各二兩大黃酒拌九蒸九曬五兩青黛一兩木香五錢上為末薑汁竹瀝丸如綠豆大每服三四十丸薑湯下滌痰丸治三焦氣澀痰飲不利胸膈痞滿咳唾稠黏面目熱赤肢體倦怠不思飲食常服升降滯氣清膈化痰木香檳榔青皮陳皮去白京三稜煨枳殼去穰麩炒半夏湯泡七次大黃煨各一兩黑牽牛微炒二兩上為末水糊丸如桐子大每服四五十丸食後薑湯下竹瀝達痰丸此藥能運痰如神不損元氣其痰自大便中出丹溪云痰在四肢非竹瀝不能達此也半夏湯泡洗七次再用薑汁浸透曬乾切片瓦上微火炒熟陳皮去白白茯苓去皮白朮微炒大黃酒蒸曬乾黃芩酒炒各二兩人參去蘆甘草炙礞石焰硝煅各一兩沉香五錢上為細末用竹瀝一大碗生薑自然汁二鍾和勻入鍋內熬一刻許令熟搗為丸如小豆大每服百丸食後白湯下黃芩利膈丸除胸中熱利膈上痰黃芩生一兩炒一兩南星三錢半夏五錢黃連三錢枳殼三錢白朮五錢陳皮三錢澤瀉五錢白礬五分上為末水浸蒸餅為丸如桐子大每服三五十丸食遠白湯下忌酒及濕面清氣化痰丸治痰因火動胸膈痞滿頭目昏眩故用二陳湯豁痰利氣合涼膈散降火清頭目而散風熱也半夏二兩陳皮茯苓各一兩半薄荷荊芥各五錢黃芩連翹山梔桔梗甘草各一兩如腸胃乾燥加大黃芒硝上為末薑汁糊丸如桐子大每服五十丸薑湯下又清氣化痰丸治上焦痰火壅盛或嗽或喘煩熱口乾胸膈痞悶此痰火通用之方也天南星三兩半夏湯泡黃連去須黃芩各五兩瓜蔞仁茯苓杏仁去皮尖各四兩陳皮去白枳實麩炒各六兩甘草二兩一方有前胡無南星黃連上為細末薑汁煮麵糊和丸如桐子大每服七十丸食後薑湯下氣之不清痰之故也能治其痰則氣清矣是方也星半所以燥痰濕杏陳所以利痰滯枳實所以攻痰積芩連所以消痰熱茯苓之用滲痰濕也若瓜蔞者下氣利痰云爾化痰丸治熱在上焦風痰壅盛半夏南星合薑湯泡黃芩黃連寒水石煅各一兩牙皂薄荷各五錢甘草炙三錢上為末淡薑汁打糊丸如赤小豆大每服五十丸食遠茶清下清熱化痰丸治痰飲為患嘔吐噁心頭眩心悸或飲食生冷飲酒過多中脘不快脾胃不和半夏湯泡五錢橘紅四錢白茯苓桔梗川芎當歸酒洗各三錢黃芩酒炒黃連炒梔子生甘草各一錢半上為細末麵糊丸如桐子大每服五十丸食遠薑湯下清膈豁痰丸半夏南星二味鹽水煮各二兩白茯苓橘紅鹽水拌曬乾貝母去心瓜蔞仁香附米童便浸二日白朮枳實麩炒黃芩黃連各三兩上為細末薑湯浸蒸餅丸如桐子大每服百丸食後白湯下清膈丸黃芩半斤酒浸炒黃南星生用半夏湯泡七次各四兩上為末薑汁打糊丸服大利膈丸主胸中不利痰嗽喘促脾胃壅滯大黃酒浸焙枳實炒厚朴薑製甘草炙人參藿香葉當歸各一兩木香七錢檳榔七錢半上為末水浸蒸餅丸如桐子大每服五十丸食後溫水下抑上丸治痰因火動白朮黃芩黃連各一兩石膏二兩青黛五錢上為末蒸餅丸服一方半夏一兩瓜蔞仁黃連各半兩上為末糊丸桐子大每五十丸薑湯下玉髓丹治痰火上壅或流入四肢結聚胸背或咳嗽頭目不清軟石膏三兩半夏湯泡七次一兩白礬五錢上為細末淡薑湯打糊丸如小豆大每三十丸食遠茶清下對金丸治痰火青礞石同牙硝各一兩共入罐內煅一日取起如金色大黃枯黃芩各八兩鮮南星一斤上三味另酒浸一宿次日取出一層南星一層大黃一層黃芩以柳木甑蒸之九蒸九曬為末入沉香薑汁竹瀝打糊為丸每服一丸三分重薑湯化下一方半夏二兩白朮黃芩青礞石各一兩茯苓七錢半風化硝二錢上為末神麯糊丸如桐子大每服三五十丸白湯下一方治痰嗽黃芩酒洗一兩半南星貝母去心各一兩滑石白芥子各半兩風化硝二錢半取其輕浮速降上為末湯泡蒸餅丸服一方治熱痰半夏薑製貝母黃芩瓜蔞仁青黛上為末丸服清膈化痰丸蒼朮二兩香附一兩半黃連黃芩各一兩黃柏山梔子各五錢上為末蒸餅丸白湯下黃連化痰丸半夏陳皮各一兩半黃連一兩吳茱萸湯洗一錢半桃仁十四個另研一方無此味上為末曲糊丸如綠豆大每服一百丸薑湯下礞石丸治痰礞石煅半兩半夏七錢半南星茯苓各五錢風化硝二錢上為末神麯糊丸竹瀝膏大治熱痰及能養血清熱有痰厥不省人事幾死者灌之即蘇誠起死回生藥也用水白竹截長二尺每段劈作四片以磚二塊排定將竹片仰架磚上兩頭露一二寸下以烈火迫兩頭以盆盛瀝每六分中加薑汁一分服之痰熱甚者止可加半分耳治濕痰方白朮湯治形肥脈緩體重嗜臥痰滑屬濕白朮茯苓半夏各等分上為粗末每服半兩生薑七片水煎取清調神麯末二錢服之白朮散治夏暑大熱或醉飲冷酒濕痰不止膈不利白朮茯苓半夏黃芩各等分上為粗末每服五錢水二盞姜三片同煎去渣調陳皮神麯末各一錢食後服丹溪方治肥人濕痰白朮二錢半半夏苦參陳皮一錢上銼作一服加生薑三片竹瀝與水共一盞煎食遠吞三補丸十五丸白朮丸治濕痰咳嗽脈緩面赤肢體沉重嗜臥不收腹脹而食不消白朮一兩半半夏天南星各一兩上為細末湯浸蒸餅為丸如桐子大每服五七十丸食後薑湯下指迷茯苓丸治中脘停痰伏飲臂痛難舉手足不得轉有效後人謂臂痛乃痰證也但治痰而臂痛自止半夏制二兩茯苓一兩枳殼去穰麩炒五錢風化硝二錢半上為末薑汁打糊丸如桐子大每服二十丸生薑湯下半夏燥濕茯苓滲濕濕去則飲不生枳殼消堅化硝軟堅堅軟則痰不固昔人有臂痛不能伸兩手戰掉至於茶盞亦不能舉此由伏痰在內中脘停滯脾氣不流行上與氣搏四肢屬脾脾滯而氣不下故上行攻臂其脈沉細者是也服此隨愈痰藥方多立見功效者未有如此神妙如治脾胃痰用神麯為糊治血分痰酒糊治氣分上焦痰蒸餅糊治骨節四肢痰鹽酒入薑汁糊治足痰牛膝煎膏為引治痰病深痼牛膏和糊多服即可以汗吐下如倒倉法也每早常服三五十丸旬月以後大便溏滑是潛消痰積之驗也如耳聾氣壅上焦諸風熱頭風等證竹瀝入薑汁白湯下二三百丸以利為功服愈痰火之後住服但覺少作即服又與諸服食補養之藥不為相妨導痰丸蒼朮米泔浸茯苓各一兩滑石七錢半黃連半兩吳茱萸制二錢上為末糊丸桐子大每服八九十丸薑湯下半夏丸大治濕痰喘急亦治心痛半夏一味不拘多少香油炒上為末粥丸如桐子大每服三五十丸薑湯下中和丸治濕痰氣熱蒼朮黃芩半夏香附各等分上為末粥丸如桐子大每服五七十丸薑湯下星夏丸燥濕痰南星半夏蛤粉二兩上為末神麯糊為丸如桐子大青黛為衣每服五十丸薑湯下濕痰加蒼朮熱痰加青黛食積痰加神麯麥芽山楂一方治濕痰蒼朮三錢白朮六錢芍藥酒炒二錢香附一錢上為末蒸餅丸服小黃丸化痰止涎除濕和胃治胸膈不利黃芩一兩乾薑二錢白朮半兩半夏薑製五錢澤瀉三錢黃耆半兩上為末蒸餅丸白湯下神術丸治痰飲或成窠囊者行痰極效蒼朮一斤米泔浸一宿切片為末生芝麻半兩用水二小盞研細取漿大棗十五枚煮取肉研細上和丸桐子大每服五七十丸溫湯下一云溫酒空心下治酒食積痰方順氣消食化痰丸治飲食生痰胸膈膨悶製半夏膽南星神麯炒杏仁去皮尖陳皮去白蘿蔔子生用葛根山楂肉炒青皮去穰炒蘇子沉水者香附子制麥芽炒各一兩上為末薑汁浸蒸餅丸如桐子大每五七十丸食後臨臥茶酒任下一方加枳實茯苓蔭按星半之辛能燥濕痰葛根之清能解酒熱山楂麥芽神麯之消能療飲食之痰青皮陳皮蘇子杏仁卜子香附之利能行氣滯之痰痰去則胸膈之膨悶亦去矣但星半未注分兩用者酌之開結枳實丸宣導滯氣消化痰飲升降陰陽通行三焦盪滌腸胃流暢大小腸導膀胱專主胸中痞逆噁心嘔吐飲酒不消宿食停積兩脅膨悶咽嗌不利上氣喘嗽黃疸等證枳實麩炒白朮半夏制南星炮白礬枯苦葶藶炒大黃青皮去穰各五錢黑牽牛頭末一兩木香三錢大皂角酥炙去皮弦一兩上為末薑汁糊丸桐子大每服五六十丸白湯下婦人乾血氣膈腫滿或大便不通小便不利生薑蔥白湯下一方有旋覆花一兩清氣化痰丸清利胸膈順氣化痰寬中健脾消導飲食治痰之聖藥也半夏八兩南星六兩瓜蔞仁黃連紫蘇子炒陳皮去白枳實麩炒茯苓去皮蘿蔔子炒山楂各四兩乾生薑二兩甘草炙香附子炒黃芩各二兩上將南星切作十字塊半夏每個切作二塊皂莢六兩白礬三兩多用水將南星半夏皂莢白礬一處浸三宿煮至南星心黑潤為度取出去皂莢不用將南星半夏曬乾同眾為末水糊為丸如桐子大每服七八十丸食遠或臨睡茶清送下黃瓜蔞丸治食積痰壅滯喘急瓜蔞仁半夏山楂神麯炒各等分上為末瓜蔞水丸如桐子大每服七八十丸竹瀝薑汁送下單石膏丸治食積痰痰火並瀉胃火軟石膏不拘多少上研細醋糊丸如綠豆大每服二十丸白湯下清痰丸專清中脘熱痰食積烏梅枯礬黃芩蒼朮陳皮滑石炒青皮枳實各半兩南星半夏神麯山楂乾生薑香附各一兩上為末湯浸蒸餅丸如桐子大每服六七十丸白湯下黃白丸治陰虛食積痰火黃連瓜蔞仁白朮神麯麥芽各一兩川芎七錢青黛五錢人中白三錢上為末薑汁浸蒸餅為丸如桐子大每服五六十丸白湯下丹溪方治心腹膨脹內多食積所致南星薑製半夏瓜蔞仁各一兩半香附童便浸一兩黃連薑汁炒三兩礞石蘿蔔子連翹各半兩麝香少許上為末神麯糊丸服一方加陳皮半兩白玉丸巴豆三十個去油南星半夏滑石輕粉各三錢上為末皂角仁浸濃汁丸如桐子大每服五七丸薑湯下治酒痰方青黛瓜蔞仁上為末薑汁蜜丸噙化救肺御愛紫宸湯解宿酒嘔穢噁心痰喘不進飲食陳皮乾葛良薑丁香甘草炙各二兩藿香檀香茯苓砂仁葛花官桂各一兩木香半兩不見火上㕮咀每服五錢水煎服治風痰方千緡湯治風痰壅盛喘中有聲半夏湯泡七個四破皂角一個去皮炙黃甘草炙一寸上銼作一服加生薑三片水一盞煎七分溫服半夏飲治風痰心腹煩滿嘔吐不欲飲食半夏湯洗麥冬去心赤茯苓去皮白朮桔梗青皮去白前胡枇杷葉去皮尖防風大腹皮共各七錢厚朴薑製一兩上㕮咀每服三錢加生薑三片水煎熱服葉氏分涎湯治風痰留滯膈間喘滿噁心涎唾不利陳皮去白楝參枳實苦梗半夏洗七次薑汁浸南星蒸餅包灰火煨香熟取出各等分苦梗即苦桔梗上㕮咀每服二錢加生薑十片水煎食後服柴胡半夏湯治風證不敢見風眼澀頭痛有痰眼黑噁心兀兀欲吐風來覺皮肉緊手足重難舉居暖處有微汗便減如見風即復作柴胡蒼朮各一錢半半夏二錢半白茯苓二錢神麯炒藁本各一錢升麻五分上作一服生薑五片水煎食遠服半夏白朮天麻湯治頭目眩暈噁心煩悶氣促上喘無力心神顛倒兀兀欲吐目不敢開如在風雲中痰厥頭痛如裂身重如山脾胃虛損停痰並皆治之半夏薑製一錢半白朮二錢天麻茯苓陳皮蒼朮米泔浸焙人參去蘆神麯炒麥芽炒黃耆澤瀉各一錢乾薑炮黃柏各五分上作一服水二鍾生薑三片煎至一鍾食遠服青州白丸子治風痰壅盛嘔吐涎沫半夏七兩南星白附子各三兩川烏去皮臍五錢上為末水浸數日為丸服靈砂白丸子治元氣虛弱痰氣上攻風痰壅塞嘔吐不已靈砂青州白丸子末各一兩各另研上為末和勻以生薑自然汁打黍米糊為丸如桐子大每服三十丸空心人參湯或棗湯下搜風化痰丸人參槐角子殭蠶白礬陳皮去白天麻荊芥各一兩半夏薑汁炒四兩辰砂半兩另研上為末薑汁浸蒸餅為丸辰砂為衣服四十丸薑湯下辰砂化痰丸治風痰安神定志利咽膈清頭目辰砂水飛研為衣白礬枯研各半兩天南星炮一兩半夏曲三兩上為細末薑汁煮麵糊和丸如梧桐子大用辰砂為衣每服三十