數一方名妙應丸凡病百藥不效其關上脈伏而大者痰也用此丸加減腳氣加明松脂一錢檳榔木瓜各一兩卷柏半兩先以鹽水浸半日次日白水煮半日同前藥為丸每服二十丸加至四五十丸再服下惡物立效腳氣走注於前方內加吳茱萸驚痰加硃砂二錢又加全蠍每用八九丸常與之三五服去盡酒痰加雄黃全蠍各二錢每服十丸走注腰痛加核桃三個燒灰每服三十丸加至五十丸溫酒下驚氣成塊者加川山甲炒鱉甲燒各三錢元胡索蓬朮各四錢每服五十丸加至七十丸以利為度腎痹痛加木鱉子去殼研一兩桂半兩熱痰加盆硝等分每服三兩丸寒痰加胡椒丁香肉桂各等分每服二十五丸瓜蒂散吐痰法在上者因而越之此方是也瓜蒂炒赤小豆各等分上為末用香豉一合水二盞作稀粥去渣取三分之一和末一錢頓服之不吐少少加得快吐乃止凡吐時須天氣清明午時前後令病人隔夜不食卒暴者不拘若吐不止用麝香解藜蘆瓜蒂蔥白亦解瓜蒂白水甘草總解治氣痰方四七湯治七情氣鬱結聚痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下並治中脘痞滿痰涎壅盛上氣喘急半夏五兩茯苓四兩紫蘇厚朴各三兩上㕮咀每服四錢生薑七片棗一枚水煎熱服婦人有孕惡阻亦宜服之但半夏用薑汁製過男子因氣而小便白濁用此湯下青州白丸子有效順氣導痰湯烏藥桔梗枳殼麩炒半夏湯泡各一錢半茯苓橘紅南星湯泡黃芩各一錢甘草五分上銼一服加生薑三片水煎食遠服風勝加防風天麻三子養親湯治年高痰盛氣實者此方主之紫蘇子主氣喘咳嗽用紫色真正年久者佳蘿蔔子主食痞兼理氣用白種者佳白芥子主痰下氣寬中紫色者亦可用上各洗淨去砂土曬乾隔紙上微炒微微研碎看何經多作則以所主為君餘次之每劑不過三錢用生絹或稀布小袋盛之煮湯可隨甘旨飲啜亦不拘時勿煎太過令味苦辣若大便素實入熟蜜一匙冬寒加生薑一片尤良夫三子出老圃性度和平芬暢善佐飲食善養脾胃使人親有勿藥之喜是以仁者取焉蔭按蓋痰不自動也因氣而動故氣上則痰上氣下則痰下氣行則痰行氣滯則痰滯是方也卜子能耗氣蘇子能降氣芥子能利氣氣耗則邪不實氣降則痰不逆氣利則膈自寬奚痰患之有飛霞子此方為人子事親者設也雖然治痰先理氣此治標之論耳終不若二陳湯有健脾去濕治本之妙也但氣實之證則養親湯亦捷徑之方矣三仙丸治中脘氣滯胸膈煩滿痰涎不利頭目不清南星生去皮半夏湯洗七次二味各五兩用生薑自然汁和五六月內做面如醬黃法香附子略炒五兩上為末麵糊丸如桐子大每服四十丸食後薑湯下一方去香附加橘紅名玉粉丸治氣痰導飲丸治風痰氣澀膈脘痞滿停飲不消頭目昏眩手足麻庳聲重鼻塞神困多睡志意不清常服去痰涎進飲食京三稜煨蓬朮煨各二兩二錢青皮去穰陳皮去白白朮各一兩半枳實麩炒檳榔木香半夏各一兩上為末水糊丸如桐子大每服五十丸至百丸薑湯下沉香和中丸治氣滯胸膈煩滿痰涎不利大便秘結小便赤澀等證沉香二錢陳皮去白青皮枳殼木香檳榔黃芩青礞石焰硝煅各半兩大黃一兩滑石二兩黑牽牛取頭末二兩二錢上為末滴水丸如桐子大每服五十丸臨臥茶清下清氣滌痰丸健脾胃化痰涎寬胸膈進飲食半夏曲一斤牛膽南星十兩橘紅山楂肉瓜蔞仁去油枳實白朮茯苓蘿蔔子炒黃連各八兩香附青鹽水浸炒枯黃芩微炒紫蘇子甘草各六兩白芥子三兩沉香二兩上為細末竹瀝為丸如桐子大每服一錢五分食遠或臨睡服老痰加天門冬去心四兩青礞石二兩硝煅若陰虛火盛當滋陰降火為主兼服前藥治郁痰老痰方開鬱化痰湯半夏湯泡一錢二分枳實麩炒二錢貝母去心香附各一錢半白茯苓山楂各一錢陳皮去白黃連炒各八分蒼朮米泔浸桔梗各七分甘草二分上銼作一服如生薑三片水煎食遠服瓜蔞枳實湯治痰結咯吐不出胸膈作痛不能轉側或痰結胸膈滿悶作寒熱氣急並痰迷心竅不能言語者並皆治之瓜蔞仁枳實麩炒桔梗茯苓貝母去心陳皮去白片芩山梔子各一錢當歸六分砂仁木香各五分甘草三分上銼一劑加生薑三片水煎入竹瀝薑汁少許同服痰迷心竅不能言語加石菖蒲去木香氣喘加桑白皮蘇子外用茶渣揉擦痛處王節齋化痰丸治一切老痰鬱痰結成黏塊凝滯喉間吐咯難出亦治燥痰天門冬去心黃芩酒炒海粉另研瓜蔞仁另研橘紅去皮各一兩桔梗去蘆香附子淡鹽水浸炒連翹各五錢青黛另研芒硝各三錢上為極細末煉蜜入生薑汁少許和藥末杵極勻丸如小龍眼大噙化一丸或嚼爛茶清化細嚥之或丸為細丸如黍米大淡鹽湯送下五六十丸蔭按老痰大率飲酒之人多有之酒氣上升為火肺與胃脘皆受火邪故鬱滯而成此方用天門冬黃芩瀉肺火也海石芒硝以軟堅也瓜蔞仁潤肺降痰香附米開鬱降氣連翹開結降火青黛解鬱火皆不用辛燥之藥清膈化痰丸治一切痰飲鬱結肺胃吞吐不利海石即浮石一兩人參去蘆半夏薑製木香香附炒蒼朮米泔浸炒瓜蔞仁各一兩陳皮二兩去白枳實炒一兩五錢麥芽炒神麯炒各五錢上為細末湯浸蒸餅為丸如梧桐子大每服六七十丸食後用淡生薑湯送下海石祛痰丸專治老痰頑痰五倍子五錢海石一兩南星五錢半夏一兩先將星半為末水浸夏三日冬七日取出曬乾連上四味為末九月黃熟瓜蔞七個瓤汁並蔞仁去殼前藥未石臼搗勻用黃蒿鋪厚二寸將藥捏作餅子置蒿上更以黃蒿覆之三七取出曬乾名為瓜蔞曲再搗為末入後藥黃芩黃連香附白朮各四錢枳實麩炒陳皮甘草茯苓各三錢晉礬飛一錢上通為細末共前藥拌勻淡薑湯和丸每服三四十丸臨臥白湯下忌煎炒飲酒之人七八十丸亦不妨香附瓜蔞青黛丸治燥痰鬱痰咳嗽呃逆凡積痰非青黛瓜蔞不除香附瓜蔞仁青黛各等分上為末煉蜜丸如芡實大每服一丸食後臨臥噙化或去香附亦可一方治郁痰白殭蠶杏仁瓜蔞仁訶子五倍子貝母上為末糊丸桐子大每服五十丸白湯下一方治老痰海石半夏瓜蔞仁香附子五倍子上為末作丸服下之如虛痰老痰稠黏膠固於胸臆依附盤汨於腸胃當用此膏吐瀉不致虛損元氣如癱勞鼓噎於補虛藥中加之以去痰積可收萬全服此比之倒倉更穩仍須養者八珍丸治膈痰結實胸膈不利喘嗽嘔吐丹砂研半兩犀角鎊羚羊角鎊茯神去木牛黃研龍腦研各二錢半牛膽南星硼砂研各一錢上為細末研勻煉蜜丸如雞頭實大每服一丸食後細嚼用人參荊芥湯下治脾胃虛痰方六君子湯治脾虛不進飲食嘔吐痰水人參白朮白茯苓陳皮去白半夏各一錢甘草炙五分上銼一服加薑棗煎服白朮湯治胃虛吐痰半夏曲五錢茯苓二錢白朮三錢檳榔二錢半木香甘草炙各一錢上為細末每服二錢生薑湯調下食前服一方治頑痰不化石青一兩石綠半兩上研細水飛以餅糊丸每服十丸溫湯下吐痰一二碗不妨霞天膏此倒倉法遺意也用此製半夏曲或入丸藥中能令老痰自大便出且不損元氣不傷脾胃凡治膠結老痰非此不效黃牯牛肉用純黃無病肥澤一二歲者淨腿肉十二斤切指頂大用長流水以大銅鍋煮之旋加沸湯常令水淹肉五六寸掠去浮沫煮肉爛如泥去渣將肉汁以細布濾過入小銅鍋內用桑柴文武火候不住手攪如稀糖滴水不散色如琥珀為度每肉十二斤可取膏一斤以瓷罐盛之冬月制用調藥劑初少漸多沸湯自然溶化用和丸每三分才面一分同煮成糊或用煉蜜日久生黴寒天用重湯煮過熱天冷水窨之可留三日凡治實痰新痰用南星半夏燥之橘紅枳殼散之茯苓豬苓滲之黃芩黃連降之巴豆附子疏通之竹瀝瓜蔞潤之茯苓半夏湯治胃氣虛弱身重有痰噁心欲吐此風邪羈絆於脾胃之間當先實脾胃茯苓半夏薑製白朮神麯炒各一錢麥芽炒一錢半陳皮天麻各二錢上作一服加生薑五片水煎食前服祛痰健脾丸和平甘暖可以常服白朮四兩山楂去核微炒三兩白芍藥酒炒橘紅各一兩七錢貝母去心一兩上為細末神麯水調熬作糊丸如綠豆大每服三四十丸食遠滾水下或清米飲下枳實理中丸理中焦除痞滿逐痰飲止腹痛人參白朮乾薑炮甘草炙枳實麩炒茯苓各等分上為細末煉蜜和一兩作四丸熱湯化下渴加瓜蔞根下痢加牡蠣治腎虛痰方加減四物二陳湯治陰虛腎火炎上肺燥有痰當歸洗芍藥炒地黃酒洗陳皮去白貝母去心麥冬去心瓜蔞仁去油各一錢桔梗七分甘草炙五分上銼水煎服蘇子降氣湯治虛陽上攻氣不升降上盛下虛痰涎壅盛紫蘇子半夏曲各五兩陳皮去白三兩半前胡去蘆厚朴去皮薑製川當歸甘草炙肉桂去皮各二兩上㕮咀每服五錢水一盞生薑三片棗一枚煎服不拘時俞山人降氣湯治上盛下虛痰涎壅盛或喘或滿咽乾不利並治腳氣上攻煩渴引飲前胡去蘆黃耆厚朴薑製五加皮薑製當歸去蘆桔梗羌活半夏曲人參去蘆陳皮紫蘇子各一錢附子炮去皮臍官桂乾薑炮各五分上㕮咀作一服水一盞半生薑三片棗一枚紫蘇三葉煎至一盞食遠服黑錫丹治痰氣壅塞上盛下虛心火炎熾腎水枯竭及婦人血海久冷無子或赤白帶下並皆治之肉桂去皮半兩沉香附子炮去皮臍胡蘆巴酒浸炒破故紙炒茴香舶上者炒肉豆蔻麵裹煨陽起石研細水飛金鈴子蒸去皮即川楝子木香各一兩硫黃黑錫去滓各二兩上用黑盞或新鐵銚內如常法結黑錫硫黃砂子地上出火毒研令極細余藥並杵羅為末一處和勻自朝至暮必研令黑光色為度酒糊為丸如梧桐子大陰乾入布袋內擦令光瑩每服四十粒空心鹽薑湯下女人棗湯下靈砂丹治上盛下虛痰涎壅塞此藥最能鎮墜升降陰陽安和五臟扶助元氣水銀一兩硫黃四西上用新鐵銚炒成砂有煙即以醋灑候冷研細入水火鼎醋調赤石脂封口鐵線縛曬乾鹽泥固濟用炭二十斤煅如鼎裂筆蘸赤石脂頻抹火盡為度經宿取出研為末糯米糊為丸如麻子大每服二十粒空心棗湯米飲人參湯任下蔭按以上諸方並系溫熱之劑而出證皆云治上盛下虛氣不升降蓋謂盛者即心火之炎虛者即腎水之弱火炎水弱則有升無降故津液湧而為痰稠黏膠固凝滯於胸膈之間非金石丹藥溫熱香燥之劑能以流通開散之乎書云重可以去怯正所謂劫劑也用此劫劑之後又當用兼補兼消之藥繼之如六味地黃丸之類是也六味地黃丸治腎氣有飲故用此藥補腎逐水治水泛為痰之聖藥也熟地黃八兩乾山藥山茱萸去核各四兩澤瀉去毛牡丹皮去心白茯苓去皮各三兩上為末煉蜜丸如桐子大每服五六十丸空心生薑湯下八味丸治陽虛腎寒不能收攝邪水冷痰溢上或昏暈夜喘上氣即六味地黃丸加附子桂心各一兩半夏丸此藥大治心火狂躁腎水虛羸能寬胸膈化痰飲降心火補腎水真陰進飲食健行步黑髭鬚明耳目服之十日見效半夏四兩大者二兩湯泡七次二兩同豬苓炒豬苓四兩去皮為末用一兩半同半夏炒紙鋪地上去火毒去苓不用破故紙酒浸同芝麻炒去芝麻不用沉香各一兩上為末用無灰酒糊丸如桐子大次日將所存苓末銀石器內慢火炒乾依前法出火毒將藥同苓末收每服五十丸空心酒送下
