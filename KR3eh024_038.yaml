body:
  text: 卷三十八水腫論袖珍論曰岐伯所謂水腫有膚脹鼓脹腸覃石瘕者是也名雖不一皆聚水所致故人身之脾屬土五行論之雖曰剋制腎水然非土則又不能防其泛濫水腫之疾究其所由皆由脾土有虧不能防制以致腎水浸漬脾土凝而不流遂成此疾其為證也發見之初目窠微腫有若臥蠶才起之狀微而至大以手按之則隨手而起如裹水其內上則喘急咳嗽下則足膝胕腫面目虛浮外腎或腫小便不利治療之法當辨其陰陽脈證若陰水為病者脈來沉遲色多青白不煩不渴小便澀少而清大府多泄陽水為病者脈來沉數色多黃赤或煩或渴小便赤澀大便多祕腰已上腫者宜發汗腰已下腫者宜利小便然後實其脾土土盛自能攝養腎水其腫自消虛弱者又當溫補下元尤宜節飲食絶生冷戒房事否則愈而復作凡腫證甚者肌肉崩潰足脛流水又若唇黑缺盆平臍凸陀骨切又徒結切音迭高也背平足平五者是謂五臟有損非可療之病又有內挾七情之氣停滯痰飲腹滿脅脹名為氣分及血熱生瘡變為腫痛名為熱腫又當隨證施治不可一途而取要知此證脈浮大者生沉細者死臨證宜詳審焉須辨其陰陽而治蔭按丹溪曰內經云諸氣憤郁皆屬於肺諸濕腫滿皆屬於脾諸腹脹大皆屬於熱蓋濕者土之氣土者火之子故濕每生於熱熱氣亦能自濕者子氣感母濕之變也凡病腫皆宜以治濕為主所挾不同故治法亦異盧氏醫鏡以水脹隸於腎肝胃而不及脾又謂肺盛生水水液妄行而欲導腎以決去之豈理也哉夫脾土受病肺為之子焉能自盛而生水若謂腫之水果生於肺金之清氣則滋長腎陰奉行降令為生化之源何病腫之有今為腫之水乃濁腐之氣滲透經絡注流溪谷灌入遂道血亦化水而欲藉脾土以制之導腎氣以利之不思脾病則金氣衰木寡於畏而來侮脾欲不病不可得矣治法宜清心經之火補養脾土全運化之職肺氣下降滲道開通使敗濁之氣其稍清者復回而為氣為血為津液敗濁之甚者在上為汗在下為溺以漸而分消矣今不明言而曰制水燥水得非白圭以鄰國為壑乎經言腫病因津液充郭而致不生於肺金之盛也明矣又言氣拒於內氣耗於外責其不能滲運敗濁耳又云開鬼門潔淨府鬼門膚腠也屬肺淨府膀胱也屬腎之府未聞有導腎氣之説注文明言陰精耗損腎氣果可導乎仲景謂治濕利小便即經中潔淨府之意苟以清淨為腎而導之果於經意有合乎錢仲陽謂腎無瀉法其可輕易導之乎或曰經言疏滌五臟非導腎歟豫曰此承上文五陽已布而言若鬼門開矣淨府潔矣五宮之陽氣條布彼敗濁之氣自然疏導滌除於腎氣何與焉又曰水腫因脾虛不能制水水漬妄行當以參朮調脾使脾氣得實則能健運自然升降運動其樞機則水自行非若五苓神佑之行水也宜補中行濕利小便切不可下用二陳湯加白朮人參蒼朮為主佐以黃芩麥門冬炒梔子制肝木若腹脹少佐以厚朴氣不運加木香木通氣若下陷加升麻柴胡提之隨病加減必須補中行濕産後必大補血氣少佐以蒼朮茯苓使水自降用大劑白朮補脾壅滿用半夏陳皮香附監之有熱當清肺金麥門冬黃芩之屬水腫本自中宮諸家只知治濕利小便之説頻用去水之藥甚有用導水丸舟車丸神佑丸之類此速死之兆腰已上腫宜發汗腰已下腫宜利小便此仲景要法發汗用麻黃甘草二味煎服水腫用山梔子炒為末米飲送下若胃脘熱病在上者帶皮用東垣曰水腫宜以辛散之以苦瀉之以淡滲利之使上下分消其濕正所謂開鬼門潔淨府開鬼門者謂發汗也潔淨府者利小便也羅謙甫曰治腫以胃氣為本夫營運之氣出自中焦者胃也胃氣弱不能布散水穀之氣營養臟腑經絡皮毛故氣行而澀為浮腫大便溏多而腹脹腸鳴皆濕氣勝也四時五臟皆以胃氣為本五臟有胃氣則和平而身安若胃氣虛弱不能運動滋養五臟則五臟脈不和平本臟之氣盛者其脈獨見輕則病過甚則必死故經曰但得真臟脈而無胃氣則死人知服牽牛大黃為一時之快不知其為終身之害也戴氏曰水腫者通身皮膚光腫如泡者是也以健脾滲水利小便進飲食元氣實者可下或曰煩渴小便赤澀大便祕此為陽水不煩渴而大便溏小便少而不赤澀此為陰水或曰水腫先腹而散於四肢者活先四肢而歸於腹者死大便泄唇黑缺盆平臍突足心平背平肉硬手掌無紋又男從腳下腫而上女從身上腫而下若脈沉細虛小者並不治葉氏曰或問氣濕水三腫之辨曰以手按之頃時而起者氣也隨手而起者水也成凹不即起者濕也濕與水有微甚之意況有風熱腫與諸水形證不同要在臨證詳審也凹音熬低下也土窪曰凹土高曰凸又曰腫喘相因為病有先腫而後喘者是腎水上溢侵肺以至氣壅窒礙不得降下而生喘治當伐腎邪利水道次以清肺中壅滯務使濁氣降而金自清喘斯定矣先喘而後腫者是肺金受邪氣不能輸化以致小便澀少水溢皮膚而生腫治當清肺金降逆氣次以行腎中蓄積之水務俾清化行而水自下腫斯消矣又有因脹而發腫腫後而發喘者其所因不同亦由於脾胃受傷不能運化水穀則水濕之氣妄行而又客於肺治之當以養脾滲濕兼清金之劑觀此三證雖分脾肺腎先後而治其實主於脾土一而已矣李氏曰水腫須分上下陰陽陽水多外因涉水冒雨或兼風寒暑氣而見陽證陰水多內因飲水及茶酒過多或飢飽勞役而見陰證陽水先腫上體肩背手膊手三陽經陰水先腫下體腰腹脛胕足三陰經故男從腳上腫起女從頭上腫起者為逆陰陽微妙如此人身真水真火消化萬物以養生脾病水流為濕火炎為熱久則熱濕鬱滯經絡盡皆濁腐之氣津液與血亦化為水初起目下微腫如臥蠶及至水浮膜外則為膚脹流下焦則為胕腫手按隨手而起如裹水之狀以指畫之成字者名燥水不成字者名濕水有按之作水聲者乃氣虛不宜泄久成水瘕腎主水也惟脾病則不化飲食滋真水非惟腎精損削而濕熱下注陰胕獨腫者有之甚則泛濫偏體無歸必土實而後足以收攝邪水腎水歸元金生水也惟脾病則肺金失養非惟肺氣孤危而失降下之令滲道不通且濕熱濁氣上升為喘為咳必土實而後肺金清肅以滋化源或曰獨無寒濕者乎寒則土堅水清間有亦更易治陽水熱渴二便閉經云諸胕腫疼酸皆屬於火又云結陽肢腫是也治與水證濕證大同大要腰已上腫宜汗腰已下腫宜下表證喘咳小青龍湯越婢湯古麻甘湯桂枝苦酒湯里證腹腫脅硬十棗湯澤瀉湯澤瀉牡蠣湯導水丸三花神佐丸浚川丸布海丸然證雖可下又當權其輕重若年衰久病及虛者黃米丸初起只宜上下分消其濕五苓散用桂枝合六一散加橘皮木香檳榔生薑煎服或單山梔丸木香白朮煎湯下兼黃者茵陳五苓散滲之陰水身涼大便利經云陰蓄於內水氣脹滿是也治宜補脾土以復運化之常清心火降肺金俾肝木有制而滲道又且開導此補中行濕兼全虛而有濕熱者最宜若有寒者溫補則氣暖而小便自通氣陷者升提則陽舉而陰自降故曰行濕非五苓神佑之謂也補中氣六君子湯加木香瀉者參苓白朮散升陽除濕防風湯嘔者赤茯苓湯中寒者玄武湯實脾散挾食積者緊皮丸千金養脾丸挾濕熱者中滿分消湯丸濕甚者退黃丸虛甚氣陷口無味者六君子湯加升麻柴胡以提之復元丹切忌淡滲腎虛腰重腳腫濕熱者加味八味丸滋腎丸陽虛小便不利者古沉附湯二便俱利者朮附湯復元丹久病喘咳瘧痢或誤服涼藥以致腫者危證也俱宜補脾為主大概挾喘者分氣紫蘇飲五皮散葶藶丸久痢加味八味丸久瘧退黃丸産後腫必大補氣血使水自降八物湯加蒼朮陳皮半夏香附有熱加麥門冬黃芩氣不順加木香砂仁懷胎氣遏水道腫者去半夏加紫蘇大腹皮飲食無阻者雖不藥而既産自消矣食積香平丸枳朮丸因酒小蘿皂丸飲毒水而腫者名水蠱漆雄丸不伏水土者胃苓湯膿瘡擦藥愈後發腫敗毒散便閉升麻和氣飲干瘡洗浴水氣入腹者赤小豆湯瘡久倦怠嗜臥腫者五苓散加橘皮木香檳榔滑石甘草枳殼大腹皮砂仁薑煎溫服陽水陰水腫外又有風腫氣腫血腫惟腸覃石瘕乃婦人病也風腫即痛風腫者腫面多風熱腫腳多風濕關脈浮洪弦者風熱濕三氣鬱而為腫因脾土不足木火太盛胃中純是風氣所以清氣不升腹作䐜脹濁氣不降大便閉澀經曰中滿瀉之於內者是也外證走注疼痛麵皮粗麻木不仁先服三和散次服小續命湯大便閉去附子加檳榔牽牛日久者金丹風從汗散故也虛弱不敢汗者四君子湯加升麻柴胡蒼朮防風汗多者防己黃耆湯氣腫隨氣消長蓋七情停涎郁為濕熱脾肺俱病四肢瘦削腹脅膨脹與水氣相似但以手按之成凹不即起者濕也按之皮厚不成凹者氣也六君子湯加木香木通喘者木香流氣飲大便閉者三和散六磨湯木香檳榔丸小便閉者分心氣飲嘔滿者四炒枳殼丸瀉者單香附丸挾痰腹脹滿者加味枳朮湯控涎丹瘀血腫皮間有赤縷血痕四物湯加桃仁紅花或續斷飲加味八味丸婦人經閉敗血腫者腎氣丸加紅花或紅礬丸詳婦人經候莖囊腫亦有陰陽二候蓋玉莖與陰囊伸縮痿強乃身中陰陽之機有陽火玉莖腫脹健裂不休者柴青瀉肝湯濕熱下流者四苓散加山梔木通金鈴子莖囊腫大通明者木香流通飲加木香煎吞青木香丸暴風客熱陰挺腫脹者龍膽瀉肝湯膀胱熱甚囊腫二便不通者三白散八正散腫痛者用小茴全蠍穿山甲木香等分為末每二錢空心酒下有陰寒濕腫痿弱者五苓散加茴香或八味丸腎大如斗者荔枝散上熱下虛玉莖腫痛者清心蓮子飲陰腫大如升核者用馬鞭草搗攔塗之或乾地龍為末雞子清調敷囊軟者可治婦人陰腫便祕枳橘尉凡陽水宜辛寒散結行氣苦寒瀉火燥濕陰水宜苦溫燥脾或辛熱導氣極忌甘藥助濕作滿尤忌針刺犯之流水而死凡先腫腹而後散於四肢者可治先腫四肢而後歸於腹者難治若肌肉崩潰足脛流水唇黑耳焦缺盆平臍凹背平手足掌平肉硬腹多青筋大便滑泄者不治又面黑者肝死兩手無紋者心死臍凹者脾死兩肩凹者肺死下注腳腫者腎死胕音附䐜稱人切起也肉脹起也脈法丹溪曰水腫脈多沉伏病陽水兼陽證脈必沉數病陰水兼陰證脈必沉遲脈沉而滑為風水脈浮而遲弦而緊皆為腫也水病腹大如鼓脈實者生虛者死洪大者生微細者死緊而榮衛俱絶面浮腫者死唇腫齒焦者死卒唇腫而面黑者死掌腫無紋者死臍腫凹出者死缺盆平者死陰囊莖俱腫者死脈絶口張足腫者死足趺腫膝如斗者死脈訣舉要曰水腫之證有陰有陽察脈觀色問證須詳陰脈沉遲其色青白不渴而瀉小便清澀脈或沉數色赤而黃燥糞赤溺兼渴為陽通治諸水腫方加減二陳湯諸腫通用隨證加減陳皮去白半夏白茯苓蒼朮泔浸炒白朮豬苓澤瀉山梔子炒麥門冬去心黃芩炒各一錢上銼水煎服腹脹加厚朴瀉加肉豆蔻訶子喘急加桑白皮杏仁氣壅加香附食積加山楂麥芽陽水便閉加甘遂少許陰水氣弱加人參風腫加羌活防風白芷夏月加香薷寒月加薑桂氣腫加蘿蔔子枳殼血腫加當歸芍藥痰加貝母上腫加紫蘇下腫加防己木瓜陰囊腫加小茴香木香外腎如石引脅痛加巴戟又太陽腫證加藁本赤小豆少陽加芫花雄黃木通陽明加茯苓椒目太陰加甘遂葶藶少陰加澤瀉連翹巴戟厥陰加大戟吳茱萸蔭按古法不可妄用蓋甘遂大戟芫花損氣破血巴戟損腎陰氣輕粉傷齒毒留腸胃土狗劫奪消而復腫慎氣治陽水浮腫脈沉數煩渴小便赤澀大便祕者九味羌活湯治水病腰以上腫者此方微汗之則愈羌活防風蒼朮細辛川芎白芷生地酒炒黃芩甘草上銼加生薑三片水煎熱服被蓋取微汗麻黃甘草湯治水腫從腰以上俱腫以此湯發汗麻黃去根節二錢甘草一錢上㕮咀水一盞煮麻黃再沸後入甘草煎七分取汗避風老人虛人不可輕用如肢冷屬少陰加附子加味五苓散治水腫從腰以下俱腫以此湯利小便茯苓豬苓澤瀉白朮桂枝加木香茵陳上銼水煎服一方五苓散用桂枝合六一散橘皮木香檳榔生薑五皮散治風濕客於脾經氣血凝滯以致面目虛浮四肢腫滿心腹膨脹上氣喘促五加皮地骨皮生薑皮茯苓皮大腹皮各二錢一方加薑黃木瓜名加味五皮散上作一服水煎食遠服忌生冷油膩堅硬之物淡寮方去五加皮地骨皮加陳皮桑白皮亦同名加味五皮散治水病腰以下腫者此方主之五加皮地骨皮生薑皮大腹皮茯苓皮薑黃木瓜各一錢上銼水煎服疏鑿飲子治水氣通身浮腫喘呼氣急煩躁多渴大小便不利服熱藥不得者羌活秦艽去蘆商陸檳榔澤瀉木通大腹皮茯苓皮赤小豆椒目各等分上㕮咀每服四錢加生薑五片水煎溫服不拘時李仁丸治水氣乘肺動痰作喘身體微腫葶藶隔紙炒杏仁去皮尖防己郁李仁炒真蘇子陳皮赤茯苓各五錢上為末煉蜜丸如桐子大每服四十丸食後紫蘇湯下三仁丸治水腫喘急大小便不通杏仁炮去皮尖郁李仁薏苡仁各一兩上為末米糊丸如桐子大每服四十丸不拘時米飲下赤小豆湯治氣血俱熱遂生瘡疥變為腫滿或煩或渴赤小豆炒當歸去蘆炒商陸澤瀉連翹仁桑白皮炙赤芍藥漢防己澤蘭豬苓去皮各等分上㕮咀每服四錢加生薑三片水煎溫服熱甚加犀角神助散治十腫水氣面目四肢浮腫以手按之隨手而起咳嗽喘急不得安臥小便赤澀大便不利黑牽牛炒取頭末澤瀉各二錢豬苓椒目各二錢半葶藶五錢上作一服水二鍾蔥白三根煎至一鍾入酒半盞早向東立服如人行十里又以漿水蔥白煮稀粥候蔥爛入酒五合量人所飲多少須啜一升許自早至午當利小便三四升或大便微利喘定腫減隔日再服忌鹽面房事蘿蔔子飲治水病浮腫蘿蔔子半夏制川芎青木香商陸青皮去穰各一錢葶藶炒赤茯苓陳皮檳榔牽牛末炒甘草炙各一錢半官桂七分上作一服生薑五片水煎食遠服香平丸治水腫氣腫血腫香附黑牽牛三稜蓬朮乾生薑各三兩平胃散一斤上為末醋糊丸或入鴨頭鮮血為丸如桐子大每服四五十丸生薑湯下無礙丸治脾濕積流四肢腫滿大腹皮二兩木香半兩蓬朮京三稜檳榔郁李仁各一兩上為細末炒麥芽麵糊為丸如桐子大每服五七十丸生薑湯下茯苓散治腫滿小便不利郁李仁四錢檳榔二錢赤茯苓甘遂切片炒各一錢白朮一錢陳皮一錢半上為細末每服一錢薑棗湯調下布海丸治水腫痰腫鼓腹喘咳及癥瘕癭瘤症音徵瘕音遐癥瘕腹中積塊堅者曰症有物形曰瘕癭於郢切頸瘤也瘤音留瘜肉也昆布海藻各一斤洗淨入罐炆成膏枳實四兩陳皮二兩青皮一兩蓽澄茄青木香各五錢如氣盛加三稜蓬朮各二兩上為末入前膏為丸空心沸湯下浚川丸治十腫水氣初起故又名十水丸桑白皮大戟雄黃茯苓芫花甘遂商陸澤瀉巴戟葶藶各五錢從面腫起根在肺加桑白皮從四肢腫起根在脾加大戟從背腫起根在膽加雄黃從胸腫起根在皮膚加茯苓從脅腫起根在肝加芫花從腰腫起根在胃加甘遂從腹腫起根在肺加商陸從陰腫起根在腎加澤瀉從手腫起根在腹加巴戟從腳腫起根在心加葶藶又云從頭目腫起加羌活從膈至小腹腫起根在膀胱仍加桑白皮上為末加者一兩余藥各五錢五更薑湯調下一錢以利為度忌魚面鹽百日如百日內不慎復腫者將前末醋糊為丸每服三十丸木香湯下十水丸治十腫水病並根源證狀方法一青水先從左右肋腫起根在肝大戟二赤水先從舌根起根在心葶藶子三黃水先從腰腹起根在脾甘遂微炒四白水先從腳腫起根在肺桑白皮五黑水先從外腎腫起根在腎連翹六玄水先從面腫起根在外腎芫花醋炒七風水先從四肢腫起根在骨澤瀉八石水先從腎腫起根在膀胱藁本九高水先從小腹腫起根在小腸巴豆去皮油十氣水或盛或衰根在腹赤小豆上十般腫病各有根源種種不同看十種病根除一味倍多餘九味等分逐味依法修治焙為細末煉蜜丸如桐子大每服三丸用赤茯苓湯吞下不拘時每日三服忌鹽一百二十日緣鹽能化水也又忌魚蝦麵食一切毒物及生冷房室甚效此方獲瘥後更用後藥補之補藥方肉桂去粗皮赤茯苓去皮乾薑莪朮川芎肉豆蔻桔梗各等分一方無赤茯苓莪朮有青皮白朮檳榔上為末每服三錢百沸湯點服空心食後臨臥各一服婁氏曰前項二方治水腫病甚效豫試之百發百中獲濟者無數世間所有水病方藥無出此二方之右者幸勿忽牽牛丸治一切濕熱腫滿等疾黑牽牛黃芩大黃大椒滑石各等分上為末酒煮米糊為丸如桐子大每服五丸至七丸生薑湯下食後量虛實加減舟車丸治水腫證病人形氣皆實者此方主之牽牛炒四兩大黃酒浸三兩甘遂麵裹煨大戟麵煨芫花炒青皮炒陳皮去白各一兩木香五錢上為細末水丸如桐子大每服五七十丸白湯下蔭按通可以去塞牽牛大黃甘遂芫花大戟皆通劑之厲者也辛可以行滯陳皮青皮木香皆行滯之要藥也此方能下十二經之水下咽之後上下左右無所不至故曰舟車氣虛者慎之十棗丸治水氣浮腫上氣喘急大小便不通甘遂大戟芫花各一兩上為末用棗煮熟去皮核杵爛丸如梧桐子大每服四十丸清晨熱湯下以利去黃水為度不利次日再服三花神佑丸治中滿腹脹一切水濕腫滿甘遂大戟芫花醋拌濕炒各五錢大黃一兩牽牛二兩輕粉一錢上為末滴水丸如小豆大初服五丸每服加五丸溫水下日三服加至快利為度得利止後服海金砂散治脾濕太過通身腫滿喘不得臥及腹脹如鼓牽牛一兩半生半炒甘遂五錢白朮一兩海金砂三錢上為細末每服二錢煎倒流水一盞食前調下得宣利止後服海藻散治男子婦人通身虛腫喘滿不快海藻大戟大黃續隨子去殼各一兩上四味用好酒浸一宿取出曬乾候用滑石半兩白牽牛生取頭末一兩甘遂麩炒一兩白豆蔻一個青皮去白陳皮去白各半兩上為細末每服二錢如氣實者三錢平明冷茶清調下至夜時取下水三二行腫減七分隔二三日平明又一服腫消忌魚肉百餘日小兒腫病服一錢五歲以下者半錢女人有孕者不可服導水萬靈丹大戟芫花甘遂各一兩並生用檳榔木香各五錢上為細末入面八錢用好酒和成餅子鍋內焙乾再搗為細末井花水為丸每服五十丸三更時令患者漱口用淡薑送下待取出水了只可淡粥白菜補之次日服勻氣散煎成調平胃繼以木香流氣飲三日後如水未盡再服忌一應鹽醬發物勻氣散方見後氣腫千金苦瓠丸治大水頭面遍身腫脹者亦治石水取苦瓠白穰實捻如大豆以麵裹煮一沸空腹吞七枚至午當出水一升如此三四日水自出不止大瘦乃瘥三年內慎口味苦瓠須好無厭翳理細者不爾有毒不堪用經曰苦瓠湧泄故用之在上則令人湧用之在下則令人泄今以熟麵裹之空腹而吞蓋用之於下也宜乎水自泄矣石水者四肢皆瘦惟有少腹堅硬如石腫脹而便不利也回鶻五神散治十種水氣鼓脹芫花獨根以水洗淨木香青木香商陸白者洗淨烏柏根黃土內一寸深用皮各等分上曬乾為末每服二錢如人弱服一錢半臨臥臘酒調下至寅卯時利下水氣辰時以白粥補之若病淺三日一服病深隔日一服限五六日後服金丹金丹蒼朮米泔水浸四錢半草烏去皮臍二錢羌活二兩山豆去皮心膜油另研一錢半杏仁去皮尖麵炒另研二十一個上為末麵糊丸如桐子大每服十一丸臨臥生薑湯送下忌鹽醬房事發病之物一百日此藥極驗商陸散治十種水氣商陸汁甘遂各一錢土狗一個自死者上為末以商陸汁調空心服日午利下水忌鹽一百日塗臍膏治水腫小便澀少豬苓地龍生研針砂醋煮甘遂各等分上為末用蔥擂爛取汁研成膏敷臍中約一寸高以帛縛之水從小便出為度日二次易之治陰水浮腫方脈沉遲不煩渴而大便溏小便少而不赤澀導滯通經湯治脾濕有餘及氣不宣通面目手足浮腫陳皮桑白皮白朮木香各五錢茯苓一兩去皮霖雨時加澤瀉一兩上㕮咀每服五錢水煎食前溫服白茯苓湯能變水白茯苓澤瀉各二兩郁李仁五錢上作一服水一碗煎至一半入生薑自然汁常服無時從少至多服五七日後覺腹下再腫治以白朮散白朮散白朮澤瀉各半兩上每服三錢煎服或丸亦可煎茯苓湯下三十丸以黃耆芍藥建中湯之類調養之平復後忌房室豬魚鹽面等物五皮散淡療治他病愈後或瘧痢後身體面目四肢浮腫小便不利脈虛而大此由脾肺虛弱不能運行諸氣氣虛不理散漫於皮膚肌腠之間故令腫滿也此藥並宜服之大腹皮赤茯苓皮生薑皮陳皮桑白皮炒各等分上為粗末每服五錢水煎溫服不拘時日進三服忌生冷油膩堅硬之物三因當歸散水腫之疾由腎水不能攝心火心火不能養脾土脾土不能制水水氣盈溢氣脈閉塞滲透經絡發為浮腫之證心腹堅脹喘滿不安當歸一錢二分芍藥赤茯苓檳榔白朮木香陳皮桑白皮炒澤瀉木通各一錢桂心五分上㕮咀作一服加紫蘇五葉木瓜一片水煎食前溫服下部腫加木瓜防己實脾散治陰水發腫用此先實脾土厚朴薑炒白朮木瓜木香不見火草果仁乾薑炮各一兩大腹子白茯苓各一兩甘草炙半兩一方有附子上㕮咀每服四錢薑五片棗一枚水煎服無時葶藶木香散治暑濕傷脾水腫腹脹小便赤大便滑葶藶二錢半炒香木香五分茯苓三錢半滑石三兩澤瀉半兩木通甘草各五錢白朮一兩豬苓二錢半肉桂二錢上為細末每服二錢白湯調下不拘時續隨子丸治通身腫滿喘悶不快人參木香漢防己赤茯苓面蒸大檳榔海金砂各五錢另研續隨子一兩葶藶四兩炒上為末棗肉丸如桐子大每服二十丸至三十丸煎桑白皮湯送下食前聖靈丹治脾肺有濕喘滿腫盛小便赤澀人參木香漢防己茯苓檳榔木通各二錢炒苦葶藶四兩炒上為末棗肉和丸桐子大每服三十丸煎桑白皮湯送下食前赤茯苓丸治脾濕太過四肢腫滿腹脹喘逆氣不宣通小便赤澀木香半兩赤茯苓二兩一方一兩防己二兩苦葶藶四兩炒上為末棗肉丸如桐子大每服三十丸煎桑白皮湯送下食前人參葶藶丸治一切水腫及喘滿不可當者人參一兩苦葶藶四兩炒上為末棗肉丸如桐子大每服三十丸煎桑白皮湯送下食前木香通氣丸導滯寬膈塌腫進食南木香茴香各一兩炒檳榔二兩海金砂破故紙炒陳皮去皮各四兩牽牛半斤半生半熟上為末清醋為丸如桐子大每服三十丸熱水送下食後神祕湯治病人不得臥臥則喘水氣逆行上乘於肺肺得水而浮使氣不通流脈沉大人參橘皮炒桑白皮紫蘇葉各七錢白茯苓木香各半兩上㕮咀用水三升入生薑七錢煎至一升半去渣分作五服食後香蘇散治水氣虛腫小便赤澀陳皮去白一兩防己木通紫蘇葉各半兩上為末每服二錢生薑三片水煎食前溫服大橘皮湯治濕熱內攻心腹脹滿並水腫小便不利大便滑泄陳皮去白一錢半木香二分半滑石六分檳榔三分豬苓去皮白朮炒澤瀉桂炒各五分茯苓去皮一錢甘草二分上㕮咀作一服加生薑五片水煎溫服退腫塌氣散治積水驚水或飲水過多停積於脾故四肢滿而身熱宜用藥內消其腫自退赤小豆陳皮蘿蔔子甘草炙各五錢木香炮二錢半上㕮咀每服一兩加生薑三片棗子一枚水煎食前服白朮木香散治喘嗽腫滿欲變成水病者不能臥不能食小便閉者白朮豬苓去皮甘草澤瀉各半兩官桂二錢赤茯苓半兩木香檳榔各三錢陳皮去白一兩滑石三兩上㕮咀每服一兩生薑三片水煎服茯苓琥珀丸治水氣乘肺遍身浮腫中焦痞隔氣不升降咳嗽喘促小便不利防己赤茯苓去皮各二兩苦葶藶三兩半紫蘇子琥珀各一兩另研郁李仁湯浸去皮七錢半陳皮二兩三錢杏仁去皮尖麵炒一兩二錢半上為末煉蜜丸如桐子大每服六七十丸人參湯下麥門冬飲水出高源者此方主之麥門冬五十枚去心薑炒糧米五十粒上水煎服蔭按蓋肺非無為也主降下之令焉凡人飲入於胃之時脾氣散精上歸於肺肺熱失其降下之令不能通調水道下輸膀胱漬於高源淫於皮膚則作水腫諸醫罕明乎此實土導水皆不能愈故用麥門冬清肺以開其降下之源糧米益脾而培乎金之母氣此治病必求其本也或問此證何以辨之曰肢體皆腫少腹不急初病便有喘滿此其候也學者識之香薷丸治水病洪腫氣脹不消用香薷五十斤細銼納釜中水浸上數寸煮使氣盡去渣澄清熬稠丸如桐子大每服五丸日三服稍加之以小便利為度丹溪云香薷治水甚捷有徹上徹下之功肺得之則清化行而水自下加味腎氣丸治脾腎虛損腰腫腳腫小便不利附子炮二兩白茯苓澤瀉官桂不見火川牛膝去蘆酒浸車前子酒蒸山藥炒山茱萸取肉牡丹皮各一兩熟地黃半兩上為末煉蜜丸如桐子大每服七十丸空心米飲下治氣腫方分氣補心湯治心氣鬱結發為四肢浮腫上氣喘急大腹皮炒香附子炒白茯苓桔梗各一兩木通甘草炙川芎前胡青皮炒白朮枳殼麩炒各七錢半細辛去苗木香各五錢上銼每服四錢生薑三片棗一枚水煎食前服順氣丸一名氣實丸治腰脅俱病如抱一甕肌膚堅硬按之如鼓腳腫不能伸屈自頭至膻中瘦脊露骨胸膈痞滿四肢無力及一切氣血凝滯風毒熾盛腳氣走注作腫木香不見火茴香炒羌活木瓜川芎當歸酒浸各一兩黑牽牛二兩地骨皮檳榔陳皮炒各一兩大黃一兩半皂角四兩上為細末熬皂角膏丸如桐子大每服五六十丸溫湯下食前一方無木瓜用生薑燈心煎湯下勻氣散治膨脹氣腫木香枳殼去穰炒三稜煨蓬朮煨陳皮砂仁茴香各一錢香附二錢上銼作一服加生薑三片棗一枚水煎服加味枳朮湯治氣為痰飲所隔心下堅脹名曰氣分枳實白朮紫蘇辣桂陳皮檳榔桔梗木香五靈脂各二分半夏白茯苓甘草各三分上銼作一服加生薑三片水煎溫服治血腫方續斷飲治瘀血流滯血化為水四肢浮腫皮肉赤紋名曰血分玄胡索當歸川芎牛膝續斷赤芍藥辣桂白芷五靈脂羌活各二分赤茯苓牽牛半夏各三分甘草三分上銼一服加生薑三片水煎溫服治風腫方小續命湯治風腫走注疼痛麵皮粗麻木不仁先三和散次服此湯防己桂心黃芩杏仁去皮尖炒芍藥川芎甘草炙麻黃去節人參各一錢四分防風附子炮七分上㕮咀分二帖每帖加生薑五片棗一枚水煎食遠服大便閉去附子加檳榔牽牛治陰腫方三白散治膀胱蘊熱風濕相乘陰囊腫脹大小便不利白牽牛二兩桑白皮炒白朮木通陳皮各五錢上為細末每服二錢空心薑調服小兒服半錢
