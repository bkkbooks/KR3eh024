body:
  text: 卷七十三腹痛論東垣曰夫心胃痛及腹中諸痛皆因勞力過甚飲食失節中氣不足寒邪乘虛而入客之故卒然而作大痛經言得炅則止炅者熱也以熱治寒治之正也然腹痛有部分臟腑有高下治之者亦宜分之如厥心痛者乃寒邪客於心包絡也前人以良薑菖蒲大辛熱之味未之酒調服其痛立止此直折之耳真心痛者寒邪傷其君也手足青至節甚則旦發夕死夕發旦死中脘痛者太陰也理中建中草豆蔻丸之類主之臍腹痛者少陰也四逆薑桂禦寒湯之類主之少腹痛者厥陰也正陽散回陽丹當歸四逆之類主之雜證而痛者苦楝湯酒煮當歸丸丁香楝實丸之類主之是隨高下治之也更循各臟部分穴俞而灸刺之如厥心痛者痛如針刺其心甚者脾之痛也取之然谷太溪餘臟皆然如腹中不和而痛者以甘草芍藥湯主之如傷寒誤下傳太陰腹滿而痛者桂枝加芍藥湯主之痛甚者桂枝加大黃湯主之夏月肌熱惡熱脈洪疾而痛者黃芩芍藥湯主之又有諸蟲痛者如心腹懊憹作痛聚往來上下行痛有休止腹熱善渴涎出面色乍青乍白乍赤嘔吐水者蛔咬也以手緊按而堅持之無令得脫以針刺之久持之蟲不動乃出針也或局方化蟲丸及諸蟲之藥量虛實用之不可一例治也丹溪曰腹痛有寒有積熱有食積有濕痰有死血脈弦者是食宜溫散蓋食得寒則凝得熱則化更用行氣或利藥助之無不愈脈滑者是痰痰因氣滯而聚阻礙道路氣不得通而痛宜導痰解鬱凡痛必用溫散以其鬱結不行阻氣不運故也腹痛者氣用氣藥如木香檳榔香附枳殼之類血用血藥如當歸川芎桃仁紅花之類治腹痛用臺芎蒼朮香附白芷為末薑汁熱湯調服白芍藥止能治血虛腹痛其餘不治蓋諸痛宜辛散芍藥酸收故也東垣云腹痛雖用芍藥然惡寒而痛加桂惡熱而痛加黃柏腹痛以手可重按者屬虛宜參朮薑桂之類手不可按者是實宜大黃芒硝下之實痛不可補補則其氣不通而痛甚也如感寒腹痛宜薑桂嘔者加丁香如傷暑而腹痛宜玉龍丸如顛撲損傷而腹痛者乃是瘀血宜桃仁承氣湯加當歸蘇木紅花入童子小便並酒煎服下之肥白人腹痛多是氣虛兼濕痰宜半夏人參二術之類飲食過傷而腹痛宜木香檳榔丸下之如氣虛之人傷飲食而腹痛宜調補胃氣並消導藥參朮山楂枳實麥糵木香神麯之類有全不思食其人體素弱而腹冷痛者以養胃湯仍加桂吳茱萸各半錢木香三分或理中湯建中湯皆可用內加吳茱萸良如腹中常有熱而痛此為積熱宜調胃承氣湯下之小腹實痛用青皮以行其氣小腹因寒而痛宜肉桂吳茱萸絞腸痧作痛以樟木煎湯大吐或白礬調湯吐之鹽湯亦可探吐宜刺委中出血臍下忽大痛人中黑者多死腹中鳴乃火擊動水也蓋水欲下火欲上相觸而然用二陳湯加黃連梔子有臟寒有水而鳴者宜分三陰部分而治中脘太陰臍腹少陰小腹厥陰腹中窄狹須用蒼朮若肥人自覺腹中窄狹乃是濕痰流灌臟腑氣不升降燥飲用蒼朮行氣用香附如瘦人自覺腹中窄狹乃是熱熱氣熏蒸臟腑宜黃連蒼朮戴氏曰寒痛者綿綿痛而無增減者是時痛時止者是熱也死血痛者每痛有處不行移者是也食積者痛甚欲大便利後痛減者是濕痰痛必小便不利龔氏曰凡腹中痛甚飲涼水一盞其痛稍可者屬熱痛當用涼藥清之清之不已而或繞臍硬痛大便閉實煩渴用涼藥下之利氣丸之類若飲水愈加作痛屬寒痛用溫藥和之和之不已而或四肢厥冷腹痛嘔吐瀉痢急服熱藥救之附子理中湯之類須詳脈來有力無力李氏曰大腹痛多食積外邪臍腹痛多積熱痰火小腹痛多瘀血及痰與溺澀臍下卒大痛人中黑者中惡客忤不治陰證滿腹牽痛自利或嘔喜按少食綿綿不減宜溫之陽證腹中覺熱甚則大便閉澀脹滿怕按時痛時止宜下之舊以虛痛喜按實痛怕按但寒熱邪有淺深不可太泥經謂寒氣入經客於衛分則血澀急痛按之熱則止寒氣客於榮分則氣鬱滿痛甚怕按寒氣客腸胃募原血絡急引皮痛按之則氣血散而痛止寒氣客夾脊背俞之脈則深按之不能及也寒氣客關元則氣逆喘寒氣客厥陰脈絡則脅肋與小腹或陰股引痛寒氣客小腸募原之間則血氣凝聚成積寒氣宿小腸不聚則腹痛而泄寒氣客胃則腹痛而嘔寒氣客五臟則痛死復生尋常外感胃寒證卒痛吐利俱酸喜熱物尉者五積散加吳茱萸木瓜煨蔥或藿香正氣散加木香少許風證桂枝湯加芍藥或胃風湯加木香暑證香薷飲加生薑陳壁土紅蓼木瓜或五苓散濕證除濕湯或香蘇散加蒼朮枳殼積熱時痛時止痛處亦熱手不可近便閉喜冷宜四順清涼飲大承氣湯三黃丸老人麻子仁丸食積鬱結腸胃作痛得大便後則減者宜平胃散或消導藥或保和丸枳朮丸紅丸子調之或木香檳榔丸大黃備急丸神保丸如意丹下之又有食填胸滿心胃作痛者宜大吐之濕痰阻滯氣道必小便不利或二便俱不利宜芎術散如清痰留滯胸膈作聲者控涎丹小胃丹痰火痛乃火欲升水欲降相擊腸鳴者二陳湯加芩連山梔如怒火攻衝痛無定處定時者更加香附芍藥青皮又有糞結腸鳴作痛不大便者大黃備急丸之類通之如臟寒冷結腸鳴者宜分三陰以溫藥治之蟲痛肚大青筋往來絞痛痛定能食發作有時不比諸痛停聚不散烏梅丸化蟲丸七情痛心胸痞悶或攻注脅背虛者七氣湯術香勻氣散木香化滯湯實者三和散分心氣飲中虛脾弱隱隱冷痛全不思食者人參養胃湯加肉桂吳茱萸木香素氣虛挾痰者六君子湯加蒼朮瘀血痛有常處或憂思逆郁跌撲傷瘀或婦人經來産後惡瘀血不盡而凝四物湯去地黃加桃仁大黃紅花又血虛鬱火燥結阻氣不運而痛者四物湯倍芍藥加炒乾薑凡痛多屬血澀通用芍藥甘草為主惡寒而痛屬腎脾宜加肉桂惡熱而痛屬脾胃加黃芩脈緩傷水加桂枝脈澀傷血加當歸脈遲傷寒加乾薑臍下痛加熟地黃惟氣分諸痛不宜芍藥酸收宜木香檳榔青皮陳皮香附辛散之劫痛手拈散虛宜辛溫消散燒脾散蟠蔥散丁香脾積丸果系沉寒痼冷小腹下痛者酒煮當歸丸經曰結者散之是也實宜辛寒推蕩經曰通因通用痛隨利減是也方與積熱痛同腹屬坤久病宜和脾胃如脈弦急木剋土也小建中湯加當歸取芍藥味酸於土中瀉木為君如脈沉細水侮土也理中湯取乾薑辛熱於土中瀉水為君如脈緩腹痛自利米穀不化者平胃散加肉桂吳茱萸取蒼朮苦辛瀉濕土為君胃氣下陷者加升麻柴胡蒼朮以升之有積者加山楂麥芽枳實黃連木香以消之上熱下寒升降失常腹痛嘔吐者黃連湯主之疝痛引睪丸痢痛拘急積聚痛有形可按腸癰痛臍生瘡小便如淋脈芤痧證痛嘔吐脈沉治見各條腹中自覺窄狹神昏性燥乃濕痰濁氣攻於心脾以致升降失常肥人多濕痰宜二陳湯加蒼朮燥濕香附行氣瘦人多火宜二陳湯加黃連清熱蒼朮流濕心神不斂者俱加遠志麥門冬酸棗仁血氣虛者六君子湯加芎歸養血流濕自然平復脈法脈經曰脈細小緊急病進在中腹中刺痛陰弦則腹痛弦急小腹痛尺脈實小腹痛當利之心腹痛不得息脈細小遲者生脈大而疾者死腹痛脈反浮大而長者死治內寒腹痛方薑桂湯治寒腹痛乾薑肉桂良薑各七分枳殼麩炒陳皮砂仁厚朴薑汁炒吳茱萸炒各一錢香附一錢半木香五分另研入服甘草炙三分上銼加生薑三片水煎服痛不止加玄胡索茴香乳香寒極手足冷加附子去茱萸良薑泄瀉去枳殼香砂理中湯治綿綿痛而無增減欲得熱手按及喜熱食者是寒人參白朮炒乾薑炮甘草炙藿香砂仁各一錢上銼加薑棗煎服厚朴湯治脾胃虛寒心腹滿及秋冬客寒犯胃時作疼痛厚朴薑製陳皮去白各二兩茯苓一兩乾薑甘草各五錢上銼每服八錢加生薑水煎服高良薑湯治因寒心腹大痛高良薑厚朴薑製官桂各一錢上銼作一服水煎服一方加當歸厚朴溫中湯治胃虛冷脹滿疼痛厚朴陳皮各一錢茯苓草豆蔻甘草炙木香各五分乾薑三分半上銼加生薑水煎服附子粳米湯治腹中寒氣雷鳴切痛胸膈逆滿嘔吐附子一個炮半夏一兩二錢五分甘草半兩大棗十個粳米半升上銼以水八升煮米熟為度去渣溫服一升日三服益智散治一切冷氣攻心脅臍腹脹滿絞痛川烏炮去皮臍四兩益智仁乾薑炮青皮去穰各一兩上為細末每服三錢加生薑三片棗二枚水煎溫服食前桂萸湯治胸滿氣噫下部冷臍腹㽱痛半夏二兩生薑六兩陳皮去白四兩桂一兩吳茱萸湯泡五十粒上㕮咀用水十升煮取四升分五服空心食前草豆蔻湯治臍腹虛脹作痛草豆蔻黃耆春夏勿用益智仁甘草炙半夏枳實麩炒各五分青皮陳皮各六分川歸茯苓各七分神麯炒四分木香三分澤瀉一錢上銼一服加生薑三片水煎溫服益胃散治因服寒藥過多致腹痛不止人參厚朴白豆蔻甘草炙薑黃乾薑砂仁澤瀉各三分益智仁六分陳皮黃耆各七分上銼作一服加生薑水煎服霹靂散治腹疼脈微欲絶附子一枚炮取以冷灰培之去皮臍上銼每服五錢入真臘茶一錢同研細為末分作二服每用水一盞煎七分去渣入蜜一匙稍冷服益智和中丸治心腹中大痛煩躁冷汗自出草豆蔻仁四錢益智仁一錢三分砂仁七分甘草炙二錢半黃耆當歸身人參乾薑麥門冬神麯陳皮各五分桂枝桂花各一錢半大麥芽炒三錢半黃連生地薑酒炒各一錢薑黃三分木香二分上為細末湯浸蒸餅為丸如桐子大每服二三十丸溫水下細嚼亦得治積熱腹痛方開鬱導氣湯治腹痛有熱並治諸般肚腹疼痛一服立止蒼朮米泔浸香附童便浸川芎白芷茯苓滑石梔子炒黑神麯炒各一錢陳皮乾薑各五分甘草少許上銼一劑水煎溫服散火湯治熱痛乍痛乍止脈數者火也黃連炒芍藥炒梔子炒枳殼陳皮厚朴香附撫芎各一錢砂仁木香另研茴香各五分甘草三分上銼一劑加生薑一片水煎服痛甚不止加玄胡索乳香厚朴三物湯治痛而大便祕者此實熱也厚朴一兩大黃四兩枳實五個上以水一斗二升先煮二味取五升次下大黃煮取二升溫服一升以利為度四順清涼飲治熱結腹痛當歸酒洗赤芍藥煨各一錢半大黃三錢青皮醋炒枳殼麩炒各一錢甘草炙五分上銼水煎食前調胃承氣湯治腹中常覺有熱而暴痛暴止者此謂積熱大黃酒浸三錢芒硝二錢甘草一錢半上銼先煎大黃甘草至七分去渣入芒硝再煎一二沸溫服取利一方加桂枝六合散治一切燥熱鬱結汗後餘熱宣轉不通並治小腸氣結心腹滿悶胸中痞結走注疼痛大黃酒蒸一兩白牽牛炒黑牽牛略炒甘遂各半兩檳榔三錢輕粉一錢上為細末每服一錢蜜水調下量虛實加減黃連湯治胸中有熱胃中有邪氣腹內痛甚時欲嘔吐此藥升降陰陽黃連甘草炙乾薑桂枝各五錢人參二錢半夏半合湯泡七次去皮臍上銼入生薑五片大棗一枚量水煎服芍藥甘草湯治四時腹痛白芍藥甘草炙各等分上銼每服五錢入生薑三片水煎溫服腹痛脈弦傷氣用本藥脈洪傷金加黃芩脈緩傷水加桂枝脈澀傷血加當歸脈遲傷寒加乾薑桂枝加大黃湯治腹中寒熱不調而大痛桂枝炒甘草生薑各三兩芍藥六兩大黃一兩大棗十二枚上銼每服一錢水煎服治食積腹痛方香砂平胃散治食積腹痛香附炒砂仁厚朴薑汁炒蒼朮米泔浸陳皮枳殼麩炒山楂去子神麯炒各一錢木香官桂乾薑甘草各三分上銼一劑加生薑三片水煎服異香散治脾胃不和胸脅膨脹飲食難化噫氣吞酸一切冷氣結聚腹中刺痛此藥最能治之石蓮肉去皮甘草炙蓬朮炮三稜炮益智仁炒各一兩青皮去白各三兩厚朴薑製二兩陳皮三兩上為末每服三錢加生薑三片棗一枚鹽一捻同煎熱服丹溪方治酒積腹疼痛檳榔木香三稜蓬朮香附官桂蒼朮厚朴陳皮茯苓甘草上為末神麯糊丸桐子大每服五十丸白湯下丁香脾積丸治諸般食積氣滯胃膈脹滿心腹刺痛丁香木香不見火巴豆去皮心膜高良薑米醋煮各半兩青皮洗一兩蓬朮京三稜各二兩皂角三大挺燒存性上入百草霜三匙同碾為末麵糊丸如麻仁大每服十丸至二十丸止脾積氣陳皮湯下口吐酸水淡薑湯下吐藿香甘草湯下小腸氣炒茴香湯下人血氣刺痛淡醋湯下小兒疳氣使君子湯下此藥以五更初服利三五行後用白粥補以上諸方治冷積腹痛之劑枳實大黃湯治食積並熱積腹痛大便不通者枳實大黃厚朴檳榔各二錢甘草木香各五分上銼水煎服以利為度木香檳榔丸治因飲食一切作腹痛者用此消導漸去為佳木香檳榔青皮去白枳殼麩炒莪朮煨切黃連黃柏香附大黃炒各一兩黑牽牛生取頭末三兩上為末滴水丸如桐子大每服五七十丸食後生薑湯下河間木香檳榔丸治食鬱氣滯作痛木香檳榔各三錢青皮陳皮白朮各五錢厚朴薑製四錢枳實炒六錢麥蘖面炒七錢上為細末湯浸蒸餅為丸如桐子大每服五十丸溫水下食遠服神妙列仙散治因酒所傷以致心腹痛者用此消導之最妙木香沉香茴香檳榔各一錢萹蓄二錢瞿麥五錢麥蘖炒一兩半大黃微焙炒一兩上為末每服三錢或五錢五更時熱酒送下能飲者多飲二三杯不妨仰面臥覆手胸前至天明取下大便如魚腦小便如血為效忌生冷硬物及葷腥止啖米粥葷音熏道家以韭蒜藝臺胡荽薤為五葷以上諸方治熱積腹痛之劑加味二陳湯治氣虛之人因飲食過傷而腹痛者宜補瀉兼施陳皮半夏茯苓甘草人參白朮蒼朮川芎神麯炒麥芽炒上銼加生薑水煎服蒼朮丸治失飢傷飽肚痛不食蒼朮炒橘紅各等分上為末生薑汁打炒神麯糊丸如桐子大每服七十丸米飲下以上諸方治虛弱食積腹痛之劑治濕痰腹痛方芎術散治痰積作痛脈滑小便不利川芎蒼朮香附白芷各等分上為末磨木香薑汁點熱湯調服控涎丹治痰涎停聚胸膈間隨氣升降作痛小胃丹亦可用甘遂去心大戟去皮白芥子各等分上為細末糊丸如桐子大每服五七丸至十丸食後臨臥淡薑湯下仍量虛實加減治氣滯腹痛方木香順氣散治氣滯腹痛木香一錢檳榔青皮醋炒陳皮去白蒼朮米泔浸炒厚朴薑汁炒枳殼麩炒砂仁各一錢甘草炙五分香附一錢上銼加生薑三片水煎食前服四合飲治痰積氣滯而痛者陳皮半夏茯苓紫蘇厚朴香附枳殼鬱金各一錢甘草炙五分上銼加生薑水煎服調氣散治氣滯於內胸膈虛痞腹中刺痛青皮香附各一錢半夏八分檳榔七分陳皮紫蘇木香各五分甘草乳香沒藥各三分上㕮咀作一服水二鍾加生薑三片煎至八分溫服食後一方治七情不順鬱火攻衝腹痛時發時止痛無定處陳皮青皮香附芍藥山梔炒黃連炒黃芩炒各一錢半夏薑汁製八分甘草五分上㕮咀加生薑三片水煎熱服木香調氣散治氣滯胸膈虛痞噁心宿食不消心腹刺痛白豆蔻仁丁香檀香木香各二兩砂仁四兩藿香葉甘草炙各八分上為末每服二錢入鹽少許沸湯點服沉香降氣湯治三焦痞滯氣不宣暢心腹滿痛嘔吐痰沫五膈五噎並皆治之沉香木香丁香藿香人參甘草炙白朮各二兩肉豆蔻桂花檳榔陳皮去白砂仁川薑炮枳實炒白檀香各一兩白茯苓青皮去白白豆蔻各半兩上㕮咀每服三錢入鹽少許水煎溫服蟠蔥散治脾胃虛冷氣滯不行攻刺心腹痛連胸脅膀胱小腸疝氣及婦人血氣刺痛三稜煨蓬朮茯苓青皮去白各六兩檳榔丁皮各四兩延胡索肉桂乾薑炮各二兩蒼朮砂仁甘草炙各半兩上為末每服二錢加蔥白一莖水煎空心熱服撞氣阿魏丸治五般噎疾九種心痛痃癖氣塊冷氣攻刺腹痛茴香炒青皮去白陳皮去白蓬朮川芎甘草炒各一兩胡椒白芷肉桂去皮縮砂小茴香炒各半兩生薑四兩切片鹽半兩淹一宿阿魏酒浸一宿同面為糊各一錢半上為末阿魏和麵糊為丸如雞頭實大每藥一斤用硃砂七錢為衣每服三五粒丈夫氣痛炒薑鹽湯下婦人血氣痛醋湯下七氣湯治七情之氣鬱結於中心腹絞痛不可忍人參甘草炙肉桂去皮各一兩半夏湯泡七次五兩上㕮咀每服三錢加生薑三片水煎空心熱服治瘀血腹痛方消瘀飲治瘀血腹痛當歸芍藥生地薑酒炒桃仁紅花蘇木大黃芒硝各三錢甘草一錢上用水一鍾半先煎余藥至八分次入大黃煎再入硝溫服加味承氣湯治因事傷損或酒後涉水血凝腹痛大黃朴硝各二錢枳實厚朴當歸官桂各一錢甘草五分病急者不用上銼一劑水酒各一鍾煎服仍量虛實加減桃仁承氣湯治跌撲損傷瘀血作痛大黃三錢厚朴枳實各一錢半當歸蘇木紅花各一錢桃仁九個上㕮咀水酒各一鍾煎入童便少許同服加味芎歸湯治死血作痛每痛不移動者是也當歸川芎芍藥桃仁紅花各等分上㕮咀水煎服痛甚者加酒製大黃手拈散治腹痛兼心痛草果玄胡索五靈脂沒藥乳香各等分上為細末每服三錢空心溫酒調服治蟲咬腹痛方椒梅湯治蟲痛烏梅花椒檳榔枳實木香香附砂仁川楝子去核肉桂厚朴乾薑甘草各等分上銼加生薑一片水煎服四聖丹下腹中蟲檳榔一錢大黃黑牽牛各五分甘草炙四分上為末加艾葉七片水一大鐘入好醋少許煎湯服立效追蟲丸木香檳榔蕪荑錫灰各一錢一分使君子肉二錢大黃三錢牽牛取末一兩上先取皂角與楝樹根皮二味濃煎汁二大碗熬成膏和前藥末為丸如桐子大將沉香末為衣後又將雷丸末為衣每服五十丸空心砂糖湯下追取蟲積即愈追蟲取積散檳榔末一錢半黑醜頭末二錢陳皮八分木香末五分上為末研勻每服五錢小者三錢砂糖湯調下五更服行三四次以米湯補之忌魚腥油膩之物三五日五仙丸治諸蟲如神大黃四兩皂角雷丸苦楝根各一兩木香一錢上為末酒糊丸如桐子大每服三四十丸茶清下雄檳丸治腹中乾痛有時者蟲也雄黃白礬檳榔各等分上為末飯丸黍米大每服五分食遠米飲下治中虛腹痛方加味補中益氣湯治勞倦飲食損傷元氣或過服寒涼消導之藥致清氣下陷肚腹大痛此內傷證也服此湯立止其效如神人參黃耆蜜炙白朮白芍藥酒炒甘草炙陳皮當歸各一錢升麻柴胡砂仁各五分上銼一劑水煎服余族叔年六十餘以飲酒積熱常患腹痛醫每用芩連大黃之屬暫時取效然時止時作數年不愈一日復大痛醫復用前藥遂連痛四十餘日不止因致身重不起目閉不開肌熱如火晝夜不眠而胸中結塊如石飲食不下醫更用青枳曲糵之屬消導之其痛愈甚余診視見六脈洪大而虛曰此成內傷也用此藥一帖痛止積散當夜熱退安寢矣次日諸病悉除惟不能食更用參苓白朮散二帖遂飲食如常或問痞積而用升提何也曰此非實積乃清陽下陷濁陰上升寒涼藥過多所致虛結耳升補清陽則濁陰自降何病不瘳哉人參治中湯治腹中虛寒作痛人參白朮茯苓乾薑炮各一錢青皮陳皮各七分砂仁五分上銼加生薑三片水煎服治小腹寒痛方四物苦楝湯治臍下虛冷腹痛當歸酒浸川芎白芍藥酒炒熟地黃酒洗玄胡索苦楝各一錢半上銼水煎溫服小建中湯芍藥三兩桂枝一兩半甘草一兩生薑一兩大棗六個膠飴半斤瀉嘔不用上銼每服五錢水煎下飴再匙許再煎化溫服一捏金散治臍腹大痛及奔豚小腸氣等證玄胡索川楝子全蠍去毒炒茴香各等分上為細末每服二錢匕熱酒調下神驗酒煮當歸丸治小腹寒痛及婦人之白帶疝㿉大寒等證當歸一兩黑附子良薑各七錢茴香五錢上四味細切以上好無灰酒一升半煮至酒乾盡焙乾入後藥白露晷長六尺二寸八分未當至而至多病水腹閉疝瘕證炙甘草苦楝生用丁香各五錢玄胡索四錢木香升麻各一錢柴胡二錢鹽炒黃全蠍各三錢上同研為細末酒煮麵糊為丸如桐子大每服五七十丸空心淡醋湯下忌油膩冷物及酒濕面增損當歸丸治三陰受邪心腹疼痛當歸川芎白芍藥熟地砂仁炒防風獨活全蠍各五錢續斷茴香各一兩苦楝玄胡索各七錢木香丁香各二錢半上為細末酒糊丸如桐子大每服五十丸白湯下一方治腹中撮痛不可忍玄胡索當歸白芍藥川芎乾薑各等分上為末每服三錢溫酒調下又方治證同前玄胡索桂心各半兩當歸一兩上為細末熱酒調二錢治腸鳴方加味升陽除濕湯治胃寒泄瀉腸鳴升麻柴胡羌活防風蒼朮陳皮神麯澤瀉豬苓各五分麥蘖炒甘草炙各三分益智仁半夏各五分上㕮咀水煎食後服加味二陳湯治腹中水鳴作痛此火動其水也陳皮半夏茯苓甘草黃芩黃連山梔子上銼水煎參朮湯腸鳴多屬脾胃虛經云脾胃虛則腸鳴腹滿又云中氣不足腸為之苦鳴人參白朮甘草炙黃連枳殼乾薑上銼水煎服吞厚朴紅豆丸葶藶丸治湧水疾行則腹鳴如囊裹水漿之聲此肺移寒於腎水氣客於大腸故名湧水葶藶隔紙炒澤瀉椒目桑白皮杏仁豬苓去黑皮各五錢上為末煉蜜丸如桐子大每服二十丸蔥白湯下不拘時以利為度
