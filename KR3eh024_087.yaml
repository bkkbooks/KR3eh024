body:
  text: 卷八十七金刃傷論劉宗厚曰金刃傷是不因氣動而病生於外外受有形之物所傷乃血內筋骨受病非如六淫七情為病有在氣在血之分也所以損傷一證皆從血論若傷皮出血或亡血過多者兼補而行之薛氏曰金瘡出血不止若素怯弱者當補氣若素有熱者當補血若因怒氣當平肝若煩熱作渴昏憒當補脾氣若筋攣搐搦當養肝血不應用地黃丸以滋腎水脈法金匱云寸口脈浮微而澀然當亡血若汗出設不汗出者當身有瘡被刀斧所傷亡血故也脈經云金瘡出血太多其脈虛細者生數實大者死又曰金瘡出血脈沉小者生浮大者死砍刺出血不止者其脈來大者七日死滑細者生治金刃傷外敷方熱黏皮治金瘡出血不止龍骨煅三錢五倍子半生半炒白礬半生半枯各二兩無名異一兩乳香沒藥各二錢上共為末干撒患處不作膿不怕風立時止血住痛生肌如神金傷散治金瘡出血不止及跌打綻破血出白及白蘞乳香各一兩陳石灰達年者半斤龍骨五錢黃丹三錢上為細末干撒患處用軟紙或綿或絹重重包之沒藥散治刀箭傷止血定痛定粉風化石灰各一錢枯白礬三錢另研乳香五分另研沒藥三分另研上為細末干撒之金瘡方治打跌刀斧破傷五倍子炒存性半斤頭髮一兩剪碎燒存性陳米粉子一斤炒黃色量加馬屁疱無亦可上為細末濕則干撒乾用唾調敷封瘡口瘡痊自落一方只用頭髮燒灰粉子炒黃二味合為細末撒之神效勝三七散治刀斧跌磕一切傷損止血定痛如神五倍子炒枯用青布包腳下踩扁白礬枯過各等分上研為細末撒患處包裹此方治頭蓄一切破傷亦妙真仙方也一方單用五倍子生為末干貼地黃散治金瘡止血除疼痛闢風續筋骨生肌肉地黃苗地松青蒿蒼耳苗生艾汁赤芍藥各五兩入水煎取汁上五月五日七月七日午時修合以前藥汁拌石灰陰乾入黃丹三兩更杵為細末凡有金瘡折傷出血用藥包封不可動十日瘥不腫不膿刀瘡藥降香節白松脂各一兩血竭一錢半沒藥五分文蛤炒五錢即五倍子上共為末掩傷處即愈一方治金瘡血不止半夏石灰鬱金上為末撒傷處即止石灰散治金瘡風化石灰嫩韭葉上二味同搗入鵝血調和成餅乘風陰乾為末敷上無鵝血亦得一方用石灰一升石榴花半斤搗取末少許擦少時血斷便瘥一方石灰同生晚蠶蛾搗成餅陰乾為末敷之一方五月端午日採一去草花蕊嫩者或嫩蒿頭搗爛量入舊石灰搗極勻或丸或餅陰乾碾細乾用清油或唾津調擦濕則干撒狗咬湯火所傷並治有效一方用石灰四兩五月五日備下烏魚骨一兩於本日平旦令人不語采地上青薊萵苣菜各一握同煎藥搗於日未出時摶作餅子曬乾用時旋刮敷之早用並不作膿千金簡易方云治金瘡者無大小冬夏及始出傷血出便以石灰厚敷裹之既止痛又速愈無石灰柴灰亦可若瘡甚深未宜速合者少入滑石令瘡不時合也一方陳石灰六兩研碎同大黃切粗塊一兩鍋內炒灰紫色去大黃羅過敷傷處立效一方用臘月牛膽入風化石灰懸當風候乾撒之金槍散治一切刀割破打破跌破出血不止破開口不合用此止血生肌住痛立效銀末血竭發灰人指甲燒存性珍珠燒存性各等分上為細末研勻撒患處一方單血竭末敷立止刀箭藥牛膽一個石灰不拘乳香血竭各少許白及五錢為末上藥入牛膽內窨干為末每用少許干貼制此不得犯婦人手窨音蔭地室也今謂地窖藏酒曰窨生肌膏治金瘡及一切打損傷胡粉白芍藥熏陸香乾薑炮各一兩油四兩黃蠟上為細末以油蠟相合煎如膏用貼瘡上日二換之金瘡生肌散黃丹飛過乳香沒藥各五錢寒水石煅過一兩辰砂二錢血竭四錢天靈蓋燒灰一錢上為末以麻油潤之用川椒湯溫洗金瘡方牛膽南星四兩陳石灰不拘多少放牛膽內陰乾干蝦蟆一個輕粉三錢上為細末撒上一方治刀斧傷止血定痛生肌一上即愈晚蠶蛾白芷當歸頭陳石灰各等分上為末敷傷處即愈玉真散治刀刃傷並犬咬定痛生肌南星防風各一兩上為細末撒於瘡口上一捻金治金槍所傷並臁瘡及馬斷梁等瘡石灰四兩白礬一兩二味用臘月牛膽一個裝入陰乾取出黃丹炒一兩上研末用之一方治刀箭傷出血不止併骨折檳榔一個木香胡地黃各三錢上為末敷瘡口血立止又可接骨劉寄奴散治金瘡止疼痛止血生肌劉寄奴一味為末敷瘡口一方血竭末敷之立止一方龍骨末撒之一方何首烏為末搭傷處血即止一方小薊葉搗爛封之一方好降真香為末貼之入水並無傷痕絕妙一方晚蠶蛾為末撒勻綿帛裹隨手瘡合一方同石灰搗或餅陰乾為末敷之一方用楮樹葉為末擦上血即止止痛生肌散治刀斧傷出血不止乳香沒藥孩兒茶象皮炒龍骨水飛石膏煅水飛黃丹水飛三七各等分上共為細末用之一方治金瘡皮破筋斷者以白膠香塗之或以金沸草汁頻塗自然相續金瘡收口藥小皂子樹獨根者曬乾不見火龍骨二錢酒煅一次血竭鳳尾脫松香乳香沒藥葛苧各一錢馬屁勃一個上同研細末用撒瘡口治金刃傷內服方當歸散治金瘡去血過多當歸酒洗五錢白芍藥三錢半川芎生地黃酒炒人參黃耆各三錢黃芩炒川椒桑白皮各二錢甘草一錢上為細末每服三錢溫酒調下內托黃耆丸治針灸傷經絡流膿不止黃耆八兩當歸洗三兩肉桂去皮木香乳香另研沉香各一兩上為末用綠豆粉四兩薑汁煮糊為丸如梧桐子大每服五十丸熟水送下不拘時一方治金瘡血不止白芍藥一兩炒黃上杵細為末酒後米飲下二錢並得用三服漸知王不留行散治槍瘡王不留行十分八月八日採蒴藿細葉十分七月七日採桑根白皮三月三日採甘草各十分黃芩二分川椒三分除目閉口者出汗乾薑芍藥厚朴各二分上九味桑根皮以上三味燒灰存性勿令過各別研杵篩合治為散服方寸匕小瘡即粉之大瘡但服之產後亦可服如風寒桑東南根勿取之前三物皆陰乾百日用一方治下蠶室瘡口不合用所割勢火煅為末酒調服昔有沈生者狎近女冠或欲白其師沈懼引刀自割其勢瘡口流血經月不合或教以此法不數日而愈治金瘡腸出方一方治金槍傷腹裂腸出者黃耆當歸川芎白芷續斷鹿茸黃芩細辛乾薑附子芍藥各二兩上為末先飲酒次服五錢匕日三服加至方寸匕立驗傷重困乏者亦宜一方治金瘡腸出磁石滑石鐵精各三兩上為末粉腸上後用磁石末飲服方寸匕日五夜二腸即入一方磁石滑石各二兩為細末白米飲服方寸匕日再用一方治被傷腸出不斷肘後方云治腸出欲燥而草土著腸者作大麥粥用汁洗腸推納之常研米粥飲之二十日稍稍作強糜百日後乃可瘥治箭鏃不出方一方治金瘡箭在肉中不出白蘞半夏各等分上為末酒服方寸匕三日淺瘡十日出瘡深二十日出終不住肉中一方治卒中箭不出或肉中有聚血取女人月經布燒灰屑酒服之一方治箭鏃及諸刀刃在咽喉胸膈諸隱處不出牡丹皮一分白鹽二分肘後方作白蘞上為末以酒服方寸匕日三服出一方瞿麥酒服方寸匕日三瘥一方取瓜蔞汁塗箭瘡上即出一方螻蛄搗取汁滴上三五度自出一方治毒箭所中搗藍汁一升飲之並以敷瘡上若無藍汁取青布漬絞汁服之並淋瘡中毒箭有二種交廣夷貍用燋銅作箭此一種才傷皮便悶憹怫亂而死若中之用飲糞汁並以敷之亦可惟此最妙又有一種又射罔塗箭鏃人中之亦困若著寬處不死近腹亦宜急治葛氏方用藍汁大豆豬羊血解之一方治箭鏃入骨不可拔者巴豆去殼微炒蜣螂上研勻塗所傷處須臾痛定又微癢忍之待極癢不可忍便撼動箭鏃拔之立出一方出箭頭蜣螂不拘多少全用麝香上為極細末撥動箭頭撒藥瘡口內踴鐵膏取箭頭一切針刺入肉盡皆治之鼷鼠頭一個或用入油汁內熬螻蛄四十九枚芫青一兩土消蟲十個巴豆馬肉內蛆焙乾信醬蛆焙乾夏枯草硇砂磁石黃丹地骨皮蘇木蜣螂各一兩石腦油三兩蒿柴灰汁三升上將石腦油蒿柴灰汁文武火熬成膏次下地骨皮等末令勻瓷器內收貯臨用時量瘡勢大小點藥良久箭頭自湧出一方治箭鏃不出及惡刺以齒垽和鶴蝨敷之一方用花蕊石火煅七次為細末撒在傷處周圍箭頭即出治針刺入肉方神聖膏治針入皮膚車脂成膏者不拘多少攤紙上如錢大貼之二日一換三五次針自出大有神效一方用雙仁杏仁搗爛以車脂調貼瘡上其針自出一方用烏鴉翎三五枚火炙焦黃為末醋調塗瘡上紙蓋一二時針出效一方刮象牙為末水和聚著折針上即出如在咽中水調飲之一方以鼠脂塗之一方用磁石吸鐵者著上即出一方用螻蛄腦子同硫黃研細調敷以紙花貼定如覺癢時其針自出繡針刺足已出痛者用黃泥罨之諸方治竹木刺在皮中不出羊糞燥者燒作灰和豬脂塗刺上若不出重塗乃言不覺刺出一方用干羊糞末一方目頭垢塗之即出一方用蠐螬研敷立出一方細嚼粟子渣罨傷處一方用牛膝根莖生者並搗以敷之即出瘡已合猶出也一方用白茅根燒灰末以膏和塗之一方用鹿角末以水和塗之立出久者不過一夕一方用薔薇灰水服方寸匕日三服十日刺出一方酸棗核燒灰服之一方服王不留行即出兼取根為末貼之已出痛者螻蛄罨之妙一方治魚骨在肉中不出嚼吳茱萸封之骨當爛出小兒誤為諸骨及魚骨刺入肉不出者水煮白梅肉研爛調象牙厚敷骨刺處自軟一方治破傷風血凝心針入肉遊走三證如神用烏鴉翎燒灰存性研細調一錢服
