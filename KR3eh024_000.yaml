body:
  text: 原序余昔見同年王公宇泰輯證治準繩劇愛其旁搜博雅古今悉備遂手訂之刪其雜證專以女科名篇曰濟陰又因其證各有治治各有方取綱舉目張之意志以綱目焉夫醫也者近治已遠治人兼男女而躋之春臺統陰陽而登諸壽域斯廣惠於無窮余自庚申歲梓濟陰綱目業已行世因念陰陽一理濟陰有書濟陽何可無書而況人生負陰抱陽一切奇異不經不治之疾無論矣如偶爾之風寒暑熱內外感傷與治法之輕重緩急君臣佐使所謂呼吸存亡之變等於用兵轉盼補救之功同於澍雨者又胡可輕哉余嘗遍觀群書粵自靈素以來名哲代作著述日繁漢有七家唐得六十四宋益以一百九十有七其餘可傳者共五百九十六部一萬有九十二卷而吾熙朝之彥續有萬餘卷汗牛充棟誠難枚舉然簡册浩繁雖有見地之真不乏偏執之弊學者望洋而嘆安識指歸也余幼治儒經長嗜岐黃緣濟陰之術海內不以為謬復於公餘彙集衆編別異比類總以議論特出獨具卓識者擇而録之即如四大家中張長沙之論傷寒劉河間之原病式李東垣之明內傷朱丹溪之治陰虛立言雖異而要皆闡內經之微旨發前賢之未備不相托拾而實相發明者也余用是分門別類或採其論證而論必悉證之原或摘其治方而方必盡治之變派分支析次序有倫仿前綱目之例命以濟陽共計卷一百有八庶兩儀並育萬類咸生譯貝葉而參三要之禪不獨推恩於巾幗睹金丹而悟九還之旨亦可嘉惠於士夫矣豈不善哉天啓六年歲在丙寅冬十二月中浣驪下武之望叔卿氏書注梓濟陽綱目序理無巨細貴求其當況醫乎守一家之傳難免挂漏閲諸氏之説又苦浩繁求所謂簡核精當證論備乎變通治法瞭如指掌者恆不數覯驪陽武叔卿先生吾關中鴻儒也耀巍科位督撫功垂青史為一代名臣而生平尤精放軒岐所著濟陰綱目疹科類編等書海內奉為圭臬又著有濟陽綱目余稔聞之而未獲一睹嘉慶甲子秋闈後偶失調遂成久疴迄今留心於刀圭藥餌者已草餘年凡古今壽世青編名山祕册無不搜羅購備研究而討論之因之家設藥室印施方藥遠近賴者甚衆然竊思以方藥救人何如以祕書壽世甲申覆求遺書因及濟陽綱目而訪諸其裔則藏版已毀失無存邇聞仲庠周公文擢劉公傢俱有是書抄本假觀之見其因證發論既於寒熱虛實本末深淺之致克悉其情因論選方復於溫涼補瀉緩急輕重之宜亦盡其變旁搜博覽別類分門萃諸家之精蘊集醫方之大成論賅而精方備而確較濟陰一書證異功同洵可寶也即欲付諸剞劂以廣其傳但編帙甚富兼抄本魚魯過多文義亦復錯誤難讀余不揣譾陋彙輯諸書校而正之間亦採古人成説注而釋之庶文無遺漏字無舛訛簡核精當經緯分明俾讀者因端竟委豁然心目不獨庸工下醫得所折衷而先生更番濟世之心亦可以不朽矣時道光五年歲次乙酉清明前三日涇陽張楠蔭齋甫識重校濟陽綱目序豫於庚辰抱病久而未瘥因翻閲醫書與醫者討論之而卷帙浩繁病軀難支豫曰是必得一分門別類源委精確者使豫一快目焉適蔭齋侄持濟陽綱目浼豫校正濟陽綱目乃武叔卿先生之編輯蔭齋之注釋也豫閲之喜不自勝因揣摩調理而豫病漸愈蓋其於證也各有類其於類也各有論本之內經以主其綱晰之名家以定其目脈法治方無不悉底至當而蔭齋又參閲諸家究心考證注而釋之是真可以澤被斯世矣豫養病之暇校而正之縱使不知醫不能脈者對證檢方而亦得其治法焉不惟豫幸沾先生之澤天下後世亦無不被蔭齋之仁惠矣豫故樂而記之時道光四年歲次甲申菊月張應潪文溪甫書於守愚書屋張蔭齋先生注梓濟陽綱目序一醫書之理微矣哉作者聖述者明參兩大之權而妙三折之用能回九死於一生昔人謂其通乎仙道良非誣也自後世庸工俗子目不睹金匱玉版之藏心不達素問靈樞之旨往往抄撮湯頭等歌輒以人命為兒戲而稍具聰明者又藉口於盡信不如無之説以自掩其疏於是乎古人之良法微意散見諸琅函祕笈者徒供脈望儳吻矣驪下武叔卿先生為吾關中理學名臣文章政事而外尤精岐黃之術所著濟陰綱目一書風行海內二百餘年全活者不可以數計續又有濟陽之刻惜原版久佚無存嘉慶癸酉余主講池陽聞薦紳家有祕藏此書者屢求苦不可得今年仲夏偶抱宿疴張生秋芬持其尊人所注全册為余撿方且述重加剞劂之意浼余校正舛訛余受而讀之見其博引廣徵門分類別綱舉而目張擇精而語詳與濟陰同一機軸可謂集醫家之大成登斯民於壽域者矣雖然先生有濟世之功而不能保遺編之不蝕於風雨自非蔭齋先生粵若稽古詳參釋義出而廣布之天下後世亦烏識古仁人君子之用心固有如是其懇且摯者而因以通神明贊化育起沉痼而躋之春臺然則是書之刊即謂之叔卿再生可也時在道光乙酉中秋節之前五日贈進士出身內閣中書漢票簽廳行走加二級通家愚弟長安李僎頓首拜二蓋自尼山不言醫而天下之知醫者少然自尼山不言醫而天下之論醫者多何也擇理不精折衷鮮據故纍千萬言而不覺其詳也要之古今之學問經濟政事治術莫不由聖賢之正心誠意格物致知出之余讀濟陽綱目而有得焉綱目者關中武叔卿先生手輯編也先生少與同年王肯堂先生醫學齊名余嘗披其濟陰疹科等書而想見其為人然余竊異叔卿濟世之心既加詳於婦子必廣惠於黎元則濟陰外別有所謂濟陽也何其書之不少概見哉癸未余奉簡校試三秦甫下車即訪關中文獻先輩遺集乃於王三原馬溪田呂涇野及先生文策頗盡搜羅而濟陽一書則竟缺如今歲仲夏偶於李菘安同年館得其抄本數册余異之因詢其由知為徑邑張蔭齋先生抄釋已繕寫讎校將付棗梨而菘安藉以撿方者也攜歸竟覽見其議論有本援引有據而於陰陽燥濕之變化一綜之脈理藥性審證立方隨時運用節節卷卷考證精詳直令觀者瞭如指掌洵足以括素問內經準繩於不逮也先生早登黃甲飽經史學問經濟無一不參古聖賢之精微政事治理無一不超古大臣之綱紀余僻處偏隅長列藝苑翰墨詞章固屬本業而醫則茫無所解然幼善病自調參朮其於岐黃亦不啻三折肱矣昔範文正以不得為良相願為良醫是禱豈非以醫之事小而醫之道則大乎夫調燮陰陽參贊天地醫之治人與相之治國等今先生出道德之緒餘以醫民而人即得以醫家醫天下醫後世何莫非從正心誠意格物致知中來者乎雖然此書版毀無存嗜古家鮮有什襲使不有蔭齋先生信好誠求引證悉注發前賢之未發無毫髮之有憾重鐫而壽之世則斷簡殘編風雨消蝕而隋珠和璧百世下何以見賞識之有真哉余故閲竟即援筆而樂為之序時乙酉小陽月上浣覺庵居士瓊州張嶽菘書於三原試院之能自強齋續刻濟陽綱目序一春懵學寡識中年後以家居多暇留意軒岐即聞驪陽軍門武叔卿先生所著濟陰綱目濟陽綱目二書為醫學之大觀其濟陰綱目風行海內二百餘年刀圭家莫不奉為準繩春既得而讀之矣而濟陽綱目未之獲睹先誠齋胞叔亦業軒岐酷愛各名家醫書常言叔卿先生二書告成後原版一存家祠一存居第明季烽燧頻驚居第就毀而祠宇幸全故彼存而此失也然嗜古之家必有鈔本汝曹搜羅焉春因屢求之坊市及藏書家皆不可得道光乙酉聞邑張蔭齋先生舊藏鈔本方事剞厥惜梓僅半而蔭齋公作古嗣君輩屢欲續刻以卷帳浩繁力綿不果近從其季弟海舫處假觀之見其分門類敘先後證論脈法井井有條學者開卷既易於尋方病者揣脈無難於對證而蔭齋公又集百家之精華匯諸書之奧旨附以己説諸論之中細注釋焉各方之下復引證焉真所謂濟陽之寶筏綱舉而目張者也安可聽其湮沒而不傳哉因函致海航囑其善體兄志以畢此工復為許輸微資俾當局者不至嘆空拳之奮將來是書出而叔卿先生數百年濟世之心傳即蔭齋先生數十載釋義之功亦不朽矣爰為之序而附其書以歸之道光十五年乙未仲夏月涇陽姚時春宜之甫序二嗚呼此先君子所撰濟陽綱目之序文也先君素好善凡鄉鄰之謀義舉而力不從心者輒毅然引為己任蓋天性然也茲書本為蔭齋公未竟之工先君惜其美之不克終也而因有助刊之説乃蔭齋公既捐館舍而先君亦不久辭塵遂致前此之商略竟成畫餅殆是書之厄乎近與海舫公遊偶道及此幸有同心因輸資鳩工一切悉由海舫公督辦甫兩載而事已訖庶幾我兩家父兄之遺憾或可以稍補云爾咸豐六年冬月初一日男恩謹識校刊濟陽綱目序熾自束髮就學每見先子問難於孝廉石抑齋夫子曰管見井窺不堪著述審音辨體尤未易言彼時熾尚幼稚不知其所校何書所注何典然素識先子邃於軒岐竊意其為醫書也及稍長又見先子閉戶翻書終日不倦二十年如一日熾從旁熟視乃知其為濟陽綱目也道光辛卯熾從先秋芬兄肄業乾州學署甲午冬得先子病音即同兄歸里見先子容貌甚羸精神短少而猶競競焉持綱目一書手不釋卷逮易簀時呼熾兄弟至榻前語之曰吾之詩文不願汝曹梓也向所刊叢書輯要痘疹捷要瘟疫稀痘諸書已行於世惟濟陽綱目吾之欲刊也有年矣近者梓工甫集而老病已尋汝曹其有以繼之熾泣而志之弗敢忘厥後屢欲續刊而門衰力薄為郁轖者久之甲寅春同邑姚君錫三承其尊人遺命出資付鋟囑熾親加校讎熾何人斯敢膺巨任顧念姚君善體其親之心而亦可藉補吾親之憾也爰取字學諸書考其點畫別其舛訛惟是熾淺見寡聞其中帝虎魯魚未經釐訂者恐復不少世有博雅君子能匡其所不逮焉則幸甚咸豐六年十一月冬至前三日涇陽張爾熾輔清甫謹識重印濟陽綱目序武之望先生明季吾揚知醫之名宦也著有循聲當解於之初揚州市人民政府右側傳達室之北牆嵌有明代江都縣題名記豐碑一塊武公題名及到任去任年月均詳鐫於上無何原屋改建因建議移置後園本擬先拓一紙拓工謂豎拓較難不若放平後再拓及至興工石竟崩碎乃知其曾經遭火遂無法再得其拓本矣幸事前曾與康熙江都縣志相校原文幾已大部録入志中今當廣陵古籍刻印社印其醫籍囑余作序之際因復檢舊志録其記載於下武之望臨潼人進士萬曆十九年任見康熙江都縣志卷七七頁又於卷十四五十四頁名宦傳中有云武之望陝西臨潼人戊子舉鄉試第一明年成進士令霍邱萬曆十九年調繁江都之望長身玉立丰采映人政和教肅士民安之事上官恭不為阿直不為抗鄉大夫書刺敕門者必露封而後進一時請託頓絶太守議復王塘之望贊之甚力會有撓者垂成而敗三年召為吏部考功主事然事有巧合者當土改之際曾有明版濟陰綱目入藏於揚州文物管理委員會時會中同仁乞余鑑定曾詳加考證原文載入中華醫史雜志年四期中頁濟陰綱目乃武君見王肯堂婦科證治準繩之龐雜也乃復加整理條分縷析使其綱舉目張後又經康熙間汪淇整理加案流傳更廣幾成為中醫婦科必讀之書入清張楠張爾熾喬梓又發現其濟陽綱目手稿乃為刻版印行雖對原稿之真否有所爭論然體例略同資料豐富可資參考似又不應疑之太甚年陝西又曾發現其遺著兒科名慈幼綱目二十年前乞豫鑑定曾一見之去歲余曾親赴西安訪查尚未得其要領今廣陵古籍刻印社影印此書囑豫作序併為檢補缺頁豫謂此舉有雙重意義不僅為地方名宦之著作且又是地方之醫藥著作也方今吾道待昌故豫亦從事中醫古籍之出版工作曾有揚州醫藥叢刊之設想擬仿四部叢刊例廣搜揚人及有關人士之作包括流寓名宦等兼及揚地所刻醫書他日若果實現亦鄉邦史乘中應記之盛事也刻印社同人其能贊襄此舉乎壬戌中秋揚州耿鑑庭於北京頤和園益壽堂
