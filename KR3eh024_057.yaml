body:
  text: 卷五十七赤白濁論或曰思慮過度嗜欲無常俾心腎不交精元失守以為赤白二濁之患赤濁者謂心虛有熱由思慮而得之白濁者為腎虛有寒因嗜欲而得之劉河間謂白濁亦屬乎熱如清水作湯則有白腳夏熱則水渾濁冬寒則水澄清此理亦或然也丹溪云屬濕熱有痰有虛赤屬血由小腸屬火故也白屬氣由大腸屬金故也帶痢同治大率皆是濕痰流注宜燥中宮之濕用二陳湯加蒼朮白朮赤者乃濕傷血也加白芍藥仍用珍珠粉丸加臭椿根白皮滑石青黛作丸藥胃中濁氣下流滲入膀胱用青黛蛤粉肥白人必多痰治宜燥濕降火又有升提之法最妙大法二陳湯加蒼朮白朮升麻柴胡赤者加白芍藥煎服丸藥用樗皮黃柏青黛乾薑炒滑石蛤粉炒神麯糊丸二陳湯治濁加升提之藥能使大便潤而小便長半苓丸治白濁神麯半夏燥濕豬苓分水燥濕痰南星半夏蛤粉神麯糊丸青黛為衣有熱者青黛滑石黃柏之類水丸肝脈弦者用青黛以瀉肝虛勞者用補陰藥胃弱者兼用人參及升麻柴胡升胃中清氣大概不可用熱藥一人便濁半年或時夢遺形瘦作心虛治珍珠粉丸合定志丸服戴氏曰便濁俱是濕熱雖有赤白之異終無寒熱之分精者血之所化有濁去太多精化不及赤未變白故成赤濁此虛之甚也何以知之有天癸末至強力好色所泄半精半血有心火盛亦見赤色痹論云思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫夫腎藏天一以慳為事志意內治則精全思欲外勞則淫溢有若白物淫衍如精之狀男子則隨溲溺而下女子則陰器中綿綿而下也宜內補鹿茸丸小菟絲子丸珍珠粉丸止之李氏曰赤白濁男女同治皆因脾胃濕熱中焦不清濁氣滲入膀胱為濁如夏月熱天則萬木流津赤者血分濕熱甚心與小腸主之導赤散四物二陳湯加樗白皮青黛滑石白者氣分濕熱微肺與大腸主之清心蓮子飲或五積散合四君子湯肥人多濕痰二陳湯加蒼朮白朮赤濁加白芍藥氣虛加參耆傷暑加澤瀉麥門冬人參傷風加防風挾寒加薑桂甚加附子有熱加知母黃柏山梔或星半蛤粉丸因七情生痰者四七湯瘦人多濕火加味逍遙散四物湯加知母黃柏或珍珠粉丸樗柏丸虛挾痰火腎氣丸補陰丸不可純寒藥傷血亦不可純熱藥助火蓋寒則堅凝熱則流通俱宜清上固下思想勞心虛者妙香散十味溫膽湯金蓮丸房欲傷腎虛者萆薢分清飲小菟絲子丸腎氣丸八味丸心腎俱虛無火者還少丹虛冷小腹痛不可忍者酒煮當歸丸土燥水清思亦傷脾精生於穀故久則宜升胃補脾二陳湯加升麻柴胡以升胃氣素有痰火恐升動痰火胸滿者再加枳殼香附神麯白朮或用此吐以提之如虛勞者補中益氣湯脾濕不斂者蒼朮難名丹四炒固真丹白朮膏威喜丸久甚古龍蠣丸石蓮散遠志丸蔭按赤白濁俱是濕熱不必分赤白之異然其中有二一由腎虛敗精流注一由濕熱滲入膀胱腎氣虛補腎之中必兼利水蓋腎有二竅溺竅開則精竅閉濕熱者導濕之中必兼理脾蓋土旺則能勝濕且土堅凝水自澄清也補腎菟絲子丸主之導濕萆薢分清飲主之又按精由水也靜則位安動則妄行何以言之左腎所藏者精也真水也右腎所藏者氣也相火也故夢遺精滑之證皆由人之思想過度以動心火心火者君火也君火動則相火亦動所以激搏真水而疏泄也其為熱證明矣古方往往以為寒而用熱燥之藥猶披薪救火不死何待況龍骨最能涸津液若服之過多晚年發燥熱之所由也慎之或云精泄已久則為寒矣此更差之毫釐謬之千里夫精屬陰也火屬陽也陰精虛而陽火愈熾況經云陰虛生內熱未云陰虛生內寒也又有因誦讀勞心而遺者宜補益之不可輕用涼藥大抵總須臨證察脈辨明虛寒濕熱而施治之不可執一而論學者宜仔細詳察焉脈法女人尺脈澀而弱者或洪數而促者皆為便濁白帶治濕熱便濁方加味二陳湯治胃中濕痰流下滲入膀胱而成赤白濁陳皮半夏茯苓甘草蒼朮白朮柴胡升麻上銼加生薑煎服肥白人屬濕熱加蒼朮白朮炒黃柏之類或有挾寒者加炒乾薑肉桂甚者加附子有心虛不能固守及平素虛寒之人加萆薢石菖蒲益智炒乾薑牡蠣龍骨之類氣虛者加黃耆人參白朮赤者多有血虛瘦弱之人得之宜四物湯加酒知母酒炒黃柏煎湯送下珍珠粉丸赤白濁小腹疼痛不忍者宜作寒治東垣酒煮當歸丸最妙水火分清飲治赤白濁益智萆薢石菖蒲豬苓赤茯苓澤瀉車前子白朮陳皮枳殼麩炒麻黃各一錢甘草五分上銼一劑用水酒各半盞同煎空心溫服久病去麻黃易升麻治濁固本丸治胃中濕熱滲入膀胱濁下不禁蓮花須黃連炒各二兩白茯苓砂仁益智半夏黃柏炒各一兩甘草炙三兩豬苓二兩半上為末蒸餅丸如桐子大每服五十丸空心溫酒下樗柏丸治濕熱痰火濁證兼治便毒及帶下樗白皮一兩黃柏三兩青黛乾薑各三錢滑石蛤粉上為末神麯糊丸桐子大每服七十丸空心白湯下虛勞四物湯下痰甚加南星半夏一方去滑石乾薑加知母牡蠣治遺精珍珠粉丸治遺精白濁蛤粉黃柏各等分上為末滴水丸如桐子大每服一百丸空心溫酒下或加樗皮青黛滑石知母尤妙半苓丸治白濁神麯半夏豬苓上為末曲糊丸如桐子大每服六七十丸空心燈心湯下星半蛤粉丸治濕熱白濁蛤粉二兩南星半夏蒼朮青黛各一兩上為末神麯糊為丸如桐子大每服六七十丸薑湯下一方炒黃柏生黃柏蛤粉各一兩神麯半兩上為末滴水丸服治勞心便濁方萆薢分清飲治思慮過度清濁相干小便白濁益智川萆薢石菖蒲烏藥赤茯苓各一錢甘草五分上作一服用水一鍾半入鹽少許煎七分食前服清心蓮子飲治心虛有熱小便赤濁石蓮肉赤茯苓人參黃耆各一錢二分麥門冬去心地骨皮黃芩車前子各五分甘草炙一錢一方加遠志菖蒲各一錢上作一服水煎空心服熱多加柴胡薄荷加味清心飲治心中客熱煩躁赤濁肥脂白茯苓石蓮肉各一錢半益智仁遠志去心姜炒麥冬去心人參石菖蒲車前子白朮澤瀉甘草炙各一錢上作一服加燈心二十根水煎食前服有熱加薄荷少許又方初起半月服之極驗川萆薢川黃柏酒洗麥冬去心菟絲子酒炒北五味遠志去心各等分上每服八錢加竹葉三片燈心七莖大黃少許水煎空心服遠志丸治赤濁因勞心者神效遠志八錢茯神益智各二兩上為末酒煮麵糊丸如桐子大每服五十丸臨臥棗湯下茯菟丸治思慮太過心腎虛損溺有餘瀝小便白濁夢寐頻泄常服鎮益心神補虛養血清小便菟絲子酒浸五兩石蓮肉去殼三兩白茯苓去皮二兩上為細末酒糊為丸如桐子大每服三十丸空心鹽湯下瑞蓮丸治思慮傷心小便赤濁白茯苓石蓮肉去心炒龍骨生用天冬去心麥冬去心柏子仁炒另研當歸酒浸酸棗仁去油紫石英火煅七次遠志甘草煮去心龍齒各一兩乳香半兩上為細末煉蜜丸如桐子大硃砂為衣每服七十丸空心溫酒或棗湯下加減五苓散治心經伏暑小便赤濁人參白朮赤茯苓香薷澤瀉豬苓蓮肉麥冬去心各等分上㕮咀每服四錢水煎服桑螵蛸散治男子小便日數十次稠如米泔或赤或白心神恍惚瘦瘁減食此證多因房勞過度耗傷真氣得之桑螵蛸鹽水煮遠志甘草水煮去心菖蒲鹽炒龍骨煨研人參茯神去木當歸酒洗去蘆龜甲醋炙各一兩上為末每服二錢臨睡時人參湯下妙應丸治赤白濁真龍骨辰砂石菖蒲各二錢半川楝子取肉桑螵蛸菟絲子酒浸一宿焙各半兩白茯苓益智仁石蓮肉縮砂仁各一錢半牡蠣腳草鞋包火煅細研上為末以山藥碎炒為糊丸如桐子大每服五十丸間日煎人參酸棗仁湯下臨臥粳米湯下龍齒補心湯治諸虛潮熱心驚不寐小便白濁龍齒煅人參熟地砂仁炒當歸酒洗茯神白茯苓麥冬去心黃耆酸棗仁炒去油遠志甘草水煮去骨白朮各一錢甘草五分上作一服水煎食遠服治虛寒便濁方內補鹿茸丸治勞傷思慮陰陽氣虛益精止白淫鹿茸酥炙菟絲子酒浸沙苑蒺藜炒紫菀肉蓯蓉酒浸蛇床子酒浸黃耆各一兩附子炮官桂各五錢陽起石水飛三錢一方有桑螵蛸上為末煉蜜丸如桐子大每服三五十丸空心溫酒下益智湯治腎經虛寒遺精白濁四肢煩倦時發蒸熱鹿茸去毛酥炙巴戟去心肉蓯蓉酒洗益智仁熟地黃酒浸附子炮去皮臍桂心山茱萸去核白芍藥防風枸杞子牛膝灑浸甘草炙各一錢上㕮咀作一服加生薑三片鹽一捻水煎空心服金箔丸治下焦虛小便白淫夜多異夢遺泄蠶蛾破故紙炒韭子炒牛膝酒浸肉蓯蓉龍骨山茱萸桑螵蛸菟絲子酒浸各一兩上為細末煉蜜丸如桐子大每服三十丸溫酒空心下祕精丸治下虛胞寒小便白濁或如米泔如凝脂牡蠣煅菟絲子酒蒸焙龍骨生用五味子韭子炒白茯苓白石脂煅桑螵蛸酒炙各等分上為末酒糊丸如桐子大每服七十丸空心鹽湯下一方治小便白濁出髓條酸棗仁炒去油白朮人參破故紙茯苓益智大茴香左顧牡蠣童便煅碎等分上為末用青鹽酒為丸如桐子大每服三十丸溫酒米飲任下王瓜散治小便自利如泔色此腎虛也王瓜根桂心各一兩白石脂菟絲子酒浸牡蠣鹽泥燒赤候冷去泥各二兩上為末每服二錢煎大麥粥湯調下日三服食前服附子八味丸治腎氣虛寒下元冷憊臍腹疼痛腳膝緩弱夜多漩溺淋澀白濁熟地黃八兩澤瀉牡丹皮白茯苓各三兩山藥山茱萸各四兩附子炮桂心各一兩上為末煉蜜丸如桐子大每服五十丸溫酒或淡鹽湯下有人白濁服玄菟丹不愈服附子八味丸即愈者蓋赤白濁雖多屬濕熱然亦有老人因虛寒而致之者不可不知蒼朮難名丹治元陽氣衰遺精不禁漏濁淋瀝腰痛力疲蒼朮半斤茴香川楝子各一兩半川烏頭破故紙茯苓龍骨各一兩上為末酒麴糊丸如桐子大硃砂為衣每服五十丸砂仁煎湯或糯米湯下四炒固真丹治元臟久虛遺精白濁五淋七疝婦人崩帶下血子宮血海虛冷等證蒼朮一斤分作四份一份用茴香青鹽各一兩炒一份用川椒破故紙各一兩炒一份用酒醋炒俱以術黃為度去各炒藥不用一份用川烏川楝各一兩炒上為末用煮藥酒打糊丸如桐子大每服三十丸男子酒下婦人淡醋湯下酒煮當歸丸治白濁下注腰以下虛冷小腹痛不可忍當歸一兩茴香五錢黑附子炒炙甘草良薑各七錢上四味細切以好酒一升煮至酒盡焙乾苦楝生用丁香各半錢木香升麻各二錢柴胡一錢炒黃鹽全蠍各三錢玄胡索四錢上為細末酒煮麵糊丸如桐子大每服五七十丸空心淡醋湯送下忌油膩冷物及酒濕面等治遺精白濁奇方山梔子三錢炒黑焦水二鍾煎一大鐘用蚯蚓新瓦上炒成末每服二錢大病不過三次一月保精此後火痰化也
