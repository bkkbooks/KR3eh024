body:
  text: 卷三十二哮吼論哮吼即痰喘甚而常發者如水雞之聲牽引背胸氣不得息坐臥不安或肺脹胸滿或惡寒肢冷病者夙有此根又因感寒作勞氣惱一時暴發輕者三五日而安重者半月或一月而愈治法專以祛痰為先兼用解散如九寶湯三拗湯蘇子降氣湯皆可選用久則又宜溫補之丹溪曰哮專主於痰宜用吐法亦有虛而不可吐者治哮必使薄滋味不可純用寒涼藥必兼散表此寒包熱也李氏曰體實者用紫金丹二十丸吐去其痰虛者止服二三丸則不吐臨發時用此劫之丹溪方去豆豉更妙一法用二陳湯加蒼朮黃芩下小胃丹體虛者吐下俱忌須帶表散之水哮者因幼時被水停蓄於肺為痰宜金沸散小青龍湯倍防己或古葶藶散導水丸有寒包熱者麻黃湯加枳殼桔梗紫蘇半夏黃芩有風痰者千緡湯或用雞子一枚略敲殼損勿令膜破放尿缸中浸三日夜取煮食之效凡哮須忌燥藥亦不宜純涼須常帶表欲斷根者必先淡滋味然後服清肺金扶正氣之劑如定喘湯黃芩利膈丸是也遇厚味發者清金丸久不得睡者兜鈴丸單方貓兒頭骨燒灰酒調服二三錢即止或曰哮吼者肺竅中有痰氣也蔭按肺主氣氣從肺出肺竅中有痰封閉使氣不得出故沖而有聲為哮吼治方白果定喘湯治哮吼喘急神方白果二十一枚去殼切碎炒黃麻黃黃芩去朽半夏桑白皮蜜炙蘇子水洗去土款冬花各三錢杏仁去皮尖一錢半甘草炙一錢上銼水三鍾煎二鍾分作二服不用生薑不拘時徐徐服解表二陳湯治外感風寒吼喘陳皮半夏茯苓紫蘇麻黃杏仁桑白皮紫菀貝母桔梗各一錢甘草炙五分上銼生薑煎服五虎二陳湯治哮吼喘急痰盛麻黃杏仁茯苓陳皮半夏薑製各一錢石膏二錢人參八分細茶一撮沉香木香各五分另水磨入上銼一劑生薑三片蔥白三根水煎服小胃丹上可取胸膈之痰下可利腸胃之痰甘遂麵裹水煮浸各令透曬乾大戟長流水煮一時洗淨曬乾芫花醋拌經宿炒令黑勿焦各一兩黃柏炒褐色三兩一云二兩大黃酒紙裹煨焙乾再以酒潤炒熟一兩半一云二兩上為末粥丸麻子大每服十丸以二陳湯加蒼朮黃芩作湯送下須看虛實黃芩利膈丸除胸中熱利膈上痰生黃芩炒黃芩各一兩半夏澤瀉黃連各五分天南星煨裂枳殼麩炒陳皮去白各三錢白朮二錢白礬五分上為細末湯浸蒸餅入薑汁為丸如梧桐子大每服三五十丸食遠溫水下忌酒及濕面紫金丹治哮須三年後可用用精豬肉二斤細切骰子大砒一兩為細末拌勻分作六分紙筋泥包火烘乾用炭火於無人處煅令青煙盡放地上一宿取出為末湯浸蒸餅丸綠豆大大人二十丸小兒十丸或四五丸茶清下量虛實與之清金丹治哮喘遇厚味發者用之蘿蔔子淘淨蒸熟曬乾為末一兩豬牙皂角火燒過以碗覆地上作灰末三錢上為末拌勻用薑汁浸蒸餅丸如蘿蔔子大每服三十丸津嚥下一方劫喘用薑汁煉蜜丸桐子大每服七八十丸噙下止之
