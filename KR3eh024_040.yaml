body:
  text: 卷四十諸蟲論內經曰腸胃為市無物不受無物不包又曰飲食自倍腸胃乃傷若夫飲食不能謹節則朝損暮傷自傷成積積久成熱濕熱相生而諸般奇形之蟲各從五行之氣而化生矣若腐草為螢之類是也諸蟲附依腸胃之間若元氣尚實未為大害稍有虛損遂能侵蝕隨其蟲動而變生諸病也若夫膈噎勞瘵癩風蠱脹狐惑傷寒等證無不生蟲又如螇鼠應聲蟲之類未易悉舉醫者宜推類而治之醫說云九蟲者一曰伏蟲長四寸為群蟲之長二曰白蟲長一寸相生至多其母長至四五尺則殺人三曰肉蟲狀如爛杏令人煩滿四曰肺蟲其狀如蠶令人咳五曰蝟蟲狀如蛤蟆令人吐逆嘔噦六曰弱蟲狀如瓜瓣令人多唾七曰赤蟲狀如生肉令人腸鳴八曰蟯蟲至微細狀如菜蟲居洞腸間多則為痔漏癰疽諸瘡無所不為九曰蛔蟲長一尺貫心則殺人又有尸蟲與人俱生狀如犬馬尾或如薄筋依脾而居長三寸許大害於人然多因臟虛寒勞熱而生又云五臟之蟲心蟲曰蛔脾蟲寸白腎蟲如寸截絲縷肝蟲如爛杏肺蟲如蠶皆能殺人惟肺蟲為急肺蟲居肺葉之內蝕人肺系故成瘵疾咯血聲嘶藥所不到治之為難有人說道藏中載諸蟲皆頭向下惟自初一至初五以前頭上行故用藥者多取月朏取尾切音斐月三日明生之名以前蓋此也如療寸白用良方錫沙蕪荑檳榔者極佳五更服蟲盡下白粥將息藥用石榴根濃汁半升下散三錢丸五枚醫余云蛔蟲九蟲之類人腹中皆有之小兒失乳而哺早或食甜過多胃虛蟲動令人腹痛惡心口吐清水腹上有青筋火煨使君子與食以殼煎湯送下甚妙然世人多於臨臥服之又無日分多不驗唯是於月初四五間五更服之至日午前蟲盡下可以和胃溫平藥一兩日調理之不可多也凡蟲在人腹中月上旬頭向上中旬橫之下旬頭向下故中下旬用藥即不入蟲口所以不驗也牛馬之生上旬生者行在母前中旬生者並肩而行下旬生者後隨之貓之食鼠亦然上旬食上假中旬中假下旬下假自然之理物皆由之而莫知之丹溪曰濕熱之生臟腑虛則侵蝕上半月蟲頭向上易治下半月蟲頭向下難治先以肉汁或砂糖引蟲頭向上然後用藥打蟲方用楝樹根檳榔鶴蝨夏取汁冬濃煎飲之又萬應丸最好腹內熱腸胃虛蟲行求食上唇有瘡曰惑蟲蝕其臟下唇有瘡曰狐蟲蝕其肛亦有口瘡非狐惑也李氏曰諸蟲皆因飲食不節或飢飽失宜或過飧腥鱠炙煿或鱉莧同食以致中脘氣虛不運而成積積久成熱濕熱熏蒸痰與瘀血凝結隨五行之氣變化而為諸般奇怪之形若腐草為螢是也九蟲一曰伏蟲長四寸許為諸蟲之長二曰蛔蟲長尺許貫心即殺人三曰白蟲長一寸母子相生其形轉大而長亦能殺人四曰肉蟲狀如爛杏五曰肺蟲其狀如蠶六曰蝟蟲狀如蛤蟆七曰弱蟲又名膈蟲狀如瓜瓣八曰赤蟲狀如生肉九曰蟯蟲狀如菜蟲形至細微肉蟲令人心煩滿悶肺蟲令人咳嗽蝟蟲令人嘔吐厄逆喜噦嘈雜愛吃泥炭生米茶鹽姜椒等物弱蟲令人多唾蟯蟲居廣腸多則為痔劇則為癩癰疽疥癬多蟲之為害赤蟲令人腸鳴又有感觸蠢動之物或山澗蛇虺水蛭遺精誤飲其水或草木果品蟲聚其里誤食以致心腹刺痛或引腰脅時作時止諸藥不效乃蟲證也雄砂丸主之婦人經閉腹大僅一月間便能動作乃至過期不産或有腹痛此必蟲證雄砂丸或萬應丸主之血鱉小兒最多大人間有蓋鱉因積瘀而成故也追蟲打鱉丸不敢下者釣蟲黑白丸亦好但釣後須服調脾和胃藥凡蟲證眼眶鼻下青黑面色痿黃臉上幾條紅絲如蟹爪分明飲食不進肌肉不生沉重寒熱若不早治相生不已貫心殺人又有應聲蟲每語喉中如有物作聲相應者有人教誦本草至雷丸則無聲乃頓服數枚而愈狐惑蠱注見各條體虛者俱宜先用補藥扶其元氣然後用王道之藥佐以一二殺蟲之劑如化蟲丸使君子丸五膈下氣丸之類或追蟲後而繼以溫補亦可不然則蟲去而元氣亦散矣體實蟲攻上膈心腹絞痛用樟木屑濃煎湯服之大吐吐蟲痛減後煎甘草湯與之和胃如有積自吐蟲者用黑錫灰檳榔等分為末米飲下下蟲用追蟲丸取積藥苦楝根湯萬應丸萬病解毒丹量選用脈法脈沉實者生虛大者死尺脈沉而滑者為寸白蟲丹溪云匿蝕陰肛脈虛小者生緊急者死外臺云蟲脈當沉弱而弦今反洪大即知其蛔蟲甚也關尹子六七篇我之一身內變蟯蛔外蒸蝨蚤治一切蟲方八仙妙應丹治山嵐瘴氣傳尸勞瘵水腫瘧痢咳嗽黃疸噎膈腸風痔漏一切風氣食積疼痛瘡癩熱痰痞塊赤眼口瘡女人經脈不調血瘕血閉赤白帶下小兒癲癇一切疳積蠱積並治凡人面上白斑唇紅能食心嘈顏色不常臉上有蟹爪路者便有蟲也此丹四時常服不動真氣有蟲取蟲有積取積有氣取氣有塊取塊一服見效無病之人春秋各服一服打下蟲積終歲無病惟孕婦不宜服檳榔雞心者十二兩黑牽牛頭末三兩大黃錦紋者雷丸錫灰白蕪荑木香使君子各一兩上為細末用蔥白一斤煎湯露一宿為丸如粟米大每服四錢病重年深體實者加至五錢五更蔥白湯或木香煎湯送下取寸白蟲用東方上石榴根煎湯麵東服之小兒服一錢或五分天明取下病根或蟲或如爛魚腸或如馬尾蛤蟆小蛇諸般怪物或小便取下青黃紅白或米泔等色一服即出取時務在房內坐桶不要見風出外湧泄一云加硇砂甘遂尤妙如虛老之人用此推蕩後服四君子湯數貼尤好一方去使君子名七轉靈應丹如失聲加沉香琥珀各五錢忌生冷勞腥等物一月寶鑑化蟲丸治諸蟲鶴蝨去上檳榔苦楝根去浮皮胡粉炒各一兩明白礬枯二錢半蕪荑使君子各五錢上為細末米糊為丸如麻子大一歲兒服五丸量人大小加減丸數溫漿水入生麻油三四點打勻送下清米飲亦可不拘時其蟲細小者皆化為水大者自下焦效丸木香鶴蝨炒檳榔訶子麵裹煨去核蕪荑炒附子炮去皮臍乾薑各七錢半大黃一兩半烏梅十四個去核上為末煉蜜丸如麻子大每服三四十丸煎陳皮湯或淡醋湯下一方加黃連黃柏各七錢半萬應丸下諸蟲檳榔五兩大黃八兩黑牽牛四兩各為末皂角十挺不蛀者苦楝根皮一斤上先將皂莢苦楝根皮二味用水一大碗熬成膏子一處搜和前藥末三味為丸如梧桐子大又以沉香木香雷丸各一兩為末為衣先以沉香衣次用雷丸衣又次用木香衣每服三丸四更時用砂糖水送下祕方萬應丸治大人小兒腹內有蟲及積氣塊痛小兒疳病三稜醋炒五錢莪朮醋炒五錢檳榔一兩青皮麩炒黃色橘紅雷丸乾漆炒無煙各五錢蕪荑二錢半鶴蝨三錢略炒木香不見火良薑各二錢陳壁土炒砂仁二錢去殼使君子麥芽炒各五錢胡黃連炒甘草炙各三錢神麯炒黃色五錢上為細末醋打米糊為丸如緑豆大每服三五十丸空心淡薑湯下化蟲丸能化蟲為水硫黃一兩木香五錢密陀僧三錢附子一枚炮另為末上先以附子末醋一盞熬膏余藥研為細末和勻丸如緑豆大每服二十丸荊芥茶清下木香三稜散治腹中有蟲面色痿黃一切積滯黑牽牛半生半炒取末五錢大腹皮三錢檳榔雷丸錫灰醋炒三稜煨蓬朮煨木香各二錢大黃三錢一方加阿魏一錢蕪荑三錢上為末每服五錢用砂糖水調服先將燒肉一片口中細嚼吐出然後服藥烏梅丸治臟寒蛔蟲動作上入膈中煩悶嘔吐時發時止得食即嘔常自吐蛔有此證候謂之蛔厥此藥主之又治久痢烏梅三百個黃柏炙細辛去苗肉桂去粗皮附子炮去皮臍人參去蘆各六兩乾薑炮十兩當歸去蘆四兩蜀椒去目及閉口者微炒出汗四兩黃連去須十六兩上為搗篩合治之以醋浸烏梅一宿去核蒸之五斗米下飯熟搗成泥和藥令相得納臼中與煉蜜杵二千下丸如桐子大每服十五丸溫米飲下食前服補金散治諸般蟲鶴蝨生雷丸定粉錫灰各等分上為末每服三錢空心食前少油調下又用豬肉一兩燒熟撒藥在上細嚼亦得每服藥時用雞翎甘遂末一錢與前藥一處服之其蟲自下矣雷金散治諸蟲雷丸末八分鬱金末七分黑牽牛末一錢半上三件末和勻以生油調下三兩匙飯壓之追蟲散取寸白蟲黃丹半兩炒錫灰一兩羅定粉二兩上同研極細末每服一錢先燒豬肉五片吃了後以生油一口許調藥服至晚取下婦人有胎不可服李副統女子年十三一服取蟲一抄終身不發廣濟方取寸白蟲亦療蛔蟲酸石榴根皮東引者切二升檳榔十枚上二味細切以水七升煮取二升半去渣以粳米煮稀粥平旦空腹食之少間蟲並死快利神效雄砂丸善殺諸蟲鶴蝨蕪荑乾漆殭蠶各三錢貫衆硃砂酸石榴皮各五錢雄黃雷丸甘遂各一錢半上為末米煮糊為丸如麻子大每服十丸五更時粥飲下追蟲丸大黃黑醜各一兩山楂莪朮各六錢檳榔大腹皮各四錢雷丸砂糖各三錢木香二錢皂角一錢上為末沸湯調量人大小虛實服之苦楝根湯苦楝根去外苦皮曬乾上銼每一撮入黑豆二十粒水煎臨熱入砂糖二錢調服晚飯不可食待藥氣行使君子湯治小兒臟腑虛滑疳瘦下利腹脹脅痛不思乳食常服去蟲補胃消疳肥肌使君子陳皮各一兩厚朴甘草訶子各半兩上為末煉蜜丸如芡實大每一丸米飲化下小兒半丸乳汁下如兼驚及熱渴者加青黛半兩臟腑不調者去之一方有川芎無訶子青黛取積藥巴豆不拘多少去殼水略浸去內外衣膜紙壓去油置薄刀上烘赤色入雄黃沉香各少許為末飯丸如粟米大大人一分小兒半分食後砂糖水送下追蟲打鱉散治血鱉黑醜檳榔各四兩雷丸木香甘草各一兩上為細末每服大人四錢小兒二錢量人虛實空心以滾湯入砂糖少許調下待走去惡積蟲二三次方進稀粥湯補住釣蟲黑白丸凡胃口肚腹作痛及肺竅失聲者俱有血鱉宜用磁石雲母石蛇含石甘草各等分上為末糯米糊丸作白丸子如黃豆大每一丸燈心煎湯下後用黑丸子針砂青黛枯礬甘遂各等分上為末醋煮糯米糊丸如龍眼核大以粗線一條穿住燈心湯下待病者作嘔若不嘔再吃烏梅水一口又含冷水一口方為病者打擦胸前背上略抽動其線令病人嘔去冷水仍作嘔聲如是者三四次黑白丸子挾病根瘀血齊吐出吐後須單隨各經病調治方可除根但煮糊須用極高山頂上泉或武當回龍水為丸倘若用別水則不吐轉黑錫散治吐蟲有積黑錫炒成灰檳榔末各等分上和勻每服一錢米飲調下經驗方治婦人陰蝕瘡陰戶中有細蟲其癢不可忍若蝕入臟腑即死令人發寒熱與勞證相似先用蛇床子煎湯洗淨挹干後以梓樹皮不拘多少焙乾為末入枯礬四分之一麝香少許敷之立效治五臟蟲方五鳳丸治肝勞熱生長蟲在肝為病令人恐畏不安眼中赤壅烏雞卵五枚去黃黃蠟三兩吳茱萸根東行者切三升乾漆四兩炒煙盡粳米粉半升上五味以茱萸根乾漆杵為細末和入銅銚中火煉可丸如小豆大隔宿勿食清晨以米飲下一百二十丸小兒五十丸蟲即爛盡雷丸丸治心勞發熱心裡有長蟲名蠱蟲長一尺許貫心即死雷丸炒五枚陳皮桃仁去皮尖另研各一兩二錢半貫衆蕪荑青葙子乾漆各一兩亂髮雞子大一團燒灰存性殭蠶炒十四枚上為細末煉蜜丸如小豆大每服二十丸空心溫酒送下日三服茱萸根湯治脾勞熱內有白蟲食脾令人好嘔而胸中咳嘔不出茱萸根東行者一錢火麻子八錢陳皮一兩半上三味細切水煎服或下蟲或下黃汁凡合此藥禁聲勿語方驗蟲覺便無效前胡湯治脾勞身發熱內有白蟲在脾為病令人好嘔而胸中咳嘔而不出前胡白朮赤茯苓細辛杏仁去皮尖另研草龍膽常山各一錢枳實松蘿各七分旋覆花五分竹葉七片上細切作一服水煎溫服若腹中熱滿悶加芒硝半錢梔子黃芩苦參各五分加水煎忌桃李雀肉醋生蔥菜等物五膈下氣丸治肺勞熱瘦損有蟲在肺為病令人咳逆氣喘所謂憂忿氣膈寒熱皆從勞之所生名曰膏肓疾針灸不著麥門冬去心五兩蜀椒炒去汗一兩遠志肉附子乾生薑細辛甘草炙各半兩百部人參白朮黃耆各七錢半桂心一錢半杏仁去皮尖及雙仁者二十四粒上為細末煉蜜丸如彈子大每服一丸徐徐噙化下忌豬肉生冷肥膩及海藻菘菜生蔥桃李雀肉等物三聖飲子治勞熱生蟲在肺為病茱萸根東引者五兩桑白皮東引者一升狼牙子三兩上切細以酒七升煮取一升半平旦服盡千金散治腎勞熱蟯蟲生於腎中令四肢腫急貫衆三兩炒乾漆二兩炒煙盡蕪荑胡粉槐白皮各一兩吳茱萸五十粒杏仁四十五粒去皮尖炒上為細末平旦以井花水調服方寸匕漸加病瘥即止諸蟲治驗方應聲蟲永州通判廳軍員毛景得奇疾每語喉中必有物作聲相應有道人教學誦本草藥名至藍而默然遂取藍握汁而飲之少頃吐出肉塊長二寸余人形悉具劉襄子思為永卒景正被疾逾年親見其愈楊勔中年得異疾每發言應答腹中有小聲效之數年間其聲寢大有道士見而驚曰此應聲蟲也久不治延及妻子宜讀本草遇蟲不應者當取服之勔如言讀至雷丸蟲忽無聲乃頓服數粒遂愈酒蟲齊州士曹席進孺招所親張彬秀才為館舍彬嗜酒每夜必置數升酒於床隅一夕忘設焉夜半大渴求之不可得忿悶忽躁俄頃嘔吐一物於地旦起視之見床下塊肉如肝而黃上如蜂窩猶微動取酒沃之唧唧有聲始悟平生酒病根本亟投諸水火後遂不飲誤吞水蛭吳少師在關外嘗得疾數月間肌肉消瘦每日飲食下咽少時腹如萬蟲攢攻且癢且痛皆以為勞瘵也張鋭是時在成都吳遣驛騎招致鋭到興元既切脈戒云明日早且忍飢勿啖一物俟鋭來為之計旦而往天方劇暑白請選一健卒往十里外取行路黃土一銀盂而令廚人旋治面將午乃得食才放著取土適至於是溫酒一升投土攪其內出藥百粒進於吳飲之覺腸胃擊痛幾不堪忍急登溷鋭密使別坎一穴便掖吳以行須臾暴下如傾穢惡鬥許有馬蝗千餘宛轉盤結其半已困死吳亦憊甚扶憩竹榻上移時方餐粥一器三日而平始信去年正以夏夜出師中途燥渴命候兵持馬盂挹澗水甫入口似有物焉未暇吐之則徑入喉矣自此遂得病鋭曰蟲入人肝脾里勢須滋生常日遇食時則聚丹田間吮咂精血飽則散處四肢苟惟知殺之而不能掃盡故無益也鋭是以請公枵腹以誘之此蟲喜酒又久不得土味乘飢畢集故一藥能洗空之耳吳大喜厚賂以金帛送之歸寧國衛承務者唯一子忽得疾羸瘦如削醫以為瘵疾治療無益醫劉大用問其致疾之由因曰嘗以六月飲娼家醉臥桌上醒渴求水不得前有菖蒲盆水清淨舉而飲之自是疾作劉默喜密遣僕掘田間瘀泥以水沃漻取清汁兩碗置几上令隨意飲衛子素厭疾苦不以穢為嫌一飲而盡俄腸胃間攻轉攪刺久之始定續投以宣藥百粒隨即同瀉下水蛭六十餘條便覺襟抱豁然劉曰此蓋盆中所誤吞也蛭入人腹藉膏血滋養蕃育種類每黏著五臟牢不可脫然久去蟲渠思其所嗜非以此物致之不能集也然尪羸別以藥調補有人因醉薄暮渴飲道傍田水自此忽患胸腹脹滿遍醫不效人亦莫識其病因干宿客邸夜半思水飲僕覓之僕夜捫索見有缸數只疑店主以此貯水遂取一碗與其主飲便覺胸次豁然再索之忽覺臟腑急於店後空地大瀉一二行平明視之所瀉乃水蛭無數繼看夜來所飲缸水乃主人刈藍作澱者其病頓愈方思前時渴飲田水不覺誤吞水蛭在腹遂成脹痛之疾乃蛭為害今人耘田為此蟲所齧以澱塗之無不愈也誤吞蜈蚣有村店婦人因用火筒吹火不知筒中有蜈蚣藏焉用以吹火蜈蚣驚迸竄入喉中不覺下胸臆婦人求救人無措手適有人在傍云可討小豬兒一個切斷喉取血令婦人頓吃之須臾以生油一口灌婦人遂噁心其蜈蚣滾在血中吐出繼與雄黃細研水調服遂愈諸蟲人耳蟲之類能入耳者不獨蚰蜒如壁蝨螢火扣頭皂角蟲皆能為害有人患腦痛為蟲所食或教以桃葉為枕一夕蟲自鼻中出形如鷹嘴人莫識其名有人蚰蜒入耳遇其極時以頭撣柱至血流不知云癢甚不可忍蚰蜒入耳往又食髓至盡又能滋生凡蟲入耳用生油灌妙蚰蜒及百蟲入耳取驢乳灌耳中當消成水百蟲入耳以桃葉火尉之卷而塞耳中立出苦寸白蟲趙子山字景高寓居邵武軍天王寺苦寸白蟲為撓醫者戒云是疾當止酒而以素所耽嗜欲罷不能一夕醉於外舍歸已夜半口乾咽燥倉卒無措適值廊廡間有甕水月色下照瑩然可掬即酌而飲之其甘如飴連盡數酌乃就寢逮曉蟲出盈席覺心腹頓寬宿疾遂愈一家皆驚異驗其所由蓋寺僕日織草屨浸紅藤根水也蔡定夫基戡之子康積苦寸白蟲為孽醫者使之碾檳榔細末取石榴東引根煎湯調服之先炙肥豬肉一大臠置口中咽阻其津膏而勿食云此蟲惟月三日以前其頭向上可用藥攻打餘日即頭向下縱有藥皆無益蟲聞肉香咂啖之意故空群爭赴之覺胸中如萬箭攻攢是其候也然後飲前藥蔡悉如其戒不兩刻腹中雷鳴急登廁蟲下如傾命僕以枝挑撥皆聯綿成串幾長數丈尚蠕蠕能動舉而拋於溪流宿患頓愈金蠶毒虞氏云曾治一婦人因採桑見桑有金蟲如蠶者被其毒謂之金蠶毒腹中絞痛欲死豫以樟木屑濃煎湯與之大吐吐出有金絲如亂髮者一塊腹痛減十分之七八又與甘草湯連進二三盞而安
