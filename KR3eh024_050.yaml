body:
  text: 卷五十發熱論丹溪曰惡熱非熱明是虛證經曰陰虛則發熱陽在外為陰之衛陰在內為陽之守精神外馳嗜欲無節陰氣耗散陽無所附遂至浮散於肌表之間而惡熱也當作陰虛治之凡脈數而無力者便是陰虛也四物湯加炒黃柏黃芩龜板兼氣虛加人參黃耆黃芩白朮一人腳常覺熱冬不可加綿自誇稟質壯豫知其足三陰之虛教其早斷欲事以補養陰血笑而不答年近五十患痿而死吃酒人發熱難治不飲酒人因酒發熱者亦難治一男子年二十三歲因酒發熱用青黛瓜蔞仁入薑汁每日數匙入口中三日而愈陽虛發熱補中益氣湯手足心熱屬熱鬱用火鬱湯傷寒寒熱當用表散發熱柴胡惡寒蒼朮虛人用蒼朮恐燥發熱惡風人壯氣實者宜先解表發熱惡寒亦宜解表胸中煩熱須用梔子仁有實熱而煩躁者亦用梔子仁有虛熱而煩躁者宜參耆麥門冬白茯苓竹茹白芍藥若脈實數有實熱者神芎丸虛熱用黃耆虛汗亦然如肥白人發熱宜人參黃耆當歸芍藥浮小麥炒止虛汗同王節齋曰世間發熱證類傷寒者數種治各不同外感內傷乃大關鍵張仲景論傷寒傷風此外感也因風寒感於外自表入里故宜發表以解散之此麻黃桂枝之義也以其感於冬春之時寒冷之日即時發病故謂之傷寒而藥用辛熱以勝寒若時非寒冷則藥當有變如春溫之月則當變以辛涼夏暑之月即當變以甘苦寒宜用劉河間藥以清熱解毒已上諸證皆外感天地之邪者也若夫飲食勞倦內傷元氣此則真陽下陷內生虛熱故東垣發補中益氣之論用人參黃耆等甘溫之藥大補其氣而提其下陷此用氣藥以補氣之不足者也又若勞心好色內傷真陰陰血既傷陽氣偏勝而變為火矣是為陰虛火旺勞瘵之證故丹溪發陽有餘陰不足之論用四物湯加黃柏知母補其陰而火自降此用血藥以補血之不足者也益氣補陰皆內傷證也一則因陽氣之下陷而補其氣以升提之一則因陽火之上升而滋其陰以降下之一升一降迥然不同矣又有夏月傷暑之病雖屬外感卻類內傷與傷寒大異蓋寒傷形寒邪客表有餘之證故宜汗之暑傷氣元氣為熱所傷而耗散不足之證故宜補之東垣所謂清暑益氣者是也又有因時暑熱而過食冷物以傷其內或過取寒涼以傷其外此則非暑傷人乃因暑而自致之病治宜辛熱解表或辛溫理中之藥卻與傷寒治法相類者也凡此數證外形相似而實有不同治法多端不可或謬故必實其果為傷寒傷風及寒疫也則用仲景法果為溫病及熱病及溫疫也則用河間法果為氣虛也則用東垣法果為陰虛也則用丹溪法如是則庶無差誤以害人之性命矣今人但見發熱之證一皆認作傷寒外感率用汗藥以發其表汗後不解又用表藥以涼其肌設是虛證豈不死哉間有頗知發熱屬虛而用補藥則又不知氣血之分或氣病而補血或血病而補氣誤人多矣故外感之與內傷寒病之與熱病氣虛之與血虛如冰炭相反治之若差則輕病必重重病必死矣可不畏哉李氏曰外感發熱人迎緊熱隨表裡見證汗下即解惟內傷虛熱經久不解無表裡二證故食積類傷寒初證右脈氣口緊盛身節不痛為異內傷勞役發熱脈虛而弱倦怠無力不惡寒乃胃中真陽下陷內生虛熱宜補中益氣湯內傷色欲陰虛發熱便硬能食者滋陰降火湯加味逍遙散清骨散內傷思慮神昏恍惚眼燒者歸脾湯茯苓湯內傷生冷郁遏陽氣及脾虛伏火隻手足心熱肌膚不甚熱自汗不食者火鬱湯凡飢飽勞役傷胃陽虛口中無味晝熱夜輕者俱宜補中益氣湯甚加附子上盛下虛者清心蓮子飲凡房勞思恐傷腎陰虛口中有味夜熱晝輕者俱宜四物湯加知母黃柏黃芩甚者加童便龜板峻補其陰有郁者下甲丸陰陽兩虛晝夜發熱煩渴不止證似白虎而無目痛乾者古歸耆湯如臟冷榮熱脈浮者人參地骨散久虛積損者八物湯人參養榮湯甚者既濟湯去半夏加五味子當歸地黃入童便少許或二至丸八味丸二神交濟丹肥人及脈弦大無力者氣虛於血宜甘溫補氣氣旺則能生血若瘦人及脈弦帶澀者血虛於氣止宜苦寒為主佐以甘溫若氣血平補依舊氣旺而陰愈消矣凡虛熱皆因精神外馳嗜欲無厭陰氣耗散陽無所附遂至浮散肌表而發熱實非有熱也骨熱因氣虛不能化血血乾則火自沸騰肉如針刺骨熱煩疼或五心俱熱或兩肋如火或子午相應或晝微惡寒而夜返大熱雖腎經所主傳變不常蒸上則見咳嗽痰血唇焦舌黑耳鳴目眩等證蒸下則見遺精淋濁泄瀉腰疼腳痠陰物自強等證蒸中則見腹脹肋痛四肢倦怠等證古云肝證發熱肉下骨上寅卯尤甚瀉青丸人中白散心證發熱在血脈日中則甚瀉心湯導赤散硃砂安神丸脾證發熱在肌肉遇夜尤甚瀉黃散三白湯肺證發熱在皮膚日西則甚瀉白散甚者涼膈散腎證發熱在骨亥子時甚手足心如火滋腎丸主之大要脈弦而濡者秦艽扶羸湯加味逍遙散脈弦而數者節齋四物湯通用五蒸湯丸二參湯香連豬肚丸大胡連丸補髓丹大造丸挾痰發熱者二陳湯加乾葛升麻人參白芍五味子挾濕痰發熱者清膈蒼莎丸濕熱甚者皮枯肢疼唇燥面赤痰嗽飲食少味者宜量體吐出痰涎然後服清熱化痰開鬱之藥古方蒼苓丸蒼梔丸蒼連丸蒼芍丸選用積病最能發熱多夜分腹肚熱甚柴陳湯加山楂麥芽並乾葛久者保和丸枳朮丸間服清骨散陰虛發熱黃白丸勞熱食積痰者上下甲丸蔭按熱曰發者謂怫怫然發於皮膚之間則成熱也與潮熱寒熱若同而異潮熱者有時而熱不失其時也寒熱者寒已而熱相繼而發至於發熱則無時而發也學者辨之蓋發熱之證實非一端王節齋先生論之詳矣然其中有痰飲腳氣食積虛煩四證未之及也其餘治各證發熱之方另分門類已隨本證不復重舉只具治陽虛陰虛二者言之古人於陽虛陰虛二證論之未詳而方之未辨至丹溪先生出而後明矣何則晝夜發熱晝重夜輕口中無味陽虛之證也午後發熱夜半則止口中有味陰虛之證也陽全陰半陽得以兼陰陰不得以兼陽自然之理也陽虛之證責在胃陰虛之證責在腎蓋飢飽傷胃則陽氣虛房勞傷腎則陰血虛古人以飲食男女為切要厥有旨哉以藥而論之甘溫則能補陽氣苦寒則能補陰血如用四君以補氣四物以補血是也若氣血兩虛但以甘溫之劑以補其氣氣旺則能生血也若只血虛而氣不虛忌用甘溫之劑以補其氣氣旺而陰血愈虛消矣故陽虛之與陰虛甘藥之與苦藥不可不詳實而明辨也學者昧此但見發熱不審陽虛陰虛便用汗藥以發其表汗後不解又用表藥以涼其肌則禍如反掌可不畏哉脈法經曰脈大無力為陽虛脈數無力為陰虛無力為虛有力曰實治陽虛氣虛發熱方補中益氣湯治陽虛勞倦發熱黃耆人參白朮甘草炙當歸身柴胡陳皮各一錢升麻各五分上銼水煎服頭痛加川芎白芷各七分人參麥冬湯治虛熱煩渴人參麥門冬小麥茯苓各一錢竹茹一團白芍藥八分甘草五分上銼水煎服清心蓮子飲治發熱口乾小便赤澀夜則安靜晝則發熱此熱在氣分也石蓮肉二錢白茯苓黃芩各一錢半黃耆蜜炙一錢二分人參麥門冬去心車前子各一錢地骨皮八分甘草五分上銼水煎食前服地仙散治骨蒸肌熱一切虛煩地骨皮防風去蘆各一兩人參紫蘇甘草各二錢半上銼每服一兩加生薑三片淡竹葉五片水煎服治陰虛血虛發熱方加味四物湯治陰虛發熱脈數而無力者是也川芎芍藥當歸生地酒炒黃柏炒黃芩甚者加龜板上㕮咀水煎服滋陰八物湯治陰虛發熱玄參白朮知母麥門冬當歸各一錢川芎八分黃柏黃耆陳皮各五分甘草三分上銼加生薑一片水煎服痰加半夏渴加天花粉氣虛加人參甚加附子肉桂加味逍遙散治血虛潮熱脈弦而濡白朮茯苓當歸芍藥柴胡各一錢甘草山梔子牡丹皮各五分上銼加生薑一片薄荷少許水煎服人參地骨散治臟中積冷榮中熱脈按不足舉之有餘乃陰不足陽有餘也人參地骨皮柴胡生地酒炒黃耆各一錢半知母石膏各一錢茯苓五分上銼加生薑三片水煎服五蒸湯治男婦諸虛煩熱蒸痿自汗脈弦而數等證人參黃芩知母生地酒炒葛根石膏粳米麥門冬各一錢甘草五分小麥一撮上銼水煎服當歸黃耆湯治虛火上攻頭目渾身胸背發熱此血虛也當歸酒浸一錢黃耆五分上銼水煎食後溫服子芩散涼心肺解勞熱黃連二錢白芍藥子芩人參白茯苓麥門冬桔梗生地黃酒洗各一錢上銼加竹葉一握小麥二十粒生薑三片水煎食後服治濕痰發熱方蒼芩丸治濕熱發熱蒼朮五錢片芩三錢甘草一錢半上為末湯浸炊餅丸服蒼梔丸治手心發熱蒼朮香附各五錢山梔一兩半夏生用川芎白芷各二錢上為末神麯糊丸服蒼連丸治濕痰發熱蒼朮二兩香附二兩半黃芩炒黃連炒各五錢上為末用瓜蔞穰丸服加味二陳湯治挾痰發熱陳皮半夏茯苓甘草乾葛升麻人參白芍藥五味子上銼加生薑水煎服加味三補丸治濕痿夜熱黃芩黃連白芍藥上為末粥丸服治火鬱發熱方火鬱湯治手足心發熱屬熱鬱者升麻葛根柴胡白芍藥各一錢半防風甘草各一錢上銼入連須蔥白三寸水煎稍熱服不拘時加減小柴胡湯治虛損手心腳心發熱不可當柴胡黃芩半夏人參甘草香附米黃連前胡上銼水煎服治病後發熱方蒼芍丸治大病後陰虛氣鬱發熱芍藥一兩二錢半香附一兩蒼朮五錢片芩二錢甘草一錢半上為末炊餅為丸服鱉甲飲治病後食力未復邪熱未除房勞虛損一切骨蒸盜汗鱉甲秦艽柴胡地骨皮枳殼知母當歸烏梅上銼加生薑三片桃柳頭各七個水煎空心午前臨臥各熱眼渣再煎忌酒色魚腥濕面性熱等物
