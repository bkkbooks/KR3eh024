body:
  text: 卷九十七懸癰論論曰懸癰謂瘡生於玉莖之後穀道之前屬足三陰虧損之證初發甚癢狀如松子漸如蓮子日久如桃李加以赤腫若遲治而破則大小便皆從此出不可救也輕則瀝盡氣血而亡重則內潰即死初起濕熱壅滯未成膿而作痛或小便澀滯用龍膽瀉肝湯腫焮痛甚用仙方活命飲並以制甘草佐之久者大補氣血為先若不成膿不潰者八珍湯補之若膿已成者急針之欲其生肌收斂腎虛者六味地黃丸血虛者四物湯加參術氣虛者四君子湯加芎歸脾虛者補中益氣湯久成漏者十全大補湯蠟礬丸此疾首尾常服國老膏雖患亦輕雖潰亦淺若誤用寒涼消毒則不可救矣穀道中生瘡用水中荇葉細搗綿裹納下部日三次即愈千金方云夫五臟六腑者內應骨髓外合皮毛膚肉若病從外生則皮毛膚肉關格強急若病從內發則骨髓疼痛然陰陽表裡外皮內髓其病源不可不詳之也皮虛者寒皮實者熱凡皮虛實之應主於肺大腸其病發於皮毛熱則應臟寒則應腑蔭按肛門之前腎囊之後此間若有腫脹出膿名曰懸癰又名海底漏最難收功初起即宜速治遲則無救矣大抵皆由腎水不足相火內爍庚金而致也患者速宜保養真元斷絕房欲用藥扶持如加減六味丸國老丸之類庶可延生萬勿輕視是禱若生於肛門之兩旁則曰臟毒較懸癰為輕耳又有未成膿之腸風臟毒名雖不同其治亦異腸風者邪氣外入隨感隨見所以其色清也臟毒者蘊積毒久而始見所以其色濁也治腸風以散風行濕藥治之治臟毒以清熱涼血藥治之亦須看其虛實新久之不同新者實者宜降之瀉之虛者久者宜升之補之故治法有所異也學者不可執一而論宜仔細詳審焉治方國老膏治懸癰始終用之用黃紋大甘草一兩截長三寸許取山澗東流水一碗不用井水河水以甘草蘸水文武火慢炙不可急性須用三時久水盡為度劈視草中潤透卻以無灰酒二碗煮至一碗溫服半月消盡為度仙方活命飲治一切瘡瘍未成膿者內消已成膿者即潰止痛消毒之聖藥也穿山甲蛤粉炒黃白芷防風赤芍藥當歸尾沒藥乳香甘草天花粉貝母皂角刺各一錢金銀花陳皮各三錢上銼作一服用酒一碗煎數沸服將軍散大黃煨貝母去心白芷甘草節各等分上為細末酒調二錢空心服虛弱加當歸一半加味托裡散治懸癰不消不潰人參黃耆鹽水拌炒當歸酒拌川芎麥門冬去心知母酒拌炒黃柏酒拌炒芍藥炒金銀花柴胡制甘草法見前各一錢上作一劑水二鍾煎八分食前服加味十全大補湯治懸癰潰而不斂或發熱飲食少思人參黃耆鹽水炒白朮炒茯苓熟地黃酒浸中滿減五分當歸酒浸川芎芍藥炒各一錢肉桂麥門冬去心五味子搗爛甘草炒各五分上銼一劑用水二鍾煎一鍾食前服莖腫加青皮熱加黃芩柴胡日晡熱加柴胡地骨皮小便赤加酒製知母黃柏小便澀加車前子山梔子俱炒清心蓮子飲治懸癰勢退惟小便赤澀黃耆蜜炙人參石蓮子去心赤茯苓各七錢半黃芩五錢車前子炒麥門冬去心地骨皮制甘草法見前生甘草各二錢半上銼每服一兩用水二鍾煎八分食前服
