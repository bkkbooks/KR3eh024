body:
  text: 卷八十二麻木論內經云風寒濕三氣合而為痹故寒勝者為痛痹濕勝者為著痹河間曰流注不去四肢麻木拘攣也又經曰痛者寒氣多也有寒故痛也其不痛不仁者病久入深榮衛之行澀經絡時疏故不痛皮膚不榮故為不仁夫所謂不仁者或周身或四肢唧唧然麻木不知痛癢如繩索縛初解之狀古方名為麻痹者是也丹溪曰麻是氣虛木是濕痰死血然則曰麻曰木者以不仁中分而為二也雖然亦有氣血俱虛但麻而不木者亦有虛而感濕麻木兼作者又有因虛而風寒濕三氣乘之固周身掣痛兼麻木並作者古方謂之周痹治法各不同要當隨其所因耳原病式曰物濕則滑澤干則澀滯麻猶澀也由水液衰少而燥澀氣行壅滯而不得滑澤通利氣強攻衝而為麻也俗方治麻病多用烏附者令氣行之暴甚以故轉麻因之衝開道路以得通利藥氣盡則平氣行通而麻愈也然六氣不必一氣獨為病氣有相兼若亡液為燥或麻無熱證即當此法或風熱勝濕為燥因而病麻則宜以退風散熱活血養液潤燥通氣之涼藥調之則麻自愈矣丹溪曰手麻是氣虛木是濕痰死血十指麻木胃中有濕痰死血濕痰者二陳湯加蒼朮白朮少佐附子行經死血者四物湯加桃仁紅花韭汁氣虛者補中益氣湯或四君子湯加黃耆天麻麥門冬川歸李氏曰麻屬氣虛木屬濕痰死血此概言之耳有因虛而風寒濕三氣乘之麻木並作者有氣血俱虛但麻而不木者蓋麻猶痹也雖不知痛癢尚覺氣微流行在手多兼風濕在足多兼寒濕木則非惟不知痛癢氣亦不覺流行常木為死血礙氣間木為濕痰總皆經絡凝滯血脈不貫謂之不仁或兼虛火則肌肉瞤動不可誤作風治周身掣痛麻木者謂之周痹乃肝氣不行也宜先汗後補黃耆湯開目麻木暫退閉目甚者升陽和中湯皮膚麻木者補氣湯手足麻氣虛者補中益氣湯去當歸陳皮加五味子白芍藥生甘草虛甚挾風者補中益氣湯正料加烏藥附子羌活防風天麻左手腳腿偏麻疼痛右口角並眼牽引側視者表有風也宜天麻黃耆湯兩腿麻木者導氣湯兩腿麻木如火熱者三妙丸患斯疾者須戒魚腥麵醬酒醋等物若厚味過多下必遺溺上必痞滿先用二陳湯加芍藥黃連降火然後用本證藥葉氏曰麻木不仁之疾也但麻為木之微木為麻之甚耳脈法脈浮而濡屬氣虛關前得之麻在上關後得之麻在下體也治渾身麻木方神效黃耆湯治渾身麻木不仁或面手足跗背腿腳麻木並皆治之黃耆二錢半人參陳皮各一錢芍藥煨一錢半甘草炙六分蔓荊子天麻羌活各七分上銼作一服水煎臨臥熱服一方無天麻羌活加味補中益氣湯治渾身麻屬氣虛黃耆蜜炒人參白朮陳皮當歸各一錢升麻紫胡木香各五分香附青皮去穰川芎各八分甘草三分桂枝少許上銼一劑加薑棗煎服祛風散凡人遍身麻痹謂之不仁皆因氣虛受風濕所致也生川烏白朮白芷各三錢甘草二錢上為末酒調下五補丸五補丸黃耆蜜炙一兩人參白芍藥酒炒各五錢當歸三錢大附子一個麵裹煨去皮臍上為末煉蜜為丸用祛風散送下治皮膚麻木方芍藥補氣湯治皮膚麻木此肺氣不行也神效黃耆陳皮各二錢芍藥煨一錢二分澤瀉甘草各一錢上作一服水煎食遠服治頭面四肢麻木方加減天麻湯治頭目四肢麻木飲食少用不時眼黑人參黃耆甘草蒼朮米泔制各三分陳皮一錢半夏薑湯泡八分白朮微炒南川芎各七分天麻濕紙包煨神麯炒澤瀉茯苓各五分防風白芷各二分上銼一劑加生薑三片黑棗二枚水煎食遠服清涼潤燥湯治風熱血燥皮膚瘙癢頭面手足麻木者當歸酒洗生地黃各一錢半酒炒黃連黃芩芍藥煨川芎各一錢天麻防風羌活荊芥各八分細辛六分甘草五分上作一服水煎食遠溫服麻甚者加川烏炮三分以行經絡加味益氣湯治十指盡麻並面目皆麻亦氣虛也黃耆人參白朮甘草炙當歸陳皮各一錢升麻柴胡麥門冬去心香附羌活防風各五分木香烏藥炮各三分上銼加薑棗煎服治手足麻木方加味八仙湯治手足麻木白朮酒浸四錢茯苓一錢陳皮白芍藥各八分半夏薑製當歸酒浸川芎熟地黃各七分人參牛膝秦艽各六分羌活防風各五分柴胡甘草炙各四分桂枝三分上銼一劑加薑棗煎食遠服天麻黃耆湯治手足麻木兼有風證口眼牽引側視天麻白芍藥神麯羌活如肢節不痛不用茯苓各三分人參黃連各四分當歸五分黃耆甘草升麻葛根黃柏蒼朮各六分澤瀉七分柴胡九分上銼一服水煎溫服人參益氣湯治兩手指麻木四肢困倦怠惰嗜臥此熱傷元氣也以此藥治之黃耆二錢人參生甘草各一錢二分半五味子三十粒白芍藥七分柴胡六分炙甘草升麻各五分上㕮咀水煎空心溫服服後少臥仍於麻痹處按摩屈伸少時午飯前再一服開結舒經湯治婦人七情鬱滯經絡手足麻痹紫蘇陳皮香附烏藥川芎蒼朮酒泔制羌活南星半夏薑製當歸各八分桂枝甘草各四分上銼一劑加生薑三片水煎臨服入竹瀝薑汁少許同服治十指麻木方雙合湯治木屬濕痰死血凝滯當歸川芎白芍藥生地薑酒炒陳皮半夏薑汁炒茯苓白芥子各一錢桃仁八分紅花甘草各三分上銼一劑加生薑三片水煎入竹瀝薑汁同服加味二陳湯治十指麻木屬胃中有濕痰死血者陳皮半夏茯苓甘草蒼朮白朮桃仁紅花各一錢附子少許上銼水煎服加味四物湯治麻木純屬死血者當歸酒浸川芎芍藥酒炒熟地黃砂仁沉香炒桃仁紅花各一錢上水煎入韭汁同服治口舌麻木方止麻清痰飲治口舌麻木延及嘴角頭目或嘔吐痰涎等證黃連半夏瓜蔞仁黃芩茯苓桔梗枳殼麩炒天麻橘紅各一錢二分南星用生薑明礬皂角同煮透無白星者一錢細辛甘草各五分血虛加當歸一錢氣虛加人參一錢上加生薑一片水煎入竹瀝半酒盞生薑自然汁三四匙食遠溫服忌動氣生冷炙煿魚腥發氣之物治閣眼麻木方補氣升陽和中湯一婦人病診得六脈中俱弦洪緩相合按之無力弦在上是風熱下陷入陰中陽道不行其證閉目則渾身麻木晝減而夜甚覺而開目則麻木漸退久則絶止常開其目則此證不作是以不敢閣眼致不得臥身體皆重時有痰嗽覺胸中不利煩躁氣短喘促肌膚充盛飲食不減大小便如常此非風邪乃氣不行也治宜補益肺氣自愈如經脈中陰火乘其陽分火動為麻木者當兼去其陰火則安矣黃耆一錢人參白芍藥各六分佛耳草炙甘草各八分白朮歸身陳皮各四分蒼朮草豆蔻各三分甘草生用黃柏白茯苓澤瀉升麻柴胡各二分上切作一服水煎食遠服沖和補氣湯治閣眼則麻木開則不麻四肢無力痿厥醋心目昏眩等證黃耆二錢人參白朮蒼朮陳皮芍藥澤瀉豬苓各一錢甘草升麻各五分羌活七分獨活川歸黃柏各三分柴胡神麯木香草豆蔻黃連麻黃不去節各二分上切作二服治腿腳麻木方導氣湯治兩腿麻木沉重黃耆二錢甘草一錢半青皮一錢升麻柴胡當歸尾澤瀉陳皮各五分五味子三十粒紅花少許經驗三妙丸治濕熱下流兩腳麻木或如火熱蒼朮六兩米泔浸一宿炒黃柏四兩酒拌炒川牛膝去蘆二兩酒浸一宿上為末麵糊丸如桐子大每服五七十丸空心淡鹽湯下
