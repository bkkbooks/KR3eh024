body:
  text: 卷五十二虛煩論樓氏曰活人書云虛煩似傷寒非傷寒也成無己云傷寒有虛煩有心中煩有胸中煩二說不同考之於書成無己之言實出仲景活人書無據然往往有非因傷寒而虛煩者今故兩存之活人書云但獨熱者虛煩也諸虛煩熱與傷寒相似但不惡寒身不疼痛故知非傷寒也不可發汗頭不痛脈不緊數故知非裡實也不可下病此者內外皆不可攻攻之必遂煩渴當與竹葉湯若嘔者與陳皮湯一劑不愈再與之孫真人云此法數用有效葉氏曰虛煩者心中擾亂鬱郁而不安也良由津液去多五內枯燥或榮血不足陽勝陰微或腎水下竭心火上炎故虛熱而煩生焉甚則至於燥也又有大病後血氣未復而煩者治各不同宜隨證求之津液枯燥者宜八珍湯加竹葉酸棗仁麥門冬陰血不足者宜四物湯加人參茯神竹葉麥門冬腎虛火炎者竹葉石膏湯下滋腎丸病後虛者宜溫膽湯或遠志湯煩而小便不利者五苓散心中蘊熱而煩者清心蓮子飲煩而嘔不喜食者橘皮湯煩而睡不安者溫膽湯李氏曰虛煩頭昏口燥乃心內煩躁無外熱也仍分氣虛血虛或大病後津液枯竭煩而有渴者人參門冬湯溫膽湯不眠者六一散甚加牛黃勞心者妙香散脾弱者三白湯詳見傷寒巢氏病源曰心煩不得眠心熱也但虛煩不得眠膽冷也治方加味八珍湯治津液枯燥虛煩人參白朮白茯苓甘草炙川芎白芍藥生地酒炒竹葉酸棗仁麥門冬去心上銼水煎服人參麥冬湯治大病後津液枯竭煩而有渴人參麥門冬去心小麥茯苓各一錢甘草五分白芍藥八分竹茹一團上銼水煎服加味四物湯治陰血不足煩躁者當歸芍藥川芎生地酒炒人參茯神麥門冬竹葉上銼水煎服竹葉石膏湯治大病汗下後表裡俱虛內無津液煩渴心躁不可攻者竹葉五片或十片人參甘草各一錢半夏一錢半石膏二錢麥門冬去心一錢上加生薑五片入粳米百餘粒水煎服淡竹茹湯治心虛煩悶頭疼短氣內熱不解心中悶亂及婦人産後心虛驚悸煩悶欲絶麥門冬去心小麥各二兩半甘草炙一兩人參白茯苓各一兩半半夏湯洗二兩上銼每服四錢加生薑七片棗三枚淡竹茹一二塊如指大水煎食前服溫膽湯治大病後虛煩不得臥及心膽虛怯觸事易驚短氣悸或復自汗半夏枳實去穰各一兩陳皮一兩半白茯苓五錢半甘草炙四錢上㕮咀每服四錢加生薑七片棗一枚竹茹一塊水煎食前熱服一方加酸棗仁炒遠志肉五味子熟地黃人參大病後虛煩者加人參茯神遠志熟地黃砂仁炒酸棗仁油去淨橘皮湯治煩而嘔不喜食者橘皮一兩半甘草炙五分人參二錢半竹茹五錢上銼每服五錢加生薑三片棗一枚水煎食前服人參竹茹湯治胃口有熱嘔吐咳逆虛煩不安人參半兩半夏一兩竹茹一團上作六服每服加生薑三片水煎溫服一方加橘皮去白一兩遠志湯治憂思過度心虛煩熱夜臥不安遺精白濁及病後虛煩遠志黑豆甘草同煮去骨黃耆當歸酒洗麥門冬去心石斛酸棗仁炒各一錢二分人參茯神去皮木各七分甘草五分上銼水煎服食遠服煩甚者加竹葉知母辰砂妙香散治男子婦人心氣不足精神恍惚虛煩少睡夜多盜汗常服補益氣血安鎮心神麝香一錢另研山藥薑汁炙茯苓茯神去木黃耆遠志去心炒各一兩人參桔梗甘草炙各半兩木香煨二錢半辰砂三錢另研上為末每服二錢溫酒調服不拘時地仙散治大病後煩熱不安一切虛煩熱地骨皮二兩防風去蘆一兩甘草炙半兩上銼散每服三錢加生薑五片水煎服
