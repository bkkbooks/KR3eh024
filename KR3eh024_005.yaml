body:
  text: 卷五感冒論風寒初中之名若日久傳經便為傷寒當於專門方論中求之吳氏曰六氣襲人深者為中次者為傷輕者為感冒以頭痛發熱而無六經之證可求也古昔明醫未嘗析此治方九味羌活湯治春夏秋非時感冒發熱惡寒頭痛項強或無汗或自汗或傷風見寒脈或傷寒見風脈並宜服之此藥不犯三陽禁忌為四時發散之通劑也羌活蒼朮各一錢半防風黃芩川芎白芷甘草生地黃各一錢細辛五分上加生薑三片棗一枚水煎熱服覆蓋取汗汗後不解宜再服服後不作汗加蘇葉如汗不止加黃耆再不止以小柴胡湯加桂枝芍藥一錢如神原有汗去蒼朮加白朮渴加知母石膏胸中滿悶加枳殼桔梗去生地黃喘而身熱惡寒加杏仁生地黃汁欲汗下兼行加大黃蔭按羌活治太陽肢節痛大無不通小無不入乃撥亂反正之主也防風治一身盡痛聽君將命令而行隨所使引而至蒼朮雄壯上行之氣能除濕氣下安太陰使邪氣不轉脾經甘草緩裡急和諸藥白芷治陽明頭痛在額川芎治厥陰頭痛在腦生地黃治少陰心熱在內黃芩治太陰肺熱在胸細辛治少陰腎經苦頭痛此易老所制方凡見表證悉宜服之實解利之神藥也羌活散治傷寒一二日頭疼惡寒發熱脊項強脈洪大緊數川羌活蒼朮米泔浸炒各一錢半防風川芎桔梗白茯苓枳殼麩炒各一錢甘草三分上㕮咀作一服加生薑三片蔥一根水煎不拘時熱服無汗惡寒者加麻黃八分有汗惡寒者加桂枝八分加減沖和湯治四時傷風頭疼發熱惡風自汗脈浮緩者此即九味羌活湯去蒼朮細辛加白朮黃耆是也羌活一錢白朮黃耆各一錢半防風黃芩白芷川芎生地黃各五分甘草三分上銼加生薑三片棗二枚水煎服香蘇散治四時感冒風邪頭痛發熱輕者用之或服發表藥後餘邪不解胸膈痞痛服此立愈香附子紫蘇梗各二錢陳皮去白一錢甘草五分上銼作一服加生薑三片連須蔥白二莖同煎熱服頭痛加川芎白芷頭痛如斧劈加石膏連須蔥頭偏正頭風加細辛石膏薄荷太陽穴痛加荊芥穗石膏傷風自汗加桂枝傷寒無汗加麻黃去節乾薑傷風惡寒加蒼朮傷風咳嗽不止加半夏杏仁傷風胸膈痞塞加制枳殼傷風發熱不退加柴胡黃芩傷風鼻塞聲重咽膈不和加苦梗旋覆花傷風痰涎壅盛加白附子天南星傷風鼻內出血加茅花傷風氣促不安加大腹皮桑白皮傷風鼻塞不通頭昏加羌活荊芥傷風不散吐血不時加生地黃傷風不解耳內出膿疼痛加羌活荊芥傷風不解咽喉腫痛加苦梗傷風中脘寒不思飲食加去白青皮枳殼傷風嘔吐噁心不止加丁香半夏傷風頭暈眼花顛倒支持不住加熟附子傷風時作寒栗加桂枝傷風痰壅嘔惡不止加白附子旋覆花半夏傷風后時作虛熱不退加人參傷風飲食不能消化加縮砂仁青皮傷風一向不解作潮熱白日至日中不退日日如是加地骨皮柴胡人參菴䕡初感風頭痛作熱鼻塞聲重加羌活川芎感風腰疼不能伸屈加官桂桃仁感風渾身痛不止加芍藥紫金皮感風頸項強急頭不能轉加羌活官桂肚腹疼痛加木香腹肚痛剌不可忍加薑黃茱萸七粒小腹疼痛無時不可忍加木香薑棗婦人忽然大便痛腫不能下地加木香木瓜茱萸婦人被氣所苦胸膈痞疼脅肋刺痛小便急疼加木香枳殼婦人被氣所苦疼加木香砂仁脾胃不和中脘不快加穀芽神麯傷食嘔吐泄瀉腹痛加乾薑木香心卒痛者加延胡索酒一盞飲酒太過忽遍身發疸或兩目昏黃加山茵陳山梔子中酒吐惡加烏梅丁香婦人經水將行先作寒熱加蘇木紅花婦人産後虛熱不退煩渴加人參地黃産後發熱不退加人參黃耆産後腰疼不已加當歸官桂冷嗽不已加乾薑五味子杏仁脾寒加良薑青皮草果腳氣加木香木瓜牛膝紫金皮茱萸川楝子感風寒發熱頭疼加不換金正氣散感寒頭痛壯熱惡寒身痛不能轉動加生料五積散飲食不下欲吐不吐加丁香蘿蔔子感寒頭痛發熱身疼分陰陽加敗毒散石膏婦人産後風腳手疼痛生料五積散人參敗毒散加木瓜不換金正氣散加生地黃川芎同煎蔭按昔古人治風寒必分六經見證用藥然亦有隻是發熱頭痛惡寒鼻塞而六經之證不甚顯者總以疏表利氣之藥主之而已況南方風氣柔弱傷於風寒俗稱感冒感冒者受邪膚淺之名也內經曰卑濕之地春氣常存感風之證尤多所以令人頭痛發熱而無六經之證可求者其感人也由鼻而入實於上部不在六經是方也香附紫蘇陳皮之辛苦所以疏邪而正氣甘草之甘平所以和中而輔正爾十味芎蘇散治感冒外有頭痛發熱惡寒內有咳嗽吐痰氣洶者此方主之川芎七錢半夏制六錢柴胡茯苓各五錢紫蘇葉乾葛各三錢五分陳皮去白枳殼去穰桔梗甘草各三錢上㕮咀每服五錢或一兩加薑棗煎服吳氏曰川芎蘇葉乾葛柴胡解表藥也表解則頭痛惡寒發熱自愈桔梗半夏陳皮枳殼茯苓甘草和里藥也里和則咳嗽吐痰氣洶自除參蘇飲治勞倦感冒及妊娠感冒並宜此方人參紫蘇半夏制陳皮去白茯苓木香枳殼炒乾葛前胡去蘆桔梗甘草各五錢每服一兩加生薑七片棗一枚水煎熱服蔭按感冒宜解表故用紫蘇乾葛前胡勞倦妊娠宜補里故用人參茯苓甘草木香半夏枳殼桔梗陳皮所以和利表裡之氣氣和則神和神和則無病矣行氣香蘇飲治內傷生冷堅硬之物肚腹脹滿疼痛外感風寒濕氣頭痛身熱憎寒及七情惱怒相沖飲食不下心腹氣痛紫蘇陳皮香附烏藥川芎羌活枳殼麩炒麻黃蒼朮各一錢甘草炙五分上加生薑二片水煎溫服藿香正氣散治外感發熱頭疼內因痰飲凝滯為熱或中脘痞滿嘔逆噁心凡受四時不正之氣憎寒壯熱者此方主之茯苓白芷大腹皮蘇葉藿香白朮炒陳皮去白厚朴薑汁炒桔梗半夏各一錢甘草炙五分上加生薑三片棗一枚水煎熱服欲汗以被蓋再煎服蔭按治風寒客於皮毛理宜解表四時不正之氣由鼻而入故不用大汗以解表但用芬香利氣之品以主之白芷紫蘇藿香陳皮腹皮厚朴桔梗皆氣勝者也故足以正不正之氣白朮茯苓半夏甘草則甘平之品耳所以培養中氣而樹中營之幟者也不換金正氣散治四時傷寒瘟疫時氣及山嵐瘴氣寒熱往來霍亂吐瀉下痢赤白並宜服之若出遠方不伏水土者宜常服之蒼朮米泔浸厚朴薑製陳皮去白甘草半夏藿香各等分上㕮咀每服四錢水一盞加生薑三片棗二枚煎七分食前熱服和解散治四時傷寒頭痛煩躁自汗咳嗽吐利蒼朮去皮一斤藁本桔梗甘草各半斤陳皮洗厚朴去粗皮薑汁炙各四兩上為粗末每服三錢水一盞半生薑三片棗二個煎七分不拘時熱服清解散治一切感冒蒼朮炒荊芥各二兩麻黃一兩半甘草一兩上㕮咀每服一兩水二鍾生薑三片蔥白一莖同煎七分去渣微熱服以被蓋覆取汗為度神術湯治內傷冷飲外感寒邪無汗者蒼朮制防風各二兩甘草炒一兩上㕮咀加蔥白生薑同煎服如太陽證發熱惡寒脈浮而緊者加羌活二錢如太陽證脈浮緊中帶弦數者是兼少陽也加柴胡二錢如太陽證脈浮緊中帶洪者是兼陽明也加黃芩二錢婦人服者加當歸或加木香或加藁本各二錢如治吹奶煎調六一散三五錢神效六氣加減例太陽寒水司天辰戌之歲加羌活桂枝餘歲非時變寒亦加冬亦加陽明燥金司天卯酉之歲加白芷升麻餘歲非時變涼濕亦加秋亦加少陽相火司天寅申之歲加黃芩地黃餘歲非時變雨濕亦加夏亦加太陰濕土司天丑未之歲加白朮藁本餘歲非時變熱濕亦加夏末秋初亦加少陰君火司天子午之歲加細辛獨活餘歲非時變熱亦加春末夏初亦加厥陰風木司天巳亥之歲加川芎防風餘歲非時變溫和亦加夏亦加養胃湯治外感風寒內傷生冷憎寒壯熱頭目昏疼不問風寒二證夾食停痰俱能治之但感風邪以微汗為好半夏湯洗七次厚朴薑汁炒蒼朮米泔浸炒各一兩橘紅七錢半藿香葉洗去土草果去皮膜茯苓去皮人參各半兩炙甘草二錢半上㕮咀每服四錢水一盞半生薑七片烏梅一個煎六分熱服兼治飲食傷脾發為痎瘧寒多者加附子為十味名不換金散大白朮湯和解四時傷寒混解六經不犯禁忌白朮石膏各二兩防風羌活川芎各一兩白芷一兩半知母七錢黃芩枳實各五錢甘草五錢或一兩細辛三錢上為粗末每服半兩水一盞半煎至一盞溫服未解更一服兩服藥渣又作一服春倍防風羌活夏倍黃芩知母季夏雨淫倍白朮白芷秋加桂枝五錢冬加桂八錢或一兩黃耆湯有汗則能止之白朮黃耆防風各等分上㕮咀每服五七錢至一兩水煎溫服汗多惡風甚者加桂枝川芎湯無汗則能發之川芎蒼朮羌活各等分上㕮咀每服五七錢至一兩水煎熱服無汗惡寒甚者加麻黃一二錢蔭按蓋有汗不得服麻黃無汗不得服桂枝然春夏汗孔疏雖有汗不得服桂枝宜用黃耆湯和解之秋冬汗孔閉雖無汗不當服麻黃宜用川芎湯和解之春夏有汗脈微而弱惡風惡寒者乃太陽證秋冬之脈也宜用黃耆湯無汗用川芎湯秋冬有汗脈盛而浮發熱惡熱者乃陽明春夏之脈也宜用黃耆湯無汗亦用川芎湯大抵有汗皆宜黃耆湯無汗皆宜川芎湯然須審其壯怯不可妄用
