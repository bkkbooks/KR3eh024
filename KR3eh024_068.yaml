body:
  text: 卷六十八延年論彭氏保調論曰嘗得之聞人曰夫養生者臥起有四時之早晚飲食有至和之常制調利關節有導引之方流行榮衛有吐納之術忍喜怒以養陰陽之氣節嗜欲以固真元之精保形延命可謂備矣使禁忌之理知有未周雖云小節之常亦為大道之纍故事有侵性不可不慎者古云一日之忌暮無飽食一月之忌暮無大醉一歲之忌暮無遠行終身之忌暮常護氣蓋謂暮乃偃息之時人若飽食則腹中空虛之地少而氣之居內以養形者寡癖瘕壅滯之患作矣故暮當忌飲食蓋日日慎之也酒毒酷悍飲至大醉則毒氣必壞真氣況暮醉而臥氣溢形止腸胃由之腐爛經絡以之橫解一時不覺久乃成疾雖少壯之人不可使一月之內有此一醉況中年以往之人乎暮而遠行不惟有外觸之虞山川嵐霧夜陰鬱發冒之亦能損人真氣故皆宜忌之以上三者不行則真氣常保無失是終身能護真氣矣又久視傷血久臥傷氣久立傷骨久行傷筋久坐傷肉大抵人之形氣時動時靜其機運而不滯久於動靜未免有傷也睡不厭踧覺不厭舒踧者曲膝卷腹以左右肋側臥修養家所謂獅子眠是也如是則氣海深滿丹田常暖腎水易生益人弘多舒體而臥則氣直而寡蓄散而不潛故臥惟覺時可舒體耳凡人覺大小便即行勿忍之忍小便則膝冷成痹忍大便則成氣痔小便勿努努久令人兩膝冷痛大便勿努努久令人腰痛目昏氣逆急故也並宜任其自然凡人太勞則力乏絶太飢則臟腑脈絡有竭太飽則腠理氣溢太渴則經脈蹶亂太醉則精神散越太熱則陰氣解脫太寒則血脈凝結並能致疾凡心有愛不用深愛凡心有憎不用深憎凡喜至而心不蕩凡怒遏而情不留並能養神益壽學道之功至此乃至人對景忘情之妙聖人養心定性之學修養之術不足以盡之也凡夜非調氣之時常習閉口而睡為佳口開即失真氣且邪從口入更牙齒為出入之氣所觸後必病齒凡睡而張口者牙齒無不早落可以驗之濕衣及汗衣切不可著久能傷人心肺之系及發瘡瘍十步直牆下勿得順臥風峻利能令人發顛及體重凡大汗後及新浴出勿赤體勿即脫衣當風風入腠理則成半身不遂夜臥當耳處勿令有孔隙令人風吹耳聾頭頂亦如之夜臥勿覆其頭得長壽以常有天地之清氣入腹中也潛溪曰古之善攝生者居常少思慮忍嗜欲平喜怒寡憂樂淡好惡世之美麗貴重物事俱不足以入其心由是志意舒暢形體安和血氣順利度百歲而長生矣又男女論曰天地氤氳萬物化醇男女構精萬物化生此造化之本源性命之根本也故人之大欲亦莫切於此嗜而不知禁則克伐年齡蠶食精魄暗然弗覺而元神真氣去矣豈不可哀惟知道之士禁其太甚不至杜絶雖美色在前不過悅目暢志而已決不肯恣其情欲以伐性命或問抱朴子曰傷生者豈非色欲之間乎曰然長生之要其在房中上士知之可以延年卻病其次不以自伐下愚縱欲損壽而已是以古人於此恆有節度二十以前二日復二十以後三日復三十以後十日復四十以後月復五十以後三月復六十以後七月復又曰六十閉戶蓋時加樽節保養真元以為身之主命不然雖勤於吐納導引藥餌之術而根本不固亦終無益內經曰能知七損八益七者女子之血八者男子之精則血氣精血二者可調不知用此則早衰之漸也故年四十而陰氣自半起居衰矣年五十體重耳目不聰明矣年六十陰痿氣血大衰九竅不利下虛上實涕泣俱出故曰知之則強不知則老智者有餘自信而先行故有餘愚者不足察行而後學故不足有餘則耳目聰明身體輕強老者益壯壯者益治蓋謂男精女血若能使之有餘則形氣不衰而壽命可保矣不然竅漏無度中干以死非精離人人自離精也可不戒哉養生之士忌其人者有九或年高大或唇薄鼻大或齒疏發黃或痼疾或性情不和或沙苗強硬或聲雄或肉澀肢體不膏或性悍妒忌皆能損人並不宜犯之忌其時者十有一醉久飽食遠行疲乏喜怒未定女人月潮沖冒寒暑疾患未平小便訖新沐浴後及早出行無情強為皆能使人神氣昏憒心力不足四體虛羸腎臟怯弱六情不均萬病乃作特宜慎之至於天地晦明日月薄食疾風甚雨雷電震怒此陰陽大變六氣失常之時犯之不惟致疾且褻汙神明倘成子女形必不周雖生而不育矣嗚呼帷幕之情易綰而難斷不可以不智慧決也佛書曰諸苦所因貪欲為本貪欲不滅苦亦不滅苦不滅則生滅養生者惡可以不智慧決哉高氏論房中藥物之害曰自比覺泥水之説行而房中之説橫矣因之藥石毒人其害可勝道哉夫人之稟受父母精血厚者其生壯即多欲尚可支薄者其生弱雖寡欲猶不足故壯者恣欲而不即斃者有之未有弱者恣欲而壽者矣飲食男女人之大欲也不可已亦不可縱縱而無厭疲困不勝乃尋藥石以強之務快斯欲因而方人術士得以投其好而逞其技矣構熱毒之藥稱海上奇方入於耳者有耳珠丹入於鼻者有助情香入於口者有沉香合握於手者有紫金鈴封於臍者有保真膏一丸金蒸臍餅火龍符固於腰者有蜘蛛膏摩腰膏含於龜者有先天一粒丹抹其龜者有三釐散七日一新方縛其龜根者有呂公絛硫黃箍蜈蚣帶寶帶良宵短香羅帕兜其小腹者有順風旗玉蟾褌龍虎衣搓其龜者有長莖方掌中金納其陰戶者有揭被香暖爐散窄陰膏夜夜春塞其肛門者有金剛楔皆用於皮膚以氣感腎家相火一時堅舉為助情逸樂用之不已其毒或流為腰疽聚為便癰或腐其龜首爛其肛門害雖橫焰尚可解脫內有一二得理未必盡虎狼也若服食之藥其名種種如桃源祕寶丹雄狗丸閉精符之類頗多藥毒誤人十服九斃不可救解往往奇禍慘疾潰腸裂膚前車可鑑此豈人不知也欲勝於知甘心蹈刃觀彼肥甘醇厚三餐調護尚不能以月日起人癯瘠使精神充滿矧以些少丸末之藥頃刻間致屢陽可興疲力可敵其功何神不過仗彼熱毒如蛤蚧海馬狗腎地龍麝臍石燕倭硫陽起蜂房蟻子之類譬之以烈火灼水燔焰煎煿故腎臟一時感熱而發豈果仙丹神藥乃爾靈驗速效也耶保生者可不惕懼以痛絶助長之念客曰某某者每用其藥今以壽老何子之疑也余曰是誠有之也但外用者十全二三內服者無一全於十百若內若外豈真無異術者哉何能得其真傳況比覺為大道旁門得陰陽之妙用率歸正脈其説匪徒淫姤快欲之謂人之一身運用在於任督二脈督為陽父任為陰母尾閭夾脊為督脈之關中腕膻中為任脈之竅任氣聚於氣海督氣聚於泥丸故陰陽升降吸即升也起於臍呼即降也轉於腦其行氣交會行之至肛門緊提則氣會行之至地戶緊閉則氣交真氣一降則天氣入交於地根得土則止真氣一升則穀氣出接於天根逢土則息此為陰陽大竅其理最顯最密所謂性與命相守神與氣相依者此耳故經曰神駁氣氣留形不須別藥可長生如此朝朝並暮暮自然精滿穀神存生死要關須知窮此妙境為吾身保命大藥乃於金石虎狼求全造化神靈其謬失不既多乎吾重為死不知害者感也太上玄鏡曰純陽上升者謂之氣純陰下降者謂之液氣液相交於骨脈之間謂之髓相交於膀胱之外者謂之精心氣在肝肝精不固目眩無光心氣在肺肺精不實肌肉瘦弱心氣在腎腎精不固神氣減少心氣在脾脾氣不堅齒髮浮落五臟之中腎為精樞心為氣館真精在腎余精自還下田真氣在心餘氣自歸元腑真詮脈法太素曰北方之脈本滑沉指下來兼潤帶深此是世間長壽客名題金榜位公卿又曰保合天元壽基穩壯服食方補天大造九此方專滋養元氣延年益壽壯陽光溫坎水降離火為地天交泰若虛勞之人房室過度五心煩熱服之神效養生君子過四十以來服之接補以躋期頤地方方見虛損門二煉龍虎五精丸詩曰神仙留下濟人丹安魂定魄注容顏寬胸順氣神凝靜化痰止嗽暖丹田生津消渴甘露降透竅明目返本源每用一丸常噙化益壽延年世上仙陽煉龍虎石二兩三錢陰煉龍虎石二兩七錢二煉方附後茯苓一兩五錢何首烏末七兩蓮粉五錢芡實一兩紅鉛一兩金乳粉二兩上八味各為末入大瓷盤內每日加頭生男乳一鍾拌溫曬二七日又加梨汁曬七日足加紅棗肉同入木石臼內搗千餘下令和石方取出丸如桐子大先用硃砂末滾身次將金箔為衣曬乾入瓷罐收貯勿令泄氣亦常取出亮照干不可黴了每日五更乳酒頓熱服一錢臨睡時半飢半飽用蓮肉煎湯服五分此藥服之半月身內如有風寒暑濕之氣自然消除服至一月故病除根服之百日五臟生精至一年返老還童先服五精丸將身中故病舊患並皆除卻能使肌膚光潤久服則百病不生萬邪歸正陰陽二煉龍虎石法龍屬木虎屬金即童男童女小便也二鼎器務擇眉清目秀滿月之相唇紅齒白發黑聲清肌膚細潤年方十二三歲至十五六未破身者用黍稷稻粱紅豆紅棗牙豬鯽魚等味與彼食之忌蔥蒜韭薤等五葷三厭穢汙二水先調百日十月起三月止置瓷缸於靜處收貯蓋之積至二三石聽用陰煉法將前積取二水置瓷缸三四口或五六口於靜通溝去處每缸止放五分龍虎水加井水五分下明礬二兩白朮二兩松柏葉各二兩取楊柳棍三四莖一札順攪千餘下蓋之勿動勤看待水澄清去蓋慢慢湢去清水又加清水滿缸以絹羅濾去柤滓又攪二三百轉蓋之澄清又盡湢去清水仍加井水又濾又攪又湢如此十餘次直待水香為止湢水盡用米篩二三個內鋪薄綿紙將渾龍石取入篩紙上待水乾移在日色處以竹刀劃作骨牌路曬乾如粉之白即是陰煉龍虎石用瓷盒收貯合藥用此石能補心生精養血之至藥也陽煉法擇露天空地砌灶二眼坐東朝西安大小鍋二口將積下龍虎水先於大鍋內入五瓢慢火粗熬至起沫以罩籬撇去油沫直待熬至不起沫方起過小鍋內細熬大鍋內仍添二三瓢又熬又起如此少少漸添漸起直待前積二水熬盡大鍋住火只在小鍋慢火熬用剷刀不住手鏟待水乾成膏上用一小鍋小缸合住鍋口周圍用鹽泥封固嚴密止留一孔出水氣盡孔內飛出金星青氣急以泥封孔眼缸底用濕布一方不可水大但常以水潤之小火燒至鍋底紫色退火冷定過夜第二日先去口泥淨揭開升缸上已汞靈藥紅黑白色者另收聽用另打黃牙將鍋內黑膏子剷起另入一口小鍋內用磚架起大火燒待黑煙盡連鍋通紅退火晾冷酌量下井水或露泉等水尤妙燒滾先置靜缸一口上安竹篩篩內鋪紙數層濾滴清水入缸篩內黑柤不用將濾下清水就瓷盤煎出淨石來如略有些黃色還用前小鍋煎乾再煅一火照前淋煎傾在紙上曬乾似雪之白此陽煉之法仙傳秋石配合十精五子丸陽煉龍虎石十兩陰煉龍虎石六兩人參當歸洗酒葫蘆巴微炒芡實蓮花蕊微焙鹿茸酒浸酥炙黃仙靈脾葉蒼朮米泔水浸炒以上十味十精藥枸杞子酒浸曬乾菟絲子酒浸蒸七次巨勝子焙車前子酒浸炒柏子仁以上五味五子之藥各二兩沉香粉草各一兩辰砂五錢水飛極細三味升降之藥白鉛一兩即人乳上將衆藥均對分兩用棗肉加煉蜜搗合為丸如桐子大每服一百丸白湯送下日進三服服至百日百疾消除身輕體健效難口述也先天真一丹此丹乃大茅君授與二茅君三茅君地仙長生仙藥訣曰上品神仙藥先天真一丹每朝吞百粒卻老返童顏能轉周身氣神功內返還華池灌神水滴滴注玄關陰符調火候默默自抽添至誠修煉服管汝壽齊天白虎首經粉九鼎陰煉秋石乳粉乾山藥石菖蒲九節者茅山蒼朮米泔浸各四兩旱蓮草二兩甘州枸杞子三兩珍珠菊花蕊甘草各一兩上各為細末煉蜜丸如緑豆大每服六七十丸加至百丸空心滾湯下道藏斑龍黑白二神丹治虛損怯證五勞七傷氣血俱虛顏色憔悴服之美顏色和五臟壯精神美鬚髮補羸瘦功莫能述鹿茸二兩酥炙當歸酒洗人參各四兩地黃八兩取汁為膏陳皮茯神人乳制柏子仁枸杞子白朮各二兩麥冬去心鍾乳粉水飛各一兩生地黃汁一碗沉香五錢上為末煉蜜丸如桐子大每服五六十丸秋石湯下度世丹安神志定魂魄順五臟和六腑添智慧烏髭鬚通脈絡除勞損續絶敗蓋此藥稟天地中和不燥不熱可以長服如有惡疾肢體不安行步艱辛飲食少進或寤寐不安或痛連筋骨服之是疾皆除駐悅顏色滋潤肌膚聰明耳目四肢強健延年益智功效不可具述枸杞子甘菊花遠志車前子生地酒炒巴戟覆盆子白朮肉蓯蓉石菖蒲九節者菟絲子酒浸七日牛膝酒浸七日細辛續斷地骨皮何首烏各等分上逐件擇洗搗為細末煉蜜和丸如桐子大服三十丸空心溫酒送下服一月百病不生服一年至二年返老還童顏貌若蓮花是病皆除神仙不老丹養榮衛潤三焦滑肌膚去邪氣惡蠱等疾服逾百日鬚髮返黑人參枸杞子酒浸一宿菟絲子酒蒸川當歸各二兩川牛膝酒浸一宿杜仲生薑汁炒斷絲各一兩半石菖蒲米泔浸一宿柏子仁地骨皮生地黃酒浸熟地黃俱忌鐵器川巴戟槌去心酒浸各一兩上件揀選精製如法勿曬用慢火焙乾若大燥則失藥味待乾即於風前略吹令冷熱相激燥淨稱碾為細末煉蜜揀火日搜和於大臼內搗千餘槌丸如桐子大每日空心午時臨臥各服七十丸溫酒鹽湯任下忌食蔥韭蘆蔔真粉及藕諸般血蓋血能破血又解藥力若三白誤服亦無他説止令人髭發不變黑耳最要節色欲使藥力效之速也羅真人延壽丹此藥陰陽升降無偏充實肌膚填精補髓精神倍長強壯筋骨悅顏色固真氣和百脈正三焦烏鬚髮堅齒牙耳目聰明老能輕健效何可盡述乃仙方也乾山藥人參白茯苓川牛膝酒浸杜仲薑炒去絲龍骨川續斷去蘆鹿茸當歸山藥苗北五味熟地黃酒浸石菖蒲楮實子破故紙炒麥門冬去心各一兩遼枸杞五錢如下元虛冷加鹿茸附子各五錢上為極細末擇天氣晴和揀選好日以酒糊為丸如梧桐子大每服五十丸或六七十丸淡鹽湯下修合之日忌婦人雞犬之類日進二服大有功效卻老烏須健陽丹何首烏赤白各一斤打碎如棋子大牛膝半斤同首烏用黑豆五升砂鍋蒸三次枸杞子半斤酒浸茯苓赤一斤牛乳浸一宿白一斤人乳浸一宿曬乾當歸酒浸一宿半斤茯神半斤菟絲子半斤好酒浸三日曬乾破故紙五兩炒黃色上各不犯鐵器為末煉蜜丸如彈子大日進三丸空心一丸酒下午後一丸薑湯下臨臥一丸鹽湯下或用合作小丸如桐子大每服五六十丸亦可延年益壽不老丹此藥千益百補常服功效難言生地黃酒浸一宿曬乾熟地黃酒洗淨曬乾天冬酒浸三時去心曬乾麥門冬酒浸三時去心曬乾人參各三兩地骨皮酒洗淨曬乾五兩白茯苓酒洗淨曬乾五兩何首烏半斤鮮者竹刀刮去皮切片乾者泔浸軟切砂鍋同黑豆蒸一二時曬乾上共為細末煉蜜丸如桐子大每服三五十丸清晨用溫酒送下彭真人延壽丹補心生血滋腎壯陽黑鬚發潤肌膚返老還童延年益壽種子大辰砂研細水飛過牛膝酒洗天門冬去心麥門冬去心當歸酒洗白茯苓水飛曬乾人乳浸遠志甘草水泡去心川芎石菖蒲鹽水浸巴戟白茯神青鹽小茴香鹽水炒乳香揀參各一兩補骨脂酒浸炒杜仲薑酒炒生地黃酒洗熟地黃黃柏鹽水炒知母酒炒各二兩核桃仁去皮炒槌去油川椒微炒去目各四兩黃精米泔水煮一沸揀去爛的竹刀切片曬乾卻用旱蓮汁四兩生薑汁二兩並酒三味熬膏浸黃精半日炒蒼生四兩何首烏赤白停用槌碎煮於黑豆水上九蒸九曬再用人乳浸透曬乾四兩上為末煉蜜丸如桐子大每服七十丸空心鹽湯或酒下一方加山茱萸枸杞子菟絲子山藥柏子仁尤妙延齡聚寶酒常服長精神明耳目黑鬚發何首烏赤白兼用生地酒炒槐角子炒黃色十一月十一日採干菊花茯苓熟地黃蓮蕊桑椹子黑紫者各四兩天冬去心石菖蒲五加皮蒼朮米泔浸一宿枸杞子黃精細辛一方無此味白朮防風人參麥門冬去心蒼耳子炒揚去刺肉蓯蓉酒浸去鱗沙苑白蒺藜天麻如牛角者甘草炙牛膝杜仲薑汁炒去絲各二兩當歸一兩上咀片裝入生絹帶內用無灰高黃酒一大壇盛九斗十斗方可將藥入壇春浸十日夏浸七日冬浸十四日將藥酒每五更空心服三小鐘還臥片時午間夜間再服三鍾尤妙忌生冷生蔥生韭腥白蘿蔔常忌常服不斷自有功效若服一日歇二三日不依前法取效鮮矣仍將藥柤曬乾為末煉蜜丸如桐子大每服五十丸空心無灰酒下少陽丹一名三精丸此方健脾去濕息火消痰久服身輕發白轉黑面如童子蒼朮乃天之精也用米泔水浸半日刮去黑粗皮曬乾鹽水炒搗羅為細末一斤地骨皮乃地之精也即枸杞子根以溫水洗淨去骨取嫩皮曬乾搗羅細末一斤桑椹乃人之精也用黑熟者二十斤入瓷盆內以手操爛入絹袋內壓汁去柤不用上將前二味藥末投入桑椹汁內調為稀糊傾入磁罐內封口置放在淨棚上晝採日精夜採月華專待日月自然煎乾為度搗羅為細末煉蜜為丸如赤小豆大每服十丸用無灰酒下日進三服一年發白返黑三年面如童子壽與天齊胡尚書壯陽丹滋補元陽美顏益算蓮肉水浸去皮心八兩芡實乾山藥白茯苓去皮甘枸杞山茱萸去核各四兩年老人加遼參四兩上為細末熟糯米一升炒黃色為末白糖五兩酥油五兩拌勻磁器收貯每早沸米湯或酒任調五六匙下乾物壓之日月仙酥湯補百損除百病返本還童卓有奇效蓮肉去皮心柏子仁去殼棗肉煮去皮各半斤杏仁去皮尖六兩搗胡桃仁去皮四兩搗砂仁一兩碾末酥油白蜜各半斤上用文火煉蜜末散次入酥勻再煎數沸方入蓮柏末又數沸入桃杏棗膏慢熬半炷香量諸味皆熟入砂仁末攪勻用磁罐數個收貯置冷水中浸一日出火毒油紙或脂膜封口每服三匙空心臨時溫酒一二杯送之卻老七精散固精延年卻除百病聰明耳目甚驗茯苓天之精三兩地黃花地之精桑寄奴木之精各二兩菊花月之精竹實日之精地膚子星之精車前子雷之精各一兩三分上七種上應日月星辰欲合藥者以四時王相日先齋戒九日別於靜室內焚香修合搗羅為細末每服三寸方匕以井花水調下面向陽服之須陽日一服陰日二服滿四十九日即效地黃花須四月採竹實似小麥生藍田竹林中二精丸常服助氣固精保鎮丹田活血注顏長生不老黃精去皮清水洗淨控干銼細枸杞子各二斤上二味各入九月間採取相和杵碎拌勻陰乾再搗為末煉蜜為丸如桐子大每服三五十丸空心食前溫酒下萬病黃精丸延年益氣治療萬病久服可希仙位黃精十斤淨洗蒸令爛熟天門冬去心蒸搗熟白蜜各三斤上三味拌勻石臼內搗一萬杵再分為四劑每一劑再搗一萬柞丸如桐子大每服三十丸溫酒下日三服不拘時蒼朮丸主健脾去濕保長生古云若欲長生須服山精者此也茅山蒼朮一升米泔水浸一宿曬乾雪白茯苓六兩去筋膜上各為細末東流水煮神麯作糊為丸如緑豆大每服七八十丸清晨滾湯送下仍須存想千里長漫神遊氣壯至妙鐵甕先生瓊玉膏此膏填精補髓腸化為筋萬神俱足五臟盈溢發白變黑返老還童行如奔馬日進數服終日不食亦不飢開通強志日誦萬言神識高邁夜無夢想服至十劑絶其欲修陰功成地仙矣一料分五處可療五人癱疾分十處可救十人勞疾修合之功沐浴至心勿輕示人新羅參二十兩去蘆生地黃一十六斤取汁白茯苓四十九兩去皮白沙蜜一十斤煉淨上件人參茯苓為細末蜜用生絹慮過地黃取自然汁搗時不用鐵器銅器取汁盡去柤共藥一處拌和勻入銀石器或好磁器內用淨紙二三十重封閉入湯內以桑柴火煮三晝夜取出用蠟紙包瓶口數重入井中去火毒一伏時取出再入舊湯內煮一日出水氣取出開封取三匙作三盞祭天地百神焚香設拜至誠端心每日空心酒調一匙國朝太醫院議加甘枸杞天冬麥冬去心各一斤地仙煎治腰膝疼痛一切腹內冷病令人顏色悅澤骨髓堅固行及奔馬山藥一斤杏仁一升湯泡去皮尖生牛乳二斤上將杏仁研細入牛乳和山藥拌絞取汁用磁瓶密封湯煮一日每日空心酒調服一匙九轉長生玉液膏久服輕身延年悅澤顏色白朮氣性柔順而補每用二斤秋冬採之去粗皮赤朮即蒼朮性剛雄而發每用十六兩用上制上二藥用木石臼搗碎入缸中用千里水浸一日夜山泉亦好次入砂鍋煎汁一次收起再煎一次絹濾柤淨將汁用桑柴火緩緩煉之熬成膏磁罐盛貯封好入土埋一二日出火氣用天德日服三錢一次白湯調下或含化亦可忌食桃李雀蛤海味等食更有加法名曰九轉二轉加人參三兩煎濃汁二次熬膏入前膏內名曰長生神芝膏三轉加黃精一斤煎汁熬膏入前藥內名曰三臺益算膏四轉加茯苓遠志去心各八兩熬膏入前膏內名曰四仙求志膏五轉加當歸八兩酒洗熬膏和前膏內名曰五老朝元膏六轉加鹿茸麋茸各三兩研為末熬膏和前膏內名曰六龍御天膏七轉加琥珀紅色如血者飯上蒸一次為細末一兩和前膏內名曰七元歸真膏八轉加酸棗仁去核淨肉八兩熬膏和前膏內名曰八神衛護膏九轉加柏子仁四兩研如泥入前膏內名曰九龍扶壽丹丹用九法加入因人之病而加損故耳又恐一併煉膏有火候不到藥味有即出者有不易出者故古聖立方必有妙道蒼龍養珠萬壽紫靈丹丹法入深山中選合抱大松樹用天月德金木交併日上腰鑿一孔方圓三四寸者入深居松之中止孔內下邊鑿一深凹次選上等舊坑辰砂一斤明透雄黃八兩共為末和作一處綿紙包好外用紅絹囊裹縫封固納松中空處以茯苓末子填塞完滿外截帶皮如孔大楔子敲上又用黑狗皮一片釘遮松孔恐有神靈取砂令山中人看守取松脂升降靈氣將砂雄養成靈丹入樹一年後夜間松上有螢火光二年漸大三年光照滿山取出二末再研如塵棗肉為丸如桐子大先以一盤獻祝天地神祗後用井花水清晨服一二十丸一月後眼能夜讀細書半年行若奔馬一年之後三尸消滅九蟲遁形玉女來衛六甲行廚再行陰功積德地仙可位松乃蒼龍之精砂乃赤龍之體得天地自然升降水火之氣而成丹非人間作用其靈如何玄元護命紫芝杯此杯能治五勞七傷諸虛百損左癱右瘓各色瘋疾諸邪百疾昔有道人王進服之臨死見二鬼排闥視立久之而去後夢一人語之曰道者當死昨有無常二鬼來拘因公服丹砂之靈四面紅光鬼不能近而去過此公壽無量此道人後活三百餘歲去用明淨硃砂一斤半先取四兩入水火陽城罐打大火一日一夜取出研細又加四兩如此加添打火六次足共為細末將打火鐵燈盞改打一鐵大酒杯樣摩光作塑懸入陽城罐內鐵杯渾身貼以金箔五層厚罐內裝砂口上加此杯盞打大火三日夜鐵盞上面時時加木擦內結成杯在於塑上取下每用明雄三釐研入硃砂杯內充熱酒服二杯一次收杯再用妙不盡述三皇真人煉丹方丹砂一斤研末重篩以醇酒沃之如泥狀盛以銅盤置高閣上勿令婦女見燥則復以酒沃令如泥陰雨疾風則藏之盡酒三斗乃曝之三百日當紫色齋戒沐浴七日靜室飯丸麻子大常以平旦向日吞三丸一月三蟲出半年諸病瘥一年鬚髮黑三年神人至蔭按書云硃砂鎮養心神但宜生使用若煉服少有不作疾者一人疾服伏火者數粒一旦大熱數夕而斃夫生硃砂初生小兒便可服因火力所變遂能殺人不可不謹此方以酒曝服之或無大毒然亦須慎之小神丹真丹砂末三斤白蜜六斤上二味攪合日曝至可丸丸如麻子大每旦服十丸一年白髮反黑齒落更生身體潤澤老翁成少神注丹方白茯苓四兩糯米酒煮軟竹刀切片陰乾為末硃砂四錢為細末留二錢為衣上以乳香水打糊為丸如桐子大硃砂為衣陽日二丸陰日一丸要祕精新汲水下要逆氣過精溫酒下空心服小丹服法雄黃柏子仁各二斤松脂煉過十斤上合搗為丸每旦北向服五丸百日後拘魂制魄神人交見雄黃丸去三尸滅百蟲美顏色明耳目雄黃明透如雞冠不雜石者搗羅一兩松香採明淨純白者水中煮一二炊將浮起者取用為末一兩上二味和勻杵為丸如彈子大每早酒下一丸服十日三尸百蟲自下出人面紫黑氣色皆除服及一月百病自瘥常須清淨勿損藥力服雄黃法雄黃明透聞之不臭如雞冠者佳取三兩先用甘草紫背天葵地膽碧凌花各五兩為末同雄黃入砂罐內東流水煮三日漉出搗如粗粉入豬脂內蒸一伏時洗出又同豆腐內蒸如上二次蒸時甑上先鋪山黃泥一寸次鋪脂蒸黃其毒去盡收起成細粉上松脂二兩上為丸如桐子大每服三五丸酒下能令人久活延年發白再黑齒落更生百病不生鬼神呵護頂有紅光無常畏不敢近疫癘不惹特餘事耳又制雄黃法用明雄黃二兩先將破故紙杏仁枸杞子地骨皮甘草各用四兩以水二斗煎至一斗去柤留汁又取灶上煙筒內黑流珠四兩山家灶中百草霜四兩同雄黃一處研細傾入藥汁內熬干入陽城罐內上水下火打四炷香取出冷定收起每用以治心疾風痹並膈氣咳咳每服一分效四聖不老丹松脂一斤四兩白茯苓甘菊花柏子仁各八兩上為末煉蜜丸如桐子大每七十二丸清晨鹽湯酒下松脂丸可長生辟穀松脂一斤白茯苓半斤上為末蜜丸服松梅丸大能加飲食肥身體清小便潤大腸補勞傷除骨蒸補元氣津液令精神不倦松脂一斤地黃十兩烏梅六兩上俱用酒蒸爛搗膏為丸如桐子大每五十丸空心米飲鹽湯任下松柏實丸服之可以不飢松脂十斤松實柏實各三斤菊花五斤上為末煉蜜丸如桐子大每三十丸白湯下服松柏葉法此藥除百病益元氣潤五臟六腑清明耳目強壯不衰老延年益壽服一年延十年命服二年延二十年命孫真人枕中記採松柏法常以三月四月採新生松葉可長三四寸許並花葉取陰乾細搗為末其柏葉取深山岩谷中採當年新生可長二三寸者陰乾細搗為末用白蜜丸如小豆大常以日未出時燒香東向手持藥八十一丸以酒下或用七月七日露水丸之更佳服時乃咒曰神仙真藥體合自然服藥入腹天地同年咒訖服藥斷諸雜肉及五辛切忌慎之欲得長肌肉加火麻巨勝欲心力壯健加茯苓人參神仙服餌方側柏葉三斤五月五日採五方遠志去心二斤白茯苓去皮一斤上為末煉蜜和丸如桐子大每服三十丸以仙靈脾酒下日再服並無所忌服松脂法白松脂一斤即今之松香桑灰汁一石上先將灰汁一斗煮松脂半乾將浮白好脂摝入冷水候凝復以灰汁一斗煮之又取如上兩人將脂團圓扯長十數遍又以灰汁一斗煮之以十度煮完遂成白脂研細為末每服一匙以酒或粥飲調下空心近午臨臥日三服服至十兩以上不飢夜視目明長年不老一法百鍊松脂篩細蜜合納角中勿見風日每服一團一日三服服至百日耐寒暑二百日五臟補益五年即見西王母伏虎禪師服松脂法松脂十斤用水煮候消去濁柤取清浮者投冷水中如此換水投煮五度一方投煮四十遍方換湯又煮凡三次一百二十遍令苦味盡每一斤入茯苓四兩同煉脂乘軟丸如豆大每服三十丸或只為末每旦水服一刀圭能令身輕清爽不飢延年服松葉法松葉細切更研為末每日食前以酒調下二錢亦可煮汁作粥食初服稍難久是自便矣令人不老身生緑毛輕身益氣久服不已絶谷不飢不渴餌長松根法服之毛髮復生顏色如故又解諸蟲蛇毒長松根皮色似薺苨長三四寸味微苦類人參清香可愛生古松下多雜甘草中得煎湯服之亦可薺音劑苨音禰劉協新論愚與直相像若薺苨之亂人參服松子法松子不以多少研為膏空心溫酒調下一匙日三服久服不飢渴日行五百里身輕體健服柏葉法服之百病不生顏色悅澤齒落更生耳目聰明取柏葉近上向東勿雜枝者置甑中令滿盆覆蒸三石飯久愈久愈善水淋數過陰乾煎服或九蒸九曬為末煉蜜丸服之治大風發眉脫落或用柏葉點湯常飲亦可服柏脂法久服煉形延年柏樹夏月刻向陽者甘株可得半斤煉法同松脂其色味功效尤勝但不可多得耳服柏實法八月連房取實曝之令拆其子自脫去殼取仁搗羅為細末每服二匕溫酒調下日三服渴即飲水令人悅澤一方加松子仁等分以松脂和丸一方加菊花等分蜜丸如桐子大每服十丸二十丸日三服酒下奇效方柏子仁二斤棗肉三斤白蜜白朮末地黃末各一斤上搗勻丸如彈子大每嚼一丸一日三服百日百病愈久服延年壯神女貞丹久服發白轉黑強陰不走止諸血倍膂力健腰臍初服令老者便無夜起即冬青子去梗葉酒浸一日夜布袋擦去粗皮曬乾為末待有旱蓮草出取數石搗汁熬濃為丸如桐子大少則以蜜加入每服百丸空心臨臥白湯或酒下神仙服槐實延年不老方常以十月上已日採取槐角用新瓷器盛之以盆合蓋其上密泥勿令走氣三七日開去皮從月初日服一粒以水下日加一粒直至月半卻減一粒為度終日復始令人可夜讀細書延年益氣力大良又服槐實法取槐實入冬月牛膽中漬浸百日陰乾每食後吞一粒百日身輕千日發自黑久服通神服桑椹法利五臟關節通血氣久服不飢多收桑椹曬乾搗末煉蜜丸如桐子大每日服六十丸變白不老取黑椹一升和蝌蚪一升瓶盛封閉懸屋東頭盡化為泥染白如漆又取二七枚和胡桃二枚研如泥拔去白髮填孔中即生黑髮蝌音科蚪音鬥一名懸針一名水仙子似河豚頭圓身青頭大而尾細吳真君服椒方暖丹田通血脈助元氣消酒食闢溫毒祛邪氣安五臟調三焦而熱不上蒸芳草之中功皆莫及每料川椒一斤揀去浮及合口者並目銀器內炒令透地上鋪紙兩重傾在紙上用盆合定周圍以黃土培半日許其毒成汗自出曬乾木臼內輕搗取紅皮四五兩再入石臼為末煉蜜為丸如桐子大候乾紗袋盛挂通風處每日空心酒下十丸至十五丸半年加至二十丸一年後加至二十五丸百無禁忌仙飯丸用上黨胡麻三升揀淨以新白布縫袋將胡麻盛在內放清水中浸一時用手揉袋去盡油沫純是清水為度取出甑蒸令氣遍日乾如此九蒸九曬蒸之不熟令人發落蒸曬去皮炒香為末煉蜜或棗膏為丸如彈子大每空心用淡酒化下一丸日三服忌毒魚狗肉生菜其藥常服為佳初服一月內戒房事一月之後痰火盡去精氣充溢服至百日能除一切痼疾一年身面光澤不飢二年白髮返黑三年齒落更生四年水火不能害五年行及奔馬久服長生若欲下之飲葵菜汁仙人飯補中益氣耐老不飢黃精一味先取甕去底釜上安頓以黃精納入令滿密蓋蒸之候氣溜取出曝乾如此九蒸九曬凡時一石熟有三斗方好蒸之不熟刺人喉嚨既熟曬乾不幹則易壞食之甘美服食黃精法黃精細切一石以水二石五升一云六石微火煮自旦至夕熟出使冷手擂碎布袋榨汁煎之柤曝燥搗末合向釜中煎熬可為丸如雞子大每服一丸日三服絶谷除百病身輕體健不老少服而令有常不須多而中絶渴則飲水又法黃精搗捩取汁三升若不出以水洗榨取之生地黃取汁三升天門冬去心皮取汁三升上合一處微火煎減半納白蜜五斤復煎令可丸如彈子大每服一丸日三服不飢美色金水煎延年益壽填精補髓少服發白變黑返老還童枸杞子不拘多少採紅熟者用無灰酒浸之冬六日夏三日於砂盆內研令極細然後以布袋絞取汁與前浸酒一同慢火熬成膏淨瓷器貯封口重湯煮之每服一匙入酥油少許溫酒調下仙人糧干天門冬十斤杏仁一升搗末蜜瘦服方寸匕日三夜一服天門冬法久服強骨髓注容顏去三尸斷谷輕身延年不老百疾不生天門冬二斤去心熟地黃一斤上搗羅為末煉蜜丸如彈子大每服三丸以溫酒化下日三服若以茯苓等分為末同服天寒單衣汗出忌食鯉魚並腥膻之物天門冬膏去積聚風痰癲疾三蟲伏尸除瘟疫輕身益氣令人不飢延年不老天門冬不以多少去皮心洗淨搗爛布絞取汁澄清濾過用瓷器砂鍋或銀器慢火熬成膏每服一匙空心溫酒調下一方加蜜熬尤佳服豨蘞法治肝腎風氣四肢麻痹骨間疼痛腰膝無力亦能行大腸氣張垂崖進呈表云誰知至賤之中及有殊常之效臣吃至百服眼目清明至千服髭鬢烏黑筋力較健效驗多端豨蘞草一味於五月五日六月六日九月九日採其葉去根莖花實淨洗曝乾入甑層層灑酒與蜜蒸之如此九過則氣味極香美搗篩蜜丸服之今人採服一就秋花成實後和技取用酒灑蒸曝乾杵臼中椿為細末煉蜜為丸以服之神仙餌蒺藜方蒺藜一石常以七八月熟時收採曝乾先入臼舂去刺然後為細末每服二匙新水調下日進三服勿令斷絶服之長生一年後冬不寒夏不熱二年老返少頭白再黑齒落更生服至三年身輕延壽服菖蒲法法用三月三日四月四日五月五日六月六日七月七日八月八日九月九日十月十日採菖蒲須在清淨石上水中生者仍須南流水邊者佳北流者不佳採來洗淨細去根上毛須令盡復以袋盛之浸淨水中去濁汁硬頭薄切就好日色曝乾杵羅為細末擇天德黃道吉日合之和法用糯米水浸一宿淘去米泔石盆中研細末火上煮成粥飲和前菖蒲末須多少為丸免得乾燥難丸丸如桐子大曬乾用合收貯初服十丸一次嚼飯一口和丸咽下後用酒下便吃點心更佳百無所忌惟身體覺暖用秦艽一二錢煎湯待冷飲之即定蓋以丸為使也服至一月和脾消食二月冷疾盡除百日後百疾消滅其功鎮心益氣強志壯神填髓補精黑髮生齒服至十年皮膚細潤面如桃花萬靈侍衛精邪不幹永保長生度世也益氣牛乳方黃牛乳最宜老人惟平補血脈益心氣長肌肉令人身體康強潤澤面目悅志不衰故人常須供之以為常食或為乳餅或作乳飲等恆使恣意充足為度此物勝肉多矣食柏草方嘗柏葉百草飽肚不飢避難絶食極妙杜仲一斤去皮醋浸一宿焙乾為末荊芥穗一斤薄荷半斤白茯苓一斤去皮甘草一斤去皮上各為末煉蜜丸如小指大將柏葉水洗和藥入口細嚼為妙服鹿角法鹿角錯為屑白蜜五升淹之熬令小變曝乾更搗篩服之令人輕身益氣強骨髓補絶傷一方治骨虛勞極面腫垢黑脊痛不能久立血氣衰憊發落齒枯甚則喜唾用鹿角二兩牛膝酒浸焙一兩半為末煉蜜丸如桐子大每服五十丸空心鹽酒下
