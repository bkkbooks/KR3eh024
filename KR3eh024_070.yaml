水煎熱服食前一服而愈丹溪方治頭疼連眼痛此風痰上壅須用白芷開之雨前茶川芎白芷防風臺烏細辛當歸半夏上為末湯調服一方有藁本無臺烏加味二陳湯治頭痛常發者名曰頭風偏於一邊而痛者名曰偏頭風此方主之半夏陳皮茯苓黃芩酒炒甘草川芎細辛黃連酒炒薄荷蒼耳膽南星上銼加生薑水煎服茯苓半夏湯治風熱痰逆嘔吐頭痛半夏二錢赤茯苓一錢片黃芩甘草橘紅各五分上切作一服加生薑三片水煎服玉壺丸治風濕頭痛亦治痰患雄黃一錢南星煨裂半夏湯泡天麻白朮各二錢上為細末薑汁浸蒸餅為丸如梧桐子大每服三十丸用生薑湯送下一方無雄黃白朮有白麵水丸生朱丹治諸風痰盛頭痛目眩氣鬱積滯胸膈不利硃砂一兩二錢龍腦一錢白附子炮去皮臍半斤石膏燒通紅令冷半斤上為末燒粟米飯為丸如小豆大硃砂為衣每服三十丸食後茶酒任下一方治頭痛去風痰南星大者一個切七片皂角十四個半生半炒白梅一個芽茶一撮蔥頭一寸四分上石臼內搗碎水煎溫服不可犯鐵器丹溪方治濕痰頭痛黃芩酒炒三錢蒼朮酒炒一兩川芎細辛各二錢甘草一錢上為末擂生薑一片和勻清茶調服治風厥頭痛方芎烏散治男子風厥頭痛婦人氣盛頭痛及産後頭疼皆治之川芎天台烏藥各等分上為細末每服二錢茶酒調下玉液湯治七情氣鬱生痰上逆頭目眩暈心嘈怔忡眉稜骨痛半夏四錢生薑十片上水煎入沉香水一呷溫服胡蘆巴散治氣攻頭痛及瘴瘧瘥後頭痛如破胡蘆巴三稜乾薑炮各等分上為末每服二錢生薑湯或酒調服或㕮咀每服五錢水煎服點頭散治偏正頭痛常服除根川芎二兩香附子四兩上為細末每服二錢茶清調下治腎厥頭痛方玉真丸治腎厥頭痛不可忍其脈舉之則弦按之則堅生硫黃二兩另研生石膏半夏湯洗七次硝石另研各一兩上為末薑汁糊丸如桐子大每服四十丸薑湯或米飲下虛寒甚者去石膏用鍾乳粉一兩治血氣虛頭痛方加味調中益氣湯治氣血兩虛頭痛其效如神黃耆一錢人參甘草蒼朮各五分柴胡橘皮升麻各二分木香一分或二分川芎六分細辛二分蔓荊子三分當歸五分上㕮咀作一服水煎食遠服一方有黃柏無木香順氣和中湯治氣虛頭痛此藥升陽補氣頭痛自愈黃耆一錢半人參一錢白朮陳皮當歸芍藥各五分升麻柴胡甘草炙各三分細辛川芎蔓荊子各二分上㕮咀作一服水煎食後服芎歸湯一名一奇散治血虛頭痛神妙川芎當歸各等分上銼每服五錢水煎服血虛頭痛必自魚尾上攻眉尖後近髮際曰魚尾當歸湯治頭痛欲裂當歸一兩上用酒一升煎取六合飲至醉效四神散治婦人血風眩暈頭痛菊花當歸旋覆花荊芥穗各等分上為細末每服二錢蔥白三寸茶末二錢水煎食後服治雷頭疼方愈風餅子治雷頭風散表川烏炮半兩川芎甘菊花白芷防風細辛天麻羌活荊芥薄荷甘草炙各一兩上為細末水浸蒸餅為劑捏作餅子每服三五餅嚼細茶清下不計時茶調散即二仙散實者用此吐之次用神芎丸下方見卷一中風中門神芎丸大黃黃芩各二兩牽牛滑石各四兩上為細末滴水丸如小豆大溫水下十五丸每服加十丸以利為度日三服涼膈散治頭風消風散熱連翹四錢大黃朴硝甘草各二錢山梔子黃芩薄荷各一錢上加竹葉七片蜜少許水煎食後服升麻湯一名清震湯治頭面疙膪增寒拘急發熱狀如傷寒升麻蒼朮米泔浸各四錢荷葉一個全者上為細末每服五錢水煎服或燒全荷葉一個研細調藥服之妙治眉稜骨痛方選奇湯治眉稜骨痛不可忍者神效羌活防風各二錢黃芩酒炒一錢半冬不用甘草一錢夏生冬炙上㕮咀作一服水煎食後服羌烏散治因風寒眉稜骨痛不止者川烏草烏俱用童便浸炒各一錢細辛羌活黃芩酒炒甘草炙各五分上為細末分二服茶清調下丹溪方治眉稜骨痛屬風熱與痰白芷片黃芩酒炒各等分上為細末每服二錢茶清調下祛風上清散治風熱上攻眉稜骨痛酒黃芩二錢白芷一錢半川芎一錢二分防風柴胡梢羌活各一錢荊芥八分甘草五分上作一服水煎食後服治眼眶痛方生熟地黃丸治肝虛才見光明則眼眶骨痛甚生地黃酒洗熟地黃酒蒸各四兩石斛炒枳殼麩炒各一兩半羌活防風牛膝酒浸各一兩甘菊花三兩杏仁去皮尖炒二兩上為末煉蜜丸如桐子大每服五六十丸食後鹽湯下加味小芎辛湯治風寒在腦及肝經停飲眉稜骨眼眶痛不可開晝靜夜劇川芎細辛白朮各二錢甘草半夏橘紅南星茯苓各一錢上加生薑三片水煎食後服治頭重方紅豆散治頭重如山此濕氣在頭也麻黃根炒苦丁香各半錢紅豆十粒羌活燒連翹各三錢上為細末鼻內搐之又方羌活根燒連翹各三錢紅豆半錢上為末搐鼻治頭風屑方消風散治諸風上攻頭目昏痛項背拘急肢體煩痛肌肉蠕動目眩旋暈耳簫蟬鳴眼澀好睡鼻塞多嚏皮膚頑麻燥癢癮疹又治婦人血風頭皮腫癢眉骨疼旋欲倒痰逆噁心芎藭羌活人參茯苓白殭蠶藿香荊芥甘草炒蟬殼去土各二兩厚朴薑製陳皮去白各半兩防風上為細末每服二錢茶清調下如久病偏頭風每日三服便覺輕減如脫著沐浴暴感風寒頭痛身重寒熱倦疼用荊芥茶清調下半盞小兒虛風目澀昏倦及急慢驚風用乳香荊芥湯調下一方治風屑極燥癢無時此乃氣虛風邪侵於皮表而生用黎蘆不拘多少為末先洗頭須避風候未至十分乾時用末摻之須用入發至皮方得緊縛之兩日夜次日即不燥癢如尚有些少再用一次立效一方治頭上白屑極多山豆根油浸塗以孩兒乳汁調塗效又方白芷零陵香各等分上為末如前法用之候三五日篦去敷三二次終始不生一方治頭痹風屑發黃大黃酒炒茶調服
