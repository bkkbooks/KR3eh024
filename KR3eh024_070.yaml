body:
  text: 卷七十頭痛論袖珍論曰頭圓象天故居人之上為諸陽之會頭痛之疾非止一端如痛引腦巔陷至泥丸宮者是為真頭痛旦發夕死夕發旦死非藥物可療其體氣虛弱之人或為風寒之氣所侵邪正相搏伏而不散發為偏正頭痛其脈多浮緊又有胸膈停痰厥而頭痛蓋厥者逆也逆壅而衝於頭也痰厥之脈時伏時見亦有腎虛而氣厥並新沐之後當風露臥皆能令人頭痛當詳其所因風邪則驅散之痰厥則溫利之腎虛則補暖之尋常感冒頭痛發熱又宜隨證治之東垣曰金匱真言論云東風生於春病在肝俞在頸項故春氣者病在頭又諸陽會於頭面如足太陽膀胱之脈起於目內眥上額交巔直入絡腦還出別下項病則沖頭痛又足少陽膽之脈起於目鋭眥上抵頭角病則頭角額痛夫風從上受之風寒傷上邪從外入客於經絡令人振寒頭痛身重惡寒治在風池風府調其陰陽不足則補有餘則瀉汗之則愈此傷寒頭痛也頭痛耳鳴九竅不利者腸胃之所生乃氣虛頭痛也如氣上不下頭痛巔疾者下虛上實也過在足少陰巨陽甚則入腎寒濕頭痛也有厥逆頭痛者所犯大寒內至骨髓以腦為主腦逆故令頭痛齒亦痛心煩頭痛者病在耳中過在手巨陽少陰乃濕熱頭痛也凡頭痛每以風藥治之者總其大體而言之也高巔之上惟風可到故味之薄者陰中之陽自地升天者也然亦有三陰三陽之異太陽經頭痛惡風寒脈浮緊川芎獨活之類為主少陽經頭痛脈弦細往來寒熱用柴胡黃芩主之陽明經頭痛自汗發熱不惡寒脈浮緩長實者升麻葛根石膏白芷主之太陰經頭痛必有痰體重或腹痛為痰癖脈沉緩者蒼朮半夏南星主之少陰經頭痛三陰三陽經不流行而足寒氣逆為寒厥其脈沉細麻黃附子細辛湯主之厥陰經頭痛項痛或吐痰沫冷厥其脈浮緩吳茱萸湯主之血虛頭痛當歸川芎為主氣虛頭痛人參黃耆為主氣血俱虛頭痛調中益氣湯少加川芎蔓荊子細辛其效如神白朮半夏天麻湯治痰厥頭痛藥也清空膏乃風濕熱頭痛藥也羌活附子湯治厥陰頭痛藥也如濕氣在頭者以苦吐之不可執方而治先師嘗病頭痛發時兩頰青黃暈眩目不欲閉懶言身體沉重兀兀欲吐潔古曰此厥陰太陰合病名曰風痰以局方玉壺丸治之更灸俠溪穴即愈是知方者體也法者用也徒知體而不知用者弊體用不失可謂上工矣丹溪曰東垣頭痛論極好頭痛多主於痰痛甚者火多勞役下虛之人似傷寒發熱兩太陽作痛此相火自下衝上宜補中益氣湯多加川芎當歸甚者加知母蔓荊子諸經氣滯亦能頭痛偏頭風在右屬痰屬熱痰用蒼朮半夏熱用酒芩在左屬風屬血虛風用荊芥薄荷血虛用川芎當歸諸家不分所屬故藥多不效少陽偏頭痛便祕或可下之清空膏治諸般頭痛惟血虛頭痛不治血虛頭痛自魚尾上攻頭痛川芎當歸主之當歸一兩酒一升煮取六合飲至醉效頭痛須用川芎如不愈各加引經藥太陽川芎陽明白芷少陽柴胡太陰蒼朮少陰細辛厥陰吳茱萸此東垣法也如肥人頭痛是濕痰宜用半夏蒼朮如瘦人頭痛是熱宜酒洗薄黃芩因感冒而頭痛宜防風羌活藁本白芷之類如氣虛而痛宜黃耆酒生地黃東垣安神湯之類如風熱在上而痛宜天麻蔓荊子臺芎酒黃芩如苦頭痛宜細辛如形瘦色蒼而頭痛者此是血虛也宜用當歸川芎酒黃柏壯實人氣實有痰或頭重頭暈用大黃酒炒為末茶調三錢服之立效眉稜骨痛屬風熱與痰治類頭風白芷酒黃芩為末茶調下戴氏曰痰作頭痛其人嘔吐痰多者宜芎辛湯或導痰湯怒氣傷肝及肝氣不順上衝於腦令人頭痛宜蘇子降氣湯加沉香因虛頭痛此為腎厥頭痛宜十全大補湯中酒頭痛噁心嘔逆吐出宿酒昏眩頭疼如破宜中和湯縮脾飲五苓散俱加乾葛選用又曰眉稜骨痛屬風熱與痰治類頭風風熱者宜祛風清上散因痰者二陳湯加酒黃芩因風寒者羌烏散眼眶痛有二證皆屬於肝有肝虛而痛才見光明則眼眶骨痛甚宜生熟地黃丸有肝經停飲發則眉稜骨痛不可開晝靜夜劇宜導痰湯或小芎辛湯加半夏橘紅南星茯苓雷頭風者頭如雷之鳴也為風邪所客風動則作聲也機要云雷頭風諸藥不效者證與藥不相對也夫雷者震卦主之震仰盂故藥內加荷葉謂象其形狀其色又青乃述類形象也清震湯主之血虛頭痛自魚尾者謂上攻眉尖後近髮際故曰魚尾王節齋曰久頭痛病略感風寒便發寒月須重綿厚帕包裹者此屬鬱熱本而標寒世人不識率用辛溫解散之藥暫時得效誤認為寒殊不知因其本有鬱熱毛竅常疏故風寒易入外表束其內熱閉逆而為痛辛熱之藥雖能開通閉逆散其標之寒邪然以熱濟熱病本益深惡寒愈甚矣惟當瀉火涼血為主而佐以辛溫散表之劑以從治法治之則病可愈而根可除也李氏曰厥頭痛厥者逆也邪氣逆上陽經而作痛甚則發厥須分內外二因治之外感頭痛必有寒熱宜分輕重解表風證芎芷香蘇散消風散風熱川芎石膏散風寒三五七散風寒入腦連齒痛者芎辛湯或羌活黑附湯去附柏加桂枝腦風項背怯寒腦戶極冷者用麻黃細辛全蠍藿香各五分為末荊芥煎酒或茶下寒證連須蔥白湯葛根蔥白湯暑證香薷飲加茵陳蔥白或大半夏湯薑汁為丸服濕證芎術湯濕熱心煩痛起耳中古防風湯加酒芩蒼朮蒼耳子細辛為末茶清入薑汁少許調服熱多者酒芩為末茶清下內傷氣虛相火上衝耳鳴九竅不利兩太陽穴痛宜補中益氣湯倍川芎加知母蔓荊子或四君子湯大病後及諸虛痛者四桂散加茶一撮血虛自魚尾上攻古芎歸湯或四物湯加酒芩羌活柴胡蔓荊子氣血兩虛者調中益氣湯加川芎細辛挾火者安神湯腎厥下虛上盛巔頂不可忍脈舉之則弦按之則堅宜玉真丸七情氣厥心腹脹滿嘔吐酸水宜古芎烏散葫蘆巴散挾痰如聖餅子頭與心換痛者古藁蒼湯痰厥頭旋眼黑言亂噁心眼閉肢冷宜半夏白朮天麻湯導痰湯加芎辛三生丸痰火痛甚如破二陳湯加芩連或清空膏清上瀉火湯如壯實人只宜酒炒大黃為末清茶下痰飲滯痛者神芎丸有伏痰者瓜蒂散吐之積聚痛者大黃備急丸凡頭痛數日不食百藥不效者二氣丹無熱者黑錫丹常服點頭散斷根尋常頭目不清似痛非痛參蘇飲主之風熱者徹清膏芩連煎湯調下沐浴後者單白芷丸又曰頭風須分偏正素有痰者或櫛沐取涼及醉飽仰臥賊風入腦入項入耳入鼻自頸項以上耳目口鼻眉稜之間有一處不若吾體皆其漸也有頭皮浮頑不自覺者有口舌不知味者或耳聾或目痛或眉稜上下掣痛或鼻中聞香極香聞臭極臭或只阿欠而作眩冒之狀甚則項強硬身體拘急宜川芎茶調散或祛風通氣散主之此正頭風也偏左痛者多血虛或有火或風熱偏右痛者多氣虛或鬱滯或痰或風濕要知正痛常兼左右病邪凡頭痛久則為風也風濕腫痛連肩背或遇陰雨則甚者羌活勝濕湯風熱頭痛腫大遇熱則發消風散倍荊防熱甚二陳湯加荊防薄荷便閉更加大黃微利之熱微二陳湯加酒芩防風川芎白芷濕痰發則痛密無間二陳湯加南星蒼朮川芎及細辛少許血虛者朝輕夕重古芎歸湯或四物湯加荊防白芷薄荷氣虛者朝重晚輕多屬左邊宜補中益氣湯加芎辛陽虛甚者單白芷丸用參附煎湯下頭風發時悶痛必欲綿帕裹包者熱鬱也宜涼血瀉火為主佐以辛溫散表從治二陳湯加酒炒黃芩及荊芥薄荷川芎石膏細辛或消風百解散防風通聖散有三陽熱鬱頭痛不敢見光喜置水於頂者宜辛涼汗吐下三法並行乃愈又有偏痛年久便燥目赤眩暈者乃肺乘肝氣鬱血壅而然宜大承氣湯下之外用大黃芒硝為末井底泥調塗兩太陽穴上乃愈素患頭風因外感而發者惡寒頭面多汗宜分偏正專治頭風而外感自散如頭風發方愈而後外感自汗者加味烏荊丸因七情發多吐逆寒熱者參蘇飲主之無寒熱者二陳湯加烏藥川芎風痰眉心痛者二陳湯吞青州白丸子眉稜骨痛連目不可開晝靜夜劇身重者導痰湯濕痰眉眶骨痛體重者芎辛湯合導痰湯加川烏白朮寒濕芎辛湯加川芎附子薑桂南星風熱眉稜骨痛甚者古防風湯加酒黃芩風虛加川烏草烏細辛或金棗丹血虛挾風羞明眉眶痛甚者生熟地黃丸或四物湯加羌活防風氣虛挾風安神湯通用謝傳點眼丹搐鼻藥脈法內經曰寸口脈中短者頭痛也脈經曰陽眩則頭痛又曰寸口脈浮中風發熱頭痛脈緊頭痛是傷寒脈緊上寸口者傷風頭痛脈訣云頭痛短澀應須死浮滑風痰皆易除脈訣舉要曰頭痛陽弦浮風緊寒風熱洪數濕細而堅氣虛頭痛雖弦必澀痰厥則滑腎厥堅實治風寒頭痛方加味二陳湯治諸頭痛隨證加減陳皮半夏白茯苓甘草川芎白芷各一錢上加生薑三片水煎服太陽經頭痛惡風寒脈浮緊加羌活麻黃川芎陽明自汗發熱惡寒脈浮緩長加升麻葛根白芷渴者宜合白虎湯加吳茱萸白芷少陽寒熱往來脈弦加柴胡黃芩如三陽胸膈宿痰痛久不止令人喪明宜合川芎茶調散探吐太陰體重腹痛脈沉必有痰加蒼朮南星少陰寒厥脈沉細加附子細辛厥陰吐沫厥冷脈浮緩加吳茱萸頭頂項背俱痛者宜合羌吳萸湯肥人加二術瘦人加酒芩風熱加蔓荊子川芎酒芩苦頭痛加細辛巔頂痛加藁本升麻防風因感冒而頭痛加羌活防風藁本升麻柴胡葛根之類氣虛頭痛加黃芩人參血虛頭痛加川芎芍藥酒黃柏醫壘元戎方治三陽頭痛羌活防風荊芥穗升麻葛根白芷石膏柴胡川芎芍藥細辛蔥白各等分上銼每服五錢水煎服三五七散治風寒入腦陽虛頭痛防風去蘆四兩山茱萸去核茯苓各三兩細辛一兩五錢乾薑炮三兩附子三個炮去臍上為細末每服二錢溫酒食前調下羌活附子湯治冬月大寒犯腦令人腦痛齒亦痛名曰腦風麻黃黃耆各一錢附子炮防風白芷殭蠶黃柏各七分羌活蒼朮各五分升麻甘草各二分佛耳草三分無嗽不用上㕮咀作一服水煎服麻黃附子細辛湯治三陰三陽經不流行而風寒氣逆為寒厥頭痛其脈沉細麻黃細辛各六錢附子一個去皮臍生用上銼用水三升三合先煮麻黃令沸減七合掠去上沫納諸藥煎取一升去柤分三服川芎神功散治風寒上攻頭目令人偏正頭痛川芎川烏白芷南星麻黃各一錢甘草五分上切作一服加生薑三片大棗一枚水煎食後服三因芎辛散治傷風寒生冷及氣虛痰厥頭痛如破兼眩暈嘔吐附子去皮臍生用烏頭去皮生用南星乾薑甘草炙川芎細辛各一錢上銼作一服加生薑五片茶芽少許水煎服小芎辛湯治風寒在腦或感濕邪頭痛腦暈及眉稜眼眶痛者川芎三錢細辛白朮各二錢甘草一錢上銼作一服加生薑五片水煎食後服石膏散治陽明經頭痛大效川芎石膏白芷各等分上為細末每服四錢茶清調下吳茱萸湯治厥陰頭項強痛或吐痰沫厥冷其脈浮緩吳茱萸生薑各半兩人參二錢半上切作一服加大棗一枚水煎服芎術除眩湯治感寒濕眩暈頭重痛極川芎白朮附子生用各一錢官桂甘草各五分上加生薑七片棗一枚水煎服芎辛丸治頭疼面赤煩悶咽乾上膈風痰頭目昏暈百節疼痛背項拘急川芎防風殭蠶獨活各一兩桔梗三兩麻黃細辛白附子羌活甘草各四兩薄荷荊芥各一兩半上為細末煉蜜丸如彈子大每服一丸清茶下食後服定風餅子治偏正頭痛草烏頭微炮細辛各半兩川芎二兩白芷防風天麻甘草炙各一兩上為末薑汁丸如龍眼大捏作餅子每服一餅食後茶湯下如聖餅子治風寒伏留陽經氣厥痰飲一切頭痛防風天麻半夏生者各半兩南星洗乾薑川芎川烏各一兩上為細末用薑汁糊和丸如雞實大捻作餅子每服三五餅食後用荊芥湯或茶酒