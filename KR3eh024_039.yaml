body:
  text: 卷三十九鼓脹論東垣曰諸腹脹大皆屬於熱此乃入表之邪有餘之證自天外而入感風寒之邪自表傳裡寒變為熱作胃實腹病日晡潮熱大渴引飲譫語是太陽陽明並大實大滿者大承氣湯下之少陽陽明微滿實者小承氣湯下之內經曰泄之則脹已此之謂也又熱論云傷寒變為熱故下之不脹者以明寒因寒用故曰下之則脹已非陰盛生內寒胃寒脹滿之病假令痎瘧為脹滿亦有寒脹熱脹是天之邪氣傷暑而得之不即時發至秋暑氣衰絶而瘧病作矣知其寒矣局方用交解飲子者是也此天之邪氣雖有餘病痎瘧猶以為寒況不足病為脹滿者乎是知腹脹多為寒病也何以言之脈經云胃中寒則脹滿靈樞經云夫飲食不節起居不時末傳寒中又云腹脹滿胃脘當心而痛上支兩脅膈咽不通飲食不下取胃之三里又云濁氣在上則生䐜脹靈樞經云脹取三陽三陽者足太陽膀胱寒水為脹與內經通評虛實論説腹暴滿按之不下取足太陽經絡者胃之募也正同又云腹滿䐜脹支鬲胠脅下厥上冒過在太陰陽明此乃胃中寒熱鬱遏也又云太陰之厥則腹脹䐜脹後不利不欲食食則嘔不得臥按內經所説寒脹之多如此病者不悟作熱治之多用三花神佑丸大黃牽牛之類下之或藥病不相應立致夭折由是論之當從靈素問乎當從俗醫胸臆之論乎今立治寒脹一方曰中滿分消湯熱脹一方曰中滿分消丸評而用之使上下分消其氣可也胠音區胠脅也脅迄業切兩膀也又曰陰陽應象論云清氣在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之逆從也夫䐜脹者以寒熱溫涼論之此何脹也曰此飲食失節為脹乃受病之始也濕熱亦能為脹右關脈洪緩而沉弦脈浮於上是風濕熱三脈相合而為病也是脾胃之令不行陰火亢甚乘於脾胃盛則左遷而陽道不行是六腑之氣已絶於外火盛能令母實風氣外絶風氣外絶者是穀氣入胃清氣營氣下行便是風氣也異呼同類即胃氣者是也經云虛則兼其所勝土不勝者肝之邪也是脾胃之土不足木火大勝者也經云濁陰出下竅濁陰走五臟濁陰歸六腑濁陰歸地此平康不病之常道反此則為脹也陰陽論云飲食不節起居不時者陰受之陰受之則入五臟入五臟則䐜脹閉塞調經篇云下脘不通則胃氣熱熱氣熏胸中故內熱下脘者幽門也人身之中上下有七衝門皆下衝上也幽門上衝吸門吸門者會厭也沖其吸入之氣不得下歸於腎肝為陰火動相拒故咽膈不通致濁陰之氣不得下降而大便乾燥不行胃之濕與客陰之火俱在其中則腹脹作矣治在幽門使幽門通利泄其陰火潤其燥血生益新血幽門通利則大便不閉吸門亦不受邪其膈咽得通䐜滿腹脹俱去是濁陰得下歸地矣故經曰中滿者泄之於內此法是也丹溪曰脾虛不能制水水漬妄行通身浮腫名曰水腫或腹大如鼓而面目四肢不腫者名曰脹滿又名鼓脹皆脾土濕熱為病腫輕而脹重也又曰心肺陽也居上腎肝陰也居下脾居中亦陰也屬土經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行是脾具坤靜之德而有乾健之運故能使心肺之陽降肝腎之陰升而成天地交之泰今也七情內傷六淫外浸飲食不節房勞致虛脾土之陰受傷轉輸之官失職胃雖受谷不能運化故陽自升陰自降而成天地不交之否於是清濁相混隧道壅塞濕鬱為熱熱又生濕濕熱相生遂成脹滿經曰鼓脹是也以其外堅中虛似鼓其病膠固難治理宜補脾又養肺金以制木使脾無賊邪之慮滋腎水以制火使肺得清化之令卻鹽味以防助邪斷妄想以保母氣無有不安醫不察此喜行利藥得一時之快腹脹愈甚真氣傷而去死不遠矣俗謂氣無補法者以其痞滿壅塞似難於補不思正氣虛而不能運行邪氣著而不出所以為病經曰壯者氣行則愈怯者著而成病氣虛不補何由以行且此病之起固非一年根深勢篤欲取速效自求禍耳知王道者可與語此其或受病之淺脾胃尚壯積滯不痼者惟可略與疏導亦不可峻與利藥也又曰朝寬暮急血虛暮寬朝急氣虛朝暮急氣血俱虛治腫脹大法宜補中行濕利小便以人參白朮為君蒼朮陳皮茯苓為臣黃芩麥門冬為使以制肝木少加厚朴以消腹脹氣不運加木香木通氣下陷加升麻柴胡提之血虛加補血藥痰加痰藥隨證加減用之必須遠音樂斷厚味有脈堅實人壯盛者或可攻之便可收拾用參朮為主凡補氣必帶厚朴寬滿厚朴治腹脹因味辛以氣散於下焦故也須用薑汁製之肥人腹脹必用利濕蒼朮茯苓滑石海金砂之類或平胃散五苓散合服之色白人腹脹必是氣虛用人參白朮白茯苓之類瘦人腹脹是熱必用黃連黃芩梔子厚朴之類如因食積而腹脹者保和丸加木香檳榔阿魏之類有熱鬱而脹者木香檳榔丸之類下之有寒積鬱結而脹者局方丁香脾積丸東垣三稜消積丸之類如因外寒鬱內熱而腹脹者用藿香官桂升麻乾葛之類如因多怒鬱氣而脹者宜用蒼朮撫芎香附青皮芍藥柴胡及龍薈丸之類凡腹脹初得是氣脹宜行氣疏導之劑木香檳榔枳殼青皮陳皮厚朴之類久則成水脹宜行濕利水之劑古方惟禹餘糧丸制肝補脾殊為切當然亦須隨時隨證加減一友人得脹疾自制此藥服之余曰溫熱藥多且煅煉火邪尚存宜自加減彼不聽服之一月口鼻血出骨立而死錢氏論腹脹虛實實則不因吐瀉久病之後亦不因下利得之脹而喘急悶亂更有痰有熱及有宿食不化者宜大黃丸白餅子紫霜丸下之更詳別大小便如俱不通先利小便後利大便虛則久病吐瀉後其脈微細主目胞腮虛腫手足冷宜先與塌氣丸後與異攻散及和中丸益黃散和其氣海藏曰脾虛滿者黃耆湯芍藥停濕脾實滿不運平胃散蒼朮泄濕東垣曰腹脹滿氣不轉者加厚朴以破滯氣腹中夯悶此非腹脹滿乃散而不收加芍藥收之是知氣結而脹宜厚朴散之散而脹宜芍藥收之李氏曰鼓脹中空外堅有似於鼓又曰蠱者若蠱侵蝕之義虛脹陰寒為邪吐利不食時脹時減按之則陷而軟實脹陽熱為邪身熱咽乾常脹內痛按之不陷而硬大抵肥人氣虛多寒濕瘦人血虛多濕熱脾居中能升心肺之陽降肝腎之陰今內傷外感脾陰受傷痰飲結聚飲食之精華不能傳布上歸於肺下注膀胱故濁氣在下化為瘀血郁久為熱熱化成濕濕熱相搏遂成鼓脹或在臟腑之外或在榮衛之分或在胸脅或在皮膚雖各臟腑見證亦總歸於脾也心脹煩心肝脹脅痛脾脹善嘔噦肺脹咳喘腎脹腰痛胃脹胃脘痛大腸脹腸鳴飧泄小腸脹小腹引腰痛膀胱脹小便癃閉三焦脹氣滿皮膚膽脹口苦外感風寒傳至陽明裡分大實大滿者承氣湯古云下之則脹已者是也內傷七情鬱塞氣道升降失常腹脹大而四肢多瘦四七湯七氣湯四炒枳殼丸因怒傷肝勝脾者痞滿喘急平肝飲子甚者當歸龍薈丸虛者禹餘糧丸因怒傷肝乘肺傳大腸者腹鳴氣走有聲二便或閉或溏六君子湯加蘇子大腹皮木香草果厚朴枳實小便閉者三和散四磨湯憂思氣鬱者木香化滯湯木香枳朮丸溫膽湯退熱清氣湯恐傷腎精氣怯卻不上升而下焦脹者補中益氣湯加木香檳榔破故紙因食肉果菜不化曰食脹初起多寒濕自利不食者胃苓湯加山楂麥芽或人參養胃湯加香附砂仁甚者治中湯加丁香或厚朴附子二味煎服久則濕熱乘脾大便乾燥者保和丸傷肉者黃連阿魏等分醋浸蒸餅為丸或三補丸用香附山楂煎湯下傷雜果者古桂香丸或鹽湯探吐膏粱厚味大便閉者大承氣湯加桂或厚朴湯積熱者牽牛丸虛者木香檳榔丸滋腎丸因穀食不化曰谷脹朝陽盛能食暮陽衰不能食者大異香散五膈寬中散濕熱者古萸連丸清膈蒼砂丸俱穀芽煎湯下或單雞醴散最妙因停水飲茶酒不散曰水脹腸中漉漉有聲怔忡喘急二陳湯加桔梗檳榔消飲丸酒脹桂苓甘露飲瘀血脹便黑多跌撲及産後所致人參芎歸湯散血消腫湯一般中滿證俗云大飽有氣虛者六君子湯加黃耆厚朴木香食積加山楂麥芽挾濕熱加黃連青皮白芍木香清氣陷者木香順氣湯有血虛者四物湯加白朮木通厚朴挾濕熱加芩連有食滯者平胃散加山楂麥芽或枳朮丸凡虛脹及瘧痢久病脹者俱依此分氣血調治凡脹初起是氣久則成水治比水腫更難蓋水腫飲食如常鼓脹飲食不及常病根深固必三五年而後成治腫惟補中行濕足矣治脹必補中行濕兼以消積更斷鹽醬音樂妄想不責速效乃可萬全單腹腫大而四肢極瘦者名蜘蛛蠱古方雖有八物湯去地黃倍參術加黃連厚朴及四柱散諸蠱保命丹蛤蟆煮肚法然此皆脾氣虛極本經自病相生相制乃真臟病也不治補中六君子湯去甘草加大腹皮厚朴為君佐以澤瀉利濕黃芩麥門冬制肝朝寬暮急為血虛去人參合四物湯朝急暮寬為氣虛倍參朮朝暮皆急血氣俱虛合八物湯肥人多濕合平胃散瘦人多火加香附黃連寒加附子厚朴熱加大黃食脹加砂仁神麯痰脹倍半夏加檳榔豬苓瘀血加桃仁五靈脂積聚堅硬加三稜蓬朮大怒加蘆薈山梔氣脹及蟲積加木香檳榔氣下陷加升麻柴胡凡議下須脈實人盛按之堅者先與補藥次略疏導後又補之否則徒快一時其脹愈甚經云臟寒生脹寒脹恆多熱脹恆少通用中滿分消丸右龍虎丹寬中健脾丸禹餘糧丸單雞醴散外敷神膏蔭按葉氏曰脹滿多以漸而成非一朝一夕之故必須分其有餘不足新久淺深虛實寒熱之異然後或分消或消導或升降或散堅或調脾胃或扶正氣寒者熱之熱者寒之皆宜隨證加減切不可妄下大抵寒脹多熱脹少脈浮實者易治脈沉虛者難治然因脾胃虛而致者為甚多屬濕熱少至成積者亦有之如初起大實大滿氣滯內傷脈洪實者非下不可又不必拘疑且先以疏利利後便宜調養若補之太早邪氣愈盛則脹滿漸加雖欲攻利邪不能伏而反有所助也治之者當識先後虛實斟酌用藥量其脈證為的確也大抵以補脾制肝導水消穀為主看其所挾而兼用藥焉挾氣散氣挾血破血挾寒溫挾熱清脈法針經曰其脈大堅以澀者脹也脈經曰關上脈虛則內脹遲而滑者脹脈盛而緊者脹虛而緊澀者脹或弦而遲或浮而數皆脹也丹溪曰水病腹大如鼓脈實者生虛者死洪大者生微細者死腹脹便血脈大時絶劇脈小疾者死中惡腹大四肢滿脈大而緩者生浮而緊者死脈訣舉要曰脹滿脈弦脾制於肝洪數熱脹遲弱陰寒浮為虛滿緊則中實浮則可治虛則危急治寒脹方大半夏湯治肝氣大盛勝克於脾脾不能運化結聚涎沫閉塞臟腑胃冷中虛遂成脹滿之疾其脈多弦遲半夏湯炮七次桂心各五兩附子炮去皮臍枳實麩炒茯苓甘草炙厚朴薑炒當歸各三兩人參一兩川椒炒去汗去合口者八百粒上㕮咀每服四錢生薑五片棗二枚水煎空心服強中湯治食啖生冷過飲寒漿有傷脾胃遂成腹脹心下痞滿有妨飲食甚則腹痛乾薑炮白朮各二兩青皮去白人參丁香各三兩草果仁附子炮去皮臍厚朴薑炒甘草炙各半兩上㕮咀每服四錢生薑五片棗二枚水煎溫服不拘時嘔者加半夏或食麵脹滿加蘿蔔子各半兩中滿分消湯治中滿寒脹寒疝大小便不通陰燥足不收四肢厥冷食入反出下虛中滿腹中寒心下痞下焦燥寒冷沉厥奔豚不收川烏澤瀉黃連人參青皮當歸生薑麻黃柴胡乾薑蓽澄茄各二錢益智仁半夏茯苓木香升麻各三分黃耆吳茱萸厚朴草豆蔻黃柏各五分上銼作一服水煎食前熱服忌房室酒面生冷及油膩等物朴附湯治老年中寒下虛心腹膨脹不喜飲食脈來浮遲而弱此名寒脹厚朴薑炒一兩附子炮去皮臍七錢半木香三錢上銼作一服每服一兩生薑七片棗二枚水煎溫服木香分氣丸善治脾胃不和心腹脹滿兩脅膨脹胸膈注滿痰嗽喘急噁心乾嘔咽喉不利飲食不化並皆治之有效木香檳榔青皮去穰陳皮去白蓬莪朮炮乾生薑當歸薑黃元胡京三稜濕紙裹煨香枳殼麩炒白朮赤茯苓肉豆蔻各等分秋冬加丁香炒上為細末白麵糊丸如桐子大每服三五十丸生薑湯下忌生茄馬齒莧導氣丸治諸氣痞塞關膈不通腹脹如鼓大便虛祕又治腎氣小腸氣等功效尤速青皮水蛭炒莪朮虻蟲炒三稜乾漆炒檳榔斑貓炒吳茱萸牽牛炒乾薑硇砂炒胡椒茴香炒附子鹽炒赤芍藥川椒炒石菖蒲桃仁炒上銼各與所注藥同炒熟去水蛭等不用只以青皮等十件為末酒糊丸如桐子大每服五丸至七丸空心紫蘇煎湯送下吳氏謂制度之工如此以之而治氣實有餘之證斯其選矣禹餘糧丸治水腫鼓脹上氣喘滿一切水氣脹禹餘糧三兩同針砂炒真針砂五兩蛇含石三兩煅以上三味為主其次量人虛實入下項藥木香牛膝蓬朮桂心白蒺藜川芎茴香炒三稜羌活茯苓白豆蔻乾薑青皮陳皮附子當歸各五錢上為末湯浸蒸餅為丸如梧子大每服五十丸空心溫酒下最忌鹽食否則發疾蔭按此劫劑也寒濕痞悶腫脹非此不能開發流通然腫脹少退即當服補氣補血補脾藥以繼之庶可免於後患也大抵腫脹之病多用十棗三花以攻決惟壯實者可用非虛老人所宜此劑但取開散寒濕痞滯非宜於虛老人也用者慎之治熱脹方中滿分消丸治中滿熱脹鼓脹氣脹水脹此非寒脹類厚朴薑製一兩枳實麩炒五錢半夏湯泡七次五錢橘皮黃連炒各五錢知母炒四錢澤瀉各三錢白茯苓乾生薑砂仁各二錢黃芩一錢三分豬苓薑黃人參白朮甘草炙各一錢上為細末湯浸蒸餅為丸如桐子大每服百丸焙熱白湯下食遠服量病人大小加減大橘皮湯治濕熱內甚心腹脹滿小便不利大便滑泄及水腫橘皮一錢半木香五分滑石三錢檳榔一錢豬苓赤茯苓一錢澤瀉白朮各一錢二分厚朴薑製錢半陳皮半夏山楂肉蒼朮白茯苓各一錢藿香一錢豬苓一錢二分上銼水煎服熱多加黃連梔子木香檳榔丸治濕熱內脹及飲食滿悶木香檳榔當歸黃連枳殼青皮陳皮黃柏各一兩黃芩陳皮去白三稜香附二醜末各二兩莪朮大黃各四兩上為末麵糊丸如桐子大每服五七十丸臨臥薑湯下尋常消導開胃只服三四十丸大承氣湯治膏粱厚味大便閉而脹者大黃五錢厚朴一兩枳實五個芒硝五錢上用水二鍾半先煎厚朴枳實至一鍾入大黃煎七分去渣入硝煎一二沸溫服以利為度三物厚朴湯治腹脹脈數厚朴半斤枳實五枚大黃四兩上以水一斗二升煮二物取五升納大黃四兩再煎取三升溫服一升腹中轉動更服不動勿服七物厚朴湯治腹脹發熱以陽並陰則陽實而陰虛陽實生外熱陰虛生內熱脈必浮數浮則為虛數則為熱陰虛不能宣導飲食如故因致脹滿者謂之熱脹厚朴一兩甘草大黃蒸各三錢半枳實五錢官桂一錢生薑五片大棗二枚上用水二盞煎一盞溫服嘔吐加半夏下利去大黃寒多加生薑桃溪氣寶丸治腰脅俱病如抱一甕肌膚堅硬按之如鼓兩腳腫滿曲膝仰臥不能屈伸自頭至膻中脊瘦露骨一切氣積食積並腹氣走注大便祕結寒熱往來狀如傷寒並宜服之黑牽牛檳榔青皮去白各一兩大黃一兩半木香羌活川芎陳皮茴香炒當歸各五錢上為末皂角膏丸如桐子大每服一百丸生薑燈心湯下是齋推氣丸治三焦痞塞氣不升降胸膈脹滿大便祕澀小便赤少並宜服之檳榔陳皮黃芩黑牽牛生用大黃枳實各等分上為末煉蜜丸如桐子大每服五七十丸臨臥溫水下量虛實加減舟車神佑丸治中滿腹脹喘嗽淋閟一切水濕腫滿濕熱腸垢陳積變生諸疾氣血壅滯不得宣通大黃一兩甘遂五錢制大戟芫花制青皮去白陳皮去白檳榔黃柏去皮各一兩牽牛頭末四兩木香五錢輕粉五分上為末水丸桐子大每服五七十丸白湯下隨證臨時加減有可下者此方量虛實與之沉香交泰丸治濁氣在上而攪清陽之氣鬱而不伸為䐜脹沉香白朮各三錢枳實炒一錢厚朴薑製五錢吳茱萸湯泡白茯苓澤瀉陳皮當歸各一錢大黃酒浸一兩青皮木香各二錢上為細末湯浸蒸餅為丸桐子大每服五十丸加至七八十丸溫湯下食後服微利止沉香海金砂丸治一切積聚脾濕腫脹肚大青筋羸瘦惡證沉香二錢海金砂五錢半輕粉一錢牽牛頭末一兩上為末研獨頭蒜如泥丸如桐子大每服三十丸加至五十丸煎燈心草湯送下更量虛實加減丸數取利為度牽牛丸治一切濕熱腫滿肚腹實脹木香白茯苓厚朴各一兩大黃澤瀉各一兩半滑石黑牽牛各六兩上為細末水煮麵糊丸如桐子大每服三五十丸淡生薑湯下食後服治虛脹方參香散治一切脾氣虛作脹人參肉桂甘草炙各七分桑白皮桔梗陳皮枳實麩炒麥門冬心去青皮去穰大腹皮半夏各一錢蘇子茯苓香附子木香不見火各一錢二分上作一服加生薑三片棗一枚水煎食前服大正氣散治脾昏怯弱為風寒濕氣所傷遂致心腹脹滿有妨飲食厚朴薑炒藿香葉半夏湯泡七次陳皮乾薑甘草炙檳榔桂枝不見火枳殼麩炒各五錢白朮一兩上銼每服四錢加生薑五片棗二枚水煎溫服不拘時索氏三和湯白朮厚朴陳皮各三兩木通紫蘇各二兩檳榔甘草海金砂大腹皮白茯苓枳殼各一兩上銼每服八錢加生薑三片水煎服一方無大腹皮以下三味調胃白朮澤瀉散治腹腫如神白朮澤瀉芍藥陳皮茯苓生薑木香檳榔各一兩上為末溫水調服若心下痞加枳實心下盛加牽牛參朮健脾湯治元氣虛脾胃弱而脹者人參一錢白朮二錢白茯苓陳皮半夏砂仁厚朴薑製各一錢甘草炙三分上用水二鍾薑三片煎八分服加神麯山楂肉消脹尤妙調中健脾丸治單腹脹及脾弱腫滿膈中閉塞及胃口作疼並皆神效此藥不動元氣服有大益白朮六兩人參黃耆蜜炙茯苓各二兩山楂肉陳皮鹽水炒薏苡仁炒五加皮炒各三兩澤瀉三兩半蘇子微炒二兩半蘿蔔子炒瓜蔞仁炒一兩草豆蔻酒拌炒各一兩半沉香六錢另為末上先用大瓜蔞二個鏤一孔每個入川椒三錢多年糞磏二錢敲米粒大俱納入瓜內外以綿紙糊丸再用紙筋鹽泥封固炭火內煅紅為度取出擇去泥土其黑皮一併入藥共為細末煎荷葉大腹皮湯打黃米糊為丸如桐子大每服百丸白湯下日進三次一方有半夏香附黃連磏音廉礪石也一曰赤色草豆蔻湯治腹中虛脹澤瀉一分木香三分神麯四分半夏制枳實草豆蔻仁黃耆春夏去之益智甘草各五分青皮陳皮各六分茯苓當歸各七分上作一服水二大盞生薑三片煎至一盞去渣溫服濟生紫蘇湯專治憂思過度致傷脾肺心腹脹滿喘促治腸鳴氣走漉漉有聲大小便不利脈虛而緊澀紫蘇子一錢研白朮二錢人參一錢大腹皮酒洗淨草果仁半夏厚朴木香陳皮枳殼麩炒甘草炙各五分上切作一服生薑三片大棗一枚水煎溫服治氣脹方四炒枳殼丸治氣血凝滯腹內鼓脹枳殼四兩去穰切作指面大塊子分四處一份用蒼朮一兩同炒一份用蘿蔔子一兩同炒一份用小茴香一兩同炒一份用乾漆一兩同炒各炒黃去蒼朮等四味上為細末用原炒蒼朮蘿蔔子茴香乾漆四味用水二碗煎至一碗去渣煮麵糊為丸如桐子大每服五十丸食後米飲下木香順氣湯治內傷濁氣在上則生䐜脹及七情所傷木香乾生薑升麻柴胡各四分厚朴白茯苓澤瀉半夏各一錢青皮益智仁吳茱萸各三分草豆蔻當歸各五分蒼朮八分上作一服水煎服愈蔭按此方用升柴引清氣上行茯澤導陰氣下降更佐吳茱萸苦以瀉之薑蔻半夏益智溫中蒼朴青皮木香順氣歸橘調和榮衛經所謂留者行之結者散之瀉之上之下之清濁各安其位矣橘皮湯治七情所傷中脘不快腹脅脹滿香附米炒半夏橘皮各二兩甘草七錢半上㕮咀每服七八錢加生薑五片棗二枚水煎服木香分氣湯治氣滯腹急中滿脅肋膨脹虛氣上衝小便臭濁木香不見火赤茯苓豬苓澤瀉半夏枳殼檳榔紫蘇子燈心草各一錢上㕮咀作一服入麝香少許水煎食前服平肝飲子治喜怒不節肝氣不平邪乘脾胃心腹脹滿頭眩嘔逆脈來浮弦防風枳殼麩炒桔梗赤芍藥桂枝各一錢半木香不見火人參檳榔川芎當歸陳皮甘草炙各八分上作一服加生薑三片水煎服不拘時分心氣飲治因怒氣而脹者紫蘇梗一錢半青皮芍藥陳皮木通大腹皮各一錢半夏各八分官桂六分赤茯苓桑白皮炒各一錢上入薑三片燈心十莖水煎食前服破滯氣湯一名木香化滯散破滯氣治心腹滿悶炙甘草四分白檀香藿香陳皮大腹皮白豆蔻白茯苓桔梗各五分砂仁人參青皮檳榔木香薑黃白朮各三分上切作一服水煎溫服不拘時加味六君子湯治因怒傷肝乘肺傳大腸者腹鳴氣走有聲二便或閉或溏人參白朮茯苓甘草陳皮半夏蘇子大腹皮木香草果厚朴枳實上加生薑三片水煎服金陵酒丸治鼓腫真沉香一兩牙皂一兩廣木香二兩半檳榔一兩上為末用南京燒酒丸每服三錢重者四錢五更燒酒下水鼓加葶藶五錢治食脹方大安丸治飲食傷脾成鼓脹者山楂肉炒一兩白朮炒神麯炒半夏制茯苓各一兩陳皮去白連翹蘿蔔子生用各五錢上為丸酌服加味枳朮湯治內傷飲食停滯而脹者枳實三錢白朮五錢厚朴三錢上銼入生薑三片水煎服加味胃苓湯治傷酒食濕熱之氣不化致令腹脹者厚朴蒼朮陳皮甘草白茯苓澤瀉豬苓白朮桂山楂麥芽上銼生薑水煎服加味三補丸治傷肉食內脹黃連黃芩黃柏香附半夏曲各等分上為末蒸餅為丸用山楂湯下大異香散治失飢傷飽痞悶停酸旦食不能暮食名谷脹三稜蓬莪青皮去穰半夏曲陳皮藿香桔梗枳殼炒香附炒益智各一錢甘草炙五分上作一服加生薑三片棗一枚水煎食遠服丹溪方治心腹膨脝內多食積所致南星一兩半半夏瓜蔞仁另研各一兩香附童便浸黃連薑炒各二兩礞石硝煅蘿蔔子各五錢麝香少許連翹五錢上為末麵糊為丸如桐子大每服五七十丸白湯下治水脹方葶藶木香散治濕熱內外甚水腫腹脹小便赤澀大便滑泄此藥下水濕消腫脹止瀉利小便之聖藥也葶藶子茯苓豬苓白朮各二錢木香五分澤瀉木通甘草各五錢辣桂二錢半白滑石三兩上為細末每服三錢白湯調下食前服白朮木香散治喘嗽腫滿欲變成水病者不能臥不敢多食小便閉而不通者白朮豬苓澤瀉甘草木通木香赤茯苓各五分檳榔三分陳皮去白滑石各二錢官桂二分上切作一服加生薑三片水煎溫服二氣散治水氣蠱脹滿悶白醜黑醜各二錢上為細末用大麥面四兩同一處拌勻做燒餅臨臥用清茶一盞下降氣為驗楮實子丸治水氣鼓脹楮實子一斗用水一斗熬成膏子白丁香一兩半茯苓三兩上二味為末用楮實膏為丸如桐子大不計丸數從少至多服至小便清利及腹脹減為度次服中治丸末治藥調養疏啓其中忌甘苦峻補其下宜五補七宣丸婁氏曰白丁香為行濕之劑煎湯調下末治即黃耆建中湯之類葶藶丸治中滿腹大四肢枯瘦小便澀濁甜葶藶隔紙炒薺菜根等分上為末煉蜜丸如彈子大每服一丸陳皮湯嚼下只三丸小便清數丸當依舊防己椒藶丸治腹滿口舌乾燥此腸胃間有水氣防己椒目葶藶炙大黃各一兩上為末煉蜜丸如桐子大先食飲服十丸日三服稍增口中自有津液渴者加芒硝五錢大戟棗子專攻水證膨脹大戟連根果一握大棗一斗上二物用水同煮一時去大戟不用旋旋吃棗無時服盡蔭按大戟氣大寒而味苦甘有小毒能下十二經之水大棗味甘取其大補脾胃而不為攻下所傷耳服此方大忌甘草以其與大戟相反故也慎之治血脹方大黃蟅蟲丸治腹脹有形塊按之而痛不移口不惡食小便自利大便黑色面黃肌銷者血證諦也此丸與之大黃蒸十兩黃芩二兩甘草三兩乾漆炒桃仁各一兩芍藥四兩杏仁去皮尖虻蟲去翹足炒蠐螬炒各一升蟅蟲炒半升水蛭炙黃百枚熟地黃半兩上為細末煉蜜為丸如小豆大每服五丸日進三服抵當丸治有故畜血而腹脹者宜以此下之水蛭七個石灰炒赤虻蟲八個粳米炒桃仁七個大黃一兩上為末分作四丸每一丸用水一盞煎七分溫服血未下再服一方治血鼓腹如盆脹三稜煨蓬朮乾漆炒煙盡牛膝去蘆酒浸琥珀虻蟲糯米炒肉桂硇砂水蛭石灰炒赤大黃各等分上為末用生地黃自然汁和米醋調勻為丸如桐子大每服十丸空心溫酒送下童便下亦可雞屎散治鼓脹旦食則不能暮食痞滿壅塞難當治血蠱良大黃桃仁去皮尖乾雞糞各等分上為細末每服二錢生薑三片煎湯調食後臨臥服桃仁承氣湯治胸腹蓄血脹滿桃仁半兩大黃一兩甘草二錢桂三錢芒硝三錢上每服一兩水一盞薑三片煎服當歸和血散治瘀血腹脹如虛人不可下者以此調之赤芍藥生地酒炒當歸須酒洗各一錢川芎八分桃仁去皮尖炒紅花酒洗各一錢青皮七分牡丹皮元胡索各八分香附童便浸一錢蓬朮煨八分三稜煨七分上水三鍾煎七分空心服人參芎歸湯治血脹煩躁漱水不咽神思迷忘小便多大便黑或虛厥婦人多有此證一名散血消腫湯當歸半夏七錢半川芎一兩蓬朮木香砂仁白芍甘草炙各半兩人參桂五靈脂炒各二錢半上㕮咀薑三片棗一枚紫蘇四葉水煎服治積脹方莪朮潰堅湯治中滿腹脹內有積聚堅硬如石其形如盤令人不能坐臥大小便澀滯上喘氣促面色萎黃通身虛腫莪朮紅花升麻吳茱萸各二分生甘草柴胡澤瀉神麯青皮陳皮各三分黃芩厚朴生用黃連益智仁草豆蔻仁半夏當歸各三分渴加葛根四分上銼如麻豆大水二大盞煎至一盞稍熱服忌酒面二服之後中滿減半月積不消再服後方半夏厚朴湯消脹化積紅花蘇木各五釐吳茱萸乾生薑木香黃連各一分青皮各二分肉桂蒼朮白茯苓澤瀉柴胡陳皮生黃芩草豆蔻仁生甘草各三分京三稜當歸梢豬苓升麻各四分神麯六分厚朴八分半夏一錢桃仁七個昆布少許渴加葛根三分上㕮咀作一服水三盞煎至一盞去渣稍熱服此藥二服之後前證又減一半卻與前藥中加減服之七氣消聚散治因積聚相攻或疼或脹香附米一錢半青皮蓬朮三稜俱醋炒枳殼麩炒木香砂仁各一錢厚朴薑製陳皮各一錢二分甘草炙四分上加薑三片水煎食前服大三稜煎丸治心腹堅脹脅下緊硬胸中痞塞喘滿短氣常服順氣寬中消積滯除膨脹大治癥瘕積塊消脹軟堅纍獲良驗三稜生細切半斤搗為末以酒三升於銀石器內熬成膏蘿蔔子炒各二兩青皮神麯炒二兩麥芽炒二兩乾漆硇砂用瓷罐研細入水少許調坐於溏灰火中候水乾取出為末杏仁湯泡去皮尖炒黃色各三兩上為末三稜膏為丸如桐子大每服十五丸至二十丸食遠米湯下保安丸治症積心腹內結如拳上捻心痛及臍腹痛大黃三兩附子五錢乾薑一兩鱉甲一兩半上為末醋熬膏和丸如桐子大每服二十丸空心醋湯或米飲下取積下為度外敷神膏治男婦積聚脹滿血蠱等證川大黃朴硝各四兩麝香一錢上為末每二兩和大蒜搗成膏敷患處治蠱脹方諸蠱保命丹治蜘蛛蠱脹肉蓯蓉三兩青礬紅棗香附各一斤大麥芽一斤半上先將蓯蓉青礬入罐內同煅煙盡和前藥為末糊丸桐子大每服二十丸食後酒下蛤蟆煮肚法治蠱脹兼治浮腫用癩蛤蟆一個入豬肚內煮熟去蛤蟆將肚一日食盡香棗丸治十種蠱氣病諸脹內熱者尤宜苦丁香不拘多少上為細末熟棗為丸如桐子大每服三十丸空心煎棗湯送下三服蔭按苦丁香即苦瓜蒂也散用之則吐丸用之則瀉凡有形之邪無不出之亦良方也治少腹脹方澤漆湯治石水四肢瘦腹腫不喘其脈沉澤漆洗去腥五兩桑白皮射干洗浸黃芩茯苓白朮各四兩澤瀉防己各二兩上㕮咀每服五錢水三盞烏豆一合煎二盞入藥同煎七分去渣空腹溫服日三治石水方少腹堅脹曰石水陰陽結邪多陰少陽也用白石英十兩槌大豆大以瓷瓶盛好酒三斗浸以泥重封瓶口用馬糞及粳火燒之長令酒小沸從卯至午即住火候次日暖一中盞飲日可三度如吃酒少隨性飲之其白石英可更一度燒之晞露丸治寒傷於內氣凝不流結於腸外久為癥瘕時作疼痛腰不得伸名曰腸覃京三稜莪朮各一兩酒浸乾漆五錢洗去腥炒煙盡茴香三錢鹽炒硇砂四錢另研輕粉一錢另研青皮去白三錢川烏半兩炮去皮臍雄黃三錢另研川山甲炮三錢麝香五分另研巴豆三十粒去皮同莪朮三稜炒黃色去不用上除另研四味外余為細末和勻生薑汁打糊為丸桐子大每服二三十丸溫生薑湯下溫酒亦得食前服烏喙丸治腸覃亦治乳余並男子疝氣烏喙炮去皮尖一錢半夏湯洗四錢石膏煅黎蘆炒牡蒙茯苓酒浸桂心乾薑炮各一錢巴豆七個研膏上為末蜜丸如緑豆大每服三五丸食後酒飲任下見晛丹治寒客於下焦血氣閉塞而成瘕日以益大狀如懷子名曰石瘕此病多生於女子附子四錢炮去皮臍鬼箭羽三錢澤瀉肉桂元胡索木香各二錢紫石英一錢檳榔二錢半血竭一錢半另研水蛭一錢米炒煙盡桃仁湯浸去皮炒黃三十個京三稜五錢大黃一錢同三稜酒浸一宿焙乾睍胡典切小視也上除血竭桃仁外同為細末和勻用原浸酒打糊為丸如桐子大每服十丸醋湯調下溫酒亦得食前石英散治婦人血結胞門或為癥瘕在腹脅間心腹脹滿腫急如石水狀俗謂之血蠱紫石英一兩歸尾馬鞭草紅花炒蓬朮炮烏梅肉各五錢三稜炒蘇木節沒藥琥珀研甘草各一錢上為末濃煎蘇木酒調下二錢不飲酒生薑湯調服大黃甘遂湯治女人小腹滿如敦敦狀小便微難而不渴為水與血病結在血室也敦音墩大也大黃四兩蒸甘遂炮阿膠炒各二兩上銼每服三錢水一盞煎至七分去渣溫服其血當下萬病丸治室女月經不通臍下堅結狀如杯升發熱往來下痢羸瘦此為血瘕若生肉瘕不可為也乾漆杵碎炒令煙出一時許牛膝酒浸一宿各一兩六錢生地黃四兩八錢取汁上二味為末入地黃汁內慢火熬候可丸即丸如梧子大空心米飲或溫酒下一丸日再勿妄加病去止藥女人氣血虛經不行者不可服
