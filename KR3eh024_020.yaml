body:
  text: 卷二十霍亂論霍亂分三因陳無擇曰霍亂者心腹卒痛嘔吐下利憎寒壯熱頭痛眩暈先心痛則先吐先腹痛則先利心腹俱痛吐利並作甚則轉筋入腹則斃蓋陰陽反戾清濁相干陽氣暴升陰氣頓墜陰陽痞隔上下奔迫宜詳別三因以調之外因傷風則惡風有汗傷寒則惡寒無汗冒濕則重著傷暑則煩熱內因九氣所致郁聚痰涎痞隔不通遂致滿悶隨其勝復必作吐利或飽食膾炙恣餐乳酪冰脯寒漿旨酒胃既䐜脹脾臟停凝必因郁發遂成吐利當從不內外因也論霍亂本於火風濕三氣劉河間曰醫之用藥如將帥之用兵本草曰良醫不能以無藥愈疾猶良將無兵不足以勝敵也故用藥如用兵轉筋霍亂者治法同用兵之急不可緩也故吐瀉不止者其本在於中焦或因渴大飲或飲而過量或飢而飽甚或濕邪內甚故陰陽交而不和是為吐瀉仲景曰邪在上焦則吐邪在下焦則瀉邪在中焦則既吐且瀉此為急病也然吐利為急十死一二如揮霍撩亂而不得吐瀉此名乾霍亂必死法曰既有其入必有所出今有其入而不得其出者否也塞也故轉筋吐瀉者其氣有三火風濕吐為暍音謁傷暑也中熱也夏大旱民多暍死王注曰炎熱搏爍心之氣也火能炎上故吐也瀉為濕也叔和云濕多成五泄內經曰濕勝則濡泄又經曰風勝則動筋屬肝而應於風木故腳轉筋燥急也內經曰諸轉反戾水液渾濁皆屬於熱故仲景治法曰熱多欲飲水五苓散寒多不飲水者理中丸凡覺此證或先五苓益元桂苓甘露散乃吐瀉之聖藥也慎無與粟米粥湯谷入於胃則必死本草曰粟米味鹹微寒無毒主養腎氣去脾胃中熱益氣霍亂者脾胃極損不能傳化如與粟米如人欲斃更以利刀鋸其首豈能有生者耶如吐瀉多時欲住之後宜微以粥飲漸漸養之以遲為妙論霍亂本於胃保命集云夫傷寒霍亂者其本在於陽明胃經也胃者水穀之海主稟四時皆以胃氣為本與脾臟相表裡皆主中焦之氣腐熟水穀脾胃相通濕熱相合中焦氣滯或因寒飲或因飲水或傷水毒或感濕氣冷熱不調水火相干陰陽相傳上下相離榮衛不能相維故轉筋攣痛經絡亂行暴熱吐瀉中焦胃氣所主也有從標而得之者有從本而得之者有從標本而得之者六經之變治各不同察其脈色知犯何經隨經標本各施其治此治霍亂之法也論霍亂諸邪所因非一當以脾胃之濕為本準繩云或問霍亂病亦復有他論者乎曰嘗考之內經有太陰所至為中滿霍亂吐下有吐郁之發民病嘔吐霍亂注下上濕土霍亂即五苓散理中丸之類有歲土不及風乃大行民病霍亂飧泄上土虛風勝霍亂即羅謙甫桂苓白朮散之類有熱至則身熱霍亂吐下上熱霍亂即活人書香薷散之類靈樞有足太陰之別別者絡也不曰絡而曰別者以本經由此穴而別走鄰經也名曰公孫去本節後一寸在足大指本節後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也厥氣者脾氣失調而或寒或熱皆為厥氣逆而上行則為霍乳本經入腹屬脾絡胃故其所病如此治此者當取所別之公孫也有清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干亂於腸胃則為霍亂取之足太陰陽明不下取之三里巢氏因此一條乃云霍亂者由陰陽清濁二氣相干亂於腸胃間因遇飲食而變發則心腹絞痛挾風而實者身發熱頭痛體疼虛者但心腹痛而已亦有因飲酒食肉腥膾生冷過度居處不節或露臥濕地或當風取涼風冷之氣歸於三焦傳於脾胃水穀不化皆成霍亂自巢氏之說行後世守之以為法無復知內經諸條者矣至劉河間乃云吐下霍亂三焦為水穀傳化之道路熱氣甚則傳化失常而吐瀉霍亂火性躁動故也世俗止謂是停食者誤也轉筋者亦是脾胃土衰肝木自甚熱氣燥鑠於筋則筋攣而痛亦非寒也張戴人則以風濕暍三氣合而為邪蓋脾濕土為風木所克鬱則熱乃發發則心火炎上故嘔吐嘔吐者暍也脾濕下注故注泄注泄者濕也風急甚故筋轉轉筋者風也可謂善推病情者乎王海藏亦謂風濕熱外至生冷物內加內外合病者此條殆似之矣凡治病當從內經隨宜施治安可執一端而已哉然則此病當以何者為要曰脾胃之濕為本諸邪感動者為病之由然其間脾胃有虛有實邪有陰陽相干之孰甚皆宜消息處治至若明理論謂傷寒吐利者由邪氣所傷霍亂吐利者由飲食所傷其有兼傷寒之邪內外不和者加之頭痛發熱而吐利者是霍亂傷寒也原仲景之意豈必在飲食始為是病彼於寒邪傳入中焦胃氣因之不和陰陽否隔者安得不有以至之乎不然何以用理中四逆等治之論霍亂雜治法準繩云此疾多生夏秋之交縱寒月有之亦多由伏暑而然病之將作必先腹中絞痛腹中急痛吐瀉之後甚則轉筋此兼風也手足厥冷氣少唇青此兼寒也身熱煩渴氣粗口燥此兼暑也四肢重著骨節煩疼此兼濕也傷風傷寒當於傷寒吐利門中求之若風暑合病宜石膏理中湯暑濕相搏宜二香散夏月中暑霍亂上吐下利心腹撮痛大渴煩躁四肢逆冷汗自出兩腳轉筋宜香薷飲井底沉極冷頓服之桂苓白朮湯亦妙戴氏云人於夏月多食瓜果乃飲冷乘風以致食留不化因食成痞隔絶上下遂成霍亂六合湯倍藿香煎熟調蘇合香丸濕霍亂除濕湯訶子散七情鬱結五臟六腑互相刑剋陰陽不和吐利交作七氣湯霍亂轉筋吐瀉不止頭目昏眩須臾不救者吳茱萸湯霍亂吐利轉筋四肢逆冷須臾不救急以茱萸食鹽湯霍亂多寒肉冷脈絶宜通脈四逆湯有宜吐者雖已自吐利還用吐以提其氣用二陳湯探吐或樟木煎湯亦可吐或白礬湯亦可三因吐法用極鹹鹽湯三升熱飲一升刺口令吐宿食便盡不吐更服吐訖仍飲三吐乃止此法勝他法遠矣俗人鄙而不用坐觀其斃哀哉吐後隨證調理亦有可下者如頭痛發熱邪至風寒而來中焦為寒熱相半之分邪稍高者居陽分則為熱熱多飲水者五苓散以散之如邪稍下者居陰分則為寒寒多不飲水者理中丸以溫之如吐利後有表者解之汗出厥者溫之如既吐且利小便利大汗出內外熱者亦溫之如吐下後汗出厥逆不解脈欲絶者四逆等湯治之傷寒吐瀉轉筋身熱脈長陽明本病也宜和中平胃散建中湯或四君子湯脈浮自汗者四君子加桂五錢主之脈浮無汗者四君子加麻黃五錢主之傷寒吐瀉轉筋脅下痛脈弦者木剋土也故痛甚平胃散加木瓜五錢亦可治宜建中加柴胡木瓜湯傷寒吐瀉後大小便不通胃中實痛者四君子加大黃一兩主之傷寒吐瀉轉筋腹中痛體重脈沉而細者宜四君子加芍藥高良薑湯傷寒吐瀉四肢拘急脈沉而遲此少陰霍亂也宜四君子加姜附厚朴湯厥陰霍亂必四肢逆冷脈微緩宜建中加附子當歸湯戴復庵云霍亂之病揮霍變亂起於倉卒與中惡相似但有吐利為異耳其證胸痞腹絞氣不升降甚則手足厥逆冷汗自出或吐而不瀉或瀉而不吐或吐瀉兼作或吐瀉不透宜蘇合香丸以通其痞塞繼進藿香正氣散加木香半錢仍以蘇合香丸調吞來復丹若果瀉已甚則不可用來復丹瀉而不吐胸膈痞滿先以陰陽湯或濃鹽湯頓服以導其吐已吐未吐並藿香正氣散間進蘇合香丸吐而不瀉心腹絞痛頻欲登圊親盈切音清苦於不通藿香正氣散加枳殼一錢多下來復丹欲捷則用生枳殼若更不能作效逼迫已甚其勢不容不用神保丸但神保雖能通利亦入大腸而後有功若隔於上而不能下轉服轉祕須用來復丹研末湯調吞下養正丹百粒庶可引前藥到下吐瀉兼作心腹纏擾未安者藿香正氣散加官桂木香各半錢不愈則投四順湯吐利不止元氣耗散病勢危篤或水粒不入或口渴喜冷或惡寒戰掉手足逆冷或發熱煩躁欲去衣被此蓋內虛陰盛卻不可以其喜冷欲去衣被為熱宜理中湯甚則附子理中湯不效則四逆湯並宜放十分冷服霍亂已透而余吐余瀉未止腹有餘痛宜一味報秋豆葉煎服乾者尤佳霍亂並諸吐瀉後胸膈高起痞塞欲絶理中湯加枳實半錢茯苓半錢名枳實理中湯吐瀉已愈而力怯精神未復者十補散羅謙甫治蒙古人因食酒肉飲潼乳得吐瀉霍亂證脈沉數按之無力所傷之物已出矣即以新汲水半碗調桂苓白朮散徐徐服之稍得安靜又於牆陰掘地約二尺許入新汲水攪之澄清名曰地漿用清一杯再調服之漸漸氣和吐瀉遂止翼日微煩渴卻以錢氏白朮散時時服之良愈或問用地漿者何也曰坤為地地屬陰土平曰靜順感至陰之氣又於牆陰貯新汲水取重陰之氣也陰中之陰能泄陽中之陽霍亂證由暑熱內傷而得之故痹論云陽氣者靜則神藏躁則消亡又加暑熱七神迷亂非至陰之氣何由息乎又治提學侍其公七十九歲中暑霍亂吐瀉昏冒不知人脈七八至洪大無力頭熱如火足寒如冰半身不遂牙關緊急此年高氣弱不任暑氣陽不維陰則瀉陰不維陽則吐陰陽不相維則既吐且瀉矣前人見寒多以理中湯熱多以五苓散作定法治之今暑氣極盛陽明得時之際況因動而得之中暑明矣非甘辛大寒之劑不能瀉其暑熱墜浮焰之火而安神明也遂以甘露散甘辛大寒瀉熱補氣加茯苓以分陰陽冰水調灌之漸省人事諸證悉去後慎言語節飲食三日以參朮調中湯以意增減服之理其正氣逾旬方平復論霍亂轉筋陳氏云轉筋者以陽明養宗筋屬胃與大腸今暴吐下津液頓亡外感四氣內傷七情飲食甜膩攻閉諸脈枯削於筋宗筋失養必致攣縮甚則舌卷囊縮者難治也劉宗厚云霍亂者多轉筋大抵冷熱不調陰陽相搏故轉筋攣痛甚者遍體轉筋此實陰陽之氣反戾風寒乘之筋失血氣所榮而為攣縮急痛也耶蔭按葉氏曰霍亂轉筋劉宗厚以為冷熱不調云云劉河間論轉筋皆屬於火丹溪謂屬於血熱二公之論轉筋非因於霍亂者也其不因霍亂而轉筋者誠如二公之言亦有血虛筋失所養則轉而急痛不能舒也若夫霍亂而轉筋劉氏備矣亦有榮血中素有火熱卒然霍亂而風寒外束榮中之熱內郁而其勢猖狂則筋亦為之轉動也大抵霍亂見此證者多不可救宜急治之男子以手挽其陰女子以手牽兩乳近兩旁此妙法也李氏曰轉筋輕者兩腳重者遍體轉筋手足厥冷若欲絶者倉卒之際宜以鹽填臍中灼艾不計壯數雖已死而胸中有暖氣者立蘇急用木萸散加小茴香甘草蘇葉煎服再研生蒜塗腳掌心雖昏危入腹者亦效論霍亂煩渴陳氏云煩渴者以陰陽反戾清濁相干水與谷並小便祕澀既走津液腎必枯燥引水自救煩渴必矣止渴湯主之準繩云霍亂煩渴以增損縮脾飲主之能解伏熱消暑毒止吐利霍亂之後服熱藥太多煩躁作渴尤宜服之霍亂吐瀉後煩渴飲水宜茯苓澤瀉湯霍亂已愈煩熱多渴小便不利宜小麥門冬湯霍亂後噁心懶食口乾多渴宜白朮散霍亂後利不止冷汗出腹脅脹宜烏梅散霍亂後下利無度腹中絞痛宜黃連丸霍亂後下利見血宜止血湯赤石脂湯潔古老人云霍亂轉筋吐瀉不止病在中焦陰陽交而不和發為疼痛此病最急不可與分毫粥飲穀氣入胃則必死矣論乾霍亂陳氏云乾霍亂者忽然心腹脹滿絞刺疼痛蠱毒煩冤欲吐不吐欲利不利狀若神明所附頃刻之間便致悶絶亦涉三因或臟虛或腸胃素厚故吐利不行準繩云乾霍亂者忽然心腹脹滿攪痛欲吐不吐欲瀉不瀉躁亂憒憒無奈俗名攪腸沙者是也此由脾土鬱極而不得發以致火熱內擾陰陽不交或表氣發為自汗或裡氣不通而作腹痛然膈上為近陽也膈下為近陰也若欲陰陽之氣行必先自近從上開之陽氣得通則先下之陽也若欲陰陽之氣行必死於其火也曰方論皆謂脾胃有宿食與冷氣相搏子何為言火耶曰神志昏冒煩躁悶亂非諸躁狂越之為屬火者乎不急治即死非暴病暴死之屬火者乎但處治不可過於攻攻之過則脾愈虛亦不可過於熱熱之過則內火愈熾不可過於寒寒之過則火必與捍格須反佐以治然後郁可升食可出而火可散矣古方有用鹽熬調以童便非獨用其降陰之不通陰既不通其血亦不行兼用行血藥也此誠良法足可為處方者比類矣丹溪云吐提其氣最是良法吐中兼有發散之義有用解散者不用涼藥但二陳湯加川芎蒼朮防風白芷戴復庵法先以濃鹽湯頓服次調蘇合香丸吞下來復丹仍進藿香正氣散加木香枳殼各半錢蔭按夫乾霍亂者乃寒濕太甚脾被絆而不能動氣被鬱而不得行所以卒痛而手足厥冷噁心嘔噦也俗名攪腸沙者蓋言痛之甚也北方刺青筋以出氣血南方括胸背手足以行氣血俱能散病然出氣血不如行氣血之為愈也蓋霍亂乃氣病非血病也今刺青筋固能散氣而血因之以傷況人之身氣常有餘血常不足今不足者又從而傷之是不足之中又不足也少壯之人庸或得免而衰老之人則不免於死矣慎之診法內經曰脈浮者霍亂脈微而澀或代而散或隱而伏或大而虛脈右關滑為霍亂吐瀉脈洪者為熱脈弦者為飲氣口脈弦滑膈間有宿食留飲宜順其性以鹽湯探吐之脈結促代不可斷以死脈大者生微弱漸遲者死脈洪大者易治脈微囊縮舌卷者不治脈訣舉要曰滑數為嘔代者霍亂微滑者生澀數凶斷又曰滑而不勻必是吐瀉霍亂之候脈代勿訝準繩云霍亂之後陽氣已脫或遺尿而不知或氣少而不語或膏汗如珠或大躁欲入水或四肢不收皆不可治也治陽霍亂熱多欲飲水者方五苓散治霍亂吐瀉煩渴引飲白朮茯苓豬苓各一兩半澤瀉二兩半桂一兩上為細末冷水調下二錢或水煎三沸冷服亦得一方減桂加蘇木煎服治霍亂吐瀉如神香薷散活人治陰陽不順清濁相干氣鬱中焦名為霍亂此皆飽食多飲復睡冷席外邪內積結而不散陰陽二氣壅而不反陽氣欲降陰氣欲升陰陽交錯變成吐利百脈混亂榮衛俱虛冷搏筋轉皆宜服此香薷四兩厚朴去皮薑汁炒黃連薑汁炒各二兩甘草半兩上為末每服四錢水煎不犯鐵器慢火煎之兼治不時吐利霍亂腹撮痛大渴煩躁四肢逆冷冷汗自出兩腳轉筋痛不可忍者須井中沉令極冷頓服之乃效加味香薷飲治伏暑吐利不止煩悶多渴香薷一斤厚朴制白扁豆各半斤檳榔黃連上㕮咀每服三四錢水煎服加味薷苓湯治霍亂身熱口渴此熱暑中也天花粉二錢赤茯苓一錢豬苓澤瀉香薷乾葛各七分白朮黃連甘草各五分上銼加生薑煎服如熱極加知母石膏泄極加升麻黃芩柴胡腹痛加芍藥炒五分桂三分寒痛亦加此桂苓白朮散寶鑑治冒暑飲食所傷傳受濕熱內盛霍亂吐瀉轉筋急痛滿腹痛小兒吐瀉驚風皆宜服此桂枝人參白朮白茯苓各半兩澤瀉甘草石膏寒水石各一兩滑石二兩一方有木香藿香葛根各半兩上為細末每服三錢白湯調下或新汲水薑湯下亦可桂苓甘露飲寶鑑治中暑霍亂吐瀉發渴引飲流濕潤燥治痰涎止咳嗽調臟腑寒熱嘔吐服之令人遍身氣液宣平及治水腫泄利肉桂藿香人參各半兩木香二錢半白茯苓白朮甘草澤瀉葛根石膏寒水石各一兩滑石二兩上為末每服三錢白湯冷水任調下治陰霍亂寒多不飲水者方加減理中湯治過食生冷遂成霍亂吐下脹滿食不消心腹痛人參白朮乾薑各三錢甘草炙一錢上銼用水二鍾煎一鍾不拘時服一方加生薑五片為末煉蜜丸如雞頭大每服一丸沸湯和下若為寒濕氣所中者加附子一錢名附子理中湯若霍亂吐瀉者加橘紅青皮各一錢半名治中湯若干霍亂心腹作痛先以鹽湯少許頻服候吐出令透即進此藥若嘔吐者於治中湯內加丁皮半夏各一錢生薑十片煎若泄瀉者加橘紅茯苓各一錢名補中湯若溏泄不已者於補中湯內加附子一錢不喜飲食水穀不化者再加砂仁一錢若霍亂嘔吐心腹作痛手足逆冷於本方內去白朮加熟附子名四順湯若傷寒結胸先加桔梗枳殼等分不愈者及諸吐利後胸痞欲絶心胸高起急痛手不可近者加枳實白茯苓各一錢名枳實理中湯若渴者再於枳實理中湯內加瓜蔞根一錢若霍亂後轉筋者理中湯內加煅石膏一錢若臍上築者腎氣動也去朮加官桂一錢半腎惡燥去朮恐作奔豚故加官桂若悸多者加茯苓一錢若渴欲飲水者加白朮半錢若寒者加乾薑半錢若腹滿者去白朮加附子一錢若飲酒過多多啖炙煿熱食發為鼻衄加川芎一錢若傷胃吐血以此藥能理中脘分別陰陽安定血脈只用本方一方本方倍甘草名四順湯姜附湯治中寒霍亂吐瀉轉筋手足厥冷多汗乾薑一兩附子生去皮臍一枚上㕮咀每服三錢水煎溫服筋脈牽急加木瓜肢節痛加桂二錢通脈四逆湯治霍亂多寒身冷脈絶吳茱萸炒三錢附子炮二錢桂心不見火甘草炙各一錢半白芍藥木通細辛各五分上作一服水二鍾酒半鍾生薑七片棗一枚煎一鍾溫服人參散治霍亂身體疼痛四肢逆冷服理中四順不效者人參白芍藥當歸炒高良薑各一兩白朮陳皮去白桂心附子炮去皮臍各二兩上搗篩為末每服四錢加紅棗三枚水煎服訶子散三因治老幼霍亂一服即效訶子炮去核厚朴薑製陳皮茯苓神麯炒麥芽炒草果去殼良薑炒乾薑炮甘草炙各等分上為細末每服二錢候發不可忍時用水煎入鹽少許服之半夏湯保命治霍亂轉筋吐瀉不止半夏曲茯苓白朮各五錢淡桂二錢半甘草炙一錢上為細末每服二錢渴者以涼水調下不渴者以溫水調下冷香湯治夏秋傷暑引飲過食生冷脾胃不和遂成霍亂之證良薑附子炮去皮臍檀香甘草炙各二錢草果一錢半乾薑炮一錢丁香三分上㕮咀分作二服每服用水二鍾煎八分去渣貯瓶中沉井內待冷服之漿水散治暴瀉如水周身汗出盡冷脈微而弱氣少而不能語甚而吐逆不止此謂急病宜治之以此半夏二錢附子桂心乾生薑甘草炙各一錢半良薑三分半上銼作一服漿水煎服正胃湯治霍亂吐瀉不止枇杷葉拭去毛炙厚朴薑製陳皮去白桂心各一錢半上銼一服加生薑三片水煎服木瓜湯直指治霍亂吐瀉轉筋擾亂酸木瓜一兩吳茱萸洗炒半兩茴香微炒三錢半甘草炙二錢上㕮咀每服四錢生薑五片紫蘇十葉水煎空心服一方用烏梅少許無紫蘇訶黎勒散治霍亂嘔吐脾胃虛冷氣膈不思飲食白朮陳皮去白厚朴薑汁炒各一兩人參乾薑炮赤芍藥澤瀉各半兩訶黎勒肉桂各七錢半甘草炙二錢半上㕮咀每服四錢加生薑三片水煎服冷香飲子治伏暑吐利煩躁草果仁三兩附子橘紅各一兩甘草半兩上㕮咀每服一兩入姜煎水放冷服吳茱萸湯良方治冒暑伏熱腹痛作瀉或痢並飲水過度霍亂吐瀉其證始因飲冷或冒寒或忍飢或大怒或乘舟車傷動胃氣令人上吐下瀉並行頭旋眼暈手腳轉筋四肢逆冷用藥遲慢須臾不救此即華陀危病方也吳茱萸木瓜食鹽各半兩上同炒令焦先用磁瓶盛水三升煮令百沸入藥煎至二升以下傾一盞冷熱隨病人服之卒無前藥用枯白礬為末每服一大錢沸湯調服更無前藥用鹽一撮醋一盞同煎至八分溫服或鹽梅鹹酸等物皆可服來復丹方見中暑門一粒青金丹治霍亂吐瀉不止及轉筋諸藥不效者硫黃一兩水銀八錢上二味銚子內炒柳木篦子不住手攪勻更以柳枝蘸冷醋頻頻灑候如鐵色結如青金塊方成刮下再研如粉留小半為散余以粽子尖三個醋約半盞研稀調得所成膏和丸如雞頭大硃砂為衣每服一丸丁香湯磨化下熱服如服散丁香湯調下一錢傷寒陰陽乘伏用龍腦冷水磨下日二三服治外邪霍亂方藿香正氣散治四時不正之氣寒疫時氣山嵐瘴氣雨濕蒸氣或中寒腹痛吐利中暑冒風吐瀉中濕身重泄瀉或不服水土脾胃不和飲食停滯復感外寒頭疼憎寒或嘔逆噁心胸膈痞悶或發熱無汗者並治藿香二錢紫蘇陳皮厚朴薑汁炒半夏薑汁炒白朮茯苓桔梗大腹皮白芷甘草炙各一錢上銼一劑生薑棗煎溫服霍亂轉筋加木瓜腹痛加炒芍藥寒痛加官桂冷甚加乾薑飲食不化心下痞悶加香附砂仁米穀不化加神麯麥芽肉食不化加山楂心下痞加枳實青皮中暑冒風加香薷扁豆時氣增寒壯熱加柴胡葛根發熱加麥門冬淡竹葉口渴作瀉小便不利合五苓散濕熱相搏霍亂轉筋煩渴悶動合黃連香薷散心腹絞痛加木香若頻欲登圊不通利者加枳殼蔭按龔氏曰霍亂之疾未有不由內傷生冷外感風寒而至者余用藿香正氣散治之百發百中一歲之間常治百人未有不效者但有熱者須加姜炒黃連寒甚加乾薑萬無一失又腹痛者加桂痛甚者去藿香加吳茱萸小便不利加茯苓如干霍亂加枳殼茯苓官桂最佳加味二陳湯陳皮半夏白茯苓甘草蒼朮防風川芎白芷一云白朮上銼生薑五片水煎服不換金正氣散治霍亂轉筋嘔吐泄瀉頭疼不止蒼朮炒厚朴薑汁炒陳皮半夏藿香各二錢甘草炙一錢上銼一服加生薑五片棗二個水煎服二香散治暑濕相搏霍亂轉筋煩渴悶亂藿香白朮厚朴薑製陳皮茯苓半夏薑製紫蘇桔梗白芷香薷黃連白扁豆各一錢大腹皮甘草炙各五分上銼一服加生薑五片蔥白三根水煎服藿苓湯治外感風寒內傷飲食霍亂轉筋嘔吐泄瀉藿香厚朴白朮茯苓各一錢二分豬苓澤瀉各一錢半陳皮半夏桔梗白芷紫蘇大腹皮各一錢肉桂六分甘草炙五分上㕮咀作一服加生薑五片水煎食遠服活命散治男子婦人小兒上吐下瀉霍亂不止面色俱青黑命欲臨死者宜服此藥吳茱萸乾木瓜各一兩川芎肉豆蔻草豆蔻各半兩防風羌活獨活乾薑細辛各二錢半官桂一錢二分半上為細末每服三錢濃煎木瓜湯空心調連渣服治冷熱不調霍亂方回生散治中氣不和霍亂吐瀉但一點胃氣存者服之回生陳皮去白藿香各五錢上為末水煎溫服六和湯治夏月飲食後六腑不和霍亂轉筋寒熱交作香薷厚朴薑汁炒各二錢藿香赤茯苓白扁豆薑汁略炒木瓜各一錢白朮人參半夏砂仁杏仁甘草炙各五分上銼加生薑三片棗一枚水煎溫服椒豆散治霍亂吐瀉而不能服藥者效胡椒緑豆各十九粒上研爛水煎服如渴甚新汲水調服一方治霍亂吐瀉乾薑胡椒胡黃連各二分緑豆粉五分上為末每服三分沸湯點服陰陽湯治霍亂吐利腹痛服藥即吐無法可施用百沸湯半碗井花水半碗合而服之即安治胃氣虛弱霍亂方四君子湯治霍亂隨證加減人參白朮茯苓甘草炙各等分上銼每服一兩生薑五片水煎溫服如吐瀉轉筋自汗脈浮者加桂五錢如吐瀉轉筋腹中痛體重脈沉而細者加芍藥高良薑各一錢二分如吐瀉霍亂四肢拘急脈沉而遲者加生薑附子厚朴各一錢半如吐瀉小便不通胃中實痛者加大黃建中湯治內虛霍亂轉筋桂枝一兩芍藥二兩甘草炙半兩膠飴半升生薑一兩大棗六枚上銼每服一兩水三盞煮至一盞半去渣下膠飴兩匙煎化服如吐瀉轉筋脅下痛脈弦者加木瓜柴胡各一錢如吐瀉轉筋四肢厥冷脈微緩者加附子當歸人參散大全治脾胃虛寒霍亂吐瀉心煩腹痛飲食不入人參厚朴薑製橘紅各一錢當歸乾薑炮甘草炙各五分上銼加棗煎服三因白朮散治中暑嘔吐暈眩及大病後調理失宜勞復如初及脾胃虛損面色萎黃飲食不美口吐酸水滑泄腹鳴飲食所傷霍亂吐瀉並宜服之白朮陳皮白茯苓青皮去白甘草桔梗山藥白芷香附子各三兩乾薑半兩上銼每服五錢生薑三片棗一枚木瓜一片蘇葉三片水煎食前服吐瀉加白梅喘加桑白皮杏仁傷寒勞復加薄荷膈氣加木通入麝香少許中暑嘔逆加香薷霍亂加藿香産後泄瀉加荊芥氣厥入鹽煎服治鬱塞霍亂方七氣湯治七情鬱結五臟之間互相刑剋陰陽不和揮霍變亂吐利交作半夏湯泡厚朴薑製芍藥茯苓各二錢肉桂紫蘇葉橘紅人參各一錢上銼一服水二鍾生薑七片棗一枚煎一鍾溫服一方用水一盞酒半盞同煎丹溪方治六官霍亂泄多吐少口渴腳轉筋滑石三錢白朮二錢蒼朮厚朴陳皮乾葛各一錢半木通一錢甘草炙少許上銼入生薑五片水煎下保和丸四五十粒加味半硫丸治憂思過度脾肺氣閉結聚痰飲留滯腸胃吐利交作四肢厥冷頭目眩暈或復發熱硫黃不以多少入豬臟內縛定以米泔童便水酒各一碗煮乾一半取出洗淨曬乾稱十兩半夏人參白茯苓各一兩石膏二錢半上為末薑汁浸蒸餅為丸如桐子大每服五十丸至百丸空心米湯下紅丸子治脾胃虛冷飲食失節聚留腸胃或因飲食不調沖沖寒濕吐利並作心腹絞痛莪朮三稜各醋煮二兩青皮炒陳皮各五兩乾薑胡椒各二兩阿魏二錢半上為末陳米粉糊丸如桐子大礬紅為衣每服百丸生薑甘草煎湯下三因方無陳皮乾薑嚴氏水漫丹治伏暑傷冷冷熱不調口乾煩渴黃丹一兩一分炒巴豆二十五個去皮心上同研勻用黃臘作汁為丸如梧桐子大每服五丸以水浸少頃別以新汲水吞下此劫劑也治霍亂轉筋方雜方治吐後轉筋熱者宜之木瓜煮汁飲之甚良一方香薷煮汁飲之一方燒梔子二十枚研末熟水調下加減理中湯治霍亂轉筋寒者宜之本方去白朮加生附子一枚或理中湯加凍膠銼炒一錢或以造麴蓼汁熱浸或用濃鹽湯浸仍令其扎縛腿脛若筋入腹及通身轉筋者不可治直指木瓜湯治吐瀉不已轉筋擾悶方見前陰霍亂條木瓜煎治吐瀉轉筋悶亂吳茱萸湯洗七次生薑切各二錢半木瓜木刀切一兩半上每服二三錢水煎服一方治霍亂轉筋皂角末一小豆許入鼻中取嚏便瘥一方取蓼花一把去兩頭以水二升半煮一升半頓服之一方放溫熏洗一方治霍亂下利不止轉筋入腹欲死用生薑一兩搗碎以酒五盞煮三四沸頓服一方治霍亂兩腳轉筋甚則遍體轉筋肚腹疼痛手足厥冷若欲絶者先於臍中灼艾次取蓼一把煎湯泡洗次投以姜附理中湯之類治轉筋法男子以手挽其陰女子以手牽其乳近兩邊此妙法也治霍亂轉筋方附子炮去皮臍白礬各三兩桃枝垂柳枝蔥根各切細三握川椒三分生薑一兩搗以綿裹系腳心上以水三斗煎二三十沸盛來看冷暖淋多時為妙如急即加醋五升同煎用之灸法灸承山二十七壯神效治霍亂煩渴方止渴湯良方治霍亂煩渴人參去蘆麥門冬去心茯苓去皮桔梗瓜蔞根葛根澤瀉甘草炙各五錢上為細末每服二錢不拘時蜜湯調下增損縮脾飲寶鑑解伏熱消暑毒止吐利霍亂之後服熱藥太多煩躁作渴尤宜服之草果烏梅甘草砂仁各四兩乾葛二兩上銼每服五錢加生薑五片同煎以水浸極冷旋旋服之無時茯苓澤瀉湯三因治霍亂吐瀉後煩渴飲水茯苓八兩澤瀉四兩甘草炙桂心各二兩白朮三兩上銼每服四錢生薑三片同煎食前服一方有小麥五兩麥門冬湯良方治霍亂已愈煩熱多渴有痰小便不利麥門冬去心白茯苓半夏湯泡七次橘皮白朮各一錢半人參小麥甘草炙各一錢上銼水二鍾生薑五片烏梅少許同煎至一鍾不拘時服白朮散治傷寒雜病一切吐瀉煩渴霍亂虛損氣弱保養衰老及治酒積嘔噦人參白朮茯苓藿香各半兩葛根一兩木香二錢半甘草炙一兩半上為細末每服二錢白湯調下如煩渴加滑石二兩甚者加薑汁續續飲之不拘時既濟湯治霍亂後虛煩不得眠人參甘草炙淡竹葉半夏湯洗附子炮各五錢麥門冬去心一兩上㕮咀每服四錢加生薑五片粳米百粒水煎溫服參胡三白湯治霍亂吐瀉止後發熱頭疼身痛口乾脈數者人參五分白朮白茯苓甘草炙當歸白芍藥炒陳皮麥門冬去心山梔子柴胡各八分五味子十粒烏梅一個上銼一劑加棗一枚燈心一團水煎溫服治霍亂後下利見血方烏梅散良方治霍亂後利不止冷汗出腹脅脹烏梅肉微炒黃連去須微炒當歸微炒附子炮裂去皮臍熟艾各七錢半阿膠搗碎炒令燥肉豆蔻赤石脂各一兩甘草炙半兩上為細末不拘時粥飲調下二錢黃連丸良方治霍亂後下利無度腹中絞痛黃連去須微炒黃柏微炒厚朴薑汁炙各七錢半當歸微炒乾薑炮裂木瓜不見火地榆各半兩阿膠搗碎炒黃燥一兩上為末煉蜜和搗二三百杵丸如桐子大每服二十丸不拘時粥飲下止血湯良方治霍亂下焦虛寒或便利後見血當歸焙桂心去粗皮續斷各三兩生地黃焙乾薑炮各四兩阿膠炙令燥蒲黃甘草炙各二兩上搗篩每服三錢水一盞煎七分去渣溫服日三服赤石脂湯良方治霍亂下焦熱結或利下膿血煩痛赤石脂四兩升麻白朮各一兩半烏梅去核炒乾乾薑炮裂各一兩陳廩米微炒梔子仁各半兩上搗篩每服五錢水一盞半煎八分去渣空心溫服治乾霍亂方厚朴湯良方治乾霍亂厚朴生薑汁炙香枳殼去穰炒高良薑檳榔朴硝各七錢半大黃炒二兩上搗篩每服三錢水一盞半煎一盞溫服活命散治脾元虛損霍亂不吐瀉腹脹如鼓心胸痰壅丁香七粒菖蒲根半兩甘草炙一兩生薑半兩鹽一合上銼碎用童便一盞半煎一盞分二次溫服冬葵子湯良方治乾霍亂大小便不通手足俱熱悶亂冬葵子滑石研香薷各二兩木瓜一枚去皮穰上搗篩每服五錢水二鍾煎一鍾溫服日四五次聖惠方治攪腸痧痛不可忍輾轉在地或起或僕其腸絞縮在腹此是中毒之深須臾令人死古方名乾霍亂用鹽一兩炒熱湯調灌入病人口中鹽氣一到腹其痛即定一方飲後以雞翎掃咽喉間吐出即愈三因吐法治乾霍亂蠱毒宿食不消積冷心腹煩滿鬼氣用極鹹鹽湯三升熱飲一升刺口令吐宿食便盡不吐更服吐訖復飲三吐乃止此法大勝諸治俗人以為田舍淺近鄙而不用守死而已凡有此證即先用之元戎云吐定用理中湯姜鹽散治霍亂欲吐不吐欲瀉不瀉鹽一兩生薑半兩切碎上同炒令色變以水一碗煎熱服甚者加童子小便一盞陶節庵方治乾霍亂不得吐者皂角末三分鹽一撮上以滾湯一碗調服探吐一方用枯白礬末一錢百沸湯調下欲飲水者掘地入水令澄清與飲謂之地漿又方將石砂炒令赤色冷水淬之良久澄清水服一二合經驗方治絞腸痧陳樟木陳壁土陳艾各等分上為末水煎濃去渣連進三四服即安又方治急心痛絞腸痧腹痛嘔吐泄瀉及霍亂中暑煩渴不省人事用馬糞研同蜜擂濾過以新汲水下隨手即愈鹽尉法治霍亂心腹作痛用炒鹽二碗布包頓其胸前並腹肚上用尉斗火尉氣透又以炒鹽尉其背則十分無事刺法治乾霍亂刺委中穴並十指頭出血亦好委中穴在膕中央紋中動脈是又法治絞腸痧手足厥冷腹痛不可忍者以手蘸溫水於病者腳腕內拍打有紫黑點處以針刺去惡血即愈灸法治霍亂已死腹中有暖氣者用鹽納臍中灸七壯
