枳實一枚薤白二兩厚朴一兩肉桂瓜蔞仁各五錢上銼用水二鍾先煮枳朴減半入諸藥煎濃食遠服神保丸治諸積氣痛項背注痛宜通臟腑全蠍七個巴豆十個取霜木香胡椒各二錢半上為末蒸餅丸如麻子大硃砂為丸每服五七丸心膈痛柿蒂燈心煎湯下腹痛柿蒂煨薑湯下血痛炒姜醋湯下肺氣甚者以白礬蛤粉各二錢黃丹一錢同研煎桑白皮糯米飲下氣小喘只用桑皮糯米飲下脅下痛炒茴香酒下大便不通蜜湯入檳榔末一錢下氣噎木香煎湯下宿食不消茶酒漿任下治熱氣方退熱清氣湯治氣逆身熱中脘痞滿柴胡橘皮茯苓各一錢半半夏枳殼各八分香附七分川芎五分砂仁七粒木香甘草各三分上㕮咀作一服水二盞加生薑三片煎七分去渣溫服清膈蒼莎丸治因濕熱氣滯蒼朮二兩香附子一兩半黃芩炒黃連炒各五錢上為細末用新熟瓜蔞去皮搗爛和丸如緑豆大每服三五十丸白湯下木香檳榔丸此藥流濕潤燥推陳致新滋陰抑陽散郁破結活血通經治男子婦人嘔吐酸水痰涎不利頭目昏眩並一切酒毒食積及米穀不化或下痢膿血大便祕塞風壅積熱口苦煩渴涕唾稠黏膨脹氣滿等症木香檳榔青皮去穰陳皮去白黃柏黃連莪朮枳殼大黃牽牛香附各一兩當歸一兩半黃芩二兩一方無此味上為末水丸桐子大每服五七十丸溫水下木香枳殼丸寬胸膈進飲食破滯氣散內熱木香檳榔青皮去穰陳皮去白黃柏黃連蓬朮煨枳殼去穰麩炒當歸香附各五錢黑牽牛頭末一兩上為末水丸如桐子大每服五七十丸薑湯下此即木香檳榔丸而無大黃虛弱人或大便自利者宜用此枳朴大黃湯治支飲胸滿按之則痛此熱痰留滯也厚朴一兩大黃六兩枳實四枚上三味用水五升煮取二升分溫再服是齊推氣丸治三焦痞塞氣不升降胸脅脹滿大便祕澀小便赤少宜服大黃陳皮檳榔枳實牽牛各等分上為末煉蜜丸如桐子大每服五十丸溫水下量虛實加減木香順氣丸木香檳榔青皮去白各一兩大黃二兩微炮黑牽牛生一兩炒一兩上為末每藥末一兩曲一兩三錢蜜丸桐子大每服四十丸溫水下治冷氣方和氣散治脾胃不和中脘氣滯心腹脹滿嘔吐酸水青皮去白陳皮去白蒼朮米泔浸茴香炒香附子炒肉桂良薑甘草炙各等分上為末每服三錢鹽少許沸湯點服鹽酒亦可化氣湯治一切氣逆胸膈噎塞心脾卒痛嘔吐酸水丈夫小腸氣婦人脾血氣並皆治之陳皮去白青皮去白炒丁皮乾薑炮桂心甘草炙各四兩茴香炒蓬朮煨木香各二兩砂仁沉香胡椒各一兩上為末每服二錢生薑紫蘇湯調下婦人淡醋湯下順氣木香散治氣不升降胸膈痞悶時或引痛及酒食過傷噫氣吞酸心脾刺痛並皆治之蒼朮泔浸桔梗茴香炒各三兩乾薑炮良薑炒陳皮厚朴薑製砂仁丁香肉桂甘草炙各二兩上為末每服三錢加生薑三片棗二枚水煎服或鹽少許沸湯點下亦可異香散治胃氣不和腹脅膨脹飲食難化噫氣吞酸一切冷氣結聚腹中刺痛此藥最能治之厚朴薑製二兩陳皮去白青皮去白各三兩石蓮肉蓬朮煨京三稜煨益智仁甘草炙各一兩上為末每服三錢加生薑三片棗一枚鹽一捻同煎熱服雞舌香散治男婦臟腑虛弱陰陽不和中脘氣滯停積痰飲胸膈腹滿心脾引痛肉桂香附子炒良薑炒赤芍藥烏藥各二錢甘草炙五分上銼水煎入鹽少許食遠服三香正氣散治陰多陽少手足厥冷氣刺壅滯胸膈滿塞心下堅痞嘔噦酸水香附子炒二兩木香丁香各半兩丁香皮一兩陳皮去白益智仁縮砂仁厚朴薑製烏藥甘草各一兩半乾薑炮蓬朮炮各一兩上為末每服五錢用生薑三片棗一枚煎湯調服不拘時正氣天香散治諸氣作痛或上湊心胸或攻築脅肋及婦人胎前産後一切氣痛並皆治之香附米八錢陳皮烏藥紫蘇葉各二錢乾薑甘草各一錢上銼一劑水煎服指迷七氣湯治七情相干陰陽不得升降氣壅滯攻衝作疼香附子二錢青皮陳皮去白桔梗蓬朮官桂藿香益智仁半夏甘草炙各一錢上作一服生薑三片紅棗二枚水煎食遠服勻氣散治氣滯不勻胸膈脹滿虛痞宿冷不消心腹刺痛噎塞嘔吐噁心並皆冶之丁香白豆蔻木香不見火檀香各二兩藿香葉甘草炙各八兩縮砂四兩上為細末每服二錢入鹽一字沸湯調服不拘時蟠蔥散治男子婦人脾胃虛冷氣滯不行攻刺心腹痛連及胸脅膀胱小腸疝氣及婦人血氣刺痛延胡索肉桂乾薑炮各四分蒼朮米泔浸焙縮砂甘草炮各二錢檳榔丁皮各一錢三稜煨蓬朮茯苓青皮去穰各七分上作一服用水二鍾連根蔥白一莖煎至一鍾空心熱服蘇合香丸大能順氣化痰並治傳尸骨蒸勞瘵卒暴心痛小兒驚搐大人中風卒死等症沉香麝香另研訶子煨去核丁香木香安息香另為末無灰酒一升為膏香附蓽撥白朮白檀香各一兩熏陸香另研蘇合香油入安息膏內龍腦硃砂另飛烏犀角各五錢上為細末研極勻用安息膏並煉蜜和丸如櫻桃大空心用溫水化下四丸酒服亦可木香分氣丸治一切氣逆心胸痞悶腹肋虛脹木香不見火香附子丁皮砂仁蓬朮煨甘草各四兩藿香薑黃甘松檀香各一兩上曬乾不見火搗為末稀麵糊為丸如梧桐子大每服三十丸生薑橘皮湯下不拘時木香快氣丸陳皮去白蓽撥檳榔木香砂仁枳殼白豆蔻各二錢白朮一錢上為末糊丸桐子大每服四五十丸溫水下集香丸治一切氣胸膈痞悶脅肋脹滿心腹疼痛噫氣吞酸嘔逆噁心不思飲食或因飲酒過傷脾胃不和並皆治之丁香六兩不見火香附子炒四兩八錢砂仁白豆蔻仁木香不見火薑黃各四兩甘草一兩麝香另研八錢上為極細末用甘草膏和丸如桐子大每服一二丸細嚼津咽下常服寬中順氣消宿酒進飲食磨積滯去症塊
