body:
  text: 卷三十五諸氣論張子和曰天地之氣常則安變則病而況人稟天地之氣五運迭侵於外七情交戰於中是以聖人嗇氣如持至寶庸人役物而反傷太和此軒岐所以論諸痛皆因於氣諸病皆生於氣遂有九氣不同之說氣本一也因所觸而為九怒喜悲恐寒熱驚思勞也其言曰怒則氣逆甚則嘔血及飧泄故氣逆上矣喜則氣和志達榮衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣寒則腠理閉氣不行故氣收矣熱則腠理開榮衛通汗大出故氣泄矣驚則心無所依神無所歸慮無所定故氣亂矣勞則喘息汗出內外皆越故氣耗矣思則心有所存神有所歸正氣留而不行故氣結矣此素問之論九氣其變甚詳其理甚明虞氏曰人身之正氣與血為配血行脈中氣行脈外一呼脈行三寸一吸脈行三寸氣血並行周流乎一身之中灌溉乎百骸之內循環無端運行不悖而為生生不息之妙用也經曰一息不運則機緘窮一毫不續則霄壤判若內無七情之所傷外無六淫之所感何氣病之有惟不善攝生者五志之火無時不起五味之偏無日不傷是以膠痰固積留滯於六府鬱火邪氣充塞乎三焦使氣血失其常候腑臟不能傳導是故外邪得以乘虛而湊襲矣以致清陽不升濁陰不降而諸般氣病朝輟暮作為脅痛為心腰痛為周身刺痛甚則為反胃為膈噎等症皆此之由也大抵男子屬陽得氣易散女人屬陰遇氣多郁是以男子之氣病者常少女人之氣病者常多故治法曰婦人宜調血以耗其氣男子宜調氣以養其血此之謂也原病式曰氣為陽而主輕微諸所動亂勞傷乃為陽火之化神狂氣亂而為病熱者多矣子和云河間治五志獨得言外之意凡見喜怒悲思恐之證皆以平心火為主至於勞者傷於動動便屬陽驚者駭於心心便屬火二者亦以平心火為主今之醫者不達此旨遂有寒涼之謗劉宗厚曰捍衛沖和不息之謂氣擾亂妄動變常之謂火當其和平之時外護其表復行於里周流一身循環無端出入升降繼而有常源出中焦總統於肺氣曷嘗病於人也及其七情之交攻五志之間發乖戾失常清者行者抑遏而反止表失衛護而不和里失鍵捍而少降營運漸遠肺失主持妄動不已五志厥陽之火起焉上燔於肺氣乃病焉何者氣本屬陽反勝則為火矣河間有曰五志過極皆為火也何後世不本此議而一概類聚香辛燥熱之劑氣作寒治所據何理且言指迷七氣湯製作者其皆用青皮陳皮三稜蓬朮益智官桂甘草遂為平和可以常用通治七情所傷混同一意未喻其藥以治其氣已下諸方尤有甚焉者茲不復敘況所起之情各各不同且經言九氣之變未嘗略而不詳如怒則氣上等症其言治法高者抑之下者舉之寒者熱之熱者寒之驚者平之勞者溫之結者散之喜者以恐勝之悲者以喜勝之九氣之治各有分別何嘗混作寒論而類以香熱之藥通言而治諸氣豈理之謂歟若香辛燥熱之劑但可劫滯氣沖快於一時以其氣久抑鬱藉此暫行開發之意藥中不佐制伏所起之氣服甚則增熾鬱火蒸熏氣液而自成積積滋長而成痰痰飲下膈氣乃氤氳清虛之象若霧露之著物雖滯易散內挾痰積開而復結服之日久安有氣實而不動氣動而不散者乎此皆人所受誤之由習俗已久相沿而化卒莫能救升發大過香辛散氣燥熱傷氣真氣耗散濁氣上騰猶由腎虛不能攝氣歸原遂與蘇子降氣湯四磨湯下黑錫丹養氣丹鎮墜上升之氣且硫黃黑錫佐以香熱又無補養之性初服未顯增變由喜墜而愈進形質弱者何以收救不悟肺受火邪子氣亦弱降令不行火無以制相煽而動本勢空虛命絶如縷積而至深丹毒濟火一旦火氣狂散喘息奔急而死籲以有形丹石丸藥重墜無形之氣其氣將何抵受隨而降之乎譬以石投水水固未嘗沉也豈不死歟丹溪有曰上升之氣自肝而出中挾相火其熱為甚自覺其冷非真冷也火極似水積熱之甚陽亢陰微故有此證認假為真似是之禍可勝言哉內經雖云百病皆生於氣以正氣受邪之不一也今七情傷氣鬱結不舒痞悶壅塞發為諸病當詳所起之因滯於何經上下部分藏氣之不同隨經用藥有寒熱溫涼之各異若枳殼利肺氣多服損胸中至高之氣青皮瀉肝氣多服損真氣與夫木香之行中下焦氣香附之快滯氣陳皮之泄逆氣紫蘇之散表氣厚朴之瀉衛氣檳榔之瀉至高之氣藿香之馨香上行胃氣沉香之升降真氣腦麝之散真氣若此之類氣實所宜其中有行散者有損泄者其過劑乎用之能卻氣之標而不能制氣之本豈可又佐以燥熱之藥以火濟火混同渭治諸氣使之常服多服可乎氣之與火一理而已動靜之變反化為二氣作火論治與病情相得丹溪發揮論之冷生氣者出於高陽生之謬言也自非身受寒氣口食寒物而遽論寒者吾恐十之無一二也丹溪曰周流一身以為主者氣也苟內無所傷外無所感何病之有今冷氣滯氣逆氣上氣皆是肺受火邪氣得炎上之化有升無降熏蒸清道甚而轉成劇病局方類用辛香燥熱之劑以火濟火咎將誰歸氣無補法世俗之言也以其為病痞悶壅塞似難於補不思正氣虛者不能運行邪滯著而成病苟或氣怯不用補法氣何由行冷生氣者高陽生之謬言也病人自覺冷氣自下而上者非真冷也蓋上升之氣自肝而出中挾相火自下而出其熱為甚火極似水陽亢陰微也氣有餘便是火調氣用木香然木香味辛氣能上升如氣鬱而不達固宜用之若陰火衝上而用之則反助火邪矣故必用黃柏知母而少用木香佐之去滯氣用青皮青皮乃肝膽二經之藥人多怒脅下有郁枳固宜以解二經之實若二經氣不足也先當補血少加青皮可也補氣用人參然蒼黑氣實之人多服之恐亦反助火邪而爍真陰以白朮代之可也若肥白氣弱人多服之最好肥人又必加陳皮同用解五臟結氣益少陰經血用梔子炒令將黑為末以薑汁入湯同煎飲其效甚捷氣刺痛用枳殼看何部分以引經藥導使之行則可若稟受素壯而氣刺痛宜枳殼烏藥肥白氣虛之人氣刺痛者宜參術加木香若因事氣鬱不舒暢而氣刺痛當用木香婦人胎前産後一切氣疾作楚者俱用四物湯為主加疏利行氣之藥李氏曰蒼天之氣清淨不息變為雲霧為雷雨者山澤濕熱熏蒸也人身元氣與血循環無端彼衝擊橫行於臟腑之間而為疼痛積聚痃癖壅逆於胸臆之上而為痞滿刺痛等症多因七情飲食郁為濕熱成痰與積初起宜辛溫開鬱行氣豁痰消積久則宜辛寒降火以除根氣滯上膈為嘔咳痞滿枳橘湯積梗湯橘皮一物湯枳實韭白湯沉香降氣湯古烏附湯濕熱者清膈蒼莎丸實熱者解毒湯加知母枳殼痰火者瓜蔞實丸食積者枳朮丸加木香二錢氣滯下焦為腰痛脹墜者七氣湯加橘核或木香勻氣散吞青娥丸便閉者四磨湯六磨湯木香順氣丸木香檳榔丸氣滯於中則心腹脅肋刺痛伏梁痞塊者神保丸一塊氣丸木香分氣丸阿魏撞氣丸古枳巴丸濕熱古茱萸丸萸連梔石丸氣滯於外則周身刺痛流氣飲子主之或手足浮腫者三和散合五苓散或五皮散加桂青木香丸古法散火之法必先破氣氣降則火自降矣但枳殼青皮破滯要藥多服損人真氣虛者慎之男子虛勞失血及婦人月産後因氣者四物加木香檳榔陰虛氣滯者去木檳加元參黃柏或炒黑梔子一味入薑汁煎服開五臟結益少陰血最好又曰諸氣皆因於火蓋人身陰陽正氣呼吸升降流行榮衛生養臟腑惟七情火炎傷肺閉塞清道以致上焦不納中焦不運下焦不滲氣濁火盛熏蒸津液成痰痰鬱成積初起宜四七湯七氣湯辛溫消散稍久宜二陳湯加芩連山梔或當歸龍薈丸木香檳榔丸辛涼以折之最忌辛香助火耗氣之劑雖木香亦好上升必佐以知母黃柏丹溪云上升之氣自肝而出中挾相火其熱為甚自覺其冷非真冷也間有挾傷飲食生冷嘔逆積痛者治中湯加木香或蟠蔥散丁香脾積丸或七情後過飽大實痛者煮黃丸因七情過飢胃脘痛者四君子湯加木香挾寒則腠理密而氣斂於中五積散入里四逆湯挾風分心氣飲挾風寒犯腦羌活附子湯挾寒濕五苓散五苓能升降諸氣通利三焦非特分利而已凡此熱劑明知口傷冷物身受寒氣而後敢用非變法也挾暑則腠理開而汗泄於外黃連香薷飲加蓼根或清暑益氣湯加木香喜動心氣散不收過則健忘歸脾湯恐傷腎精怯不升過則下焦脹滿三和散補中益氣湯驚傷膽神亂不定過則怔忡失志妙香散十味溫膽湯此三者皆令真元耗散多見不足之證又勞則喘息汗出亦令氣散尤宜補益怒傷肝氣上逆過則嘔噦枳梗二陳湯紺珠正氣天香湯熱者柴陳湯憂傷肺其氣聚過則喘促蘇子降氣湯分氣紫蘇飲噎膈者暫用五膈寬中散悲傷心包及肺系其氣急過則為狂者枳殼煮散升陽順氣湯思傷脾其氣結過則痞滿退熱清氣湯溫膽湯木香化滯湯木香枳朮瘀血加桃仁紅花或復元通氣散痰壅則氣逆順氣導痰湯蘇子降氣湯甚者稀涎散微微吐之不問內傷外感久皆鬱熱滯為痰積況七情之火無日不起五味之偏無日不積此丹溪河間力主為火也雖然七情總髮於一心七氣總隸屬於一氣氣陽也動則為火故以降火化痰消積分治量其所稟厚薄而加減之大概氣虛四君子湯氣實古烏附湯為主火多合黃連解毒湯加知母枳殼痰多合二陳湯積多合平胃散痛加元胡索青皮蒼朮寒加官桂與茱萸便閉加木香檳榔男子血虛及婦人胎産氣疾合四物湯凡遇氣動痛作之時以辛溫散之稍久以辛平和之以辛寒折之則邪易退正易復而病瘳矣脈法脈經曰脈滑者多血少氣澀者少血多氣大者血氣俱多小者血氣俱少脈來大而堅者血氣俱實脈來細而緩者血氣俱虛代者氣衰細者氣少浮而細者氣欲絶闢大而滑中有短氣尺脈澀而堅為血實氣虛尺脈細而微血氣俱不足也劉立之曰下手脈沉便知是氣沉極則伏澀弱難愈其或沉滑氣兼痰飲病也脈訣舉要曰沉弦細動皆氣痛證心痛在寸腹痛在關下部在尺脈象顯然治滯氣方桔梗枳殼湯治諸氣痞結滿悶枳殼桔梗各二兩甘草五錢上㕮咀每服四錢生薑五片水煎溫服快氣湯治一切氣疾心腹脹滿胸膈噎塞噫氣吞酸胃中痰逆嘔及宿酒不解不思飲食陳皮去白香附子炒各二錢砂仁桔梗甘草各一錢上入生薑三片水煎服三因七氣湯治喜怒悲思憂恐驚之氣結成痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下此七情所為也或中脘痞滿氣不舒快或痰涎壅盛上氣喘急或因痰飲中阻嘔逆噁心並宜服之半夏五錢茯苓四錢厚朴三錢紫蘇二錢上㕮咀每服四錢生薑七片棗子一枚水煎熱服婦人惡阻尤宜服之但半夏用薑汁製過加味二陳湯治氣通用半夏湯泡七次陳皮去白白茯苓各二錢甘草炙一錢上每服五錢生薑三片水煎服上焦氣滯加枳梗香附砂仁中焦加厚朴枳實三稜莪朮下焦加青皮木香檳榔因怒者加山梔香附痞滿加黃連枳實痰盛加瓜蔞脅痛加青皮柴胡芍藥草龍膽刺痛加枳殼氣實加烏藥香附氣虛加參朮木香喜動心火加黃連怒動肝火加柴胡思動脾火加芍藥悲動肺火加黃芩恐動腎火加黃柏成郁不解者煎吞交感丹蘇子降氣湯治虛陽上攻氣不升降痰涎壅塞胸膈噎塞並年久肺氣至效川歸去頭甘草炙前胡去蘆厚朴薑製各五分肉桂少去皮陳皮去白各七分半半夏紫蘇子另研各一錢上切作一服加生薑三片水煎服虛冷人加桂五分黃耆一錢沉香降氣湯治陰陽壅滯氣不升降胸膈痞悶噫醋吞酸香附四兩砂仁五錢沉香四錢甘草炙一兩二錢上為細末每服二