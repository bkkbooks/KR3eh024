body:
  text: 卷六十一咳血嗽血咯血唾血論咳血者嗽出痰內有血唾血者鮮血隨唾而出咯血者咯出皆是血疙瘩丹溪云咳血痰盛身熱多是血虛用青黛瓜蔞仁訶子海石山梔為末薑汁蜜丸噙化嗽盛者加杏仁後以八物湯加減調理痰盛宜再加痰藥唾血出於腎亦有瘀血內積肺氣壅逼不能下降用天門冬知母貝母桔梗黃柏熟地黃遠志或加炮乾薑咯血用薑汁童便青黛入血藥中如四物湯地黃膏牛膝膏之類有咯出痰帶血絲者同治但宜加痰火藥痰涎血出於脾以葛根黃耆黃連芍藥當歸甘草沉香之類主之痰帶血絲用韭汁童便二物合和加鬱金末入內服之其血自消舌上無故出血如線用槐花炒為末摻之愈蔭按葉氏曰嗽血其因有二熱壅於肺者易治不過涼之而已久嗽損於肺者難治漸已成勞也熱嗽有血宜金沸草散加阿膠痰盛加瓜蔞貝母勞嗽有血宜補肺湯加阿膠白及嗽血而氣急者仍入杏仁如嗽痰中帶血絲者此是陰虛火動勞傷肺臟宜滋陰保肺湯李氏曰嗽痰帶血屬脾經虛者六君子湯加桑白皮黃芩枳殼五味子有火者加減逍遙散咳血屬肺火上升痰盛身熱者龍腦雞蘇丸雞蘇散滋陰降火湯古百花膏黃連阿膠丸虛者二陳芎歸湯八物湯或二陳湯加嫩桂枝桑白皮杏仁桔梗知母貝母阿膠生地黃山梔子蓋嫩桂枝能治上焦故也愈後調理玄霜膏咳血咽瘡者不治血隨唾出屬腎滋陰降火湯唾中紅絲乃是肺痿難治咯出血屑或帶紅絲如線為咯血有血在咽下咯不出者甚咯則有之者此精血竭也四物湯加竹瀝薑汁童便青黛或聖餅子地黃膏蓄血在上閉塞清道喜忘者犀角地黃湯脈法脈經曰吐血唾血脈滑小弱者生實大者死唾血脈堅強者生滑濡者死治咳嗽血方丹溪方治咳嗽痰血青黛瓜蔞仁去油訶子肉海粉去砂山梔子炒黑各等分咳甚加杏仁去皮尖後以八物湯加減調理上為末煉蜜同薑汁丸蔭按吳氏曰肺者至清之臟纖芥不容有氣有火則咳有痰有血則嗽青黛山梔所以降火瓜蔞海粉所以行痰訶子所以斂肺然而無治血之藥者火去而血自止也理也金沸草散治熱嗽有血旋覆花二錢前胡赤芍藥煨山梔桑白皮炒荊芥穗黃芩橘紅各一錢甘草五分加阿膠上銼水煎食遠服痰盛加瓜蔞貝母安嗽湯治咳嗽有血五味子十五粒茯苓陳皮知母川芎各一錢桑白皮麥冬去心各一錢二分馬兜鈴一錢半粉草五分上銼加烏梅一個去核水煎食遠服補肺湯治勞嗽有血人參麥冬去心各一錢二分五味子十五粒款冬花紫菀桑白皮炒各一錢當歸酒洗一錢半芍藥煨知母貝母茯苓橘紅各八分甘草五分上作一服水煎食遠服黃耆散治咳血成勞黃耆麥冬熟地砂仁炒桔梗白芍藥各五錢甘草炙四錢上㕮咀每服五錢水煎服五味子黃耆散治嗽咯血成勞眼睛疼四肢困倦腳腿無力麥冬熟地砂仁炒黃耆桔梗各半兩人參二錢白芍藥五味子各二分甘草一分上銼每服四錢水煎日三服云岐子芩散涼心肺解勞熱黃耆一兩白芍藥黃芩人參白茯苓麥冬桔梗生地黃各半兩酒洗上為粗末先用竹葉一握小麥七十粒水三盞生薑三片煎一盞半入藥末三錢煎七分溫服人參黃耆散治虛勞客熱肌肉消瘦四肢倦怠五心煩熱咽乾頰赤心忡潮熱盜汗減食咳嗽膿血人參桔梗各一兩秦艽茯苓鱉甲去裙酥炙各二兩黃耆三兩半紫菀柴胡各二兩半桑白皮半夏各一兩知母二錢半上為粗末每服五錢水煎服加減逍遙散治痰中見血白朮牡丹各一錢半當歸芍藥桃仁貝母各一錢山梔子黃芩各八分桔梗七分青皮五分甘草三分上作一服水煎服七傷散治勞嗽吐血痰黃藥子白藥子各一兩半赤芍藥七錢半知母元胡索當歸各半兩鬱金二錢半山藥乳香沒藥血竭各二錢上為末每服二錢茶湯調下一方紅花當歸煎湯本草云黃藥子白藥子治肺熱有功劫勞散治肺痿痰嗽痰中有紅線盜汗發熱熱過即冷飲食減少白芍藥六兩黃耆甘草人參當歸半夏白茯苓熟地砂仁炒五味子阿膠炒各二兩上㕮咀每服三錢加生薑三片棗二枚水煎溫服無時日三服陳日華云有女及笄病甚危一歲之間百藥無效偶得此方只一料除根滋陰保肺湯治陰虛火動勞傷肺臟嗽痰中帶血絲黃柏鹽水炒知母天冬去心阿膠蛤粉炒各一錢二分當歸一錢半芍藥煨生地黃橘皮桑白皮炒紫菀各八分五味子十五粒甘草五分上銼水煎服茯苓補心湯治心氣虛耗不能藏血以致面色黃瘁五心煩熱咳嗽唾血當歸一兩二錢白芍藥二兩熟地黃一兩五錢川芎人參白茯苓前胡半夏湯泡七次各七錢半紫蘇枳殼麩炒桔梗甘草炙陳皮乾葛各五錢上㕮咀每服四錢水一鍾加生薑三片棗一枚煎七分食後溫服人參芎當湯治虛勞少血津液內耗心火炎燥熱乘肺金咳嗽咯血及血不榮肌肉動輒毛寒咳嗽當歸川芎白芍藥各五錢人參半夏制橘紅阿膠炒赤茯苓細辛北五味甘草炙各二錢半上㕮咀每服八錢加生薑三片水煎食後溫服續斷散治骨蒸勞熱傳尸瘦病潮熱煩躁喘嗽氣急身疼盜汗兼治咳嗽唾膿血續斷紫菀桔梗青竹茹五味子各三錢生地酒炒桑白皮各五兩甘草炙二兩赤小豆半斤上銼每服三錢入小麥五十粒水煎日三服紫菀散治咳嗽唾血虛勞證肺痿變癰紫菀人參知母貝母桔梗甘草五味子茯苓阿膠上銼加生薑水煎服一方治嗽而痰內有血當歸芍藥知母桔梗麥門冬各一錢貝母一錢二分生地酒炒天花粉各一錢半茯苓八分甘草五分上㕮咀水煎食後服東垣方治痰帶血咳出白朮一錢半川歸芍藥牡丹皮各一錢梔子炒黑色七錢半桃仁另研麥門冬各五分甘草生三分上銼水煎溫服雞蘇散治勞傷肺經咳嗽有血雞蘇即薄荷黃耆生地酒炒阿膠珠貝母白茅根各一錢桔梗麥門冬蒲黃炒黑色甘草各五分上銼水煎服大阿膠丸治勞嗽及嗽血唾血阿膠微炒卷柏生地酒炒熟地砂仁炒乾山藥大薊獨根者曬乾雞蘇葉五味子各一兩柏子仁另研茯苓百部遠志人參麥門冬防風各半兩上為細末煉蜜丸如彈子大每服一丸煎小麥麥門冬湯嚼下雞蘇丸治虛熱昏冒倦怠下虛上壅嗽血衄血雞蘇葉八兩黃耆防風荊芥各一兩桔梗川芎甘草菊花生地黃各半兩片腦五分上為末煉蜜丸如彈子大每服一丸用麥門冬去心煎湯送下玄霜膏治吐血虛嗽神效烏梅汁梨汁柿霜白糖白蜜蘿蔔汁各四兩薑汁一兩茯苓末乳汁浸曬九次款冬花末各二兩紫菀末二兩上共入砂鍋內慢火熬成膏丸如彈子大臨臥含化一丸薏苡仁散治肺損嗽血薏苡仁不拘多少上研為細末以豶豬肺一個煮熟蘸藥食之丹溪方治嗽血吐血皆效用豬心一個竹刀批開入沉香末一錢大半夏七個紙包數重外以童子小便沃濕慢火煨熟去半夏吃之褚尚書方治咳血人溺一物飲之蔭按褚澄齊之聖醫也其遺書曰咳血不易醫喉不容物毫髮必咳血滲入喉愈滲愈咳愈咳愈滲飲溲溺則百不一死服寒涼則百不一生蔭用此方治咳血活者無算治咯唾血方聖餅子治咯血青黛一錢杏仁四十枚去皮尖以黃耆煎湯炒黃色上為末捏作餅子入柿餅內濕紙包裹煨連柿餅研細米飲調服恩抱散治咯血吐血唾血及煩躁咳嗽生蒲黃乾荷葉茅根各等分上為細末每服三分濃煎桑白皮湯食後溫服荷葉散治咯血荷葉不拘多少焙乾上為末米湯調服二錢匕又方治咯血及衄血白芍藥一兩犀角末二錢半上為末新汲水調服一錢匕血止為限又方治咯血桑白皮一錢半半夏炒陳皮生地酒炒知母貝母茯苓各一錢桔梗山梔各七分阿膠炒杏仁炒甘草各五分柳桂二分即桂之嫩小枝條也宜入治上焦上加生薑三片水煎服天門冬丸治吐血咯血大能潤肺止嗽天門冬一兩甘草白茯苓阿膠杏仁炒貝母各五錢上為末煉蜜丸如桐子大每服一丸熱津含化日夜可十丸黃連阿膠丸治嗽血唾血阿膠炒二兩黃連茯苓各三兩上黃連茯苓為末水熬阿膠膏搜和丸如桐子大每服三十丸米飲下千金方治上氣咳嗽喘息喉中有物唾血生薑汁杏仁各二升糖蜜各一升豬膏二合上五味先以豬膏煎杏仁色黃出之以紙拭令淨搗如膏和薑汁蜜糖等合煎令可丸每服如杏仁一枚日夜六七服漸次增加白扁豆散治久嗽咯血成肺痿及吐白涎胸膈滿悶不食扁豆生薑各半兩枇杷葉半夏人參白朮各一錢白茅根三錢上銼水三升煎一升去柤下檳榔末一錢和勻分四服不拘時候上二方用生薑多肺虛及汗多亡陽與便下血者忌用槐花散治咯血失血用槐花炒為末每服二錢糯米飲下仰臥白及散治咯血白及一兩藕節半兩上為細末每服一錢湯調服神效或云白及下咽至血竅則竅為及末填而血止也蔭按試血法吐在水碗內浮者肺血也沉者肝血也半浮半沉者心血也各隨所見以羊肺羊肝羊心煮熟蘸白及末日日食之若肺血以羊肺治余仿此紫光散咯血唾血出於腎此方主之紫菀知母熟地砂仁炒遠志去心麥門冬去心天門冬去心上銼水煎服加味小建中湯治痰涎中見血屬肝虛不能攝血者桂枝甘草炙各一錢白芍藥黃連阿膠炒各二錢大棗一枚生薑三片上銼水煎服保命生地黃散治痰涎血出生地酒洗熟地酒蒸枸杞子地骨皮天門冬黃耆白芍藥黃芩甘草各等分上銼每服一兩水煎服一方治咯血及痰中紅白朮牡丹皮各一錢半當歸芍藥桃仁研貝母各一錢山梔子炒黑黃芩各八分桔梗七分青皮五分甘草三分上銼水煎服丹溪方治痰中血白朮牡丹皮各一錢半貝母芍藥桑白皮山梔子炒黑桃仁另研各一錢甘草三分上銼水煎服又方治痰中血橘紅二錢半夏茯苓白朮枳殼桑白皮黃芩各一錢人參五分五味子十五粒甘草或加青黛五分上加生薑三片水煎服又方橘紅一錢半半夏茯苓牡丹皮貝母桃仁各一錢黃連七分甘草大青各五分加生薑三片水煎服
