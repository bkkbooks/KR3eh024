body:
  text: 卷四十七邪祟論丹溪曰血氣者身之神也神既衰乏邪因而入理或有之若夫血氣兩虛痰客中焦妨礙升降不得運用以致十二官各失其職視聽言動皆有虛妄以邪治之其人必死外臺祕要有禁咒一科乃移精變氣之小木耳可治小病而謂內有虛邪外有實邪率能治之乎俗云沖惡者謂沖斥邪惡鬼祟而病也如病此者未有不因血氣先虧而致者一少年暑旺月因大勞而渴恣飲梅漿又連大驚病似邪鬼脈虛弦而帶沉數數為有熱虛弦是驚又梅漿郁中脘補虛清熱導去痰滯乃可遂與參朮陳皮茯苓芩連入竹瀝薑汁旬日未效以前藥入荊瀝又旬日而安一人醉飽後病妄語妄見家人知其痰所為也灌鹽湯一大碗吐痰一二升大汗而愈一婦暑月赴筵坐次失序自愧成病言失倫脈弦數法當導痰清熱補脾其家不知用巫治之旬余而死此婦痰熱殆甚乃以法尺驚其神使血不安法水密其膚使汗不得泄不死何俟虞氏曰經云邪氣盛則實正氣奪則虛夫經之所謂邪者風寒暑濕燥火有餘之淫邪耳非若世俗所謂鬼神之妖怪也病有心虛驚惕如醉如癡如為邪鬼所附或陽明內實以致登高而歌棄衣而走皆痰火之所為實非邪祟之所迷也李氏曰視聽言動俱妄者謂之邪祟甚則能言平生未見聞事及五色神鬼此乃氣血虛極神光不足或挾痰火壅盛神昏不定非真有妖邪鬼祟大概內服傷寒瘟疫條人中黃丸照依氣血痰湯藥為使或單人中黃亦可服或單菖蒲末豬心血為丸服亦可有婦人夜夢鬼來交者定志丸料加赤小豆水煎服有婦人月水崩漏過多血氣迷心或産後惡露上衝而言語錯亂神志不守者此血虛神耗也宜安神膏但亦不可純服補心斂神藥血熱者小柴胡湯加生薑生地黃煎服百餘帖即安血迷心包逾牆上屋歌唱無時者逍遙散加遠志桃仁紅花蘇木服後病退用平胃散少用厚朴倍加蒼朮升麻常服以絶病根又男子挾瘀血者陶氏當歸活血湯有卒中死惡吐利如干霍亂狀或狂譫如醉人有起心先知其肇或已死口噤不開者急用傷寒門槌魂湯灌之即醒外用避邪丹灌鼻法治之無不愈者蔭按吳氏曰鬼疰是病人為邪鬼所憑而致疾也顏色不合於病者面生五色而含愧赦也聲音不合於病者語言不倫於理而涉幽微也形不合於病者動搖跳躍而無內熱也證不合於病者為患詭異不合於病情也脈不合於病者乍大乍小乍長乍短也凡此五者不必悉備但有一焉便為鬼疰即邪祟之謂也然人鬼異途不相為類鬼亦何樂於附人哉能引之以類則脫然含人而就鬼矣以死人枕煎湯飲之則鬼邪觸類而出大瀉數行愈此之謂病氣衰去歸其所宗脈法脈經曰脈乍疏乍數乍大乍小或促或結此邪脈也脈緊而急者遁尸脈訣舉要曰乍大乍小乍長乍短此皆邪脈神志昏亂治法辟邪丹治沖惡怪疾及山谷間九尾狐精為患人參茯神遠志鬼箭羽菖蒲九節者白朮蒼朮當歸各一兩雄黃辰砂各三錢另研桃奴即桃樹上不落干桃十二月收焙乾五錢牛黃麝香各一錢另研上為末酒糊為丸如龍眼大金箔為衣每一丸臨臥木香磨湯化下諸邪不敢近體更以絳紗囊盛五七丸懸床帳中尤妙桃奴丸治心氣虛怯有熱死注魘夢寐驚癇等證桃奴七個另研桃仁十四個另研辰砂另研烏犀角各五錢玳瑁另研琥珀另研雄黃桃葉煮水飛各三錢龍腦二錢另研牛黃另研麝香另研各一錢安息香一兩用無灰酒研飛上以安息香同桃仁琥珀共熬成膏和諸藥末為丸如雞頭實大陰乾每服一丸人參湯化下蘇合香丸古稱尸疰有五飛尸遁尸風尸沉尸注尸也此方治之第一兼治諸般怪疾白朮炒青木香烏犀角香附子炒去毛丁香硃砂訶黎勒煨去皮白檀香麝香蓽撥沉香各二兩龍腦研熏陸香另研各一兩蘇合香油一兩入安息香膏內安息香另為末用無灰酒一升蒸為膏上為末和勻用安息香並煉蜜丸如桐子大每服四丸空心溫水化下酒服亦可或作圓眼核大以黃蠟包裹亦可茯神散治婦人心虛與鬼交通妄有所見聞言語雜亂茯神一錢半茯苓人參菖蒲各一錢赤小豆五分上㕮咀作一服水煎食前服外用辟邪祛之還魂丹治中惡已死麻黃三錢桂枝二錢杏仁十二粒上作一服水煎灌下即醒八毒赤丸治鬼疰病脈中乍大乍小乍短乍長血氣不勻邪傷正氣雄黃礜石一方礬石硃砂附子炮藜蘆牡丹皮巴豆各一兩蜈蚣一條上為末煉蜜丸如小豆大每服五七丸冷水送下無時服後利下清黃涎水仍以別藥調理此藥可謂如神合時宜齋戒沐浴淨室修合一人宿驛中夜夢一婦人用手脅下打一拳遂一點痛往來不止兼之寒熱而不能食乃鬼擊也服三粒明旦下清水二斗立效一人晝臥廟中夢得一餅食之遂病心腹痞滿飯食減少一載有餘漸漸瘦弱腹脹如蠱服此五七丸下清黃涎鬥余漸愈蒼朮丸治邪祟蒼朮制過上為末丸如桐子大硃砂為衣每五十丸硃砂湯下日三次效一法單于病人房燒蒼朮其邪自走去矣灌鼻法用皂角以漿水浸春秋四日夏二日冬七日去渣熬膏取出攤紙上陰乾收貯用時以水化開灌入病人鼻內良久涎出為效如欲涎止服溫鹽湯一二口即止半夏散治魘死不還用半夏為末吹入鼻中即醒死人枕煎治病人顏色聲音形證與脈不合於病者名曰鬼疰宜此方治之死人枕即死人腦後骨也得半朽者良煎湯服之用畢仍以其枕送還原處獺肝散葛洪云鬼疰是五尸之一其病變動有若干種大略使人寒熱淋瀝沉沉默默不得知所苦無處不惡積年纍月漸就沉滯以至於死傳於旁人乃至滅門覺如是候者急以此治之用獺一具陰乾杵為末每服方寸匕日三服未止再服肘後亦云此方神良獺爪屑許學士本事方云宣和間天慶觀一法師行考召極精嚴時一婦人投狀率患人所附須臾召至附語云非我為患別是一鬼亦因病人命衰為祟耳今已成形在患人肺中為蟲食其肺系故令吐血聲嘶師掠之曰此蟲還有畏忌否久而無語再掠之良久云容某説惟畏獺爪屑為末酒調服之則去矣患家如其言而得愈此豫所目見者也秦承祖灸鬼法治一切驚狂譫語逾垣上屋罵詈不避親疏等證以病者兩手大拇指用細繩縛系定以大艾炷置於其中兩介甲及兩指角肉四處著火一處不著即無效灸七壯神驗丹溪云一婦人如癇或作或輟恍惚不省人事一日略蘇醒診視間忽聞床上有香氣繼又無所知識此氣因血虛亦從而虛邪因虛入理或有之遂以秦承祖灸鬼法灸治病者哀告曰我自去我自去即愈
