body:
  text: 卷一上中風論中風形狀之異黃帝問曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其病各異其名不同或內至五臟六腑不知其解願聞其說岐伯對曰風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰食飲其熱也則消肌肉故使人怢栗而不能食名曰寒熱怢陀骨切音突忽忘也栗懼也卒振寒貌風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣與太陽俱入行諸脈腧風由太陽經入者自背而下凡臟腑之腧皆附焉故邪必行諸脈腧散於分肉之間與衛氣相干其道不利故使肌肉僨䐜昌真切音嗔肉脹起也而有瘍衛氣有所凝而不行故其肉有不仁也癘者有榮氣熱胕腐同其氣不清故使其鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風或名曰寒熱風寒客於血脈久留不去則榮氣化熱皮膚胕潰氣血不清敗壞為病故脈要精微論曰脈風成為癘也以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風此明風邪內至五臟也風中五臟六腑之腧亦為臟腑之風各入其門戶所中則為偏風風氣循風府而上則為腦風風入系頭則為目風眼寒飲酒中風則為漏風入房汗出中風則為內風新沐中風則為首風久風入中則為腸風飧泄外在腠理則為泄風自上文風氣循風府而上至此共七種所以明或有風也故有其病各異其名不同之義故風者百病之長也至其變化乃為他病也無常方然致有風氣也無常方然者言變化之多而其致之者則皆因於風氣耳帝曰五臟風之形狀不同者何願聞其診及其病能凡察病之法皆謂之診凡致病之害皆謂之能岐伯曰肺風之狀多汗惡風色皏皏普硬切烹上聲淺白也然白時咳短氣晝日則瘥暮則甚診在眉上其色白心風之狀多汗惡風焦絶唇舌焦燥津液干絶善怒嚇驚也赤色病甚則言不可快診在口兼唇而言其色赤肝風之狀多汗惡風善悲氣並於肺則悲肝病而肺氣乘之故善悲色微蒼嗌音益干善怒時憎女子診在目下其色青脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃腎風之狀多汗惡風面厖莫江切音忙浮慘貌然浮腫脊痛不能正立其色炱隱曲隱曲陰道也不利診在肌上肌肉本主於脾今其風水合邪反侮乎土故診在肌上其色黑胃風之狀頸多汗惡風食飲不下膈塞不通腹善滿失衣則䐜脹食寒則泄失衣則陽明受寒於外故為䐜脹食寒則胃氣受傷於內故為泄瀉診形瘦而腹大此下當洋明六腑之病而止言胃風者以胃為六腑之長即如本輸篇所謂大腸小腸皆屬於胃之意胃病則腑在其中矣首風之狀首為諸陽之會因沐中風頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈凡患首風者止作無時故凡於風氣將發必先風一日而病甚頭痛以陽邪居於陽分陽性先而速也先至必先衰是以至其風日則病少愈內謂房室之內不可出者畏風寒也漏風之狀漏風之病因於飲酒中風或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事泄風之狀泄風者表不固也多汗汗出泄衣上口中乾上漬前知切身半以上汗多如漬其風不能勞事身體盡痛則寒帝曰善樓氏曰上五臟風證多汗惡風其治法用仲景桂枝湯之類孫真人皆灸本臟背腧兼用續命湯治之腧春遇切音戍五臟腧穴千金云岐伯中風大法有四一曰偏枯半身不遂二曰風痱於身無痛四肢不收三曰風懿奄忽不知人四曰風痹諸痹類風狀選要云風之為病種類甚多大要有四一曰偏枯謂血氣偏虛半身不遂肌肉枯瘦骨間疼痛二曰風痱謂神智不亂身體無痛四肢不舉一臂不遂三曰風懿謂忽然迷僕芳故切音赴僵也僵也舌強不語喉中窒塞噫噫有聲四曰風痹謂風寒濕三氣合而為痹其人身頑肉厚不知痛癢風多則走注寒多則疼痛濕多則重著在筋則筋屈而不伸在脈則血凝而不流在肉則不仁在骨則隆重是也綱目曰仲景云風之為病當半身不遂或但臂不遂者此為痹脈微而數中風使然無擇諸方論中所謂左癱右瘓者蓋邪氣中人邪氣反緩正氣即急正氣引邪喎空媧切音跬口戾不正也僻不遂也風懿者以心悶閉不能言但噫噫音醫痛傷之聲也作聲蓋肺氣入心則能言邪氣中心肺涎徐延切潮塞故使然也四肢緩縱為風痱者以風邪散注於關節氣不能行故使四肢不遂也舌強不能言者以風入心脾經心之別脈繫於舌本脾之脈連舌本散舌下今風邪入其經絡故舌不轉而不能言也四肢拘攣者以中風冷邪氣入肝臟使諸經攣急屈而不伸也風柔者以風熱入於肝臟使諸經張緩而不收也故經曰寒則攣急熱則弛張風顫音戰者以風入於肝臟經絡上氣不守正位故使頭招面搖手足顫掉也風喑音音者以風冷之氣客於中滯而不能發故使口噤而不能言也與前所謂涎塞心肺同候此以口噤為差耳腲塢賄切舒遲貌腿風者半身不遂失音不語臨事不前亦偏中於心肺經所致也李氏曰風為百病長善行數變為卒中昏倒為竄視喎僻為搐搦反張或為寒中或為熱中或為癘風入陽經則狂入陰經則顛入皮膚則癢入筋則拘攣入骨節則疼痛入肉分與衛氣相搏則不仁與榮氣相搏則半身不遂入經癱瘓入絡膚頑入腑即不識人入臟即舌強吐沫挾熱則痿緩挾寒則拘攣挾濕則腫滿有真中者有兼中似中者陽病身熱陰病身涼烏附行經不可概用論風分在腑在臟在經淺深之異要略云風之為病當半身不遂經絡空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁在經即重不勝邪入腑則不識人入臟即難言口吐涎樓氏綱目曰靈樞經云虛邪偏客於身半其入深內居榮衛榮衛稍衰則真氣去邪氣獨留發為偏枯故其邪氣淺者脈偏痛又云偏枯身偏不用而痛言不變志不亂病在分腠之間巨針取之巨針大針也靈樞九針十二原篇第九針曰大針尖如挺其鋒微圓以瀉機關之水也益其不足損其有餘乃可復也痱之為病也痱猶言廢也身無痛者四肢不收上言身偏不用而痛此言身不知痛而四肢不收是偏枯痱病之辨也志亂不甚其言微知可治甚則不能言不可治也此內經論中風之淺深也其偏枯身偏痛而言不變志不亂者邪在分腠之間即仲景東垣所謂邪中腑是也痱病無痛手足不收而言喑智亂者邪入干里即仲景東垣所謂邪中臟是也張潔古云風者百病之始善行而數變行者動也風本為熱熱勝則風動宜以靜勝其躁養血是也治須少汗亦宜少下多汗則虛其衛多下則損其榮汗下各得其宜然後可治其在經雖有汗下之戒而有中臟中腑之分中腑者宜汗之中臟者宜下之此雖合汗下亦不可過也仲景云汗多則亡陽下多則亡陰亡陽則損氣亡陰則損形故經言血氣者人之神不可不謹養也初謂表裡不和須汗下之表裡已和是宜治之在經也其中腑者面顏顯五色有表證而脈浮惡風惡寒拘急不仁或中身之後或中身之前或中身之側皆曰中腑也其病多易治其中臟者唇吻不收舌不轉而失音鼻不聞香臭耳聾而眼瞀大小便祕結皆曰中臟也其病多難治若風中腑者先以加減續命湯隨證發其表如兼中臟則大便多祕結宜以三化湯通其滯表裡證已定別無變端後以大藥和而治之大抵中腑者多著四肢中臟者多滯九竅雖中腑者多兼中臟之證至於舌強失音久服大藥能自愈也李東垣云風中血脈則口眼喎斜中腑則肢節廢中臟則性命危此三者治各不同如中血脈外有六經之形證則從小續命湯加減及疏風湯治之如中腑內有便溺之阻隔宜三化湯或局方中麻仁丸通利之外無六經之形證內無便溺之阻隔宜養血通氣大秦艽湯羌活愈風湯治之中臟痰涎昏冒宜至寶丹之類鎮墜若中血脈中腑之病初不宜用腦麝牛黃為麝香入脾治肉牛黃入肝治筋龍腦入腎治骨恐引風深入骨髓如油入面莫之能出又不可一概用大戟芫花甘遂瀉大便損其陰血則真氣愈虛潔古言中臟者大小祕結東垣言中腑者有便溺阻隔二說當以東垣為主蓋大小祕結不中臟者亦有之中臟者亦有大小便不祕結者也劉宗厚曰此分在裡在經之三證立汗下調養之三法可謂開後學之盲聾但所用諸方學者宜詳審之薛立齊曰中風者即內經所謂偏枯風痱風懿風痹是也而有中腑中臟中血脈之分焉夫中腑者為在表中臟者為在裡中血脈者為在中在表者宜微汗在裡者宜微下在中者宜調榮中腑者多著四肢如手足拘急不仁惡風寒此數者病淺皆易治用加減續命湯之類中臟者多滯九竅如眼瞀者中於肝舌不能言者中於心唇緩便祕者中於脾鼻塞者中於肺耳聾者中於腎此數者病深多難治中血脈者外無六經之證內無便溺之阻肢不能舉口不能言用大秦艽湯主之中腑者多兼中臟如左關脈浮弦面目青左脅偏痛筋脈拘急目瞤音純頭目眩手足不收坐踞不得此中膽兼中肝也用犀角散之類如左寸脈浮洪面赤汗多惡風心神顛倒言語謇澀舌強口乾忪音忠驚也悸恍惚此中小腸兼中心也用麻黃散之類如右關脈浮緩或浮大面唇黃汗多惡風口喎語澀身重怠惰嗜臥肌膚不仁皮肉瞤動腹脹不食此中胃兼中脾也用防風散之類如右寸脈浮澀而短面色白鼻流清涕多喘胸中冒悶短氣自汗聲嘶四肢痿弱此中大腸兼中肺也用五味子湯之類如左尺脈浮滑面色黧黑腰脊痛引小腹不能俯仰兩耳虛鳴骨節疼痛足痿善恐此中膀胱兼中腎也用獨活散之類此皆言真中風也其間亦有氣血之分焉蓋氣虛而中者由元氣虛而賊風襲之則右手足不仁用六君子湯加鉤藤薑汁竹瀝血虛而中者由陰血虛而賊風襲之則左手足不仁用四物湯加鉤藤竹瀝薑汁氣血俱虛而中者則左右手足皆不仁也用八珍湯加鉤藤薑汁竹瀝樓氏曰中風世俗之稱也其證卒然仆倒口眼喎邪半身不遂或舌強不言唇吻不收是也然名各有不同其卒然仆倒者經稱為擊僕世又稱為卒中乃初中風時如此也其口眼喎邪半身不遂者經稱為偏枯世又稱為左癱右瘓及腲腿風乃中倒後之證邪之淺者如此也其舌強不言唇吻不收者經稱為痱病又稱為風懿風氣亦中倒後之證邪之深者如此也東垣以邪淺為中脈中腑而易治邪深為中臟而難治者得之矣凡病偏枯必先仆倒故內經連名稱為擊僕偏枯也後世迷失經意以偏枯痱病之旨一以中風名之遂指偏枯為枯細之枯而非左癱右瘓之證習俗之弊至於如此也殊不知仲景云骨傷則痿名曰枯蓋痿緩不收則筋骨肌肉無氣以生脈道不利手足不稟水穀之氣故曰枯非細之謂也或積日纍月漸成細者間有之非可便指枯為細也論中風要分陰陽準繩云陰中顏青臉白痰厥喘塞昏亂眩暈喎斜不遂或手足厥冷不知人多汗陽中臉赤如醉怒牙關緊急上視強直掉眩素問云諸風掉眩肢痛強直筋縮為厥陰風木之氣自大寒至小滿風木君火二氣之位風主動善行數變木旺生火風火屬陽多為兼化且陽明燥金主於緊斂縮徑風木為病反見燥金之化由亢則害承乃制謂己過極則反似勝己之化故木極似金況風能勝濕而為燥風病勢甚而成筋縮燥之甚也論中風肺肝二經居多葉氏曰風之中人雖曰五臟六腑俱受然惟肺肝二經居多蓋風邪之入由於皮毛之虛皮毛者肺之合也皮毛受邪則內客於肺肝主筋屬東方風木氣之相感以類而從故風邪乘虛肝臟先受則筋緩不榮所以有喎斜癱瘓之狀也論風非外來乃本氣病發明曰經曰陽之氣以天地之疾風名之此中風者非外來風邪乃本氣病也凡人年逾四旬氣衰之際或因憂喜忿怒傷其氣者多有此疾壯盛之時無有也若肥盛則間有之亦是形盛氣衰而如此治法當和臟腑通經絡便是治風然亦有邪風襲虛傷之者也治法輕重有三見前分在經在腑在臟之異準繩云卒僕偏枯之證雖有多因未有不因真氣不周而病者故黃耆為必用之君藥防風為必用之臣藥黃耆助真氣者也防風載黃耆助真氣以周於身者也亦有治風之功焉許學士治王太后中風口噤煎二藥熏之而愈況服之乎多怒加羚羊角渴加葛根汁秦艽口噤口喎亦加秦艽恍惚錯語加茯神遠志不得睡加炒酸棗仁不能言加竹瀝荊瀝梨汁陳醬汁生葛汁人乳汁內熱加梨汁人乳汁生地黃汁痰多加竹瀝荊瀝少佐以薑汁蔭按每治此證用諸汁以取奇功為其行經絡滲分肉捷於湯散故也論中風先調氣東垣曰中風為百病之長乃氣血閉而不行此最重疾凡治風之藥皆辛溫上通天氣以發生為體是元氣始出地之根蒂也嚴用和云人之元氣強壯榮衛和平腠理密緻外邪焉能為害或因七情飲食勞役致真氣先虛榮衛空疏邪氣乘虛而入故治此病若內因七情而得者法當調氣不當治風外因六淫而得者亦當先調氣後依所感六氣治之此良法也宜八味順氣散蔭按劉宗厚曰此說真氣先虛榮衛空疏邪氣乘虛而入擴前人所未發但既曰虛矣邪又入矣補虛散邪理所當然而止曰調者意其謂因病而起氣壅不通調使通暢調達則真氣自復邪氣自行之義惜乎不能詳也況中風治法豈止一端而已治風先順氣和血戴復庵云治風之法初得之即當順氣及其久也即當活血久患風疾四物湯吞活絡丹愈者正是此義若先不順氣遽用烏附又不活血徒用防風天麻羌活輩吾未見其能治也然順氣之藥則可破氣瀉氣之藥則不可葉氏曰治痰先治氣氣順則痰利治風先治血血行風自滅人知痰之盛而不知氣之逆人知風之作而不知血之滯順氣活血斯得病情矣若初不順氣遽用烏附又不養血徒用防麻吾未見有能愈者也論風本於熱劉河間云風病多因熱盛俗云風者言末而忘其本也所以中風而有癱瘓諸證者非謂肝木之風實甚而卒中之也亦非外中於風良因將息失宜而心火暴甚腎水虛衰不能制之則陰虛陽實而熱氣怫音怫郁也郁心神昏冒筋骨不為用而卒倒無所知也多因喜怒思悲恐之五志有所過極而卒中者皆為熱甚故也所謂肥人多中風者肥則腠理致密而多鬱滯氣血難以通利若陽熱又甚而鬱結甚故多卒中也其瘦者腠理疏通而多汗泄血液衰少而為燥熱故多有勞嗽之疾也然肥人反勞者由暴然亡液損血過極故也瘦人反中風者由暴然陽熱太甚而鬱結不通故也若微則但僵仆氣血流通筋脈不攣緩者發過如故或熱氣太甚鬱滯不通陰氣暴絶陽氣後竭而死痰涎者由熱甚則水化制火而生偏枯者與經絡一偏相同否者痹而癱瘓也口噤筋急者由風熱太甚以勝水濕又津液滯於胸膈以為痰涎則筋太燥然燥金主於收斂徑切故也或筋反緩者乃燥之甚血液衰少也諸筋攣易愈諸筋痿難復以燥之微甚也準繩云有熱盛生風而為卒僕偏枯者以麻桂烏附投之則殆當以河間法治之紺珠經云以火為本以風為標心火暴甚腎水必衰肺金既摧肝木自旺治法先以降心火為主或清心湯或瀉心湯大作劑料服之心火降則肝木自平矣次以防風通聖散汗之或大便閉塞三化湯下之內邪已除外邪已盡當以羌活愈風湯常服之宣其氣血導其經絡病自已矣或舌謇不語者轉舌膏或活命金丹以治之此聖人心法也或有中風便牙關緊急漿粥不入急以三一承氣湯灌於鼻中待藥下則口自開矣然後按法治之論東南多屬濕痰丹溪曰真中風邪者東垣中血脈中腑中臟之說甚好子和三法亦可治諸書只謂外中風邪惟劉河間作將息失宜水不制火極是然地有不同西北人外中者亦有東南人只是濕土生痰痰生熱熱生風也局方本為外感立方而以內傷熱證混同出治其害匪輕大率主血虛有痰或挾火與濕治法以痰為先補養次之又須分氣虛血虛氣虛卒倒參耆湯補之有痰則濃煎參湯加竹瀝薑汁血虛四物湯補之俱用薑汁炒過有痰再加竹瀝薑汁能食者去竹瀝加荊瀝半身不遂大抵多痰在左屬死血與瘀血宜四物湯加桃仁紅花竹瀝薑汁在右屬痰有熱並氣虛宜二陳湯四君子等湯加竹瀝薑汁肥白人多濕少用烏頭附子行經凡用烏附必用童便煮過以殺其毒瘦人陰虛火熱用四物湯加牛膝竹瀝黃芩黃柏有痰者加痰藥治痰氣實而能食用荊瀝氣虛少食用竹瀝此二味開經絡行血氣故也入四物湯必用薑汁助之治風用汗吐下三法張子和曰諸風掉眩皆屬肝木掉搖眩暈目喎筋急手搐瘛瘲音熾縱癇病皆厥陰肝木之用也經云風淫所勝平以辛涼世何以熱藥治風耶豫治驚風癇病屢用汗吐下三法隨治愈木鬱達之者吐之令其條達也汗者風隨汗出也下者推陳致新也失音悶亂口眼喎斜可用三聖散吐之始牙關緊急鼻內灌之吐出涎口自開也次用通聖散涼膈散大人參半夏丸甘露飲除熱養液之寒藥排而用之劉云按此法的系邪氣卒中痰涎壅盛實熱者可用否則不敢輕易也丹溪云治中風方續命排風越婢等悉能除去而千金多用麻黃令人不得慮虛以風邪不得汗則不能泄也然此治中風不汗者為宜若自汗者更用麻黃則津液轉脫反為大害中風自汗仲景雖處以桂枝湯至於不住發搐口眼瞤動遍身汗出者豈勝對治此時獨活湯續命煮散能復榮衛卻風邪不可卻也凡中風年老虛弱者不可吐氣虛卒倒者不可吐集略論曰夫風乃六淫中之一天之邪氣人在氣中形虛者即感之傷之中之皆自外而入者也古人用藥皆是發散表邪之劑以其自表而入亦當自表而出也至於東垣分在經在腑在臟而有汗下調養之法可謂詳備若劉河間以為熱甚制金不能平木或濕土過甚反兼木化皆非外中於風乃因內熱而生丹溪謂數千年得經意者河間一人耳由是觀之若病由風邪而得元氣壯實者當從古方發散例但用藥不宜小續命湯須分所挾有寒熱溫涼之異受邪有臟腑經絡之殊若病因內熱而生者當從河間之論不當如子和專以汗吐下為法蓋病有虛實難以概論內經之法風淫於內治以辛涼可清熱退風開結滯散鬱閉使宣通而愈勿用金石大熱之劑如初得風覺牙關緊急不省人事寸脈滑實而痰盛按法吐去風痰待牙關活動進調蘇合香丸即醒氣血虛者又非所宜令氣少順分表裡虛實行汗下吐三法仍分服清心降火若邪在表身熱惡寒脈浮數無汗通聖散加全蠍治之若裡虛便利不渴脈沉弱自汗通聖散去芒硝大黃加天麻全蠍川烏無熱者小續命湯主之用麻黃黃連能解表癱瘓日久宜鐵彈丸治之亦可通經絡也諸風淺者宜散風之藥通聖散排風湯調之寒氣盛者以烏藥順之劉宗厚又謂通聖涼膈甘露飲之劑惟痰涎壅盛實熱者可用否則不可輕易也諸風藥無定式弱者宜耳垂下灸三壯兼以萆麻之膏貼之凡病之作多發於每年十二月大寒終氣之後及己亥之月厥陰肝木主事之時故風木甚者必待此三時而作也發明云治風當通因通用惟宜宣發以散之不可便以苦寒之藥妄下及龍麝硃砂牛黃諸鎮墜之藥瀉之須慎之蔭按此言風本外邪惟宜宣散此風在表之時也如傷寒中風傳入於胃亦未嘗不可用論中便字妄字可見其意便者有早與急之義妄者謂有不當下之義治風分內外補瀉葉氏曰此證外感內傷相兼而成者也至於仲景無擇思邈則專主外感河間東垣丹溪則專主內傷內傷者未必不由外邪侵侮而作外感者未必不本體虛榮衛失調所致今詳邪淺者宜先瀉外感為主補內傷佐之邪深者宜補內傷為主瀉外感佐之或先散外邪而後調補或先補內傷而後宣解全在活法量標本輕重施治也繼而王安道論中風分真中類中恐人一以風為外邪故將三子所因而分真類之目固可使人易知殊不知類之一字原有本病之名而特以外形相似他病故可言類如中寒中暑是也若以昔人論風為真中風而以河間主火東垣主氣丹溪主濕為類中風恐為不然蓋昔人論中風者言其證也三子論中風者言其因也知乎此則中風之候詳且明矣愚故曰外感內傷相兼而成或相因而為病豈可以中風一證而歧為二哉治風分前後緩急李氏曰風證皆痰為患故治以開關化痰為先急則祛風緩則順氣久則活血如真氣漸復痰飲漸消或有風邪未退羌活愈風湯調之實者川芎茶調散虛者萬寶回春湯未可全以風治也治風須藥灸取效本事方云凡中風續命排風風引竹瀝諸湯及神精丹茵芋酒之類更加以灸無不愈者然此病積聚之久非一日所能攻皆大劑久而取效唐書載王太后風喑不語醫者蒸黃耆防風湯數斛以熏之得瘥蓋此類也今人服三五盞求效則責醫也亦速矣孟子曰七年之病必求三年之艾久而後知爾肘後方云凡治中風莫如續命之類然此可扶持初病若要收全功火艾為良中風皆因脈道不利血氣閉塞也灸則喚醒脈道而血氣得通故收全功論中風不當與痿證同治丹溪曰今世所謂風病大率與諸痿證混同論治由局方多以治風之藥通治痿也古聖論風痿各有條目源流不同治法亦異夫風病外感善行數變其病多實發表行滯有何不可局方治風之外又歷述神魂恍惚起便須人手足不遂神志昏憒癱瘓嚲同疸音壇曳手足筋衰眩暈倒僕半身不遂腳膝軟弱四肢無力顫掉拘攣不語語澀諸痿等證悉皆治之不思諸痿皆起於肺熱傳入五臟散為諸證其昏惑瘛瘲瞀悶瞀昧暴病鬱冒矇昧暴喑瘛昧皆屬於火曰四肢不舉舌本強足痿不收痰涎有聲皆屬於土悉是濕熱之病當作諸痿論治若以外感風邪治之能免實實虛虛之過乎若夫岐伯仲景孫思邈之言風大意專指外感劉河間之言風明指內傷熱證實與痿證所言諸痿生於熱相合外感之邪有寒熱虛實而挾寒者多內熱之傷皆是虛證無寒可散無實可瀉局方本為外感立方而以內傷熱證混同一治其為害也似非細故樓氏曰丹溪之論蓋因局方治中風猛浪用發表行濕之藥戕賊血氣誅伐根本不知補養之法故引痿病以救局方之失而其言如此然局方所述中風手足不遂起便須人神魂恍惚不語語澀等證即內經熱病相同至於異處不得不察針經刺節真邪云真氣去邪獨留發為偏枯痿論云陽明虛則宗筋縱前陰所聚之筋為諸筋之會帶脈不引而足痿不用帶脈起於季脅圍身一周陽明虛則血氣少不能潤養宗筋故至弛縱宗筋縱則帶脈不能收引故足痿不為用也由是知手足不遂者在偏枯則手足為邪氣阻塞脈道而然在痿病則陽明虛宗筋縱帶脈不引而然也痱病有言變志亂之證痿病則無之也痱病又名風痱而內傷外感兼備痿病獨得於內傷也痱病發於擊僕之暴痿病發於怠惰之漸也凡此皆明痱與痿明是兩疾也論風有真中兼中似中李氏曰西北風高多真中宜分治之東南地濕多兼中似中須審虛實治之河間主火東垣主氣丹溪主濕三子所主雖殊而實同也況濕則中氣不運而生痰痰因火動而生風又兼二子之見也兼中者東垣所謂非外邪徑傷乃本氣病也有醉後當風頭面多汗善渴者名曰漏風宜黃耆六一湯加參朮牡蠣乾葛有房勞中風下體多汗曰內風十全大補湯加附子防風如入風府曰腦風入系頭曰目風在腠理為泄風與漏風同但身盡疼耳久則為腸風食後曰胃風又名夾食中風久則為下血舊以西北風高真中宜分臟腑經絡調治東南地濕兼中似中宜分氣血虛實痰火多少調治然真中兼中南北互有且治臟腑者可不分氣血之虛實乎治氣血者又可不分臟腑經絡之邪多少乎大抵外感重而內傷輕者先須分表裡法祛風為主次用氣血痰法調治內傷重而外感輕者先用調補氣血痰法為主次分臟腑經絡祛風此活法也論類中風諸證劉宗厚曰按經云風之傷人也為病善行而數變變至他證之類故為治不得其病情者往往或以風為他證或以他證為風皆不免乎得失之誚惟近代河間東垣丹溪諸先生者出始論他證之非中風治法當異此又盧氏治例可謂深達病情之機者即河間所論五志過極為病之例非真中風也而王安道又曰人有卒暴僵仆或偏枯或四肢不舉或不知人或死或不死者世以中風呼之而方書亦以中風治之因嘗考諸內經論風為諸證其卒暴僵仆不知人四肢不舉者並無所論止有偏枯一語而已及觀千金方則皆引岐伯之旨金匱要略略具脈證邪在絡在經在腑在臟之異由是觀之則卒暴僵仆不知人偏枯四肢不舉等證固為因風而致者矣乃用大小續命西州續命排風八風等諸湯散治之及近代河間東垣丹溪三子者出始與昔人有異河間主於火東垣主於氣丹溪主於濕反似風為虛象而大異於昔人矣籲昔人之與三子者果孰是歟果孰非歟若以三子為是則三子未出之前固有從昔人而治愈者矣以昔人為是則三子已出之後亦有從三子而治愈者矣故不善讀書者往往不得其奧以余觀之昔人與三子之論皆不可偏廢但三子以類乎中風之病視為中風而立論故使後人疑惑而不能決殊不知因於風者真中風也因火因氣因於濕者類中風而非中風也三子所論者自是因火因氣因濕而為暴病暴死之證與風何相干哉如內經所謂三陰三陽發病為偏枯痿痹四肢不舉亦未嘗必因於風而後能也夫風火氣濕之殊望聞問切之間豈無所辨乎辨之為風則從昔人以治辨之為火氣濕則從三子以治如此庶乎析理明而用法當矣惟其以因火因氣因濕之證分而出之則真中風病彰矣所謂西北有中風東南無中風者其然歟否歟斯辨諸子所論名實相紊而不明真中風之異可謂真切又何疑丹溪東南無中風之語哉夫風者天地之大氣也五運之造化四時之正令耳上下八方無所不至者且人在氣中形虛者即感之傷之中之有輕重不同實八風虛實之異耳矧有痿濕火熱痰氣虛諸證而似中風故古今治例不一是以徐先生折衷諸經之旨辨以上諸證不得與中風同治又豈惟三子所論哉然王氏以擴充其例因有是辨亦不害其為叮嚀也李氏曰有五痹類風狀如中暑中寒中濕痰厥氣厥食厥熱厥虛暈等證皆卒倒不語但風必有歪斜搐搦之證為異雖內傷兼中亦然但風癔風痱偏枯痹風四證見一便作風治惟有輕重緩急之分輕者發過如故或口舌無恙手足顫拽者大省風湯加人參沒藥等分水煎服得汗即愈或四肢無恙口喎語澀者古防風湯入麝一釐調服或自醒能言能食惟身體不遂者地仙丹薛氏曰與中風相類者則有中寒中暑中濕中火中氣食厥勞傷房勞等證如中於寒者謂冬月卒中寒氣昏冒口噤肢攣惡寒脈浮緊用麻黃桂枝理中湯之類中於暑者謂夏月卒冒炎暑昏冒痿厥吐瀉喘滿用十味香薷飲之類中於濕者丹溪謂東南之人因濕土生痰痰生熱熱生風也用清燥湯之類加竹瀝薑汁中於火者河間所謂非肝木之風內中六淫之邪外侵良由五志過極火盛水衰熱氣拂鬱昏冒而卒僕也用六味丸四君子獨參湯之類內有恚胡桂切音慧恨也怒傷肝火動上炎者用柴胡湯之類中於氣者由七情過極氣厥昏冒或牙關緊急用蘇合香丸之類誤作風治者死食厥者過於飲食胃氣自傷不能運化故昏冒也用六君子加木香勞傷者過於勞役耗損元氣脾胃虛衰不任風寒故昏冒也用補中益氣湯房勞者因腎虛精耗氣不歸源故昏冒也用六味丸此皆類中風者也夫內經主於風河間主於火東垣主於氣丹溪主於濕愚之斯論僭補前人之闕也若夫地之南北人之虛實固有不同大略相似當隨變治之論勞傷似中風準繩云有元氣素弱或過於勞役或傷於嗜欲而卒然厥僕狀類中風者手必散口必開非大劑參耆用至斤許豈能回元氣於無何有之鄉哉亦有不僕而但舌強語澀痰壅口眼喎斜肢體不遂者作中風治必殆以六君子湯加諸汁治之論內因似中風盧砥鏡曰經云神傷于思慮則內脫意傷於憂愁則肢廢魂傷於悲哀則筋攣魄傷於喜樂則皮槁志傷於盛怒則腰脊難以俯仰也何侍郎有女適夫夫早世女患十指拳攣掌垂莫舉膚體瘡瘍栗栗然湯劑雜進飲食頓減幾於半載適與診之則非風也正乃憂愁悲哀所致耳病屬內因於是料內因藥仍以鹿角膠輩多用麝香熬膏貼痿垂處漸得掌能舉指能伸病漸近安論濕病似中風元戎云酒濕之為病亦能作痹證口眼喎斜半身不遂渾似中風舌強不正當瀉濕毒不可作風病治之而汗也衍義論甚當易簡所言與此相同論中氣似風許學土云世言氣中者雖不見於方書然暴怒傷陰暴喜傷陽憂愁不已氣多厥逆往往得此病便覺涎潮昏塞牙關緊急若便作中風用藥多致殺人惟宜蘇合香丸灌之便醒然後隨寒熱虛實而調之無不愈者經云無故而喑脈不至不治自己謂氣暴逆也氣復則已審如是則不服藥自可劉宗厚曰按氣中之說即七情內火之動氣厥逆由其本虛故也用蘇合香丸通行經絡其決裂之性如摧枯拉朽恐氣血虛者非所宜也後云不治自復之意蓋警用藥之失實勝誤於庸醫之手也準繩云中氣因七情內傷氣逆為病痰涎昏塞牙關緊急七情皆能為中因怒而中者尤多大略與中風相似風與氣亦自難辨風中身溫氣中身冷風中多痰涎氣中無痰涎風中脈浮應人迎氣中脈沉應氣口以氣藥治風則可以風藥治氣則不可才覺中氣急以蘇合香丸灌之候醒繼以八味順氣散加香附三五錢或木香調氣散尚有餘痰未盡平復宜多進四七湯及星香散若其人本虛痰氣上逆關格不通上下升降或大便虛祕宜用三和丹論中食似風準繩云中食之證忽然厥逆昏迷口不能言肢不能舉狀似中風皆因飲食過傷醉飽之後或感風寒或著氣惱以致填塞胸中胃氣有所不行陰陽痞隔升降不通此內傷之至重者人多不識若誤作中風中氣而以祛風行氣之藥重傷胃氣其死可立而待不若先煎姜鹽湯探吐其食仍視其風寒尚在以藿香正氣散解之氣滯不行者以八味順氣散調之吐後別無他證只用平胃散加白朮茯苓半夏曲柏之類調理如遇此卒暴之病必須審問明白或方食醉飽或飲食過傷但覺胸膈痞悶痰涎壅塞氣口脈緊盛者且作食滯治之戴云人之飲食下咽而入肝由肝而入脾由脾而入胃因食所傷肝氣不理故痰涎壅塞若中風然亦有半身不遂者肝主筋故也治以風藥則誤矣蔭按復庵名醫也飲食下咽而先入肝於理難通其必有謂矣姑存之以俟問論中惡似風準繩云中惡之證因冒犯不正之氣忽然手足逆冷肌膚粟起頭面青黑精神不守或錯言妄語牙緊口噤或頭旋暈倒昏不知人即此是卒厥客忤飛尸鬼擊吊死問喪入廟登冢多有此病蘇合香丸灌之候稍蘇以調氣散和平胃散服名調氣平胃散論卒中暴厥準繩曰經云暴病卒死皆屬於火注云火性速疾故也然初治之藥不寒而溫不降而升甚者從治也俗有中風中氣中食中寒中暑中濕中惡之別但見卒然仆倒昏不知人或痰涎壅塞咽喉作聲或口眼喎斜手足癱瘓或半身不遂或六脈沉伏或指下浮盛者並可用麻油薑汁竹瀝調蘇合香丸如口噤抉開灌之或用三生飲一兩加人參一兩煎成入竹瀝二三杯薑汁少許如抉不開不可進藥急以生半夏為末吹入鼻中或用細辛皂角菖蒲為末吹入得嚏則蘇此可以驗其受病深淺又知其可治不可治若口開手撒遺尿者虛極而陽暴脫也速用大料參耆接補之及臍下大艾灸之選要曰若氣虛陽脫卒然倒僕手足厥逆自汗出當用三建星香三生之類溫經行濕以回陽氣凡中風初中卒倒牙關緊急不省人事可用蘇合香丸灌之候其蘇醒便不可用若痰涎壅盛宜用青州白丸子蘇合丸相合用竹瀝薑汁灌之然後用順氣之藥治之切不可驟用腦麝香燥治風之藥恐引風入於骨髓故也如風痹頑麻半身不遂語言謇澀者亦可用治風之藥如鐵彈丸換骨如聖或酒浸之藥皆可用也傳心方云治男子婦人涎潮於心卒然中倒當即時扶入暖室中扶策正坐當面作好醋炭熏之令醋氣衝入口鼻內良久其涎潮聚於心者自收歸舊輕者即時蘇醒重者亦省人事唯不可吃一滴湯水入喉也如吃湯水則其涎永繫於心絡不能去必成廢人凡中人髮直吐沫搖頭上竄直視口開手撒眼合氣喘遺尿不知人或面赤如妝或頭面青黑汗綴如珠聲如鼾睡皆不可治準繩云舊說口開心絶手撒脾絶眼合肝絶遺尿腎絶聲如鼾肺絶皆為不治之證然五證不全見者速服參耆膏灸臍下亦有得生者卒中眼上戴不能視者灸第二椎骨第五椎上各七壯一齊下火炷如半棗核大丹溪曰初中昏倒急掐人中至醒然後用藥一人患滯即痢下一夕昏僕目上視溲注汗泄脈大無倫此陰虛陽暴絶也蓋得之病後酒色灸氣海穴在臍下一寸半漸蘇服人參膏數升而愈夏月卒倒為暑氣有因火者內火外火合而炎灼也有因痰者暑氣激痰塞礙心竅也二者皆宜吐之吐後用藥調理論痰涎壅盛丹溪云痰壅盛者口眼喎斜者不能言者皆當用吐法輕者醒者用瓜蒂散或蝦汁或稀涎散吐之重者口噤者用藜蘆少許加麝灌入鼻內吐之一吐不已再吐之亦有不可吐者虛甚故也準繩云痰涎壅盛者宜吐之急救稀涎散碧霞散二藥不大嘔吐但微微令涎自口角流出自蘇痰涎壅盛用橘紅一斤逆流水五碗煮數滾去橘紅再煮至一碗頓服白湯導之吐痰之聖藥也竹瀝荊瀝少佐薑汁加入二陳湯星香散中乃必用之藥戴云肥人多中風以氣盛於外而歉於內也肺為氣出入之道人肥者必氣急氣急必肺邪盛肺金克肝木膽為肝之腑故痰涎壅盛所以治之必先理氣為急中後氣未盡順痰未盡降調理之劑唯當以藿香正氣散和星香散煎服此藥非特可以治中風之證中氣中惡霍亂尤宜中後體虛有痰宜四君子湯和星香散或六君子湯和之脈沉伏無熱者用三生飲加全蠍一個養正丹可以墜下痰涎鎮安元氣氣實者以星香湯吞之氣虛者以六君子湯吞之論口噤準繩云以蘇合香丸或天南星冰片末或白梅末擦牙以鬱金藜蘆末搐鼻以黃耆防風湯熏針人中頰車各四分白礬半兩鹽花一分細研揩直皆切揩平聲點牙根下更以半錢匕音比綿裹安牙盡頭用甘草比中指節截作五截於生油內浸過炭火上炙候油入甘草以物斡開牙關令咬定甘草可人行十里許時又換甘草一截後灌藥極效丹溪云許學士治王太后病風不能言而脈沉其事急矣非大補不可也若用有形之湯藥緩不及事乃以防風黃耆煎湯數斛置於床下湯氣熏蒸滿室如霧使口鼻俱受之其夕便得語此非智者通神之法不能回也蓋人之口通乎地鼻通乎天口以養陰鼻以養陽天主清故鼻不受有形而受無形地主濁故口受有形而兼乎無形也論口眼喎斜準繩云經曰木不及曰委和陽和委屈發生少也委和之紀其動軟戾拘緩又云厥陰所至為軟蓋軟縮短也木不及則金化縮短乘之以勝木之條達也戾者口目喎斜也拘者筋脈拘強也木為金之縮短牽引而喎斜拘強也緩者筋脈縱也木為金乘則土寡於畏故土兼化緩縱於其空隙而拘緩者自緩也故口目喎斜者多屬胃土然有筋脈之分焉經曰足之陽明手之太陽筋急則口目為僻眥急不能卒視此胃土之筋為喎斜也又曰胃足陽明之脈挾口環唇所生病者口喎唇斜此胃土之脈為喎斜也口目常動故風生焉耳鼻常靜故風息焉治宜清陽湯秦艽升麻湯或二方合用黃耆二錢人參當歸白芍各一錢甘草桂枝各五分升麻葛根秦艽各一錢白芷防風蘇木紅花酒黃柏各五分水酒各半煎稍熱服初起有外感者加連須蔥白三莖同煎取微汗第二服不用外以酒煮桂取汁一升以故布浸拓病上左喎拓右右喎拓左筋急喎斜藥之可愈脈急喎斜非灸不可目斜灸承泣口喎灸地倉如未效於人迎頰車灸之戴云中而口眼喎斜者先燒皂角煙燻之以逐去外邪次燒乳香薰之以順其血脈羅謙甫云太尉中武史公年六十八歲於至元十月初侍國師於聖安寺丈室中煤炭火一爐在左邊遂覺面熱左頰微有汗師及左右諸人皆出因左頰疏緩被風寒客之右頰急口喎於右脈得浮緊按之洪緩豫舉醫學提舉忽君吉甫專科針灸先以左頰上灸地倉穴一七壯次灸頰車二七壯後以右頰上熱手尉之議以升麻湯加防風秦艽白芷桂枝發散風寒數服而愈或曰世醫多以續命等藥治之今君用升麻湯加四味其理安在對曰足陽明經起於鼻交頞鼻莖也中循鼻外入上齒中手陽明之經亦貫於下齒中況兩頰皆屬陽明升麻湯乃陽明經藥白芷又行手陽明之經秦艽治口噤防風散風邪桂枝實表而固榮衛使邪不能再傷此其理也夫病有標本經絡之別藥有氣味厚薄之殊察病之源用藥之宜其效如桴鼓之應不明經絡所過不言藥性所宜徒執一方不惟無益而又害之者多矣學者宜細思之綱目云內經治口眼喎斜多屬足陽明筋蓋足陽明筋結頰上得寒則急熱則弛左寒右熱則左頰筋急牽引右之弛者而右隨急牽引喎向左也右寒左熱則右頰筋急牽引左之弛者而左隨急牽引喎向右也故其治法以火灸且為膏油尉其急者以白酒調和桂末塗其弛者又以桑為鉤以鉤其舌吻之喎斜處使正平而高下相等復以水調生桑灰於鉤柄之坎縫處連頰塗之以收其弛兼飲姜酒啖美肉使筋脈氣和以助外之塗尉不飲酒者自強其筋骨以手拊拍其急處使證自去也張子和云東杞一夫患口目喎斜其兩手急數如弦之張有力而實其人壯氣充風火交勝與調胃承氣湯六兩以水四升煎作三升分作四服令稍熱啜之前後約瀉四五十行去一兩次以苦劑投之解毒數服以升降水火不旬日愈脈訣云熱則生風一長吏病口目喎斜豫療之目之斜灸以承泣口之喎灸以地倉俱效苟不效者當灸人迎夫氣虛風入而為偏上不得出下不得泄真氣為邪氣所陷故宜灸所以立愈樓氏曰此乃脈急喎斜故灸之愈若筋急喎斜非灸可愈必用服藥及用燔針劫刺其急處或用馬膏塗法可愈故承泣地倉人迎皆足陽明胃脈之所發也李氏曰風邪初入反緩正氣反急牽引口眼喎僻或左或右急掐人中拔頂發灸耳垂珠粟米大艾三五壯外用南星草烏各一兩白及一錢殭蠶七枚為末薑汁調塗喎處正即洗去內用正舌藥白附子殭蠶全蠍等分為末酒調服二錢樓氏曰凡半身不遂者必口眼喎斜亦有無半身不遂之證而喎斜者論失音不語素問云太陰所謂入中為喑者陽盛已衰故為喑也內奪而厥則為音痱此腎虛也少陰不至者厥也夫腎者藏精主下焦地道之生育故衝任二脈系焉二脈與少陰腎之大絡同出腎下起於胞中其衝脈因稱胞絡為十二經脈之海遂名海焉衝脈之上行者滲與浸同漸漬也諸陽灌諸精下行者滲三陽灌諸絡而溫肌肉別絡結於跗因腎虛而腎絡與胞絡內絶不通於上則喑腎脈不上循喉嚨挾舌本則不能言二絡不通於下則痱厥矣如是者以地黃飲子主之竹瀝荊瀝大梨汁各三杯生葛汁人乳汁各二杯陳醬汁半杯和勻隔湯頓溫服有痰者滌痰湯內熱者涼膈散加石菖蒲遠志為末煉蜜丸彈子大硃砂為衣每服一丸薄荷湯化下名轉舌膏寶鑑訶子湯正舌散茯神散李氏曰不語有數端有風中心脾者資壽解語湯有風中心經者小續命湯去桂附加菖蒲有痰塞心竅者導痰湯加菖蒲人參竹茹或芩連有舌本強硬語言不正者用蠍梢二錢半茯苓一兩薄荷二兩為末酒調服二錢或擦牙尤妙又有風熱壅者有血虛氣虛者有腎虛及老人忽言不出者十全大補湯去桂加菖蒲遠志卒倒歪斜不語名風癔身軟有汗者生汗不出身直者死痰由水化制火閉塞心竅不語熱者涼膈散加黃連或牛黃清心丸虛者星香散三生飲導痰湯小省風湯論半身不遂準繩曰經云胃脈沉鼓澀胃外鼓大心脈小堅急皆隔偏枯男子發左女子發右男為陽左亦為陽故偏枯發左為逆女為陰右亦為陰故偏枯發右為逆不喑舌轉可治雖逆於經未甚於臟乃為可治三十日起其從者喑三歲起從順也男以右為從女以左為從男發右女發左證雖從而聲則喑是外輕而內重也故必三歲而起年不滿二十者三歲死以氣血方剛之年見偏枯廢疾此稟賦不足早凋之兆也故三歲死蓋胃與脾為表裡陰陽異位更實更虛更逆更從或從內或從外是故胃陽虛則內從於脾內從於脾則脾之陰盛故胃脈沉鼓澀也澀為多血少氣胃之陽盛則脾之陰虛虛則不得與陽主內反從其胃越出於部分之外故胃脈鼓大於臂外也大為多氣少血心者元陽君主宅之生血主脈因元陽不足陰寒乘之故心脈小堅急小者陽不足也堅急陰寒之邪也夫如是心胃之三等脈凡有其一即為偏枯者何也蓋心是天真神機開發之本胃是穀氣充大真氣之標標本相得則胸膈間之膻中氣海所留宗氣盈溢分布四臟三焦上下中外無不周遍若標本相失則不能致其氣於氣海而宗氣散矣故分布不周於經脈則偏枯不周於五臟則喑即此言之是一條可為後之諸偏枯者綱領也未有不因真氣不周而病者也故治療之法倘不用黃耆為君人參當歸白芍藥為臣防風桂枝鉤藤竹瀝荊瀝薑汁韭汁葛汁梨汁乳汁之屬為之佐使而雜沓乎烏附羌獨之屬以涸榮而耗衛如此死者醫殺之也蔭按丹溪云大率多痰在左挾死血與瘀血在右挾氣虛與痰亦是無本杜撰之談不必拘之古方順風勻氣散虎骨散虎脛骨酒黃耆酒皆可用外用蠶沙兩石分作三袋每袋可七斗蒸熱一袋著患處如冷再換一袋依前法數數換易百不禁瘥止須羊肚釀粳米蔥白姜椒豉等煮爛熟日食一具十日止李氏曰半身不遂或只一肢不遂此名偏枯言不變智不亂病在膚腠之間溫臥取汗張子和云一衲子因陰雨臥濕地一年手足皆不遂若遇陰雨其病轉加諸醫皆作中風偏枯治之用當歸芍藥乳香沒藥自然銅之類久服反加大便澀風燥生經歲不已戴人以舟車丸下三十餘行去青黃沫水五升次以淡劑滲泄之數日手足能舉戴人曰受風濕寒三氣合而為痹水濕得寒而浮蓄於皮腠之間久而不去內舍臟腑宜用去水之藥可也水濕者人身中之寒物也寒去則血行血行則氣和氣和則愈矣論四肢癱瘓病機云四肢不舉俗曰癱瘓經謂脾太過則令人四肢不舉又曰土太過則敦阜阜高也敦厚也既厚且高則令除去此真膏粱之疾其治瀉令氣弱陽衰土平而愈三化湯調胃承氣湯選而用之若脾虛亦令四肢不舉其治可補十全散加減四物去邪留正劉宗厚曰四肢不舉世俗皆以為中風病此云脾土太過不及皆能致之豈可一概用藥乎李氏曰四肢癱瘓此名風痱智亂不能言者難治其證身體無痛緩則四肢不舉急則一身皆仰或左癱右瘓或一臂不遂時復轉移一臂祛風化痰調氣養血為主換骨丹黑虎丹神仙飛步丹丹溪云寒則脈急熱則筋緩緩因於弛長縮因於短促若受濕則弛弛因於寬而長然寒與濕未嘗不挾熱三者皆因於濕然外濕非內濕無以啓之不能成病致濕之由酒面為多魚與肉繼以成之若甘滑燒炙香辛硬物皆致濕之因慎之慎之藥中肯綮矣若將理失宜雖聖醫不治也天産作陽氣浮發熱先哲格言但是患痿之人若不能淡薄食味吾知其必不能安全也論小便不利潔古云中風如小便不利不可以藥利之既已自汗則津液外亡小便自少若利之使榮衛枯竭無以制火煩熱愈甚當俟熱退汗止小便自行也論遺尿丹溪云遺尿者屬氣虛以參耆補之準繩云遺尿濃煎參耆湯少加益智子頻啜之論中風能食多食少食丹溪云中風人能食蓋甲己化土脾盛故能多食此脾愈盛下克腎水腎水虧則病增宜廣服藥不欲多食病能自愈中風多食風木盛也盛則克脾脾受敵求助於食經曰實則夢與虛則夢取當瀉肝木治風安脾脾安則食少是其效也少食者為氣虛宜參耆竹瀝論預防中風寶鑑云凡人初覺大指次指麻木不仁或不用者三年內必有中風之疾也宜先服愈風湯天麻丸各一料此治未病之法也薛立齊曰預防之理當養氣血節飲食戒七情遠幃幕可也若服前方以預防適所以招風取中也李氏曰凡覺手足麻木肌肉蠕動如有蟲行心神憒亂宜烏藥順氣散如眉稜骨痛者風之兆也宜古防風湯加芩連預防之法御風丹五參散史國公浸酒方單豨蘞丸集略云風痰惟形盛氣衰恃壯無忌者多得之以素不能謹於性情酒色勞佚之際也調養之法亦惟致謹於七情房室起居而已矣務靜以勝其躁勿性躁以速斃也勿用藥雜亂以致郁勿針灸過當以益虛勿妄投熱藥以濟火勿過用涼藥以壞胃老子云審汝藥名時汝飲啜嗇汝精神持之歲月縱不得為全人亦不至為廢人矣脈法要略云脈微而數中風使然又云頭痛脈滑者中風風脈虛弱也又寸口脈浮而緊寸口脈緩而遲皆曰中風也脈經曰浮而大者風又浮而緩皮膚不仁風寒入肌肉又滑而浮散者癱瘓風又診人被風不仁痿躄其脈虛者生堅急疾者死又曰寸口沉大而滑沉則為實滑則為氣氣實相搏入於臟則死入於腑則愈此為卒厥不知人唇青身冷為入臟死身溫和汗出為入腑而復自愈脈陽浮而滑陰濡而弱或浮而滑或沉而滑或微而虛或微數寸口或微而緩或緩而遲皆為中風之證大法浮遲者吉急疾者凶又脈浮而通者易治大數而急者死準繩云風邪中人六脈多沉伏亦有脈隨氣奔指下洪盛者浮遲吉堅大急疾凶浮遲為寒虛大為暑不當暑則為虛浮澀為濕浮大為風浮數無熱亦為風微而數浮而緊沉而遲皆氣中風應人迎氣應氣口洪大為火滑為痰更當察時月氣候及其人之起居參以顯證而定病之主名以施治療脈訣舉要曰中風脈浮滑兼痰氣其或沉滑勿以風治或浮或沉而微而虛扶危溫痰風未可疏又曰陽浮而滑陰濡而弱此名中風勿用寒藥或云若脾脈緩而無力者最為難治蓋風喜歸肝肝木克脾土則大便洞泄故不治也卷一中中風治卒中暴厥方易簡三生飲治卒中昏不知人口眼喎斜半身不遂咽喉作聲痰氣上壅無問外感風寒內傷喜怒或六脈沉浮或指下浮盛並宜服之兼治痰厥飲厥及氣虛眩暈悉有神效但口開手散眼合遺尿聲如鼾鼻者難治南星一兩川烏去皮生附子各半兩木香二錢半上㕮咀每服半兩水二盞生薑十片煎至六分去渣溫服或口噤不省人事者用細辛皂角各少許為細末以蘆管吹入鼻中候噴嚏其人少蘇然後進藥痰涎壅盛者每服加全蠍四枚仍用養正丹鎮墜之一方氣盛人止用南星半兩木香一錢生薑七片名星香散一方氣虛人用生附子並木香如前數煎名附香飲亦有用天雄代附子者並治卒中始作無克效如真氣虛為風邪所乘加人參一兩大效因氣中以淨湯化蘇合香丸乘熱灌服仍用前藥汁濃磨沉香一呷許再煎一沸服之候服藥已定審的是風方用醒風湯小續命湯之類中寒則附子理中湯姜附之類中濕則白朮酒朮附湯之類皆可用痰飲厥逆氣虛眩暈止守本方如痰涎壅盛聲如牽鋸服藥不下者宜灸關元氣海穴攝生飲治一切卒中不論中風中寒中暑中濕及痰厥氣厥之類不省人事者初作即用此方神效南星濕紙包煨半夏滾水泡南木香各一錢半蒼朮生用細辛石菖蒲生甘草各一錢上銼作一服加生薑七片水煎溫服痰盛加全蠍炙二枚大聖一粒金丹治中風昏僕舌強涎潮癱瘓偏枯頑癢麻痹癲癇倒地開目作聲項強反張口噤直視大川烏炮去皮尖大附子炮去皮臍白附子炮各二兩五靈脂殭蠶炒去系嘴白蒺藜炒去刺各一兩白礬枯硃砂另研沒藥另研麝香另研各半兩上為細末用京墨半兩新汲水磨汁按和藥勻每兩作六丸用金箔二百片為衣令自干每服一丸用生薑汁磨開溫酒半盞調服被蓋取微汗為效蘇合香丸治男子婦人中風中氣牙關緊閉口眼喎斜不省人事及卒暴心腹疼痛霍亂驚搐厥逆中惡勞瘵傳尸骨蒸鬼魅瘴癘並小兒急慢驚風白朮青木香烏犀角屑香附子炮去毛訶黎勒煨去皮白檀香安息香另為末用無灰酒一升煮為膏麝香沉香硃砂研飛丁香蓽撥各二兩龍腦研蘇合香油入安息膏內熏陸香另研各一兩上為細末入安息香膏及煉蜜和勻丸如龍眼大用蠟封裹每服開取半丸病重者一丸薑湯或溫酒化下凡人痰氣及中風痰涎壅上喉中有聲不能下者用青州白丸子同丸生薑自然汁化下立效産婦中風小兒驚風牙關緊硬不開及不省者擦牙即開然後用風藥治之小兒吐瀉驚風疳先用火焙此藥然後用生薑蔥白自然汁化開白湯調灌腳氣衝心用萆麻子去殼捶碎和丸敷貼腳心疼痛即止心腹絞痛中滿嘔吐薑湯化下大人小兒感冒風寒咳嗽痰喘蔥白和薑湯調下中風狂亂如見鬼神者白湯調服霍亂吐瀉心腹疼痛或下白痢及婦人産後中風血暈泄瀉腹疼不思飲食淡薑湯調下若預避山嵐瘴氣及氣羸多病清晨常用溫酒調下一丸尤妙小兒用大緋絹袋盛當心帶之一切鬼邪不敢近蔭按如病人初中風喉中痰塞水飲難通非香竄不能開竅故集諸香以利竅非辛熱不能通塞故用諸辛為佐使犀角雖涼涼而不滯訶黎雖澀澀而生津世人用此方於初中之時每每取效丹溪謂辛香走散真氣又謂腦麝能引風入骨如油入面不可解也但醫者可用之以救急毋令人多服可耳用者慎之還魂湯治卒感忤鬼擊飛尸諸奄忽氣絶無復覺或已死絞口口噤不開去齒下湯湯入口不下者分病人發左右捉踏肩引之藥下復增取盡一升須臾立蘇麻黃三兩桂心二兩甘草一兩杏仁七十粒上㕮咀用水八升煮取三升分三服肘後方云張仲景方無桂心只三味麻黃膏治中風不省人事卒然倒地此膏最妙擇王相日乙卯者揀麻黃一稱揀去根一寸長取東流水三石三斗以無油膩鐺量大小盛五七斗可先煮五沸掠去滓遂旋添水盡至三五斗以來漉去麻黃淘在盆中澄定良久用細羅子濾去滓取清者鐺內再熬至一斗再澄再濾取汁再熬至升半已來為度只是勤攪勿令著底恐焦了熬時忌雞犬陰人澄時須蓋覆不得飛入塵土其藥放一二年不妨如膏稠用水解熬再勻凡中風卒倒用此膏加入湯藥內服或用此膏丸藥亦可治卒中風口噤方通關散治卒中風邪昏悶不省牙關緊急湯水不下細辛去葉洗淨豬牙皂角去子各一錢上為極細末每用少許吹入鼻內取嚏就提頭髮立蘇候有噴嚏漸可施治無嚏不治一方加半夏一錢一方又加藜蘆苦參或只以生半夏末吹入鼻中亦可開關散治中風牙關已緊無門下藥天南星五分龍腦少許上二味搗為末五月五日修治每用一字至半錢以中指蘸藥揩大牙左右二三十遍其口自開然後下藥一方用烏梅肉擦其牙關牙關痠軟則易開此酸先入筋之故也其不開者筋先絶也不治通頂散治中風中氣昏憒不知人事口噤不能開急用此吹鼻即蘇藜蘆生甘草川芎細辛人參各一錢石膏五錢上為細末吹入鼻中一字就提頂中發立蘇有嚏者肺氣未絶可治搐鼻通天散治卒暗中風倒地牙關緊急人事昏沉川芎細辛白芷防風薄荷藜蘆各一錢豬牙皂角去皮三個上為細末用蘆筒納藥每用少許吹入鼻中通頂散治中風暗風卒然倒地昏迷不省人事及陰證大效藜蘆去蘆八錢川芎二錢石菖蒲薄荷蔓荊子各一兩上為細末每少許吹入鼻中須臾嚏出即愈青金錠治男女中風痰厥牙關緊急口不得開難以進藥並雙鵝喉閉不能言者小兒驚風痰迷並效元胡索三錢麝香一分青黛六釐牙皂十四枚火煨上共研為細末清水調做錠重五分陰乾每用一錠取井花涼水磨化用綿紙蘸藥汁滴入鼻孔喉內痰響取出風痰一刻得生見效如神百發百中稀涎散治中風不語牙關緊急單雙乳蛾江子仁六枚每枚分作兩半牙皂三錢切片明礬一兩上先將礬化開入二味攪勻待礬枯為末每用三分諸病皆愈痰涎壅盛者以五分燈心湯下喉中之痰逆上者即吐膈間者即下一方治口噤鬱金藜蘆上為末水調搐鼻一方白礬半兩鹽花一分上為細末揩點牙根下更以半錢匕綿裹安牙盡頭一方單用白鹽揩牙即開一方用甘草比中指節截作五截於生油內浸過炭火上炙候油入甘草以物斡開牙關令咬定甘草可人行十里許時又換甘草一截後灌藥極效一方治口噤卒不得語附子搗末納管中吹入喉中立安千金翼云吹喉中恐是吹鼻中白朮酒治妊娠中風口噤語言不得白朮獨活各一兩黑豆炒一合上銼以酒三升煮取一升半去渣溫服分四服口噤者斡開灌之即汗即愈一方治中風通身冷口噤不知人事用獨活四兩好酒一升煎半升俟溫再服熏法治中風口噤藥不下者用黃耆防風煎湯數斛置床下氣如煙霧熏之針法針人中頰車各四分治卒中痰涎壅盛方稀涎散治中風忽然昏倒若醉形體昏悶四肢不收風涎潮於上膈氣閉不通豬牙皂角四挺肥實不蛀者去黑皮白礬光明者一兩一方有半夏一兩上為細末研勻輕者五分重者三字溫水調灌下不大嘔吐但微微令涎出一二升便得醒醒後緩緩調治不可便大投藥餌恐過傷人蔭按清陽在上濁陰在下則天冠地履無暴僕也若濁邪風湧而上則清陽失位而倒置矣故令人暴僕所以痰涎湧塞者風盛氣湧而然也經曰病發而不足標而本之先治其標後治其本故不與疏風補虛而先為之吐其涎沫白礬之味鹹苦咸能軟頑痰苦能吐涎沫皂角之味辛鹹辛能利氣竅咸能去汙垢名之曰稀涎固奪門之兵也師曰凡吐中風之痰使咽喉疏通能進湯液便止若攻盡其痰則無液以養筋能令人攣急偏枯此大戒也獨聖散治中風痰迷心竅癲狂煩亂人事昏沉痰涎壅盛及五癇心風等證甜瓜蒂一兩炒黃色瓜黃熟脫落者佳上為細末每服五分或一錢量人虛實用之以熟水或酸齏汁調下以吐為度如不吐須臾再進一服倘不止以白湯止之或蔥湯亦妙或麝香少許研水飲之即解凡行吐法宜於天氣清明之日行之晦日難得吐病暴急者不拘如吐風痰加全蠍半錢微炒如有蟲者加豬油五七點雄黃末一錢甚者加芫花末五分立吐其蟲如濕腫滿者加赤小豆末一錢凡吐令人眼番吐時令閉雙目此藥不可常用大要辨其虛實實可用虛不可用吐可服降火利氣安神定志之藥二聖散治證同前常山一兩蔥管藜蘆半兩上為粗末每服二錢用水一鍾煎至七分食後溫服三仙散治證同前防風去蘆瓜蒂微火烘各五錢蔥管藜蘆一兩上為粗末每服三五錢以齏水二鍾煎七八沸去渣又用齏水一鍾煎至半鍾卻將先二鍾藥汁合作一處再熬五七沸去渣澄清放溫徐徐服之不必盡劑以吐為度四靈散治證同前瓜蒂一錢人參蘆二錢赤小豆甘草各一錢半上為細末每服一二錢或少至半錢量情與之食後齏汁調下五元散治證同前豬牙皂角不蛀者去皮弦炙緑礬各一錢明礬二錢赤小豆一錢蔥管藜蘆五錢上為細末每服半錢或一二錢漿水調下如牙關緊閉斡開灌之六應散治證同前鬱金滑石川芎各等分上為細末每服一二錢量虛實加減以齏汁調空心服凡服吐藥不須盡劑服藥後約人行十里未吐以溫茶一鍾入香油數點投之良久以鵝翎喉內徐徐牽引得吐即止未吐再投吐藥如服吐藥吐不止者以麝香少許研水飲之即解碧霞散此藥不大吐但微微令涎自口角流出自蘇石緑上色精好者研篩水飛再研取二三錢冰片三四豆許上研勻以生薄荷汁合溫酒調服分涎散治中風涎潮作聲口噤手足搐搦藿香全蠍炒白附子南星炮各一兩丹砂膩粉粉霜各二兩上為細末每服一錢匕至二錢薄荷湯或茶湯調下未吐利再服奪命散治卒暴中風涎潮氣閉牙關緊急眼目上視破損傷風搐搦潮作及小兒急驚風證並皆治之甜葶藶香白芷天南星半夏湯泡去滑巴豆去殼不去油各等分上為細末每服半錢用生薑自然汁一呷調下牙關緊急湯劑不下者此藥輒能治之小兒以利痰或吐為愈解毒雄黃丸治中風卒然倒僕牙關緊急不醒人事並解上膈壅熱痰涎不利咽喉腫閉一應熱毒鬱金雄黃研飛各二錢半巴豆去皮油十四個上為末醋煮麵糊丸如緑豆大每服七丸用熱茶清下吐出頑涎立蘇未吐再服如牙關緊急斡開灌下勝金丸治中風卒倒痰涎壅盛氣閉不通生薄荷半兩牙皂二兩槌碎水一升二味一處浸取汁研成膏瓜蒂為末一兩藜蘆為末二兩硃砂半兩另研上將硃砂末分為二份一份與二味末研勻用膏子搜和丸如龍眼大以硃砂一份為衣溫酒化下一丸甚者二丸以吐為度吐即醒不醒者不可治樓氏曰必用方論中風無吐法引金虎碧霞為戒且如卒暴涎生聲如引鋸牙關緊急氣閉不行湯藥不能入命在須臾者執以無吐法可乎但不當用銀粉藥恐損脾傷人四肢爾豫用此數方每每有驗一方治急中風口閉涎上欲垂死者一服即瘥江子二粒去皮膜白礬如拇指大一塊為末上將二味在於新瓦上煅令江子焦赤為度為末煉蜜丸如雞頭大每服一丸綿裹放患人口中近喉處良久吐痰立愈一方用膽礬一分為末溫黃酒調下吐痰為度一方治中風口噤涎潮壅塞吐涎用皂角一挺去皮塗豬脂炙黃為末每服一錢匕非時溫酒服如氣實脈盛調二錢匕如牙不開用白梅揩齒口開即灌藥吐出風涎瘥一方治中風不省人事牙關緊急用藜蘆一兩去蘆濃煎防風湯洗過焙乾切炒黃褐色搗末每半錢溫水下以吐涎為效如人行三里許未吐再服祕方治中風痰厥昏迷卒倒不省人事欲絶者用巴豆去殼紙包槌油去豆不用用紙捻作條子送入鼻內或加皂角末尤良或用前紙條燒煙熏入鼻內亦可一方治中風不語喉中如拽鋸聲口中涎沫取藜蘆一分天南星一枚去浮皮卻於臍上剜一坑子納入藜蘆陳醋和麵包裹四面用火逼令黃色用搗再研極細生面為丸如小豆大每服三丸溫酒下一方吐痰之聖藥也橘紅一斤逆流水五碗煮數滾去渣再煮至一碗頓服白湯導之吹鼻散治痰中欲絶用大茶子一顆糯米七粒共為細末以些少吹入鼻中吐出稠痰數碗病者即醒太白散治中風痰氣欲絶心頭尚溫喉中絶響此藥下痰如神千年古石灰刮去土為細末水飛過每服三錢水一碗煎至七分溫服太元湯治證同前染布活靛缸水一盞溫而灌之即能言雄附醒風湯治中風涎潮牙關緊急不省人事附子重七錢一個天雄南星各重一兩一個並生去皮臍蠍梢五錢上㕮咀每服五錢水一盞半生薑七片煎七分不拘時服碧霞丹治卒中急風眩暈僵仆痰涎壅塞心神迷悶牙關緊急目睛上視及五種癇病涎潮搐搦石緑研九度飛十兩附子尖烏頭尖蠍梢各七十個上三味為末入石緑令勻麵糊為丸如雞頭實大每服急用薄荷汁化下一丸更入酒半合溫暖服之須臾吐出頑痰然後隨證治之如牙關緊急斡開灌之立驗治初中氣道閉塞方烏藥順氣散治一切風氣攻注四肢骨節疼痛遍身頑麻手足癱瘓言語謇澀口眼喎斜先宜多服此藥疏通氣道然後隨證投以風藥烏藥陳皮去白各二錢麻黃去根節川芎白芷殭蠶炒去絲嘴枳殼麩炒桔梗甘草炙各一錢乾薑炮五分上㕮咀作一服加生薑三片大棗一枚水煎食遠服蔭按治風先理氣此治標之劑也然必邪實初病之人方可用之若氣虛久病者則勿與宜以補劑兼之八味順氣散凡中風宜先服此藥以順其氣次用治風之藥人參白朮白茯苓青皮去穰陳皮去白白芷烏藥各一錢甘草炙五分上㕮咀水煎食遠服痰盛加半夏一錢生薑三片經曰邪之所湊其氣必虛故用四君子以補氣治痰之法利氣為先故用青陳芷烏以順氣氣順則痰行而無壅塞之患此標本兼施之治也治風中腑方中腑者多著四肢手足拘急不仁面顯五色惡風寒脈浮為在表治用發散之劑小續命湯治卒暴中風不省人事半身不遂口眼喎斜手足顫掉語言謇澀肢體麻痹神情昏亂頭目眩暈痰涎壅盛筋脈拘攣及腳氣緩弱不能動履屈伸凡外有六經之形證則從此方加減以發其表麻黃人參黃芩酒炒芍藥酒炒川芎甘草炙杏仁去皮尖炒防己去皮桂枝各一錢防風去蘆一錢半附子炮去皮臍五分上㕮咀加生薑五片棗一枚水煎食前熱服凡中風不審六經之形證加減用藥雖治之不能去其邪也內經云開則灑然寒閉則熱而悶知暴中風邪宜先以加減續命湯隨證治之太陽經中風無汗惡寒麻黃續命主之依本方加麻黃杏仁防風各一倍太陽經中風有汗惡風桂枝續命主之依本方加桂枝芍藥杏仁各一倍陽明經中風身熱無汗不惡寒白虎續命主之依本方加石膏知母各一錢或云去附子陽明經中風身熱有汗不惡風葛根續命主之依本方加葛根二錢桂枝黃芩各加一倍太陰經中風無汗身涼附子續命主之依本方加附子一倍乾薑一錢少陰經中風有汗無熱桂附續命主之依本方加桂枝附子甘草各一倍六經混淆系之於少陽厥陰或肢節攣痛或麻木不仁宜羌活連翹續命主之依本方加羌活連翹各一錢大法春夏加石膏知母黃芩秋冬加官桂附子芍藥熱者去附子加白附子筋急語遲脈弦者倍人參加薏苡仁當歸去黃芩芍藥以避中寒煩躁不大便去桂附倍加芍藥竹瀝日久大便不行胸中不快加枳殼大黃語言謇澀手足顫掉加石菖蒲竹瀝口渴加麥門冬葛根天花粉身痛發搐加羌活煩渴多驚加犀角羚羊角多怒加羚羊角恍惚錯亂加茯神遠志痰多加南星自汗去麻黃舌燥加石膏去桂附或歌或笑或哭語言無所不妄加白朮倍麻黃人參桂枝肥人多濕加烏附行經用童便浸煮以殺其毒附云岐子加減法如精神恍惚加茯苓遠志心煩多驚者加犀角屑半錢骨節間煩痛有熱者去附子倍芍藥骨節冷痛倍用桂枝附子躁悶小便澀者去附子倍芍藥入竹瀝一合煎臟寒下痢者去防己黃芩倍附子白朮熱痢不可用附子腳弱加牛膝石斛各一錢身疼痛加秦艽一錢腰痛加桃仁杜仲各半錢失音加杏仁一錢如或歌笑語無所不及者用麻黃三錢人參桂枝白朮各二錢無附子防風生薑有當歸一錢自汗者去麻黃杏仁加白朮春加麻黃一錢夏加黃芩七分秋加當歸四錢冬加附子五分金匱續命湯治中風痱身不收口不能言冒昧不知痛處拘急不能轉側麻黃去節三兩桂枝去皮當歸人參乾薑石膏碎綿裹甘草炙各二兩川芎一兩杏仁去皮尖十四枚上㕮咀水煎服疏風湯治表中風邪半身不遂麻木語言微澀季春初夏宜服麻黃去節二兩杏仁炒去皮尖益智仁各一兩炙甘草升麻各五錢上㕮咀每服五錢水一小碗煎至六分趁溫服腳蹬熱水葫蘆候大汗出去葫蘆冬月忌服疏風湯治表中風邪麻黃去節羌活防風去蘆各一錢半川芎細辛去土葉杏仁去皮尖炒各一錢甘草五分上銼加生薑三片水煎食前熱服取汗排風湯治風虛冷濕邪氣入臟狂言妄語精神錯亂及五臟風發等證當歸酒浸白朮川芎白芍藥肉桂防風白鮮皮杏仁甘草各二兩麻黃去節茯苓各三兩獨活三兩上粗末每服三錢姜四片水煎服蔭按丹溪曰此云治邪氣入臟而又曰風發又似有內出之意夫病既在五臟道遠而所感深用麻黃以發其表能不犯誅伐無過之戒乎查劉宗厚曰此與小續命湯相類而無所發明因世俗用之故收入三黃湯治中風手足急拘百節疼痛煩熱心亂惡寒終日不食兼半身不遂失音不語麻黃五錢獨活四錢黃芩三錢黃耆細辛各二錢上銼以水六升煮取二升分作三服一服小汗二服大汗心熱加大黃二錢腹痛加枳實一枚氣逆加人參一錢悸加牡蠣三錢渴加瓜蔞根三錢先有寒加附子一枚治風中臟方中臟者多滯九竅唇緩失音耳聾鼻塞目瞀二便閉澀為在裡治用攻下之劑三化湯治中風外有六經之形證先以加減續命湯隨證治之若內有便溺之阻隔復以此導之厚朴去皮薑汁炒大黃枳實麩炒羌活各三錢上㕮咀水一鍾半煎至一鍾食前服以微利為度蔭按潔古言中臟者大小便祕結東垣云內有便溺之阻隔蓋大小便祕結不中臟者亦有之有中臟而大小便不祕結者二者當詳辨而治牛黃通膈湯初覺中風一二日實則急宜下之牛黃研三錢朴硝研三錢大黃甘草炙各一兩上四味除研藥為末每服一兩水二盞除牛黃朴硝外煎至一盞去渣入牛黃朴硝一半調服以利為度須動三兩行未利再服量虛實加減麻仁丸治腸胃熱燥大便祕結大黃蒸焙一斤厚朴去皮薑汁炒枳實麩炒芍藥各半斤麻仁別研五兩杏仁去皮尖炒五兩半上為末煉蜜和丸如桐子大每服二十丸臨臥用溫水下大便通利則止潤腸丸治證同前老人宜服麻子仁另研大黃酒煨各一兩半桃仁泥另研當歸尾枳實麩炒白芍藥升麻各半兩人參生甘草陳皮各三錢木香檳榔各二錢上除麻仁桃仁另研余俱為末卻入二仁泥煉蜜丸如桐子大每服七八十丸溫水食前下祛風至寶丹治風邪中臟痰涎昏冒及治諸風熱防風芍藥各一兩半石膏黃芩桔梗天麻熟地黃人參羌活獨活各一兩川芎當歸各二兩半滑石三兩甘草二兩白朮一兩三錢連翹荊芥穗薄荷麻黃去根不去節芒硝黃連大黃黃柏細辛全蠍各五錢梔子六錢上為末煉蜜丸如彈子大每服一丸細嚼茶酒任下臨臥服前四方專攻裡邪此方乃發表攻裡兼施也蔭按中腑雖宜汗然汗多則亡陽中臟雖宜下然下多則亡陰要在以意消息不可過度若中腑兼中臟者藥必兼用先表之而後通之若欲表裡兼攻則用防風通聖散是在詳病證淺深而酌用之慎勿差誤也治風中經絡方大秦艽湯治中風外無六經之形證內無便溺之阻隔但血弱不能養筋故手足不能運動舌強不能言語宜養血而脈自榮此方主之秦艽石膏各二兩甘草川芎當歸芍藥羌活獨活防風黃芩白芷生地黃熟地黃白茯苓白朮各一兩細辛五錢上銼每服一兩水煎溫服無時天陰雨加生薑七片春夏加知母一錢如心下痞加枳實一錢痰盛加竹瀝薑汁語言不出加石菖蒲一錢吳氏曰中風虛邪也流而不去其病則實故用驅風養血之劑兼而治之用秦艽為君者以其主宰一身之風石膏所以去胃中總司之火羌活去太陽百節之風疼防風為諸藥中之軍卒三陽數變之風邪責之細辛三陰內淫之風濕責之苓術去厥陰經之風則有川芎去陽明經之風則有白芷風熱干乎氣清以黃芩風熱干乎血涼以生地獨活療風濕在足少陰甘草緩風邪上逆於肺乃當歸芍藥熟地者所以養血於疏風之後一以濟風藥之燥一使手得血而能握足得血而能步也虞氏曰此方用芎歸芍藥生地黃以補血養筋甚得體既曰外無六經之形證但當少用羌活秦艽引用以利關節其防風獨活細辛白芷石膏等藥恐太燥而耗血雖用此祛風止可六分之一尤宜加竹瀝薑汁同劑最好總之蔭以臆度之必的系風邪卒中有外感而無內傷者斯可用之否則不可輕用也經曰邪之所湊其氣必虛達者詳之羌活愈風湯治肝腎虛筋骨弱語言艱澀精神昏憒風濕內弱風熱體重或瘦而一肢偏枯或肥而半身不遂大抵心勞則百病生靜則萬病息此藥能安心養神調理陰陽使無偏勝保命集云內邪已除外邪已盡當服此藥以行中導諸經久服大風悉去縱有微邪只從此藥加減服之如覺風動服此不致倒僕羌活甘草炙防風去蘆黃耆去蘆人參去蘆蔓荊子川芎細辛去蘆枳殼去穰麩炒地骨皮麻黃去根知母獨活白芷薄荷杜仲炒斷絲秦艽去蘆柴胡去苗半夏湯洗薑製厚朴薑製防己熟地黃前胡當歸去蘆枸杞子甘菊花以上各二兩黃芩白茯苓各三兩芍藥石膏蒼朮生地黃以上各四兩官桂一兩上三十三味重七十五兩㕮咀每服一兩水二鍾煎至一鍾溫服如遇天陰加生薑三片煎空心一服臨臥再煎渣服俱要食遠服空心咽下二丹丸謂之重劑臨臥咽下四白丹謂之輕劑是動以安神靜以清肺假令一氣之微汗用愈風湯三兩加麻黃一兩勻作四服每服加生薑五七片空心煎服以粥投之得微汗則住如一旬之通利用愈風湯三兩加大黃一兩亦勻作四服每服加生薑五七片臨臥煎服得利為度此藥常服之不可失於四時之輔如望春大寒之後加半夏柴胡人參各二兩木通四兩此迎而奪少陽之氣也如望夏穀雨之後加石膏黃芩知母各二兩此迎而奪陽明之氣也如季夏之月加防己白朮茯苓各二兩此勝脾土之濕也如初秋大暑之後加厚朴二兩藿香桂各一兩此迎而奪太陰之氣也如望冬霜降之後加附子官桂各一兩當歸二兩此勝少陰之氣也如得春氣候減冬所加藥四時加減類此雖立此四時加減更宜臨病之際審證之虛實土地之所宜邪氣之多少此藥具七情六欲四氣無使五臟偏勝及不動於榮衛如風祕服之則永不燥結久瀉服之能自調適初覺風氣便服此藥及局方中天麻丸各一料相為表裡乃治未病之聖藥也若已病者更宜常服無問男女小兒風癇急慢急慢驚風皆可服之如解利四時傷寒隨四時加減服蔭按此方品味太多不免混雜而無專主之功用者當量病加減四白丹清肺氣養魄謂中風者多昏冒氣不清利也兼能堅強骨髓白朮白茯苓人參香附砂仁甘草防風川芎各半兩白芷一兩羌活獨活薄荷各二錢半知母細辛各二錢藿香白檀香各一錢半麝香一錢另研龍腦另研牛黃另研各半錢甜竹葉二兩上為細末煉蜜丸每兩作十丸臨臥嚼一丸煎愈風湯送下二丹丸治健忘養神定志和血內以安神外華腠理前方清肺此方安神清中清者歸肺以助天真清中濁者堅強骨髓濁中之清者榮養於神濁中之濁者榮華腠理熟地黃天門冬丹參各一兩半茯神麥門冬去心甘草各一兩菖蒲遠志去心人參各半兩硃砂二錢為衣上為細末煉蜜丸如桐子大每服六十丸空心用愈風湯送下天麻丸風能動而多變因熱勝則動宜以靜勝躁是養血也宜和是行榮衛壯筋骨也非大藥不能治天麻酒浸三宿曬乾牛膝酒浸三宿曬乾萆薢另為末元參各六兩附子一兩炮杜仲七兩炒去絲獨活五兩羌活十兩或云十五兩當歸十兩全用生地黃六兩一方用十六兩上為細末煉蜜丸如桐子大每服五七十丸病大者加至百丸空心食前溫酒或白湯下平明服藥日高飢則食不飢則止大忌壅塞失通利故服藥半月稍覺壅塞微以七宣丸疏之使藥可為用也劉宗厚曰秦艽湯愈風湯天麻丸三方東垣云調經養血安神之劑然風而挾虛理宜補養仲景治風虛腳氣用八味丸略露端緒而世人莫能擴充之也局方骨碎補丸治肝腎風虛換腿丸治足三陰經虛專用疏通燥疾之藥既失之矣此三方較之局方雖優亦所得不償所失也何以為然秦艽湯愈風湯雖皆有補血之藥而行經散風之劑居其大半將何以養血而益筋骨也天麻丸養血壯筋骨庶幾近理治中風挾氣方烏藥順氣散治風氣攻注四肢骨節疼痛遍身頑麻及療癱瘓語言謇澀腳氣步履艱難腳膝痿弱方見前氣道閉塞條蔭按此方太陰陽明氣藥也藥性主治恐未必然嚴氏調氣之說或出於此嚴氏八味順氣散方見前氣道閉塞條蔭按宗厚曰嚴氏謂真氣虛而得此疾法當調氣故用此藥補虛行氣雖此論迥出前人其用藥則未也何者四君子補脾胃中氣藥也更用白芷去手陽明經風烏藥通腎胃間氣陳皮理肺氣青皮泄肝氣若風果在手陽明經而肝肺腎胃之氣實者可用但人身經有十二皆能中邪五臟之氣互有勝負此方安能盡其變乎又況真氣先虛之人亦難用此藥也學者詳之人參順氣散治一應中風宜先服此藥疏通氣道然後進以風藥乾薑炮人參各一兩川芎甘草炙桔梗白朮白芷陳皮去白麻黃各四兩厚朴四兩去皮薑製葛根二兩半上㕮咀每服五錢生薑三片蔥白二根水煎食後服順風勻氣散治中風中氣半身不遂口眼喎斜先宜服此或風濕腰腿疼痛亦宜服之白朮四錢天麻一錢人參二錢烏藥三錢青皮甘草炙沉香白芷紫蘇木瓜各半錢上㕮咀分二帖每帖加生薑三片水煎食遠服一方加陳皮枳殼半夏無甘草搜風九寶散治挾氣中風痰雖微去當先服此順氣並開其關竅不致枯廢然後進以風藥天雄大附子沉香防風南星炮地龍去土薄荷葉全蠍去毒木香不見火各等分上㕮咀每服二錢加生薑五片水煎熟入麝香少許服不拘時烏附丸去風疏氣川烏二十個香附子半斤薑汁浸一宿炒上焙為末酒糊丸如桐子大每服十數丸酒下肌體肥壯有風疾宜服木香丸疏風順氣調榮衛寬胸膈清頭目化痰涎明視聽散積滯檳榔大黃煨各二兩陳皮去白焙木香附子炮人參各一兩川芎羌活獨活官桂三稜炮各半兩肉豆蔻六個去皮上為細末每料末二兩入牽牛淨末一兩蜜丸桐子大每服十丸至十五丸臨臥生薑橘皮湯下此藥治療極多不能具述治中風挾痰方導痰湯治痰飲語澀頭目眩暈或胸膈留飲痞塞不通半夏南星陳皮去白茯苓枳實炒各一兩甘草五錢上銼每服四錢加生薑三片水煎服加香附烏藥沉香木香磨服名順氣導痰湯加黃芩黃連名清熱導痰湯加羌活防風白朮名祛風導痰湯加遠志菖蒲黃芩黃連硃砂名安神導痰湯星附湯治中風痰壅六脈沉伏昏不知人附子生用去皮南星生用各一兩木香半兩不見火上㕮咀每服四錢加生薑九片水煎溫服虛寒甚者加天雄川烏名三建湯蔭按風本於熱豈有虛寒之理但肥白人多濕故用以取效耳非肥白人不可用星香湯治中風痰盛服熱藥不得者南星六錢木香二錢上㕮咀每服四錢加生薑十片水煎服星附散治中風雖能言口不歪斜而手足嚲拽者天南星薑製半夏人參白附子白茯苓川烏去皮臍黑附子去皮臍白殭蠶沒藥各等分上㕮咀每服五錢水酒各一盞煎八分熱服並進得汗為度小省風湯治卒急中風口噤全不能言口眼喎斜筋脈急掣疼痛風盛痰實頭目旋眩胸膈煩滿左癱右瘓手足麻痹骨節煩疼步履艱辛恍惚不定神志昏憒一切風證可服此方散風豁痰降火可謂標本兼治者也防風去蘆天南星生用各三錢半夏湯洗黃芩各二錢甘草生用一錢上㕮咀作一服生薑五片水煎不拘時服氣逆加木香氣虛加附子沉香胸滿加人參頭暈加天麻全蠍煎熟入麝香少許大省風湯治中風痰涎壅盛口眼歪斜半身不遂半夏生用防風各一兩甘草炙半兩全蠍去毒二兩白附子生用川烏生用木香南星生用各半兩上㕮咀每服五錢水一盞姜十片煎七分溫服大省風湯治中風痰涎壅盛半身不遂及歷節痛風筋脈拘急天南星生用八兩防風四兩獨活附子生用去皮臍全蠍微炒甘草生用各二兩上㕮咀每服四錢生薑十片水煎溫服貝母瓜蔞湯治肥人中風口喎手足麻木左右俱作痰治貝母瓜蔞南星荊芥防風去蘆羌活黃柏黃芩黃連白朮陳皮去白半夏湯泡七次薄桂威靈仙天花粉甘草炙各等分上銼每服七錢加生薑三片水煎至夜服多食濕面加附子竹瀝薑汁酒一匙行經二香三建湯治中風六脈虛極舌強不語痰涎壅盛精神如癡手足偏廢不能舉用此等證候不可攻風止可扶虛天雄附子川烏皆生用去皮臍各二錢木香一錢沉香水磨旋入用上㕮咀分二帖每服水二鍾生薑十片煎八分去渣食遠溫服化風丹治一切中風痰厥風癇牙關緊急不省人事及小兒驚風搐搦角弓反張發熱痰嗽喘促並皆治之天南星牛膽制過五錢天麻煨防風去蘆荊芥穗羌活獨活人參去蘆細辛川芎各一錢一方加木香五分尤效上為細末煉蜜丸如芡實大硃砂為衣薄荷煎湯研化服因氣惱用紫蘇湯化下如牙關口噤用少許擦牙即開四神丹治手足頑麻痰涎壅盛頭目昏眩肩背拘急天麻南星防風各一兩薄荷五錢上為末酒糊丸如緑豆大每服二十丸荊芥生薑煎湯下三生丸治痰厥頭痛中風痰涎壅盛者半夏白附子天南星各等分上為末生薑自然汁浸蒸餅為丸如緑豆大每服四五十丸食後薑湯下青州白丸子治男婦風痰壅盛手足癱瘓嘔吐涎沫及小兒驚風並皆治之半夏生用七兩天南星生用二兩白附子生用二兩川烏頭去皮臍生用半兩上搗羅為末以生絹袋盛於井花水內擺出未出者更以手揉令出以滓更研再入絹袋擺盡為度於瓷盆中日曬夜露每日一換新水攪而復澄春五夏三秋七冬十日去水曬乾如玉片碎研以糯米粉煎粥清為丸如緑豆大常服二十丸生薑湯下不拘時如癱瘓風以溫酒送下如小兒驚風薄荷湯下三五丸加味青州白丸子治卒中風邪半身不遂口眼喎斜痰涎閉塞及小兒諸風並皆治之白附子天南星半夏川薑一云川芎各二兩天麻白殭蠶全蠍各一兩川烏頭去皮尖半兩上並生用為細末麵糊為丸如梧桐子大每服三五十丸生薑湯下不拘時如癱瘓風溫酒下小兒驚風薄荷湯下真方白丸子治中風痰涎壅盛口喎不語半身不遂及小兒驚風潮搐初覺中風可常服之永無風疾壅隔之患大半夏湯泡七次白附子洗淨略炮天南星略炮天麻川烏頭去皮炮全蠍去毒炒枳殼去穰麩炒木香各一兩上為細末生薑汁打糊丸如桐子大每服二十丸食後臨臥茶清熱水下癱瘓風酒下日三服小兒驚風薄荷湯下二丸此方散風豁痰又能利氣比上二方尤為得之上清白附子丸治諸風痰甚頭目疼眩旋運欲倒嘔噦噁心恍惚不安神思昏憒肢體倦痛頸項強硬手足頑麻常服除風化痰清利頭目白附子炮半夏湯洗川芎菊花南星炮殭蠶炒陳皮去白旋覆花天麻各一兩全蠍炒半兩上為細末用生薑汁浸蒸餅為丸如桐子大每服三十丸食遠生薑湯下琥珀壽星丸安神定志去風化痰天南星一斤掘深坑二尺用炭火三十斤於坑內燒紅取出炭火掃淨用好酒五升澆之將南星趁熱下坑內用盆急蓋訖泥壅合經一宿開取出為末入琥珀末一兩硃砂末五錢和勻以生薑汁煮糊熟然後入豬心血三具攪勻和末為丸如桐子大硃砂為衣每服五十丸空心人參湯下日三服神效蘇青丹治風痰壅盛手足癱瘓及小兒驚風青州白丸子末三兩蘇和香丸末一兩上二味和勻用薑汁麵糊為丸如桐子大每服三四十丸淡薑湯下腦朱丹治諸風痰盛頭痛目眩氣鬱積滯胸膈不利硃砂二兩二錢半龍腦一錢白附子炮去皮臍石膏煅紅令冷各半斤上為末燒粟米飯丸如小豆大硃砂為衣每服三十丸食後茶酒送下烏龍丸治諸風烏頭三兩天南星半夏曲殭蠶炒烏藥白膠香另研各半兩上為末酒糊丸如桐子大每服四丸空心酒下局方八風丹半夏白礬制一兩白殭蠶炒白附子炮各五錢滑石研天麻酒浸龍腦麝香研各二錢半寒水石燒赤水飛半斤上為細末入碾藥再碾勻煉蜜丸櫻桃大細嚼一丸荊芥湯茶湯任下食後服辰砂天麻丸天麻二兩南星二兩薑汁浸切片川芎二錢半白附子炮五錢白芷一錢八分半麝香二錢二分半硃砂五錢一分一半入藥一半為衣上為細末水糊丸如桐子大每服二十丸荊芥湯下不拘時治中風挾火方防風通聖散治風熱壅盛表裡三焦皆實者此方主之防風川芎當歸芍藥大黃麻黃薄荷葉連翹芒硝各五分石膏黃芩桔梗各一錢滑石三錢甘草二錢荊芥梔子白朮各二分半上㕮咀作一服加生薑三片水煎服不拘時如痰嗽加半夏一錢蔭按夫防風麻黃解表藥也風熱之在皮膚者得之由汗而泄荊芥薄荷清上藥也風熱之在巔頂者得之由鼻而泄大黃芒硝通利藥也風熱之在腸胃者得之由大便而泄滑石梔子水道藥也風熱之在決瀆者得之由小便而泄風淫於膈肺胃受邪石膏桔梗清肺胃也而連翹黃芩又所以祛諸經之遊火風之為患肝木主之川芎當歸白芍和肝血也而甘草白朮又所以和胃氣而健脾劉守貞氏長於治火此方之旨詳且悉哉清氣宣風散治上焦風熱氣不升降膈上有痰兼治兩目赤澀耳鳴耳塞不聽川芎生地黃半夏湯泡七次羌活殭蠶炒各八分當歸白朮芍藥各一錢防風去蘆枳殼麩炒甘菊花陳皮荊芥升麻黃連梔子炒各五分蛇蛻炒茯苓各六分甘草三分上㕮咀分二帖每帖加生薑三片棗一枚水煎食遠服仙術芎散治風熱壅盛頭目昏眩明目聰耳消痰清神蒼朮米泔浸一兩川芎連翹黃芩菊花防風大黃梔子當歸芍藥桔梗藿香各五錢石膏二兩滑石甘草各三兩荊芥薄荷砂仁各三錢上㕮咀每服五錢水煎食後服川芎石膏湯治風熱上攻頭目昏眩痛悶風痰喘嗽鼻塞口瘡煩渴淋悶眼生翳膜此藥清神爽志宣通氣血治中風偏枯解中外諸邪調理諸病勞復傳染川芎芍藥當歸山梔子黃芩大黃菊花荊芥穗人參白朮各半兩防風連翹薄荷石膏各一兩寒水石桔梗各二兩甘草三兩砂仁二錢半滑石四兩上為末每服三錢水煎食後服水調亦得忌姜醋發熱物犀角防風湯治一切諸風口眼喎斜手足嚲拽語言謇澀四肢麻木犀角磨水臨服時入羌活防風天麻甘草炙麻黃獨活山梔子各五分滑石一錢五分石膏七分荊芥連翹當歸黃芩薄荷桔梗白朮細辛全蠍炒各四分上銼加生薑五片水煎稍熱服取汗大便祕結加大黃一錢瀉青丸治中風發熱不能安臥此風熱煩躁之故也當歸川芎梔子炒黑羌活大黃酒蒸防風龍膽草各等分上為末煉蜜丸如彈子大每服一丸竹葉湯化下蔭按吳氏曰肝主風少陽膽則其腑也少陽之經行乎兩脅風熱相干故不能安臥此方名曰瀉青瀉肝膽也犀角丸除三焦邪熱疏一切風氣治風盛痰實頭目昏重肢節拘急痰涎壅滯腸胃燥澀大小便難黃連去須犀角鎊各十兩人參二十兩大黃八十兩黑牽牛一百二十兩炒另搗取粉六十兩上為細末與牽牛粉合和煉蜜丸如桐子大每服十五丸至二十丸臨臥溫湯下更量虛實加減龍星丹治諸風熱痰涎壅盛牛膽南星硃砂另研為衣各三錢片腦另研三字牛黃另研三字麝香另研三字全蠍防風薄荷各一錢黃芩黃連各二錢青黛另研一錢上為細末煉蜜丸如龍眼大每服一丸噙化清涼丹治風熱壅實上攻頭面口眼喎斜語言不正肌肉瞤動面若蟲行及治傷寒熱盛狂言昏冒剛痙及一切風熱並皆治之南星臘月牛膽制四兩石膏蠍梢去毒各一兩半大黃防風犀角屑甘草炙白花蛇硃砂珍珠各一兩牛黃三