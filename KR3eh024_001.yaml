一錢上共為細末聽用外取麻黃去節二斤紫背浮萍八兩共用水煎濃去渣再熬成膏和勻為丸如圓眼大金箔為衣每服一丸蔥姜煎酒送下治中風小便不利方三因白散子治肝腎中風痰涎壅塞不語嘔吐痰沫頭目昏眩兼治陰證傷寒六脈沉伏及霍亂吐瀉小便淋瀝不通大附子去皮臍生用滑石桂府者各半兩製半夏七錢半上為末每服二錢水二盞姜七片蜜半匙煎七分空心冷服霍亂加藿香小便不利加木通燈心茅根治口眼喎斜方古防風湯治卒中口眼喎斜言語謇澀四肢如故別無所苦防風羌活各三錢甘草一分上銼水煎入麝一釐調服一方取空青末如豆大一枚含之即愈不換金丹治中風口喎荊芥穗白殭蠶甘草炙防風去蘆天麻各一兩川烏頭生用白附子生用羌活去蘆細辛去葉川芎蠍梢去毒炒藿香各半兩薄荷三兩上為細末煉蜜和丸如彈子大每服一丸細嚼茶清任下如口喎向左用此藥塗右腮上便正清陽湯治眼喎斜頰腮緊急胃中火盛汗不出而小便數黃耆當歸身升麻各二錢葛根一錢半炙甘草紅花黃柏酒炒桂枝各一錢蘇木生甘草各五分上㕮咀作一服酒三盞煎至一盞三分去渣稍熱食前服訖以火尉摩緊急處即愈夫口喎筋急者是筋脈血絡中大寒此藥少代燔針劫刺惡血以去凝結內泄衝脈之火熾一方治中風面目相引口偏著耳牙車急舌不得轉獨活三兩竹瀝生地黃汁各一升上三味合煎取一升頓服即愈秦艽升麻湯治中風手足陽明經口眼喎斜四肢拘急惡風寒升麻乾葛甘草炙芍藥人參各五錢秦艽白芷防風桂枝各三錢上㕮咀每服一兩水二盞連須蔥白三莖煎至一盞去渣稍熱食後服藥畢避風寒臥得微汗出則止丹溪方治一人口眼喎斜先自右邊牙疼白朮一錢半南星一錢防風蒼朮半夏各五分茯苓桂枝各三分甘草炙二分上銼水煎入薑汁一合服定風餅子治風客陽經邪傷腠理背脊強直口眼喎斜體熱惡寒痰厥頭痛肉瞤筋惕卒頞鼻淵及飲酒過多嘔吐涎沫頭痛眩暈如坐車船常服解風邪傷寒闢霧露瘴氣爽慧神志諸風不生天麻川烏南星半夏川薑川芎白茯苓甘草生各等分上為細末薑汁為丸如龍眼大作餅子硃砂為衣每服一餅細嚼熱薑湯下不拘時枳茹酒主口僻眼急諸藥不瘥大驗枳實上青刮取末欲至心止得茹五升微火炒去濕氣以酒一斗漬微火暖令得藥味隨性飲之豆淋酒治口喎大豆三升炒令焦好酒三升淋取汁頓服一日一服三蚣散治諸風口眼喎斜蜈蚣三條用蜜炙一條酒浸一條紙裹煨熟一條白芷半兩南星三個每個切作四塊逐個如蜈蚣法制上為細末入真麝香少許熱酒調一盞食後服牽正散治中風口眼喎斜無他證者白附子白殭蠶全蠍去毒並生用各等分上為末每服二錢熱酒調下不拘時一方治中賊風口偏不能語者吳茱萸一升清酒一升和煮四五沸服半升日三服得少汗瘥塗法內經治口眼喎斜多屬足陽明筋病蓋足陽明筋結頰上得寒則急得熱則弛左寒右熱則左頰筋急牽引右之弛而右隨急牽右喎者左也右寒左熱則右頰筋急牽引左之弛者而左隨急牽左喎向右也故其治法以火灸且為之膏油尉其急者以白酒調和桂末塗其弛者又以桑為鉤鉤其舌吻之喎僻處使正平而高下相等復以水調生桑灰於鉤柄之坎縫處連頰塗之以收其弛兼飲姜酒啖美肉使筋脈氣和以助外之塗尉不飲酒者自強其筋骨以手拊拍其急處使證自去也改容膏治中風口眼喎僻萆麻子一兩真冰片三分寒月加乾薑附子各一錢上共搗為膏喎僻在左以此膏敷其右在右以此膏敷其左今日敷之明日改正故曰改容或以蜣螂冰片敷之或以鱔魚血冰片敷之皆良蓋此三物者皆引風拔毒之品也佐以冰片取其利氣而善走竅佐以薑附取其溫熱而利嚴寒此惟冬月加之他時弗用也天仙膏治卒暴中風口眼喎斜天南星一大個白及二錢大草烏頭一個殭蠶七個上為末用生鱔血調成膏敷喎處覺正洗去天南星膏治同前天南星不拘多少上為末用生薑自然汁調左喎貼右右喎貼左如正洗去一方用萆麻子去殼搗爛右喎塗左左喎塗右或取鱔魚血入麝香少許塗之即正一方酒煮桂枝汁一升以故布浸拓病上則正左喎斜拓右右喎斜拓左此祕方不傳常用大效一方大皂莢一兩去皮子搗篩以三年石灰末水和左喎塗右右喎塗左干又塗之一方取硬石灰一合以醋炒和泥於患偏風牽口喎斜人口唇上不患處一邊塗之立便牽正一方牡蠣附子礬石灶下黃土各等分上四味為末取三年雄雞冠血和藥敷其上持鏡看候欲復故便急洗去之不速去便過不復還也千金翼云偏左塗右偏右塗左一方治中風口喎用巴豆七枚去皮爛研喎左塗右手心喎右塗左手心仍以暖水一盞安向手心須臾即便正洗去藥並頻抽掣中指治中風口喎灸法以筆管五寸長插入耳內外以面塞四圍勿令透風一頭以艾灸七七壯右喎灸左左喎灸右耳痛亦灸得又法於耳垂下用麥粒大艾柱灸三壯左喎灸右右喎灸左治失音不語方滌痰湯治中風痰迷心竅舌強不能言南星薑製半夏湯泡七次各二錢半枳實麩炒茯苓各二錢橘紅一錢半石菖蒲人參各一錢竹茹七分甘草五分上作一服水二鍾生薑七片煎至一鍾食後通口服清心散治舌強不能言語青黛硼砂薄荷各二錢冰片牛黃各三分上為細末先以蜜水洗舌上後以薑汁擦之將藥蜜水調稀擦舌本上訶子湯治諸風失音不語訶子四個半生半炮桔梗一兩半生半熟甘草一寸半生半熟上為細末每服五錢用童子小便一鍾煎至七沸溫服甚者不過三服效正舌散治中風舌強語塞雄黃研荊芥各等分上為末每服二錢用豆淋酒調下茯神散治中風舌本強硬語言不正茯神去木微炒一兩薄荷焙二兩蠍梢去毒二錢五分上為末