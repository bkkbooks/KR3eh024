兩杏仁四十枚上十六味㕮咀以水七升煎減半納瀝再煮取二升五合分三服取汗間五日更服一劑頻服三劑漸覺少損仍進後方竹瀝三升防風升麻羚羊角防己桂心芎藭各二兩麻黃三兩上八味㕮咀以水四升合竹瀝煮取二升半分三服兩日服一劑常用加獨活三兩此方神良頻進三劑若手足冷者加生薑五兩白朮二兩若未除更進後方竹瀝一升人參甘草芎藭獨活升麻各二兩防風麻黃芍藥各二兩半白朮黃芩防己石膏附子一作杏仁桂心羚羊角生薑各二兩上十七味㕮咀以水八升煮減半納瀝煮取二升半分三服相去如人行十里久更服若有氣者加陳皮牛膝五加皮各一兩換骨丹治癱瘓中風口眼喎斜半身不遂並一切風癇暗風並宜服之頌曰我有換骨丹傳之極幽祕疏開病者心扶起衰翁臂氣壯即延年神清目不睡南山張仙翁三百八十歲槐皮芎術芷仙人防首蔓十件各停勻苦味香減半龍麝即少許硃砂作衣纏麻黃煎膏丸大小如指彈修合在深房勿令陰人見夜臥服一粒遍身汗津滿萬病自消除神仙為侶伴槐角取子桑白皮仙術川芎香白芷人參威靈仙防風去蘆何首烏蔓荊子各四兩廣木香一方作香附五味子苦參各二兩硃砂研一方無龍腦研麝香研各少許麻黃煎成膏上件俱為細末用麻黃膏和勻入臼內杵一萬五千下每兩分作十丸每服一丸研碎溫酒半盞浸化以物蓋之不可透氣食後臨臥一呷咽下用被蓋臥汗出即瘥如不飲酒白湯化下萬靈丹治二十四般氣三十六種風左癱右瘓口眼喎斜半身不遂語言謇澀風濕疼痛一切諸風並皆治之蒼朮米泔浸四兩全蠍去毒炒三錢硃砂另研三錢半石斛去蘆天麻草烏炮川烏炮去皮臍川芎何首烏去黑皮甘草炙細辛荊芥當歸酒浸羌活去蘆防風去蘆麻黃各五錢雄黃另研二錢半上為細末煉蜜為丸如彈子大每服一丸不拘時候用溫酒化下追風如聖散治男子婦人諸般風疾左癱右瘓口眼歪斜語言謇澀行步艱難半身不遂及破傷風或瘋狗咬傷濕氣等證並可治之如服藥後通身汗麻是藥之效也或麻久不過者用茶清解之無事惟妊婦不可服川烏面炮火煨蒼朮米泔浸草烏炮各四兩石斛一兩麻黃甘草天麻全蠍去毒炒前胡一方作細辛當歸藁本防風荊芥何首烏白芷川芎各五錢人參兩頭尖各三錢上為細末每服五分病沉者一錢用無灰好酒調食遠臨睡服忌一切熱物鎮風丹治男婦遠年近日風濕筋骨痛半身不遂左癱右瘓四肢麻痹風邪入骨手足頑麻拘攣屈伸無力言語失音不能行動及暴中風邪不省人事川烏去皮臍生用川芎赤小豆甘草麻黃羌活白芷香附子炒去毛草烏南星芍藥細辛去葉各二兩地龍去土白茯苓甘松官桂防風去蘆天麻酒浸沒藥另研白膠香另研白附子炮各一兩乳香另研麝香另研硃砂另研為衣全蠍各五錢白朮當歸去蘆各二錢半上為細末煉蜜丸每兩作十丸硃砂為衣每服一丸細嚼酒下不飲酒茶下暴中風邪並破傷風小兒急慢驚風生薑汁同酒下活絡丹治中風癱瘓手足不用日久不愈者經絡中有濕痰死血也此方主之膽南星川烏炮去皮臍草烏炮去皮各六兩地龍去土火干焙乳香去油沒藥各二兩二錢上為細末煉蜜丸如彈子大每服一丸細嚼酒下蔭按膽南星之辛烈所以燥濕痰二烏之辛熱所以散寒濕地龍即蚯蚓也濕土所生用之者何易曰方以類聚欲其引星烏直達濕痰所聚之處所謂同氣相求也亦內經佐以所利和以所宜之意風邪注於肢節久久則血脈凝聚不行故用乳香沒藥以消瘀血神效活絡丹治風濕諸痹肩臂腰膝筋骨疼痛口眼喎斜半身不遂行步艱辛筋脈拘攣此藥能清心明目寬膈宣通氣血年逾四十預服十數丸至老不生風病白花蛇二兩酒浸焙乾烏梢蛇半兩酒浸焙乾麻黃二兩去節細辛一兩全蠍一兩半去毒兩頭尖二兩酒浸赤芍藥一兩貫芎二兩防風二兩半菖根二兩半沒藥一兩另研血竭七錢半另研硃砂一兩另研烏羊屑半兩地龍半兩去土甘草二兩去皮炙丁香一兩白殭蠶一兩炒乳香一兩研麝香半兩研片腦一錢半另研官桂一兩去粗皮草豆蔻二兩羌活二兩虎脛骨一兩酥炙元參一兩牛黃二錢半另研天麻二兩威靈仙一兩半酒浸藿香二兩天竺黃一兩敗龜板一兩酥炙人參一兩何首烏二兩白芷二兩烏藥一兩安息香一兩青皮一兩黑附子一兩去皮炮香附一兩白豆蔻一兩骨碎補一兩黃連二兩茯苓一兩黃芩二兩白朮一兩熟地黃二兩松香脂半兩大黃二兩當歸一兩半木香二兩沉香二兩金箔為衣上為細末煉蜜為丸如彈子大每服一丸細嚼溫酒酒清漱下隨證上下食前後服頭風擂茶下家寶丹治一切風疾癱瘓痿痹不仁口眼喎斜邪入髓者可服川烏南星五靈脂薑汁製草烏各六兩天麻羌活殭蠶炒各三兩地龍四兩白附子全蠍沒藥乳香辰砂各二兩雄黃輕粉各一兩片腦半兩麝香二錢半上為末作散調三分不覺調五分或蜜丸如彈子大含化茶酒送下仙傳黑虎丹治男子婦人虛弱血氣衰敗筋骨寒冷外感風濕傳於經絡手足麻木腰腿疼痛久則偏枯左癱右瘓口眼喎斜諸中風氣不能行履並治之草烏洗淨去皮切片蒼朮米泔浸二宿切片生薑擂碎各一斤蔥連須葉白搗碎半斤上四味和一處拌勻㷈之春五日夏三日秋七日冬十日每日一番拌勻候日數足曬乾五靈脂洗淨乳香沒藥各五錢穿山甲火煅存性二兩自然銅火煅醋淬七次一兩上同前藥為末用好醋糊為丸如桐子大每服三十丸空心熱酒下間日服尤妙婦人血海虛冷肚腹疼痛臨臥醋湯下止服二三十丸不可多服服後不可飲冷水冷物但覺麻木為效孕婦不可服安魂琥珀丹治中風左癱右瘓口眼喎斜心神不安天麻川芎防風細辛白芷羌活川烏炮去皮臍荊芥穗殭蠶各一兩薄荷葉三兩全蠍粉甘草藿香硃砂細研水飛各半兩麝香珍珠琥珀各一兩上為細末煉蜜丸如彈子大金箔為衣空心茶清或酒送下一丸若蛇傷狗咬破傷風牙關緊急先用一丸擦牙後用茶清調下一丸如小兒初覺似痘疹即用茶清調一丸與服大能安魂定魄及疏風順氣四生丸治中風左癱右瘓口眼喎斜川烏去皮五靈脂當歸尾骨碎補各等分上為末用無灰酒打糊丸如桐子大每服十丸加至十五丸溫酒下服此藥不可服靈寶丹神仙飛步丹治諸風濕癱瘓等證蒼朮八兩草烏四兩不去皮尖川芎香白芷各一兩上用生薑連須蔥各四兩搗爛和藥末拌勻以瓷器築藥於內紙封勿令出氣春三夏二秋五冬七日取出曬乾或焙乾為細末醋糊丸如桐子大每服十五丸空心茶酒任下忌發熱之物加至二十丸孕婦勿用腦麝祛風丸治左癱右瘓最效白花蛇頭一個帶頸三寸酒浸炙烏梢蛇尾二個長七寸酒浸炙川烏尖七個去黑皮附子底四個去黑皮南星炮半夏薑製白附子防風細辛天麻全蠍去毒炒殭蠶炒去絲嘴草烏炮各半兩片腦麝香各另研一分上為細末生薑汁糊為丸如桐子大每服五十丸煎小續命湯下白龍丹治男子婦人諸般風證左癱右瘓半身不遂口眼喎斜腰背疼痛手足頑麻語言謇澀行步艱難遍身瘡疥上攻頭目耳內蟬鳴痰涎不利皮膚瘙癢偏正頭疼一切諸風病皆治之川芎防風各十二兩滑石一斤草烏十兩生用兩頭尖甘草各八兩川烏桔梗寒水石各四兩何首烏二兩四錢地骨皮茴香各一兩七錢廣木香一兩半白及一兩四錢藁本甘松白芷香附子良薑薄荷當歸白芍藥羌活川椒去子炒零陵香藿香葉全蠍生用細辛荊芥穗甘菊花麻黃去根各一兩人參升麻天麻殭蠶炒斷絲乾葛各七錢蘄州白花蛇一條去頭尾酒浸三日去骨皮將肉焙乾為末烏梢蛇一條同上制麝香一錢同滑石為衣豆粉四兩為糊白麵半斤蛇酒為糊上四十一味為末蛇酒打糊為丸如彈子大滑石為衣曬乾收用每服一丸臨臥茶清或酒化服忌熱性物靈應丹治癱瘓四肢不舉風痹等疾麻黃五斤去根節銼一寸長取河水五斗以無油膩鍋煮至一斗以來漉去麻黃冷定用細羅子濾去渣取清者鍋內再熬成膏熬時勤攪勿令著底焦了白芷桑白皮蒼朮甘松浮萍各二兩川芎苦參各三兩上為細末以麻黃膏為丸如彈子大每服一丸溫酒化下臨臥服隔二三日再服手足即時輕快及治卒中風邪涎潮不利小兒驚風服之立效但熬時忌雞犬婦人見之金棗兒治中風不語左癱右瘓口眼喎斜不省人事及破傷風牙關緊急角弓反張或瘋狗咬傷並皆治之蒼朮米泔浸細辛去葉白朮當歸酒洗天麻草烏各一兩川烏炮去皮臍防風去蘆兩頭尖川芎各一兩三錢香白芷八錢沒藥乳香雄黃硃砂白花蛇酒浸去骨各五錢穿山甲酥炙蟬蛻洗各三錢麝香二錢金箔五貼上為細末煉蜜丸如棗核大用金箔為衣每服一丸或半丸溫酒化服輕腳丸治左癱右瘓腳弱不能行履木鱉子別研白膠香別研白芍藥各二兩草烏去皮尖四兩赤小豆一兩別研為末打糊上末之赤豆糊為丸如桐子大每服七丸加至十丸溫酒或木瓜湯下病在上食後臨臥服病在下空心服忌熱物少時伏虎丹專治左癱右瘓生乾地黃蔓荊子白殭蠶炒去絲各二錢半五靈脂半兩躑躅花炒南星白膠香草烏炮各一兩上末之酒煮半夏末為糊丸如龍眼大每服一丸分四服酒吞下日進二服此建康烏衣巷有老人姓鍾素好道因酒患風百治無效一日忽有道人至授此方藥服之道人忽不見已而病除乃知仙方也左經丸治左癱右瘓手足顫掉言語謇澀渾身疼痛筋脈拘攣不得屈伸項背強直下注腳膝行履艱難及跌撲閃肭外傷內損常服通經絡活血脈疏風順氣壯骨輕身黑豆一斤以般蝥二十一枚去頭足同煮候豆脹為度去之取豆焙乾般蝥音班謀一名斑貓川烏炮去皮臍二兩乳香研一兩沒藥一兩半草烏炮四兩上為末醋糊丸如桐子大每服三十丸溫酒下不拘時骨碎補丸治肝腎風虛上攻下注筋脈拘攣骨節疼痛頭面浮腫手臂少力腰背強痛腳膝緩弱屈伸不利行履艱難荊芥穗白附子炮牛膝酒浸焙乾肉蓯蓉酒浸一宿切片焙骨碎補去毛炒威靈仙縮砂仁各半兩地龍去土微炒沒藥各二錢半自然銅醋淬九遍草烏頭炮去皮臍半夏湯浸七次各半兩上為細末酒煮麵糊為丸如桐子大每服五丸至七丸溫酒下婦人醋湯或當歸酒下妊娠不宜服鎮風丸一名黑神丸治癱瘓風手足嚲曳口眼喎斜語言謇澀步履不能草烏去皮臍生用五靈脂去砂石各一兩麝香五錢上為末研極細用飛羅面好酒搗成膏每兩作十塊用生薑汁好酒磨下一方無麝六月六日丸如彈子大用薄荷酒化下一方用川烏並有腦麝用水丸桐子大輕骨丹治中風癱瘓四肢不遂風痹等疾苦參桑白皮白芷蒼朮甘松川芎各三兩麻黃去節五兩用河水三升煮至一升去渣熬成膏上為末入麻黃膏和丸如彈子大每服一丸溫酒研化服之臥取汗五七日間再服手足當即輕快卒中涎潮分利涎後用之一方有浮萍四兩古硫附丸治虛風癱瘓神效用附子一枚重一兩以童便入粉草五錢煮一日附子中心無白點為度取出挖空入礬制硫黃五錢以未蓋之又用麵包入火內煨熟去面取硫附同搗丸如桐子大每服七分或五分量虛實大小溫酒送下不拘時白龍鬚經驗方此藥性平無毒專治男子婦人風濕腰腿疼痛動止艱難左癱右瘓口眼喎斜半身不遂不拘遠年近日及婦人産後氣血流散脛骨頭目昏暗腰腿疼痛不可忍者一切並皆治之惟勞證癱瘓不應白龍鬚研為細末每服氣壯者一錢氣虛者七分用無灰好酒調下將臥房床帳封固不許通風如病在左就將左邊身挨床睡如病在右就將右邊身挨床睡汗出待自干不許多蓋被褥三日不許下床見風違者如故一方用前藥三錢放瓷盆內入酒鍋中燒酒一壺病者每日先服桔梗湯一小白鍾少頃次服藥酒二小白鍾早一服臨睡一服此酒可治未深之病效驗如神慎之祕之但白龍鬚人不知所産所生之處有等萬纏草根生於白線樹根其細絲相類但有枝莖且稍粗採者不認真實一概充用故不效也此藥極難得十無一真藥無苗近水旁有亂石處寄生搜風樹根下其藥石樹之餘精也細如鬃絲無枝莖條條直生是也無水無石不産古人傳方云若得白龍鬚一斤如得黃金數斗勿得輕易宜珍重藏之一名天濟化龍鬚一名地生潛龍鬚一名活人老龍鬚此四名俱不載於本草一方初服如前法出汗三日之後食後日服白龍鬚一分好酒下隔一日服二分又隔一日服三分又隔一日服四分又隔一日服五分以五分為止如隔一日從頭照前次第每服之周而復始服至月餘其病漸愈矣隔日服者所為年久痰老氣微謂之升陽降氣調髓蒸骨追風逐邪排血安神全忌房事羊魚雞肉並蒜韭寒冷之物又不可過飲酒多米粥少麵食一方婦人産後血氣流散脛骨或腰腿手足腫痛者先服當歸湯日進二服為通脛次日服白龍鬚七分酒調下汗出待乾即愈一方男婦風濕腰腿疼痛麻木動止艱難者先服滲濕湯加小續命湯作一服不汗謂之氣滯次日服白龍鬚如前方老少加減汗出即愈以上諸方治癱瘓攻邪解痛之劑加味大補湯治左右手足癱瘓用此大補血氣黃耆蜜炙人參白朮白茯苓當歸酒洗川芎白芍藥酒炒大附子麵裹煨去皮臍沉香木香肉桂甘草各三分烏藥牛膝去蘆酒洗杜仲去皮酒炒木瓜防風去蘆羌活獨活薏苡仁各五分上銼一劑加薑棗煎服側子散治中風手足不遂言語謇澀今用屢效側子炮一兩附子炮羅參白朮煨白茯神去皮肉桂赤芍藥當歸去蘆酒洗川芎秦艽去蘆各一兩防己七錢半防風麻黃粉草炙各五錢甘菊花去梗北細辛去苗白茯苓去皮各二兩上㕮咀每服五錢生薑三片棗一枚水煎服不拘時蔭按用藥治病之法寒因熱用熱因寒用正治也今中風癱瘓之證本風火陽邪而用烏附等熱藥治之何哉蓋中風癱瘓乃濕痰死血結滯於臟腑經絡之間非烏附熱藥而能開散流通之乎此非正治乃從治也書云從多從少各觀其事則從治之藥但可用為引經而已不可多用不可過服大防風湯去風順氣和血壯筋又治痢後腳痛緩弱不能行履名曰痢風或兩膝腫痛腳脛枯瘦名曰鶴膝風熟地黃酒洗白朮當歸芍藥黃耆杜仲去粗皮炒斷絲各二兩川芎附子炮去皮臍各一兩半羌活去蘆人參去蘆防風去蘆牛膝酒浸去蘆甘草炙各一兩上㕮咀每服四錢生薑七片棗一枚水煎食後溫服大三五七散治八風五痹癱瘓嚲曳口眼喎斜眉角牽引項背拘強牙關緊急心中憒悶神色如醉遍身發熱骨節煩疼肌肉麻木腰膝不仁皮膚瞤動或如蟲行又治陽虛頭痛風寒入腦目旋運轉如舟船之上耳內蟬鳴或如風雨之聲應風寒濕痹腳氣緩弱等疾山茱萸乾薑炮茯苓去皮各三斤細辛一斤半防風四斤附子炮去皮臍三十五枚上為細末溫酒調下二錢食前服舒筋保安散治左癱右瘓筋脈拘攣身體不遂腳腿少力乾溼腳氣及濕滯經絡走注疼痛久不能去用此宣通則愈木瓜五兩萆薢五靈脂牛膝酒浸續斷白殭蠶松節白芍藥烏藥天麻威靈仙黃耆當歸防風虎骨酒炙各二兩上用無灰酒一斗浸上藥二七日緊封扎壇口待日數足取藥焙乾搗為細末每服二錢就用浸藥酒半盞調下如酒盡用米湯下一方加金毛狗脊一兩卻將乳香白膠香各一兩同研入干藥末內五加皮酒去一切風濕痿痹壯筋骨添精髓常服益人用五加皮洗刮去骨煎汁和曲米釀成酒飲之或用五加皮一斤銼碎袋盛入好酒一金華壇煮滾不拘時飲微醺一方加當歸牛膝地榆史國公藥酒方專治風疾半身偏枯手足拘攣不堪行步神效防風去蘆秦艽去蘆油松節虎脛骨酥炙鱉甲醋炙白朮炒各二兩羌活萆薢晚蠶砂炒當歸酒洗川牛膝去蘆杜仲去皮姜炒各三兩蒼耳子四兩枸杞子五兩干茄根八兩上銼碎盛布袋中放大壇內入無灰好酒三十五斤封壇口浸十四日滿將壇入水鍋懸煮一時埋土內三日去火毒每日清晨午後各服五七鍾酒盡以藥渣曬乾搗為細末酒糊為丸加白茯苓甘草陳皮半夏薑製厚朴姜炒蒼朮米泔浸二日香附枳殼去穰麻黃防風羌活獨活細辛白芷乾薑官桂各一兩烏藥川烏草烏三味各炮去皮臍砂仁杏仁去皮尖木香沉香川椒小苗香天門冬去心麥門冬去心五味子枸杞子牛膝破故紙肉蓯蓉何首烏五加皮小紅棗胡桃肉泡去皮北蜜各八兩真酥油上共四十四味俱銼片用生絹袋盛之用好酒一大金花壇浸藥三日封固放鍋內懸煮三個時辰取出埋土中三日出火毒每日空心服三盞日進三服其藥渣曬乾為末本酒打糊丸如桐子大每服三十丸空心本酒下愈風丹治足三陰虧損風邪所傷致肢體麻木手足不遂等證天麻牛膝酒浸焙萆薢另研細元參各六兩獨活五兩肉桂三兩杜仲七兩羌活十四兩當歸熟地黃生地黃各一斤上為末煉蜜丸如桐子大常服五七十丸病大百丸食前溫酒白湯任下健步虎潛丸治中風左癱右瘓手足不能動舌強謇於言此方滋補宜於虛熱者黃耆鹽水炒一兩半白芍藥鹽酒炒二兩人參一兩白朮二兩白茯神去皮木一兩當歸酒洗一兩半生地黃酒洗二兩熟地黃二兩枸杞子酒洗一兩半五味子五錢虎脛骨酥炙二兩龜板酥炙一兩半牛膝酒洗二兩杜仲姜酒炒二兩破故紙鹽酒炒一兩黃柏人乳拌鹽酒炒三兩知母同上制二兩麥門冬去心二兩遠志甘草水泡去心二兩石菖蒲一兩酸棗仁炒一兩沉香五錢木香一兩薏苡仁炒一兩羌活酒洗一兩獨活酒洗一兩防風酒洗一兩大附子童便浸煮去皮臍五錢上為細末煉蜜加豬脊髓五條為丸如桐子大每服百丸空心鹽湯溫酒任下鹿角霜丸治虛損半身痿弱或二三年不能動履者此方溫補宜於虛寒者當歸酒洗三兩黃耆蜜水炒人參白茯苓白朮川芎白芍藥酒炒熟地黃酒蒸蒼朮米泔浸破故紙酒炒杜仲酒炒各二兩牛膝酒洗去蘆肉蓯蓉酒洗續斷虎脛骨酥炙木瓜川烏炮去皮尖各一兩半檳榔羌活獨活大附子童便浸濕麵包煨去皮臍各一兩木香二錢生甘草五錢鹿角霜一斤烏藥炒一兩半防風一兩半肉桂一兩小茴香炒一兩上為細末好酒煮米糊為丸如桐子大每服七十丸空心米湯下酒亦可換腿丸治腎經虛弱下注腰膝或當風取涼冷氣所乘沉重少力移步遲緩筋脈攣痛不能屈伸腳心隱痛有妨履地大治乾溼腳氣赤腫痛楚發作無時呻吟難忍氣滿喘促舉動艱難面色黎黑傳送祕澀並皆療之薏苡仁石楠葉南星洗薑製炒川牛膝酒浸焙肉桂當歸天麻附子炮去皮臍羌活防風去蘆石斛去根萆薢微炙黃耆蜜炙續斷各一兩蒼朮米泔浸一兩半檳榔半兩乾木瓜四兩上為細末麵糊丸如桐子大每服三十丸至五十丸空心溫酒或木瓜湯下日二三服常服舒筋輕足永無腳氣之患昔有人患此疾服之一月腳力頓健委有換腿之功木瓜丸治腎經虛弱下攻腰膝沉重少力腿腳腫癢疰破生瘡腳心隱痛筋脈拘攣或腰膝緩弱步履艱難舉重喘促面色黧黑大小便祕澀飲食減少無問久新並宜服之熟地黃洗焙陳皮去白烏藥各四兩黑牽牛炒三兩石楠藤杏仁去皮尖當歸蓯蓉酒浸焙乾木瓜續斷牛膝酒浸各二兩赤芍藥一兩上為細末酒糊丸如桐子大空心木瓜湯吞三五十丸溫酒亦得奪命還真丹治中風半身不遂手足癱瘓口眼喎斜語言謇澀一切諸風痰火氣鬱濕熱疼痛驚癇之疾羌活一兩五錢當歸白芍藥白茯苓半夏薑製枳殼麩炒桔梗防風麻黃柴胡知母軟石膏杜仲酒炒小茴香酒炒甘草薄荷葉桐子大每服五十丸酒送下日三服忌食動風物此藥大有補益衰年染患者尤宜蠲風飲子治中風癱瘓口眼歪斜及一切手足走注疼痛肢節攣急麻痹不仁等證其效如神真萬舉萬全之藥也防風杜仲薑汁炒羌活白芷當歸川芎生地黃酒浸白芍藥川牛膝去蘆酒浸一日秦艽去蘆何首烏川萆薢蒼朮白朮木通去皮威靈仙大楓子肉血藤即過山龍防己丁公藤各一兩荊芥穗海桐皮去粗皮五加皮天南星煨制半夏湯泡七次橘紅去白赤茯苓去皮桑寄生天麻殭蠶炒鉤藤鉤各五錢薄桂去粗皮草烏頭去皮尖甘草節川烏炮去皮臍豬牙皂角各二錢半兩頭尖陰地蕨一名地茶大薊小薊理省藤各一兩半桑絡藤一兩半生薑二兩另杵碎上各切細用無灰酒二斗五升以瓷罐一個盛酒浸藥以皮紙十數重包封罐口冬半月夏七日春秋十日每日清晨午前午後臨臥各服一大白盞忌雞豬魚羊驢馬飛禽蝦蟹等及煎煿水果麵食一切動風發氣之物藥酒方治風癱比史國公萬病無憂藥酒又效生地黃北細辛藁本柴胡白朮熟地黃蒼耳子羌活赤芍藥皂角刺當歸白芍藥劉寄奴桃仁桔梗木瓜威靈仙各二兩木通牛膝川芎蟬蛻各一兩烏藥五錢上㕮咀作二分每分用好酒十斤浸內固封壇口鍋內煮之上用淘淨米一碗待米蒸熟則藥酒成矣每日食後服二次隨人之量大小服仙酒方世傳南京留守竇文炳患足拘攣半身不遂奉化縣尉李能傳此方依合浸酒一斗飲及二升能運手足三升能伸腰背至四升脫如釋負枸杞二斤牛蒡子半升牛蒡根一斤天麻子一升蒼朮米泔浸瓦器蒸熟牛膝秦艽羌活防風桔梗晚蠶砂枳殼各二兩天麻半斤當歸三兩上為粗末無灰酒二三斗瓷壇浸七日勿令面近酒恐氣觸傷目每日空心午夜各溫進一杯忌魚面三個月神祕浸酒方治左癱右瘓半身不遂口眼喎斜一切諸風疼痛不可忍者治之如神何首烏石菖蒲桑樹上絡藤蒼耳子炒研各一兩生地黃明天麻天南星薑汁炒牛膝當歸半夏薑汁炒木瓜各七錢白附子白茯苓五靈脂炒蠶砂炒蒼朮米泔浸炒紅花草烏末陳皮去白防風防己芍藥川芎黃柏各五錢甘草三錢上㕮咀以布袋盛懸入壇內無灰酒一斗瓶口封固重湯煮五炷香不拘時服飲藥酒方治風癱不能行動防風去蘆萆薢當歸桔梗敗龜板虎骨川牛膝枸杞秦艽晚蠶砂炒黃羌活干茄根飯上蒸過蒼朮炒七次搗碎蒼耳子五加皮各二兩上銼碎用絹袋盛藥以無灰酒一斗浸壇內密固煮滾封七日開取不可以面向壇口恐藥氣衝眼每日早午晚間病人自取酒一小盞服之不許多服病痊酒盡以藥渣曬乾研為細末酒糊丸如桐子大每服五十丸酒送下日三服忌食動風物祕傳藥酒方治癱瘓腿痛手足麻癢不能動移者當歸白芍藥炒生地黃牛膝秦艽木瓜黃柏盛水炒杜仲薑汁炒防風陳皮各一兩南川芎羌活獨活各八錢白芷七錢檳榔五錢肉桂甘草蜜炙各三錢油松節五錢久痛加虎脛骨酥炙八錢蒼朮炒一兩上銼入絹袋內入南酒或無灰酒重湯煮一炷香為度早晚隨量飲之不忌諸物蜜桃酥治男婦久患風寒濕痹左癱右瘓當歸川芎白芍藥生地黃人參白朮各一兩白朮人參天麻獨活藁本木香菟絲子酒製各七錢五分熟地黃生地黃陳皮去白官桂全蠍去毒殭蠶炒菊花川芎黃芩黃連地骨皮蔓荊子各五錢細辛三錢蛤蚧酥炙一對上三十七味為末煉蜜丸如彈子大金箔為衣每服一丸細嚼茶酒任下如中風癱瘓癩疾茶酒下如遍身筋骨疼痛及心氣痛及不省人事熱醋下如洗頭風及暗風茶清下如驚癇口吐涎沫溫酒下如婦人胎前産後經脈不調酒煎香附湯下蔭按上方以羌活愈風湯為本最能行導諸經滋養氣血使陰陽無偏勝久服大風悉去始終調理之良劑也煮散凡風痱服藥得瘥訖可常服此以除餘風防風防己獨活秦艽黃耆人參白朮芎藭芍藥茯神遠志羚羊角升麻石斛牛膝五加皮丹參甘草厚朴陳皮天門冬去心地骨皮黃芩桂心各一兩乾地黃杜仲麻黃藁本檳榔烏犀角生薑各半兩薏苡仁一升石膏六兩上三十三味搗篩為末和勻每服三兩以水三升煮取一升去渣頓服之取汗日服若覺心中煩熱以竹瀝代水煮之以上諸方治癱瘓順氣和血之劑治中風雜方丹溪加減二陳湯凡中風證悉以二陳湯加薑汁竹瀝為主余各隨證加用陳皮去白半夏白茯苓甘草炙各一錢上水煎加竹瀝薑汁溫服風痰盛喉如拽鋸者加南星枳殼皂角防風瓜蔞仁如血虛者加當歸川芎白芍藥生地黃有瘀血加桃仁紅花如氣虛加人參白朮黃耆自汗者以黃耆為君少用茯苓半夏或佐以附子如風邪盛自汗身體痛者加防風羌活薄桂頭目不利或頭痛如破加川芎白芷荊芥穗細辛蔓荊子頂痛者去川芎加藁本或加酒炒片芩如無汗身體痛脈浮緩有力或浮緊或浮弦皆風寒在表之證本方加羌活防風川芎白芷蒼朮秦艽之類或只用小續命湯倍麻黃以表之如大便祕結不行四物三化湯以微利之三五日一去可也心血虧缺致心神恍惚本方加黃連遠志菖蒲或心搖動驚悸者更加酸棗仁茯神側柏葉竹茹連前共作一劑煎服散風湯防風羌活枳殼桔梗川芎各六分白芍藥薄酒炒各一錢茯苓七分陳皮半夏白朮荊芥各五分甘草四分上銼加生薑三片水煎食遠服無汗拘急加麻黃蔥白頭疼加白芷細辛氣虛有汗加人參黃耆血虛無力加生地黃川歸身口乾有熱加黃芩柴胡粉葛四肢惡寒加桂枝以上各五分風痰加膽南星一錢胸中多痰不利滿悶加竹瀝薑汁抽搐加天麻殭蠶炒去頭足八分羌活益氣湯羌活川芎當歸生地黃龍膽草半夏陳皮薄荷防風獨活黃芩甘草上銼水煎服防風天麻散治風麻痹走注肢節疼痛中風偏枯或暴喑不語內外風熱壅滯解昏眩西北方人多用之與後方同防風川芎天麻白芷羌活荊芥穗小草烏白附子當歸甘草各半兩滑石二兩上為末熱酒化蜜少許調半錢加至一錢覺藥力運行微麻為度或煉蜜丸彈子大熱酒化下一丸或半丸白湯化下亦得經驗如聖散治中風身體麻木走痛眩暈頭疼牙關緊急手足搐下涎潮悶亂及破傷風一切風證蒼朮一斤防風白芷川芎各八兩川烏五兩草烏細辛各四兩天麻二兩上為末每服半錢或一錢溫酒調下茶清亦得如瘋狗蛇蠍等所傷先用漿水口含洗淨用此貼上仍服之至效金瘡血出不止貼上立定趙敬齊方治口眼喎斜左手左足不得舉動半身不遂語言謇澀或時妄言身上無熱左手脈三部皆伏黃松節枳殼獨活牡丹皮羌活川芎黃耆鹽水浸略炙杏仁去皮尖各一錢全蠍一錢三分防己丹參各一錢二分荊芥穗八分上銼加生薑三片水煎飢時服必效竹瀝湯治中風痰涎壅盛言語塞滯四肢緩縱秦艽防風獨活附子炮去皮臍各一錢上㕮咀以水二盞煎至半盞入生地黃汁竹瀝各半盞再煎至四五沸作四服病既去以他藥調治未效再服最效羌活丸治風氣不調頭目昏痛鼻塞聲重痰涎壅滯遍身拘急骨節煩疼天陰先覺不安羌活甘菊花麻黃川芎防風石膏前胡黃芩細辛蔓荊子枳殼茯苓甘草各一兩硃砂一兩半另研為衣上為細末水打麵糊為丸如桐子大硃砂為衣每服四十丸食後生薑湯下御風丹治一切中風半身不遂神昏語謇口眼喎斜婦人頭風血風暗風倒僕嘔噦涎痰手足麻痹川芎白芍藥桔梗細辛白殭蠶炒羌活南星薑製各半兩麻黃去根節防風去蘆白芷各一兩半甘草炙乾生薑各七錢半硃砂二錢半為衣上為細末煉蜜為丸如彈子大每服一丸熱酒化下食前日三服愈風丹治風疾常宜服此調理防風連翹麻黃黃柏黃連各半兩川芎當歸赤芍藥薄荷葉石膏桔梗何首烏各一兩熟地黃羌活細辛甘菊花天麻各一兩黃芩一兩半白朮荊芥各二錢半梔子七錢半滑石五兩甘草二兩殭蠶半兩熱甚加大黃朴硝各一兩硃砂金箔為衣上為細末煉蜜丸如彈子大每服一丸細嚼茶酒化下愈風丹治三十六種風蒼朮酒浸香白芷南川烏火炮南草烏火炮各四兩天麻當歸酒洗防風何首烏火炮荊芥穗麻黃去根節石斛去根酒洗甘草各一兩川芎五錢上為細末煉蜜為丸如彈子大每服一丸臨臥茶清下勿見風忌豬肉雀肉三白急悶風茶湯下産後咳嗽肺風紅花湯下遍身筋骨疼痛乳香湯下腰疼耳聾腎氣風荊芥湯下眉毛脫落大風天麻湯下口發狂言氣心風硃砂湯下十指斷裂鹽湯下飲食無味皂角湯下遍身疥癬肺風茶下口眼喎斜茶湯下迎風冷淚米泔湯下手足皮腫天麻湯下大腸下血燒獨蒜湯下心胸悶膈噎塞薑湯下發狂吐沫荊芥湯下身疼黃腫當歸湯下五般色淋鹽湯下鼻生赤點蔥湯下手足熱困蘇木湯下鬚髮脫落鹽湯下小兒臍風撮口硃砂湯下耳作蟬聲川椒湯下口吐酸水茴香湯下膀胱疼痛艾醋湯下起坐艱難地黃湯下偏正頭疼茶湯下眼跳熱癢米湯搦手足麻痹石榴皮湯下小兒急慢驚風金煎湯下小兒吐蟲皂角湯下婦人赤白帶下甘草湯下豨蘞丸治中風口眼喎斜時吐涎沫語言謇澀手足緩弱骨節疼痛此方主之良豨蘞草一名火杴草其葉似蒼耳對節而生帶豬苓氣者是上五月五日六月六日七月七日九月九日收採不拘多少九蒸九曬每蒸用酒蜜水灑之蒸一飯久曝乾為末煉蜜丸如桐子大每服百丸空心溫酒米飲任下蔭按蓋骨節疼痛壅疾也壅者喜通此物味辛苦而氣寒用九蒸九曬則苦寒之濁味皆去而氣輕清矣本草云輕可以去實蓋輕清則無竅不入故能透骨驅風徑健筋骨若蒸曬不滿於九濁味猶存陰體尚在則不能透骨驅風而卻病也此陰陽清濁之義惟明者求之追風散治一切急風角弓反張四肢抽掣牙關緊急骨節疼痛及破傷風川烏去皮臍南星去臍附子去皮臍白附子白花蛇酒浸去皮骨丹砂研各一兩蠍梢七錢半膩粉研二錢半麝香研三分上並生用搗羅為末和勻瓷盒收每服五分至一錢豆淋酒或煎蔥白酒下口噤者用少藥揩牙即開為妙驪龍珠治中風百證白花蛇五錢酥炙番木鱉一個酥炙半夏孩兒茶各一錢半麻黃去節乳香沒藥各三錢虎脛骨一兩酥炙寒水石四兩鹽泥固火煅紅上為末酒糊為丸如彈子大放鉛盒內起白毛取出揩毛遇患將一丸燈上燒煙起為末好酒送下大汗如雨不可見風汗乾即愈續命丹治男子婦人卒中諸風口眼喎斜言語謇澀牙關緊急半身不遂手足搐搦頑痹疼痛涎潮悶亂婦人血風喘嗽吐逆坐臥不安羌活川芎南星薑製白鮮皮川烏海桐皮肉桂當歸防風熟地黃乾葛各一兩地榆虎骨硃砂鉛白霜烏蛇生牛黃雄黃各三錢輕粉二錢麻黃去節四兩酒三升煮取一升不用麻黃用酒上為末以麻黃酒汁入蜜半斤熬成膏和藥為丸如彈子大每服一丸豆淋酒下或蔥酒化下不拘時中書左丞張仲謙患半身不遂麻木太醫劉之益與服之汗大出一服而愈服桑枝法嫩桑枝一小升細切炒香以水三大升煎取二升一日服盡無時圖經云桑枝溫平不涼不熱可以常服療體中風癢乾燥腳底風氣四肢拘攣上氣眼暈肺氣咳嗽消食利小便久服身輕聰明耳目令人光澤兼療口乾仙經云一切仙藥不得桑煎不服政和間何子嘗病兩臂痛服諸藥不效依此方作數劑即愈靈草丹治一切風疾及治腳氣打撲傷損渾身麻痹採紫背浮萍草攤於竹篩內下著水曬乾為細末煉蜜為丸如彈子大每服二丸用黑豆淋酒化下蔭按本草云不在山兮不在岸採我之時七月半一任癱風與瘓風些小微風都不算豆淋酒內下三錢鐵幞頭上也出汗烏荊丸治諸風緩縱言語謇澀遍身頑麻皮膚瘙癢又治婦人血風頭痛眼暈如腸風臟毒下血不止服之尤效川烏炮去皮臍一兩荊芥穗二兩上為末醋煮麵糊丸如桐子大每服二十丸溫酒熟水任下加味烏荊丸治因形寒傷風頭痛鼻塞聲重或老人頭風宿疾發而又感風寒一切虛風上攻頭目咽膈不利荊芥二兩天麻附子白附子烏藥當歸川芎各一兩上為細末煉蜜丸如彈子大硃砂為衣食後細嚼一丸茶下龍腦丸治中風身如角弓反張不語昏悶龍腦細研一錢麝香研蟬殼牛黃各細研二錢半乾蠍炒南星炮硃砂炒阿膠炒香墨白附子炮防風羚羊角屑肉桂去皮羌活各半兩烏蛇肉酒浸去皮骨炙黃七錢半上為末入別研藥和勻煉蜜和搗三五百杵丸如緑豆大每服十丸用水酒下不拘時治雞爪風方治雞爪風方治手足擺動不能舉物五加皮海桐皮牡丹皮川烏炮川芎赤芍藥各五錢乾薑肉桂各一錢上為末每服三錢水一盞將古銅錢一個入清油內浸每煎藥入此錢同煎不拘時服灸雞爪風方治婦人月間得此不時發手足攣拳束如雞爪疼痛於左右膝骨兩旁各有一小窩共四穴俗謂之鬼眼各灸三壯登時愈預防中風方愈風湯初覺風動服此不致倒僕此乃治未病之聖藥也羌活甘草防風當歸蔓荊子川芎細辛黃耆枳殼人參麻黃白芷甘菊花薄荷枸杞子柴胡知母地骨皮獨活杜仲秦艽黃芩芍藥各三兩石膏蒼朮生地黃各四兩肉桂一兩上銼每服一兩生薑三片水煎空心服臨臥煎渣再服加減防風通聖散預防風疾常服取效防風川芎當歸芍藥薄荷麻黃連翹各半兩黃芩桔梗各二兩甘草一兩荊芥白朮各二錢半烏藥羌活天麻殭蠶上銼每服六錢生薑三片水煎服體虛氣弱者磨木香痰涎壅盛者加南星半夏枳實天麻丸治風因熱而生熱盛則動宜以靜勝其燥是養血也此藥行榮衛壯筋骨天麻牛膝酒浸三日萆薢另搗元參各六兩杜仲薑汁炒斷絲七兩附子炮一兩羌活十四兩川當歸酒浸十兩生地黃四兩一方有獨活五兩去腎間風上為末煉蜜丸如桐子大每服七十丸空心溫酒白湯任下服藥半月後覺壅塞以七宣丸疏之搜風順氣丸治三十六種風七十二般氣上熱下冷腰腿疼痛四肢無力惡瘡下注風氣腳氣一應男婦年高氣弱並宜常服此藥順三焦和五臟潤腸胃除風濕久服宣通氣血清熱潤燥通利大小便則諸病自愈菟絲子淘淨酒煮爛搗為餅焙乾麻仁微炒去殼另研山茱萸酒蒸去核郁李仁湯泡去皮山藥酒蒸牛膝酒浸一宿枳殼麩炒去穰檳榔獨活各二兩車前子酒浸二兩半大黃酒蒸黑五兩上為細末煉蜜丸如梧桐子大每服五七十丸茶酒米飲任下早晨臨臥各一服百無所忌久覺大腸微動以羊肚肺羹補之此藥膏粱之家肥甘太過以致大便結燥尤宜服之老人大腸無血大便結燥尤宜竹瀝枳朮丸化痰清火健脾中風於未病之先服此藥但人少知此理至妙若與搜風順氣丸相間服之何中風之有也白朮二兩枳實麩炒蒼朮米泔浸鹽水炒南星白礬生薑牙皂同煮乾半夏同南星制白茯苓去皮黃芩酒炒陳皮去白山楂蒸去核白芥子炒各一兩黃連薑汁炒當歸酒洗各五錢上為細末以神麯六兩生薑汁一盞竹瀝一碗煮糊為丸如桐子大每服一百丸淡薑湯送下食遠服
