body:
  text: 卷四十三厥證論葉氏曰內經厥論謂陽衰於下而為寒厥陰衰於下而為熱厥寒厥則因多欲而奪其精故致陽衰陰盛熱厥則因醉飽入房精虛則熱入故致陰虛陽盛或陰盛腹脹陽盛氣亂而為卒厥及五臟六腑皆有厥狀病能或寒或熱其論甚詳學者究心焉又曰原病式謂厥有陰陽之辨陰厥者元病脈候皆為陰證身涼不渴脈細而微也陽厥者元病脈候皆為陽證煩渴譫妄身熱而脈數也若陽厥極深或失下而至於身冷反見陰證脈微欲絕而死者正謂熱而然也王安道曰熱極而成厥逆者陽極似陰也寒極而成厥逆者獨陰無陽也陽極似陰用寒藥獨陰無陽用熱藥不可不辨也葉氏曰按內經所謂寒熱二厥者乃陰陽之氣逆而為虛損之證也寒厥補陽熱厥補陰正謂壯水之主以制陽光益火之原以消陰翳此補其真水火之不足耳仲景河間安道所論厥證而為傷寒手足之厥冷也冰炭殊途治法亦異丹溪曰厥逆也手足因氣血逆而冷也有陽厥有陰厥原病式詳矣陽衰於下則寒陰衰於下則熱因氣虛血虛者多氣虛脈細血虛脈大如蔥管熱厥脈數外感脈浮實痰脈弦熱用承氣湯痰用白朮竹瀝外感解散藥中加薑汁酒丹溪活套云熱厥四肢煩熱蓋濕熱鬱於脾土之中治用東垣升陽散火湯火礬湯之類寒厥手足厥冷者多是氣血不足補氣血藥加附子飲酒人或體肥盛人手足熱者濕痰鬱火盛也二陳加芩連梔子之類若忽然手足厥冷卒厥不知人者多屬痰火亦有陰虧而陽暴熱者宜多用參膏點竹瀝薑汁與之人瘦弱者雖無痰而火亦盛也服竹瀝亦能養血而降火王太僕云厥者氣逆上也世謬傳為腳氣讀此始知其病上古之為腳氣也經曰寒厥者手足寒也曰熱厥者手足熱也曰痿厥者痿病與厥雜合而足弱痠軟無力也曰痹厥者痹病與厥病雜合而腳氣頑麻腫痛也曰厥逆者即前寒厥熱厥痿厥痹厥風厥等氣逆上而或嘔吐或迷悶或脹或氣急或小腹不仁或暴不知人世所謂腳氣衝心者是也葉氏曰厥有涎潮如拽鋸聲在喉中為痰厥先用瓜蒂散或人參蘆煎湯探吐隨用導痰湯加竹瀝薑汁暴怒氣逆而昏暈者為氣厥宜八味順氣散或調氣散手足搐為風厥宜小續命湯因酒而得為酒厥宜二陳加乾葛青皮又有臟氣相形或與外邪相忤則氣遏不行閉於經絡諸脈伏匿昏不知人此為屍厥惟當隨其臟氣而通之寒則熱之熱則寒之閉則通之昔扁鵲治虢太子之屍厥正謂此也蔭按心法附錄曰厥者甚也短也逆也手足逆冷也其證不一散之方書者甚多今姑撮其大概且如寒熱厥逆者則為陰陽二厥也陽厥者是熱深則厥蓋陽極則發厥也不可作陰證而用熱藥治之精魄絕而死矣急宜大小承氣湯隨其輕重治之所謂陰厥者始得之身冷脈沉四肢逆足蜷臥唇口青或自利不渴小便赤白此其候也治之以四逆理中之輩仍速灸關元百壯屍厥飛屍卒厥此即中惡之候因冒犯不正之氣忽然手足逆冷肌膚粟起頭面有黑精神不守或錯言妄語牙緊口噤或昏不知人頭旋暈倒此是卒厥客忤飛屍鬼擊凡吊死問喪入廟登場多有此病以蘇合香丸灌之候稍蘇以調氣散和平胃散服名調氣和胃散痰厥者及寒痰迷悶四肢逆冷宜姜附湯以生附代熟附蛔厥者乃胃寒所生經曰蛔者長蟲也胃中冷即吐蛔宜理中湯加炒川椒五粒檳榔五分吞烏梅丸效蛔見椒則頭伏故也氣厥者與中風相似何以別之風中身溫氣中身冷以八味順氣散或調氣散如有痰以四七湯導痰湯服之大抵陰陽氣不相接故生厥也和云凡卒中屍厥鬱冒中風中暑之類皆當發表也仲景云鬱冒欲解必是大汗出還魂湯用麻黃桂枝清魂湯用荊芥及諸卒中用皂莢半夏搐鼻取嚏用藜蘆砒霜折齒取痰皆所以開散三焦使表邪流通也中暑忌冷水閉表亦此意本云世言氣中者雖不見於方書然暴喜傷陽暴怒傷陰憂愁拂意氣多逆厥往往多得此疾便覺涎潮昏塞牙關緊急若概作中風候用藥非止不相當多致殺人元祐庚午母氏親遭此禍至今飲恨母氏平時食素氣血羸弱因先子捐館憂惱忽一日氣厥牙禁涎潮一里醫便作中風以大通丸三粒下之大下數下一夕卒予嘗痛恨每見此證急化蘇合香丸灌之便醒然後隨其寒熱虛實而調理之無不愈者李氏曰內經氣厥篇厥者氣逆也凡移寒移熱或伏熱深而振慄或虛寒甚而發燥皆謂之厥不但手足厥冷而宗筋脾胃合而為孽宗筋陰器也厥陰所主脾胃脈皆附近宗筋寒厥則陰縮而四肢冷熱厥則津幹不榮四肢溺赤而手足熱是六經之厥皆統於肝與脾胃也經曰巨陽之厥巨陽者太陽也腫首頭重足不能行發為眴僕眴音眩目眩亂也僕猝倒也陽明之厥則顛疾欲走呼腹滿不得臥面赤面熱妄見而妄言少陽之厥則暴聾頰腫而熱脅痛胻胻音杭腳脛也不可以運太陰之厥則腹滿䐜脹便不利不欲食食則嘔不得臥少陰之厥則口乾溺赤腹滿心痛厥陰之厥則少腹腫痛腹脹溺溲不利好臥屈膝陰縮腫胻內熱又太陽厥逆僵仆嘔血善衄少陽厥逆機關不利者腰不可以行項不可以顧發腸癰不可治驚者死陽明厥逆喘咳身熱善驚衄嘔血手太陰厥逆虛滿而咳善嘔沫手心主少陰厥逆心痛引喉身熱死不可治手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰手陽明少陽厥逆發喉痹嗌腫痙若三陰俱逆不得前後使人手足寒三日死外感寒泣血發厥脈沉微者理中湯四逆湯暑耗氣發厥脈虛者白虎湯或香薷散加羌活夏月勞役犯房以致陽氣煩目盲耳閉內經謂之煎厥言熱氣煎逼損腎與膀胱而成也宜四君子湯加遠志防風赤芍麥門冬陳皮凡外感發熱者宜解散藥中加薑汁內因喜怒傷風傷志氣逆而不下行則血積於心胸內經謂之薄厥言陰陽相薄氣血奔並而成古法暴厥氣逆身冷者蘇合香丸八味順氣散怒氣逆甚嘔血鼽衄發厥者四物湯去地黃加赤茯苓人參桔梗陳皮麥門冬檳榔姜煎服或六郁湯氣實多怒忽大叫發厥者乃痰閉於上火起於下而上衝概用香附五錢川芎七錢生甘草三錢童便薑汁煎服又青黛人中白香附為丸服稍愈用導痰湯加黃連香附煎吞當歸龍薈丸因勞役飲水被驚發厥者六君子湯加芩連竹瀝薑汁內傷痰火發厥脈弦滑者二陳湯加竹瀝挾寒加生附子挾火加芩連山梔竹瀝肥人加人參薑汁凡厥證為顛為眴僕為妄見或腹脹二便不利或嘔或心痛皆痰火鬱氣病也熱厥因醉飽入房濕熱鬱於脾土不能滲榮四肢陽氣獨盛故手足心熱宜補中益氣湯升陽散火湯火鬱湯寒厥因多欲奪精元陽大有所損不能滲榮經絡陰氣獨在故手足皆寒宜十全大補湯加附子或當歸四逆湯尋常氣虛發厥者四君子湯血虛發厥者四物湯有火加知母黃柏虛寒加附子但厥冷多以不勝乘其所勝如腎移寒於脾則為寒厥心移熱於腎則為熱厥六經皆然抑論陽證煩渴譫語身熱陰證不渴靜倦身涼與傷寒陽厥陰厥大同但雜病多因酒色七情痰火所致外感者少故經曰陽衰於上則為寒厥陰衰於下則為熱厥陽極似陰陰極似陽與傷寒固雖不同而病狀變化亦相似也凡有弔死問疾或入廟登場卒中外邪與臟氣相忤氣遏不行經絡脈伏昏不知人忽手足逆冷頭面青黑牙關緊急昏暈卒倒或錯言妄語謂之屍厥決不可作風治先宜蘇合香丸灌之候醒以木香勻氣散合平胃散調之素虛者以焰硝五錢硫黃二錢為末作三服用陳酒一盞煎攪焰硝起傾於盞內蓋著溫服如人行五里又進一服如無前藥用古參附湯入薑汁酒煎服外灸百會穴如綠豆大艾九壯氣海百壯身溫者生暴者死追魂湯灌之蛔厥見傷寒血厥見產後大抵陰陽氣不相接則厥熱厥補陰寒厥補陽正經所謂壯水之主以制陽光益火之源以消陰翳也凡卒厥未辨先以蘇合香丸灌醒痰壅口噤者瓜蒂散吐之或搐鼻亦可熱甚者大承氣湯雙解散下之脈法卒中者卒然不省人事全如死屍但氣不絕脈動如故或脈無倫序或乍大乍小或微細不絕而心胸暖者是也經云無故而喑脈來乍大乍小乍短乍長者為祟滑者鬼疰緊而急者遁屍仲景云屍厥脈動而無氣氣閉不通故靜而死也活人書云陽厥脈滑而沉實陰厥脈細而沉伏脈經云寸口脈沉大而滑沉則為實滑則為氣實氣相搏血氣入於臟則死入於腑則愈此為卒厥不知人唇青身冷為入臟即死如身溫和汗自出為入腑即愈又曰人病屍厥呼之不應脈浮者死脈大反小者死卒中惡腹大四肢滿脈大而緩者生緊大而浮者死緊細而微者亦生又問曰婦人病經水適下而發其汗則鬱冒不知人何也師曰經水下故為里虛而發其汗則表亦虛此為表裡俱虛故令鬱冒也治初厥方蘇合香丸治卒厥不知人未詳風痰氣厥不可妄投湯劑且先以此藥灌下待醒後察脈然後隨證用他藥白朮青木香硃砂犀角沉香麝香訶子皮丁香安息香蓽撥白檀香香附各二兩龍腦熏陸香蘇合香油各一兩上為末用安息香以酒熬成膏同蘇合香油和蜜調劑每服旋丸如梧桐子大每服四丸取井水溫冷任下老人小兒酒化下一丸凡痰氣及中風痰涎壅上喉中有聲不能下者合青州白丸子同丸薑汁化下立效中風如見鬼神者白湯下腳氣衝心用萆麻和丸搗爛貼腳心疼痛立止心腹絞痛卒痛中滿嘔吐薑湯下傷風咳嗽薑蔥汁白湯下兼治傳屍骨蒸肺痿疰忤鬼氣狐貍妖魅霍亂吐瀉時氣瘴痞赤白暴痢瘀血月閉痃癖疔腫等疾產婦中風小兒驚風牙關緊硬不省者擦牙即開然後用風藥治之小兒吐瀉驚疳先用火焙此藥然後用薑蔥汁化開白湯下小兒用緋袋盛當心帶之一切鬼邪不敢近治熱厥方升陽散火湯治熱厥因醉飽入房濕熱鬱於脾土不能滲榮四肢陽氣獨盛故手足心熱升麻葛根獨活羌活白芍人參各三錢炙甘草柴胡各二錢防風一錢半生甘草一錢上銼每服五錢水煎服本方去獨活生甘草加蔥白名火鬱湯治證同大承氣湯治厥熱盛脈數者大黃芒硝各半兩厚朴一兩枳實五個上銼用水二鍾半先煎厚朴枳實至一鍾入大黃煎七分去渣入硝煎一二沸溫服以利為度本方去芒硝名小承氣湯白虎湯治熱厥及暑厥脈虛或沉滑石膏五錢知母二錢甘草一錢上銼作一服入粳米一撮水煎服加人參一錢半名人參白虎湯治寒厥方理中湯治寒厥脈沉微者人參白朮乾薑炮甘草炙各等分上㕮咀每服四錢水煎服寒甚者加附子四逆湯治手足厥冷下利清穀脈微欲絕甘草二兩乾薑一兩附子去皮臍半兩上㕮咀每服五錢水煎溫服姜附湯治寒厥昏不知人身體強直口噤不語逆冷及腹臍冷痛霍亂轉筋一切虛寒並皆治之乾薑一兩附子生去皮臍一枚上㕮咀每服三錢水煎食前溫服六物附子湯治陽氣衰於下令人寒厥從五指至膝上寒者此方主之附子肉桂防己各四錢炙甘草二錢白朮茯苓各三錢上銼每服七錢水煎服加減白通湯治形寒飲水大便自利完穀不化臍腹冷痛足寒而逆附子炮去皮乾薑炮各一兩官桂去皮甘草炙草豆蔻麵裹煨半夏湯泡七次人參白朮各半兩上銼每服五錢加生薑五片蔥白五莖水煎空心服當歸四逆加茱萸生薑湯治無熱證而厥當歸芍藥桂枝細辛各二兩甘草通草各六錢半吳茱萸三錢生薑六錢上銼用水三升煮至一升半分三服吳茱萸湯治陰厥吐利手足逆冷煩躁欲死吳茱萸生薑各半兩人參二錢半上銼作一服加大棗一枚水煎服治痰厥方導痰湯治痰厥半夏湯泡七次南星薑湯泡各二錢橘紅枳實麩炒茯苓各一錢半甘草八分上銼加生薑五片水煎服痰盛加竹瀝薑汁一方半夏大者三十個巴豆二十個上為末丸如綠豆大硃砂為衣每服一丸薑湯送下治氣厥方八味順氣散治七氣拂鬱令人手足厥冷白朮人參白芷白茯苓臺烏藥青皮陳皮各一錢甘草五分上銼加生薑三片水煎不拘時服木香調氣散治氣滯胸膈虛痞噁心宿冷不消心腹刺痛白豆蔻丁香檀香木香各二兩藿香葉甘草炙各八錢砂仁四兩上為細末每服二錢入鹽少許沸湯調服不拘時治風厥方小續命湯麻黃去節人參黃芩酒炒芍藥酒炒川芎酒洗防己杏仁去皮尖炒桂枝淨洗甘草各一錢防風附子炮去皮臍各五分上銼作一服加生薑三片水煎服雙解散治一切風寒暑濕所傷以致氣血拂鬱變成積熱發厥即防風通聖散與益元散相合防風川芎當歸赤芍藥大黃麻黃薄荷連翹芒硝各二分半石膏黃芩桔梗各五分滑石一錢半甘草一錢荊芥白朮梔子各一分二釐半以上共六錢六分二釐半系防風通聖散滑石三錢甘草五分以上三錢五分系益元散上㕮咀每一服加生薑三片蔥白一莖豆豉三十粒同用水煎熱服治虛厥方參耆益氣湯治氣虛陽厥脈伏手足厥冷人參黃耆白朮各一錢半五味子二十粒麥門冬去心陳皮甘草炙各一錢陽虛加附子童便煮一錢上銼加生薑三片棗二枚水煎服芎歸養榮丸治血虛陰厥脈虛細四肢冷者當歸酒洗川芎白芍煨各一錢半熟地砂仁炒黃柏酒炒知母酒炒各一錢枸杞子麥門冬去心各八分甘草五分上銼水煎入竹瀝半盞薑汁二三匙食前服治煎厥方人參固本丸內經曰陽氣者煩勞則張精絕闢積於夏使人煎厥宜此方主之人參二兩天門冬麥門冬生地酒炒熟地黃砂仁炒各四兩上為末煉蜜丸如桐子大每服一百丸空心白湯送下蔭按諸動屬陽故煩勞則擾乎陽而陽氣張大陽氣張大則勞火亢矣火炎則水乾故令精絕是以遷延闢積至於夏月內外皆熱水益虧而火益亢孤陽厥逆如煎如熬故曰煎厥是方也生熟地黃能救腎水而益陰精天麥門冬能扶肺金而清夏氣人參能固真元而療煩勞以之治煎厥誠為曲當治薄厥方蒲黃湯內經曰大怒則形氣絕而血菀於上使人薄厥宜此方主之蒲黃一兩炒褐色上用清酒十爵沃之溫服愈蔭按肝藏血而主怒怒則火起於肝載血上行故令血菀於上菀亂也薄雷風相薄之薄血氣亂於胸中相薄而厥逆也蒲黃能消瘀安血清酒能暢氣和榮故用之以主是證治屍厥方調氣平胃散屍厥乃中惡之候因犯不正之氣忽然手足厥冷頭面青黑不省人事妄語口噤宜蘇合香丸灌之候稍醒用此藥蒼朮一錢半藿香一錢二分厚朴陳皮烏藥白豆蔻仁木香檀香砂仁各一錢甘草炙五分一方有丁香無烏藥上銼水二鍾生薑三片煎八分入鹽少許食後服二十四味流氣飲和蘇合香丸屍厥者破陰絕陽形靜如死醫者不知針石宜此二方主之流氣飲見諸氣門蘇合香丸見前蔭按夫屍厥者五屍之氣暴疰於人亂人陰陽血氣上有絕陽之絡下有絕陰之紐形氣相離不相順接所謂一息不運則機緘窮一毫不續則霄壤判也昔虢太子病此扁鵲以針石熨烙治之而愈今之醫者多不知針石苟臨是證將視其死而不救歟故用二十四味流氣飲和蘇合香丸主之使其氣血流動陽無絕絡陰無破紐則亦五會之針五分之熨八減之劑爾灸法灸百會穴四十九壯臍下氣海丹田三百壯身溫乃止一方用附子七錢童便炮熟去皮臍為末分作二服用酒三盞煎一盞服如無附子用生薑自然汁半盞酒一盞同煎令百沸並灌一服仍照前灸
