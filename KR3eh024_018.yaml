body:
  text: 卷十八嘔吐論嘔吐噦皆屬於胃東垣曰夫嘔吐噦者俱屬於胃胃者總司也以其氣血多少為異耳且如嘔者陽明也陽明多血多氣故有聲有物氣血俱病也仲景云嘔多雖有陽明證慎不可下孫真人云嘔家多服生薑乃嘔吐之聖藥也氣逆者必散之故以生薑為主吐者太陽也太陽多血少氣故有物無聲乃血病也有食入則吐有食已則吐以陳皮去白主之噦者少陽也少陽多氣少血故有聲無物乃氣病也以薑製半夏為主故朱奉議治嘔吐噦以生薑半夏陳皮之類是也究其三者之源皆因脾氣虛弱或因寒氣客胃加之飲食所傷而致也宜以丁香藿香半夏茯苓陳皮生薑之類主之若但有內傷而有此疾宜察其虛實使內消之痰飲者必下之當分其經對證用藥不可亂也論胃虛不宜用辛藥發散準繩云金匱方諸嘔吐谷不得下者小半夏湯主之又云嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之用半夏一升生薑半斤水七升煮取一升半分溫再服又云卒嘔吐心下痞有水眩悸者小半夏加茯苓湯主之即前方加茯苓四兩也然則生薑半夏固通治嘔吐之正劑矣然東垣云辛藥生薑之類治嘔吐但治上焦氣壅表實之病若胃虛穀氣不行胸中閉塞而嘔者唯宜益胃推揚穀氣而已勿作表實用辛藥瀉之故服小半夏湯不愈者服大半夏湯立愈此仲景心法也丹溪云胃虛弱嘔者二陳加砂仁藿香白朮又云久病嘔者胃氣虛不納穀也生薑人參黃耆白朮香附治之嘔吐煎藥忌瓜蔞杏仁蘿蔔子山梔皆要作吐丸藥中帶香藥行散不妨論嘔吐有寒熱痰食血氣不同直指方云嘔吐出於胃氣之不和人所共知也然有胃寒有胃熱有痰水有宿食有膿血有氣攻又有風邪入胃寒而嘔吐則喜熱惡寒四肢淒涼法當以剛壯溫之熱而嘔吐則喜冷惡熱煩躁口乾法當以清涼解之痰水證者涎沫怔忡先渴後嘔與之消痰逐水輩宿食證者胸腹脹滿醋悶吞酸與之消食去積輩腥氣臊氣熏炙噁心此為膿血之聚經所謂嘔家癰膿嘔盡膿自愈是也七情內郁關格不平此氣攻之證經所謂諸鬱於胃則嘔吐是也若夫風邪入胃人多不審率用參術助之攔住其邪尤關利害其或惡聞食臭湯水不下粥藥不納此則反番之垂絶者也辨之不早何以為治乎雖然足陽明之經胃之脈絡也陽明之氣下行則順今逆上行慎不可泄固也然嘔吐者每每大便祕結上下壅遏氣不流行盍思所以區畫而利導之他如汗後水藥不入口者嘔逆而脈弱小便復利身微熱而手足厥者虛寒之極也識者憂焉丹溪云河間謂嘔者為火氣炎上此特一端耳有痰隔中焦食不得下者有氣逆者有寒氣鬱於胃口者有食滯心肺之分致新食不得下而反出者但因火與痰者為多胃中有熱膈上有痰二陳湯加炒梔子黃連生薑凡病欲吐者切不可下逆之故也肝火出胃逆上嘔吐抑青丸夏月嘔吐不止五苓散加生薑汁準繩云寒而嘔吐則喜熱惡寒四肢淒涼或先覺咽酸脈弱小而滑因胃虛傷寒飲食或傷寒汗下過多胃中虛冷所致當以剛壯溫之宜二陳湯加丁香十粒或理中湯加枳實半錢或丁香吳茱萸湯藿香安胃散鐵刷湯不效則溫中湯甚則附子理中湯或治中湯加丁香並須冷服蓋冷遇冷則相入庶不吐出羅謙甫云諸藥不愈者紅豆丸神效曾有患人用附子理中湯四逆湯加丁香到口即吐後去乾薑只參附加丁木香煎熟更磨入沉香立吐定蓋虛寒痰氣凝結丁附既溫佐以沉木香則通乾薑白朮則泥耳熱嘔食少則出喜冷惡熱煩躁引飲脈數而洪宜二陳湯加黃連炒梔子枇杷葉竹茹乾葛生薑入蘆根汁服金匱方嘔而發熱者小柴胡湯主之潔古用小柴胡湯加青黛以薑汁打糊丸名清鎮丸治嘔吐脈弦頭痛蓋本諸此胃熱而吐者聞穀氣即嘔藥下亦嘔或傷寒未解胸中有熱關脈洪者是也並用蘆根汁金匱方嘔吐而病在膈上後思水解急與之思水者豬苓散主之嘔而胸滿者吳茱萸湯主之嘔而渴煮枇杷葉汁飲之嘔而腸鳴心下痞者半夏瀉心湯主之氣嘔吐胸滿膈脹關格不通不食常飽食則常氣逆而吐此因盛怒中飲食而然宜二陳湯加枳實木香各半錢或吳茱萸湯不效則丁香透膈湯及五膈寬中湯食嘔吐多因七情而得有外感邪氣並飲食不節而生大概治以理中為先二陳湯加枳實一錢或加南星七分沉香木香各四分亦好或只服枳南湯或導痰湯又有中脘伏痰遇冷即發俗謂之冷癇或服新法半夏湯或撾脾湯撾張瓜切音窩有痰飲粥藥到咽即吐人皆謂其番胃非也此乃痰氣結在咽膈之間宜先以姜蘇湯下靈砂丹俟藥可進則以順氣之藥繼之外有吐瀉及痢疾或腹冷痛進熱藥太驟以致嘔逆宜二陳湯加砂仁白豆蔻各半錢沉香少許嘔吐諸藥不效當借鎮重之藥以墜其逆氣宜姜蘇湯下靈砂丹百粒俟藥得止卻以養正丹半硫丸導之嘔吐津液既去其口必渴不可因渴而遽以為熱論陰虛邪逆嘔噦東垣曰若陰虛邪氣逆上窒塞嘔噦不足之病此地道不通也正當用生地黃當歸桃仁紅花之類和血涼血潤血兼用甘草以補其氣微加大黃芒硝以通其閉大便利邪氣去則氣逆嘔噦自不見矣復有胸中虛熱穀氣久虛發而為嘔噦者但得五穀之陰以和之則嘔噦自止論嘔吐可下不可下準繩曰仲景云病人欲吐者不可下之又用大黃甘草治食已即吐何也曰欲吐者其病在上因而越之可也而逆之使下則必抑塞憒亂而益以甚故禁之若既已吐矣吐而不已有升無降則當逆而折之引令下行無速於大黃者故不禁也兵法曰避其鋭擊其惰此之謂也丹溪泥之而曰凡病嘔吐切不可下固矣夫葉氏曰丹溪云凡病嘔吐切不可下以其逆之故也東垣云吐而大便不通則利大便上藥則所當禁也二說相反要當審其大便通與不通耳丹溪執泥此證切不可下其言未盡善也論漏氣準繩云身背皆熱肘臂牽痛其氣不續膈間厭悶食入即先嘔而後下名曰漏氣此因上焦傷風閉其腠理經氣失道邪氣內著麥門冬湯主之論走哺準繩云下焦實熱大小便不通氣逆不續嘔逆不禁名曰走哺人參湯主之論吐食準繩云上焦氣熱上衝食已暴吐脈浮而洪宜先降氣和中以桔梗湯調木香散二錢隔夜空腹服之三服後氣漸下吐漸去然後去木香散加芍藥二兩黃耆一兩半同煎服之病愈則止如大便燥結食不盡下以大承氣湯去芒硝微下之少利為度再服前藥補之如大便復結又依前微下之保命集用荊黃湯調檳榔散中焦吐食由食積與寒氣相格故吐而疼宜服紫沉丸金匱大黃甘草湯治食已即吐又治吐水吐食而脈弦者由肝勝於脾而吐乃由脾胃之虛宜治風安胃金花丸青鎮丸主之金匱茯苓澤瀉湯治胃反吐而渴欲飲水者論嘔苦經云善嘔嘔有苦常太息邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔取膽三里以下胃氣逆則刺少陽血絡以開膽逆卻調虛實以去其邪又云口苦嘔宿汁取陽陵泉為胃主嘔而膽汁苦故獨取膽與胃也陽明在泉燥淫所勝病喜嘔嘔有苦又云陽明之勝嘔苦治以苦溫辛溫是運氣嘔苦皆屬燥也論嘔清水經云太陰之復嘔而密默唾吐清液治以甘熱是嘔水屬濕一味蒼朮丸主之金匱方心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食茯苓飲主之能消痰氣令能食又云渴欲飲水水入則吐者名曰水逆五苓散主之論吐涎沫金匱方乾嘔吐逆吐涎沫半夏乾薑散主之半夏乾薑各等分杵為散取方寸匕漿水一升半煎至七合頓服之乾嘔吐涎沫頭痛者吳萸湯主之婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之涎沫止乃治痞瀉心湯主之論嘔膿仲景云嘔家雖有癰膿不可治嘔膿儘自愈仁齊直指以地黃丸湯主之論嘔吐蟲準繩云仲景以吐蛔為胃中冷之故則成蛔厥宜理中湯加炒川椒五粒檳榔半錢吞烏梅丸胃咳之狀咳而嘔嘔甚則長蟲出亦用烏梅丸取胃三里有嘔吐諸藥不止別無他證乃蛔在胸膈作嘔見藥則動動則不納藥藥出而蛔不出雖非吐蛔之比亦宜用吐蛔藥或於治嘔藥中入炒川椒十粒蛔見椒則頭伏故也李氏曰蟲吐時常噁心胃口作痛口吐清水得食暫止飢則甚者胃中有蛔也二陳湯加苦楝根使君子白朮烏梅或用錫灰檳榔等分米飲調服亦可凡吐如清菜汁者死論暈船吐李氏曰暈船大吐渴飲水者多死惟童便飲之最妙診脈法準繩云形狀如新臥起陽緊陰數其人食已即吐陽浮而數亦為吐或浮大皆陽偏勝陰不能配之也為格主吐逆無陰和之寸緊尺澀其人胸滿不能食而吐寸口脈數其人則吐寸口脈細而數數則為熱細則為寒數為嘔吐金匱問數為熱當消穀引食而反吐者何也曰以發其汗令陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故吐也趺陽脈微而澀微則不利澀則吐逆谷不得入或浮而澀浮則虛虛傷脾脾傷則不磨朝食暮吐名反胃寸口脈微而數微則血虛血虛則胃中寒脈緊而澀者難治關上脈浮大風在胃中心下淡淡食欲嘔關上脈微浮積熱在胃中嘔吐蛔蟲關上脈緊而滑者蛔動脈緊而滑者吐逆脈小弱而澀胃反浮而洪為氣浮而匿為積沉而遲為寒趺陽脈浮胃虛嘔而不食恐怖者難治寬緩生寒氣在上陰氣在下二氣並爭但出不入先嘔卻渴此為欲解先渴卻嘔為水停心下屬飲脈弱而嘔小便復利身有微熱見厥者死嘔吐大痛色如青菜葉者死脈訣舉要曰滑數為嘔代者霍亂微滑者生澀數凶治胃熱嘔吐方黃連二陳湯治胃中有熱膈上有痰時作嘔噦陳皮半夏茯苓甘草山梔子炒黃連薑汁炒各等分上銼每服八錢生薑五片水煎服一方二陳湯加竹茹丹溪加味二陳湯治胃中有火膈上有痰令人時常噁心嘔吐清水作噯氣吞酸等證陳皮半夏茯苓甘草黃連薑汁炒梔子炒蒼朮川芎香附砂仁神麯炒山楂木香少許上銼加生薑水煎服一方有白朮乾薑牡荊子三味無砂仁神麯山楂木香久病虛者加人參白朮胃寒者加益智草豆蔻乾薑桂心之類去黃連梔子又甚者加丁香附子如脅痛或脾痛右關脈弦嘔吐不已此木來侮土本方加人參白朮升麻柴胡青皮芍藥川芎砂仁神麯之類如時常吐清水或口乾不喜食冷涎自下而湧上者此脾熱所致也本方加白朮芍藥升麻土炒苓連梔子神麯麥芽乾生薑或丸或煎皆可如時常噁心吐清水心胃作痛得食則暫止飢則甚者此胃中有蛔也本方加苦楝根使君子煎服即愈或用黑錫灰檳榔等分米飲調下保中湯治嘔吐不止飲食不下陳皮半夏薑汁炒茯苓各八分白朮土炒藿香梗黃芩土炒各一錢黃連土炒山梔子薑汁炒各二錢砂仁三分甘草二分上銼一劑加生薑三片長流水和嬌泥澄清二鍾煎至一鍾稍冷頻服吐逆甚加伏龍肝一塊同煎因氣加香附童便炒一錢枳實麩炒八分去白朮心煩不寐加竹茹八分橘梔竹茹湯治胃中素熱噁心嘔噦不止陳皮二錢梔子炒三錢竹茹一錢半上銼水煎入薑汁服葛根竹茹湯治胃熱心煩嘔吐不止或因飲酒過度而嘔者尤妙葛根三錢半夏二錢甘草三分竹茹一團上銼一劑加生薑五片水煎取冷汁服加味橘皮竹茹湯治胃熱多渴嘔噦不止橘皮赤茯苓半夏麥門冬去心枇杷葉竹茹各一錢人參甘草各五分上銼加生薑水煎服小柴胡加竹茹湯治發熱而嘔柴胡二錢半夏橘皮各一錢黃芩人參甘草炙各七分半竹茹一團上銼加生薑七片水煎溫服麥門冬湯治煩熱嘔逆麥門冬去心黃連薑汁炒茅根青竹茹各二錢人參一錢甘草五分上銼水煎入生薑自然汁二三匙食前服枇杷葉散定嘔吐和中利膈枇杷葉去毛二錢人參半夏各一錢茯苓五分茅根二兩上細銼每服四錢水一盞半生薑七片慢火煎至七分去渣入檳榔末五分和勻服之槐花散大凡吐多是膈熱熱且生痰此藥能化胃膈熱涎有殊效皂角去皮燒煙絶白礬熬沸定槐花炒黃黑色甘草炙各等分上為末每服二錢白湯調下半夏瀉心湯嘔而腸鳴心下痞者此湯主之半夏三升湯泡黃芩人參炙甘草乾薑各三兩黃連一兩大棗十二枚上七味以水七升煮取六升去渣再服一升日三服豬苓湯嘔吐而病在膈上後思水者急與解之此湯主之豬苓去皮茯苓白朮各等分上㕮咀水煎服茱萸陳皮丸蒼朮炒七錢半吳茱萸煮少時曬陳皮黃連黃芩二味俱用陳壁土炒上為末神麯煮糊丸如緑豆大每服三十五丸生薑湯下椒茶餅止嘔吐治翻胃當時即效川椒去目隔紙焙三兩茶牙桑白皮飛羅面炒各一兩半上為末煉蜜作餅每重一錢細嚼米湯下三一承氣湯治嘔吐水漿不入食即吐大便祕或利而不鬆快時覺腹痛滿者或下利赤白而嘔吐食不下者或大小腸膀胱結而不通上為嘔吐隔食大黃三錢量人虛實加減芒硝厚朴薑汁炒枳實麩炒各三錢甘草一錢上銼水煎服蔭按方氏曰三因方嘔吐證忌用利藥此言其常然大小腸膀胱熱結而不通上作嘔吐隔食若不用利藥開通發泄則嘔吐何由而止或只嘔吐而大小便不祕澀者此藥又所當忌也治胃寒嘔吐方理中湯海藏加減例人參白朮乾薑炮甘草炙各等分上銼加生薑十片水煎服若為寒氣濕氣所中者加附子一兩名附子理中湯若霍亂吐瀉者加橘紅青皮各一兩名治中湯若干霍亂心腹作痛先吃鹽湯少許頓服嘔吐出令透即進此藥若嘔吐者於治中湯內加丁香半夏各一兩生薑十片若泄瀉者加橘紅茯苓各一兩名補中湯若泄瀉不已者於補中湯中加附子一兩不喜飲食水穀不化者再加炒砂仁一兩共成八味若霍亂吐下心腹作痛手足逆冷本方去白朮加熟附子名四順湯若霍亂後轉筋者加煅石膏一兩若臍下築者腎氣動也去朮加官桂一兩腎惡燥故去朮恐作奔豚故加桂若悸多者加茯苓一兩渴欲飲水者加朮半兩若寒者加乾薑半兩腹滿者去白朮加附子一兩若吐利後胸痞欲絶心膈高起急痛手不可近者加枳實茯苓各一兩名枳實理中湯若渴者但於枳實湯中加瓜蔞根一兩若飲酒過多及啖炙煿熱物發為鼻衄者加川芎一兩若傷胃吐血以此藥能理中脘利陰陽安定血脈只用本方中附子毒者亦用此方綱目載杜醫治驗安業方有閻氏家老婦人患嘔吐請石秀才醫曰胃冷而嘔下理中丸至百餘丸其病不愈石疑此患召杜至曰藥病正相投何必多疑石曰何故藥相投而病不愈杜曰寒氣甚藥力未及更進五十丸必愈如其言果愈石於是師法於杜加味理中湯治胃感寒嘔吐不止即本方加陳皮丁香各等分治中湯即理中湯加陳皮青皮各等分溫中湯即理中湯加丁香加味二陳湯治痰飲為患或嘔噦噁心或頭眩心悸或中脘不快或發為寒熱或飲食生冷脾胃不和並宜服之陳皮半夏各五兩茯苓二兩甘草炙一兩半丁香一兩上㕮咀每服四錢水一盞生薑三片烏梅一個同煎至七分去渣熱服或治痰痞加草豆蔻麵裹煨熟一兩半藿香安胃散治脾胃虛寒不能飲食嘔吐不待腐熟藿香一錢半丁香人參各二錢橘紅五錢上為細末每服二錢生薑三片同煎食前服藿香平胃散治嘔吐不止蒼朮泔浸三兩半夏陳皮去白各二兩厚朴制藿香各一兩甘草炙半兩上為粗末每服五錢生薑三片棗三枚水煎溫服四味藿香湯治胃寒嘔吐粥藥不停藿香人參橘皮半夏各等分上銼加生薑煎服藿香半夏湯治胃虛中寒停痰留飲噦逆嘔吐藿香葉半夏湯泡七次炒黃色各二兩丁香皮五錢上㕮咀每服三錢姜七片水煎食前溫服丁夏湯治脾中虛寒停痰留飲噦逆嘔吐丁香半夏各三錢上銼加生薑煎服香砂養胃湯治脾胃虛寒嘔逆及飲食所傷胸痞腸鳴泄瀉蒼朮一錢半厚朴陳皮各一錢二分半夏茯苓藿香砂仁各一錢草果七分人參六分甘草四分上銼加生薑三片棗一枚水煎服瀉甚者加白朮澤瀉各一錢一方無草果養胃湯治脾胃虛冷不思飲食嘔吐翻胃人參橘紅白豆蔻仁丁香砂仁肉豆蔻附子炮沉香麥芽炒神麯炒甘草炙各等分上為細末每服二錢姜鹽湯調下益黃散治脾胃虛寒水來侮土而嘔吐不食或肚腹作痛或大便不實手足逆冷等證陳皮一兩青皮訶子肉丁香甘草炙各二錢上銼每服四錢水煎服丁香散治脾胃氣弱嘔吐水穀不消丁香白朮砂仁草果各三錢人參一兩當歸白豆蔻藿香甘草神麯炒訶子各半兩橘皮七錢半上為末每服二錢薑棗湯調服丁香煮散治脾胃虛冷嘔吐不食丁香不見火乾薑炮川烏炮去皮臍甘草炙各五分紅豆去皮良薑青皮胡椒各一錢陳皮二錢益智仁去皮三錢上銼一服加生薑三片炒鹽二分水煎食遠服丁香吳茱萸湯治嘔吐噦胃寒所致吳茱萸草豆蔻人參蒼朮黃芩各一錢當歸一錢半升麻七分柴胡半夏茯苓乾薑丁香甘草各五分上作一服水煎食前熱服忌冷物丁附治中湯治胃傷寒冷之物以致心腹絞痛而嘔噦不止附子二錢丁香白朮乾薑炮陳皮青皮各一錢人參五分甘草炙三分上銼作一服加生薑五片大棗二枚水煎溫服木香白朮散一名丁香半夏湯治嘔而吐食謂持實擊強是無積也胃強而乾嘔有聲無物脾強而吐食持實擊強是以腹中痛當以和之甘草炙四錢檳榔二錢丁香木香俱不見火各一錢上㕮咀每服四錢水二鍾生薑三片煎八分食遠服或為細末每服二錢生薑芍藥湯調下四逆湯嘔而脈弱小便復利身有微熱見厥者難治此湯主之炙甘草二兩乾薑一兩半附子一個去皮上㕮咀以水三升煮取一升三合去渣分溫再服強人用大附一枚乾薑三兩煨姜散治嘔吐不已兼噁心生薑一大塊直切薄片勿令拆斷層層摻鹽於內以水濕苧麻密縛外又用紙包水濕火煨令熟取去麻紙用姜搗爛和稀米飲服之白豆蔻散治胃冷有積吃食欲吐者白豆蔻五錢為末好酒調服鐵刷湯治寒積痰飲嘔吐不止胸膈不快不下飲食半夏四錢湯泡草豆蔻丁香乾薑炮訶子皮各三錢生薑一兩上六味㕮咀水五盞煎至二盞半去渣分三服無時大吐不止加附子三錢生薑半兩吳茱萸湯嘔而胸滿者此湯主之吳茱萸一升人參二兩生薑六兩大棗二十枚擘上㕮咀以水五升煮取一升溫服七合日三服丁香茯苓湯治久積陳寒流滯腸胃嘔吐痰沫或有酸水全不思食木香丁香乾薑附子半夏橘皮肉桂砂仁各等分上銼加生薑煎服紅豆丸治諸嘔逆膈氣反胃吐食丁香胡椒砂仁紅豆各二十一粒上為細末薑汁糊丸如皂角子大每服一丸以大棗一枚去核填藥麵裹煨熟去面細嚼白湯下空心日三服羅謙甫云諸藥不效者紅豆丸神效溫中湯治脾寒嘔吐咳嗽自利半夏湯泡焙乾薑各等分上為細末生薑和汁丸如桐子大每服十丸木瓜湯下薑湯亦可許仁則半夏丸治胃冷嘔逆不食半夏洗去滑一斤小麥面一斤上水和丸如彈子大水煮熟初服三五丸二服加至十四五丸旋煮間服七味人參丸服前丸不應可服此藥人參白朮各五兩厚朴薑製細辛各四兩橘皮生薑各三兩桂心二兩上為末煉蜜丸如桐子大米飲下十丸漸加至二十丸丁香半夏丸治胃寒嘔吐吞咽酸水橘皮二兩白朮一兩半半夏湯洗七次乾薑炮丁香不見火各一兩上為末生薑自然汁打糊丸如桐子大每服三十丸生薑湯下丁香丸治因冷物凝滯胃寒不消嘔吐不止丁香不見火半兩木香不見火胡椒藿香甘草炙各三錢乾薑炮肉桂各二錢上為細末蒸餅打糊為丸如緑豆大焙乾時時干嚼不必飲湯水水入即愈吐如覺痿弱更加附子助胃膏治嘔吐不食人參白朮茯苓橘皮砂仁各二錢半丁香木香肉豆蔻麵煨草果去皮各一錢半白豆蔻一錢上為細末煉蜜丸如彈子大每服一丸生薑煎湯化下青金丸治嘔吐不已硫黃二錢水銀一錢上入銚內慢火化以木片撥炒成砂研至黑不見白星薑汁糊丸緑豆大每服二三十丸米飲下杜醫治驗王普侍郎病嘔飲食皆不得進召孫數日亦不愈後復召杜杜曰治嘔愈嘔此胃風也遂用川烏一兩淨洗去皮臍不去尖以漿水一碗煮乾每個做兩片復用漿水一碗煮盡更做四片每細嚼一片以少溫水下少頃嘔遂止痛既少息杜遂問曰尋常好吃何物曰好吃甘甜之物杜曰是甘甜乃膏粱之物積久成熱因而生風非一朝一夕之故也王服其說治胃虛嘔吐方大橘皮湯理氣和中止嘔逆橘皮甘草生薑各三錢人參五錢上㕮咀分作二服水煎服之一方加竹茹橘皮青竹茹湯治嘔逆陳皮甘草各二錢人參二錢半竹茹三錢上作三服姜煎活人方四味各等分薑棗煎服海藏橘皮茯苓生薑湯治咳逆解酒毒止嘔吐陳皮一兩茯苓五錢炙甘草生薑各三錢上銼生薑煎服一法加葛根神麯半夏大半夏湯反胃嘔吐服小半夏湯諸藥不愈者服此立愈半夏二升洗完用人參三兩白蜜一升上以水一斗三升和蜜揚之二百四十遍煮藥取三升溫服一升余分再服六君子湯治久病胃虛聞穀氣而嘔不納飲食人參白朮茯苓陳皮各一錢半夏二錢甘草炙五分上銼加生薑三片水煎熱服或加香附一錢丹溪方治久病嘔者胃虛不納穀也人參黃耆白朮香附生薑上銼水煎服人參安胃散治脾胃虛熱嘔吐或腸鳴泄瀉不食人參一錢黃耆炒二錢白芍藥炒七分生甘草炙甘草各五分白茯苓四分陳皮三分黃連二分上銼水煎服比和散治嘔吐月餘不納水穀聞食即嘔者人參白朮茯苓神麯炒各一錢陳皮藿香砂仁甘草炙各五分上銼作一服用十年以上陳倉米一合順流水二鍾煎沸泡伏龍肝研細攪混澄清取一鍾加生薑三片棗二枚同煎七分稍熱服別以陳倉米飲時啜之日進三服即止枇杷散治胃虛多渴嘔噦不止枇杷葉去毛人參陳皮去白半夏泡赤茯苓甘草炙各五錢麥門冬去心青竹茹各一兩上銼生薑五片水煎服單人參湯治氣虛嘔吐人參二兩水三盞煎至八分熱服兼以參汁煮粥食若卒吐嘔逆粥飲入口即吐困弱者為丸服之翻胃亦宜白朮湯治胃中虛損及有痰而吐者半夏曲五錢白朮茯苓檳榔各二錢木香甘草各一錢上為細末每服二錢生薑湯調下食前服參香枳朮丸開胃進食止嘔吐人參木香不見火各三錢枳實麩炒一兩白朮一兩半陳皮四錢乾生薑二錢半上為末荷葉包米煨飯丸如桐子大每服五七十丸米飲下治食積嘔吐方藿香平胃散治內傷飲食填塞太陰嘔吐不已蒼朮一錢半厚朴薑製陳皮藿香各一錢砂仁神麯炒各五分甘草炙三分上作一服加生薑五片大棗一枚水煎溫服一方有半夏無砂仁神麯黃連六一湯治因多食煎煿燒餅熱面之類以至胃脘當心而痛或嘔吐不已漸成反胃黃連六錢甘草炙一錢上銼作一服水煎溫服思食丸助脾胃消導飲食止吐逆神麯炒麥芽炒各六錢烏梅肉五錢人參乾薑炮甘草炙各二錢上為細末煉蜜丸如桐子大每服三五十丸食前米飲下紫沉丸治中焦吐食由食積與寒氣相格故吐而疼宜服此藥治小兒食積吐食亦大妙陳皮五錢半夏炒烏梅肉檳榔丁香各二錢代赭石砂仁各三錢白朮木香沉香杏仁去皮尖各一錢白豆蔻巴豆霜另研各五分上為細末醋糊和丸如黍米大每服五十丸食後生薑湯下吐愈則止小兒丸如芝麻大治痰飲嘔吐方加味二陳湯治停痰結氣而嘔陳皮半夏各五兩茯苓三兩甘草一兩半砂仁一兩丁香五錢生薑二兩水煎服生薑半夏湯元戎止嘔吐開胃消食半夏湯洗生薑切片各三錢上量水多少煎至七分服姜橘湯活人治嘔噦手足逆亦治乾嘔橘皮去白生薑切片各三錢上用水一鍾煎七分服加半夏名橘皮半夏湯小半夏湯嘔家本渴今反不渴心下有支飲故也此湯主之即前生薑半夏湯分兩不同半夏一升洗生薑半斤各切薄片上以水七升煮取一升半去渣分溫再服小半夏加茯苓湯卒嘔吐心下痞膈間有水眩悸者此湯主之半夏一升洗生薑半斤茯苓三兩一方四兩上銼以水七升煮取一升半分溫再服又云先渴卻嘔為水停心下此屬飲家小半夏加茯苓湯主之活人大半夏湯治痰飲脾胃不和半夏生薑茯苓上為粗末水煎如熱痰加炙甘草脾胃不和加陳皮桔梗半夏湯治冷熱不合令胸中痞痛痰涎嘔噦桔梗半夏陳皮各等分上為粗末水煎服細末姜糊丸亦可橘皮半夏湯治積氣痰痞不下飲食嘔吐不止陳皮半夏各二兩生薑一兩半上㕮咀水五盞煎至二大盞去渣分三服食後臨臥服半夏茯苓陳皮湯消飲止嘔和中順氣半夏泡茯苓陳皮去白生薑各一錢半上㕮咀水二盞半煎一盞去渣臨臥服枳實半夏湯治痰飲停留胸膈痞悶或咳嗽氣塞頭目昏重喘嘔噁心項背拘急半夏陳皮各一兩枳實半兩上銼加生薑煎服新法半夏湯治脾胃氣弱痰飲不散嘔逆酸水腹肋脹痞頭旋噁心不思飲食大半夏四兩湯洗七次切作兩片白礬末一兩沸湯浸一晝夜洗去礬俟干一片切作兩片薑汁浸一晝夜隔湯燉焙乾為末薑汁拌成餅炙黃用縮砂仁神麯炒陳皮去白草果仁各一兩白豆蔻仁丁香各半兩甘草二兩半生半炙上為細末每服二錢先用生薑自然汁調成膏入炒鹽湯不拘時點服撾脾湯麻油四兩良薑十五兩茴香炒七兩半甘草十一兩七錢上用炒鹽一斤同藥炒為細末每服一錢不拘時白湯點服旋覆花湯治中脘伏痰吐逆眩暈心下痞悶旋覆花半夏湯泡七次橘紅乾薑炮各一兩檳榔人參去蘆甘草炙白朮各半兩上㕮咀每服四錢姜七片水煎服不拘時半附湯治胃冷生痰嘔吐奇方半夏生附子各二錢半上銼加生薑十片水煎空心服或加木香少許尤妙半夏丁香丸半夏一兩丁香一錢上為末以生薑自然汁丸如桐子大先以湯二盞煎沸次下丸子藥煮令極熱以匙調服用藥汁咽下更服養正丹或來復丹黑錫丹之類俟大便利即愈如妊娠惡阻古方用茯苓半夏湯服者病反增劇不若用此藥極有神驗治氣鬱嘔吐方加味七氣湯治氣鬱嘔吐半夏湯泡厚朴薑汁炒香附枳殼各一錢二分陳皮茯苓蒼朮各一錢官桂五分甘草四分上銼加生薑三片水煎食前服大藿香散治七情傷感氣鬱於中變成嘔吐或作寒熱眩暈痞滿不進飲食藿香葉半夏白朮人參木香不見火各一兩茯苓桔梗橘皮枇杷葉甘草炙各半兩上銼每服五錢姜五片棗一枚水煎食遠服治肝邪嘔吐方加味二陳湯治脅痛或脾痛右關脈弦嘔吐不已此木來乘土之分也陳皮半夏茯苓甘草人參白朮升麻柴胡青皮芍藥川芎砂仁神麯上銼加生薑五片煎服治漏氣方麥門冬湯三因治漏氣因上焦傷風開其腠理上焦之氣慓悍滑疾遇開即出經氣失道邪氣內著故有是證麥門冬去心生蘆根竹茹白朮各五兩人參陳皮萎蕤各三兩茯苓甘草炙各二兩上銼散每服四錢水一盞半姜五片陳米一撮煎七分去渣熱服治走哺方人參湯三因治走哺蓋下焦氣起於胃下口別入回腸注於膀胱並與胃傳糟粕而下大腸今大小便不通故知下焦實熱之所為也人參黃芩知母萎蕤茯苓各三錢蘆根竹茹白朮梔子仁各半兩石膏煅一兩上銼散每服四錢水一盞半煎七分溫服治吐食方桔梗湯治上焦氣熱上衝食已暴吐脈浮而洪宜先降氣和中桔梗白朮各一錢半神麯炒二錢陳皮去白枳實炒茯苓厚朴薑汁炒各一錢上銼一服水一盞半煎至一盞取清汁調木香散二錢隔夜空腹服之三服後氣漸下吐漸去然後去木香散加芍藥二錢黃耆一錢半同煎服之病愈則止如大便燥結食不盡下以大承氣湯去硝微下之少利為度再服前藥補之如大便復結又依前微下之木香散木香檳榔各等分上為細末同前藥調下荊黃湯治暴吐上焦氣熱所沖也經曰諸嘔吐酸暴注下迫皆屬於火脈洪而浮者此湯主之荊芥五錢人參二錢半大黃一錢半甘草一錢上銼作一服用水二盞煎至一盞去渣調檳榔散二錢空心服之檳榔散檳榔三錢木香一錢半輕粉少許上為細末用前藥調服為丸亦可用水浸蒸餅丸如小豆大每服二十丸食後服大黃甘草湯治食已即吐又治吐水大黃四兩甘草一兩上二味以水三升煮取一升分溫再服金花丸治吐食而脈弦者由肝乘於脾而吐乃由脾胃之虛宜治風安胃蓋風痰羈絆於脾故飲食不下半夏湯洗一兩檳榔二錢雄黃一錢半上為細末薑汁浸蒸餅為丸如桐子大小兒另丸薑湯下從少至多漸次服之以吐止為度青鎮丸治上焦吐頭痛發熱有汗脈弦柴胡一兩黃芩七錢半人參五錢半夏甘草各三錢青黛二錢半上為細末薑汁浸蒸餅丸如桐子大每服五十丸食後薑湯下茯苓澤瀉湯治胃反吐而渴欲飲水者茯苓半斤澤瀉四兩白朮三兩甘草桂枝各二兩生薑四兩上六味以水一斗煮取三升納澤瀉再煮取二升半溫服八合一日三服白朮散治食即吐欲作反胃白朮茯苓澤瀉各等分上為末每服一錢湯調溫服治乾嘔方生薑橘皮湯金匱治乾嘔噦或致手足厥冷陳皮四兩生薑半斤上二味以水七升煮取三升溫服一升下咽即愈開胃丸治乾嘔氣逆不止半夏曲微炒三兩人參一兩半白豆蔻去皮陳皮去白白朮各二兩上為末生薑汁同棗肉丸如桐子大每服二三十丸米飲下一方治卒乾嘔不息屬熱者取甘蔗汁溫服半斤日三次又以生薑自然汁服一升或搗葛根絞取汁服一升並瘥治嘔苦水方丹溪方治婦人清早嘔苦水脈澀而微起轉如常此胃弱而上脘有濕也蒼朮滑石各一兩半陳皮半夏山楂各一兩飛礬二兩黃芩七錢桔梗神麯炒各五錢上銼姜水煎服治嘔清水方茯苓飲金匱治心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食消痰氣令能食茯苓人參白朮各三兩枳實二兩陳皮五錢生薑四兩上六味以水六升煮取一升八合分溫三服如人行八九里進之丹溪方治兩手麻弦飲後嘔清水神麯蒼朮香附各五錢半夏七錢半益元散一兩上為末薑汁浸蒸餅為丸服丹溪方治吐清水蒼朮壁土炒白朮炒陳皮白茯苓滑石炒上銼水煎服五苓散治渴欲飲水水入則吐者名曰水逆茯苓豬苓澤瀉白朮官桂各一錢上為末生薑汁調服豬苓散嘔吐而病在膈上後思水者急與解之此藥主之豬苓茯苓白朮各等分上為末飲服方寸匕日三服仲景云嘔吐思水解者急與之一人每嘔水三二碗諸藥不效但吃井花水一口即住用白朮茯苓湯愈信知先賢不誣也一味蒼朮丸治嘔吐清水如神蒼朮一斤分作四份一份酒浸一份醋浸一份糯米泔浸一份童便浸一日一換備浸三日取出焙乾上切片以黑芝麻同炒香共為末酒糊為丸如桐子大每空心白湯下五十丸丹溪方一人年四十因灸艾火太多病腸內下血糞肚痛今痛自止善嘔清水食不下宜清胃口之熱白朮連翹各一錢半陳皮地黃各一錢黃芩茯苓甘草各五分上銼加生薑三片煎服赤石脂散治痰飲水吐無時節者其源因冷飲過度遂令脾胃氣羸不能消於飲食飲食入胃則皆變成冷水反胃不停皆赤石脂散主之赤石脂一斤搗篩服方寸匕酒飲時稍加至三匕服盡一斤終身不吐痰水又不下痢補五臟令人肥健有人痰飲服藥不愈用此方愈治吐涎沫方半夏乾薑散治乾嘔吐逆吐涎沫半夏乾薑各等分上二味杵為散取方寸匕漿水一升半煎取七合頓服之吳茱萸湯治氣虛胃寒嘔吐冷涎陰證乾嘔頭痛通用吳茱萸生薑各半兩人參二錢半上銼水二盞棗一枚煎至八分去渣服小青龍湯治吐涎沫麻黃芍藥細辛乾薑甘草桂枝各一兩五味子半夏各八錢一字上用水三升三合半先煮麻黃減七合去上沫納諸藥煮取一升去渣溫服治嘔膿方地黃湯直指治嘔吐膿血生地黃洗焙川芎各一兩半夏制甘草炙各七錢半南星湯洗七次芍藥白芷茯苓北梗前胡知母人參各半兩上銼每服三錢半姜五片烏梅一個水煎服治嘔吐蟲方加味二陳湯治吐蟲時常噁心胃口作痛口吐清水得食暫止飢則甚者胃中有蛔也本方加苦楝根使君子一方再加白朮烏梅一方治吐蟲而嘔黑錫炒成灰檳榔為末各等分上二味和勻用米飲調下烏梅丸蛔厥者當吐蛔今病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔烏梅七十五個細辛附子人參黃柏桂枝各一兩半乾薑二兩半黃連四兩蜀椒當歸各一兩上為末以苦酒漬烏梅去核蒸熟杵成泥和藥令相得納臼中與煉蜜杵三千下丸如桐子大每服十丸食前服日三加至二十丸禁生冷滑物錢氏白朮散冬月吐蛔多是胃虛寒而蟲作用此方治之人參白朮茯苓甘草藿香乾葛木香加丁香三粒上作一服水煎服雄礬瓜蒂散治嘔而流涎脈平者蟲家證也此方吐之雄黃明礬苦瓜蒂炒各五分上共為末酒調服
