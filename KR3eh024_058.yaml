body:
  text: 卷五十八自汗盜汗論虞氏曰內經曰心之液為汗原病式曰心熱則出汗東垣曰西南坤土也在人則為脾胃夫人之汗猶天地之陰雨滋其濕則為霧露為雨也據內經獨主於心而東垣又指脾胃而言何也蓋心為君火主熱脾胃屬土主濕濕熱相搏為汗明矣亦如地之濕氣為雲霧而上升其天地若不升降則不能成霖雨也又如甑中燒酒若非湯火蒸淘則不能成汗液也夫各臟皆能令人出汗獨心與脾胃主濕熱乃總司耳內經又云飲食飽甚汗出於胃飲食飽甚則胃氣滿而液泄故汗出於胃驚而奪精汗出於心驚則神散神散則奪其情氣故汗出於心持重遠行汗出於腎持重遠行則傷骨腎主骨故汗出於腎疾走恐懼汗出於肝肝主筋而藏魂疾走則傷筋恐懼則傷魂故汗出於肝搖體勞苦汗出於脾搖體勞苦則肌肉四肢皆動脾所主也故汗出於脾本病論曰醉飽行房汗出於脾此上五條言汗者汗屬精病在陰也若夫自汗與盜汗者病似而實不同也自汗者無時而濈濈然出動則為甚屬陽虛胃氣之所司也盜汗者寐中通身如浴覺來方知屬陰虛榮血之所主也大抵自汗宜補陽調衛盜汗宜補陰降火又有心虛而冷汗自出者理宜補肝益火之原以消陰翳也陰虛火炎者法當補腎壯水之主以制陽光也醫者宜詳辨之袖珍論曰心之所藏在內者為血發於外者為汗蓋汗乃心之液而自汗之因未有不由心腎俱虛而得之者故陰虛陽必湊發熱而自汗陽虛陰必乘發厥而自汗此固陰陽偏勝所致又有傷風中暑病濕兼以驚怖房室勞極歷節腸癰痰飲産蓐等疾亦能令人自汗如睡中覺汗出者是名盜汗亦心虛所致其脈多微而澀治之宜斂心氣益腎水使陰陽調和水火升降其汗自止丹溪曰自汗屬氣虛屬濕與熱用人參黃耆少佐以桂枝陽虛甚附子亦可少用須用小便煮盜汗屬血虛用當歸六黃湯甚效但藥性寒人虛者只有黃耆六一湯盜汗發熱因陰虛用四物湯加黃柏兼氣虛加人參黃耆白朮火氣上蒸胃中之濕亦能作汗涼膈散主之痰證亦有汗自汗大忌生薑以其開腠理故也小兒盜汗不須治戴氏曰別處無汗獨心孔一片有汗思慮多則汗亦多病在心宜養心血用豶豬心一個破開帶血入人參當歸二兩裝在心中煮熟去二味藥只吃豬心不滿三四日即愈汗病若服止汗固表之藥無效者只可理心血蓋汗乃心之液心無所養不能攝血故溢而為汗宜大補黃耆湯加酸棗仁有微熱者更加石斛有痰證冷汗自出者理氣降痰湯痰去則汗自止李氏曰汗者元氣真液因飲食驚恐房勞行動出汗者曰多汗不問昏醒朝夕浸浸出汗者曰自汗乃陽氣不足榮護發熱者補中益氣湯加麻黃根浮小麥但升柴俱宜蜜水炒過以殺其升發之性又欲其引參耆至肌表故不可缺也發厥者古耆附湯順元散間有氣血俱虛者黃耆建中湯痰證自汗頭眩嘔逆宜川芎白朮陳皮甘草水煎服多汗身軟者濕也心主熱脾主濕濕熱相搏如地之濕蒸氣為雲霧為雨各臟皆令有汗獨心與脾胃為濕熱主耳宜調衛湯玉屏風散火炎上蒸胃濕作汗者涼膈散胃熱者二甘湯是知自汗亦有實者故外感初證亦多自汗風證桂枝湯加附子寒證古桂附子湯暑證五苓散風濕相搏防己黃耆湯凡自汗久用參耆附子不效宜養心血或汗乾仍熱者必外感風宜參蘇飲病止住服是反治也盜汗全是陰虛兼腎火脾濕心勞睡著汗出醒則漸收蓋睡則胃氣行於里而表虛醒則氣散於表而汗止心火炎盛以致肺失衛護者當歸六黃湯陰虛火動者四物湯加知母黃柏兼氣虛者加參耆白朮腎火動甚者正氣湯脾濕者四制白朮散肝熱者用防風龍膽草等分為末米飲調服心虛者用人參當歸各二錢半先用豬心血煮湯澄清以汁煎藥服思慮過度以致心孔獨有汗出者用艾湯調下茯苓末一錢或用青桑第二葉帶露採陰乾火焙為末米飲調服或古芷砂散通用黃耆六一湯加浮小麥牡蠣麻黃根外用五倍子白礬為末津液調封臍中一宿即止或用牡蠣麥麩麻黃根藁本糯米防風白芷等分為末周身撲則更效蔭按夫自汗盜汗之證為病雖一其源不同自汗者乃陽虛氣虛有濕也陽氣虛則不能衛護肌表故醒時津津然而汗出矣盜汗者乃陰虛血虛有火也陰血虛則不能榮養於中故睡時湊湊然而汗出矣何以知之如古方用玉屏風散治自汗效者其間防風黃耆所以實表氣白朮所以燥內濕也用當歸六黃湯治盜汗效者當歸黃耆生熟地黃所以補陰血黃芩黃連黃柏所以去內火也藥性與病情相對豈有不愈者乎葉氏曰人之一身負陰抱陽平則安偏則病陰虛陽必湊故發熱汗出如水瀉而湧陽虛陰必乘故發厥汗出如水溢而流要之汗者血之異名陽主氣為衛陰主血為榮氣血二者俱不可一日餒也若汗出發潤一不治也汗出如油二不治也汗凝如珠三不治也是故君子宜辨之於早吳氏曰有因而自汗非病也所謂陽之汗以天地之雨名之乃陰陽和而雨澤降也惟無因而自汗則為病矣汗孔謂之鬼門故盜汗不止久久令人喪魄素問有病身熱懈惰汗出如浴惡風少氣名曰酒風酒風一名漏風蓋飲酒入風則為漏風漏風之狀或多汗常不可單衣食則汗出甚則身惰喘息惡風衣濡口乾善渴不能勞事海藏云頭汗出齊頸而還血證也額上偏多何也曰首者六陽之會也故熱熏蒸而汗出也額上偏多以部分左頰屬肝右頰屬肺鼻屬中州頤屬腎額屬心三焦之火涸其腎水溝瀆之餘迫而上入於心之分故發為頭汗而額上偏多者屬心之部而為血證也飲酒飲食頭汗出者亦血證也至於雜證相火迫腎水上行入於心為盜汗或自汗傳而為頭汗出者或心下痞者俱同血證例治之無問傷寒雜病酒積下之而心下痞者血證也何以然曰下之亡陰亡陰者則損脾胃而亡血氣在胸中以亡其血陷之於心之分也故心下痞世人以血病用氣藥導之則痞病愈甚而又下之故變而為中滿膨脹非其治也如此然當作何治獨益中州脾土以血藥治之其法無以加矣又云一男子手足汗醫用芩連柏並補劑皆不效又足汗常多後以八物半苓為君白附川烏佐使其汗自無經云奪血者無汗奪汗者無血血與汗非兩種但血主營為陰為里汗屬衛為陽為表一表一里無可並攻故奪血者無取其汗奪汗者無取其血若表裡俱奪則不脫於陰必脫於陽東垣曰真氣已虧胃中火盛汗出不休胃中真氣已竭若陰火已衰無汗反燥乃陰中之陽陽中之陽俱衰四時無汗其形不久濕衰燥旺理之常也其形不久者秋氣主殺生氣乃絶生氣者胃之穀氣也乃春少陽生化之氣也脈法脈大而虛浮而濡者汗在寸為自汗在尺為盜汗傷寒脈陰陽俱緊當汗若自汗者亡陽不治脈訣舉要曰汗脈浮虛或澀或濡軟散洪大竭盡無餘治自汗方玉屏風散治氣虛自汗防風去蘆黃耆蜜炙各一兩白朮二兩上銼每服三錢水煎服不拘時一方加生薑三片一方加麻黃根牡蠣等分入小麥一撮水煎服丹溪云自汗忌生薑用者慎之黃耆建中湯治陽虛自汗黃耆蜜炙二錢白芍藥煨三錢肉桂去皮甘草炙各一錢上銼加棗一枚水煎去渣入飴糖少許空心服耆附湯治氣虛陽弱虛汗不止肢體倦怠黃耆去蘆蜜炙附子炮去皮臍各二錢上銼水煎服牡蠣散治諸虛不足及大病後體虛津液不固體常自汗許學士方亦治盜汗不止黃耆麻黃根洗淨牡蠣火煅研各一錢上銼入小麥一百粒水煎服一方治諸虛不足津液枯竭體常自汗晝夜不止日漸羸瘦防風黃耆白朮麻黃根牡蠣洗淨煅過各一錢上入小麥一撮水煎服補中益氣湯治內傷氣虛自汗黃耆一錢半人參甘草炙白朮各一錢陳皮當歸各五分升麻蜜水炒柴胡蜜水炒各三分上銼一服水煎服蔭按活套云如左寸脈浮洪而自汗者心火炎也本方倍參耆加麥門冬黃連五味子各五分如左關脈浮弦而自汗者挾風邪也本方加桂枝芍藥各五分若不陰虛只用桂枝湯如右關脈浮洪無力而自汗者只本方倍參耆右尺脈洪數無力而自汗者或盜汗相火挾君火之勢而克伐肺金也本方加黃連黃芩黃柏各五分或只用當歸六黃湯左尺脈浮洪無力而自汗者水虧火旺也本方加知母黃柏各五分熟地黃一錢壯水之主以制陽光也凡內傷及一切虛損之證自汗不休者本方加麻黃根浮小麥甚者少加附子其效如影響但升麻柴胡俱用蜜水制炒以殺其升發勇悍之性又欲其引參耆等藥至肌表故不可缺也大補黃耆湯治氣血俱虛自汗者黃耆蜜炙人參肉蓯蓉白朮炒當歸山茱萸去核肉桂略炒五味子炒甘草炙川芎防風各一錢茯苓一錢半熟地黃砂仁炒二錢上銼加棗二枚水煎服調衛湯治濕勝自汗補衛氣虛弱表虛不任風寒黃耆麻黃根各一錢麥門冬生地黃薑酒炒各三分生甘草當歸梢生黃芩半夏各五分羌活七分豬苓蘇木紅花各二分五味子七粒上銼作一服水煎稍熱服中風證必自汗汗多不得重發汗故禁麻黃而用根節也防己黃耆湯治風濕相搏時自汗出防己二錢黃耆二錢半甘草炙一錢白朮五分上銼一服加棗一枚水煎服涼膈散治火氣上升蒸胃中之濕亦能作汗連翹二錢山梔仁大黃薄荷茯苓各一錢甘草一錢半朴硝五分上銼水煎入蜜少許服如大便祕者硝黃臨服入二甘湯治胃熱食後復助其火汗出如雨生甘草炙甘草五味子烏梅各等分上銼水煎服安胃湯治因飲食汗出日久心中虛風虛邪令人半身不遂見偏風痿痹之病先除其汗慓悍之氣按而收之黃連五味子烏梅去核生甘草各五分熟甘草三分升麻梢二分上㕮咀合作一服水煎食遠服忌濕面酒五辛大料物之類白朮散治飲酒中風汗多不可單衣食則汗出如洗久不治必為消渴等證牡蠣煅三錢白朮一兩二錢防風二兩半上為末每服一錢溫水調服不計時如惡風倍防風白朮如汗多面腫倍牡蠣撫芎湯治汗多頭眩痰逆噁心撫芎白朮略炒去油橘紅各一兩甘草半兩上㕮咀每服四錢加生薑二片水煎溫服理氣降痰湯治痰證冷汗自出桔梗枳殼麩炒橘紅半夏曲炒茯苓貝母香附童便浸各一錢二分桂枝甘草各五分銼水煎食遠服芷砂散治驚恐自汗倦怠困弱服黃耆牡蠣不止甚效白芷一兩硃砂五錢上為末每服一錢茯神麥門冬煎湯下艾煎茯苓散治別處無汗獨心孔一片有汗者茯苓一味不拘多少上為細末以艾煎湯調服一錢吳氏曰心火自旺膈有停飲火熱蒸其濕飲故令此處有汗茯苓甘而淡甘能養心淡能滲濕艾葉香而澀香能利氣澀能固津撲汗方牡蠣麩皮麻黃根藁本糯米防風白芷各等分上為細末周身撲之獨勝散五倍子為末臨臥時以唾津調二錢填臍中以絹帛帕子縛定一宿即止一方用何首烏為末津調封臍一方用川鬱金研細臨臥以唾津調敷乳上一方治腳汗白礬乾葛各等分上二味為末每半兩水三碗煎十數沸洗逐日一次過三五日自然無汗治盜汗方當歸六黃湯治盜汗之聖藥也當歸一錢半生地酒炒熟地酒蒸黃芩黃連黃柏各七分黃耆蜜炙一錢半上銼作一服水煎服正氣湯治陰虛有火令人盜汗黃柏炒一錢知母炒一錢半甘草炙五分上銼作一服水煎臥時服黃耆六一湯治虛人盜汗黃耆炙六兩甘草炙一兩上銼每服一兩水煎服麥煎散治榮衛不調濕熱內淫夜多盜汗四肢煩熱肌肉消瘦知母石膏人參白茯苓赤芍藥滑石葶藶地骨皮甘草麻黃根杏仁去皮尖麩炒各半兩上為末每服二錢浮小麥煎湯調服四制白朮散治盜汗白朮四兩用黃耆石斛牡蠣麥麩各炒一兩四件各去不用上取白朮為末每服三錢粟米湯調下團參散心液為汗此藥收斂心經人參當歸各等分上為末每服五錢先用豬心一枚破作數片並心內血煎湯澄清汁煎藥服參耆湯治虛人盜汗人參甘草炙白扁豆炒乾葛茯苓陳皮白朮黃耆山藥半夏曲各等分上㕮咀每服一兩水煎服不拘時石斛散治虛人盜汗柴胡防風黃耆遠志官桂石斛白朮炒茯苓北五味甘草炙各等分上㕮咀每服一兩加生薑三片水煎食前溫服術苓湯治虛汗盜汗黃耆炙一兩防風白茯苓白朮麻黃根各五錢甘草炙一錢加牡蠣亦可上㕮咀每服一兩入小麥一百粒水煎臨臥溫服嚴氏黃耆湯治喜怒驚恐房室虛勞致陰陽偏虛發厥自汗或盜汗不止並宜服之黃耆蜜炙白茯苓熟地黃酒蒸桂枝不見火天冬去心麻黃根龍骨各一兩五味子小麥炒防風當歸酒浸甘草炙各半兩上㕮咀每服四錢加生薑五片水煎服不拘時發厥自汗加熟附子發熱自汗加石斛柏子仁丸戢陽氣止盜汗進飲食退經絡熱柏子仁半夏曲各二兩牡蠣甘鍋子內火煅醋淬七次焙乾人參麻黃根慢火炙拭去汗白朮五味子各一兩淨麩炒半兩上為末棗肉丸如桐子大每服三五十丸空心米飲下日二服得效減一服將愈即住作散調服亦可黃耆散治盜汗黃耆木通葛根上為粗末水煎服一方治盜汗外腎濕人參苦參龍膽草麻黃根各三錢上為末煉蜜丸如桐子大每服三十丸炒麩湯下一方治盜汗取青桑第二葉焙乾為末米飲調服此物能去五臟之風熱止盜汗人所罕知
