body:
  text: 卷六十七種子論求嗣全書論曰凡孕子在男女之氣血沖和厚積而時發其艱且晚者由稟受虛弱榮衛偏勝故資藥餌調攝抑太過助不及俾就沖和已耳庸醫識謬動投香燥辛熱消爍真陰煽引諸火心火得熱而熾怔忡恍惚驚悸狂躁發焉肝火得熱而灼掉眩強直支痛軟縮昏瞀發焉脾火得熱而燥嘔吐暴注脹鼓癰疹鼽衄淋悶發焉肺火得熱而燋咳唾喘滿痿痹膹郁發焉腎火得熱而沸水虧則火盛化源枯涸四臟之疾叢起焉是本來無恙因補藥過驟補而病病而甚猶不知剛劑之酷烈也血虛四物可矣氣虛四君子可矣王道雖無近功亦無遠禍然所以稱虛者恣欲過度致之果虛則虛中有火未有不制火而能收補益之效也蓋火盛則雖有補藥從邪而不從正火益旺而氣血愈耗矣但調氣清火而血自勻和婦人性多偏怒妾媵情鮮疏暢偏則暴暴則火性益騰偏則鬱鬱則伏火愈積心不足則血不流脾不足則味不化加以毒食猛劑安得沖和此入制香附丸性味極純氣調則血調血調則經順久服收功百發百中不敢自私公之於人又曰男子陽精微薄雖遇血海虛靜流而不能直射子宮多不成胎蓋因平時嗜欲不節施瀉太多所致宜補精元兼用靜功存養無令妄動候陽精充實依時而合一舉而成矣女人陰血衰弱雖投真精不能攝入子宮雖交而不孕雖孕而不育是以男子配合必當其年未笄之女陰氣未完欲盛之婦所生多女性行和者經調易性行姤者月水不勻相貌惡者刑重顏容媚者福薄大肥脂滿子宮不能受精太瘦子宮無血精不能聚俱不宜子男精女血皆兼氣血陰陽總屬腎與命門精血充盛別無雜病宜交會得時乃成胎孕凡經盡一日至三日新血未盛精盛其血男胎成矣四日至六日新血漸長血勝其精女胎成矣六日至十日鮮有成者總成亦皆女胎欲求子者全在經盡三日以里於夜半子時生氣瀉精受妊必男斯時男女無暴怒毋醉飽毋食炙煿辛熱毋用他術贊益陰陽和平精血調暢交而必孕孕而必育育而為子且壽妊後宜內遠七情薄五味大冷大熱之物皆在所禁蓋子食母氣以成形食母味以養精苟無胎動胎痛漏血及風寒外邪不可輕易服藥亦不得交合觸動欲火生後攝養一如胎前蓋母食熱則乳熱母食寒則乳寒母食膏粱熬烈之物則乳毒有是數者子受其害寡欲則不妄交合積氣儲精待時而動故能有子凡心有所動即是欲心主血而藏神腎主精而藏志心神外馳則腎志內亂其於交會之際殊無靜一清和之氣所瀉之物同歸腐濁而已安能發育長養於其間哉欲寡神完不惟多子抑且多壽若見命門脈微細或絕陽事痿弱法當補陽若見命門脈洪大鼓擊陽事堅舉是為相火妄動法當滋陰若或腎脈浮大芤緊遺精尿血法當補陰若帶洪數兼以瀉火若見腎脈微甚欲絕別無相火為病法當陰陽雙補陽脫痿弱精冷而薄或來慢不能直射子宮命門脈微細者還少丹打老兒丸精清淡者雀卵丸陽痿不舉命門脈虛欲脫者巨勝子丸壯陽丹腎氣欠旺來慢不能直射子宮者續嗣丹溫腎丹精漏無火者金鎖思仙丹陰虛有火者大造丸腎氣丸補陰丸虎潛丸四十以後縱有火動者只宜小菟絲子丸天門冬膏忌用知柏芍藥寒涼陰陽兩虛者八味丸二神交濟丹通用種子大補丸玄牝太極丸五子衍宗丸十子丸加味蒼朮膏何首烏丸女宜鼓動微陽女金丹螽斯丸大小烏雞丸調養經血四制香附丸十味香附丸墨附丸單醋附丸百子附歸丸琥珀調經丸加味養榮丸加味益母膏滋陰百補丸大造丸補陰丸依證選用不可過服熱藥以遺子患古云父吞剛劑子患熱淋且性燥多火男女皆然況造化之妙豈可專恃藥餌乎又曰或問千金方有房中補益法可用否予應之曰人之有生心為火居上腎為水居下水能升而火能降一升一降無有窮已故生意存焉水之體靜火之體動動易而靜難儒者曰正心收心養心皆所以防此火之動於妄也道者曰恬淡虛無精神內守亦所以遏此火之動於妄也蓋相火藏於肝腎陰分君火不妄動相火惟有稟命守位而已焉有燔灼之虐焰飛走之狂勢也易兌取象於少女兌說也遇少男艮為咸咸無心之感也艮止也房中之法有艮止之義焉若良而不止徒有戕賊何益之有為補益之說者此可用於質壯心靜遇敵不動之人苟無聖賢之心神仙之骨未易為也女法水男法火水能制火一樂於與一樂於取此自然之理也若以房中為補殺人多矣又曰人受天地之氣以生天之陽氣為氣地之陰氣為血故氣常有餘血常不足何以言之天地為萬物父母天大也為陽而運於地之外地居天之中為陰天之大氣舉之日實也亦屬陽而運於月之外月缺也屬陰稟日之光以為光者也人身陰氣其消長視月盈缺故人之生也男子十六歲而精通女子十四歲而經行是有形之後猶有待於乳哺水穀以養陰氣始成而可與陽氣為配內經曰年至四十陰氣自半而起居衰矣人之情欲無涯此難成易虧之陰氣若之何而可以供給也主閉藏者腎也司疏瀉者肝也二臟皆有相火而其繫上屬於心心君火也為物所感則易動心動則相火亦動動則精自走相火翕然而起雖不交會亦暗流而疏瀉也所以聖賢只教人收心養心其旨深矣內經曰冬不藏精者春必病溫十月屬亥十一月屬子正火氣潛伏閉藏以養天然之真而為來春發生升動之本若於此時縱欲戕賊至春深之際下無根本陽氣輕浮必有溫熱之病夫夏月火土之旺冬月火氣之浮此論一年之虛耳若上弦前下弦後月廓月空亦為一月之虛大風大霧虹霓飛電暴寒暴熱日月薄蝕憂愁忿怒驚恐悲哀醉飽勞倦謀慮勤動皆為一日之虛若患病初退瘡痍正作尤不止於一日之虛今人多有春末夏初患頭痛腳軟食少體熱仲景謂春夏劇秋冬瘥而脈弦大者正世俗所謂注夏病若犯此四者之虛似難免此夫當壯年便有老態仰事俯育一切墜壞與言及此深可驚懼古人謂不見所欲使心不亂夫以溫柔之感於體聲音之感於耳顏色之感於目馨香之感於鼻誰不為之動心也善攝生者於此五個月出居於外苟值一月之虛亦宜暫遠帷幕各自珍重幸甚又曰昔褚澄氏有言男女交合陰血先至陽精後沖而男形成陽精先入陰血後參而女形成信斯言也人有精先瀉而生男精後瀉而生女者獨何與東垣曰經水才斷一二日血海始淨感者成男四五日血脈已旺感者成女至於六七日後則雖交感亦不成胎信斯言也人有經始斷交合生女經久斷交合生男者亦有四五日以前交合無孕八九日以後交合有孕者獨何歟俞子木撰廣嗣要語著方列圖謂陽實能入虛陰實陰不能受陽即東垣之故見也又謂微陽不能射陰當補益精元弱陰不能攝陽當調養精血信斯言也世有尪羸之夫怯懦之婦屢屢受胎雖欲止之而不能止者亦有血氣方剛精力過人顧乃艱於嗣續而莫之救者獨何歟他如巢氏墳墓手命之說理或有之蓋聖人存而不論也而集群醫大成如丹溪者亦諄諄以婦人月水為務而陽施陰受之理未之權焉殊不知富貴之家侍妾已多其中豈無月水當期而無先後之差者乎有已經前夫頻頻生產而娶此以圖其易者顧亦不能得胎更遣於他人轉盼數年復生男女已成行矣豈不能受孕於此而能受孕於彼乎抑丹溪之論猶有未盡乎愚以為父母之生子不拘老少不拘強弱不拘康泰患病不拘精之易瀉難瀉只以交感之時百脈齊到者為善耳蓋子之於父耳目鼻口毛髮骨爪四肢百體無不相肖者以其稟於父母者百脈具足也是故交感而百脈齊到則雖老雖弱雖病患雖易瀉亦可以成胎矣交感而百脈參差則雖少雖強雖康泰雖難瀉亦無以成胎矣婦人所構之血固由於百脈會聚較之男子之精不能無輕重之分也若男女之辨又不以精血先後為拘不以經盡幾日為拘不以夜半前後交感為拘不以父強母弱母強父弱為拘只以精血各由百脈之齊到者別勝負焉是故精之百脈齊到有以勝乎血則雖精先血後雖經盡已久雖夜半以前雖母強父弱亦可以成男血之百脈齊到有以勝乎精則雖血先精後雖經盡未久雖夜半以後雖父強母弱亦可以成女至有既孕而小產者有產而不育者有育而不壽者有壽而黃耆無強者則亦精血之堅脆分為修短耳世俗不察精血之堅脆已定於稟受之初乃以小產專責之母以不育專付之兒以壽夭專委之數不亦謬乎然同此人則同此精血同此精血則同此百脈而有齊到參差之異者何歟夫齊到者常也參差者變也或賦稟異質或飲食失調或勞役不時或色欲過度或六氣為逆而七情所感有見而為疾者有不見而為疾者其為經絡之損傷則一也由是交感之間常變雜揉輕則二八三七四六之分重則倍半什一百一之分均為不能齊到以是而望胎之成不亦難乎故又假明醫良藥伸縮百脈使急者緩之遲者速之痿痹者動盪之流滑者抑遏之調濟使得其平必如乾坤之靜專靜翁父精之施有以會百脈之精而為精母血之受有以會百血之血而為血常使精勝血負勿使精負血勝則交感必孕生男而壽矣周子曰無極之真二五之精妙合而凝乾道成男坤道成女夫真以理言精以氣言理不可象而氣則可狀也何也二者陰陽也夫婦之謂也五者水火木金土也心肝脾肺腎之謂也然心肝脾肺腎之中又各有陰陽其形質雖拘於一體其脈絡則通乎百骸使交感而一脈不至則五有不全而二不能不缺矣烏能妙合而凝乎夫惟齊到而無參差由是精血之交無兩大之理非精能勝血則血能勝精此乾道坤道之所由分而成男成女之所由判乃嗣續之關鍵也或者曰世有殘廢之人或瘸或瞽或毀折宜乎百脈之不齊到也顧有能生子與不能生之異又有生子遂傳父疾與克兌之異者何哉兌易也不若父疾也予曰人之脈絡因形質而殘廢者固無生子之理有形質殘廢而脈絡猶自若者初不妨於嗣續之育也其以疾相傳者是雖精血之遺殃亦有受胎之後夫婦同居密邇內胎之形象因外感而遷移以故不能不繫於世類也知是則知克兌父疾者固由精血之無恙而調養敬慎之功亦不可誣也古人受胎教視正色聽正聲道正言食正味莫非使之薰陶感化而生子無不正耳觀此則殘廢者之脈絡亦不能以盡同而遂盡疑其不齊到耶又曰種子之道有四一曰擇地二曰養種三曰乘時四曰投虛蓋地則母之血也種則父之精也時則精血交感之會也虛則去新之初也予聞之師曰母不受胎氣勝血衰故也衰則傷於寒熱感於七情氣凝血滯榮衛不和則經水先後不一多寡不均謂之陰失其道何以能受父不種子氣勝精弱故也弱則原於色欲過度傷損五臟五臟皆有精而藏於腎精既弱譬之射者力微矢往安能中的謂之陽失其道何以能施斯皆由已之不能自保以至真元耗散陰涸陽枯不成孕矣故必地盛則種可投又必時與虛而俱得焉未有不成育者雖然藥餌之力調攝之宜如期之候尤不可不加之意也故種子之法以調經養精為首而用藥須審和平夫婦各相保守旬日之間使精血俱盛所待者時也當月經一來即記其時而算以三十時辰兩日半則積穢蕩盡新血初生所謂精與血俱會矣及其既孕將欲審定男女先以父生年以爻在上母生年一爻在下後以受胎之月居中果遇乾坎艮震則為男巽離坤兌則為女可預得而知者單歲為陽爻一雙歲為陰爻一又曰天以六氣流行於四時而寒止居其一地以百物醞釀乎五味而性味之寒者最少然一經烹飪則寒者亦熱矣人之七情所發皆有火邪經云陽常有餘陰常不足氣屬陽氣常有餘血屬陰血常不足故氣有餘謂之火又曰諸動屬火凡藥品之燥熱悍慓者入氣分人之一身氣血以沖和為貴既雲氣有餘為火矣何又從而補之補之則火熾而氣益壯所以壯火食氣銷爍真陰百脈沸騰眾疾蜂起舉世以惡攻喜補之情而忘其實實太過之害醫者又不明亢極承製兼化之理於男動謂下元虛冷於女動謂子宮虛寒投以烏附丁桂香燥種種剛劑志心久服以致熱與熱投陽明容受之經也毒先受之引入腎經次及心肺肝經無不漸漬深入如油入面膠著固結而不可解是醫與患者未究心於素問玄機原病式也誤天下之人何啻千萬而天下之受誤以馴致於斃者猶且諉之命數而竟不知醫之不刃而殺之也四物四君子治氣血王道之劑也用之失宜猶能貽害況辛燥諸品毒厚性猛藥中之斧斤也可輕試耶或曰天生五材誰能去兵熱藥固五材之兵可盡去乎曰大毒治病十去其九豈容廢乎俱中病則止可一而不可再可少而不可多以之治癰疽外證敷貼膏散如周禮瘍醫五毒散之類則可以之調和臟腑補助羸弱猶熾火於灶而釜中之水被其煎耗每見服峻劑者後來燔灼潰裂不忍見聞借無預以此曉之耳或曰少壯時服熱藥者毒不輒發何也曰血氣尚盛足以降伏其邪猶國家方泰豈無奸宄皆屏息潛藏至其末造投間竊發遂不可支矣或曰有服熱藥而亦孕且子者何也曰氣盛血餘容有之矣在孕則多異證生子亦有餘毒父吞熱劑子患熱淋昔人有是論矣豈惟熱藥凡飲啖醇釀厚味之人未有生子而不驚癇不瘡疥者或曰男子精寒婦人中冷亦有之乎曰男子縱欲過度虛中無火者間亦有之婦人崩漏帶下之久其中必冷第酌天之時令驗身之強弱以四物四君子少加辛熱升提之劑愈即止服不宜過治過則燥耗陰血孤陽獨盛為熱為嗽為瘵相因而致矣小兒一科臟腑脆弱尤忌熱劑惟宜益元散以蔥湯調之則可汗以燈心竹葉湯調之則可清以車前調之則可分利以穀芽湯調之則可消導以辰砂麥冬湯調之則可鎮驚劉河間直格論中雲孕婦小兒時時宜與服之遵用已久早有明效至於理之曲盡其妙發千古不傳之秘則張子和補論一篇劉守真之素問玄機原病式具在婦人科八制香附丸小兒科抱龍丸益元散男子科日以清氣化痰理脾抑火開鬱之劑自然康和安泰矣奚必助火消陰自貽伊感古人於滋陰則以黃柏知母三補丸黃柏黃連黃芩數品性味寒涼非參朮歸地之溫非丁桂烏附之熱乃謂之補何也蓋腎經之火既制則水不至於枯涸心肝脾肺之火既瀉則氣血不至於燔灼使清化之令周浹於各經平和之效順布於四體所謂誰識攻中有補存之理也況有峻補熱補如烏頭附子吳茱萸天雄鎖陽乾薑肉桂膃肭臍巴戟覆盆菟絲砂仁鹿茸豆蔻菖蒲故紙杜仲益智之類溫補如遠志歸芎白朮蒼朮龍齒龍骨五味人參黃耆山茱萸丹參熟地陳皮紫菀阿膠小茴香之類平補冷補有茯苓茯神天門麥門生地黃柏知母芩連桑皮之類天之生物熱性多而寒性少人之用物寒者少而熱者多況膏粱酒醴雞魚姜椒醯醬韭蒜何品非熱雖有寒涼之味雜以調和經以烹煿皆化為熱矣先輩云補腎不如補脾藥補不如食補今人日用飲食之物皆補也物之性味皆熱也其生疾也陽明經十居八九自口而入實有形味者也飲食皆補物性皆熱致病所由則藥之以寒涼恐不能勝又從而峻補之熱補之是厝火而加之積薪之上以火濟火如火益熱若之何而不劇也且一杯之涼藥豈能勝一盂之酒醴數藥之寒涼豈能解一箸之肥甘日餐涼藥猶有杯水車薪之懼又可以悍烈之劑而增其虐焰乎哉或曰西北高寒非熱藥莫之祛也曰此東垣生於北方其所著之書流害至今未已庸醫殺人藉為口實者也蓋西北誠寒矣寒其外之體膚未必寒其中之臟腑也其俗飲燒酒啖蒜面棗韭寢臥火炕寒豈能傷大抵內熱盛而遇嚴寒以束之遂至戰慄亦猶酒噤火過極而兼水化也嘗謂京都人之日習酒炕而不皆病每秋冬瓜梨湊集入夏冰水市賣諸熱賴以大解故有冬服百梨之說亦有上天陰騭斯民產此佳寶百姓日用而不知誰之為之者嶺南地熱產饒枝圓砂仁豆蔻胡椒蔗糖飲食以此為常品蘊毒積久值火運司天群染瘴癘亦猶疫之沿門闔境而病根實在於此果能清心寡慾節飲食起居何瘴之能災人也愚亦傷於虎者談及補藥而神色獨變敢為珍攝者告又曰調攝之道在心腎上蓋人之受胎也先生腎天一生水也次生心地二生火也腎主藏精心主藏神仙家配以坎離二卦善攝生者行止坐臥念念不放固守丹田養其精神遠女色節飲食慎起居息思慮少嗔怒去煩惱戒燥暴則腎水上升心火下降坎離自然交媾吾身之男女既合在內之男女自成矣又曰氣盛則生子子者滋也即吾氣之有餘而滋息耳禮云三十而壯有室蓋自嬰乳而三十氣盛矣精神完矣至是而有室不亦宜乎今之人童年斲喪淫縱無節以至氣日消損精神枯耗安望其生子又曰寡欲多男子所謂欲者凡心有所動即是欲心主血而藏神屬手少陰腎主精而藏志屬足少陰心神外馳則腎志內亂其於交會之際殊無靜一清和之氣其所瀉者同歸腐濁而已褚尚書曰合男女必當其年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁皆欲陰陽完實然後交而孕孕而育育而子堅壯強壽今未笄之女天癸始至已近男色陰氣早瀉未完而傷未實而動是以交而不孕孕而不育而子脆不壽也李氏曰山無不草木人無不生育婦人要調經男子要神足然後交而必孕孕而必育矣蔭按太初之時天地絪縕一氣生人乃有男女男女構精乃自化生易曰一陰一陽之謂道乾道成男坤道成女此蓋言男女生生之機亦惟陰陽造化之良能焉齊司徒褚氏言血先至裹精則生男精先至裹血則生女陰陽均至非男非女之身精血散分駢胎品胎之兆道藏經言月水止後一三五日成男二四六日成女東垣言血海始淨一二日成男三四五日成女聖濟經言因氣而左動陽資之則成男因氣而右動陰資之則成女丹溪先生乃非褚氏而是東垣主聖濟左右之說而立論歸於子宮左右之系諸說可謂悉矣而時珍先生謂褚氏未可非也東垣未盡是也蓋褚氏以精血之先後言道藏以日數之奇偶言東垣以女血之盈虧言聖濟丹溪以子宮之左右言各執一見會而觀之理自得矣夫獨男獨女之胎則可以日數論而駢胎品胎之感亦可以日數論乎稽之諸史一產三子四子者甚多其子或男多女少男少女多參差不同西樵野記載明朝天順時揚州民家一產五男皆育成觀此則一三五日為男二四六日為女之說豈其然哉焉有一日受男二日復受女之理乎此則褚氏聖濟丹溪主精血子宮左右之論似為有見而道藏東垣日數之論乃為可疑矣蔭以臆度之男女之成只以交感之際百脈齊到者別勝負焉若是精之百脈齊到者有勝乎血雖精先血後雖右動乎陰雖經盡已久亦可以成男血之百脈齊到者有勝乎精雖血先精後雖左動乎陽雖經盡未久亦可以成女故周子曰無極之真二五之精真以理言精以氣言二者陰陽也夫婦之謂也五者金木水火土也心肝脾肺腎之謂也妙合而凝乾道成男坤道成女非此之謂乎又方家載轉女為男之法有束弓弦者有佩雄黃者有暗藏雄雞羽於席下者種種諸法有應有不應其應者幸耳終不若究其本源為合理也求子者果能清心寡慾朱子所謂稟於有生之初者是也既孕再能絕欲生子必聰明無疾節戒飲食大冷大熱辛辣酒膩等物夫婦俱各宜戒蓋胎元先天之氣極宜清淨倘或不戒則精本乎熱胎元混濁其子他日胎毒驚風痘疹之證危而難治養其強健之體培其百脈之至務令精勝血負勿使精負血勝縱經盡日久所感必男既或男女命運乖舛速宜悔過自新修德惜福時時以濟人利物為念三年五載勤勉不怠天必佑之得男更能放生戒殺則所生男不惟聰敏益且長壽矣況天有好生之德人有迴天之功切不可委之於命運更不可惑於風水而歸咎於先人之墳墓矣倘惑於堪與之說講求風水棄親而求子嗣東遷西葬年久棺槨難免毀裂其中屍骸暴露遺發失骨幽魂不安不惟子嗣從此而斬且災禍必接踵而至矣戒之戒之脈法仲景云男子脈浮弱而澀為無子精氣清冷脈經曰腎沉滑得北方之體按之至骨應如珠分明者天元之氣足多孕嗣左疾為男右疾為女俱疾為生二子太陰脈滑利有力為女太陽脈滑而有力流利為男太陰脈浮太陽脈洪俱是正脈應有之象沉候不斷必是喜脈治方延齡種子仙方男婦同服當歸身酒浸川牛膝酒浸生地黃酒浸熟地黃酒浸片芩酒浸麥門冬去心米泔水浸天門冬去心米泔水浸山萸肉各四兩知母四兩鹽酒各浸二兩黃柏去皮九兩蜜水鹽酒各浸三兩遼五味川芎山藥龜板酥炙白芍藥酒浸各二兩人參六錢上製作法曬乾不犯鐵器為極細末用白蜜三斤不見火煉將竹筒二節鑿一竅孔去穰入蜜在內併入清水一小盞和勻綿紙封固七層豎立重湯鍋內柴火煮一晝夜和藥數千杵丸如桐子大每服百丸清晨鹽湯晚酒送下男婦皆然以服藥之日為始忌房事一個月愈久愈妙延齡種子其效如神延齡育子方天門冬去心麥門冬去心川巴戟去心肉蓯蓉去心人參白朮白茯苓川牛膝蓮鬚金色者生地酒洗熟地黃枸杞子菟絲子白茯神去木山藥薑汁炒山茱萸去核柏子仁鹿角膠沙苑蒺藜炒鹿角霜各五兩酸棗仁遠志去心五味子石斛各二兩上為細末煉蜜丸如桐子大每服一百丸早晨鹽湯吞下蔭按蓋男女構精乃能有孕然精者五臟之所生而藏之腎者也故欲藏精於腎者必調五臟五臟盛而精生矣是方也人參五味天麥門冬補肺藥也茯神遠志柏仁棗仁生地補心藥也白朮茯苓山藥石斛補脾胃也熟地枸杞菟絲子巴戟牛膝茱萸蒺藜補肝腎也鹿角膠血氣之屬用之所以生精角霜蓮鬚收澀之品用之所以固脫如是則五臟皆有養而精日生乃能交媾而孕子矣百脈齊到矣長春廣嗣丹男婦艱嗣者此方主之人參去蘆天門冬去心當歸酒洗山茱萸去核澤瀉去毛石菖蒲炒赤石脂五味子去梗覆盆子去萼白茯苓車前子廣木香柏子仁各一兩山藥薑汁炒川椒去目及閉口者炒出汗川巴戟去心川牛膝酒洗生地酒洗熟地黃地骨皮杜仲各二兩遠志去心肉蓯蓉酒洗出心膜枸杞子各三兩菟絲子酒洗去土仍用酒蒸搗餅曬乾四兩上為末煉蜜丸如桐子大每服三十丸鹽湯酒任下日三服五子衍宗丸添精補髓疏利腎氣不問下焦虛實寒熱服之自能單補此藥氣味專精功深效大枸杞子菟絲子各八兩五味子一兩覆盆子四兩車前子二兩慣遺精者去車前加韭子上為末煉蜜丸如桐子大每空心九十丸臨臥五十丸淡鹽湯下冬月溫酒下種子方彭用光曰男子欲兒當益榮而補精且人無子之因起於父氣之不充豈可盡歸咎於母血之不足與虛寒耶或稟賦薄弱或房勞太過以致腎氣欠旺不能直射子宮宜此溫清之劑古方熱藥切不可用巴戟酒浸去心二兩益智仁鹽水炒杜仲去皮酥炙牛膝去蘆酒洗白茯神去皮木乾山藥蒸各一兩菟絲子酒浸去泥土炒遠志甘草水煮去心蛇床子去殼川續斷酒洗各一兩五錢山茱萸酒浸去核三兩當歸身酒洗一兩熟地黃酒蒸三兩鹿茸去毛酥炙一兩上為細末煉蜜為丸如桐子大每三五十丸空心酒下或炒鹽湯下亦可臨時亦服若婦人月候已盡此是生子期也一日可服三五次平時只一次在外勿服如精虛加五味子一兩陽道衰倍加續斷一兩五錢精不固加牡蠣龍骨火煅過七次鹽酒淬井底浸三日取起曬乾各一兩三錢更加鹿茸五錢溫腎丸治陰痿精薄而冷巴戟二兩當歸鹿茸益智杜仲生地酒炒茯神山藥菟絲子遠志蛇床子續斷各一兩山茱萸熟地黃各三兩上為末煉蜜丸如桐子大每三五十丸空心溫酒下精虛加鍾乳粉五味子陽道衰倍續斷不固加龍骨牡蠣倍鹿茸多房室者倍加蛇床子痿倍加遠志肉欲剛倍鹿茸玄牝太極丸久服神清氣爽長顏色溫骨髓倍進飲食調和臟腑精濃能施生子有效蒼朮四兩用鹽水酒醋米泔各浸炒一兩補脾當歸熟地黃各二兩補血川芎一兩胡蘆巴一兩二錢益氣芍藥一兩二錢磁石一兩三錢補陽黃柏鹽水炒知母鹽水炒治相火巴戟佐腎五味子去痰收肺氣白朮補脾各一兩半破故紙補腎枸杞補肝小茴香治小腸氣白茯苓鹽酒蒸補心各二兩半木瓜用牛膝水浸杜仲蓯蓉各二兩沒藥一兩治腎損益心血陽起石一兩用黃芩水浸裝入羊角內以泥封固火煅青煙起用出以指研對日不墜為度如墜復煅上為末擇壬子庚申旺日用雞子六十個打開一孔去內拭乾以末入內用紙糊住令雞抱子出為度取藥煉蜜為丸如桐子大每服八十一丸空心鹽湯下金鎖思仙丹治男子嗜欲過多精氣不固蓮蕊蓮子芡實各等分上為末金櫻膏丸如梧子大每三十丸空心鹽湯下一月見效即不走瀉候女人月信住取車前子水煎服之一交即孕久服精神完固能成地仙平時忌葵菜車前子千金種子方一名芡實丸治夢瀉及陽虛未交先瀉者神效久服令人多子沙苑蒺藜四兩微炒蓮花蕊四兩金色者佳山茱萸去核三兩覆盆子去蒂心二兩微炒芡實去殼四兩龍骨五花者佳入砂罐內煅紅淬童便凡七次掛井底出火毒或埋地中半月亦可五錢一方無此味上各為細末煉蜜丸如桐子大每服六七十丸空心鹽湯或蓮肉煎湯下須忌房事三十日愈久愈妙如覺精氣太秘將交感之日其早先以車前子一合煎湯服之此方不問陰虛陽虛皆可通用種子大補丸人參麥門冬生地酒炒熟地砂仁炒巴戟天杜仲沙苑潼蒺藜天門冬枸杞子黃柏白茯神白茯苓白朮白芍藥各四兩牛膝當歸黑桑椹芡實圓眼肉鹿角膠各五兩上為末用雄鹿血和煉蜜為丸如桐子大每服五十丸空心溫酒鹽湯任下十子丸治五勞七傷心神恍惚夢遺鬼交及五痔七疝等證槐子蒸七次覆盆子枸杞子桑椹子冬青二味共蒸各八兩沒石子菟絲子蛇床子五味子柏子仁各四兩上為末煉蜜丸如桐子大每服五十丸空心鹽湯下以乾物壓之如女血不足去柏子加香附川芎當歸生地黃熟地黃如酒色過度不能生育加鹿角霜巴戟山茱萸生地黃枳殼黃柏何首烏聚精丸魚鰾半斤切細麵炒成珠再加酥油炒黃色當歸二兩酒浸沙苑蒺藜一兩炒黃色上為細末煉蜜為丸如桐子大每服五十丸空心溫酒或鹽湯下忌魚腥真精妙合丸治虛弱陰陽俱耗者男女並可服此以人補人之法非草木之滋味可比服一服勝他藥百服苟能無間可以長生豈但生子而已紫河車一具用男子初胎者佳米泔水洗淨用竹刀挑去筋內紫血以老酒洗過入瓶重湯煮一日搗爛如泥秋石二兩擇童男女潔淨無體氣者與以精潔飲食及鹽湯忌蔥韭肉茶等取便熬成秋石人乳干四兩取壯實婦人初胎香濃乳汁置大瓷盤內烈日中速曬乾紅鉛五錢擇女子潔淨無體氣者候天癸初至以鉛打血樣合陰戶上隨到隨取中有癢結如粟米珠子或三或五或七顆者名曰枚子尤妙然北方女子多有南方未易得既取以澄過茯苓末收之上為末同河車和勻煉蜜為丸如桐子大每服一二十丸空心白沸湯下全鹿丸又名延壽百子丹大補元精種子神效黃柏七斤去粗皮用青鹽煮酒浸焙乾取淨末五斤又以鹿血拌焙菟絲子七斤水淘淨酒浸蒸淨末五斤枸杞子七斤真甘州者用牛乳浸焙乾取淨末五斤金櫻子三斤搗去刺剖開去核取淨末一斤五味子三斤去枝梗酒洗淨曬乾淨末一斤半車前子三斤水淘淨曬乾一斤煮鹿時加桑白皮楮實子各一斤半上前六味各不見鐵務另研為細末用鹿一隻須極肥壯角有神氣者為佳先以紅棗茶葉餵養七日方用止去毛連肉五臟去其大腸穢物熬膏濾出聽用其骨角加桑皮楮實子另煮連晝夜以極研如粉為度絞和前汁同藥末內拌勻加秋石七八斤愈多愈妙槌化如膏內加煉蜜共為丸如桐子大每空心臨臥服七八十丸或二錢空心垃酒或秋石湯或鹽湯送下以乾物壓之其效如神煮鹿時用砂鍋二口以鹿肉入於大壇內以箬包緊隔湯煮爛然後濾出內汁聽用如壇內湯干另用一鍋煮熟水逐時添入不用生水其骨角亦如上隔湯煮數晝夜連膠並前濾出肉汁和藥肉柤不用工夫全在煮時柴用桑柴為妙須不斷火連日夜更番製成不可歇息丸成藥後有秋石在內恐發潮切不可遠火時時焙著食後步履輕便加食即其驗也合時以冬月為妙恐肉濃汁味少變耳七子散治丈夫精氣衰少無子牡荊子五味子菟絲子車前子菥蓂子山藥石斛熟地黃杜仲鹿茸遠志去心各八分附子炮蛇床川芎各六分山茱萸天雄各五分桂心十分白茯苓牛膝人參黃耆各五分巴戟十二分蓯蓉七分鍾乳粉八分上為末每服錢許酒調日二服一方加覆盆子二錢慶雲散治丈夫陽氣不足不能施化覆盆子五味子各二升菟絲子一升白朮炒石斛各三兩麥門冬天雄各九兩紫石英二兩桑寄生四兩上為末食後酒調服錢許日三服或米飲調亦可冷去桑寄生加細辛四兩陽事少去石斛加檳榔十五個加味六子丸此方不寒不熱可以常服男子陽痿及婦人久不孕者均宜菟絲子酒浸杜仲麩炒去絲各一兩半覆盆子二兩五錢肉蓯蓉二兩三錢車前子洗白蒺藜子炒去刺破故紙麥門冬去心川牛膝山茱萸去核牡蠣鹽泥同煅過各二兩黃耆鹽水浸熟地黃忌鐵銅各一兩五味子大甘草各五錢夏月加黃柏二兩冬月加乾薑五錢上為細末搗飯丸如桐子大每服五七十丸空心鹽湯午間臨臥用酒送下固本健陽丹凡人無子多是精血清冷或稟賦薄弱間有壯盛者亦是房勞過甚以致腎水欠旺不能直射子宮故令無子不可盡歸咎於母血之不足也菟絲子酒煮一兩半白茯神去木山藥酒蒸牛膝酒洗杜仲酒洗酥炙當歸酒洗肉蓯蓉酒浸益智仁鹽水炒五味子嫩鹿茸酥炙各一兩熟地黃酒蒸山茱萸酒蒸去核各三兩川巴戟酒浸去心二兩續斷酒浸遠志去心蛇床子炒去殼各一兩半加人參二兩枸杞子三兩尤效上為細末煉蜜丸如桐子大每服五七十丸空心鹽湯下酒亦可臨晚再進一服若婦人月候已盡此是種子期也一日可服三次如精不固加龍骨牡蠣火煅鹽酒淬三五次各一兩五錢更加鹿茸五錢如下元虛冷加附子覆盆子各二兩
