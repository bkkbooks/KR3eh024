body:
  text: 卷九十三小便不禁論原病式曰熱甚客於腎部干於足厥陰之經廷孔鬱結極甚而氣不能宣通則痿痹而神無所用故液滲於膀胱而旋溺遺失不能收禁也戴氏曰小便多者乃下元虛冷腎不攝水以致滲滯宜生料鹿茸丸睡著遺尿者此亦下元虛冷治如前法有盛喜致小便日夜無度乃喜極傷心心與小腸為表裡宜分清飲合四七湯煎服再以辰砂妙香散或小菟絲子丸間服小便數者頻頻欲去而溺不多但不痛耳此腎與膀胱俱虛客熱乘之虛則不能制水宜補腎丸六味地黃丸熱又水道澀而不利八正散或五苓散加黃柏知母麥門冬木通大便硬小便數者是謂脾約病脾約丸主之丹溪曰小便不禁者屬熱屬虛熱者五苓散加解毒虛者五苓散加四物王節齊曰小便不禁或頻數古方多以為寒而用溫澀之藥殊不知屬熱者多蓋膀胱火邪妄動水不得安故不能禁而頻數來也故年老人多頻數是膀胱血少陽火偏旺也治法當補膀胱陰血瀉火邪為主而佐以收澀之劑如牡蠣山茱萸五味之類不可用溫藥也病本屬熱故宜瀉火因水不足故火動而致小便多小便既多水益虛矣故宜補血補血瀉火治其本也收之澀之治其標也東垣云小便遺失者肺金虛也宜安臥養氣禁勞役以黃耆人參之類補之不愈當責有熱加黃柏生地黃樓氏曰下焦虛脫者澀之經云水泉不止者是膀胱不藏也仲景云下焦竭則遺溺失便其氣不能自禁制不須治久則愈又云下焦不歸則遺溲世用桑螵蛸雞肶胵之類是也李氏曰小便不禁出而不覺赤者有熱白者氣虛實熱乃膀胱火動四苓散合三黃湯加五味子山茱萸少許虛熱四苓散合四物湯加山梔升麻虛乃腎與膀胱氣虛十全大補湯加益智仁或縮泉丸大菟絲子丸二苓丸遇夜陰盛愈多內虛自汗者祕元丹內虛濕熱者腎氣丸八味丸減澤瀉附子加五味子杜仲破故紙倍山茱萸內虛寒冷者古桂附湯大菟絲子丸加肉桂頻數而少輕於不禁勞心者妙香散桑螵蛸散勞役傷脾者補中益氣湯脾約證見傷寒下虛內損則膀胱不約便溺自遺或尿後餘瀝皆火盛水不得安治宜補膀胱陰血瀉火邪為主而佐以牡蠣山茱萸五味子之類不可用溫藥古方補陰丸最妙婦人産後傷胞小兒胞冷雞肶胵散主之治內熱小便不禁方茯苓琥珀湯治膏粱濕熱內蓄不得施化膀胱竅澀小便頻數而短少脈沉緩時時帶數茯苓豬苓白朮琥珀各半兩澤瀉一兩滑石七錢甘草炙桂去皮各三錢上為細末每服五錢煎長流水一盞空心食前調下待少時以美膳壓之解毒四苓湯治有熱小便不禁白朮茯苓豬苓澤瀉黃連黃柏梔子山茱萸各一錢五味子十五粒上銼水煎服治內虛小便不禁方四物合四苓湯治虛弱不禁白朮茯苓澤瀉豬苓當歸川芎芍藥生地黃山茱萸各一錢五味子十五粒上銼水煎空心服參耆湯治氣虛遺溺失禁人參黃耆蜜水炒茯苓白朮當歸熟地黃陳皮各一錢益智仁八分升麻肉桂各五分甘草三分上銼加生薑三片棗一枚水煎空心服年老之人虛寒遺溺者多加附子名參附湯補中益氣湯加益智五味子亦可服參朮湯治身體虛瘦遺溺失禁人參八分白朮麩炒黃耆蜜水炒山藥炒白芍藥酒炒各一錢山茱萸酒蒸去核酸棗仁炒各七分甘草炙四分上銼一劑水煎空心服二苓丸治心腎不足精神恍惚小便淋瀝不禁赤茯苓白茯苓各等分上為末以新汲水澄去新沫控干別去地黃汁與好酒同於銀石器內熬成膏搜和丸如彈子大每服一丸空心鹽酒嚼下桑螵蛸散治勞傷心腎小便頻數如米泔色能安神定志有服此藥不終劑而愈桑螵蛸鹽炙遠志去心龍骨人參菖蒲鹽炙茯神去木鱉甲醋炙當歸各等分上為末每服二錢臨臥人參湯調服既濟丸治小便不禁菟絲子酒製益智仁炒茯苓韭子炒肉蓯蓉酒洗當歸熟地黃各五錢黃柏鹽酒炒知母鹽酒炒牡蠣煅石棗酒蒸去核各三錢五味子一錢上為末麵糊丸如桐子大每服百丸空心鹽湯下水芝丸治上焦真氣虛弱小便頻數日夜無度蓮肉去皮不拘多少用好酒浸一二宿豬肚一個將蓮肉入肚中多半為度水煮熟取出切焙乾上為細末酒煮麵糊丸如芡實大每服五十丸食前米飲下益智丸治下元氣虛小便頻數人參黃柏酒浸各五錢益智仁六錢甘草一錢上為細末煉蜜丸如桐子大每服五十丸五更臨臥滾水酒任下加味地黃丸治內虛熱者小便頻數不禁熟地黃八兩杵膏山茱萸酒蒸去核乾山藥各四兩牡丹皮白茯苓澤瀉牡蠣五味子各三兩上為末地黃膏和煉蜜丸如桐子大每服百丸空心滾湯下一方六味丸去澤瀉加益智仁小菟絲子丸石蓮肉二兩菟絲子酒浸五兩白茯苓一兩半山藥二兩內七錢打糊上為末用山藥粉打糊丸如桐子大每服五十丸空心用酒鹽湯任下一方治小便遺失阿膠炒成珠牡蠣鹿茸酒浸桑螵蛸酒炙各等分上為末糯米糊丸如桐子大每服五十丸空心鹽酒任下雞肶胵散治遺尿失禁雞肶胵一具並腸男用雌女用雄洗淨燒灰上為末每服二錢空心溫酒調服或加豬脬燒灰一方治遺尿失禁破故紙為末每服二三錢空心熟水調下又宜氣海穴灸之治虛寒小便不禁方衛真湯治男婦元氣衰憊榮衛怯弱真陽不固三焦不和上盛下虛夜夢鬼交覺來盜汗面無精光唇口舌燥耳內蟬鳴腰痛背倦心氣虛乏精神不安驚悸健忘飲食無味日漸瘦悴外腎濕癢夜多小便腫重冷痛牽引小腹足膝緩弱行步艱難婦人血海久冷經候不調或過期不止或一月兩來赤白帶下漏分五色子宮感寒久不成孕並皆治之此藥大能生氣血遇夜半子時腎水旺極之際補腎實臟男子攝血化精諸病未萌之前皆能制治使不復為梗人參一兩半金叉石斛五兩白茯苓木香肉豆蔻山藥熟地黃各三兩牛膝童便酒浸一宿生地黃各二兩當歸青皮去白丁香各一兩上為細末每服三錢酒調下鹽湯亦得空心食前服婦人諸病童便同酒調空心下大菟絲子丸治內虛里寒自汗不止小便不禁菟絲子肉蓯蓉各二兩黑附子五味子鹿茸雞肶胵桑螵蛸各一兩上為末酒糊丸如桐子大每服七十丸空心鹽湯酒任下一方有牡蠣一兩韭子丸治老人下元虛冷小便不禁或成白濁韭子炒六兩鹿茸酥炙四兩蓯蓉酒浸牛膝酒浸熟地黃當歸各二兩菟絲子酒浸巴戟去心各一兩半杜仲炒石斛去蘆乾薑炮桂心各一兩上為末酒糊丸如桐子大每服一百丸空心鹽湯溫酒任下老人又宜八味丸加益智仁去澤瀉鹿茸丸治久虛冷小便白濁滑數不禁鹿茸酥炙牛膝酒浸五味子各二兩石斛杜仲薑汁炒巴戟去骨山藥菟絲子酒煮搗爛川楝肉澤瀉各一兩附子炒官桂沉香各半兩上為末酒糊丸如桐子大每服七十丸空心鹽酒下一方治男子婦人一切虛冷之疾活血駐顏減小便除盜汗治婦人久不生育似帶疾而非時有遺瀝並皆治之功效不可具述蒼朮切焙川楝子茴香吳茱萸湯洗破故紙胡蘆巴並炒各一兩山藥二兩川薑川烏草烏並炮各半兩上為細末醋糊丸如桐子大每服十五丸空心溫酒鹽湯任下婦人艾醋湯下日二服祕元丹治冷氣攻心腹痛泄瀉自汗遺溺陽衰足冷真氣不足一切內虛里寒等證白龍骨三兩訶子十枚砂仁辰砂各一兩上為末糯米粥丸如緑豆大每服空心酒下二丸臨臥冷水下三丸忌蔥茶韭縮泉丸治脬氣不足小便頻數一日夜百餘次益智仁天台烏藥各等分上為末酒煮山藥糊丸如桐子大每服五七十丸臨臥鹽湯下一方治夜多小便益智仁二十個連皮赤茯苓二錢上銼水煎臨臥熱服一方治小兒小便不禁夜多遺尿益智仁一兩鹽水浸一宿炒乾去殼上為末每用二茶匙米湯調下一方治下焦虛冷小便數損無力生薯蕷半斤刮去皮以刀切碎於鐺中煮酒沸下薯蕷不得攪待熟加鹽蔥白更添酒空腹服二三盞妙
