body:
  text: 卷九瘴癘論李氏曰東南兩廣山峻水惡地濕漚熱如春秋時月外感山嵐瘴霧毒氣發寒熱胸滿不食此毒從口鼻入也宜清上熱解內毒降氣行痰不宜發汗平胃散加芩連升麻北柴胡桔梗枳殼木香木通薑煎服如寒月外感風寒氣閉發熱頭疼自汗如瘧南方氣升或胸滿痰壅飲食不進與北方傷寒只傷表而里自和者不同宜解表清熱行痰降氣二陳湯加北柴胡黃芩蒼朮羌活川芎水煎服微汗即止如內傷飲食得者理脾卻瘴湯補中益氣湯不換金正氣散枳朮丸虛甚或挾房勞者一粒金丹熱者柴芩湯承氣湯三黃湯合竹葉石膏湯或三黃枳朮丸平洋土堅水熱山谷土潤水冷俱以平胃散為主隨水土風氣冷熱加減或變瘧痢黃疸瘡癤俱於各類求之然以扶脾胃為本凡縱酒色及食魚肉時新菜果筍蕨生冷糯飯燒酒及油炒醬煿雞鴨麵食過飢過飽歇臥處有穢氣半夜失蓋早行沾露空腹出外皆能發瘴仕宦商賈遊外俱宜節飲食謹起居以防之宋潛溪曰凡人感冒山嵐煙霧蛇虺毒氣其證惡寒戰栗發作頭疼休作無時仲夏得者為炎瘴為青草瘴孟秋得者為黃茅瘴為楸頭瘴或由飢飽或由虛怯或涉溪澗或沖煙霧者謂之黑腳瘴蝦蟆瘴啞瘴所感不同方亦異用平日不喜酒色調節飲食夜又知諸避忌臥潔淨不臭穢氣雖犯瘴月分病不能侵大段此病只是乘虛而入不可不知治瘴癘方太無神朮散專治山嵐瘴氣之妙劑也陳皮二錢蒼朮厚朴各一錢甘草菖蒲各五分藿香二分上作一服加生薑三片棗一枚水煎服一方無菖蒲有香附一錢名神朮散氣散趙氏曰此方出心印紺珠其功效前人評之詳矣但未病者宜服補中益氣加蒼朮等劑使外邪不能入可也解毒柴苓湯凡仕宦攜家小初入廣地水土不服者能戒去煎物及油炒醬煿雞鴨麵食與夫生冷燒酒之類不傷而只外感其嵐瘴之毒或惡寒發熱類瘧之狀則病必輕須服此藥可隨手作效柴胡黃芩各二錢陳皮半夏各一錢豬苓澤瀉白朮各五分茯苓一錢黃連甘草各四分上銼加生薑三片水煎服三五服即安仍戒飲食一七日承氣兼三黃竹葉石膏湯若過食煎煿醬面等厚味而感嵐瘴之毒宜服此藥斯能去其積熱瘴毒也枳實一錢厚朴二錢大黃三錢朴硝二錢石膏五錢知母一錢黃連黃柏黃芩各七分山梔仁一錢甘草五分上作一服加竹葉七片水煎空心服通利三五次以白粥補熱深者二服方能通利在臨時消息之蔭按凡北人多食煎煿至廣地熱不知避忌貪食熱味婢僕尤甚所以凡染瘴病極其危殆此則不按風土縱口腹之欲以自取之也醫不知此反用補藥隨致夭枉實為可矜若士君子能戒慎兼每晨回避瘴氣必待日光先飲食之然後出外則能免此病也書此以為處瘴鄉者之戒加味柴胡湯治挾嵐瘴溪源蒸毒之氣其狀血乘上焦病欲來時令人迷困甚則發躁狂妄亦有啞而不能言者皆由敗血瘀心毒涎聚於脾經所致柴胡黃芩半夏人參甘草枳殼大黃各等分上㕮咀每服五錢加薑棗水煎空心服啞瘴食後服治瘴瘧方丹砂雄黃各一兩鬼臼半兩阿魏一兩上丹砂雄黃並研為細末用水飛過鬼臼搗為末阿魏用酒半斤熬成膏和為丸如雞頭大緋絹袋貯十丸常執手中頻嗅其氣瘴瘧不能著人如遇已病者井花水嚼下三丸五丸即瘥
