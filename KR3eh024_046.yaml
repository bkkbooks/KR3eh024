body:
  text: 卷四十六癲狂論虞氏曰經云陽明之厥則癲疾欲走呼腹滿不得臥面赤而熱妄見妄言陽明胃脈也為多氣多血之經氣逆於胃則陽明邪實故為癲狂之疾而欲走且呼也其脈循腹裡故為腹滿胃不和則臥不安故為不得臥陽明之脈行於面故為面赤而熱陽邪盛則神明亂故為妄見妄言又曰甚則棄衣而走登高而歌逾垣上屋罵詈不避親疏是蓋得之於陽氣太盛胃與大腸實熱燥火鬱結於中而為之耳此則癲狂之候也曰癲曰狂分而言之亦有異乎難經謂重陰者癲重陽者狂素問注云多喜為癲多怒為狂喜為心志故心熱則喜而為癲怒為肝志火制金不能平木故肝實則怒而為狂也然則喜屬於心而怒屬於肝乃二臟相火有餘之證難經陰陽之說恐非理也大抵狂為痰火實盛癲為心血不足多為求望高遠不得志者有之治法狂宜乎下癲宜乎安神養血兼降痰火此大異也若神脫目瞪如愚癡者雖聖醫不能治丹溪曰癲狂原病式所論甚精蓋以世以重陰為癲重陽為狂誤也大概皆是熱耳大率多因痰結干心胸間宜開痰鎮心神亦有中邪者以治邪法治之若神不守舍狂言妄作經年不愈如心經蓄熱當清心除熱如痰迷心竅當去痰安心宜大吐大下愈又曰五志之火因七情而起鬱而成痰故為癲癇狂妄之證宜以人事制之非藥所能療也須診察其由以平之怒傷於肝者為狂為癇以憂勝之以恐解之喜傷於心者為癲為癇以恐勝之以怒解之憂傷於肺者為癇為癲以喜勝之以怒解之思傷於脾者為癇為癲為狂以怒勝之以喜解之恐傷於腎者為癲為癇以思勝之以憂解之驚傷干膽者為癲以憂勝之以恐解之悲傷於心包者為癲以恐勝之以怒解之此法惟賢者能之耳戴氏曰癲狂由七情所郁遂生痰涎迷塞心竅不省人事目瞪不瞬妄言叫罵甚則逾垣上屋裸體打擊當治痰安心宜辰砂妙香散加金箔真珠有病狂人專服四七湯而愈蓋氣結為痰痰迷而狂也癲狂不定非輕劑所能愈者宜抱膽丸燈心湯服又云心風一證精神恍惚喜怒不常言語時或錯亂有癲之意不如癲之甚亦痰氣所為也星香散加石菖蒲人參有心經蓄熱發作不常或時燥煩鼻眼各有熱氣不能自由有類心風稍定復作清心湯加石菖蒲李氏曰素問注云多喜為癲多怒為狂喜屬心怒屬肝二經皆火有餘之地但喜則氣散畢竟謀為不遂鬱結不得志者多有之大概痰迷心竅者葉氏清心丸金箔鎮心丸硃砂安神丸心風癲者牛黃清心丸追風祛痰丸虛者加紫河車一具為糊怒傷肝者安神導痰湯瀉青丸當歸龍薈丸因驚者抱膽丸驚氣丸陽明發狂見傷寒雜證胃與大腸實熱燥火鬱結於中大便閉者涼膈散加大黃下之膏粱醉飽後發狂者止用鹽湯吐痰即愈或小調中湯服芳草石藥熱氣慓悍發狂者三黃石膏湯加黃連甘草青黛板藍根或紫金錠難經云重陰者癲重陽者狂河間以癲狂一也皆屬痰火重陰之說非也但世有發狂一番妄言妄語而不成久癲者又有癡迷顛倒縱久而不發狂者故取河間合一於前難經分析於後癲者異常也平日能言癲則沉默平日不言癲則呻吟甚則僵仆直視心常不樂此陰虛血少心火不安大調中湯主之不時倒暈者滋陰安神湯言語失倫者定志丸悲哭呻吟者煮蠶退故紙酒調二錢萆麻仁煎湯常服可以斷根狂者凶狂也輕則自高自是好歌好舞甚則棄衣而走逾牆上屋又甚則披頭大叫不避水火且好殺人此心火獨盛陽氣有餘神不守舍痰火壅盛而然小調中湯三黃丸控涎丹單苦參丸狂則專於下痰降火癲則兼乎安神養血經年心經有損者不治脈法脈經曰脈大堅疾者癲狂脈沉數為痰熱脈大滑者自己沉小急疾者死虛而弦急者死寸口沉大而滑沉則為實滑則為氣實氣相搏入臟則死入腑則愈脈訣舉要曰癲癇之脈浮洪大長滑大堅疾痰蓄心狂丹溪曰癲狂脈虛易治實者難治治癲狂痰迷心竅方白金丸治癲失心數年不愈痰涎包絡心竅此藥能去郁痰服之頓愈白礬三兩鬱金七兩須四川蟬腹者為真上為末糊丸桐子大每服五六十丸溫湯下控涎丹治痰迷心竅時作癲狂狂言如有所見甘遂去心紫大戟去皮白芥子真者各等分上為末煮麵糊為丸如桐子大曬乾每服三十丸臨臥淡薑湯下或熟水下以利去痰飲為愈追風祛痰丸治痰迷心竅癲狂妄語防風天麻殭蠶炒去絲嘴白附子煨各一兩全蠍去毒炒木香各半兩白礬枯半兩豬牙皂角炒一兩半夏湯泡七次研為末稱六兩作兩份一份用生薑汁一份用皂角水各作曲南星三兩銼分二份一份化白礬水浸一份皂角水浸各一宿上為細末薑汁打糊丸如桐子大硃砂七錢半為衣每服七八十丸食遠臨臥淡薑湯或薄荷湯下硃砂滾痰丸治痰熱攻心癲狂唱哭大黃酒蒸片黃芩各八兩沉香半兩礞石煅一兩硃砂二兩另研為衣上為細末水丸桐子大每服四五十丸臨臥食後茶清溫水任下量虛實加減龍星丹治胸膈停痰蓄熱癲狂牛膽南星硃砂另研為衣各三錢黃芩黃連各二錢防風薄荷青黛另研全蠍各一錢片腦另研牛黃另研麝香另研各三字上為末煉蜜丸如龍眼大每服一丸噙化燒丹丸一名黃白丹治癲癇無問陰陽冷熱虢丹晉礬各一兩上用磚鑿一窠先安丹次安礬以炭五斤煅令炭盡取出細研以不經水豬心血為丸如緑豆大每十丸至二十丸橘皮湯下治癲狂心經邪熱方葉氏清心丸治心受邪熱精神恍惚狂言呼叫睡臥不安人參蠍梢鬱金生地酒炒天麻南星為末入黃牛膽內令滿掛當風處吹乾臘月造要用旋取各等分上為末湯浸蒸餅為丸如桐子大每服二十丸人參湯下牛黃瀉心湯治心經邪熱狂言妄語心神不安腦子另研牛黃另研硃砂另研各一錢大黃生一兩上各研為細末和勻每服三錢用生薑蜜水調下硃砂安神丸治心煩懊憹胸中氣亂怔忡心下痞悶食入反吐及傷寒汗吐下後餘熱留於心包絡不睡黃連六錢苦寒去心煩除濕熱為君甘草生地黃各一錢半甘寒瀉熱火補氣滋陰為臣當歸三錢半補血硃砂五錢約浮游之火而安神明也上為末蒸餅為丸如黍米大硃砂為衣每十五丸或二十丸食後溫水少許送下一方無當歸地黃津液下大黃一物湯治癲狂邪盛氣實者以此瀉之大黃四兩酒浸一宿上以水三升煎分三服頻服蔭按吳氏曰癲狂邪並於心此皆實證宜瀉而不宜補故用大黃苦寒無物不降可以瀉實也又必數日後方可與食但得安靜便為吉兆不可見其瘦弱減食便以溫藥補之及以飲食飽之病必再作戒之大抵痰火結聚所致或傷寒陽明邪熱所發痰火滾痰丸治之傷寒邪熱大承氣湯下之苦參丸治狂邪發作無時披頭大叫欲殺人不避水火苦參不拘多少上為末煉蜜丸如桐子大每服十五丸煎薄荷湯下牛黃膏治婦人熱入血室發狂不認人者牛黃二錢半硃砂鬱金牡丹皮各三錢腦子甘草各三錢上為細末煉蜜丸如皂子大每服一丸新水化下治癲狂心神不安方牛黃清心丸治心血不足神志不定驚恐癲狂語言譫妄虛煩少睡甚至棄衣而走登高而歌逾垣上屋等證羚羊角末麝香另研龍腦另研各一兩人參蒲黃各二兩半白茯苓川芎柴胡桔梗杏仁去皮尖各一兩二錢牛黃另研一兩二錢犀角末白朮防風白芍藥麥門冬去心各一兩雄黃另研二錢金箔一千四百片留四百片為衣甘草炙五兩山藥七錢神麯炒二兩半當歸酒洗一兩半乾薑炒七錢半肉桂大豆黃卷阿膠各一兩七錢半白蘞七錢半大棗一百個蒸去核黃芩一兩半上除棗杏仁金箔二角及牛黃腦麝雄黃四味研為細末入余藥和勻煉蜜同棗膏為丸每兩作十丸以金箔為衣每服一丸食後溫水化下或作圓眼核大以黃蠟包裹亦可安志膏治婦人因去血過多心神不安言語不常不得睡臥辰砂研酸棗仁炒人參茯神去木琥珀各七錢半滴乳香研一錢上為末和勻每服一錢濃煎燈心棗子湯空心調下開迷散治婦人患癲疾歌唱無時逾牆上屋乃榮血迷於心包所致當歸白朮白芍藥柴胡茯苓甘草炙桃仁紅花蘇木遠志生地姜酒炒上銼加生薑水煎服有熱小柴胡加生地黃辰砂抱膽丸治男婦一切癲癇風狂或因驚恐怖畏所致及産後血虛驚氣入心並室女經脈將行驚邪蘊結頓服神效水銀二兩黑鉛一兩半硃砂乳香各一兩上先將黑鉛入鐵銚內溶化次下水銀候結成砂子再下硃砂乳香末乘熱用柳木槌研勻丸如芡實大每服一丸空心並水吞下或燈心湯下病者得睡切莫驚動覺來即安再一丸可除根葉氏雄朱丸治丈夫婦人因驚憂失心或思慮過多氣結不散積成痰涎留在心包穰塞心竅狂言妄語叫呼奔走硃砂顆塊者雄黃明淨者各一錢半白附子一錢上為細末和勻以豬心血和丸如桐子大別用硃砂為衣每服三丸用人參菖蒲煎湯下常服一粒能安魂定魄補心益氣經驗祕方治癲癇神效九節菖蒲不拘多少上於不聞雞犬聲處去毛焙乾以木杵為細末不犯鐵器用黑豶豬心以竹刀劈開砂罐煮湯送下每日空心服二三錢靈苑方治癲疾失志辰砂光明有牆壁者一兩酸棗仁微炒乳香光瑩者各半兩上為末都作一服溫酒調下善飲者以醉為度勿令吐服藥訖便安置床枕令臥病淺者半日至一日覺病深者三二日覺令人潛伺之不可驚觸使覺待其自醒神魂定矣萬一驚寤不可復治麻仁煎治癲風麻仁四升上以水六升猛火煮去渣煎取七合空心服或發或不發或多言語勿怪之但人摩手足須定凡進三劑愈吳氏曰麻仁潤物也多與之令人通利故足以瀉癲風然可以濟火可以澤肝可以潤脾可以濡腎有攻邪去病之能無虛中懷氣之患足稱良也
