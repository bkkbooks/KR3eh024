body:
  text: 卷八十痿證論內經曰肺熱葉焦肺志不伸則氣鬱生火失其清肅之化故熱而葉焦五臟因而受之發為痿躄必益切音闢肺主氣以行榮衛治陰陽故五臟之痿皆因於肺氣熱則五臟之陰皆不足此痿躄之生於肺也五痿之證雖異總皆謂之痿躄心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也心氣熱則火獨上炎故三陰在下之脈亦皆厥逆而上上逆則下虛乃生脈痿脈痿者凡四肢關節之處如樞紐之折而不能提挈足脛縱緩而不能任地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿膽附於肝肝氣熱則膽汁溢泄故為口苦筋膜受熱則血液乾燥故拘急而攣為筋痿也脾氣熱則胃干而渴肌肉不仁發為肉痿脾與胃以膜相連而開竅於口故脾氣熱則胃干而渴脾主肌肉今熱蓄於內則精氣耗傷故肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿腰者腎之府其脈貫脊其主骨譴故腎氣熱則見證若此又曰治痿者獨取陽明一經陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也前陰為諸筋之會凡腰脊溪谷之筋皆屬於此故主束骨而利機關衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋衝脈為十二經之血海故主滲灌溪谷衝脈起於氣街並少陰之經夾臍上行陽明脈亦夾臍旁去中行二寸下行故皆會於宗筋陰陽總宗筋之會宗筋聚於前陰前陰者足之三陰陽明少陽及沖任督蹺九脈之所會也九者之中陽明為五臟六腑之海沖為經脈之海此一陰一陽總乎其間故曰陰陽總宗筋之會也會於氣街而陽明為之長氣街為陽明之正脈故陽明獨為之長皆屬於帶脈而絡於督脈帶脈者起於季脅圍身一周督脈者起於會陰分三岐為任沖而上行腹背故諸經者皆聯屬於帶脈支絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用也虛則血氣少不能潤養宗筋故至弛縱宗筋縱則帶脈不能收引故足痿不為用此所以當治陽明也治法各補其滎而通其俞調其虛實和其逆順筋脈骨肉各以其時受月則病已諸經之所溜為滎所注為俞補者所以致氣通者所以行氣上文云獨取陽明此復云各補其滎而通其俞蓋治痿者當取陽明又必察其所受之經而兼治之也如筋痿者取陽明厥陰之滎俞脈痿者取陽明少陰之滎俞肉痿骨痿其治皆然然筋脈骨肉則各有所受之時月如木病者在筋火病者在脈土病者在肉金病者在皮毛水病者在骨知所受之淺深以調虛實知時氣之盛衰以和逆順則病可已也蔭按風痿之別痛則為風不痛則為痿經曰痛則為實不痛則為虛曰風曰痿虛實二者而已矣故東垣先生曰氣盛病盛氣衰病衰何則人氣血充實而風寒客於經絡之間則邪正交攻而疼痛作矣人之氣血弱虛而痰火起於手足之內則正不能勝邪而痿證作矣故丹溪先生曰痿證切不可作風治而用風藥蓋以風為實而痿為虛也曰散邪曰補虛豈可紊亂乎哉學者必須臨證審確逐一明辨斯無誤矣大抵治痿之法不外補中祛濕養陰清熱而已治者宜詳審焉先哲格言云患痿之人若不斷絶房欲淡薄食味不避風寒坐臥濕地將理失宜雖聖醫不治也患者識之丹溪曰內經謂諸痿起於肺熱又謂治痿獨取陽明蓋肺金體燥居上而主氣畏火者也脾土性濕居中而主四肢畏木者也火性炎上若嗜欲無節則水失所養火寡於畏而侮所勝肺得火邪而熱矣木性剛急肺受熱則金失所養木寡於畏而侮所勝脾得木邪而傷矣肺熱則不能管攝一身脾傷則四肢不能為用而諸痿作矣瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此東垣取黃柏為君黃耆等補藥輔佐以治諸痿而無一定之方有兼痰積者有濕多者有熱多者有濕熱相半者有挾氣者臨病制方其善於治痿者乎雖然天産作陽厚味發熱凡病痿者若不淡薄食味必不能保其安全也又曰痿證斷不可作風治而用風藥有濕熱濕痰血虛氣虛瘀血食積妨礙不降者濕熱東垣健步丸加燥濕降火之劑黃柏黃芩蒼朮牛膝之類濕痰二陳湯加蒼朮白朮黃芩黃柏之類入竹瀝薑汁血虛四物湯加蒼朮黃柏煎下補陰丸氣虛四君子加蒼朮黃芩黃柏黃柏蒼朮治痿要藥也食積木香檳榔丸死血桃仁紅花蓬朮歸梢赤芍之類又如虎潛丸補腎丸加味四物湯皆補北方之要藥也一人形肥味厚憂怒脈常沉澀春病痰氣醫用燥熱香竄之藥至夏足弱氣上衝食減此熱鬱而脾虛痿厥雖形肥脈沉未當死但藥邪併火旺難治且與竹瀝下白朮膏盡二斤氣降食盡至一月後仍大汗而死一人腳常覺熱後患痿陳無擇曰人身有皮毛血脈筋膜骨髓以成其形內有肝心脾肺腎以主之若隨情妄用喜怒勞逸以致內臟精血虛耗使血脈筋骨肌肉痿弱無力以運動故致痿躄狀與柔風腳氣相類柔風腳氣皆外因風寒正氣與邪氣相搏故作腫苦痛為邪實痿由內臟不足之所致但不任用亦無痛楚此血氣之虛也葉氏曰丹溪發明治痿獨取陽明之説可謂深中肯綮矣考之內經又有皮肉筋骨脈五痿分屬五臟如無擇所云者似又當分治之也原丹溪以肺攝一身脾主四肢故以治陽明為要痿本脾肺二經者以此施治可也若夫肝之筋痿心之脈痿腎之骨痿其受病必自不同豈可只取陽明而治之乎故治筋痿宜養其肝脈痿宜宣其心骨痿宜滋其腎不可執而論也脈法脈訣舉要曰尺脈虛弱緩澀而緊病為足痛或是痿病張子和云痿因肺熱相傳四臟其脈多浮而大不可作寒濕腳氣治龔氏曰痿因肺燥脈多浮弱寸口若沉發汗則錯足痛或軟專審於尺滑痰而緩或沉而弱治濕熱痿方加味四物湯治諸痿四肢軟弱不能舉動當歸身一錢熟地黃三錢砂仁炒白芍藥川芎各七分半蒼朮黃柏麥門冬去心各一錢五味子九粒人參黃連各五分杜仲七分半牛膝足不軟者不用知母各三分上細切作一服水煎空心溫服酒糊為丸服亦可肺熱湯肺熱葉焦令人色白毛敗發為痿躄脈短數者此方主之羚羊角玄參射干薄荷芍藥升麻黃柏各三錢生地黃薑酒炒一合梔子仁竹茹二錢上銼水煎服東垣健步丸治膝中無力屈伸不得腰背腿腳沉重行步艱難羌活柴胡滑石炒甘草炙瓜蔞根酒洗各五錢肉桂五分防風澤瀉各三錢防己酒洗一兩苦參酒洗川烏各一錢上為細末酒糊為丸桐子大每服七十丸空心煎愈風湯下愈風湯方見卷一中風下門或蔥白湯下大防風湯治氣血兩虛風濕相挾麻痹痿軟或久病痢後腳弱緩痛不能行履或兩膝虛腫足脛枯乾名曰鶴膝風證服之其效如神白朮一錢半黃耆白芍藥煨當歸酒洗熟地砂仁炒杜仲薑汁炒去絲各一錢防風八分人參牛膝川芎各七分羌活附子童便煮炮甘草炙各五分上銼一服加生薑三片棗二枚水煎空心溫服清燥湯治濕熱成痿以燥金受濕熱之邪是絶寒水生化之源源絶則腎虧痿厥之病大作腰以下痿軟癱瘓不能動黃耆一錢半蒼朮米泔浸炒一錢白朮陳皮各八分澤瀉白茯苓各七分五味子九個人參四分升麻麥門冬去心當歸身酒洗生地薑酒炒神麯炒豬苓黃柏酒炒各三分黃連炒炙甘草各二分柴胡二分上用水二鍾煎八分空心熱服藿香養胃湯治胃虛不食四肢痿弱行立不能皆由陽明經虛宗筋無所養遂成痿躄藿香人參白茯苓各一錢白朮二錢半夏曲薏苡仁山藥各八分畢澄茄六分砂仁神麯陳皮各七分甘草炙五分上作一服加生薑三片棗二枚水二鍾煎至一鍾食前服溫腎湯治面色痿黃腳痿弱無力陰汗出麻黃柴胡各六分白朮黃柏酒炒豬苓白茯苓升麻各一錢防風蒼朮各一錢半澤瀉二錢上作一服水煎熱服候一時方可飲食補肝湯治前陰如冰冷並陰汗兩腳痿軟無力黃耆一錢半人參乾葛白茯苓豬苓升麻各一錢柴胡當歸身羌活連翹黃柏炒澤瀉蒼朮神麯知母防風陳皮甘草炙各五分上銼一服水煎食前服龍膽瀉肝湯治肝氣熱色青爪枯口苦筋膜乾而攣急者名曰筋痿此方主之柴胡一錢人參知母麥門冬天門冬草龍膽山梔子生甘草黃連各五分黃芩七分五味子七粒上作一服水煎服萆薢丸治兩足濕痹疼痛或如火燎從足跗熱起漸至腰胯或麻痹痿軟皆是濕病此藥主之蒼朮四兩米泔浸一宿黃柏酒浸曬乾萆薢酒浸各二兩牛膝去蘆酒洗當歸酒洗防己酒浸龜板酒浸三日酥炙虎脛骨酥炙各一兩上為細末酒煮麵糊為丸如桐子大每服一百丸空心淡鹽湯送下痿病加肉蓯蓉菟絲子各一兩治虛弱痿方加味四斤丸治肝腎俱虛精血不足致筋骨痿弱足膝痠疼不能步履肉蓯蓉酒浸牛膝酒浸天麻乾木瓜鹿茸酥炙五味子酒浸菟絲子酒浸軟另研各二兩熟地黃酒蒸上為末煉蜜丸如桐子大每服七十丸食前溫酒米飲任下一方有杜仲薑汁炒一兩牛膝丸治腎肝虛損骨痿不能起於床筋弱不能收持宜益精緩中牛膝酒浸菟絲子酒煮搗焙乾萆薢杜仲炒去絲防風肉蓯蓉酒浸各二兩白蒺藜二兩肉桂去皮一兩上為細末用酒煮豬腰子搗爛和為丸如桐子大每服五十丸空心溫酒下鹿角膠丸治血氣虛弱兩足痿軟久臥床褥不能行動神效常服補精益腎壯筋骨鹿角膠一斤鹿角霜熟地黃各半斤白茯苓川牛膝酒浸菟絲子酒浸煮另搗人參各二兩當歸身酒洗四兩白朮杜仲薑汁炒各二兩虎脛骨酥炙龜板酥炙各一兩半上為細末將鹿角膠用灰酒煬化為丸如桐子大每服一百丸空心淡鹽湯下虎潛丸一名補陰丸治痿聖藥龜板酥炙四兩黃柏酒炒四兩知母熟地黃各二兩牛膝三兩半酒浸鎖陽虎脛骨酥炙當歸各一兩陳皮七錢半芍藥酒炒乾薑各半兩上為末酒糊丸如桐子大每服一百丸鹽湯溫酒任下加附子治痿厥如神加味虎潛丸人參黃耆蜜炙芍藥煨黃柏鹽水炒當歸酒洗山藥各一兩鎖陽酒浸酥炙枸杞子虎脛骨酒浸酥炙龜板酒浸酥炙菟絲子鹽酒浸三日煮搗成餅曬乾各七錢半熟地黃四兩酒蒸另搗五味子破故紙鹽水洗炒杜仲薑汁拌炒去絲各七錢半牛膝去蘆酒浸二兩上為細末煉蜜和豬脊髓為丸如桐子大每服八十丸空心溫酒或鹽湯下補陰丸治痿龜板酒炙鎖陽酒浸歸身酒浸陳皮杜仲牛膝酒浸白芍藥酒浸各一兩白朮二兩生地黃酒浸一兩半乾薑七錢半黃柏炒虎脛骨酒炙茯苓各半兩五味子二錢甘草炙一錢菟絲子酒蒸搗爛曬乾上為末用紫河車蒸爛為丸如無河車用豬腦骨髓亦得丸如桐子大每服七八十丸空心溫酒鹽湯下五獸三匱丹治因血氣虛損肝腎不足兩腳痿弱鹿茸酥炙麒麟竭虎脛骨解斷酥炙牛膝狗脊燎去毛各等分上修製為末即五獸丹料也辰砂一兩為末附子大者一個去皮臍剜旋去心空入辰砂於內宣木瓜一個剜去心仍薄去皮入上附子於內以旋附子蓋附子口正坐於銀暖罐中重湯蒸十分爛附子斷白為度上為三匱丹也研膏調五獸末子為丸如雞頭大以木瓜酒或降氣湯下玄珠耘苗丹此丹養五臟補不足祕固真元勻調二氣和暢榮衛保神守中王啓玄序曰張長沙戒人妄服燥烈之藥謂藥勢偏有所助勝克流變則真病生焉猶憫苗不長而偃之者也若稟氣血不強合服此而不服是不耘苗者也故名耘苗丹五味子半斤巴戟去心遠志去心枸杞子山藥白茯苓肉蓯蓉酒浸百部酒浸宿焙杜仲炒斷絲蛇床子防風去蘆柏子仁另研菟絲子酒浸另搗各二兩上為末煉蜜丸如桐子大每服食前溫酒鹽湯任下夏干棗湯下夏加五味子四兩四季月加蓯蓉六兩秋加枸杞子六兩
