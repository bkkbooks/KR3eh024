body:
  text: 卷九十六脫肛論統旨云脫肛者乃大腸熱甚也或久洞泄或腸風下血小兒叫呼並久痢婦人產育用力過多皆致肛門脫出熱甚與腸風者用涼血清腸散久瀉痢者補養脾胃參朮實脾湯用力過多者十全大補湯俱加升提之藥丹溪云脫肛屬氣血虛與熱氣虛參耆芎歸升麻血虛四物湯加黃柏外以五倍子為末托而上之一次未收至五六次必收李氏曰脫肛全是氣下陷難經曰病之虛實入者為實出者為虛肛門脫出非虛而何勞倦房欲過多及產育用力久痢久瀉小兒叫呼耗氣俱有此證宜參耆芎歸升麻水煎服血虛加芍藥地黃虛寒加炒黑乾薑虛挾熱者縮砂散間有熱者熱則流通意也氣熱者用條芩六兩升麻一兩麵糊丸服血熱者四物湯加黃柏升麻風邪者敗毒散暑熱者黃連阿膠丸薄荷煎肺與大腸為表裡肺熱則肛門閉結肺寒則肛門脫出必須溫肺臟補腸胃宜補中益氣湯加訶子樗皮少許或升陽舉經湯蝟皮散釣藤丸挾濕熱者升陽除濕湯有兼痢者四物湯加槐花黃連升麻有腎虛者腎氣丸八味丸大抵皆宜兼升提藥若外治用敷藥洗藥亦可薛氏曰脫肛屬大腸氣血虛而兼濕熱有久痢氣血俱虛而脫者有中氣虛而脫者有因腎虛而脫者濕熱者升陽除濕湯血熱者四物湯加條芩槐花血虛者四物湯加白朮茯苓兼痔而痛者四物加槐花黃連升麻久痢者補中益氣湯加酒炒芍藥中氣虛陷者前湯加半夏炮薑茯苓五味腎虛者六味丸虛寒者八味丸肺與大腸為表裡肛者大腸之門肺實熱則秘結肺虛寒則脫出腎主大便故腎虛者多患此證一舉人素有痔每勞役便脫肛疼痛出水中氣下陷也用補中益氣湯加茯苓芍藥十餘劑中氣復而愈後復脫作痛誤服大黃丸腹鳴惡食幾危余用前湯加炮薑芍藥諸證漸愈後去姜加熟地黃五味子三十餘劑而愈一男子脾胃素弱或因勞倦或因入房肛門即下腫悶痛甚用補中益氣湯加麥門冬五味子兼六味丸而愈後因過飲下墜腫痛誤用降火消毒虛證蜂起余用前湯加炮薑木香一劑再用前湯並加減八味丸兩月而安一儒者面白神勞素畏風寒飲食喜熱稍多必吞酸作瀉吸氣覺冷便血盜汗余以為脾胃虛寒用補中益氣湯加炮薑肉桂五十餘劑八味丸斤許諸證悉愈治肛門虛脫方丹溪方治氣虛脫肛人參黃耆當歸川芎升麻各等分上銼水煎服血虛加芍藥地黃寒加炒黑乾薑加味四物湯治血虛脫肛當歸川芎芍藥熟地黃升麻各等分上銼水煎服血熱者加黃柏兼痢加槐花黃連提氣散黃耆人參白朮當歸芍藥乾薑炮柴胡升麻羌活甘草炙各等分上銼水煎服治肛門熱脫方涼血清腸散治熱甚腸風脫肛生地黃當歸芍藥各一錢二分防風升麻荊芥各一錢黃芩黃連香附炒川芎各八分甘草五分上銼水煎服升陽除濕湯治濕熱脫肛柴胡升麻防風豬苓澤瀉蒼朮陳皮神麯炒麥芽炒甘草各等分上銼水煎空心服胃寒腸鳴加益智半夏黃芩六一丸治積熱脫肛條芩六兩升麻一兩上為末麵糊丸服縮砂散治大腸虛而挾熱脫肛紅腫砂仁黃連木賊各等分上為細末每服二錢空心米飲調下一方治脫肛槐花荊芥穗白連各等分白連恐即白斂上為細末空心酒下便入槐角丸治五種腸風下血痔漏脫肛下血並宜服之槐角炒一兩地榆黃芩當歸酒浸焙防風枳殼麩炒各半兩上為細末酒糊丸如桐子大每服三五十丸空心米湯下二槐丹治脫肛槐花槐角各等分炒黃上為末用羊血蘸藥炙熱食之酒下治肛門寒脫方參朮實脾湯治久瀉痢寒滑脫肛白朮黃土炒人參各二錢肉豆蔻麩煨一錢半白茯苓白芍藥炒陳皮各一錢附子炮八分甘草炙七分上銼加生薑三片棗二枚水煎服下陷加升麻訶子皮散治寒滑氣泄不固形質不脫御米殼炒五分訶子皮煨去核七分乾薑炮六分陳皮五分上銼水煎服或為末白湯調服亦可蝟皮散治肛門或因洞泄或因用力脫出不收蝟皮一個罐內燒存性磁石半兩火煨醋淬七次桂心三錢上為細末每服三錢食前米飲調下用鞋底炙熱熨按肛上托入忌舉重及房室治女人陰脫加鱉頭一枚慢火炙焦黃研入舉肛丸一名釣腸丸治泄瀉虛寒脫肛半夏天南星枯白礬各五錢枯紅礬雞冠花炒白附子各五兩訶子肉煨黑附子生枳殼各一兩蝟皮二枚炙瓜蔞一枚燒存性胡桃仁十五枚燒存性上為末醋糊丸如桐子大每服三十丸空心溫酒下遠年不瘥者服十日效久服除根乳香丸治諸痔並腸風下血肛邊或生核腫痛或已成瘡大便艱難肛腸脫出乳香另研白丁香各二錢半枳殼麩炒大黃蒸焙乾牡蠣煅蓽澄茄芫青去頭足糯米炒鶴蝨炒各一兩一方各五錢上為細末用米糊丸如桐子大每服三十丸腸風臘茶清下諸痔煎薤白湯下諸漏鐵屑煎湯下並空心食前服治脫肛雜方香荊散治肛門脫出大人小兒悉皆治之香附子荊芥穗各等分上為末每服三匙水一大碗煎十數沸熱淋洗或服之亦可或用陳壁土泡湯熏洗一方用五倍子炒黃為末放熱鞋底上托之即收一方加砂仁各三錢倍礬散五倍子三錢白礬一塊上以水二碗煎五倍子減半入白礬安小桶內洗之立效一方治虛熱及用力太過小兒叫呼久瀉脫者五倍子五錢枯礬蛇床子各少許上為末水煎洗之後用赤石脂末少許撒芭蕉葉上頻用托入如脫出尺許者以兩凳相併中空一尺以瓶盛藥水令滿與凳相平令患者仰臥凳上所脫浸於瓶中逐日浸換以縮為度如積冷年久不收者用石灰炒熱以帛包裹肛坐其上冷則別換仍以海螵蛸末敷之如大腸本虛風毒熱邪乘之致令脫肛紅腫者用單鐵粉入白蘞末和勻敷之即按入收肛散治熱瀉脫肛者熊膽五分孩兒茶二分冰片一分上為細末人乳調擦肛上熱汁自出而肛收矣痔瘡亦妙或用鱉魚一個水煮食之留湯熏洗留骨燒灰敷上即愈如肛門腫痛及酒客病此者用木鱉子去殼搗爛煎湯熏洗另用少許塗之如肛門作癢者乃腹中有蟲用生艾苦楝根煎湯熏洗仍以干艾生薑煎服凡登廁後須水洗又不可用包裹湯雜物舊紙一方治脫肛荊芥龍腦薄荷朴硝各等分上煎湯朝朝洗之腸頭自入二靈散治久痢腸胃俱虛肛門自下龍骨煅五錢木賊燒存性二錢五分上為末撒托之一方用木賊燒灰存性為末擦肛門上按入即愈一方治男子女人脫肛五倍子荊芥上用小便濃煎洗之一方用胡荽燒熏立入一方用浮萍陰乾為末撒貼患處一方烏龍尾用鼠糞和之燒煙於桶內令坐其上熏之數次即上單磁石散磁石為末每服一錢空心米飲下然此亦鎮墜之劑不可多服一方治腸風及脫肛不收有血下用皂角三莖槌碎水一碗揉令皂角消盡用絹二重濾取清汁數分將脫肛腸浸在藥中其腸自收不用手托如大腸收了更用湯蕩其脫肛上下令皂角氣行則不再作三次蕩愈一方用蛇床子炒為末貼大腸脫垂處立收甚效黑聖散治瀉多時脫肛疼痛用大蜘蛛一個瓠葉重裹線系定合子內燒令黑色存性取出細研入黃丹少許同研凡有上件疾即先用白礬蔥椒湯洗拭乾後將藥末撒在上軟處將手掌按托入收之妙一方治脫肛歷年不愈以生鐵三斤水一斗煮取五升出鐵以汁洗日再一方用磨刀漿鏽水洗亦效一方用針粉研細每用少許撒之按入即愈一方治脫肛歷年不愈用鱉頭一枚燒令煙絕杵末日敷肛上手按挼之一方治大腸久積寒冷大便脫肛不收用蝸牛一兩燒灰豬脂和敷之一方治諸般痔脫肛以死蛇一條如指大濕者用掘地坑燒之將有孔板蓋坑上坐熏之煙絕為愈大效一方治腸頭出用皂角熏次用蚰蜒一個入蜜浸去蚰蜒將蜜調土朱敷上即入一女子脫肛醫用糯米一勺濃煎飲去米候洗肛溫柔卻先以磚一片火燒通紅用醋沃濕以青布鋪磚上坐肛於青布上如熱則加布令厚其肛自吸入腹中而愈紫蕺膏治臟熱肛門脫出以紫背蕺一大握又名魚腥草擂爛如泥先用朴硝水洗淨肛門用芭蕉葉托入卻用藥於臀下貼坐自然收入一方治脫肛用蔓陀羅花子連殼一對橡子十六個搗碎水煎三五沸入朴硝熱洗其肛自收一方治腸隨脫肛出轉久不可收入搗生瓜蔞取汁浸之豬肉汁中洗手隨按之令暖自得入一方治大腸頭出苦幹又落落又出名截腸病腸盡則死初出寸余時治之以芝麻油一盞以臀坐之飲大麻子汁數升愈一方治脫肛赤石脂碾細水和包大蜘蛛一個麝一分在內燒為炭覆地上為末用少許托在肛門上即收又方以狗懸後二足控取涎付肛上即收治穀道痛蝕方一方治穀道熱痛杏仁熬杵作膏敷之良愈一方治下部蟲齧桃葉杵爛一斛蒸之令極熱納小口器中以下部拓上坐蟲立死
