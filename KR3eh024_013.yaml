body:
  text: 卷十三厄逆辨厄逆即噦病準繩曰厄逆即內經所謂噦也或曰成無己許學士固以噦為厄逆然東垣海藏又以噦為乾嘔陳無擇又以噦名咳逆諸論不同今子獨取成許二家之說何也曰噦義具在內經顧諸家不察耳按靈樞雜病篇末云噦以草刺鼻嚏嚏而已無息而疾迎引之立已閉口鼻之氣使之無息乃迎其氣而引散之乃可立已大驚之亦可已詳此經文三法正乃治厄逆之法按厄逆用紙捻刺鼻便嚏嚏則厄逆立止或閉口鼻氣使之無息亦立已或作冤盜賊大驚駭之亦已此豫所以取成許二家之論噦為厄逆為得經旨也若以噦為乾嘔設使乾嘔之人或使之嚏或使之無息或使之大驚其乾嘔能立已乎噦非乾嘔也明矣若以噦名咳逆按內經生氣通天論曰秋傷於濕上逆而咳陰陽應象論曰秋傷於濕冬生咳嗽則咳逆為咳嗽無疑以春夏冬三時比例自見孫真人千金曰咳逆者嗽也本自明白後人不知何以將咳逆誤作厄逆失之遠矣論厄逆皆由病後胃虛所生三因云厄逆之病古人以為噦耳多因吐利之後胃中虛寒遂成此疾亦有胃中虛膈上熱噦至八九聲相連收氣不回者大抵傷寒久病後老人虛人及婦人産後多有此證者皆病深之候也亦有噦而心下痞悸者有痰水所為別無惡候者是論厄逆本於胃虛氣逆及陰虛火上趙以德曰成無己云噦者俗謂之咳逆厄厄然有聲然引咳逆是噦非也內經以噦與咳逆為兩證噦是胃病咳逆是肺病謂胃氣逆為噦注云胃為水穀之海腎與為關關閉不利則氣逆而上胃以包容水穀性喜受寒寒谷相搏故為噦也又謂陽明之復咳噦太陽之復嘔出清水及為噦噫少陰之復噦噫靈樞亦謂谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣迸相逆復出於胃故為噦補手太陰瀉足少陰張仲景言噦者皆在陽明證中謂治家下之太早則噦而陽明病不能食攻其熱必噦皆因下後胃氣虛而噦者也至有風熱內壅氣不能通有潮熱時時噦者與小柴胡湯和解之噦而腹滿視前後知何部不利利之者此皆可治之證至若病極譫語甚者至噦又不尿腹滿加噦者皆不治丹溪先生亦謂厄逆氣逆也氣自臍下直衝上出於口而作聲之名也內經謂諸逆衝上皆屬於火東垣謂是陰火上衝而吸之氣不得入胃脈反逆由陰中伏陽而作也從四時用藥法治古方悉以胃弱言之而不及火且以丁香柿蒂竹茹陳皮等劑治之未審孰為降火孰為補虛人之陰氣依胃為養胃土傷損則木氣侮之此土敗木賊也陰為火所乘不得內守木挾相火乘之故直衝清道而上言胃弱者陰弱也虛之甚也病人見此似為危證然亦有實者不可不知嗟乎聖人之言胃氣逆為噦者非由一因而逆緣王太僕用靈樞之意竟作腎寒逆上之病注之由是後代方論或用熱劑治寒或用辛溫散氣安知脾與胃一陰一陽也二者不和亦逆腎肝在下相凌亦逆且腎之逆未可便謂之寒也左腎主水性本潤下烏能自逆必右腎相火炎上挾其沖逆須觀所挾多寡分正治反治以療之肝木之風從少陽相火沖剋者亦必治火皆當如先生所言者以治若別有其故而噦者又必如仲景法隨其攸利而治之論厄逆有虛有實劉宗厚曰厄逆一證古方悉作胃寒所致俱用丁香柿蒂薑附等藥然此證有虛有實有火有痰有水氣不可專作寒論蓋傷寒發汗吐下之後與瀉利日久及大病後婦人産後有此者皆脾胃氣血大虛之故也若平人食入太速而氣噎或飲水喜笑錯喉而氣搶或因痰水停膈心下或因暴怒氣逆痰厥或傷寒熱病失下而有此者則皆屬實也夫水性潤下火性炎上今其氣自下衝上非火而何大抵治法虛則補之虛中須分寒熱如因汗吐下後誤服寒涼過多當以溫補之如脾胃陰虛火逆上衝當以平補之挾熱者涼而補之若夫實者如傷寒失下地道不通因而厄逆當以寒下之如痰飲停蓄或暴怒氣逆痰厥此等必形氣俱實別無惡候皆隨其邪之所在而湧之泄之清之利之也世醫凡遇此疾首以丁香柿蒂為言殊不知此藥不能補虛不能降火不能清氣利痰惟有溫暖助火而已豈宜總治此疾乎論厄逆雜治法準繩云胃傷陰虛木挾相火直衝清道而上者宜參朮湯下大補陰丸吐利後胃虛寒者理中湯加附子丁香柿蒂吐利後胃虛熱者橘皮竹茹湯三因方云凡吐利後多作噦此由胃中虛膈上熱故噦或至八九聲相連收氣不回至於驚人者若傷寒久病得此甚惡內經所謂壞病者是也丹溪治趙立道年近五十質弱多怒暑月因飢後大怒得滯下病口渴自以冷水調生蜜飲之痢漸緩五七日後診脈稍大不數遂令止蜜水且以參朮調益元散與之痢亦漸收七八日後覺倦甚發厄知其因下久而陰虛也令守前藥然利尚未止又以煉蜜與之衆皆尤藥之未當欲用薑附曰補藥無速效附子非補陰者服之必死衆曰冷水飲多得無寒乎曰炎暑如此飲涼非寒勿多疑待以日數藥力到當自止又四日而厄止滯下亦安又治陳擇仁年近七十素厚味有久嗽病新秋患滯下食大減至五七日後厄作脈皆大豁衆以為難丹溪曰形瘦者尚可為以參朮湯下大補丸七日而安樓全善治其兄九月得滯下每夜五十餘行嘔逆食不下五六日後加厄逆與丁香一粒噙之立止但少時又至遂用黃連瀉心湯加竹茹飲之厄雖少止滯下未安若此者十餘日遂空心用御米殼些少澀其滑日間用參朮陳皮之類補其虛自服御米殼之後厄聲漸輕滯下亦收而安以上吐利後補虛例仲景云噦而腹滿視其前後知何部不利利之即愈大腸結燥脈沉數者調胃承氣湯大便不通噦數譫語小承氣湯丹溪治超越陳氏二十餘歲因飽後奔走數里患噦但食物則連噦百餘聲半日不止飲酒與湯則不作至晚發熱脈澀數以血入氣中治之用桃仁承氣湯加紅花煎服下汙血數次即減再用木香和中丸加丁香服之十日而愈右下例有實積者宜之又治一女子年逾笄性躁味厚炎月因大怒而厄作作則舉身跳動脈不可診神昏不知人問之乃知暴病視其形氣俱實遂以人參蘆二兩煎湯飲一碗大吐頑痰數碗大汗昏睡一日而安人參入手太陰補陰中之陽者也蘆則反是大瀉太陰之陽女子暴怒氣上肝主怒肺主氣經曰怒則氣逆因怒逆肝木乘火侮肺故厄大作而神昏參蘆善吐痰盡則氣降而火衰金氣復位胃氣得和而解右宣例痰鬱者宜之三因云噦而心下堅痞眩悸者膈間有痰水所為虛不禁吐者宜二陳湯導痰湯加薑汁竹瀝亦有汙血而噦者丹溪治超越陳氏用桃仁承氣湯是也虛不禁下者於蓄血門求輕劑用之仲景云噦逆者陳皮竹茹湯主之又云乾嘔噦若手足厥者陳皮湯主之本事方用枳殼五錢木香二錢半細末每服一錢白湯調下孫兆方用陳皮二兩去白水煎通口服或加枳殼一兩此皆破氣之劑氣逆者宜之唯陳皮竹茹湯氣逆而虛者宜之水寒相搏者小青龍湯寒甚加附子尖炒潔古柿錢散寶鑑丁香柿蒂散羌活附子湯皆熱劑唯寒厄宜之戴復庵以熱厄唯傷寒有之其他病發厄者皆屬寒用半夏一兩生薑一兩半水一碗煎半碗熱服或用丁香十粒柿蒂十個切碎白水一盞半煎或理中湯加枳殼茯苓各半錢半夏一錢不效更加丁香十粒亦有無病偶然致厄此緣氣逆而生重者或經一二日宜小半夏茯苓湯加枳實半夏湯或煎湯泡蘿蔔子研取汁調木香調氣散熱服逆氣用之最佳若胃中寒甚厄逆不已或復加以嘔吐輕劑不能取效宜丁香煮散及以附子粳米湯增炒川椒丁香每服各二三十粒李氏曰厄逆分不足有餘不足因內傷脾胃及大病後胃弱多面青肢冷便溏有餘因外感胃燥及大怒大飽多面紅肢熱便閉有餘可治不足者危不足者火炎陰虛火乃元氣之賊人之陰氣依胃氣而養胃土受傷則木氣侵之陰火所乘不得內守木挾相火直衝清道而上乃虛之極也膏粱濕熱者十味小柴胡湯吞單黃柏丸或調益元散胃火善食者小半夏湯加山梔黃芩吐之火盛者益元散加黃連黃柏自利更加參朮白芍藥陳皮久病滯下及婦人産後從臍下逆上夜分轉甚者皆屬陰虛四物湯加知柏陳皮竹茹貧苦大勞火動濁升清陷者補中益氣湯或合生脈散加黃柏附子少許挾房勞者瓊玉膏腎氣不歸元者九味安腎丸久病寒搏火極是危證脈數為火刑金必死凡傷寒吐下及雜病久每厄逆者皆火欲上行為胃中寒邪所遏故搏而有聲俱宜丁香柿蒂散羌活附子湯理中湯倍參久者三香散或木瓜根煎湯呷之中虛昏聵脈結者炙甘草湯救之有餘者飽食填塞胸中氣失升降二陳湯加枳殼砂仁痰閉於上火動於下無別證忽然發厄從胸中起者芩連二陳湯或只用陳皮半夏姜煎服或人參煎湯吐之停痰或因怒郁瘀熱者亦宜蓋參蘆瀉肺肺衰氣降而火土復位矣七情氣鬱者木香勻氣散用蘿蔔煎湯下蘇子降氣湯陽證失下地道不通因而潮熱發厄宜寒藥下之大柴胡湯陽極脈微將脫者宜涼膈散解毒湯養陰退陽不可大下汗吐下後胃熱未除小柴胡湯加橘皮竹茹或橘皮竹茹湯單瀉心湯平人食物太速飲水入肺喜笑太多亦屬有餘食厄笑厄以紙捻鼻嚏或久閉氣可止水嘔小陷胸湯小青龍湯去麻黃清之利之而已凡汗吐下服涼藥過多者當溫補脾胃陰火上衝者當平補挾熱者宜涼補局方率用丁附溫暖助火損不足而益有餘宜乎厄逆之必死也診法噦聲頻密相連者為實可治若半時噦一聲者為虛難治多死在旦夕或云病久脾胃衰敗而發厄逆額上出汗連聲不絶者最為惡候不治之證也脈法心脈小甚為噦肺脈散者不治脈浮而緩者易治弦急而按之不鼓者難治脈結或促或微皆可治脈代者危右關脈弦者木乘土位難治肺脈散者是心火刑于肺也不治治胃虛厄逆方橘皮竹茹湯治吐利後胃虛膈熱而厄逆者並治傷寒餘熱未解陳皮四錢去白竹茹人參各二錢甘草炙一錢上銼一服加生薑三片大棗一枚水煎服倍陳湯治胃虛厄逆有效陳皮四錢人參二錢甘草四分上銼水煎服橘皮半夏生薑湯治氣虛有痰發厄陳皮去白半夏湯泡七次乾生薑人參各一錢木通七分上銼水煎溫服六君子湯治痰挾氣虛發厄人參白朮茯苓陳皮半夏各一錢甘草炙五分上銼作一服加生薑三片大棗一枚新汲水煎服一方加竹茹名參朮竹茹湯十味小柴胡湯一名人參白朮湯治氣虛不足厄逆人參黃芩柴胡乾薑山梔各七分半白朮防風半夏甘草各五分五味子九粒上㕮咀作一服加生薑三片水煎服寶鑑炙甘草湯治許伯威中氣本弱病傷寒八九日醫見其熱甚以涼藥下之又食梨三枚冷傷脾胃四肢冷時發昏憒其脈動而中止有時自還乃結脈也心亦悸動厄逆不絶色變青黃精神減少目不欲開蜷臥惡人語以此藥治之甘草炙生薑桂枝人參生地黃減半阿膠麥門冬麻子仁大棗各等分上銼水煎服成無己云補可以去弱人參大棗之甘以補不足之氣桂枝生薑之辛以益正氣五臟痿弱榮衛涸竭濕劑所以潤之麻仁阿膠麥門冬地黃之甘潤經益血復脈通心也加以人參桂枝急扶正氣生地黃減半恐損陽氣銼一兩服之其證減半再服而安治胃寒厄逆方加味理中湯治吐利後胃中虛寒厄逆人參白朮乾薑炮甘草附子丁香柿蒂上銼水煎服溫中散一名丁香柿蒂散治吐利及病後胃中虛寒嘔逆至七八聲相連收氣不回者難治丁香柿蒂人參茯苓橘皮良薑半夏各一兩生薑一兩半甘草炙七錢半上銼每服三錢水煎乘熱頓服或用此藥調蘇合香丸服亦妙參附湯治陽氣虛寒自汗惡寒或手足逆冷大便自利或臍腹疼痛厄逆不食或汗多發痙等證人參一兩附子炮五錢上加薑棗水煎徐徐服去人參加黃耆名耆附湯丁香柿蒂散治諸種厄噫嘔逆痰涎丁香柿蒂青皮陳皮各一兩上為粗末每服三錢水一盞半煎七分溫服不拘時嚴氏柿蒂湯治胃膈痞悶厄逆不止柿蒂五錢丁香三錢上作一服加生薑五片水煎食遠熱服柿錢散治厄逆柿錢丁香人參各等分上為細末水煎食後服丁香散治厄逆噎汗丁香柿蒂各一錢良薑甘草炙各五分上為末每服二錢用熱湯點服不拘時丁香柿蒂竹茄湯治大病後中焦氣塞下焦厄逆丁香三粒柿蒂竹茹各三錢陳皮一錢上銼水煎服增半湯治胃虛中寒停痰留飲嘔吐厄逆半夏湯泡炒黃三錢藿香三錢人參丁香皮各一錢半上銼加生薑七片水煎服半夏生薑湯治厄逆欲死半夏湯泡六錢生薑五錢上銼作一服水煎去渣服不拘時橘皮乾薑湯治噦人參橘皮桂心乾薑通草甘草炙各一兩上㕮咀每服四錢水煎服茯苓半夏湯治水寒停胃發厄茯苓半夏厚朴薑汁炒陳皮柿蒂各一錢藿香八分茴香七分乾薑官桂丁香砂仁各五分沉香木香甘草各三分上銼一劑加生薑三片水煎服羌活附子散治吐利後胃寒厄逆羌活附子炮茴香炒各五錢乾薑炮木香各一兩上㕮咀每服二錢加棗半個鹽少許水煎服一方去木香用丁香三因方二香並用蓽澄茄散治噫氣厄逆亦治傷寒厄逆日夜不定蓽澄茄良薑各等分上為末每服二錢水煎沸投醋半盞呷之草豆蔻散治寒氣攻胃厄噫草豆蔻去皮益智仁各一兩乾柿蒂二兩上㕮咀每服三錢加生薑三片水煎熱服陳皮湯陳皮四兩生薑半斤上以水七升煮取三升溫服一升下咽即愈小青龍湯治水寒相搏發厄麻黃芍藥乾薑炙甘草細辛桂枝各三兩五味子半夏湯洗各半升上八味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去渣溫服一升本事方治陰毒厄逆川烏頭乾薑炮附子炮肉桂芍藥甘草炙半夏吳茱萸陳皮大黃各等分上為細末每服一錢姜五片煎去濁渣熱服此三陰經藥也丁香散治心煩厄噫丁香白豆蔻各半兩伏龍肝一兩上為末煎桃仁吳茱萸湯調下一錢三香散治胃冷厄逆經久不利沉香紫蘇白豆蔻各等分上為細末每服五七分柿蒂煎湯調下桂苓白朮丸治厄逆止咳嗽散痞滿通壅塞開堅結痛悶進飲食調和五臟辣桂乾薑各二錢半茯苓半夏湯泡各一兩白朮陳皮去白澤瀉各半兩上為細末麵糊丸如小豆大每服二三十丸生薑湯下日三服病在上食後服病在下食前服病在中不拘時一方加黃柏黃連各半兩水丸服厄逆丸花椒微炒出汗去目為末醋糊丸如桐子大每服十五丸醋湯下雄黃酒雄黃一錢酒一盞煎七分急令患人嗅其熱氣即止硫黃嗅法治厄逆服藥無效者硫黃乳香各一錢半上用酒一盞煎七分急令患人嗅其熱氣即止治氣滯厄逆方小半夏茯苓湯治別無他證偶爾致厄此緣氣逆所生半夏茯苓生薑加枳殼上銼水煎服木香調氣散治中焦厄逆木香檀香白豆蔻仁丁香各三錢砂仁四錢藿香甘草炙各五錢上為末每服二錢鹽湯調下香殼散枳殼五錢木香二錢半上為細末每服一錢白湯調下未可再與陳皮湯治諸厄噫陳皮二兩湯浸去白銼以水一升煎五合通口服頃刻更加枳殼一兩去穰炒同煎之一方治久患厄噫連一二十聲者取生薑汁半合蜜一匙煎令熱溫服如此三服立效治痰火厄逆方芩連二陳湯治痰閉於上火動於下忽然發厄從胸中起者陳皮半夏茯苓甘草黃芩黃連上加生薑水煎服黃連竹茹湯治胃中痰火發厄黃連竹茹麥冬去心山梔半夏薑汁炒陳皮各一錢蘇子八分砂仁沉香木香茴香各五分甘草二分上銼一劑加生薑一片烏梅一個水煎磨沉香木香調服加味小柴胡湯治身熱煩渴發厄柴胡黃芩山梔柿蒂陳皮砂仁半夏薑汁炒竹茹各一錢藿香八分茴香五分沉香木香甘草各三分上銼一劑加生薑一片烏梅一個水煎服一方治痰厄陳皮去白半夏湯泡各二分上銼加生薑煎服一方治痰火厄逆黃連黃柏滑石上銼水煎服益元散亦可用治陰火厄逆方大補陰丸降陰火益腎水黃柏鹽酒拌新瓦上炒褐色知母去皮酒拌濕炒各四兩熟地黃酒洗焙乾敗龜板酥炙黃各六兩上為細末豬脊髓加煉蜜為丸如桐子大每服五十丸空心姜鹽湯下大補丸治腎經火燥下焦濕黃柏酒炒褐色上為末水丸隨證用藥送下附灸法灸厄逆法乳根二穴直乳下一寸六分婦人在乳房下起肉處陷中灸七壯即止其效如神一云婦人屈乳頭向下盡處骨間是穴丈夫及乳小者以一指為率男左女右與乳正直下一指陷中動脈處是穴艾炷如小豆大許灸三壯一法男左女右乳下黑盡處一韭葉許灸三壯甚者二七壯又法氣海一穴直臍下一寸半灸三七壯立止一法於臍下關元穴灸七壯立愈
