今所用小曲子治折傷外敷方乳香消毒散治一切傷折蹉跌焮腫疼痛不可忍者乳香沒藥各另研白蘞白芍藥各一兩白芥子當歸血竭另研各半兩黃柏滑石各二兩黃丹三錢上為細末每用新汲水調如稠攤在紙花上貼患處陳王丹不問刀箭出血木石損傷敷之如神且免破傷風證大黃一兩石灰六兩上二味同炒灰紫色為度出火毒篩過敷傷處立效一方加小兒發灰乳香沒藥蒲黃各少許為末用未開眼老鼠子和藥搗爛陰乾為末小曲散治跌撲損傷小麥曲鍋煤各五分狗頭骨乳香五倍子各一分上為末用熱酒調敷痛處不可敷破處傷重者再加天靈蓋煅過少許尤妙皮破傷爛者只用鳳尾草一味搗爛敷之或以此草煎湯洗亦好此草在池邊井邊尋拔毒定痛膏治一切從高墜下及傷折筋骨瘀血結痛癰腫熱毒花蕊石一兩羌活乳香另研沒藥另研烏頭大黃各五錢米粉四兩蔥白細切一兩上為細末先將蔥粉同炒黑色杵為細末入前藥末每用看多少或醋或水調敷患處用水頻潤至聖黑龍膏治一切筋骨損傷疼痛米粉四兩於銀器內炒成塊子褐色放冷研為細末乳香沒藥各半兩上研極細末每用好酒或醋調如膏攤在紙花上貼患處一方治跌撲損傷及金刃所傷此藥止血散痛消腫風化石灰重羅過半兩五月五日以韭汁和陰乾海螵蛸老松香血竭輕粉乳香沒藥黃丹飛過無名異去土松白脂各半兩上為極細末濕者干撒干則水調或蜜調敷患處烏金散治打撲損傷敷藥小黃米粉四兩蔥白細切一兩上二味同於砂鍋炒至黑色杵為細末用好醋調或膏子攤在紙上貼於傷損處後用杉布皮或板以紙包裹四面四片用絹袋札縛不可搖動一二日一換內服前接骨藥一方治打撲傷損腫痛蔥白砂糖各等分上二味爛研敷之痛立止且無瘢痕一方單用蔥頭切爛炒焦搭患處冷則再易止痛消腫散瘀有神效走馬散治折傷接骨柏葉生用荷葉生皂角生骨碎補去毛各等分上為末先將折傷處揣定令入原位以薑汁調藥如糊攤在紙上貼骨斷處用杉木片子夾定以繩縛之莫令轉動三五日後開看以溫蔥湯洗之後再貼藥復夾七日如痛再加沒藥接骨丹天南星木鱉子各四個官桂一兩沒藥乳香各半兩上為細末生薑一片去皮研爛取自然汁入米醋少許白麵為糊同調攤紙上貼傷處以帛縛之用篦夾定麻索子纏接骨效方山梔子生為末五分飛羅面三錢上用薑汁調和擦患處一日夜青肉青黑是其驗也一方治跌撲傷損逆氣作腫痛不可忍者用梔子白麵為末井水調擦干則掃水即效淋洗頑荊散治從高失墜及一切傷折筋骨瘀血結痛頑荊葉二兩半蔓荊子白芷細辛去苗防風川芎桂心丁皮羌活各一兩上為末每用一兩鹽半匙蔥白連根五莖漿水五升煎七沸去渣通手淋泄痛處冷即再換宜避風洗藥治傷重者用此淋洗然後服藥荊芥土當歸生蔥切斷一方加生薑上煎湯溫洗或只用蔥煎湯洗亦可黑龍散治跌撲傷損筋骨碎斷土當歸二兩丁香皮百草霜川山甲炒黃各六兩枇杷葉去毛半兩一雲山枇杷葉上焙為細末先用煎湯淋洗後以薑汁水調或研地黃汁調以紙攤貼若骨折更以薄木板片夾貼以小繩束三日勿去夾板恐搖動患處至骨堅牢方去若被刀箭蟲傷成瘡並用薑汁和水調貼以風流散填塗接骨丹當歸七錢川芎骨碎補沒藥各五錢乳香二錢半川烏煨四錢廣木香一錢古錢三錢火煅酒淬七次黃香六兩香油一兩五錢上先將各藥為末和油成膏用油紙攤貼患處如骨碎筋骨用此復續如初接指方亦治刀矢所傷者真蘇木上為末敷斷指間接定外用蠶繭包縛完固數日如故消毒定痛散治跌撲腫痛無名異炒木耳炒大黃炒各五分上為末蜜水調服如內有瘀血砭去敷之若腐處更用當歸膏敷之尤好洪寶丹治傷損焮痛並接斷天花粉三錢薑黃白芷赤芍藥各一兩上為末茶湯調擦患處回陽玉龍膏治跌撲所傷為敷涼藥或人元氣虛寒腫不消散或不潰斂及癰腫堅硬肉色不變久而不潰潰而不斂或筋攣骨痛一切冷證並效南星煨良薑炒白芷赤芍藥炒各一兩肉桂五錢川烏二錢上為細末蔥湯調塗熱酒亦可一方治打損傷南星白芷半夏白及黃柏皮赤小豆各等分上為細末薑汁調敷患處蜜糖亦好二生膏治跌打傷筋損骨疼痛不可忍生地黃姜酒炒一斤生薑四兩藏瓜姜糟一斤上搗爛同炒勻乘熱以布裹罨傷處冷則易之先能止痛後整骨大有神效昔有人傷折宜用生龜尋捕一龜將殺患人忽夢見龜告曰勿相害吾有奇方可療於夢中授此方神效一方治打撲傷損及一切腫癰未破令內消生地黃研如泥木香為細末上以地黃膏隨腫大小攤於紙上撒木香末一層又再攤地黃膏貼腫上不過三五度即愈昔許元公入京師赴省試過橋墜馬右臂臼脫路人語其僕曰急與捼入臼中若血漬臼則難治矣僕用其說許以昏迷不覺痛遂僦轎舁歸邸或曰非録事巷田馬騎不能了此疾急召之至已日暮因秉燭視其面曰尚可治乃施藥封此處至中夜方蘇達旦痛止其封損處已白其青瘀乃移在臼上自是日日易之腫直至肩背以藥下之瀉黑血三升五日復常遂得赴試蓋用此法云將軍膏治傷損腫痛不消瘀血流注紫黑或傷眼上青黑大黃為末生薑汁調敷患處守田膏治打撲有傷瘀血流注半夏為末調敷傷處一宿不見痕跡豆粉膏治打撲傷折手足緑豆粉於新鐵鍋內炒令紫色用新汲井水調稀厚敷損處以紙將杉木片縛定立效赤石脂散治諸般打撲傷損皮破血出痛不可忍者赤石脂研細敷之效一方治折傷市上尋乞兒破鞋底一隻燒灰羅過以面等分入好醋調勻成糊敷在患處以絹束之仍以竹片夾住須臾痛止骨節有聲可聞大有效也經驗方治打撲損筋傷骨疼痛或瘀血作痛黃柏一兩半夏半兩上為細末每用半兩生薑自然汁調如稀糊攤紙花上貼用如干再敷骨折先以絹帛封縛次用杉木札定良久痛止即癢覺熱乃是血活一方用生薑自然汁米醋牛皮膠同熬溶人馬屁勃末不拘多少調如膏以紙攤敷腫處一方治打傷殺一新黑羊皮熱敷患處良佳金絲膏治打撲傷損閃朒疼痛風濕氣痛當歸川芎蒼朮香白芷赤芍藥木鱉子大黃草烏頭各半兩香油四兩瀝青半斤松香半斤乳香沒藥各二錢半另研上前八味同香油熬去渣後入瀝青松香看熬軟硬冬軟些夏硬些再入乳香沒藥攤膏用之立應金絲膏當歸尾香白芷杏仁草烏生銼用豬牙皂角不蛀者去皮各三錢蔥連須葉肥者十莖白膠香三錢瀝青明者八兩黃蠟一兩乳香沒藥各另研半兩青油七兩上將前項六味入青油內依法熬濾去渣入白膠香瀝青溶化攪勻入黃蠟又攪待冷入沒藥末攪勻攤用萬金膏治癰疽及墜撲損傷或筋骨疼痛龍骨鱉甲苦參烏賊魚骨黃柏黃芩黃連豬牙皂角白及白蘞厚朴木鱉子去殼草烏川芎當歸白芷各一兩槐枝柳枝各四寸長二十一枚黃丹一斤乳香沒藥各半兩另研青油四斤上除乳沒黃丹外諸藥入油內煎至黑色去之稱淨油每斤入黃丹半斤不住手攪令黑色滴水中不黏手下乳沒再攪如硬入油些少以不黏手為度白膏藥治跌打或刀斧所傷候血盡用蔥白花椒煎水將患處洗淨拭乾敷藥不必包裹其效如神白及一兩豬脂油六兩藝香樟腦各四兩輕粉乳香沒藥孩兒茶各二錢片腦五分上各為末將油用銅鍋化開先下白及次下藝香樟腦兒茶一二時取出離火方下乳香等藥候冷又下片腦輕粉此方不但生肌凡瘡毒皆可貼之膏成用瓷罐盛之每用油紙攤貼患處
