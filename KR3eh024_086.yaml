body:
  text: 卷八十六折傷論袖珍論曰折傷者謂有所傷於身體者也或為刀斧所傷或墜墮險地打撲身體皆能使血出不止又恐瘀血停積於臟腑結而不散去之不早恐有入腹攻心之患治療之法須外用敷貼之藥散其血止其痛內則用花蕊石散之類化利瘀血然後款款調理生肌或因折傷而停郁其氣又當順之發明云夫從高墜下惡血留於內不分十二經絡內經俱作風中肝經留於脅下以中風療之皆肝經之所主蓋惡血必歸於肝留於脅下肝主血故也痛甚則必自汗但人汗出皆為風證從高墜下逆其所行之血氣宜以破血行經藥治之劉宗厚曰打撲金刀傷損是不因氣動而病生於外外受有形之物所傷乃血肉筋骨受病非如六淫七情為病有在氣在血之分也所以損傷一證皆從血論但須分其有瘀血停積亡血過多之證蓋打撲墜墮皮不破而內損者必有瘀血若金刀傷皮出血或亡血過多二者不可同法而治有瘀血者宜攻利之若亡血者兼補而行之又察其所傷有上下輕重淺深之異經絡血氣多少之殊惟宜先逐瘀血通經絡和血止痛然後調氣養血補益胃氣無不效也丹溪云跌撲損傷用蘇木以活血黃連以降火白朮以和中童便煎尤妙在下者可先須補托後下瘀血在上者宜飲韭汁或和粥吃切不可飲冷水血見寒則凝但一絲血入心即死腹痛者有瘀血桃仁承氣湯加蘇木紅花下之治損傷妙在補氣血俗工不知惟在速效多用自然銅以接骨此藥必煅方可服新出火者其火毒與金毒相扇挾香熱藥毒雖有接骨之功其燥散之禍甚於刀劍戒之葉氏曰損傷之證有跌僕之損有打撲之損有金刀之傷有木石之傷其為損傷一也但損有輕重之異傷有淺深之殊損則必有瘀血停滯即當攻下傷即外見皮破血出隨用止養此一定之法今丹溪先生先以托補之藥只恐血遇補而益盛反加喘急雖欲下瘀不可得已惟當施之於元虛損輕者之為宜也專科者當究心焉龔氏曰大凡打撲傷損墜墮或刀斧所傷皮未破而內損者必有瘀血停積先宜逐去瘀血然後和血止痛若肌血破而亡血過多者宜調氣養血補脾胃為主李氏曰折傷有損身體或墜跌打撲倒壓閃挫氣血鬱逆而皮不破或金刀傷皮出血外損筋骨者可治內損臟腑里膜及破陰子耳後者不治未出血者宜蘇木去瘀黃連降火白朮和中三味用童便入酒煎服在上者宜韭汁和粥吃在下者可下血冷則凝不可飲冷水引血入心即死消瘀雞鳴散花蕊石散順氣木香勻氣散加童便紅曲或紅酒已出血者急用陳王丹止血先服補托藥而後消瘀虛甚者亦不敢下血虛者四物湯加川山甲氣虛者用蘇木參耆當歸陳皮甘草服半月脈散漸收方敢以煎藥調下自然銅末一味空心服之如骨不碎折者忌用素虛損甚者紫河車丹去麝香但損傷妙在補氣血或破寒冷者先宜起寒折傷專主血論非如六淫七情有在氣在血之分然肝主血不問何經所傷惡血必歸於肝流於脅鬱於腹而作脹痛或增寒熱實者下之虛者當歸鬚散復元活血湯調之或十全大補湯加香附陳皮貝母等分水煎服凡損傷瘡口忽干毒攻腹內恍惚煩悶嘔吐及已出血多而又嘔血不止者難治初起嘔吐者用平胃散為末內服外用薑汁調敷破傷風浮腫者亦宜初起吐血用蘇木煎湯調古烏附湯或古蚌霜散如惡血入腸胃下血濁如瘀血者用百草霜為末酒調服如傷外腎小便出血不通者五苓散敷藥單糯米膏小曲散定痛乳香定痛散夾骨法折傷後為四氣所侵手足疼痛者應痛丸接骨須經絡穴法骨髓明透而又有傳授故古以危氏為善接骨紫金丹接骨丹脈法脈經云打撲傷損出血過多脈當虛細若得急疾大數風熱乘之必死從高顛仆內有瘀血腹脹脈堅強者生小弱者死破傷有瘀血在內脈堅強實則生虛小弱者死若亡血過多脈細小者生浮大數實者死皆為脈病不相應故也李氏曰如命門脈和緩關脈實者縱傷重不死命門虛促而脫者雖傷淺難治凡血未出者脈宜洪大已出者脈忌洪大此折傷脈要也治折傷行瘀方當歸導滯散治跌撲損傷瘀血凝滯不行等證大黃當歸在上用頭在中用身在下用尾遍身痛者全用酒浸洗焙乾上二味各等分細切每服一兩酒煎服當歸導滯散聖惠方治落馬墜車打撲傷損瘀血大便不通浮腫疼痛昏悶蓄血內壅欲死大黃一兩當歸三錢麝香少許另研上為末每服三錢熱酒調下食前服如內瘀已去還有骨節傷折痛不可忍以定痛接骨紫金丹治之雞鳴散治從高墜下及木石所壓一切損傷瘀血凝積痛不可忍並以此推陳致新大黃酒蒸一兩當歸尾五錢桃仁去皮尖七個上為末用酒一碗煎七分去渣五更雞鳴時服至曉取下惡血即愈若氣絶不能言者急以熱小便灌之即蘇一方用杏仁二十一粒去皮尖不用桃仁蓋痛乃血入氣分改為杏仁以行氣中之血也通導散治撲跌傷損極重大小便不通乃瘀血不散肚腹膨脹上攻心腹悶亂至死者先服此藥打下死血瘀血然後方可服補損藥大黃芒硝枳殼各二錢厚朴當歸陳皮木通紅花蘇木各一錢甘草五分上銼一劑水煎服以利為度量人虛實用孕婦小兒勿服桃仁承氣湯治傷損瘀血停滯腹痛發熱或發狂桃仁芒硝甘草各一錢大黃二錢上銼一劑水二鍾煎一鍾空心服一方加桂枝一錢加當歸名歸承湯或加當歸紅花蘇木加味承氣湯治瘀血內停胸腹脹痛或大小便不通等證大黃朴硝各二錢枳實厚朴當歸紅花各一錢甘草五分上銼用水酒各一鍾煎至一鍾服仍量虛實加減病急不用甘草調經散治跌撲損傷疏利後用此藥調理當歸川芎芍藥黃耆各一錢半青皮陳皮烏藥熟地黃乳香另研茴香各等分上銼作一服水煎食遠服奪命散治刀刃所傷及從高墜下木石壓損瘀血凝積心腹疼痛大小便不通大黃黑牽牛各二兩紅蛭用石灰慢火炒令乾黃色半兩上為末每服二錢用煎酒調下約行四五里再用熱酒調牽牛末二錢催之須下惡血成塊以盡為度花蕊石散治一切金刃所傷打撲傷損身體出血者急於傷處撒藥其血自化為黃水如有內損血入臟腑熱煎童子小便入酒少許調一錢服之立效若牛抵腸出不損者急送入用細絲桑白皮尖茸為線縫合肚皮縫上撒藥血止立活如無桑白皮用生麻緌亦得並不得封裹瘡口恐作膿血如瘡干以津液潤之然後撒藥婦人産後敗血不盡惡血攻心胎死腹中胎衣不下並用童子小便調下硫黃上色明淨者四兩搗為粗末花蕊石一兩搗為粗末上二味相拌和勻先用紙筋和鹽泥固濟瓦罐子一個候泥干入藥於內再用泥封口候乾安在四方磚石上書八卦五行字用炭一稱籠疊周匝自己午時從下著火令漸漸上徹直至經宿火冷炭消又放經宿罐冷取出細研以細絹羅子羅極細瓷盆內盛依前法服通血散治打撲傷損血汙入心下之立愈當歸尾枳殼炒木通澤蘭大黃桃仁蘇木紅花各三錢上為細末每服二錢好酒調下重者童便合酒下或滴水為丸亦可加味芎歸湯治打撲傷損敗血流入胃脘嘔吐黑血如豆汁當歸川芎白芍藥荊芥穗百合水浸半日各等分上銼每服四五錢重者一兩水一鍾酒半鍾同煎七分服紫金散治打撲折傷內損肺肝嘔血不止或有瘀血停積於內心腹脹悶紫金藤皮二兩降真香續斷補骨脂無名異煅細酒淬七次琥珀另研蒲黃牛膝酒浸當歸洗焙桃仁去皮尖各一兩大黃濕紙裹煨朴硝另研各一兩半上為末每服二錢濃煎蘇木當歸酒調下並進三服利即安桃仁湯治從高墜下落大木車馬間胸腹中有血不得氣息桃仁十四枚大黃朴硝甘草各一兩蒲黃一兩半大棗二十枚上㕮咀以水三升煮取一升絞去渣溫服盡當下如下不止漬麻汁一杯飲之即止又方治腕折瘀血桃仁四十枚亂髮一撮燒灰大黃如指節大一塊上㕮咀以酒三升煮取一升盡服血盡出又方桃仁六十枚大黃六兩桂心二兩上㕮咀以酒六升煮取三升分三服當下血瘥蒲黃散治從高墜下有瘀血蒲黃八兩附子一兩上為末酒服方寸匕日三服又方治腕折瘀血蒲黃一升當歸二兩上為末酒調服方寸匕一方治被打傷破腹中有瘀血蒲黃一升當歸桂心各二兩上為末酒服方寸匕日三夜一塞上方治墜傷撲損瘀血在內煩悶蒲黃微炒上為末每服三錢空心熱酒調服水仙散治打撲墜損惡血攻心悶亂疼痛未展荷葉陰乾上為末每服三錢食前以童子小便一小盞調服以利下惡物為度一方以大幹荷葉五片燒令煙盡細研食前以童子熱小便一小盞調下三錢匕日三服巴戟湯治從高墜下及打撲內損昏暈嗜臥不能飲食此謂血閉臟腑不通巴戟去心大黃各半兩當歸地黃芍藥川芎各一兩上為末水煎服以利為度破血消痛湯治乘馬損傷跌其脊骨惡血流於脅下其痛苦楚不能轉側妨於飲食羌活防風官桂各一錢當歸梢柴胡連翹各二錢蘇木一錢半水蛭燒煙盡另研五分麝香少許另研上為粗末作一服酒二大盞水一盞煎余藥至一大盞去火稍熱調水蛭麝香二味服之兩服立愈復元活血湯治從高墜下惡血流於脅下疼痛不可忍大黃酒浸三錢柴胡一錢半天花粉當歸川山甲各一錢紅花甘草各七分桃仁去皮尖研如泥十五個上㕮咀水一盞酒半盞煎至八分服一利為度當歸鬚散治打撲以致氣凝血結胸腹脅痛或寒熱歸尾一錢半紅花八分桃仁七分赤芍藥烏藥香附蘇木各一錢官桂六分甘草五分上銼水酒各半煎空心服如挫閃氣血不順腰脅痛者加青皮木香脅痛加柴胡川芎桃奴飲子治男子墜馬跌撲損傷以致瘀血停積欲成血蠱及治婦人室女月經不通漸成腫滿等證桃奴桃樹上嫩桃干朽不落者冬月及正月收取豭鼠糞即雄鼠糞也兩頭尖者是元胡索肉桂香附米五靈脂以上各炒砂仁桃仁去皮尖另研各等分上為細末每服三錢空心溫酒調下東垣地龍散治打撲傷損從高墜下惡血在太陽經中令人腰脊或脛腨臂痛股中痛不可忍中桂地龍各四分桃仁六個羌活二錢獨活黃柏各一錢麻黃五分當歸一分蘇木六分甘草一錢上㕮咀每服五錢水煎服茴香酒治打墜肢體凝滯瘀血腰脅疼痛破故紙炒茴香炒辣桂各一錢上為末每服二錢食前熱酒調服蕓薹散治從高墮下墜損惡血在骨節間疼痛荊芥藕節陰乾各二兩蕓薹子川芒硝馬齒莧各一兩陰乾上為細末用蘇木半兩酒一大盞煎至七分調下二錢不拘時服生鐵酒治被打瘀血在骨節下出者生鐵一斤酒五升上煎取一升飲之一方療因傷損血瘀不散者牡丹皮八分虻蟲二十一枚煅過上同搗為末每用溫酒和服方寸匕血當化為水下丹溪方治因上山惡血瘀入內損傷食少脈弦此須用活血和氣川芎三錢青皮二錢芍藥滑石炙甘草各一錢牡丹皮五分桃仁七枚另研上銼作一帖水煎服一方治搕撲損肌膚青腫茄子種通黃極大者切作片如一指厚新瓦上焙乾上為末臨臥酒調方寸匕一夜消盡無痕蚌霜散治傷損大吐血或因酒食飽低頭掬損吐血過多並血妄行口鼻俱出但聲未失者皆效蚌粉百草霜各等分上為末每服一二錢糯米飲調服側柏枝研汁尤效如舌衄及灸瘡出血並用干撒立止烏附湯治跌撲吐衄不止又能調中快氣治心腹刺痛烏藥一錢香附二錢甘草三分上為末淡醋湯調服黑神散治跌撲損傷惡血流入腸胃下血濁如瘀血百草霜研上用酒調下治折傷定痛方乳香定痛散治打撲傷損落馬墜車一切疼痛乳香沒藥川芎白芷赤芍藥牡丹皮生地黃甘草各等分上為細末每服二錢溫酒並童子小便調服不拘時一方有當歸名利血止痛散乳香定痛散治打撲墜墮傷損一切疼痛乳香當歸白朮各二錢白芷沒藥羌活