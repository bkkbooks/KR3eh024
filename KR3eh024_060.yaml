body:
  text: 卷六十衄血論陳無擇曰衄者因傷風寒暑濕流傳經絡湧泄於清氣道中而致者皆外所因積怒傷肝積憂傷肺煩思傷脾失志傷腎暴喜傷心皆能動血隨氣上溢而致者屬內所因飲酒過多啖炙煿辛熱或墜墮車馬傷損致者此非內外因也原病式曰衄者陽熱怫鬱干於足陽明而上熱則血妄行而鼻衄也東垣曰衄血出於肺以犀角升麻梔子黃芩芍藥生地紫參丹參阿膠之類主之丹溪云衄血涼血行血為主大抵與吐血同犀角地黃湯加鬱金戴氏曰鼻通於腦血上溢於腦所以從鼻而出治宜茅花湯調止衄散服之有頭風自衄頭風才發則衄不止宜治頭風兼止衄之劑有因虛致衄此為下虛上盛不宜過用涼劑宜四物湯加參耆沉香磨服傷濕而衄腎著湯加川芎伏暑而衄宜茅花湯調五苓散上膈極熱而衄犀角地黃湯加黃芩茅花荊芥虛者茯苓補心湯飲酒過多而衄茅花湯加川芎乾葛病衄愈後血因舊路一月或三四衄又有洗面而衄日以為常四物湯加阿膠蒲黃仍佐以蘇子降氣湯使血隨氣下葉氏曰風行水動氣行血流治衄者只知血藥以治衄而不知降氣則血歸經古人所以血藥中必加氣藥一二味如蘇子降氣湯是也李氏曰凡初衄不可遽止去多恐暈急用百草霜末三錢水調服仍取一捻吹鼻中或用人中白末湯調服更加發灰一錢麝一字仍用少許搐鼻立止或將患人頭髮分開井水濕紙頂上搭之亦好如鼻乾燥以麻油點入潤之如吐衄太甚不止防其血暈用茅根燒煙將醋灑之令鼻吸氣以遏其勢或驀然以水噴面使帶驚則止此法非特衄血雖上吐下便九竅出血者亦效止後隨證虛實調之用涼血散火藥不效者氣鬱血無藏也古莎芎散天門冬膏蔭按夫口出血曰吐鼻出血曰衄火逆於中血隨火上有此二證然吐血責之府衄血責之經求其實則皆炎上之火也犀角地黃湯主之火者心之所司故用生犀生地以涼心而去其熱心者肝之所生故用丹皮芍藥以平肝而瀉其母此窮源之治也今人治吐血者以涼水濯其兩足此釜底抽薪之意也治衄血者以涼水拊其後頸此責其火於太陽經也皆是良法脈法脈經曰脈來輕輕在肌肉尺中自浮目睛暈黃衄血未止太陽脈大而浮必吐衄血病人面無血色無寒熱脈沉弦者衄也難經曰病若吐血復鼽衄脈當沉細實大反浮大而牢者死汗出若衄其脈滑小者生大燥者死東垣曰衄血者若但頭汗出身無汗及汗出不至足者死治方犀角地黃湯治衄血及吐血不止易老云此藥為最勝生犀角鎊生地黃赤芍藥牡丹皮各一錢上㕮咀作一服水煎溫服無犀角以升麻代之止衄散治飢困勞役動其虛火致衄不止黃耆二錢赤茯苓白芍藥當歸酒洗生地黃阿膠炒各一錢半上銼水煎服或為細末每服三錢用茅花五錢煎湯調下茜根散治陰虛衄血茜根阿膠蛤粉炒黃芩側柏葉生地黃各一兩酒炒甘草半兩上銼每服四錢加薑三片水煎服不拘時河間生地黃散諸見血無外寒衄血下血吐血溺血皆屬於熱但血家證皆宜服此藥生地黃熟地黃枸杞子地骨皮天冬黃耆芍藥黃芩甘草各等分上銼每服一兩水一盞半煎至一盞去柤溫服如脈微身涼要加桂半錢吐血者多有此證黃芩芍藥湯治陰火載血上行衄而不止黃芩炒芍藥酒炒甘草各三錢上銼水煎服生地黃湯治上熱衄血生地黃阿膠炒各一兩川芎桔梗蒲黃甘草生用各五錢上㕮咀每服八錢水煎入生薑汁二匙溫服生地黃湯治榮中有熱及肺壅鼻衄生瘡一切丹毒生地黃赤芍藥當歸川芎各等分上㕮咀每服八錢水煎服若鼻衄加蒲黃生瘡加黃芩丹毒加防風川芎三黃散治實熱衄血大黃濕紙裹煨川芎黃連黃芩各等分上為末每服二錢井水調下食後服黃連散治大人小兒盛熱乘於血血隨熱氣散於鼻者謂之鼻衄凡血得寒則凝澀結聚得熱則流散妄行黃連黃芩柏葉甘草各等分豆豉三十五粒上㕮咀每服一兩水煎食後服丹溪方治鼻衄脈數有熱人參三分黃柏甘草各二分生地黃芍藥各一錢當歸黃連黃芩各五分上銼水煎服生料雞蘇散鼻衄血者初出多不能止乃肺金受相火所制然也宜此方治之雞蘇葉黃耆生地酒洗阿膠白茅根各一兩麥冬去心桔梗蒲黃炒貝母去心甘草炙各五錢上㕮咀每服四錢加生薑三片水煎服茜梅丸治衄血無時茜草根艾葉各一兩烏梅肉炒乾半兩上為末煉蜜丸如桐子大每服三十丸烏梅湯下麥門冬散治鼻衄不止白芍藥蒲黃麥冬各二錢生地黃三錢生薑一錢上㕮咀入蜜一合水一鍾半煎八分分作二服清肺飲治衄血久不愈以三稜針於氣衝上出血立愈更服此藥尤妙五味子十粒麥冬人參當歸身生地黃各五分酒洗黃耆一錢上㕮咀作一服水煎食後溫服人參飲子治暑月衄血人參黃耆各一錢半麥冬當歸甘草白芍藥各一錢五味子九粒上㕮咀作一服水煎溫服蔭按經曰必先歲氣無伐天和故時當暑月則肺金受克令人乏氣之時也理宜清金益氣清金故用麥冬五味益氣故用甘草參耆芍藥之酸所以收其陰當歸之辛所以歸其血此亦虛火可補之例也解鬱湯柴胡黃連黃芩黃耆地骨皮生地黃熟地酒蒸赤芍藥各等分上銼每服一兩水煎服地黃散治衄血往來久不愈甚效生地酒炒熟地酒蒸枸杞子地骨皮各等分上為末每服二錢蜜湯調下日三服麥門冬飲子治衄血不止麥冬去心生地黃各等分薑酒炒上銼每服一兩水煎服天地膠一名辟穀丹治吐衄諸藥不止亦治咳血天冬一斤熟地黃半斤上為末煉蜜丸如彈子大每服三丸溫酒下或湯下日三服莎芎散一名芎附飲衄血用涼血散火藥不效者氣鬱血無藏也此方主之香附四兩川芎二兩上為末每服二錢茶清調蔭按香附開鬱行氣使邪火散於經絡川芎和血通肝使血歸於肝臟血歸火散其血立止生地黃湯治鼻衄昏迷不醒用生地黃三五斤取汁服之仍以渣塞鼻中須臾即止白及散治鼻衄不止用白及不拘多少為末冷水調貼鼻竅下寸金散治鼻衄不止土馬鬃即牆上舊草甘草各二錢黃藥子半兩上為末每服二錢新汲水調下不止再服麝香散治鼻衄不止白礬枯過另研白龍骨黏舌者另研各五錢麝香五分上三味拌勻每用一字先將冷水洗淨鼻內血涕然後吹藥於鼻中或以濕紙捻點藥塞鼻內尤妙龍骨散治鼻衄過多用白龍骨不拘多少研為末用少許吹入鼻中凡九竅出血皆可用此藥吹之山梔散治鼻衄不止用山梔子不拘多少燒為末少許吹入鼻中榴花散衄血不止用百葉石榴花曬乾為末吹入鼻中立止血餘散治吐血衄血頭髮燒灰存性為末米飲調下二錢衄血者以少許吹入鼻中伏龍肝飲治衄血伏龍肝即灶下對月焦土取半升以新汲水一碗淘取汁和頓服人中白散治衄血不止人中白新瓦上焙乾溫湯調下三錢即止尉法治衄血用大紙一張作八褶冷水浸濕置頭頂心以熱尉斗尉之良久立止
