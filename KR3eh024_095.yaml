度後用石膏五倍子為末收瘡口辰砂梃子治痔漏等瘡人言一錢白礬二錢密陀僧辰砂各五錢上件先研人言細鋪鍋底次用礬鋪人言上枯煙盡為度次將密陀僧辰砂研細白糕和作尖梃如小麥大每用一粒頑漏納瘡口上去敗肉盡後貼生肌散生肌散寒水石煅輕粉各一錢龍骨煅五錢干胭脂三分上研為細末干貼瘡嫩寒水石干胭脂加龍腦瘡老止依方代針膏巴豆五錢去殼枳殼大者二個去穰上將豆裝在枳殼內綿縛罐內盛醋煮乾枳豆研細用絲綿蘸濕展藥敷瘡根上去痔不用止用生肌散如頑漏日久不可用津調代針膏敷瘡頭尖敗肉自去白銀錠子治漏止有一孔者用此藥不過十日全愈又不作痛神效白砒三兩白礬一兩上二味共研為細末鐵勺內溶成餅再入炭火煅令煙淨取出去火毒為末用麵糊和為錠子成條插入漏內直透里痛處為止每一日上三次至七日為止至九日瘡結痂而愈如漏未痊後用生肌藥生肌散乳香沒藥輕粉海螵蛸用三黃湯煮過寒水石煅龍骨煅各等分上為細末撒患處止用太平膏太平膏防風荊芥梔子連翹黃芩大黃羌活獨活當歸生地赤芍藥甘草金銀花五倍子兩頭尖頭髮各二錢白及白斂山慈菰各一兩香油一斤上銼碎入油內浸一晝夜用文火熬焦去渣滓再熬滴水不散入上好黃丹水飛過炒黑用半斤入內再熬滴水成珠為度待溫冷再入乳香沒藥輕粉血竭各二錢為末於內攪勻如藥色嫩再入官粉五錢亦佳務要看其火色不老不嫩得所為妙治痔瘡方用大雄雞一隻罩地板上卻不與食伺飢甚別移乾淨地上用豬胰子四兩銼碎旋餵雞令其撒糞旋收之如此兩三日候雞糞積至四兩曬乾入後藥透明礬四兩葉子雌黃六錢雄黃一錢膽礬五錢朴硝一兩上各另研為粗末有沙鍋或銀鍋須要寬高約貯藥之餘上有半截空者先將雞糞一兩鋪在鍋底次以白礬一兩次以膽礬次以雌黃次以朴硝次以雄黃然後盡下白礬在內再以雞糞蓋其上然後以新碗蓋鍋頂簇炭火煅青煙盡為度放冷取出細研入乳香沒藥各五錢同研極細以瓷盒收貯每用時令患人縮一腳用藥少許以津唾吐在手心中調勻以新筆蘸藥點患處一日三五次一夜兩次先以新筆蘸溫湯洗淨軟絹挹干然後敷藥敷後黃水淋瀝不止最妙雖多不妨三二日後其痔自乾枯剝落倘硬煎湯頻洗白脫腸自紅軟收止忌毒物酒色即除根矣周先生枯痔法共九方明礬赤石脂五錢辰砂痛加一錢黃丹上為末先用鬱金末護肛門如無鬱金以薑黃代之調塗四圍好肉如不就加緑豆粉打合卻將枯藥敷上如肛門疼急濃煎甘草湯放溫拂四圍肛門上就與後寬腸藥寬腸藥方槐花大黃枳殼木通連翹瞿麥當歸上水酒各半盞煎服枯痔藥早辰上一次日午洗去舊藥再上一次申時又洗去又上一次如要急安至夜半子時又洗上一次至次日且看痔頭淡淡黑色兩三日如烏梅四五日內用竹篦子輕輕敲打痔頭見如石堅至七八日便住更不須上枯藥且待自然如蘿蔔根乃脫去也洗用甘草荊芥槐花煎湯洗去舊藥方上新藥枯痔寬腸方凡醫痔之法且如明日要下手今日先與此藥所以寬大腸使大便軟滑不與痔相礙且不泄瀉痔頭未脫落者須要日日與之大黃濕紙煨枳殼去穰炒當歸酒洗各一兩上同為細末煉蜜丸如桐子大好酒或白湯吞下三十丸治枯痔頭慮生他證方凡用枯藥或觸壞腎根或水道赤澀痛與此藥大黃木通生地黃各一兩滑石瞿麥各半兩上同為細末每服四錢水煎服催痔方如枯盡未脫落以此催之好磁石一錢白殭蠶生川烏各五分上同為細末冷水調敷上立脫護肛方凡用枯藥去盡乳頭恐留痔硬頭損破肛門四周成瘡用此藥龍骨石膏各一錢沒藥膩粉各五分上同研十分細先以荊芥湯洗次撒之切忌毒物生薑痔脫後洗方用甘草湯豆豉湯洗再用荊芥五倍子煎湯洗便不生膿痔脫後肉癢方用大粉草濃煎湯洗收腸方凡用枯藥脫下乳頭隨即與此以收其腸此方補氣又收膿去血生肉人參當歸各一兩川芎甘草白芷防風厚朴桔硬桂枝黃耆上為細末水酒各半煎服如惡酒者酒少水多煎之夏月減桂朴加芩柏系痔法治痔瘻有頭用芫花入土根不限多少以淨水洗卻入木臼搗用少許水絞取汁於銀銅器內慢火煎成膏將絲線於膏內度過系痔瘡頭系時微痛候心躁痔落時以紙捻引入膏藥於竅內永除其根不得便尿周先生割痔麻藥川烏草烏尖胡椒花椒吳茱萸白殭蠶炒上為細末酒調敷四邊然後割之又以此藥敷之否則亦用麝香龍骨塗之上枯痔系痔割痔三法用前項藥服及敷貼不退者然後用之必敬謹之不可視為常法蝕痔法治痔漏生砒一字水銀一粒如米大膩粉一字麝香一粒如小豆大上件併入乳鉢內研極細如痔有珠子者將礬湯淨洗拭乾用手捻藥揩在痔上覺痛便是藥行一日二次又洗五日後住藥見效如或有孔只用紙捻將引藥送入令徹其內更用紙貼孔前一日二次使藥自能生全陳無擇云忌用生砒恐毒氣入腹今兩存之以治珠突者陷脈散治漏瘡及二三十年癭瘤或大如杯盂久久不瘥致有漏潰令人骨肉消盡或堅或軟或潰令人警惕臥寐不安體中掣痛愈而復作乾薑炮琥珀研大黃附子炮去皮各一兩丹參七錢半石硫黃研白石英研鍾乳粉研烏賊骨研各半兩上為末貯以瓷盒韋囊勿令泄氣若瘡濕即敷無汁煎豬脂敷之以干為度或死肌不消加芒硝二兩益佳一法加燕巢一枚五灰膏治臟腑一切蘊毒發為痔瘡不問遠年近日形似雞冠蓮花核桃牛乳或內或外並皆治之此方親敷之瘡科劉叔茂纍試皆驗不敢自祕蕎麥灰半鬥荊柴老杉枝蘇柴山白竹上以上四般柴竹截作二尺許長以斧劈破皮片各取一束曬乾放火上燒過置壇內防為風所化俟盡燒卻以水於鍋內煮用炭汁又用酒漏以布帛其竅置蕎麥灰干酒漏內以所煮四般炭汁淋之然後取汁於鍋內慢火熬汁約取一小碗候冷入石灰同丹和成膏以瓦瓶貯之止用石灰敷之上面不令走氣臨用時卻去石灰以冷水調開令病者以水洗洗淨痔瘡仰臥搭起一足先以濕紙於瘡四周貼護卻用竹篦挑藥塗痔上須臾痛息用紙揩去藥再塗如此三四遍要痔瘡如墨樣黑方止以水洗淨每日常置冷水一盆以蔥湯和之日洗三五遍六七日後膿穢出盡其瘡自消寬腸丸五灰膏塗痔瘡之後或臟腑祕結不通者用此藥寬腸黃連枳殼各等分上為末丸如桐子大每服五十丸空心米湯下三品錠子方共五方上品錠子專治痔漏一十八證紅礬二兩半乳香沒藥硃砂去鐵各三錢牛黃五分半硇砂一錢四分二分熟一分生白信一兩火煅中品錠子專治翻花癭瘤等證白礬三兩八錢五分乳香沒藥各五錢半硃砂三錢牛黃七分半硇砂一錢半生半熟金信一兩五錢以火煅黑煙止用淡清硇下品錠子專治疔瘡發背等證紅礬三兩二錢乳香六錢沒藥五錢硃砂三錢牛黃四分半硇砂一錢四分半生半熟白信三兩火煅黑盡半日取起上各依法制用麵糊和勻捻成錠子看瘡漏大小深淺插入錠子如肉內黑色勿上生肌散只等黑肉溶盡方可上之若瘡無頭太乙膏一個加後藥一粒丹貼之一粒丹白礬二兩乳香二錢二分沒藥二錢七分硃砂四分牛黃五分薑黃三錢半白丁香二錢半巴豆三錢草紙去油淨白信二兩火煅煙盡半日取用上依法制度為末用唾沫調敷瘡一日三次換但瘡破插上前錠子生肌散乳香血竭各五錢沒藥四錢全蠍十個焙乾輕粉黃丹生用海螵蛸去殼煅硃砂鳳凰退各二錢明礬二錢半龍骨二兩火煅紅酒淬五次赤石脂一兩半火煅紅酒淬七次上為末待瘡洗淨上之神應膏治久漏收斂瘡口此宋褚防禦治理宗久漏瘡諸方不效獨此膏愈之如腸毒胃毒為丸服之神效當歸一兩一錢赤芍藥大黃各一兩五錢元參一兩三錢川續斷生地黃各一兩二錢香白芷官桂莪朮各一兩上九味細碎用真香油二斤浸春五日夏三日秋七日冬十日入鍋內以文武火煎令黑色濾去渣如熱天用黃丹二十兩冷月十五兩旋旋下丹不住手攪試水中沉為度不可令婦人雞犬見如漏有孔者以膏送入孔內外仍以膏攤貼之截疳散治年深疳瘻瘡白蘞白及黃丹密陀僧各一兩黃連半兩龍腦麝香各半錢另研輕粉一錢上為細末和勻干撒在紝上以膏貼之治痔漏灸法隔附灸法先用參耆歸術等補氣血氣藥大劑服之用附子為末津和作餅子如錢厚以艾灸之漏大者艾炷大漏小者炷小灸令微熱不可令痛餅乾則易之再和再灸知困且止次日再灸直至肉平為度或仍前用補氣血藥作膏貼之又蒜灸洗用大蒜一片頭垢捻成餅子內安頭垢餅於痔上外安蒜用艾灸之隔礬灸法治痔漏神效皂礬一斤用瓦一片兩頭用泥作一壩再用香油制瓦上焙乾再著皂礬瓦上焙枯去砂為末川山甲一錢入紫粉罐煅存性取出為末木鱉子去殼火煅二錢半淨為末乳香沒藥各一錢半為末臨灸時加入上和勻以冷水調量瘡口大小作餅子貼瘡上將艾炷灸三四壯灸畢就用後熏洗藥先熏後洗日六度三五日如前法復灸以瘥為止熏洗方前法灸畢以此方熏洗皂礬制如前法為末約手規二把知母四兩焙乾為末取一兩貝母四兩為末取一兩淨蔥七莖上先將蔥用水煎三四沸傾入瓶內再入前藥令患者坐於瓶口上熏之待水溫傾一半洗瘡留一半候再灸再熏洗以瘥為度
