body:
  text: 卷九十五痔漏論東垣曰內經云因而飽食筋脈橫解腸澼為痔夫大腸庚也主津本性燥清肅殺之氣本位主收其所司行津以從足陽明旺則生化萬物者也足陽明為中州之土若陽衰亦殞殺萬物故曰萬物生於土而歸於土者是也以手陽明大腸司其化焉既在西方本位為之害蜚司殺之府因飽食行房忍泄前陰之氣歸於大腸木乘火勢而侮燥金故火就燥也大便必閉其疾甚者當以苦寒瀉火以辛溫和血潤燥疏風止痛是其治也以秦艽當歸梢和血潤燥以桃仁潤血以皂角仁除風燥以地榆破血以枳實之苦寒補腎以下泄胃實以澤瀉之淡滲使氣歸於前陰以補清燥受胃之濕邪也白朮之苦甘以苦補燥氣之不足其甘味以瀉火而益元氣也故曰甘寒瀉火乃假枳實之寒也古人用藥為下焦如瀆又曰在下者引而竭之多為大便祕澀以大黃推去之其津液益不足以當歸和血及油潤之劑大便自然軟利矣宜作銼湯以與之是下焦有熱以急治之之法也以地榆惡麥門冬而壞胃故宿食消盡空心作丸服之虞氏曰經云因而飽食筋脈橫解腸澼為痔又云脾胃者倉廩之官五味出焉大腸者傳道之官變化出焉若夫飽食太過則脾氣倦甚不能運化精微朝傷暮損清濁混淆故食積下流於大腸之間而為病也蓋脾胃一虛肺氣亦乏而大腸之氣亦從而虛其肝木得以乘虛下流而為腸風病則是金失所養木寡於畏之所為耳其為變見名狀種種不同曰牛奶曰鼠奶曰雞心曰雞冠曰蓮花曰翻花曰蜂窠曰穿腸曰外痔雖為狀不一而其因則同焉治法以苦寒瀉火芩連梔子槐花之類以辛溫和血川歸川芎桃仁之類風邪在下以秦艽防風升麻之類提之燥熱怫鬱以大黃枳殼麻仁之類調之遘此疾者自宜慎口節欲依法調治無有不安者也統旨云痔瘻其名有五曰牝曰氣曰血曰酒又有腸風痔脈痔雌雄痔皆五痔之別名也其狀初生悉在肛旁或如鼠乳或結小核癢痛注悶甚者身熱惡寒諸方論之皆由房勞飲酒過度久嗜甘肥不慎醉飽以合陰陽勞擾血脈腸澼滲漏沖注下部肛旁生瘡變為痔疾治法如覺痔發便服秦艽白朮丸槐角丸實熱者秦艽蒼朮湯疏利臟腑及洗浴重尉以取內消切忌酒面辛熱房室肥膩稍縱嗜欲腐潰膿血或逗留淫汁歲月已深旁穿竅穴即變痔漏即須用寸金錠子三五次多服補氣之藥又能味無味之味事無事之事其次靜養調節謹慎合宜未有不瘥者也選要曰夫痔漏者肛門邊內外有瘡也若成癗不破者曰痔破潰而出膿血黃水浸淫淋瀝久不止者曰漏也此疾皆由濕熱風燥四氣相合而致之其狀有五曰牡曰牝曰脈曰血曰腸痔是也又有酒痔氣痔蟲痔翻花痔螻蟪痔古方分為二十四種名狀不同究其所因亦不過久嗜辛熱炙煿新酒及房勞憂思蘊積熱毒憤郁之氣所成也或藏於肛門之內或突於肛門之外若蘊毒深者其狀大蘊毒淺者其狀小大者如雞冠蓮花核桃之狀小者如牛奶雞心櫻桃之形或流膿水或出鮮血有妨行坐久而不愈則成漏矣治法在外者宜點之洗之在內者宜祛其風而除其濕消其熱而解其毒斯得治之要也丹溪曰痔漏因風熱燥歸於大腸也治血為主大法用條芩涼大腸人參黃連生地黃槐角涼血生血當歸和血川芎升麻枳殼寬腸漏瘡先須用補藥以生氣血參耆歸術為主大劑服之外以附子為末津和作餅子如錢厚以艾灸之漏大者艾炷亦大漏小炷小灸令微熱不可令痛餅乾則易之再和再灸如困且止次日再灸直至肉平為度或仍前用補氣血藥作膏貼之痔頭向上是大腸熱甚收縮而上用四物湯解毒湯加枳殼白朮槐角秦艽治之蔭按方氏曰痔漏之源由乎酒色過度濕而生熱充於臟腑溢於經絡墜乎穀道之左右衝突為痔久而成漏者也痔輕而漏重痔實而漏虛治痔之法不過涼血清熱而已至於治漏初宜涼血清熱燥濕久則宜澀竅殺蟲而兼乎溫散也或曰痔漏火是根源何故而用溫澀殊不知痔若出血始終是熱漏流膿水始是濕熱終是濕寒不用溫藥何以去濕而散寒乎非止痔漏百病中多有始熱而終寒者如瀉痢如嘔吐初作則腸胃氣實為熱久作則腸胃氣虛而為寒矣丹溪下血條云下血久不愈者後用溫劑正此義也李氏曰五痔皆因食色所傷經曰因而飽食筋脈橫解腸澼為痔蓋飽食則脾不能運食積停聚大腸脾土一虛肺金失養則肝木寡畏風邪乘虛下流輕則腸風下血重則變為痔漏或醉飽入房精氣脫泄熱毒乘虛下注或淫極入房過甚傷筋忍精停毒甚則以男交男致傷膀胱與腎肝筋脈蓋膀胱筋脈抵腰絡腎貫臀走肝環前後二陰故痔乃筋脈病發則面青痛甚肝苦急也五痔牡痔肛邊如鼠乳牝痔肛邊一枚生瘡陷入腸痔結核腸內脫肛出血血痔大便清血隨下如射箭脈痔腸口頻頻發痛出血且痛且癢五痔散主之又有氣痔肛門腫痛便難強力則肛出不收橘皮湯酒痔飲酒則發乾葛湯蟲痔浸淫濕爛歲積月纍蝕腸穿穴蝟皮丸黑玉丹凡毒深者大如雞冠蓮花核桃毒淺者小如松子牛乳雞心鼠乳櫻桃雖種種不同皆三陰虛也痔非外邪乃臟內濕熱風燥四氣相合蘊久流入大腸而成毒有腸頭腫塊者濕也肛腫後墜濕兼熱也出膿血水者熱勝血也痛極者火熱也痛癢者風熱也大便祕者燥熱也小便澀者肝火濕熱也又瘡頭向上或硬者熱多向下或軟者濕多痔以涼血為主蓋熱則傷血血滯則氣亦不運而大腸下墜作痛大要以槐花槐角生地黃涼血芍歸桃仁和血生血枳殼行氣寬腸芩連山梔清熱黃柏防己澤瀉行濕麻仁大黃潤燥秦艽荊芥疏風風邪陷下久者防風升麻提之氣弱者人參黃耆補之氣不順者木香檳榔和之古方熱痔黃連阿膠丸清心丸槐角丸槐膽丹濕熱香殼丸或四物湯合敗毒散風濕秦艽湯燥痔四順清涼飲下血者芎歸丸苦參丸痛者七聖丸癢者黑玉丹腫硬者豚胃丸外法刀割線剔損臟傷命藥點藥敷閉毒變漏初起只宜蒜灸已成者防風荊芥槐花木鱉朴硝煎湯熏洗滑脫加文蛤蓮蓬洗後用古熊膽膏融松油塗之內痔宜內生肌丸忌擦藥斷根鬚用滋補忌用寒涼體實屬肺與大腸風熱者加味槐角丸加味地黃三神丸斷根更易體薄屬肝脾腎三經陰精損者腎氣丸補中益氣湯十全大補湯以滋化源更節嗜欲謹起居方可斷根又有兼下疳瘡者有莖中出白津者有兼瘦者皆肝腎不足變出勿專服寒涼瀉火又曰漏須知初與久凡癰疽久則宿膿腐肉停蓄其間穿孔必深風冷外侵涓涓穢膿流出如缸甕之有漏孔九漏肝主狼漏胃主鼠漏大腸主螻蟪漏脾主蜂漏肺主蚍蜉漏心主蠐螬漏膽主蜉蛆漏腎主螺癧漏小腸主轉筋漏原因氣血壅滯染觸蠢動含靈之毒而名其因治則一也在痔則有穿腸穿腎穿陰者又有無痔肛門左右別生一竅流出膿血名為簞漏竅在皮膚者易愈臟腑損者難治又有原有痔漏肛邊別生一塊作膿就在痔孔出乃食積注下也宜連魏散痔止出血始終是熱漏流膿血初是濕熱久是濕寒初起淡紅微腫小核宜涼血清熱燥濕牽牛酒加味槐角丸臟頭丸古枳巴丸連歸丸久則內如稿白外如黑腐淫蟲惡臭宜澀竅殺蟲溫補黑玉丹釣腸丸芎歸丸苦參丸蠟礬丸又有初起因風冷者久則虛而挾濕熱者大補氣血用十全大補湯補中益氣湯黃耆六一湯主之丹溪用參朮黃耆芎歸為君佐以蝟皮蛇退牛角腮蜂房之類服之外用丹溪附子餅灸法灸至肉平為度更用雲母膏貼之畏灸者內生肌丸最妙他如熏洗方齒髮散蜂房散平肌塞竅取膿取蟲諸方粗實者酌用清貴者慎之脈法脈沉小實者易治浮洪而軟弱者難愈治痔漏初起濕熱方丹溪方痔瘡專以涼血為主此方治之人參條芩黃連生地酒洗槐角當歸川芎升麻枳殼各等分上銼水煎服或丸服亦可一方用黃耆無人參滋陰涼血地黃湯當歸一錢半川芎生地酒洗黃耆條黃芩槐角子各一錢白芍藥黃連秦艽各八分升麻枳殼各五分甘草三分上銼一帖水二鍾煎一鍾食前服清涼飲治諸痔熱甚大便祕結當歸赤芍藥甘草炙大黃飯上蒸曬乾各等分上為末每服二錢新水調下秦艽蒼朮湯治痔疾若破謂之痔漏大便祕澀必作大痛此濕熱風燥四氣合而為病故大腸頭成塊者濕也作大痛者風也大便燥結者兼受火邪也其西方肺金主氣其體收下亦助病為邪須當用破氣藥兼之其效如神秦艽去蘆桃仁去皮尖另研皂角仁燒存性各一錢蒼朮米泔浸防風各七分黃柏酒洗五分當歸梢酒洗澤瀉各三分檳榔二分另研大黃少許雖大便通澀亦不可多用上件除檳榔桃仁皂角仁三味另研外余藥銼如麻豆大作一服水三盞煎至一盞二分去渣入檳榔等三味再火上煎至一盞空心熱服待少時以美膳壓之不犯胃氣也服藥日忌生冷硬物及酒濕面大料椒薑等物若犯之其藥無效如有白膿加白葵花頭五朵去萼心青皮半錢入正藥中同煎木香三分為細末同檳榔等三味依前煎服古人治此疾多以歲月待除之惟此藥一服即愈秦艽防風湯治痔漏每日大便時發疼痛如無疼痛者非痔漏也此藥主之秦艽防風當歸身白朮各一錢五分炙甘草澤瀉各六分黃柏酒洗五分大黃煨橘皮各三分柴胡升麻各二分桃仁三十個去皮尖另研紅花少許上銼一服水三盞煎至一盞去渣稍熱空心服之避風寒忌房事酒濕面大辛熱物秦艽羌活湯治痔漏成塊下垂不任其癢羌活一錢二分秦艽黃耆各一錢防風七分炙甘草麻黃升麻柴胡各五分藁本三分細辛紅花各少許上銼水煎空心服忌風寒處大小便秦艽當歸湯治痔漏大便結燥疼痛大黃煨四錢秦艽枳實各一錢澤瀉當歸梢皂角仁白朮各五分桃仁二十個去尖紅花少許上銼作一服水三盞煎至一盞食前熱服忌如前當歸郁李仁湯治痔漏大便硬努出大腸頭下血苦痛不能忍郁李仁皂角仁各一錢枳實七分秦艽麻仁當歸梢生地酒洗蒼朮各五分大黃煨澤瀉各三分上銼作一服除皂角仁為末水三盞煎一盞去渣入皂角仁末調空心食前服之忌如前紅花桃仁湯治痔漏經年因而飽食筋脈橫解腸澼為痔治法當補北方瀉中央黃柏一錢半生地黃一錢澤瀉八分蒼朮六分當歸梢漢防己防風梢豬苓五分麻黃二分紅花半分桃仁十個上銼一服水三盞煎一盞稍熱食前服忌如前加味四物湯治內熱痔漏下血當歸芍藥川芎生地酒洗黃芩酒洗黃柏酒洗槐花炒各一錢上銼水煎服地榆散治痔瘡腫痛地榆黃耆枳實檳榔川芎黃芩槐花赤芍藥羌活各一錢白斂蜂房焦炒甘草炙各五分上銼作一服水煎服食前秦艽白朮丸治痔疾並痔漏有膿血大便燥硬而作疼痛不可忍秦艽去蘆桃仁湯浸去皮尖皂角仁燒存性各一兩當歸梢酒浸澤瀉枳實白朮各五錢地榆三錢上為細末和桃仁泥研勻麵糊丸如雞頭實大令藥光滑焙乾每服五七十丸白湯下空心服待少時以美食壓之忌生冷硬物冷水冷菜之類並濕面酒及辛辣熱大料物之類犯之則藥無驗也七聖丸治大腸疼痛不可忍叔和云積氣生於脾臟旁大腸疼痛陳難當但令稍瀉三焦火莫慢多方立紀綱羌活一兩郁李仁湯浸去皮一兩五錢大黃煨八錢檳榔桂去皮木香川芎各五錢上除郁李仁另研細入外其餘共為細末煉蜜丸如桐子大每服三五十丸白湯下食前取大便微利一服而愈切禁不得多利大便其痛滋甚橘皮湯治氣痔橘皮枳殼川芎槐花炒各一錢半檳榔木香桃仁炒去皮紫蘇莖香附甘草炙各一錢上銼作一服加生薑三片棗二枚水煎食前服乾葛湯治酒痔每遇飲酒便發腫痛而流血乾葛枳殼炒半夏茯苓生地黃酒洗杏仁各一錢半黃芩甘草炙各五分上銼作一服加黑豆一百粒