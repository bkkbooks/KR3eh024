body:
  text: 卷三中暑論暑病與熱病不同活人書云夏月發熱惡寒頭疼身體肢節痛重其脈洪盛者熱病也冬傷於寒因暑氣而發為熱病治法與傷寒同中暑與熱病外證相似但熱病者脈盛中暑者脈虛以此別之甲乙經云脈盛身寒得之傷寒脈虛身熱得之傷暑蓋寒傷形而不傷氣所以脈盛熱傷氣而不傷形所以脈虛又有濕溫與中暑同但身涼不渴為異耳論暑有冒有傷有中淺深之異戴氏曰暑有冒有傷有中或腹痛水瀉者胃與大腸受之噁心者胃口有痰飲此二者冒暑也可用黃連香薷飲或身熱頭疼燥亂不安或身如針刺者此為熱傷肉分也當以解毒湯白虎湯加柴胡氣虛加人參此為傷暑或咳嗽發寒熱盜汗不止脈數者熱在肺經火乘金也此謂中暑宜清肺湯柴胡湯天水散之類治之氣傷甚者清暑益氣湯李氏曰中暑歸心神昏卒倒傷暑肉分周身煩躁或如針刺或有赤腫蓋天氣浮於地表故人氣亦浮於肌表也冒暑入腸胃腹痛惡心嘔瀉伏暑即冒暑久而藏伏三焦腸胃之間熱傷氣而不傷形旬月莫覺變出寒熱不定霍亂吐瀉膨脹中滿瘧痢煩渴腹痛下血等證但暑病多無身痛間有痛者或為燥浴水濕相搏耳論暑分動靜陰陽東垣曰靜而得之為中暑中暑陰證當發散也或避暑熱納涼於深堂大廈或過服生冷得之者名曰中暑其病必頭痛惡寒身形拘急肢體疼痛而心煩肌膚大熱無汗為房室之陰寒所遏使周身陽氣不得伸越世多以大順散主之是也動而得之為中熱中熱者陽證為熱傷元氣非形體受病也若行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發燥熱惡熱捫之肌膚大熱必大渴引飲汗大泄無氣以動乃為天熱外傷肺氣人參白虎湯主之王安道曰暑熱之氣一也皆夏月中傷其邪而為病焉豈以一暑熱分為陰陽二證而名之耶其避暑於深堂大廈及恣食藏冰瓜果寒涼之物正經所謂口得寒物身犯寒氣之病耳自當同秋冬即病陰證傷寒處治不可名中暑也論暑傷五臟為證不同陳無擇曰暑熱喜歸心心中之使人噎悶昏不知人入肝則眩暈頑痹入脾則昏睡不覺入肺則喘滿痿躄入腎則消渴凡中暍始治之切不得用冷唯宜溫養得冷則死道途中無湯即以熱土尉臍中仍使更溺其上概可見矣凡覺中暑急嚼生薑一大塊水送下如已迷悶嚼大蒜一大瓣水送下如不能嚼水研灌之立醒劉宗厚曰暑暍之證變易不等豈止歸五臟也冷熱當憑脈證用之蓋人之形氣有虛實所感有輕重輕則後時而發至秋成瘧痢是也重則即時發者如以上之證至有輕變重重變輕亦自感有淺深傳有兼併爾況人之形志苦樂不一豈得無變異乎大抵四時之證皆然論暑熱傷氣為痿厥諸證東垣曰夫脾胃虛弱必上焦之氣不足遇夏天熱盛損傷元氣怠惰嗜臥四肢不收精神不足兩腳痿軟遇早晚寒厥日高之後陽氣將旺復熱如火乃陰陽氣血俱不足也或四肢困倦精神短少懶於動作胸滿氣促肢節沉疼或氣高而喘身熱而煩心下痞悶小便黃而少大便溏而頻或利出黃糜或如泔色或渴或不渴不思飲食自汗體重或汗少者血先病而氣不病也其脈中得洪緩若濕氣相搏必加之以遲遲病雖互換少差其天暑濕令則一也宜以清燥之劑治之或有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今不能勝火則骨枯髓虛足不任身發為骨痿者生於火熱也此濕熱成痿令人骨乏無力或熱厥而陰虛或寒厥而氣虛厥者四肢如在火中為熱厥四肢寒冷者為寒厥寒厥則腹中有寒熱厥則腹中有熱為脾主四肢故也按宗厚曰此論暑熱證候即同冬月傷寒傳變為證之不一也彼為寒邪傷形此則暑熱傷氣若真氣元氣虛甚必有於一時不救者與傷寒陰毒頃刻害人實同故東垣啓是病例大開後人之盲聵矣學者當審究其機宜與痿門兼看論中暑宜補真氣東垣曰夫脾胃虛弱遇六七月間河漲霖雨諸物皆潤人汗沾衣身重短氣甚則四肢痿軟行步不正腳攲眼黑此腎水與膀胱俱竭之狀也當急救之滋肺氣以補水之上源又使庚大腸不受邪熱不令汗大泄也汗泄甚則津液亡神無所依經云津液相成神乃自生津者庚大腸所主三伏之義為庚金受囚也若亡津液汗大泄濕令亢甚則清肅之氣亡燥金受囚風木無制故風濕相搏骨節煩疼一身盡痛亢則害承乃制也五月常服五味子是瀉丙火補庚金大腸益五臟之元氣壬膀胱之寒已絶於巳癸腎水已絶於午今更逢濕旺助熱為邪西方北方之寒清絶矣聖人立法夏月宜補者補天元真氣非補熱火也令人夏食寒是也為熱傷元氣以人參麥門冬五味子生脈脈者元氣也丹溪曰夏月陽氣盡出於地人之腹屬地氣於此時浮於肌表散於皮毛腹中之陽虛矣經曰夏氣在經絡長夏氣在肌肉所以表實者里必虛世言夏月伏陰在內此陰字有虛之義若作陰冷看誤甚矣前人治暑有用玉龍丹大順散桂苓丸單煮良薑與縮脾飲用草果等蓋以涼臺水館陰木寒泉水果冰雪之傷自內及外不用溫熱病何由安非為伏陰而用也火令之時流金鑠石何冷之有孫真人生脈散令人夏月服之非虛而何論暑火證治大法賈元良曰暑者相火行令也夏月人感之自口齒而入傷心包絡之經其脈虛外證頭疼口乾面垢自汗倦怠少氣或背寒惡熱氣甚者迷悶不省而為霍亂吐利痰滯嘔逆腹痛瀉利下血發黃生斑皆是其證甚者火熱制金不能平木搐搦不省人事其脈虛浮一曰浮者風也虛者暑也俗名暑風證者皆是相火甚而行令也先以溫水化蘇合香丸次進黃連香薷飲加羌活或只用雙解散加香薷尤良大抵治暑之法清心利小便甚好若自汗甚者不可利小便宜白虎湯清解之次分表裡治之如在表頭疼惡寒雙解散加香薷及二香散十味香薷散之類解之如在半表半裡者泄瀉煩渴飲水吐逆五苓散治之熱甚煩渴者益元散清之若表解裡熱甚宜半夏解毒湯下神芎丸酒蒸黃連丸等或人平日素弱及老人冒暑脈微下利渴而喜溫或厥冷不省人事宜竹葉石膏湯加熟附半個冷飲次以來復丹五苓散治之凡夏月暑證不可服諸熱燥劑致斑毒發黃小水不通悶亂而死矣按宗厚曰此言治暑之法可謂詳備然云暑風相火為病而先用蘇合香丸至用雙解皆當審諦脈證施治不可少有差失詳蘇合香但可用於陰寒所遏或內傷生冷太過及氣中或中惡者此等又不可謂之暑風相火之證矣蓋暑證有陰陽二者不同治法寒熱霄壤之隔學者慎之論中暑證治準繩云中暑之證面垢悶倒昏不知人冷汗自出手足微冷或吐或瀉或喘或滿以來復丹末同蘇合香丸用湯調灌或以來復丹研末湯調灌之卻暑散水調灌下亦得其人稍蘇則用香薷飲香薷湯煎熟去渣入麝香少許服或剝蒜肉入鼻中或研蒜水解灌之蓋中傷暑毒陽外陰內諸暑藥多有暖劑如大順之用薑桂枇杷葉散之用丁香香薷飲之用香薷香薷味辛性暖蒜亦辛暖又蒜氣臭烈能通諸竅大概極臭極香之物皆能通竅故也熱死人切勿便與冷水及臥冷地正如凍死人須先與冷水若遽近火即死一法行路暍死人惟得置日中或令近火以熱湯灌之即活初覺中暑即以日曬瓦或布蘸熱湯更易尉其心腹臍下急以二氣丹末湯調灌下一方用不蛀皂角不拘多少刮去黑皮燒煙欲盡用盆合於地上周圍勿令透煙每用皂角灰一兩甘草末六錢和勻每服一錢新汲水調下氣虛人溫漿水調下昏迷不省者不過二服蓋中暑人痰塞關竅皂角能疏利去痰故也又有暑途一證似中而輕欲睡懶語實人香薷飲加黃連一錢虛人星香飲加香薷一錢蘇後冷汗不止手足尚逆煩悶多渴者宜香薷飲蘇後為醫者過投冷劑致吐利不止外熱內寒煩躁多渴甚欲裸形狀如傷寒陰盛格陽宜用溫藥香薷飲加附子浸冷服渴者縮脾飲加附子亦浸冷服論傷暑證治準繩曰此事難知云傷暑有二動而傷暑心火大盛肺氣全虧故身脈洪大動而火勝者熱傷氣也辛苦人多得之白虎加人參湯靜而傷暑火乘金位肺氣出表故惡寒脈沉疾靜而濕勝者身體重也安樂之人多受之白虎加蒼朮湯傷暑必自汗背寒面垢或口熱煩悶或頭疼發熱神思倦怠殊甚暑傷氣而不傷形故也但身體不痛與感風寒異宜香薷飲香薷湯六合湯暑熱發渴脈虛用人參白虎湯或用竹葉石膏湯亦好嘔而渴者浸冷香薷湯或五苓散兼吞消暑丸嘔不止者枇杷葉散去毛根吞來復丹嘔而有痰卻暑散吞消暑丸或小半夏茯苓湯或消暑飲瀉而渴生料平胃散和生料五苓散各半貼名胃苓散或理中湯加黃連名連理湯瀉定仍渴春澤湯或縮脾飲吐瀉脈沉微甚者不可用涼藥可用大順散加熟附子等分或附子理中湯加炒芍藥瀉而腹痛有積者生料五苓散霍香正氣散各半帖若瀉雖無積其腹痛甚生料五苓散加木香七分或六和湯加木香半錢或不加木香止與二藥煎熟去渣調下蘇合香丸又有不瀉而腹干痛者六和湯煎熟調蘇合香丸瀉而發熱者胃苓散瀉而發渴者胃苓散兼進縮脾飲瀉渴兼作未透者湯化蘇合香丸吞來復丹或研來復丹作末白湯調下已透者香薷飲感冒外發熱者六合湯香薷湯香薷飲身熱煩者五苓散或香薷湯加黃連一錢熱而汗多畏風甚者生料五苓散熱而渴者五苓散兼進縮脾飲暑氣攻裡熱不解心煩口乾辰砂五苓散或香薷飲加黃連一錢若大渴不住辰砂五苓散吞酒煮黃連丸暑氣攻裡腹內刺痛小便不通生料五苓散加木香七錢或止用益元散冒暑飲酒引暑入腸內酒熱與暑氣相併發熱大渴小便不利其色如血生料五苓散去桂加黃連一錢或五苓散去桂吞酒煮黃連丸暑氣入腸胃而大便艱澀不通者加味香薷飲仍佐以三黃丸暑氣入心身煩熱而腫者辰砂五苓散或香薷飲加黃連一錢暑先入心者心屬南方離火各從其類小腸為心之腑利心經暑毒使由小腸中出五苓散利小便為治暑上劑也傷暑而傷食者其人頭疼背寒自汗發熱畏食噁心噫酸臭氣胸膈痞滿六和湯倍砂仁若因暑渴飲食冷物致內傷生冷外傷暑氣亦宜此藥有傷於暑因而露臥又為冷氣所入其人自汗怯風身疼頭痛去衣則凜著衣則煩或已發熱或未發熱並宜六和湯內加扁豆砂仁一方用藿香一方用紫蘇正治已感於暑而復外感於風寒或內傷生冷以藿香紫蘇兼能解表砂仁扁豆兼能溫中然感暑又感冷亦有無汗者只宜前藥若加以感風則斷然多汗審是此證宜生料五苓散內用桂枝為佳市井中多有此病往往日間冒熱經營夜間開窗眠臥欲取清涼失蓋不覺用藥所當詳審有此證而發潮熱似瘧猶未成瘧者六和湯養胃湯各半帖相和煎有此證而鼻流清涕或鼻孔熱氣時出者六和湯加川芎半錢羌活黃芩各七分有因傷暑遂極飲冷水以致暑毒留結心胸精神昏憒語音不出者煎香薷湯化蘇合香丸若先飲冷後傷暑者五苓散主之此必心下痞憹生薑湯調服佳或四君子湯調中亦可中和後或小便不利或莖中痛宜蒲黃三錢滑石五錢甘草一錢有因傷暑用水沃面或入水洗浴暑濕相搏自汗發熱身重小便不利宜五苓散傷暑而大汗不止甚則真元耗散宜急收其汗生料五苓散倍桂加黃耆如術之數傷暑自汗手足厥冷者煎六和湯調蘇合香丸傷暑自汗手足時自搐搦者謂之暑風緣已傷於暑毛孔開而又邪風乘之宜香薷飲或香薷湯並加羌活一錢痰盛者六和湯半帖和星香散半帖暑月身癢如針刺間有赤腫處亦名暑風末子六和湯和消風散酒調服暑風而加以吐瀉交作者六和湯霍香正氣散各半帖加全蠍三個有暑毒客於上焦胸膈痞塞湯藥至口即出不能過關或上氣喘急六和湯浸冷入麝香少許蔭按傷暑心下痞悶者暑動其痰也不可謂暑毒攻心宜清暑化痰湯伏暑煩渴而多痰熱者於消暑丸中每兩入黃連末二錢名黃連消暑丸或二陳湯或小半夏茯苓湯並可加黃連一錢暑氣久而不解遂成伏暑內外俱熱煩躁自汗大渴喜冷宜香薷飲加黃連一錢繼進白虎湯若服藥不愈者暑毒深入結熱在裡譫語煩渴不欲近衣大便祕結小便赤澀當用調胃承氣湯或三黃石膏湯論注夏丹溪曰注夏屬陰虛元氣不足夏初春末頭疼腳軟食少體熱者是也宜補中益氣湯去柴胡升麻加炒黃柏白芍藥挾痰者加南星半夏陳皮煎服又或用生脈散李氏曰內傷勞役或素氣血虛弱病暑者一以滋補為主慎用大熱大冷之劑暑中尿赤者清暑益氣湯暑輕力倦者補中益氣湯或為丸中暍暫加香薷扁豆陰虛者滋陰降火湯腎氣湯三伏炎蒸大熱傷氣養生家謂此時縱酒恣色令人內腎腐爛至秋方凝甚則化水而死時常御暑體實者香薷飲益元散虛者忌用蓋脾虛者不必因暑勞役及乘涼致病每遇春末夏初頭疼腳軟食少體熱名注夏病宜補中益氣湯去升柴加黃柏芍藥五味子麥門冬有痰加半夏薑汁實三伏卻暑之聖藥也如氣衰精神不足煩渴懶食者生脈散誘行丸通用謝傳萬病無憂散脈法經曰脈虛身熱得之傷暑脈弦細芤遲脈虛而微弱或浮大而散或隱不見許學士云傷暑其脈弦細芤遲何也內經曰寒傷形熱傷氣蓋傷氣而不傷形則氣消而脈虛弱所謂弦細芤遲皆虛脈也仲景以弦為陰而朱肱亦曰中暑脈細弱則皆虛脈也可知矣脈訣舉要曰暑傷於氣所以脈虛弦細芤遲體狀無餘丹溪曰暑脈微弱按之無力又脈來隱伏治中暑煩渴方香薷飲治伏暑引飲口燥咽乾腹痛霍亂或吐或瀉並皆治之香薷一斤厚朴薑汁炙白扁豆微炒各半斤上㕮咀每服三錢水一盞入酒少許煎七分沉冷不拘時服一方加黃連四兩薑汁同炒令黃色名黃連香薷飲如有搐搦加羌活徐氏曰世俗用於暑月中煎飲然氣虛者不可過多蓋厚朴泄氣藥也蔭按用是方於伏熱之時自覺酷暑蒸炎或遠行傷於暑熱服一二劑誠當今人坐高堂廣廈之中身對冰盤口啖瓜果暑氣原淺每求此藥服之是謂誅伐太過香薷湯驅暑和中通用香薷二兩厚朴薑汁炒白扁豆炒茯神各一兩甘草炙半兩上為細末每服二錢不拘時沸湯點服鹽湯亦得或只㕮咀每服七錢水煎服潑火散一名地榆散治傷暑煩躁口苦舌乾頭痛惡心不思飲食及中暑昏迷不省人事欲死者並治血痢地榆赤芍藥黃連去須青皮去白各等分上為末每服三錢漿水調服如無只以新汲水亦得若血痢水煎服白虎湯治暑熱發渴石膏五錢知母二錢甘草一錢粳米一撮上銼作一服水煎米熟去渣溫服加人參一錢半名人參白虎湯加蒼朮一錢名蒼朮白虎湯益元散一名六一散一名天水散治中暑身熱煩渴小便不利滑石六兩水飛甘草一兩上為末每服三錢新汲水調服如心神恍惚每料加辰砂三錢用白沸湯調下名辰砂益元散如莖中痛加蒲黃三兩加薄荷少許名雞蘇散加青黛少許名若玉散治療並同桂苓甘露飲治伏暑引飲過多肚腹膨脹小便不利濕熱為患者茯苓澤瀉各一兩豬苓去皮白朮炒桂心炒各五錢滑石四兩石膏寒水石各二兩上為末每服二錢熱湯冷水任調下入蜜少許尤好張子和方加人參藿香各半兩甘草葛根各一兩木香二錢半玉露散治暑渴寒水石滑石石膏甘草瓜蔞根各等分上為細末每服五錢新汲水調服竹葉石膏湯治伏暑內外熱熾煩躁大渴石膏半兩麥門冬去心人參各二錢半夏一錢甘草炙五分上㕮咀作一服加生薑五片青竹葉十四片糯米一撮水煎服春澤湯治伏暑發熱煩渴引飲小便不利澤瀉三錢豬苓茯苓白朮各二錢人參麥門冬去心各一錢半桂心一錢上㕮咀每服七錢水一鍾半加燈心二十莖煎一鍾食遠服渴甚去桂加五味子黃連各二錢丹溪方治暑渴生地黃麥門冬去心牛膝萸柏炒知母葛根甘草上銼水煎服枇杷葉散治中暑伏熱煩渴引飲嘔噦噁心頭目昏眩香薷七錢半白茅根麥門冬去心乾木瓜甘草炙各一兩丁香陳皮厚朴薑汁炒枇杷葉炙各五錢上為末每服二錢加生薑三片水煎服如煩躁冷水調下柴胡天水散治中暑脈數盜汗不止發寒熱者此熱在肺分柴胡三錢黃芩二錢滑石二錢半甘草炙一錢上為末水煎服或白湯調亦好一方有人參二錢酒煮黃連丸治伏暑發熱煩渴嘔吐噁心黃連十二兩好酒五斤上以酒煮黃連干為末滴水丸如桐子大熱湯下三五十丸胸膈涼不渴為驗三黃石膏湯治暑毒深入結熱在裡譫語煩渴不欲近衣大便祕結小便赤澀黃連三錢黃柏山梔子元參各一錢黃芩知母各一錢五分石膏三錢甘草七分上銼水煎服龍鬚散治中暑昏悶不省人事及泄瀉霍亂作渴一服即愈亦能解暑毒甘草炙一兩五倍子生用一方作五味子白礬生烏梅去核各二兩飛羅面一兩一方用清明日面佳上為末拌勻每服二錢新汲水調下千里水葫蘆治路上行人暑熱作渴茶水不便用此藥備之俟渴時即用一丸噙化止渴生津清熱止嗽化痰甚妙硼砂柿霜烏梅肉薄荷葉白沙糖各等分上為細末用烏梅肉為丸每用一丸噙化水葫蘆丸一名旅行丸治冒暑毒解煩渴生津液川百藥煎三兩麥門冬去心烏梅肉白梅肉乾葛甘草各五錢人參二錢上為細末麵糊丸如雞頭實大每服一丸含化夏月出行一丸可度一日治中暑吐利方五苓散治中暑煩渴身熱頭痛霍亂吐瀉小便赤澀心神恍惚澤瀉二兩半赤茯苓豬苓白朮肉桂各一兩半上㕮咀每服五錢水煎食前服或為末每服二錢白湯調下本方去桂名四苓散加茵陳名茵陳五苓散加辰砂等分減桂三之一名辰砂五苓散加車前子名加味五苓散初痢及積聚食黃酒疸加大黃陽毒加升麻芍藥去桂狂言妄語加辰砂酸棗仁頭痛目眩加川芎羌活咳嗽加桔梗五味子心氣不足加人參麥門冬痰多加陳皮半夏喘急加馬兜苓桑白皮氣塊加三稜蓬朮心熱加黃連石蓮肉身疼急拘加麻黃口乾噯水加烏梅乾葛眼黃酒疸及五疸加茵陳木通滑石血衄加梔子烏梅伏暑鼻衄加茅根煎調百草霜五心熱如勞加桔梗柴胡有痰有熱加桑白皮人參前胡水腫加甜葶藶木通滑石木香吊腎氣加吳茱萸枳殼小腸氣痛加小茴香木通霍亂轉筋加藿香木瓜小便不利加木通滑石車前子喘咳心煩不得眠加阿膠疝氣加小茴香川楝子檳榔去桂薑蔥煎入鹽一捻同服女子血積加桃仁牡丹皮嘔吐去桂加半夏生薑薷苓湯治夏秋暑濕致腹痛霍亂吐瀉欲成痢疾等證黃連薑汁炒厚朴薑汁炒扁豆炒香薷白朮茯苓豬苓各一錢澤瀉一錢二分甘草炙三分上水煎食前涼服渣再煎桂苓白朮散治冒暑濕熱吐瀉轉筋腹痛小兒亦可服茯苓澤瀉各一兩豬苓白朮官桂各五錢甘草石膏寒水石各二兩滑石四兩上為末每服二錢熱湯新汲水或生薑湯調下劉廷瑞方不用豬苓解暑三白散治冒暑伏熱霍亂嘔吐小便不利頭目昏眩澤瀉白朮白茯苓各等分上㕮咀每服四錢水一鍾加生薑五片燈心十莖煎八分不拘時服香朴飲子治大人小兒伏熱吐瀉虛煩霍亂人參茯苓甘草紫蘇葉烏梅肉木瓜澤瀉香薷半夏曲厚朴白扁豆炒上作一服加生薑三片棗一枚水煎食前服謝傳萬病無憂散專治夏月霍亂吐瀉煩渴尿赤似瘧非瘧似痢非痢不服水土等證常服可防瘧痢草果黃連滑石澤瀉各一兩二錢枳殼木通陳皮厚朴赤茯苓車前子豬苓砂仁各八錢香薷白扁豆各二兩炒白朮小茴香各五錢六分木香甘草各二錢半上為末每服二錢滾水調服素虛者溫酒或茶清下忌米飲孕婦勿服如不善服末者煎三沸服或晾冷服不爾則吐卻暑散治冒暑伏熱頭目眩暈嘔吐瀉痢煩悶背寒面垢赤茯苓生甘草各四兩寒食麵生薑各一斤上為末每服二錢白湯調下大黃龍丸治中暑身熱頭疼狀如脾寒或煩渴嘔吐昏悶不食舶上硫黃舶音白海中大船硝石各一兩白礬滑石雄黃各五錢白麵四兩上五味為末入面和勻滴水丸如桐子大每服三十丸新汲水下來復丹治上盛下虛裡寒外熱伏暑泄瀉如水五靈脂一兩陳皮去白二兩硝石一兩硫黃一兩同硝石為末入銚內以柳枝攪不可用火太猛恐傷藥力候得所研細末名二氣丹太陰元精石另研青皮去白各二兩上將五靈脂青皮陳皮為末次入元精石末及前二氣末拌勻醋打麵糊丸如豌豆大每服三十丸空心米飲下治暑傷元氣方十味香薷飲治內傷不足伏暑身體倦怠神昏頭重吐痢常服養陰避暑調理陰陽香薷一兩人參陳皮白朮茯苓黃耆白扁豆炒木瓜厚朴薑製甘草炙各半兩上㕮咀每作七錢水煎不拘時服清暑益氣湯治長夏濕熱蒸人人感之四肢困倦精神短少懶於動作胸滿氣促肢節疼痛或氣高而喘身熱而煩心下膨脹小便赤而數大便溏而頻或痢或渴不思飲食自汗身重黃耆汗少減五分蒼朮各一錢半升麻一錢人參白朮陳皮神麯澤瀉各五分黃柏酒浸當歸青皮麥門冬去心乾葛甘草炙各三分五味子九枚上銼作一服水煎稍熱食遠服內經曰陽氣者衛外而為固也熱則氣泄今暑邪干衛故身熱自汗以黃耆甘溫補之為君人參陳皮當歸甘草甘微溫補中益氣為臣蒼朮白朮澤瀉滲利而除濕升麻葛根苦甘平善解肌熱又以風勝濕也濕熱則食不消而作痞滿故以炒曲甘辛青皮辛溫消食快氣腎惡燥急食辛以潤之故以黃柏辛苦寒借其氣味瀉熱補水虛者滋其化源以人參五味子麥門冬酸甘微寒救天暑之傷於庚金為佐蔭按皆由飲食勞倦傷其脾胃乘天暑而病作也但藥中犯澤瀉豬苓茯苓燈心通草木通淡味滲利小便之類皆從時令之旺氣以泄脾胃之客邪而補金水之不及也此正方已是從權而立之若於其時病濕熱脾旺之證或小便已數腎肝不受邪者若誤用之必大瀉真陰竭絶腎水先損其兩目也復立變證加減法於後如心火乘脾乃血受火邪而不能升發陽氣伏於地中地者人之脾也必用當歸和血少用黃柏以滋真陰如脾胃不足之證須少用升麻乃足陽明太陰引經之藥也使行陽道自脾胃中右遷少陽行春令生萬物之根蒂也更少加柴胡使諸經右遷生陰陽之氣以滋春之和氣也如脾虛緣心火亢盛而乘其土也其次肺氣受邪為熱所傷必須用黃耆最多甘草次之人參又次之三者皆甘溫之陽藥也脾始虛肺氣先絶故用黃耆之甘溫以益皮毛之氣而閉腠理不令自汗而損元氣也上喘氣短懶言語須用人參以補之心火乘脾須用炙甘草以瀉火熱而補脾胃中元氣甘草最少恐滋滿也若脾胃之急痛並脾胃大虛腹中急縮腹皮急縮者卻宜多用經曰急者緩之若從權必加升麻以引之恐左遷之邪堅盛卒不肯退反致項上及臀尻肉添而行陰道故引之以行陽道使清氣出地右遷而上行以和陰陽之氣也若中滿者去甘草咳甚者去人參口乾嗌乾者加乾葛如脾胃既虛不能升浮為陰火傷其生髮之氣榮血大虧榮氣伏於地中陰火熾盛日漸煎熬血氣虧少且心包與心主血血減則心無所養致使心亂而煩病名曰悗悗者心惑而煩悶不安也是由清氣不升濁氣不降清濁相干亂於胸中使周身血氣逆行而亂經云從下上者引而去之故當加辛溫甘溫之劑生陽陽生而陰長也或曰甘溫何能生血又非血藥也曰仲景之法血虛以人參補之陽旺則能生陰血也更加當歸和血又宜少加黃柏以救腎水蓋甘寒瀉熱火火減則心氣得平而安也如煩亂猶不能止少加黃連以去之蓋將補腎水使腎水旺而心火自降扶持地中陽氣也如氣浮心亂則以硃砂安神丸鎮固之得煩減勿再服以防瀉陽氣之反陷也如心下痞亦少加黃連氣亂於胸為清濁相干故以陳皮理之能助陽氣之升而散滯氣又助諸甘辛為用故長夏濕土客邪火旺可從權加蒼朮白朮澤瀉上下分消其濕熱之氣濕氣太勝主食不消化故食減不知穀味加炒曲以消之復加五味子麥門冬人參瀉火益肺氣助秋損也此三伏長夏正旺之時藥也學者詳之清暑湯節齊云伏暑發熱是火邪傷心元氣耗散汗大泄無氣以動其脈虛遲無力是熱邪傷榮也人參黃耆蜜炙麥門冬去心白芍藥陳皮白茯苓各一錢白朮一錢二分黃連炒甘草各五分香薷知母各七分黃柏三分上銼加生薑三片水一鍾半煎七分食前溫服途中消暑飲夏暑若在途中常服壯元氣消熱驅暑免中暑霍亂泄瀉痢疾等證人參一錢二分白朮一錢五分白茯苓白芍藥炒麥門冬去心各一錢陳皮七分甘草炙五分知母炒香薷各七分五味子十粒黃芩炒三分上銼加生薑三片水一鍾半煎七分食前溫服人參益氣湯治暑熱傷氣四肢困倦嗜臥兩手指麻木黃耆蜜炙甘草炙各二錢半人參一錢半白芍藥一錢五味子二十個升麻七分柴胡八分上㕮咀作一服用水二鍾煎八分不拘時服驅暑建中湯治傷暑汗大出不止甚則真元耗散宜用此收其汗黃耆一錢半人參白朮白茯苓白芍藥當歸香薷各一錢白扁豆陳皮各八分木瓜七分甘草炙五分桂枝四分上銼水二鍾棗二枚煎八分服此即十味香薷飲去厚朴加歸芍桂枝也黃耆湯治中暍脈弦細芤遲人參黃耆白朮甘草茯苓芍藥各等分上㕮咀每服三錢水一大盞加生薑三片煎六分去渣溫服清肺生脈飲治暑入肺咳嗽脾胃虛弱氣喘氣促黃耆二錢人參麥門冬當歸生地黃各五分五味子十粒上銼水煎服治暑傷脾胃方消暑十全散治伏暑胃氣不和心腹滿痛香薷白扁豆炒厚朴薑製甘草炙白朮茯苓紫蘇木瓜藿香檀香各一錢上㕮咀作一服加生薑三片水煎食遠服六和湯治心脾不調氣不升降霍亂轉筋嘔吐泄瀉寒熱交作痰喘咳嗽胃脘痞滿頭目昏痛肢體浮腫嗜臥倦怠小便赤澀並傷寒陰陽不分冒暑伏熱煩悶或成痢疾中酒煩渴畏食並皆治之縮砂半夏湯泡七次杏仁去皮尖人參藿香白扁豆炒赤茯苓香薷厚朴薑製木瓜各一錢甘草炙五分上㕮咀作一服水二鍾生薑三片棗一枚煎至一鍾溫服不拘時蔭按夫六和者和六腑也脾胃者六腑之總司故凡六腑不和之病先於脾胃調之脾胃一治則水精四布五經並行雖百骸九竅皆大和矣況六腑乎縮脾散消暑氣除煩渴止霍亂吐瀉和脾養胃一云夏月伏熱為酒所傷者此方主之砂仁草果烏梅肉各二錢甘草炙一錢白扁豆炒乾葛各一錢半上㕮咀作一服加生薑五片水煎服一方沉冷服香薷縮脾飲驅暑和中除煩止渴縮砂仁草果仁烏梅肉香薷甘草炒各一兩半白乾葛白扁豆各一兩炒上銼每服三錢加生薑五片水煎微溫服五聖湯治暑病嘔惡每遇夏月不進飲食疲倦少力見日色則頭昏痛噁心多睡貫衆黃連吳茱萸湯泡七次茯苓甘草炙各半兩上㕮咀分二服每服用水二碗煎取一碗去渣放冷候日午時先取香熟甜瓜一枚切去皮作十二片先嚼瓜一片呷藥一二呷送下了再如前嚼呷看吃得幾片以藥汁盡為度不損脾胃不動臟腑須是覺大煩時服之清暑丸治伏暑引飲脾胃不和半夏一斤生甘草茯苓各半斤上為末薑汁煮糊為丸如桐子大每服五十丸熟湯下香薷丸治大人小兒傷暑伏熱燥渴瞀悶頭目昏眩胸膈煩滿嘔噦噁心口苦舌乾肢體困倦不思飲食霍亂吐利轉筋並宜服之香薷去根一兩乾木瓜紫蘇去粗梗藿香茯神去木各五錢檀香丁香甘草炙各二錢半上為細末煉蜜丸如雞頭實大每服一丸至二丸細嚼溫酒下或新汲水化下亦得小兒每服半丸清暑化痰湯治傷暑心下痞悶此暑動其痰也香薷一錢五分黃連白扁豆炒枳實厚朴薑汁炒橘紅半夏茯苓各一錢甘草五分上加生薑三片水煎食遠服治暑傷生冷方大順散治冒暑伏熱引飲過多脾胃受濕水穀不分清濁相干陰陽氣逆霍亂嘔吐臟腑不調蔭按此非治暑乃治暑月飲冷受傷之脾胃爾若非飲冷致病勿執方以治乾薑肉桂杏仁炒各四兩甘草三兩上先將甘草用白蜜炒次入乾薑卻下杏仁同炒共為末每服二三錢白湯調下冷香飲子治老人虛人伏暑煩躁引飲無度噁心疲倦服涼藥不得者草果仁五錢附子炮去皮臍橘紅各三錢甘草炙一錢半上㕮咀作一服加生薑三片水煎沉冷不拘時服冷香湯治夏秋傷暑引飲過食生冷脾胃不和或成霍亂之證良薑檀香附子甘草炙各二兩丁香一錢川薑三分草豆蔻去殼五個上為末每服二錢以水二鍾煎二沸貯瓶內沉井底待冷取服大能消水止渴益胃湯治夏秋暑熱過飲食冷物茶水傷其內又過取涼風傷其外以致惡寒發熱胸膈飽悶飲食不進或兼嘔吐泄瀉此內外俱傷寒冷也人參乾薑炒紫色厚朴姜水炒陳皮羌活枳實白茯苓各一錢白朮一錢半甘草炙五分上銼加生薑三片水二盞煎七分食前溫服桂苓丸治冒暑煩渴飲水過多心腹脹滿小便赤少肉桂去皮赤茯苓去皮各五兩上為細末煉蜜丸每兩作十丸細嚼白湯冷水任下每服一丸二氣丹治伏暑傷冷二氣交錯中脘痞悶或頭痛惡心並皆治之硝石硫磺各等分上二味為末銀器內文武火炒令鵝黃色再碾細用糯米煮糊為丸如梧桐子大每服四十丸新汲水下治暑兼風寒方二香散治四時感冒寒暑嘔惡泄瀉腹痛瘴氣飲冷當風頭疼身熱傷食不化及南方風土暑月傷風傷寒悉以此藥解表發散香薷香附各二錢蒼朮陳皮紫蘇各一錢厚朴薑汁炒白扁豆炒甘草各五分上銼散薑蔥煎服加木瓜尤妙胃風湯治大人小兒飲食必乘風涼以致風冷乘虛客於腸胃食飲不下形瘦腹大水穀泄瀉腹脅脹痛惡風頭痛多汗及腸胃濕毒利如豆汁下瘀血亦看挾證加減人參白朮茯苓當歸川芎白芍藥各一錢肉桂去皮五分上銼加粟米一撮水煎不拘時服羌活香薷飲治卒中昏冒倒僕角弓反張不省人事手足或發搐搦此為暑風黃連香薷飲方見前一方加羌活上銼水煎服治暑暍變證方九似丸治伏暑暍變生諸證頭疼壯熱似傷寒寒熱往來似瘧疾翻胃吐食似膈氣大便下血似腸風小便不利似淋瀝飲水無度似消渴四肢困倦似虛勞眼睛黃赤似酒疸遍身黃腫似食黃舶上塊子硫黃元精石滑石甘草炙石膏煅河水浸一宿白礬盆硝各半兩寒食麵一兩上為細末滴水丸如彈子大每服一丸用熟水一呷許浸透其藥然後入薑汁蜜各少許先嚼芝麻一捻咽下無時治注夏方加減補中益氣湯治注夏屬陰虛元氣不足夏初春末頭疼腳軟飲食少體熱者黃耆人參白朮甘草炙陳皮當歸芍藥黃柏麥門冬去心五味子上銼水煎空心溫服挾痰加半夏薑汁黃耆人參湯治脾胃虛弱必上焦之氣不足遇夏天氣熱甚損傷元氣怠惰嗜臥四肢不收精神不足兩腳痿軟遇早晚寒厥日高之後陽氣將旺復熱如火此乃陰陽氣血俱不足而天氣之熱助本病也庚大腸辛肺金為熱所乘而作當先助元氣治庚辛之不足此湯主之黃耆一錢如自汗過多加一錢人參去蘆五分甘草炙二分白朮五分蒼朮半錢無汗一錢橘皮不去白二分黃柏酒洗三分神麯炒三分五味子九粒麥門冬去心二分歸身酒洗二分升麻六分上㕮咀作一服水二盞煎至一盞去渣稍熱食遠或空心服之忌酒濕面大料之物及過食冷物如心下痞悶加黃連二三分如胃脘當心痛減大寒藥加草豆蔻仁五分如脅下痛或縮急加柴胡二三分如頭痛目中溜火加黃連二三分川芎三分如頭目不清上壅上熱加蔓荊子三分藁本二分細辛一分川芎三分生地黃二分如氣短精神少夢寐間困乏無力加五味子九粒如大便澀滯隔一二日不見者致食少食不下血少血中伏火而不得潤也加當歸身生地黃各五分桃仁三個去皮尖另研麻子仁另研泥五分如大便通行所加之藥勿再服如大便又不快利勿用別藥少加大黃煨半錢如又不利者非血結血祕而不通也是熱則生風其病人必顯風證血藥不可復加止常服黃耆人參湯藥只用羌活防風各半兩二味㕮咀以水四盞煎至一盞去渣空心服之大便必大走也一服便止如胸中氣滯加青皮並去白陳皮倍之去其邪氣此病本元氣不足惟當補元氣不當瀉之如氣滯太甚或補藥太過或人心下有憂滯鬱結之事更加木香砂仁白豆蔻仁各二分如腹痛不惡寒者加白芍藥半錢黃芩二分卻減五味子參歸益元湯治注夏病人參五分白茯苓麥門冬去心白芍藥熟地黃各一錢陳皮黃柏酒炒知母酒炒各七分五味子十粒甘草炙三分上銼一劑加棗一枚烏梅一個炒米一撮水煎服飽悶加砂仁白豆蔻噁心加烏梅蓮肉炒米噦加竹茹煩躁加辰砂酸棗仁竹茹瀉加炒白朮山藥砂仁烏梅去熟地黃知母黃柏小水短少加木通山梔胃脘不開不思飲食加厚朴白豆蔻益智砂仁蓮肉去熟地黃知母黃柏腰痛加杜仲破故紙茴香腿痠無力加牛膝杜仲皮焦加地骨皮頭目眩暈加川芎虛汗加黃耆白朮酸棗仁夢遺加牡蠣山藥辰砂椿根皮虛損煩熱加辰砂酸棗仁竹茹口苦舌乾加山梔烏梅乾葛生脈散生津止渴夏月宜常服之以代茶湯人參麥門冬去心各三錢五味子十五粒上銼水煎服夏月加黃耆甘草令人氣力湧出一方加黃耆黃柏一方加白朮東垣曰孫真人云五月常服五味子是瀉丙火補庚金大腸益五臟之元氣聖人立法夏月宜補者補天元之真氣非補熱火也令人夏食寒是也為熱傷元氣以人參麥門冬五味子生脈脈者元氣也人參之甘補元氣瀉熱火也麥門冬之苦寒補水之源而肅燥金也五味子之酸以瀉火補庚大腸與肺金也服參與五味子不得者白朮烏梅代之代茶湯健脾止渴夏月服之以代茶白朮一錢半麥門冬去心一錢上煎作湯代茶服此一盞可當茶三盞夏月吃茶水多必泄瀉白朮補脾燥濕麥門冬生津止渴也丹溪方治婦人患注夏手足痠軟而發熱白朮黃柏炒白芍藥陳皮當歸各一錢蒼朮五分甘草生三分上銼加生薑二片水煎服
