body:
  text: 卷四十八沉寒痼冷論周氏論曰痼冷者謂痼久而冷者也痼者固久也冷者寒之甚也人之臟腑稟受不同亦或將理失宜遂致偏勝故方中有痼冷積熱之説痼冷者中寒也其病多由真陽虛弱胃氣不實復啖生冷冰雪水酪諸寒之物或坐臥陰寒久濕之處日漸侵奪陽氣以致臟腑久痼而冷其為病也或手足冷逆或腹中久痛溏泄無度或腰腿重痛如坐水中或陰痿不舉寒精自出或久嘔吐不進飲食或自汗戰栗或大便洞泄小便頻數此皆痼冷之為病也治之宜溫補腎元健養脾胃祛寒邪固真氣使陽氣得復陰陽和平則無偏勝之患百疾斯愈矣酪音洛漿也乳汁作也或云凡脫陽證或因大吐大瀉之後四肢逆冷元氣不接人事不省或傷寒新瘥誤與女人交接其證小腹腎痛外腎搐縮面黑氣喘冷汗自出是名陽脫證須臾不救急用蔥尉法更灸氣海在臍下一寸五分關元在臍下二寸各五十壯內服薑附湯五積散之類然後可服黑錫丹尉音運毒尉謂毒病之處以藥尉貼也又火展帛也一曰火斗俗呼曰尉斗凡陽證身靜而重語言無聲氣少難以喘息目睛不了了口鼻氣冷水漿不入大小便不禁面上惡寒有如刀刮先用蔥尉法次用四逆湯治之可也蔭按李氏曰人身真陽耗散脾胃虛弱加以食啖生冷嗜欲過度以致臟腑停寒不散謂之沉寒積冷不解謂之痼冷宜十全大補湯鹿茸大補湯加薑桂雄附以滋氣血補暖下元若原只因生冷傷脾者四柱散附子理中湯補真丸專補脾胃可也又因陰虛內熱因傷冷藥及將息失宜變成寒中全以養脾為主只理中丸二神效濟丹去白芍或四物湯去芍藥合理中湯或暴下或久瀉或吐瀉俱發宜古半附湯附子理中湯沉香蓽澄茄丸遺精金鎖正元丹究源心腎丸硫苓丸腦髓寒者三五七散四肢冷者古薑附湯古桂附湯血虛冷者古茸附湯遍身冷昏暈者三建湯順元散心腹絞痛甚者椒附丸復陽丹挾外感者正氣補虛湯金液丹黑錫丹養氣丹返陰丹盡皆金石悍劑陰臟性緩漸服回陽即止猛進常服恐水枯火燥元陽脫矣陽臟性急者禁服古以三建湯治心經之元陽虛者責其無火也大補陰丸治腎經之真陰虛者責其無水也蓋人之所藉以生者陰陽之氣耳不善調攝偏熱偏寒病未甚至治之不難若夫積熱始而涼和次而寒取寒取不愈則因熱而從之從之不愈則技窮矣由是苦寒頻歲而弗停沉寒始而溫和次而熱取熱取不愈則因寒而從之從之不愈則技窮矣由是辛熱比年而弗止殊不知以寒治熱而熱不衰者由於真水之不足也以熱治寒而寒不衰者由於真火之不足也不知水火不足泛以寒涼藥治非惟臟腑習熟藥反見化於其病而有者弗去無者復至矣故取之陰所以益腎水之不足而制心火之有餘也取之陽所以益心火之不足以制腎水之有餘也火之原者陽氣之根水之主者陰氣之根非謂火為心而原為肝水為腎而主為肺也此太僕達至理之妙也又積熱用苦寒藥必薑汁酒製沉寒用熱藥如附子必用童便蜜制蓋寒因熱用熱因寒用恐相違逆故也治陽虛痼冷方三建湯治陽虛寒邪外攻手足厥冷六脈沉微二便滑數川烏附子天雄已上俱炮去臍各三錢上作一服加生薑十片水煎服或入麝少許上焦陽弱倍天雄下部陰痿倍附子自汗加肉桂小麥氣逆加木香或沉香名順元散胃冷加丁香胡椒名丁胡三建湯四柱散治真陽耗散耳鳴頭暈臍腹冷痛滑泄臟寒附子木香茯苓人參各等分上薑棗煎入鹽少許參附湯治陽虛氣弱氣短氣喘自汗盜汗頭眩等證人參五錢附子炮三錢上作一服加生薑五片水煎服耆附湯治氣虛自汗體倦黃耆蜜炙附子炮各等分上加生薑煎服薑附湯治體中寒厥冷強直失音口噤吐沫昏不知人或陰盛發燥及臍腹冷痛霍亂轉筋一切虛寒並治乾薑炮附子炮各等分上水煎服桂附湯治自汗漏不止桂附子炮各等分上入薑棗煎服沉附湯治上盛下虛氣不升降陰陽不和胸膈痞滿飲食不進肢節倦痛沉香一錢半附子炮三錢上作一服加生薑五片水煎食前服茸附湯治精血虛耗潮汗驚悸鹿茸去毛酒炙附子炮去皮臍各四錢接真湯治陰病手足厥冷臍腹疼痛真氣不足虛憊欲絶沉香丁香各二錢麝香一錢附子炮去皮臍四錢上加生薑七片棗二枚水煎空心服為末每服二錢亦可附子理中丸治脾胃冷弱心腹疼痛嘔吐泄利霍亂轉筋體冷微汗手足厥寒心下逆滿腹中雷鳴嘔吐不止飲食不進一切沉寒痼冷並皆治之附子炮去皮臍人參去蘆乾薑炮白朮甘草炙各三錢上為細末煉蜜丸每兩作十丸每服一丸用水一鍾化開煎至七分空心熱服沉香蓽澄茄丸治內挾積冷臍腹弦急痛引腰背面色痿黃臟腑自利小便滑數及小腸一切氣痛並治附子炮去皮臍蓽澄茄沉香胡蘆巴炒肉桂補骨脂炒茴香炒巴戟去心木香川楝子去核各四兩桃仁去皮尖雙仁者二兩川烏炮去皮臍二兩上為末麵糊丸如桐子大每三十丸空心鹽湯下或煎服亦可附子茴香散治氣虛積冷心腹絞痛附子炮去皮臍三錢茴香炒肉豆蔻煨乾薑炮人參白朮木香白茯苓各一錢丁香甘草炙各五分上作一服水煎入鹽少許空心服保元丹治老弱諸沉寒痼冷小便滑數大便時泄腰腿臍腹疼痛困倦瘦虛食減附子炮去皮臍白朮山藥肉豆蔻赤石脂乾薑炮各一兩肉桂五錢上為細末麵糊為丸如桐子大每服一二十丸空心溫酒送下金鎖正元丹治元臟虛冷真氣不足胸脅痞脹呼吸短氣四肢倦怠腰膝痠疼目暗耳鳴心忡盜汗遺精白濁一切虛損之證及水穀不消嘔逆噁心五倍子茯苓各八錢巴戟胡蘆巴肉蓯蓉各一兩六錢補骨脂一兩硃砂龍骨各二錢上為細末酒糊丸如桐子大每服二十丸空心溫酒鹽湯任下椒附丸治下元不足內挾積冷臍腹拘急舉動乏力小便頻數夜多盜汗附子檳榔各五錢陳皮牽牛五味子菖蒲川椒乾薑各一兩上銼碎用米醋於瓷器內文武火煮乾焙為末醋糊丸如梧子大每三十丸空心鹽酒下黑豆酒散五臟結積內寒黑豆不拘多少鍋內炒熟以好酒淬之就以碗蓋勿令泄氣候溫飲酒大效黑錫丹治元臟虛冷真陽不固三焦不和上熱下冷耳內虛鳴腰背疼痛心氣虛乏飲食無味膀胱久冷夜多小便婦人月事愆期血海久冷赤白帶下及陰毒傷寒四肢厥冷不省人事急用棗湯吞一二百粒即便回陽此藥大能調治榮衛升降陰陽補虛損益元陽返陰茴香炒附子制葫蘆巴破故紙炒巴戟川楝子各一兩肉豆蔻煨沉香木香不見火桂心各三兩錫硫砂用黑錫溶去渣梳黃溶化水浸各二兩卻將錫再溶化漸入硫黃俟結成片傾地上去火毒研至無聲為度一方有陽起石二兩上為末同研勻酒煮麵糊為丸如桐子大陰乾以布袋擦令光瑩每服三四十丸空心薑鹽湯或棗湯送下婦人艾醋湯下一切冷痰鹽酒下年高有客熱者服之效或加蓯蓉牛膝白朮丁香名接氣丹治真元虛憊靈砂丹大治諸虛痼冷厥逆如神水銀三兩硫黃一兩二味煉成者上研細糯米糊為丸如麻子大每服五七丸至十五丸空心人參棗湯或鹽湯下疝氣偏墜外腎腫疼茴香酒下虛勞喘嗽生薑烏梅蘇梗煎湯下腰腹滿痛莪朮煎湯下盜汗溺多煅牡蠣入鹽煎湯下痎瘧不已桃柳枝湯下吐逆反胃丁香藿香煎湯下白濁遺精白茯苓煎湯下中風痰厥面青木香磨湯研灌走注風遍身痛蔥白酒下腳痛木瓜煎湯下氣滯生薑陳皮煎湯下婦人血氣痛玄胡索五靈脂酒醋各半盞煎湯下小兒慢驚沉困胃虛神脫人參丁香煎湯下養正丹升降水火助陽接真治飽逆反胃痰結頭暈腰疼腹痛霍亂吐瀉黑錫丹頭二兩水銀一兩硃砂末一兩上先將黑錫就火微溶入水銀頻攪勿令青煙起煙起便走了水銀又入硃砂末炒令十分勻和即放地上候冷為末糯米糊丸緑豆大每三十丸空心鹽湯下來復丹此藥配類二氣均調陰陽奪天地衝和之氣乃水火既濟之方可冷可熱可緩可急善治榮衛不調心腎不交氣不升降上實下虛散腰腎陰濕止腹脅冷痛及一切氣閉痰厥中暑霍亂吐瀉神效不問男女老幼危急之證但有胃氣無不獲安舶上硫黃用明透不加小石者硝石各一兩同硫黃為末入銚內微火溫溫炒用柳木篦不住手攪令陰陽相入再研細大陰玄精石一兩另碾飛青皮去穰陳皮去白五靈脂須擇五臺山者研細用水澄去砂石曬乾各二兩上將五靈脂青皮陳皮為細末入玄精石末及硫黃硝石末拌勻以好醋煮麵糊為丸如豌豆大每服三十粒空心米飲下甚者五十粒小兒三五粒或一粒小兒慢驚風或吐利不止變成虛風搐搦者非風也胃氣欲絶故也米飲下若老人伏暑迷悶紫蘇湯下婦人産後血迷上搶悶絶惡露不止及赤白帶下並用醋湯下養氣丹治諸虛百損真陽不固上實下虛氣不升降或咳嗽喘促一切體弱氣虛及婦人血海冷憊等證禹餘糧紫石英磁石各半斤赤石脂代赭石各一斤以上五味各以水研挹其清者置紙上以竹篩盛之候乾各用瓦罐收貯鹽泥固濟陰於以炭五十斤分作五處煅此五藥以灰火盡之火盡再煅如此三次埋地內西日去火毒取出再研肉蓯蓉一兩半附子二兩茴香丁香木香破故紙肉桂巴戟山藥肉豆蔻鍾乳粉鹿茸當歸沉香白茯苓遠志沒藥陽起石五靈脂乳香硃砂各一兩上為細末和前研勻糯米糊調每兩作五十丸陰乾入布袋內擦光每二十丸空心溫酒薑鹽湯任下婦人艾醋湯下金液丹治吐利日久脾胃虛損手足厥逆精神昏睡露睛口鼻氣冷欲成慢驚或身冷脈微自汗小便不禁等證皆效硫黃不拘多少上將鐵杓熬溶傾入井水或麻油內後用桑柴灰淋溓炆七八遍換水去紅暈為末蒸餅丸如桐子大每服二十丸空心米飲下傷寒陰證不拘丸數淋音林以水沃也溓音濂漬也炆音文溫也聚火無炎者也二氣散治伏暑傷冷中脘痞結或嘔或瀉硫黃硝石各等分上為末同炒黃色研細糯米糊丸如桐子大每服四十丸井水下治女色陰證方三仙散治陰證大附子炮去皮臍官桂乾薑炮各等分上共為末每服三錢滾酒調服神效固陽膏治因女色成陰證生白礬三錢黃丹二錢乾薑五錢母丁香十粒胡椒十五粒上為細末醋調得所男左女右攤在手掌中覆在臍上被蓋少頃但得汗出即愈有起死回生之功又方治陰證老桑樹皮燒存性牡蠣火煅乾薑胡椒各錢膽礬二錢麝香少許上為細末用陰陽唾調塗於兩手心內夾腿腋少時遍身汗出即瘥又方治陰證胡椒三十個黃丹一兩乾薑一塊上三味為末醋調塗男左女右手心內合在小便上一時蓋被汗出即已回春散治陰冷如神白礬一錢黃丹八分胡椒二分焰硝一分上四味用釅醋調和攤男左女右手心內合陰上汗出即愈助陽散治急冷陰乾薑一兩牡蠣一兩上為細末以火酒調稠擦手上男子用雙手揉外腎即愈女子以男子手擦藥急按兩乳仍揉擦熱汗出則愈祕方治陰證極效芥菜子七錢乾薑三錢上為末水調作一餅貼臍上手帕縛住上放鹽以尉斗尉之數次汗出為度又方治冷陰枯白礬百草霜各一錢上共為細末煉蜜丸每服一丸黃酒送下又方治陰證腹痛面青甚者鴿子糞一大抄研末用極熱酒衝入攪勻少澄飲之去渣頓服灸法治因女色成陰證小腹急痛不可忍命在須臾者男左女右中指灸一炷又臍下三寸名關元穴灸七炷厚被蓋眠通身汗出即愈又法治陰證腹痛灸小指外側上紋尖艾炷如小豆大三壯男灸左女灸右又法治陰證冷極熱藥救不回者手足涼冷腎囊縮入牙關緊急死在須臾用大艾炷灸臍中預將蒜搗汁擦臍上後放艾多灸之其臍上下左右各開八分四分用小艾炷灸至五壯為度如玉莖縮入於內速令人捉定急將蘄艾丸如緑豆大在龜頭馬口灸二壯其莖即出仍服附子理中湯即效蔥尉法治陰證用蔥白大握如茶盞大用紙卷緊卻以快刀切齊一指厚片安於臍中以熱尉斗尉之待汗出為度一片未效再切一片尉之服後藥胡椒五錢滑石煅七次五錢麝香一錢上為末酒調服之神效
