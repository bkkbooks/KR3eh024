body:
  text: 卷七十五腰痛論選要曰夫腰者腎之外候一身所恃以轉移闔闢者也蓋諸經皆貫於腎而絡於腰脊腎氣一虛腰必痛矣腰痛有五一曰陽氣不足少陰腎衰是以腰痛二曰風痹風寒濕著腰而痛三曰腎虛勞役傷腎而痛四曰墜墮險地傷腰而痛五曰寢臥濕地而痛又有三因蓋太陽少陽多中寒少陰厥陰多中風陽明太陰多中濕此六經腰痛者為外因也若夫失志傷腎鬱怒傷肝憂思傷脾此腰痛為內因也墜墮險地傷腰而痛為不外不內也從其所由不過汗下補瀉之法以療之耳東垣曰六元正紀論云太陽所至為腰痛又云巨陽即太陽也虛則頭項腰背痛足太陽膀胱之脈所過還出別下項循肩膊內挾脊抵腰中故為病項如拔挾脊痛腰似折髀不可以曲是經氣虛則邪客之痛病生矣夫邪者是風熱濕燥寒皆能為病大抵寒濕多而風熱少然有房室勞傷腎虛腰痛者是陽氣虛弱不能運動故也經云腰者腎之府轉搖不能腎將憊矣宜腎氣丸茴香丸之類以補陽之不足也膏粱之人久服湯藥醉以入房損其真氣則腎氣熱腎氣熱則腰脊痛而不能舉久則髓減骨枯發為骨痿宜六味地黃丸滋腎丸封髓丸之類以補陰之不足也靈樞經云腰痛上寒取足太陰陽明上熱取足厥陰不可俯仰取足少陽蓋足之三陽從頭走足足之三陰從足走腹經所過處皆能為痛治之者當審其何經所過分野循其空穴而刺之審何寒熱而藥之假令足太陽令人腰痛引項脊尻背如重狀刺其郤中太陽二經出血余皆仿此彼執一方治諸腰痛者固不通矣髀音俾股也郤音隙空也丹溪曰腰痛有腎虛有瘀血有濕熱有閃挫有痰積若脈大者腎虛用杜仲龜板黃柏知母枸杞五味之類為末豬脊髓和丸服脈澀者瘀血用補陰丸加桃仁紅花脈緩者濕熱用黃柏杜仲蒼朮川芎之類痰積作痛者二陳加南星半夏腰曲不能伸者針委中穴凡諸痛皆屬火不可用補氣藥亦不可峻用寒涼藥必用溫散之藥人有痛面上忽見紅點者多死又云腎著為病其體重腰冷如冰飲食如故腰重如物在腰治宜流濕兼用溫暖以散之久腰痛必用官桂以開之方止其腹脅痛亦可丹溪活套云凡因房勞辛苦而腰痛者四物湯加知母黃柏五味子杜仲之類吞補腎丸或大補陰丸因風寒濕流注經絡而作痛者二陳湯加麻黃蒼朮川芎防風羌活獨活之類因閃挫跌撲致死血流於本經而作痛者四物湯加桃仁紅花蘇木之類脈實人壯盛者大承氣湯加桂下之安有因醉飽入房太甚而酒食之積乘虛流入於本經致腰痛難以俯仰四物湯合二陳湯加麥蘖神麯杜仲黃柏官桂砂仁葛花桔梗之類戴云濕熱腰痛者遇天陰或久坐而發者是也腎虛者疼之不己者是也瘀血者日輕夜重者是也李氏曰腰新痛宜疏外邪清濕熱久則補腎兼理氣血腰者腎之候一身所恃以轉移闔闢然諸經貫於腎而絡於腰脊雖外感內傷種種不同必腎虛而後邪能湊之故不可純用涼藥亦不可純用參耆補氣痛甚面上忽見紅點人中黑者死傷寒腰痛必依六經證用藥尋常感冒暴痛不能轉側如寒傷腎者遇天寒發連背拘攣脈沉弦緊五積散加吳茱萸杜仲桃仁痛甚加牽牛少許肢厥者古薑附湯連肩背者通氣防風湯摩腰丹屈伸導法久處卑濕雨露浸淫為濕所著腰重如石冷如冰喜熱物尉不渴便利飲食如故腎著湯加附子停水沉重小便不利五苓散滲濕湯腰重痛單茴香散久不已單牛膝浸酒服青娥丸加萆薢最妙濕兼熱者長夏暑濕相搏因膏粱成濕熱者亦同實者二炒蒼柏散加柴胡防風煎服虛者七味蒼柏散溺赤者五苓散清燥湯健步丸有諸藥不效者用甘遂牽牛大瀉其濕而止乃濕熱甚也古方有以甘遂末三錢和豬腰子煨熟空心酒下風傷腎腰痛左右無常牽連腳膝強急不可俯仰以顧風熱敗毒散加杜仲二便閉者甘豆湯加續斷天麻風虛小續命湯加桃仁或烏藥順氣散加五加皮風挾寒濕者五積交加散用全蠍炒過去蠍獨活寄生湯羌活勝濕湯加味龍虎散或單威靈仙為末酒調服內傷失志則心血不旺不能攝養筋脈腰間鬱郁膨脹不伸令人虛羸面黑不能久立遠行七氣湯倍茯苓加沉香乳香少許虛者當心腎俱補人參養榮湯加杜仲牛膝五臟皆取氣於谷脾者腎之倉廩也憂思傷脾則胃氣不行腰痛連腹脅脹滿肉痹不仁沉香降氣湯木香勻氣散飲食難化者異香散宗筋聚於陰器肝者腎之同系也怒傷肝則諸筋縱弛腰痛連脅聚香飲子調肝散七情挾外感有表者人參順氣散烏藥順氣散枳甘散加蔥白通用七香丸青木香丸立安丸濕痰流注經絡背脅疼痛脈滑者二陳湯加南星蒼朮黃柏風加麻黃防風羌活寒加薑桂附子控涎丹大便泄者龜樗丸食積因醉飽入房濕熱乘虛入腎以致腰痛難以俯仰四物二陳湯加麥芽神麯葛花砂仁杜仲黃柏官桂枳梗痛甚者速效散積聚者加味龍虎散濕熱者七味蒼柏散清燥湯閃挫跌撲墜墮以致血瘀腰痛日輕夜重宜行血順氣實者桃仁承氣湯或大黃生薑等分水浸一宿五鼓服之久者補陰丸加桃仁紅花或五積散去麻黃加茴香木香檳榔連脅痛者復元通聖散加木香勞力傷腎者黃耆建中湯加當歸杜仲或四物湯加知母黃柏五味子杜仲吞大補陰丸熱者獨活湯勞心者夢授天王補心丹杜仲煎湯下房欲傷腎精血不足養筋陰虛悠悠痛不能舉者杜仲丸補陰丸陽虛腰軟不能運用者九味安腎丸加杜仲鹿茸百倍丸八味丸加鹿茸木瓜當歸續斷或煨腎丸豬腎酒脈法脈經曰尺脈沉腰背痛凡腰痛時時失精飲食減少其脈沉滑而遲此為可治腰痛之脈皆沉弦沉弦而緊者為寒沉弦而浮者為風沉弦而濡細者為濕沉弦而實者為閃挫脈訣舉要曰腰痛之脈皆沉而弦兼浮者風兼緊者寒濡細皆濕實則閃挫指下既明治斯不忒丹溪曰脈必沉而弦沉為滯弦為虛澀者是瘀血緩者是濕滑者浮者是痰大者是腎虛也治寒濕風毒腰痛方五積散治寒濕傷於腎經腰痛不可俯仰蒼朮川芎白芷麻黃官桂乾薑炮當歸芍藥陳皮半夏茯苓厚朴枳殼桔梗一方云去此味甘草炙各五分上銼加生薑三片水煎服兼氣加吳茱萸婦人血氣加桃仁獨活寄生湯治因腎虛坐臥冷濕當風所得以致腰膝攣拳掣痛不可屈伸獨活桑寄生杜仲薑汁炒去絲牛膝酒浸當歸酒洗芍藥煨各一錢熟地砂仁炒川芎秦艽人參茯苓防風細辛各五分桂心甘草炙各四分上銼加生薑五片水煎食前服如無桑寄生以川續斷代防風湯治傷寒後腰痛或皮肉𤸷痹腿膝疼痛行步艱難不可俯仰𤸷音頑痹也手足麻痹也防風羌活附子炮去皮臍當歸芍藥芎藭續斷各一錢麻黃去節桂枝去皮杜仲炙各七分半牛膝五加皮丹參各五分上㕮咀加生薑三片水煎食前服川芎肉桂湯治露宿寒濕之地腰痛不能轉側兩脅搐急作痛此血絡中有凝血也此藥主之羌活一錢半蒼朮川芎當歸梢肉桂柴胡甘草炙各一錢獨活神麯炒各五分防風漢防己酒浸各二分桃仁五個去皮尖研如泥上㕮咀水酒煎去渣食遠熱服腎著湯治居處卑濕或雨露所襲濕傷腎經腰重冷痛如帶五千錢冷如水洗白朮二錢半乾薑茯苓各一錢半甘草炙五分上㕮咀水煎服朮附湯治濕傷腎經腰重冷痛小便自利白朮附子炮去皮臍各一兩杜仲去皮半兩上㕮咀每服四錢加生薑七片水煎空心溫服麻黃蒼朮湯治寒濕所客身體沉重腰痛面色痿黃不澤麻黃澤瀉神麯炒陳皮茯苓各一錢黃耆三錢蒼朮米泔浸甘草炙各二錢半夏薑製草豆蔻桂枝豬苓各五分杏仁去皮尖十個上銼水煎食前服牽牛丸治冷氣流注腰痛不可俯仰延胡索黑牽牛破故紙各二兩上為末研煨蒜為丸如桐子大每服三十丸蔥酒鹽湯任下加味龍虎散治積聚癥瘕內傷生冷外中風寒腰腳膝脛曲折攣拳筋骨疼痛經年不能行步如神蒼朮草烏黑附子各二錢全蠍五錢天麻三錢上為末每服一錢淋黑豆酒調摩腰丹治寒濕腰痛附子尖烏頭尖南星各二錢半硃砂乾薑各一錢雄黃樟腦丁香各一錢半麝香五粒上為末蜜丸如圓眼大每一丸薑汁化開如粥厚烘熱置掌中摩腰上令盡黏著肉烘綿衣縛腰熱如火間三日用一丸妙或加吳茱萸桂枝牛膝酒傳信治腎傷於風毒攻腰膝痛不可忍者牛膝川芎地骨皮五加皮薏苡仁羌活甘草各一兩海桐皮二兩生地黃十兩上並淨洗用絹袋盛藥入無灰酒二斗內各浸二七日夏一七每服一盞日用三四次常令酒氣不絶一方加炒杜仲威靈仙散治腰腳痛威靈仙生用不拘多少上為末每服二三錢食前溫酒調下速效散治男婦腰痛不可忍川楝肉用巴豆五粒去殼同炒赤去豆茴香鹽炒去鹽破故紙炒各一兩上為末每服一錢空心熱酒調服神仙透骨丹治大人小兒腰腿痛不可忍小茴香胡椒炒破故紙各二兩杜仲炒白牽牛黑牽牛各一兩川烏炒三兩上為細末酒糊丸如桐子大每服三五十丸白湯下黑醜丸治腰痛黑牽牛四兩半生半炒上研取頭未水丸桐子大硫黃為衣每服三十丸空心鹽酒送下四服即止治濕熱腰痛方七味蒼柏散治濕熱腰痛動止重滯不能轉側蒼朮米泔浸炒黃柏酒炒杜仲鹽酒炒去絲破故紙炒川芎當歸酒洗白朮各一錢上銼水煎空心服一方無當歸故紙蒼朮湯治濕熱腰腿疼痛蒼朮三錢柴胡二錢防風黃柏各一錢上銼水煎服清濕散治濕熱腰胯作痛蒼朮米泔浸炒黃柏鹽水炒各一錢五分澤瀉白芍藥煨杜仲牛膝酒洗木瓜威靈仙陳皮各一錢甘草三分上銼加生薑三片水煎食前服痛甚者加乳香沒藥各五分另研臨服入用獨活湯治因勞役得腰痛如折沉重如山獨活羌活防風肉桂大黃煨澤瀉各二錢半連翹當歸梢防己酒拌黃柏酒拌甘草炙各一錢桃仁二十五個上銼用水酒各一盞煎食前服羌活湯治腰膝無力沉重羌活三錢防風一錢半黃耆二錢知母二錢半蒼朮升麻獨活柴胡砂仁各一錢陳皮六分草豆蔻黃柏葛根生甘草炙甘草各五分上銼作二服水煎空心熱服除濕丹檳榔甘遂芍藥煨威靈仙澤瀉葶藶各二兩乳香沒藥各一兩大戟炒三兩陳皮四兩黑牽牛去頭末一兩上為末麵糊丸如桐子大每服三十丸空心燈草湯下瀉腎湯治腎實熱小腹脹滿腰背急強離解便黃舌煩四肢青黑耳聾夢泄等證急宜服此救之大黃一合用蜜器水浸一宿磁石八錢玄參細辛各四錢芒硝茯苓黃芩各三錢生地黃汁石菖蒲各五分甘草二錢上銼每服一兩以水二盞煎去渣下大黃更煮減一分去大黃下地黃汁煎一二沸下芒硝食前溫服治痰積腰痛方加味二陳湯治痰積腰痛脈滑者是也南星薑製半夏薑製各一錢半蒼朮米泔浸炒黃柏煨陳皮各一錢茯苓八分甘草五分上銼水煎空心服一方二陳湯加南星香附烏藥枳殼龜樗丸治濕痰腰痛大便泄龜板一兩樗白皮蒼朮滑石各五錢白芍藥香附子各四錢上為末粥丸服或加蒼朮威靈仙尤妙凡腔子裡氣須用些木香行氣治氣滯腰痛方人參順氣散治氣滯腰痛及感風寒頭痛鼻塞或諸風蜷痹眩暈喎斜人參川芎桔梗白朮白芷陳皮枳殼麻黃節烏藥白薑甘草各一錢上銼水煎服異香散治心腎不和腰痛僂傴腹脅膨脹飲食難化噫氣吞酸一切冷氣結聚腹中刺痛陳皮去白青皮去白各一錢半厚朴一錢蓬朮三稜益智仁石蓮肉甘草各五分上銼加薑棗鹽一撮水煎服七香丸治鬱悶憂思或閃挫跌撲一切氣滯腰痛丁香香附甘草各一兩二錢益智仁六錢甘松八錢莪朮砂仁各二錢上為末湯浸蒸餅丸如緑豆大每服三十丸米飲下調肝散治鬱怒傷肝發為腰痛半夏三錢辣桂木瓜當歸川芎牛膝細辛各二分石菖蒲酸棗仁各一分去油上銼加薑棗水煎服治瘀血腰痛方加減四物湯治瘀血腰痛日輕夜重脈澀者是也當歸酒洗一錢半芍藥酒炒杜仲鹽酒炒去絲各一錢川芎香附紅花酒洗各八分桃仁九個上銼水煎空心服加味四物湯治婦人瘀血腰痛當歸川芎芍藥炒熟地砂仁炒獨活續斷桑寄生小茴香炒各一錢桃仁十個紅花五分上銼水酒各一盞煎空心服調榮和絡湯治失力腰閃或跌撲瘀血凝滯及大便不通而腰痛者當歸桃仁大黃牛膝各二錢川芎赤芍藥紅花生地薑酒炒羌活各一錢桂枝三分上銼一劑水煎服地龍散治腰脊痛或打損傷或從高墜下惡血在太陽經令人腰脊痛或脛腨臂股中痛當歸梢二分中桂地龍各四分麻黃五分蘇木六分獨活黃柏鹽水炒甘草各一錢羌活二錢桃仁六個去皮尖上㕮咀水煎食遠服治閃挫腰痛方復元通氣散治閃挫腰脅氣滯疼痛並氣不宣通或成瘡癤舶上茴香炒川山甲蛤粉炒各二兩玄胡索白牽牛陳皮去白甘草各一兩南木香不見火一兩半上為末每服一錢食前熱酒調下病在上食後服如神湯治男子婦人腰痛並治閃挫腰痛不過三服平安玄胡索當歸桂心各等分一方有杜仲上為末每服二三錢溫酒調下立安散治氣滯腰痛並閃挫腰痛腎虛腰痛當歸官桂玄胡索炒杜仲薑汁炒小茴香炒各一兩木香五錢牽牛一兩半生半炒上為末每服二匙空心溫酒調下一方去牽牛以酒煎服菴䕡丸治墜墮閃肭氣血凝滯腰痛菴䕡子半兩沒藥二錢半乳香一錢半補骨脂炒威靈仙杜仲炒斷絲官桂不見火當歸酒浸各一兩上為末酒糊丸如桐子大每服七十丸空心鹽酒湯任下橘核散治腰痛諸般滯氣橘核乳香各五錢破故紙二兩山楂子玄胡索菴䕡子沒藥五加皮紅曲各一兩上為末酒調下二三分過街笑治閃腰痛木香一錢麝香三釐上為末吹鼻右傷吹左鼻左傷吹右鼻令病人手上下和之一方治腰痛青木香乳香各二錢上二味用酒浸飯上蒸乳香化開以酒調服治腎虛腰痛方補腎湯治一切腰痛當歸杜仲酒炒牛膝去蘆酒洗破故紙小茴香鹽酒炒玄胡索黃柏酒炒知母酒炒上銼加生薑水煎服青娥丸治腎虛腰痛常服壯筋補虛杜仲一斤去皮薑汁炒去絲破故紙一斤鹽水洗炒上為末用胡桃肉一百二十個湯浸去皮膜研為膏加煉蜜些少丸如桐子大每服五六十丸空心鹽湯下三因方有生薑十兩炒一方加萆薢一斤加味青娥丸專滋腎水壯陽益筋骨治腰膝足痛久服無不驗破故紙酒洗淨炒香川萆薢童便浸一宿杜仲薑汁炒斷絲牛膝去蘆黃柏鹽水炒知母酒炒各四兩胡桃肉湯泡去皮八兩另研膏上為細末春夏用糯米粥秋冬用煉蜜和勻石臼杵千餘下丸如桐子大每服五十丸至八十丸空心鹽湯鹽酒任下以乾物壓之立安丸一名續斷丸治五種腰痛常服溫補腎元壯健腰腳破故紙鹽水洗炒萆薢杜仲薑汁炒去絲各二兩牛膝酒浸乾木瓜續斷各一兩半上為細末煉蜜丸如桐子大每服五十丸空心溫酒下萆卑下也薢解也言性能治下部疾解下部毒也故名萆薢杜仲丸治腎虛腰痛動止軟弱脈大虛疼不已杜仲酥炙去絲龜板酥炙黃柏酒炒知母酒炒枸杞子五味子當歸酒洗芍藥黃耆破故紙炒各一兩上為末煉蜜同豬脊髓和丸如桐子大每服八十丸空心鹽湯下一方無當歸芍藥破故紙黃耆四味安腎丸治腎虛腰痛破故紙炒胡蘆巴炒茴香炒川楝子炒續斷各三兩桃仁杏仁各去皮尖山藥茯苓各二兩上為末煉蜜丸如桐子大每服五十丸空心鹽湯下五仙助腎丹八角茴香肉蓯蓉酒洗去甲破故紙杜仲青鹽末炒去絲青鹽各八分上為末用豬腰子一枚去筋膜切四片下相連夾藥末於片中以荷葉包裹外加濕紙慢火上炙熟空心酒下煨腎丸治腎虛腰痛杜仲三錢酒炒斷絲上為細末以豬腰子一個薄劈作五七塊以椒鹽醃去腥水撒藥末在內以荷葉包裹更加濕紙二三重外包微火煨熟食之無灰酒送下萆薢丸治腎損骨痿不能起床腰背腿皆痛萆薢杜仲炒去絲肉蓯蓉酒浸去甲菟絲子酒浸搗各等分上為末酒煮腰子搗爛為丸如桐子大每服五七十丸空心溫酒下溫腎散治腎經虛寒腰脊重痛四肢乏力面少顏色熟地黃洗焙一斤牛膝肉蓯蓉五味子巴戟甘草炙各八兩杜仲三兩茯神乾薑各五兩麥門冬去心八兩上為細末每服二錢空心溫酒調下屠尚書方治腰痛破故紙當歸巴戟胡蘆巴各五錢杜仲一兩酒炒桃仁四十九個乳香沒藥各三錢二味另研入上銼酒煎入乳香沒藥調熱服壯本丹治腎虛腰痛久則寒冷此藥壯筋骨補元陽利小水養丹田止腰痛之妙劑杜仲破故紙鹽水炒茴香各一兩肉蓯蓉酒洗巴戟酒浸去骨青鹽各五錢上用未將腰子劈開入藥在內縫住紙包煨熟每一個一服用溫酒送下杜仲酒治風冷傷腎腰痛不能屈伸並補腎虛杜仲一斤去粗皮用薑汁炒斷絲上為無灰好酒三升浸十日每服三四合四五服效一方為末溫酒調一錢空心服麋茸丸治腎虛腰痛不能轉側麋茸一兩鹿茸亦可菟絲子取末一兩舶上茴香半兩上為末以羊腎二對用酒煮爛去膜研如泥和丸如桐子大陰乾如羊腎少入酒糊佐之每服三五十丸溫酒或鹽湯下補腎丸治腎虛腰痛纍效烏藥葉側柏葉俱酒蒸曬乾上為末粥丸桐子大服補陰丸治陰虛性急腰痛者龜板黃柏知母側柏葉上為末地黃膏為丸無敵丸治腎虛腰痛川萆薢虎骨酥炙續斷酒浸一宿茴香狗脊當歸酒浸砂仁炒鹿茸各一兩杜仲炒去絲二兩菟絲子四兩酒浸為末地龍去土青鹽去土各七錢半穿山甲酥炙乳香各五錢沒藥二錢半上為末酒糊丸如桐子大每服五十丸空心鹽酒下補髓丹升降水火補益心腎強筋壯骨治腎虛腰痛杜仲去皮炒十兩補骨脂十兩用芝麻五兩同炒芝麻黑色無聲為度去麻不用沒藥一兩另研鹿茸二兩煉去皮酒炙上為末用胡桃肉三十個湯泡去皮杵為膏入面少許酒煮糊丸如桐子大每服一百丸溫酒鹽湯任下二至丸治老人虛弱腎氣傷損腰痛不可屈伸鹿角麋角鎊各二兩鹿茸酒蒸焙杜仲去皮炒斷絲補骨脂炒桂心不見火附子炮去皮臍各一兩青鹽五錢另研上為末酒糊丸如桐子大每服七十丸空心嚼胡桃肉鹽酒湯任下惡熱藥者去附子加肉蓯蓉一兩一方治五種腰痛狗脊萆薢菟絲子酒浸三日焙乾另研各一兩上為細末煉蜜丸如桐子大每服三十丸用萆薢二兩酒浸三日取酒服藥空心食前蔭按腰痛之證多由腎臟真陰衰虛或外風寒之郁遏或內濕熱之流注以致榮衛不通故作痛也若腎臟不虛則外邪不能襲內邪不能占榮衛周流何痛之有哉故安腎煨腎溫腎補腎萆薢二至諸丸皆散邪兼補腎臟真陰衰虛之要藥也
