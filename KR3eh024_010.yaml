body:
  text: 卷十內傷論內傷諸證與外感不同辨陰證陽證東垣曰甚哉陰陽之證不可不詳也遍觀內經所説變化百病其源皆由喜怒過度飲食失節寒溫不適勞役所傷而然夫元氣穀氣榮氣清氣衛氣生髮諸陽上升之氣此六者皆飲食入胃穀氣上行胃氣之異名其實一也既脾胃有傷則中氣不足中氣不足則六腑陽氣皆絶於外故經言五臟之氣已絶於外者是六腑之元氣病也氣傷臟乃病臟病則形乃應是五臟六腑真氣皆不足也惟陰火獨旺上乘陽分故榮衛失守諸病生焉其中變化皆由中氣不足乃生髮耳後有脾胃以受勞役之疾飲食又復失節耽病日久事息心安飽食太甚病乃大作概其外感風寒六淫客邪皆有餘之病當瀉不當補飲食失節中氣不足之病當補不當瀉舉世醫者皆以飲食失節勞役所傷中氣不足之證認作外感風寒有餘客邪之病重瀉其表使榮衛之氣外絶其死只在旬日之間所謂差之毫釐謬以千里可不詳辨乎按陰陽應象論云天之邪氣感則害人五臟是八益八為少陰之數八益者言陰長之由也之邪乃風邪傷人筋骨風從上受之風傷筋寒傷骨蓋有形之物受病也系在下焦肝腎是也肝腎者地之氣難經解云肝腎之氣已絶於內以其肝主筋腎主骨故風邪感則筋骨疼痛筋骨之絶則腎肝之本亦絶矣乃有餘之證也又云水穀之寒熱感則害人六腑是七損七為少陽之數七損者言陽消之漸也之病乃內傷飲食也黃帝針經解云適飲食不節勞役所傷濕從下受之謂脾胃之氣不足而反下行極則衝脈之火逆而上是無形質之元氣受病也系在上焦心肺是也心肺者天之氣故難經解云心肺之氣已絶於外以其心主榮肺主衛榮者血也脈者血之府神之所居也衛者元氣七神之別名衛護周身在於皮毛之間也肺絶故皮毛先絶神無所依故內傷飲食則亦惡風寒是榮衛失守皮膚間無陽以滋養不能任風寒也皮毛之絶則心肺之本亦絶矣蓋胃氣不升元氣不至無以滋養心肺乃不足之證也計受病不一飲食失節勞役所傷因而飽食內傷者極多外傷者間而有之世俗不知往往將元氣不足之證便作外傷風寒表實之證而反治心肺是重絶其表也安得不死乎若曰不然請以目見者證之嚮者壬辰改元京師戒嚴解圍之後都人之不受病者萬無一二既病而死者繼踵而不絶此豈俱感風寒外傷者耶大抵人在圍城中飲食不節起居不時動經兩月胃氣虧乏久矣一旦飽食太過感而傷人而又調治失宜其死無疑余所親見有表發者有以巴豆推之者有以承氣湯下之者俄而變結胸發黃又以陷胸湯丸及茵陳湯下之無不死者蓋初非傷寒以調治差誤變而似真傷寒之證皆藥之罪也轍以平生已試之效著內外傷辨論一篇同志者觸類而長之庶免後人之橫夭耳辨脈東垣曰古人以脈上辨內外傷於人迎氣口人迎脈大於氣口為外傷氣口脈大於人迎為內傷此辨固是但其説有所未盡耳外感風寒皆有餘之證是從前客邪來也其病必見於左手左手主表乃行陽二十五度內傷飲食及飲食不節勞役所傷皆不足之病也必見於右手右手主裡乃行陰二十五度故外感寒邪則獨左寸人迎脈浮緊按之洪大緊者後甚於弦是足太陽寒水之脈按之洪大而有力中見手少陰心火之脈丁與壬合內顯洪大乃傷寒脈也若外感風邪則人迎脈緩而大於氣口一倍或兩倍三倍內傷飲食則右寸氣口脈大於人迎一倍傷之重者過在手少陰則兩倍太陰則三倍此內傷飲食之脈若飲食不節勞役過甚則心脈變見於氣口是心火刑肺其肝木挾心火之勢亦來薄肺經云侮所不勝寡於畏者是也故氣口脈大急而澀數時一代而澀也澀者肺之本脈大者元氣不相接脾胃不及之脈洪大而數者心脈刑肺也急者肝木挾心火而反克肺金也若不甚勞役惟右關脾脈大而數謂獨大於五脈數中顯緩時一代也如飲食不節寒溫失所則先右關胃脈損弱甚則隱而不見惟內顯脾脈之大數微緩時一代也宿食不消則獨右關脈沉而滑經云脈滑者有宿食也以此辨之豈不明白易見乎辨寒熱內傷寒邪之證與飲食失節勞役形質之病及內傷飲食俱有寒熱舉世盡將內傷飲食勞役不足之病作外傷寒邪表實有餘之證反瀉其表枉死者豈勝言哉皆由不辨其寒熱耳今細為分解之外傷寒邪發熱惡寒寒熱並作其熱也翕翕發熱又為之拂拂發熱發於皮毛之上如羽毛之拂明其熱在表也是寒邪犯高之高者也皮膚毛腠者陽之分也是衛之元氣所滋養之方也以寒邪乘之郁遏陽分陽不得伸故發熱也其面赤鼻氣壅塞不通心中煩悶稍以袒露其皮膚已不能禁其寒矣其表上虛熱止此而已其惡寒也雖重衣下幕逼近烈火終不能御其寒一時一日增加愈甚必待傳入里作下證乃罷其寒熱齊作無有間斷也其內傷飲食不節或勞役所傷亦有頭痛項強腰痛與太陽表證微有相似余皆不同論中辨之矣內傷不足之病表上無陽不能禁風寒也此則常常有之其燥熱發於腎間者間而有之與外中寒邪略不相似其惡風寒也蓋脾胃不足榮氣下流而乘腎肝此痰痿厥氣逆之漸也若胃氣平常飲食入胃其榮氣上行以舒於心肺以滋養上焦之皮膚腠理之元氣也既下流其心肺無所稟受皮膚間無陽失其榮衛之外護故陽分皮毛之間虛弱但見風見寒或居陰寒處無日陽處便惡之也此常當有之無間斷者也但避風寒或溫暖處或添衣蓋溫養其皮膚所惡風寒便不見矣是熱也非表傷寒邪皮毛間發熱也乃腎間受脾胃下流之濕氣閉塞其下致陰火上衝作蒸蒸而燥熱上徹頭頂旁徹皮毛渾身燥熱作須待袒衣露居近寒涼處即已或熱極而汗出亦解彼外傷惡寒發熱豈有汗出者乎若得汗則病愈矣以此辨之豈不如黑白之易見乎當內虛而傷之者燥熱也或因口吸風寒之氣郁其陰火使咽膈不通其吸入之氣欲入為膈上衝脈之火所拒使陰氣不得入其胸中之氣為外風寒所遏而不得伸令人口開目瞪極則聲發於外氣不能上下塞於咽中而氣欲絶又或因噦因嘔因吐而燥發熱必有所因方有此證其表虛惡風寒之證復見矣表虛之弱為陰火所乘燥發須臾而過其表虛無陽不任風寒復見矣是表虛無陽常常有之其燥熱則間而有之此二者不齊燥作寒已寒作燥已非如外傷之寒熱齊作無有間斷也百病俱有身熱又謂之肌熱又謂之皮膚間熱以手捫之方知者是也乃肌體有形之熱也亦須皆待陰陽既和汗出則愈矣慎不可於此上辨之以其虛實內外病皆有之故難辨耳只依先説病人自覺發熱惡寒之熱及燥作之熱上辨之為準則矣辨外感八風之邪或有飲食勞倦所傷之重者三二日間特與外感者相似其餘證有特異名者若不將兩證重別分解猶恐將內傷不足之證誤作有餘外感風邪雖辭理有重復處但欲病者易辨醫者易治耳外感八風之邪乃有餘證也內傷飲食不節勞役所傷皆不足之病也其內傷亦惡風自汗若在溫暖無風處則不惡矣與外傷鼻流清涕頭痛自汗頗相似細分之特異耳外感風邪其惡風自汗頭痛鼻流清涕常常有之一日一時增加愈甚直至傳入里作下證乃罷語聲重濁高厲有力鼻息塞壅而不通能食腹中和口知味大小便如常筋骨疼痛不能動搖便著床枕非扶不起其內傷與飲食不節勞役所傷然亦惡風居露地中遇大漫風起卻不惡也惟門窗隙中些小賊風來必大惡也與傷風傷寒俱不同矣況鼻流清涕頭痛自汗間而有之鼻中氣短少氣不足以息語則氣短而怯弱妨食或食不下或不欲食三者互有之腹中不和或腹中急而不能伸口不知五穀之味小便頻數而不渴初勞役得病食少小便黃赤大便常難或澀或結或虛坐只見些小白膿時有下氣或泄黃如糜或溏泄白色或結而不通若心下痞或胸中閉塞如刀斸之痛二者亦互作不並出也有時胃脘當心而痛上支兩脅痛必臍下相火之勢如巨川之水不可遏而上行使陽明之經逆行亂於胸中其氣無止息甚則高喘熱傷元氣令四肢不收無氣以動而懶倦嗜臥以外感風寒俱無此證故易為分辨耳辨手心手背內傷及勞役飲食不節病手心熱手背不熱外感風寒則手背熱手心不熱此辨至甚皎然辨口鼻若飲食勞役所傷其外證在口必口失穀味必腹中不和必不欲言縱勉強對答聲必怯弱口沃沫多唾鼻中清涕或有或無即陰證也外傷風寒則其外證必顯在鼻鼻氣不利聲重濁不清利其言壅塞盛有力而口中必和傷寒則面赤鼻壅塞而干傷風則鼻流清涕而已內經云鼻者肺之候肺氣通於天外傷風寒則鼻為之不利口者坤土也脾氣通於口飲食失節勞役所傷不知穀味亦不知五味又云傷食惡食傷食明矣辨氣少氣盛外傷風寒者故其氣壅盛而有餘內傷飲食勞役者其口鼻中皆氣短促不足以息何以分之蓋外傷風寒者心肺元氣初無減損又添邪氣助之使鼻氣壅塞不利面赤不通其鼻中氣不能出並從口出但發一言必前輕而後重其言高其聲壯厲而有力是傷寒則鼻乾無涕面壅色赤其言前輕後重其聲壯厲而有力者乃有餘之驗也傷風則決然鼻流清涕其聲嗄其言響如從甕中出亦前輕而後重高揭而有力皆氣盛有餘之驗也內傷飲食勞役者心肺之氣先損為熱所傷熱既傷氣四肢無力以動故口鼻中皆短氣少氣上喘懶語人有所問十不欲對其一縱勉強答之其氣亦怯其聲亦低是其氣短少不足之驗也明白如此雖婦人女子亦能辨之豈有醫者反不能辨之乎辨頭痛內證頭痛有時而作有時而止外證頭痛常常有之直須傳入里方罷此又內外證之不同者也辨筋骨四肢內傷等病是心肺之氣已絶於外必怠惰嗜臥四肢沉困不收此乃熱傷元氣脾主四肢既為熱所乘無氣以動經云熱傷氣又云熱則骨消筋緩此之謂也若外感風寒是腎肝之氣已絶於內腎主骨為寒肝主筋為風自古腎肝之病同一治以其遞相維持也故經言膽主筋膀胱主骨是也或中風或傷寒得病之日便著床枕非扶不起筋骨為之疼痛不能動搖乃形質之傷經云寒傷形又云寒則筋攣骨痛此之謂也辨外傷不惡食若勞役飲食失節寒溫不適此三者皆惡食仲景傷寒論曰中風能食傷寒不能食二者皆口中和而不惡食若勞役所傷及飲食失節寒溫不適三者俱惡食口不知五味亦不知五穀之味只此一辨足以分內外有餘不足之二證也傷寒證雖不能食而不惡食口中和知五味亦知穀味蓋無內證則心氣和脾氣通知五穀之味矣辨渴與不渴以上十一段俱辨內傷與外感不同系東垣全論外感風寒之邪三日以外谷消水去邪氣傳裡始有渴也內傷飲食勞役久病者必不渴是邪氣在血脈中有餘故也初勞役形質飲食失節傷之重者必有渴以其心火熾上克於肺金故渴也又當以此辨之雖渴欲飲冷水者當徐少與之不可縱意而飲恐水多峻下則胃氣愈弱輕則為脹重則傳變諸疾必反覆悶亂百脈不安夜加增劇不得安臥不可不預度也論飲食勞倦為胃氣不足所致東垣曰古之至人窮於陰陽之化究乎生死之際所著內經悉言人以胃氣為本蓋人受水穀之氣以生所謂清氣榮氣衛氣春升之氣皆胃氣之別稱也夫胃為水穀之海飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也苟飲食失節寒溫不適則脾胃乃傷喜怒憂恐勞役過度而損耗元氣既脾胃氣衰元氣不足而心火獨盛心火者陰火也起於下焦其繫系於心心不主令相火代之相火下焦包絡之火元氣之賊也火與元氣不兩立一勝則一負脾胃氣虛則下流於腎陰火得以乘其土位故脾胃之證始得則氣高而喘身熱而煩其脈洪大而頭痛或渴不止皮膚不任風寒而生寒熱蓋陰火上衝則氣高而喘身煩熱為頭痛為渴而脈洪大脾胃之氣下流使穀氣不得升浮是春生之令不行則無陽以護其榮衛不任風寒乃生寒熱皆脾胃之氣不足所致也然而與外感風寒所得之證頗同而實異內傷脾胃乃傷其氣外感風寒乃傷其形傷外為有餘有餘者瀉之傷內為不足不足者補之汗之下之吐之克之皆瀉也溫之和之調之養之皆補也內傷不足之病苟誤作外感有餘之病而反瀉之則虛其虛也實實虛虛如此死者醫殺之耳然則奈何惟當以甘溫之劑補其中而升其陽甘寒以瀉其火則愈矣內經曰勞者溫之損者溫之又云溫能除大熱大忌苦寒之藥損其脾胃脾胃之證始得則熱中今立補中益氣湯治之論勞倦所傷始為熱中東垣曰調經篇云陰虛生內熱岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通而胃氣熱熱氣熏胸中故內熱舉痛論云勞則氣耗勞則喘且汗出內外皆越故氣耗矣夫喜怒不節起居不時有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土脾主四肢故困熱無氣以動懶於語言動作喘乏表熱自汗心煩不安當病之時宜安心靜坐以養其氣以甘寒瀉其熱火以酸味收其散氣以甘溫補其中氣經言勞者溫之損者溫之是也金匱要略云平人脈大為勞脈極虛亦為勞夫勞之為病其脈浮大手足煩熱春夏劇秋冬瘥脈大者熱邪也煩熱者氣損也春夏劇者時助邪也秋冬瘥者時勝邪也以黃耆建中湯治之此亦溫之之意也王安道曰經云陰虛生內熱又云有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱嗟夫此內傷之説之原乎請釋其義夫人身之陰陽有以表裡言者有以上下之分言者有以升降呼吸之氣言者余如動靜語默起居之類甚多不必悉舉此所謂陰虛之虛其所指與數者皆不同蓋勞動之過則陽和之氣皆亢極而化為火矣況水穀之味又少入是故陽愈盛陰愈衰也此陰虛之虛蓋指身中之陰氣與水穀之味耳或以下焦陰分為言或以腎水真陰為言皆非也夫有所勞倦者過動屬火也形氣衰少者壯火食氣也穀氣不盛者勞傷元氣則少食而氣衰也上焦不行者清陽不升也下脘不通者濁陰不降也夫胃受水穀故清陽升而濁陰降以傳化出入滋榮一身也今胃不能納而穀氣衰少則清無升濁無降矣故曰上焦不行下脘不通然非絶不行不通也但比之平常無病時則謂之不行不通耳上不行下不通則鬱矣鬱則少火皆成壯火而胃居上焦下脘兩者之間故胃氣熱熱則上炎故熏胸中而為內熱也斯東垣所謂勞傷形體所謂飲食失節而致熱者論內傷始為熱中病似外感陽證準繩云頭痛大作四肢疰悶氣高而喘身熱而煩上氣鼻息不調四肢困倦不收無氣以動無氣以言或煩躁悶亂心煩不安或渴不止病久者邪氣在血脈中有濕故不渴如病渴是心火炎上克肺金故渴或表虛不任風寒目不欲開惡食口不知味右手氣口脈大於左手人迎三倍其氣口脈急大而數時一代而澀澀是肺之本脈代是無氣不相接乃脾胃不足之脈大是洪大洪大而數乃心脈刑肺急是弦急乃肝木挾心火克肺金也其右關脾脈比五脈獨大而數數中時顯一代此不甚勞役是飲食不時寒溫失所則無右關胃脈損弱隱而不見惟內顯脾脈如此也治用補中益氣湯論內傷未傳寒中病似外感陰證準繩云腹脹胃脘當心痛四肢兩脅隔噎不通或涎唾或清涕或多溺足下痛不能任身履地骨乏無力喜唾兩丸多冷陰陰作痛或妄見鬼狀夢亡人腰背胛眼脊膂皆痛不渴不瀉脈盛大而澀名曰寒中治用神聖復氣湯白朮附子湯草豆蔻丸李氏曰內傷始病熱中未傳寒中陰勝生寒中多因調治差誤或妄下之所致遇寒則四肢厥冷心腹絞痛冷汗自出乃腎之脾胃虛宜辛熱溫藥理中下二焦論似外感陽明中熱證東垣云有天氣大熱時勞役得病或路途勞役或田野中勞役或身體怯弱食少勞役或長齋久素胃氣久虛勞役其病肌體壯熱躁熱悶亂大惡熱渴飲水以勞役過甚之故身亦疼痛此與陽明傷寒熱白虎湯證相似但脾胃大虛元氣不足口鼻中氣皆短促而上喘至日轉以後是陽明得時之際必少減若是外中熱之病必到日晡之際大作譫語其熱增加大渴飲水煩悶不止其勞役不足者皆無此證尤易為分解論似外感惡風寒證東垣云或因勞役動作腎間陰火沸騰事間之際或於陰涼處解脫衣裳更有新沐浴於背陰處坐臥其陰火不行還歸皮膚腠理極虛無陽被風與陰涼所遏表虛不任風寒自認外感風寒求醫解表以重絶元氣取禍如反掌苟幸而免者致虛勞血氣皆弱不能完復且表虛之人為風寒所遏亦是虛邪犯表始病一二日之間時與外中賊邪有餘之證頗有相似處故致疑惑請醫者只於氣少氣盛上辨之其外傷賊邪必語氣前輕後重高厲而有力若是勞役所傷飲食不節表虛不足之病必短氣氣促上氣高喘懶語其聲困弱而無力至易見也其釐毫之誤則千里之謬矣論內傷似外感雜證準繩云飲食失節勞役所傷脾胃中州變寒走痛而發黃治用小建中湯或理中湯或大建中湯選而用之論飲食傷與勞倦傷不同王安道曰勞倦傷飲食傷二者雖均為內傷然不可混而為一難經所謂飲食則傷脾者蓋為脾主飲食而四肢亦屬脾故飲食失節勞役四肢皆能傷於脾爾非謂二者同類而無辨也夫勞倦傷飲食傷雖與風寒暑濕有餘之病不同然飲食傷又與勞倦傷不同勞倦傷誠不足矣飲食傷尤當於不足之中分其有餘不足也何也蓋飢餓不飲食與飲食太過雖均屬失節然必明其有兩者之分方盡無不及無太過之中道也夫飢餓不飲食者胃氣空虛此為不足固失節也飲食自倍而停滯者胃氣受傷此不足之中兼有餘亦失節也以受傷言則不足以停滯言則有餘矣惟其不足故補益惟其有餘故消導亦有物滯氣傷必補益消導兼行者亦有物暫滯而氣不甚傷宜消導獨行不須補益者又有既停滯而復自化不須消導但當補益或亦不須補益者潔古東垣枳朮丸之類雖曰消導固有補益之意存乎其間其他如木香分氣丸枳實導氣丸大枳殼丸之類雖無補益然施之於物暫滯氣不甚傷者豈不可哉但不宜視為通行之藥耳且所滯之物非枳朮之力所能去者亦安可泥於消導而不知變乎故備急丸煮黃丸感應丸瓜蒂散之推逐者潔古東垣亦何常委之而弗用也故善將兵者攻亦當守亦當不善者則宜攻而守宜守而攻其敗也非兵之罪用兵者之罪耳觀乎此則知消導補益推逐之理矣明醫雜著云東垣諸飲食勞倦為內傷不足之證用補中益氣湯溯洄集中又論不足之中又當分別飲食傷為有餘勞倦傷為不足豫謂傷飲食而留積不化以致宿食鬱熱熱發於外此謂有餘之證法當消導東垣自有枳朮丸等治法具於飲食門矣其補中益氣方論卻謂人因傷飢食飽致損脾胃非有積滯者也故只用補藥蓋脾胃全賴飲食之養今因飢飽不時失其所養則脾胃虛矣又脾主四肢若勞力辛苦傷其四肢則根本竭矣或專因飲食不調或專因勞力過度或飲食不調之後加之勞力或勞力過度之後繼以不調故皆謂之內傷元氣不足之證而宜用補藥也但須於此四者之間審察明白略為加減則無不效矣論勞傷心力不同李氏曰勞倦亦有二焉勞力純乎傷氣而無汗者補中益氣之旨也勞心兼傷乎血而有汗者黃耆建中之義也心力俱勞氣血俱傷者雙和散之所由名也又房勞傷腎證與勞倦相似七情動氣脈與飲食無異俱不可不細辨之論房勞與勞倦不同李氏曰夫勞倦飲食傷損氣分既有陰氣陽氣之分則思慮色欲損傷血分又豈無有陰血陽血之異乎以此見血陰氣陽者分陰分陽之義也氣血各自有陰陽者陰陽互為其根之理也大法陽氣虛者宜桂附兼參耆峻補陰氣虛者參朮甘草緩而益之陰分血虛者生地黃元參龜板知母黃柏補之陽分血虛者茯苓參歸遠志之類補之論至於此東垣丹溪之功大矣哉均一內傷發熱也勞倦因陽氣之下陷宜補其氣以升提之房勞因陽火之上升宜滋其陰以降下之一升一降迥然不同矣論內傷外感兼見治有輕重緩急趙氏曰人迎脈大於氣口為外傷氣口脈大於人迎為內傷外傷則寒熱齊作而無間內傷則寒熱間作而不齊外傷惡寒雖近烈火而不除內傷惡寒得就溫暖而即解外傷惡風乃不禁一切風寒內傷惡風惟惡夫些小賊風外傷證顯在鼻故鼻氣不利而壅盛有力內傷者不然內傷證顯在口故口不知味而腹中不和外傷者無此外傷則邪氣有餘發言壯厲且先輕而後重內傷則元氣不足出言懶怯且先重而後輕外傷手背熱而手心不熱內傷則手心熱而手背不熱東垣辨法大要如此然有內傷而無外感有外感而無內傷以此辨之則判然矣苟或內傷外感兼病而相挾者則其脈證必並見而難辨尤宜細心求之若顯內證多者則是內傷重而外感輕宜以補養為先若顯外證多者則是外感重而內傷輕宜以發散為急此東垣未之及也因贅其略戴氏曰凡內外兼證或內傷重而外感輕者為內傷挾外感證治法宜先補益而後散邪或以補中益氣為主治加散邪藥當以六經脈證參究各加本經藥治之或外感重而內傷輕者為外感挾內傷證治法宜先散邪而後補益或以辛涼等解散藥為君而以參朮茯芩芎歸等藥為臣佐是其治也論內外邪交傷臟腑王安道曰經云天之邪氣感則害人五臟水穀寒熱感則害人六腑又曰犯賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入六腑陰受之則入五臟兩説似反而實不反也蓋內外之傷臟腑皆嘗受之但隨其所從所發之處而為病耳經曰東風入肝西風入肺南心北腎西南則舍於脾觀此則天之邪氣固傷五臟矣然虛邪中人從皮膚而入其傳自絡脈而經而腧而伏沖之脈以至於腸胃又曰東北風傷人內舍於大腸西北舍於小腸東南舍於胃則天之邪氣又豈不傷六腑乎經曰飲食自倍腸胃乃傷則水穀寒熱固傷六腑矣又曰形寒飲冷傷肺飲食勞倦傷脾亦未嘗不傷五臟也至於地之濕氣亦未必專害皮肉筋脈而不能害臟腑水穀亦未必專害臟腑而不能害皮肉筋脈也但以邪氣無形臟主藏精氣故以類相從而多傷臟水穀有形腑主傳化物故因其所由而多傷腑濕氣浸潤其性緩慢故從下而上從淺而深而多傷於皮肉筋脈耳孰謂濕氣全無及於臟腑之理哉論內傷兼雜證治法丹溪曰東垣內外傷辨甚詳世之病此者為多但有挾痰者有挾外邪者有熱鬱於內而發者皆以補元氣為主看所挾而兼用藥挾痰者以補中益氣加半夏更以薑汁竹瀝傳送氣虛者必少加附子以行參耆之氣凡內傷發斑因胃氣虛甚是火遊行於外亦痰熱所致火則降而補之痰熱則微汗以散之切不可下恐生危證內傷病退後燥渴不解者有餘熱在肺家可用參芩甘草少許薑汁冷服或茶匙挑薑汁與之虛者可用人參李氏曰飲食七情俱能閉塞三焦熏蒸肺胃清道肺為氣主由是而失其宣化之常所以氣口獨緊且盛其病嘔瀉痞滿腹痛亦大相似但傷食惡食七情雖作飽亦不惡食臨時消息問察集略云內傷勿論挾疫挾外邪皆以補元氣為主看所挾而兼用藥切不可以苦寒瀉胃不可以發汗瀉表戒怒性不助肝木為妙平日調養無待飢甚而後食食不可太飽或覺微渴而飲飲不欲太頻常令飽中飢飢中飽耳暮無飽食食無即就寢王叔和謂日無雜食夏至秋分少食肥膩餅臛瓜果之屬恐生諸暴病適其寒溫夏宜高明勿居高房廣廈以致中暑勿居陰地風壑以致中寒冬宜固密勿薄衣沖寒以致傷寒勿烘燻重裘以致傷暑平其七情若過慮神勞氣竭太喜傷心墜陽太怒氣逆嘔血憂恐無時鬱而生涎成五噎之病節其勞役勿用力過度動作形苦食少事煩亦不可久坐久臥使血氣凝滯譬猶戶樞不蠹流水不腐以其常動故也治內傷虛中有熱方補中益氣湯治形神勞役或飲食失節以致脾胃虛損清氣下陷發熱頭痛四肢倦怠心煩肌瘦日漸羸弱此藥能升元氣退虛熱補脾胃生氣血黃耆病甚勞役熱甚者一錢甘草炙各五分人參去蘆三分有嗽去之以上三味除濕熱煩熱之聖藥也當歸身三分酒洗焙乾或曬乾以和血脈橘皮不去白二分或三分以導氣又能益元氣得諸甘藥乃可若獨用瀉脾胃升麻二分或三分引胃氣上騰復其本位柴胡二分或三分引清氣行少陽之氣上升白朮三分除胃中熱利腰臍間血上件㕮咀都作一服水二盞煎至一盞去渣早飯後溫服如傷之重者不過二服而愈若病日久者以權立加減法治之按立方本旨云夫脾胃虛者因飲食勞倦心火亢甚而乘其土位其次肺氣受邪須用黃耆最多人參甘草次之脾胃一虛肺氣先絶故用黃耆以益皮毛而閉腠理不令自汗損其元氣上喘氣短人參以補之心火乘脾須炙甘草之甘以瀉火熱而補脾胃中元氣若脾胃急痛並大虛腹中急縮者宜多用之經云急者緩之白朮苦甘溫除胃中熱利腰臍間血胃中清氣在下必加升麻柴胡以引之引黃耆甘草甘溫之氣味上升能補衛氣之散解而實其表也又緩帶脈之縮急二味苦平味之薄者陰中之陽引清氣上升也氣亂於胸中為清濁相干用去白陳皮以理之又能助陽氣上升以散滯氣助諸甘辛為用脾胃氣虛不能升浮為陰火傷其生髮之氣榮血大虧榮氣不營陰火熾盛是血中伏火日漸煎熬血氣日減心包與心主血血減則心無所養致使心亂而煩病名曰悗悗者心惑而煩悶不安也故加辛甘微溫之劑生陽氣陽生則陰長故血虛以人參補之更以當歸和之少加黃柏以救腎水能瀉陰中之伏火如煩猶不止少加生地黃補腎水水旺而心火自降如氣浮心亂以硃砂安神丸鎮固之則愈四時用藥加減法以手捫之而肌表熱者表證也只服補中益氣湯一二服得微汗則已非正發汗乃陰陽氣和自然汗出也若更煩亂如腹中或周身有刺痛皆血澀不足加當歸身五分或一錢如精神短少加人參五分五味子十二個頭痛加蔓荊子三分痛甚加川芎五分頂痛腦痛加藁本五分細辛三分諸頭痛並用此四味足矣若頭上有熱則此不能治別以清空膏主之如頭痛有痰沉重懶倦者太陰痰厥頭痛加半夏五分生薑三分耳鳴目黃頰頜腫頸肩臑肘臂外後廉痛面赤脈洪大者以羌活二錢防風藁本各七分甘草五分通其經血加黃芩黃連各三分消其腫人參五分黃耆七分益元氣而瀉火邪另作一服與之嗌痛頷腫脈洪大面赤者加黃芩甘草各三分桔梗七分口乾嗌乾者加葛根五分升引胃氣上行以潤之久病痰嗽肺中伏火去人參初病勿去之冬月或春寒或秋涼咳嗽各宜加不去根節麻黃五分如春令大溫只加佛耳草款冬花各五分夏月病嗽加五味子三五個麥門冬五分如舌上白滑苔者是胸中有寒勿用之夏月不嗽亦加人參二分或三分並五味子麥門冬各等分救肺受火邪也食不下乃胸中胃上有寒或氣澀滯加青皮木香各三分陳皮五分此三味為定法如冬月加益智仁草豆蔻仁各五分如夏月加黃芩黃連各五分如秋月加檳榔草豆蔻白豆蔻縮砂各五分如春初猶寒少加辛熱之劑以補春氣之不足為風藥之佐益智草豆蔻可也心下痞夯用力舉重物也悶者加芍藥黃連各一錢如痞腹脹加枳實木香縮砂仁各三分厚朴七分如天寒少加乾薑或肉桂心下痞覺中寒加附子黃連各一錢不能食而心下痞加生薑陳皮各一錢能食而心下痞加黃連五分枳實三分脈緩有痰而痞加半夏黃連各一錢脈弦四肢滿便難而心下痞加柴胡七分黃連五分甘草三分胸中氣壅滯加青皮二分如氣促少氣去之腹中痛者加白芍藥五分炙甘草三分如惡寒冷痛者加桂心三分如惡熱喜寒而腹痛者於已加白芍藥甘草二味中更加生黃芩三二分如夏月腹痛而不惡熱者亦然治時熱也如天涼時惡熱而痛於已加白芍藥甘草黃芩中更少加桂如天寒時腹痛去芍藥味酸而寒故也加益智仁三分或加半夏五分生薑三片如腹中痛惡寒而脈弦者是木來剋土也小建中湯主之蓋芍藥味酸於土中瀉木為君如脈沉細腹中痛以理中湯主之乾薑辛熱於土中瀉水以為主也如脈緩體重節痛腹脹自利米穀不化是濕勝也以平胃散主之蒼朮苦辛溫瀉濕為主也脅下痛或脅下縮急俱加柴胡三分甚則五分甘草三分臍下痛加真熟地黃五分其痛立止如不已者乃大寒也加肉桂五分內經所説少腹痛皆寒證從復法相報中來也經云大勝必大復從熱病中變而作也非傷寒厥陰之證乃下焦血結膀胱也仲景以抵當湯並丸主之身有疼痛者濕若身重者亦濕加去桂五苓散一錢如風濕相搏一身盡痛加羌活七分防風藁本根各五分升麻蒼朮各一錢勿用五苓所以然者為風藥已能勝濕故別作一服與之如病去勿再服以諸風藥損人元氣而益其病故也小便遺失肺金虛也宜安臥養氣以黃耆人參之類補之不愈則是有熱也加黃柏生地黃各五分切禁勞役如臥而多驚小便淋者邪在少陽厥陰宜太陽經所加之藥更添柴胡五分如淋加澤瀉五分此下焦風寒合病也經云腎肝之病同一治為俱在下焦非風藥行經則不可乃受客邪之濕熱也直升舉發散以除之大便祕澀加當歸梢一錢大黃酒洗煨五分或一錢閉澀不行者煎成正藥先用清者一口調元明粉五分或一錢得行則止此病不宜下下之必變凶證也腳膝痿軟行步乏力或痛乃腎肝伏熱加黃柏五分空心服不已更加漢防己五分脈緩顯沉困怠惰無力者加蒼朮澤瀉人參白朮茯苓五味子各五分上一方加減是飲食勞倦喜怒不節始病熱中則可用之若未傳寒中則不可用也蓋甘酸適足益其病耳如黃耆人參甘草芍藥五味子之類是也調中益氣湯治因飢飽勞役損傷脾胃元氣不足其脈弦或洪緩按之無力中之下時一澀其證身體沉重四肢困倦百節煩疼胸滿氣短膈咽不通心煩不安耳聾耳鳴目有瘀肉熱壅如火視物昏花口中沃沫飲食失味忽肥忽瘦怠惰嗜臥溺色變赤或清利而數或上飲下便或時飧泄腹中虛痛不思飲食黃耆一錢人參甘草炙當歸白朮各五分白芍藥柴胡升麻各三分橘皮二分五味子十五粒一方即補中益氣湯以蒼朮換白朮以木香換當歸而無芍藥五味子上銼作一服水二盞煎至一盞去渣食前溫服蔭按經云勞則氣耗熱則傷氣以黃耆甘草之甘瀉熱為主以白芍藥五味子之酸能收耗散之氣又曰勞者溫之損者溫之以人參甘溫補氣不足當歸辛溫補血不足故以為臣白朮橘皮甘苦溫除胃中客熱以養胃氣為佐升麻柴胡苦平味之薄者陰中之陽為脾胃之氣下溜上氣不足故從陰引陽以補之又以行陽明之經為使也如時顯熱燥是下元陰火蒸蒸發也加生地黃二分黃柏三分如大便虛坐不得或大便了而不了腹中當逼迫此血虛血澀也加當歸身五分如身體沉重雖小便數多亦加茯苓五分蒼朮一錢澤瀉五分黃柏三分時暫從權而去濕也不可常用如胃氣不和加湯泡半夏五分生薑三片有嗽者加生地黃三分以製半夏之毒如痰厥頭痛非半夏不能除此足太陰脾經邪所作也如無以上證只服黃耆一錢人參三分甘草蒼朮各五分橘皮酒洗三分柴胡升麻黃柏酒洗各二分水煎服如惡熱而渴或腹痛者更加芍藥五分生黃芩二分如惡寒腹痛加桂心三分去黃芩如冬月腹痛不可用芍藥蓋其性大寒也只加乾薑二分或半夏五七分以生薑制之如秋冬之月胃脈四道為衝脈所逆並脅下少陽脈二道而反上行病名曰厥逆內經曰逆氣上行滿脈去形七神昏絶離去其形而死矣其證氣上衝咽不得息而喘息有音不得臥加吳茱萸五分或一錢湯洗去苦觀厥氣多少而用之如夏月有此證為大熱也蓋此病隨四時為寒熱溫涼也宜以酒黃連酒黃柏酒知母各等分為細末熟湯丸如桐子大每服二百丸白湯送下空心服仍多飲熱湯服畢少時便以美飲食壓之不令胃中停留直至下元以瀉衝脈之邪也大抵治飲食勞倦所得之病乃虛勞七損證也當用溫平甘多辛少之藥治之是其本法也如時上見寒熱病四時也又或將理不如法或酒食過多或辛熱之食作病或寒冷之食作病或居大寒大熱之處益其病當臨時制宜暫用大寒大熱治法而取效此從權也不可以得效之故而久用之必致難治矣升陽順氣湯治因飲食不節勞役所傷腹脅脹悶短氣遇春則口淡無味遇夏雖熱猶有惡寒飢則常如飽不喜食冷物黃耆一兩半夏三錢湯泡草豆蔻二錢神麯炒一錢五分升麻柴胡當歸身陳皮各一錢甘草炙黃柏各五分人參去蘆三分上㕮咀每服三錢水二盞生薑三片煎至一盞去渣食前溫服脾胃不足之證須用升麻柴胡苦平味之薄者陰中之陽引脾胃中清氣行於陽道及諸經生髮陰陽之氣以滋春氣之和也又引黃耆人參甘草甘溫之氣味上行充實腠理使陽氣得衛外而為固也凡治脾胃之藥多以升陽補氣名之者以此也升陽補氣湯治飢飽勞役胃氣不足脾氣下溜氣短無力不耐寒熱早飯後轉增昏悶頻要眠睡怠惰四肢不收懶倦動作及五心煩熱厚朴薑製五分升麻羌活白芍藥獨活防風甘草炙澤瀉各一錢生地黃一錢五分柴胡二錢五分上件為粗末每服五錢生薑三片棗二枚水煎食前溫服如腹脹及窄狹加厚朴一倍如腹中似硬加砂仁三分參朮調中湯瀉熱補氣止嗽定喘和脾胃進飲食白朮五分黃耆四分桑白皮甘草炙人參各三分麥門冬去心青皮去白陳皮去白地骨皮白茯苓各二分五味子二十個上件㕮咀如麻豆大水二盞煎至一盞去渣早飯後溫服忌多語言勞役蔭按經云火位之主其瀉以甘以黃耆甘溫瀉熱補氣桑白皮苦微寒瀉肺火定喘故以為君肺欲收急食酸以收之以五味子之酸收耗散之氣止咳嗽脾胃不足以甘補之故用人參白朮炙甘草苦甘溫補脾緩中為臣地骨皮苦微寒善解肌熱茯苓甘平降肺火麥門冬甘微寒保肺氣為佐青皮陳皮去白苦辛溫散胸中滯氣為使也當歸補血湯治肌熱燥熱困渴引飲目赤面紅晝夜不息其脈洪大而虛重按全無內經曰脈虛血虛又云血虛發熱證象白虎脈不長實為辨耳誤服白虎湯必死此病得之於飢困勞役黃耆一兩當歸酒洗二兩上㕮咀水二盞煎至一盞空心食前溫服黃耆人參湯夫脾胃虛弱必上焦之氣不足遇夏天氣熱損傷元氣怠惰嗜臥四肢不收精神不足兩腳痿軟遇早晚寒厥日高之後陽氣將旺復熱如火乃陰陽氣血俱不足故或熱厥而陰虛或寒厥而氣虛口不知味目中溜火而視物䀮䀮無所見小便頻數大便難而結祕胃脘當心而痛兩脅痛或急縮臍下周圍如繩束之急甚則如刀刺腹難舒伸胸中閉塞時顯嘔噦或有痰嗽口沃白沫舌強腰背脾眼皆痛頭痛時作食不下或食入即飽全不思食自汗尤甚若陰氣覆在皮膚之上皆天氣之熱助本病乃庚大腸辛肺金為熱所乘而作當先助元氣理治庚辛之不足此湯主之黃耆一錢如自汗過多更加一錢升麻六分人參去蘆橘皮不去白麥門冬去心蒼朮無汗更加五分白朮各五分黃柏酒洗神麯炒各三分當歸身酒洗炙甘草各二錢五味子九個上件㕮咀水二盞煎至一盞去渣稍熱服食遠或空心服忌酒濕面大料物之類及冷物如心下痞悶加黃連三分如胃脘當心痛減大寒藥加草豆蔻仁五分如脅下痛或縮急加柴胡三分如頭痛目中溜火加黃連三分川芎三分如頭痛目不清利加蔓荊子川芎各三分藁本生地黃各二分細辛一分如氣短精神困乏加五味子九個如大便澀滯一二日不見者致食少食不下血少血中伏火而不得潤也加當歸身生地黃麻子仁泥各五分桃仁三枚如大便又不快利勿用別藥少加大黃煨五分如又不利者非血結血祕而不通也是熱則生風其病人必顯風證單血藥不可復加之止常服本方另用防風羌活各五錢水煎空心服之其大便必大走也一服即止如胸中氣滯加青皮一二分去白橘皮倍之如氣滯太甚或補藥太過病人心下有憂鬱之事更加木香砂仁各二三分白豆蔻二分如腹痛不惡寒者加白芍藥五分黃芩二分卻減五味子升陽散火湯治男子婦人四肢發困熱肌熱筋骨間熱表熱如火燎於肌膚捫之烙手夫四肢屬脾脾者土也熱伏地中此病多因血虛而得之又有胃虛過食冷物郁遏陽氣於脾土之中並宜服之升麻葛根獨活羌活白芍藥人參各五錢炙甘草柴胡各三錢防風生甘草各二錢上㕮咀如麻豆大每服五錢水煎溫服不拘時忌寒冷之物瀉陰火升陽湯治肌熱煩熱面赤少食喘咳痰盛右關脈緩弱或弦或浮數黃耆甘草蒼朮羌活各一錢柴胡一錢五分升麻八分人參黃芩各七分黃連酒炒石膏各五分深秋勿用上銼水煎早飯後午飯前服蔭按此發脾胃火邪之劑又心膽肝肺膀胱藥也瀉陰火升發陽氣榮養氣血者須忌酒濕面大料物之類恐大濕熱之物復助火邪而愈損元氣也亦忌冷水及寒涼淡滲之物及諸果恐陽氣不能生旺也宜溫食薄滋味以助陽氣大抵此法此藥欲令陽氣升浮耳若滲瀉淡味皆為滋陰之味為大禁也雖然亦有從權而用之者如見腎火旺及督任沖三脈盛則用黃柏知母酒洗火炒量加之但不可久服恐傷陰為害也小便赤或澀當利之大便澀當行之此亦從權也得利勿再服此雖立食禁法若可食之物一切禁之則胃氣失所養也亦當從權食之以滋胃清神益氣湯白樞判年六十二素有脾胃虛損病目疾時作身面目睛俱黃小便或黃或白大便不調飲食減少氣短上氣怠惰嗜臥四肢不收至六月中目疾復作醫以瀉肝散下數行而前疾增劇豫謂大黃牽牛雖除濕熱而不能走經絡下咽不入肝經先入胃中大黃苦寒重虛其胃牽牛其味至辛能瀉氣重虛其肺嗽大作蓋標實不去本虛愈甚加之適當暑雨之際素有黃證之人所以增劇也制此方服之而愈防風蒼朮澤瀉各三分升麻茯苓各二分生薑五分此藥能走經除濕熱而不守故不瀉本臟補肺與脾胃本中氣之虛弱人參五分白朮白芍藥生甘草橘皮各二分青皮一分此藥皆能守本而不走經不走經者不滋經絡中邪守者能補臟之元氣人參麥門冬各二分五味子三分黃柏一分此藥去時令浮熱濕蒸上銼如麻豆大水二盞煎至一盞稍熱空心服升陽湯治一日大便三四次溏而不多有時泄瀉腹中鳴小便黃黃耆三錢甘草二錢升麻六分柴胡當歸橘皮益智仁各三分紅花少許上㕮咀分作二服每服水二大盞煎至一盞去渣稍熱服益胃湯治頭悶勞動則微痛小喜飲食四肢怠惰躁熱短氣口不知味腸鳴大便微溏黃色身體昏悶口乾不喜食冷蒼朮一錢五分升麻陳皮當歸梢各五分人參白朮柴胡黃芩益智仁各三分黃耆半夏甘草各二分上㕮咀水二大盞煎至一盞去渣食前稍熱服忌飲食失節生冷硬物酒濕面升陽益胃湯治肺及脾胃虛則怠惰嗜臥四肢不收時值秋燥令行濕熱少退體重節痛口燥舌乾飲食無味大便不調小便頻數不欲食食不消兼見肺病灑淅惡寒慘慘不樂面色惡而不和乃陽氣不伸故也當升陽益氣此藥主之黃耆二兩半夏洗此一味脈澀者用人參去蘆甘草炙各一兩獨活防風以秋旺故以辛溫弱之白芍藥何故秋旺用人參白朮白芍藥之類反補肺為脾胃虛則肺受邪故因時而補易為力也羌活各五錢橘皮四錢茯苓小便利不渴者勿用柴胡澤瀉不淋勿用白朮各三錢黃連一錢上㕮咀每服三錢水三盞生薑五片棗二枚煎至一盞去渣早飯後溫服或加至五錢服藥後如小便罷而病增劇是不宜利小便當少去茯苓澤瀉若喜食一二日不可飽食恐胃再傷以藥力尚少胃氣不得轉運升發也須滋味之食或美食助其藥力益升浮之氣而滋其胃氣慎不可淡食以損藥力而助邪氣之降沉也可以小役形體使胃與藥轉運升發慎勿大勞役使氣復傷若脾胃得安靜尤佳若胃氣稍強少食果以助谷藥之力經云五穀為養五果為助者也人參芍藥湯治脾胃虛弱氣促憔悴麥門冬二分當歸身人參各三分炙甘草白芍藥黃耆各一錢五味子五個上㕮咀分作二服水煎稍熱服陶節庵調榮養衛湯人參黃耆白朮甘草當歸生地黃川芎陳皮柴胡羌活防風細辛上水二鍾薑三片棗二枚水煎溫服如元氣不足者加升麻少許須知元氣者至陰之下求其升口渴加天花粉知母喘嗽加杏仁去升麻汗不止加芍藥去升麻細辛胸中煩熱加山梔竹茹乾嘔者加薑汁炒半夏胸中飽悶加枳殼桔梗去生地黃甘草黃耆白朮少許痰盛者加瓜蔞仁貝母去防風細辛腹痛去耆術加芍藥乾薑和之因血鬱內傷有痛處或大便黑加桃仁紅花去芍辛羌防耆術甚者加大黃下盡瘀血則愈王節齋補氣湯凡遇勞倦辛苦用力過多即服此二三劑免生內傷發熱之病此方主於補氣黃耆蜜炙二錢五分人參白朮陳皮麥門冬去心各一錢茯苓八分甘草炙七分五味子二十粒上銼一劑加生薑三片棗一枚水煎溫服如勞倦甚加熟附子四五分王節齋補血湯凡遇勞心思慮損傷精神頭眩目昏心虛氣短驚煩熱服此一二劑此方主於補血人參一錢二分當歸酒洗白芍藥炒麥門冬去心茯神去木酸棗仁炒生地黃各一錢川芎陳皮山梔子炒甘草炙各五分五味子十五粒上銼一劑加薑棗水煎服雙和散治身心俱勞氣血俱傷或房室之後勞役或勞役之後犯房及大病後虛勞氣乏等證此藥不熱不冷溫而有補黃耆當歸川芎熟地黃各一錢白芍藥二錢五分官桂甘草炙各七分半上加薑棗煎服陰虛火動者宜善加減東垣麥門冬清肺飲治脾胃虛弱氣促氣喘精神短少衄血吐血紫菀茸一錢五分黃耆白芍藥甘草各一錢人參麥門冬去心各五分當歸身三分五味子三個上㕮咀分作二服每服水二盞煎至一盞食後溫服局方中大阿膠丸亦宜用人參清鎮丸治熱止嗽消痰定喘柴胡人參各一兩五錢生黃芩半夏甘草炙各七錢五分青黛六錢天門冬去心三錢陳皮去白五味子去核各二錢上為細末水糊為丸如梧桐子大每服三十丸至五十丸食後溫白湯送下硃砂安神丸硃砂五錢另研甘草五錢五分生地黃一錢五分黃連去須酒洗六錢當歸去蘆二錢五分上件除硃砂外四味共為細末湯浸蒸餅為丸如黍米大以硃砂為衣每服十五丸或二十丸津唾咽下食後或溫水涼水少許送下亦得內經曰熱淫所勝治以甘寒以苦瀉之以黃連之苦寒去心煩除濕熱為君以甘草生地黃之甘寒瀉火補氣滋生陰血為臣以當歸補其血不足硃砂納浮遊之火而安神明也益氣丸治語言多損氣懶語補上益氣人參麥門冬去心各三錢橘皮桔梗甘草炙各五錢五味子二十一粒上為極細末水浸油餅為丸如雞頭大每服一丸細嚼浸唾咽下油餅和油燒餅也治內傷虛中有寒方理中丸心肺在膈上為陽腎肝在膈下為陰此上下臟也脾胃屬土處在中州在五臟為孤臟在三焦曰中焦因中焦治在中一有不調此藥專主故名曰理中丸人參白朮甘草炙乾薑炮各等分上為末煉蜜為丸如雞子黃大每一丸以沸湯數合研碎溫服日三二次蔭按人參味甘溫內經曰脾欲緩急食甘以緩之緩中益脾必以甘為主是以人參為君白朮味甘溫內經曰脾惡濕甘勝濕溫中勝濕必以甘為助是以白朮為臣甘草味甘平內經曰五味所入甘先入脾脾不足者以甘補之補中助脾必須甘劑是以甘草為佐乾薑味辛熱喜溫而惡寒者胃也寒則中焦不治內經曰寒淫所勝平以辛熱散寒溫胃必先辛劑是以乾薑為使脾胃居中病則邪氣上下左右無所不之故立加減法倘若臍下築者腎氣動也去白朮加桂氣壅而不瀉則築然動也白朮味甘補氣去白朮則氣易散桂辛熱腎氣動者欲作奔豚也必服辛熱以散之故加桂以散腎氣經曰以腎能泄奔豚故也若吐多者去白朮加生薑氣上逆者則吐多術甘而壅非氣逆者所宜千金曰嘔家多服生薑以其辛散故吐多者加之若下多者還用白朮氣泄而不收則下多術甘壅補使正氣收而不下泄也或曰濕勝則濡泄術專除濕故下多者加之若悸者加茯苓飲聚則悸茯苓味甘滲泄伏水是所宜也倘腹中痛者加人參虛則痛內經曰補可以去弱人參羊肉之屬是也若寒多者倍乾薑以辛熱能散寒也如腹滿者去白朮加附子內經曰甘者令人中滿術甘壅補於腹中滿者去之附子味辛熱氣壅鬱腹為之滿以熱勝寒以辛散滿故加附子內經曰熱者寒之寒者熱之此之謂也建中湯內經曰肝生於左肺生於右心胃在上腎處在下左右上下四臟居焉脾者土也應中央處四臟之中州治中焦生育榮衛通行津液一有不調則榮衛失所育津液失所行必以此湯溫中益脾是以建中名之焉芍藥六兩桂枝甘草炙各二兩大棗七枚去核生薑三兩切片膠飴一升上㕮咀以水七升煎至三升去渣入膠飴更上微火令消溫服一升日三升蔭按膠飴味甘溫甘草味甘平脾欲緩急食甘以緩之建脾者必以甘為主故以膠飴為君而甘草為臣桂辛熱散也潤也榮衛不足潤而散之芍藥味酸微寒收也澀也津液不通收而行之是以桂芍藥為佐生薑味辛溫大棗味甘溫胃者衛之源脾者榮之相黃帝針經云榮出中焦衛出上焦是也衛為陽不足者益之必以辛榮為陰不足者補之必以甘甘辛相合脾胃建而榮衛通是以薑棗為使也或謂桂枝湯解表而芍藥數少建中湯溫里而芍藥數多殊不知二者遠近之制皮膚之邪為近則制小其服也故桂枝湯芍藥相佐桂枝以發散非與建中同體心腹之邪為遠則制大其服也故建中湯芍藥佐膠飴以建脾非與桂枝同用爾內經曰近而奇偶制小其服遠而奇偶制大其服此之謂也嘔家不用此湯以味甜故也黃耆建中湯治男子婦人諸虛不足羸乏少力此藥大生氣血補益榮衛黃耆三錢白芍藥炒四錢肉桂一錢五分甘草炙二錢上㕮咀加薑棗煎食遠服加味黃耆湯又名保元湯治陽虛惡寒黃耆二錢人參白朮甘草炙各一錢肉桂五分上銼水煎服甚者加附子強胃湯治因飲食勞役所傷腹脅滿悶氣短遇春口淡無味遇夏雖熱而惡寒常如飽不喜食冷物黃耆一兩人參半夏各三錢草豆蔻三錢神麯生薑各一錢五分陳皮當歸升麻柴胡各一錢甘草炙黃柏各五分上㕮咀每服三錢水煎食前溫服溫胃湯專治服寒藥多致脾胃虛弱胃脘痛黃耆陳皮各七分人參甘草縮砂仁益智厚朴各二分白豆蔻乾生薑澤瀉薑黃各三分上為極細末每服三錢水一盞煎至半盞食前溫服育氣湯通流百脈調暢脾元補中脘益氣海祛陰寒止腹痛進飲食大益臟虛疼痛人參白朮白茯苓木香丁香藿香縮砂白豆蔻蓽澄茄炙甘草各五錢乾山藥一兩陳橘皮去白青皮去白各二錢半加白檀香五錢上十四味為末每服一錢至二錢用木瓜湯調下空心食前鹽湯亦得神聖復氣湯治復氣乘冬足太陽寒氣足少陰腎水之旺子能令母實手太陰肺實反來侮土火木受邪腰背胸膈閉塞疼痛善嚏口中涎目中泣鼻中流濁涕不止或如瘜肉不聞香臭咳嗽痰沫上熱如火下寒如冰頭陳痛目中流火視物䀮䀮耳鳴耳聾頭並口鼻或惡風寒喜日陽夜臥不安常覺痰塞膈咽不通口失味兩脅縮急而痛牙齒動搖不能嚼物陰汗前陰冷行步欹側起居艱難掌中風寒痹麻木小便數而晝多夜頻欠氣短喘渴少氣不足以息卒遺失無度婦人白帶陰戶中大痛牽心而痛黧黑失色男子控睪牽心腹陰陰而痛面如赭色食少大小便不調煩心霍亂逆氣裡急腹皮色白後出餘氣腹不能努或腸鳴膝下筋急肩胛大痛此皆寒水來復火土之仇也黑附子炮去皮臍乾薑炮各三分防風郁李仁湯浸去皮尖人參各五分當歸身六分半夏湯泡升麻各七分甘草藁本各八分柴胡羌活各一錢白葵花五朵去心細剪入上件水五盞煎至二盞入下項藥橘皮五分草豆蔻仁麵裹燒熟去皮黃耆各一錢上件入在內再煎至一盞再入下項藥生地黃酒洗二分黃柏酒浸黃連酒浸枳殼各三分上四味預一日另用新水浸又以細辛二分川芎細末蔓荊子各三分上三味預一日亦另用新水浸煎正藥作一大盞不去渣入此浸者藥再上火煎至一盞去渣稍熱空心服又能治齧頰齧唇齧舌舌根強硬等證如神忌肉湯宜食肉不助經絡中火邪也大抵腎與膀胱經中有寒元氣不足者皆宜服之神效於月生月滿時隔三五日一服如急病不拘時分白朮附子湯白朮附子炮陳皮蒼朮制厚朴制半夏湯泡茯苓澤瀉各一兩豬苓去皮五錢肉桂四錢上銼每服五錢水一盞生薑三片煎至半盞食前溫服量虛實加減
