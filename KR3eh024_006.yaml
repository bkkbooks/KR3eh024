body:
  text: 卷六傷風論陳無擇曰春傷於風乃四時之序也或表中風邪循經流注以日傳變與傷寒無異但寒澀血故無汗惡寒風散氣故有汗惡風為不同耳仲景太陽經分傷風傷寒為二途而後人纂集者不分門類茲特別立傷風一門且依先哲以太陽為始分注六經學者當自知之葉氏曰無擇分傷風六經用藥可謂發前人之未備然傷風傷寒之辨惟在太陽經為然其傳至陽明少陽及三陰之經則風與寒皆變而為熱無復二者之分矣今無擇例以桂枝湯治太陽傷風之劑統治諸經但加各經之藥是徒知傷風傳變與傷寒同而不知用藥與傷寒傳經者亦不異此則失仲景之意也統旨曰傷風多屬於肺肺主皮毛故也咳嗽聲重噴嚏鼻塞此感冒之輕者當微解之其稍重亦頭疼發熱惡風憎寒即宜發散先傷飲食而後傷風者當以白朮枳實青皮陳皮麴櫱消導其里兼用川芎羌活防風乾葛紫蘇以解其表起居不時房勞之後致傷風者先以參朮芎歸補其虛佐入防風羌活乾葛微解其表以上二證乃挾食挾虛而受風者亦宜內外交治不可專於解表也鼻塞不聞香臭者有新舊寒熱之異新病者乃偶感風寒所致或聲啞重或流清涕宜以神朮散參蘇飲加麻黃發散其邪舊病者原因肺經素蘊火邪火鬱之甚而畏見風寒但遇寒月便塞略感即發當以清肺化痰湯少加降火通氣之劑切不可以為肺寒而用解表辛溫之藥非徒無益而反有所害也丹溪曰傷風證屬肺者多風邪入於腠理肺主皮毛故也宜辛溫或辛涼之劑散之一時傷風頭痛發熱惡寒怕風便宜解散用防風羌活升麻葛根白芷臺芎荊芥之類補藥痰藥隨證加減飲食過傷又兼傷風必用白朮陳皮山楂麥蘖青皮枳實消導其里兼用臺芎防風羌活以解其表因起居不常房勞之後以致感傷必須以補氣血為主用參朮芎歸以補其里兼用防風羌活等以解其表小兒傷風咳嗽吐痰用二陳湯加防風枳殼白朮桔梗有熱加黃芩柴胡戴氏曰新咳嗽鼻塞聲重者是也彭氏曰外感傷風鼻塞聲重左脈浮緩者是李氏曰冒風惡寒多屬於肺蓋肺主皮毛通膀胱最易感冒新咳嗽惡風鼻塞聲重噴嚏是也柴胡半夏湯參蘇飲寒月麻黃杏仁飲重者頭疼身痛寒熱咽乾音啞柴胡桂枝湯防風沖和湯頭痛甚者川芎茶調散痰多者金沸草散挾熱人參敗毒散升麻葛根湯挾寒十神湯挾寒濕消風百解散挾濕神朮散挾暑香葛湯時行柴胡升麻湯服食過厚素有痰火時常鼻塞流涕聲重咳嗽略被外感則防風通聖散或大黃黃芩等分為丸白水下素虛者只用防風羌活川芎隨宜加入補藥痰藥中傷食加桑白皮陳皮青皮山楂麥芽挾形寒飲冷加薑桂挾房勞加參朮歸地挾勞役補中益氣湯加羌活防風風虛甚者羌活丸加味烏荊丸風重傳裡一同傷寒治法風久甚能為氣血之害蓋風能燥血散氣故古用桂附八物等湯久不愈者只宜三白湯加減飲之切忌疏泄雖初起非寒月無汗麻黃禁用治方桂枝湯治太陽經傷風頭疼身痛或翕翕發熱或灑灑惡風自汗無汗者不可服桂枝芍藥各三兩甘草炙一兩上㕮咀每服五錢加生薑三片棗二枚水煎溫服不拘時惟春初可依此方自春末夏至以前宜加黃芩半兩夏至後加知母半兩石膏二兩或升麻半兩若病人素虛寒不用加減加減沖和湯治太陽傷風有汗脈浮緩羌活一錢白朮一錢半防風白芷川芎黃芩生地黃各五分甘草三分上銼一服加生薑三片棗二枚水煎服若一服汗還未止加黃耆一錢五分芍藥一錢仍未止以小柴胡加桂枝芍藥各一錢芎芷香蘇散治傷風川芎白芷羌活香附陳皮甘草各一錢薄荷蘇葉各八分加荊芥防風各七分名荊芥防芎蘇散上作一服加生薑三片蔥白二寸水煎熱服有痰加半夏茯苓咳嗽加杏仁桑白皮神朮散治四時瘟疫頭痛發熱及傷風鼻塞聲重蒼朮米泔浸五兩藁本香白芷細辛羌活川芎甘草炙各二兩上為末每服三錢水一盞加生薑三片蔥白三寸煎七分不拘時溫服如傷風鼻塞用蔥茶調下二錢消風百解散治傷風頭疼發熱惡寒咳嗽鼻塞聲重荊芥白芷陳皮去白麻黃蒼朮各四兩甘草炙二兩上㕮咀每服五錢生薑三片蔥白三莖水煎服如咳嗽再加烏梅煎川芎茶調散治諸風上攻頭目昏重偏正頭疼鼻塞聲重薄荷八兩川芎荊芥去梗各四兩羌活白芷甘草各二兩細辛一兩防風一兩半上為細末每服二錢食後茶清調下人參敗毒散治傷寒頭痛壯熱惡寒及風痰咳嗽鼻塞聲重人參羌活獨活芎藭柴胡前胡枳殼桔梗茯苓甘草炙各等分上銼每服三錢生薑三片薄荷少許水煎服如心經蘊熱口乾舌燥加黃芩蔥白散治四時傷寒頭痛壯熱肢體煩疼小便赤澀及傷風鼻塞咳嗽痰涎山嵐瘴氣並皆治之麻黃去根節三兩川芎蒼朮米泔浸白朮各二兩石膏乾葛甘草炙各一兩上㕮咀每服五錢加生薑三片蔥白二寸水煎熱服不拘時如欲汗並進數服沖和散治感冒風濕之氣頭目不清鼻塞聲重肢體倦怠缺伸出淚蒼朮米泔浸炒六兩荊芥穗二兩甘草一兩一錢半上㕮咀每服五錢水一盞煎八分去渣熱服不拘時八風散治風氣上攻頭目昏眩肢體拘急皮膚瘙癢癮疹成瘡及治壅塞不調鼻塞聲重羌活防風各三兩人參黃耆甘草各二兩白芷前胡各一兩藿香半兩上為細末每服二錢水一盞入薄荷少許煎湯調下食後溫服茶清亦可消風散治諸風上攻頭目昏眩項背拘急鼻嚏聲重耳作蟬鳴及皮膚頑麻瘙癢癮疹婦人血風頭皮腫癢並皆治之荊芥穗甘草炙陳皮去白厚朴薑製各半兩白殭蠶炒人參茯苓防風芎藭藿香葉蟬蛻去土炒羌活各一兩上為細末每服二錢用荊芥茶清調下遍身瘡癬溫酒下金沸草散治肺經受風頭目昏疼咳嗽聲重涕唾稠黏旋覆花去梗二兩荊芥穗四兩麻黃去節前胡去蘆各二兩甘草炙赤芍藥半夏薑製各一兩上㕮咀每服五錢加生薑三片棗一枚水煎溫服柴胡升麻湯治頭痛壯熱惡風體疼鼻塞咽乾痰盛咳嗽涕唾稠黏柴胡前胡黃芩各六兩半荊芥七兩半赤芍藥石膏各十兩升麻五兩桑白皮乾葛各七兩上㕮咀每服一兩加生薑水煎熱服有痰加半夏貝母清肺化痰湯治肺經素蘊火邪但遇風寒便鼻塞聲重此火鬱之甚也用此藥降火利氣不可過用辛溫解表桔梗枳殼半夏橘紅茯苓前胡各一錢二分黃芩一錢半細辛一錢甘草五分上加生薑三片水煎食後服羌活散治風氣不調頭目昏眩痰涎壅滯遍身拘急及風邪塞壅頭痛項強鼻塞聲重肢體煩疼天陰風雨預覺不安羌活防風麻黃去根節前胡蔓荊子細辛川芎枳殼白茯苓黃芩石膏甘菊花甘草炙各一兩上㕮咀每服一兩加生薑四片薄荷三葉水煎溫服羌活丸治風氣不調頭目昏眩痰涎壅滯遍身拘急及風邪塞壅頭痛項強鼻塞聲重肢節煩疼天陰先覺不安羌活麻黃去根節防風細辛蔓荊子去白皮川芎甘菊花前胡黃芩枳殼白茯苓石膏甘草炙各一兩硃砂一兩五錢為衣上為末水糊丸如桐子大每服四十丸食後薑湯下大辰砂丸清頭目化痰涎及感冒風寒聲重頭目昏眩項背拘急皮膚瘙癢並皆治之防風去蘆二兩天麻川芎白芷甘草炙各一兩薄荷葉細辛各半兩硃砂一兩為衣上以七味為末煉蜜丸如彈子大硃砂為衣每服一丸細嚼食後薑湯下茶清亦可
