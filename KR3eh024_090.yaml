body:
  text: 卷九十蟲獸傷論千金論曰凡見一切毒螫之物必不得起噁心向之亦不得殺之若輒殺之於後必遭螫毒治亦難瘥慎之慎之凡諸惡蟲瘋犬之傷俱用小便洗淨於傷處灼艾為佳或以紫金錠磨敷治諸蟲傷方神仙紫金錠解一切毒及蛇犬惡蟲所傷癰疽發背諸赤腫等證文蛤捶碎洗淨三兩山茨菰去皮淨焙二兩千金子去殼研去油一兩紅芽大戟洗焙一兩半辰砂另研雄黃另研各一兩麝香另研三錢上為末研勻用糯米濃飲為劑杵千餘下成錠或生薑薄荷汁井花水磨服或塗修合務要至誠於端午七夕重陽日佳忌婦人雞犬見之解毒散治一切毒蛇惡蟲所傷重者毒氣入腹眼黑口噤手足強直此藥平易不傷氣血大有神效不可以為易而忽之白礬甘草各等分上為細末每服二錢冷水調下更敷患處一方治毒蛇所傷細辛香白芷各五錢雄黃二錢上為末加麝香少許每服二錢溫酒調服聖惠方治蛇咬蠍螫吞咬妙雄黃三錢信一錢皂角子巴豆各四十九粒麝香各少許耳塞少許上於五月五日不聞雞犬婦人處不語搗為末在杏子殼內封之針挑出上痛處大有神效雄靈散治毒蛇所傷昏悶欲死者神效雄黃五錢五靈脂一兩上為末每服二錢好酒調服仍敷患處良久再進一服即愈一方加貝母香白芷各等分熱酒調服一方雄黃青黛等分為末每二錢新汲水服一方用蜈蚣一條去頭足炒川椒一錢去目略炒酒調服汗出即愈一方用食茱萸一兩為細末冷水調分三服立瘥一方用貝母為末酒調令病人儘量飲之頃久流自傷處為水流出候水盡卻以藥渣敷瘡上即愈一方用青木香水煎服其痛立止一方用香白芷嚼碎敷患處又用溫酒調服效一方用重臺六分續隨子六顆去皮同為細末以水服方寸匕又以唾調少許敷患處立安一方用白礬二錢服之防毒氣攻心一方用白礬以滾水泡洗其傷處一方金線重樓以水磨少許敷咬處又為細末酒敷之一方用柏樹葉魚腥草地松節皺面草草決明共一處研細敷傷處極佳一方以獨顆蒜酸漿草搗汁敷咬處佳一方男子陰毛口含二十莖咽其津毒不入腹一方五月五日收採蒼耳為末五錢水煎熱服取汗即安如無端午日收採者常日採者亦可一方用蒼耳嫩葉一握研取汁溫酒和灌之將渣厚罨傷處一方用透明雄黃研細末以醇酒濃調厚擦傷處水流出如涎痛腫即消一方以萵苣汁和雄黃末作餅子候乾為末每用少許貼瘡口立效一方系瓜根洗淨搗研生酒吃一醉立已一方用半邊蓮研酒服一方人糞厚塗帛裹即消一方消蠟注瘡上不瘥更消注之一方用合口椒葫荽苗等分搗敷之一方青木香不拘多少煎服一方急用白礬安刀頭火上溶汁沸滴於傷處待冷以長蓖子速挑去壓則毒隨血出黯腫尚未退更滴之以退為度村居山僻及途中夜行卒被蛇傷咬難求白礬處速作艾炷灸五壯以唾調鹽塗之如黯腫尚未消當更灸更擦毒涎自然流出且不透里傷人一方急以小便洗出血次取口中唾塗之又以牙垽封傷處敷而護之甚妙且不痛腫一方急飲好醋二碗令毒氣不隨血走或清油亦可一方用犬糞敷患處亦佳凡蛇咬忌食酸物梅子犯之大痛白芷散治蛇齧遍身腫脹欲死香白芷一味為末以麥門冬煎湯調服臨川有弄蛇者一日方作場為蛇所齧即時殞絕臂大如股少頃遍身皮脹作黃黑色遂死有道人旁觀言曰我有一藥能療乃求錢二十文以往才食頃奔而至取新汲水解裹中藥調一升抉開灌之藥盡覺腹中搰搰然黃水自口出良久復故傳其方乃香白芷一物也法當以麥門冬湯調服適事急不暇姑以水代之後人得其方以治蛇齧腫脹欲裂者即愈雄黃散治蛇傷蟲咬雄黃末二錢以大藍汁一碗調勻點在所傷處並令細細服其汁神驗如無藍以靛花青黛代之類編云南海地多蛇而廣府治尤甚某侍郎為帥聞雄黃能禁制此毒乃買數百兩分貯絹囊掛於寢室四隅經月餘臥榻外常有黑汁從上滴下臭且臊使人穿承塵窺之則巨蟒橫其上死腐矣於是盡令撤去障蔽死者常丈許大如柱旁又得十數條皆蟠蚪成窠穴他屋內所驅放者合數百自是官舍為清誤飲蛇交水研雄黃服之山林日用法每欲出時用雄黃一桐子大火上燒煙起以熏腳棚草履之類及袍袖間即百毒不敢侵害邪祟遠避一方治諸般蛇咬此傳之於擒蛇者藥味不全亦可大青小青青木香烏桕葉火炊草山蕨筋過山龍地蜈蚣天冬白芍香藿上為細末用白朮香研細生白酒調服渣罨咬處累效一方治蛇入人口並七孔中者割母豬尾頭滴血著口中並孔口上即出聖惠方治因熱取涼睡有蛇入口中挽不出者用刀破蛇尾納入生椒二三粒裹著即出方名聖惠不必服藥一方治卒為蛇繞不解以熱湯淋之無湯令人尿之妙化丹治蠍螫蛇傷點眼即效沒藥乳香輕粉海螵蛸雄黃各五分硫黃二釐上為末於端午日製忌婦人雞犬見之左邊被傷點左眼大眥右邊點右雄黃消毒膏治蠍螫不可忍雄黃信各半兩巴豆三錢白礬生一兩上為細末用黃蠟半兩溶開入藥攪勻為錠子如棗子大用時將錠子簽於燈焰上炙開滴於螫著處其痛立止一上散治蠍螫痛半夏一字生用為末雄黃一字另研巴豆一個去皮研如泥上二味同研和勻上之一方用白礬半夏各等分為末醋調塗之痛止神妙丸治蠍螫雄黃蟾酥膽礬半夏各等分麝香少許上為末用貓兒眼草搗汁合丸用口嗒痛處令淨用丸藥抹擦端午日製忌婦人雞犬見之六神散治蠍螫川烏草烏南星半夏白芷石菖蒲各等分上端午日取藥為末每用少許先以津液抹患處以藥擦之治蠍螫方雄黃另研黃丹水濾過𥓒硝白礬飛過各等分上為細末用瓷罐盛之中傷者用銀簪點男左女右眼大角一二次即止一方治蠍螫黃蠟二錢雄黃硃砂各三錢上於五月五日將蠟溶開候將凝時入雄黃硃砂二味捏勻成餅窩仍用貓兒眼草白津正午時滴入窩內愈多愈佳復捏成塊每用一米粒刺針尖上燈焰化滴正螫處最效一方研蜘蛛汁敷之瘥一方用苦蕒汁塗之一方磨生薑塗之一方用南星為末醋調擦之一方用人參嚼以封之一方以燒酒滴之一方取齒中殘飯敷之又豬脂封之又射罔封之一方硇砂和水塗上立愈一方著手足以冷水漬之水微暖則易之著余處者冷水浸故布㩉之小暖則易治蠍毒方凡蠍有雌雄雄者痛止在一處雌者痛牽諸處若是雄者用井底泥塗之溫則易雌者當用瓦屋溝下泥敷之若值無雨可用新汲水從屋上淋下取泥一方五月五日正午時對日墨書虎毒字左右手心內將青蒿對日揉片時待蒿揉爛手青為度過夜日方洗去遇蠍螫手摩其處收蠍螫法每年除夜左手拽起前裾右手執三尺長棍向門楣上敲三下唸咒云蠍蠍螫螫不向梁上走卻來這裡螫一敲敲八節咒畢吸氣一口吹於杖頭復吸其氣吹於執杖手心如此三次即已遇有蠍螫以手摩之即不痛可用一年次年除夜又如法為之否則不驗一方端午日用硃砂寫荼字倒貼之蛇蠍不敢近一方五月五日午時對日光努目直視見有蠍形採青蒿梢七枝手內揉爛帶有青色擲之來家不得回顧亦勿與人說次日午時仍對日看見蠍形將原採蒿身踏倒勿令人見三日不梳洗凡遇蠍螫手摩其處痛立止治蜂螫方取瓦子厚摩其上唾二七遍置瓦子故處一方治蜂螫豬脂蜜各五合蠟三兩上和合如膏候冷以塗之一方燒蜂房為末膏和塗之一方先煮蜂房洗之又塗之一方用酥塗之立愈一方用薄荷貼之瘥一方燒牛糞灰苦酒和塗之一方齒垢塗之或用頭垢敷或用鹽擦一方以人尿新者洗之一方嚼鹽塗之一方尿泥塗之一方反手捻地上土敷之一方井地泥敷之亦愈一方用熱油洗之清油擦之亦可治蠆螫方彭成夫人夜之廁蠆螫其手呻吟無賴華佗令溫湯漬手數易湯常令暖其旦則愈治蜈蚣咬方用生雞血敷上立愈累效一男子為蜈蚣入咽喉中咬之垂死之際一醫令殺生雞血乘熱灌之喉中蜈蚣即出而愈實良方也一方用雞糞塗之一方用竹葉清研汁敷之立愈一方用南星磨汁敷之累效一方用香附嚼擦患處立效一方用獨頭蒜磨螫處立愈一方用蝸牛研取汁滴入咬處一方取蜘蛛一枚安咬處當自飲毒如蜘蛛死而毒未止更易生者一方嚼鹽敷其處次以鹽湯洗之一方頭垢塞之不痛則癢一方用生白礬枯白礬等分為末水調擦患處一方以菜油三錢傾地上以指擦地上油擦咬處即可不可令四眼見一方治蜈蚣諸毒蟲傷用麻油點燈於瘡口上對口熏之登時愈一方大油紙燃燒燈吹滅以余煙焠之一方治蜈蚣咬及諸蟲咬毒先用鞋底上擦之後用大蒜小蒜桑葉罨傷處如無用油豉盦傷處或藍靛塗罨之亦效一方用桑枝汁同鹽擦痛處或溶黃蠟滴患處肉黑為度一方用皂角於咬處上用艾灸熱去之效治蜘蛛咬方藍汁或青黛五分麝香另研半分雄黃另研一錢上三味和一處點咬傷處即愈一方治蜘蛛咬遍身成瘡用青蔥葉一莖小頭作一孔盛蚯蚓一條捏兩頭不令透氣搖動化為水點咬處瘥一方嚼韭白敷之一方用葛粉生薑汁調敷一方唾津和山豆根末塗之狗咬蚍蜉瘡蛇咬並水研山豆根敷之一方蜘蛛咬一身生絲羊乳一件飲之一方人尿敷之一方炮姜貼之一方猢猻屎敷之一方烏麻油和胡粉如泥塗上干則易之治蠼螋尿方一名多腳蟲蠼螋尿成瘡初如粟漸大如豆如火燒泡大痛者速以草茶細末生油調敷瘡上立止甚妙草茶即茶茗一方用鹽三升水一斗煮取六升以綿浸湯敷瘡上一方治雨點蠼螋瘡用百合搗爛入鹽少許敷之效一方治蠼螋尿人影著便令人病瘡如粟米累累痛似刺蟲所螫惡寒壯熱用犀角磨汁塗之即愈一方蠼螋蟲又名八腳蟲隱壁間以尿射人遍身生瘡如湯火傷用烏雞翎毛燒灰雞子白調塗之一方羖羊髭燒灰臘月豬脂和封之一方搗豉蟲封之一方燒鹿角為末以苦酒和敷瘡上已有汁者燒道旁弊蒲席敷之一方燕巢中土以豬脂和敷一方熟嚼梨葉以水和塗燥復易之草豉生巴西豉蟲治射工毒又方槐白皮半斤切以苦酒二升漬半日刮去瘡處以洗日五六遍仍以赤小豆為末以苦酒和敷之燥復易小兒以水和一方治小兒蠼螋咬繞臍腹匝即死用梨葉搗爛敷之治蚰蜒入耳方用胡椒湯灌入耳即好一方用蔥白同蜂蜜搗爛取汁灌入耳中蚰蜒化為清水治石蛭方山中水陰濕草木上石蛭著人則穿齧人肌膚行人肉中浸淫稜起如蟲行道之狀凡行山路草木中常以臘月豬膏鹽塗腳脛及足趾間跌止及著鞋襪蛭不得著人也已著者炙斷其道即愈治射工毒方春夏月樹下牆塹間有一等雜色毛蟲極毒凡人觸著者則放毛入人手足上自皮至肉自肉至骨其皮肉微癢或痛必致骨肉皆爛有性命之憂此名射工毒諸藥不效惟此治之用好豆豉約一碗清油半盞拌豉搗爛厚敷痛癢處經一時久豉氣透骨則引出毛蟲紛紛可見取下豆豉埋在土中煎香白芷湯洗痛處如肉已爛用海螵蛸即烏賊魚骨為末敷之愈夏月出行避射工取知母為末自隨欲入水先取少許投上流亦取服之配鹽造豆故名豆嗜又豉蟲生水中治射工毒用一枚含口即瘥一方用灶底黃土即伏龍肝為末以酸醋調和捏成餅子於癢痛處搓轉其毛皆出在土上痛癢立止神效無比一方取蒲公英根莖白汁敷之立瘥一方用蒼耳子搗汁服之治蛐蟮咬方用老茶葉為細末調敷治蚯蚓咬方蚯蚓咬如大風狀眉髯皆落夜則蚯蚓鳴於身上濃作鹽湯浸數次安昔有病腹大夜聞蚯蚓鳴於身有人教用鹽水浸之而愈一方用雞糞塗之治螻蛄咬方用槲葉燒灰細研以泔水浸槲葉取洗瘡拭之納少許灰於瘡中一方用石灰醋和塗之治蠶咬人方用麝香研蜜調敷一方居蠶咬用苧汁塗之治蚊蟲方端午日午時書儀方二字倒貼於柱腳上能避蚊蟲一方端午日午時取大蝦蟆一個用好墨一塊入口內紅線縛住取正午方掘一穴深五寸埋於內至第二日午時取蝦蟆口中墨收之用時將墨於壁上畫葫蘆一個用淨水噴三口蚊子盡入葫蘆內不可打殺欲其去時用扇搧去取墨蝦蟆活則驗治蠅子方端午日午時寫白字倒貼干柱上四處則無蠅子治臭蟲方用蕎麥秸熬水漻淋其蟲即死治頭上蝨方用包銀硃紅紙燈上燒過蓋碗內少將茶清洗下煙與茶水擦頭髮內以帕包頭一夜其蝨俱死治鼠咬方用貓兒毛燒灰敷之立愈一方用麝香敷包之驗一方貓毛灰入麝香少許津液調敷治人咬傷方用龜版或鱉甲燒為灰末以香油調敷治諸獸傷方治馬咬方細嚼栗子敷傷處一方燒灰貼之一方治馬咬毒入心馬齒莧湯食之瘥一方治馬齧人及踢人作瘡毒腫熱痛馬鞭梢二寸長鼠屎二七枚上二味合燒為末以豬膏和塗之立愈一方單用馬鞭梢燒末豬膏和塗一方用艾灸傷處一方用人糞或馬糞燒灰為末皆可敷之一方治馬齧人陰卵脫出推卵入內以桑皮細作線縫之破烏雞取肝細銼以封之且忍勿小便即愈一方治牛馬齧並馬骨刺傷人及馬血入舊瘡中取栗子灰汁熱漬常令汁器有火數易汁勿令爛人肉三數日漬之有腫者炙石熨之日二消止一方治馬血入瘡中服人糞如雞子大復以糞敷瘡上一方取婦人月水敷之神良一方治剝死馬馬骨傷人毒攻欲死即取馬腸中尿以塗之大良一方取其糞燒灰服方寸匕一方治馬汗馬毛入瘡中腫痛欲死以水漬瘡數易水又以石灰敷之一方欲醇酒取醉即愈一方燒雞毛作末以酒服方寸匕一方沸湯令得所浸洗之取瘥治虎咬方用野生菜搗爛塞所傷處中滿不必換自然新肉長出而愈曾有人被咬已死用此方治之一方取青布緊卷燒一頭納竹筒中射瘡口令煙燻入瘡口中佳一方用莓子葉杵細塗之按本草莓子葉即豬膏莓能治虎犬咬傷一方濃煮葛根汁洗十數遍及搗為散以葛根汁服方寸匕日五甚者夜二一方濃煮生鐵令有味洗之一方先吃清油一碗次用油洗傷處一方用砂糖水調塗並服一二碗一方治虎犬咬白礬撒納瘡中裹之止痛立愈治癲犬咬方孫真人曰春末夏初狗多發狂被其所傷者無出於灸其法只就咬處牙跡上灸之一日灸三壯灸至一百二十日乃止常宜食韭菜永不再發亦良法也一方凡春夏初交犬多發狂但見其尾直下不卷口中流涎舌黑者即是癲狗若被所傷不可視為泛常乃九死一生之患急用針刺去血以小便洗刮令用核桃殼半邊以野人干糞填滿以榆皮蓋定罨於瘡孔著艾於殼上灸之殼焦糞干則易之灸至百壯次日又灸百壯灸至三五百壯為佳灸後用定風散撒之定風散治瘋犬咬先口噙漿水洗淨用綿拭乾以此藥撒之更不再發大有神效天南星生防風各等分上為細末干撒上更不作膿內須服藥以散其毒可也一方治瘋狗咬防風五錢牽牛大黃各三錢斑蝥一錢雄黃二錢半麝香三分上為末每服三錢遇傷時滾水調服利下惡物從小便出一方治瘋狗咬傷瘋狗咬傷其人頂中必有一根紅髮急拔去用追風如聖散貼於咬傷處以抽徹毒氣然後用斑蝥七個去頭足翅以糯米少許於新瓦上同炒以米黃香為度去米不用以斑蝥研細好酒調下能飲人再進酒一杯傷在上食後服在下空心服當日必有毒物從小便出如小狗狀如未下次日再進亦不下又進以毒物出為度若進至七服雖不下毒亦不妨矣服藥後腹中必不安小便莖中刺痛者不必慮此毒受攻將下耳痛甚者以蕪菁一匙煎甘草湯送下即止如無蕪菁青黛亦可疾愈後急以香白芷多雄黃少許為末搗韭根自然汁湯酒調下去斑蝥毒以水淨漱口嚼生蔥罨傷處留小竅出毒氣不可用他草藥罨忌犬豬羊肉及發風毒物小兒量歲數加減斑蝥食癲犬肉致病者治同即愈或過二三年再發治亦如前追風如聖散方見破傷風一方治癲狗所傷用斑蝥二十一個去頭翅並足用糯米一勺先將七個入米內微火炒不令米赤去此斑蝥別用七個再於前米內炒令斑蝥色變復去之又別用七個如前法炒以米出青煙為度去斑蝥不用以米研為粉用冷水入清油少許空心調服頃又再進一服以小便利下惡物為度如不利再進一服利後肚腹疼痛急用冷水調青靛服之以解其毒否則有傷或煎黃連水亦可不宜便食熱物或以益元散水調服尤妙一方用虎脛骨或腦骨為末每二錢熱酒白湯任下一方治癲犬所傷或經久復發無藥可服者用之極驗雄黃色極明者五錢麝香五分上研勻用酒調二錢服如不肯服者則捻其鼻而灌之服藥後必使得睡切勿驚起任其自醒候利下惡物再進前藥則見效矣扶危散治癲狗咬斑蝥七日內用七個外每日加一個十日十個百日百個去頭翅足令淨糯米同炒赤雄黃一錢麝香一分滑石一兩上為末能飲酒者酒調服不飲酒者米飲下或從大小便出或吐出毒即愈以傷處去三寸灸之三壯永不再發神效小兒不用麝亦可一方治猘狂毒頭髮蝟皮各等分上燒灰水和飲一杯口噤者折齒納藥一方治狗咬傷梔子皮燒灰石硫黃二味各等分研細敷之瘥甘草杏仁口嚼爛搭傷處一方用銀杏搗塗傷處一方用蓖麻子五十粒去殼以井花水研成膏先以鹽水洗之敷上效一方即用犬糞塗仍拔去頂上紅髮一方取猘犬腦敷上後不復發一方用豆醬清塗之日三四一方搗莨菪根和鹽敷日三一方用白礬為末撒之一方治癡犬咬搗地黃汁飲之並塗瘡口愈一方煮地榆汁飲之兼細末敷瘡上服方寸匕日三忌酒若瘡瘥者搗生韭汁飲一二升一方刮虎牙若骨服方寸匕一方燒虎骨敷瘡及熨又微熬杏仁搗研取汁服之良一方治瘋犬咬毒發如狗叫者百方不治以人骨燒末水下方寸匕雖煩亂者亦同一方於化人壇拾頭頂骨燒末敷之治凡犬齧人方用杏仁量所傷大小嚼爛沃破處以帛系定立瘥一方杏仁五合熬令黑研成膏敷之一方取皂中熱灰以敷瘡中帛裹系之一方取自死蛇一枚燒焦為末納瘡孔中一方鼠屎為末用臘月豬油和敷之一方用人屎敷之一方以頭垢敷傷處一方用熱牛糞塗於外一方治犬咬人不要洗用紅炭火以物擊碎待冷取塗咬處即愈一方用黃荊葉搗罨瘡上即安一方炙生薑乘熱擦之尤妙一方用紫蘇葉口嚼碎塗之一方用蓖麻子五十粒去殼以井水研成膏先以鹽水洗咬處次以此膏敷貼一方用虎骨屑敷之一方用杏仁去皮尖同馬蘭根研細先以蔥湯洗後以此藥塗傷處效一方以沸湯和灰壅瘡上一方燒犬尾為末敷瘡日三一方用火炙蠟灌瘡中一方以苦酒和灰塗瘡上一方治犬咬破傷風腫用人參於桑柴火上燒成灰末敷之安蟬花散治夏月犬傷及諸般傷損蛆蟲極盛臭惡不可近者蛇退皮一兩燒存性蟬殼青黛各半兩細辛二錢半上為細末每服三錢酒調下如六畜傷損成瘡用酒灌下如犬咬傷用酵子和吃蛆皆化為水蠅子不敢再落又以寒水石末干撒上一方治瘋狗咬小兒胎髮炒新香附野菊花上研細酒調服盡醉一方用蝦蟆後兩腿搗爛酒調服或醋亦可先於頭頂拔血發三二根小便內見白沫一方治瘋狗咬傷用蔥白心四十九根搗爛如膏用生蜜一筒調和用濕筒先盛放用紙封一七日如有人被傷用此膏貼其傷處瘡口上七日又用蔥白皮封著如瘡口大再換膏子貼共二七日忌諸般葷腥一百日外用消風散一錢用熟捷豬肉七片蔥白七莖蜜一小匙和撲再入原煮肉汁泡使蔥白熟方可患人熱食
