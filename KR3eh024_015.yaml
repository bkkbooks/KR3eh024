body:
  text: 卷十五吐酸吞酸附論吐酸屬熱內經云諸嘔吐酸皆屬於熱又云少陽之勝嘔酸原病式云酸者肝木之味也由火盛制金不能平木則肝木自甚故為酸也如飲食熱則易於酸矣是以肝熱則口酸也或言為寒者但謂傷生硬冷物而喜噫醋吞酸故俗醫主於溫和脾胃豈知人之傷於寒也則為病熱蓋寒傷於皮毛則腠理閉密陽氣怫鬱而為熱故傷寒熱在表以麻黃湯熱藥發散使腠理開通汗泄熱退而愈也凡內傷冷物者或即陰勝陽而為病寒或寒熱相搏而致腸胃陽氣怫鬱而為熱亦有內傷冷物而反病熱得汗泄身涼而愈也或微而止為中酸俗謂之醋心法宜溫藥散之亦猶解表之義以使腸胃結滯開通怫熱散而和也若久喜酸不已則不宜溫之宜以寒藥下之後以涼藥調之結散熱去則氣和也所以中酸不宜食黏滑油膩者謂能令氣不通暢也宜食糲食蔬菜能令氣通利也戴氏曰濕熱在胃口上飲食入胃被濕熱鬱遏其食不得傳化故作酸也如穀肉在器則易酸也論雜病吐酸與病機外邪不同東垣曰病機云諸嘔吐酸皆屬於熱此上焦受外來客邪也胃氣不受外邪故嘔傷寒論云嘔家雖有陽明證不可攻之是未傳入里三陰不受邪也亦可見此證在外也仲景以生薑半夏治之孫真人云嘔家多用生薑是嘔家聖藥以雜病論之嘔吐酸水者甚則酸水浸其心不任其苦其次則吐出酸水令上下牙酸澀不能相對以大辛熱劑療之必減酸嘔出酸水也酸味者收氣也西方肺金旺也寒水及金之子子能令母實故用大咸熱之劑瀉其子以辛熱為之佐而瀉肺之實以病機之法作熱攻之者誤矣蓋雜病醋心濁氣不降欲為中滿寒藥豈能治之乎辨素問東垣論酸不同丹溪曰或問吐酸素問以為熱東垣又言為寒何也子曰吐酸與吞酸不同吐酸是吐出酸水如醋平時津液隨上升之氣鬱積而成鬱積之久濕中生熱故從火化遂作酸水而吐出非熱而何其有積久不能自湧伏於肺胃之間吐不得上咽不得下肌表得風寒則內熱愈郁而酸味刺心肌表得溫暖則腠理開發或得香熱湯丸則津液得行而暫解非寒而何故素問言熱言其本也東垣言寒言其末也但東垣不言外得風寒而作收氣立說欲瀉肺金之實謂寒藥不可治酸而用安胃湯加減二陳湯俱犯丁香無治濕熱鬱積之法為未合經意豫嘗治吞酸用黃連茱萸各炒隨時令迭為佐使蒼朮茯苓為輔湯浸蒸餅為小丸吞之仍教以糲食蔬果自養則病易安論吐酸雜治法劉宗厚曰吐酸證以病機言之則屬於熱以臟腑論之則脾胃受病以內邪言之則痰飲宿食之所為故治法熱者寒之脾惡濕以苦燥之有痰飲者清之散之分利之有宿食者消之導之驅逐之局方不察斯故率用辛熱之藥豈吐酸專主於寒而無他證耶統旨云噫腐咽酸或每晨吐酸水數口或膈間常有酸折皆飲食傷胃之所為平胃散加神麯麥芽茯苓半夏口吐清水乃胃中濕熱所為宜平胃散加白朮茯苓滑石半夏不宜純用涼藥亦有胃寒而然者理中湯主之準繩云中脘有飲則嘈有宿食則酸故常噯宿腐氣逆咽酸水亦有每晨吐清酸水數口日間無事者亦有膈間常如酸折皆飲食傷於中脘所致生料平胃散加神麯麥芽各一錢或八味平胃散有熱則咽醋丸膈間停飲積久必吐酸水神術丸酒癖停飲吐酸水乾薑丸風痰眩冒頭痛噁心吐酸水半夏南星白附生為末滴水丸桐子大以生面為衣陰乾每服十丸至二十丸薑湯送下參萸丸可以治吞酸亦可治自利酸心用檳榔四兩陳皮二兩末之空心生蜜湯下方寸匕李氏曰朝食甘美至晡心腹刺酸吐出此血虛火盛宜四物湯加陳皮黃連黃芩桃仁紅花麻仁甘草便閉結者更加大黃氣虛者更合四君子湯許學士云余平生有二疾一則下血二則膈中停飲下血有時而止停飲則無時始因年少時夜坐為文左向伏几案是以飲食多墜向左邊中夜以後稍困乏必飲酒二三盞既臥就枕又向左邊側睡氣壯盛時殊不覺三五年後覺酒止從左邊下漉漉有聲脅痛飲食漸減十數日必嘔數升酸水暑月止是右邊身有汗漐漐常潤左邊病處絶燥遍訪名醫及海上方服之少有驗者間或中病止得月餘復作其補如天雄附子礬石其利如牽牛甘遂大戟備嘗之矣豫後揣度之已成癖囊如潦水之有科臼不盈科不行水必盈科而行也清者可行濁者依前停蓄蓋下無路以出之也是以積之五七日必嘔而去稍寬數日復作脾土惡濕而水則流濕莫若燥脾以勝濕崇土以堆科臼則疾當去矣於是悉屏諸藥一味服蒼朮三月而除自此後一向數年不嘔不吐胸膈寬飲啖如故暑月汗周體而身涼飲亦從中下前此飲漬其肝目亦多昏眩其後燈下能書細字皆蒼朮之力也其法蒼朮一斤去皮切末之用白芝麻半兩水二盞研濾取汁大棗十五枚爛煮去皮核研以麻汁勻研成稀膏搜和入臼熟搗如桐子大曬乾每日空腹溫湯吞下五十丸加至二百丸忌桃李雀鴿初服時必膈微燥且以茅朮制之覺燥甚再進山梔子散一服久之不燥也豫服半年以後止用燥裂味極辛者削去皮不浸極有力亦自然不燥山梔散用山梔一味干之為末沸湯點服故知久坐不可伏向一邊或運動亦調息之法子和云棠溪張鳳村一田叟病嘔酸水十餘年本留飲諸醫皆以燥劑治之中脘臍胻以火艾燔針刺之瘡未嘗合戴人以苦劑越之其涎如膠及出二三升談笑而愈吳氏曰吞酸小疾也可暫而不可久或以疾小而忽之此不知其為翻胃之漸也語曰毫末不折將尋斧柯是故慎之脈法脈弦而滑兩手或浮而弦或浮而滑或沉而遲或緊而洪或洪而數或沉而遲胸中有寒飲洪數者痰熱在膈間時吐酸水欲成胃反也治濕熱作酸方清郁二陳湯治酸水刺心及吞酸嘈雜陳皮半夏薑汁炒茯苓香附黃連炒梔子炒各一錢蒼朮制川芎枳實炒各八分白芍藥炒七分神麯炒五分甘草三分上銼一劑加生薑三片水煎服或為丸服尤效清胃湯治胃熱吐酸黃連用吳茱萸同炒去吳茱萸不用陳皮各三錢茯苓蒼朮黃芩各一錢甘草五分上銼水煎食前服蒼連湯治吐酸蒼朮米泔制黃連薑汁炒陳皮半夏薑汁炒茯苓神麯炒各一錢吳茱萸炒砂仁各五分甘草三分上銼一劑加生薑三片水煎溫服加減平胃散治吞酸吐酸蒼朮陳皮香附砂仁黃連炒梔子炒吳茱萸各一錢甘草三分上銼加生薑煎服茱連丸一名咽醋丸治胃中濕熱抑遏肝火令人吞酸吳茱萸湯泡陳皮去白黃芩炒各五錢黃連陳壁土炒一兩蒼朮米泔浸七錢半一方加茯苓半夏桔梗名九味茱連丸上為細末神麯糊丸如緑豆大每服二三十丸津液咽下回令丸一名佐金丸瀉肝火行濕為之反佐開痞結治肝邪可助補脾藥黃連六兩吳茱萸一兩上為末粥丸服一方茱連二味隨時令寒熱迭為佐使寒月倍茱萸熱月依本方參萸丸上可治吞酸下可治自利又云治濕熱滯氣者濕熱甚者用之為嚮導吳茱萸水浸一宿焙黃連薑汁炒甘草各一兩滑石六兩上為末飯丸如桐子大每服七八十丸食遠白湯下一方無黃連治食積作酸方加味平胃散治吞酸或宿食不化蒼朮生用陳皮厚朴生用甘草炙神麯炒麥芽炒各一錢上㕮咀每服五錢生薑三片水煎服八味平胃散治飲食傷於胃脘每晨吐清酸水數口或膈間常如酸折厚朴去皮薑汁炒升麻射干米泔浸茯苓各一兩半大黃蒸枳殼去穰麩炒甘草炙各一兩芍藥半兩上銼每服四錢水一盞煎七分空心熱服曲術丸治中脘宿食留飲酸蜇心痛或口吐清水神麯炒三兩蒼朮米泔浸炒一兩半陳皮去白一兩上為細末生薑汁另煮神麯糊丸如桐子大每服七十丸薑湯下三因方有砂仁一兩丹溪方治因外感涼氣與宿食相搏心下酸戚吐清水青皮三錢人參紫蘇枳殼木通甘草各二錢黃芩桔梗各一錢半麻黃五分上銼水煎服治痰火作酸方加味二陳湯治痰火停食腐化酸水吐出黃臭或醋心不安陳皮半夏茯苓甘草山楂神麯桔梗南星枇杷葉黃連竹茹上銼加生薑煎臨熟入薑汁一匙調服清痰丸治吞酸嘈雜蒼朮三兩香附子一兩半半夏瓜蔞仁各一兩黃連黃芩各五錢上為末麵糊丸如桐子大每服五十丸食遠茶清下黃連清化丸治吞酸挾瘀血者黃連一兩吳茱萸洗炒一錢半夏一兩半陳皮半兩桃仁二十四個研上為末神麯糊丸如緑豆大每服一百丸生薑湯下火鬱越鞠丸治七情怫鬱吞酸小便赤脈來沉數蒼朮米泔浸山梔子黑炒香附童便浸撫芎神麯炒青黛飛上為末水丸服一方治中風痰涎眩瞑嘔吐酸水頭痛惡心半夏二兩南星白附子各一兩俱生用上為末滴水丸如桐子大以生曲裹衣陰乾服十丸至二十丸生薑湯下治停飲作酸方神術丸治停飲脅下漉漉有聲飲食減少時嘔酸水用此燥脾以勝濕蒼朮一斤去皮為末上用白芝麻半兩水二盞研濾取汁大棗十五枚煮爛去皮核同芝麻汁研勻成稀膏搜和入臼熟搗為丸如桐子大曬乾每日空心吞下五十丸加至二百丸忌桃李雀鴿初服覺燥用山梔一味為末沸湯點服乾薑丸治酒癖停飲吐酸水白朮半夏曲各一兩乾薑葛根枳殼橘紅前胡各五錢吳茱萸甘草各二錢半上為細末煉蜜丸如桐子大每服三十丸米飲下治寒鬱作酸方加減安胃湯治脾胃虛寒飲食入胃吐嘔作酸不待腐熟蒼朮人參各二錢陳皮二錢吳茱萸霍香各一錢半上銼水煎服加味二陳湯治痰飲為患嘔吐頭眩心悸或因食生冷硬物脾胃不和時吐酸水陳皮半夏各二錢半茯苓一錢半甘草七分半丁香五分上銼作一服加生薑三片水煎服一方二陳湯加丁香木香肉桂乾薑砂仁治氣鬱作酸方透膈湯治脾胃不和中脘氣滯胸膈滿悶噎塞不通噫氣吞酸脅肋刺脹嘔逆痰涎飲食不下及大便閉者木香白豆蔻縮砂仁檳榔枳殼厚朴半夏青皮陳皮甘草大黃朴硝各等分上㕮咀每服一兩加生薑三片棗一枚水煎食後服橘皮一物湯治吞酸諸藥不效者服之立愈陳皮一兩上銼水煎食後服餘里一婦人患吞酸療之經年不愈一日酸不能忍其夫漫取橘皮一掬煎湯與之立止余官金陵時一同僚婦患此余令服此湯其酸亦愈真妙方也一方治酸心檳榔四兩陳皮二兩上搗為細末每服方寸匕空心生蜜湯調下平肝順氣保中丸治鬱火傷脾中氣不運胃中伏火鬱積生痰致令嘔吐吞酸嘈雜心腹脹悶常服順氣和中健脾開胃美進飲食化痰消滯清火抑肝白朮土炒四兩香附米童便浸炒陳皮去白各三兩小川芎枳實炒黃連薑汁炒神麯炒山楂肉各二兩半夏薑汁炒一兩半白茯苓梔子薑汁炒萊蔔子炒乾生薑各一兩青皮香油炒六錢麥芽炒七錢砂仁炒甘草炙各四錢木香三錢上為末竹瀝打神麯糊為丸如緑豆大每服百丸食後白湯下日二服治虛火作酸方加味四物湯治朝食甘美至晡心腹刺酸吐出此血虛火盛也當歸川芎芍藥地黃陳皮黃芩黃連桃仁紅花麻仁甘草上銼水煎服大便閉結加大黃氣虛合四君子湯
