body:
  text: 卷七十二心痛即胃脘痛論虞氏曰經云木鬱之發金勝制木木之郁也民病胃脘當心而痛上支兩脅膈咽不通食飲不下此皆風木肝邪之為病厥陰之脈挾胃貫膈故胃脘當心而痛膈咽不通飲食不下也上支兩脅肝氣自逆也蓋木氣被郁發則太過故民病有土敗木賊之候也夫胃為脾之腑陽先於陰故臟未病而腑先病也甚而至於脅下如刀劙音里割也之痛者已連及於臟矣古方名為脾疼者是也胃之上口名曰賁門賁門與心相連故經所謂胃脘當心而痛今俗呼為心痛者未達此意耳雖曰氣運之勝復未有不由清痰食積鬱於中七情九氣觸於內之所致焉是以清陽不升濁陰不降而肝木之邪得以乘機侵侮而為病矣更原厥初致病之由多因縱恣口腹喜好辛酸恣飲熱酒煎煿復食寒涼生冷朝傷暮損日積月深自郁成積自積成痰痰火煎熬血亦妄行痰血相雜妨礙升降故胃脘疼痛吞酸噯氣嘈雜噁心皆膈噎反胃之漸也俗醫不究其源例以辛香燥熱之劑治之以火濟火遂成危劇可不痛哉古方九種心痛曰飲曰食曰風曰冷曰熱曰悸曰蟲曰疰曰去來痛夫所謂冷者惟一耳豈可例以熱藥治之乎詳其所由皆在胃脘而實不在於心也有真心痛者大寒觸犯心君又或汙血衝心手足青過節者旦發夕死夕發旦死醫者區別諸證而治之無有不安之理也丹溪曰心痛即胃脘痛雖日久不食亦不死若治而痛止即食必復痛勿歸咎於醫也必三五服藥後以漸而少食方可獲全安須分久新若明知身受寒氣口傷寒物於初病之時宜用溫散溫利之藥稍久則成鬱熱原病式中備言之若欲行溫散豈無助火為病乎由是古方多以山梔為主加熱藥為嚮導則邪易伏病易退正氣復而愈矣病安之後若縱恣口味不改前非病必再作難治大抵胃中有熱而作痛者非山梔子不可須佐以薑汁多用臺芎開之痛發者或用二陳湯加川芎蒼朮倍加炒梔子煎服痛甚者加炒乾姜佐之反治之法也痛輕者以麻黃桂枝之類散之或以韭汁桔梗開提之重者加石鹼痛甚者脈必伏宜溫藥附子之類不可用參朮諸痛不可補氣故也氣實者用牡蠣粉一二錢酒調下凡以物拄按而痛止者乃挾虛以二陳湯加炒乾薑末和之脈堅實不大便者下之亦可山梔子劫止之後復發者前藥必不效用玄明粉一錢匕白湯調下立止有因平日喜食熱物以致死血留於胃口而痛者宜桃仁承氣湯下之有蟲痛者必面上白斑唇紅又痛後便能食時作時止者是也用二陳湯加苦楝根煎服胃脘有濕飲而痛宜用小胃丹有食積急痛用備急丸心膈大痛攻走腰背發厥嘔吐諸藥不納者就吐中以鵝翎探之出痰積碗許而痛自止氣攻刺而痛宜加味七氣湯凡心痛愈後不可便飲食則痛復作直待飢甚少與稀粥可也丹溪活套云草豆蔻一味性溫能散滯氣利膈上痰果因寒而作痛用之如鼓應桴若濕痰鬱結成痛者服之多效若因熱鬱而痛者理固不當用此但宜以涼藥監製如芩連梔子之屬其功尤速東垣草豆蔻丸治寒熱心痛大獲奇功但因熱者不可多服久服恐有積溫成熱之患耳若久病鬱熱已膠固者斷不可用此味也胃中若有流飲清痰作痛腹中漉漉有聲及手足寒痛或腰膝脊脅抽掣作痛者用小胃丹或三花神佑丸或控涎丹漸漸服之能撤去病根即止桴音浮擊鼓杖也與抱同保命集曰寒厥心痛者手足逆而通身冷汗出便利溺清或大便利而不渴氣微力弱急宜以朮附湯溫之寒厥暴病非久病也朝發暮死急宜救之是知久病非寒暴病非熱也熱厥心痛者身熱足冷痛甚則煩躁而吐額上自汗知為熱也其脈洪大宜灸太谿崑崙表裡俱瀉之是為熱病引熱下行汗通身出者安也灸後與金鈴子散痛止服枳實白朮丸去其餘邪也王節齋曰凡治心腹疼痛但是新病須問曾服何飲食因何傷感有無積滯便與和中消導之藥若日數已多曾多服過辛溫燥熱之藥嘔吐不納胸膈飽悶口舌乾燥大小便澀難則內有鬱熱矣或原有舊病因感而發綿延日久見證如前者俱用開鬱行氣降火潤燥之藥如川芎香附炒山梔黃連薑汁之類甚者再加芒硝但治心腹久痛須用溫散藥內加苦寒鹹寒之藥溫治其標寒治其本也葉氏曰心痛與膈痛不同心痛則在歧骨陷處本非心痛乃心支別絡痛耳膈痛則痛橫滿胸間比之心痛為輕也李氏曰真心痛因內外邪犯心君一日即死厥心痛因內外邪犯心之包絡或他臟邪犯心之支脈謂之厥者諸痛皆少陰厥陰氣逆上衝又痛極則發厥也新者身既受寒口又傷冷郁遏元陽宜草豆蔻丸雞舌香散溫散之或神保丸溫利之稍久寒鬱為熱或因七情者始終是火此古方多以苦寒瀉火為主辛熱行氣為嚮導也寒厥外因風寒客背之血脈背俞與心相引痛暴發手足厥逆冷汗甲青似傷寒陰厥古姜附湯三味玄胡散熱痛內因酒食積熱痰鬱發厥手足雖冷而身熱甚則煩躁吐逆額汗古玄金散三味川楝散莎芎散甚者大承氣湯下之後服枳朮丸九種者悸痛蟲痛來去痛疰痛飲痛食痛風痛冷痛熱痛悸痛內因七情輕則怔忡驚悸似痛非痛妙香散四七湯小草丸熱者連附六一湯重則兩目赤黃手足青至節即真痛不治蟲痛濕熱生蟲攻心痛發難當痛定能食飢則嘔沫靈檳散烏梅丸化蟲丸選用來去痛肺郁痰火勞心則發熱者梔姜飲蠟礬丸痰積白螺殼丸痰火墜痰丸疰痛卒感惡忤屍疰素虛者腎經陰氣上攻神昏卒倒蘇合香丸痛引背傴僂者沉香降氣湯或五苓散倍桂韭汁為丸小茴香湯下素實者腎火上攻小承氣湯勞瘵屍疰者紫河車丹胃脘當心而痛脾臟連心而痛局方云即心痛蓋厥痛亦少脾胃痛多且七情四氣歸脾蟲痛攻脾入胃痰瘀脾胃所主但心痛因傷思慮脾胃痛因傷飲食胃痛善噎兩脅咽膈脾痛舌強喜嘔腹脹二便不通古方實痛以黃連治心山梔治胃虛痛以參歸小草治心丁砂豆蔻治胃亦未嘗混大概傷水飲聚涎心痛如刺者溫膽湯加白朮傷食生冷遇熱食暫散者香蘇散加生薑菖蒲半夏枳殼或人參養胃湯加肉桂吳茱萸或木香化滯湯感應丸凡心痛數日不食無妨痛止恣食即發胃火梔姜飲胃寒烏藥沉香湯上熱下寒者古梔附湯脾痛海石散古二胡散風冷抽刀散蟠蔥散燒脾散二炒香良散濕者小胃丹噎嘔五膈寬中散腹脹厚朴溫中湯連脅痛復元通氣散痰滯便閉順氣導痰湯氣聚便閉三和散四磨湯小便閉通靈散又有心脾俱痛者手拈散外感有風冷熱三者風因肝邪乘心痛則兩脅引小腹陰股桂枝湯加附子便閉入蜜一匙同煎或分心氣飲加厚朴枳殼蘿蔔子木香或阿魏撞氣丸冷因形寒飲冷臥涼腎氣乘心痛則心懸若飢腰痛下重泄痢五積散便閉加大黃或肺寒乘心痛則短氣季肋空痛者流氣飲子鹽煎散或脾寒乘心痛則腹脹便難者藿香正氣散挾濕者除濕湯熱因心包絡暑毒乘心痛徹背俞掌熱黃連香薷散加蓼草或單黃連丸凡諸經心痛引背多屬風冷諸府心痛難以俯仰嘔瀉多屬熱虛痛按之暫止素虛多勞或誤服攻耗心氣藥多者酸棗仁湯歸脾湯心無血輔者四物湯去地黃加乾薑心氣不足者六君子湯加肉桂氣血俱虛者古歸術散挾痰火食積者二六丸實痛素有瘀熱頑痰或因惱怒而發者梔萸丸木香檳榔煎湯下或香稜丸大實痛因怒後飲食卒痛注悶心胸高起手不可按便閉者大陷胸湯或煮黃丸下之後服古藁蒼湯以去餘邪瘀血痛飲湯水嚥下作呃乃素食熱物血死胃脘桃仁承氣湯輕者四物湯加桃仁紅花或元胡索丸失笑散婦人瘀血入心脾痛甚者五積散加三稜莪朮經行未盡血衝心痛加桃仁紅花經行已住作痛者七氣湯加當歸產後痛者桂心湯木檳湯凡痛皆痰黏胃通用二陳湯加減卻痛寒者九痛丸卻痛散熱者散痛丸通靈散有積神保丸瘀血單幹漆丸通用手拈散如意丹神聖代針散脈法脈經曰陽微陰弦則胸痹而痛責其虛也今陽虛知上焦所以胸痹心痛者以其脈陰弦故也胸痹之病喘息咳唾胸痹痛短氣寸口脈沉而遲關上小緊弦數心脈微急為痛微大為心痹引背痛脈短而數者心痛澀者心痛脈浮大弦長者死脈訣舉要曰沉弦細動皆是痛證心痛在寸腹痛在關下部在尺脈象顯然通治一切心痛方加味二陳湯凡痛皆有痰黏胃通用此湯隨證加減陳皮半夏白茯苓各一錢甘草炙五分上銼加生薑水煎服風寒初起無汗加麻黃有汗加桂枝裡寒加草豆蔻濕加蒼朮川芎熱加山梔鍋墨童便或少加炒乾姜反佐之冷加丁香良薑氣虛加參朮血虛加當歸大虛厥逆加姜附肝火加青黛青皮黃連痰飲加白螺殼滑石南星食積加砂仁香附瘀血加韭汁桔梗蟲痛加苦楝根或木香檳榔急痛加胡椒略用斑蝥炒過痛不可忍加細茶乳香或石𨢑凡痛攻走腰背發厥嘔吐諸藥不效者加蒼朮川芎山梔探吐積痰碗許乃愈治寒心痛方薑桂湯治初起胃脘寒痛乾薑良薑官桂各七分藿香蒼朮厚朴薑汁製陳皮甘草炙木香茴香酒炒枳殼麩炒砂仁香附炒各等分上銼一劑加生薑三片水煎服痛甚加乳香手足厥冷脈沉伏加附子去良薑加味平胃散治男婦小兒心腹疼痛不止及嘔吐噁心並皆治之蒼朮米泔浸良薑青油炒各一兩草果一兩五錢陳皮厚朴各三錢五靈脂甘草炙各七錢小茴香炒五錢上為細末每服一大匙水酒或臘醋調熱服不拘時神效丁胡三建湯治冷心疼面青唇黑手足厥冷丁香良薑官桂各一錢半上銼一劑水一鍾煎七分用胡椒五十粒炒黃色為末調入湯藥內頓服扶陽助胃湯治寒氣客於腸胃之間胃脘當心而痛附子炮去皮臍二錢乾薑炮一錢半草豆蔻益智仁楝參甘草炙官桂白芍藥各一錢吳茱萸陳皮白朮各五分上銼如麻豆大都作一服水二盞加生薑三片棗二枚同煎至一盞去柤溫服食前朮附湯治寒厥暴心痛脈微氣弱附子炮五分白朮二錢甘草炙一錢上銼作一服水一盞半加生薑五片棗一枚煎至一盞去柤溫服食前落盞湯治急心痛陳皮香附子良薑吳茱萸石菖蒲各等分上水煎先用碗一個入香油三五點在內小盞蓋之將藥淋下熱服丁香止痛散治心氣痛不可忍良薑五兩丁香半兩茴香炒甘草炙各一兩半上為末每服二錢沸湯點服順氣術香散治氣不升降胸膈痞悶時或引痛及酒食過傷噫氣吞酸心脾刺痛女人一切血氣刺痛蒼朮米泔浸桔梗茴香炒乾薑炮陳皮去白厚朴薑製砂仁丁皮不見火良薑肉桂甘草炙各三兩上為末每服三錢加生薑三片棗二枚水煎熱服或用鹽少許點沸湯下亦可燒脾散治飲啖生冷果菜停留中焦心脾冷痛乾薑草果厚朴姜炒砂仁神麯炒麥芽炒陳皮良薑甘草炙各等分上為末每服三錢淡鹽湯點服溫胃湯治服寒藥多致脾胃虛弱胃脘痛益智仁五錢薑黃乾生薑白豆蔻澤瀉各三分黃耆七分人參厚朴甘草炙砂仁各二分陳皮一分上㕮咀每服八錢水煎食前服加味四七湯治風冷寒邪客搏心腹作痛桂枝白芍藥半夏制紫蘇各一錢半茯苓厚朴薑製枳殼甘草炙各一錢上作一服加生薑五片棗二枚水煎食遠服訶子散治心脾冷痛不可忍一服效又治九種心痛霍亂吐瀉訶子煨去核厚朴薑製乾薑炮草果陳皮良薑炒茯苓神麯炒麥芽甘草炙各一錢上㕮咀作一服水煎入鹽少許食遠服卻痛散治心氣冷痛不可忍者五靈脂去砂蒲黃炒各一錢肉桂石菖蒲當歸木香胡椒各一錢半川烏炮二錢上銼水煎入鹽少許米醋少許食前服愈痛散治心胃急痛五靈脂去砂玄胡索炒去皮蒼朮煨良薑炒當歸洗各等分上為末每服二錢熱醋湯調下不拘時一方蓬朮易蒼朮名定痛散用熱酒醋湯下二錢治證同桂靈散治心腹大痛危急者良薑麩炒厚朴五靈脂明淨者各等分上為細末每服一錢熱醋湯調下立止世不可缺此勝金散治卒心脾痛五靈脂水淘炒一兩玄胡索桂枝當歸酒洗香附炒各七錢沒藥草果各五錢上為細末每服三錢溫酒調食前服草豆蔻丸治客寒犯胃作痛得熱則止熱痛亦可用止可一二服或云治氣弱心痛亦妙草豆蔻麵裹煨一錢四分橘紅吳茱萸湯泡人參黃耆益母白殭蠶各八分生甘草炙甘草當歸身青皮各六分澤瀉小便多者減半半夏各一錢桃仁去皮尖七個麥芽炒一錢半神麯炒柴胡脅不痛減半薑黃各四分上為末桃仁另研如泥和勻湯浸蒸餅為丸如桐子大每服三十丸白湯下食遠服小草丸治胸痹心痛逆氣膈中飲食不下小草桂心川椒乾薑細辛各三兩附子炮五錢上為末煉蜜丸如桐子大每服三丸米飲下忌葷膩生冷二胡散治冷氣心腹㽲痛腹中急痛也玄胡索一方用延胡索胡椒各等分上為細末每服二錢食前溫酒調服二炒香良散治心腹㽲痛香附炒良薑炒各等分上為細末每服二錢入鹽少許米飲調服二味須另研若同炒則不效鐵刷湯治心脾積痛婦人血氣刺痛中酒惡心腸鳴泄瀉良薑炒二兩茴香炒七錢蒼朮制甘草炙各二兩八錢上為細末每服二錢空心姜鹽湯送下果附湯治寒氣心痛附子草果良薑各等分上銼酒煎服立效桂枝生薑枳實湯金匱治心中痞厥逆心懸痛桂枝生薑各一兩枳實五個上銼以水六升煮取三升分溫三服大建中湯金匱治心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下滿而不可觸蜀椒二合去汗乾薑四兩人參二兩上銼以水四升煮取二升去渣內加飴一升微火煎取一升半分溫再服如一炊頃可飲粥二升後更服當一日食糜溫覆之瓜蔞薤白半夏湯治胸痹不得臥心痛徹背者瓜蔞實一枚薤白三兩半夏半斤白酒一斗上四味同煮至四升服一升日三服烏頭赤石脂丸治中寒心如啖蒜狀劇者心痛徹背背痛徹心烏頭炮二錢半附子炮半兩蜀椒乾薑炮赤石脂各一兩上為末煉蜜丸如桐子大先食服一丸日三服不效稍加服桂心散治寒疝心腹四肢逆冷全不飲食桂心二兩去皮為末熱酒調下一錢匕不計時候梅硫丸治心痛累效冰梅一個去核生硫黃為末上相和搗勻以可丸為度作一丸白湯下立愈病不再作此方酸熱以收散寒凡服辛劑反甚者改服酸劑立愈也二姜丸治心腹冷痛暖胃消痰乾薑炮良薑去皮各等分上為細末麵糊丸如桐子大每服三五十丸食後橘皮湯下大沉香丸治冷氣攻衝心腹刺痛亦治卒暴心痛沉香不見火乾薑炮薑黃辣桂檀香不見火各四錢白豆蔻仁二兩白芷大臺烏藥甘松甘草各四兩香附一斤上為細末煉蜜丸如彈子大每服一錢食前細嚼用生薑湯送下四聖丹治心痛肚腹痛陰證絞腸沙神效五靈脂桃仁麩炒黃色去皮尖草烏水泡一日一換浸七日去皮尖切片新瓦焙乾各一兩青黛一兩內二錢入藥八分為衣上為末酒糊丸如桐子大每服十五丸或十七丸用艾葉七片炒出煙黃酒一鍾入鍋去艾取溫酒下三因倉卒散治氣自腰腹間攻心痛不可忍腹中冰冷自汗如洗手足攣急厥冷山梔子大者四十九個連皮搗爛炒大附子一枚炮去皮臍上為末每服二錢酒煎八分溫服九痛丸治九種心痛附子炮三兩生狼牙炙香一錢半巴豆人參乾薑吳茱萸各一兩上為末煉蜜丸如桐子大每服三丸空心溫酒下抽刀散治急心痛白姜五兩用巴豆霜一錢同炒赤去豆不用良薑五兩用斑蝥二十五枚同炒黑去蝥菖蒲五兩半生半炒糯米六兩一分炒黃上為末每服二錢空心溫酒調下昔一人醉臥星夜天明脾疼攻刺百藥罔效後服此頓愈乃知風露入脾故用二薑菖蒲散邪巴豆斑蝥借氣伐根繼以養脾之劑調之更不復作神保丸治心膈氣築痛甚者及氣滯腹痛又治諸刺痛流入背膂及脅下者膂音呂脊骨也木香胡椒各三錢全蠍七個巴豆十個去心皮上為細末湯浸蒸餅丸如麻子大硃砂為皮每服五丸柿蒂燈心湯下腹痛柿蒂生薑湯下血刺痛炒姜醋湯下奪命丸治心痛或急心痛或絞腸痧或積聚不思飲食或酒痛冷痛小兒咳嗽瀉痢婦人血塊積聚並皆治之神效沉香廣木香乳香丁香微炒苦葶藶各五分皂角三分巴豆去皮炒黃四錢上先將七味搗為細末後將巴豆研細同入一處再研勻用熟棗肉為丸如豌豆大油單紙包裹量病人大小重者三丸輕者二丸皆以涼水送下神靈丹專治急心痛立效漢防己二錢五靈脂蒲黃微炒各一兩良薑五錢斑蝥二十個良薑炒黃色去蝥不用上為細末醋糊丸如皂角子大每服一丸艾醋湯下痛甚碾為末調下治熱心痛方清中湯治火痛黃連山梔子炒各二錢陳皮茯苓各一錢半半夏姜炒一錢草豆蔻仁七個甘草炙四分上銼加生薑三片水煎食前服清熱解鬱湯治心痛即胃脘痛一服立止山梔子炒二錢五分川芎一錢蒼朮黃連炒各七分乾薑八分陳皮甘草各五分枳殼炒一錢上銼一服加生薑三片水煎熱服服藥後戒飲食大半日再煎渣服一方有香附一錢梔姜飲治胃熱作痛山梔子十五枚研碎炒川芎一錢上加生薑五片水煎熱服如用此及劫痛藥不止者須用玄明粉一錢服之立效平氣散治心痛蒼朮梔子各一錢半當歸青皮陳皮枳殼木香臨熟時入各一錢甘草三分上銼加生薑三片水煎服清郁散治胃中有伏火膈上有稠痰胃口作痛及噁心嘔吐清水或作酸水醋心煩悶陳皮半夏香油炒白茯苓蒼朮米泔浸炒香附童便炒神麯炒黃連薑汁炒梔子薑汁炒各一錢川芎六分乾薑炒黑五分甘草三分上銼一劑加生薑三片水煎服嘔吐甚加藿香八分砂仁四分或為丸服亦佳黃連六一湯治多食煎炒或燒餅米膩等物致熱鬱胃口而痛者甚效黃連六錢甘草炙一錢上銼作一服水煎服連附六一湯治胃脘痛甚諸藥