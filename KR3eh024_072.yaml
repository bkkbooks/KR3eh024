胡索各一錢痰甚加白螺螄殼燒灰一錢臨服入白螺殼丸治痰積胃脘作痛滑石炒蒼朮白螺螄殼火煨山梔子香附童便浸南星煨裂各一兩枳殼麩炒黃色青皮木香半夏砂仁各五錢上為末用生薑汁浸蒸餅為丸如綠豆大每服五十丸白湯下春加川芎夏加黃連秋冬加吳茱萸海蛤丸治痰飲心痛海蛤燒為灰研極細過數日火毒散用之瓜蔞仁帶穰同研上以海蛤以瓜蔞內乾溼得所為丸如桐子大每服三四十丸白湯下半夏丸治心痛亦能治哮喘半夏研碎香油炒上為末用生薑汁浸炊餅丸如桐子大每服二十丸薑湯下小胃丹治痰飲停積胸膈心胃作痛甘遂麵裹煨熟大戟長流水煮曬乾芫花醋浸炒黑勿焦各一兩大黃酒煨一兩半黃柏炒褐色二兩上為細末粥丸如麻子大每服十丸溫水下胃虛者勿服方白礬飛過黃丹水飛過各等分上為末溶黃蠟和丸如桐子大每服二三十丸薑湯送下神效一方治心痛及絞腸痧大痛幾死者立效無藥處以鹽置刀頭燒紅淬入水中乘熱飲之吐痰而止治氣滯心痛方四味烏沉湯治心脾刺痛烏藥香附砂仁沉香各等分上銼每服三錢加生薑煎服烏藥沉香湯治一切冷氣及中惡心腸痛及婦人血氣攻心胃腹撮痛烏藥一兩沉香五錢人參三分甘草四分上為末每服五分入鹽少許生薑一片水煎服或加香附砂仁陳皮半夏或加枳殼神麯麥芽莪朮青皮木香隨宜加入七氣湯治心肚疼痛肉桂烏藥香附子砂仁益母青皮陳皮三稜蓬朮桔梗甘草上銼加生薑三片水煎服加味七氣湯治七情鬱結心腹痛或因氣而攻痛蓬木青皮香附俱米醋炒各一錢半玄胡索炒薑黃各一錢草豆蔻陳皮各八分三稜炮益智仁藿香各七分桂心五分甘草炙四分上銼水煎食前服死血胃脘痛加桃仁紅花各一錢加減七氣湯治喜怒憂思悲恐驚七氣為病發則心腹刺痛不可忍者或外感風寒濕氣作痛亦宜服之半夏湯泡三錢桂心去粗皮延胡索炒各一錢半人參乳香甘草炙各一錢上作一服加生薑五片棗二枚水煎食遠服三因七氣湯治七氣相干陰陽不得升降攻衝心腹作痛半夏薑汁製五錢茯苓四錢厚朴薑汁炒三錢紫蘇子二錢上銼作二服每服加生薑三片水煎服蟠蔥散治男婦脾胃虛冷氣滯不行攻刺心腹痛連胸脅膀胱小腸疝氣及婦人血氣刺痛延胡索肉桂乾薑炮各四分蒼朮米泔浸焙甘草炙各二錢砂仁檳榔丁皮各一錢茯苓三稜煨蓬朮煨青皮去穰各七分上作一服加連根蔥白一莖水煎空心熱服撞氣阿魏丸治五種噎疾九種心痛痃癖氣塊冷氣攻刺腹痛腸鳴嘔吐酸水丈夫疝氣婦人血氣刺痛並皆治之茴香炒青皮去穰陳皮去白蓬朮炮川芎甘草炙各一兩生薑四兩切片鹽半兩淹一宿炒令黑色縮砂仁肉桂丁香皮一方作小茴香白芷各半兩胡椒阿魏醋浸一宿同面為糊各二錢半上為細末用阿魏和麵糊為丸如桐子大用硃砂為衣每服二三十丸丈夫氣痛炒姜鹽湯下婦人血氣刺痛淡醋湯下神保丸治諸積氣為痛宣通臟腑木香胡椒各二錢半乾蠍全者十個巴豆十個去心膜皮另研取霜上為末和勻湯浸蒸餅為丸如麻子大硃砂為衣每服五七丸心膈痛柿蒂燈心湯下腸痛柿蒂煨薑湯下血痛炒姜醋湯下肺氣甚者以白礬蛤粉各二錢黃丹一錢同研煎桑白皮糯米飲下脅下痛炒茴香酒下大便不通蜜湯調檳榔末一錢一分氣噎術香湯下宿食不消茶酒漿任下治瘀血心痛方失笑散治心氣痛及小腸氣痛不可忍蒲黃五靈脂研淘去砂土各等分上為末每服二錢先以醋調成膏入水一盞煎食前熱服手拈散治心脾氣痛草果玄胡索五靈脂沒藥乳香各等分上為細末每服三錢空心溫酒調服通靈散治九種心痛蒲黃五靈脂各一兩木通赤芍藥各五錢上銼每服四錢水煎臨熟入鹽少許通口服乾漆丸治九種心痛噁心吐水腹脅積聚滯氣婦人瘀血作痛尤效乾漆二兩炒煙出上為末醋糊丸如桐子大每服五七丸熱酒或醋湯下玄胡索丸治死血作痛神效玄胡索一兩五錢桂心紅花滑石各五錢桃仁二十枚上為末蒸餅丸服當歸散治心痛當歸上為末酒調服方寸匕神聖代針散治心痛欲死者服之立效小腸氣搐如角弓膀胱腫硬一切氣刺虛痛並婦人血癖血迷血暈血刺痛衝心胎衣不下難產但是一切因血作痛之疾服之大有神效乳香沒藥當歸川芎白芷各半兩蚖青一兩去翅足炒上為細末每服一分病甚者半錢先點好茶一盞次摻藥末在茶上不得吹攪立地細細呷之桃靈丹治心腹痛及陰證或絞腸瘀等證玄胡索一兩沒藥七錢乳香五靈脂桃仁去皮尖另研各五錢上為細末醋糊丸如桐子大每服二三十丸心疼淡醋湯下腹痛乾薑湯下或通用黃酒下桃仁承氣湯凡治病先要問起居何如如因平日喜食熱物以致死血留於胃口作痛用此下之輕者用韭汁桔梗開提其氣血藥中兼用之大黃一兩桃仁去皮尖五錢芒硝官桂各三錢甘草二錢半上銼每服一兩水煎服治蟲攻心痛方萬應丸治蟲齧心痛檳榔五兩大黃八兩黑牽牛四兩苦楝樹皮一斤皂角肥而不蛀者十枚上先將皂角楝皮用水十大碗熬成膏子前三味為細末和丸先用沉香衣後用雷丸木香衣每服三丸四更時用砂糖水送下烏梅丸治胃冷蛔蟲上攻心痛嘔吐四肢逆冷烏梅三百個黃柏炙細辛肉桂附子炮人參各六兩川椒炒去目及閉口者丹桂各四兩黃連十六兩乾薑炮十兩上為末取烏梅肉和蜜丸如桐子大每服五十丸空心鹽湯下靈檳散治心脾蟲痛五靈脂檳榔各等分上為末每服三錢菖蒲煎湯下隔夜先將豬肉鹽醬煮熟令患人細嚼吐出勿咽卻將前藥空心服之用肉味引蟲頭向上用藥殺蟲也四聖丹治心疼下蟲檳榔一錢大黃牽牛各五分甘草炙四分上為末加艾葉七片水煎入好醋少許服立效木香三稜散治腹中有蟲面色痿黃一切積滯黑牽牛半生半炒大腹皮檳榔雷丸錫灰醋炒三稜煨蓬朮煨木香大黃各一兩上為細末每服三錢空心用蜜水調下或沙糖水亦可須先將燒肉一片口中半嚼之休嚥下吐出肉汁後服藥化蟲丸鶴蝨檳榔胡粉苦楝根去厚皮各五兩白礬飛過二兩上為末麵糊丸如桐子大每服五七丸溫漿下入香油一二點打勻下之米飲亦得其蟲自下追蟲丸治蟲咬心痛乾漆炒煙盡五錢雄黃二錢巴豆霜一錢上為末麵糊丸如黍米大每服十二三丸苦楝根皮煎湯下小金丹治蟲之作痛時作時止痛則攻心口吐清水人中鼻唇一時青黑者是雄黃薑黃巴豆去油山柰各一錢丁香二十五個人言三分上為末用紅棗煮熟為丸如粟米大每服四五丸五六歲兒用七八丸或八九丸艾葉煎湯醋少許送下崔元亮海上方治一切心痛無問新久生地黃一味搗取汁隨入所食多少搜面作餺飥或冷淘食良久當利出蟲長一尺許愈昔崔抗女患心痛垂氣絕遂作地黃冷淘食之便吐一物可方一寸如蝦蟆狀無足目等微似有口蓋為此物所苦自此頓愈面中忌用鹽救急奇方治男婦心痛牙關緊急欲死者用年老蔥三五根去皮須葉搗成膏將病人斡開口用銅匕將蔥膏送入喉中以香油四兩灌送但得蔥膏下喉少時腹中所停蟲病等物化為黃水微利為佳永不再發苦楝湯治蟲咬心痛用苦楝根皮煎湯服之一方治蟲咬心痛鳳眼草即椿姑姑用子乳香各等分上為末麵糊丸如櫻桃大每服一丸黃酒下蔭按通則不痛痛則不通胃脘痛者身受寒氣口得冷物郁遏陽氣而不得上升也或胃脘素有頑痰死血阻滯怒氣而不得條達也然寒冷自外而入初則是寒久化為熱怒氣自內而起始終俱是熱也臨證施治須分寒熱及辨新得久得之證治之焉有不愈之理若真心痛者大寒觸犯心君汙血攻衝心主朝發夕死夕發旦死驗其手足青必過節此不治之證也所謂心者當胸之下歧骨陷處屬心之部位其發痛者則曰心痛蓋心不受邪受邪則為真心痛旦暮不保矣凡有痛者包絡受邪也包絡者心主之宮城也寇凌宮城勢已可危而況犯主乎故治之宜亟亟也學者辨之
