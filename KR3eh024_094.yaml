body:
  text: 卷九十四大便燥結論東垣曰金匱真言論云北方黑色入通腎開竅於二陰藏精幹腎又云腎主大便大便難者取足少陰夫腎主五液津液潤則大便如常若飢飽失節勞役過度損傷胃氣及食辛熱味厚之物而助火邪伏於血中耗散真陰津液虧少故大便結燥然結燥之病不一有熱燥有風燥有陽結有陰結又有年老氣虛津液不足而燥結者治法云腎惡燥急食辛以潤之結者散之如少陰不得大便以辛潤之太陰不得大便以苦泄之陽結者散之陰結者溫之仲景云小便利而大便硬不可攻下以脾約丸潤之食傷太陰腹滿而食不化腹響不能大便者以苦泄之如血燥而不能大便者以桃仁酒製大黃通之風結燥而大便不行者以麻子仁加大黃利之如氣澀而大便不通者以郁李仁枳實皂角仁潤之大抵治病必究其源不可一概用巴豆牽牛之類下之損其津液燥結愈甚復下復結極以至引導於下而不通遂成不救噫可不慎哉丹溪曰祕結有虛者有風者有濕者有火者有津液不足者有寒者有氣結者切不可一例用芒硝大黃利藥巴豆牽牛尤不可用久病腹中有實熱大便不通宜用潤腸丸微利之不宜用峻利之藥古方有脾約證制脾約丸謂胃強脾弱約束津液不得四布但輸膀胱故小便數而大便難曰脾約與此丸以下脾之結燥腸潤結化津液入胃而愈然既曰脾約必陰血枯稿內火燔灼熱傷元氣故肺受火邪而津竭必竊母氣以自救金耗則土受木傷脾失轉輸肺失傳送宜大便祕而難小便數而無藏蓄也理宜滋養陰血使陽火不熾金行清化脾土清健津液入胃脾潤而通矣今此丸用之熱甚而氣實與西北方人稟壯實者無不安若用之東南方人與熱雖盛而氣血不實者雖得暫通將見脾愈弱而腸愈燥矣須知在西北以開結為主在東南以潤燥為主一老人因內傷挾外感自誤汗後以補藥治愈脈尚洪數豫謂洪當作大論年高誤汗後必有虛證仍與參耆歸朮陳皮甘草等自言從病不曾更衣今虛努迸痛不堪欲用利藥豫謂非實祕為氣困因誤汗而虛不得充腹無力可努仍用前藥間以肉汁粥及鎖陽粥與之濃煎蔥椒湯浸下體下軟塊五六枚脈大未斂此血氣未復又與前藥二日小便不通小腹滿悶煩苦仰臥則點滴而出豫曰補藥未至倍參耆服二日小便通至半月而愈葉氏曰祕結之證多面黃其候有風有冷有氣有熱有老人津液乾燥婦人分産亡血及發汗利小便病後血氣未復皆能作祕不可一例用芒硝利藥巴豆牽牛尤不可用風祕者由風摶肺臟傳於大腸故傳化難或其人素有風病者亦多有祕宜升麻防風羌活荊芥煎湯入竹瀝吞脾約麻仁丸冷祕由冷氣橫於腸胃凝陰固結津液不通胃道閉塞其人腸內氣攻喜熱惡冷即仲景所謂陰結病也宜理中湯加官桂枳殼吞半硫丸氣祕由氣不升降穀氣不行其人多噫宜蘇子降氣湯或木香檳榔丸有氣作痛大便祕塞用通劑而便更不通又有氣祕強通雖通復閉或迫之使通因時下血者此當順氣氣順則便自通又當求溫暖之劑熱祕面赤身熱腸胃脹悶時欲得冷或口舌生瘡此由大腸熱結虛者潤腸丸實者承氣湯老人虛祕及出汗利小便過多産後亡血一切病後血氣未復而祕者並宜潤腸丸宿食留滯結而不通腹脹氣急木香檳榔丸熱藥多祕惟硫黃暖潤而疏通冷藥多泄惟黃連肥腸而止泄李氏曰燥結兩字不同燥有風燥熱燥火燥氣血虛燥結有能食脈實數者為陽結不能食脈弦微者為陰結亦有年高氣血虛結者燥屬少陰津液不足辛以潤之結屬太陰有燥糞苦以瀉之凡結後仍服潤血生津之劑免其再結再通愈傷元氣燥結因肝木自旺或肺風入大腸者曰風燥搜風順氣丸因臟腑積熱或久病鬱熱者曰熱燥四順清涼飲當歸龍薈丸因脾胃伏火便閉不食者曰血燥四物湯加大黃桃仁或為丸服大便偏祕者導滯通幽湯小便偏祕者導氣除濕湯陰虛火燥者補中益氣湯通用四物湯川芎為君天麥門冬為臣瓜蔞為佐升麻紅花甘草為使風加秦艽或牛膝熱加黃芩血虛倍生地黃渴加天花粉五味子閉結加大黃郁李仁麻仁氣虛量加參耆陰虛加知母黃柏大抵宜甘寒潤劑忌辛香動火及一切發汗之藥經曰燥者潤之養血之謂也濕熱怫鬱心腹脹滿有蟲積者檳榔丸凡燥結有時者為實無時者為虛有藥石毒者大小便閉氣脹如鼓者三和散合三黃湯飲食毒者香連丸胃火者白虎湯津少因發汗利小便過多及産後失血等證血液枯者五仁丸腎氣丸大補陰丸或導滯通幽湯加檳榔條芩陳皮氣虛者參仁丸補中益氣湯挾七情者古蓯沉丸臟寒則氣澀臟冷則血枯有痃癖冷氣結滯者古半硫丸古薑附湯五積散冰冷與之其病雖宜服陽藥若大便不通者亦當暫與潤劑微通大便不令閉結七情氣閉後重窘迫者三和散六磨湯如脈浮晝便難者用陳皮杏仁等分蜜丸服脈沉夜便難者換桃仁痰滯不通者二陳湯加枳殼檳榔宿食祕喘者須審寒熱傷熱物者二黃丸傷寒物者丁香脾積丸通用備急大黃丸有脾胃伏火者潤腸丸治祕結須流行肺氣蓋肺與大腸為表裡故也枳梗湯加紫蘇或蘇子降氣湯或蘇子麻仁煮粥又如脾約證胃強脾弱約束津液不能四布但輸膀胱故小便數而大便難此脾約丸之由制也但脾屬陰虛火燔金耗則肺失傳化尤宜滋陰養血在西北壯實者以脾約丸開結可也東南氣血虛者潤燥為主通用冷熱尉法掩臍法麻油導法蔭按夫燥結之證有虛實二者之分或因風寒邪從外入或因七情火自內起此是濕熱沸熱燥結有時乃為實也實則宜蕩滌腸胃開結軟堅如大黃芒硝枳實厚朴承氣湯之類是也或因病久飲食少進或因年高將息失宜此是血液枯涸燥結無時乃為虛也虛則宜滋養陰血潤燥散熱如當歸地黃桃仁條芩潤燥湯之類是也若不審虛實而輕用藥死生如反掌之易矣可不畏哉脈法脈多沉伏而結陽結脈沉實而數陰結脈伏而遲或結老人虛人便結脈雀啄者不治脈訣舉要曰執厥脈伏時或而數便祕必難治不可惜又結之脈沉伏勿疑熱結沉數虛結沉遲若是風燥必右尺浮肥治大便熱祕方當歸潤燥湯治大便祕結不通升麻生地黃各一錢半當歸尾熟地砂仁炒大黃桃仁另研麻仁去殼生草各一錢紅花五分上銼作一服水煎空心服一方有黃柏無紅花大黃飲子治身熱煩躁大便不通大黃煨二錢杏仁炒去皮尖枳殼麩炒梔子各一錢半升麻一錢生地薑酒炒人參黃芩各七分甘草炙五分上銼一服加生薑五片豆豉二十一粒烏梅一個水煎食前服大承氣湯治腸胃熱厥極深大便燥結以此下之大黃酒洗芒硝厚朴枳實各等分上銼每服量證大小用水先煮厚朴枳實二物至七分納大黃煮至五分去渣納芒硝煎一二沸通口服以利為度不利再服本方去芒硝名小承氣湯去厚朴枳實加甘草名調胃承氣湯本方加甘草名三一承氣湯皆可選用潤腸丸治脾胃伏火大便祕澀或乾燥不通全不思食及風結血祕皆令閉塞也以此潤燥和血疏風自然通利桃仁湯泡去皮尖麻仁去殼各一兩當歸梢大黃煨羌活各五錢上除桃仁麻仁另研如泥外余杵為細末煉蜜丸如桐子大每服三五十丸空心白湯下如風濕而大便不行加煨皂角仁大黃秦艽以利之如脈澀覺身有氣澀而大便不通者加郁李仁大黃以除氣燥檳榔丸治大腸濕熱氣壅不通心腹脹滿大便祕結大黃蒸黃芩枳實麩炒牽牛炒檳榔羌活麻子仁炒去殼另研杏仁去皮尖炒白芷各一兩人參五錢上為細末煉蜜丸如桐子大每服五十丸空心白湯下牛黃散治上焦熱臟腑祕結大黃一兩白牽牛頭末半兩上為細末有厥冷用酒調下三錢無厥冷而手足寒者蜜調下食後以微利為度東流飲治大便熱結閉塞大黃一錢或二三錢生桃仁七枚生芝麻細茶各一撮甘草五分上用長流水生擂碎服立效井水亦用脾約丸麻仁一兩二錢半杏仁去皮尖炒一兩二錢枳實炒厚朴赤芍藥各二兩大黃四兩蒸上為末煉蜜丸如桐子大每服五十丸空心米湯下消毒麻仁丸杏仁二兩去皮大黃生五兩山梔子十兩上為末蜜丸桐子大每服五十丸食前白湯下玄明粉散治血熱便祕玄明粉三錢當歸五錢上煎湯調服單檳榔散治腸胃有熱大便祕澀檳榔一味上為末每服二錢蜜湯調下潤腸湯治虛老人大便閉結蜂蜜一兩香油五錢朴硝一撮上合一處水一鍾煎數沸溫服治大便風祕方疏風散治風毒祕結枳殼麩炒半兩防風羌活獨活檳榔白芷威靈仙蒺藜炒去刺麻仁去殼杏仁去皮尖甘草炙各一兩上銼每服二錢半加生薑五片蜜一匙慢火煎服活血潤燥丸治大便風祕血祕時常結燥當歸梢五錢防風三錢大黃濕紙裹煨羌活各一兩桃仁二兩研如泥皂角仁燒存性一兩半麻仁二兩半研如泥上除桃仁麻仁另研如泥外為細末煉蜜丸如桐子大每服五十丸白湯下三兩服後須以麻子仁煮粥每日早晚食之大便日久不能結燥也此藥以瓷罐盛之紙包封毋令見風潤腸湯治大便祕澀連日不通麻子仁一盞半細研用水浸濾去皮取濃汁荊芥穗為末四兩芝麻微炒半盞研水浸取濃汁桃仁湯浸去皮麩炒黃研如泥上入鹽少許同煎可以代茶飲之以利為度食前服枳殼丸治腸胃風氣壅盛大便祕實大黃炒二兩枳殼炒木香不見火皂角去黑皮炒香白芷橘紅桑白皮各一兩上為末煉蜜丸如桐子大每服七十丸空心米飲薑湯下又皂角丸治大腸有風大便祕結年高人宜服皂角炙去子枳殼去穰麩炒各等分上為細末蜜丸桐子大每服七十丸空心米飲下大麻仁丸治婦人腸胃風結大便常祕火麻子去殼研膏大黃檳榔木香枳殼各一兩上為末煉蜜丸如桐子大每服三十丸食前白湯下參仁丸治氣壅風盛便祕後重疼痛煩悶麻仁大黃各三兩人參七錢半當歸一兩上為末蜜丸桐子大每服三十丸熟水下治大便氣祕方三和散治七情之氣結於五臟不能流通以致脾胃不和心腹痞悶大便祕澀羌活紫蘇宣木瓜沉香各一兩木香白朮檳榔陳皮甘草炙各七錢半川芎三兩大腹皮一兩上㕮咀每服五錢水煎食前服六磨湯治氣滯腹急大便祕澀沉香木香檳榔烏藥枳殼大黃各等分上用熱湯磨細服之升陽瀉濕湯治隔噎不通逆氣裡急大便不行青皮槐子各二分生地薑酒炒熟地砂仁炒黃柏各二分當歸身甘草梢各四分蒼朮五分升麻七分黃耆一錢桃仁十個去皮尖另研上銼作一服水煎食前熱服木香三稜散治腹中有蟲面色痿黃一切積滯黑牽牛半生半炒多用大腹皮多用檳榔木香雷丸錫灰醋炒三稜煨莪朮煨大黃各二兩上為細末每服三錢空心蜜水調下或砂糖水亦可須先將燒肉一片口中嚼之吐出後服藥潤腸丸治大腸風結氣澀南木香二錢青橘皮檳榔陳橘皮各一兩肥皂角五片醋煮焦去皮子五片生用去皮子二兩共為末五片水一升煮取濃汁濾干慢火銀石器內熬成膏上四味為末以皂角膏搜和成劑如硬少入蜜為丸如桐子大每服三十丸空心溫水下南木香丸治大便祕結南木香不見火檳榔麻仁枳殼各等分上先將枳殼去穰每個切作四片用不蛀皂角三寸生薑五片巴豆三粒略槌碎不去殼用水一盞將枳殼同煮和滾濾去生薑巴豆皂角不用只將枳殼銼細焙乾為末入前藥為末煉蜜丸如桐子大蜜湯下三十丸不拘時搜風潤腸丸治三焦不和胸中痞悶氣不升降飲食遲化腸胃燥澀大便祕結沉香檳榔木香青皮蘿蔔子炒陳皮去白枳殼去穰炒三稜煨枳實麩炒木通各五錢郁李仁去皮一兩上為末煉蜜丸如桐子大每服五六十丸木瓜湯下常服溫潤腸胃導化風氣一方有大黃無木通米飲下枳殼丸治三焦結大小便不通穀氣不得下行枳殼麩炒陳皮各二兩檳榔半兩木香一錢半黑醜四兩半生半炒杵頭末一兩半余不用上為細末煉蜜丸如桐子大每服十五丸薑湯下橘杏丸治老人虛弱人氣祕大便不通橘紅為末杏仁浸去皮尖另研各等分上和勻煉蜜丸如桐子大每服七十丸空心米飲下紫蘇麻仁粥能順氣滑大便紫蘇子麻子仁上二味不拘多少研爛水濾取汁煮粥食之治大便虛祕方導滯通幽湯治大便難幽門不通上衝吸門不開噎塞不便燥祕氣不得下治在幽門以辛潤之當歸身升麻桃仁泥各一錢半生地黃薑汁酒炒熟地黃各一錢甘草紅花各五分上作一服水煎食前調檳榔細末二錢稍溫服一方有大黃無甘草治結燥腹痛加麻仁大黃名當歸潤燥湯小麻仁丸能潤血燥大便不通麻子仁當歸桃仁生地黃枳殼各一兩上為末煉蜜丸如桐子大每服五十丸空心白湯下潤腸丸治血枯大便閉澀杏仁去皮尖炒枳殼麩炒麻仁另研陳皮阿膠蛤粉炒防風當歸梢酒洗肉蓯蓉酒洗桃仁去皮尖炒另研生地黃各一兩上為末煉蜜丸如桐子大每服五十丸空心白湯下一方無蓯蓉以下四味滋腸五仁丸治血液枯稿大腸祕澀傳道艱難桃仁杏仁各去皮尖一兩柏子仁半兩松子仁一錢二分郁李仁炒一錢陳皮四錢另為末上將五仁別研為膏入陳皮末研勻煉蜜丸如桐子大每服五十丸空心米飲下蓯蓉潤腸丸治發汗過多耗散津液大便祕結肉蓯蓉酒浸焙二兩沉香另研一兩上為末用麻子仁汁打糊為丸如桐子大每服七十丸空心米飲下一方治大便虛祕而熱白芍藥一兩半陳皮生地黃歸身各一兩條芩甘草各一錢上為末粥丸桐子大每服七八十丸白湯下厚朴湯治胃虛而閉不能飲食小便清利厚朴薑汁炒二錢六分枳實麩炒一錢半白朮四錢半夏一錢八分陳皮甘草炙各二錢上銼作二劑每服加生薑三片水煎食遠服治大便冷祕方半硫丸治年高冷祕虛祕痃癖冷氣硫黃生研半夏湯泡七次焙乾各等分上為末用生薑自然汁打麵糊丸如桐子大每服五十丸空心溫酒薑湯任下備急大黃丸治胃中停滯寒冷之物大便不通心腹作痛大黃乾薑巴豆去油各一兩上為末煉蜜和搗一千杵丸如小豆大每服三丸溫水下治大小便不通方顛倒散治臟腑實熱或小便不通或大便不通或大小便俱不通大黃滑石皂角各三錢上為末空心溫酒送下如大便不通倍大黃三錢如小便不通倍滑石三錢如大小便俱不通大黃滑石各加三錢倒換散治大小便不通大黃杏仁一方作荊芥各減半更換用上銼水煎服如大便不通大黃一兩杏仁三錢如小便不通大黃三錢杏仁一兩八正散治大小便俱閉大黃瞿麥木通滑石萹蓄車前子梔子仁甘草各等分上銼每服五錢入燈心七莖水煎服鐵腳丸治大小便不通神效大皂角去皮子炙不拘多少一云燒存性上為末煉蜜丸一方酒糊丸如桐子大每服七十丸白湯下一方皂角燒灰為末粥清調下加味二陳湯一婦人脾疼後患大小便不通此是痰隔中焦氣聚上焦用此治之陳皮半夏茯苓甘草木通各等分上銼水煎初服後吐渣再煎服回生神膏治陰證大小便不通及諸雜病陰候大小便不通者宜用此治法數日不通危急者用之非急不用牡蠣陳粉乾薑炮各一兩上為細末男病用女人唾調手內擦熱緊掩二卵上得汗出愈女病用男子唾調手內擦熱緊掩兩乳上得汗出愈蓋卵與乳乃男女之根蒂坎離之分屬也一方治大小便不通江子肉杏仁皂角各等分上為末作餅置臍上艾灸自通車狗散治大小便經久不通欲死者推車客七個土狗七個在土名土狗在水名水狗上二物新瓦上焙乾以虎目樹皮向東南者濃煎湯服之經驗如神虎目即虎杖其性大能利小便又解暑毒一説男子病推車客用頭土狗用身女人病土狗用頭推車客用身效蜣螂散治大小便不通六七月間尋牛糞中有大蜣螂不拘多少用線串起陰乾收貯用時取一個要完全者放淨磚上四面以灰火煨乾以刀從腰切斷如大便閉用上半截如小便閉用下半截各為末新汲水調服二便俱閉則全用之蝸牛膏治大小便不通用蝸牛三枚連殼研為泥再加麝香少許貼臍中以手揉按之立通若用田螺搗爛填臍中亦妙掩臍法治大小便不通用連須蔥一根不洗帶土生薑一塊淡豆豉二十粒鹽二匙同研爛捏餅烘熟掩臍以帛札定良久氣透自通不然再易一方治大小便不通用蜜一鍾入皮硝二錢滾白湯一鍾空心調下木通散治大小便不通木通為末溫酒送下大人多用小兒少用丁香散治大小便不通如神苦丁香五錢川烏炮草烏炮香白芷牙皂炮細辛各三錢胡椒一錢麝香少許上為細末用竹筒將藥吹入肛門內即通一方治大小便不通用火燒鹽放臍內切蒜一片蓋鹽上艾灸二三炷即通一方治大小便不通用明礬末一匙安臍中冷水滴之冷透腹內自然通如是曾灸無臍孔即於灸盤上用紙捻作圈子籠灸盤著礬末在內仍作前法用水滴之治大便不通外取法蜜導法凡諸祕結或兼他證又或老弱虛極不可用藥者以此導之用蜜熬入皂角末少許乘熱捻作小錠候冷以導之冷蜜生薑兌佳豬膽汁導法用大豬膽一枚瀉汁和醋少許灌穀道中一飯頃當大便一方治大便不通神方皮硝一撮水化香油一盞皂角末少許上用竹管一頭套入穀道中一頭以豬尿胞將藥三味入內放竹管里用手著力一捻藥入即通香油導法治大便不通腹脹死在須臾用竹管蘸蔥汁深入大便內以香油一半溫水一半同入豬尿胞內捻入竹管將病人倒放腳向上半時即順立通一方治大便不通用皂角燒煙馬桶內坐熏即通提盆散即霹靂箭用草烏一味為末用蔥頭帶涎醮納肛門中宣積丸手心握藥便通巴豆乾薑韭子良薑硫黃甘遂白檳榔各等分上為細末研飯為丸如龍眼大早朝先用椒湯洗手麻油塗手掌口握藥一粒移時便瀉欲止以冷水洗手
