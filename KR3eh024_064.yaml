body:
  text: 卷六十四虛損論薛氏曰按丹溪先生云人受天地之氣以生天之陽氣為氣地之陰氣為血故氣常有餘血常不足夫人之生也男子十六歲而精通女子十四歲而經行故古人必待三十二十而後嫁娶可見陰氣之難成而養之必欲其固也經曰年至四十陰氣自半陰真陰也四十之後精氣日衰陰減其半矣而起居衰矣夫陰氣之成止供給得三十年之運用況男子六十四歲而精絕女子四十九歲而經斷夫腎乃陰中之陰也主閉藏者肝乃陰中之陽也主疏泄者然而二臟皆有相火其繫上屬於心心火一動則相火翕然從之所以丹溪先生只是教人收心養性其旨深矣天地以五行更迭衰旺而成四時人之五臟亦應之而衰旺如四月屬巳五月屬午為火大旺火為肺金之夫火旺則金衰六月屬未為土大旺土為腎水之夫土旺則水衰況腎水常藉肺金為母以補其不足古人於夏月必獨宿而淡味兢兢業業保養金水二臟正嫌火土之旺耳又曰冬藏精者春不病溫十月屬亥十一月屬子正火氣潛藏必養其本然之真以助來春生髮之氣則春末夏初無頭痛腳軟食少體熱之病矣竊謂人之少有老態不耐寒暑不勝勞役四時迭病皆因氣血方長而勞心虧損或精血未滿而早斫喪故見其證難以名狀若左尺脈虛弱或細數是左腎之真陰不足也用六味丸右尺脈遲軟或沉細而數欲絕是命門之相火不足也用八味丸至於兩尺微弱是陰陽俱虛用十補丸此皆滋其化源也不可輕用黃柏知母之類設或六淫外侵而見諸證亦因其氣內虛而外邪湊襲尤宜用前藥或曰養生以不傷為本此要言也如才所不逮而困思之傷也力所不勝而強舉之傷也悲哀憔悴傷也喜樂過度傷也多言雄談傷也寢食失時傷也挽弓弩傷也沉醉嘔吐傷也飽食即臥傷也跳走喘急傷也是以養生之方唾不及遠行不急步耳不急聽目不極視坐不至久臥不及疲先寒而衣先熱而解不欲極飢而食食不可過飽不欲極渴而飲飲不可過多凡食多則致積聚飲多則致成痰癖也不欲甚勞甚逸不欲起晚不欲汗流不欲多睡不欲奔車走馬不欲極目遠望不欲多啖生冷不欲飲酒當風不欲數數沐浴不欲願遠廣志冬不欲極溫夏不欲窮涼不欲露臥星下不欲眠里見扇大寒大熱大風大霧皆不欲冒之五味入口不欲偏多故酸多傷脾苦多傷肺辛多傷肝咸多傷心甘多傷腎此五行自然之理也凡言傷者初亦不覺久則損壽爾天地生物本然之道也有形之後猶待於哺乳水穀之養男二八而精通女二七而經至陰始成而可與陽配是陰氣之難成也男八八而精絕女七七而經斷陰氣之成復已先虧矣人之情欲無涯此難成易虧之陰若何而可以供給也蔭按經曰精不足者補之以味味陰也補精以陰求其本也然味乃如谷粟菜果出於天賦自然沖和之味故有食入補陰之功非榼醬烹飪偏厚之味出於人為者也經曰陰之所生本在五味非天賦之味乎曰人之五宮傷在五味非人為之味乎善攝生者不可謂味以補精而遂恣於口腹以自速其禍也又曰形不足者溫之以氣溫養也溫存以養使氣自充則形完矣曰補曰溫各有其旨局方悉以溫熱佐輔藥名曰溫補豈旨也哉又曰人年老或虛損精血俱耗陰不足以配陽孤陽幾於飛越天生胃氣尚爾流連又藉水穀之陰故羈縻而定耳局方用溫劑劫虛蓋脾得溫則食進故亦漸可質有厚薄病有淺深設或失手何以收效吾必稍遲計出萬全溫劑決不可用人年老虛損但覺小水短少即是病進宜以人參白朮為君牛膝芍藥為臣陳皮茯苓為佐春加川芎夏加黃芩麥門冬冬加當歸身生薑一日或一帖或二帖小水之長若舊乃止此卻病之捷法也虛勞不受補者不治補氣用參然蒼黑人服多恐反助火邪而爍真陰可以術代之肥白人多服最好又必以陳皮同用大病虛脫本是陰虛灸丹田者所以補陽陽生陰長也多服參耆勿服附子竹瀝本草云大寒泛觀之似與石膏芩連等同類而諸方治胎產及金瘡口噤與血虛自汗消渴尿多皆是陰虛之病無不用之產後不礙虛胎前不損子何世俗因大寒二字遂棄之而不用經曰陰虛則發熱竹瀝味甘性緩能除陰虛之有火熱者寒而能補正與病對蓋大寒言其功非以氣言也人終世食筍未有因其寒而病之者瀝即竹之液況假於火而成何寒如此之甚耶王節齋曰人之一身陰常不足陽常有餘況節欲者少過欲者多精血既虧相火必旺火旺則陰愈消而勞瘵咳嗽咯血吐血等證作矣故宜常補其陰使陰與陽齊則水能制火而水升火降斯無病矣故丹溪先生髮明補陰之說謂專補左尺腎水也古方滋補藥兼補右尺相火不知左尺原虛右尺原旺若左右平補依舊火勝於水只補其左制其右庶得水火相平也右尺相火固不可衰若果相火衰者方宜補火但世之人火旺致病者十居八九火衰成疾者百無二三且人在少年腎水正旺似不必補然欲心正熾妄用太過至於中年欲心雖減然少年斲喪既多焉得復實及至老年天真漸絕只有孤陽故補陰之藥自少至老不可缺也丹溪先生髮明先聖之旨以證千載之訛其功盛哉今立補陰丸方備加減於後又曰凡酒色過度損傷肺腎真陰咳嗽吐痰衄血吐血咳血咯血等證誤服參耆等甘溫之藥則病日增服之過多則死不可治也蓋甘溫助氣氣屬陽陽旺則陰愈消前項病證乃陰血虛而陽火旺宜服苦甘寒之藥以生血降火世人不識往往服參耆以為補予見服此而死者多矣續醫說云凡人血病則當用血藥若氣虛血弱又當從氣虛以人參補之陽旺則能生陰血也東垣曰血脫益氣古聖人之良法補胃氣以助生髮之氣故曰陽生陰長用諸甘劑為之先務舉世皆以為補氣殊不知甘能生血此陽生陰長之理也故先理胃氣人之身內以穀氣為主近世醫者多執王節齋明醫雜著云陰虛誤服甘溫之劑則病日增服之過多則死由是一切脾胃飲食勞倦之證認為陰虛惟用四物湯加苦寒之藥吾恐地黃當歸多能戀膈反傷胃氣所謂精氣血氣何由而生血未見生而穀氣先有所損矣昔一士人形肥而色白因見明醫雜著所載補陰丸服之數年形瘦短氣蜀醫韓天爵用辛熱劑決去其滯積而燥其重陰然後和平無恙此則未達方書而輕率自誤可不戒哉張子和戒補論曰至約之法其治有三所用之藥其品有六其治三汗下吐其品六則辛甘鹹淡酸苦也雖不云補理實具焉予考諸經檢諸方夫人有無病而補者有有病而補者無病而補輕則草木而已草木則蓯蓉牛膝巴戟天菟絲之類重則金石而已金石則丹砂起石硫黃之類吾不知以此為補而補何臟以為補心而心為丁火其經則手少陰熱則瘡之類生矣以為補肝而肝為乙木其經則足厥陰熱則掉眩之類生矣脾為己土而經則足太陰以熱補之則病腫滿肺為辛金而經則手太陰以熱補之則病憤郁心不可補肝不可補脾不可補肺不可補莫非為補腎乎人皆知腎為癸水而不知經則子午君火焉補腎之火火得熱而益熾補腎之水水得熱而益涸既熾其火又涸其水上接於心之丁火火獨用事肝不得以制脾土肺金不得以制肝木五臟之極傳而之六腑六腑之極遍而之三焦則百病交起萬疾俱生小不足言大則可懼不疽則中不中則暴喑而死矣瘍音陽頭創也傷也疽音苴久之癰也疽深而惡癰淺而大喑音音不能言也唵然無聲也虞氏曰內經曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾又曰久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋若夫七情五臟之火飛越男女聲色之欲過淫是皆虛損之所致也機要曰虛損之疾寒熱因虛而感也感寒則損陽陽虛則陰盛損自上而下一損損於肺皮聚而毛落二損損於心血脈虛少不能榮於臟腑婦人則月水不通三損損於胃飲食不為肌膚治宜以辛甘淡過於胃不可治矣感熱則損陰陰虛則陽盛損自下而上一損損於腎骨痿不能起於床二損損於肝筋緩不能自收持三損損於脾飲食不能消克治宜以苦酸鹹過於脾則不可治矣又曰心肺損而色憊腎肝損而形痿難經曰治損之法損其肺者益其氣損其心者補其榮血損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精是皆虛損病因治法之大要也學者詳之丹溪曰天為陽而運於地之外地為陰而居乎中天之大氣舉之日實也屬陽而運於月之外月缺也屬陰稟日之光以為明人受天地之氣以生天之陽氣為氣地之陰氣為血故氣常有餘而血常不足乃以為無病而補之者所得也有病而補者嘔而補吐而補泄而補痢而補瘧而補咳而補勞而補產而補嘔吐則和胃丸丁沉煎瀉痢豆蔻丸御米殼散咳不五味則安神散勞不桂附則山藥產不烏金則黑神吾不知以此為補果何意耶殊不知嘔得熱而愈酸吐得熱而愈暴泄得熱而清濁不分痢得熱而休息繼至瘧得熱而進不能退咳得熱而濕不能除勞得熱而火益燥產得熱而血愈崩蓋如是而死者八九生者一二死者枉生者幸幸而一生憔悴之態人之所不堪也視其寒用熱以補之若言其補則前所補者此病何如予請為言補之法大抵有餘者損之不足者補之是則補之義也陽有餘而陰不足則當損陽而補陰陰有餘而陽不足則當損陰而補陽熱則芒硝大黃損陽而補陰也寒則乾薑附子損陰而補陽也豈可以熱藥而云補云乎哉而寒藥亦有補之義也經曰因其盛而減之因其衰而彰之此之謂也或曰形不足者溫之以氣精不足者補之以味執此溫補二字便是溫補之法惟用溫補之藥且溫補二字特為形精不足而設豈為不病而設哉雖曰溫之止言其氣雖曰補之止言其味曷嘗言熱藥哉至於天之邪氣感則害人五臟實而不滿可下而已水穀之寒熱感則害人六腑滿而不實可吐而已地之濕氣感則害人皮肉筋脈邪從外入可汗而已然發表不透熱而無補之義人之所稟有強有弱強而病病而愈愈後必能復其舊弱而病病而愈愈後必不復其舊矣是以有保養之說熱藥亦安所用哉慎言語節飲食是矣以日用飲食言之則黍稷禾麥之餘食粳者有幾雞豚牛羊之餘食血者有幾桃杏梅李之餘食梨者有幾蔥韭薤蒜之餘食葵者有幾其助則薑桂椒蒔其和則鹽油榼醬常而粥羹別而燋炒異而燒炙甚則以五辣生鮓而薦酒之餚以姜醋羹羊而按酒之病大而富貴比此尤甚小而市庶亦得以享此吾不知何者為寒何物為冷而以熱藥為補哉日用飲食之間已為太過矣嘗聞人之所欲者生所惡者死今反忘其寒之生甘於熱之死者何也由其不明素問造化之理本草藥性之源一切委之於庸醫之手醫者曰寒涼之藥雖可去疾奈何臟腑之間不可使之久冷脾胃不可使之久寒保養則固可溫補之是宜斯言方脫諸口已深信於心矣李氏曰血陰而氣陽也有暴虛而無傷損者易復有虛而虧損者亦可補益惟久虛而傷壞者必保養僅可半愈大概虛脈多弦弦濡大而無力者為氣虛脈沉微而無力者為氣虛甚脈弦而微為血虛脈澀而微為血虛甚或寸微尺大而緊者血虛有火多汗又形肥而面浮白者陽虛形瘦而面蒼黑者陰虛食少神昏精不藏固腰背胸脅筋骨疼痛潮熱盜汗痰嗽此虛證也但見一二便是外因感寒久則損陽自上而下一損於肺則皮聚毛落二損於心則血脈虛少不榮臟腑婦人月水不通三損於胃則飲食不為肌膚治宜辛甘淡若過於胃則不可治矣感熱久則損陰自下而上一損於腎則骨痿不能起於床二損於肝則筋緩不能自收持三損於脾則飲食不能消克治宜酸苦鹹若過於脾則不可治矣又不內外因驚而奪精汗出於心則損脈疾走懼恐汗出於肝則損筋搖體勞苦汗出於脾則損肉飲食飽甚汗出於胃則損腸持重遠行汗出於腎則損骨治宜酸苦若辛散於心則不可治矣抑論心肺損而色憊汗多者為陽虛肝腎損而形痿汗多者為陰虛經云損其肺者益其氣損其心者補其榮血損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精是以古方肺損證見四君子湯心損證見四物湯心肺俱損者八物湯心肺及脾胃俱損者十全大補湯肝腎俱損者牛膝丸雜證心虛夢遺者桂枝湯加龍骨牡蠣四肢煩熱痠疼心悸腹痛者小建中湯汗多力少筋骨拘急者黃耆建中湯汗多脈暴結者炙甘草湯暴損氣虛有汗潮熱者補中益氣湯氣虛無汗潮熱者人參清肌散暴損血虛有汗潮熱者人參養榮湯血虛無汗潮熱者茯苓補心湯暴脫血者益胃升陽湯潮汗痰嗽者黃耆益損湯加半夏大病後食減盜汗者參苓白朮散加黃耆當歸內因五勞六極七傷積虛成損積損成虛傷經年不愈者謂之久虛五勞應五臟六極即六慾應六腑蓋心勞曲運神機則血脈虛而面無色驚悸夢遺盜汗極則心痛咽腫肝勞盡力謀慮則筋骨拘攣極則頭目昏弦脾勞意外過思則脹滿少食極則吐瀉肉消四肢倦怠關節肩背強痛肺勞預事而憂則氣乏心腹冷胸背痛極則毛焦津枯咳嗽哄熱腎勞矜持志節則腰骨痛遺精白濁極則面垢脊痛此五勞應乎五極者也若原因腑虛以致臟虛臟腑俱虛視聽已衰行步不正名曰精極令人精濁莖弱核小故又曰六極極即傷也七傷者推原勞極之由久視傷血久臥傷氣久坐傷肉久立傷骨久行傷肝房勞思慮傷心腎則陰血虛勞役飢飽傷胃腑則陽氣虛此傷證之至要也陰虛四物湯二宜丸腎氣丸火動外潮者四物湯加知母黃柏或滋陰降火湯丸加味消遙散補陰丸火燥甚者大補陰丸單天門冬膏陽虛四君子湯保元湯火衰中寒身冷者鹿茸大補湯蓯蓉散加減內固丸三仙丹溫腎丸膃肭補天丸膃肭海狗之腎曰膃肭臍斑龍丸陰陽俱虛八物湯固真飲子或丸人參養榮湯或十全大補湯加蓯蓉附子半夏麥門冬或八味丸有火者二至丸異類有情丸心虛人參固本丸夢授天王補心丹朱子讀書丸肝虛天麻丸鹿茸四斤丸脾虛參苓白朮散橘皮煎丸蒼朮膏白朮膏參苓造化糕太和羹肺虛單人參膏單五味子膏腎虛小菟絲子丸玄菟固本丸三味安腎丸太極丸不論陰陽損傷皆因水火不濟火降則血脈和暢水升則精神充滿或心腎俱虛或心脾俱虛或心肝俱虛或肺腎俱虛或五臟俱虛但以調和心腎為主兼補脾胃則飲食進而精神氣血自充調和心腎虛中有熱者古庵心腎丸虛中有寒者究源心腎丸不受峻補者神歸茸丸瑞連丸冷補丸兼補脾胃二神交濟丹還少丹天真丸返本丸言虛熱者虛者下虛也熱者上熱也又言虛實者正氣虛邪氣實也心勞邪熱則口舌生瘡語澀肌瘦肝勞邪熱則脅痛關格不通脾勞邪熱則氣急肌癉多汗肺勞邪熱則氣喘面腫口燥咽乾腎勞邪熱則尿赤陰瘡耳鳴溺閉三白湯主之心熱加黃連木通麥冬生地黃肝熱加黃芩防風當歸龍膽草赤芍脾熱加山梔石斛肺熱加知母桑白皮秦艽葶藶腎熱加元參赤茯苓車前子生地黃更參積熱門虛火治法挾氣者交感丹古庵云心腎主血心惡熱而腎惡燥則清熱潤燥之藥是補心腎而瀉脾肺也肺脾主氣肺惡寒而脾惡濕則溫寒燥濕之藥是補肺脾而瀉心腎也局方概用辛香燥劑以能健脾進食然陰血消而心腎損以致虛極火炎面紅發喘痰多身熱如火跌腫溏瀉脈緊不食者死噫凡陰虛皆陰血陰氣虛也若真陽虛亦不可治經云形不足者溫之以氣溫存以養使氣自充非溫藥峻補之謂也精不足者補之以味乃天地自然之味非膏粱之謂也今人無病貪補而致病者有之有病貪補而不依證用藥反增痰火者有之非惟不足卻疾延年亦非養心養性之道且少年欲火正熾尤宜戒補中年以後必資藥餌扶持者亦須量體但從緩治不可責效目前反致奇疾大概腎虛者瓊玉膏還元秋石丸延年益壽不老丹耳目衰者還元丹四聖不老丹松柏實丸腎虛無火者何首烏丸卻老烏須健陽丹腎虛有火者八仙添壽丹羸瘦者大造丸紫河車丹血疾者女真丹柏葉煎柏脂丸秤金丹風疾有火者松脂丸松梅丸風疾無火者仙人飯痰火溺澀者茯苓煎氣弱者單人參膏血燥者單天冬膏地黃膏脾虛者白朮膏脾腎俱虛者加味蒼朮膏此皆養性延年之藥亦必因病選用蔭按陰陽血氣本各不同而世人類以血為陰氣為陽非知本者也血雖屬陰氣雖屬陽而血氣非陰陽也血者行脈之中而為榮者是也氣者行脈之外而為衛者是也至於陰則左腎之真水陽則右腎命門之真火是也故古人補血以四物補氣以四君子而補陰則以腎氣丸補陽則以三建湯之類則血氣陰陽之治判然不同矣世人治陰虛陽虛多用補血氣之藥而忘其為真水火也豈理也哉脈法脈經曰脈來緩者為虛軟者為虛微者為虛弱者為虛弦者為中虛脈來細而微者血氣俱虛脈小者血氣俱少要略曰脈芤者為血虛脈沉小遲者脫氣又曰血虛脈大如蔥管又曰脈大而芤者脫血治氣血兩虛方四君子湯治氣虛人參白朮茯苓甘草炙各等分上銼每服六錢水煎服一方加姜三片棗一枚如自汗或小水利者去茯苓加黃耆二錢四物湯治血虛當歸川芎芍藥熟地各等分上㕮咀每服八錢水煎服春倍川芎夏倍芍藥秋倍地黃冬倍當歸八珍湯治氣血兩虛四君子合四物共為一劑如上法加減煎服六君子湯治氣虛挾痰即四君子湯加半夏陳皮十全大補湯治氣血俱虛而挾寒者人參白朮茯苓甘草炙當歸川芎白芍炒熟地酒炒黃耆肉桂各等分上銼每服一兩加生薑三片大棗一枚水煎溫服人參養榮湯治脾肺俱虛發熱惡寒四肢倦怠肌肉消瘦面黃短氣食少作瀉若氣血虛而變見諸證莫能名狀勿論其病勿論其脈但用此湯其病悉退人參黃耆蜜炙白朮甘草炙茯苓白芍當歸熟地陳皮各一錢五味子遠志去心桂心各五分上銼入生薑三片棗一枚水煎服人參黃耆湯治血虛氣虛脈止魏恆我傳黃耆人參白朮甘草炙當歸芍藥炒陳皮茯神去木麥冬五味子上銼水煎服血虛加地黃有痰加貝母當歸補血湯治氣血俱虛肌熱惡寒面目赤色煩渴引飲脈洪大而虛重按似無此脈虛血虛也此病多有得於飢飽勞役者黃耆炙一兩當歸酒洗二錢上作一服水煎服人參膏治七情勞傷精神短少言語不接肺虛咳嗽及諸失血後或行倒倉法後真能回元氣於無何有之鄉惟脈有火者不宜或加天門冬佐之每用人參一斤切片入砂鍋內水浮藥一指文武火煎乾一半傾在別處又將渣如前煎三次嚼參無味乃止卻將前汁仍入鍋內文武火漫漫熬成一碗如稠湯瓷器盛貯每用一二匙白湯點服歸脾湯治思慮傷脾不能攝血致血妄行或健忘怔忡驚悸盜汗或心脾作痛嗜臥少食大便不調或肢體重痛婦人月經不調赤白帶下或思慮傷脾而患瘧痢人參白朮茯苓黃耆龍眼肉酸棗仁各二錢遠志去心當歸各一錢木香甘草炙各五分上銼水煎服茯神湯治六脈虛軟咳則心痛喉中介介或唾或痛茯神人參遠志去心通草麥門冬黃耆桔梗各六分甘草五味子各三分上切作一服加生薑一片水煎服鹿茸大補湯治男子諸虛不足婦人亡血一切虛損鹿茸酒炙黃耆蜜炙肉蓯蓉酒浸杜仲炒去絲白茯苓當歸酒浸各一錢白芍附子泡肉桂石斛酒蒸焙五味子白朮煨半夏制人參各七分甘草炙五分熟地黃酒浸焙一錢半上㕮咀作一服水二鍾生薑三片棗二枚煎至一鍾食前溫服黃耆益損湯治諸虛勞倦黃耆蜜炙白芍白朮煨石斛酒炒當歸川芎各一錢半肉桂去粗皮熟地砂仁炒半夏薑製甘草炙各一錢木香不見火四分北五味五分上作一服用水二鍾生薑五片紅棗二枚煎至一鍾食前服有熱加柴胡一錢大建中湯治諸虛不足小腹急痛脅肋䐜脹骨肉痠痛短氣喘咳痰嗽潮熱多汗心下驚悸腰背強直多臥少起黃耆蜜炙人參附子炮去皮臍鹿茸去毛酥炙石斛去根續斷當歸酒浸白芍川芎地骨皮小草各一錢甘草炙三分上㕮咀作一服用水一鍾生薑五片煎至八分食遠服如咳嗽加款冬花八分唾血加阿膠蛤粉炒一錢便精遺泄者加龍骨怔忡者加茯神黃耆建中湯治男子婦人諸虛不足羸乏少力此藥大生氣血補益榮衛黃耆三錢白芍四錢肉桂一錢半甘草炙二錢上㕮咀作一服用水二鍾生薑三片棗二枚煎至八分食遠服加味建中湯治榮衛失調血氣不足積勞虛損形體瘦弱短氣嗜臥欲成勞瘵當歸白芍白朮麥冬黃耆各一錢肉蓯蓉酒浸人參白茯苓陳皮熟地砂仁炒川芎各八分肉桂四分炙甘草五分上㕮咀作一服入棗二枚水煎食前服陰陽虛甚者加附子五分固真飲子治中年以上之人陰陽兩虛血氣不足頭每痛日晡微熱食少力倦精氣時脫腰痛䯒痠服之每得良驗䯒音行脊後骨也人參黃耆當歸身熟地砂仁炒各一錢山萸肉五分乾山藥一錢黃柏白朮澤瀉補骨脂各五分五味子十粒陳皮白茯苓各八分杜仲炒甘草炙各七分上㕮咀作一服水煎食前溫服蔭按仙經云服餌不備五味久則臟腑偏傾而反生疾病矣如服金石之劑久則陽燥或致消渴瘡癰病變不可勝紀服固本丸瓊玉膏皆天門冬生熟地黃之類雖本於滋陰胃弱者必滯膈生癰腫服養氣丹安腎丸皆茴香巴戟附子川楝之類雖本於助陽久則積溫成熱必耗損真陰肺痿氣虛痰熱火動不可易治唯以上方藥備五味氣合沖和無寒熱並太過不及之失養氣血理脾胃充溢腠理補五臟之真精益三焦之元氣生津液而榮衛充實利機關而飲食自倍矣治左腎真陰不足方大補陰丸降陰火壯腎水之要藥如腎脈洪大非惟不受峻補雖枸杞山茱補劑亦未可受者宜服黃柏炒褐色知母酒炒各四兩熟地黃酒洗砂仁炒龜板酥炙各六兩上為末豬脊髓和煉蜜為丸如桐子大每服七十丸空心鹽湯下或去地黃名三味補陰丸治酒色過傷少陰王節齋補陰丸滋培腎水黃柏酒炒褐色知母酒炒各三兩敗龜板酥炙透三兩熟地黃酒蒸五兩鎖陽酥炙枸杞子天門冬白芍藥各二兩五味子一兩乾薑炒且三錢寒月加至五錢或換肉桂引諸藥入腎為從治法也上為細末煉蜜和豬脊髓為丸如桐子大每服八九十丸空心鹽湯下寒月溫酒下腎虛加覆盆子菟絲子各二兩夢遺精滑加山梔子黃連各炒各五錢腳膝軟弱無力加牛膝二兩虎脛骨酥炙一兩防己酒洗木瓜各五錢疝氣加蒼朮一兩五錢黃連薑汁炒山梔子炒各六錢川芎一兩吳茱萸炒青皮各五錢脾胃虛弱惡寒易泄加白朮二兩陳皮一兩炒乾姜七錢眼目昏暗加當歸川芎菊花各一兩柴胡黃連炒烏犀角各五錢蔓荊子防風各三錢氣虛加人參黃耆蜜炙各二兩左尺既虛右尺亦微命門火衰陽事不舉加附子肉桂各一兩沉香五錢六味地黃丸治腎氣虛損久新憔悴寢汗發熱五臟齊損遺精便血消渴淋漓等證此藥不燥不寒專補左尺腎水兼理脾胃少年水虧火旺陰虛之證最宜服之婦人血虛無子者服之有效熟地黃八兩酒蒸另搗為膏乾山藥山茱萸酒蒸去核各四兩牡丹皮白茯苓各三兩澤瀉二兩上為末地黃膏和煉蜜為丸如桐子大每服百丸空心白湯溫酒任下一方用生地黃如心氣不足及有瘀血加牡丹皮至八兩如淋漓血腫加澤瀉至八兩如脾胃弱加山藥至八兩如遺精頭昏加山茱萸至八兩如痰火盛小水不清加茯苓至八兩如腎無邪火有遺漏者去澤瀉茯苓加茯神三兩益智五味子麥冬各二兩如潮熱多渴加知母黃柏如中寒少食易泄者加砂仁炒黑乾薑北五味子方氏曰腎惡燥而脾惡濕諸補陰藥中多是濕藥若只腎虛而脾胃壯實者宜服苟脾腎兩虛則不可服也惟此六味地黃丸及八味丸八物腎氣丸雖專補腎虛又兼理脾胃不濕不燥而於脾腎兩虛者故其宜也八味丸治老年水火俱虧腎氣虛乏下元冷憊臍腹腰痛夜多漩溺腳軟體倦面黃或黑及虛勞不足渴欲飲水小便不利一切濕熱等證至命門火衰不能生土以致脾胃虛寒飲食少思者尤宜服之即六味地黃丸加附子桂心各一兩蔭按書曰君子觀象於坎而知腎具水火之道焉故曰七節之旁中有小心小心少火也又曰腎有兩枚左為腎右為命門命門相火也相火即少火耳夫一陽居於二陰為坎水火併而為腎此人生與天地相似也今人入房盛而陽事愈舉者陰虛火動也陽事先痿者命門火衰也真水竭則隆冬不寒真火息則盛夏不熱故人樂有藥餌焉是方也熟地山萸丹皮澤瀉山藥茯苓前之地黃丸也所以益少陰腎水肉桂附子辛熱物也所以益命門相火水火得其養則二腎復其天矣理也又按方氏曰六味地黃丸專補左尺腎水之藥八味丸既補左尺腎水兼補右腎相火之藥少年水虧火旺宜服六味地黃丸年老水火俱虧宜服八味丸況老年腎臟真水既虛邪水乘之而為濕熱以作腰痛足痿並痰唾消渴小便不禁淋閉等證非桂附之溫散而能治之乎八物腎氣丸平補腎氣堅齒駐顏即六味地黃丸加五味子桂各二兩坎離丸治陰虛火動遺精盜汗潮熱咳嗽黃柏知母各等分上藥用童便九蒸九曬九露為末地黃煎膏為丸脾弱者山藥糊為丸如桐子大每服七八十丸白湯下加味坎離丸此藥取天一生水地二生火之意藥輕而功用大久服生精益血升水降火先儒王道之藥無出於此當歸酒洗川芎水洗白芍藥酒浸曬乾知母酒炒各四兩熟地黃浸洗八兩厚黃柏去皮八兩內二兩鹽水浸二兩人乳浸二兩酒浸二兩蜜浸俱曬乾炒赤上修制明白合和一處平鋪三四分厚夜露日曬三日三夜以收天地之精日月之華為細末用蜜一斤半加水半碗共煉至滴水成珠和丸如桐子大每服八九十丸空心鹽湯下冬月溫酒下蔭按知母黃柏滋陰降火不知二味苦寒非能滋陰特能專制陰火使不消鑠腎水耳若胃寒而腎無火邪者服之反害此方合四物湯真降火滋陰之妙劑二宜丸補腎益陰添髓當歸身生地黃各等分上用酒蒸七次和煉蜜為丸如桐子大每服七十丸空心溫酒下滋陰降火丸熟地黃二兩酒炒知母黃柏蓮肉去心茯神去木人參枸杞子各一兩上為末將地黃搗膏和丸如桐子大每服百丸空心白湯下虎潛丸治痿與補腎丸同黃柏酒炒半斤知母酒炒三兩龜板酥炙四兩熟地黃砂仁炒白芍藥酒炒陳皮各四兩鎖陽一兩半虎骨炙一兩冬加乾薑五錢上為末煉蜜為丸如桐子大每服六七十丸空心淡鹽湯下以乾物壓之遺精加龍骨五錢名龍虎濟陰丹懶言語加山藥一方無干姜加當歸一兩半熟地黃比前多一兩一方用生地黃一方加金箔一片加味虎潛丸治諸虛不足腰腿痿痛行步無力此藥久服壯元陽滋腎水養氣血人參黃耆蜜炙芍藥炒黃柏酒浸炒山藥當歸酒洗各一兩甘枸杞虎脛骨酥炙龜板酥炙菟絲子鹽酒炒各五錢熟地黃四兩砂仁炒牛膝酒洗二兩破故紙炒杜仲炒去絲五味子各七錢半上為細末煉蜜和豬脊髓為丸如桐子大每服百丸空心溫酒或鹽湯下滋陰大補丸大補真氣虛損肌體瘦弱即還少丹無楮實而分兩不同牛膝山藥各一兩五錢杜仲酒和薑汁浸炙斷絲山茱萸去核五味子巴戟肉蓯蓉酒浸焙乾茴香炒白茯苓遠志去心甘草同煮各一兩石菖蒲枸杞子各五錢熟地黃酒洗二兩上為末紅棗煮取肉和煉蜜為丸如桐子大每服八十丸淡鹽湯或溫酒空心下此方與上加味虎潛丸乃草窗劉氏所定相間服之佳所謂補陰和陽生血益精潤肌膚強筋骨性味清而不寒溫而不熱非達造化之精微者未足與議於斯滋陰益腎丸補元氣益腎水降心火生精補血壯筋骨悅顏色益壽延年久服大有功效熟地黃酒浸焙六兩黃柏酒浸炒褐色菟絲子酒蒸焙各四兩牛膝酒浸敗龜板酥炙黃虎骨酥炙黃知母白芍藥白朮山藥當歸酒浸枸杞子各三兩上為細末地黃膏和煉蜜為丸如桐子大每服七八十丸空心淡鹽湯送下如腰腿無力加牛膝一兩酒浸敗龜板一兩五錢酥炙滋補地黃丸專治諸虛百損腎經不足腰膝無力久服能烏髭發補元氣生精養血延年益壽熟地黃酒浸白茯苓各一兩乾山藥黃柏酒浸炒知母酒浸炒枸杞子各八兩牛膝酒洗焙牡丹皮當歸酒洗山茱萸去核各六兩澤瀉敗龜板四兩酥炙上為細末煉蜜丸如桐子大每服五十丸空心好酒或淡鹽湯下補腎養脾丸治腎經虛損腰腳無力脾土虛弱飲食少進常服補腎養脾益氣血長精神此藥不寒不熱大有功效熟地黃四兩酒蒸肉蓯蓉三兩白朮當歸山藥白茯苓各二兩知母鹽水炒黃柏鹽炒芍藥各一兩杜仲酥炙去絲牛膝酒洗破故紙炒五味子各一兩半沉香肉桂各七錢半甘草炙五錢人參黃耆各二兩上為細末煉蜜丸如桐子大每服六十丸空心溫酒或鹽湯下補精丸此藥升降陰陽既濟水火調和氣血平補心腎遠志去心白茯苓青鹽炒另研菟絲子酒蒸各二兩當歸酒浸牛膝酒洗破故紙炒益智仁各一兩石菖蒲山茱萸去核各五錢上為細末用豶豬腰子一雙去膜合酒研爛煮麵糊為丸如桐子大每服五十丸空心淡鹽湯或好酒下固真丸治腎經虛損元陽不足者鹿角霜一斤鹿角膠二兩白茯苓去皮五兩上為細末將膠水溶和為丸每服五十丸空心米湯酒任下草還丹益元陽補元氣固元精壯元神此延年續嗣之至藥也山茱萸酒浸取肉一斤破故紙酒浸一日焙乾半斤當歸四兩麝一錢上為末煉蜜丸如桐子大每服八十丸臨臥酒鹽湯任下加味補陰丸黃柏