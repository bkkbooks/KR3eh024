故紙肉桂巴戟山藥肉豆蔻鍾乳粉鹿茸當歸沉香白茯苓遠志沒藥陽起石五靈脂乳香硃砂各一兩上為末和前藥研勻糯米糊調每兩作五十丸陰乾入布袋內擦光每服二十丸空心溫酒姜鹽湯任下婦人艾醋湯下續嗣丹山茱萸天門冬麥門冬各五兩破故紙八兩菟絲子枸杞子覆盆子蛇床子巴戟熟地砂仁炒韭子各三兩龍骨黃耆牡蠣山藥當歸鎖陽各二兩人參杜仲各一兩半陳皮白朮各一兩黃狗腎酥炙二對上為末用紫河車一具同麥冬地黃煉蜜搗丸如桐子大每服百丸空心臨臥溫酒鹽湯任下壯陽丹仙茅蛇床子五味子白茯苓肉蓯蓉山藥杜仲各一兩韭子破故紙巴戟熟地砂仁炒山萸菟絲子各二兩海狗腎一枚紫梢花一兩上為末用雄雞肝腎雄鱉肝腎各一付以鹽酒花椒末蒸熟搗爛和入前藥再用酒煮山藥糊為丸如桐子大每服百丸空心鹽湯下如陽痿精冷者加桂附石燕雀卵丸菟絲子一斤酒煮搗爛曬乾為末上於春二三月間取麻雀卵五百個去黃用白和丸如梧子大每服八十丸空心鹽湯或酒下腰痛加杜仲四分之一下元冷加附子六分之一此藥當預製成末遇有雀卵不拘多少而用禿雞散極能助陰有房室人常服無絕無房室人勿服蛇床子菟絲子遠志防風五味子巴戟杜仲炒去絲各一兩肉蓯蓉二兩上為細末每服一匕好酒調下日進二服一方八味各二兩七寶至珍丹治虛勞不足精血耗竭常服固精補元利腰膝壯筋骨烏鬚髮強陽道延年益壽何首烏赤白各一斤濃米泔水浸一日磁瓦刮去皮打碎用黑豆五升與牛膝同入木甑內用砂鍋蒸熟去豆不用牛膝川中肥大者去蘆半斤與何首烏同蒸以黑透為度茯苓赤一斤打碎如圓眼大用牛乳五升浸透白一斤用人乳五升浸透各曬乾凡用乳須作兩三次浸則易透菟絲子半斤酒浸一日蒸二次取出石臼內椿去皮曬揚去皮淨復以好酒浸一日曬乾搗爛為末破故紙半斤炒香為末當歸半斤酒洗淨枸杞子半斤酒洗曬乾本方加茯神半斤名卻老烏須健陽丹一方加山藥山萸去核肉蓯蓉酒浸去甲各四兩名何首烏丸上皆勿犯鐵器為細末煉蜜和勻於石臼內木石杵搗千餘下丸如彈子大每服一丸日進三服空心酒下午間薑湯下臨臥淡鹽湯下忌蔥蒜白蘿蔔或作小丸如桐子大亦可加味七寶丹此藥性極平和不熱不冷服之固元氣耐飢勞美容顏烏鬚髮隨服隨驗久服愈驗真萬金不傳之神方也何首烏八兩赤白兼用米泔水浸一宿用竹刀刮去皮切大片用黑豆五升浸軟一層黑豆一層首烏蜜蓋九蒸九曬天冬酒洗去心焙乾麥冬酒洗去心焙乾生地黃酒洗焙乾熟地黃酒浸一宿搗膏山萸去核川牛膝酒洗枸杞子微炒各三兩白茯苓去皮厚黃柏鹽酒炒褐色各五兩遠志去心蓮蕊益智去殼各一兩山藥二兩沉香木香各五錢上為細末煉蜜丸桐子大每服五十丸空心酒下固精丸此藥益陰固精壯陽補腎可常服久能生子蓮蕊新者四兩山萸去核四兩芡實五百枚去殼菟絲子一兩酒煮爛五味揀紅潤者破故紙炒各五錢白蒺藜去角刺炒五錢覆盆子酒浸蒸去穰四兩上為細末煉蜜丸舂千餘下丸如桐子大每服五十丸空心溫酒鹽湯任下真傳膃肭臍丸補精益血壯元陽暖丹田滋容顏利腰膝補藥之最妙者也前服當歸酒洗熟地砂仁沉香炒生地姜酒炒肉蓯蓉酒浸梔子炒各五錢黃芩三錢黃柏鹽酒炒二錢木香沉香各一兩三錢檳榔四錢膃肭臍四錢海牛一個海馬一對蛤蚧一對酥炙後服枸杞子五味子肉蓯蓉酒洗當歸酒洗生地黃酒洗熟地黃酒蒸各五錢牛膝酒浸白茯苓沉香木香各一兩天冬去心麥冬去心各五錢甘草三錢枳殼五錢海馬一對酥炙海牛一個酥炙蛤蚧一對酥炙膃肭臍四兩酥炙上二料俱為細末酒糊為丸如桐子大每服六七十丸空心溫酒或鹽湯下補天大造丸治男女諸虛百損補益之功極重久服耳目聰明鬚髮皆黑延年益壽有合造化之功故名大造曰補天者取天一生水義也大抵男精女血構成非金石草木可比以人補人全天元真氣世所少知紫河車一具即產孩胞衣所謂混沌皮也古方不分男女惟以初生及肥盛無病婦人者可用先以米泔水擺淨不動筋膜此乃初結真氣也以竹器盛於長流水中浸一刻提回以小磁盆全盛於木甑內文武火蒸自卯至申酉極熟如糊取出先傾自然汁在藥末內此天元正氣汁也余用石臼木杵擂千餘下如糊樣通入藥為丸醫用火焙酒煮及去筋膜又入龜板大誤故特書之生地黃酒浸一兩半熟地黃酒蒸二兩麥冬去心天冬去心牛膝杜仲炙去絲各一兩五錢當歸酒洗黃柏酒炒白朮五味子枸杞子小茴香各一兩側柏葉焙乾二兩陳皮去白七錢半乾薑炮二錢上為細末用河車入煉蜜為丸如桐子大每服七十丸空心鹽湯下有病者日進二服如血虛倍當歸地黃氣虛加人參黃耆各一兩腎虛加覆盆子小茴香巴戟山茱萸腰疼加蒼朮萆薢鎖陽續斷骨蒸加地骨皮知母牡丹皮婦人去黃柏加川芎香附條芩蔭按女人月水不調兼素慣小產難產及多生女少生男夫婦服之可生男蓋緣紫河車者天地之先陰陽之祖乾坤之橐鑰鉛汞之匡廓胚腪將兆九九數足我則載而乘之故謂之車但每驗河車一制後其子多不育若卻我之疾損人之子心亦忍矣因注之俟用者審焉或云水煮熟用不損子此強辭也然總以不用為是太乙神應丸治一切虛損勞證人乳一碗用鍋煮乾去水不用將干乳用磁碗焙乾聽用牛乳一碗同上治造白果汁一碗同上杜仲三兩薑汁炒去絲白鮮皮酒浸三日破故紙大麥炒黃色白茯苓川牛膝酒浸三日當歸童便浸各二兩黍米金丹一個曬乾即初生小兒口中大血珠上為細末煉蜜丸如桐子大每服一丸夜間入口噙化如驚加珍珠琥珀神效五精丸治腎虛痿弱大補元氣秋石剛硬者鹿角霜茯苓陽起石山藥各等分上為末酒糊丸如桐子大每服五十丸須要常近火邊使乾燥庶幾服之無戀膈之患三元丹治諸虛百損補氣生精安魂定魄益壽延年紅鉛嬌乳各一兩辰砂乳香各一錢虛無秋石一錢用便盆或新磚自生者方可上俱為細末用雞子一個磕一孔將清黃傾出用紙展淨裝前藥入內紙糊嚴密密放群蛋內以雞抱之三七取出乳和為丸如桐子大每服三丸五更時人乳送下稍有汗出不可見風神仙小聖丹紅鉛半盞貞女首經更佳二三次出者次之其色紅黃為上純紅為中紫黑者不用硃砂五錢辰州豆片者佳有精神為最上先將紅鉛取來拌入硃砂放磁盆內日曬月照四十九日畢飛仙池文武火升三炷香其藥透蔑一邊冷定開看與金箔相似用雞翎掃下約一分八釐為上等其次一分二釐以烏金紙包入小眼藥罐內以黃蠟封口外尿胞皮通身包裹仍放大瓶內以綿絮塞緊仍用竹葉尿脬緊札用絡以長繩引入井中去火毒四十九日足取出擇吉日將藥置於桌上南向香紙供獻用好乳香末半分研細末以人乳二三滴將聖藥和勻作三丸服者對天南向跪拜祝畢舉藥入口將人乳送下即歸室中靜養三七日然後方許出門動作顏色反童鬚髮變黑服藥一度可延壽一紀還元丹補精神益氣血視聽言動不衰人乳粉秋石丹茯神人參各四兩上為末用好酒化鹿角膠二兩作糊丸如桐子大每服三十丸空心溫酒或鹽湯下還元秋石丸治諸虛百損秋石丹白茯苓各一斤天冬去心麥冬去心生地酒炒熟地黃人參枸杞子人乳粉各四兩上為末煉蜜丸桐子大每服三十丸白湯或酒下陰陽二煉丹世之煉秋石者但得火煉一法此藥須兼陰陽二煉方為至藥火煉乃陽中之陰得火而凝入水則釋歸於無體蓋質去味存此離中之虛也水煉乃陰中之陽得水而凝遇曝而潤千歲不變味去質留此坎中之實也二物皆出於心腎二臟而流於小腸水火騰蛇玄武正氣外假天地之水火凝而為體服之還補太陽相火二臟主為養命之本空心服陽煉日午服陰煉此法極省力與常法功用不侔久疾服之皆愈有人得瘦疾且嗽諸方不效服此即瘳有人病顛腹鼓日久加喘滿垂困亦服此而安也陽煉法用人尿十餘石各用桶盛每石入皂莢汁一碗竹杖急攪百千下候澄去清留垽並作一桶如前攪澄取濃汁一二斗濾淨入鍋熬干刮下搗細再以清湯煮化筲箕鋪紙七八層淋過再熬如此數次直待色白如雪方止用砂盒固濟火煅成質傾出如藥未成更煅一二次候色如瑩玉細研入砂盒內固濟頂火養七晝夜取出攤土上去火毒為末棗膏丸如桐子大每空心溫酒下二十丸陰煉法用人尿四五石以大缸盛入新水一半攪千匝澄定去清留垽又入新水攪澄直候無臭氣澄下如膩粉方曝乾刮下再研以男兒乳和如膏烈日曬乾蓋假太陽真氣也如此九度為末棗膏和丸如桐子大每午後溫酒下三十丸秋石四精丸治思慮色欲過度損傷心氣遺精小便數秋石白茯苓各四兩蓮肉芡實各二兩上為末蒸棗肉和丸如桐子大每服三十丸空心鹽湯下秋石五精丸常服補益秋石一兩蓮肉六兩真川椒紅五錢小茴香五錢白茯苓二兩上為細末棗肉和丸桐子大每服三十丸空心鹽湯溫酒任下秋石法用童男童女潔淨無體氣疾病者淋浴更衣各聚一處用潔淨飲食及鹽湯與之忌蔥韭蒜姜辛辣膻腥之物待尿滿缸以水攪澄取人中白各用陽城瓦罐鹽泥固濟鐵線札定打火一炷香連換鐵線打七次然後以男女者秤勻和作一處研開以河水化之隔紙七層濾過仍熬成秋石其色雪白用潔淨香濃乳汁和成日曬夜露但干即添乳汁取日精月華四十九日數足然後收貯配藥此劉氏保壽堂經驗方也瓊玉膏大能添精補髓化腸胃為筋骨萬神具足五臟盈溢發白轉黑返老還童行如奔馬日進數服終日不食亦不飢渴治癱瘓勞瘵尤妙昔人嘗謂一料分五劑可救癱瘓者五人分十劑可救勞瘵者十人生地黃新鮮者十六斤搗取膏人參為末取一斤半白茯苓三斤舂細水飛去浮筋冬蜜十斤國朝太醫院會議加甘枸杞天冬去心麥冬去心各一斤上和勻入瓷瓶內用綿紙七重厚布一重緊封瓶口置砂鍋內用桑柴火煮三晝夜再用黃蠟紙二三重包紮瓶口納井中浸一日夜出火毒次日再入舊湯內煮半日出水氣然後收藏每日空心及午前後取一二匙用溫酒或白湯調服修合時沐浴忌雞犬孝子婦人見之天門冬膏清肺補腎充旺元陽昔有一王子單服此膏連生三十二子壽至百歲行步輕健耳目聰明如童子又能去積聚風痰補肺療咳嗽血失血潤五臟殺三蟲伏屍除瘟疫輕身益氣令人不飢大抵此藥冷而能補最宜於酒色過度之人常服極好惟胃寒者不宜天門冬一味揀去枯壞者用溫水潤透去皮心每一斤用水五大碗入銅砂鍋內慢火煮乾三分之二用布絞去汁將渣搗爛又用水三碗再熬減大半又以布絞淨如此三次將汁通和一處入好蜜以甘苦得中為度用文武火熬至滴水不散似稀糊樣取起置冷地上一夜出火毒以磁罐收貯每日空心午前後以白滾湯調服一二匙冬月溫酒服有痰薑湯服上焦熱及有痰食後多服一次下焦熱小便赤澀空心多服一次每一斤加生地黃六兩尤妙蓋地黃為天門冬之使若有君無使是獨行無功也故張三丰與胡濙尚書長生不老方用天門冬三斤地黃一斤乃有君而有臣也亦可煉蜜作丸服地黃膏治血虛生瘡肌膚燥癢自汗遺精便多婦人乳少等證用生地黃酒洗淨每一斤用水五六碗如熬天門冬法熬用之或加當歸等分一方入鹿角膠十分之一蜜酒生薑蘇子自然汁量人煎膏無比山藥丸治諸虛百損五勞七傷肌體消瘦目暗耳鳴四肢倦怠常服壯筋骨益腎水山藥二兩菟絲子酒煮搗焙杜仲薑汁炒各三兩赤石脂煨茯神去皮木山萸去核熟地黃酒焙巴戟去心牛膝去蘆酒浸澤瀉各一兩五味子六兩肉蓯蓉四兩酒浸上為細末煉蜜為丸如桐子大每服五十丸空心溫酒送下沉香大補丸專治下焦虛弱補益精血久服身輕體健五臟調和百脈通泰功效甚妙黃柏酒炒褐色知母酒炒一兩半熟地黃酒浸炒乾人參去蘆敗龜板酥炙各二兩沉香芍藥陳皮牛膝酒浸鎖陽酒浸虎脛骨當歸酒浸山萸去核山藥茯苓去皮牡丹皮杜仲酥炙去絲澤瀉大茴香炒各一兩上為細末煉蜜丸如桐子大每服五六十丸空心溫酒鹽湯任下固真丹治諸虛百損五勞七傷水火不能升降下元虛冷臍腹疼痛山藥一兩半人參黃耆蜜炙黃柏酒炒白朮杜仲炒斷絲補骨脂炒白茯苓牡丹皮山萸去核各一兩五味子炒澤瀉各五錢熟地黃四兩湯蒸爛石臼內搗成膏羊肉七斤上四味為末將羊肉洗去脂膜扯開入藥末以麻縛之用酒四瓶煮令酒干再添水二升又煮候肉爛如泥又入黃耆末五兩人參末二兩白朮末二兩糯米飯焙乾為末同搗丸如梧子大每服百餘丸溫酒鹽湯任下早晚各進一服如覺難丸入蒸餅五七枚焙乾為末同丸牛膝丸治肝腎虛損骨痿不能起於床宜益精筋緩不能自收持宜緩中牛膝萆薢杜仲蓯蓉菟絲子防風胡蘆巴補骨脂沙苑蒺藜各一兩肉桂五錢上為末酒煮豬腰子為丸如桐子大每服五七十丸空心酒下歸茸丸治精血枯竭面色黧黑耳聾目暗口乾多渴腰痛腳軟小便白濁上燥下寒峻補不受等證黧音黎黑而黃也面目黧黑色青黑而沃鹿茸酒蒸當歸酒浸各等分上為細末用烏梅水煮去核和前末搗勻為丸如桐子大每服六七十丸空心米飲送下壯陽丹此藥強壯陽道固暖精血宜二三日用一服或與固精丸間用肉蓯蓉一兩酒浸一宿五味子一兩蛇床子一兩菟絲子酒浸煮爛曬乾杜仲薑汁炒去絲牛膝去蘆酒洗淨黃柏蜜炙各四兩知母蜜炒三兩胡桃肉湯洗去皮八兩一方無知母上為細末春夏用粥秋冬用煉蜜其粥用糯米一碗煮之將胡桃肉搗爛為膏和勻石臼內杵千餘下為丸如梧桐子大每服五十丸至八十丸空心鹽湯或酒送下以乾物壓之太極丸人之五臟配天之五行一有不和是以為病藥有五味各主五臟常欲適調因配合諸味使人精氣神心肺腎保和無遺生化之源既清邪不能入矣故曰太極黃柏屬水滋腎苦以堅精去皮鹽酒浸三日微炒褐色取淨末三兩六錢知母屬金主潤肺苦以降火佐黃柏為金水相生去毛酒浸一宿微炒淨末二兩四錢破故紙屬火收斂神明能使心包之火與命門之火相通故元陽堅固骨髓充實澀以治脫也新瓦炒香火淨末二兩二錢胡桃肉屬木潤血血屬陰陰惡燥故油以潤之佐故紙為木火相生故書謂黃柏無知母故紙無胡桃猶水母無蝦也去皮研二兩二錢砂仁屬土醒脾開胃引諸藥歸丹田香而竄和五臟中和之氣如天以土為中氣也去殼一兩分作二分五錢生用五錢同花椒一兩炒香去椒不用上各製為細末煉蜜丸如桐子大每服五七十丸早夜沸湯茶酒任下服至三年百病漸消終身服之無間可以為地仙矣一方加橘紅鹽水拌炒半夏湯泡七次銼片薑汁拌為餅陰乾名加味太極丸玄菟丹治腎氣虛損目眩耳鳴四肢倦怠遺精尿血心腹脹滿腳膝痠痿股內濕癢小便滑數水道澀痛時有遺瀝等證菟絲子五兩山藥二兩七錢蓮肉二兩白茯苓一兩五味子二兩上為末山藥留一半打糊丸桐子大每服五十丸空心鹽湯下腳無力木瓜煎湯下本方去五味子名小菟絲子丸更加枸杞子二兩合人參固本丸名玄菟固本丸斑龍丸除百病補百損壯精神養氣血大有奇效老人虛人常服延年益壽久成地仙昔蜀有道人酣歌酒肆中曰尾閭不禁滄海竭九轉靈丹都漫說惟有斑龍頂上珠能補玉堂關下血真人許仲原索方以傳鹿角膠鹿角霜菟絲子酒浸研細柏子仁去殼熟地黃各半斤白茯苓補骨脂各四兩上為細末酒煮米糊為丸或以鹿角膠入好酒烊化為丸如梧桐子大每服七八十丸空心臨臥鹽湯酒任下烊音陽炙也又斑龍丸歌曰腎命衰兮陽痿弱臨時子後不能捉皆因過度損精神又被七情傷經絡不思飲食體羸虛每會陰時陽不作嗟嘆斯人少諭機履霜不戒堅冰合一朝幸得遇高明再拜希求補髓藥莫煉鍾乳與丹砂不用膃肭至簡約採得斑龍頂上珠更加數味研為末如法修合蜜和丸日日常服形容樂向時勞瘵病痊瘳命在呼吸彼此奪年老渾如少壯人陰陽交際無窮樂夢寐不侵智鏡明保養元陽何藥若目視千步咫尺間趨走如飛百里過入室之人得遇斯丹田愈補愈堅確不須服氣與飧霞何勞金丹九轉多羊車轉運已枉然青蛇劍口徒開闊碧海蛟螭雖難比久服自能萬疾卻鹿角膠半斤細切炒成珠鹿角霜一斤天門冬去心麥門冬去心各一兩半肉蓯蓉酒洗去甲蒸熟生地姜酒炒熟地砂仁沉香炒菟絲子淘淨酒浸黃柏鹽水浸炒各二兩柏子仁去殼一兩上為細末煉蜜入黃酒一半將藥攪勻稍幹些入石臼內杵千餘下以黏為度丸如桐子大每服五十丸漸加至百丸空心黃酒或鹽湯送下以乾物壓之不犯胃氣或晨昏各一服亦可此藥無間斷服六七個月方見效服至一年七十老人渾如壯年常服延年可至仙位二至丸常服補虛損暖腰臍壯筋骨明眼目調養元氣滋益子息其效如神名二至者取冬至一陽生夏至一陰生之義也熟地黃酒蒸龜板酒浸酥炙白朮麩炒黃柏酒浸炒各三兩知母酒浸炒當歸酒洗生地黃酒浸白芍藥酒炒麥冬去心各四兩天冬姜炒二兩上為細末棗肉同煉蜜和杵百餘下丸如桐子大每空心午前服五十丸忌萊菔諸血羊肉服至百日逢火日摘去白髮生出黑髮是其驗也犯所忌不效胡尚書壯陽丹滋補元陽美顏益算蓮肉水浸去皮心八兩甘枸杞芡實乾山藥白茯苓山萸去核各四兩老年人加遼參四兩上為細末用熟糯米一升炒黃色為末白糖五兩酥油五兩拌勻瓷器收貯每早沸米湯酒任調下五六匙乾物壓之秘傳二仙糕固齒黑髮壯陰益腎水養脾胃人參山藥白茯苓芡實蓮肉去皮心各半斤糯米一升蜜半斤白糖半斤粳米三升半上為細末和勻將蜜糖溶化和末摻挼得宜小木籠炊蒸之上以米一撮成飯為度取起盡作棋子塊漫火上烘乾作點心食之白湯漱下百日內見效妙殊不盡何首烏丸治男子元臟虛損發白再黑填精補髓何首烏半斤肉蓯蓉六兩牛膝四兩上將何首烏用棗一層甑內蒸棗軟用竹刀切焙同為末用棗肉為丸如桐子大每服五七丸嚼馬蘭子服酒下食前一服加一丸日三服至四十九丸即止卻減應數服其效如神修合不犯鐵器加味斑龍丸治真陰虛損理百病養五臟補精髓壯筋骨益心志安魂魄悅澤駐顏延年益壽鹿角霜鹿角膠鹿茸陽起石附子酸棗仁柏子仁肉蓯蓉黃耆各一兩當歸熟地砂仁沉香炒各八錢辰砂五錢上為末酒糊丸如桐子大每服五十丸空心溫酒鹽湯任下一名茸珠丸加減內固丸治命門火衰腎寒陰痿元陽虛憊陰溺於下陽浮於上水火不能既濟石斛胡蘆巴各二兩巴戟肉蓯蓉山萸去核菟絲子各三兩破故紙二兩半小茴香一兩附子五錢上為末煉蜜丸桐子大每服五十丸空心鹽湯溫酒任下補真丸治飲食不進屢用脾胃藥不效者乃房勞過度真火衰弱不能熏蒸脾土致中州不運飲食不進胸膈痞塞或不食脹滿或已食不消大便溏泄古人雖云補腎不如補脾其實補脾不如補腎也胡蘆巴香附子陽起石川烏肉蓯蓉菟絲子沉香肉豆蔻五味子各五錢鹿茸巴戟鍾乳粉各一兩上為末用羊腰子兩對以蔥椒酒煮爛和酒糊搗丸桐子大每服七十丸空心米飲鹽湯任下草還丹益精髓補腎經固元陽輕腰腳安五臟通九竅令人耳目聰明延年益壽乃仙家之良劑蒼朮四兩酒浸一兩米泔浸一兩醋浸一兩鹽水浸一兩並炒破故紙一兩酒浸一宿胡蘆巴酒浸覆盆子二錢川烏一兩鹽炒茴香一兩鹽炒川楝子一兩木香不見火五錢山藥穿山甲酥炙地龍去土淨茯苓去皮枸杞子牛膝酒浸各三錢上為細末酒糊丸如桐子大每服五十丸空心溫酒或鹽湯下乾物壓之治心腎兩虛方天王補心丹治玩讀著作勞神過度以致潮熱盜汗咳嗽失血遺精怔忡健忘咽乾口燥肌體羸瘦調和心腎二經要藥也常服安心保神益血固精壯力強志令人不忘熟地砂仁炒白茯苓人參遠志去心石菖蒲玄參柏子仁桔梗天冬去心丹參酸棗仁炒去油麥冬去心甘草炙百部五味子茯神當歸杜仲薑汁炒斷絲各等分上為細末煉蜜丸如彈子大每兩作十丸金箔為衣每服一丸用燈心棗湯化下食遠臨臥服或作小丸亦可柏子養心丸安心保神益血固精祛煩熱除驚悸長聰明久服令人不忘柏子仁四兩枸杞子三兩玄參二兩生地黃麥冬白茯神當歸石菖蒲甘草酸棗仁各五錢水潤去紅皮上為細末除柏子地黃石臼搗如泥加煉蜜丸梧桐子大每服四五十丸臨臥白湯下古庵心腎丸年高之人有患其無子者有惡其發白者然無子責乎腎發白責乎心何則腎主精精盛則孕成心主血血盛則發黑然心惡熱腎惡燥此方補精益血清熱潤燥治心腎之聖藥也不獨施於發白無子二者其驚悸怔忡遺精盜汗耳鳴腰痛足痿諸證無不治也熟地黃酒浸生地黃酒浸山藥茯神各三兩山萸酒浸去核枸杞子酒洗龜板去裙酥炙牛膝去蘆牡丹皮去心鹿茸火去毛酥炙黃連各一兩當歸澤瀉黃柏各一兩半生甘草五錢上為末煉蜜丸如桐子大辰砂為衣每服五十丸漸加至百丸溫酒或鹽湯空心下究源心腎丸理水火不既濟心怔盜汗夜夢遺精目暗耳鳴腰膝緩弱常服調陰陽補心腎牛膝酒浸熟地黃酒蒸肉蓯蓉酒浸各一兩鹿茸附子炮去皮臍人參遠志茯神黃耆蜜炙山藥炒當歸酒浸龍骨五味子各一兩菟絲子酒浸蒸成餅三兩上為末用浸藥酒煮麵糊為丸如桐子大每服七十丸空心棗湯下蔭按此方補虛溫寒燥濕蓋為虛中有寒者設也若虛中有熱者又當以古庵心腎丸治之瑞蓮丸定心暖腎生血化痰蒼朮主脾一斤生用四兩酒醋米泔各浸四兩蓮肉主心一斤去皮心酒浸軟去皮心人豬肚內煮爛焙乾枸杞子主肝甘州者二兩五味子主脈去梗二兩熟地黃主血酒浸蒸二兩破故紙主腎炒二兩上為末用前豬肚搗膏同酒糊丸如桐子大每服四五十丸空心溫酒下二神交濟丹治心脾腎三經虛者茯神薏苡仁各三兩酸棗仁去油枸杞子白朮神麯炒各二兩柏子仁芡實生地酒炒麥冬當歸人參陳皮白芍藥白茯苓砂仁各一兩以上十六味每神字領八味合八節共二十四兩合二十四氣為一歲也為末用熟水四盞調煉蜜四兩煮山藥四兩為丸梧子大每服三五十丸米飲下血虛甚去芍藥加鹿茸脾虧甚去地黃加五味子琥珀散治虛勞百病除陰痿清精力不足大小便不利如淋狀腦門受寒氣結在關元強行陰陽精少餘瀝腰脊痛四肢重咽乾口燥食無常味乏氣力遠視䀮䀮驚悸不安五臟虛勞上氣滿喘琥珀研蕪菁子胡麻子車前子蛇床子菟絲子枸杞子菴䕡子橘皮肉蓯蓉松脂牡蠣各四兩麥門冬去心一升松子柏子荏子各三升桂心石韋石斛滑石茯苓芎藭人參杜仲續斷遠志當歸牛膝牡丹皮各三兩通草十四兩上三十味各治下篩合搗二千杵盛以韋囊先食服方寸匕日三夜一用牛羊乳汁煎令熟長服令人強性輕體益氣消穀能食耐寒暑除百病雖御十女不勞損令精實如膏服後七十日可得行房久服老而更少發白反黑齒落重生杜仲散益氣補虛治男子羸瘦短氣五臟痿損腰痛不能房室杜仲蛇床子五味子乾地黃各六分蓯蓉遠志各八分木防己巴戟天各七分菟絲子十分上為末食前酒調服方寸匕日二服常服不絕佳常餌補方枸杞子一斤天雄三兩蓯蓉石斛乾薑各八兩菟絲子遠志續斷各五兩乾地黃十兩上為末酒服方寸匕日二服食無所忌服藥十日候莖頭紫色乃可行房又方五味子蛇床子各二兩續斷牛膝各三兩車前子肉蓯蓉各四兩上為末酒服方寸匕日三服一方治陰下濕癢生瘡失精陰痿牡蒙菟絲子柏子仁蛇床子肉蓯蓉各二兩上為末酒服方寸匕日三服以知為度一方蛇床子菟絲子杜仲各五分肉蓯蓉五味子各三分上為末煉蜜丸如桐子大每酒下十四丸日二夜一一方菟絲子蛇床子五味子各等分上為末煉蜜丸如桐子大每服三丸飲食服日三降心丹治心腎不交盜汗遺精及服熱藥過多上盛下虛小便赤白濁常服鎮心益血熟地黃酒浸焙乾天冬去心各三兩麥冬去心人參茯神去木山藥茯苓遠志甘草煮去骨各二肉當歸去蘆肉桂去皮各半兩硃砂半兩另研為衣上為末煉蜜丸桐子大每服三十丸人參湯下平補鎮心丹治心血不足時或怔忡夜多異夢如墜層崖常服補心腎益榮衛白茯苓五味子車前子茯神去木肉桂各一兩麥冬去心一兩二錢半遠志去心甘草煮天冬去心山藥洗薑製熟地黃酒蒸各一兩半酸棗仁炒二錢半人參五錢龍齒二兩半硃砂五錢另研為衣上為末煉蜜丸桐子大每服二十丸空心米飲酒任下十四友丸治心腎虛損神志不安白茯苓白茯神去木酸棗仁炒人參各一兩龍齒別研二兩阿膠蛤粉炒黃耆遠志去心當歸酒洗熟地黃柏子仁別研肉桂紫石英別研各一兩辰砂另研一錢上為末同別研四味細末揀蜜丸桐子大每服三十丸食後棗湯下安神補心定志益元固真丸安心安神固精益血壯力強志令人善記不忘除怔忡定驚悸清三焦大化痰祛煩熱療咽乾滋腎水健脾胃悅顏色生肌膚不寒不熱當歸一兩二錢酒洗天冬八錢去心麥冬一兩去心柏子仁一兩炒遠志一兩二錢去皮甘草浸知母七錢鹽水炒黃連一兩薑汁炒百部五錢酸棗仁一兩炒去油白茯苓一兩二錢玄參七錢生地黃二兩酒洗石菖蒲一兩炒熟地黃二兩酒洗杜仲一兩去絲薑汁炒黃耆七錢蜜炙枸杞子一兩酒蒸肉蓯蓉一兩酒炒白朮八錢土炒川芎五錢軟柴胡五錢去蘆加橘紅一兩白茯神去皮木上為細末煉蜜為丸如梧桐子大每服六十丸早晚不拘時服忌蘿蔔蔥蒜
