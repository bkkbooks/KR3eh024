body:
  text: 卷三十七痞滿痞部鄙切音否痛也病結也氣隔不通也不痛者為痞滿痛者為結胸論東垣曰夫痞者心下滿而不痛是也太陰者濕也主壅塞乃土來心下為痞滿也傷寒下太早亦為痞乃因寒傷其榮榮者血也心主血邪入於本故為心下痞悶仲景立瀉心湯數方皆用黃連以瀉心下之土邪其效如響應桴故活人書云審知是痞先用桔梗枳殼湯非以此專治痞也蓋因先錯下必成痞證是邪氣將陷而欲過胸中故先用截散其邪氣使不致於痞先之一字早用之意也若已成痞而用之則失之晚矣不惟不能消痞而反損胸中之正氣則當以仲景痞藥治之經云察其邪氣所在而調治之正謂此也非止傷寒如此至於酒積雜病下之太過亦作痞滿蓋下多亡陰亡陰者謂脾胃水穀之陰亡也故胸中之氣因虛下陷於心之分野故致心下痞宜升胃氣以血藥兼之若全用氣藥導之則其痞益甚甚而復下之氣愈下降必變為中滿膨脹皆非其治也又有虛實之殊如實痞大便閉者厚朴枳實湯主之虛痞大便利者白芍陳皮湯主之如飲食所傷痞悶者當消導之去其胸中窒塞上逆兀兀欲吐者則吐之所謂在上者因而越之是也海藏曰治痞獨益中州脾土以血藥治之其法無以加矣傷寒痞者從血中來雜病痞者亦從血中來雖俱為血證大抵傷寒之法從外至內從有形至無形故無形氣證以苦泄之有形血證以辛甘散之中滿者勿食甘不滿者復當食也中滿者腹脹也如自覺滿而外無腹脹之形即非中滿乃不滿也不滿者病也當以甘治之可也無形氣證以苦泄之者枳實黃連之類是也有形血證以辛甘散之者仲景人參湯是也劉宗厚曰痞之為病由陰伏陽蓄氣血不運而成處心下位中央䐜滿痞塞皆土之病也與脹滿有輕重之分痞則內覺痞悶而外無脹急之形脹滿則外有形也前人所論皆指誤下而致之亦有不因誤下而致者如中氣虛弱不能運化精微則為痞飲食痰積不能施化則為痞濕熱太盛土乘心下則為痞既痞與濕同治惟上下分消其氣如果有內實之證庶可略與疏導世人痞塞喜用利藥以求速效暫時通快痞若再作益以滋甚是不察夫下多亡陰之意也葉氏曰痞之與脹誠有輕重之分然世之病痞者自謂小疾不以為重而喜行疏泄峻利之藥往往馴至於脹滿而不救也昔人以商鞅治秦為喻旨哉斯言可以為世戒也馴詳倫切音旬馬順也從也善也凡以漸而至曰馴又馴古訓字丹溪曰痞有食積兼濕心下痞須用枳實炒黃連如肥人心下痞內有濕飲宜蒼朮半夏縮砂茯苓滑石之類如瘦人心下痞乃鬱熱在上焦宜枳實黃連以導之葛根升麻以發之如人飲食後因冒風寒飲食不消而作痞滿宜吳茱萸縮砂藿香草豆蔻之類溫以化之如脾氣虛弱轉運不調飲食不化而作痞者宜白朮陳皮山楂神麯麥芽之類以消之又曰痞滿之證不一有傷寒下早而作痞者桔梗枳殼湯小陷胸湯之類有因酒食填塞胸中而作痞者保和丸東垣枳實導滯丸木香化滯湯之類傷寒下多則亡陰而痞者四物湯加參苓白朮升麻柴胡少佐以陳皮枳殼之類或大病後元氣未復而胸滿氣短者補中益氣湯橘皮枳朮丸木香枳朮丸之類有因下而結者從虛及陽氣下陷治之有不因下而痞者從上虛及痰飲郁濕熱治之戴氏曰諸痞及噎膈乃是痰為氣所激而上氣又為痰所膈而滯痰與氣搏不能流通並宜二陳湯加順氣之劑邪氣作痞宜用疏劑若氣不順而作此為虛痞宜於收補之中微有疏通之意因七氣所傷結滯成痰痞塞滿悶宜四七湯加木香香附枳殼李氏曰痞與否卦義同精神氣血出入流行之紋理閉密而為心下痞塞按之不痛非若脹滿外有脹急之形大便易而利者為虛大便難而閉者為實外感邪氣自肌表傳入胸膈為半表半裡證宜和解或已經下胸滿而痛者為結胸不滿者為痞滿同傷寒治法雜病食積下之太過或誤下則脾胃之陰頓亡以致胸中至高之氣乘虛下陷心肺分野其所蓄之邪又且不散宜理脾胃兼以血藥調之若用氣藥導利則氣愈降而痞愈甚久則變為中滿鼓脹蓋痞皆自血中來但傷寒從外之內宜以苦泄雜病從內之外宜以辛散人徒知氣之不運而概用枳梗檳榔而不知養陰調血惜哉古方食壅胸中窒塞者二陳湯探吐傷飲食胸痞者枳朮丸食後感寒以致飲食不化者二陳湯加山楂麥芽神麯虛寒不散或寬或急常喜熱物者理中湯加枳實稍久郁成濕熱者平補枳朮丸痰火因厚味郁成痰滯者小陷胸湯或枳梗二陳湯導痰湯火盛者二陳湯加芩連瓜蔞或黃芩利膈丸用白朮陳皮煎湯下或古萸連丸以瀉肝補脾清濕熱開痞結久病者黃連消痞丸如痰火濕熱太甚者方敢用三黃瀉心湯加減量下之虛者只宜分消上下與濕同治七情氣鬱成痞不思飲食食之不散者木香化滯湯或順氣導痰湯有稟受中虛痞滯不運如飢如微刺者六君子湯加香附砂仁有內傷勞役濁氣犯上清氣下陷虛痞者補中益氣湯加黃連枳實芍藥便閉加大黃嘔加黃連生薑陳皮冬月加黃連丁香食已心下痞者平補枳朮丸停飲中寒者枳實理中丸瘀血結成窠囊而心下痞者用桃仁紅花香附大黃等分為末酒調服利之或犀角地黃湯血虛挾火遇勞則發心下不快者四物二陳湯加桔梗瓜蔞降之氣血俱虛者枳實消痞丸王道消補不輕吐下故古方以芩連枳實苦泄厚朴生薑半夏辛散參術甘苦溫補茯苓澤瀉淡滲隨病所在調之通用二陳湯為主隨證加減吳氏曰痞與否同不通泰也易曰天地不交而成痞故肺氣不降脾氣不運升降不通而名痞也痞虛中之實也許學士云邪之所湊其氣必虛留而不去其病則實故治痞者一補一消脈法脈經曰痞脈浮堅而下之緊反入里因作痞脈濡弱弱反在關澀反在顛微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而躁煩澀則無血厥而且寒陽微不可下下則心下痞堅右關脈多弦弦而遲者必心下堅脈訣舉要曰胸痞脈滑為有痰結弦伏亦痞澀則氣劣治一切痞滿方加減二陳湯通治諸痞陳皮半夏茯苓各一錢甘草炙五分上銼入生薑三片水煎服肥人多濕痰加蒼朮砂仁滑石倍茯苓半夏瘦人多熱鬱中焦加枳實黃連乾葛升麻稟受素實者加枳殼黃連青皮厚朴素虛者加白朮山楂麥芽陳皮誤下陰虛者去茯苓半夏加人參白朮升麻柴胡枳實以升胃氣更合四物湯以濟陰血飲食積痞加枳殼砂仁薑汁炒黃連食後感寒加藿香草豆蔻吳茱萸砂仁氣痞痰痞加木香枳殼南星中虛加人參白朮香附砂仁瘀血合四物湯加桃仁紅花大消痞丸治一切心下痞及年久不愈者乾生薑神麯炒甘草炙各二錢豬苓二錢半澤瀉厚朴砂仁各三錢半夏湯泡七次陳皮去白人參各四錢枳實麩炒五錢黃連炒黃芩各六錢薑黃白朮各一兩上為細末湯浸蒸餅為丸如梧桐子大每服五七十丸至百丸食遠白湯下治中虛痞方加味六君子湯治稟受中虛痞滯不運人參白朮茯苓各一錢甘草炙三分陳皮半夏各七分香附砂仁各五分上銼入生薑三片水煎食遠服加味補中益氣湯治內傷勞役濁氣犯上清氣下陷虛痞者黃耆人參甘草陳皮當歸白朮升麻柴胡黃連枳實芍藥上銼一劑水煎服如便閉加大黃嘔加黃連生薑陳皮冬月加黃連丁香平胃枳朮丸調中補氣血消痞清熱白朮三兩白芍藥酒浸炒一兩半枳實麩炒陳皮黃連酒炒各一兩人參木香各五錢上為末荷葉煮濃打老米糊為丸如桐子大每服五十丸漸加至六七十丸食遠米湯下醒脾育胃丸治中焦之氣不足食後虛痞吞酸完穀不化人參白茯苓白朮各一錢半夏砂仁白芍藥麥芽蒼朮厚朴藿香枳實五分陳皮各八分上加生薑三片棗二枚水煎食遠服枳實消痞丸治右關脈弦心下虛痞惡食懶倦開胃進食乾生薑甘草炙麥芽麵炒白茯苓各二錢白朮半夏曲人參各三錢厚朴薑製四錢枳實麩炒黃連各五錢上為細末蒸餅丸如桐子大每服七八十丸白湯下食遠服治濕熱痞方黃連消痞丸治心下痞滿壅滯不散煩熱喘促不安澤瀉薑黃各一錢乾生薑二錢甘草炙茯苓白朮各三錢陳皮豬苓各五錢枳實炒七錢半夏九錢黃連一兩黃芩炒二兩上為細末湯浸蒸餅為丸如桐子大每服五十丸溫湯下食遠服黃芩利膈丸除胸中熱利膈上痰生黃芩炒黃芩半夏黃連各五錢澤瀉五錢南星枳殼陳皮去白各三錢白朮二錢白礬一錢今加蘿蔔子炒五錢小皂角一錢上為細末湯浸蒸餅為丸如桐子大每服五十丸白湯下忌濕面魚腥橘連枳朮丸補脾和胃瀉火消痰白朮三兩枳實麩炒一兩陳皮一兩黃連酒炒一兩上為末荷葉煮飯丸如桐子大每服五十丸食後白湯下回令丸瀉肝火行濕熱能開痞結黃連六兩吳茱萸一兩上為末水浸蒸餅為丸如桐子大每服三五十丸白湯下一名左金丸治飲食痞方橘皮枳朮丸治食已心下痞者白朮二兩枳實麩炒一兩橘皮一兩上為細末荷葉燒飯為丸如桐子大每服五十丸溫水下食遠加味平胃散治飲食停滯胸腹痞悶厚朴陳皮蒼朮各一錢甘草炙三分枳實砂仁麥芽神麯山楂木香白豆蔻各五分上銼入生薑三片水煎服枳實理中丸治停飲中寒心下作痞人參白朮甘草炙乾薑枳實各等分上為末煉蜜丸服薑曲丸治下之後不能食食後必胸痞常服益氣消積薑屑麥芽神麯末各等分上曲糊為丸如桐子大米湯下三十丸治痰積痞方枳梗二陳湯治痰滯作痞陳皮半夏茯苓各一錢甘草炙三分枳實桔梗各七分上銼生薑三片水煎服小陷胸湯治胸中痰結半夏六錢黃連三錢瓜蔞一個連皮肉取四分之一上銼作一服水二鍾先煮瓜蔞至一鍾半下余藥煎至一鍾溫服瓜蔞實丸治胸膈痞痛徹背脅喘急妨悶瓜蔞實另研枳實麩炒半夏湯洗七次桔梗炒各一兩上為末薑汁打糊為丸如桐子大每服五十丸食後淡薑湯下如痰因火動加黃連尤妙治氣鬱痞方木香化滯湯治憂思氣鬱中脘腹皮里微痛心下痞滿不思飲食枳實當歸梢各四分陳皮生薑木香各六分柴胡七分草豆蔻甘草炙各一錢半夏一錢半紅花少許上銼薑三片水煎食遠服七氣湯治七情所傷憂思鬱結腑臟氣不和平心腹痞悶半夏茯苓各二錢厚朴薑製一錢半紫蘇葉一錢上切作一服加生薑三片水煎溫服治瘀血痞方四物二陳湯治血虛挾火遇勞則發心下不快當歸川芎白芍藥熟地黃陳皮半夏茯苓甘草桔梗瓜蔞上銼入生薑三片水煎服丹溪方治瘀血結成窠囊而心下痞者桃仁紅花香附大黃等分上為細末用熱酒調服
