body:
  text: 卷四中濕論濕為諸證經云諸濕腫滿皆屬脾土濕勝則濡瀉地之濕氣感則害人皮肉筋脈原病式曰諸痙強直積飲痞膈中滿霍亂吐下體重跗腫肉如泥按之不起皆屬於濕跗音膚足背也統旨云風寒暑濕皆能中人惟濕氣積久留滯關節久而能病非如風寒暑之暴中濕之證關節痛重浮腫喘滿䐜脹煩悶昏不知人其脈必沉而緩或沉而微細宜除濕湯白朮酒論濕為痿為痹為痛為腫所挾寒熱不同經曰因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿因於氣為腫四維相代陽氣乃竭裹者若以物蒙裹也攘退也蔭按宗厚發丹溪曰濕者土之濁氣首為諸陽之會其位高其氣清其體虛故聰明系焉濁氣熏蒸清道不通沉重不利似乎有物蒙之失而不治濕鬱為熱熱留不去大筋緛短者熱傷血不能養筋故為拘攣小筋弛長者濕傷筋不能束骨故為痿弱因於濕首如裹各三字為句濕熱不攘以下各四字為句文整而意明第四章因於氣為腫下文不敘恐有脫簡然王注曰素常氣疾濕熱加之氣濕熱爭故為腫也邪氣漸盛正氣漸微陽氣衰少致邪代正氣不宣通故四維發腫諸陽受氣於四肢也但今人見膝間關節腫疼全以為風治者多誤矣風寒濕三氣雜至合而為痹也濕氣勝者為著痹也其多汗而濡者陽氣少陰氣盛也傷於寒濕肌膚盡痛名曰肌痹蔭又按濕證挾寒內甚則腹痛下利外甚則四肢沉重疼痛或肌肉濡潰痹而不仁也挾風多外甚而身重痛汗出挾熱內甚則瀉痢外甚則或痛或熱或腫發黃如此等證雖內傷外感不同況有錯雜之邪合至當論其先後多少分治可也經曰寒濕之中人也皮膚不收肌肉堅緊榮血泣衛氣去故曰虛虛者聶闢氣不足按之則氣足以溫之故快然而不痛營血澀於脈中衛氣去於脈外所以為虛言語輕小曰聶足弱不能行曰闢氣虛作痛者按之可以致氣氣至則陽聚陰散故快然而痛止蔭又按東垣曰此清虛之地氣傷人也必從足始故地之濕氣感則害人皮肉筋脈夫百病之變皆生於風雨寒暑及飲食居處陰陽喜怒針經解云若身形不虛外邪不能傷也要略曰太陽病關節疼痛而煩脈沉而細者此名中濕亦曰濕痹其候小便不利大便反快但當利其小便一身盡痛發熱日晡所劇者此名風濕此病傷於汗出當風或久傷冷所致也風濕脈浮身重汗出惡風風濕相搏身體疼痛不能轉側不嘔不渴脈浮虛而澀風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫也蔭按以上論風濕寒濕之異濕家之為病一身盡疼發熱身色如熏黃也濕家病身疼發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈蔭按以上前一病本濕熱證例而論不言熱無治法當分出之濕家者唯東南方濕熱證多丹溪曰濕熱相火為病十居八九東垣有濕熱證例詳見熱門論中濕為脾虛所致陳無擇曰脾虛多中濕故曰濕流關節中之多使人腹脹四肢關節疼痛而煩久則浮腫喘滿昏不知人挾風則眩暈嘔噦兼寒則攣拳掣痛治之不得猛發汗及灼艾泄瀉惟利小便為佳也劉宗厚曰按脾虛中濕內因多中滿痞膈瀉痢外感多為痿痹胕腫疼痛等證蓋脾主肌肉爾況有挾風寒暑熱不一詳前人以挾風與濕在表者宜解肌兼寒與濕在半表半裡者宜溫散宜滲泄惟濕熱在裡宜下裡虛者宜分消實脾土為上外感非脾虛宜汗之灸之要在適中病情也論治濕大法賈真孫曰濕為土氣熱能生濕故夏熱則萬物濕潤秋涼則萬物乾燥濕病本不自生因熱而怫鬱不能宣行水道故停滯而生濕也況脾土脆弱之人易為感受豈必水不流而後為濕哉人只知風寒之威嚴不知暑濕之炎暄感人於冥冥之中也原病式云諸痙項強積飲等證皆屬於濕或胕腫體寒而有水氣必小便赤少或渴是蓄熱入里極深非病寒也大抵治法宜理脾清熱利小便為上故治濕不利小便非其治也宜桂苓甘露木香葶藶木通治之守貞師曰葶藶木香散下神芎丸此藥下水濕消腫脹利小便理脾胃無出乎此也腹脹腳腫甚者舟車丸下之濕熱內深發黃茵陳湯下之或佐以防己黃耆一身盡腫痛或無汗是濕流關節邪氣在表宜五苓散加官桂蒼朮微汗之不可大汗若自汗出多熱燥津液內水不利切勿利之重損津液也宜防風白朮甘草湯主之其濕證有二濕熱證多濕寒證少當以脈證明辨之如脈滑數小便赤澀引飲自汗為濕熱證若小便自利清白大便瀉利身疼無汗為濕寒證治之宜五苓散加生附蒼朮木瓜主之論治濕分內外上下準繩云濕有天之濕霧露雨是也天本乎氣故先中表之榮衛有地之濕水泥是也地本乎形故先傷皮肉筋骨血脈有飲食之濕酒水乳酪之類是也胃為水穀之海故傷於脾胃有汗液之濕汗液亦氣也止感於外有人氣之濕太陰濕土之所化也乃動於中治天之濕當同司天法濕上甚而熱者平以苦溫佐以甘辛以汗為效而止如金匱要略諸條之謂風濕相搏身上疼痛者是也治地之濕當同在泉法濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之治飲食之濕在中奪之在上吐之在下引而竭之汗液之濕同司天者治雖人氣屬太陰脾土所化之濕者在氣交之分也與前四治有同有異何者土兼四氣寒熱溫涼升降浮沉備在其中脾胃者陰陽異位更實更虛更逆更從是故陽盛則木勝合為風濕至陽盛則火勝合為濕熱陰盛則金勝合為燥濕至陰盛則水勝合為陰濕為兼四氣故淫泆上下中外無處不到大率在上則病嘔吐頭重胸滿在外則身重腫在下則足脛胕腫在中則腹脹中滿痞塞當分上下中外而治隨其所兼寒熱溫涼以為佐使至若先因乘克以致脾虛浸漬而成濕者則先治勝克之邪或脾胃本自虛而生濕者則用補虛為主或鬱熱而成濕者則以發熱為要或脾胃之濕淫泆流於四臟筋骨皮肉血脈之間者大概濕主乎否塞以致所受之臟澀不得通疏本臟之病因而發焉其筋骨皮肉血脈受之則發為痿痹緩弱痛重不任為用所治之藥各有所入能入干此者不能入於彼且濕淫為病內經所論疊出於各篇本草治濕亦不一而見凡切於治功者便是要藥今丹溪書乃止歸重蒼朮一味豈理也哉傷濕為病發熱惡寒身重自汗骨節疼痛小便祕澀大便多泄腰腳痹冷皆因坐臥卑濕或冒雨露或著濕衣所致併除濕湯具前諸證而腰痛特甚不可轉側如纏五六貫重者濕氣入腎腎主水水流濕從其類也腎著湯滲濕湯小便祕大便溏雨淫腹疾故也五苓散吞戊己丸戊己屬土土剋水因以得名五苓散乃濕家要藥所謂治濕不利小便非其治也傷濕而兼感風者既有前項證而又惡風不欲去衣被或額上微汗或身體微腫汗漬衣濕當風坐臥多有此證宜除濕湯桂枝湯各半帖合服令微發汗若大發其汗則風去濕在已得汗而發熱不去者敗毒散加蒼朮一錢防己半錢傷濕又兼感寒有前諸證但無汗慘慘煩痛宜五積散和除濕湯半帖和五苓散半帖傷濕而兼感風寒者汗出身重惡風喘滿骨節煩疼狀如歷節風臍下連腳冷痹不能屈伸所謂風寒濕合而成痹宜防己黃耆湯或五痹湯若因浴出未解裙衫身上未乾忽而熟睡攻及腎經外腎腫痛腰背攣曲只以五苓散一帖入真珠少許下青木香丸如此三服臟腑才過腫消腰直其痛自止濕熱相搏者清熱滲濕湯其證肩背沉重疼痛上熱胸膈不利及遍身疼痛者拈痛湯酒面乳酪停滯不能運化而濕自內盛者除濕散及蒼白二陳湯加消息之藥燥之有破傷膚因澡浴濕氣從瘡口中入其人昏迷沉重狀類中濕名曰破傷濕宜白朮酒丹溪曰六氣之內濕熱為病十居八九濕有自外入者有自內得者陰雨地濕皆從外入治宜汗散久則通疏滲泄之內濕宜淡滲濕在上宜微汗而解經曰濕上甚而熱治以苦溫佐以甘辛以汗為效而止也不欲多汗故不用麻黃乾葛等劑濕在中下宜利小便此淡滲治濕也一云上部濕蒼朮功烈下部濕宜升麻提之蒼朮治濕上下部都可用二陳湯加酒芩羌活蒼朮散風行濕最妙局方用燥劑為劫濕病也濕得燥則豁然而收脾胃受濕沉困無力怠惰好臥去濕痰須用白朮凡肥人沉困怠惰是濕熱宜蒼朮茯苓滑石凡肥白人沉困怠惰是氣虛宜二朮人參半夏草果厚朴芍藥凡黑瘦而沉困怠惰者是熱宜白朮黃芩風濕相搏一身盡痛用黃耆防己湯若濕盛氣實者以神佑丸舟車丸下之氣虛者桑皮茯苓人參葶藶木香之類如風濕身痛微腫惡風宜杏仁湯李氏曰風寒暑暴傷人便覺濕氣熏襲人多不覺有自外入者長夏鬱熱山澤蒸氣冒雨行濕汗透沾衣多腰腳腫痛有自內得者生冷麵酒滯脾生濕鬱熱多肚腹腫脹西北人多內濕東南人多外濕又分上中下濕在上宜微汗在中下宜利二便或升提濕初入身沉重多困倦或肢節痛或一身盡痛甚則濕聚為痰昏不知人為直視為鄭聲上熏喘嗽茯苓湯首如蒙者單蒼朮膏妙著脾則浮黃腫滿或臍下硬退黃丸如大便泄朮附湯三白湯滲濕湯濕下先受之著腎故腰腳攣痛獨活寄生湯當歸拈痛湯腎著湯青娥丸治外濕當微汗通經絡有汗防己黃耆湯或羌活勝濕湯無汗者五苓散加蒼朮通經絡神仙飛步丹乳香黑虎丹治內濕當滲小便利大便滲劑五苓散黃加茵陳一倍身痛加羌活一倍濕盛膨脹者又當以車前木通葶藶利水行氣為君而以參朮茯苓為佐或以二術為君而以利水藥為佐濕鬱肢脹或遍身浮腫者皆自內而出也量虛實利之如不利者退黃丸妙單中濕用除濕湯兼風合桂枝湯或防風湯敗毒散兼寒合五積散或薑附湯兼暑合五苓散大抵百病兼風則必惡風有汗眩暈兼寒則必惡寒無汗或攣痛兼暑則必面垢煩渴兼濕則必腫滿沉倦四氣互相兼併惟寒濕濕熱為病尤多以尿赤有渴為濕熱以便清不渴為寒濕昔有專用五積散治寒濕防風通聖散治濕熱宜哉內外濕熱通用燥脾並升散燥脾枳朮丸大安丸單蒼朮丸除濕通用二陳湯或平胃散加桑白皮為主濕在上焦加羌活蒼朮微汗有熱加黃芩中焦濕加豬苓澤瀉滲利熱加黃連下焦濕加升麻防風升提熱加防己黃柏龍膽草肥人多濕加蒼朮滑石瘦人多熱加黃芩芍藥沉困加參術又四制蒼柏丸三精丸元氣實而濕熱甚者導水丸或除濕丹舟車丸脈法脈經曰脈沉而緩沉而細微緩者皆中濕脈浮風濕脈大或浮虛而澀者皆寒濕脈來滑疾身熱煩喘胸滿口燥發黃者濕熱脈洪而緩陰陽兩虛濕熱自甚脈洪而動濕熱為痛也又曰脈浮而緩濕在表也脈沉而緩濕在裡也或弦而緩或緩而浮皆風濕相搏也脈訣舉要曰或澀或細或濡或緩是皆中濕可得而斷治外中諸濕方除濕湯治諸濕所傷身體重著腰腳痠疼大便溏泄小便或澀或利蒼朮米泔浸炒厚朴薑製半夏曲炒各二兩白朮陳皮去白白茯苓藿香各一兩甘草炙七錢上㕮咀每服五錢加生薑七片棗一枚水煎食前溫服加味二陳湯治諸濕陳皮去白半夏茯苓甘草炙蒼朮米泔浸炒羌活黃芩炒各一錢上銼加生薑水煎服濕在上倍蒼朮濕在下加升麻內濕加豬苓澤瀉中焦濕與痛熱加黃連肥白人因濕沉困怠惰是氣虛加二術人參黑瘦人沉困怠惰是濕熱加白朮黃芩炒芍藥元戎加味五苓散治濕勝身痛小便不利體重發渴茯苓豬苓白朮澤瀉桂羌活上銼水煎服治中濕挾風方除風濕羌活湯治風濕相搏一身盡痛羌活七分防風蒼朮米泔浸炒藁本升麻柴胡各一錢上銼一劑水煎服凡下焦有濕龍膽草防己為君甘草黃柏為佐羌活勝濕湯治外傷於濕脊痛項強腰似折項似拔上衝頭痛一身盡痛及足太陽經不行羌活獨活各二錢防風藁本蔓荊子川芎各一錢甘草炙五分上銼作一服加生薑五片紅棗一枚水煎服如身重腰沉沉然乃經中有濕熱也加蒼朮二錢黃柏一錢附子五分疏風勝濕湯治風濕上攻頭項強痛身腰屈硬麻痹不仁等證羌活獨活防風蒼朮米泔浸炒蔓荊子川芎防己各等分上銼加生薑三片水煎服有熱加酒炒黃芩身痹無汗加麻黃荊芥杏仁湯治風濕身痛微腫惡風官桂五錢天門冬芍藥麻黃各二錢半杏仁七個上銼一劑水三盞生薑十片煎分二服防己黃耆湯治風濕相搏客於皮膚四肢少力關節煩疼脈浮身重汗出惡風防己三錢黃耆四錢白朮二錢甘草一錢上作一服入生薑三片紅棗一枚水煎不拘時服喘者加麻黃胃氣不和加芍藥氣上衝加桂枝下有寒加細辛調衛湯治濕勝自汗補衛氣虛弱表虛不任外寒黃耆麻黃根各一錢羌活七分當歸梢生甘草生黃芩半夏湯泡各五分麥門冬去心生地黃各三分五味子七枚豬苓二分蘇木紅花各一錢上㕮咀作一服水煎稍熱服中風證必多汗汗多不得重發汗故禁麻黃而用根節也治中濕挾風寒方桂枝附子湯治風濕相搏身體煩疼不能自側不嘔不渴脈浮虛而澀者此湯主之桂枝八錢生薑六錢附子三錢甘草炙四錢上㕮咀入大棗作二次煎服若小便自利者去桂枝加白朮湯主之服後其人如冒狀勿怪甘草附子湯治風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫痛者甘草炙四錢附子三錢白朮四錢桂枝八錢上㕮咀水煎服金匱減桂枝加生薑大棗名白朮附子湯麻黃加朮湯治感風寒濕氣身體煩疼無汗發熱者麻黃六錢桂枝四錢甘草炙二錢杏仁二十五個白朮八錢上㕮咀每服四錢水煎服取微汗金匱減桂術加薏苡仁名麻黃杏仁薏苡甘草湯治濕勝身疼日晡所劇者羌附湯治風濕相搏手足掣痛不可屈伸或身微浮腫羌活附子炮去皮臍白朮甘草炙各等分上㕮咀每服五錢生薑五片水一鍾煎七分溫服滲濕湯治坐臥濕地或為風露所襲身重腳弱關節疼痛發熱惡寒或多汗惡風或小便不利大便溏泄白朮三錢乾薑炮白芍藥炒附子炮去皮臍白茯苓人參各一錢桂枝不見火甘草炙各五分上作一服加生薑五片棗一枚水煎服不拘時生料五積散治外感風寒濕身體重痛方見中寒治中濕挾寒方滲濕湯治寒濕所傷身體重著如坐水中或小便祕澀大便溏泄此證多因坐臥濕地或陰雨所襲而致蒼朮米泔浸炒白朮橘皮茯苓乾薑炮甘草炙各二兩丁香一兩上每服四錢加生薑三片棗一枚水煎食前服朮附湯治風濕相搏腰脊疼痛四肢重著不嘔不渴大便堅硬小便自利白朮四兩附子炮去皮臍一兩半甘草炙二兩上㕮咀每服三錢加薑棗煎服生附湯治受濕腰痛腿腫附子生用牛膝酒浸焙厚朴薑製乾薑生用白朮茯苓甘草炙各二錢半蒼朮炒杜仲薑炒各半兩上㕮咀每服五錢薑三片棗一枚水煎食前服腎著湯治腎虛傷濕身重腰冷如坐水中不渴小便自利乾薑炒茯苓去皮各二錢半甘草炙白朮各一錢上作一服水煎食前溫服白朮酒治中濕遍身骨節疼痛不能轉側及皮肉痛難著白朮一兩上細切作一服用無灰酒一盞半煎至一盞溫服不能飲酒以水代之蒼朮丸健胃燥濕壯筋骨明目能治風濕蒼朮一斤米泔水浸竹刀刮去皮曬乾為片用童便酒各浸半斤過一宿曬乾為末每服一錢空心鹽湯或酒調下或加白茯苓六兩神麯糊為丸緑豆大每服七十丸更好二術補脾生附行經治濕要藥也苓朮湯治暑濕鬱發半身不遂附子炮澤瀉茯苓白朮乾薑桂心各等分上㕮咀每服四錢水煎空心服茯苓白朮湯治感濕挾暑汗未乾而浴暑濕相搏茯苓白朮乾薑甘草炙桂心上㕮咀每服四錢水煎溫服白朮茯苓乾薑湯治風濕挾暑煩渴引飲惡寒微汗白朮茯苓乾薑細辛烏梅桂心乾葛甘草陳皮豆豉各等分上為末每服二錢白湯調下治內傷水濕方平胃散治濕淫於內脾胃不能剋制有積飲痞膈中滿者蒼朮八兩陳皮厚朴各五兩甘草炙三兩上㕮咀每服五錢加薑棗煎服一方加草果對金飲子治脾胃受濕腹脹米穀不化飲食不進身體沉重肢節痠疼皮膚微腫平胃散一兩桑白皮炒一兩上為末每服二三錢入薑煎服蒼白二陳湯治酒面乳酪停滯不能運化而濕自內盛者二陳湯四錢蒼朮白朮各一錢上銼加生薑煎服五苓散治濕生於內水瀉小便不利茯苓豬苓白朮各一兩澤瀉二兩半官桂一兩上為末每服二三錢熱湯調下導滯通經湯治脾濕有餘氣不宣通面目手足腫注悶而痛白朮茯苓澤瀉陳皮去白木香上㕮咀每服五錢水煎服茯苓湯治脾氣不實不能制濕以故水溢四肢手足浮腫小便赤澀氣急喘滿赤茯苓澤瀉香附子陳皮桑白皮大腹皮乾薑各等分上㕮咀每服一兩水煎溫服不拘時大橘皮湯治濕熱內甚心腹脹滿並水腫小便不利大便滑泄並宜服之橘皮去白一錢半白朮茯苓豬苓澤瀉各一錢肉桂七分檳榔六分木香五分滑石甘草炙各四分上銼一服加生薑五片水煎食前服葶藶木香散治濕熱消腫脹利小便健脾胃葶藶子茯苓豬苓白朮各一兩木香木通澤瀉甘草桂枝各半兩滑石三兩上為末湯調服赤茯苓丸治內濕大過四肢腫滿腹脹喘急氣不宣通小便赤澀葶藶四兩防己二兩赤茯苓一兩木香半兩上為末棗肉丸如桐子大每服五十丸桑白皮湯下舟車丸治濕勝氣實者以此宣通之大黃二兩牽牛去頭末四兩甘遂大戟芫花青皮陳皮各一兩木香半兩上為細末水丸如桐子大每服六七十丸白湯下隨證加減治內生濕熱方清燥湯六七月之間濕令大行子能令母實而熱旺濕熱相合而刑庚大腸故用寒涼以救之燥金受濕熱之邪絶寒水生化之源源絶則腎虧痿厥之病大作腰以下痿軟癱瘓不能動矣行步不正兩足攲側此湯主之黃耆一錢半黃連去須蒼朮白朮各一錢陳皮五分五味子九粒人參白茯苓升麻各三分當歸一錢二分澤瀉五分柴胡麥門冬生地黃神麯炒豬苓黃柏酒炒甘草炙各二分上銼如麻豆大水煎去渣稍熱空心服清熱滲濕湯黃柏鹽水炒二錢蒼朮白朮各一錢半茯苓澤瀉黃連各一錢甘草五分上銼水煎服如單用滲濕去連柏加陳皮乾薑茯苓滲濕湯治濕鬱成黃疸寒熱嘔吐而渴身體面目俱黃小便不利不思飲食莫能安臥蒼朮白朮陳皮青皮枳實黃芩黃連梔子防己各四分赤茯苓澤瀉各五分茵陳六分豬苓一錢上銼作一服水煎服山精丸健脾去濕息火消痰蒼朮三斤先用米泔浸三日竹刀刮去粗皮陰乾用枸杞子地骨皮各一斤桑椹子一斗許取汁去渣將蒼朮浸入汁內令透取出曬乾如是者九次用木杵搗為細末上併為細末煉蜜丸如彈子大每服一丸或二丸白沸湯下一方無枸杞名三精丸蒼朮地骨皮各一斤四制蒼柏丸濕陰降火開胃進食除周身之濕黃柏四斤用乳汁童便米泔各浸一斤酥炙一斤浸炙各十二次蒼朮先用粳米泔浸過刮去黑皮淨得一斤用川椒破故紙五味子川芎各炒四兩去各炒藥上為細末煉蜜為丸如梧桐子大每服三十丸早酒下午茶湯下晚白湯下二妙散治濕熱腰膝疼痛此方主之黃柏乳潤一宿蒼朮米泔浸七日各等分上為末空心酒服三錢枳朮導滯丸治傷濕熱之物不得施化而作痞滿悶亂茯苓黃芩炒白朮黃連炒各三錢澤瀉二錢枳實麩炒神麯各五錢大黃一兩上為末湯浸蒸餅為丸如桐子大每服五七十丸溫水下宣明導水丸治一切濕熱證常服除痰飲消酒食清頭目利咽膈能令遍身氣血結滯宣通而愈大黃錦紋者黃芩中枯者各二兩牽牛滑石各四兩上為細末滴水丸如小豆大溫水下十丸至十五丸每服加十丸日三服冷水下亦得煉蜜丸愈佳或久病熱鬱無問瘦悴老弱並一切證可下者始自十丸每服加十丸以利為度或熱甚必須急下者便服四五十丸未利再服以意消息三五歲孩兒丸如麻子大去濕熱腰痛泄水濕腫痛及久雨加甘遂一兩去遍身走注腫痛加白芥子一兩退濕散腫毒止痛及久旱加朴硝一兩散結滯通關節潤腸胃行滯氣通血脈加郁李仁一兩去腰腿沉重加樟柳根一兩除濕丹治諸濕客搏腰膝重痛足脛浮腫筋脈拘急津液凝澀便溺不利目赤隱疹癰疽發背疥癬瘡癤及走注腳氣盡皆治之檳榔甘遂威靈仙赤芍藥葶藶各二兩乳香沒藥各一兩牽牛大戟各三兩陳皮四兩上為末麵糊丸如桐子大每服五十丸至八十丸食前溫水下服藥前後忌酒濕面二三日宜淡粥補胃尤佳一方無葶藶有澤瀉青皮各一兩
