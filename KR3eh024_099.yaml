body:
  text: 卷九十九體氣論丹溪曰患狐臭者耳內有油濕即是用黃丹水銀白梅肉為丸拭之又用三年苦醋和石灰敷之即瘥又馬齒菜一束搗碎以蜜和作團以絹袋盛之以泥紙裹厚半寸許曝乾以火燒熟破開更以少許蜜和使熱勿令冷以生布揩之夾藥腋下藥氣行痛久忍之不住然後以手巾勒兩臂俾藥氣行盡方可拭之不效再易又用赤銅屑以醋和銀鍋中炒極熱以布裹尉腋下冷復易之蔭按有天生狐臭者有為人所染臭者天生臭者難治為人所染臭者易治然須三年苦醋敷和礬石散敷之勿止並服下十香丸乃可得瘥勿言一度敷藥即瘥止一敷藥時暫得一時瘥耳須頻頻敷之更好忌食蕓薹五辛之物若犯之則終身不能瘥治方十香丸含化令人遍體俱香白檀香白芷雞舌香肉豆蔻細辛木香川芎檳榔丁香沉香各五錢麝香龍腦各二錢半上為細末研勻煉蜜丸如芡實大每服一丸含化咽津一日三五度烏龍丸治腋氣神方當歸酒洗生地黃枸杞子炒石蓮肉焙各一兩白茯苓二兩蓮蕊焙丁香木香青木香乳香京墨各五錢冰片一分半研上為細末用陳米飯荷葉包燒過搗爛為丸如黃豆大麝香一分黃酒化為衣每服三四十丸臨臥半飢半飽用砂仁一二分炒入黃酒內送下婦人加烏藥醋炒香附童便炒各三錢收功後藥人參當歸生地黃乳香官桂木香沒藥麝香八味俱酒浸過青皮陳皮白芷良薑麻黃米殼甘草各一錢上銼一劑水煎服出汗外用川椒枯礬各一兩為末擦腋下終身忌鱖魚羊肉去大小便不可與婦人同廁祕傳奇方治體氣大田螺生者一個巴豆去殼膽礬一豆許麝香少許上將螺用水養三日去泥土揭起螺厴入礬豆麝在內以線拴住於磁器內次日化成水須五更時將藥水抹在腋下直候腹中覺響臟腑欲行住手先要擇空地內去大便黑糞極臭是其驗也以厚土蓋之不可令人知之如不盡再以藥水抹之又去大便一日用後藥擦之永拔病根枯礬一兩蛤粉五錢樟腦一錢為末每以少許擦之治體氣方枯礬一錢輕粉二分蛤粉二錢密陀僧五分上為末每用少許擦之一方有松香一錢麝香半分神方枯白礬鉛粉松脂各等分上為末擦之腋氣神效方密陀僧一兩白礬七錢硇砂少許麝香少許上為細末先用皂角煎湯洗後敷上又方治狐臭銅青密陀僧辰砂白礬硇砂白附子上為細末先用皂角煎湯洗後敷上不過三次全好一方加黃丹水銀用白梅肉為丸擦之治腋氣方香白芷枯礬花椒減半黃丹各等分上共為末撒之不臭治腋臭方用自己小便洗一次米泔洗二次自然薑汁每日擦十次一月之後可以斷根一方用生薑塗腋下治狐臭方麝香巴豆去殼木通去皮上為末每服一錢重浮子酒熬膏為丸金箔為衣空心水酒調化一丸服之以淨桶盛腹內打下穢物急蓋拿開勿聞神效治腋氣方五更時用精豬肉二大斤以甘遂末一兩拌之挾腋下至天明以生甘草一兩煎湯飲之良久瀉出穢物須至荒野之處則可恐穢氣傳人故也依法三五次即愈虛弱者間日為之其他密陀僧胡粉之類皆塞竅以治其末耳一方用夜明砂不拘多少為末用豆豉汁調塗立效治狐臭方大蜘蛛一個以黃泥入少赤石脂搗羅極細入鹽少許杵為一窠包藏蜘蛛在內以火燒令通紅放冷剖開將蜘蛛研細臨臥入輕粉一字用釅醋調成膏敷腋下明日登廁必瀉下墨汁臭穢不可聞於遠僻處傾埋之免致染人治腋氣方先用刀削去腋毛淨用白定粉水調擦敷患處至過六七日夜後次日早看腋下有一黑點如針孔用筆點定即用艾炷灸七壯灸過攻心中痛當用後藥下之青木香檳榔丁香檀香麝香大黃上水煎服以下為度四聖散治體氣人言輕粉各一錢巴豆十個去殼白礬枯一兩黃丹少許上共為細末每用少許擦患處如擦時先用冷水洗之田螺散治體氣用大田螺一枚水中養之俟厴開以巴豆一粒去殼將針挑巴豆放在內取起拭乾仰放盞內夏月一宿冬月五七宿自然成水取擦腋下絶根一方先用胭脂擦腋下其出狐臭之處黃色就將前說巴豆田螺去厴掩於狐臭之上絹帛勒緊其狐臭從大便出則絶根矣一方黃丹飛密陀僧枯礬上以蒸餅蘸藥擦之一方用熱蒸餅一個劈開作兩邊撒密陀僧末一錢急夾在腋下略睡少時候冷棄之除根治腋氣方用蝙蝠一個打死卻用赤石脂五錢為末遍塗蝠身外以黃泥包之火煨黃取出存性去泥以蝠為末另取大田螺二枚每枚入去殼巴豆一粒候化成水次日用此水調蝠末塗腋下須有毒氣衝上噁心急服感應丸一帖神保丸三粒溫酒下利後去根衣香方茅香銼蜜炙零陵香各二兩香白芷甘松去土各一兩檀香五錢三賴七錢麵裹煨上為粗末入麝香少許和勻以絹囊盛之又治腋氣方以銅青好者不拘多少米醋調成膏先洗淨腋下用輕粉撒過卻使上件塗之立效
