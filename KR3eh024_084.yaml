body:
  text: 卷八十四瘢疹風癢論虞氏曰內經云少陰所至為瘍疹夫少陰所至者言君火有餘熱令大行戊子戊午之歲也在人則心主之心火太過則制己所勝而燒爍肺金蓋肺主皮毛故紅點如蚤之狀見於皮膚之間心火侮而乘之之色也名曰癮疹或傷寒溫熱病而發瘢如錦文者名曰發瘢皆熱毒之所致也其證有陽毒有陰毒是皆冬應寒而反溫人受不正之氣故至春夏而發為瘢斕夫陽脈浮數而陰脈實大者名曰溫毒或為內外結熱極深舌卷焦黑鼻若煙煤狂言見鬼面赤而瘢斕者名曰陽毒如溫病下之太早熱氣乘虛入胃或下之太遲熱氣鬱積胃中或醫者誤用熱藥過多胃氣熱甚及內傷熱病虛火燔灼於肺之間皆能成發瘢也是故發赤瘢者半生半死發黑瘢者九死一生治法用化瘢湯即人參白虎湯升麻葛根湯去參升麻湯痛加羌活防風荊芥桂枝芍藥隨宜用之入上藥相合煎服有時疫腫毒疙瘩或臟腑積熱發於頭項咽嗌堵塞水漿不下或面赤脈浮洪熱甚漏蘆湯治之升麻黃芩大黃各一兩藍葉玄參各二兩煎服丹溪曰瘢屬風熱挾痰而作自里而發於外通聖散中消息當以微汗散之切不可下內傷瘢者胃氣極虛一身火遊行於外所致宜補以降於陰證略例中求之發瘢似傷寒者痰熱之病發於外微汗以散之若下之非理疹屬熱與痰在肺清肺火降痰或解散出汗亦有可下者疹即瘡疹汗之即愈通聖散中消息之癮疹多屬脾隱隱然在皮膚之間故言癮疹也發則多癢或不仁者是兼風兼濕之殊色紅者兼火化也瘢疹之病其為證各異瘡發焮腫於外者屬少陽三焦相火也謂之瘢小紅靨行皮膚之中不出者屬少陰君火也謂之疹丹疹皆是惡毒熱血蘊蓄於命門遇君相二火合起則發也如遇熱時以通聖辛涼解之寒時以升麻葛根辛溫解之凡丹疹先從四肢起而後入腹者死有乳孩因胎毒兩腋生癤後腹脹發赤疹如霞片取剪刀草汁調原蠶沙敷之而愈冷丹屬血風血熱用通聖散消風散有痰血相搏用蟬脫殭蠶荊芥南星治之又用吐法身上虛癢血不榮干腠理所以癢也四物湯加黃芩煎調浮萍末服之戴氏曰瘢有色點而無頭粒者是也疹浮小有頭粒者隨出即收收而又出是也非若瘢之無頭粒者當明辨之李氏曰瘢屬三焦無根之火疹屬心火其上侵於肺則一也外因者初起頭疼身大熱口知味者忌大汗下宜解肌微汗有自吐瀉者即愈內因者頭或微疼但手心熱脾胃虛者宜大補以降其火體壯者宜清肺以化其痰瘢勢掀發有色痕而無頭粒重者紅如錦繡成片多發在胸腹傷寒誤溫誤下心火所主雜病全是風熱挾痰手少陽相火自里發外治宜安里藥多發表藥少外感者敗毒散加紫草或升麻葛根湯加元參咽痛者元參升麻湯狂言或見血者陽毒升麻湯渴者化瘢湯便閉者防風通聖散微利之便不甚閉去硝黃身疼加蒼朮羌活痰嗽加半夏熱甚者黑奴丸瘢斕者黑膏內傷發瘢輕如蚊跡疹子者多在手足初起無頭疼身熱乃胃虛火遊於外宜調中益氣湯黃耆建中湯內熱痰熱上攻頭面者升麻葛根湯加元參貝母黃芩生地黃麥門冬內傷挾外感者調中疏邪湯參蘇飲疹有頭粒或如粒米或如蚊蟲咬跡微紅或隨出隨沒或沒而又出紅靨隱隱皮膚表分欲出不出但作瘙癢全無腫痛名曰癮疹當春發在傷寒最重即溫毒也升麻葛根湯加牛蒡子荊芥防風或鼠黏湯赤疹因天熱燥氣乘之稍涼則消川芎搽調散人參羌活散胡麻散裡熱者解毒湯白疹因天寒冷氣折之稍暖則消惺惺散裡虛者理中湯似赤似白微黃隱於肌肉之間四肢腫著此風熱加濕也多因浴後感風與汗出解衣而得宜消風散寒加官桂暑加柴胡黃芩濕加蒼朮茯苓如肢體不仁者黃連橘皮湯遍身疹多痛極者古苦皂丸又有瘢疹並出者不可概用風藥恐變痰嗽渴嘔瘡疹面生紫赤癮疹及雀子瘢汗瘢皆此類之緩者疹色赤者又名丹疹或遍五色因血盛熱毒蓄於命門被風毒逐動相火則發滿遍身甚則肌爛寒月升麻葛根湯暑月人參羌活散熱加黃芩元參冷加黃耆白芷詳小兒門外治土朱散浮萍湯凡瘢疹赤色身暖自胸腹散四肢者吉黑色身涼自四肢入腹者死舊分癮疹丹疹各類今合為一以其因治同也又曰赤白遊風出面皮頸項皮肉變色赤者謂之赤癜白者謂之白癜乃風搏於皮膚血氣不和所生赤屬血血熱者九味羌活湯加金銀花連翹或四物湯加柴胡山梔牡丹皮虛者逍遙散加山梔或腎氣丸白屬氣氣熱者敗毒散或小柴胡湯加防風連翹虛者補中益氣湯加羌活防風如果系風毒者胡麻散單蒼耳丸單浮萍丸此疾久者只宜滋養氣血則火自息風自定癢自止若用祛風辛苦之劑則肝血愈燥風火愈熾元氣愈虛變為難治身上虛癢血不榮於腠理故也宜四物湯加黃芩入紫浮萍末調服或單凌霄花為末酒調服遍身及頭上風屑癢者單苦參丸或薄荷蟬退等分為末酒調服以上瘢癮丹疹癜癬大同小異諸方通用脈法脈陽浮而數陰實而大脈多沉浮或細而散或絶無滑伯仁曰脈者血之波爛發瘢者血散於肌膚故脈伏治外感發瘢方通聖散治風熱發瘢用此微汗防風川芎當歸白芍麻黃薄荷連翹各五錢黃芩石膏桔梗各一兩滑石三兩荊芥梔子白朮各二錢半甘草二錢上銼每服五錢加生薑三片水煎服身痛加蒼朮羌活痰嗽加半夏便閉加大黃芒硝升麻葛根湯治傷寒陽明實熱發瘢及麻疹已出未出升麻葛根白芍藥各一錢甘草五分上銼加生薑三片蔥白一莖水煎服一方加玄參元參升麻湯治傷寒失下熱毒在胃發瘢或汗下吐後餘毒不散表虛里實發於外甚則煩躁譫妄咽痛元參升麻甘草炙各等分上㕮咀每服四錢水煎服濕毒發瘢亦宜服之陽毒升麻湯治傷寒吐下後狂言面赤陽毒發瘢升麻半兩生犀角麝香一方云射干黃芩人參甘草各二錢半上㕮咀水煎溫服梔子仁湯治發瘢煩躁面赤咽痛潮熱梔子仁赤芍藥大青即藍葉知母各一兩升麻黃芩石膏杏仁去皮尖各二兩柴胡一兩半甘草炙五錢上㕮咀每服四錢加生薑三片豆豉百粒水煎溫服化癍湯治胃熱發瘢脈虛者人參石膏知母甘草上㕮咀水煎服一方加白朮一方加玄參葛根橘皮湯治冬月肌膚瘢駁咳而心悶但嘔清汁葛根橘皮杏仁知母麻黃黃芩甘草各等分上銼每服五錢水煎溫服黃連橘皮湯治濕毒發瘢黃連四兩陳橘皮杏仁去皮尖枳實麻黃去節湯泡葛根各二兩厚朴薑製甘草炙各一兩上㕮咀每服五錢水煎服陰毒升麻鱉甲湯治陰瘢升麻二錢當歸甘草各一錢二分蜀椒二十粒鱉甲炙一錢雄黃四分另研上銼水煎調雄黃末服大青四物湯治溫疫發瘢大青四錢阿膠炒成珠甘草炙各一錢香豉一合上銼作一服水煎服黑膏治濕毒發瘢生地黃半斤香豉一斗上細切以豬膏二斤合煎之取濃汁如膏用雄黃麝香如豆大納中攪和勻每服用彈子大白湯化下治內傷發瘢方調中湯治內傷外感而發陰瘢蒼朮米泔水浸一錢半陳皮砂仁藿香芍藥炙甘草桔梗半夏白芷羌活枳殼各一錢川芎麻黃桂枝各五分上銼加生薑三片水煎溫服大建中湯治中氣不足無根失守之火出於肌表而成瘢人參黃耆炙當歸芍藥酒炒桂心甘草炙半夏制黑附子制上銼水煎服治癮疹方消風散治風熱癮疹皮膚頑麻瘙癢或膿水淋漓荊芥穗甘草炙陳皮去白厚朴白殭蠶炒蟬蛻炒人參茯苓防風川芎藿香羌活各等分上為細末每服二錢煎荊芥湯或茶清調下加味敗毒散治風濕癮疹及瘟疫等證羌活前胡獨活柴胡川芎茯苓人參桔梗枳殼麩炒各七分薄荷甘草各三分防風荊芥白朮蒼朮米泔浸各一錢上銼作一服加生薑三片大棗二枚水煎服如人虛而感者加當歸芍藥生地黃加味羌活散治感四時不正之氣發為癮疹羌活前胡各一錢人參桔梗甘草炙枳殼麩炒川芎天麻茯苓各五分蟬蛻薄荷各三分上銼加生薑三片水煎溫服解毒防風湯治發癢及癮疹癢痛防風一錢半地骨皮黃耆芍藥荊芥穗枳殼牛蒡子炒各七分半上銼作一服水煎服犀角消毒飲治皮膚髮瘢癮疹無里證者牛蒡子六錢荊芥防風各三錢甘草一錢犀角一錢半另鎊為末或水磨臨服入上㕮咀水煎服咽痛加玄參一錢半胡麻散治脾肺風毒攻衝遍身瘙癢或生瘡疥癮疹侵淫不愈及面上遊風或如蟲行紫白癜風頑麻或腎臟風攻注腳膝生瘡等證胡麻一兩二錢荊芥苦參各八錢何首烏炒一兩甘草炙威靈仙各六錢上為末每服二錢薄荷煎湯或茶酒蜜湯調下服後頻頻浴身得汗出立效加味胡麻散治風熱癮疹瘙癢或兼赤暈寒熱形病俱實者胡麻一兩二錢苦參荊芥穗何首烏不見鐵各八錢威靈仙防風石菖蒲牛蒡子炒甘菊花蔓荊子白蒺藜甘草炒各六錢上為末每服三錢酒調服當歸飲治血熱癮疹癢痛或膿水淋漓發熱等證當歸白芍藥川芎生地黃防風白蒺藜荊芥各一錢半黃耆炒甘草何首烏各一錢上銼水煎服解毒散治一切瘡毒風疹癢痛黃柏炒山梔各等分上為末水調擦若破而濃水淋漓用當歸膏或燭油調擦治丹毒方金花散治一切丹毒鬱金甘草黃芩黃連山梔大黃糯米各等分上生為末蜜水調服丹溪方治人患風丹遍身癢因酒得者浮萍半兩防風黃耆羌活各三錢當歸二錢乾葛麻黃各一錢生甘草五分上銼水煎服一方治冷丹風防風甘草白殭蠶蟬退川芎白芷茯苓荊芥陳皮厚朴蒼耳子人參上為末豆淋酒調服二錢漏蘆散治臟腑積熱發為腫毒時疫疙瘩頭面洪腫咽嗌堵塞水藥不下一切危惡疫癘漏蘆升麻大黃黃芩各一兩藍葉玄參各二兩上為粗末每服二錢水煎服腫熱甚加芒硝二錢半消毒丸治時毒疙瘩惡證大黃牡蠣燒白殭蠶炒各一兩上為細末煉蜜丸如彈子大每一丸新水化下無時加桔梗黍黏子湯尤妙旋覆花丸治身生小癤大如酸棗或如豆色赤而內有膿血此名痛痤世謂之熱癤海藏云汗出見濕乃生痤痱旋覆花三兩防風白芷甘菊花南星半夏石膏川芎陳皮白附子各半兩蠍梢殭蠶炒各三錢上為細末薑汁糊丸如桐子大每三五十丸食後白湯下土朱散治丹毒土朱青黛各二錢滑石荊芥各一錢上為末蜜水調擦服之亦可一方治丹發疼痛扁竹汁服一升二合立瘥若未瘥再服效肘後方丹者惡毒之瘡五色無常苧根三斤水三斗煮汁每日塗之或煮栗皮有刺者洗之佳一方治諸腫丹毒伏龍肝不拘多少為末用雞子白和敷之日三次甚妙一方治丹毒藍澱敷之熱即易一方治諸丹毒腫蚯蚓矢水和敷之一方治赤丹用黃瓜種子穰中去子以器貯之用時以水塗患處一方治熱赤遊丹瓜蔞末一兩釅醋調塗之一方治赤遊風腫蕎麥麵用苦酒調敷一方凡丹走皮中浸淫名火丹取蠐螬敷之一方治煙火丹發從背起或兩脅及兩足赤如火景天草真珠末一兩搗和如泥塗之又方治螢火丹從頭起慎火草搗和苦酒塗之一方治赤丹用臘雪貯器中久化為水以水塗赤遊妙一方療丹癮疹酪和鹽煮以摩之手下消一方治面鼻生赤刺癮疹硫黃白礬各等分黃丹少許上為末津液調敷臨臥再敷一方治金絲瘡其狀如線或如繩巨細不一經謂丹毒是也但此煙毒不甚廣闊人患此頭上有之下行至心則死下有之上行者亦然可於瘡頭截經刺之出血後嚼萍草根塗之自安治赤白遊風方加減何首烏散治紫白癜風筋骨疼痛四肢少力眼斷瞳仁鼻梁崩塌皮膚疥癬手足皺裂睡臥不安行履艱難何首烏蔓荊子石菖蒲荊芥穗苦參威靈仙甘菊花枸杞子各一兩上為細末每服三錢蜜茶調下不拘時追風丹治白癜風服之效何首烏荊芥穗蒼朮米泔浸焙乾苦參各等分上為細末用好肥皂角去皮弦三斤於瓷器內熬為膏和丸如桐子大每服三五十丸空心茶酒任下忌動風之物蒼耳丸治諸風瘡癮疹紫癜白癜五月五日取蒼耳草葉洗淨曬乾為末煉蜜丸如桐子大每服十丸日三次酒下若身體有風處或為麻豆粒此為風毒出也用針刺令黃水出盡乃已白癜方人參白朮蒼朮鹽炒防己酒拌黃柏酒炒川芎各一錢陳皮酒拌當歸茯苓木瓜柴胡梢甘草各五分上銼加生薑水煎服如三劑不退加桂少許小便澀倍用牛膝有熱加黃連身熱加羌活治紫白癜風方桑枝十斤益母草三斤上銼用水五斗慢火煮至五升去渣再煎成膏每臥時溫酒調服半合以愈為度靈草丹一名浮萍丸治一切風痰癮疹紫白癜風痛癢頑麻採背浮萍草攤於竹篩內下著水曬乾為細末煉蜜丸如彈子大每服一丸用黑豆淋酒化下龍蛇散治風虛頑麻遍身紫白癜風癮癢痛者白花蛇去骨焙黑梢蛇去骨焙萆薢天麻黃耆金毛狗脊自然銅骨碎補楓香研地龍草烏頭鹽水浸各一兩乳香沒藥各三錢麝香二錢上為細末糊丸桐子大每服十五丸食後酒下為末溫調亦得金櫻丸治白癜風苦參一斤何首烏半斤胡麻仁蔓荊子牛蒡子酒炒蒼耳子蛇床子酒炒蒼朮米泔水炒金櫻子酒炒各一兩白蒺藜肉蓯蓉牛膝酒炒各二兩菟絲子酒製四兩上為末麵糊丸如桐子大每服七十丸溫酒下蜂房散治白癜風露蜂房一個將生鹽築滿諸孔眼火燒存性去鹽膽礬天花粉蟬退各等分上為細末均分用紙包三分活鯽魚一對同酒煮熟無風處細嚼連刺飲酒癢自上而下趕人四肢三黃散治白癜風雄黃硫黃各五錢黃丹天南星各三錢枯礬密陀僧各二錢上為末先以薑汁擦患處姜醮藥末擦後漸黑次日再擦黑散則無恙矣黃白散治白癜風硫黃生白礬等分上為末用絹包水煮一日擦一方水研人言擦之效一方治紫癜風官粉五錢硫黃三錢上為末雞清調擦硫黃散治紫白癜風硫黃白附子各等分上為末用薑汁調或茄蒂炙熱蘸醋黏末擦之單硫黃末醋調擦亦效一方硫黃一兩用醋一碗煎乾再曬為末以生薑蘸藥擦患處浮萍湯治赤白癜風一切瘢疹疥癬神效干浮萍四兩漢防己五錢上濃煎熱湯先蒸後洗一方用夏枯草濃煎水日洗數次治皮膚瘙癢方何首烏散治渾身風寒濕癢何首烏鹽炒天麻枸杞子生地黃熟地黃各一兩防風川芎薄荷訶子甘草各半兩上為末每服二三錢空心溫酒調服溫茶亦得消風散治皮膚頑麻癮疹瘙癢方見前癮疹條薄荷散治風氣客於皮膚瘙癢不已蟬脫薄荷各等分上為末每服一錢匕日三服蟬蛻散治風氣客於皮膚瘙癢不已蜂房炙蟬蛻各等分上為末酒調一錢匕日二三服苦皂丸治肺氣皮膚瘙癢或生癮癬及遍身風熱細疹痛癢連胸臍腹及近陰處皆然痰涎亦多夜多不睡苦參為末一斤皂莢二斤上將皂莢以水一斗浸揉取濃汁去渣熬成膏為丸如桐子大荊芥薄荷酒下或只用酒調下加味四物湯治身上虛癢血不榮於腠理四物湯加黃芩煎湯調浮萍末服之一方治體肥氣虛久患瘙癢誤投風藥漸成虛證身上麻木無力口苦幹小便數白朮二錢陳皮芍藥黃芩各一兩茯苓七錢歸身黃耆人參川芎青皮蒼朮木通各五錢黃柏五味子甘草炙各二錢上銼水煎服下黃精丸三十丸一方治風熱身癢此藥補陰血甚速凌霄花為末每服一二錢酒調下一方治風疹癢不止枳殼一兩麩炒微黃去穰為末每服二錢用時水一盞煎至六分去渣服澡洗藥治一切風疾瘙癢淋洗威靈仙零陵香茅香各一斤乾荷葉藁本去土藿香葉香白芷甘松各半斤上銼每服四兩生絹袋盛用水三桶熬數沸放稍熱於無風房內沐浴避風勿令風吹光膩皮膚去瘙癢一方治風瘙癮疹遍身癢成瘡者蠶沙一升水二斗煮取一斗二升去渣熱洗宜避風
