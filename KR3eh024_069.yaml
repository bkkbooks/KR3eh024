body:
  text: 卷六十九養老論李氏曰老人之病無非血液衰耳養生主論云二五之精妙合而凝兩腎中間白膜之內一點動氣大如箸頭鼓舞變化開闔周身熏蒸三焦消化水穀外御六淫內當萬慮晝夜無停八面受攻由是神隨物化氣逐神消榮衛告衰七竅反常啼號無淚笑如雨流鼻不嚏而出涕耳無聲而蟬鳴吃食口乾寐則涎溢溲不利而自遺便不通而或瀉晝則對人瞌睡夜則獨臥惺惺此老人之病也陽虛氣盛兩手脈大緊數飲食倍進臉紅神健雖時有煩渴膈熱大便閉結但以平和湯藥消解切不可苦寒疏瀉火病風證戰掉氣亂目直口噤筋急者通聖散痰證二陳湯三子養親湯清氣化痰丸節齋化痰丸凡年老覺小水短少即是病進宜卻病延壽湯小便頻數者腎氣丸去澤瀉加茯神益智五味子大便燥者搜風順氣丸陰虛筋骨痿弱足膝無力者加味補陰丸若是從來無虛陽之氣一向憊乏之人全在斟酌湯劑當加溫補調停饘粥以為養治宜補中益氣湯橘半枳朮丸平胃散竹瀝枳朮丸任有外邪忌大汗吐下宜平和藥調之任是衰老不宜峻補古方固真飲子神仙訓老丸遇仙益壽丹稱金丹七仙丹及諸虛門養性延壽之藥皆可進用厭服藥者只宜食治治老人痰火壅盛方三子養親湯凡人年老形衰苦於痰氣喘嗽胸滿艱食不可作病治妄投蕩滌燥利之劑反耗真氣此三子者出自老圃性度和平芬暢善佐飲食養脾胃使人親有勿藥之喜人子不可不知也紫蘇子主氣喘咳嗽用紫色真正年久者佳蘿蔔子主食痞兼理氣用白種者白芥子主痰下氣寬中白色者南方多紫色者皆可用上各洗淨去沙土紙上微炒微微研碎各等分每三錢用絹袋盛之煮湯隨甘旨飲啜不拘時勿煎太過令味苦辣口若大便素實者入熟蜜一匙冬寒加薑一片竹瀝枳朮丸化痰清火健脾消食亦能卻瘴白朮二兩半夏南星以上二味用白礬皂角生薑同煮半日枳實條芩陳皮蒼朮山楂白芥子白茯苓各一兩黃連當歸各五錢上為末用神麯六兩生薑汁竹瀝各一盞煮糊丸如桐子大每服百丸白湯下有痰薑湯下清氣化痰丸常用養神橘皮去白五兩白朮二兩五錢條芩知母蜜蒸貝母去心白茯神去木石菖蒲各二兩湖蓮肉去心山楂黃連薑汁炒黃柏酒炒各一兩瓜蔞仁去殼炒一兩五錢當歸柏子仁去殼炒縮砂炒各五錢上為末用生薑湯煮神麯糊為丸如桐子大每服百丸食遠白湯下蘇子酒日華子云蘇子調中益五臟下氣補虛肥健人潤心肺消痰氣最宜五十以後之人也紫蘇子二升微炒研碎清酒三斗上以生絹袋兜盛紫蘇子扎定納於酒中浸三宿少少飲之治老人脾胃虛弱方橘半枳朮丸理脾化痰開胃進食最宜老人白朮炒二兩枳實麩炒陳皮炒各一兩半夏薑汁白礬煮一兩半神麯煮糊上為末水煮神麯糊為丸如桐子大每服五七十丸平時白湯下有痰薑湯下日服二次覺腹中飽脹多服百丸不拘時八仙早朝糕主理脾胃或泄瀉不止者最宜老人服之神效白朮陳壁土炒山藥各四兩枳實去穰炒白茯苓陳皮去白炒蓮肉去心皮各二兩人參一兩如氣盛人以砂仁代之山楂去核各二兩上為末用白米五升半糯米一升半共七升打粉用蜜三斤如無蜜糖四斤代之入藥末和勻如做糕法先劃小塊籠中蒸熟取出火烘乾瓦罐封收時取三五片食之以白湯漱口治老人血氣虛弱方補中益氣湯治內傷並老人虛煩發熱常服以調養黃耆蜜炙一錢半人參甘草炙各一錢白朮陳皮當歸各七分升麻柴胡各五分上用水一鍾加生薑三片煎七分空心服卻病延壽湯年高老人但覺小水短少即是病進宜服此湯此丹溪養母法也人參白朮牛膝白芍陳皮茯苓山楂各一錢當歸甘草各五分上加生薑水煎服春加川芎夏秋加黃芩麥門冬冬倍當歸生薑服至小水長如舊止藥治老人陰虛痿弱方八仙長壽丸治年高之人陰虛筋骨痿弱無力面無光澤或黯慘食少痰多或嗽或喘或便溺數滋陽痿足膝無力者並治腎氣久虛憔悴寢汗發熱作渴熟地黃酒蒸八兩山茱萸酒浸去核四兩乾山藥蒸過五兩牡丹皮白茯神去木各三兩益智仁去殼鹽水炒五味子麥門冬去心各二兩上為末煉蜜丸如桐子大每服七八十丸空心溫酒或炒鹽湯下夏秋白湯下腰痛加鹿茸當歸木瓜續斷消渴倍五味下元冷胞轉不得小便膨急切痛困篤欲死者用澤瀉不用益智諸淋數起不通倍茯苓用澤瀉夜多小便者用益智不用澤瀉並茯苓減半加味補陰丸黃柏鹽水炒知母酒炒各四兩牛膝酒洗杜仲薑汁炒去絲巴戟去心熟地黃酒洗山茱萸去核各三兩肉蓯蓉酒洗去鱗白茯苓枸杞子遠志甘草水煮去骨山藥鹿茸酥炙敗龜板酥炙各二兩小茴香鹽炒一兩上為細末煉蜜丸如桐子大每服八十丸空心鹽湯下神仙訓老丸此藥性溫無毒治百病常服補下元潤皮膚延年益壽氣力倍長發白轉黑齒落更生生地酒炒熟地砂仁炒牛膝山藥肉蓯蓉枸杞子各五兩川椒何首烏藁本各十兩上為末酒糊丸如桐子大每服五十丸空心溫酒鹽湯任下忌蘿蔔遇仙益壽丹補經絡起陰發陽開三焦閉橫氣消五穀益血脈安五臟除心熱和筋骨去盜汗注顏烏須輕身健體夜視有光蝙蝠十個搗爛曬乾紫黑桑椹四升取汁柤曬乾杜仲童子發各六兩天門冬去心三兩黃精蜜蒸曬九次何首烏熟地黃川椒各四兩枸杞子當歸各二兩旱蓮草秋石丹玄胡索各四兩以上三味為末用桑椹汁拌三味曬蒸三次上為末酒煮糊丸如桐子大每服不拘多少隨便飲下忌蘿蔔明目益腎丸治上熱而下元虛目昏極效枸杞子當歸酒洗生地黃酒洗浸各一兩山藥去紅皮蒸白茯神去木菟絲子酒煮天門冬去心各二兩黃柏酒炒知母酒炒各七錢五味子炒巴戟去心人參甘菊花各五錢上為末煉蜜丸如桐子大每服七十丸空心鹽湯下菊花酒壯筋骨補髓延年益壽東坡云菊黃中之香味和正花葉根實皆可長生也又云香姿高潔能通仙靈菊花真黃者生地酒炒枸杞根即地骨皮各五升上三味俱搗碎以水一石煮取汁五斗糯米五斗炊熟入細曲末拌勻入甕內密封候熟澄清溫服之最宜老人菖蒲酒治風痹骨立痿黃醫所不治者宜服經百日顏色豐足耳目聰明延年益壽久服通神用菖蒲搗取汁五斗糯米五斗炊熟細曲五斤拌勻入甕密蓋三七日後濾過溫服一二鍾日三服治老人風燥二便祕結方搜風順氣丸老人常服永無癱瘓之病極效山茱萸酒浸去核三兩牛膝去蘆酒洗郁李仁去殼炒山藥去紅皮蒸菟絲子酒浸炒各一兩當歸酒洗一兩五錢檳榔枳殼去穰炒火麻仁去殼炒獨活車前子微炒各五錢錦紋大黃酒蒸十九次此味擇堅實者先用酒浸軟切片酒拌蒸此要耐煩蒸日務足十九次曬乾微炒淨末一兩五錢上為末煉蜜丸如桐子大每日空心酒下三十五丸臨臥再服二十丸夏秋天熱滾湯下一月後自覺強健行步輕快久服可成地仙凡人四十五十以後最宜常服養生君子不可不知此方今人多變改大黃分兩且製造不精當慎之依丸數不可多若三五日大便順滑不必疑潤腸丸治老人大便祕澀不通杏仁炒去皮尖枳殼炒火麻仁炒去殼陳皮炒各半兩阿膠炒防風各二錢半上為末煉蜜丸如桐子大每五十丸空心白湯下
