body:
  text: 卷五十一惡寒論丹溪曰惡寒非寒明是熱證亦有久服熱藥而得者河間謂火極似水熱甚而反覺自冷實非寒也有用熱藥而少愈者辛能發散郁遏暫開耳一壯年患惡寒多服附子病甚以江茶入薑汁香油些小吐痰一升減綿衣大半又日與通聖散去麻黃大黃芒硝加地黃當歸百帖而安知其燥熱已多血傷亦深須淡食以養胃內觀以養神則水可生火可降必多服補血涼藥乃可否則附毒必發彼以為迂後果發背死一老婦肥厚夏惡寒戰栗啖熱御綿大汗已得附子三十餘渾身癢甚脈沉澀重取稍大知其熱甚而血虛也以四物湯去芎倍地黃加白朮黃耆炒黃柏生甘草人參每帖二兩二帖大泄目無視口無言知其熱深無反佐之道也以前藥熟炒與之一帖利止四帖精神回十帖全愈一女子惡寒用苦參赤小豆各一錢為末齏水調服探吐之後用川芎蒼朮南星酒炒黃芩為末酒糊丸服一人形瘦色黑素多酒不困年半而有別館一日大惡寒發戰言渴不飲脈大而弱右關稍實略數重則澀此酒熱內郁不得外泄由表熱而虛也用黃耆二兩乾葛一兩煎飲之大汗而愈有陽虛而惡寒者用參耆之類甚者少加附子惡寒久病亦宜解鬱濕痰積中抑遏陽氣不得外泄身必惡寒齏音躋齏濟也與諸味相濟成也戴氏曰凡背惡寒甚者脈浮大而無力者是陽虛也或云陽虛則惡寒陰虛則惡熱李氏曰尋常外感惡寒頭痛微汗即止內傷表分衛虛惡寒者黃耆建中湯或調中益氣湯加黃耆桂枝內傷陽虛自汗全不任風寒者四君子湯減茯苓倍加黃耆桂枝或附子如晝夜惡寒甚者單用參耆桂附峻補其陽如久病陽氣鬱陷惡寒者升麻葛根湯去芍藥加參附白芷豆蔻蒼朮蔥煎服陰虛微惡寒而發熱者二陳四物湯加知母黃柏地骨皮挾痰濕惡寒者宜苦參赤小豆各一錢為末韭汁調服探吐吐後以川芎南星蒼朮黃芩糊丸白湯下冬月去芩加薑汁為丸調之素病虛熱忽覺惡寒須臾戰栗如喪神守如火炎痰鬱抑遏清道不能固密腠理四物湯加黃耆黃連黃柏或合二陳湯如火克肺灑淅惡寒者甘桔湯加酒耆山梔麥門冬五味子惡寒糞燥者四物湯加大黃下之久病過服熱藥惡寒者先探吐痰後以通聖散加生地黃當歸或四物湯去芎倍地黃加白朮黃柏參耆甘草通草等水煎服如酒熱內郁惡寒者黃耆一兩葛根五錢煎服大汗而愈蔭按內經論陰虛因勞倦氣衰則火熏胸中而生內熱陽虛則不足衛護皮膚而外寒陰盛則血脈不通而中寒陽盛則腠理閉塞而外熱仲景謂陽虛陰盛宜汗散其陰邪陰虛陽盛宜下瀉其陽邪東垣謂晝熱陽氣旺於陽分夜熱陽氣下陷陰中皆名熱入血室重陽者晝夜俱熱夜寒陰血旺於陰分晝寒陰氣上溢陽中重陰者晝夜俱寒丹溪謂惡熱明是虛證惡寒非寒明是熱證王冰謂熱之不熱是無火也當治其心寒之不寒是無水也當治其腎噫寒熱陰陽虛實醫家不分幸四公發明經旨善學者必合而玩之始得治陽虛惡寒方黃耆建中湯治衛虛惡寒黃耆二錢白芍藥三錢肉桂一錢甘草炙一錢半上加生薑三片棗一枚水煎服調中益氣湯白朮黃耆當歸麥門冬神麯各一錢人參乾葛青皮各七分升麻柴胡澤瀉各五分五味子十三粒甘草炙三分加桂枝五分上銼加生薑水煎服加減四君子湯治內傷陽虛自汗不任風寒人參白朮甘草黃耆桂枝甚者少加附子上銼加薑棗水煎服升麻附子湯治陽明經本虛氣不足則身以前皆寒故面寒升麻葛根各一錢白芷黃耆附子炮各七分益智三分草豆蔻人參甘草炙各二分上銼作一服加連須蔥白水煎服治內熱惡寒方升麻加黃連湯升麻葛根各一錢白芷七分甘草炙黃連酒炒白芍藥各五分川芎各二分荊芥薄荷各一分生犀角三分上作一服水煎服此治面熱加附子治面寒加味二陳湯陳皮半夏當歸乾葛元參各一錢黃芩茯苓各八分黃連七分甘草五分上銼作一服加生薑三片水煎服地骨皮散地骨皮軟柴胡當歸黃芩牡丹皮麥門冬去心白朮黃連各一錢上銼水煎服六物湯當歸芍藥川芎熟地砂仁炒各一錢黃柏知母各八分上作一服加生薑煎服
