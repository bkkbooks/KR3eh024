body:
  text: 卷二十五火熱論集略論曰內經云諸熱瞀瘛音務翅瞀昏悶也瘛抽掣也邪熱傷神則瞀亢陽傷血則瘛諸禁鼓栗如喪神守禁噤也寒厥咬牙曰噤鼓鼓頷也栗戰也病寒戰而精神不能主持如喪失神守也諸逆衝上火性炎上也諸臟諸經皆有逆氣其陰陽虛實有不同者諸躁狂越躁煩躁不安也狂狂亂也越失常度也熱盛於外則肢體躁擾熱盛於內則神志躁煩蓋火入於肺則煩火入於腎則躁煩為熱之輕躁為熱之甚諸病胕腫疼酸驚駭胕腫浮腫也胕腫疼酸者陽實於外火在經也驚駭不安者熱乘陰分火在臟也以及注泄嚏嘔瘡瘍喉痹暴喑不能言也鬱冒神明亂也瞤瘛瞤目動也耳聾目瞑皆屬於火手少陽相火之熱乃心包絡三焦之氣也火有君相之分其實一氣而已心為君火君不主令相火代之其性寄於肝腎之內附於脾肺之間火與元氣不兩立火盛則煎熬真陰陰虛則病陰絶則死苦寒之味能瀉有餘之火若飲食勞倦內傷元氣為陽虛之病以甘溫之劑除之如參耆甘草之屬若陰微陽強相火熾盛以乘陰位為血虛之病以甘寒之劑降之如當歸地黃之屬若心火亢極鬱熱內實為陽強之病以鹹冷之劑折之如大黃朴硝之屬若腎水受傷真陰失守無根之火為陰虛之病以壯水之劑制之如生地元參之屬若右腎命門火衰為陽脫之病以溫熱之劑濟之如附子乾薑之屬若胃虛過食冷物抑遏陽氣於脾土為火鬱之病以升散之劑發之如升麻葛根之屬治積熱者始而涼和次而寒取不愈則因熱而從之再不愈則技窮莫若取之陰以益腎水之不足而使其制心之有餘可也若夫病沉寒者始而溫和次而熱取不愈則因寒而從之再不愈則技窮也莫若取之陽以益心火之不足而使其制腎水之有餘可也夫火出於心而原於肝固當平七情尤當戒怒戒郁本於腎而主於肺因當戒色欲尤當戒酒戒勞智者陰平陽祕神氣以安昧者徇情縱欲因致積熱使燔灼臟腑消爍肌膚良工無以為計哀哉劉宗厚曰火之為病其害甚大其變甚速其勢甚彰其死甚暴何者蓋能燔灼焚焰飛走狂越消鑠於物莫能御之遊行乎三焦虛實之兩途曰君火腠猶人火也曰相火也猶龍火也火性不妄動能不違於道常以稟位聽命運行造化生存之機矣夫人在氣交之中多動少靜欲不妄動其可得乎故凡動者皆屬火化火一妄行元氣受傷勢不兩立偏勝則病移害他經事非細故動之極也病則死矣經所謂一水不勝二火之火出於天造君相之外又有厥陽臟腑之火根於五志之內六欲七情激之其火隨起蓋大怒則火起於肝醉飽則火起於胃房勞則火起於腎悲哀動中則火起於肺心為君主自焚則死矣丹溪又啓火出五臟主病曰諸風掉眩屬肝火動之類經所謂一水不勝五火之火出自人為又考內經病機一十九條內舉屬火者五諸熱瞀瘛皆屬於火之類而河間又廣其說火之致病者甚多深契內經之旨曰諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大鼓之有聲如鼓癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻塞鼽衄血溢白泄淋閟身熱惡寒戰栗驚惑悲笑譫妄衄衊血汙此皆少陰君火之熱乃真心小腸之氣所為也若瞀瘛暴喑冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆衝上禁栗如喪神守嚏嘔瘡瘍喉痹耳鳴及聾嘔滿溢食不下目昧不明瞤瘛暴病暴死此皆少陽相火之熱乃心包絡三焦之氣所為也是皆火之變見為諸病也為脈虛則浮大實則洪數藥之所主各因其屬君火者心火也可以濕伏可以水滅可以直折惟黃連之屬可以制之相火者龍火也不可以水濕折之當從其性而伏之惟黃柏之屬可以降之噫瀉火之法豈止如此虛實多端不可不察以臟氣目之黃連瀉心火黃芩瀉肺火芍藥瀉脾火柴胡瀉肝火知母瀉腎火此皆苦寒之味能瀉有餘之火耳若飲食勞倦內傷元氣氣火不兩立為陽虛之病以甘溫之劑除之如黃耆人參甘草之屬若陰微陽強相火熾盛以乘陰位日漸煎熬為血虛之病以甘寒之劑降之如當歸地黃之屬若心火亢極鬱熱內實為陽強之病以鹹冷之劑折之如大黃朴硝之屬若腎水受傷真陰失守無根之火為陰虛之病以壯水之劑治之如生地元參之屬若右腎命門火衰為陽脫之病以溫熱之劑濟之如附子乾薑之類若胃虛過食冷物抑遏陽氣於脾土為火鬱之病以升散之劑發之如升麻葛根之屬不明諸類而求火之為病施治何所依據故於諸經集略其說以備處方之用庶免實實虛虛之禍也選要曰積熱者謂溫熱之毒久而蘊積於內也蓋心主熱屬火然人久蘊積熱毒之氣於三焦必與心火相從陽火太盛而作熱或素嗜辛辣芳馨肥甘之味或飲醇酒或服丹石之藥以致燥熱積於臟腑之中火熱上熾上乘心肺或口舌生瘡咽喉腫痛或目赤頭眩或痰涎稠濁或大小便祕結此皆積熱之所致也其有陰虛生內熱或為消渴或為癰疽諸熱之病又當隨證論之若但蘊積熱毒發於上焦者宜清涼之結於臟腑者宜蕩滌之陰虛內熱者宜滋補腎水以攝伏之斯治之要也潔古曰有表而熱者謂之表熱無表而熱者謂之裡熱故苦者以治五臟五臟屬陰而居於內辛者以治六腑六腑屬陽而在於外故曰內者下之外者發之又宜養血益陰身熱自除以脈言之浮數為外熱沉數為內熱浮大有力為外熱沉大有力內熱暴熱者病在心肺積熱者病在腎肝暴熱者宜局方雄黃解毒丸積熱者宜局方妙香丸暴者上喘也病在心肺謂之高喘宜木香金鈴子散上焦熱而煩者宜牛黃散有病久憔悴發熱盜汗謂之五臟齊損此勞熱骨蒸之病也瘦弱虛損煩喘腸澼下血皆蒸勞也治法宜養血益陰熱能自退此謂不治而治也錢氏地黃丸主之東垣曰五臟有邪各有身熱其狀各異以手捫摸有三法以輕手捫之則熱重按之則不熱是熱在皮毛血脈也重按之筋骨之分則熱蒸手極甚輕摸之則不熱是熱在筋骨間也輕手捫之則不熱重手加力按之亦不熱不輕不重按之而熱是熱在筋骨之上皮毛血脈之下乃熱在肌肉也此謂三法以三黃丸通治之細分之則五臟各異矣肺熱者輕手乃得微按全無瞥瞥然見於皮毛上為肺主皮毛故也日西尤甚其證必見喘咳灑淅寒熱輕者瀉白散重者涼膈散白虎湯之類治之及地黃地骨皮散心熱者心主血脈微按之皮膚之下肌肉之上輕手乃得微按之皮毛之下則熱少加力按之則全不熱是熱在血脈也日中太甚其證煩心心痛掌中熱而噦以黃連瀉心湯導赤散硃砂安神丸清涼散之類治之脾熱者輕手捫之不熱重按至筋骨又不熱不輕不重在輕手重手之間此熱在肌肉遇夜尤甚其證必怠惰嗜臥四肢不收無氣以動以瀉黃散調胃承氣湯治實熱用之人參黃耆散補中益氣湯治中虛有熱者用之肝熱者按之肌肉之下至骨之上乃肝之熱寅卯間尤甚其脈弦其病四肢滿悶便難轉筋多怒多驚四肢困熱筋痿不能起於床瀉青丸柴胡飲之類治之兩手脈弦者或寅申發者皆肝熱也俱宜用之腎熱者輕按之不熱重按之至骨其熱蒸手如火如炙其人骨蘇蘇然如蟲蝕其骨困熱不任亦不能起於床滋腎丸六味地黃丸主之又曰小兒癍後餘熱不退痂不收斂大便不行是謂血燥則當以陰藥治之因而補之用清涼飲子通大便而瀉其熱潔古云涼風至而草木實夫清涼飲子乃秋風徹熱之劑也此甘寒瀉火也傷寒表邪入於裡日晡潮熱大渴引飲譫語狂躁不大便是胃實乃可攻之夫胃氣為熱所傷以承氣湯瀉其上實元氣乃得周流承氣之名於此具矣此苦寒瀉熱濕也今世人以苦寒瀉火故備陳之除熱瀉火非甘寒不可以苦寒瀉火非徒無益而反害之故有大熱脈洪大服苦寒劑而熱不退者加石膏如證退而脈數不退洪大而病有加者宜減苦寒加石膏如大便軟或泄者加桔梗食後服之此藥誤用則其害非細用者旋旋加之如食少者不可用石膏石膏善能去脈數如病退而脈數不退者不治又云治熱以寒溫而行之有三皆因大熱在身止用人參黃耆甘草此三味者皆甘溫雖表裡皆熱燥發於內捫之肌熱於外能和之汗自出而解矣此溫能除大熱之至理一也熱極生風乃左遷入地補母以虛其子使天道右遷順行諸病得天令行而必愈二也況大熱在上其大寒必伏於內溫能退寒以助地氣地氣者在人乃胃之生氣使真氣旺三也又云能食而熱口舌乾燥大便難者實熱也以辛苦大寒之劑下之瀉熱補陰經云陽盛陰虛下之則愈脈洪盛而有力者是已不能食而熱自汗氣短者虛熱也以甘寒之劑瀉熱補氣經云治熱以寒溫而行之脈虛弱無力者是已海藏曰晝熱則行陽二十五度大抵柴胡飲子夜熱則行陰二十五度大抵四順飲子平旦發熱熱在行陽之分肺氣主之故用白虎湯以瀉氣中之火日晡潮熱熱在行陰之分腎氣主之故用地骨皮散以瀉血中之火或問寒病服熱藥而寒不退熱病服寒藥而熱不退何也答曰啓玄子云熱不得寒是無水也寒不得熱是無火也寒之不寒責其無水熱之不熱責其無火經云滋其化源源既已絶藥之假焉能滋其真水火也丹溪曰人具五行各一其性惟火也心為君火而又有相火者寄乎肝腎二臟之間經所謂二火也諸動為火五者之性感物而動經所謂五火也相火易起五火相煽則妄動矣火起於妄變化莫測無時不有煎熬真陰陰虛則病陰絶則死陰虛火動者難治戴氏曰脈數而無力者是陰虛實火可瀉黃連解毒之類虛火可補參朮生甘草之類謂之實者邪氣實也謂之虛者正氣虛也鬱火可發當看何經風寒外束者可發輕者可降重則從其性而升之凡火盛者不可驟用寒涼必須溫散火急甚者必緩之生甘草兼瀉兼緩參術亦可人壯氣實火盛顛狂者可用正治或硝水冰水與之虛火盛狂者以生薑湯與之若投冰水正治立死補陰則火自降炒黃柏生地黃之類氣有餘便是火煩躁者氣隨火升也氣從左邊起者肝火也左金丸治之氣從臍中起者陰火也大補丸治之氣從腳下起入腹者虛之極也蓋火起九泉之下此病十不救一治法以附子末盦湧泉穴以四物湯加降火藥服之飲酒人發熱者難治不飲酒人因酒發熱者亦難治輕手按之熱甚重手按之不甚此熱在肌表宜清之地骨皮麥門冬竹茹之類重手按之熱甚而烙手輕手按之不覺熱此病在肌肉之內宜發之東垣升陽散火湯火鬱湯之類手心熱屬熱鬱用火鬱湯或用梔子香附白芷半夏川芎曲糊丸木通下行瀉小腸火人中白瀉肝火黃芩黃連以豬膽汁拌炒能瀉肝膽之火黃柏加細辛瀉膀胱之火青黛能瀉五臟之鬱火元參能瀉無根之遊火小便降火極速山梔子能降火從小便中泄去其性能屈曲下行人所不知丹溪活套云凡去上焦濕熱須酒洗黃芩以瀉肺火如肺有實熱宜用如虛熱而用黃芩則傷肺氣須先用天門冬保定肺氣然後用之如去中焦濕熱與痛須用黃連以瀉心火若中焦有實熱宜用若脾胃氣虛不得轉運及中焦有鬱熱者當用白茯苓白朮黃芩葛根代之如胸中煩熱須用梔子實熱者切當若虛煩須用補藥為主人參白朮黃芩芍藥茯苓麥門冬大棗之類下焦有濕熱腫痛並膀胱有火邪者須用酒洗防己草龍膽黃柏知母之類固是捷藥若肥白人氣虛者宜用白朮蒼朮南星滑石茯苓之類如黑瘦之人下焦有濕熱腫痛者必用當歸紅花桃仁牛膝檳榔等藥柴胡瀉肝火須用片芩佐之片芩又能瀉肺火須用桑白皮佐之若歸尾者能瀉大腸之火黃連瀉心火若用豬膽汁拌炒更以草龍膽佐之大能瀉膽中之火白芍藥瀉脾火若冬月用必以酒浸炒蓋其性之酸寒也知母黃柏瀉腎火又瀉膀胱之火梔子瀉三焦之火在上中二焦用連皮殼在下焦須去殼水洗去黃漿炒焦色研細用之人中白非獨瀉肝火又能瀉三焦火及膀胱之火使小便中出蓋膀胱乃此物之故道也李氏曰火病死人甚暴變化無常一動便傷元氣偏勝遺害他經內經病機十九條而屬火者五劉河間推廣五運為病屬肝者諸風之火屬脾胃者諸濕痰火屬心肺者諸熱實火屬腎者諸虛之火散於各經浮游之火入氣分無根之火入血分消陰伏火故曰諸病尋痰火痰火生異證火因內外須分虛實外因邪郁經絡積熱臟腑此為有餘之火內因飲食情欲氣盛似火此為有餘中不足陰虛火動乃不足之火大要以脈弦數無力為虛火實大有力為實火且實火內外皆熱口渴日夜潮熱大小便閉虛火潮熱有間口燥不渴實火因外感邪郁在表者九味羌活湯半表半裡小柴胡湯入里大承氣湯燥渴白虎湯因金石炙煿者黃連解毒湯防風當歸飲三黃丸大金花丸狂者黑奴丸虛火氣虛火盛因勞倦傷胃無力身熱宜保元湯補中益氣湯加芍藥黃柏或四君子湯滲之如大病及吐瀉後身熱如焚命門脈脫為陽衰之病宜以辛熱溫養其火則熱自退附子理中湯霹靂散主之血虛火動因傷色欲午後發熱宜四物湯滋陰降火湯加味逍遙散腎氣丸人中白散若腎水受傷生地黃元參煎膏主之相火旺甚氣從臍下起者正氣湯坎離丸如氣從湧泉穴起入腹者虛極難治四物湯加白馬脛骨降陰火以代芩連或人中黃亦好外用附子末津調塗足心亦有濕熱鬱者飲食鬱火因內傷生冷及飲食不化抑遏陽氣於脾土四肢熱如燎以升散之劑發之升陽散火湯火鬱湯瀉陰火升陽湯七情五志火起宜隨各經調之大怒火起於肝則手掉目眩清肝湯加龍膽草古茱通丸醉飽火起於胃則痞塞腫滿瀉黃散戊己丸單石膏丸悲哀火起於肺則氣促志郁瀉白散加黃芩葶藶單黃芩丸單苦參丸房勞火起於腎則骨蒸潮熱大補陰丸滋腎丸單黃柏丸心火輕則煩熱痛癢單瀉心湯重則自焚面青發躁脈絶暴死故曰五志之火動極不治總論虛火可補實火可瀉輕者可降重者從其性而升之君火正治可以濕伏可以水滅可以直折相火反治不可以水濕折惟從其性而伏之即如實火發狂宜三黃硝黃正治虛火發狂先與薑湯然後補陰其火自降凡火盛不可猛用涼藥必酒炒過或兼溫散甘緩又有可發汗者風寒生冷郁也五行惟火有二心為君火一身之主腎為相火遊行於身常寄肝膽胞絡三焦之間又膀胱為民火亦屬於腎此皆天賦不可無者若五志之火則由於人是以內傷火多外感火少噫火不妄動動由於心靜之一字其心中之水乎又曰三焦積熱須審虛實實熱因日服金石炙煿夜臥熱炕或火烘衣被久則蘊積熱毒在上焦則咽乾口燥而臭舌糜唇瘡在中焦則胸滿乾嘔作渴在臟腑則大小便閉法當清心解毒上熱涼膈散中熱調胃承氣湯下熱八正散三焦俱熱三黃湯大金花丸虛熱因燥鑠腎水相火炎上口燥煩渴精神短少心悸自汗懶於動作夜臥睡語法當降火滋水三補丸主之或只清之潤之而已熱分各經心熱單瀉心湯肝熱瀉青丸脾熱瀉黃散肺熱瀉白散腎熱滋腎丸小腸熱導赤散胃熱瀉胃湯大腸熱瀉白湯膀胱熱加味石膏湯然諸熱皆屬於心熱甚則能傷陰宜硃砂安神丸以清鎮之熱分氣血氣分實熱白虎湯或敗毒散加荊芥青皮白朮血分實熱四順清涼飲氣血俱實熱洗心散甘露飲澤瀉湯氣分虛熱清心蓮子飲甚者龍腦雞蘇丸久者宜升陽以散之小柴胡湯合四君子湯升陽益胃湯補中益氣湯或疑補中益氣何以治熱殊不知熱因熱用溫能除熱之理蓋大熱在上大寒必伏於內溫能退寒以助地氣地氣者在人乃胃之生氣使真氣旺而邪熱自退血分虛熱四物湯加芩連山梔或為丸服久則滋陰以降之秦艽扶羸湯或古歸耆湯滋陰降火湯蒸熱者加味逍遙散坎離丸氣血俱虛升陽滋陰兼用十全大補湯人參養榮湯俱加知母黃柏然虛熱久必脾胃不合三白湯參苓白朮散調之風熱風甚生熱者兼治風熱或熱甚生風者治其熱而風自消凡頭目腫痛眩暈眼昏目赤耳聾鼻塞口燥舌乾牙宣牙腫斑疹之類皆風熱炎上之所為也初起上攻者川芎茶調散至寶丹四神丹上清丸久而下注血衰者腎氣丸加知母黃柏或當歸龍薈丸四生散痰熱者因痰生熱因熱生痰凡咽痛喉閉膈噎胸痞癲狂驚悸怔忡健忘之類皆痰火滯中之所為也小調中湯大調中湯濕熱者因濕生熱或因熱生濕凡泄瀉下痢水腫鼓脹黃疸遺精白濁疝痛腰痛腳氣之類皆濕熱下流之所為也治見各條丹溪治濕熱上焦黃芩虛者天麥門冬代之中焦黃連虛者白朮茯苓葛根代之下焦草龍膽防己黃柏虛者肥人蒼朮南星滑石瘦人牛膝檳榔桃仁紅花經曰治病必求其本此風熱痰熱濕熱乃百病之根本也吳氏曰水火人身之陰陽也陽常有餘故火證恆多所謂一水不勝五火是也人能攝理其火致之沖和則調元之手矣或者寒涼太過斯又弊焉自有五行來不可以無火故知滅燼之為非學者慎之蔭按葉氏曰陰虛火動之說自丹溪始發厥功大矣夫陰虛者腎水之虛也火動者相火因水衰而上炎也水衰火旺榮血日損故用四物湯加黃柏知母補其陰以降其火此治法之善者也但黃柏知母苦寒之藥脾胃虛者非其所宜豫每見得此病服此藥者反致下泄飲食不進正謂氣虛不能勝苦寒而為所傷也五臟以胃氣為本胃既受傷而求腎陰之長必不可得矣故用黃柏知母者又當視脾胃虛實而加損焉余昔居家時曾患虛弱服此二劑遂致大瀉余亦謂云云虞氏曰丹溪謂火從腳下起入腹者為虛極言尤有未悉者如果勞怯陰虛之人有此固當作陰虛治若壯實之人有此則是濕鬱成熱之候也愚嘗冒雨徒行衣濕得此證以蒼朮黃柏加牛膝防己等藥作丸服之而愈後纍醫諸人皆驗若誤作陰虛治即成痿證劇矣統旨曰或問火熱之名有辨否曰內經先哲論火者專指五臟所出而言其曰君火相火之類是也論熱者兼臟之所出及外感而言其曰諸熱瞀瘛及諸病論之類是也較二子立名之義則火似甚於熱據昔人立言之義則熱反兼乎火要知熱即火也火即熱也其治一而已矣脈法脈浮而洪數為虛火脈沉而實大為實火洪數見於左寸為心火見於右寸為肺火見於左關為肝火見於右關為脾火兩尺為腎經命門之火男子兩尺洪大必主遺精陰火盛也病熱有火者可治脈洪是也無火者難治沉細是也脈理提綱曰火脈洪數虛則浮治三焦實火方黃連解毒湯治熱毒躁亂煩渴蓄熱內甚等證此所謂實火宜瀉黃連黃芩黃柏山梔子各等分上㕮咀每服五錢煎服一方加連翹芍藥柴胡涼膈散治臟腑積熱口舌生瘡痰實不利煩躁多渴腸胃祕澀便溺不利連翹四錢大黃朴硝甘草各二錢薄荷黃芩梔子各一錢上銼加竹葉七片水煎去渣入蜜少許食後服加姜煎亦得加黃連五分名清心湯減大黃芒硝加桔梗甘草人參防風治胸膈中與六經之熱抑手足少陽之氣俱下膈絡胸中三焦之氣同相火遊與身之表膈與六經乃至高之分此藥浮載亦至高之劑故施於無形之中隨高而走去胸膈中及六經之熱也如肺經邪熱咳嗽有痰加半夏涼膈與四物湯各半服能益血瀉熱名雙和散錢氏去連翹加藿香石膏為瀉黃散既濟解毒湯治上熱頭目赤腫而痛腹中積滯胸滿困臥大便微祕大黃酒炒黃連酒炒黃芩酒炒甘草炙桔梗柴胡升麻連翹歸身各一錢上銼水煎食後服本事方治大人小兒五臟積熱煩躁多渴唇裂喉閉目赤鼻頷結硬口舌生瘡陽明證傷寒發狂見鬼譫語大小便閉一切風壅並皆治之大黃芒硝連翹薄荷葉乾葛各二兩山梔子赤芍藥甘草各一兩上為散每服二錢水一盞入竹葉七片蜜三匙同煎至七分去渣食後服唯陽明證傷寒忌下又方白朮荊芥赤芍藥各三兩大黃車前子木通當歸甘草各二兩上為細末如大便祕結米泔調三錢空心服如上膈壅熱或生赤丹或生癰癤用水二盞煎六分如小便結如淋狀用蘆根打碎洗淨煎湯下如五心煩熱用生薑一片同煎服黃芩湯治心肺蘊熱口瘡咽痛膈悶小便淋濁不利黃芩黃連梔子仁澤瀉木通生地黃麥門冬甘草各等分上㕮咀每服一兩加生薑五片水煎食前溫服三因平胃散治胃經實熱口乾舌裂大小便祕澀及熱病後餘熱不除蓄於胃中四肢發熱口渴無汗芍藥二兩厚朴射干米泔浸升麻茯苓各一兩半枳殼麩炒大黃蒸甘草炙各一兩上㕮咀每服四錢水煎空心熱服梔子仁湯治發熱潮熱發狂煩躁面赤咽痛梔子仁赤芍藥大青知母各五分柴胡一錢二分升麻黃芩石膏生甘草各一錢杏仁七分半豆豉五十粒上銼水煎溫服三黃丸治三焦積熱咽喉腫閉心膈煩躁小便赤澀大便祕結黃連黃芩大黃煨各等分上為細末煉蜜丸如桐子大每服四十丸食後白湯下如作湯每服四錢水煎服加黃柏水名大金花丸三補丸黃芩黃連大黃煨各等分上為細末新汲水丸服大金花丸治三焦積熱心火炎上口舌生瘡咽喉腫痛大便祕結小便赤澀黃連黃柏黃芩大黃各等分上為末滴水為丸如桐子大每服三五十丸食過茶水任下自利去大黃加梔子名梔子金花丸加味金花丸此藥退煩熱止嗽化痰清頭目進飲食黃連炒黃芩炒黃柏炒山梔子各一兩大黃煨人參半夏桔梗各半兩上為末水丸如桐子大每服三十丸食後茶清下三黃解毒丸治內外諸邪熱毒癰腫瘡疽筋脈拘攣咬牙驚悸一切熱毒並五淋便濁痔漏黑牽牛滑石各四兩大黃黃芩黃連梔子各二兩上為末滴水丸如桐子大每服三四十丸溫水下四生丸治一切熱痰諸熱證皆可服大黃牽牛皂角各一兩朴硝半兩上為末滴水丸如桐子大每服三十丸食後白湯下神芎丸治三焦積熱風痰壅滯頭目赤腫或生瘡癤咽喉不利或腸胃結燥小便赤澀大便閉塞一切熱證並宜服之大黃生黃芩各二兩牽牛生滑石各四兩黃連薄荷川芎各半兩上為末滴水丸如桐子大每服五十丸溫水下食後服碧雪丹治一切積熱口舌生瘡心煩喉閉芒硝青黛石膏各研末水漂寒水石朴硝滑石馬牙硝各等分甘草煎湯二升上將甘草湯入諸藥末再煎用柳木篦不住手攪令消溶入青黛和勻傾砂盆內候冷結成霜研為末每用少許噙化津咽如喉閉不能咽用竹筒吹入喉中元明粉此藥大治邪熱所幹膈上氣滯臟腑祕澀並宜服之以朴硝煎過澄濾五七遍至夜於星月下露至天明自然結成青白塊子用砂罐子按實於炭火內從慢至緊自然成汁煎沸直候不響再加頂火一煅便取出於淨地上倒下用盆合蓋了以去火毒然後研為細末每二斤入甘草生熟二兩為末攪勻臨睡酌量用之或一錢二錢以桃花煎湯或蔥白湯下木香金鈴散治暴熱心肺上喘不已大黃五錢金鈴子去核木香各三錢朴硝二錢輕粉少許上為末柳白皮煎湯調下三四錢食後服以利為度大黃散治上焦熱而煩不能睡臥山梔大黃鬱金各半兩甘草二錢上為末每服五錢水煎溫服微利則已益元散治六腑有實火上有煩渴下有便祕赤澀者此方主之滑石六兩甘草一兩上為末蜜水調下三錢珍珠散治男婦小兒五臟積熱心胸悶亂口乾舌燥精神恍惚癲狂等證琥珀珍珠粉鐵粉天花粉硃砂牙硝寒水石大黃酒浸生甘草各等分上為末每服三錢用薄荷湯調下紫雪治腳氣毒遍內外煩熱不解口中生瘡狂陽叫走瘴毒及解諸熱藥毒卒黃等毒並蠱魅野道熱毒又治小兒驚疳熱病丹溪云此心脾肝腎胃經之藥寒水石石膏磁石滑石以上四味各三斤搗為細末用水一石煎至五斗去渣入後藥元參一斤洗焙切沉香羚羊角犀角青木香升麻各五兩丁香甘草八兩以上六味搗為末入前藥汁中再煮取取一斗五升去渣入下項二味藥朴硝硝石好者二斤以上二味入前藥汁中微火煎不住手用柳木棍攪候七八升許投在盆內半日後方凝方入下項二味藥辰砂三兩細研麝香真者一兩二錢乳炒以上二味入前藥汁中拌調令勻合成後窨二日每服一錢或二錢食後冷水調服大人小兒仔細加減噙化三黃丸大黃黃芩黃連各二兩半黃藥子白藥子各一兩半黃柏苦參山豆根硼砂各一兩京墨三錢片腦一錢半麝香少許上為細末用豬膽汁調勻攤在碗內甑上蒸三次露一宿後入腦麝硼砂為丸如豆大每服一丸食後噙化冬加知母一方有甘草牛黃涼膈丸治上焦壅熱口乾咽痛煩躁涎潮牛黃片腦麝香各二錢半紫石英半兩牛膽南星七錢半馬牙硝寒水石煨硬石膏甘草炙各一兩上為細末煉蜜丸每兩作四十丸食後薄荷人參湯下清心丸治經絡中火邪夢遺心忪恍惚口瘡咽燥黃柏生三兩龍腦三錢上為末蜜丸桐子大每服十丸臨臥煎麥門冬湯下全真丹治臟腑積熱洗滌腸垢潤利燥澀解風毒攻注手足浮腫或頑痹不仁痰涎不利涕唾稠黏胸膈痞塞臍腹脹滿飲食減退困倦無力川大黃三兩用米泔水浸三日換取出切片焙乾為細末黑牽牛八兩慢火炒四兩生用四兩同取頭末四兩上以皂角一兩輕炒去皮子水一大碗浸一宿入蘿蔔一兩切作片子同皂角一處熬至半碗去渣再熬至二鍾和藥末為丸如桐子大每服二三十丸至五六十丸諸飲下隨證加減以利為度黃金丸治積熱積痰並三焦五臟有餘之熱挾熱下利食痞膈悶咽痛眼目赤腫中暑中熱煩躁等證及初發腫毒錦紋大黃煨鬱金比薑黃短小者牙皂去筋膜各等分上為細末煉牛膽為丸如桐子大每服三五十丸量病輕重加減白湯下大便少出一二次即止不傷元氣妙香丸治時疫傷寒解五毒潮熱積熱及小兒驚風百病丹溪云疏決腸胃制伏木火之劑辰砂水飛九兩龍腦膩粉麝香牛黃各七錢半金箔九十片巴豆三百十五粒去皮心膜炒熟研如泥去油上研極細煉黃蠟六兩入白礬七錢半同煉蜜為丸每兩作三十丸每服一丸米飲吞下小兒緑豆大二丸每吞此丸即成粒從大便出須於初丸時以針穿眼人冷水浸少時服之庶使藥行而成利下之功也拔萃方無金箔有水銀硇砂治久遠沉積治五臟偏火方瀉心湯一名黃連湯治心熱癲狂譫語二府澀黃者黃連上為末每服一二錢水調服量病人大小與之或煎服亦可黃連湯治心火舌上生瘡或舌腫燥裂或舌尖出血舌硬黃連山梔生地黃麥冬去心當歸芍藥各一錢薄荷犀角甘草各五分上銼一劑水煎食後頻服單黃連丸治心火一切血熱伏熱酒毒及肝火嘔逆等證黃連用姜汗炒或酒炒上為末粥丸湯下千金地黃丸治心熱黃連四兩為粗末生地黃半斤研取汁連渣並二味拌勻曬乾上為細末煉蜜丸如桐子大每服三十丸食後麥門冬湯下麥冬丸治心經有熱麥冬去心一兩黃連半兩上為細末蜜丸如桐子大食後熟水下三十丸清心丸治心熱黃柏生用二兩麥冬去心黃連各一兩龍腦一錢上為末煉蜜丸如桐子大每服十丸臨臥麥冬酒下或薄荷湯下亦可火府丹瀉心小腸火黃芩黃連各一兩生地黃二兩木通三兩上為細末煉蜜丸如桐子大每服三十丸臨臥溫水下導赤散瀉小腸火生地黃木通甘草各等分上銼每服五錢入竹葉麥冬水煎服赤茯苓湯治小腸實熱面赤多汗小便不利赤茯苓木通生地黃赤芍藥黃芩麥冬去心檳榔甘草炙各一兩上㕮咀每服四錢入生薑五片煎服以上諸方瀉心與小腸火黃芩一物湯瀉肺火目白睛赤煩躁引飲黃芩炒上銼每服三錢水煎服或為末用天門冬煎膏丸或粥丸名清金丸清金丸一名黃芩丸治肺火降痰黃芩半枯者炒黑上為末用天門冬煎膏丸服或粥丸亦可或加川芎能調心血心平則血不妄行而火自降瀉白散治肺熱喘滿氣急桑白皮地骨皮各一兩甘草五錢上為末每服一二錢水一盞入粳米百粒同煎服食後或云清金丸瀉肺中血分之火瀉白散瀉肺中氣分之火瀉肺湯治肺經積熱上喘咳嗽胸脅服滿痰多大便澀滯黃芩梔子桑白皮炒杏仁炒去皮尖桔梗枳殼薄荷連翹大黃甘草炙各等分上㕮咀每服一兩水煎食後服黃芩湯治肺火咳嗽吐血痰血鼻血咽喉腫痛乾燥生瘡或鼻孔乾燥生瘡或鼻腫痛黃芩山梔桑白皮桔梗芍藥麥冬去心荊芥薄荷連翹各一錢甘草二分上銼一劑水煎食後服單苦參丸治肺風及痰火兼治狂邪大叫殺人不避水火及遍身生瘡滿頭面風粟癢腫血痢苦參炒上為末水丸溫湯下單山梔丸治肺與大腸為最解五臟結氣補少陰經血山梔子炒黑上為末煉蜜丸服或加破故紙善滋陰降火以上諸方瀉肺與大腸之火瀉黃散治脾熱唇口乾燥藿香七錢山梔炒黑一兩石膏八錢甘草三兩防風四兩上為末用蜜酒拌炒每服二錢水煎服芍藥湯治脾火或消穀易飢或胃熱口燥煩渴或唇生瘡芍藥梔子黃連石膏連翹薄荷各一錢甘草三分上銼一劑水煎食後服調胃承氣湯治胃中熱盛及大腸熱結大黃酒浸一兩芒硝七錢半甘草五錢上銼每服五錢用水一鍾先煎大黃甘草至七分去渣入硝煎一二沸溫服取利單石膏丸瀉胃火併食積痰火石膏火煅去火毒上為末醋糊丸如緑豆大每服三四十丸清米飲下以上諸方瀉脾胃之火柴胡湯治肝火盛木氣實或脅痛或氣從左邊起者或目紅腫痛俱肝火也柴胡芍藥當歸川芎龍膽草青皮山梔連翹各一錢甘草五分上銼一劑水煎食後服柴胡瀉肝湯治怒火傷肝左脅肋痛柴胡當歸各一錢二分芍藥青皮麩炒各一錢黃連炒山梔子炒龍膽草各八分甘草五分上銼水煎服柴青瀉肝湯治男子肝火旺極陽莖腫裂健硬不休柴胡黃芩各一錢半人參半夏黃連青皮各一錢甘草五分上銼水煎服瀉