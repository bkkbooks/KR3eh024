各一兩薄荷三兩三錢白豆蔻五錢砂仁二錢片腦五分上為末煉蜜丸每兩作二十丸每服二丸細嚼茶清送下龍腦雞蘇丸消煩渴涼上膈解酒毒除邪熱並治咳嗽唾血鼻衄吐血諸淋下血胃熱口臭肺熱喉腥脾疸口甜膽疸口苦並宜服之雞蘇葉即薄荷一斤麥冬去心四兩生地黃六兩另為末人參蒲黃炒阿膠炒各二兩黃耆一兩甘草炙一兩半木通二兩同柴胡浸銀胡銀州者二兩和木通以湯半升浸一二宿取汁為膏上除另研藥外余並搗為末用好蜜二斤先煉一二沸然後下生地末不住手攪令勻取木通銀胡汁慢火熬成膏勿令焦然後入余藥末同和為丸如黃豆大每服二十丸嚼破熱水下虛煩消渴驚悸人參湯下咳嗽唾血鼻衄吐血麥冬湯下諸淋車前子湯下治往來寒熱方加減小柴胡湯治寒熱往來及汗後餘熱不解柴胡二錢黃芩人參半夏甘草各一錢上銼加生薑三片棗一枚水煎溫服加山梔子牡丹皮名加味小柴胡湯寒熱往來加秦艽芍藥川芎當歸白朮茯苓知母地骨皮牡丹皮血虛合四物湯各半服無汗加柴胡有汗加地骨皮惡寒加桂嗽加紫菀勞者加鱉甲柴胡散治寒熱體瘦肢節疼痛口乾心煩柴胡黃耆赤茯苓白朮各二兩人參地骨皮枳殼制桔梗桑白皮赤芍藥生地黃各七錢半麥冬三兩甘草半兩上㕮咀每服四錢生薑五片水煎服地骨皮散治血中風氣體虛發渴寒熱柴胡地骨皮各一兩桑白皮枳殼前胡黃耆各七錢半人參白茯苓芍藥桂心五加皮甘草各半兩上㕮咀每服三錢生薑三片水煎服解風湯治中風寒熱頭目昏眩肢體疼痛手足麻痹上膈壅沸人參川芎獨活麻黃去節湯泡焙甘草各一兩細辛半兩上為末每服三錢生薑五片薄荷少許同煎服防風湯治中風寒熱防風桂枝黃芩甘草當歸白茯苓各一兩秦艽乾葛各一兩半杏仁五十枚上為散水酒薑棗煎服調中湯羅謙甫知完顏小將軍病寒熱間作腕後有斑三五點鼻中微血出兩手脈沉澀胸膈四肢按之殊無大熱此內傷寒也問之嚮者臥殿角傷風又渴飲冰酪水此外感者輕內傷者重外從內內外俱為病也故先斑後衄顯內陰證寒熱間作理亦有之非徒少陽之寒熱也與調中湯數服而愈白朮白茯苓乾薑甘草各等分上銼如麻豆大每服五錢水一盞半煎服蔭按脈經云大腸有宿食寒栗發熱有時如瘧輕則消導重則下之熱食承氣之類寒食見晛丸之類並於傷食門求之則得矣治鬱火發熱方火鬱湯治四肢五心煩熱因熱伏土中或血虛得之或胃虛多食冷物抑遏陽氣於土中羌活升麻葛根芍藥人參各五錢柴胡甘草炙各三錢防風二錢半上銼入蔥白三莖水煎稍熱服一方無羌活人參升陽散火湯治男子婦人四肢發熱肌熱筋骨中熱困熱如燎捫之烙手此病多因血虛而得或胃虛多食冷物抑遏陽氣於脾土火鬱則發之升麻葛根獨活羌活各三錢防風一錢半柴胡二錢人參芍藥各三錢甘草炙二錢生草一錢上銼每服五錢水煎稍熱服忌一切寒涼之物瀉陰火升陽湯治肌熱煩熱面赤食少喘咳痰盛右關脈緩弱或弦或浮而數羌活甘草炙黃耆蒼朮各一兩升麻八錢柴胡一兩半人參黃芩各七錢黃連酒炒半兩石膏少許長夏微用過時去之從權上㕮咀每服半兩水煎溫服早飯後午飯前間日服服藥時宜減時服藥後忌語話一二時辰及酒濕面大料物之類恐復助火邪而愈損元氣也地骨皮散治渾身壯熱脈長而滑陽毒火熾發渴地骨皮茯苓各半兩柴胡黃芩生地黃知母各一兩石膏二兩羌活麻黃各七錢半有汗並去之上㕮咀每服一兩入生薑煎服加味小柴胡湯治手心腳心發熱不可當柴胡黃芩半夏人參香附黃連前胡甘草上銼水煎服清熱解鬱湯治發煩熱惡寒諸病並吐血衄血小便赤大便難山梔仁連殼研碎炒半黑為度覆地上出火毒一時上每服五錢水一碗生薑一片煎八分溫服丹溪方一男因服熱藥多又性急形瘦多倦少食此時四月後與此方白朮一兩半神麯炒一兩陳皮黃芩六錢人參知母炒麥冬去心木通各五錢生甘草甘草炙各二錢上銼分作十四帖水煎食後熱服下大補丸十五粒又方治脈虛氣鬱發熱芍藥酒炒一兩二錢半香附一兩蒼朮半兩沙參三錢甘草一錢半上為末炊餅丸服又方治手足心熱此方神妙梔子香附蒼朮白芷半夏川芎上為末神麯糊丸服治氣分熱方柴胡飲子解一切肌骨蒸熱發作寒熱往來蓄熱寒戰及傷寒發汗不解或中外諸邪熱口乾煩渴或下後熱未愈汗後勞復或骨蒸肺痿喘嗽婦人經病産後余疾並宜服之柴胡人參黃芩甘草大黃當歸芍藥各半兩上為末每服二錢水一盞生薑三片煎至七分溫服防風當歸飲子治脾胃真陰虛損心肝風熱鬱甚陽盛陰衰邪氣上逆上實下虛怯弱不耐或表熱而身熱惡寒或裡熱而燥熱煩渴或邪熱半在表半在裡進退出入不已而為寒熱往來無問自病及中燥熱毒藥所施者並宜宣通氣血調順飲食久服之舊病除去新病不生防風當歸白芍藥黃芩人參甘草大黃柴胡各一兩滑石六兩上㕮咀每服五錢水一盞半生薑三片煎七分溫服蔭按此方瀉心肝之陽補脾胃之陰而無辛香燥熱之藥真治風熱燥熱濕熱挾虛之良劑其功大於防風通聖散一云治煩熱皮膚索澤白虎湯治傷寒大汗出後表證已解心胸大煩渴欲飲水及吐或下後七八日邪毒不解結熱在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者宜服之知母七兩半甘草三兩七錢半石膏二十兩上㕮咀每服三錢水一盞半入粳米三十粒煎至一盞去渣溫服或加人參亦得此藥立夏後立秋前可服春時及立秋後亡血家並不可服治血分熱方桃仁承氣湯治結熱膀胱其人如狂熱在下焦與血相搏血下則熱隨出而愈芒硝甘草各二兩大黃三兩桂二兩去皮桃仁五十個去皮尖上五味用水七升煮至二升半去渣納芒硝再上火煮一二沸溫服五合日三服得微利止蔭按內經曰甘以緩之辛以散之小腹急結緩以桃仁之甘下焦蓄血散以桂枝之辛火熱之氣寒以取之熱甚搏血加二味於調胃承氣湯中也然有是證方可用之清涼四順飲子治一切丹毒積熱壅滯咽喉腫痛當歸赤芍藥大黃甘草各等分上㕮咀每服一錢水一盞半煎至七分去渣食後溫服治氣虛發熱方補中益氣湯治倦勞傷脾致元氣虛弱真陽下陷內虛生熱人參五分黃耆炙一錢甘草炙白朮當歸橘皮各五分升麻柴胡各三分或云加芍藥黃柏上㕮咀作一服水二盞煎至一盞去渣食遠溫服蔭按惟實火可瀉宜用芩連梔柏虛可補宜用人參黃耆白朮甘草所謂溫能除火熱也或者誤用芩連梔柏以治虛火則火益熾何以然哉四件皆降下之品降多則亡陰陰亡則不足以濟火故令火益熾用者慎之四君子湯治氣虛火盛無力身熱人參白朮茯苓甘草各等分上作一劑水煎溫服附子理中湯治大病及吐瀉後身熱如焚命門虛脫為陽衰之病宜以辛熱溫養其火則熱自退宜此方主之人參白朮乾薑煨甘草炙附子各等分上銼每服五六錢水煎服蔭按蓋壯火固不可有少火亦不可無所謂天非此火不足以生萬物人非此火不足以有生故凡諸證寒涼太過幾於無陽者則烏附之類宜審擇而用之昔人以附子一物為大陽為回陽丹以天雄附子川烏為三建湯以硫黃為金液丹皆所以養其真陽壯其真火而存此身之生氣耳治血虛發熱方當歸補血湯治肌熱燥熱困渴引飲目赤面紅晝夜不息其脈洪大而虛重按全無此血虛脈虛也血虛發熱證象白虎惟脈不長實為辨耳若誤用白虎湯必死醫者須慎察之黃耆一兩當歸酒洗二錢上㕮咀作一服水二盞煎至一盞去渣空心食前溫服治陰虛火動方滋陰降火湯治勞心好色大損真陰陰血既傷則陽氣偏勝而變為火是為陰虛火旺之證宜此治之黃柏鹽水炒知母炒生地黃洗白芍藥炒當歸元參麥冬去心各一錢甘草炙五分上水一鍾煎七分入童便半小盞服加味逍遙散治血虛火動午後潮熱當歸酒洗白芍藥酒洗白朮白茯苓柴胡各一錢甘草炙五分牡丹皮梔子炒各七分上銼一劑入薄荷少許水煎服六物湯治陰虛發熱當歸川芎芍藥生地黃知母酒炒黃柏炒上銼水煎服甚者加龜板兼氣虛加參耆白朮加白馬脛骨降陰火代芩連用加減四物湯治陰虛火動皆火起於九泉穴此補陰降火之妙劑當歸川芎白芍藥熟地黃生地黃黃柏黃芩上銼水煎服甚者加龜板兼氣虛加參朮黃耆一法用附子末津調塗湧泉穴正氣湯降陰火止盜汗黃柏知母各一錢半甘草五分上銼一劑水煎服坎離丸治陰火遺精盜汗潮熱咳嗽黃柏知母各等分上用童便九蒸九曬九露為末地黃煎膏為丸脾弱者山藥糊丸服四物坎離丸善烏鬚髮善治腸風熟地黃三兩生地黃一兩半與熟地同用酒浸搗膏當歸二兩酒炒芍藥一兩半酒炒黃柏二兩酒炒知母酒炒側柏葉炒槐子炒各一兩連翹六錢上為末煉蜜丸如桐子大用磁盤盛之以綿紙糊口涼地下放七日去火毒曬乾收之每服三四十丸至五六十丸白湯或酒下人中白散瀉陰火消瘀血用人中白以瓦煅過每服二錢溫水調服蔭按自古諸神良之醫但用人尿溺白垽耳未嘗有用秋石之方也近時多用之夫藥有氣有味有精有魄秋石既經煎煉則其氣味已易精華已去所存者獨枯魄耳惡能與人尿溺白垽論功效耶此舉世尚奇之昧也或用陰秋石者為近之枸杞酒治火證枸杞子五錢黃連炒五錢緑豆一錢上以絹袋盛之凡米五升造酒一鐏煮水袋窨久乃飲
