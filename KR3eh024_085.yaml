body:
  text: 卷八十五破傷風論虞氏曰經云風者百病之始也清淨則腠理閉拒雖有大風苛毒而弗能為害也若夫破傷風證因事擊破皮肉往往視為尋常殊不知風邪乘虛而客襲之漸而變為惡候又諸瘡久不合口風邪亦能內襲或用湯淋洗或用艾焚灸其湯火之毒氣亦與破傷風邪無異其為證也皆能傳播經絡燒消真氣是以寒熱間作甚則口噤目斜身體強直如角弓反張之狀死在旦夕誠可哀憫治之之法當同傷寒處治因其有在表在裡半表半裡三者之不同故不離乎汗下和三法也是故在表者汗之在裡者下之在表裡之間者宜和解之又不可過其法也閭閻野人多不識此證不早求治療而袖手待斃哀哉病機云破傷風者有因卒暴傷損風襲之間傳播經絡致使寒熱更作身體反強口噤不開甚者邪氣入臟則分汗下之治有因諸瘡不瘥榮衛俱虛肌肉不生瘡眼不合風邪亦能外入於瘡為破傷風之候故諸瘡不瘥舉世皆言著灸為上是為熱瘡而不知火熱客毒逐經諸變不可勝數微則發熱甚則生風而搐或角弓反張口噤目斜皆因瘡鬱結於榮衛不得宣通而生亦有破傷不灸而病此者瘡著白痂瘡口閉塞氣難通泄故陽熱易為鬱結而熱甚則生風也河間云破傷風風熱燥盛怫鬱在表而裡氣尚平者善伸數缺筋脈拘急或時惡寒或筋惕而搐脈浮數而弦宜以辛熱治風之藥開沖結滯而愈猶傷寒表熱怫鬱而以麻黃湯辛熱發散也凡用辛熱開衝風熱結滯宜以寒藥佐之則良免致藥中病而風熱轉甚也如治傷寒發熱用麻黃桂枝加黃芩石膏知母之類是也若只以甘草滑石蔥豉發散甚妙若表不已漸轉入里里未太甚而脈弦小者宜以退風熱開結滯之寒藥調之或微加治風辛熱藥亦得猶傷寒在半表半裡而以小柴胡和解之也若裡熱已甚而舌強口噤項背反張驚惕搐搦涎唾稠黏胸腹滿塞便溺祕結或時汗出脈沉洪數而弦然汗出者由風熱鬱甚於里而表熱稍罷則腠理疏泄而心火熱甚故汗出也法宜除風散結寒藥下之後以退風熱開結滯之寒藥調之則熱退結散而風自愈矣又曰風證善行數變入臟甚速死生在反掌之間急宜分表裡虛實而治之邪在表者則筋脈拘急或寒熱筋惕搐搦脈浮弦用羌活防風湯散之在半表半裡者則頭微汗身無汗用羌活湯和之傳入里者舌弦口噤項背反張筋惕搐搦痰涎壅盛胸腹滿悶便搦閉赤時或汗出脈洪數而弦以大芎黃湯導之既下而汗仍出表虛也以白朮防風湯補之不時灌以粥飲為善前云乃氣虛未損之法也若膿血太泄陽隨陰散氣血俱虛而類前證者悉宜大補脾胃切忌祛風之藥病機云破傷風者同傷寒證治分別陰陽有在表有在裡有在半表半裡在表宜汗在裡宜下在表裡之間宜和解不可過其治也故表脈浮而無力者太陽也里脈長而有力者陽明也脈浮而弦小者少陽也若明此三法而施治不中病者鮮矣劉宗厚曰破傷風證古方藥論甚少豈非以此疾與中風同論故不另立條目也惟河間論傷寒表裡中三法同治用藥甚詳諸書言病因有因外傷於風有因灸及內熱所作者然與中風相似也但中風之人尚可淹延歲月而破傷風者犯之多致不救蓋中風有在經在腑在臟之異獨入臟者最難治破傷風或始自出血過多或瘡口早閉瘀血停滯俱是血受病血屬陰五臟之所主故此風所傷始雖在表隨即必傳入臟故多死也又此病或瘡口坦露不避風寒而無所傷或瘡口閉合密避風邪而反病此或病十分安全而忽有此大抵皆因氣虛而有鬱熱者得之若內氣壯實而無鬱熱者雖傷而無害也審之蔭按丹溪曰破傷風同傷寒壞證治看在何經而用本經藥驅逐也誤則殺人劉河間有法有方宜選而用之虞氏曰河間論破傷風脈證詳明甚矣何其但云三陽而不及於三陰蓋風邪在於三陽之經便宜按法早治而愈若待傳入三陰其證已危或腹滿自利口燥咽乾舌卷囊縮皆無可生之理故置而弗論也又葉氏曰破傷濕者有破傷處因澡浴濕氣從瘡口中入其人昏迷沉重口噤強直宜除濕湯白朮酒或用牡蠣為末敷瘡口仍以末二錢煎甘草湯調下亦可李氏曰破傷證似中風有四因不因氣動者二卒暴損破風襲或諸瘡湯洗艾灸逼毒妄行有因氣動者二瘡口不合貼膏留孔風襲或熱鬱遍身白痂瘡口閉塞氣難通泄傳播經絡燒爍真氣是寒熱間作甚則發痙口喎噤角弓反張須臾欲死用蠍梢餅或二生飲加天麻為末每一錢用黑豆淋酒調服化痰開關風盛者二烏丸風痰俱盛者古星風散風痰虛者烏蛇散血凝心神昏悶者單鵝翎燒灰存性酒調服一錢服後飲酒一二盞以助藥勢如血多痛甚者如聖散手足戰掉者硃砂指甲散蠐螬酒如頭目青黑額汗下流眼小目瞪身汗如油者四逆不治治同傷寒表裡法風熱燥甚怫鬱在表善伸數缺筋脈拘急或時惡寒或筋惕搐搦宜辛熱治風佐以辛寒如傷寒麻桂加黃芩石膏知母是也若表不已漸傳入里在肌肉者宜退風熱開結滯辛寒之藥或佐以辛熱調之猶傷寒半表裡而用小柴胡也若裡熱已甚而舌強口噤項背反張驚惕搐搦涎唾稠黏胸腹滿塞便溺祕結或時汗出宜祛風散結寒藥下之後復以清熱開結之藥調之又云破傷風同傷寒壞證治看在何經而用本經藥祛之太陽表證宜汗古防風湯去甘草加川芎獨活等分水煎服或調蜈蚣散或九味羌活湯少用細辛加歸芍等分水煎服便祕加大黃緩緩通之或用古龍虎丹發汗亦妙少陽半表裡證宜和羌麻湯陽明裡證宜下若服表藥過多臟腑和而自汗者白朮防風湯大汗不止搐搦者升麻葛根湯加白朮黃芩如臟腑閉小便赤自汗者先用小芎黃湯二三服後用大芎黃湯速下之或江鰾丸氣弱者只用蜜導法或始而出血過多或瘡口早合瘀血停滯俱是血分受病血屬陰五臟所主始雖在表隨即入里故多死也宜養血當歸地黃湯活神丹托裡散內托十宣散以防毒陷外用魚膠散或用鼠頭骨為末豬脂調敷亦治狗咬人有破傷水濕口噤強直者用牡蠣為末敷之仍以甘草煎湯調服二錢或病已十分安全而忽有口噤反張筋搐痰壅似破傷風證又似痙證其實乃氣血俱虛也凡癰疽潰後膿血大泄陽隨陰散變證只宜大補氣血果系風痙亦不宜以風藥治之血虛者補中益氣湯去升柴陳皮加酒炒黑黃柏五味子麥門冬肉桂大劑服之氣血俱虛汗多作渴寒熱者十全大補湯加桂附麥門冬五味子厄逆者托裡溫中湯若妄投風藥者死脈法表脈浮而無力太陽也脈長有力陽明也脈浮而弦小者少陽也治破傷風邪傳表裡方羌活防風湯治破傷風邪初傳在表急服此藥以解之羌活防風川芎藁本當歸芍藥各一錢甘草地榆細辛各五分上銼一服水煎服熱加黃芩五分大便祕加大黃五分甚者一錢防風湯治破傷風同傷寒表證未傳入里宜急服此藥防風羌活獨活川芎各等分上㕮咀每服五七錢水煎服後宜調蜈蚣散大效蜈蚣散治破傷風搐搦角弓反張蜈蚣一雙江鰾五錢無江鰾以全蠍代之上為細末每服一錢用防風湯調下外用擦牙或吹鼻亦可加左蟠龍五錢炒煙盡名大蜈蚣散一云左蟠龍即野鴿糞如前藥解表不已覺轉入里當服左龍丸漸漸看大便硬軟加巴豆霜服之瓜石湯治破傷風發熱瓜蔞仁九錢滑石一錢半南星蒼朮赤芍藥陳皮各一錢黃連黃柏炒黃芩白芷各五分甘草二分上銼加生薑一片水煎服小芎黃湯治破傷風表熱川芎五錢黃芩三錢甘草一錢上㕮咀水煎服大羌活湯一名羌麻湯治破傷風半表半裡無汗羌活麻黃菊花川芎石膏防風前胡黃芩細辛枳殼茯苓蔓荊子甘草各五分白芷薄荷各二分半上㕮咀作一服加生薑五片水煎食後通口服渣再煎服加味小柴胡湯治邪在半表半裡柴胡二錢黃芩人參半夏防風川芎羌活各一錢甘草五分上銼加生薑三片水煎熱服胸痞加枳殼一錢地榆防風散一名榆丁散治破傷風中風半在表半在裡頭微汗身無汗不可發汗者宜此治之地榆防風紫花地丁馬齒莧等分上為細末每服三錢溫米飲調下大芎黃湯治破傷風邪傳在裡二便祕赤自汗不止川芎一錢羌活黃芩大黃各二錢上切作一服水煎溫服以利為度江鰾丸治破傷風驚而發搐臟腑祕澀知邪在裡宜以此藥下之江鰾炒野鴿糞炒白殭蠶炒各五錢雄黃天麻各一兩蜈蚣一對上為細末分作三分用二分以燒飯為丸如桐子大硃砂為衣用一分入巴豆霜一錢同和亦以燒飯為丸如桐子大不用硃砂為衣每服朱衣丸二十丸入巴豆霜丸一丸第二服二丸加至利為度再單服硃砂衣丸子病愈止藥左龍丸治直視在裡者左蟠龍炒即野鴿糞白殭蠶炒江鰾炒各五錢雄黃一錢上為細末燒飯丸如桐子大每服十五丸酒下如里證不已當於左龍丸內一半末入巴豆霜半錢燒飯丸桐子大同左龍丸一處每服加一丸漸加至利為度若利後更服後藥若搐痙不已亦宜服後小羌活湯小羌活湯羌活獨活防風地榆各一錢半上㕮咀作一服水煎溫服有熱加黃芩有痰加半夏白朮防風湯治服發表藥過多自汗者白朮黃耆各二錢防風三錢上㕮咀水煎服白朮湯治破傷風大汗不止筋攣搐搦白朮葛根各二錢升麻黃芩各一錢芍藥三錢甘草五分上㕮咀作一服水煎溫服養血當歸地黃湯治破傷風病久氣血漸虛邪氣入胃發熱頭痛宜此養血榮筋當歸川芎生地酒炒芍藥藁本防風白芷各一錢細辛五分上銼水煎服白朮酒治破傷濕白朮一兩酒三盞煎至一盞頻服不飲酒人以水代之如聖散治破傷風止血定疼蒼朮六兩川烏頭炮去皮臍兩頭尖炮去皮各四兩草烏頭炮去皮防風細辛各二兩半天麻川芎白芷各一兩半蠍梢雄黃各半兩上為細末每服一錢酒調下不拘時服烏麻散南星半夏川烏草烏天麻硃砂雄黃各等分上為細末每服一錢避風處熱酒調下仍進熱酒取汗為度退風散治破傷風不省人事角弓反張防風天麻酒洗白芷麻黃茯苓當歸各一錢薄荷七分荊芥殭蠶炒炙甘草五分上銼一劑加生薑七片煎服玉真散一名定風散一名星風散治破傷風及金刃傷打撲傷損天南星防風各等分上為末如破傷風以藥敷貼瘡口然後以溫酒調一錢服如牙關緊急角弓反張用藥二錢童便調下或因打傷欲死但心頭微溫以童便灌下二錢並進二服或顛狗咬破先口噙醬水洗淨撒之更不作膿大效蓋南星為防風所制服之不麻發表雄黃散雄黃草烏各一錢防風二錢上為細末每服一字溫酒調下里和自愈可服里未和不可服雄黃散治表藥南星三錢半夏天麻各五錢雄黃二錢半上為細末每服一錢溫酒調下如有涎於此藥中加大黃為下藥全蠍散凡患破傷風證非此不除蠍梢七個上為末熱酒調服奪命丸一名二烏丸治破傷風角弓反張牙關緊急天麻白芷川烏各二錢草烏雄黃各一錢上為末酒糊丸如桐子大每服十丸溫酒送下烏蛇散治破傷風及洗頭風烏梢蛇酒浸去骨六錢麻黃一兩草烏乾薑附子炮川芎白附子天麻各五錢蠍梢二錢半上為末每服一錢熱酒調下日三服重者三五日見效川烏散治破傷風欲死者川烏天麻南星薑湯泡半夏薑湯泡各等分上為細末每服一錢黑豆淋酒調下仍飲酒一二盞硃砂指甲散治破傷風手足顫掉不已人手足指甲燒絶煙六錢硃砂南星獨活各二錢上為末分作三服熱酒調下一字散治破傷風金頭蜈蚣一條去頭足炙天麻草烏各半兩全蠍十個白芷少許上為末每服一字發熱茶湯下發寒溫酒或半夏茯苓湯下天麻丸治破傷風神效天麻川烏生去皮各三錢草烏生雄黃各一錢上為末酒糊丸如桐子大每服十丸溫酒下保命丹治破傷風辰砂麝香川烏去皮尖大半夏生各一錢藜蘆三錢雄黃半兩上為末棗肉丸如雞頭大每一丸細嚼溫酒下若牙關急斡開灌下吐涎為效如吐不止生蔥湯止之不吐涎用半丸大效魚膠散治破傷風口噤強直魚膠燒存性麝香少許上為末每服二錢熱酒米飲下亦可溶化外敷蠐螬酒破傷初覺有風時急取熱糞堆內蠐螬一二個用手捏住待蟲口中吐些小水就抹在破傷處如緊急只煎去尾將腹中黃水塗瘡口再滴些小入熱酒內飲之身穿厚衣片時瘡口覺麻兩脅微汗風出立瘥虎咬亦宜水調膏治初破傷風發熱紅腫風邪將欲傳播經絡而未入深者屢驗杏仁去皮細研飛白麵各等分上和勻用新汲水調和如膏敷傷處一方治破傷風發熱用蟬蛻略炒研細酒調一錢匕服效灸法治破傷風及風火傷神效用核桃殼半個填稠人糞滿仍用槐白皮襯扣傷處用艾灸之若遍身汗出其人大困則愈遠年者將傷處前灸之亦已一方治打撲傷損腫痛傷風者天南星半夏地龍各等分上為末用生薑薄荷汁調擦患處蔭按此證由破傷皮肉風邪襲入經絡初起先發寒熱牙關噤急甚則身如角弓反張口吐涎沫四肢抽搐不省人事傷口鏽澀然傷風有四因有動受靜受驚受瘡潰後受皆可傷風動受者怒氣上衝皮肉觸破風入在表因氣血鼓旺不致深入屬輕靜受者起作和平氣不充鼓風邪易於入里屬重驚受者驚則氣陷風邪隨氣直陷入陰多致不救屬逆若風邪傳入陰經者則身涼自汗傷處反覺平塌陷縮甚則神昏不語嘬口舌短其證貴乎早治當分風邪在表在裡或半表半裡依經云汗下和三法施治可也歌曰皮肉損破外傷風初覺牙關噤不松甚則角弓反張狀吐涎抽搐不時寧四因動靜驚潰審陷縮神昏不語凶在表宜汗里宜下半表半裡以和平
