body:
  text: 卷二十七郁證論虞氏曰內經云木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之張子和曰木鬱達之謂吐之令其條達也火鬱發之謂汗之令其疏散也土鬱奪之謂下之令無壅礙也金鬱泄之謂滲泄解表利小便也水鬱折之謂抑之制其沖逆也此治五郁之大要耳至丹溪先生觸類長之而又著為六郁之證所謂氣和血和百病不生一有怫鬱諸病生焉此發前人之所未發者也夫所謂六郁者氣濕熱痰血食六者是也或七情之抑遏或寒熱之交侵故為九氣怫鬱之候或雨濕之侵凌或酒漿之積聚故為留飲濕鬱之疾又如熱鬱而成痰痰鬱而成癖血鬱而成症食鬱而成痞滿此必然之理也又氣鬱而濕滯濕滯而成熱熱鬱而成痰痰滯而血不行血滯而食不消化此六者皆相因而病者也是以治法皆當順氣為先消積次之故藥中多用香附撫芎之類至理存焉學者宜知此意丹溪曰氣血沖和百病不生一有怫鬱百病生焉其證有六曰氣曰濕曰熱曰痰曰血曰食蒼朮撫芎總解諸郁隨證加入諸藥氣鬱加香附濕鬱加白芷川芎茯苓熱鬱加山梔子青黛香附痰鬱加海石香附南星瓜蔞仁血鬱加桃仁紅花青黛川芎香附食鬱用香附蒼朮山楂神麯針砂諸郁藥春加防風夏加苦參秋冬加吳茱萸凡郁在中焦以蒼朮撫芎開提其氣以升之假令食在氣上氣升則食自降矣余皆仿此火鬱發之當看何經一女許婚後夫經商二年不歸因不食困臥如癡無他病多向床里坐此思想氣結也藥雖能治得喜可解不然令其怒脾主思過思則脾氣結而不食怒屬肝肝木能克脾土怒則木氣升發而衝開脾氣矣豫自往激之大怒而哭至三時許令父母解之與藥一帖即求食矣豫曰病雖愈必得喜方已乃詒以夫回既而果然病不舉戴氏曰郁者結聚而不得發越也當升者不得升當降者不得降當變化者不得變化也此為傳化失常六郁之病見矣氣鬱者胸脅痛脈沉澀濕鬱者周身走痛或關節痛遇陰寒則發脈沉細痰鬱者動則喘寸口脈沉滑熱鬱者瞀悶小便赤脈沉數血鬱者四肢無力能食便紅脈沉食鬱者噯酸腹滿不能食人迎脈平和氣口脈緊盛者是也王節齋曰丹溪先生治病不出乎氣血痰三者故用藥之要有三氣用四君子湯血用四物湯痰用二陳湯又云久病屬郁立治郁之方曰越鞠丸蓋氣血痰三病多有兼郁者或郁久而生病或病久而生郁或誤藥雜亂而成郁故豫每用此三方治病時以郁法參之氣病兼郁則以四君子加開鬱藥血痰病皆然故四法者治病用藥之大要也李氏曰郁者病結聚不散也六郁氣血痰食濕熱然氣鬱則生濕濕積則生熱熱鬱則成痰痰鬱則血不行血鬱則食不消而成症痞六者皆相因為病以致當升降不得升降當變化不得變化故法以順氣為先降火化痰消積分多少治與諸氣大同凡病當先尋六郁與痰火有則急治於此無則依雜證治郁本病久不解因服藥雜亂而成又有郁久而生病者俱宜升提如郁在中焦以蒼朮川芎開提其氣以升之如食在氣上提其氣則食亦自消痰鬱火邪在下二便不利者二陳湯加升麻柴胡川芎防風以升發之熱鬱升陽散火湯火鬱火鬱湯主之當看發在何經加各經火藥丹溪治病氣用四君子湯血用四物湯痰用二陳湯時以六郁湯料參之此雜病治法總要也氣鬱胸滿脅痛脈沉澀加木香檳榔烏藥蒼朮川芎倍香附砂仁痰鬱胸滿動則喘急起臥怠惰寸脈沉滑加南星香附瓜蔞仁海石血鬱四肢無力能食小便淋大便紅脈沉芤澀加桃仁韭汁牡丹皮食鬱噯酸惡食黃疸鼓脹痞塊氣口緊盛二陳湯加山楂神麯麥芽傷冷食胃脘痛加草蔻乾薑濕鬱周身關節走痛首如物蒙足重亦然遇陰寒便發脈沉濡加白朮倍蒼朮熱鬱目蒙口乾舌燥小便淋濁脈沉數加黃連倍山梔連翹六郁不言風寒者風寒鬱則為熱故也但諸郁挾風加防風苦參挾寒加吳茱萸香附紫蘇先順後逆雖不中邪病從內生令人飲食無味神倦肌瘦名曰脫營內服交感丹用香鹽散臨臥擦牙有鬱結在脾半年不食或午後發熱酉戌時退或煩悶作渴加嘔或困臥如癡向里坐亦喜向暗處婦人經水極少男子小便點滴皆憂思氣結治宜溫膽湯或二陳湯加參朮紅花痰火甚者以痰藥吐之下之後用越鞠丸調理平人上納下化水穀滋沛身中陰氣自生如失名利之士有志恢圖過於勞倦形氣衰少穀氣不盛上焦不行下脘不通而胃熱熱熏胸中則內熱宜養陰降火三白湯加陳皮蒼朮川芎山梔香附枳殼甘草煎熟入薑汁少許熱服以散其鬱加當歸黃柏沙參或元參以養其陰痰加貝母夏加麥門冬冬加補骨脂蓋當歸隨參補血白芍隨二術除郁因食冷物郁遏陽氣於脾土中多因血虛而得之故用炒黑山梔解五臟結益少陰血若不早治復恣酒色勞瘵之由也可不慎哉蔭按葉氏曰六郁為病不可太拘如木鬱達之達者通暢之謂或升發或輕散或宣越皆達之之法不可以吐為達也火鬱發之發者升散之謂或汗解或升舉或從治皆發之之法不可以汗為發也土鬱奪之奪者攘取之謂或攻下或劫而衰之皆奪之之法不可以下為奪也金鬱泄之泄者露去之謂或滲泄利小便或疏通其氣皆泄之之法不可以利為泄也水鬱折之折者曲激之謂或制御或伐挫或漸殺其勢皆折之之法不可以抑為折也然須審其人之虛實病之久近淺深切不可混雜施治若邪氣既去正氣必虛又當調平以復其常如此方盡治郁之妙脈法脈多沉伏氣鬱則脈必沉而澀濕鬱則脈必沉而緩熱鬱則脈必沉而數痰鬱脈必弦滑血鬱脈必芤而結促食鬱脈必滑而緊盛郁在上則見於寸郁在中則見於關郁在下則見於尺左右亦然郁脈或促或結或代滑氏診家樞要曰氣血食積痰飲一有留滯於其間則脈必因之而止節矣但當求其有神何害之有夫所謂有神者即經所謂有中氣也治方越鞠丸解諸郁蒼朮撫芎香附童便浸一宿神麯炒梔子炒各等分上為細末水丸緑豆大每服五七十丸溫水下一方本方各四兩外加陳皮白朮山楂各二兩黃芩酒炒一兩半名加味越鞠丸六郁湯解諸郁陳皮去白半夏湯泡七次蒼朮米泔浸撫芎各一錢赤茯苓梔子炒各七分香附二錢甘草炙砂仁研細各五分上細切作一服加生薑三片水二盞煎至一盞溫服如氣鬱加烏藥木香檳榔紫蘇乾薑倍香附砂仁如濕鬱加白朮倍蒼朮如熱鬱加黃連倍梔子如痰鬱加南星枳殼小皂莢如血鬱加桃仁紅花牡丹皮如食鬱加山楂神麯麥芽面開鬱湯治惱怒思慮氣滯而鬱一服即效香附子童便浸貝母各一錢半蒼朮撫芎山梔神麯炒陳皮去白茯苓枳殼去穰麩炒蘇梗各一錢甘草三分上銼一劑生薑三片水煎食遠服氣加木香檳榔濕加白朮羌活熱加黃芩黃連柴胡痰加半夏南星血加桃仁紅花食積加神麯山楂砂仁升發二陳湯治痰鬱火邪在下焦大小便不利此藥能使大便潤而小便長陳皮去白一錢半夏一錢半茯苓一錢甘草五分撫芎一錢升麻防風柴胡各五分上細切作一服加生薑三片水煎溫服木香檳榔丸治濕熱食積諸郁壯實人宜用木香檳榔陳皮青皮蓬朮煨黃連枳殼麩炒黃柏大黃各三兩香附炒牽牛頭末各四兩上為末水丸桐子大每服百丸空心白湯下交感丹治一切名利失意抑鬱煩惱七情所傷不思飲食面黃形羸胸膈諸證極有神效香附米二斤用瓦器炒金黃色取淨末一斤茯神去皮木為末四兩上為末煉蜜丸如彈子大每服一丸空心細嚼白滾湯或降氣湯下
