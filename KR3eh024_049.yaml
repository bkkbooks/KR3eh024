body:
  text: 卷四十九青筋論論曰青筋之證原氣逆而血不行俾惡血上攻於心也多由一切怒氣相沖或鬱氣結不散或惱怒復傷生冷或房勞後受寒濕以致精神恍惚心慌氣喘噎塞上壅嘔噦噁心頭目昏眩胸膈痞滿心腹刺痛脅肋腰背頭腦疼痛口苦舌乾面青唇黑四肢沉困百節痠疼或增寒壯熱遍身麻木不仁手足厥冷顫掉默默不語不思飲食等證皆惡血攻心而致之也自古以來無人論此但有患此疾者無方可治惟以砭針於兩手曲池青筋上刺之出瘀血不勝其數而疾有即愈者有不愈者有變為大患者常慣病此者或有一月一次或兩三次者屢患屢刺莫之能愈不知人之生命以氣血為主故丹溪曰氣血和一疾不生虧則百病生焉況此病先傷於氣而後復損其血不至夭枉者蓋亦鮮矣雖然未有退血之法又不得不刺不刺則惡血攻心須臾不救矣蔭按青筋之證北人多患之南人有此即痧證也治方白虎丸此藥能順氣散血化痰消滯治青筋初覺頭疼噁心或腹痛或腰痛或遍身作痛不思飲食即進一服當時血散若過三五日青筋已老者多服取效名白虎者西方肺金之謂也青筋者東方肝木之謂也以白虎而治青筋是金能剋木故耳何病之不愈哉此方之妙不惟代刺青筋之苦愈青筋之病而亦免後日之患其惠大矣又兼治男子久患痢疾便血婦人崩漏帶下並一切打撲內損血不能散心腹痛欲死者服之甚效不啻桴鼓之影響也千年石灰不拘多少上刮去雜色泥土為末水飛過曬乾量可丸如梧桐子大每服五十丸看輕重加減燒酒送下斷砂散治青筋甘草乾薑川烏炮枯礬炒鹽各等分上為末每服二錢白湯調下太公丸治緊陰青筋心腹疼痛乾薑二兩白礬枯過一兩上為末用糯米糊為丸如緑豆大每服三十丸滾水下如不止再飲滾水三口失笑散治男婦慣打青筋五靈脂蒲黃各一錢半上為末黃酒調下永不再犯灸斷青筋法於打青筋出血眼上用新黑驢糞些須塗破眼上艾灸三壯永不發
