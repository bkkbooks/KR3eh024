body:
  text: 卷五十六遺精論林誠中曰五臟皆有精精者人之本然腎為藏精之都會聽命於心能遣欲澄心精氣內守陰平陽祕真元固密矣或縱欲勞神則心腎不交關鍵不固更兼少壯人情動於中意淫於外欲心熾而不遂必有遺精便濁之患也腎氣不固遺瀝不收初便下白或如粉漿或如雞子清或滑如油或甜如蜜或冷如冰面色慘白此漏脫也若手足稍冰冷口淡無味腰疼重如石腳弱氣短疲倦乏力急宜滋補之使水火既濟陰陽協和然後火不上炎而神自清水不下滲而精自固矣又當節欲三五年庶無復作之患可以苟全性命也丹溪云夢遺專主熱精滑主濕熱熱則流通故也大法用青黛海石黃柏精滑用知母黃柏降火牡蠣蛤粉燥濕與白濁同治法內傷氣血虛不能固守常服八珍湯加減吞樗木根丸思想而得其病在心當治心安神帶補戴氏曰遺精得之有四有用心過度心不攝腎以致失精者有因思色不遂精氣失位輸瀉而出者有欲太過滑泄不禁者有年壯氣盛久無色欲精滿泄者然其狀不一或小便後出多不可禁者或不小便而自出者或莖中出而痛癢常欲如小便者並宜先用辰砂妙香散吞玉華白丹佐以分清飲用心過度而得宜遠志丸用蓮肉五味子煎湯下思想不遂而得甚者耳目見聞其精自出名曰白淫宜清心丸妙香散色欲過度而得宜金鎖固精丹固本鎖精丸遺瀝比之遺精稍少小便有數點稠黏莖頭微痛或小便已停片時方有一二滴沾褌其病不出前所因審用前藥夢遺者宜溫膽湯加人參遠志蓮肉酸棗仁茯神又曰因夢交而出精者謂之夢遺不因夢而自泄精者謂之精滑皆相火所動久則有虛而無寒蔭按王節齊曰夢遺精滑世人多作腎虛治而用補腎澀精之藥不效殊不知此證多屬脾胃飲酒厚味痰火濕熱之人多有之蓋腎藏精精之所生由脾胃飲食化生而輸歸於腎今脾胃傷於濃厚濕熱內郁中氣濁而不清則其所化生之精亦得濁氣腎主祕藏陰靜則安今所輸之精既有濁氣則邪火動於腎中而水不得安靜故遺而滑也此證與白濁同丹溪論白濁為胃中濁氣下流滲入膀胱而云無人知此也其有色心太重妄想過用而致遺滑者曰從心腎治但兼脾胃者多當審察李氏曰交感之精雖常有一點白膜裹藏於腎而曰元精以為此精之本者實在乎心日有所思夜夢而失之矣治宜黃連清心飲或十味溫膽湯妙香散定志丸人身之精貴於金寶初因君火不安久則相火擅權精元一走而不固甚則夜失連連日亦滑溜不已宜坎離丸有火盛精中多有紅絲令溺於桶澄視之便見後生子一歲身生紅絲瘤不救宜補陰丸腎氣丸氣宜降精宜升欲心一動精隨念去凝滯久則莖中癢痛常如欲小便然或從小便而出或不從便出而自流者謂之遺精比之夢遺猶甚宜萆薢分清飲或八物湯真蛤粉丸日久水虧火燥有虛無寒滋陰降火湯君火失權而相火乘脾濕與熱合脾土全是死陰少運飲食易於侵犯宜樗柏丸脾虛弱者三灰樗柏湯豬肚丸如原非心腎不交果因飲酒厚味乃濕熱內郁中氣不清所化之精亦皆濁氣歸於腎中而水不安靜故遺而滑也宜補陰藥中加人參升麻柴胡以升胃中清氣更宜節飲食以固命根也噫精字從米從青生於穀之清氣也養生者味之四十以後勞傷氣血不能固守者養榮湯加減吞單樗皮丸或小菟絲子丸如早年欲過至年高陽脫者究源心腎丸青娥丸黑錫丹縮泉丸金鎖正元丹氣陷者神芎湯有曰年壯久不御女精滿而溢者深為可笑人之臟腑惟氣與血神則主宰其中而無形跡可見精乃一時交感二焦之火吸撮而成豈先有蓄積於中耶惟節色氣血積盛而精不清薄理也其不御女而漏者或聞淫事或見美色或思想無窮所願不得或曾入房太甚宗筋弛縱發為筋痿而精自出者謂之白淫蓋腎藏天一以慳為事志意內治則精全而固去思外淫居室太甚宜乎滲漏而不振也單黃柏丸最妙亦有清心靜坐養精神者但好色種子猶在不免有時發露或被盲人指示房中補益之說以為可以止精不漏然對景忘情實際不復戀乎猥褻之事矣故曰學仙不斷淫蒸砂飯不成養生者慎之通用單五味子膏金櫻膏水陸二仙丹金鎖思仙丹芡實丸秋石固真丸固精丸單韭子散威喜丸石蓮散金櫻丸脈法兩尺脈洪數必便濁失精心脈短小因心虛所致必遺精便濁脈訣舉要曰遺精白濁當驗於尺結芤動緊二證之的治心腎不交遺精方辰砂妙香散治心虛遺精白濁人參五錢山藥二兩薑汁炒黃耆遠志去心炒茯苓各一兩茯神去木一兩木香二錢半煨麝香一錢另研枯梗甘草辰砂另研各二錢上為細末每服二錢溫酒調服茯神湯治欲心太熾思想太過夢泄不禁或夜臥不安心虛跳動者茯神去木皮一錢半遠志去心酸棗仁炒各一錢二分人參白茯苓石菖蒲當歸酒洗各一錢生地黃各八分黃連八分甘草四分連肉七枚去心上作一服水煎服黃連清心飲治心有所慕而夢遺者此君火既動而相火隨之治在心黃連生地酒炒當歸甘草酸棗仁去油茯神人參石蓮肉遠志上銼水煎服以下熟地砂仁炒生地姜酒炒酸棗仁柏子仁俱去油十味溫膽湯治夢遺驚惕陳皮半夏枳實各九分人參白茯苓各五分熟地黃遠志酸棗仁去油甘草各三分五味子九個上作一服加生薑三片水煎服葉氏定心湯治心氣不足榮血衰少精神恍惚夢中失精人參白茯苓黃耆蜜炙茯神去木各三兩赤石脂研厚朴薑製川芎白朮各二兩甘草炙防風紫菀茸各一兩官桂半兩麥冬去心一兩半上㕮咀每服三錢加赤小豆七十粒水煎食後服遠志丸茯神去木皮人參白茯苓龍齒煅各一兩遠志去骨石菖蒲各二兩上為末煉蜜丸如桐子大以辰砂為衣每服七十丸空心鹽湯下清心丸治思想不遂白淫自出黃柏一兩為衣生腦一錢另研上和勻煉蜜為丸如桐子大每服十丸至十五丸空心濃煎麥冬湯送下定志丸治妄想太過遺精人參白朮茯苓枳實麩炒石蓮肉去心陳皮韭子炒各一兩酸棗仁去油半夏牡蠣煨三錢遠志去骨各五錢甘草炙一錢半上為末神麯糊為丸如桐子大每服五十丸空心鹽湯下久則加乾薑炒黑三錢樗根白皮一錢固精丸治心神不安腎虛精自泄黃柏酒炒知母酒炒各一兩牡蠣煨芡實蓮蕊茯苓遠志去心山茱萸各三錢上為末煮山藥糊為丸如桐子大硃砂為衣每服五十丸空心鹽湯下一方有龍骨二錢秋石固真丸治思慮色欲過度損傷心氣遺精盜汗小便頻數白茯苓去皮秋石各四兩石蓮肉去殼皮炒芡實各二兩上為末棗肉為丸如桐子大每服三十丸鹽湯溫酒任下芡實丸治思慮傷心疲勞傷腎心腎不交精元不固面少顏色驚悸健忘夢寐不安小便赤澀遺精白濁足脛痠疼耳聾目暗口乾腳弱芡實蒸去殼蓮花須各二兩茯神山茱萸去核五味子龍骨生用枸杞子熟地黃酒蒸韭子炒肉蓯蓉酒浸紫石英煅七次牛膝酒浸各一兩上為末酒煮山藥糊丸如桐子大每服七十丸空心鹽湯下治元陽不固遺精方九龍丹治精滑枸杞子金櫻子山楂肉石蓮肉蓮花須熟地黃白茯苓芡實當歸各等分上為末酒糊丸如桐子大每服五十丸或酒或鹽湯送下如精滑便濁者服二三日內溺清如水飲食倍常行步輕健枸杞湯治腎虛精滑如神枸杞子肉蓯蓉茯苓各一錢五味子人參山梔仁熟地黃石蓮肉黃耆甘草炙各五分上作一服加生薑一片燈心草一握水煎空心溫服神芎湯治遺精經久腎氣下陷玉門不閉不時泄精宜以此補之引腎水歸元升麻川芎人參當歸遠志枸杞子黃耆白朮杜仲甘草地骨皮破故紙各四兩上銼作一服加生薑一片蓮肉七枚水煎溫服如無蓮肉用蓮花須亦可辰砂既濟丸治夢遺人參當歸酒洗黃耆鹽水洗炒山藥牡蠣酒浸一宿煅鎖陽甘枸杞蜜拌敗龜板酒浸一夕炙各二兩熟地黃酒洗四兩知母酒洗略炒牛膝酒洗各一兩半破故紙一兩二錢黃柏酒炒六錢上為細末用白朮八兩水八碗煎至一半取柤再用水煎漉淨合煎至二碗為膏和丸如桐子大辰砂為衣每服七十丸空心淡鹽湯或酒下服後以乾物壓之金鎖固精丹治夢遺精滑及交感不久者服甚妙蓮花蕊芡實沙苑蒺藜各二兩龍骨煅一兩上為末用蓮肉作粉打糊丸如桐子大每服七八十丸空心淡鹽湯下不禁加牡蠣煅一兩金鎖正元丹治真氣不足元臟虛弱飲食減少恍惚多忘氣促喘乏夜多異夢心怔盜汗小便滑數遺精白濁一切元臟虛冷之病並皆治之五味子茯苓各八兩紫巴戟去心肉蓯蓉洗焙乾胡蘆巴炒各一斤補骨脂酒炒十兩硃砂另研龍骨各三兩上為細末酒糊為丸如桐子大每服十五丸至二十丸空心溫酒鹽湯任下固本鎖精丸治元陽虛憊精氣不固夢寐遺精夜多盜汗及遺泄不禁等證此藥大補元氣澀精固陽纍有神效山藥枸杞子知母酒炒黃柏酒炒北五味山茱萸去核鎖陽各二兩人參石蓮肉黃耆海蛤粉各二兩半上為細末用白朮六兩碎切用水五碗煎至二碗將術搗爛再用水五碗去柤與前汁同熬至一碗如膏搜和前藥為丸如桐子大每服六七十丸空心溫酒或鹽湯下玉鎖丹治精氣虛滑遺泄不禁龍骨蓮花蕊雞頭實烏梅肉各等分上為末用熟山藥去皮為膏丸如小豆大每服三十丸空心米飲下小菟絲子丸治腎氣虛損目眩耳鳴四肢倦怠夜夢遺精菟絲子酒煮焙五兩石蓮肉二兩白茯苓山藥各一兩將半分打糊上為末用山藥糊為丸如桐子大每服五十丸空心溫酒鹽湯任下如腳膝無力木瓜湯下補真玉露丸治陽虛陰盛精脫淫濼脛酸白茯苓白龍骨水飛韭子酒浸炒菟絲子酒浸各等分上用火日修合為末煉蜜丸如桐子大每服五十丸溫酒鹽湯任下空心食前服少時以美膳壓之梅師方用龍骨四分韭子五合為散空心酒調服方寸匕治失精暫睡即泄聖惠方止用韭子微炒為散食前酒下二錢匕治夢中泄精外臺方用新韭子二升十月霜後枯者好酒八合浸一宿明日日色好令童子向南搗一萬杵平旦溫酒服方寸匕治虛勞尿精再服立瘥此龍骨韭子治泄精要藥也固真丹晚蠶蛾二兩肉蓯蓉白茯苓益智各一兩上用鹿角膠酒浸化開丸如桐子大每服三粒空心溫酒下乾物壓之祕真丸治思想無窮所願不遂意淫於外入房太甚宗筋弛縱發為筋痿及為白淫隨溲而下或精氣不固夢與陰人通泄龍骨另研硃砂另研各一兩一分為衣訶子皮大者五個縮砂去殼五錢上為細末麵糊丸如緑豆大每服十五丸漸加至二三十丸空心溫酒送下熟水亦得不可多服太祕水陸二仙丹治遺精白濁夢泄脫精等證芡實二斤為末金櫻子一斗取黃熟者藍盛水中去刺石臼中杵碎去核搗取自然汁熬成膏上和為丸如桐子大每服五七十丸空心姜鹽湯下金櫻丸治精滑夢遺及小便後遺瀝金櫻子雞頭實各一兩白蓮蕊龍骨煅各半兩上為末糊丸桐子大每服七八十丸空心鹽酒下玉華白丹白石脂淨瓦閣起火煅紅研細水飛左顧牡蠣用韭菜搗鹽泥固濟火煅取白者各五錢陽起石用乾鍋於大火中煅令通紅取出酒淬陰冷五錢鍾乳粉煉成者一兩上為末糯米粉煮糊丸如雞頭實大入地坑出火毒一宿每服一丸空心濃煎人參湯放冷送下五味子膏北五味子一斤上洗淨水浸一宿以手挼去核再用溫水將核洗取餘味通用布濾過入冬蜜二斤慢火熬之除砂鍋斤兩外煮至二斤四兩成膏為度待數日後略去火性每服一二匙白滾湯調服金櫻膏養精益腎活血駐顏金櫻子經霜後取上用竹夾夾摘先杵去刺勿令損以竹刀切作兩片刮去腹內子毛用水洗過搗爛置砂鍋內水煎至半耗取出濾去柤仍以文武火熬似飴每服一匙酒調服濾音慮洗也澄也用粗葛為之柤在上水在下則水潔淨治濕熱下注遺精方治濁固本丸治胃中濕熱滲入膀胱濁下不禁蓮花須黃連炒各二兩白茯苓砂仁益智半夏黃柏炒各一兩豬苓二兩半甘草炙三兩上為末蒸餅為丸如桐子大每服五十丸空心溫酒下珍珠粉丸治白淫夢遺泄精及滑出不收黃柏一斤新瓦上炒赤真蛤粉一斤珍珠三錢上為細末滴水丸如桐子大每服一百丸空心溫酒下一方無珍珠有青黛定志珍珠粉丸治心虛夢泄人參白茯苓海蛤粉黃柏炒焦色各三兩遠志石菖蒲樗根皮青黛各二兩上為細末麵糊丸如桐子大青黛為衣每服五十丸空心姜鹽湯下大鳳髓丹治心火狂陽太盛腎水真陰虛損心有所欲速於感動應之於腎疾於施泄此方固真元降心火益腎水大有神效黃柏炒二兩縮砂一兩甘草五錢半夏炒茯苓木豬苓紅蓮蕊益智仁各三錢半上為末水丸如桐子大每服五七十丸白湯下古人云瀉心火非也乃瀉相火益腎水之劑威喜丸治精氣不固夢泄白濁黃蠟四兩白茯苓去皮切塊用豬苓一分於磁器內同煮二十餘沸取出焙乾取末四兩不用豬苓上將黃蠟溶化入茯苓末搜和為丸如彈子大每一丸空心細嚼咽下以小便清為度忌米醋張子元方治氣血兩虛有痰濁陰火痛風人參南星煨裂各一兩龜板酥炙黃柏炒褐色熟地黃各二兩白朮山藥海石鎖陽乾薑燒存性各半兩上為細末酒麴糊為丸如桐子大每服一百丸姜鹽湯下豬肚丸久服自覺身肥而夢遺立止白朮五兩苦參三兩牡蠣四兩上為末用豬肚一具煮爛和藥末搗勻再加肚汁搗半日為丸小豆大每服四十丸米飲下日三次樗皮丸治房勞內傷氣血精滑不時或作夢遺樗根白皮炒上為末酒糊丸如桐子大每服五七十丸空心鹽湯下或云此藥性溫而燥亦不可單服或加青黛海石黃柏煎八物湯下三灰樗柏丸良薑三錢芍藥黃柏各二錢俱燒存性樗根皮一兩為末上用糊為丸如桐子大每服三十丸空心茶湯下徐氏硫苓丸治上熱下冷夢遺神效硫黃白礬制一兩白茯苓二兩知母童便浸黃柏童便浸各五錢上為末用黃蠟一兩半溶化和丸如桐子大每服五十丸鹽湯下
