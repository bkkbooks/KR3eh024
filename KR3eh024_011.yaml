body:
  text: 卷十一飲食論飲食調攝之宜彭氏曰人知飲食所以養生不知飲食失調亦以害生故能消息使適其宜是謂賢哲防於未病凡一切飲食勿論四時常欲溫暖夏月伏陰在內暖食尤宜不欲苦飽飽則筋脈橫解腸僻為痔因而大飲則氣乃暴逆養生之道不欲食後便臥及終日穩坐皆能凝結氣血久即損壽食後常以手摩腹數百遍仰面呵氣數百口趑趄緩行數百步謂之消食食後便臥令人患肺氣頭風中痞之疾蓋榮衛不通氣血凝滯故爾故食訖當行步躊躇有作修為乃佳語曰流水不腐戶樞不蠹其動然也食飽不得速步走馬登高涉險恐氣滿而激致傷臟腑不欲夜食脾好音聲聞聲即動而磨食日入之後萬響都絕脾乃不磨食之即不易消不消即損胃損胃即不受穀氣穀氣不受即多吐多吐即為翻胃之疾矣食欲少而數不欲頓而多常欲令飽中飢飢中飽為善爾食熱物後不宜再食冷物食冷物後不宜再食熱物冷熱相激必患牙齒疼痛瓜果不熟禽獸自死及生鮓煿煎之物與夫油膩難消粉粥冷淘之物皆能生痰生瘡瘍生症癖並不宜食五味入口不欲偏多多則隨其臟腑各有所損故咸多傷心甘多傷腎辛多傷肝苦多傷肺酸多傷脾內經曰多食鹹則脈凝泣而變色咸從水化水能剋火故病在心之脈與色多食苦則皮槁而毛拔苦從火化火能剋金故病在肺之皮毛多食辛則筋急而爪枯辛從金化金能剋木故病在肝之筋爪多食酸則肉胝皺而唇揭酸從木化木能剋土故病在脾之肉與唇多食甘則骨肉痛而發落甘從土化土能剋水故病在腎之骨與發偏之為害如此故上士淡泊其次中和此飲食之大節也飲酒少則益人多則損人氣暢而止可也飲少則能引滯氣導藥力潤肌膚益顏色通榮衛闢穢惡過多而醉則肝浮膽橫諸脈衝激由之敗腎毀筋腐骨消胃久之神散魄溟不能飲食獨與酒宜去死無日矣飽食之後尤宜忌之飲覺過多吐之為妙飲酒後不可飲冷水冷茶被酒引入腎中停為冷毒日久必然腰膝沉重膀胱冷痛水腫消渴攣躄音闢足不能行也之疾作矣酒後不可風中坐臥袒肉操扇此當毛孔盡開風邪易入感之令人四肢不遂不欲極飢而食食不可過飽不欲極渴而飲飲不可過多食過多則結積飲過多則成痰癖故曰大渴不大飲大飢不大食恐血氣失常卒然不救也荒年飢殍飽食即死是其驗也嗟乎善養生者養內不善養生者養外養內者安恬臟腑調順血脈使一身之氣流行沖和百病不作養外者恣口腹之慾極滋味之美窮飲食之樂雖肌體充腴容色悅澤而酷烈之氣內蝕臟腑形神虛矣安能保合太和以臻遐齡莊子曰人之可畏者衽席飲食之間而不知為之戒也其此之謂乎論飲食過多之害羅謙甫曰陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷謂食物無貪於多貴在有節所以保沖和而遂頤養也若貪多務飽飫塞難消徙積暗傷以召疾患蓋食物飽甚耗氣非一或食不下而上湧嘔吐以泄真元或飲不消而作痰咯唾以耗神水大便頻數而泄耗穀氣之化生溲便清利而濁耗源泉之浸潤至於精清冷而下漏汗淋漓而外泄莫不由食物過傷滋味太厚如能節滿意之食省爽口之味常不至於飽甚即頓頓必無傷物物皆為益津液內蓄精華和凝邪毒不能犯疾疹無由作矣論飲食傷脾東垣曰四十九難云飲食勞倦則傷脾又云飲食自倍腸胃乃傷腸澼為痔夫脾者行胃津液磨胃中之谷主五味也胃既傷則飲食不化口不知味四肢困倦心腹痞滿兀兀欲吐而惡食或飧泄或為腸澼此胃傷脾亦傷明矣大抵傷飲傷食其治不同傷飲者無形之氣也宜發汗利小便以導其濕傷食者有形之物也輕則消化或損其谷此最為妙也重則方可吐下數方區分類析於後宜酌量用之論飲食自倍腸胃乃傷分而治之東垣曰陰陽應象論云水穀之寒熱感則害人六腑痹論云陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷此乃混言之也分之為二飲也食也飲者水也無形之氣也因而大飲則氣逆形寒飲冷則傷肺肺病則為喘咳為腫為水瀉輕則當發汗利小便使上下分消其濕解醒湯五苓散生薑半夏枳實白朮之類是也如重而蓄積為滿者芫花大戟甘遂牽牛之屬利下之此其大法也食者物也有形之血也如生氣通天論云因而飽食筋脈橫解腸澼為痔又云食傷太陰厥陰寸口大於人迎兩倍三倍者或嘔吐或痞滿或下痢腸澼當分寒熱輕重治之輕則內消重則除下如傷寒物者半夏神麯乾薑三稜廣朮巴豆之類主之如傷熱物者枳實白朮青皮陳皮麥蘖黃連大黃之類主之亦有宜吐者陰陽應象論云在上者因而越之瓜蒂散之屬主之然而不可過劑過則反傷脾胃蓋先因飲食自傷又加之以藥過故腸胃復傷而氣不能化食愈難消矣漸至羸困故五常政大論云大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九凡毒藥治病不可過之此聖人之深戒也所謂去其六七八九者病去六七八九分而止也論傷食宜下宜吐潔古云大抵氣口脈緊盛者宜下尺脈絕者宜吐經曰氣口脈盛傷於食心胃滿而口無味口與氣口同口曰坤者口乃脾之候故胃傷而氣口緊盛夫傷有多少有輕重如氣口一盛得脈六至則傷於厥陰乃傷之輕也枳朮丸之類主之氣口二盛得脈七至則傷於少陰乃傷之重也雄黃聖餅子木香檳榔丸枳殼丸之類主之氣口三盛脈得八至九至則傷太陰填塞悶亂則心胃大痛備急丸保神丸消積丸之類主之兀兀欲吐不已俗呼食迷風是也經曰上部有脈下部無脈其人當吐不吐者死瓜蒂散主之如不能吐是無治也經曰其高者因而越之此之謂也或曰盛食填塞胸中痞亂兩寸脈當用事今反兩尺脈不見其理安在曰胸中有食是木鬱宜達故探吐之食者物也物者坤土也是足太陰之號也胸中者肺也為物所塞肺者手太陰金也金主殺伐與坤土俱在手上而旺於天金能剋木故肝木發生之氣伏於地下非木鬱而何吐去上焦陰土之物木得舒暢則鬱結去矣食塞於上脈絕於下若不明天地之道無由達此至理水火者陰陽之徵兆天地之別名也故獨陽不生獨陰不長天之用在於地下則萬物生長地之用在於天上則萬物收藏此乃天地交而萬物通也此天地相根之道也故陽火之根本於地下陰水之源本於天上故曰水出高源故人五臟主有形之物物者陰也陰者水也右三部脈主之偏見於寸口食塞於上是絕五臟之源源絕則水不下流兩尺脈之絕此其理也何疑之有然必視所傷之物冷熱隨證加減如傷冷物一分熱物二分則用寒藥二停熱藥一停隨時消息經云必先歲氣無伐天和此之謂也五運有紀六氣有序四時有令陰陽有節皆歲氣也人氣應之以生長收藏即天和也設不知歲氣變遷而妄呼寒熱則邪正盛衰無所辨未免於犯歲氣伐天和矣夭枉之由此其為甚論傷食宜補又云既有三陰可下之法亦必有三陰可補之法故云內傷三陰可用溫劑若飲冷內傷雖云損胃未知色脈各在何經若面色青黑脈浮沉不一弦而弱者傷在厥陰若面色紅赤脈浮沉不一細而微者傷在少陰若面色黃潔脈浮沉不一緩而遲者傷在太陰也傷在厥陰肝之經當歸四逆湯加吳茱萸生薑之類主之傷在少陰腎之經通脈四逆湯主之傷在太陰脾之經理中丸湯主之大便軟者宜湯結者宜丸論內傷飲食用藥所宜所禁東垣曰夫傷飲食付藥者受藥者皆以為瑣末細事是以所當重者為輕利害非細殊不思胃氣者榮氣也衛氣也穀氣也清氣也資少陽生髮之氣也人之真氣衰旺皆在飲食入胃胃和則穀氣上升穀氣者升騰之氣也乃足少陽膽手少陽元氣始發生長萬化之別名也飲食一傷若消導藥的對其所傷之物既消則胃氣愈旺五穀之精華上騰乃清氣為天者也精氣神氣皆強盛七神護衛生氣不乏增益大旺氣血周流則百病不能侵雖有大風苛毒弗能害也此一藥之用其利博哉易水張先生嘗戒不可用峻利食藥食藥下咽未至藥丸施化其標皮之力始開便言空快也所傷之物已去若更待一兩時辰許藥盡化開其峻利藥必有情性病去之後脾胃安得不損乎脾胃既損是真氣元氣敗壞促人之壽當時用枳朮丸一藥消化胃中所傷下胃不能即去須待一兩時辰許則消化是先補而後化其所傷則不峻利矣因用荷葉燒飯為丸荷葉一物中央空虛象震卦之體震者動也人感之生足少陽甲膽也甲膽者風也生化萬物之根蒂也左傳云履端於始序則不愆人之飲食入胃營氣上行即少陽甲膽之氣也其手少陽三焦經人之元氣也手足經同法便是少陽元氣生髮也胃氣穀氣元氣甲膽上升之氣一也異名雖多止是胃氣上升者也荷葉之體生於水上之下出於穢汙之中而不為穢汙所染挺然獨立其色青形乃空清而象風木者也食藥感此氣之化胃氣何由不上升乎其主意用此一味為引用可謂遠識深慮合於道者也若內傷脾胃以辛熱之物酒肉之類自覺不快覓藥於醫者此風習以為常醫者亦不問所傷即付之以集香丸巴豆大熱藥之類下之大便下則物去遺留食之熱性藥之熱性重傷元氣七神不熾經云熱傷氣正謂此也其人必無氣以動而熱困四肢不舉傳變諸疾不可勝數使人真氣自此衰矣若傷生冷硬物世醫或用大黃牽牛二味大寒藥投之物隨藥下所傷去矣遺留食之寒性藥之寒性重瀉其陽陽去則皮膚筋肉血脈無所依倚便為虛損之證論言及此令人寒心夫辛辣氣薄之藥無故不可亂服非止牽牛而已至真要大論云五味入胃各歸所喜攻攻者克伐瀉也辛味下咽先攻瀉肺之正氣正氣者真氣元氣也其牽牛之辛辣猛烈奪人尤甚飲食所傷脾胃受邪當以苦味瀉其腸胃可也肺與元氣何罪之有夫牽牛不可用者有五此其一也況胃主血為物所傷物者有形之物也皆是血病血病瀉氣此其二也且飲食傷於中焦止合克化消導其食重瀉上焦肺中已虛之氣此其三也食傷腸胃當塞因塞用又寒因寒用枳實大黃苦寒之物以治有形是也反以辛辣牽牛散瀉真氣犯大禁四也殊不知針經有云外來客邪風寒傷人五臟若誤瀉胃氣必死誤補亦死其死也無氣以動故靜若內傷腸胃而反瀉五臟必死誤補亦死其死也陰氣有餘故燥今內傷腸胃是謂六腑不足之病反瀉上焦虛無肺氣肺者五臟之一數也為牽牛之類朝損暮損其元氣消耗此乃暗裡折人壽數犯大禁五也良可哀嘆經曰胃惡熱而喜清大腸惡清冷而喜熱兩者不和何以調之岐伯曰調此者飲食衣服亦欲適寒溫使寒無悽愴暑無出汗飲食者熱無灼灼寒無滄滄寒溫中適故氣將持乃不致邪僻也詳見本經是必有因用豈可用俱熱俱寒之食藥致損者與內經云內傷者其氣口脈反大於人迎一倍二倍三倍分經用藥又曰上部有脈下部無脈其人當吐不吐者死如但食不納噁心欲吐者不問一倍二倍不當正以瓜蒂散吐之但以指或以物探去之若所傷之物去不盡者更診其脈問其所傷以食藥去之以應塞因塞用又謂之寒因寒用泄而下降乃應太陰之用其中更加升發之藥令其元氣上升塞因塞用因曲而為之直何為曲內傷胃氣是也因治其飲食之內傷而使生氣增益胃氣復完此乃因曲而為之直也若依分經用藥其所傷之物寒熱溫涼生硬柔軟所傷不一難立定法只隨所傷之物不同各立治法臨時加減用之其藥又須問病人從來稟氣盛衰所傷寒物熱物是喜食而食之耶不可服破氣藥若乘飢困而食之耶當益胃氣或為人所勉強勸食之宜損血而益氣也診其脈候傷於何臟方可與對病之藥豈可妄瀉天真生氣以輕喪身寶乎且如先食而不傷繼之以寒物因後食致前食亦不消化而傷者當問熱食寒食孰多孰少斟酌與藥無不當矣譬如傷熱物二分寒物一分則當用寒藥二分熱藥一分相合而與之則榮衛之氣必得周流更有或先飲酒而後傷寒冷之食及傷熱食冷水與冰如此不等皆當驗其節次所傷之物約量寒熱之劑分數各各對證而與之無不取驗論中食似風統旨云中食之證忽然厥逆昏迷口不能言肢不能舉狀似中風皆因飲食過傷醉飽之後或感風寒或著氣惱以致填塞胸中胃氣有所不行陰陽痞膈升降不通此內傷之至重者人多不識若誤作中風中氣而以祛風行氣之藥重傷胃氣其死可立而待不若先煎姜鹽湯探吐其食仍視其風寒尚在者以藿香正氣散解之氣滯不行者以八味順氣散調之吐後別無他證只用平胃散加白朮茯苓半夏麴櫱之類調理如遇此卒暴之病必須要審問明白或方食醉飽或飲食過傷但覺胸膈痞悶痰涎壅塞氣口脈緊盛者且作食滯治之論飲食雜治法病源曰宿食不消由臟氣虛弱寒氣在於脾胃之間故使穀不化也宿谷未消新谷又入脾氣既弱故不能磨之則經宿而不消也令人腹脹氣急胸膈痞塞咽酸噫敗卵臭時復憎寒壯熱或頭痛如瘧之狀皆其證也凡傷食必惡食胸中有物宜用消導之劑若傷食挾外感者不可專攻其食用行氣香蘇散兼而治之丹溪曰傷食必惡食氣口脈必緊盛胸膈必痞塞亦有頭痛發熱者但身不痛惡食者胸中有物宜導痰運脾用二陳湯加白朮山楂川芎蒼朮服之聞食氣即嘔二陳湯加砂仁一錢青皮五分服之憂抑傷脾不思飲食炒黃連酒芍藥香附同清六丸末用薑汁浸蒸餅丸服一人嗜酒痛飲不醉忽糟粕出前竅尿溺出後竅脈沉澀與四物湯加海金砂木香檳榔木通桃仁八貼而安或云傷食必惡食心口按之必刺痛準繩云凡諸脾脈微洪傷苦澀物經曰咸勝苦微弦傷冷硬物經云溫以克之微澀傷辛辣物經云苦勝辛微滑傷腥咸物經云甘勝咸弦緊傷酸硬物經云辛勝酸洪緩傷甜爛物經云酸勝甘微遲傷冷痰積聚惡物溫胃化痰單伏主物不消化曲蘖三稜廣朮之類浮洪而數皆中酒葛根陳皮茯苓傷食作瀉不止於應服藥中加肉豆蔻益智仁以收固之傷食兼感風寒其證與前同但添身疼氣口人迎俱盛俗謂夾食傷寒宜生料五積散或養胃湯香蘇飲和解散李氏曰傷食惡食先分上下次審寒熱以行吐瀉停於上脘氣壅痰盛者宜吐如傷冷食腹脹氣逆噫氣吞酸噁心欲吐不吐宜平胃散入鹽少許探吐如傷熱物或酒面發熱心口刺痛停痰停飲伏火宜二陳湯加黃連枳實探吐傷重填塞胸中下部無脈體實年壯者方敢瓜蒂散吐之尋常飲食過飽在膈以手探吐為好停宿中下脘者宜下以逐之如傷冷物腹脹滿痛者木香見睍丸丁香脾積丸感應丸如傷熱物痞滿者二黃丸日晡潮熱盛者小承氣湯寒熱兩傷者大黃備急丸除原散體弱者下藥兼補保和丸凡傷食乃中焦血病如牽牛猛烈傷氣及一切峻攻反傷胃氣又現有吐者二陳湯加砂仁黃連青皮枳實現有瀉者胃苓湯加山楂麥芽或三白湯隨時令寒暑選用如身受寒氣口又傷冷初得便宜辛溫理中稍久鬱而為熱當兼辛涼散之吐下未淨消導之紅丸子枳朮丸保和丸大安丸平補枳朮丸單山楂丸吐下已虛補益之四君子湯六君子湯補中益氣湯憂思傷脾全不食者溫膽湯神效憂思兼傷食者木香化滯湯瘦倦氣抑不食者二妙蒼柏散加香附白芍藥陳皮半夏黃連扁柏等分白朮為君薑汁曲丸服帶痰氣滿不食者三補丸加蒼朮倍香附醉飽行房以致蓄血胃口時痛者大調中湯或八物湯加砂仁之類蔭按名醫方考載廚家造索粉杏仁近之即爛今後凡遇粉傷者宜加焉客有貨瓜果者一遇糯米無不化爛今後凡遇傷於瓜果者宜入之舟人以橄欖木為檣凡魚觸之無有不死又嘗以橄欖木為桌以魚骨置之少時柔軟今後凡遇食魚而傷者及噎魚骨者皆宜用之凡花果草木一觸麝香無不萎落今後凡遇傷於果實蔬菜者宜主之門外楂枳枸木者門內造酒必不熟屋內有此木作柱亦然故曰枳枸解酒過於葛花今後凡遇傷酒中酒者宜用之客有蒸豬首者或告之曰是草豬母彘之首也皮厚而不易烹能多入山楂則易烹矣試之果然今後但遇傷於肉味者只此足矣論傷酒東垣曰酒者大熱有毒氣味俱陽乃無形之物也若傷之止當發散汗出則愈矣其次莫如利小便乃上下分消其濕今之病酒者往往服酒症丸大熱之藥下之又有用牽牛大黃下之者是無形元氣受病反下有形陰血乖誤甚矣酒性大熱已傷元氣而復重瀉之亦損腎水真陰及有形血氣俱為不足如此則陰血愈虛真水愈弱陽毒之熱大旺反增其陰火是以元氣銷鑠折人長命不然則虛損之病成矣酒疸下之久則為黑疸慎不可犯宜以葛花解醒湯主之海藏曰治酒病宜發汗若利小便炎焰不肯下行故曰火鬱則發之以辛溫散之是從其體性也是知利小便則濕去熱不去若動大便尤為疏陋蓋大便者有形質之物酒者無形之水從汗發之濕熱俱去是為近理故治以苦溫發其火也佐以苦寒除其濕也準繩云按酒之為物氣熱而質濕飲之而昏醉狂易者熱也宜以汗去之既醒則熱去而濕留止宜利小便而已二者宜酌而用之大抵葛花解醒湯備矣又云傷酒惡心嘔逆吐出宿酒昏冒眩暈頭痛如破宜沖和湯半夏茯苓湯或理中湯加乾葛七分或用末子理中湯和縮脾飲酒渴縮脾湯或煎乾葛湯調五苓散久困於酒遂成酒積腹痛泄瀉或暴飲有灰酒亦能致然並宜酒煮黃連丸多飲結成酒癖腹中有塊隨氣上下沖和湯加蓬朮五分酒停胸膈為痰飲者枳實半夏湯加神麯麥芽各五分沖和湯加半夏一錢茯苓七分解酒毒無如枝矩子之妙一名枳椇一名木蜜俗呼癩漢指頭北人名曰爛瓜江南謂之白石樹杭州貨賣名蜜屈立詩所謂南山有枸是也樹形似白楊其子著枝端如小指長數寸屈曲相連春生秋熟經霜後取食如餳美以此木作屋柱令一室之酒味皆淡薄趙以德治酒人發熱用枝矩子而愈即此也脈法脈訣舉要曰氣口緊盛者為傷於食食不消化浮滑而疾心法附錄曰傷食之證右手氣口必緊盛胸膈痞塞噫氣如敗卵臭亦有頭痛發熱但身不痛為異耳治傷食消導兼補方枳朮丸治痞消食強胃白朮二兩枳實去穰麩炒一兩上為末荷葉裹煨飯法用粳米淘淨量以熟水和取生荷葉三四層包之上撮其口埋於灰火中露出上口撮余荷葉勿令泄水以飯熟為度如無生荷葉以乾者浸濕包飯煨之搗爛為丸如梧桐子大每服五七十丸用白湯送下此藥久服能使人胃氣強實雖過食而不復傷也若加陳皮一兩名橘皮枳朮丸治老幼元氣虛弱飲食不消或臟腑不調心下痞悶若加半夏一兩名半夏枳朮丸治因冷食內傷若加神麯大麥蘖麵炒各一兩名曲蘖枳朮丸治勉強多食心腹滿悶不快若加木香一兩名木香枳朮丸破滯氣消飲食開胃進食此上四方製法俱同本方但各量所傷服之一方如傷濕面心腹滿悶肢體沉重加蘿蔔子五錢神麯一兩紅花三錢傷濕熱不化加茯苓芩連各三錢澤瀉二錢大黃一兩神麯糊丸若傷豆粉濕面油膩加半夏神麯各一兩陳皮七錢黃芩五錢枯礬三錢傷酥酪乳餅一切冷病加除濕丹一料車前子澤瀉各五錢神麯一兩乾生薑半夏紅花甘草各三錢茯苓七錢如氣弱食少加陳皮飲食難化疼痛泄瀉加人參白芍藥神麯麥蘖各一兩砂仁木香各五錢痰火胸膈鬱塞咽酸噫氣吞酸或酒積泄結痛加黃連白芍藥陳皮各一兩石膏甘草各五錢砂仁木香各二錢川芎四錢痞塊加黃連厚朴各五錢積堅加莪朮昆布各三錢傷冷腹痛溏瀉加半夏一兩砂仁乾薑神麯麥芽各五錢挾氣傷食加川芎香附各一兩木香黃連各五錢胸膈不利過服香燥以致胃脘乾燥噎膈反胃加黃連山梔桔梗甘草石膏各五錢白芍藥當歸各一兩胸膈頑痰膠結大便燥閉加芒硝五錢素有痰加半夏陳皮茯苓各一兩芩連各五錢素有氣加木香一兩能食好食食後反飽難化此胃火旺脾陰虛也加白芍藥一兩五錢石膏一兩人參七錢甘草五錢黃連香附木香各四錢年高人脾虛血燥易飢易飽便燥加白芍藥當歸各一兩人參七錢升麻甘草各四錢山楂麥芽桃仁各五錢加味枳朮丸白朮米泔浸一日四兩黑枳實去穰曲炒二兩半夏薑湯泡七次陳皮神麯炒麥芽炒山楂肉各一兩五錢上為細末用新鮮荷葉數片煮湯去葉入老倉米亦如尋常造飯之法甑內以荷葉鋪蓋方全氣味乘熱搗爛用細絹絞精華汁以藥末揉拌成劑為丸如桐子大每服一百丸食遠用白滾湯送下或只用蒸餅為丸或胃寒或冬月加砂仁一兩氣滯加木香五錢常有痰火又兼胸膈痞悶加黃連茯苓各一兩橘半枳朮丸理脾化痰開胃進食白朮炒二兩枳實麩炒陳皮炒各一兩半夏薑湯泡一兩五錢上為末水煮神麯糊為丸如桐子大每服七十丸白湯下橘連枳朮丸補脾和胃清熱消痰白朮三兩枳實麩炒陳皮去白黃連酒炒各一兩上為末荷葉煨飯丸如桐子大每服五十丸食後溫水下竹瀝枳朮丸化痰清火健脾消食白朮二兩枳實麩炒莪朮米泔浸炒南星白礬生薑牙皂同煮乾半夏同南星制白茯苓陳皮去白黃芩酒炒山楂去核白芥子炒各一兩黃連薑汁炒當歸各五錢上為末用神麯六兩生薑汁一盞竹瀝一碗煮糊丸如桐子大每服百丸食遠白湯下橘半消化丸消食化痰開鬱下氣白朮二兩蒼朮陳皮半夏白茯苓神麯山楂撫芎香附各一兩連翹蘿蔔子炒各五錢上為細末神麯糊丸服大安丸脾經消導之藥虛者宜斟酌用之白朮山楂各二兩神麯炒半夏茯苓各一兩陳皮連翹蘿蔔子炒各五錢上為末神麯糊丸服香砂和中湯治飲食所傷脾胃嘔吐胸滿噯噫或胸腹脹痛藿香砂仁各一錢二分蒼朮米泔浸炒二錢厚朴薑汁炒半夏茯苓陳皮青皮枳實麩炒各一錢甘草三分上生薑三片水煎食前服如大便瀉去枳實青皮加神麯山楂加味二陳湯導痰補脾消食行氣陳皮半夏茯苓蒼朮白朮香附山楂各一錢川芎神麯炒各七分麥蘖炒砂仁各五分甘草炙三分上除神麯麥蘖面細研炒另包余細切作一服加生薑三片大棗一枚水煎成調入神麯麥蘖服化食養脾湯治或先因勞役而後傷於飲食或先傷飲食而後犯於房勞此皆不足之中兼乎有餘宜此湯治之人參一錢白朮一錢五分白茯苓陳皮神麯炒半夏薑湯泡麥芽炒山楂各一錢砂仁八分甘草炙三分上姜三片水煎食前服胸腹痞脹甚者加厚朴枳實各一錢胃脘痛加草豆蔻仁一錢氣滯痰盛者去參加香附一錢半夏倍之溯原散一名除原散凡傷食物以致惡寒發熱久不愈或傷寒後食諸物致食復潮熱不已必詢問其先食何物所傷即以原食之物燒存性一兩細研為末別用生韭菜連根葉一握搗汁調服過一二時以東垣枳實導滯丸百餘粒催之其所傷之宿食即下熱退而愈法制陳皮消食化氣寬利胸膈美進飲食茴香炒甘草炙各二兩青鹽炒一兩乾生薑烏梅肉各五錢白檀香二錢五分上六味為末外以陳皮半斤湯浸去白淨四兩切作細條子用水一大碗煎藥末三兩同陳皮條子一處慢火煮候陳皮極軟控干少時用干藥末拌勻焙乾每服不拘多少細嚼溫薑湯下無時法制檳榔治酒食過度胸膈膨滿口吐清水一切積聚雞心檳榔一兩切作小塊縮砂取仁白豆蔻取仁丁香切作細條粉草切作細塊各一兩橘皮去白切作細條生薑各半斤切作細條上件用河水二碗浸一宿次日用慢火砂鍋內煮乾焙乾入新瓶收每服一撮細嚼酒下或為細末湯調服亦可治傷食吐法方瓜蒂散治大滿大實氣上衝逆上部有脈下部無脈填塞悶亂者用之如尺寸俱盛者宜用備急丸凡血虛者不可吐瓜蒂炒赤小豆各等分上為細末每服二錢溫漿水調下取吐為度仲景以香豉七合煮取汁和散一匕服之若不至兩尺脈絕者不宜便服此藥恐損元氣令人胃氣不復若止胸中窒塞悶亂不通以物探之得吐則已如探不去方以此劑吐之鹽湯探吐法治飲食自倍胸膈滿脹宜以此法吐之食鹽四合燒上以溫湯二升和勻飲之以指探吐治傷熱食方保和丸治食積酒積山楂肉二兩半夏薑製橘紅白茯苓神麯炒麥芽炒各一兩連翹蘿蔔子黃連各五錢上為末滴水丸如桐子大每服五七十丸食後白湯下一方無茯苓連翹三黃枳朮丸治傷肉食濕面辛辣厚味之物填塞悶亂胸膈不快黃芩二兩黃連酒炒大黃煨神麯炒白朮陳皮各一兩枳實五錢上為末湯浸蒸餅為丸如綠豆大每服五十丸白湯下白朮丸治傷豆粉濕面油膩之物白朮半夏神麯炒枳實炒各一兩橘皮七錢黃芩五錢白礬枯三錢上為末湯浸蒸餅為丸如綠豆大一倍每服五十丸白湯下量所傷加減服之檳榔丸治飲食過多心腹脹悶檳榔二錢五分陳皮牽牛各一兩木香二錢五分枳實炒一兩上為末醋糊丸每服三四十丸生薑湯下消滯丸消酒消食消痰消氣消痞消脹消腫消痛消積消滯此藥消而不見響而不動藥本尋常其功甚妙黑牽牛炒二兩香附米炒五靈脂各一兩上為末醋糊丸如豆大每服二十丸生薑湯食後下一方治傷索粉片積用紫蘇濃煎汁加杏仁泥服之即散除濕益氣丸治傷濕面心腹滿悶肌體沉重枳實炒白朮黃芩生神麯炒各一兩紅花三分蘿蔔子炒熟五錢上為末荷葉飯丸桐子大每服五十丸白湯下上二黃丸治傷熱食痞悶兀兀欲吐煩亂不安黃芩二兩黃連酒洗一兩升麻柴胡各三錢甘草二錢枳實炒五錢上為末湯浸蒸餅為丸綠豆大每服五七十丸白湯下枳實導滯丸治傷濕熱之物不得旋化而作痞滿悶亂不安黃芩茯苓白朮黃連各三錢澤瀉二錢大黃一兩枳實炒神麯炒各五錢上為末湯浸蒸餅為丸桐子大每服五七十丸溫水下食遠量強弱加減丸數以利為度以上俱消導熱食之劑傷輕者選用枳朮青皮湯治過食熱物有傷太陰厥陰嘔吐痞脹瀉痢或不瀉痢者枳實白朮橘紅黃連薑汁炒麥芽炒青皮白芍藥山楂肉各一錢大黃酒浸一錢五分甘草三分上銼水煎服下之不下亦自內消枳實大黃湯治胸腹有食積大便不通者枳實大黃厚朴檳榔甘草上銼一服水煎空心溫服以利為度腹痛甚加木香金露丸治內傷心痞氣不升降水穀不消大黃一兩枳殼五錢桔梗二兩牽牛二錢五分上為末荷葉裹煨飯為丸如桐子大每服三五十丸食後白湯下木香和中丸和脾胃消宿食利胸膈化痰涎除膈熱進飲食木香檳榔青皮橘紅黃芩枳殼青礞石各五錢沉香二錢滑石二兩大黃一兩一錢黑牽牛頭末二兩三錢上為末水丸如桐子大每服五十丸食後薑湯茶清任下木香檳榔丸治一切氣滯心腹痞滿脅肋脹悶大小便結滯不快利者並宜服之木香檳榔青皮去白陳皮去白枳殼麩炒廣朮煨切黃連黃柏各一兩香附大黃炒各三兩黑牽牛生取頭末四兩或云三兩上為末滴水丸如豌豆大每服三五十丸食後生薑湯下加至微利為度一方有黃芩當歸大枳殼丸治一切酒食所傷胸膈閉悶疼痛飲食不消兩脅刺痛嘔吐噁心並皆治之枳殼麩炒木香陳皮去白青皮人參白朮茯苓厚朴薑汁炒蓬朮煨香熟半夏湯泡七次三稜黑牽牛炒麥蘖微炒神麯炒黃各一兩檳榔大黃錦紋者各二兩一方有乾生薑五錢上為末薑汁糊丸如桐子大每服三四十丸薑湯下食後服以上俱推逐熱食之劑傷甚者選用治傷冷食方香砂平胃散治傷冷食香附炒一錢砂仁七分蒼朮米泔炒一錢陳皮一錢甘草五分枳實麩炒八分木香五分藿香八分上銼一劑姜一片水煎服肉食不化加山楂草果米粉面食不化加神麯麥芽生冷瓜果不化加乾薑青皮飲酒傷者加黃連乾葛烏梅吐瀉不止加茯苓白朮半夏烏梅去枳實內消散治過食寒硬之物致傷太陰或嘔吐痞滿脹痛陳皮半夏茯苓枳實山楂肉神麯砂仁香附三稜蓬朮乾生薑上銼一劑水煎溫服香殼散醒脾去積順氣化痰青皮炒陳皮炒各四兩半夏二兩五錢枳殼炒二兩枳實炒山楂神麯炒麥蘖炒三稜炒蓬朮炒木香檳榔蘿蔔子炒草果各一兩香附子醋浸一兩五錢陳倉米一升用巴豆二十粒炒黃去巴豆上為細末每服三錢白湯調服或為丸亦可木香化滯湯治因憂氣食冷濕面結於中脘腹皮底微痛心下痞滿不思飲食食之不散常常痞氣枳實麩炒半夏泡草豆蔻甘草炙各一兩柴胡四錢橘皮木香各三錢當歸二錢紅花五分上銼每服五錢加生薑五片水煎食遠稍熱服忌生冷酒濕面半夏枳朮丸治食冷傷脾胃胃中有痰白朮四兩枳實麩炒半夏薑製各二兩上為細末荷葉煨飯丸如桐子大每服五十丸食遠白湯下木香乾姜枳朮丸破除滯氣消寒飲食白朮一兩五錢枳實炒一兩乾薑炮五錢木香三錢上為末荷葉燒飯為丸如梧桐子大每服三五十丸食前溫水下加味枳朮丸治痞消食化痰止嗽寬中利膈助胃和脾白朮二兩枳實麩炒半夏薑製神麯炒麥芽炒山楂各一兩陳皮薑黃各五錢木香不見火二錢半上為末蒸餅打糊為丸如梧桐子大每服七八十丸食遠薑湯下沉香化滯丸消積滯化痰飲去惡氣解酒積中滿嘔噦噁心蓬朮醋炒三兩香附炒陳皮各二兩木香砂仁藿香麥芽炒神麯炒甘草炙各一兩沉香五錢上為細末酒糊丸如綠豆大每服五十丸空心沸湯下紅丸子壯脾胃消宿食去膨脹並治冷瘧京三稜水浸軟蓬朮煨陳皮去白青皮去白各五兩乾薑炮胡椒各三兩上為末醋糊為丸如桐子大以礬紅為衣每服二十丸食後薑湯下小兒臨時加減與服本方加神麯麥芽同炒各等分名內消丸易簡紅丸子修合治療之法並見局方蓬朮三稜橘皮青皮胡椒乾薑阿魏紅礬上每服六十丸薑湯下治大人小兒脾胃之證極有神效但三稜蓬朮本能破症消癖其性猛烈人不以此為常服之劑然今所用者以生產之處隔絕二藥不得其真乃以紅蒲根之類代之性雖相近而功力不同此藥須是合令精緻用好米醋煮陳米粉為丸若修合之時去阿魏紅礬名小橘皮煎治尋常飲食所傷中脘痞滿服之應手而愈大病之後穀食難化及治中脘停聚並生薑湯下脾寒瘧疾生薑橘皮湯下心腹脹痛紫蘇橘皮湯下脾疼作楚葛蒲湯下酒疸谷疸遍身昏黃大麥湯下兩脅引乳痛沉香湯下酒積食積面黃腹脹時或乾嘔煨薑湯下婦人脾血作楚及血症氣塊經血不調或過時不來並用醋湯嚥下寒熱往來者尤宜服之產後狀如癲癇者此乃敗血上攻迷亂心神所致當以此藥熱醋湯下其效尤速男子婦人癲疾未必皆由心經蓄熱亦有因膽氣不舒遂致痰飲上迷心竅故成斯疾若服涼劑過多則愈見昏亂以此藥衣以辰砂用橘葉煎湯嚥下名小鎮心丸妊婦惡阻嘔吐全不納食百藥不治惟此最妙乃佐二陳湯服之但人疑其墮胎必不信服每易名用之時有神效但恐妊婦偶爾損動必歸咎此藥耳丁香爛飯丸治冷食傷太陰又治卒心胃痛丁香木香廣朮炮京三稜炮各一錢甘草炙丁香皮各二錢縮砂仁益智仁各三錢香附子五錢甘松淨二錢上為末湯浸蒸餅為丸如綠豆大每服三十丸白湯下十香丸治傷冷食膈滿脹痛或氣滯積聚皆可服之甘松炒益智仁炒香附子各四兩青皮醋炒陳皮去白蓬朮京三稜各二兩砂仁一兩五錢木香甘草炙各一兩上為末水浸蒸餅為丸桐子大每服五十丸食前薑湯下大七香丸治脾胃虛冷心膈噎塞漸成膈氣脾泄瀉利反胃嘔吐香附子二兩麥蘖一兩丁香皮三兩五錢縮砂仁藿香官桂陳皮甘草各二兩五錢甘松烏藥各六錢五分上十味為末蜜丸彈子大每服一丸酒鹽湯任嚼下忌生冷肥膩物或丸如桐子大每服三十丸小七香丸溫中快膈化積和氣治中酒嘔逆氣膈食噎茶酒食積小兒疳氣甘松八兩益智仁六兩香附子炒丁香皮甘草炙各十二兩蓬朮煨縮砂各二兩上為末蒸餅為丸如綠豆大每服二十丸溫酒薑湯熱水任下集香丸寬中理氣消酒逐痰進美飲食縮砂仁丁香皮各五錢甘草七錢五分麥蘖七錢甘松一兩二錢五分香附子一兩五錢丁香白檀香益智各二錢五分白豆蔻木香蓬朮沉香各三錢五分一方加神麯上為末薑汁浸蒸餅為丸如雞頭實大細嚼下木香餅子治同集香丸香附子川芎木香吳白芷薑黃炮砂仁甘松桂去浮皮各二兩甘草一兩五錢上為細末水浸蒸餅為丸生薑湯白湯任下十餅至十五餅木香餅子縮砂仁十二兩廣朮十兩甘松五兩水洗木香四兩五錢檀香四兩丁香二錢五分上為細末甘草膏丸每兩作二百五十丸捏作餅子檳榔丸消宿食破滯氣檳榔三錢木香人參各二錢陳皮五錢甘草一錢上為末蒸餅丸每服二三十丸食前白湯下以上俱消導冷食之劑傷輕者選用消積集香丸治寒飲食所傷心腹滿悶疼痛及消散積聚痃癖氣塊久不愈者木香陳皮青皮京三稜炮廣朮炮黑牽牛炒白牽牛炒茴香炒各五錢巴豆半兩不去皮用白米一勺同炒米黑去米上為末醋糊丸如桐子大每服七丸至十丸溫薑湯下無時以利為度忌生冷硬物木香見晛丸治傷生冷硬物心腹滿悶疼痛巴豆霜五分京三稜煨神麯炒石三稜去皮穰各一兩木香二錢香附炒五錢升麻三錢柴胡三錢草豆蔻麵裹煨五錢上為末湯浸蒸餅為丸如綠豆大每服一二十丸白湯送下三稜消積丸治傷生冷硬物不能消化心腹滿悶京三稜炮七錢廣朮炮七錢青皮陳皮各五錢丁香皮益智各三錢神麯炒七錢茴香炒五錢巴豆和米皮炒焦去米五錢上為細末醋糊丸如桐子大每服十丸至二十丸溫薑湯下食前量虛實加減得更衣止後服備急丹治傷寒冷之物心腹卒痛如錐刺及脹滿不快氣急諸卒暴百病錦紋川大黃乾薑巴豆先去皮膜心去油用霜上三味各另為末等分同一處研勻煉蜜成劑杵千餘下丸如大豌豆大夜臥溫水下一丸如氣實者加一丸如卒病不計時候服婦人有孕不可服神保丸治心膈痛腹痛血痛腎氣痛脅下痛大便不通氣噎宿食不消木香胡椒各二錢五分巴豆十枚去皮油心膜研乾蠍七枚上四味為末湯浸蒸餅為丸麻子大硃砂三錢為衣每服五丸如心膈痛柿蒂燈心湯下如腹痛柿蒂煨姜煎湯下如血痛炒姜醋湯下如腎氣痛脅下痛茴香酒下如大便不通蜜調檳榔末一錢下如氣噎木香湯下如宿食不消茶酒漿飲任下雄黃聖餅子治一切酒食所傷心腹滿悶不快雄黃五錢巴豆一百個去油心膜白麵十兩重羅過上三件除白麵余同為細末共面和勻用新水和作餅子如手大以水再煮浮於湯上漉出看硬軟捏作餅子如桐子大每服五七餅加至十餅十五餅嚼食一餅利一行二餅利二行食前茶酒任下感應丸治虛中積冷氣弱有傷停積胃脘不能傳化或因氣傷冷因飢飽食飲酒過多心下堅滿兩脅脹痛心腹大疼霍亂吐瀉大便頻後重遲澀久痢赤白膿血相雜米穀不化愈而復發又治中酒嘔吐痰逆噁心喜唾頭旋胸膈痞滿四肢倦怠不思飲食不拘新舊冷積並皆治之木香肉豆蔻丁香各一兩五錢乾薑炮一兩巴豆七十個去皮心膜研出油杏仁一百四十粒湯泡去皮尖研百草霜二兩上前四味為末外入百草霜杏仁巴豆同和勻用好蠟六兩熔化成汁以重絹濾其渣更以好酒一升於銀石器內煮蠟數沸傾出候酒冷其蠟自浮於上取蠟秤用丸春夏修合用清油一兩銚內熬令香熟次下酒煮蠟四兩同化成汁就銚內乘熱拌和前藥末秋冬修合用清油一兩半成劑分作小錠子油紙裹旋丸每服三五丸空心薑湯下海藏神應丸治一切冷物冷水及乳酥所傷小腹痛腸鳴水穀不化丁香木香各二錢巴豆杏仁百草霜乾薑各五錢黃蠟二兩上先將黃蠟用好醋煮去渣穢將巴豆杏仁同炒黑煙盡研如泥將黃蠟再上火春夏入香油半兩秋冬八錢溶開下杏仁巴豆攪勻次下丁香木香等藥末研勻搓作錠子油紙裹旋丸桐子大每服三五丸溫米湯送下食前日三服大有神效丁香脾積丸治諸般食積氣滯胸膈脹滿心腹刺痛良薑醋煮丁香木香巴豆去油各五錢莪朮三稜各一兩青皮一兩皂莢燒三片百草霜三匙上為末麵糊丸麻子大每服十丸至二十丸五更白湯下利去三五行以粥補住如止是脾積氣陳皮煎湯下吐酸薑湯下夏月嘔吐藿香甘草湯下小腸氣炒茴香酒下婦人血氣刺痛醋湯下冬月嘔吐菖蒲湯下小兒疳氣使君子煎湯下如意丸治氣虛積冷停食不消心下堅痞噫宿腐氣及霍亂吐瀉水穀不化一切食積之疾並皆治之半夏湯洗三稜莪朮枳殼去穰檳榔陳皮乾薑黃連各三兩巴豆三十七粒連殼同用上銼如豆大用好醋煮乾焙為末薄糊丸如綠豆大每服十丸至二十丸食後用茶清薑湯任下孕婦不宜服阿魏丸治脾胃怯弱過食肉面生果之物停積中焦不能克化以致腹脹刺痛嘔惡不食或利或秘並皆治之阿魏酒浸化官桂不見火蓬朮炒麥芽炒神麯炒青皮去白蘿蔔子炒白朮乾薑炮各半兩百草霜三錢巴豆去皮心膜油七個上為末薄糊丸如綠豆大每服二十丸面傷麵湯下生果傷麝香湯下化滯丸理一切氣化一切積奪造化有通塞之功調陰陽有補瀉之妙久堅沉痼磨之自消暴積乍留導之自去南木香堅實者不見火丁香去苞不見火青皮四花者去穰橘皮去白黃連大者各二錢半半夏為末薑汁和餅陰乾二錢半京三稜慢火煨蓬朮慢火煨各四錢八分巴豆去心膜以瓦器醋浸一宿熬干六錢烏梅取肉焙乾為末五錢用米醋調略清慢火熬成膏和入前藥上各製為極細末通和勻用白麵八錢水調得所慢火打糊為丸如黍米大每服五丸七丸人盛者十丸空心橘皮湯下常服磨滯不欲通泄津液嚥下停食飽悶枳殼湯下但有所積之物取本汁飲冷下因食吐不止津液嚥下即止食瀉不休及霍亂嘔吐俱用冷水下若赤痢冷甘草湯下白痢冷乾薑湯下赤白痢冷甘草乾薑湯下心痛石菖蒲湯下諸氣痛生薑橘皮湯下小腸氣痛茴香湯下若婦人血氣痛當歸湯下一云當歸酒下孕婦不宜服如小兒量歲數加減用疳積常服米飲下不拘時若欲宣通滾薑湯下仍加丸數未利再服利多飲冷水一口即止此藥得熱則行得冷則止煮黃丸治飲食過多心腹脹滿脅肋走氣痃癖刺痛如神雄黃研一兩巴豆去皮心研如泥五錢上入白麵二兩同研勻滴水丸如桐子大滾漿水煮十二丸濾入冷漿水內令沉冷每用時用浸藥冷漿下一丸一日十二時盡十二丸以微利為度不必盡劑以上俱逐推冷食之劑傷輕者選用治傷肉食方寬中丸治胸膈痞悶停滯飲食及一切肉食不化腹脹發熱山楂不拘多少蒸熟曬乾上為末神麯糊丸如桐子大每服七八十丸白湯下獺肝丸治食魚鱠不消生瘕常欲食鱠者獺骨肝肺大黃各八分蘆根鶴骨各七分桔梗五分乾薑桂心各四分斑蝥炙二十一枚上為細末煉蜜丸如桐子大酒服十丸至十五丸日再瘥仲景方治食鱠在心胸間不化吐不出速下除之久成症病陳皮一兩大黃朴硝各二兩上三味用水一大升煮取半升頓服消又方用馬鞭草搗汁飲又飲姜葉汁一升亦消又可服吐藥吐之一方治食狗肉不消心下堅或腹脹口乾大渴心急發熱狂言妄語或洞下用杏仁一升去皮研以沸湯三升和絞汁三服狗肉原片皆出淨一方以蘆根水煮汁飲之消治傷食挾外感方行氣香蘇飲治內傷生冷飲食厚味堅硬之物肚腹脹滿疼痛外感風寒濕氣頭痛身熱憎寒遍身骨節麻木疼痛七情惱怒相沖飲食不下心腹氣痛紫蘇陳皮香附烏藥川芎羌活枳殼麩炒麻黃蒼朮甘草上銼生薑三片水煎溫服外感風寒加蔥白三根內傷飲食加山楂神麯沖和湯即參蘇飲加木香人參紫蘇半夏制陳皮去白茯苓木香枳殼炒乾葛前胡桔梗甘草各等分上銼每服一兩加生薑七片棗一枚水煎服和解散治四時傷寒頭痛煩躁自汗咳嗽吐利蒼朮去皮一斤厚朴去粗皮薑汁製陳皮洗各四兩藁本桔梗甘草各半斤上為粗末每服三錢水一盞半姜三片棗二枚煎七分不拘時熱服治傷酒方葛花解酲湯治飲酒太過嘔吐痰逆心神煩亂胸膈痞塞手足戰搖飲食減少小便不利青皮三分木香五分橘皮去白人參豬苓白茯苓各一錢五分神麯炒澤瀉乾生薑白朮各二錢白豆蔻葛花砂仁各五錢上為極細末每服三錢白湯調下但得微汗酒病去矣此蓋不得已而用之豈可恃此日日飲酒此方氣味辛辣偶因病酒服之則不損元氣何者敵酒病也葛花湯治傷酒之仙藥能上下分消其濕葛根面小豆花藿香葉白豆蔻益智仁縮砂仁香附子車前子葛花葛蕊白檀木香丁香沉香橙皮陳皮姜屑官桂白朮澤瀉茯苓人參甘草各等分上為細末湯點服酒調亦得姜糊丸桐子大酒下之亦可服畢但鼻準微汗即解枳實半夏湯治酒停胸膈為痰飲者枳實麩炒半夏各等分加麥芽一方並加神麯上銼每服七錢水二盞生薑五片煎八分溫服無時加味二陳湯治傷酒惡心嘔逆吐出宿酒昏冒眩暈頭痛如破陳皮半夏茯苓甘草黃連乾葛各一錢上銼加生薑三片水煎服中暑門縮脾飲亦可用或五苓散用乾葛煎湯調服加味沖和湯治多飲結成酒癖腹中有塊隨氣上下紫蘇葉一錢半乾葛前胡桔梗枳殼橘紅半夏茯苓黃連各一錢人參木香甘草各五分蓬朮七分上加生薑三片水煎食遠服如熱盛去木香加黃芩柴胡酒煮黃連丸治久困於酒遂成酒積腹痛泄瀉或暴飲有灰酒亦能致之黃連十二兩好酒五升上將黃連以酒煮乾碾末用神麯打糊為丸如桐子大每服七八十丸食前白湯下曲芽丸治酒積癖不消心腹脹滿噫酸嘔逆不食脅肋疼痛神麯炒麥芽炒各一兩黃連半兩銼同巴豆三粒炒黃去巴豆上為細末沸湯搜和丸如桐子大每服五十丸食前薑湯下三制三黃丸治飲酒心下痞黃芩去枯酒浸一半火炒一半生用一半上三停分兩勻為細末糊丸桐子大每服三十丸溫水送下量輕重加減此治熱酒所傷若傷冷酒則下神應丸烏梅丸治酒毒化痰消食烏梅一斤半夏白礬各八兩生薑二兩上四味為細末以新瓦兩片夾定火焙三晝夜次入神麯麥芽陳皮青皮蓬朮枳殼丁香皮大腹子各四兩上共為細末水糊丸如桐子大每服四五十丸薑湯下百杯丸治酒停胸中膈氣痞滿面色黃黑將成癖疾飲食不進日漸羸瘦如欲飲者先服不醉生薑一斤去皮切片以鹽二兩醃一宿焙乾橘紅乾薑各三兩廣朮炮三錢三稜炮甘草炙各二錢丁香五十枚白豆蔻砂仁各三十粒益智仁二十粒木香茴香炒各一錢上為末煉蜜丸每兩作五丸硃砂為衣生薑湯細嚼下解酒化毒丹治飲酒過度遍身手足發熱口乾煩渴小便赤少白滑石水飛一升白粉葛大粉草各三兩上為末每服三錢冷水熱湯任調服日進二三次不拘時一方治中酒不醒及傷食巴豆去油三粒烏梅二枚丁香三粒胡椒五粒上為末入飯同搗二三千下為丸如桐子大細嚼丁香湯下五七丸小兒一丸一方治飲酒房勞受熱積日不食四月中熱飲酒不已酒入百脈心氣令人錯謬失常人參芍藥白薇瓜蔞根枳實知母各一錢生地黃酸棗仁各二錢茯神一方作茯苓一錢半甘草五分上㕮咀水煎服神仙列仙散治飲酒所傷以致遍身疼痛腰腳強跛手足煩麻胃脘疼痛胸膈滿悶肚腹膨脹嘔吐瀉利及酒食停久一應積聚黃疸熱臌並皆治之木香沉香茴香微炒檳榔各一錢萹蓄二錢瞿麥五錢麥芽一兩半大黃微炒焙一兩上為末每服三五錢五更熱酒調下能飲者多飲二三杯不妨仰面臥手叉胸前至天明取下大便如魚腦小便如血為效忌生冷硬物及葷腥只啖米粥烏梅丸消酒食神效神麯炒烏梅麥芽龍腦葉上為末以甘草煎膏子為丸硼砂丸消酒清膈硼砂三錢薄荷一錢冰片麝香各五分上為末以甘草膏子為丸辰砂為衣酒症丸治飲酒過度頭旋噁心嘔吐酒停遇酒即吐久而成癖者雄黃如皂角子大巴豆不去油皮蠍梢各十五枚上研細入白麵五兩半水和丸如豌豆大候稍干入麩炒香將一丸放水中浮即去麩每服二丸溫酒下茶亦可一方治飲酒頭痛竹茹五兩以水八升煮取五升去渣令冷納破雞子五枚攪勻更煮二沸飲二升使盡瘥一方治飲酒腹滿不消煮鹽湯以竹筒灌大孔中一方治飲酒中毒煮大豆三沸飲汁三升一方搗茅根汁飲三升一方酒漬干椹汁服之一方治惡酒健嗔取空井中倒生草燒灰飲之勿令知一方取其人床上塵和酒飲之一方飲酒令無酒氣干蔓菁根二七枚蒸三遍為細末每服二錢許酒後水調服一方治酒醉不醒又治大醉連日煩毒不堪葛根絞汁一斗二升飲取醒止一方用菘子二合研細並水調服一方治連月飲酒咽喉爛舌上生瘡火麻仁一升黃芩二兩肘後方用黃柏上為末蜜丸含之一方治酒醉中酒恐爛五臟以湯著槽中漬之冷復易夏亦用湯凡醉不得安臥不動必須使人搖轉不住特忌當風席地及水洗飲水交接蔥豉湯治酒病蔥白豆豉各一升以水四升煮取二升頓服益脾丸治飲酒不醉又益脾胃葛花二兩小豆花一兩綠豆花五錢木香二錢半上件為末蜜丸如梧子大每十丸紅花湯下或夜飲津液下五丸最妙一方有草豆蔻一兩去皮葛花散飲酒令人不醉葛花小豆花各一兩上件為末每服三錢仍進葛汁及枇杷葉飲倍能飲酒不醉方綠豆小豆葛根等分上為末當未飲酒之前用冷水調一匙或二匙服之令人不醉不醉丹白葛花天門冬白茯苓牡丹蕊小豆花縮砂仁葛根官桂甘草海鹽木香澤瀉人參陳皮枸杞上為細末煉蜜丸如彈子大每服一丸細嚼熱酒下一丸可飲十盞十丸可飲百盞萬杯不醉丹白葛根四兩青鹽水浸一夜取出曬乾白果芽白果內青芽一兩蜜浸一日砂鍋內焙乾細芽茶四兩綠豆花四兩陰乾葛花一兩童便浸七日焙乾豌豆花五錢菊花蕊未開口菊青朵頭四兩真牛黃一錢陳皮四兩青鹽水浸一日以上青鹽用一兩水化青鹽四兩盛入牛膽內煮一炷香同膽皮井用上共為細末用膽汁為丸如桐子大飲酒半醉吞一丸其酒自解再飲時再服如此經年不醉橙香丸一名萬杯丸木香沉香各二錢白檀甘草各半兩橙皮葛面各一兩橘紅一兩半白豆蔻益智子砂仁各三十枚生薑四兩切破鹽醃一宿曬乾或焙乾秤二錢半上為細末水浸蒸餅為丸如桐子大細嚼一二十丸白湯下或減甘草用甘草膏子丸百杯丸縮砂仁高茶各一兩訶子一個麝香一錢腦子少許上為細末煉蜜丸每一兩作十丸未飲酒先細嚼一丸酒下一方飲酒令人不醉柏子仁麻子仁各二兩上為末一服進酒三倍一方雞肶胵乾葛等分上為末麵糊丸如桐子大每服五十丸酒送下一方九月九日採甘菊花為末飲酒時服方寸匕一方小豆花陰乾百日為末服之一方五月五日取井中倒生草枝陰乾為末酒服之斷酒方酒七升著瓶中熟硃砂半兩著酒中急塞瓶口安著豬圈中任豬搖動經七日取酒盡飲又方故氈中菒耳子七枚燒作灰黃昏時暖一杯酒咒言與病狂人飲也勿令知之後不喜飲酒也又方白豬乳汁一升飲之永不飲酒一方刮馬汗和酒與飲終身不飲一方白狗乳汁酒服之一方鸕鷀屎燒灰水服方寸匕永斷一方自死蠐螬干搗末和酒與飲永世聞酒即嘔神驗一方酒客吐中肉七枚陰乾燒末服之一方故紡車弦燒灰和酒與服治傷飲方五苓散治煩渴飲水過多或水入即吐心中淡淡停濕在內小便不利肉桂一兩茯苓豬苓白朮各一兩半澤瀉二兩半上為細末每服二錢熱湯調服不拘時候服訖多飲熱湯有汗出即愈傷冷飲者煎五苓散送半夏枳朮丸傷飲不惡寒胸中微覺夯悶身重飲食不化者或小便不利者五苓散去桂依煎斟酌服之如瘀熱在裡身發黃疸濃煎茵陳湯調下食前服之如疸發渴及中暑引飲亦可用水調服除濕散治傷馬牛乳酪及冷水一切冷物茯苓七錢澤瀉車前子炒各五錢半夏湯泡乾薑各三錢甘草炙紅花各二錢上為細末每服三錢食前白湯調下導飲丸治水飲蒼朮白茯苓各一兩獨活七錢黃連五錢吳茱萸三錢上為細末神麯糊丸服茱萸丸治水飲滑石六兩甘草吳茱萸各一兩上為末水丸服豆蔻平胃散治胃寒飲不消蒼朮陳皮厚朴甘草白豆蔻人參茯苓各等分上加生薑水煎服枳朮湯治心腹堅大如盤飲水所作名曰氣分枳實白朮各等分上銼加荷葉少許水煎服
