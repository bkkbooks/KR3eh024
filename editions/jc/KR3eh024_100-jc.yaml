筆管吹入耳內或膿或濕不拘老幼數次即痊通耳方治通耳並耳聾用白礬一兩飛過為末用馬耳竹筒量吹入耳立愈耳聾作啞者治之亦效耳爛方用貝母研末干撒之治凍耳方用橄欖核燒灰清油調敷雀腦亦可一方生薑取自然汁熬膏擦治百蟲入耳方用椒末一錢醋半盞浸良久少少滴入耳中蟲自出一方用生薑擦貓鼻其尿自出取尿滴耳內蟲即出一方用桃葉搗爛塞耳中蟲自出一方火熨桃葉塞耳中一方用炒芝麻枕之則蟲亦出一方用香油灌入耳即出一方用麻油滴之則蟲死一方用雞冠血滴入耳即出一方用驢牛乳灌入即出一方以蔥汁灌耳中即出一方搗韭汁灌之一方用藍汁一方用竹管入耳門用口氣盡力吸出最妙一方取車轄脂敷耳孔蟲自出亦治聤耳膿血治諸蟲及蝨等入耳方用白膠香一味燒焰熏入耳令耳孔內暖蟲自出妙治蟻入耳方以大韭搗汁灌耳中一方以鯪鯉甲燒灰為末調濾過滴入耳中即出治蜈蚣入耳方用豬脂一指大炙令香安耳邊即出一方用炙豬肉掩兩耳即出一方以雞肉置耳邊自出治飛蟲入耳方用好酸醋一味滴入耳內蟲必出不出即死曾有一人被焦蟲入耳其蟲口硬如鐵但身軟用此藥滴之立死而出治飛蛾入耳方以鵝管極氣吸之出或擊銅器於耳旁即出治蚰蜒入耳方用半夏生為末麻油調塗耳門蟲聞香即出一方用濕生蟲研如泥攤紙上燃成紙條安耳中自出一方用蝸牛蟲去殼研爛滴水五七點再研勻灌耳內自出無活者尋乾者研亦可一方炒胡麻搗碎以葛袋盛傾耳枕之即出一方以羊乳灌入即成水一方以牛酪灌耳中須臾出入腹即飲酪二升自消為水不盡更服之神效千金翼作牛乳一方以鹽少許擦耳內即化為水治蚰蜒及諸般蟲人耳方麻油灌入或用生蔥汁生薑汁亦可治耳中有物不出方以細麻繩剪令頭散蘸好膠入耳中著物上黏之徐徐引出治水入耳方以薄荷點立效卷一百零四鼻病論選要論曰鼻者清氣出入之道路也脈為氣之主通竅於鼻陰陽升降氣血和平則一呼一吸榮衛行焉自然氣息調停而香臭辨矣若或七情內蠹六氣外傷則清濁不分泥丸汩亂諸證迭起矣夫血之與氣相通而行若臟腑生熱乘於血氣故熱氣逼血妄行上自鼻孔中出謂之鼻衄熱則津液中干冷則髓涕流注若風冷隨氣乘於鼻腦則津液交流不能自收謂之流涕鼻淵是也肺為風寒所傷津液冷滯鼻氣不宣香臭不聞於是壅作鼻齆冷氣停聚血脈陰凝歲月淹延轉加壅結於是變生瘜肉或氣壅滯於上為邪熱留伏不散則為鼻瘡久則變為疳䘌腐潰臭汁治之當究其所因衄則以降火涼血之劑清之冷則宜溫散之壅則宜通利之熱則宜清涼之風則宜祛解之息肉者消之瘡而疳䘌者宜解毒清肺而理之劉河間謂鼻病悉屬乎熱理固當矣然鼻者肺之候經云形寒飲冷則傷肺蓋肺受寒邪則先見於鼻若驟用寒涼之劑使鼻氣壅塞不能通惟當溫散寒邪則氣自通矣經云視聽明而清涼香臭辨而溫暖此之謂也汩音鼓亂也書洪範汩陳其五行言五行陳列皆亂也虞氏曰內經曰西方白色入通於肺開竅於鼻又曰鼻之外候丹溪曰肺之為臟其位高其體脆性惡寒又惡熱是故好飲熱酒者始則傷於肺臟鬱熱久則見於外而為鼻齇准赤之候得熱愈紅得寒則黑此謂熱極似水之象亢則害承乃制也其或觸冒風寒始則傷於皮毛而成鼻塞不通之候或為濁涕或流清汁久而不已名曰鼻淵此為外寒束內熱之證也原病式曰肺熱則出涕是也又有膽移熱於腦則為辛頞鼻淵鼻淵者濁流不止也鼻中流涕如湧泉不滲而下久而不已則為鼻蔑衄血塞肉鼻癰等證宜各以類推而治之東垣曰金匱真言論云西方白色入通於肺開竅於鼻藏精於肺夫十二經脈三百六十五絡其氣血皆上走於面而走空竅其精陽氣上走於目而為睛其彆氣走於耳而為聽其宗氣出於鼻而為臭難經云肺氣通於鼻肺和則能知香臭矣夫陽氣宗氣者皆胃中生髮之氣也其名雖異其理則一若因飢飽勞役損脾胃生髮之氣既弱其營運之氣不能上升邪塞孔竅故鼻不利而不聞香臭也宜養胃氣實營氣陽氣宗氣上升鼻管則通矣又一說難經云心主五臭肺主諸氣鼻者肺竅反不聞香臭者何也蓋以竅言之肺也以用言之心也因衛氣失守寒邪客於頭面鼻亦受之不能為用是不聞香臭矣故經曰心肺有病鼻為之不利潔古曰視聽明而清涼香臭辨而溫暖者是也治法宜先散寒散後補衛氣使心肺之氣得交通則鼻利而聞香臭矣丹溪曰鼻為肺之竅因心肺上病而不利也有寒有熱寒邪傷於皮毛氣不利而壅塞熱壅清道氣不宣通寒則表之麻黃桂枝之類熱則清之黃連山梔之類面鼻紫黑面為陽中之陽鼻居面中一身之血運到面鼻皆為至清至精之血多酒之人酒氣熏蒸面鼻得酒血為極熱熱血得冷汙濁凝結而不行故色紫黑治宜化滯血生新血四物加片芩酒炒紅花酒拌茯苓陳皮甘草生薑煎調五靈脂末服氣弱加黃芩酒浸酒齇鼻乃熱血入肺治用前方用桐油入黃連以天吊藤燒油熱敷之齇鼻瘜肉乃肺氣盛枯礬研為末綿裹塞鼻中日漸消防風通聖散加好三稜山茱萸肉海藻並用酒浸炒末每一錢半服之鼻淵膽移熱於腦則辛酸鼻淵通聖散一兩加薄荷黃連各二錢半水煎服戴氏曰酒齇鼻屬肺風有不能飲而自生者非盡因飲酒酒齇乃俗呼耳用硫黃入大菜頭內煨研塗之王節齋曰鼻塞不聞香臭或但遇寒月則塞或略感風寒便塞不時舉發者世俗皆以為肺寒而用解表通利辛溫之藥不效殊不知此是肺經素有火邪火鬱甚則喜得熱而惡見寒故遇寒便塞遇感便發也治法清肺降火為主而佐以通氣之劑若如常鼻塞不聞香臭者再審其平素祗作肺熱治之清金瀉火消痰或丸藥噙化或末藥輕調緩服久服無不效矣此予所親見而治驗者其平日原無鼻塞舊證一時偶感風寒而致窒塞聲重或流清涕者當作風寒治李氏曰鼻竅於肺而能知香臭者心也人身水升火降榮衛調和則鼻司呼吸往來不息苟或寒傷皮毛則鼻塞不利火鬱清道則香臭不知新者偶感風寒鼻塞聲重流涕噴嚏宜以風寒治之九味羌活湯參蘇飲消風百解散久則略感風寒鼻塞等證便發乃肺伏火邪郁甚則喜熱惡寒故略感冒而內火便發宜清金降火兼通氣之劑涼膈散加荊芥白芷或川芎石膏散又有不必外感四時鼻塞乾燥不聞香臭宜清金降火消痰之藥清氣化痰丸小清丸古方鼻塞甚者禦寒湯澄茄丸不知香臭者通氣湯內有硬物者單南星飲貼囟蓽撥餅外用石菖蒲皂角等分為末綿包塞鼻仰臥片時虛寒者通草丸鼻乃清氣出入之道清氣者胃中生髮之氣也鼻塞久則氣壅不轉熱鬱於腦清濁混亂為鼿音兀以鼻搖動也為衄為淵鼿者鼻流清涕熱微二陳湯加芎歸細辛白芷防風羌活桔梗等分姜煎入薄荷少許久不止者芷荑散去薄荷加荊芥黃芩神麯南星半夏等分食後煎服外用細辛膏淵者鼻流濁涕熱盛金沸草散倍黃芩入鳳凰殼一枚燒存性調服肺風消風散加發灰肺火流涕咳吐膿血桔梗湯人參平肺散膽移熱於腦流涕濁臭防風通聖散加薄荷黃連或芷荑散外用蒼耳根莖苗子燒灰醋調塗鼻內有流臭黃水者甚則腦亦作痛俗名腦砂有蟲食腦中用絲瓜藤近根五尺燒存性為末酒調服虛者川烏散外用白牛尾毛橙葉等分為末吹鼻中倘有血出加山梔亦不妨衄者鼻流清血鼻淵久則必衄防風散主之詳衄血門酒齇準頭紅也甚則黑紫因飲酒血熱入肺覆被風寒郁久則血凝濁而色赤或不飲者乃肺風血熱俱宜四物二陳湯去半夏加紅花黃芩水煎入酒少許調五靈脂末服氣虛加黃耆常服宜單山梔丸或黃連阿膠丸間用升麻和氣飲吞瀉青九以除病根外用黃連末天吊藤燒灰桐油調敷或硫粉散鼻痛因風邪入鼻與正氣相搏鼻道不通故痛藿香正氣散祛風通氣散有痰火沖肺者鼻膈隱痛二陳湯加黃芩山梔桔梗麥門冬輕為鼻瘡重為鼻痔皆肺熱也鼻中生瘡者枇杷葉煎湯候冷調消風散食後服忌煎炒姜蒜熱物外用辛荑為末入腦麝少許綿裹塞鼻鼻痔肺氣熱極日久凝濁結成瘜肉如棗滯塞鼻甕甚者又名鼻齆宜防風通聖散加三稜海藻末調服外用辛荑為君細辛杏仁少許為末和羊髓豬脂熬膏候冷入雄黃白礬輕粉麝香少許為九綿裹塞鼻數日即脫甚者加硇砂少許或瓜礬散亦妙又食積熱痰生痔者單蒼耳丸內服外敷最消食積或用白礬二錢細辛一錢白芷五分為末塞鼻風寒外感者溫以散之風熱有自內郁者或外感久則鬱而為熱或內因飲食衣服過暖肝熱生風亦鼻塞流涕宜降火清金凡鼻涕鼽渠尤切音裘鼻塞曰鼽鼽久也涕久不通遂至窒塞也禮月令季秋行夏令民多鼽嚏淵鼽久甚不愈者非心血虧則腎水少養血則血生而火自降補腎則水升而金自清雖鼻瘡痔久亦宜又鼻塞久不愈者必內傷肺胃清氣不能上升亦非外感也宜補中益氣湯以和之此皆治本之論統旨曰鼻尖亦可以察病色黃青者淋也微白者亡血也赤者血熱也黃者小便難也脈法左寸脈浮緩為傷風鼻塞鼻流清涕右寸脈浮洪而數為鼻衄鼻齇治鼻塞方通竅湯治肺感風寒鼻塞聲重流涕防風羌活藁本升麻乾葛川芎蒼朮各一錢白芷五分麻黃川椒細辛甘草各三分上銼一劑加生薑三片蔥白一根同煎熱服麗澤通氣湯治鼻不聞香臭黃耆一錢六分蒼朮一錢二分羌活獨活防風升麻葛根白芷甘草炙各八分麻黃存節冬加之川椒各四分上㕮咀每服五錢生薑三片棗二枚蔥白三寸水煎食遠溫服忌一切冷物及風寒處坐臥行立溫肺湯治鼻不聞香臭眼多眵淚麻黃四錢不去節升麻黃耆各二錢羌活防風葛根甘草炙各一錢丁香二分上為粗末分二服每服水二盞蔥白二莖煎至一盞去渣稍熱食遠服禦寒湯治寒氣風邪傷於皮毛令人鼻塞咳嗽上喘黃耆一錢蒼朮七分人參升麻陳皮各五分防風白芷款冬花佛耳草甘草炙各三分羌活黃柏黃連各二分上作一服水煎稍熱食遠服溫衛湯治鼻不聞香臭目中溜火氣寒血熱冷淚多臍下冷陰汗足痿弱黃耆蒼朮升麻柴胡羌活知母當歸身各一錢人參甘草白芷防風黃柏澤瀉各五分陳皮青皮木香黃連各三分上㕮咀作一服水煎食遠日晴明服之防風湯治鼻塞不聞香臭防風半兩升麻一兩麻黃七錢半木通一兩二錢半梔子七枚石膏研三兩官桂五錢上㕮咀每服三錢水煎食後溫服日再羌活散治腦有鬱熱遇寒鼻塞羌活麻黃去根節前胡白茯苓川芎黃芩蔓荊子枳殼麩炒細辛防風石膏菊花甘草各等分上㕮咀每服一兩生薑四片薄荷三葉水煎溫服人參湯治肺氣上攻鼻塞不通人參茯苓黃芩陳皮去白羌活麻黃去根節蜀椒去目及閉口者炒去汗各一錢半上作一服水煎食後服增損通聖散治肺氣不和鼻塞不利鼠黏子桔梗桑白皮紫菀各一錢半荊芥穗二錢甘草生用七分上㕮咀作一服加生薑五片水煎食後服辛荑湯治肺氣不利頭目昏眩鼻塞聲重咯唾稠黏辛夷去毛川芎白芷甘菊花前胡石膏白朮陳皮去白生地黃赤茯苓薄荷各一兩甘草炙二兩上銼每服五錢水煎食遠服犀角散治肺熱鼻乾無涕心神煩悶犀角屑木通升麻赤茯苓黃耆馬牙硝杏仁去皮尖炒各半兩麥門冬去心一兩硃砂研龍腦研甘草炙各一分上為細末每服一錢食後竹葉湯調下通關散治腦風鼻息不通不聞香臭或鼻流清涕多嚏肩項拘急頭目昏痛惡風怯寒白附子炮原蠶蛾瓦上焙黃益智去皮蒺藜炒去角薄荷苦參各一兩上為細末每服三錢溫酒調下不拘時一方治鼻不聞香臭細辛白芷防風羌活當歸川芎半夏桔梗陳皮茯苓各一錢薄荷三錢上銼一劑水煎食遠服蓽澄茄丸專治鼻塞不通蓽澄茄五錢薄荷葉三錢荊芥穗一錢半上為末煉蜜丸如芡實大每服一丸噙化津嚥下菖蒲散治鼻內窒塞不通不得喘息菖蒲皂角各等分上為細末每用一錢綿裹塞鼻中仰臥少時通草散治鼻齆氣息不通不聞香臭並鼻瘜肉木通細辛附子各等分上為末蜜和綿裹少許納鼻中透天丸治鼻孔壅塞不聞香臭久不愈者雄黃龍腦葉石菖蒲各二兩片腦二錢上各另為細末入片腦同研蜜丸如雞頭肉大絹帛包裹紮作紐子入鼻孔即效一方治鼻不聞香臭多年者亦治用生蔥分作三段早用蔥白午用蔥管中截晚換管末梢一截塞入鼻中令透里方效一方治鼻塞不通用小薊一把水二升煮取一升去渣分服治鼻淵方防風湯治鼻淵腦熱滲下濁涕不已久而不已必成衄血之疾防風二錢黃芩人參甘草炙川芎麥門去心各一錢半上為細末每服二錢食後白湯調服日三服腦漏加辛夷一錢細辛五分防風通聖散加黃連薄荷煎服亦可辛夷散治肺虛為四氣所幹鼻內壅塞涕出不已或氣息不通或不聞香臭辛夷仁川芎木通細辛防風羌活一方無此味藁本升麻白芷甘草炙各等分上為細末每服二錢食後茶清調服蒼耳散治鼻流濁涕不止名曰鼻淵辛夷仁半兩蒼耳子炒二錢半白芷一兩薄荷葉五分一方五錢上為末每服二錢蔥茶清食後調下丹溪方治鼻淵屬濕熱痰積者南星半夏蒼朮白芷神麯酒芩辛荑荊芥各等分上為末水調食後服一方治右鼻管流濁涕有穢氣脈右寸滑乃濕熱痰積也酒芩一兩蒼朮半夏各一兩白芷石膏人參葛根各半兩上銼分七帖服之全愈補腦散治陽虛腦寒鼻淵者天雄炮辛夷仁蒼耳茸各等分上為末每服二錢食後酒調下單南星飲治風邪入腦宿冷不消鼻內結物窒塞腦氣遂流濁髓南星一味為末每服二錢用棗七枚甘草少許同煎食後服三四服後其硬物自出腦氣流轉濁涕自收外用蓽撥餅天竺黃丸治鼻淵當歸川芎白芷人參茯苓麥門冬防風荊芥薄荷蒼耳子香附子秦艽甘草各一錢天竺黃三錢上為細末煉蜜丸如桐子大每服三四十丸米湯下秘方治鼻中時時流臭黃水甚者腦亦時痛俗名控腦砂有蟲食腦中用絲瓜藤近根三五尺許燒灰存性為細末酒調服之即愈川烏散治鼻流臭黃水防風白附子川烏甘草節川芎白芷細辛乾薑菖蒲茯苓各等分上為末每服三錢蔥湯調下一方治鼻淵並臭名控腦砂宿香二錢去白橙葉焙乾二錢白牛毛二錢沉香雄黃皂角各少許上為末吹入鼻中倘有少血出不妨血出加梔子治鼻鼽方細辛散治肺傷風冷鼻流清涕頭目疼痛胸膈不利細辛一兩訶梨勒煨去核附子炮去皮臍白朮蔓荊子川芎桂心各七錢半枳殼麩炒甘草炙各五錢上㕮咀每服三四錢加生薑三片水煎食後服丹溪方治肥人鼻流清涕乃飲食痰積也蒼朮片芩南星川芎白芷辛夷甘草各等分上或未或丸皆可白湯下一方治鼻塞清涕出腦冷所致通草辛夷各半兩細辛甘遂桂心芎藭附子各一兩上為細末蜜丸綿裹納鼻中密封勿令泄氣丸如麻子稍加大微覺少痛效搗姜為丸即愈辛夷散治鼻塞腦冷清涕自出細辛川椒乾薑川芎吳茱萸辛夷附子合三錢皂角屑半兩桂心一兩豬脂六兩上煎豬脂成膏先一宿以苦酒浸前八味取入油煎附子黃色止以綿裹塞鼻孔中本方去辛夷名細辛膏蓽撥餅蓽撥香附大蒜上杵作餅紗襯炙熱貼囟門上用熨斗火熨透其涕自止治鼻痔方羊肺散治肺虛上壅鼻生瘜肉不聞香臭白朮四兩肉蓯蓉木通乾薑川芎各一兩俱為末羊肺一具洗上以水調前藥稀稠得宜灌入肺中煮熟細切焙乾為末每服二錢食後米飲調下辛夷膏治鼻生瘜肉窒塞不通有時疼痛辛夷葉二兩細辛木通木香白芷杏仁湯泡去皮尖各五錢上用羊髓豬脂二兩和藥於石器內慢火熬成膏取赤黃色放冷入龍腦麝香各一錢為丸綿裹塞鼻中數日內脫落即愈白黃散治鼻齆瘜肉鼻痔等證雄黃白礬細辛瓜蒂各等分上為末搐入鼻中輕黃散治鼻中瘜肉輕粉杏仁去皮尖雙仁各一錢雄黃半兩麝香少許上於淨乳缽內先研杏仁如泥後入雄黃麝香輕粉同研極細用瓷盒蓋定每有患者不問淺深用箸頭點粳米大在鼻中瘜肉上每日夜臥點一次半月見效鬱金散治鼻中生瘜肉鬱金豬牙皂各一兩二味水浸一宿久煮透鬱金為度去皂角不用以鬱金焙乾北細辛半兩麝香硇砂各一錢上為末煉蜜丸如茶子大每服一丸食後細嚼茶湯下一方治瘜肉因胃中有食積熱痰流注治本當消食積蝴蝶礬細辛各一錢白芷五分上為末以綿裹藥納鼻中頻頻換一方蝴蝶礬三分細辛一錢如此法塞鼻三因方單用枯礬末面脂和用綿裹少許納鼻中數日瘜肉與藥消落上鼻中用此藥塞更以星半蒼朮酒芩連神麯辛夷細辛白芷甘草消痰積之藥服之為效也瓜蒂散治鼻中有瘜肉不聞香臭瓜蒂細辛各等分上為細末以綿包如豆許塞鼻中須臾即通有人患瘜肉垂出鼻外用此藥即化為黃水點滴至盡三四日愈聖惠方單用陳瓜蒂以羊脂和敷上日三次效一法先將鼻中瘜肉用針微刺令患人含水一口後以瓜蒂末和麝香少許用水數滴吹鼻內出涎水則愈此苦能湧泄也能泄其實則瘜肉愈矣一方治鼻中肉贅音墜臭不可近痛不可搖以白礬末加硇砂少許吹其上頃之化水而消與勝濕湯瀉白散二帖此厚味壅濕熱蒸於肺門如雨霽之地突生芝蘭也一方治瘜肉用雄黃一塊如棗核塞鼻中過十餘日瘜肉自落又一方用狗骨燒灰加硇砂少許每用搐鼻中瘜肉自化一方以胡荽揉爛塞鼻中一夕自然落出瓜礬散消鼻痔瓜蒂炒四錢甘遂一錢白礬枯螺殼炒草烏尖炒各五分上為末用真麻油調令軟硬得所施丸如鼻孔大每日一次以藥入鼻內令達痔肉上其痔化為水肉皆爛下即愈二丁散取鼻痔苦丁香即瓜蒂赤小豆丁香各十四個上慢火焙乾為末入腦子少許口內先含水次將小竹管吹藥入鼻中如半盞茶時盡為度候頭疼時取下又方取鼻痔巴豆十二粒去殼陽起石一錢石蓮心三十枚上為末每服半字許搐入鼻內又有綿塊子蘸藥塞入鼻中其痔肉化爛自出又方取鼻痔蠍梢一錢巴豆去油五粒丁香五粒白丁香七粒上為細末用螺青一字和勻用內消膏藥溶開入上件末藥搜和丸如龍眼核大臨臥用一丸安鼻內治鼻瘡方洗肺散治鼻中生瘡黃芩半夏各二錢天門冬去心麥門冬杏仁去皮尖各一錢五味子二錢半甘草五分上銼加生薑五片水煎食後服一方治久患鼻瘡膿極臭者用百草霜研細用冷水調服三錢治鼻中生瘡方燒祀灶飯末以敷鼻中一方烏牛耳垢敷之一方牛鼻津敷之一方治疳蟲蝕鼻生瘡燒銅箸頭以酢淬之數過取酢敷之又以人尿灰塗之瘥治酒齇鼻方清血四物湯治熱血入肺鼻赤成酒齇鼻當歸酒洗川芎白芍藥酒炒生地黃酒洗黃芩酒炒紅花酒洗茯苓陳皮各等分生甘草減半上銼加生薑一片水煎調五靈脂末同服如氣弱加酒浸黃耆升麻湯熟半夏茯苓白芷當歸各二錢蒼朮乾葛桔梗升麻各一錢大黃蒸芍藥各三錢半熟枳殼乾薑各半錢陳皮甘草各一錢半上㕮咀每服五錢加生薑燈心水煎食前服清肺飲子治鼻紅肺風山茶花黃芩胡麻仁山梔子葛花苦參甘草各二兩薄荷三兩連翹荊芥芍藥防風各一兩上為末茶清調服三錢後用擦藥歸參丸治酒齇鼻乃血熱入肺當歸二兩苦參四兩上為末酒糊丸如桐子大每服七八十丸食後熱茶下金花丸治上焦一切火證鼻紅黃連黃芩黃柏梔子大黃酒煨桔梗各等分上為細末水丸如桐子大每服五十丸臨臥白湯下單梔子丸治鼻頭紅紫山梔子上為末蜜蠟丸如彈子大空心嚼一丸白湯下當歸活血湯治鼻準頭紫黑血冷凝滯當歸川芎芍藥荊芥薄荷白芷連翹防風桔梗山梔黃芩牡丹皮紅花甘草各等分上銼一劑加生薑一片細茶一撮水煎食後溫服一方治赤鼻枇杷葉去毛一兩梔子仁五錢上為末每服二三錢溫酒下早服去右邊晚服去左邊白龍丸治酒齇鼻並滿面紫赤酒刺川芎藁本細辛白芷甘草各等分上為末每四兩入煨石膏末一斤水丸逐日用此丸末洗面如泡豆法更罨少時方用湯洗去硫黃散治酒齇鼻及鼻面上生黑粉刺生硫黃輕粉各一錢杏仁十四個去皮上為細末用杏仁研膏和藥捏成餅臨臥塗貼鼻上次旦洗去一法以白鹽常擦妙秘方治酒齇鼻硫黃一兩白果燒灰二錢輕粉白礬各五分琥珀三分上為末用燒酒一碗入酒壺將前藥裝內封固懸空鍋內熱湯浸壺慢火頓一二時取出放冷日用燒酒塗夜用沉底藥末敷患處鉛紅散治風熱上攻陽明經絡面鼻紫赤刺癮疹俗呼肺風以肺病在皮膚也硫黃白礬枯各五錢上為細末入黃丹少許藥與病人面色同每上五分津液調之洗漱罷及臨臥再上兼煎升麻湯下瀉青丸服之升麻湯在前瀉青丸在火熱門擦鼻法治鼻紅肺風白礬水銀京墨各一錢輕粉七分核桃七個杏仁大楓子各四十九個五味子四十九粒白楊七個上為末雞子清調擦患處粉黃散治酒齇鼻硫黃入蘿蔔內煨一分乳香輕粉烏頭尖各少許上為末面油調臨臥敷早晨洗去酥調尤佳或用膽礬敷之一方治酒齇鼻片腦些少硫黃五分枇杷葉一錢上用豬臟去頭段一尺用第二段一尺割下臟上脂煎成油調和前藥末入生臟內兩頭縛定掛當風處七日用時將小針於臟上針孔捏出藥少許用手敷患處十日內全愈一方治酒齇鼻赤如瘤乳香硫黃細辛輕粉各等分上為末水調敷檳榔散治鼻頭赤檳榔硫黃各等分片腦少許上為細末用粗絹帛包裹時時於鼻上覆鼻赤方亦治面瘡風刺木鱉子去殼大楓子去殼輕粉硫黃各等分上為細末不時以唾調擦大楓油治酒齇鼻草烏尖七個麝香少許上為細末入大楓子油以磁器盛火上調勻先以生薑擦鼻上然後用藥擦之日三次硝黃散朴硝大黃各等分上為細末用冷水調敷鼻上一方黃柏苦參檳榔各等分上為末以豬脂調敷一方青黛槐花杏仁各等分上研敷之一方用杏仁研乳汁敷之一方治酒齇鼻黃連末天鉤藤燒灰上和勻以桐油調敷之鼻赤方新銀杏嚼爛敷於鼻上不過五七次復舊卷一百零五口唇舌病論虞氏曰內經云中央黃色入通於脾開竅於口藏精幹脾故病在舌夫口之為病或為重舌木舌或為糜爛生瘡或見酸苦甘辛鹹味原其所因未有不由七情煩擾五味過傷之所致也經曰陰之五宮本在五味陰之五宮傷在五味是也是以肝熱則口酸心熱則口苦脾熱則口甘肺熱則口辛腎熱則口咸有口淡者知胃熱也外有謀慮不決肝移熱於膽而口苦者亦有脾胃氣弱木乘土位而口酸者或膀胱移熱於小腸膈腸不便上為口糜生瘡潰爛則傷寒狐惑之證上唇生瘡蟲食其臟下唇生瘡蟲食其肝也又舌吐不收名曰陽強舌縮不能言名曰陰強為病種種不同各宜類推而治之選要論曰口者脾之竅舌者心之苗齒者腎之標故諸經多有會於口者蓋五味入口藏於胃脾為之運化津液以養五氣五氣者五臟之氣也節宣微爽五臟之氣偏勝由是諸疾生焉故口臭者乃臟腑臊腐之氣蘊積於胸臆之間而生熱沖發於口也口瘡者脾氣凝滯加之風熱而然也治之當清胃瀉火是也丹溪曰脾熱口甘一云口苦三黃丸主之膽熱口苦謀慮不決所致小柴胡湯加麥門冬酸棗仁地骨皮遠志口瘡以西瓜水徐徐飲之無瓜時以瓜皮燒灰擦之實熱生瘡涼膈散甘桔湯口瘡服涼藥不愈者乃中焦氣不足虛火泛上無制用理中湯甚者加附子或用官桂噙之一小兒口瘡疼不下食若以傷寒狐惑治之必死後以白礬湯於腳上浸半日頓寬以黃柏蜜炙殭蠶炒為末敷立下乳而安丹溪活套云肝膽有實熱令人口酸而苦小柴胡加甘草龍膽草青皮之類甚者當歸龍薈丸若謀慮不決肝膽虛而苦者人參遠志茯神甘草為君柴胡龍膽草為佐使甚者錢氏地黃丸虛則補其母也心熱而口苦或口舌生瘡黃連瀉心湯牛黃清心丸涼膈散之類脾熱而口甘者三黃丸平胃散之類肺熱而口辛者甘桔湯瀉白散金沸草散之類腎熱而口咸者滋腎丸大補陰丸滋陰大補丸之類戴氏曰口舌生瘡皆上焦熱壅所致宜甘桔湯加芩連外以柳花散撒之經云膀胱移熱於小腸膈腸不便上為口糜心胃壅熱水穀不轉下傳小腸以導赤散去小腸熱五苓散瀉膀胱熱相合服之外以胡連散東垣曰口燥咽乾者飲食不節勞倦所傷以致脾胃虛弱乃血所生病主口中津液不行故口燥咽乾病人自以為渴醫以五苓散治之反加渴燥乃重竭津液以致危亡經云虛則補其母當於心與小腸中補之乃脾胃之根蒂也以甘溫之藥為之主以苦寒為之使以酸為之臣佐以辛心苦緩急食酸以收之心火旺則肺金受邪金虛則以酸補之次以甘溫及甘寒之劑於脾胃中瀉心火之亢盛是治其本也薛氏曰繭唇者經云脾氣開於口又云脾之榮在唇蓋燥則乾熱則裂風則瞤寒則揭若唇腫起白皮皺裂如蠶繭名曰繭唇有唇腫重出如繭者有本細末大如繭如瘤者或因七情動火傷血或因心火傳授脾經或因厚味積熱傷脾大要審本證察兼證補脾氣生脾血則燥自潤火自除風自息腫自消若患者忽略治者不察妄用清熱消毒之藥或用藥線揭取反為翻花敗證矣折衷方云脾臟應唇通口氣脾胃為合足陽明胃之經其脈俠口環唇故脾胃受邪則唇為之病風則動寒則緊燥則干熱則裂氣鬱則生瘡血少則澀而無血色治法內理其脾胃外敷以藥無不愈矣統旨云內經曰中央黃色入通於脾開竅於口藏精於脾故病在舌又云心脈系舌本脾脈絡系舌旁肝脈絡舌本或因風寒所中則捲縮而不言七情所郁則舌腫滿而不消肝壅則血上湧心熱則舌裂成瘡脾熱則舌強滑胎因於風者散之寒者溫之熱者清之痰者開之郁者解之又有舌無故常自痹者不可作風治由心血不足用理中湯合四物湯服之有痰氣所致者順氣豁痰湯有火者加芩連舌上瘡久蝕成穴累服涼藥不效後用黑錫丹遂得漸愈此亦下虛故上盛也葉氏曰舌者心之苗又脾之絡系舌下故舌有病皆二經之所為也舌根脹腫者為重舌舌腫而不柔和者為木舌治法皆以瀉心脾二經之火為先外用針砭刺出其血其舌上生胎或白或黃或黑或如板強不獨傷寒為然雖雜病亦有之由內熱深淺而其色不同耳治者辨之李氏曰口病有熱亦有虛一心主舌脾主唇口然心脾之氣恆相通也心貴安靜七情煩擾過度則心火炎盛加之飲食厚味積熱而口生瘡或臭勞心者犀角琥珀膏心勞厚味者氣出腥臭唾涕稠黏口乾舌燥瀉白散加桔梗知母麥門冬黃芩五味子痰熱淺者薄荷煎深者五福化毒丹熱甚一臟偏勝則口味失常心熱口苦生瘡涼膈散黃連阿膠丸肝熱口酸而苦小柴胡湯加龍膽草青皮甘草甚者當歸龍蒼丸謀慮不決膽虛口苦人參遠志茯神甘草為君柴胡龍膽草為使甚者腎氣丸脾熱口乾或臭瀉黃散四順清涼飲甘露飲三黃丸肺熱口辛甘桔湯瀉白散腎熱口咸滋腎丸然肝移於膽則口亦苦木乘脾則口亦酸胃熱或淡或甘腎化火則苦而甘要之熱勝則苦寒勝則咸宿食則酸煩躁則澀虛則淡脾熱則甘勞郁傷肺則口臭口糜膀胱移熱小腸溺澀虛熱口瘡糜爛者柴胡地骨皮等分水煎服甚者加硝黃心胃壅熱水穀不化者導赤散合四苓散如熱盛並大便不通臍痛喘急口瘡潰爛者瀉白湯血熱者雞蘇丸口瘡久不愈服涼藥反甚者乃虛火上攻中焦不足理中湯甚者加附子下虛甚者秘傳降氣湯吞黑錫丹二十丸陰虛者四物湯加知柏或補陰丸年久不愈者黑參丸口中瘡赤者心熱白者肺熱赤白者心肺俱熱虛火鬱熱蘊於胸中乃作口臭因與前同外用川芎白芷等分蜜丸含化或香附子亦可又曰心之本脈繫於舌根脾之絡繫於舌兩旁肝脈循陰氣絡於舌本腎之津液出於舌端分布五臟心實主之故曰諸經皆會於口外感風寒傳經者則舌胎自白而黃而黑者死卒中者則舌強而短舌卷不言者死大概風用小續命湯寒用理中湯熱用甘桔湯加防風枳殼黃芩風寒濕舌強者用白礬肉桂末等分安舌下內因七情氣鬱腫滿不得息者金沸草湯久不愈者黑參丸外用古霜鹽散因怒單繡鐵粉塗之一舌腫滿口氣不得吐者名木舌用陳茶陳白梅入巴豆七枚同搗成膏薄荷水調刷口中得下咽片時即下一二行以粥補住如生瘡連腮頰腫者元參升麻湯舌腫滿口不能聲飲食不通者名重舌用蒲黃頻刷舌上自退如不能咽藥即以黃連濃煎時時呷之以瀉心火舌腫如豬胞者以針刺舌下兩旁大脈出血即消切勿刺中脈令血不止誤刺以火燒銅著烙之血再不止者死或醋調鍋墨敷舌上下脫去再敷須臾自消不食亦死舌腫舌下有蟲如蛄螻臥蠶頭小白有尾可燒鐵烙舌頭上即消舌長過寸者單冰片末敷之腎虛火色淡黑一二點宜以生薑蜜水洗紅後用補腎兼痰火藥肺有痰熱舌強壅腫或短甘露飲肝熱舌出血如泉單槐花末撒之心熱生瘡破裂單黃連煎湯服脾熱舌胎乾澀如雪薄荷蜜冰柏丸心脾熱者升麻葛根湯加薄荷黃芩桔梗又曰繭唇緊小不能開合飲食不得不急治則死外用青皮燒灰豬脂調擦仍將青皮灰末每一錢酒調服之內治實者瀉黃散虛者菊睛丸腫者薏苡仁湯脈法脈經曰左寸洪數心熱口苦右寸浮數肺熱口辛左關弦數而虛膽虛口苦甚洪而實肝熱口酸右關沉實脾胃有實熱口甘兼洪數者口瘡或為重舌木舌脈虛者中氣不足口瘡若服涼藥不愈宜理中湯或曰口苦生瘡脈洪疾速若見脈虛中氣不足治口見五味方黃連瀉心湯治心經蘊熱口苦黃連去須為細末水調服一二錢龍膽瀉肝湯經曰有病口苦名曰膽痹乃肝主謀慮膽主決斷盛汁七合是清淨之府取決於膽膽或不決為之隱怒則氣上逆膽汁上溢故口苦或熱甚而使然也此湯主之柴胡一錢半黃芩一錢人參黃連山梔龍膽草天門冬去心麥門冬去心知母甘草各八分五味子二十粒上㕮咀水煎食遠服忌辛熱物大效加味小柴胡湯治膽熱口苦乃謀慮不決所致柴胡黃芩人參半夏甘草麥門冬酸棗仁遠志地骨皮上銼水煎服益膽湯治謀慮不決肝膽虛氣上溢則口苦證黃芩甘草炙人參各一錢遠志去心八分茯神去木苦參各五分官桂三分上銼水煎食遠服加味小柴胡湯治肝膽有實熱口酸而苦並怒則口苦或脅脹或發熱俱可服依本方加龍膽草青皮甘草各等分上銼水煎服加味小柴胡湯見上伐肝補脾湯治脾胃氣弱木乘土位而口酸黃連柴胡芍藥白茯苓各一錢白朮一錢半人參八分青皮醋炒七分甘草炙五分上銼水煎食前服三黃丸治三焦實熱及脾熱口甘黃芩春四兩夏秋六兩冬三兩黃連春四兩夏五兩秋三兩冬二兩大黃春三兩夏一兩秋二兩冬五兩上為末煉蜜丸或水丸如桐子大每服百丸食後茶清白湯下三黃湯治脾熱口甜黃連黃芩山梔石膏芍藥茯苓桔梗陳皮各一錢白朮甘草各五分上銼一劑加烏梅一個水煎食後服瀉白散治肺熱口辣桑白皮地骨皮各二錢甘草一錢上銼一劑水煎食後溫服滋腎丸治腎熱口咸黃柏知母各二兩俱用酒拌濕陰乾肉桂一錢上為末以熟水丸如桐子大每服五七十丸白沸湯下治口瘡方升麻散治上膈壅毒口舌生瘡咽喉腫痛先用此藥升散升麻一錢半赤芍藥煨人參桔梗乾葛薄荷防風各一錢甘草炙五分上㕮咀每服加生薑三片水煎食後溫服加減涼膈散治三焦火盛口舌生瘡連翹黃芩黃連山梔子桔梗薄荷當歸芍藥生地黃酒炒枳殼甘草各等分上銼水煎食遠服增損如聖散治上焦熱壅口舌生瘡桔梗二兩甘草炙一兩半黃芩一兩防風半兩枳殼炙二錢半上為末每服三錢水煎食後服黃連湯治口舌生瘡亦治赤眼黃連三錢為末上用好酒煎一二沸候冷噙漱或嚥下即能赴筵黃連升麻湯治口舌生瘡升麻一錢半黃連三錢上為細末綿裹含津咽瀉白湯治大腸實熱腹脹不通俠臍痛食不化喘不能久立口舌生瘡橘皮竹茹黃芩山梔黃柏各五分芒硝茯苓各一錢生地黃三錢上銼加薑棗煎服一方有白朮桂心防風通聖散治風熱熾盛口舌生瘡大便秘結或發熱煩躁瘡毒作癢等證防風當歸川芎芍藥大黃芒硝連翹薄荷麻黃桔梗石膏黃芩各一兩白朮山梔子荊芥各二錢半甘草二兩滑石三兩上銼每服五七錢水煎或為末白湯調下梔子清肝散治三焦及足少陽經風熱口舌生瘡或耳內作癢出水疼痛或胸間作痛或寒熱往來茯苓川芎芍藥牛蒡子炒當歸各七分柴胡山梔牡丹皮各一錢甘草五分上銼水煎服清心蓮子飲治口舌生瘡煩躁作渴小便赤澀口乾便濁夜間安靜晝則舉發此熱在氣分石蓮子人參黃耆炒茯苓柴胡黃芩各一錢麥門冬地骨皮車前子炒甘草各一錢半上銼水煎服升麻柴胡湯升麻柴胡芍藥木通山梔子各一兩黃芩大青杏仁各五錢石膏二錢半上銼每服四五錢水煎服清熱補氣湯治中氣虛熱口舌如無皮狀或發熱作渴人參白朮茯苓當歸酒拌芍藥炒各一錢半升麻五味子麥門冬元參甘草炙各五分上銼水煎服如不應加炮姜更不應加附子清熱補血湯治口舌生瘡體倦少食日晡益甚或目澀熱痛此熱在血分也熟地黃酒拌當歸酒拌川芎芍藥各一錢元參七分柴胡牡丹皮黃柏知母五味子麥門冬去心各五分上銼水煎服如不應補中益氣湯加五味子治之四物二連湯治血虛發熱口舌生瘡或晝寒夜熱當歸生地黃白芍藥川芎黃連胡黃連各一錢上銼水煎服人參理中湯治口舌生瘡飲食少思大便不實或畏寒惡熱作嘔腹痞此中氣不足虛火炎上人參白朮乾薑煨甘草炙各等分上銼每服五七錢或一兩水煎服若四肢逆冷或嘔吐泄瀉加附子香砂六君子湯治口舌生瘡服涼藥過多以致食少作嘔或中氣虛熱所致人參白朮茯苓半夏陳皮各一錢藿香砂仁各八分甘草炙六分上銼加生薑煎服人參安胃散治胃經虛熱口舌生瘡喜熱飲食人參白茯苓各一錢黃芩二錢芍藥七分陳皮甘草炙各五分黃連三分上銼水煎服七味白朮散治虛熱口舌生瘡不喜飲冷吐瀉口乾人參白朮白茯苓甘草炙木香藿香各五分乾葛一錢上銼水煎服當歸補血湯治口舌生瘡血氣俱虛熱渴引飲目赤面紅其脈洪大而虛重按全無黃耆炙一兩當歸酒洗二錢上銼水煎服清熱化痰湯治上焦有熱痰盛作渴口舌腫痛貝母天花粉枳實炒桔梗各一錢黃連各一錢二分元參升麻各七分甘草五分黃芩一錢二分上銼水煎服丹溪方治口瘡舌強多痰白朮甘草梢各一錢人參赤芍藥木通生地黃各五分黃連炒二錢瓜蔞子十二枚上銼一帖煎服赴宴散治三焦實熱口舌生瘡糜爛痛不可忍者黃連黃柏黃芩梔子細辛乾薑各等分上為細末先用米泔漱口後擦藥於患處或吐或咽不拘冰柏丸治口舌生瘡黃柏薄荷硼砂各等分冰片減半上為末蜜丸彈子大每噙化一丸五福化毒丹治積熱驚惕狂譫煩渴頰赤咽乾唇口腫破生瘡夜臥不安頭面遍體多生瘡癤及小兒驚風痰熱潮搐等證元參桔梗各二兩茯苓二兩半人參牙硝青黛各一兩甘草七錢半麝香一分上為末煉蜜丸如芡實大金銀箔各四十片為衣每一丸或半丸小兒一丸分作四服俱薄荷煎湯化下食後臨臥服如大人口臭及小兒痘疹上攻口齒涎血臭氣用生地黃自然汁化一丸以雞翎刷口內熱疳黃瘦雀目者陳粟米泔水下琥珀犀角膏治咽喉口舌生瘡茵其效如神琥珀犀角辰砂各一錢茯神人參酸棗仁各二錢片腦一字上各另為極細末用煉蜜搜成膏子以瓦罐收貯密封俟其疾作每服一彈子大以麥門冬濃煎湯化下一日五服黑參丸治口舌生瘡經久不愈元參天門冬麥門冬各等分上為末煉蜜丸如彈子大每一丸綿裹噙化津液下硼砂散治口舌生瘡及咽喉腫痛皆效硼砂馬牙硝石膏寒水石枯白礬各二錢片腦二分上為細末每用半錢撒入患處及新汲水調下薄荷煎治口舌生瘡咽喉腫痛痰涎壅塞薄荷二兩半川芎二錢砂仁甘草各三錢片腦五分上另為末和勻蜜調成膏任意嚼咽一方去片腦加桔梗薄荷蜜治舌上生瘡或胎乾澀語言不真白蜜薄荷自然汁等分上先以生薑蘸水揩然後敷之碧雲膏治一切積熱口舌生瘡心煩喉閉燥渴腫痛碧雪芒硝馬牙硝朴硝各一斤石膏寒水石滑石水飛各六兩青黛一兩上為細末以甘草一斤煎水和諸藥勻再入火煎用柳木攪勻入青黛又攪勻傾出盆內候冷成塊研為細末每用少許噙化如喉閉每用少許吹入喉中碧雪治口瘡及咽腫痛神效蒲黃青黛硼砂焰硝生甘草各等分上為細末敷之咽喉腫痛鵝管吹入一方治口瘡細辛黃柏炙等分一云黃連上研極細末敷之噙少時當滿口有涎吐之少傾又敷又噙如是五七次即愈一方有黃連又一方單用黃柏蜜炙為末撒瘡上綠袍散治口瘡黃柏四錢甘草炙二錢青黛一錢上為末擦患處噙之吐出涎立愈一方有密陀僧無甘草赴筵散治赤白口瘡黃柏青黛密陀僧上為末干貼瘡上一方治赤口瘡白礬枯沒藥乳香銅綠各等分上為細末撒之一方單用枯礬末撒之或噙良久水漱又噙一方治白口瘡雄黃沒藥乳香各一錢輕粉巴豆霜各少許上為細末撒之又方治白口瘡黃柏蓽撥各等分上為末醋調擦水漱柳花散治口瘡赤白元胡索一錢黃柏黃連各五分青黛密陀僧上為末頻撒之檳榔散治口瘡疼痛大有神效五倍子三錢寒水石半兩煅蒲黃黃丹各二錢半上為末每服少許干貼瘡上龍石散治大人小兒上膈壅毒口舌生瘡咽嗌腫塞疼痛妨悶硃砂一錢半寒水石煅通赤三錢二分半生腦子二錢半上為末每用少許撒貼患處咽津每日三五次又小兒瘡疹毒氣攻口齒先用五福化毒丹掃後仍用此藥撒貼立效清金散治大人小兒白口瘡急惡狀似木耳五倍子去土四錢青黛四錢上為末好油調貼瘡上咽喉中瘡爛用竹管吹入喉中有津吐出一方單用五倍子為末擦之便可飲食赴筵散治口瘡疼痛五倍子嫩者一兩黃柏蜜炒滑石各半兩上為末每服半錢干撒瘡上良久便可飲食一方有銅綠半兩麝香一字一方治口瘡白礬一兩枯至半兩黃丹一兩火煅紅放下再炒紫色為度一方治口內生瘡明礬枯黃丹炒鹽白梅燒存性各一錢人中白一錢半麝香少許上為細末干撒口內甚者加硼砂半兩片腦一分一方治膈上熱極口舌生瘡膩粉一匕杏仁七枚不去皮尖上二味臨臥時細嚼令涎出則吐之用溫湯漱口未痊再用一方治滿口生瘡此因虛壅上攻草烏一個南星一個生薑一塊上焙乾為末每服二錢臨臥時用醋調作掩子貼手足心來日便愈一方治虛火口瘡甘草乾薑各等分上銼和勻細嚼噙之既濟丹治口瘡上熱下寒者黃連乾薑各等分上為末噙且服之二皂散治口舌生瘡牙宣出血大皂角燒存性牙皂燒存性銅綠膽礬雄黃孩兒茶百草霜枯礬各等分上為細末先將米泔水漱口洗口瘡然後擦藥黃白散治口瘡如神並口生疳瘡黃柏孩兒茶枯白礬各等分上為末先用陳倉小米熬湯晾冷漱口淨將藥末撒患處不拘三五年諸治不愈者敷三五次即愈一方治口內生瘡朴硝一錢寒水石火煅一兩上同研入硃砂如桃紅色敷患處嚥下不妨味苦加甘草一方用焰硝硼砂含口勿開外以南星為末醋調貼足心湧泉穴上神效一方孩兒茶硼砂各等分為末敷口內瘡一方以薔薇根避風處打去土煮濃汁溫含冷易之一方以膽礬一塊用百沸湯泡開含漱一宿可瘥八分又一方用白礬湯含漱亦好一方單文蛤末敷之一方夏月用西瓜水徐徐咽之冬月無水以皮燒灰噙之一方以好墨研螻蛄極細敷之立效一方用生薑一塊臨臥時細嚼含睡不得開口出氣眠著不妨睡覺嚥下一方香附葉煮汁漱口神效一方以遠志醋研鵝毛掃患處出涎半夏散治少陰口瘡聲絕不出者是寒遏絕陽氣不伸也半夏一兩肉桂烏頭各一字上水煎一盞分作二服甘礬散治太陰口瘡甘草二寸白礬栗子大一塊上含化咽津化毒法凡口瘡無問新舊遇夜臥將自己兩丸以手擽緊左右交手揉三五十遍但遇夜睡著行之如此三五度因酒而生者一夜愈久病諸口瘡三二夜愈如鼻流清涕惡寒者擽二丸向上揉之數夜可愈一方治口瘡用縮砂不拘多少燒為末撒即愈一方檳榔燒灰存性為末入輕粉敷之一方豬蹄殼燒為末敷之立止一方以古文錢二十文燒赤投酒中服之立瘥一方治小兒口瘡通白者及風疳瘡蝕透者白殭蠶炒黃色拭去蠶上黃肉毛為末蜜和敷之立效一方治口牙疳瘡用山梔去仁填白礬入柳葉火中煅為末吹入口中一方治口瘡疼痛用巴豆半枚生研和米飯一豆大杵和貼印堂對眉間約半刻許覺紅就去不可跑走小兒減半用之治口糜方柴胡地骨皮散治膀胱移熱於小腸而口糜生瘡潰爛者柴胡地骨皮各五錢上銼水煎食後服實者加大黃朴硝以利之導赤五苓散治膀胱移熱於小腸膈腸不便上為口糜茯苓豬苓澤瀉白朮肉桂生地黃木通甘草各等分上銼水煎服一方去桂口糜散治口瘡糜爛黃柏黃連各一兩雄黃沒藥各二錢片腦五分上共為細末每用分許著於瘡上良胡黃連散治口糜胡黃連五分藿香一錢細辛黃連各三錢上為末每用半錢干撒口內漱吐之蓽撥散治滿口白爛蓽撥一兩厚黃柏一兩六錢上為末用米醋煎數沸後調上藥涎出吐之再用白湯漱口即愈重者二次必效散治口糜白礬大黃各等分上為細末臨臥干貼瀝涎盡溫水漱之綠雲膏治瘡臭爛久而不瘥黃藥五分螺青二錢上研細臨臥置一字在舌上不妨咽津一方銅易螺青一方治爛疳瘡用橄欖燒灰存性為末先用米泔水洗淨後撒上藥治口臭方加減甘露飲治男婦小兒胃中客熱口臭牙宣赤眼口瘡一切瘡疼已散未散皆可服之丹溪云甘露飲心肺胃藥也熟地黃生地黃天門冬去心黃芩枇杷葉去毛山茵陳枳殼金釵石斛甘草各一兩犀角三錢上為末每服二錢水煎食後臨臥服小兒一服分作二服更斟酌與之樓氏曰此方得之一品之家其間用犀角一味甚有道理百發百中予族有一僕牙宣口臭牙齒漸漸頹落予與二服頓愈服之無有不愈極有奇效加減瀉白湯梁濟民膏粱而飲因勞心過度肺氣有傷以致氣出腥臭而唾稠黏咽嗌不利口苦幹燥此為肺熱喉腥桑白皮三錢地骨皮甘草炙各一錢半桔梗二錢知母七分黃芩麥門冬各五分五味子二十粒上㕮咀都作一服水煎食後溫服一日二服忌酒濕面及辛熱之物丁香丸治口臭氣丁香三錢川芎二錢白芷五分甘草炙一錢上為細末煉蜜丸如彈子大綿裹一包噙化含香丸治口氣臭穢宜常服之芎藭一兩細辛桂心各一兩半甘草三兩丁香半兩上為末蜜和丸如彈子大臨臥服二丸或如小豆大睡時噙一丸含香丸桂心甘松木蘭花陳皮各等分上為末蜜丸噙化一方芎藭白芷橘皮桂心各一兩上為末用棗肉二兩干則加蜜和丸如小豆大日服十丸食前食後常含之或吞之七日大香香茶餅清膈化痰香口孩兒茶四兩桂花心一兩南薄荷葉一兩硼砂五錢上為末用甘草煮汁熬膏作餅噙化嚥下硼砂丸治口氣口乾口舌生瘡硼砂二錢馬牙硝風化四錢寒水石煅一兩片腦麝香各一分上為末用甘草膏為丸如麻子大每含一丸咽津一方治口臭香薷一把以水一斗煮取三升稍稍含之丹溪云香薷飲能治口臭一方治口臭仍治齒腫痛細辛煮取濃汁熱飲令吐瘥戴人法尚家一男子年二十餘歲病口中氣出臭如登廁雖親戚莫肯與對語戴人曰肺金本主腥金為火所乘火出臭應便如是也久則成腐腐者腎也此亢極則兼水化也病在上宜湧以茶調散湧而去其七分夜以舟車丸浚川散下五七行比旦而臭斷治口乾方黃耆湯治心中煩躁不生津液口燥咽乾不思飲食黃耆熟地黃白芍藥五味子麥門冬去心各三兩白茯苓一兩人參天門冬去心甘草各五錢上㕮咀每服三錢加薑棗烏梅同煎去渣食後服五味子湯治口燥舌乾此是腎水竭也五味子黃耆去蘆生用人參去蘆麥門冬去心粉草炙各半兩上㕮咀每服半兩水一盞半煎至八分去渣溫服無時候一日二夜五七服妙桑枝湯治口乾取桑枝一小升細切炒香以水三大升煎取二升一日服盡燥熱咽乾忌用南星半夏治唇病方瀉黃飲子治風熱蘊於脾經唇燥折裂口舌生瘡升麻白芷枳殼去穰炒黃芩防風各一錢半半夏湯泡一錢石斛一錢二分甘草七分上㕮咀作一服加生薑三片水煎食後服清胃散治胃火血燥唇裂或為繭唇或牙齦潰爛作痛黃連炒生地黃升麻各一錢當歸一錢二分牡丹皮八分上銼水煎服如兼肝膽經熱加芍藥川芎柴胡瀉胃湯治胃氣實熱唇口乾裂便秘煩渴睡流口涎大黃二錢半葛根一錢枳殼桔梗前胡杏仁各五分上銼加生薑煎服升麻飲治脾胃有熱風冷相乘唇腫生核疼痛升麻前胡犀角薏苡仁甘草各一錢葛根龍膽草竹茹各一錢半上作一服水一鍾煎至八分去渣食後服薏苡湯治風熱在脾唇口瞤動或為結核或為浮腫薏苡仁防己赤小豆甘草各等分上銼加生薑煎服羌活散治風熱傳脾唇口瞤皺或頭痛目眩或四肢浮腫如風狀羌活茯苓薏苡仁各等分上銼每服三五錢水煎入竹瀝一匙服柴胡清肝散治肝經怒火風熱傳脾唇腫裂或繭唇柴胡黃芩炒當歸生地黃牡丹皮各一錢升麻八分黃連山梔子炒各七分川芎六分甘草三分上銼水煎服若脾胃弱去芩連加白朮茯苓歸脾湯治思慮傷脾血耗唇皺人參黃耆白朮茯苓當歸龍眼肉遠志去心酸棗仁炒各一錢木香甘草各三分上銼水煎服若思慮動脾火體倦發熱加柴胡牡丹皮山梔子濟陽地黃丸治陰虛火燥唇裂如繭當歸熟地黃山藥枸杞子山茱萸去核肉蓯蓉甘菊花巴戟肉麥門冬去心五味子各等分上為末煉蜜丸如桐子大每服七八十丸空心食前白湯送下菊睛丸治脾肺氣虛上盛痰壅唇折裂舌上生瘡甘菊花枸杞子巴戟去心肉蓯蓉各等分上為末煉蜜丸如桐子大每服五十丸米飲下胡粉散治唇生腫核松脂大黃白蘞赤小豆胡粉各等分上為末以雞清子調敷黃柏散治繭唇黃柏一兩五倍子二錢密陀僧甘草各一錢上除黃柏外余藥為末用水調敷干柏上火炙三五次將柏切成片臨睡貼之天明即愈一方治口唇乾裂破成瘡爐甘石火煅三錢文蛤一兩黃柏一兩蒼朮五錢上除甘石外三味同炒赤色共研極細末入片腦三分再研用蠟油調敷唇上立效散治唇緊瘡疼痛訶子肉五倍子各等分上為細末干貼上效一方治繭唇緊小不能開合飲食不得不急治則死用青皮燒灰豬油調擦仍將青皮灰末每一錢酒調敷之一方用亂髮蜂房六畜毛燒灰豬脂調擦一方用橄欖燒灰或黃柏散一方用白布作燈炷如指大安刀斧上燃燒令刀上汗出拭取敷唇上日二三度一方用舊青布燒灰調清服或和豬脂塗敷或以蛇退燒灰先拭淨敷之一方治唇黃泡腫烏頭炒灰研香油調敷之一方治唇上生瘡連年不瘥以八月藍葉一斤搗取汁洗之不過三日瘥一方用白荷葉瓣貼之神效如開裂出血者即止補唇舌方鮮蟹燒灰二錢乳香沒藥各二分半上為細末塗之即生肉如多去唇舌用川烏草烏為末攤紙一條以涼水調合貼之即不覺疼可用刀取如流血以陳石灰塗之即止愈後舌硬用白雞冠血點之即軟消毒散治口舌生瘡兩唇腫痛晚蠶娥五倍子密陀僧各一錢上同為末每用少許干敷瘡上有津吐出治舌病方元參升麻湯治心脾壅熱舌上生瘡木舌舌腫或連頰項兩邊腫痛元參升麻生犀角鎊末另入赤芍藥桔梗貫眾黃芩各一錢甘草七分上銼水煎服大便秘結加大黃二錢元參散治心脾壅熱木舌腫脹元參升麻大黃犀角各七錢半甘草半兩上為細末每服三錢水煎溫服清熱如聖散治舌下腫如核大取破出黃痰已痊又復發連翹一錢牛蒡子黃連各八分山梔子天花粉各六分枳殼荊芥薄荷各五分柴胡四分甘草三分上銼一劑加燈心草十根水煎食後稍冷服金沸草散治風寒傷於心脾令人增寒熱齒浮舌腫疼荊芥穗四兩旋覆花前胡麻黃去節各三兩赤芍藥半夏各一兩上銼散每服五錢加生薑七片棗二枚水煎去渣嗽口吐一半吃一半世醫用此發散傷寒傷風及加杏仁五味子治咳嗽皆效獨未知用之舌腫牙疼辛未年有人患舌腫滿塞粥藥不入其勢危甚煎此一劑乘熱以紙籠氣熏之遂愈加味二陳湯治舌下腫結如核或重舌木舌及滿口生瘡以清火化痰為主半夏薑製一錢三分茯苓黃連青竹茹各一錢生地黃酒洗一錢半當歸酒洗陳皮去白各八分桔梗五分甘草梢二分上銼一劑加生薑三片水煎食後服順氣豁痰湯治舌痹或麻此因痰氣滯於心包絡也半夏用姜皂角煮一錢半茯苓橘紅貝母瓜蔞仁去油黃連桔梗枳殼麩炒各一錢香附童便浸甘草各四分上銼加生薑三片水煎食遠服血虛舌麻者四物湯加黃連牛黃散治舌腫強牛黃二分桂心五分犀角羚羊角漢防己人參牛蒡子生地黃甘草各一錢上為末每用五錢水煎連渣服馬牙硝丸治木舌漸大滿口牙硝研七分半鉛白霜寒水石太陰玄精石大黃麝香研各半兩白礬枯一錢二分甘草炙二錢半上為細末煉蜜丸如彈子大每含一丸津液嚥下上清噙化丸治口舌痛薄荷葉三兩硼砂天竺黃各五錢桔梗七錢天花粉風化硝防風百藥煎孩兒茶甘草各一兩上為末煉蜜丸如彈子大每用噙化一丸一方治舌上黑有數孔大如箸頭出血如湧泉此心臟病也戎鹽即青鹽黃芩一作葵子黃柏大黃各五兩人參桂心甘草各二兩上為末蜜丸桐子大每服十丸米飲下日三燒鐵篦烙之一方治一舌上腫硬百草霜海鹽各等分上為末井花水調敷一方用亂髮燒灰水調下赴筵散治舌上瘡銅綠研半兩香白芷為末一兩上拌和勻撒舌上溫醋漱立愈礬石散治舌強不能語礬石桂心各等分上為末安舌下立瘥黑散子治舌忽然腫破用釜底墨細研以醋調敷舌上不脫去更敷能先決出血竟敷之尤佳一方用鹽等分調敷蒲黃一物散治舌腫大塞口不通飲食者真蒲黃末一味頻撒舌上自退若能咽藥即以黃連一味煎濃汁細細呷之以瀉心火本事方云一士人夜歸其妻熟寢士人撼之妻問何事不答又撼之其妻驚視之舌腫已滿口不能出聲急訪醫得一叟負囊而至用藥撒之比曉復舊問之乃蒲黃一物也內經曰熱勝則腫此必心脾之火併於舌故令腫而滿口蒲黃性寒能清氣涼血則愈槐花一物散治舌無故出血如泉用槐花為末撒之即止一方燒鐵篦熱烙孔中一方治舌長過寸不能入以冰片分許研末敷之即收一方治舌脹出口硼砂為細末切生薑蘸藥揩舌腫處即退一方用蓖麻取油蘸紙捻燒煙燻之愈又治牛舌出亦好一方治重舌用好膽礬研細敷之一方治飛絲入口喉舌間生泡紫蘇嚼白湯下立效一方治舌上忽脹出口外俗云是蜈蚣毒用雄雞血一小盞浸之即縮入卷一百零六咽喉喉痹論選要論曰夫咽喉者一身之總要氣與食出入之門戶也咽以納氣故嚥氣通於天喉以納食故喉氣通於地自其風邪客於喉間氣鬱而熱則壅遏而咽疼自其熱氣生於肺胃氣毒蘊熱則腫結而為喉痹又有屍咽谷賊之證屍咽者陰陽不和脾肺壅盛風熱毒氣不能宣通故令屍發動上蝕於喉或癢或疼如䘌之候也谷賊者稻芒強澀藏於米而誤食之滯於咽間不能傳化故風熱並聚與血氣搏逐令腫刺如咽嗌之生谷刺也胃脘實熱熏炙上焦發為白頭赤根固有咽瘡之證臟腑停寒寒則氣縮如物窒凝於其間亦有喉痹之證至若懸癰生於上齶雖不關於咽喉所以暴腫者抑亦熱氣使然也咽喉懸癰關要所繫病不急療皆能殺人夫咽喉為病其名甚多有一十八種之證惟乳蛾纏喉風走馬喉痹最為緊急單乳娥者其形圓小如箸頭生於咽喉關上或左或右雙蛾則兩旁俱生也若生於關下為難治纏喉風者熱結於喉腫繞於外且麻且癢腫而大也走馬喉痹者謂咽喉痹急甚其死又速故名走馬也治療之法微者可以咸軟之大者可以辛散之或去風痰或解毒熱至如走馬喉痹其死生在反掌之間耳豈藥之緩所能救耶其最妙者莫如用針針出毒血病即時愈若纏喉風腫甚藥不能下者以藥灌鼻中令吐之外以拔毒之劑敷之熱退腫消必自愈矣亦有陰證下虛能令人喉痹又當治其下寒則痹自通矣不可不知虞氏論曰經曰一陰一陽結謂之喉痹王注謂一陰即厥陰肝與包絡是也一陽即少陽膽與三焦是也四經皆有相火存焉子和曰膽與三焦尋火治肝和包絡都無異東垣曰火與元氣不兩立一勝則一負蓋元氣一虛則相火隨起而喉痹等暴病作矣夫喉之為會厭者經謂之吸門是也以其司呼吸主升降為人身緊關之橐龠門戶也若夫卒然腫痛水漿不入言語不通死在須臾誠可驚駭其會厭之兩旁腫者俗謂之雙乳蛾易治會厭之一旁腫者俗謂之單乳蛾難治古方通謂之喉痹皆相火之所沖逆耳經曰一水不勝二火又曰一水不能勝五火甚言真水易虧而相火易動也如大怒則火起於肝房勞則火起於脾胃之類是故知火者痰之本痰者火之標火性急速故病發則暴悍治之之法必先大涌其痰或以鋒針刺其腫處此急則治標之意也用藥者必須以內經從治之法而以桔梗甘草元參升麻防風羌活荊芥人參白朮茯苓之類少加乾薑附子等藥為嚮導徐徐頻與不可頓服此為治之大法也切不可驟用寒涼之藥非徒無益且促其死耳俗人未識此理輒峻用芩連梔柏之類而正治之不知上熱未除中寒復生其毒氣乘虛而入腹漸而至於發喘不休不可治矣外又有天行一種名曰大頭瘟俗呼為捏頸瘟其證甚為凶惡染此者十死八九宜推運氣治之治法亦不甚相遠也東垣普濟消毒飲子實為百發百中之劑丹溪曰喉痹多屬痰重者宜用吐法或只以桐油或燈油腳鵝翎探吐之輕者用新取園中李實根噙之更以研水敷項上或用射干逆流水吐之纏喉風屬痰熱亦宜探吐之咽喉痛用荊芥當歸桔梗甘草煎溫漱服之有熱加黃芩枳殼宜刺少商出血少商在手大指端內側去爪甲外如韭葉喉乾燥痛四物湯加桔梗荊芥黃柏知母立止喉瘡並痛多屬虛火遊行無制用人參黃柏荊芥虛火用人參竹瀝血虛用四物竹瀝瀉實熱火黃連荊芥薄荷硝石為末蜜薑汁調噙化喉痹風熱痰先以千緡湯後以四物加黃柏知母養陰則火降喉痛必用荊芥陰虛火炎必用元參喉舌之疾皆屬火熱雖有數種之名輕重之異乃火之微甚故也微而輕者可以緩治甚而急者惟用針砭刺血最為上策綱目云凡經云喉痹者謂喉中吸呼不通語言不出而天氣閉塞也云咽痛嗌痛者謂咽喉不能納唾與食而地氣閉塞也云喉痹咽嗌痛者謂咽喉俱病天地之氣並閉塞也蓋病喉痹者必兼咽嗌痛病咽嗌痛者不能兼喉痹也鄉村所患相似者屬天行運氣之邪治法必先表散之大忌酸藥擦點寒藥下之恐郁其邪於內而不得出也其病有二其一屬火經云少陽所至為喉痹又云少陽司天之政三之氣炎暑至民病喉痹用仲景桔梗湯或面赤斑者屬陽毒用陽毒諸方汗之可也其二屬陰濕經云太陰之勝火氣內郁成喉痹又云太陰在泉濕淫所勝病嗌腫喉痹用活人半夏桂枝甘草湯或面青黑者屬陰毒用陰毒法可汗之蕭山先生云喉痹不惡寒及寸脈大滑實於關尺者皆屬下證宜硝石青黛等寒藥降之或膽礬等酸劑收之韓祗和先生云寸脈大於關尺者宜消陽助陰東垣先生云兩寸脈實為陽盛陰虛下之則愈故予遵此法以治前證如鼓應桴也陳無擇治喉痹不語用小續命湯加杏仁七個煎服甚效本草治中氣急喉痹欲死白殭蠶為末薑汁調下立愈丹溪云殭蠶屬火而有土與水得金氣而成治喉痹者取其火中清化之氣以從治相火散濁逆結滯之痰陳藏器每治臟寒咽閉吞吐不利用附子去皮臍炮裂以蜜塗炙蜜入內含之勿咽羅謙甫云戊寅春鄉村病喉痹者甚眾蓋前年終之氣及當年初之氣二火之邪也用甘桔湯加芩連半夏殭蠶鼠黏子葛根等劑發散之虛加參耆當歸之類水漿不入先用解毒雄黃丸醋化灌之痰出更灌薑汁服前藥無不神驗若用膽礬酸寒點過皆不治蓋邪郁不出故也押班都知潘元從喉閉急召孫至取藥末半匕吹入喉中少頃吐出膿血立愈潘詣孫謝曰火急之難非明公不能救救人之急非藥不能療贈金百兩願求方以濟非常之急孫以其方授之用豬牙皂角白礬黃連等分細銼新瓦上焙乾為末每用半錢吹入喉中因曰神方無價安用以利易哉遂不受所贈文潞公一日喉腫翰林咽喉科治之經三日愈甚上召孫治之孫曰病得相公書判筆一管去筆頭水沾筆管點藥入喉便愈孫隨手便刺相公昏僕不省人事左右皆驚愕流汗孫乃笑曰非我不能救相公須臾吐出膿血升余旬日乃平復如故見上上喜曰孫兆良醫甚有手段予嘗治一男子喉痹於太谿穴刺出黑血半盞而愈由是言之喉痹以血不散故也凡治此疾暴者必先發散發散不愈次取痰取痰不愈次去汙血也急喉痹其聲如鼾有如痰在喉響者此為肺絕之侯速宜參膏救之用薑汁竹瀝化開服如未得參膏或先煎獨參湯救之服早者十全七八次則十全四五遲則十不全一也薛氏曰丹溪云咽痛屬血虛用四物加竹瀝陰虛火上炎者必用元參氣虛加人參竹瀝又云咽喉腫痛有陰虛陽氣飛越痰結在上者脈必浮大重取必澀去死為近宜人參一味濃煎細細飲之如作實證治之禍在反掌此發前人未發救無窮之夭枉蔭按李氏曰咽喉氣之呼吸食之出入乃人身之門戶也一十八種雖後世強名亦不可不知一左單蛾風二右單蛾風形圓如小著頭大生於咽喉關上可治生於關下不見者難治三雙蛾風兩個生於喉間關下難治四蟬舌風舌下再生二舌五牙蜞蜞音其似蟹而小不可食風牙齦腫毒成瘡六木舌風舌腫大如煮熟豬舌不能轉動七舌黃風舌上腫痛黃色八魚口風口如魚吸水不治九塞喉風喉痹聚毒涎唾稠實而發熱關上可治關下難治十懸蜞蠱毒風上𦚞腫水食不下形腫如雞卵十一搶食風因食鯉鱠惡物發泡十二獵頰風腮頰結腫牙盡處腫破十三纏喉風自頤纏繞赤色寒熱十四松子風口內滿喉赤如豬肝張口吐物則氣逆關閉飲食不能十五崩砂甘口風自舌下牙齦上腫赤口內作臖如湯熱牙齦漸爛亦能脫齒十六連珠風自舌下起初起一個又起一個甚者三五七九個連珠生起十七蜂子毒或在臉腮涘爛或在喉關舌下作臖色黃如蜂十八走注瘰癧風頸項結核五七個皮膚赤腫作寒熱尋常咽瘡痛者多是虛火噫種類雖繁同歸於火蓋少陰君火少陽相火二脈並絡於咽喉君火勢緩則熱結而為疼為腫相火勢速則腫甚不仁而為痹痹甚不通而痰塞以死矣故曰一陰一陽結謂之喉痹一陰肝與心包一陽少陽三焦四經皆有相火火者痰之本痰者火之標故言火則痰在其中矣言咽喉則牙舌亦包在其中矣實火因過食煎炒蘊熱積毒煩渴二便閉澀風痰上壅將發喉痹必先三日胸膈不利脈弦而數治宜先去風痰而後解毒熱涼膈散加黃連荊芥石膏或古荊黃湯防風通聖散三黃丸含化又風燥咽喉乾枯常如毛刺吞嚥有礙敗毒散加黃芩半夏倍桔梗薄荷生薑煎服痰盛加石膏凡服此藥子服午攻午服子攻如嘔吐咯血因食熱物及谷芒刺澀風熱並與血氣相搏腫痛者消風散加薄荷元參全蠍或射干湯牛蒡子湯木舌重舌者用如聖勝金錠子治舌根腫者麝香硃砂丸時行咽痛者普濟消毒飲虛火因飲酒則動脾火忿怒則動肝火色欲則動腎火火炎上攻咽膈乾燥必二便如常少陰脈微治宜補虛降火血虛者四物湯加桔梗知母荊芥黃柏氣虛者四君子湯加甘草桔梗元參升麻甚則乾薑附子以為嚮導徐徐服之如痰盛者二陳湯料入青魚膽一個其膽先以糯米入內陰乾為末薑汁調服亦可探吐或千緡湯曾服涼藥自利或聲音有壞者秘傳降氣湯救之暴感風寒則咽喉緊縮妨礙者紫梗半夏湯豬膚湯腎傷寒及陰證者半桂湯蜜附子通用甘桔湯利膈湯冰梅丸犀角琥珀膏或單百草霜為末蜜丸彈子大每三丸新吸水化服凡咽喉不可純用涼藥草藥取效目前上熱未除中寒復起毒氣乘虛入腹胸前高腫上喘下泄手足指甲青紫七日以後全不入食口如魚口者死繳法用青魚膽末繳三次紅腫即散吐法用冬月青魚膽以枯礬入內臨用加百草霜炒鹽少許醋調以鴨毛蘸藥引吐痰盡如無魚膽用白礬半斤巴豆肉十枚同枯過去巴豆用引吐痰神效吐後用金鑰匙吹之常服甘桔湯最妙如牙關緊者用後開關藥或二仙散不省人事者一字散火鬱發之謂發汗也咽瘡忌汗是不誤人惟砭針出血即汗之之義也血出多則愈有針瘡者薑汁調熟水時時呷之畏針者委曲針之凡關上血泡最宜關下不見者令病人含水一口用蘆管削尖入鼻孔刺出血妙惟腎傷寒及帝中腫者忌針用蛇床子於瓶中燒煙令病人吸入喉中立愈毒結關閉者雄黃解毒丸龍腦破毒散玉鑰匙或用巴豆壓油紙上取油紙捻成條子點燈吹滅以煙燻入鼻中一時口鼻涎流牙關自開一方用巴豆肉以綿裹定隨左右塞於鼻中左右俱有左右俱塞立透蓋方中以巴豆治走馬喉痹者以熱攻熱熱則流通之意也喉痹失音者秘傳降氣湯去陳皮加黃芩風寒失音者甘桔湯加訶子木通入生地黃汁潤之或訶子散血虛受熱咳嗽聲嘶者用青黛蛤粉蜜調含化或潤肺丸蜜脂煎尋常聲音不清者加味固本丸內傷虛損喉瘡失音者無法治骨鯁用朴硝為末對入龍膽雞蘇丸內為丸彈子大噙化不過三五丸自然消化魚骨鯁食橄欖或以核為末順流水調服外用獺爪爬之自下脈法兩寸脈浮洪而溢者喉痹也脈微而浮者死治喉痹方甘桔湯治咽喉腫痛吞吐有凝甘草六錢枯桔梗三錢上銼作一服水煎食後服一方加荊芥當歸各等分有熱加黃芩枳殼如熱喉閉加山豆根射干升麻各一錢加味甘桔湯治喉痹桔梗三錢甘草防風荊芥薄荷黃芩元參各一錢上銼一劑水煎食後頻頻噙咽咳逆加陳皮若咳嗽加知母貝母發渴加五味子唾膿血加紫菀肺痿加阿膠面目腫加茯苓嘔加半夏生薑少氣加人參麥門冬膚痛加黃耆目赤加梔子黃連咽痛加鼠黏子竹茹聲啞加半夏桂枝疫毒頭痛腫加鼠黏子大黃芒硝胸膈不利加枳殼心胸痞加枳實不得臥加梔子發斑加荊芥防風若酒毒加乾葛陳皮之類桔梗湯治客熱咽痛甘草桔梗鼠黏子竹茹各等分上銼水煎服拔萃桔梗湯治熱腫喉痹桔梗甘草連翹山梔薄荷黃芩各一錢上銼入竹葉水煎服荊芥湯治咽喉腫痛語聲不出咽之痛甚荊芥半兩桔梗二兩甘草一兩上銼每服四錢加生薑三片水煎溫服如聖湯治痰熱利咽喉治咽中有瘡咽物不下及咳嗽咯血肺痿痰唾氣促並小兒瘡疹毒攻咽喉腫痛桔梗甘草生用牛蒡子炒各一兩麥門冬去心半兩上為細末沸湯調細細服入竹葉煎尤妙加味如聖湯治咽喉一切等證隨病加減桔梗三錢甘草一錢半黃芩黃連薄荷天花粉元參各一錢上水煎頻頻咽之渣再煎如風熱壅盛欲結毒潰膿加射干連翹各一錢牛蒡子八分羌活防風各七分大便秘加大黃二錢口燥咽乾加生地黃知母各一錢陰虛火動聲啞加黃柏蜜炙知母麥冬各一錢五味子二十粒清心利膈湯治積熱咽喉腫痛痰涎壅盛煩躁飲冷大便秘結防風荊芥薄荷桔梗黃芩炒黃連炒金銀花各一錢半山梔連翹元參大黃朴硝牛蒡子甘草各七分上銼作一服水煎食遠服清咽利膈湯治脾肺有熱虛煩上壅咽喉疼痛或生瘡核桔梗牛蒡子隔紙炒荊芥穗防風薄荷人參甘草各一錢二分元參一錢上水煎食後徐徐服熱甚加芩連連翹如咽痛口瘡甚者加殭蠶一兩升麻湯治咽喉腫痛上膈壅熱口舌生瘡升麻人參乾葛赤芍藥桔梗各二錢甘草上銼一服加生薑三片水煎食後熱服元參升麻湯治咽喉妨悶會厭喉腫舌赤元參鼠黏子殭蠶甘草各七分連翹一錢升麻黃連各一錢二分黃芩八分防風五分上㕮咀作一服水煎稍熱噙漱時時細嚥之即愈牛蒡子湯治風熱上壅咽喉腫痛或生癰瘡有如肉臠牛蒡子二錢升麻元參犀角黃芩木通桔梗甘草各一錢上㕮咀作一服加生薑三片水煎食後服一方無犀角有羌活有痰加瓜蔞貝母肝火加柴胡吳茱萸黃連腎火加當歸生地黃知母倍元參胃下陷加升麻風盛加荊芥殭蠶下元虛倍蜜炙附子射干湯治風熱咽喉腫痛射干升麻各二錢馬牙硝馬勃各一錢四分上銼水煎服射干湯治喉閉腫塞不通疼痛不下飲食並諸毒發動射干白芷當歸各一兩杏仁去皮尖犀角鎊甘草炙各半兩上㕮咀每服二錢水煎日三服忌海藻菘菜通氣湯治咽喉疼痛閉塞不通氣水漿不下痰涎壅盛牽牛頭末一兩半生半熟鼠黏子二錢半枳殼炒一錢二分半防風一錢九分半甘草生用一錢二分半上為細末每服三錢沸湯調服人參清肺散治脾肺不利風熱攻衝咽喉腫痛並喉閉連翹三錢黃芩大黃薄荷各一錢半人參山梔盆硝甘草各一錢白附子七分半黃連五分上銼用水一鍾半煎至一鍾食後溫服小續命湯治陰毒喉痹及卒喉痹不得語麻黃桂枝甘草各五分白朮人參川芎附子生防風防己黃芩各二分杏仁七個上銼水煎服涼膈散治臟腑積熱口舌生瘡痰實咽喉不利煩躁多渴腸胃秘澀小便不利一切風熱並皆治之大黃朴硝山梔黃芩薄荷葉各五分連翹二錢黃連荊芥石膏上銼水煎服調胃承氣湯治中熱大便不通咽喉腫痛或口舌生瘡大黃一兩芒硝四錢半甘草一錢半上銼每服五七錢水煎服大青湯治咽喉唇腫口舌糜爛疳惡口瘡大青葉升麻大黃各二錢生地黃焙三錢上水煎食後溫服微利止五痹散治五積喉痹大黃白殭蠶炒各等分上為細末每服五錢生薑自然汁蜜各半盞一處調服以利為度荊黃湯治咽喉腫痛大便秘結及風熱結滯生疔瘡荊芥四錢大黃一錢上銼水煎空心服或加防風等分治頭眩漱口地黃散治脾肺風熱上攻咽喉腫痛生瘡閉塞不通或生舌脹黃芩四錢甘草一錢二分半荊芥穗一錢薄荷葉五分上㕮咀水煎去渣熱漱冷吐不拘時通關飲治喉痹腫痛不能語言者但可進藥無不愈此從治之法也人參白朮茯苓各一錢甘草炙一錢半桔梗二錢防風七分荊芥薄荷乾薑炮各五分上銼作一服水煎徐徐與之急危痹甚者加附子五分絳雪散治咽喉腫痛咽物妨礙及口舌生瘡龍腦二分硼砂三錢硃砂二錢馬牙硝寒水石各五錢上研勻每用一字撒於舌上津咽之或吹入喉中亦可碧玉散朴硝明淨者一兩雄黃明亮者二錢青黛甘草各一錢薄荷一錢半上為末和勻瓷器內盛貯臨病量多少取出用竹筒吹入喉中輕者立效重者用真珠草即五爪龍取其根搗汁入米醋少許入碧玉散漱出痰涎自解牙關緊者用地白根即馬藍頭取根洗淨搗汁入米醋少許滴鼻孔中牙關自開如痰壅咽喉乾涸以此汁探之此草取痰至速五香散治咽喉腫痛毒氣結塞不通木香沉香雞舌香熏陸香各一兩麝香另研三分上為細末每服二錢水一盞煎五分不拘時服如聖勝金錠子治咽喉急閉腮頷腫痛並單乳蛾結喉重舌木舌硫黃細研一兩半川芎一兩臘茶薄荷葉各半兩貫眾二兩硝石研四兩荊芥二兩上為末生蔥汁攪和為錠每服先用新汲水灌漱次嚼生薄荷五七葉卻用藥一錠同嚼極爛井水嚥下甚者連進三服並以一錠安患處其病隨藥便消金鑰匙治一切風熱咽喉閉塞神效朴硝一兩雄黃五錢大黃一錢上為末吹入喉中金鑰匙治喉閉喉風痰涎壅塞焰硝一兩五錢硼砂五錢雄黃二錢白殭蠶二錢五分腦子一字上各為末以竹管吹患處痰涎即出如痰雖出咽喉不利急針刺患處以去惡血金鑰匙硃砂三分二釐硼砂一分二釐枯礬膽礬各一分六釐熊膽焰硝片腦各一分麝香少許上為細末竹筒吹入喉中金鑰匙治咽喉腫塞雄黃研末半分巴豆一粒去油上作一服用生薑自然汁調灌下或吐或利皆愈一方細研每遇急患不可針藥者用酒瓶裝灰至瓶嘴下裝火一炷藥候煙起將瓶嘴入一旁鼻中以紙覆瓶口熏之愈如聖散治咽喉一切急患不得開雄黃藜蘆元參白殭蠶炒白礬生用各二錢乳香一字上為細末研勻每用一字兩鼻內嗅之口含水及舌下擦嚏出涎立效七寶散殭蠶白直者七個豬牙皂角一挺去皮弦全蠍頭角全者十個去毒硼砂雄黃明礬各一錢膽礬半錢上為細末每用一字入喉中即愈碧雲散治咽喉閉塞一時不能言語痰涎壅盛燈心灰二錢硼砂一錢上研為細末用鵝翎管吹入喉中立效吹喉散治咽喉腫痛急慢喉閉懸癰乳蛾咽物不下訶子一兩醋浸一宿去核黃芩酒浸一宿各曬乾牛蒡子生甘草薄荷各五錢明礬一錢半膽礬一錢半上為末先用好生薑擦舌上每用藥一錢蘆管吹入喉中吐出涎痰便用熱茶吃下再吹第二次便用熱粥三次再吹用熱茶或熱粥乘熱食之加朴硝末少許如口舌生瘡用藥吹之口中立去痰涎為妙一方有百藥煎吹喉散治咽喉一切腫痛綠礬半兩別用青魚膽以礬研細入內陰乾巴豆七粒去殼朴硝二錢另研銅青輕粉各五分青黛少些另研上將膽礬同巴豆肉於銅銚內飛過去巴豆合朴硝以下四味再加麝香少許研勻每用一字吹入喉中吐出痰血立愈青魚膽礬吹入喉中瘡極效吹喉散壁錢燒存性枯白礬發灰各等分上研細吹喉中吹喉散治一切咽喉腫痛並喉舌垂下腫痛者膽礬白礬朴硝片腦山豆根辰砂各等分上先將雞肫內黃皮焙燥共前藥研為細末用鵝毛管吹入喉中即效破棺丹治咽喉腫痛水穀不下青鹽白礬硇砂各等分上為末吹患處有痰吐出開關神應散治一切喉風有起死回生之功蜈蚣焙存性三錢膽礬全蠍去毒焙存性殭蠶去絲嘴蟬退焙存性川烏尖各一錢穿山甲麩炒蟾酥各三錢乳香五分上為末每服一錢半或二錢小兒每服一分或七釐同蔥頭搗爛酒和送下出汗為度如口不能開灌服忌豬羊雞魚油麵諸般熱毒等物一七日奪命丹治咽喉一切腫毒木舌雙乳鵝喉閉等證紫河車密陀僧各五錢砂仁貫眾殭蠶直者烏魚骨茯苓各一錢麝香少許上為細末麵糊丸如彈子大陰乾用一丸無根水津一時頻飲一丸作二服神效開關散治喉風氣息不通白殭蠶炒枯白礬各等分上為細末每服三錢生薑蜜水調下細細服之稀涎散治喉閉數日不能食者豬牙皂角四條去黑皮白礬一兩上共為末每服三字吹入喉中吐之涎盡病愈神方治喉閉如神豬牙皂角白礬黃連各等分上銼細新瓦上焙乾為末每用錢半吹喉中吐膿血立愈奪命散治急喉風白礬枯殭蠶直者炒斷絲硼砂皂角各等分上為末少許吹入喉中痰出瘥一方治喉痹青黛五分豬牙皂角去皮弦五錢膽礬熟者一錢半上為細末醋薄糊為丸如櫻桃大每用一丸以熟絹裹在箸頭上用好醋潤透將藥點在口內喉瘡上咬著箸其涎如水即解後服防風通聖散龍腦散治咽喉腫痛皆因風熱在於脾肺邪毒蘊滯胸膈不利故發疼痛急喉痹閉塞腫痛粥飲難嚥硼砂腦子硃砂各一分滑石三錢石膏水飛二兩甘草生取末半錢上為細末每服半錢用新汲水調服或干撒咽津亦得龍腦破毒散治不測急慢喉痹咽喉腫塞不通盆硝研細四錢白殭蠶微炒去嘴生甘草為末青黛各八錢馬勃末三錢蒲黃半兩腦子麝香各一錢上研令極細用磁盒子收如有病證每用藥一錢用新汲水小半鐘調勻細細呷咽如是喉痹即破出血便愈如不是喉痹自然消散也若是諸般舌脹用藥半錢以指蘸藥擦在舌上下咽津如是小兒一錢作四五服亦如前法用並不計時候一方黃芩甘草黃連牙皂當歸梢薄荷訶子米醋浸七日曬乾百藥煎白礬膽礬各一錢片腦五分上為細末每用半錢用蘆管吹入喉中加味三黃丸大黃黃芩黃連各二兩半硼砂二兩黃藥子白藥子各一兩半山豆根黃柏苦參各一兩京墨三錢片腦一錢半麝香少許上為末豬膽汁調攤甑內蒸二次後入片麝硼為丸豆大噙化冬加知母甘露內消丸治咽喉腫痛不利咽乾痛上焦壅滯口舌生瘡薄荷葉一兩川芎二錢桔梗三錢甘草一錢人參訶子各五分上為細末煉蜜丸如皂子大硃砂為衣每服一丸噙化上清丸治咽喉腫痛痰涎壅盛薄荷一斤川芎防風各二西桔梗五兩甘草四兩砂仁半兩上為細末煉蜜丸如皂角子大每服一丸噙化一方有硼砂一兩上清丸清上利咽膈南薄荷四兩桔梗甘草各一兩半白豆蔻一兩片腦一錢上為末蜜丸噙化加孩兒茶一兩效尤速清上丸治喉中熱毒腫痛喉閉乳蛾等證熊膽一分雄黃一錢青鹽五分薄荷葉五錢硼砂一錢膽礬少許上為細末煉化白砂糖為丸如雞頭子臥時舌壓一丸自化入喉神效冰梅丸治喉風腫痛如神十八種皆效天南星鮮者二十五個切片大半夏五十個切片皂角白礬食鹽防風朴硝各四兩桔梗二兩上用落熟梅子百個先將鹽以水浸化然後將各藥研碎入水拌勻以梅子入藥水中浸過三指為度曬至水乾以瓷罐收貯密封如霜起最妙用時以薄綿裹定噙口中令津液徐徐嚥下痰出自愈碧玉丸治心肺積熱上攻咽喉腫痛閉塞水漿不下或生瘡癤重舌木舌並宜服之青黛盆硝蒲黃甘草各一兩上為末用砂糖為丸每兩作五十丸每一丸噙化或用干藥末撒咽膈內亦好麝香硃砂丸治咽喉腫閉或生瘡或舌根腫痛馬牙硝七錢鉛白霜龍腦硼砂各三錢寒水石六兩麝香二錢硃砂一兩半上研極細末用甘草十兩熬成膏和丸如桐子大硃砂為衣每含一二丸雞蘇餅清上焦潤咽膈生津液化痰降火止咳嗽雞蘇葉硼砂各五錢白葛粉一兩烏梅肉二兩五錢真檀香二錢柿霜四錢白冰糖八兩上為極細末入好冰片一分五釐研為末旋和入煉蜜搜和稍帶硬些印成餅如櫻桃大每服一餅噙化青龍膽治咽喉閉塞腫痛並單雙乳蛾大有神效用好鴨嘴膽礬盛於青魚膽內陰乾為末吹入喉中加熊膽牛黃梅花冰片各三分甚妙救急方治喉風口噤不語死在須臾膽礬五分半生半枯熊膽木香各三分上研細末用番木鱉井水調和以雞翎蘸掃患處如勢急口噤以箸啟之用藥掃下即消喉痹方並治口瘡牙疳喉痹牙關緊急神效火硝五錢硼砂二錢半蒲黃一錢孩兒茶二錢二分半片腦一分半上為細末用筆管撥開蘆管吹入大吐其痰不過數次立愈神效散治喉痹語聲不出荊芥蓖麻肉各等分上為末蜜丸皂子大含化馬鞭草散治患喉痹咽腫連頰吐氣數者馬鞭草搗取自然汁每服咽一合許又有用馬銜鐵煮汁服亦妙一方治喉痹用射干即扁竹根也旋取新者不拘多少擂爛取汁吞下或動大府即解或用釅音驗酒醋味厚也醋同研取汁噙引出涎更妙一方用射干切一片嚥下又一方取蠐螬蟲汁點在喉中下咽即開一方用青艾葉一握用醋同搗敷痹處冬用乾者一方遠志去心為末每半錢水小半盞調服口含竹管吐痰涎極捷其效如神用豬牙皂角和霜梅為末噙之一方杜牛膝搗自然汁和醋服之一方用馬屁勃白礬等分為細末以鵝翎吹入喉中吐痰二升愈一方用朴硝一兩細細噙咽汁立愈一方治卒喉痹取黃柏片含之又黃柏一斤㕮咀酒一斗煮二沸去渣頻飲便愈一方蘿蔔汁咽之甚佳一方李實根一斤噙口內佳一方蓖麻子取肉槌碎紙卷作筒燒煙吸之一方治急喉閉逡巡不救者蠡魚膽臘月收陰乾為末每用少許點患處藥至即瘥病深則水調灌之一方用李實根研水敷項上一遭一方用羊蹄獨根者勿見風日及婦人雞犬以三年醋研和如泥生布拭喉令赤敷之又一方用遠志去心水調敷項上一遭一方用皂角去皮弦子生半兩為細末以箸頭點少許在腫痛處更以醋糊調藥未厚塗項下須臾便破血出一方用蛇床子燒煙燻入喉中即愈又一方切商陸根炙熱隔布熨之冷輒易立愈一方用枯礬末吹納喉中急用燈盞底油腳灌下一方治喉痹壅塞不通取紅藍花搗絞取汁一小升服之以瘥為度如冬月無濕花可浸乾者濃絞取汁如前服之極驗咽喉塞服之皆瘥一方用茜草一兩煎服降血中之火一方焰硝枯礬各五分硼砂一錢杜牛膝一錢半上為末調敷經驗秘方治喉痹神效馬藺菊五介龍草車前草各等分上三味搗汁徐徐飲之蜜附子治臟寒喉閉吞吐不利用附子切片蜜塗炙黃色每含一片咽汁味盡再易一片治喉痹秘方歌曰喉痹為急病須臾命不通急研新艾水入口便和同臘月無新艾蛇床瓶內燒其煙繞入口此病一時消一方治中風急喉痹欲死者用白殭蠶搗篩為末生薑自然汁調下喉立愈一方治咽喉腫痛山豆根射干花根各陰乾上為末吹入喉中大凡咽喉腫痛或喉痹急證用山豆根磨水噙漱立愈奪命箸頭散治急喉痹咽喉腫痛堵塞氣不得通欲死之狀膽礬草烏各四錢綠礬六錢雄黃二錢上為末用一箸頭點上咽喉內急吐涎沫立應次以大黃甘草等分為粗末每服三錢水一盞半煎至一盞去渣化乳香一粒溫服滌去熱毒恐為再發一方加白礬二錢一方治走馬喉痹用巴豆去皮以綿子微裹隨左右塞於鼻中立效如左右俱有者用二枚塞左右鼻中熏法治咽喉牙關緊急用巴豆去殼以紙包巴豆肉用竹管壓出油在紙上卻以此紙作捻子點燈吹滅以煙燻入鼻中一霎時口鼻涎流牙關開矣灸法治累年喉痹舉發男左女右以手大指甲第一節灸二三小壯針法治喉閉針少商穴出血立愈其穴在兩手大指甲內側去爪甲角韭葉許三稜針針之針合谷二穴在虎口針五分針尺澤二穴在臂中橫紋出血妙治纏喉風方解毒雄黃丸治纏喉風及急喉閉卒然倒僕牙關緊急手足厥冷氣閉不通即死雄黃二兩鬱金巴豆去油十四粒上為末醋糊丸如綠豆大每服七丸熱茶下吐出頑涎即生如口噤以物斡開灌之下咽無有不活者搐鼻亦可如無此藥急用升麻四兩濃煎水灌之或吐或不吐即安二聖散治纏喉風急喉痹鴨嘴膽礬一錢白殭蠶二錢上為末每吹入少許入喉中立驗一字散治時氣纏喉鳳漸入咽塞水穀不下牙關緊急不省人事雄黃二錢半蠍梢七枚白礬生研藜蘆各二錢豬牙皂角七錠一方五味各等分上為細末每用一字吹入鼻中吐出頑涎即愈又一方無蠍梢備急如聖散治風痰壅盛咽喉腫痛水穀不下牙關緊急不省人事或時氣纏喉風並用雄黃白礬枯藜蘆生用豬牙皂角去皮炙黃等分上為末每用一字搐入鼻內吐痰為愈玉鑰匙治風熱喉閉及纏喉風焰硝一錢半硼砂半錢殭蠶片腦各少許上為末以竹管吹半錢入喉中奪命無憂散治纏喉風咽喉疼痛風涎壅盛口舌生瘡心腹脹滿脾積微塊小兒奶癖誤吞骨屑硬塞不下熱盛喉閉涎滿氣急悶亂不省人事並皆治之元參貫眾滑石砂仁黃連茯苓山豆根荊芥甘草各五錢寒水石煨硼砂各三錢上為末每服一錢干撒舌上後以新汲水嚥下不拘時任是百毒硬物可以除化如吃著巴豆杏仁辛辣薑桂胡椒燥熱蔥韭蒜等物及諸藥毒火毒亦可用此藥每用半錢能潤三焦消五穀除三尸去八邪殺九蟲趕瘟疫療渴疾其效如神魯直號金臺玉簡方一方名玉屑無憂散烏犀角膏治咽喉腫痛及一切結喉爛喉遁屍繞喉痹喉急喉飛絲入喉重舌木舌等證皂莢兩條槌啐用水三升浸一時久濾汁去渣入瓦器內熬成膏好酒一合焰硝百草霜人參各一錢為末硼砂白霜梅各少許上拌和一處用鵝翎點少許於喉中以出盡頑涎為度卻嚼甘草二寸咽汁吞津若木舌先以粗布蘸水揩舌冷次用生薑片擦之然後用藥救命散治脾胃熱毒上攻咽喉有瘡並纏喉風膩粉三錢匕五倍子二錢半大黃銼炒白殭蠶直者炒黃連甘草生各半兩上為細末每服一字大人以竹筒吸之小兒吹之如餘毒攻心肺咽有瘡用男孩兒乳汁調藥一字以雞翎探之嘔者生不嘔者死白礬散治纏喉風急喉閉白礬三錢巴豆三枚去殼分作八片上將白礬於銚內慢火熬化為水置巴豆其內候乾去巴豆取白礬研為末每用少許以竹管吹入喉中立愈本事方去巴豆用烏雞子清一個調白礬灌入喉內立效如神活人不計數幸毋忽春風散治咽喉腫痛纏喉風閉塞殭蠶黃連俱銼碎朴硝白礬青黛各五錢上先於臘月初一日取豬膽五六個將藥裝入膽內縛定膽外用青紙裹了將地掘一方坑長闊一尺上用竹竿橫吊以膽懸定於內候至春日取出置當風處吹乾去皮以藥研末密收吹喉一方治纏喉風束氣不通蛇蛻炙黃當歸各等分上為末溫酒調下一錢匕得吐愈一方治纏喉風喉痹飲食不通欲死者用反魂草根一莖淨洗納入喉中取寒痰出即瘥神驗更以馬牙硝津咽之即絕根反魂草一名紫菀一方用皂角揉水灌下得吐愈一方用雄黃一塊新汲水磨急灌吐瘥一方用鵝翎蘸桐油探之一方用射干逆流水吐之丹溪方有人患纏喉風食不能下大麥面作稀糊咽之滑容易下咽以助胃氣火刺法治纏喉風用巴豆油塗紙上捻成條子以火點著才煙起即吹滅之令患人張口帶火刺於喉間俄傾吐出紫血半合即時氣寬能言及啖粥飲蓋火氣熱處巴油皆到火以散之巴以瀉之煙以吐之乃一舉而三善之方也針法治喉中紅赤凡患人喉中紅赤宜用針從旁針之出血即愈所以必欲從旁針者避夫啞門穴人身項後入髮際五分為啞門犯之令人失音故耳治咽嗌痛方甘桔防風湯治咽痛甘草五錢桔梗防風各三錢上銼水煎服丹溪治咽喉痛用甘桔加荊芥當歸增損如聖湯治風熱攻衝會厭語聲不出咽喉妨悶腫痛桔梗二兩甘草炙一兩半枳殼湯浸去穰防風各半兩上為細末每服三錢水煎去渣入酥如棗許攪勻食後服桔梗湯治咽喉微覺腫痛聲破難語桔梗甘草炙當歸馬勃各一錢麻黃去節五分白殭蠶炒黃芩各三分桂枝少許上銼作一服水二盞煎至一盞去渣稍熱食後徐徐呷之桔梗湯治咽喉疼痛如有物妨悶桔梗炒五錢半夏湯泡七次二錢半人參甘草炙各一錢半上㕮咀每服一兩水煎食後溫服消毒散治咽喉腫痛小兒瘢疹已出不勻雖出不快壯熱狂躁咽膈窒塞臥睡不安大便秘澀牛蒡子炒六兩甘草二兩荊芥穗一兩上為粗末作一服水一盞煎七分去渣每食後溫服一方治實熱咽痛黃連荊芥薄荷各等分上為末蜜薑汁調噙咽喉備急丹實熱降收之青黛芒硝白殭蠶各一兩甘草四兩上為細末用臘月內牛膽有黃者盛藥其中陰四十九日多時尤妙用時旋取如腮喉閉用皂子大塊碾碎為末以竹筒吹之咽喉內愈發聲散治咽痛妨悶咽物則微痛不宜寒涼藥過泄之此妨悶虛熱也瓜蔞一個白殭蠶微炒半兩桔梗七錢半甘草炒二錢上為細末每用少許干撒咽喉中若腫痛左右有紅或只一壁紫長大水米難下用此散一錢朴硝一錢和勻撒喉中咽津如喉中生赤腫或有小白頭瘡用前散一錢匕白礬研細半錢撒升麻六物湯升麻梔子各二錢大青杏仁黃芩各一錢半上為粗末每服五錢匕水一小盞半蔥白三莖煎至一盞去渣溫服又法黃柏蜜浸一宿噙之咽汁勿絕瘥加味四物湯治虛火上升喉痛並喉生瘡喉痹熱毒最能降火甚妙當歸川芎黃柏蜜水微炒知母去毛天花粉各一錢熟地黃白芍藥各一錢二分桔梗一方作元參甘草各三錢上銼一劑水煎入竹瀝溫服代針散治咽喉腫痛氣息難通硇砂少許為君白礬皂角子大為臣牙皂七分為良硝石四兩為相黃丹五錢五方巴豆六個六甲上為末吹喉中解毒丸治風熱上攻咽喉腫痛又治咽喉腫痛欲死者喉閉急也白殭蠶南星各等分上並生用為細末生薑自然汁調服立愈噙化丸治咽喉腫痛或聲不清或聲啞咽喉乾燥或生瘡者並治南薄荷葉楝參各五錢生地黃一兩生甘草二兩白桔梗三兩山豆根八錢片腦三分上為細末煉蜜丸如龍眼大二丸分三次臨臥噙化噙化三黃丸治咽喉痛大效山豆根一兩硼砂二錢龍腦麝香各少許上為末用青魚膽為丸如綠豆大每服三五丸噙化津咽一方治喉痛硼砂膽礬白殭蠶陳霜梅各等分上為末和噙龍麝聚聖丹治心脾客熱毒氣攻衝咽喉赤腫頭痛或生喉痹或結硬不消愈而復發經久不愈或舌本腫脹滿口生瘡飲食難嚥並宜服之川芎一兩生地黃犀角屑羚羊角琥珀研元參連翹桔梗升麻鉛白霜各五錢人參赤茯苓馬牙硝片腦麝香各三錢硃砂牛黃各二錢硼砂一兩金箔十五片上為細末煉蜜丸如龍眼大金箔為衣每一丸薄荷湯化下或細嚼或噙化如無薄荷新水亦可臥用之祛毒牛黃膏治大人小兒咽喉腫痛舌本強硬滿口生瘡涎潮喘急飲食難進咽膈不利牛黃研三錢半元參升麻各三錢人參琥珀犀角桔梗生地黃硼砂各半兩雄黃寒水石煅各一兩蛤粉水飛四錢硃砂鉛白霜腦子各一錢上為細末煉蜜九如小彈子大金箔為衣用磁器收貯每服一丸濃煎薄荷湯化下或新汲水亦得日進二三服噙化亦得一方治咽痛百藥煎去黑皮硼砂甘草生白礬各等分上為細末每服一錢食後米飲調細細呷之一方治咽痛神效白殭蠶為末以生薑自然汁調服若咽喉生瘡損破不用生薑用之辛辣痛又能散不收一方治咽喉生瘡腫痛蓖麻子一粒去皮朴硝一錢上同研新汲水作一服連進二三服神效一方治喉痛山豆根含一片細嚥津極妙一方燒筆頭灰漿水飲下方寸匕一方治咽喉卒腫飲食不通黃柏搗末敷腫上冷復易之用苦酒和末佳一方治咽痛用諸藥不效者此非咽痛乃是鼻中生一條紅線如發懸一黑泡大如櫻珠垂掛到咽門而止口中飲食不入用深取牛膝根直而獨條者洗淨入好醋三五滴同研就鼻孔滴二三點入去則絲斷珠散其病立安一方治咽喉塞鼻中瘡出及乾嘔頭痛食不下生雞子一個開頭取白去黃著米醋煨拌溏火頓沸起擎下沸定須頓三度就熱飲醋盡不過一二次瘥治喉瘡乳蛾方上清連翹散治諸瘡腫毒咽喉疼痛煩渴大便自利虛熱不安連翹山梔子防風甘草各一錢上銼水煎食後服清咽消毒散治咽喉瘡腫痰涎壅盛或口舌生瘡大便秘結川芎茯苓枳殼前胡柴胡羌活獨活荊芥防風黃芩黃連大黃朴硝各等分上銼每服一兩水煎服元參散治懸癰腫痛不可忍元參升麻射干大黃各一錢半甘草一錢上銼作一服水煎緩緩噙咽佛手散治咽喉腫痛生瘡風熱喉痹腫塞薄荷二兩盆硝一兩甘草七錢桔梗蒲黃各五錢青黛三錢上為細末每用少許干撒又用竹管吹咽喉內噙化下時時用之硼砂散治咽喉瘡腫閉塞不通硼砂白殭蠶百藥煎川芎各三錢山豆根盆硝紫河車薄荷各五錢青黛一錢上為細末每服大人半錢小兒一字撒咽中或水調服硼砂散治心氣熱毒內攻咽喉生瘡腫痛木舌脹腫甚悶塞水食不下元參貫眾茯苓砂仁滑石荊芥穗山豆根生甘草各五錢南硼砂三兩薄荷一兩上為細末每服半錢新汲水調下或干撒舌上咽津通隘散治喉痛生瘡聲啞白硼砂二錢孩兒茶青黛滑石寒水石各一錢蒲黃牙硝枯礬各六分黃連黃柏各五分片腦二分上為末以葦筒納藥少許吹入喉中即效乾薑散治懸雍熱卒暴腫大乾薑半夏湯泡去滑等分上為細末以少許著舌上咽津一方治懸雍垂長咽中妨悶白礬一兩燒灰鹽花一兩上研細以箸頭點藥在上射干丸治懸雍腫痛咽喉不利射干天竺黃馬牙硝各一兩犀角屑元參升麻白礬白藥子黃藥子甘草各五錢上為末煉蜜丸如小彈子大每用一丸綿裹噙化萆薢散治楊梅瘡不拘初起潰爛或發於喉舌間並效萆薢當歸白芷皂角刺薏苡仁各二錢白鮮皮木瓜不犯鐵器木通金銀花各七分甘草五分土茯苓五錢一名冷飯糰上銼水煎服羅清散治單雙乳蛾薄黃五錢羅青盆硝研各三錢甘草二錢上為細末每服一錢冷蜜水調細細嚥之吞不下雞翎蘸藥喉內掃之立效粉香散吹乳蛾即開白礬三錢巴豆三粒去皮油輕粉麝香各少許上於鐵器上飛白礬沸入巴豆在礬內候枯去豆不用為細末三味和合吹喉中二礬散治咽喉乳蛾雄黃鬱金各五錢白礬生用二錢半膽礬五分上為細末以竹管吹入喉中立能言語牛膽散治雙蛾黑牛膽一個膽礬三錢硼砂二錢山豆根一錢上為末同入膽內用線掛陰乾點至喉中吹亦可一方治乳蛾喉痹蠶蛾末三錢孩兒茶辰砂各一錢生白礬三分上為細末吹入喉中即效一方治喉痹雙乳蛾壁上蜘蛛白窩取下患者腦後發拔一根纏定蛛窩燈上以銀簪挑而燒之存性為末吹入患處立消一方治乳蛾喉閉急將患人面朝上睡於地下兩手採住頭髮腳踏肩其毒自散或打破鼻血出毒亦散之一方治乳蛾用杜牛膝根紅者研調男用女乳汁女用男乳汁納鼻汲之一方治喉中卒生肉綿裹箸頭蘸鹽揩一日六七次易之筆針名醫錄云李王公主患喉癰數日痛腫飲食不下召到醫官盡言須用針刀潰破公主聞用刀針哭不肯治痛迫水穀不入忽有一草澤醫曰某不用刀針只用筆頭點藥癰上霎時便潰公主喜令召之方兩次上藥遂潰出膿血一盞余便寬兩日瘡無事令供其方醫云乃以針系筆心中輕輕劃破而潰之耳無他方也治喉喑方訶子湯治失音不能言語訶子四個半生半炮桔梗一兩半生半炙甘草二寸半生半炙上為細末每服二錢童便一盞水一盞煎五七沸溫服甚者不過三服愈一方大訶子四個桔梗三兩甘草二兩炮製皆同每服一錢匕入砂糖一小塊不入童便獨用水五盞煎至三盞時時細呷一日服盡其效甚速一方有木通各等分水煎入生地黃汁一小盞攪勻徐徐服之一方有木通無桔梗訶子散治久嗽語音不出者宜用訶子去核杏仁去皮尖各一兩通草二錢上銼每服四錢煨生薑五片水煎去渣溫服清咽安肺湯聲啞者寒包其熱也亦有痰熱壅於肺者經云金空則鳴必清肺中邪滯用此瀉之桔梗二錢山梔子炒黃芩炒桑白皮蜜炒前胡知母貝母甘草炙各一錢上銼水煎食後服發聲散治咽喉腫痛語聲不出經驗方瓜蔞皮白殭蠶去頭甘草俱炒黃各等分上為細末每服三錢溫酒調下或生薑自然汁調下用五分綿裹噙化咽津亦得不拘時候日兩三服四聖散治咳嗽有失聲者晉礬葛根槐花子山梔子各等分上㕮咀水二盞加烏梅甘草各少許煎一盞入蜜少許食後服千金方治暴嗽失音語不出杏仁研如泥薑汁砂糖白蜜各一升五味子紫菀各三兩通草貝母各四兩桑白皮五兩上㕮咀以水九升煮五味子等藥取三升去渣納杏仁泥薑汁蜜糖攪勻微火煎取四升初服三合日再夜一後稍加通聲膏五味子款冬花通草各三兩人參細辛桂心青竹皮菖蒲各二兩杏仁一升白蜜二斤棗膏薑汁各一升酥五升上㕮咀以水五升微火煎三上三下去渣納薑棗蜜酥煎令調酒服如棗大二丸一方甘草桔梗烏梅烏藥各等分上銼水煎食後頓服潤肺丸治嗽而失音訶子五味子五倍子黃芩甘草各等分上為末蜜丸噙化清音丸治咳嗽失聲桔梗訶子各一兩甘草五錢硼砂青黛各三錢冰片三分上為細末煉蜜丸如龍眼大每服一丸噙化響聲破笛丸治謳歌火動失音連翹桔梗各四兩大黃半兩薄荷四兩甘草二兩半百藥煎二兩川芎一兩半砂仁訶子炒各一兩上為末雞子清為丸如彈子大每服一丸臨臥時噙化徐咽玉粉丸治冬月寒痰結咽喉不利語聲不出經云寒氣客於會厭卒然如症宜服半夏湯洗五錢草烏官桂各二錢半上為細末生薑汁浸蒸餅為丸如芡實大每服一丸至夜噙化多年不愈亦有效蛤蚧丸治肺間邪氣胸中積血作痛失音並治久咳失音蛤蚧一對去嘴足溫水浸去膜颳了血脈用好醋炙訶子煨去核阿膠炒生地黃麥門冬去心北細辛去苗甘草炙各半兩上為末煉蜜丸如棗大每服一丸食後含化內侍曹都使新造一宅落成遷入經半月餘酒大醉臥起失音不能語召孫至診曰因新宅故得此疾耳半月當愈但服補心氣薯蕷丸治濕用細辛川芎又十日其病漸減二十日全愈曹既安見上問誰醫曰孫兆郎中上乃召問曰何疾也對曰凡新宅壁土皆濕地亦陰多人乍來陰氣未散曹心氣素虛飲酒至醉毛竅皆開陰濕之氣從而入乘心經心經既虛而濕氣又乘之所以不能語臣先用薯蕷丸使心氣壯然後以川芎細辛又去濕氣所以能語也治咽中如梗方半夏厚朴湯治婦人咽中如有炙臠半夏一升厚朴三兩茯苓生薑各四兩蘇葉二兩上銼以水七升煮取四升分溫四服日三夜一丹溪方治痰結核在咽此濕痰必用痰藥中咸能軟堅之味瓜蔞實青黛杏仁海蛤粉桔梗連翹風化硝各等分上為末姜蜜丸噙化潤喉散治氣鬱夜熱咽乾硬塞桔梗二錢半紫河車四錢香附三錢百藥煎一錢半粉草一錢上為末敷口內治諸物梗喉方神仙釣骨丹治諸骨鯁喉其骨自隨藥帶下或吐出如神砂仁丁香各一錢血竭磁石龍骨各五錢上為細末黃臘三錢為丸硃砂為衣每服一丸香油煎好醋吞下如要吐用矮荷煎好醋吃後用濃茶任服如無矮荷以桐油代之矮荷即納內銷其葉似荷樹葉其條紅其樹矮短治骨鯁入喉諸方縮砂甘草等分為末以綿裹少許噙之旋咽津良久骨隨痰出一方槿樹葉油馬屁勃砂糖三味熬膏為丸噙化累效一方用水牛糞上生出蕈曬乾為末用砂糖為丸徐徐噙嚥下仍用砂糖為衣不然損牙一方用朴硝為末對入龍腦雞蘇丸內如彈子大噙化不過三五丸自然消化一方白茯苓一味臨時切細為末以所鯁骨煎湯調下一方治雞骨鯁用水簾草搗汁飲之骨自消又一方諸骨鯁用飴糖如雞子大吞之如不下更作大團吞之至十團無不下一方用象牙屑以新汲水一盞浮牙屑水上吸之其骨自已一方用象牙梳磨水嚥下或桑木上蟲屑米醋灌自下又一方用狗吊一足取其涎灌之即消以狗善食諸骨也一方用細茶濃煎速吃五七碗以飽為度卻用老鴉刀子擂爛冷水調服即吐如不吐將鵝翎掃喉即吐其骨一方用霜梅肉槌成指大作丸子將綿裹以線穿在內冷茶送下扯住線頭在手一嘔即出一方用胡荽略擂拌醋並渣嚥下即解一方用人指甲燒存性吹入喉中立效又一方用韭白三根搗爛捻為丸如骨子大用綿纏裹線扎嚥下鯁處手牽線吐出原骨效一方用綿一塊以蜜煮用如食韭法一方燈心以竹筒填滿火燒過取燈心灰用米糖化開調灌下勿犯牙一方用硼砂二塊噙之骨自下一方用金鳳花子或根嚼爛噙下骨化用溫水嗽口免傷齒治雞骨尤效一方金鳳花子為末醋調稀糊放舌上慢慢嚥下不可犯牙一方乳香燒煙吸入喉即吐一方以野苧根洗淨搗爛如泥每用圓眼大如被雞骨傷以雞羹化下如被魚骨傷以魚汁湯化下一方瞿麥為末以調方寸匕服一方用五焙子茶葉為末吹患處治魚骨鯁諸方用砂糖白炭皮末紫蘇葉滑石末和丸含口中津液嚥下骨自隨下一方食橄欖或以核為末順流水調服外用獺爪於項下爬之自下亦可煮汁飲之一方用細茶五倍子等分為末吹喉中立愈一方以皂角末少許吹入鼻中得噴即出一方用螻蛄膽一枚吞下亦治刺不出敷之刺即出一方取鯉魚鱗皮合燒作屑水服之即出未出即服一方另取魚骨一根插於患人頭髮內不必言須臾自下一方用山楂樹獨根向下者與玉簪花根同搗取自然汁用匙或竹筒盛汁送入口內不可著牙著牙皆化一方用玉簪花根研細取汁竹管灌喉中不可著齒著則齒酥一方以萱草根汁服之可立視骨下一方細嚼蘿蔔徐徐咽之立愈一方治魚骨鯁百法不能療者餳糖丸如雞子黃大吞之立出一方楮子搗自然汁濾去渣服或收曬乾為末水和汁服亦可一方用楮樹皮一方用生艾數升水酒各五升煮取四升稍熱服之一方治魚骨在肚中刺痛煎茱萸汁一盞飲之骨軟而出金鉤釣食丸治諸鯁用威靈仙根不拘多少以好米醋浸一二日曬乾為末醋糊丸如桐子大每服一丸或二丸半茶半湯下如要吐轉用砂糖銅青為末半匙滴油一二點同茶湯調服即吐出原物如藥性來遲令患人兩手伏地用清水一盆以鵝翎口中攪探即吐出於盆中治稻芒麥芒刺喉間方急取鵝吊一足取涎灌之即下以鵝善消稻麥也或取薦頭草嚼亦妙萬病解毒丸治一切中毒及誤吞銅錢碗瓦大黃大戟連翹寒水石各二兩白玉簪白芷黃芩茯苓石膏滑石天花粉各三兩甘草薄荷乾葛各四兩山茨菰六兩貫眾一兩半青黛五錢上為末綠豆粉丸如彈子大每服一丸薄荷湯磨下與銅鐵碗瓦同嚼能化為粉碎此其驗也治誤吞銅錢及環用飴糖一片漸漸食之自出一方服蜜升許一方用砂仁濃煎汁飲之其銅自下一方用苧薺研爛服之其銅自化一方用堅炭為末米飲調服於大便中瀉下如烏梅狀一方用艾一把水五升煎至一升頓服便下一方百部根四兩酒一升漬一宿溫服一升日再服一方用家茨菰取汁呷飲自消治誤吞錢及金銀鐵等物但多食肥羊脂諸般肥肉等味隨大便而下一方用胡粉一兩搗調之分再服如吞金銀物在腹中以水銀服之令消烊一方用南燭根燒為細末湯調一錢服之自下一方治誤吞鐵針用蠶豆粉熟同韭菜吃下針與菜從大便而出一方用餳糖半斤濃煎艾汁調和服之一方用磁石磨如棗核大鑽眼以線穿令吞喉間針自出治誤吞釵取薤白曝令萎黃煮使熟勿切食一大棗釵即隨出戴人取錢哽法一小兒誤吞一錢在喉中不下諸醫皆不能出亦不能下乃命戴人熟思之忽得一策以淨白表紙卷令實如箸以刀縱橫亂割其端作鬅鬠鬅音朋鬠音擴鬅鬠被髮短也亂也之狀又別取一箸縛針鉤於其端令不可脫先下咽中輕提輕抑探之覺鉤入於錢竅然後以紙卷納之咽中與鉤尖相抵覺鉤尖入紙卷之端不礙肌肉提之而出巧匠取喉鉤法宋鹹平中職方魏公在澶州有數子弟皆幼因相戲以鉤竿垂釣用棗作餌登陸釣雞雛一子學之而誤吞其鉤至喉中急引之而鉤須已逆不能出命諸醫不敢措手魏公大怖遍問老婦必能經歷時有一老婦年餘九十歲言亦未嘗見此竊料有識者可出之時郡中莫都料性甚巧令聞魏公魏公呼老婦責之曰吾子誤吞鉤莫都料何能出之老婦曰聞醫者意也莫都料曾在水中打碑塔添仰瓦魏公悅遂召至沉思良久曰要得一蠶繭及念珠一串公與之都料遂將繭剪如錢用物尋其四面以油潤之中通一小竅貫之鉤線次貫念珠三五枚正兒坐開口漸加念珠引之至喉覺至系鉤處用力向下一推其鉤已下而脫即向上急出之見繭錢向下裹定鉤須須臾而出並無所損魏公大喜遂厚賂之曰心明者意必大巧意明者心必善醫治誤吞田螺梗喉不下死在須臾用鴨一隻以水灌入口中少頃將鴨倒懸令吐出涎水與患人服之其螺即化凡治哽之法皆此類推如鸕鷀治魚哽磁石治針哽發灰治發哽貍虎治骨哽亦各從其類也治吞發纏喉不出取自己發作灰白湯調服一錢卷一百零七牙齒論東垣曰夫齒者腎之標口者脾之竅諸經多有會於口者其牙齒是手足陽明之所過上齦魚斤切音銀齒本也齒根肉也隸於坤土乃足陽明胃之脈所貫絡也止而不動下齦嚼物動而不休手陽明大腸之脈所貫絡也手陽明惡寒飲而喜熱足陽明喜寒飲而惡熱故其病不一牙者腎之標亦喜寒寒者堅牢熱甚則齒動齦齗袒脫作痛不已故所治療不同也有惡熱而作痛者有惡寒而作痛者有惡寒又惡熱而作痛者有惡寒飲少熱飲多而作痛者有惡熱飲少寒飲多而作痛者有牙齒動搖而作痛者有齒袒而作痛者有齒齦為疳所蝕缺少血出而作痛者有齒齦腫起而作痛者有脾胃中有風邪但覺風而作痛者有牙上多為蟲所蝕其齒缺少而色變為蟲牙痛者有胃中氣少不能禦寒袒露其齒作痛者有牙齒疼痛而穢臭之氣不可近者痛既不一豈可一藥而盡之哉選要論曰齒者受病實多有因胃熱而痛者有因風邪而痛者有蟲痛者有腎虛者大抵齒痛多屬手足陽明二經胃熱火旺之故且齒者腎之精華骨乃腎之所主外板則為牙內床則為齒人腎氣強則齒自堅衰則齒必為痛也其有胃熱者則齒動搖縫中出血或臭穢不可近或齒自疏落皆陽明經熱也治法當審其何部胃熱者瀉其火腎虛者補其水風者祛而散之蟲者毒而攻之在活法施治可也丹溪曰牙痛或出血屬熱胃口有熱有風寒有蟲有濕熱實熱腫痛調胃承氣湯加黃連又用升麻白芷防風荊芥薄荷甘草桔梗之類又用梧桐淚麝香擦之上爿音盤牙床也牙痛灸三里穴下爿牙痛灸三間穴牙大痛必用胡椒蓽撥能散其中浮熱間以升麻薄荷寒水石之類劉宗厚曰頭面外冒風寒或口吸寒冷致牙痛者皆外因也實熱陰虛火動骨蒸所致氣鬱血熱蟲蛀皆內因也硬物所支打擊等致皆不內外因也葉氏曰牙之為病手陽明足陽明足少陰腎三經之所致搖動齒豁脫落者腎之氣虛也蟲蛀出血浮腫者腸胃濕熱之盛也臭穢腐爛者胃火之壅也虛者當補之濕熱者當瀉之胃火壅者當清之外仍以末藥擦之如風寒外束而作者直須解散之可也王節齋曰牙床腫痛齒痛動搖或黑爛脫落世人皆作腎虛治殊不知此屬陽明濕熱蓋齒雖屬腎而生於牙床上下床屬陽明大腸與胃猶木生於土也腸胃傷於美酒厚味膏粱甘滑之物以致濕熱上攻則牙床不清而為腫為痛或出血或生蟲由是齒不得安而動搖黑爛脫落也治宜瀉陽明之濕熱則牙床清而齒自然安固矣李氏曰牙齒骨屬腎之標也精完則齒堅腎衰則齒豁虛熱則齒動足陽明胃絡脈入齒上縫止而不動喜寒飲而惡熱飲手陽明大腸絡脈入齒下縫動而不休喜熱飲而惡寒飲多因飲食色欲過度以致濕熱上攻口湧酸水則牙床不清而為腫為痛或出血或生蟲動搖黑爛脫落大抵齒齦宣露動搖者腎元虛也宜滋陰補腎八味丸三味安腎丸虎潛丸惡寒熱而口臭者腸胃熱也宜涼藥瀉火祛風清胃散若風牙因腸胃原有風邪更襲外風入齒作痛故開口吸風則痛甚獨活散消風散風熱因外感與內熱相搏齒齦腫痛加之膿汁臭者犀角升麻湯或用石膏一兩火煅酒淬防風荊芥細辛白芷各五分為末隨時水煎一二服甚效風冷入於齒齦不腫不蛀日漸動搖者溫風散熱牙因腸胃積熱開口臭穢難近者敗毒散加荊防升麻石膏或調胃承氣湯蜜丸服如腸胃素積濕熱偶被風寒涼飲鬱於齒間作痛者當歸龍膽散虛熱攻衝齦肉腫痛口舌生瘡宜柴胡地骨皮等分薄荷減半水煎熱漱令唾或服之亦好歷年齒痛黑爛脫落必口吸涼稍止者乃膏粱濕熱之火也調胃承氣湯加黃連下之或用升麻白芷防風荊芥薄荷桔梗甘草等分水煎服寒氣犯腦及風邪湊襲腦項筋痛動搖肉脫者白芷湯羌活黑附湯痰熱毒氣攻注齒痛者外證咳唾二陳湯加細辛枳殼薑棗烏梅仍以薑黃蓽撥等分煎湯候溫以舌浸內涎自流出瘀血因風熱上攻頭面搏血令齒間血瘀不消鑽刺掣痛甘露飲加升麻或犀角地黃湯凡飲食不能清淡齒臭腐之氣淹漬日久兼之風熱上攻齒齦有孔生蟲蝕一齒盡又度其餘至如疳䘌皆其腫類必殺蟲而後痛止神功丸取牙蟲牙縫流血風熱者消風散加芒硝內服外擦腎虛炎者四物湯加升麻或牡丹皮知母黃柏陰虛氣鬱者四物湯加香附側柏葉牛膝外敷綠袍散或香鹽散常擦變骨蝕風出血骨露者玉池散疳䘌出血多者用生竹茹二兩醋煮含之若牙痛本因濕熱標被風冷所郁故內服辛涼以治其本外宜辛溫以治其標通用擦牙方謝傳笑去散腎虛胃熱方風蟲牙疼方延平方劫痛方烏須固齒方消齒壅法取牙不犯手方凡遇日月蝕未平時勿進飲食誤食多患齒疾養生家晨興叩齒永無齒疾此預養法也每食後晨興淨水漱之更妙蔭按方氏曰牙痛之證其人腸固素有濕熱上出於牙齦之間適被風寒或冷飲所郁則濕熱不得外達故作痛也其病情有標本之分所用藥有溫涼之異何則牙痛之證寒是標故外擦漱之藥宜辛溫以散寒開鬱熱是本故內服餌之藥宜辛涼以散熱清中如此則內外交攻標本兩治病豈有不愈者乎若小兒更須清腸胃之熱脈法右寸關脈洪盛或弦而洪腸胃中有風熱齒痛尺脈洪大而虛者腎虛主齒動搖疏豁相火上炎而痛治牙疼痛方清胃散治上下牙齒疼痛不可忍牽引頭腦滿面發熱大痛乃手陽明經中熱盛而作其齒喜冷惡熱此因服補胃熱藥或食辛熱厚味之物所致也升麻三錢牡丹皮一錢半當歸黃連夏月倍用生地黃各一錢酒姜炒上銼一劑水煎食遠稍冷服痛甚加石膏二錢細辛三分黃芩一錢細茶三錢大黃酒蒸一錢腫加防風荊芥各一錢頭腦痛加川芎八分聖濟總錄方治牙齒動搖黑錫半斤大鍋內化成汁入桑條灰柳木槌研合成砂以熟絹羅為末每日早晨揩牙溫水漱在盂內以水洗眼能明目黑鬚鬢元戎麝香間玉散酸石榴皮訶子各三兩升麻綠礬何首烏青鹽百藥煎五倍子沒石子各兩半白茯苓一兩北細辛石膽礬各半兩荷葉灰白檀川芎白芷甘松零陵香茴香藿香葉豬牙皂角灰木鱉子蓽撥青黛各錢半麝香一錢腦子半錢上為末或揩或服用藥後茶清漱一方無腦子加沉香二錢獨活散治陽明經不利風毒攻注牙根腫痛獨活羌活防風各一錢半川芎細辛七分荊芥薄荷生地黃各一錢姜酒炒上㕮咀水煎食後溫服日進二三服愈定痛羌風散治風熱攻注牙根腫痛羌活防風川芎生地黃各一錢升麻一錢二分獨活細辛荊芥薄荷各七分石膏二錢甘草五分上銼水煎食後服惡熱飲加龍膽草酒洗一錢半惡風作痛加白豆蔻黃連各五分濕熱甚者加黃連山梔各一錢犀角升麻湯治陽明經受風熱口唇頰車連齒腫痛犀角二錢升麻一錢半防風羌活各一錢川芎白芷白附子黃芩各七分甘草五分上㕮咀作一服水煎食後漱而服之上清防風散治上焦不利風熱攻衛氣血鬱滯牙齒悶痛齦內虛腫鼻塞聲重頭目昏眩並皆治之防風細辛薄荷各二錢半川芎一錢七分獨活天麻荊芥穗甘草炙白檀白芷各二錢二分半片腦一分半上同為細末入片腦研勻每服二錢淡茶清調稍熱漱吐不拘時如覺頭昏目痛牙齒腫悶用熱茶調三錢食後服敗毒散治風熱攻注牙齒疼痛久而不愈細辛五分薄荷葉一錢半地骨皮五錢荊芥穗三錢半上為粗末每服七錢水煎溫漱冷吐煎服尤妙升麻散治牙齒疼痛生齦肉去熱毒解外風寒防風升麻當歸各二錢藁本白芷細辛芎藭甘草炙各一錢木香半分上搗羅為散於乳缽中研細塗貼齦粗渣以水二鍾藥五錢煎七分去渣熱漱冷吐秋冬牙痛煎服解散最妙地黃散治風熱攻注陽明牙痛齦腫或出血宣露生地黃一錢半姜酒炒防風細辛薄荷葉地骨皮藁本各一錢芮草葉當歸荊芥穗各半錢上為粗末作一服水煎去渣微熱漱口冷吐之煎服尤妙細辛散治上爿牙痛屬足少陰腎虛熱細辛二兩升麻黃連防己各一兩蔓荊子牛蒡子白芷各一兩半黃柏知母各七錢薄荷五錢上為末薄荷湯調服及擦牙齦或煎服亦可白芷湯治下爿牙疼屬手陽明虛熱有風防風荊芥連翹白芷薄荷赤芍藥石膏炙煨升麻倍上為細末薄荷湯調服及擦牙齦或煎服亦可地骨皮散治牙齒虛熱氣毒攻衝齦肉腫痛口舌生瘡此藥如神柴胡四錢地骨皮三錢薄荷二錢上㕮咀作一服水煎去渣熱漱冷吐煎服愈好消風定痛散治牙齒疼痛風熱攻注齦肉腫悶荊芥四錢白芷防風細辛升麻川芎全蠍各二錢朴硝青黛各八分膽礬二分上為末每用一字蘸藥擦於牙上噙半時有津吐出青龍散治陽明經風熱齒齦腫痛香白芷川芎盆硝細辛各半兩青黛三錢薄荷葉二錢上為末以指蘸藥擦牙腫處吐津誤咽不妨一方治胃經風熱牙疼甚效軟石膏一兩火煨紅入淡酒中淬過為末出火毒防風荊芥細辛白芷各五分上為末隨時用之一方治陽明熱而牙痛大黃香附各燒灰存性青鹽少許上為末不時擦牙上羊骨散治腎虛胃熱及風熱牙疼或因怒發疼者羊脛骨燒灰存性四西升麻生地黃各五錢姜酒炒黃連一錢梧桐木律三錢龍膽草少許石膏五錢上為末擦牙用水漱去極妙或以寒水石代石膏亦可當歸龍膽散治寒熱牙疼升麻麻黃龍膽草黃連草豆蔻各一錢當歸生地黃姜酒炒白芷羊脛骨燒灰各五分上為細末擦之益智木律散治寒熱牙疼草豆蔻一錢二分升麻一錢半益智仁歸身熟地黃羊脛骨灰各五分黃連四分木律二分上為細末擦之如寒牙疼不用木律草豆蔻散治寒多熱少牙齒疼痛草豆蔻一錢二分黃連升麻各一錢半歸身七分羊脛骨灰熟地黃各五分防風細辛葉各二分上為細末牙痛處擦之立效散治牙齒疼痛不可忍微惡寒飲大惡熱飲小便滑數防風一錢升麻七分炙甘草三分細辛二分龍膽草酒洗四錢上水煎去渣以匙抄在口中煠痛處少時立止如多惡熱飲更加龍膽草一錢此法不定隨寒熱多少臨時加減如更惡風作痛加草豆蔻黃連各五分勿加龍膽草定痛散治風痛熱痛蟲痛皆效如神大黃細辛雄黃甘草各一錢麝香一分上為細末擦痛處羌活散去風止痛薄荷羌活各二錢大黃一錢上水煎去渣溫漱冷吐之咽亦無妨升麻散治牙痛腮腫升麻地黃川芎地骨皮槐子皂角白芷細辛各半兩川椒二錢半上為末以藥少許擦牙有涎吐出用鹽湯漱吐丹溪方治牙痛而腫軟石膏升麻細辛大黃白芷防風羌活連翹川椒青鹽龍膽草荊芥香附子各等分上為細末撒患處擦牙方荊芥薄荷細辛梧桐淚各等分麝香少許上為末擦牙熱牙怕冷水加牙硝薑黃內服敗毒散冷牙怕熱水加乾薑川椒內服黑錫丹不怕冷熱乃風牙加白蒺藜皂角殭蠶蜂房草烏毒痰加南星蟲牙加雄黃石膏蘆薈白膠香塞蟲孔中氣鬱加香附龍膽草腎虛加青鹽羊脛骨痛加乳香沒藥瘀血加五靈脂血竭青白散治食甘過多牙疼及一切牙疼青鹽二兩白鹽四兩川椒四兩煎汁上以椒汁拌炒二鹽為末擦之永無齒疾以漱出水洗目尤妙一方去川椒用槐枝煎汁炒二鹽名槐鹽散甚者更以五倍子煎湯漱之一方治飲酒過牙痛臨臥井水頻頻含之且漱或用百藥煎泡湯俟冷含咽或用砂仁嚼敷亦好雄黃定痛膏治牙齒疼痛盆硝三錢雄黃一錢另研細辛二錢大蒜一枚牙皂四錠去筋核二錢上為末同大蒜一處搗為膏丸如桐子大每用一丸將綿子裹藥左旁牙痛放在左耳右疼放右耳內良久痛止取出開關散治風熱攻注牙齒牙關緊急不開川芎薄荷盆硝白芷細辛全蠍各一錢天麻殭蠶各半錢上為末每用少許以指蘸藥滿口擦牙上齦噙半時用溫水漱吐露蜂房散治牙齒疼痛經驗神效露蜂房炒黃細辛各二錢半大戟七錢半防風一錢一分半上㕮咀每五錢水煎去渣熱漱冷吐無時血竭散牢牙定痛治牙齒根注復連槽骨疼痛久而不愈者血竭石膽乳香五靈脂密陀僧各等分上研勻每用一字以指蘸貼牙病處候少時荊芥湯漱立效散治牙疼不可忍百草霜細研滄鹽研各一錢麝香乳香各半錢上研勻每用少許口噙溫水隨牙疼一旁鼻內搐之劫痛方樟腦一錢冰片三分上用蟾酥調勻以簪頭挑入痛處即愈以上諸方治胃火風熱虛熱牙痛之劑羌活黑附湯治冬月大寒犯腦令人腦痛齒亦痛名曰腦風為害甚速非此莫救麻黃黑附子殭蠶黃柏各三分羌活蒼朮各五分防風甘草升麻白芷各二分黃耆一分佛耳草有寒嗽者用之上銼水煎食後服溫風散治風冷齒痛當歸川芎細辛白芷蓽撥藁本蜂房各等分上銼水煎服仍口漱羌活散治客寒犯腦及風寒湊襲腦痛頸筋急牙齒痛動搖肉齦袒脫疼痛麻黃去根節白芷防風各三錢羌活一錢半羊脛骨灰二錢半草豆蔻桂枝各一錢藁本當歸各三分柴胡升麻蒼朮細辛各五分上為細末先用溫水嗽口淨擦之其