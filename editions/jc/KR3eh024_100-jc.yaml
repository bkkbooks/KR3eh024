血點上隨落妙以上諸方俱取壞牙之劑治牙齒腐臭方加減調胃承氣湯治內傷濕熱膏粱口臭牙齒動搖欲落或血出不止大黃黃連甘草各等分上銼水調服當歸連翹飲治腸胃中有積熱開口氣臭牙齒動搖及開口呷風痛甚者當歸生地黃姜酒炒川芎連翹防風荊芥白芷羌活黃芩山梔枳殼甘草各等分細辛減半上銼水煎食遠服神功丸治多食肉人口臭不可近牙齒疳蝕牙齦肉將脫牙齒落血不止藺香藥如無以藿香代之當歸藿香葉木香各一錢升麻二錢黃連酒洗砂仁各五錢生地黃酒洗甘草各三錢上為細末湯浸蒸餅為丸如綠豆大每服一百丸或加至二百丸止食遠白湯下此藥兼治血痢及血崩及下血不止血下褐色或紫黑色及腸澼下血其脈洪大而緩者空心服米湯下及治麻木厥氣上衝逆氣上行妄聞妄見者皆效麝香白牙散治牙疼牙宣口臭麝香少許石膏半斤煅細辛蒺藜各一兩山柰青鹽煅各半兩丁香檀香甘松白芷各三錢上為細末研勻以指蘸些少擦牙加川芎半兩尤妙白牙散石膏四兩香附子一兩防風半兩白芷甘松山柰子藿香沉香零陵香川芎細辛各三錢半上為末早晨擦牙以水漱吐之沉香白牙散揩齒瑩潔令白及治口臭沉香麝香各五分細辛升麻藁本藿香葉甘松白芷各一錢二分半石膏寒水石各一兩上為末每日早晚揩牙一方治牙根腫爛出臭水用芥菜根燒灰存性為末敷之即愈治牙縫出血方加味四物湯治陰虛氣鬱牙出鮮血當歸川芎芍藥生地黃酒洗牛膝香附生甘草側柏葉上銼水煎漱口或服亦可蘇東坡方治熱極齒縫出血成條者人參茯苓麥門冬去心各二錢上銼一劑水煎服神效一方治牙宣出血香附一兩炒黑存性側柏葉五錢青鹽三錢石膏一兩上四味俱炒出火毒為末每清晨擦牙漱而吐去治齒出血不止方細辛二兩甘草一兩上㕮咀以醋二升煮取一升日夜旋含之一方生竹茹二兩醋煮含之竟日為度一方溫童子小便半升取三升合之其血自止一方用燒鹽灶突煤研勻臨臥擦牙漱口良一方治酒醉牙齒湧出血當歸二兩礬石六銖桂心細辛甘草各一兩上㕮咀以漿水五升煮取三升含之日五六夜三治蟲蛀方定痛散治蟲牙疼甚當歸生地黃姜酒炒細辛乾薑白芷連翹苦參黃連花椒桔梗烏梅甘草各等分上銼水煎先噙漱後嚥下蜂窩散治牙痛或腫風牙蟲牙牙痛牙長痛不可忍馬蜂窩白蒺藜花椒艾葉蔥頭荊芥細辛白芷各等分上銼醋煎口噙漱良久吐出再噙桃仁承氣湯海藏云牙齒等齲音踽朽也齒蟲也蟲齧缺朽也風俗通曰笑者若齒痛不忻忻也數年不愈當作陽明蓄血治之好飲酒者多有此疾用此湯作丸服有效桃仁半兩大黃一兩芒硝三錢甘草二錢桂三錢上為末煉蜜丸如桐子大每服四五十丸白湯下赴筵散治風牙蟲牙攻癢疼痛不可忍者良薑草烏去皮細辛荊芥各等分上為末每用少許於痛處擦之有涎吐出不得吞嚥良久用鹽湯灌漱其痛即止用腐炭末一半撮常使擦牙細辛散治風蟲牙疼或牙齦宣爛腮頷浮腫皆治白芷二兩荊芥細辛草烏各一兩砂仁川椒去目炒鶴蝨蓽撥牙皂各半兩上為末每用少許於痛處頻頻擦之有涎吐出仍漱鹽湯蓽撥散治風蛀牙疼蓽撥一錢蠍梢良薑各一錢草烏去皮尖五分上為末以指蘸擦於患處一方每用半字先含水一口應痛處鼻內搐上吐了水用指黏藥擦牙痛處兼治偏正頭疼救苦散治一切牙痛及風蛀牙疼草烏川烏桂花良薑紅豆胡椒蓽撥細辛各五分石膏官桂各三錢上為細末先漱淨裡外干撒之出涎立愈一方治牙疼鶴蝨細辛白芷干茄各等分上為末每用少許揩痛處如有蛀孔用飯丸藥末塞孔中立效麝香散麝香一分銅綠五分白及白礬各二錢半白蘞三錢半上為細末每用少許貼牙患處一笑膏治風牙蟲牙陳艾捶淨槐柳青條各一兩川椒連子用細辛防風蜂房各五錢雄黃另研蠍梢各三錢上銼細用高燒酒二碗煎至一碗生絹絞去渣入雄黃末熬成膏瓷器貯每用匙挑一豆許咬患處勿吞徐吐去數次見效又方治風蟲牙蟲疼芫花細辛花椒浮小麥蜂房鹽各一錢上用水煎噙漱之勿咽又方治風蟲牙升麻炒黑二兩石膏五分細辛炒三分上為末不時擦牙漱吐之一方治風蛀牙疼草烏蟬退地松殭蠶蜂窩牛膝荊芥細辛各等分上銼水煎漱冷吐之楝烏餅治牙疼川楝肉二個川烏一個胡椒四十九粒上為末醋糊作餅子如綠豆大牙疼咬之出涎為度用鹽水漱之忌冷熱硬物苦參湯齊大夫病齲齒倉公為之作此湯苦參不拘多少煎湯日漱三次五六日病已蓋取其苦能安齒蠹寒能去風熱也後人有風蠹有用苦參潔齒久而病腰重者降多故也砂糖丸治蟲蛀牙痛用礦內風化石灰末砂糖和丸塞入蛀孔立效一方治牙疼鶴蝨細辛白芷甘松各等分上為末擦牙上或煎湯噙漱立效一方治蛀牙蘆薈白膠香上為末塞蛀孔中一方治蟲牙疼不可忍者用漢椒為末以巴豆一粒研成膏飯丸如蛀孔大綿裹安於蛀孔內立效取蟲法蟾酥五分牡丹皮二錢黃荊子皂角各三錢麝香二分上為末用龜尿一鍾蝸牛四十九枚同搗成餅用紙包封頰上閉口一時開口看有蟲即挑去殺蟲丸治蟲牙好信不拘多少量加黃丹少許以黃蠟溶成一塊旋用旋丸如黃豆大用薄絲綿包裹留尾如右牙疼則塞右耳左牙疼則塞左耳兩旁俱疼則兩耳俱塞必深入耳孔一夜其蟲即死一生永不復痛矣雜方治蛀牙腫痛用不蛀皂角一錠去皮子卻用巴豆每於皂子處安巴豆一粒用鹽泥固濟燒灰研細末用剜耳子挑少許填入蛀牙內一方用鉛以鐵器炒成灰入牙縫及傷處即止一方用藜蘆為細末納於孔中勿咽津神妙一方用江子香油燈上燒過填入穴內一方用鶴蝨枝插患處立愈一方嚼熏陸香咽其汁立瘥一方溫米醋漱出蟲自愈一方取雄雀糞以綿裹塞孔內日一二次易之良一方用蘆薈四分炒研細先用鹽揩淨齒敷少許一方以郁李根白皮水煮濃汁含之冷即易之效一方用香白芷細辛煎湯漱之一方絲瓜燒灰存性擦之一方用韭葉頭連根洗淨爛搗同人家地板上泥和勻擦於痛處腮上用紙貼之一時頃取下細蟲在於泥上可以除絕病根一方用蜂房三五個米醋一小瓶浸三四日牙疼時瓦罐溫熱漱之即止一方治蟲蝕牙根肉腐用棘針燒取瀝敷十餘次又研雄黃末敷愈一方用棘針二百枚以水二升煮一升含之妙熏法治蟲牙疼天仙子不拘多少燒煙用竹筒抵牙引煙燻之其蟲即死永再不發一方以韭菜子燒煙以竹筒抵牙熏之一方用小瓦片置油拌韭子燒煙閣在水碗上恰用漏斗覆之以蛀牙受漏斗口中煙蟲皆落水碗中效治牙疳方當歸連翹飲治上焦濕熱走馬牙疳方見前牙齒腐臭條消疳散花椒細辛硼砂枯礬銅綠黃連青黛各等分上為細末先用涼水漱口後將藥末擦在牙齒縫處立效散治走馬牙疳青黛黃柏白礬枯五倍子炒上為末先用米泔水漱口擦患處綠礬散治走馬牙疳五倍子炒焦明礬銅綠各一錢麝香一分上為末先以香油通口噙漱覺無油氣吐去更漱五七次吐盡更以沸湯入鹽醋溫漱吐訖後以藥擦患處麝膽散治走馬牙疳危惡候麝香少許膽礬一錢銅綠半錢白礬生用一錢上為細末擦牙蝕處血竭散治牙疳並惡瘡不瘥如神寒水石燒熟四兩蒲黃二兩龍骨一兩血竭五錢枯白礬一兩上為末每用少許貼在瘡口上紙封貼檳連散治牙齒疳蝕口生瘡立效寒水石燒熟一兩半蒲黃黃丹各五錢上為末每用少許干貼瘡上噙多時吐出龍骨散治走馬牙疳黃柏藜蘆石膏銅青膽礬麝香龍骨病急多用病輕少用上以火焙存性為末每用五分擦於患處青黛散治牙疳青黛三錢銅綠晉礬黃柏黃連藜蘆枯礬芒硝各二錢人言二錢用紅棗十枚去核各分入內以火煅作灰用麝香半錢輕粉四十九帖上為細末後入輕粉麝香研勻少許擦患處蘆薈散治走馬牙疳蘆薈一錢黃柏五錢人言五分用紅棗去核各納人言一分燒存性上為末先將米泔漱淨疳毒後撒此藥即愈蟾蜍散治走馬疳齦漬侵蝕唇鼻干蚵蚾黃泥裹煅焦一分黃連一分青黛一錢上為末入麝香少許撒敷干則用油調擦鶴蝨散治牙齒風疳膿血出牙血有蟲鶴蝨露蜂房燒灰細辛各半兩膩粉麝香各五分上為細末每用臨睡時剪紙如柳枝葉樣塗藥貼所患處一方以濕帛子撒藥貼患處乳香丸治走馬牙疳乳香輕粉砒霜各半錢即信麝香少許上為末用紙一韭葉調藥少許為丸如米大臨臥貼牙瘡內追毒散治一切疳不問年深日久冷疳並皆治之雄黃人言硼砂輕粉寒水石龍骨各等分上為細末瘡口貼之大效趙氏治牙疳瘡走的方用染青的大靛根擂爛敷之至效後用黑豆一粒陳艾一團花椒一撮蔥須三十根上將黑豆炒至枯用水一碗半下艾椒蔥同煎濾過待冷噙漱一方防風荊芥蜂窩芫花花椒一撮浮麥蔥白三根上用水一鍾煎至六分通口漱了吐出漱三五次即止不論蟲風皆妙一方治牙疳用山梔子不拘多少以水潤之用火箸鑽眼三五個每個入白礬如小豆大填在眼內燒煙盡研為細末用水漱淨干撒患處一方治走馬牙疳其效如神乾薑南棗各燒存性枯白礬各等分上為末敷之即愈溺白散治走馬牙疳雖通口齒落唇穿者亦效但山根發紅點者難治溺白即婦人溺桶中白垢五錢火煅白礬枯過白霜梅燒存性各一錢上為末先用韭根陳茶煎濃汁以雞翎蘸熱汁刷去腐肉洗見鮮血然後敷藥日三次爛至喉者以小竹筒吹入忌油膩雞魚溺綠散治小兒走馬牙疳一齊腐爛即死此方神效溺垢即婦人尿桶中白垢火煅一錢銅綠三分麝香一分半上為末敷之立愈一方紅棗一枚劈開去核入白砒半分合之火煅存性加銅綠半分用簪尖挑一粟大點患牙兩旁縫中其蟲立死口中聚涎微吐出慎勿嚥下一方治一切牙痛牙疳惟蟲牙寒牙不治白龍骨一兩陽起石五錢定粉一兩麝香五分珍珠屑二錢五分象牙屑五錢黃蠟三兩五錢以上七味不入煎白殭蠶四十九個升麻香白芷地骨皮各一兩防風當歸芎藭牙皂青鹽各五錢細辛藁本各二錢上從殭蠶以下十一味用桑柴火燒存性用長流水煎滾汁半碗將龍骨陽起石二味炭火煅七次浸水內淬七次以水盡為度再用桑柴火烘乾研為極細末後入定粉麝香珍珠象牙末和勻再一同研極細將黃蠟用銅器慢火化開入眾藥末乘熱取出刷在無灰綿紙上待冷剪作條子長四寸闊二分每用臨睡時貼在牙齦縫上待來日取看疾深者膏上黑跡淺者亦微有黑暈直貼至黑暈全無斯愈矣固齒茯苓散牢牙固齒周密不生疳疾石膏四兩寒水石燒熟龍骨升麻香白芷茯苓各一兩細辛青鹽各三錢麝香半錢石燕子大者半對火燒醋淬七次上為末每日早晨以指蘸藥擦牙後用溫水漱吐擦牙石鹽散用此藥久擦牙永久堅固再無牙蛀牙疼之證白軟石膏一斤遼細辛十二兩五錢升麻二兩五錢川芎一兩白芷三兩饅頭炒成黑灰半斤白鹽十二兩入爐火煅紅半日上為細末用絹羅羅過擦牙甚妙固齒散鼠骨一副將鼠一個不用毒死只用打死者麵裹炮熟去肉將骨放新瓦上焙乾以黃色為度研為末全用乳香以竹葉焙花椒炒各二兩香附炒白蒺藜仁微炒青鹽面炮製各一兩白牙散白芷七分升麻一錢石膏一錢半羊脛骨灰二錢麝香少許上為細末先用溫水漱口擦之妙固齒方羊脛骨燒灰存性二錢當歸白芷牙皂角青鹽各一錢上為末擦牙上刷牙藥羊脛骨灰一兩升麻黃連各一錢上為末擦之一方蒲公英燒灰香附白芷青鹽上為末擦牙宣風牢牙散此藥注顏堅腎牢牙固齒青鹽細辛各七錢川芎當歸酒浸焙各一兩上為末每用少許清晨擦牙漱滿口連藥咽之堅牙散用骨碎補一味白水洗淨銅刀切片砂鍋內炒用槐枝不住手攪取出候冷又上火炒微黑色又住火冷後又上炒至黃黑色取起研末不時擦牙神效不獨治牙疼能固骨牢牙益精去骨中毒氣筋骨中疼治牙則其痛再不復作牙將落動搖者數擦立效再不復動其驗如神牢牙散一名雙枝散去風冷蛀齲宣露用之甚效槐枝柳枝各長四寸四十九枝皂角不蛀者七莖鹽四十兩重上同入瓷瓶內黃泥固濟糠火煨一夜候冷取出研細用如常法有庵主年七十餘云祖上多患齒疼牙落得此方效數世用之齒白齊密乃良方也固齒丹久用固齒烏須香附子炒四兩沒食子大者四個生地黃白蒺藜炒去刺破故紙炒各二兩青鹽一兩半上為細末早晨擦牙津液嚥下擦牙固齒方黑鉛四兩用柳枝切碎炒半日黃色成灰青鹽二兩半當歸五錢細辛硃砂各三錢上為細末擦牙漱口擦牙散烏須固齒細辛川芎當歸生地黃香附蓮鬚以上各燒過存性青鹽生用各等分上為細末清晨擦牙溫水漱咽日日不可間斷不忌三白擦牙烏須方豬牙皂角七錢火炮過白茯苓破故紙熟地酒浸焙乾五倍子炒黑存性細辛去根土青鹽各三錢桑椹子曬乾五錢青鹽四西化開去泥腳入花椒二兩煮乾用椒上為末入瓷罐收貯每於臨睡擦牙徐徐嚥下方能固齒去風真神藥也黑鉛丹烏鬚髮堅牙齒妙用莫述出山黑鉛將二蠶砂炒成末青鹽六兩槐角子六兩炒為末升麻二兩香附子炒焦黑沒食子各四兩石膏八兩上先將柳木作槌擂炒鉛砂成灰末後入余藥共為末鉛合收起每日擦牙擦過須含半晌以酒淚出或用湯亦可秘傳擦牙散固牙烏鬚髮壯筋骨久用極妙蒲公英三兩連根花四月間採陰乾青鹽一兩牛膝三錢上用千年瓦二個將前藥放在內用蚯蚓糞固濟掘一地爐用黑牛糞燒稍存性為度取出研為細末早晚擦牙咽之牢牙烏須方仙靈脾旱蓮草五倍子牙皂火煅存性細辛焙升麻鬥角青鹽香附子槐角子各一兩當歸川芎破故紙焙各五錢麝香三錢石燕子七雙火煅醋淬上為細末以肥皂角五個去核將青鹽實於內以鐵線縛定外用鹽泥固濟火煅紅去泥用內鹽與肥皂各為末以罐盛之每日擦牙漱口吐出掠須鬢臨臥再擦實有大效仙傳齒藥方歌擦牙烏須豬牙皂角及生薑西國升麻熟地黃木律旱蓮槐角子細辛荷蒂要相當青鹽等分同燒燬研細將來用最良固齒明目烏鬚髮誰知世上有仙方上十味各等分用新瓦罐盛藥合口以麻縛定鹽泥固濟曬乾穿一地穴先放新磚後放藥以罐口向下用炭火燒令青煙出稍存性去火經宿取為末每用擦牙溫水漱去一方旱蓮作黃連一方固齒烏髭發生地黃三兩茴香一兩青鹽母丁香沉香各半兩石燕子一雙火煅醋淬七次海馬一雙酥炙麝香二錢龍骨一錢上為末每用一撮空心擦牙縫噙片時溫水漱去烏須固齒方七月取旱蓮草連根一斤用無灰酒洗淨以青鹽四兩槌碎淹二宿取出油膩鍋中炒存性炒時將原汁旋傾入炒乾為末每日清晨用一錢擦牙嚥下擦牙秘方六月六日取青嫩槐枝用刀斷碎如黃豆渣一斗以東流水煮至五分去渣又煎至三分用好食鹽三斤入鍋煮乾更將鹽炒乾研細擦牙溫水漱之吐水洗眼亦宜一方用黑鉛一斤鍋煅成灰與前鹽同羅成細末再入鍋炒如磚色每日擦牙取漱口水通著打四鬢並須令其自干日久去頭風固齒去酒刺烏鬚髮大有益也易便擦牙方用五倍子大者一百個裝食鹽一斤鋪在鍋內大火燒過存性為細末每日擦牙甚好延平方槐枝柳枝桃枝榔機草地楊梅各一把銼碎注水一鍋熬去半鍋去渣入鹽一斤煎至水乾取鹽用細辛楊梅皮荊芥各五錢黃連石膏各三錢當歸硼砂白芷龍骨各二錢川烏一錢半紫荊皮六錢上共為細末瓷罐收貯每用二兩入燒枯糯米一兩研勻逐日擦牙或咽又可防喉風治牙落重生方重生牙齒方雄鼠骨一付香附一兩白芷川芎桑皮地骨皮川椒蒲公英旱蓮草青鹽川槿皮各二錢上為細末擦百日其牙復生良驗生牙齒方老鼠用未開眼嫩老鼠三四個白及青鹽白芷細辛當歸熟地黃各五錢上除地黃搗爛將前五味研為末用地黃和勻作一餅包老鼠在內外用濕紙包裹文武火燒盡煙閉死研末擦上即生牙一方治大人小兒多年牙齒不生用黑豆三十粒牛糞火內燒令煙盡細研入麝香少許一處研勻先以針挑不生牙處令血出用藥少許揩不得見風忌酸鹹物卷一百零八鬚髮論類苑云醫者所論人鬚髮眉雖皆毛類而所主五臟各異故有老而須白眉發不白者或發白而鬚眉不白者臟氣有所偏故也大率發屬心稟火氣故上生須屬腎稟水氣故下生眉屬肝稟木氣故側生男子腎氣外行上為須下為勢故女子宦人無勢則亦無須而眉發無異於男子則知不屬腎也李氏曰膽榮在須腎華在發此說恐非是精氣上升則發潤而黑六八以後精華不能上升秋冬令行金削肺枯以致鬚髮焦槁如灰白色養生者宜預服補精血藥以防之染掠亦非上策因吐衄失血多者瓊玉膏若因房室損精易白者還元丹還元秋石丸女貞丹有火者大造丸因濕痰瘧痢等疾衰白單蒼朮膏加味蒼朮膏皮膚肌骨有風痛癢者何首烏丸陽虛者卻老烏須健陽丹延年益壽不老丹有火者八仙添壽丹是知烏須必因內證用藥若不顧臟腑專務須發而妄投丸散是剖腹而藏珠也年來發落須長常也少壯有發落或須亦落者腎枯火炎肺痿內風妄動故也腎氣丸天門冬膏主之內風甚者柏葉煎樓氏曰腎主發經云腎之合血也其榮發者是也發者血之餘也前說屬心不屬腎為是俗云人間養指甲心閒養頭髮屬心明矣治烏須髭發方何首烏丸烏髭鬚發髭音此須音須口上曰髭口下曰須八月採何首烏赤白各半極大者佳以竹刀刮去皮碎用米泔水浸一宿漉出酒洗曬乾以壯婦生男乳汁拌曬三度後干用木臼杵為末羅細以北紅棗砂鍋煮熟取肉和藥搗二千杵為丸焙燥以瓷器盛之初服二十丸每十日加十丸至百丸止空心鹽湯任下忌鐵諸血蘿蔔又方何首烏三斤用銅刀或竹刀細切片乾者米泔水浸牛膝去苗一斤上將二藥以黑豆一斗淘洗淨用甑一所先以黑豆薄鋪甑底後薄鋪何首烏又鋪豆又鋪牛膝重重鋪蓋盡安於釜上蒸之令豆熟為度去豆取藥又換豆蒸之如此三次去豆為末蒸棗肉為丸如梧桐子大每服三五十丸食前溫酒下忌蘿蔔蔥蒜黑鬚發方大烏豆熟地黃各一斤牛膝去蘆半斤上三味共一處用水十六碗入砂鍋內煮水乾為度去地黃牛膝留豆曬乾每日早晚各吃豆三五十粒溫水漱口咽之忌蔥蒜蘿蔔張璐方烏髭變白用小雌雞二隻只與烏油麻一件同水飼之放卵時收取先放者打竅以硃砂末填入糊定同眾卵抱出雞取出其藥自然結實研粉蒸餅為丸如綠豆大每服五七丸酒下不惟變白亦且愈矣一方烏髮多方不效者惟此稱奇單用自己發或無病童男女發與胎髮用花椒煎湯泡過洗淨曬乾入小瓦罐內黃泥固濟炭火煅通紅取埋地中三日取出研為細末每用一二分空心酒下金陵煎益髭發變白為黑金陵草即旱蓮草取一秤六月以後收採揀青嫩無泥土者不用水洗摘去黃葉爛搗新布絞取汁以紗絹濾過入通油器缽盛之日中曬五日又取生薑一斤絞汁白蜜一斤合和日中曬以柳木篦攪勿停手待如稀餳藥乃成矣每日空心及午後各服一匙以溫酒化下如欲作丸日再曬令可丸如梧桐子大每服三十丸及時多合為佳其效甚速一方明目令發不白十月上巳日取槐實入冬月牛膽中陰乾百日每食後各一枚以上俱內服烏須之劑烏須藥酒方中山還童酒歌曰中山還童酒人間處處有善緣得遇者便是蓬萊叟馬藺花一升土埋三日取出馬藺根切片一升用黃米二斗水煮成煤陳面二塊為末酒酵子二碗並前馬藺子共和一處做酒待熟另用馬藺子並根一升用水煮十沸入酒內三日每日攪勻去渣隨量飲醉酒飲盡其鬚髮盡黑其酒之色如漆之黑酵音教酒滓也以酒母起面曰發酵今俗籠蒸饅頭發酵浮起者是也一醉不老丹專養血化痰烏須黑髮男女皆可服蓮花蕊生地黃槐角子五加皮各二兩沒食子六個三陽三陰上將藥用木石臼搗碎以生絹袋盛藥同無灰好酒十斤入不滲壇內冬春浸一月秋二十日夏十日緊對壇口浸酒日任意服之以醉為度須連日服盡久則恐味變也酒盡而鬚髮白者自黑再製服不過三二次神效烏須酒方黃米三斗淮曲十塊麥門冬去心八兩天門冬去心二兩人參去蘆一兩生地四兩酒炒熟地二兩砂仁炒枸杞子二兩何首烏四兩牛膝去蘆二兩當歸二兩上各為末和入曲糜內封缸待酒熟照常榨出每日清晨飲三杯忌白酒蘿蔔蔥蒜榨音詐榨酒具也經驗烏須方能變白為黑身輕體健其功不可盡述每年冬十月壬癸日面東摘採紅肥大枸杞子二升搗破同好無灰酒二斤同盛於瓷瓶內浸二十一日足開封添生地黃汁三升攪勻卻以紙三層封其口俱至立春前三十日開瓶空心暖飲一杯至立春後髭鬚都黑勿食蕪菁蔥蒜服之見效若年年服之耐老身輕無比也擦牙烏須方青絲散補虛牢牙黑髭鬚白芷香白茯苓各五錢母丁香細辛當歸川芎甘草甘松各三錢升麻旱蓮草地骨皮生地黃熟地黃青鹽破故紙各二錢寒水石七錢煅香附米一兩生薑汁浸一宿炒何首烏一兩麝香五分高茶末一兩上為細末庚日為始背東面西擦牙早不見日夜不見燈刷畢咽藥余津潤髭一月白者頓黑忌食蘿蔔擦牙烏須方黑鬚發又能明目固齒青鹽一兩沒食子一錢細辛二錢破故紙一兩炒香地骨皮一兩熟地黃一兩酒浸焙乾槐角子一兩百藥煎一錢上為細末每日擦牙藥嚥下定要一月莫間一日一日常擦不拘白鬚發每月按日摘去再生必黑永不白正月初四十四十七日二月初八十四二十一日三月初八初十十一十三日四月初二十六十八十九日五月十六二十日六月初四十七二十四二十九日七月初三初四十八二十八日八月十五十九日九月初二初四十五二十五日十月初七初十十三二十二日十一月初十十五十七三十日十二月初七初十十六二十日擦牙烏須方朱恕銘傳用效沒食子當歸熟地黃白茯苓各一兩破故紙旱蓮草何首烏枸杞子各二兩細辛青鹽各五錢上為細末每日清晨用以擦牙滾白湯漱下不可間斷久服鬚髮永不白旱蓮散烏須固牙溫尉云納合相公用此方年七十鬚髮不白懇求始得後遇張經始傳分兩也旱蓮草一兩半麻姑餅三兩升麻青鹽三兩半訶子連核二十個皂角三挺月蠶沙二兩上為末薄醋麵糊丸如彈子大曬乾入泥瓶中火煨令煙出存性取出研末日用揩牙攝生妙用方烏須固齒七月取旱蓮草連根一斤用無灰酒洗淨青鹽四兩淹三宿同汁入油鍋內炒存性研為末日用擦牙連津咽之烏須固齒藥固齒烏須去蟲槐枝一斤青鹽四兩同入鍋內用水三次煮極干炒焦煅過存性刮下鍋底鹽共傾出地上一日出火毒再入花椒一兩五錢炒過同研為細末每早漱口後擦牙三五次溫水漱之外染烏鬚髮方天下烏須第一方五倍子不拘多少槌碎去灰入砂鍋內炒盡煙為度以青布巾打濕扭干包裹腳踏成餅為末聽用一錢半烏黑霜即炒黃好細面四兩當歸尾一兩為末白及末一兩三味攪勻每用一分半紅銅末不拘多少火內燒極紅投入水碗中取出再燒再投取其水內自然之末掏淨將好醋煮數沸隨炒黑色聽用每用一分半明礬末一分半青鹽一分二釐沒食子二釐半訶子二釐半二味俱用麵包入砂鍋內將柴炭同拌炒至乾焦上用細茶清調如糊瓷器內重湯煮黏如膠後將鬚髮用茶水或皂角白礬煎水洗淨將藥擦上包裹一夜幹了洗去如須發乾燥以絹包核桃肉油擦之連染三次光潤可同生成矣如急用入黑礬少許一方無訶子有旱蓮草而分兩不同五倍子五錢銅末一錢余各三分烏須速效方五倍灰一錢銅青二分青鹽一分白礬飛皂礬炒白及炒各七釐鉛灰五釐炒鉛灰法每用鉛一兩溶開先投入硫黃五錢不住手以木棍攪少頃再投硫黃三線攪即成灰矣研用上各為細末另包臨用照分兩和合一處用釅茶調擦次早洗去若干揉去再擦一次更妙但此方不用湯煮藥干即黑比諸方簡便效更速烏須易簡方五倍子同前方制一錢膽礬白礬各七釐青鹽一分四釐榆皮面二分上俱研細末茶清調如稠糊隔湯頓稠黃昏乘熱刷上待有一個更次洗去烏雲膏五倍子炒黑一錢銅末醋淬四分生食鹽生白礬各三分白麵二分上各為末用燒酒調如無燒酒釅茶亦可調勻以酒盞盛貯重湯煮數沸先用皂角水洗淨鬚髮然後塗藥包裹一夜甚效次早以茶汁輕輕洗去藥其黑如漆連染三夜以後或十日半月染一次烏須方官粉一兩二錢半白礬三錢水銀一錢失將黑鉛一錢溶化後入水銀共研細樟腦二分麝香一分百草霜八分輕粉三分石灰二錢上八味為細末用鹹水調和熬滾後塗須上燒半炷香時即洗去染鬚髮方五倍子炒存性五錢白礬飛過五分硇砂五分生用細辛炒黑一錢七分白及生為末五分一方用沒食子上各另為末共入磁瓶內用滾茶湯調如稀糊重湯煮竹匙攪頗稠以燒三寸香為度先用皂角水洗淨髮須乘熱塗之以火烘乾熱水洗去如黑著肉用紙蘸清油擦之自去烏須捷方此方頃刻即效寒冬月但令折損石灰一兩石鹼三錢黃丹二錢上研勻以水調塗之候乾揉去即黑慎勿黏肉黏則肌爛黑鬚散官粉真蛤粉密陀僧黃丹各三錢石灰五錢二分上為細末水調擦上如干水洗去藥核桃油潤之烏須方針砂一錢一分潔淨者用好醋浸過一七撈起曬乾用好醋少許慢火炮炒三二遍起紫色為度訶子皮百藥煎白及各五分皂礬三分半上各搗為末用好醋調勻如爛泥至晚調塗須上勻齊卻用青菜葉預先用火烘軟包須上再加油紙護包卻用手拍包裹令緊勿令透風延過一夜至清晨用皂角水洗即去黑極妙用核桃油潤之如連肌肉黑子用無漿粉白布一擦烏鬚髮方用大水蛭二個洗淨放磁器餓七日用白毛烏骨雄雞血以好清煙京墨磨濃傾尿胞內任水蛭吮飽將針刺破流出血汁擦髭發留根二分其汁浸漬入肉髭發一年茂黑不退且柔軟不損極妙一方五倍子炒黑色青綿布包裹腳跟踏成餅子三錢銅末鍋內煅成灰六分白礬枯訶子皮硇砂細辛各三分上各為細末對和一處次用石榴皮一個烏梅三個細茶一撮水二盞煎至七分去渣用磁茶盞盛將前末藥汁納放鍋內重湯煮藥至皺面取起晚間用抿子蘸藥刷上次早溫水洗去鬚髮如漆烏須方五倍子末二錢紅銅末硇砂白礬膽礬各三錢石榴皮二指一塊酸梅一個煎水一小鐘上通融煮三滾起蠟皮時為度稠如黏粥用手將藥覆鬚髮白處細紙裹一宿拂去敗藥用溫水肥皂洗淨即黑藥亦要各包臨時稱對分兩不可同收一處猿猴上樹方槐實一兩焙五倍子炒焦去煙一兩石榴皮五錢焙白礬一錢上共為細末取黑牯牛膽一個十二月取者為佳將藥裝膽內扎口吊起陰乾十四日先將鉛打一罐將膽內藥物盡傾入罐去膽皮再加核桃油一小盞桑霜三錢麝香一分攪入膽藥內封罐重湯煮一炷香取起須白用肥皂湯洗淨以豬脬或雞食袋油紙包手指蘸藥捻鬚下半節不必近根自然上去其黑如漆猴子上樹方烏須奇方用五倍子一兩擂碾細末用紙條捻成紙捻數條用香油四兩醮此香油燃點上用大粗碗一個四圍閉熏取黑煙隨掃隨熏以盡為度收取前煙子聽用每用時用一二年鹽鴨蛋擇取純黑心者止取蛋黃鐵燈盞炒油隨取前煙些須用手調勻以手指用此油煙捻鬚顛其油煙自行上至根名曰猴子上樹神效一擦管一月金毛獅子倒上樹烏須捻藥方打錫灰羅細末一錢汞一錢研不見星上先用酸石榴一個切去頂將穰並子攪入前藥末再攪以原頂封固外用紙封嚴密三七內俱成汁用胞皮裹指以汁捻之未捻之先將鬚髮洗淨擦乾上藥總錄方染鬚髮用胡桃根皮一秤旱蓮草十斤切以甕盛之入水五斗浸一月去渣熬至五升入蕓薹子油一斗慢火煎取五升收之凡用先以炭灰汁洗鬚髮用油塗之外以木蘖葉包住絹裹一夜洗去用七日即黑也烏須秘方用香油一瓶油核桃二三十個去殼取肉古銅錢一二十個浸油內埋土二尺深一周年足取出擦鬚髮上即黑烏髭發方用青核桃三枚和皮搗碎入乳汁三盞於銀石器之內調勻擦發須三五次每日用胡桃油潤之良浸油方礦石一兩研碎當歸三兩上以核桃油八兩浸罐內七日擦抹自然黑梳頭方百藥煎訶子針砂各一錢石榴皮垂楊柳葉白礬各二錢上共為細末先用鹽醋茶熬水二大碗將藥共入瓶內封十日梳髮染須通黑油核桃油潤之明淨染須方用大烏龜一個餓一二日將飯與肉骨果子煙火之食飼之三五月後夜間以漆蠡鄰溪切音黎瓢也盛之用薄竹片置蠡縫口通氣外放燈一盞蠡內作熱龜在內旋轉不已自然撒尿緊急只用麻油熏鼻其尿自出先用五倍子炆醋如膠若龜尿得一小鐘入五倍醋半鍾同入瓷器內炆一滾即止牛角罐收貯每用新筆略醮擦須表上多用則面黑點換鬚髮方李卿換白髮方刮老生薑皮一大升於鐺內以文武火煎之不得令過沸其鐺惟得多油膩者尤佳不須洗刮便以姜皮置鐺中密封固濟勿令通氣令一精細人守之地色未分時便須煎之緩緩不得令火急如其人稍疲即換人看火一伏時即成李方雖云一伏時若火候勻至日西即藥成也置於磁缽中研極細使時以小簪腳蘸取如麻子大先於白髮下點藥訖然後拔之再點以手指熟捻之令入肉第四日當有黑者生神效又方銀礦當歸各三錢白礬生真粉飛面各一分硃砂一分半上為細末用清水調拔去白頭以銀簪點藥入鬚根孔內後出者如墨黑點白方母丁香為末薑汁調每日拔去白髮即以銀簪點在孔內則再生黑鬚來黑鬚桑椹膏桑椹二十個和油胡桃搗如泥拔出白鬚點孔中即生黑者一方取除日自拔白以鱉油塗之又豬狗膽塗之又狗汁亦塗一方治少年發白拔去白者以白蜜納孔中即生黑髮不生取桐子搗汁塗上必生治鬚髮黃赤方巫雲散治鬚髮黃白不黑五倍子膽礬百藥煎青胡桃皮酸石榴皮訶子皮木瓜皮豬牙皂角何首烏細辛各等分上為末煉蜜丸如錢大常於木炭內培養勿得離灰如要烏髭鬢時用熱酒化開塗髭鬢上好熱醋亦可治髭發黃赤方生薑半斤生地黃一斤各洗淨研取自然汁渣留用上用不蛀皂角十莖刮去黑皮並筋將前藥汁蘸皂角慢火炙令黃以藥汁盡為度並前藥渣入瓷罐內火煅留性為末用銀器盛每用三錢湯調蘸須臨睡時用次早已黑三夜三次用之其黑如漆妙甚此方常用屢驗聖惠方治頭髮黃赤生柏葉末一升豬膏一升和丸如彈子大每以布裹一丸納泔汁中化開沐之一月色黑而潤矣療發黃方用熊脂塗發梳之散頭入床底伏地一食頃即出便黑不一升脂驗梳頭髮油胡桃肉零陵香白花藿香草烏共二兩上入真麻油二兩煎至五沸冷用治發落不生補虛之劑黃耆建中湯治脈弦氣弱毛枯槁發脫落黃耆三錢白芍藥四錢肉桂一錢半甘草炙二錢上㕮咀作一服薑棗煎服加味四君子湯治發脫落及臍下痛人參白茯苓白朮各一錢甘草炙五分熟地黃一錢砂仁炒上㕮咀水煎服生髮方三仙丸治頭髮脫落神效側柏葉八兩焙乾當歸全身四兩榧子仁二兩上忌鐵器為末水糊為丸桐子大每五七十丸黃酒鹽湯任下早晚各一服聖惠方治大風癘疾眉發不生用側柏葉九蒸九曬為末煉蜜丸如桐子大每服五丸至十丸日三夜一服百日即生蒲公散烏須生發蒲公英淨四兩炒血餘洗淨四兩青鹽四兩研上用瓷罐一個盛蒲公英一層鹽泥封固淹春秋五日夏三日冬七日桑柴火煅令煙盡為度候冷取出碾為末每服一錢侵晨酒調服丹溪方胡氏年十七八歲發落不留一莖飲食起居如常脈微弦而澀輕重皆同予曰此厚味成濕熱痰在膈間又日多吃梅酸味收濕熱之痰隨上升之氣至於頭蒸熏髮根之血漸成枯遂一時盡脫遂處以補血升散之藥用防風通聖散去芒硝惟大黃三度酒炒兼以四物湯酒製合和作小劑煎以灰湯入水頻與之兩月餘後其脈濕熱漸解停藥淡味調養又二年髮長如初而愈外塗生髮方滋榮散長養髮發落最宜生薑焙乾人參各一兩上為細末每用生薑一塊切斷蘸藥末於發落處擦之二日一次用三聖膏治髭發脫落能令再生黑附子蔓荊子柏子各半兩上為末烏雞脂和勻搗研干置瓦盒內封固百日取出塗在髭鬚落處三五日即生自然牢壯不脫聖惠方令發不脫榧子仁三個胡桃仁二個側柏葉一兩上共搗用雪水浸梳頭髮永不落且潤也梅師方治頭髮不生側柏葉陰乾作末和麻油塗之千金方治發落不生令長麻子一升熬令黑壓油以敷頭髮上妙一方治人無發甜瓜葉搗汁塗之即生沐頭湯治脈極虛寒鬚髮墮落令發潤澤桑根白皮切三升以水五升淹漬煮五六沸去渣洗沐發數數為之自不復落一方治髮鬢墮落令生長生柏葉切一升豬膏三升附子四枚上三味為末以膏和為三十丸每用布裹一丸納泔汁中煎沐髮長不落其藥密收貯勿令泄氣桑麻湯麻葉桑葉二味以泔煮去渣沐發七遍長六尺又方羊糞燒灰淋沐洗之三日一洗不過十洗大生生頭髮方大附子一個要一兩重者佳用烏骨黑肥雞一隻取其油攪藥擦頭其發即生聖惠方生眉毛用七月烏麻花陰乾為末生烏麻油浸每夜敷之烏麻即秋麻是也治發中蝨方苦參散治頭上生蝨苦參三錢黎蘆一錢上為末水煎去渣溫洗頭上去蝨盡死宜避風寒一方光烏頭同擦藥末和勻撒發中一夜皆死又方取水銀三分用油和揉發頂上以帕勒一夜皆死又方藜蘆末撒入發中經宿皆死自落洗頭方洗髮菊花散甘菊花蔓荊子干柏葉川芎白芷細辛去苗桑白皮生用旱蓮根莖花葉全用上各等分㕮咀每用藥二兩漿水三碗煎至二碗去滓洗髮犀皮膏治髭發乾燥能令潤澤小麥面半升半夏湯泡沉香各半兩生薑一兩和皮用上用水二碗同煎去滓取清汁入腦麝少許攪勻洗髭發自然潤澤乾洗頭藥方甘松川芎百藥煎薄荷白芷五倍子藿香茅香草烏頭各等分上為末不以多少干撒頭髮神效散去風屑垢膩解結當歸白芷黑牽牛訶子荊芥側柏葉威靈仙各等分上為細末臨睡擦發內次早理之醒頭香滑石五錢甘松三柰零陵香各二錢樟腦二分上為細末入發理之白芷散去垢除汗氣白芷三錢王不留行一錢上為末每用量擦頭髮內微揉後以篦子刮去藥末自無氣息一方治頭織不能解荊芥二錢香油半盞上煎敷擦微久梳開五老還童丹赤石脂川椒二味同炒辰砂茯神乳香各等分上為末棗肉為丸如桐子大每服百丸空心酒調下十服見效
