子細辛各半兩枸杞子澤瀉生地黃酒洗石決明各一兩半黃連半兩車前子川當歸麥門冬去心各二兩上各如法修制焙乾煉蜜丸如桐子大每服三十丸米飲下忌一切熱毒物羊肝丸治一切目疾不問內外障翳眚盲等證眚所景切目病生翳也過也炎也白乳羊肝一具竹刀去膜黃連一兩甘菊花防風薄荷荊芥羌活當歸川芎各三錢上為末將羊肝蒸熟搗丸漿水下五秀重明丸治眼翳膜遮睛隱澀昏花常服清利頭目甘菊花開頭五百個荊芥五百穗木賊去節五百個楮實五百枚川椒開口者五百粒上為細末煉蜜丸如彈子大每服一丸細嚼時時嚥下食後噙化無時臨臥大忌酒面熱物涼膽丸治膽受風熱生翳青色兩眥澀痛下淚口苦不喜食防風蘆薈各一兩黃連荊芥黃芩龍膽草各五錢黃柏地膚子各二錢半上為末煉蜜丸如桐子大每服三十丸薄荷煎湯下鹽術散治濕傷脾胃內外障蒼朮四兩米泔浸七日切細入青鹽一兩同炒黃去鹽木賊二兩童便浸一宿曬乾上為末每服一錢溫米飲下或撒入飲食中服鎮肝丸治肝經不足內受風熱上攻眼目赤澀昏暗癢痛難開眵多有淚怕日羞明時常發腫或生翳障並宜服之決明子地膚子白茯苓遠志去心茺蔚子防風蔓荊子人參各一兩車前子青葙子地骨皮柏子仁炒甘草甘菊花柴胡元參山藥各半兩細辛二錢半上為末蜜水煮糊丸如桐子大每服二十丸食後米飲下日三服補陽湯治陽不勝其陰乃陰盛陽虛九竅不通令青白翳見於大眥乃足太陽少陰經中郁遏足厥陰肝經氣不得上通於目故青白翳內阻也當於太陽少陰經中九原之下以益肝中陽氣沖天上行此當先補其陽後於足太陽少陽標中瀉足厥陰肝經陰火乃次治也內經曰陰盛陽虛則當先補其陽後瀉其陰此治法是也每日清晨以腹中無宿食服補陽湯臨臥服瀉陰丸若天色變大寒大風並大勞役預日飲食不調精神不足或氣弱俱不得服候體氣和平天氣如常先補其陽使陽氣上升通於肝經之末利空竅於眼目矣羌活獨活當歸身酒洗甘草梢熟地砂仁炒人參黃耆白朮各一兩澤瀉陳皮去白白茯苓生地黃酒炒知母炒各三錢白芍藥防風各五錢柴胡二兩肉桂去皮一錢上㕮咀每服五錢水煎服空心使藥力行盡方許食連柏益陰丸一名瀉陰火丸羌活獨活甘草炙當歸梢五味子防風各五錢石決明燒存性三錢草決明細黃芩黃連酒炒黃柏知母各一錢上為細末煉蜜丸如綠豆大每服五十丸漸加至一百丸臨臥茶清下常多服補陽湯少服此藥多則妨飲食升陽泄瀉丸羌活獨活甘草梢當歸身白芍藥各一兩人參黃芩白朮生地黃酒炒楮實各半兩酒拌陳皮白茯苓防風知母酒炒澤瀉各三錢柴胡一錢半肉桂五分上銼每服五錢水煎稍熱食遠服別合一料煉蜜丸如桐子大每服五十丸茶清下每日與前藥各一服不可飽服如天氣熱甚加五味子三錢天門冬去心枳實芍藥各半兩上三方合治一病空心補陽湯臨臥連柏丸食遠升陽泄陰丸神效熊膽丸饒州民郭瑞友精意事佛摹書華嚴經期滿六部乃止五部將終忽兩目失光翳膜障蔽巫醫針刮皆無功一日夢皂衣人告曰汝要眼明用熊膽丸則可後於道藏獲觀音治眼熊膽丸方服之二十餘日藥盡眼明南熊膽一分黃連密蒙花羌活各一兩半防己二兩半龍膽草蛇蛻炙地骨皮木賊去節仙靈脾各一兩瞿麥旋覆花甘菊花各半兩蕤仁二錢半用肉麒麟竭一錢蔓荊子一合水淘上為細末以羯羊肝一具煮其半焙乾雜於藥中取其半生者去膜爛研杵為丸如桐子大每服三十丸食後米飲下點洗方百點膏張濟民眼病翳六年以至遮瞳仁視物不明者雲氣之狀用此藥而效黃連二錢以水一碗煎至半碗再入群藥當歸甘草各六分防風八分蕤仁去皮尖三分上銼如麻豆大蕤仁另研如泥同熬滴入水中不散去渣沫入好蜜少許再熬少時為度令病人心靜點之至目微痛為度日點五七次臨臥點尤妙名曰百點但欲多點使藥力相續也羌活退翳膏治足太陽寒冰膜遮左睛白翳在上視物不明椒樹根東南根西北根各二分藁本漢防己各三分防風麻黃去根節柴胡生地黃各三分酒炒生甘草四分當歸身六分羌活七分蕤仁六個上用淨水一大碗先煎漢防己黃連生甘草當歸身生地黃至一半入余藥再煎至一盞去渣入銀石器內再熬之有力為度退翳膏子治黑白翳黃連三錢生地黃一錢半酒炒荊芥穗一錢水半盞別浸當歸身六分柴胡甘草各五分防風連翹青皮各四分升麻蕤仁各三分細辛一分上用水一碗入前藥煎至半碗去渣更上火煎至半盞入荊芥水兩匙入蜜少許再上火熬勻點之圓明膏治內障生翳及瞳子散大皆勞心過度黃連柴胡生地黃酒炒麻黃去節各五錢當歸身三錢訶子皮濕紙里煨甘草各二兩上七味先以水二碗煎麻黃至一碗去沫外六味各㕮咀如豆大篩去末子入內同煎滴水中不散為度入熟蜜少許再熬點之上四方皆東垣先生所制乃隨證立法非如泛常通用之方如瞳子大用訶子收之之類也白龍散去翳膜明眼目用芒硝五兩取真白如雪者置銀鍋內以新瓦蓋用熟炭火慢慢熬溶清汁以鐵鉗鉗出傾在石器中凝結如玉色研極細入片腦等分每用少許以金銀簪腳點入目內凡點時先用新汲水洗眼淨然後點之或以少許吹入鼻中亦可春雪膏治眼赤翳障羞明於春天雪凍時取淨朴硝三四個為末用黃連防風赤芍藥當歸身各五錢牙皂三個各銼碎與硝拌和入雪三四斤同拌勻為水過一宿絹濾去滓以瓦盆盛於露天受霜露之氣次早結成砂子卻用盆一個以紙筋鋪盆底內用厚皮紙盛砂於盆內紙筋上使砂中水氣盡滲於紙內候砂干以磁器收貯封固如用每硝砂一錢加硼砂五分片腦三分研細點眼有翳加蕤仁五分但點愈即止不可常點