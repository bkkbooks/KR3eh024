補虛益損及兩眼雲翳遮睛甘州枸杞子一斤揀去白酸青燒者一味分用四份一兩四錢用川椒一兩炒一兩四錢用乳香一兩炒一兩四錢用茴香一兩炒一兩四錢用芝麻一合炒炒畢將川椒等四味篩去不用止用枸杞子熟地砂仁炒白朮白茯苓各一兩加甘菊一兩尤妙上為細末煉蜜丸如桐子大每服五七十丸空心溫酒下神授羊肝丸明州定海人徐道亨者事母至孝因患赤眼而食蟹遂成內障凡歷五年雖抱目疾篤孝不衰忽夢一僧人授以此方制而服之百日復明夜明砂洗淨當歸蟬殼木賊去節各一兩上為細末用羊肝四兩水煮爛搗如泥入前藥和為丸如桐子大食後溫湯下五十丸五福還瞳丹治目白翳鬚髮門中名五老還童丹赤石脂川椒二味同炒辰砂茯神乳香各等分上為末棗肉為丸如桐子大每服百丸空心酒調下十服見效活命羊肝丸治年久喪明內障諸藥灸火無效者最妙白羯羊肝只取子肝一片薄切新瓦上焙熟地黃一兩半砂仁炒菟絲子蕤仁決明子車前子麥門冬地膚子澤瀉防風黃芩白茯苓五味子桂心杏仁炒細辛枸杞子茺蔚子苦葶藶青葙子各一兩上為細末煉蜜丸如桐子大每服三四十丸溫水下日三服不拘時候張臺卿嘗苦目障京師醫者令灸肝腧穴遂轉不見物因得此方眼目遂明一男子內障翳治無效因以余劑遺之一夕燈下語其家曰適偶有所見如隔門縫見火者及旦視之眼中翳膜俱裂如線張云此藥靈異勿妄與人忽之則無驗予益信之且欲廣其傳也羊肝丸鎮肝明目白羯羊肝一具去膜新瓦器盛焙乾細辛羌活五倍子菊花石決明煅獨活防風菟絲子酒浸茯苓草決明炒枸杞子青葙子地膚子茺蔚子杏仁去油皮肉桂白蒺藜炒麥門冬去心蕤仁川當歸各一兩熟地黃半兩酒浸上為末煉蜜丸如桐子大每服三四十丸溫湯下日三服三花五子丸甘菊花旋覆花密蒙花菟絲子覆盆子地膚子車前子決明子各等分上為細末糯米糊丸如桐子大每服三十丸麥門冬煎湯下加味三花五子丸甘菊花旋覆花密蒙花地膚子覆盆子牛蒡子蔓荊子草決明各一兩五錢川芎白蒺藜炒杵去刺木賊去節黃芩防風各一兩上為細末酒糊丸如桐子大每服三十丸麥門冬煎湯下如有翳加桑白皮煎湯下除昏退翳丸當歸活血川芎去頭風障癰木賊去翳天麻去羞明甘菊花去內障白蒺藜黃連去翳膜藁本去濕熱羌活去風清頭獨活青葙子楮實子荊芥蒼朮去濕熱夜明砂甘草各三錢上為細末煉蜜丸或餅或丸每丸重一錢臨臥細嚼米飲任下日進二丸刻日見效又以橄欖核清水磨擦服去昏翳尤速五退散治內障蟬退蛇退烏雞卵殼男子發各等分燒存性上為末每服一錢用豬肝煮湯調下五退散犀角蟬退各三錢蛇退一條石決明蒺藜炒密蒙花大黃各一兩當歸木賊各半兩上為末每服二錢燈心薄荷煎湯調下補肝散治三十年失明蒺藜子七月七日收陰乾搗散飲食後水服方寸匕一方但瞳子不壞者療十得九愈蔓菁子六升蒸之看氣逼用甑下釜中熱湯淋暴乾還淋如是三遍即取杵篩為末食後清酒調二錢送下日再服一方治虛勞目闇昧三月取蔓菁花陰乾為末以井花水空心調下二錢匕久服長生一方治積年目失明不識人決明子二升杵散食後以粥飲服方寸匕一方明目發不白不落用牛膽浸槐實陰乾百日每食後吞一枚十日身輕三七日白髮返黑百日通神一方白瓜子七升絹袋盛攪沸湯中三遍暴乾以酢五升浸一宿暴乾為末酒調服方寸匕日三服至百日夜可讀書補肝散治目失明青羊肝一具去膜薄切之以新瓦瓶子入肝於中炭火炙之為極細末蓼子一合炒令香上為末食後服方寸匕日二加至三匕不過一二劑能一歲服可夜讀細書龍木論方樓氏曰按內障先患一目次第相引兩目俱損者皆有翳在黑睛內遮瞳仁而然今詳通三經之脈者目系也目系屬足厥陰足太陽手少陰三經蓋此三經臟腑中虛則邪乘虛入經中鬱結從目系下黑睛內為翳龍木論所謂腦脂流下作翳者即足太陽之邪也所謂肝氣衝上成翳者即足厥陰之邪也故治法以針言之則當取三經之腧穴如天柱風府太衝通里等穴是也其有手巧心審諦者能用針於黑眼裡撥其翳為效尤捷也以藥言之則當補中疏通此三經之鬱結使邪不入目系而愈今集龍木論方於後羚羊角飲子治圓翳內障不痛不癢漸漸失明眼與不患眼相似但不辨人物惟觀三光先從一眼先患向後相牽俱損形如油點浮水中陽看則小陰看則大此是腦脂流上肝風上衝所致金針一撥即去羚羊角三兩細辛知母車前子人參黃芩各二兩防風二兩半上為末每服一錢以水一盞煎至五分食後去渣溫服之還睛丸治冰翳內障眼內赤澀有花或黑或白或如冰凍之堅皆因肝臟積熱肺受風勞或心煩或嘔血大腸秘澀夜見燈花如蜂飛防風茺蔚子車前子知母各二兩人參一兩桔梗黃芩乾地黃細辛五味子各二兩半黑參半兩即元參上為末煉蜜丸如桐子大空心茶下十丸補肝湯治滑翳內障瞳仁內有翳如水銀珠子翻翻旋轉不辨人物皆因腦脂下流肝風衝上宜金針撥之人參茯苓黑參黃芩各一兩防風知母桔梗茺蔚子各二兩上為末每服一錢水一盞煎五分食後去渣溫服石決明丸治同前石決明車前子防風知母各一兩茺蔚子五味子細辛人參茯苓黃芩大黃各三兩上為末煉蜜丸如桐子大每服十丸食前茶湯下還睛散治澀翳內障眼朦朧如輕煙薄霧漸漸失明翳如凝脂宜金針撥之桔梗五味子茺蔚子黑參黃芩各一兩防風知母各二兩車前子細茶各二兩半上為末每服一錢水一盞煎至五分食後溫服七寶丸治同前龍腦一分人參一兩珍珠五錢石決明另搗琥珀青魚膽熊膽各二兩茺蔚子四兩上為末煉蜜丸如桐子大食前茶下十丸還睛散治散翳內障瞳仁里有障翳如酥點乍青乍白宜針撥之人參茯苓細辛五味子桔梗各一兩車前子防風各二兩上為末每一錢水煎食後溫服決明散治浮翳內障因腦中熱風衝入眼內腦脂流下凝結作翳如銀針之色石決明人參茯苓大黃車前子細辛各一兩防風茺蔚子各二兩桔梗一兩半上為末每食後米飲調下一錢羚羊角飲子治沉翳內障因肝臟勞熱腦中熱氣流下隱隱藏形深如黑水羚羊角防風茺蔚子各二兩車前子黑參黃芩各一兩大黃半兩上為末每一錢水煎空心服空清丸治同前空青一株五味子車前子細辛各一兩防風生地黃知母各二兩石決明一兩另搗細上為末煉蜜丸如桐子大空心茶下十丸還睛丸治橫翳內障皆是五臟虛勞風毒衝上腦脂流下橫如劍脊兩邊薄中央厚令眼失明人參黑參石決明車前子五味子黃芩各一兩防風細辛乾地黃各二兩酒浸上為末煉蜜丸如桐子大空心茶下十五丸七寶散治同前羚羊角犀角各一兩胡黃連石決明車前子甘草各半兩丹砂一分另研上為末每服一錢水煎食後溫服通明散治偃月翳內障微有頭旋額角骨痛亦順肝腎俱勞腦風積熱致使生翳如偃月之狀宜針先從厚處撥之人參防風黃芩各一兩細辛一兩半茯苓半兩茺蔚子二兩上為末每服一錢水煎夜半食後溫服墜翳丸治偃月翳棗花翳微有頭旋額痛者青羊膽青魚膽鯉魚膽各七個熊膽一分牛膽五錢麝香少許石決明一兩上為末麵糊丸如桐子大空心茶下十丸還睛散治棗花翳內障微有頭旋眼澀漸漸昏暗時時癢痛腦熱有花黃黑不定人參茯苓車前子黑參防風茺蔚子知母各二兩黃芩一兩半上為末每一錢水煎服墜翳散治白翳黃心內障四邊白中心黃因肝臟勞熱初覺即急須療甘菊花三兩石決明茺蔚子防風各二兩車前子人參各三兩上為末食後米飲調下一錢蘆薈丸治黑水凝翳內障微有頭旋眼澀見花黃黑不定瞳仁微大翳結青色宜針撥之蘆薈甘草各二錢半人參牛膽各半兩柏子仁細辛各一兩羚羊角二兩蜜炙上為末煉蜜丸如桐子大空心茶下十丸護睛丸治胎翳內障皆因乳母多有吃食乖違將息失度愛食濕面五辛諸毒丹藥積熱在腹後此令胎中患眼生後五六歲以來不言不笑都無盻視父母始覺急須服藥調理不宜點諸毒藥燒炙頭面枉害形容直至年長十五以來方始辨眼內翳狀如青白色蓋定瞳仁尤辨三光可令金針撥之小兒內障多有不堪療者宜仔細看之服此藥即不損眼也木香大黃黃芩黑參各一兩射干細辛各半兩上為末煉蜜丸如桐子大空心茶下十丸除風湯治五風變成內障頭旋偏痛是毒風入眼兼腦熱相侵致令眼目失明瞳子白如霜羚羊角車前子各二兩芍藥人參茯苓大黃黃芩芒硝各一兩上為末每服一錢水煎食後服磁石丸治雷頭風變內障初患時頭旋噁心嘔吐先患一目次相牽俱損瞳仁或大或小凝脂結白不辨三光磁石燒赤醋淬三遍五味子牡丹皮乾薑黑參各一兩附子炮半兩上為末煉蜜丸如桐子大食前茶下十丸鎮肝丸治驚振內障因頭腦被打築惡血流下漸入眼內至三二年變成白翳先患之眼不宜針牽損後患之眼宜針之石決明一兩另研細辛乾山藥茺蔚子人參車前子柏子仁茯苓各一兩防風一兩半上為末煉蜜丸如桐子大食後茶下十丸羚羊角飲子治綠風內障初患時頭旋額角偏痛連眼瞼眉及鼻頰骨痛眼內痛澀先患一眼向後俱損目前花生或紅或黑為肝肺受勞致然也羚羊角防風知母人參茯神黑參桔梗各二兩細辛三兩黃芩車前子各一兩上為末每服一錢水煎食後服決明丸治烏風內障無翳但瞳仁小三五年內結成翳青白色不宜針視物有花為虛藥補不宜瀉石決明防風人參車前子細辛茯苓茺蔚子乾山藥桔梗各二兩上為末煉蜜丸如桐子大食前茶下十丸羚羊角飲子治黑風內障初患時頭旋額角偏痛連眼瞼眉及鼻頰骨眼內痛澀先患一眼向後俱損無翳眼見黑花羚羊角羌活黑參細辛桔梗黃芩柴胡各一兩車前子茺蔚子各一兩半防風二兩上為末每服一錢水煎食後服羚羊角湯治青風內障初患時微有痛澀頭旋腦痛先患一眼向後俱損皆因五臟虛勞所致遇勞倦加昏重羚羊角人參黑參地骨皮羌活各一兩車前子一兩半上為末每服一錢水煎食遠服補肝散治肝風內障無翳眼前多見虛花或白或黑或赤或黃或見一物二形此為腎臟虛勞肝氣不足二眼同患急宜補治切忌房勞羚羊角防風各二兩羌活車前子人參茯苓細辛元參黃芩炒各三兩半上為末食後米飲調下一錢治目不能遠視能近視方地芝丸治目不能遠視能近視或亦妨近視以此除風熱生地黃焙天門冬去心各四兩枳殼麩炒甘菊花各二兩上同為細末煉蜜丸如桐子大每服百丸溫酒茶清任下食後六味地黃丸亦治此證芎藭丸治遠視不明常見黑花久服明目芎藭菊花荊芥薄荷甘草各一兩蒼朮米泔浸二兩上為末煉蜜丸如桐子大每服五十丸食後茶清下定志丸治眼不能遠視能近視者遠志去心菖蒲各二兩人參白茯苓各一兩上為末煉蜜丸如桐子大硃砂為衣每十丸加至二十丸溫水下治雀目日落不見物方蛤粉丸治雀目日落不見物如神蛤粉細研黃蠟各等分上熔蠟搜粉為丸如棗子大每用豬肝一片二兩許劈開裹藥一丸麻綿纏入磁器內水煮熟取出乘熱熏眼至溫吃肝以愈為度神效一方治雀目夜明砂蛤粉各等分上為細末每服二錢豬肝一片三指大入藥於內麻繩扎定用陳米一合煮熟空心吃肝一方用豶豬肝煮熟和夜明珠作丸服之外用白犬初生時乳汁點眼小犬眼開而人眼亦見地膚子五錢決明子一升上二味為末以米飲汁和丸如桐子大每食後服二十丸至三十丸日日服至瘥止一方治雀目蒼朮三兩米泔浸一宿切作片焙乾石決明燒存性一兩上為末每服三錢用豬肝二兩劈開撒藥在內用麻線系定粟米一合水一碗砂鍋內煮熟熏眼候溫臥服大效一方治雀目眼不計時月用蒼朮一兩搗羅為末每服一錢不拘時治轉關通睛視物不正方天門冬飲子治眼睛不能歸中名曰轆轤轉關天門冬茺蔚子知母各一錢人參茯苓羌活各七分半五味子防風各五分上銼水煎服牛黃丸治小兒肝受驚風兩眼睛通欲觀東邊則見西畔若振掉頭腦則睛方轉牛黃一兩犀角二兩金銀箔各十五片甘草一錢二分上為末煉蜜丸如綠豆大每服七丸薄荷煎湯下牛黃丸治小兒通睛牛黃白附子肉桂乾蠍川芎石膏一錢白芷二分藿香五錢硃砂麝香各少許上為末煉蜜丸如桐子大每服三丸臨臥薄荷湯下乳母忌濕面豬肉等物犀角飲子治通睛犀角一兩射干龍膽草各五錢鉤藤黃芩各五分人參二兩茯苓甘草各一分遠志二分上為末每服一錢水煎食後服通頂石楠散石楠一兩藜蘆黃三分瓜蒂五七個上為末每用一粳米許一日兩度通頂為妙視正為斜淮安陳吉老儒醫也有富翁子忽病視正物皆斜凡几案書冊之類排設整齊必更移令斜自以為正以至書寫尺牘莫不皆然父母甚憂之更歷數醫皆不諳其疾或以吉老告遂攜子往求治既診脈後令其父歸留其子設樂開宴酬勸無算至醉乃罷扶病者坐轎中使人舁之高下其手常令傾側展轉久之方令登榻而臥達旦酒醒遣之歸家明日斜視之物皆理正之父母躍然而喜且問治之之方吉老公云令嗣無他疾醉中當閃倒肝之一葉搭於肺上不能下故視正物為斜今復飲之醉則肺脹展轉之間肝亦垂下矣藥亦安能治之哉富翁厚為之酬視物倒植元末四明有呂復別號滄州翁深於醫道臨川道士蕭云泉眼中視物皆倒植請治於復復問其因蕭曰某常大醉盡吐所飲酒熟睡至天明遂得此病復切其脈左關浮促即告之曰當傷酒大吐時上焦反覆至倒其膽腑故視物皆倒植此不內外因而致內傷者也法當復吐以正其膽遂以藜蒺蘆瓜蒂為粗末用水煎之使平旦頓服以吐為度吐畢視物如常治目淚不止方當歸飲子凡風沖淚出俗言作冷淚者非也風衝於內火發於外風火相搏由是淚出內外皆治可愈當歸大黃柴胡人參黃芩甘草芍藥各一兩滑石半兩上銼每服三錢至五錢加生薑三片水煎溫服若外治用貝母一枚白膩者加胡椒七粒不犯銅鐵研細睡臥點之當歸湯治風邪所傷寒中目淚自出肌瘦汗不止當歸人參各三兩陳皮官桂各一兩乾薑炮白朮白茯苓川芎芍藥細辛甘草各半兩上為末每服二錢加生薑三片棗二枚水煎熱服不計時並三服龐安常二方治頭風冷淚甘菊花決明子各二錢白朮羌活川芎細辛白芷荊芥穗各半兩上為細末每服一錢溫湯調下食後日三服又方川芎甘菊花細辛白朮白芷各等分上為末蠟丸如黍米大夜臥服一丸日中一時辰換一丸銀海止淚方蒼朮米泔浸一兩半木賊去節二兩香附子炒去毛一兩上為末煉蜜丸如桐子大食後鹽湯下三丸川芎散治風盛膈壅鼻塞清涕熱氣攻眼下淚多眵齒間緊急作頭痛川芎柴胡各一兩半夏曲甘草炙甘菊花人參前胡防風各半兩上銼每服四錢加生薑四片薄荷五葉水煎溫服石燕散治迎風有淚石燕子一雙煅醋淬十次玳瑁羚羊角各一兩犀角一錢上為末每服一錢好酒薄荷湯或茶清食後調下蠶沙湯治迎風有淚蠶沙炒四兩巴戟川楝肉馬藺花各二兩上為細末每服無灰酒調下不拘時艾煎丸治迎風有淚艾葉醋炒肉蓯蓉川牛膝酒浸甘草炙桑葉向東者山藥杜牛膝當歸各等分上為極細末煉蜜丸如桐子大每服十丸茶清調下楮實散治冷淚香附子炒夏葉桑各一兩夏枯草甘草楮實子去白膜炒各半兩上為細末熟水調服不拘時加味四物湯治眼出冷淚虛則補肝當歸川芎赤芍藥熟地砂仁炒木賊防風各等分上銼水煎服木賊散治出冷淚屬實風熱者蒼朮羌活防風川芎木賊白蒺藜甘草各等分上為末米泔水調下胡椒丸治老人冷淚不止胡椒一味為末黃蠟溶化為丸如綠豆大每服五七丸食後茶清下一方治冷淚石決明一兩赤小豆一兩半半夏生五錢斑蝥炒去頭足二十一粒木賊五錢上為末薑汁丸如桐子大每服二十丸薑湯下英宗朝國婆婆患眼冷淚眼科醫官治二三年不能療上召孫孫至曰臣非眼科但有藥耳進此方旨下眼科詳定醫官奏曰此方於眼科不相涉斑蝥有毒恐傷臟腑不敢用婆婆聞之曰眼科醫官不惟不能亦不願使我活也但合此藥總傷無怨服經十日愈八分二十日全愈時眼科並降兩官孫賞錢三十萬夏枯草散治冷淚不止及羞明怕日夏枯草香附子各等分上為細末每服一錢麥冬煎湯調下茶清亦可一方有荊芥立應散治冷淚象斗子一個甘草三錢上為細末每服二錢熟水調下一方用棗一枚去核以花椒二十粒入內用粗紙裹煨熟細嚼白湯下一方治冷眼及傷寒者防風荊芥菊花葉根薄荷當歸各等分乾薑少許上銼煎湯洗一方洗冷淚當歸檳榔陳艾荊芥防風菊花木賊五倍子各等分上煎湯溫洗一方治風眼淚流不止爐甘石烏賊骨各等分上為末入冰片少許點目並口其淚即止一方治目淚並一切眼疾白爐甘石八錢片腦二分半上為末點眼或用少許以白湯泡化時時洗之一方治眼冷淚不止用黃連濃漬綿干拭目一方治風淚眼九節黃連活槐樹皮燒灰粗末熬湯澄清頓洗治怕日羞明方秘方密蒙花散治羞明怕日石決明煅木賊枸杞子白蒺藜青葙子羌活菊花蔓荊子各等分上㕮咀每服一兩水煎食後服千里光湯千里光即石決明海金沙菊花甘草各等分上㕮咀每服八錢水煎食後溫服治風沿爛眼方防風通聖散治風熱爛眼因飲食挾怒成痰久不愈防風川芎當歸芍藥薄荷麻黃連翹荊芥梔子白朮桔梗黃芩石膏滑石甘草各等分上為細末酒拌勻曬乾依法取之秘方洗心散治風邪客於腠理濕氣相爭停於兩瞼目時赤爛當歸芍藥荊芥菊花大黃甘草各等分上㕮咀每服三錢加生薑薄荷少許水煎溫服爐甘石散治爛風眼爐甘石不拘多少先用童便煅淬七次用黃連濃煎汁煅七次用穀雨前茶濃煎汁煅七次又並三汁余者一處再加三次然後安於地上一宿出火毒細研入冰片麝香點上神效爐甘石煅時須用好紫銷炭極大者鑿一穴以安爐甘石一方治爛緣風眼作癢有蟲覆盆葉一味為細末水調成膏紗絹盛之貼在眼上半時其蟲即出在紗上一方覆盆葉曝乾搗細薄綿裹之用男子所飲乳汁浸如人行八九里久用點目中即仰臥不過三四日視物如常少年但忌酒面油蓋治眼妙品也一方洗爛弦風眼明礬枯過一兩大柏皮鐵粉黃丹各一錢上為末井花水調頻頻洗之一方洗紅爛眼當歸黃連杏仁銅青皮硝淨鹼各五分上為末每服三分用井水小半盞調紙隔蘸洗廣大重明湯治兩目眼皮赤爛熱腫疼痛並稍赤及眼皮癢痛抓之至破眼弦生瘡目多眵淚隱澀難開龍膽草防風細辛生甘草各一錢上銼如咀內甘草不銼只作一錠先以水一大碗半煎龍膽草一味至一半再入餘三味煎至少半碗濾去渣用清帶熱洗以重湯坐熱日用五七次但洗畢閤眼一時去胬肉泛長及癢亦驗還睛紫金丹治目眶歲久赤爛俗呼為赤瞎是也當以三稜針刺目眶外以瀉濕熱用此點洗白沙蜜二十兩爐甘石一兩火煅十次淬水內連水浸半日黃丹六兩水浸烏賊骨二錢硇砂小盞內放於瓶口上熏紅麝香各一錢白丁香真者五分輕粉一字上將白砂蜜於砂石器內慢火熬掠去沫下甘石次下丹柳枝攪次下余藥以不黏手為度作丸如雞頭實大每用一丸溫水化開洗之一方治爛弦風眼目痛癢時常出淚黃連淡竹葉各二兩柏樹皮二兩一半生一半熟上銼用水二升煎五合稍冷用滴洗兩目爛處姜液膏治風癢冷淚爛弦有蟲生薑每一塊以銀簪插入即拔出點眼頭尾一方治多年爛紅眼用明淨皮硝一茶鍾水二碗煎六七沸取出露過一宿以細羅濾三四遍澄清朝夕以水洗目三日其紅即消雖半世紅眼亦能清明再不發也一方洗爛弦眼薄荷荊芥細辛各等分上為末如燒香狀燒之以碗塗蜜少許於內覆煙上取煙盡後以磁罐收之凡眼有風熱多淚皆可點之一方治遠年風眼甘草三寸分三處杏仁十二個去皮尖分三處上嗽口淨將杏仁一分甘草一分同嚼爛如泥吐於磁盞內三分俱如此嚼爛用銅青二錢研極細與前藥和勻用新汲水嗽口吐於藥內如法攪勻以帛濾澄清於眼角點之立效勿令塵入藥內一方治風沿爛眼二蠶炒用香油浸月餘重綿濾過點之愈久愈妙一方治眼赤瞎以青泥蛆淨洗曬乾末之仰臥合目用藥一錢放眼上須臾藥行少時去藥赤瞎自無二百味花草膏治火眼爛弦風眼痛癢羞明及眼胞皮肉有似膠凝腫如桃李時出熱淚臘羯羊膽一枚以蜜灌滿入硃砂末少許掛起陰乾用時取一粒入磁器內水化點眼或取少許含化以蜜乃百花之英羊膽乃百草之精故名治蟹睛突起方瀉肝湯治肝臟伏熱膈中膽氣不足致令瞳仁突出如黑珠子大又如桃李相似此蟹精眼也急宜服藥元參地骨皮車前子芒硝各一兩大黃知母各一兩半茺蔚子二兩上為末每服一錢水煎空心溫服退熱桔梗飲子治五臟風毒致令睛突出疼痛桔梗茺蔚子大黃元參芍藥防風黃芩芒硝各一兩上為末每服一錢水煎食後溫服治倒睫拳毛方神效明目湯治眼楞緊急致倒睫拳毛及上下眼皮皆赤爛睛疼昏暗晝則冷淚常流夜則眼澀難開葛根一錢半甘草二錢防風一錢蔓荊子五分細辛三分上㕮咀作一服水煎熱臨臥服一方加黃耆一錢防風飲子治倒睫拳毛人參甘草炙黃連炒各一錢歸身七分半葛根防風各五分細辛蔓荊子各三分上銼作一服水煎食遠服避風寒神效黃耆湯治渾身麻木不仁及兩目緊急縮小羞明畏日或隱澀難開或視物無力睛痛昏花手不得近或目少睛光或目中熱如火五六次神效黃芩二兩人參八錢白芍藥甘草炙各一兩陳皮去白五錢蔓荊子一錢上㕮咀每服五錢水煎臨臥稍熱服如小便淋瀝加澤瀉五分如有大熱證每服加酒洗黃柏三分如麻木不仁雖有熱不用黃柏止加黃耆一兩如眼縮急去芍藥忌酒醋濕面大料物蔥韭蒜辛物如麻木甚者加芍藥一兩木通一兩撥雲湯戊申六月徐總管患眼疾於上眼皮下出黑白翳二個隱澀難開兩目緊急而無疼痛兩手寸脈細緊按之洪大無力知太陽膀胱為命門相火煎熬逆行作寒水翳及寒障遮睛外證呵欠善悲健忘噴嚏時自淚下面赤而白能食不大便小便數而少氣上而喘黃耆二錢半羌活防風黃柏各一錢半升麻藁本荊芥當歸知母生甘草各一錢柴胡七分細辛川芎葛根生薑各五分上銼如麻豆大作一服水二盞煎至一大盞稍熱服連翹飲子治目中溜火惡日與火隱澀小角偏緊久視昏花迎風有淚黃耆防風黃芩酒炒羌活各五分升麻一錢蔓荊子連翹甘草生地黃人參紅葵花各三分柴胡歸身各二分上㕮咀每服五錢水煎食後稍熱服前一方治倒睫拳毛後三方治眼楞緊急縮小眼楞緊縮小者倒睫拳毛之漸也故以其方附於後蓋陽虛則眼楞緊急陰虛則瞳子散大故東垣治眼楞緊急用參耆補氣為君佐以辛味疏散之而忌芍藥五味子之類酸味收斂之而忌茺蔚子青葙子之類是也青黛散治眼倒睫極效蝟刺棗棘針白芷青黛各等分上為細末左眼倒睫口噙水左鼻內搐之右眼右鼻搐之一方治倒睫爛弦蠶沙一兩虢丹五錢上為細末用水熬成膏入輕粉五分熬黑色逐時洗泡洗治倒睫眼方以無名異末撒卷在紙中作捻子點著至藥末處滅以煙燻之自起一方木鱉子一個去殼綿裹塞鼻中左目塞右右目塞左二夜其睫自正一方治眼毛倒睫摘去拳毛用蝨子血點入眼內數次即愈治胬肉攀睛方還睛散治眼翳膜昏澀淚出瘀血胬肉攀睛川芎龍膽草草決明石決明荊芥枳殼野菊花野麻子白茯苓甘草炙木賊白蒺藜川椒炒去子仙靈脾茵陳各半兩上為細末每服二錢食後茶清調下一日三服忌雞魚肉及熱面蕎麥等物一方有楮實子無仙靈脾茵陳枳殼一方治眼中胬肉攀睛及兩睫上下疙瘩當歸生地酒炒熟地砂仁炒生甘草各一錢蔓荊子覆盆子白蒺藜連翹荊芥川芎薄荷羌活獨活各五分防風七分燈心七根上銼水煎食後服一方洗胬肉攀睛當歸尾黃連荊芥防風朴硝硼砂薄荷各等分上銼煎湯洗翳加木賊痛加乳香蟲癢加生薑黃連膏治一切眼目瘀血攀睛風癢淚落不止黃連半斤白丁香五升以水一瓶淘洗去土攪細用朴硝一斗以水半瓶潤淨去土陰乾上取水入硝香釜內熬至七分淘出令經宿水面浮牙者取出控干以紙袋子盛風中懸至風化將黃連細末熬清汁曬乾入風硝用豬羊膽和蜜令勻點眼神效局方紫金膏硃砂另研乳香另研硼砂另研赤芍藥當歸洗各一兩黃連麝香另研各半兩雄黃二錢水飛上為細末拌勻再擂煉蜜丸如皂角子大每用一丸安於淨盞內沸湯泡開於無風處洗眼藥冷閉目少時候三兩時再煨令熱依前洗之一帖可洗三五次不可犯銅鐵器內洗如暴赤眼及腫者不可洗之七寶膏珍珠龍腦熊膽各一分石決明琥珀各三分水晶龍齒各五錢上研為細末水五升石器內煎至一升去渣再煎至一盞入蜜半兩和為膏每至夜臥後點之早晨不可點捲簾散治久新痛眼昏澀難開翳膜遮睛或成胬肉或暴發赤腫疼痛並皆治之爐甘石四兩碎黃連六錢槌碎用水一碗煮數沸去渣朴硝五錢細研以上先將爐甘石末入砂鍋內開口煅令外有霞為度次將入黃連朴硝水中浸飛過候乾又入黃連半錢水飛過再候乾入後藥白礬二錢一半生用一半飛過膩粉另研一字黃連末半兩青鹽膽礬各七錢丁香另研乳香另研鉛白霜硇砂另研各一字銅青七錢上為末同前藥和合令勻每用少許點眼一方點攀睛胬肉爐甘石一兩硼砂二錢膽礬五分海螵蛸珍珠琥珀麻雀糞辰砂檳榔各二分冰片一分上為極細末點之一方治胬肉瘀突硼砂一錢片腦半分或一分上為末以燈心蘸點其上通神膏治眼生翳膜赤眼胬肉澀癢痛有淚沙蜜四兩黃連一錢當歸五分乳香硇砂滴過枯礬青鹽麝香各一字上研細同蜜入竹筒內蜜封定煮半日厚綿濾過點眼一方治卒患赤目胬肉生內痛者取好梨一個搗汁黃連三枚碎之以綿裹漬令色變仰臥注目中一方治目翳及胬肉礬石最白者納黍米大一粒於翳上及胬肉上即冷淚出綿拭之令惡汁盡其疾日減翳自消薄便瘥一方治目中生息肉翳滿目閉瞳子及生珠管貝齒七枚燒為末珍珠各等分上為細末如粉以注翳肉上不過五度即瘥治瞳仁倒側方生犀角丸犀角麻黃防風石決明當歸楮實子枸杞子各等分上為細末麵糊丸如桐子大每服三十丸茶清下小兒量大小加減丸數救睛丸蒼朮三兩梔子薄荷葉赤芍藥枸杞子各二兩上為末酒糊丸如桐子大每服三十丸井花水下茶清亦可年壯之人可服如年老人加茯苓三兩琥珀膏人參二錢石菖蒲天門冬去心遠志去心麥門冬去心白茯苓預知子各一兩上為細末煉蜜丸如桐子大硃砂為衣每服十丸茶清下水亦可治目被物撞刺方除風散治眼忽然被物誤有打撞眼胞青珠疼痛惡腫難開宜令洗出血後以爛搗地黃綿裹封眼後服此藥防風二兩車前子藁本細辛芎藭五味子桔梗各一兩半上為末用陳米飲空心調下一錢七分壓熱飲子治同前犀角大黃知母人參茯苓黃芩元參麥門冬各一兩半甘草一兩上為末每服一錢水煎食後溫服人參湯治眼目被物撞刺著治療不盡有餘痕積血在眼皮眥之中致使生翳如此病狀不宜鉤割熨烙切須將息大忌淫欲嗔怒人參二兩茯苓黃芩五味子元參羌活細辛各一兩車前子一兩半上為末每服一錢水煎食後溫服退熱茺蔚散治同前茺蔚子二兩防風芎藭桔梗人參知母各一兩藁本五錢白芷一錢上為末每日米飲調下一錢貼眼地黃膏治眼被物撞打及風熱暴赤腫痛目熱淚出等證並皆治之以其性涼能逐去熱毒故耳生地黃一合黃連一兩黃柏寒水石各五錢上為末用地黃自然汁和成餅子用時襯紙貼眼上如火燒湯潑再加黃芩山梔大黃等分為末酒調治眯目飛絲塵垢方一方凡風吹塵物入眼貼瞼皮黏定睛上疼痛隱澀難開不辨人物欲治之時須翻眼皮用綿裹針撥出眯物一方治飛絲落眼腫如眯痛澀不開鼻流清涕用京墨濃磨以新筆塗入目中閉目少時以手張開其絲自成一塊看在白眼上卻用綿輕輕惹下則愈如未盡再塗此方累效一方治飛絲入目用頭垢點入眼中即出神效一方用柘樹漿點了綿裹著頭蘸水於眼上繳拭涎毒一方以火麻子一合杵碎井水一碗浸攪卻將舌浸水中涎沫自出神效一方用茄子葉杵碎如麻子法尤妙一方治眯目鹽與豉置水中浸之視水其渣立出一方以蠶砂一粒吞下即出一方治稻麥芒入眼取生蠐螬以新布覆目上將蠐螬從布上摩之其芒出著布上一方治砂石草木入目中以雞肝注之一方以書中白魚和乳汁注目中一方治物落目中用新筆蘸繳出一方濃研好墨點眼中立出點洗雜方光明丹治諸般眼疾皆效白爐甘石一兩辰砂一錢硼砂二錢輕粉五分片腦三分多至五分麝香一分上為極細末各另放臨時加減和勻再研一二日磁器收貯蜜封口不可泄氣如赤眼腫痛加乳香沒藥各五分內外翳障加珍珠五分膽礬熊膽各一分爛弦風眼加銅青黃丹各五分七寶丹珍珠珊瑚辰砂片腦蕤仁去殼各一錢麝香五分爐甘石一兩上研極細點之八寶丹爐甘石煅童便淬七次黃丹研細水飛生白礬各一兩乳香片腦麝香各三錢珍珠用蚌蛤盛之以鐵綿縛合火中煅過硃砂各五錢上各為細末用蜜一兩半以銅鍋熬去沫絲綿濾過先下珠麝砂礬丹次下硇石攪勻乘熱為丸如黃豆大硃砂為衣磁罐收貯多年愈堅愈好臨用以井花水磨化點眼神效八寶推雲散爐甘石二兩當歸槐皮各一兩艾五錢上用水一碗半將當歸等三味煎至一碗以火煅石用前水三次灑之畢則用青布裹之埋於小便地下更宿取出血竭沒藥乳香硃砂輕粉硼砂珍珠瑪瑙水晶牛黃雄黃各三分冰片五分熊膽膽礬各二分銅綠一分麝香半分上研為極細末清晨以溫水洗淨眼以銀簪點兩眼角如赤暴眼一夜點三次其效甚捷爐甘石散治一切目疾不問得病之因悉治之爐甘石真者半斤用黃連四兩銼如豆大於銀石器中用水二碗煮二次揀去黃連取出甘石細研片腦二錢半上研勻每用半字白湯泡時時洗之點亦可撥雲散不問遠年近日昏花赤風爛眼疾治無不效爐甘石五分雲南產者方佳用煎銀砂鍋火煨如煎銀不用蓋煨令極黃色取出用小便淬之以盡為度用水泛盡童便曬乾研極細紙羅二次方用片腦一分同甘石細研上二味和勻用銀簪點眼角若加空青二分在內雖十數年盲瞽及胎痘瞎眼復明神妙無比春雪膏治肝經不足內受風熱上攻眼目昏癢痛隱澀難開及多眵赤腫怕日羞明不能遠視迎風有淚多見黑花片腦二錢半蕤仁去皮殼細研去油秤二兩上用生蜜二錢重搜和以銅箸子或以金銀釵股點放眥頭連眶赤爛以油紙塗膏貼之瓊液膏治遠年近日一切不療眼疾其效應如神熊膽蕤仁去皮牛黃硼砂為末各一錢龍腦五分黃連蜂蜜各一兩上熊膽牛黃蕤仁黃連四味用長流水二大碗於磁器內熬至半碗用重綿濾過去入蜜再用文武火熬至紫色蘸起牽絲為度不可太過不及取出入硼砂龍腦末和勻磁瓶內封固入土埋七日出火氣每用銅箸少許點於患目內瞑目片時候火性過日點三次仍忌動風熱物黃連膏治貫障風弦暴患眼尤效爐甘石一兩黃連五錢朴硝三錢海螵蛸膽礬各一錢輕粉硃砂沒藥各五分雄黃片腦各三分麝香少許上各研為細末用長流水二碗將黃連朴硝煎至半碗入淨蜂蜜一兩半攪勻文武水熬至紫色牽絲為度卻將余藥入膏內攪勻磁罐裝盛封固埋土中七日去火毒點用撥雲散點一切眼目風熱腫痛昏暗不明生花障翳或熱極紅赤痛不可忍治之最效爐甘石火煅童便淬五錢黃連辰砂石蟹各一錢膽礬珍珠石燕子醋煅官硼砂飛過琥珀瑪瑙乳香血竭各五分大片腦半分上為極細末用磁器盛貯先將涼水洗淨眼後用銀簪挑藥點眼良久則效如作膏子用蜜調和點之光明撥雲錠子治遠年近日一切眼疾爐甘石一斤煅過用黃連半斤水二碗煎五七沸渣令七次止取淨末二兩硼砂一兩海螵蛸血竭各三錢片腦珍珠乳香沒藥各一錢麝香二分上研極細末聽用待熬後膏子和劑黃連半斤龍膽草當歸芍藥大黃黃柏黃芩川芎生地黃白芷防風木賊薄荷葉羌活紅花菊花各等分上用水七八碗浸藥三日煎成膏子和劑前藥成錠子淨水磨化點眼開光錠子爐甘石煅黃連水淬淨末二兩硼砂五錢雄黃牛黃各一錢珍珠片腦各三分上為細末熬黃連膏為錠子磨點碧霞丹點一切惡眼風赤者龍腦麝香硇砂硼砂各二錢沒藥乳香血竭銅青各一錢上為末滴水和丸如桐子大每一丸新汲水化開點之立效家傳大明膏專治翳膜攀睛爛弦赤障胬肉血貫瞳仁迎風冷淚怕日羞明視物昏花疼痛不止不動刀針用藥點眼三朝見效十日全愈大黃蒼朮柴胡龍膽草藁本細辛赤芍藥菊花倍紅花黃連黃芩連翹梔子荊芥防風黃柏木賊蒺藜薄荷羌活獨活麻黃川芍白芷天麻蔓荊子元參苦參歸尾木通生地酒炒桑白皮車前子枳殼皮硝甘草各等分上銼十大帖用童便五碗煎熟用爐甘石一斤淨入炭火燒紅淬入藥中十次研爛去渣將藥水入銅盆內重湯煮乾成餅曬乾研千餘下每一兩入焰硝八錢黃丹五分又研千餘下收入磁罐內點眼如胬肉雲翳昏朦爛弦風眼入冰片少許點之吹雲膏治目中淚及迎風寒泣羞明畏日常欲閉目喜在暗室塞其戶牖翳膜歲久遮睛此藥多點神驗揀黃連三錢生地黃一錢五分荊芥一錢取濃汁當歸身生甘草柴胡各六分防風連翹青皮各四錢升麻蕤仁各三分細辛一分上㕮咀除連翹外用澄清淨水二碗先熬余藥至半碗入連翹同熬至一大盞許去渣入銀石器內文武火熬滴入水中成珠不散為度入煉熟蜜少許熬勻用之千金不易萬明膏治眼天下第一方黃連當歸木賊羌活防風天麻白蒺藜甘菊花青葙子荊芥楮實子赤芍藥龍膽草大黃蟬退枸杞子草決明密蒙花知母防己白芍藥茯苓桑白皮牛蒡子麥門冬貝母苦葶藶青鹽旋覆花蕤仁槐花五味子連翹艾葉石菖蒲白芷夜明砂赤石脂車前子各一兩黃芩黃柏梔子獨活川芎白附子生地黃熟地黃藁本遠志薄荷細辛柴胡桔梗胡黃連穀精草蒼朮天門冬石膏百部杏仁枳殼朴硝元參黃耆青藤大楓子各五錢檳榔蔓荊子石決明苦參各七錢木通六錢甘草一錢上七十二味俱切為細片用童便一桶將水澄盛磁盆中入爐甘石三斤浸之一日夜澄清再浸澄出將甘石入混元球內煅紅入藥水浸如此十數次冷定取出甘石入陽城罐內封固打火每罐打三炷香升盞輕清者合後藥可治瞎目墜底者可治火眼諸藥加減於後如不入罐打火將甘石研細用水飛過分清濁兩用亦可爐甘石十兩琥珀五錢珍珠八錢俱各用混元球煅過為極細末冰片三錢官硼砂三兩銅器上飛過海螵蛸六錢生用膽礬二兩銅瓦片煅過白翠二兩煅紅入童便內遍數以成細粉為止鷹粉三錢竹葉上焙過熊膽三錢用缸瓦上煅過存性人退一兩洗淨炒黃色存性木賊一兩焙過枯礬五錢輕粉三錢辰砂三錢皮硝三錢上各為極細末和勻點眼用如眼害日久有宿紗翳者加螵蛸珊瑚曾青珍珠各研極細加入如瘢瘡抱住黑睛者加飛過靈砂少許與白丁香研一處用烏鴉翎攪勻如血灌瞳仁加官硼砂曾青即膽礬是也琥珀朴硝少許研細入如束睛雲翳者加白翠螵蛸珊瑚琥珀珍珠如有紅筋加輕粉白礬如內障氣加曾青熊膽珊瑚琥珀珍珠辰砂少許如胬肉攀睛加硇砂少許鷹龔人退如多年老眼雲翳遮睛至厚者全料點之如迎風冷淚眼昏花者用主方治之自愈不必別藥惟少加冰片如拳毛倒睫加珍珠琥珀冰片如赤爛風弦者加硼砂珍珠再加銅綠一兩用天茄汁和艾熏透洗之妙外用點藥因疾加減而內服湯藥亦各隨證所謂表裡互治無不取效矣還睛丸人參二兩天冬泡去心麥冬去心三兩熟地三兩當歸酒洗一兩川芎七錢白茯苓一兩山藥一兩菟絲子去泥沙酒泡搗餅焙乾一兩枸杞子一兩五錢肉蓯蓉酒洗淨一兩五錢川牛膝去蘆一兩五錢川杜仲酒浸炒一兩五錢石斛酒洗二兩五錢五味子七錢川黃連七錢黃柏酒炒一兩知母酒炒二兩杏仁泡去皮一兩五錢枳殼一兩麩炒防風八錢黃菊花酒炒二兩青葙子一兩草決明一兩炒白蒺藜炒一兩羚羊角一兩烏犀角八錢炙甘草七錢上為細末煉蜜為丸如桐子大每服三五十丸空心鹽湯下紫霞膏熊膽一兩西牛黃一兩冰片五錢蕤仁五錢硼砂一兩黃連五兩白沙蜜五兩上先將黃膽蕤連四味用龍霜水或露水一斗於銀瓷器內熬至不老不嫩重絲濾過入蜜再用火熬至紫色以牽繫為度方入片硼及後項藥末量疾輕重加減收埋土內出火毒點眼忌風熱物欲事附錄熏面法論樓氏曰腎臭腐屬水脾臭香屬土今夫廁臭者腐臭也故聞之則入腎而面黑沉檀者香臭也故熏之則脾土勝腎水而色還也卷一百零一下目病下原機啟微一曰淫熱反克之病夫膏粱之變滋味過也氣血俱盛稟受厚也亢陽上炎陰不濟也邪入經絡內無御也因生而化因化而熱熱為火火性炎上足厥陰肝為木木生火母妊子子以淫勝禍發反克而肝開竅於目故肝受克而目亦受病也其病眵多眊矂緊澀赤脈貫睛臟腑秘結者為重重者芍藥清肝散通氣利中丸主之臟腑不秘結者為輕輕者芍藥清肝散減大黃芒硝及黃連天花粉丸主之少盛服通氣利中丸目眶爛者內服上藥外以黃連爐甘石散收其爛處兼以點眼春雪膏龍腦黃連膏嗅鼻碧雲散攻其淫熱此治淫熱反克之法也非膏粱之變非氣血俱盛非亢陽上炎非邪入經絡毋用此也用此則寒涼傷胃生意不上升反為所害病豈不治而已也宜審諸一曰風熱不制之病夫風動物而生於熱譬之烈火焰而必吹此物類感召不能違間者也因熱而召是為外來久熱不散感而自生是為內發內外為邪惟病則一淫熱之禍條已如前益以風邪害豈纖止風加頭痛加鼻塞加腫脹加涕淚加腦巔沉重加眉骨痠疼有一於此羌活盛風湯主之風加癢則以杏仁龍膽草泡散洗之病者有此數證或不敷藥或誤服藥翳必隨之而生翳如雲霧如絲縷如秤星翳如秤星者或一點或三四點而致數十點翳如螺蓋者為病久不去治不如法至極而致也為服寒涼藥過多脾胃受傷生意不能上升漸而致也然必要明經絡庶能應手翳凡自內眥而出為手太陽足太陽受邪治在小腸膀胱經羌活勝風湯加蔓荊子蒼朮主之自銳眥客主人而入者為足少陽手少陽手太陽受邪治在膽與三焦羌活勝風湯加龍膽草藁本少加人參主之自目系而下者為足厥陰手少陰受邪治在肝經心經羌活勝風湯加黃連倍加柴胡主之自抵過而上者為手太陽受邪治在小腸經羌活勝風湯加木通五味子主之熱甚者兼用治淫熱之藥嗅鼻碧雲散俱治以上之證大抵如開鍋蓋法嗅之隨效然力少而銳宜不時用之以聚其力雖然始者易而久者難漸復而復漸復而又復可也急於復者則不治今世醫用磨翳藥者有之用手法揭翳者有之噫翳猶瘡也奚斯愈乎庸者用此非徒無益增害猶甚愚者受此欣然而不悟可嘆也哉故治風熱不制之病治法一曰七情五賊勞役飢飽之病陰陽應象大論曰天有四時以生長收藏以生寒暑燥濕風五者發而皆不宜時則萬物俱死故曰生於四時死於四時又曰人有五臟化為五氣以生喜怒憂悲恐五者發而皆中節則九竅俱生發而皆不宜節則九竅俱死故曰生於五臟死於五臟目竅之一也光明視見至於鑑無窮為有窮而有窮又不能為窮反而聚之則乍張乍斂乍動乍靜為一泓一點之微者豈力為強致而能此乎是皆生生自然之道也或因七情內傷五賊外擾飢飽不節勞役異常足腸明胃之脈足太陰脾之脈為戊己二土生生之原也七情五賊總傷二脈飢飽傷胃勞役傷脾戊己既病則生生自然之體不能為生自然之用故致其病其病紅赤睛珠痛痛如刺刺故應太陽眼睫無力常欲垂閉不敢久視久視則痠疼生翳皆成陷下所陷者或圓或方或長或短或如點或如鏤或如錐或如鑿證有印此者柴胡復生湯黃連羊肝丸主之睛痛甚者當歸養榮湯助陽和血湯加減地黃丸決明益陰丸加當歸黃連羊肝丸龍腦黃連膏主之以上數方皆群隊升發陽氣之藥其中有用黃連黃芩之類者去五臟熱也嗅鼻碧雲散亦可間用最忌大黃芒硝牽牛石膏梔子之劑犯所忌則病愈振一曰血為邪勝凝而不行之病夫血陰物類地之水泉性本靜行其勢也行為陽是陰中之陽乃坎中有火之象陰外陽內故行也純陰故不行也不行則凝凝則經絡不通經云足陽明胃之脈常多氣多血又曰足陽明胃之脈常生氣生血手太陽小腸之脈斜絡於目眥足太陽膀胱之脈起於目內眥二經皆多血少氣血病不行血多易凝靈蘭秘典論曰脾胃者倉稟之官五味出焉五味淫則傷胃胃傷血病是為五味之邪從本生也又曰小腸者受盛之官化物出焉遇寒則阻其化又曰膀胱者州都之官津液藏焉遇風則散其藏一阻一散血亦病焉是謂風寒之邪從本生也凡是邪盛血病不行漸滯滯則易凝凝則病始外見以其斜絡目眥耶以其起於內眥耶故病環目青黯如被物傷狀者白睛亦黯輕者或成斑點然不痛不養無淚眵眊矂羞澀之證是曰血為邪勝凝而不行之病此病初起之時大抵與傷風證相似一二日則顯此病也川芎行經散消凝大丸子主之睛痛者更以當歸養榮湯主之如此則凝復不滯滯復能行不行復行邪消病除血復如故無所不食也一曰氣為怒傷散而不聚之病夫氣陽物類天之雲霧性本靜聚其體也聚為陰是陽中之陰乃離中有水之象陽外陰內故聚也純陽故不聚也不聚則散散則經絡不收經曰足陽明胃之脈常多氣多血又曰足陽明胃之脈常生氣生血七情內傷脾胃先病怒七情之一也胃病脾病氣亦病焉陰陽應象大論曰足厥陰肝主母在志為怒怒甚傷肝傷脾胃則氣不散傷肝則神水散何則神水亦氣散也其病無無眵淚痛癢羞明緊澀之證初但云霧中行漸空中有黑花又漸睹物成二體久則光不收遂為廢疾蓋其神水漸散而又散終而盡散故也初漸之次宜以千金磁朱丸主之鎮墜藥也石斛夜光丸主之羨補藥也益陰腎氣丸主之壯水藥也有熱者滋陰地黃丸主之此病最難治餌服上藥必要積以歲月必要無飢飽勞役必要驅七情五賊必要德性純粹庶幾易效不然必廢廢則終不復治久病光不收者亦不復治一證因為暴怒神水隨散光遂不收都無初漸之次此一得永不復治之證也又一證為物所擊神水散如暴怒之證亦不復治俗名為青盲者是也病者多不為審概曰目昏無傷始不經意及成世醫亦不識直曰熱致竟以涼藥投之殊不知涼藥傷胃況涼為秋為金肝為春為木涼藥又傷肝往往致廢而後已此誰之罪乎黯音暗青黑也一曰血氣不分混而遂結之病夫輕清圓健者為天故首象天重濁方厚者為地故足象地飄騰往來者為云故氣象云過流循環者為水故血象水天降地升云騰水流各宜其性故萬物生生而無窮陰平陽秘氣行血隨各得其調故百骸理而有餘反此則不宜其性不得其調矣故曰人身者小天地也難經曰血為榮氣為衛榮行脈中氣行脈外此血氣分而不混行而不阻也明矣故如雲騰水流之不相雜也大抵血氣如此不欲相混混則為阻阻則成結結則無所去還故隱起於皮膚之中遂為疣病然各隨經絡而見疣病自上眼睫而起者乃手少陰心脈足厥陰肝脈血氣混結而成也初起時但如豆許血氣衰者遂止不復長亦有久止而復長者盛者則漸長長而不已如杯如盞如碗如斗皆自豆許致也凡治在初須擇人神不犯之日大要令病者食飽不飢先汲冷井水洗眼如冰勿使氣血得行然後以左手持銅箸按眼睫上右手翻眼皮令轉轉則疣肉已突換以左手大指按之弗令得移動復以右手持小眉刀尖略破病處更以兩手大指甲捻之令出則所出者如豆許小黃脂也恐出而根不能斷宜更以眉刀尖斷之以井水再洗洗後則無恙要在手疾為巧事畢須投以防風散結湯數服即愈此病非手法則不能去何則為血氣初混時藥自可及病者則不知其為血氣混也比結則藥不能及矣故必用手法法畢又以升發之藥散之藥手皆至庶幾了事疣音由贅也結肉也一曰熱積必潰之病夫積者重疊不解之貌熱為陽陽平為常陽淫為邪則行行則病易見易見則易治此則前篇淫熱之病也深邪則不行不行則伏因伏而又浮日漸月聚熱不得不為積也積已久久積必潰潰始病見病見則難治難治者非不治也為邪積久比潰已深何則潰尤敗也知敗者庶可以救其病隱澀不自在稍覺眊矂視微物昏內眥穴開竅如針目按之則沁沁膿出有兩目俱病者有一目獨病者目屬肝內眥屬膀胱此蓋一經積邪之所致也故曰熱積必潰之病又曰漏睛眼者是也竹葉瀉經湯主之大便不硬者減大黃為用蜜劑解毒丸主之不然藥誤病久終為枯瞎一曰陽衰不能抗陰之病或問曰人有晝視通明夜視罔見雖有火光月色終不能睹物者何也答曰此陽衰不能抗陰之病諺所謂雀盲者也問曰何以知之答曰黃帝生氣通天論曰自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣又曰陰陽者一日而主外平旦人氣生日中而陽氣隆日西而陽氣已虛氣門已閉又曰陽不勝其陰則五臟氣爭九竅不通故知也問曰陽何物耶答曰凡人之氣應之四時者春夏為陽也應之一日者平旦至昏為陽也應之五臟六腑五臟為陰也問曰陽何為而不能抗陰也答曰人之有生以脾胃中州為主也靈蘭秘典曰脾胃者倉廩之官在五行為土土生萬物故為陽氣之原其性好生惡殺遇春夏乃生長遇秋冬則收藏或有憂思恐怒勞役飢炮之類過而不節皆能傷動脾胃脾胃受傷則陽氣下陷陽氣下陷則於四時一日五臟六腑之中陽氣皆衰陽氣既衰則於四時一日五臟六腑之中陰氣獨盛陰氣既盛故陽不能抗也問曰何故夜視罔見答曰目為肝肝為足厥陰也神水為腎腎為足少陰也肝為木腎為水水生木蓋亦相生而成也況怒傷肝腎受傷亦不能生也晝為陽天之陽也晝為陽人亦應之也雖受憂思恐怒勞役飢飽之傷而陽氣下陷遇天之陽盛陰衰之時我之陽氣雖衰不得不應之而升也故猶能晝視通明夜為陰天之陰也夜為陰人亦應之也既受憂思恐怒勞役飢飽之傷而陽氣下陷遇天陰盛陽衰之時我之陽氣既衰不得不應之而伏也故夜視罔所見也問曰何以為治答曰鎮陰升陽之藥決明夜靈散主之一曰陰弱不能配陽之病夫五臟無偏勝虛陽無補法六腑有調候弱陰有強理心肝脾肺腎各有所滋生一臟或有餘四臟俱不足此五臟無偏勝也或浮或為散是曰陽無根益之欲令實翻致不能禁此虛陽無補法也膀胱大小腸三焦膽包絡俾之各有主平秘永不危此六腑有調候也衰弱不能濟遂使陽無御反而欲匹之要以方術勝此弱陰有強理也解精微論曰心者五臟之專精目者其竅也又為肝之竅腎生骨骨之精為神水故肝木不平內挾心火為勢妄行火炎不制神水受傷上為內障此五臟病也勞役過多心不行事相火代之五臟生成論曰諸脈皆屬於目相火者心包絡也主百脈上榮於目火盛則百脈沸騰上為內障此虛陽故也膀胱小腸三焦膽脈俱循於目其精氣亦皆上注而為目之精精之寞為眼四腑一衰則精氣盡敗邪火乘之上為內障此六腑病也神水黑眼皆法於陰白眼赤脈皆法於陽陰齊陽伴故能為視陰微不立陽盛即淫陰陽應象大論曰壯火食氣壯火散氣上為內障此弱陰病也其病初起時視覺微昏常見空中有黑花神水淡綠色次則視歧睹一成二神水淡白色可為沖和養胃湯益氣聰明湯千金磁朱丸石斛夜光丸主之有熱者瀉熱黃連湯主之久則不睹神水純白永為廢疾也然廢疾亦有治法先令病者以冷水洗面如冰氣血不得流行為度用左手大指次指按定眼珠不令轉動次用右手持鴨舌針去黑睛如米許針之但人白睛甚厚欲入甚難必要手准力完重針則破然後斜回針首以針刀刮之障落則明有落而復起者起則重刮刮之有至再三者皆為洗不甚冷氣血不凝故也障落之後以棉裹黑豆數粒令如杏核樣使病目垂閉覆眼皮上用軟棉纏之睛珠不動移為度如是五七日才許開視視勿勞也亦須服上藥庶幾無失此法治者五六不治者亦四五五臟之病虛陽之病六腑之病弱陰之病四者皆為陰弱不能配陽也噫學者慎之一曰心火乘金水衰反制之病夫天有六邪風暑熱濕燥火也人有七情喜怒憂思悲恐驚也七情內召六邪外從從而不休隨召見病此心火乘金水衰反制之原也世病目赤為熱人所共知者也然不知其赤分數等各治不同有白睛純赤如火熱氣炙人者乃淫熱反克之病也治如淫熱反克之病有白睛赤而腫脹外睫虛浮者乃風熱不制之病也治如風熱之病有白睛淡赤而細脈深紅縱橫錯貫者乃七情五賊勞役飢飽之病治如七情五賊勞役飢飽之病有白睛不腫不脹忽如血實者乃血為邪勝凝而不行之病也治如血為邪勝凝而不行之病有白睛微變青色黑睛稍帶白色白黑之間赤環如帶謂之抱輪紅者此心火乘金水衰反制之病也此病或因目病已久抑鬱不舒或因目病誤服寒涼藥過多或因目病時內多房勞皆能因傷元氣元氣一虛心火亢盛故火能剋金金乃手太陰肺白睛屬肺水乃足少陰腎黑睛屬腎水水剋火水衰不能克反受火制故視物不明昏如雲霧中或睛珠高低不平其色如死甚不光澤赤脈抱輪而紅也口乾舌苦眵多羞澀稍有熱者還陰救苦湯黃連羊肝丸川芎決明散主之無口乾舌苦眵多羞澀者助陽和血湯神驗錦鳩丸萬應蟬花散主之有熱無熱俱服千金磁朱丸鎮墜心火滋益腎水榮養元氣自然獲愈也眼內白睛上起赤系謂之赤脈一曰內急外弛之病夫陰陽以和為本過與不及病皆生焉急者緊縮不解也弛者寬縱不收也緊縮屬陰寬縱屬陽不解不收皆為病也手少陰肺為辛為金也主一身皮毛而目之上下睫之外者亦其屬也手少陰心為丁也手太陽小腸為丙也丙丁為火故為表裡故分上下而目之上下睫之內者亦其屬也足厥陰肝為乙乙為木其脈循上睫之內火其子也故與心合心肝小腸三經受邪則陽火內盛故上下睫之內緊縮而不解也肺金為火克受克者必衰衰則陰氣外行故目之上下睫之外者寬縱而不收也上下睫既內急外弛故睫毛皆倒而刺里睛既受刺則深赤生翳此翳者睛受損也故目所病者皆具如羞明沙澀畏風怕日沁爛或痛或癢生眵流淚之證俱見有用藥夾施於上睫之外者欲馳者急急者弛而睫毛無倒刺之患者非其治也此徒能解厄於目前而終復其病也何則為不審過與不及也為不能除其原病也治法當攀出內皮向外速以三稜針亂刺出血以左手大指甲迎其針鋒以黃耆防風飲子無比蔓荊子湯決明益陰丸菊花決明散主之嗅鼻碧靈散亦宜兼用如是則緊縮自弛寬縱漸急或過不及皆復為和藥夾之治忍勿施也徒為苦耳智者宜審此一曰奇經客邪之病夫人之有五臟者猶天地之有五嶽也六腑者猶天地之有四瀆也奇經者猶四瀆之外別有江河也奇經客邪非十二經之治也十二經之外別有治奇經之法也繆刺論曰邪客於足陽蹺之脈令人目痛從內眥始啟玄子王冰注曰以其脈起於足上行至頭而屬目內眥故病令人目痛從內眥也針經曰陰蹺脈入鼽屬目內眥合於太陽蹺而上行故陽蹺受邪者內眥即赤生脈如鏤鏤根生於瘀肉瘀肉生黃赤脂脂橫侵黑睛漸蝕神水此陽蹺為病之次第也或兼眥銳而病者以其合於太陽故也銳眥者手太陽小腸之脈也銳眥之病必輕於內眥者蓋枝蔓所傳者少而正受者必多也俗呼為攀睛即其病也還陰救苦湯撥雲退翳丸梔子勝奇散萬應蟬花散磨障靈光膏消翳復明膏樸消蘆甘石泡散主之病多藥不能及者宜治以手法先令用冷水洗如針內障眼法以左手按定勿令得動移略施小尖刀剔去脂肉復以冷水洗淨仍將前藥餌之此治奇經客邪之法也故並置其經絡病始一曰為物所傷之病夫志於固者則八風無以窺其隙本於密者則五臟何以受其邪故生之者天也召之者人也雖生弗召莫能害也生氣通天論曰風者百病之始也清靜則肉腠閉拒雖有大風苛毒弗之能害陰陽應象大論曰邪風之至疾如風雨故善治者治皮毛夫肉腠固皮毛密害安從來今為物之所傷則皮毛肉腠之間為隙必甚所傷之際豈無七情內移而為衛氣衰憊之原二者俱召風安不從故傷於目之上下左右也則目之上下左右俱病當總作除風益損湯主之傷於眉骨者病自目系而下以其手少陰有隙也加黃連除風益損湯主之傷於額者病自抵過而上傷於耳中者病自銳眥而入以其手太陽有隙也加柴胡除風益損湯主之傷於額交巔耳上角及腦者病白內眥而出以其足太陽有隙也加蒼朮除風益損湯主之傷於耳後耳角耳前者病自客主人斜下傷於頰者病自銳眥而入以其手少陽有隙也加枳殼除風益損湯主之傷於頭角耳前後及目銳眥背後者病自銳眥而入以其足少陽有隙也加龍膽草除風益損湯主之傷於額角及巔者病自目系而下以其足厥陰有隙也加五味子除風益損湯主之諸有熱者更當加黃芩兼服加減地黃丸傷甚者須從權倍加大黃瀉其敗血六節臟象論曰肝受血而能視此蓋滋血養血復血之藥也此治其本也又有為物暴震神水遂散更不復治故並識之於此一曰傷寒愈後之病夫傷寒病愈後或有目復大病者以其清陽之氣不升而餘邪上走空竅也其病隱澀赤脹生翳羞明頭腦骨痛宜作群隊升發之劑餌之數服斯愈傷寒論曰冬時嚴寒萬類深藏君子固密不傷於寒觸冒之者乃名傷寒其傷於四時之氣者皆能為病又生氣通天論曰四時之氣更傷五臟五臟六腑一病則濁陰之氣不得下清陽之氣不得上今傷寒時病雖愈濁陰清陽之氣猶未來復陰陽未復故餘邪尚熾故走上而為目之害也是以一日愈者餘邪在太陽二日而愈者餘邪在陽明三日愈者餘邪在少陽四日而愈者餘邪在太陰五日愈者餘邪在少陰六日而愈者在厥陰七日而復是皆清陽不能出上竅而復受其所害也當為助清陽出上竅則治人參補陽湯羌活勝風湯加減地黃丸主之嗅鼻碧雲散亦宜用也忌大黃芒硝苦寒通利之劑用之必不治一曰強陽搏實陰之病夫強者盛而有力也實者堅而內充也故有力者強而欲搏內充者實而自收是以陰陽無兩強亦無兩實惟強與實以偏則病內搏於身上見於虛竅也足少陰腎為水腎之精為神水手厥陰心包絡為相火火強搏水水實而自收其病神水緊小漸小而又小積漸之至竟如菜子大許又有神水外圍相類蟲蝕者然皆能睹而不昏但微覺眊矂羞澀耳是皆陽氣強盛而搏陰陰氣堅實而有餘雖受所搏終止於邊鄙皮膚也內無所傷動治法當抑陽緩陰則愈以其強耶故可抑以其實耶故可緩而弗宜助助之則反勝抑陽酒連散主之大抵強者則不入故以酒為之導引欲其氣味投合入則可展其長此反治也還陰救苦湯主之療相火藥也亦宜用嗅鼻碧雲散然病世亦間見醫者要當識之一曰亡血過多之病六節臟象論曰肝受血而能視宣明五氣篇曰久視傷血氣厥論曰膽移熱於腦則辛頞鼻淵傳為衄蔑瞑目繆刺論曰冬刺經脈血氣皆脫令人目不明由此推之目之為血所養者明矣手少陰心生血血榮於目足厥陰肝開竅於目肝亦多血故血亡目病男子衄血便血婦人產後崩漏亡血過多者皆能病焉其為病睛珠痛睛珠不能視羞明隱澀眼睫無力眉骨太陽因為痠疼當歸芎歸補血湯當歸養榮湯除風益損湯滋陰地黃丸主之諸有熱者加黃芩婦人產漏者加阿膠脾胃不佳噁心不進食者加生薑復其血使其所養則愈然要忌咸物五氣篇又曰咸走血血病無多食鹹是忌一曰斑疹親毒之病李東垣曰諸斑疹皆從寒水道流而作也子之初生也在母腹中母呼亦呼母吸亦吸呼吸者陽也而動作生焉飢食母血渴飲母血飲食者陰也而形質生焉陰具陽足十月而降口中惡血因啼即下卻歸男子生精之所女子結胎之處命宗所謂玄牝玄關者也此血僻伏而不時發或因乳食內傷或因濕熱下溜營氣不從逆於內理所僻服者乃為所發初則膀胱壬水夾脊逆流而克小腸丙火故頸項已上先見也次則腎經癸水又克心火故胸腹已上次見也終則二火熾盛反制寒水故胸腹已下後見也至此則五臟六腑皆病也七日齊七日盛七日謝三七二十一日而愈者七日為大數故也愈後或有病疽病瘡者是皆餘毒尚在不去者今其病目者亦然所害者與風熱不制之病稍同而異總以羚羊角散主之便不硬者減硝黃末滿二十一日而病作者消毒化瘢湯主之此藥功非獨能於目蓋專於瘢者之藥也不問初起已著服之便令消化稀者則不復出方隨四時加減一曰深疳為害之病夫衛氣少而寒氣乘之也元氣微而飲食傷之也外乘內傷釀而成之也父母以其純陽耶故深冬不為裳父母以其惡風耶故盛夏不解衣父母以其數飢耶故飼後強食之父母以其或渴耶故乳後更飲之有愚戇而為父母者又不審其寒暑飲食也故寒而不為暖暑而不能涼飲而不至渴食而不及飢而小兒幽之銜默抱疾而不能自言故外乘內傷因循積漸釀而成疳也渴而易飢能食而瘦腹脹下利作斯斯聲日遠而不治遂生目病其病生翳睫閉不能開眵淚如糊久而膿流竟枯爾何則為陽氣下走也為陰氣反上也治法當如陰陽應象大論曰清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽貫四肢濁陰歸六腑各還其原不反其常是其治也當作升陽降陰之劑茯苓澤瀉湯升麻龍膽草飲子主之此藥非專於目並治以上數證然勿後後則危也為父母者其審諸脈法左寸脈洪數心火炎也關弦而洪肝火盛也右寸關俱弦洪肝木挾相火之勢而來侮所不勝之金制己所勝之土也原機啟微系元敕山老人倪維德著共計一十八篇今錄於此以備參考蔭按目痛有七十二證著之問答其實重疊者多縱不若辨明虛實為的當凡目疾暴赤腫痛畏日羞明名曰外障肝經風熱之甚也實證也久痛昏花細小沉陷名曰內障腎經真水之微也虛證也實者由於風熱虛者由於血少實則散風瀉火虛則滋水養陰然散風之後必繼養血經曰目得血而能視也養陰之中更加以補氣經曰氣旺則能生血也此內治之法也至於久而失調熱壅血凝而為攀睛瘀肉翳膜赤爛之類不可遽用點藥若恐病久成痼當用天然水乘熱頻洗之熱能散風水能制火故也水中不用一味藥蓋目不染塵藥汁入目即見羞澀更忌刀針刺血割肉及點硇砒之類真為行險僥倖刺血者恐傷肉用硇砒恐潰爛不息也俗云眼不治不瞎患者戒之再凡用散藥不可太過以傷其血用補氣藥不可太過以助其火又不宜過用寒涼以傷其肝使血脈凝結反生青黃之障膜蓋涼為秋為金肝為春為木涼藥傷肝往往致廢又嘗論之氣有餘便是火而散火在於補氣血不足則陰虛而滋陰在於補血溫存肝腎調劑和平常使血能配氣水能制火而目疾未有不瘳之理學者必須辨明虛實臨證用藥斯無誤矣千金方云凡人年四十五十以後漸覺眼暗至六十以後還漸明目治之之法五十以前可服瀉肝湯五十以後不可瀉肝只可補肝而已所以人年四十以後常須瞑目靜養勿過視非有要事不宜輒開若平日讀書博奕雕鏤等過度患目者名曰肝勞若欲治之非二三年閉目不視靜養心神不能得瘳即內服瀉肝外敷點洗始終無效用者試之天然水即燒滾潔淨之開水也須以潔淨茶盞盛之用潔淨元色絹片乘熱淋洗洗後水混濁換水再洗及洗至水清無垢方止如此數次即愈水內並不用藥故曰天然水也不可用布片布片澀恐傷眼珠四十以下之人洗後閉目不視靜養心神持之歲月縱不得為明哲亦不至為二廢人矣卷一百零二五絕論所謂五絕者一自縊二摧壓三溺水四魘魅五服毒也自縊者自旦至暮雖已冷必可治自暮至旦則難治陰氣盛也然予嘗見自暮至旦而猶救活者不可輕棄也救治之法先將人抱下以被褥塞住穀道次將繩索徐徐解去不得遽然截斷然後將手按摩胸堂若有氣從口出微有呼吸即以好肉桂心二三錢煎湯灌之若已僵直令兩人以竹管吹其兩耳然後以半仙丸納鼻孔中並研末吹入耳中但心頭溫者雖一日猶可活也摧壓者或墜墮壓覆打傷心頭溫者皆可救也將本人如僧打坐令一人捉住頭髮用半仙丸納鼻孔中並以廣三七二三錢煎酒灌之青木香煎酒灌之亦佳溺水者撈起以其人橫伏牛背上如無牛以凳代之瀝去其水用半仙丸納入鼻中或用搐鼻散吹之乃以生薑自然汁灌之但鼻孔無血出者皆可救也魘魅者夢而不醒也此濁氣頑痰閉塞所致先用通天散吹鼻中隨用蘇合香丸灌之或用韭根搗汁灌之或用薑汁或用蔥白酒灌之但臥處原有燈則存如無燈切不可以燈照其面只可遠遠點燈耳一法令人痛咬其大拇指而唾其面即活服毒者砒信為重也用小薊根搗汁飲之立救或用黃礬散治之據云奇效又救自刎法若喉管未斷急以麻線縫定用金瘡藥厚敷之以布纏定旬日自愈治五絕方半仙丸半夏為末水丸如黃豆大每用一丸納鼻中男左女右搐鼻散治一切絕證不省人事用此吹鼻中有嚏者生無嚏者難治細辛去葉皂角去皮弦各一兩半夏生用五錢上為極細末瓷瓶收貯勿泄氣臨用吹二三分入鼻孔中取嚏黃礬散大黃一兩明礬五錢上為末每服三四錢冷水調下天下第一金瘡藥治刀斧損傷跌撲打碎敷上即時止痛止血更不作膿勝於他藥多矣其傷處不可見水予制此藥普送因路遠者一時難取故刻方廣傳之今並筆之於書則所傳益廣矣各鄉有力之家宜修合以濟急也雄豬油一斤四兩熬化去渣松香六兩熬化去渣黃蠟六兩熬化去渣麵粉四兩炒篩樟腦三兩研極細麝香六分冰片六分血竭一兩兒茶一兩乳香一兩箬皮上烘去油沒藥一兩箬皮上烘去油上為極細末先將豬油松香黃蠟三味熬化合為一處待將冷再入藥末攪勻瓷瓶收貯不可泄氣用時即知其神妙也又方用降真香為末敷上即愈廣三七末敷之亦效卷一百零三耳病論統旨云耳屬足少陽之經腎家之寄竅也腎通乎耳所主者精精氣調和腎氣充足則耳聞而聰若勞傷氣血風邪襲虛使精脫腎憊則耳轉而聾又有氣厥而聾者有挾風而聾者有勞損而聾者蓋十二經脈上絡於耳其陰陽諸經適有交併則臟氣逆而為厥厥搏入於耳是謂厥聾必有眩暈之證耳者宗脈之所附脈虛而風邪乘之風入於耳之脈使經氣痞而不宣是謂風聾必有頭痛之證勞役傷於氣血淫欲耗其精元瘦悴力疲昏昏憒憒音幗心亂也事不當理則憤憤矣是謂勞聾必有虛損之證有耳觸風邪與氣相搏其聲嘈嘈眼見黑花為之虛聾熱氣乘虛隨脈入耳聚熱不散膿汁出焉為之膿耳或耳有汁液風熱搏之結硬成核塞耳亦令暴聾為之聤耳有風熱上攻耳痛生瘡者以上數證風者散之熱者涼之虛者補而養之痰火者清而降之氣逆者順而通之俟其邪氣屏退然後以通耳調氣安腎之劑而痊保命集曰夫耳者以竅言之水也以聲言之金也以經言之手足少陽俱會其中也有從內不能聽者主也有從外不能入者經也有若蟬鳴者若鐘鳴者有若火熇熇呼酷切音臛火熾也氣熱之盛也狀者各隨經見之其間虛實不可不察也假令耳聾者何謂治肺肺主聲鼻塞者肺也何謂治心心主臭如推此法皆從受氣於始腎受氣於巳心受氣於亥肝受氣於申肺受氣於寅脾受氣於四季此治法皆生長之道也羅謙甫曰精脫者則耳聾夫腎為足少陰之經乃藏精而氣通於耳耳者宗脈之所聚也若精氣調和則腎臟強盛耳聞五音若勞傷氣血兼受風邪損於腎臟而精脫者則耳聾也然五臟六腑十二經脈有絡於耳者其陰陽經氣有相併時並則臟氣逆名之曰厥厥氣相搏入於耳之脈則令聾其腎病精脫耳聾者其候頰顴色黑手少陽之脈動則氣厥逆而耳聾者其候耳內氣滿也宜以燒腎散主之卒耳聾者由腎氣虛為風邪所乘搏於經絡隨其血脈上入耳正氣與邪氣相搏故令卒聾也耳者宗脈之所聚腎氣之所通足少陰之經也若勞傷氣血熱氣乘虛入於其經邪隨血氣至耳熱氣聚則生膿汁故謂之聤耳也戴氏曰耳病多屬於腎腎虛故耳中或如潮聲蟬聲或暴聾無聞當用益腎地黃丸丹溪曰耳聾屬熱少陽厥陰熱多當用開痰散風熱通聖散滾痰丸之類大病後耳聾與陰虛火動而聾者宜補陰降火四物湯加黃柏主之因鬱而聾者通聖散納大黃酒煨再用酒炒三次後入諸藥通用酒炒耳聾須用四物龍薈養陰氣滯耳聾用復元通氣散濕痰者神芎丸檳榔丸耳鳴宜當歸龍薈丸多飲酒人宜木香檳榔丸耳鳴因酒過者用大劑通聖散加枳殼柴胡大黃甘草南星桔梗青皮荊芥不愈四物湯凡耳鳴耳聾皆是陰虛火動或補腎丸或虎潛丸或滋陰大補丸皆好耳濕腫痛涼膈散加酒炒大黃黃芩酒浸防風荊芥羌活耳內鬨鬨然亦是陰虛東垣曰臟氣法時論云肺虛則少氣不能報息耳聾嗌乾注云肺之絡會於耳中故聾此說非也蓋氣虛必寒盛則氣血俱澀滯而不行也耳者宗氣也肺氣不行故聾也王節齋曰耳鳴證或鳴甚如蟬或左或右或時閉塞世人多作腎虛治不效殊不知此是痰火上升鬱於耳中而為鳴郁甚則壅閉矣遇此疾但審其平昔飲酒厚味上焦素有痰火只作清痰降火治之大抵此證多因先有痰火在上又感惱怒而得怒氣上少陽之火客於耳也若是腎虛而鳴者亦是膀胱相火上升故也其鳴不甚其人必多欲當見勞怯之證多有之蔭按丹溪云耳聾皆屬於熱誠哉斯言然有左耳聾者有右耳聾者有左右耳俱聾者不可不分經而治也夫左耳聾者少陽火也龍薈丸主之右耳聾者太陽火也六味地黃丸主之左右耳俱聾者陽明火也通聖散滾痰丸主之何以言之有所忿怒過度則動少陽膽火從左起故使左耳聾也有時色欲過度則動太陽膀胱相火從右起故使右耳聾也有時醇酒厚味過度則動陽明胃火從中起故使左右耳俱聾也蓋左耳聾者婦人多有之以其多忿怒故也右耳聾者男子多有之以其多色欲故也左右耳俱聾者膏粱之家多有之以其多肥甘故也總三者而論之忿怒致耳聾者多丹溪曰厥陰少陽火多當用開痰散風熱其此之謂乎李氏曰耳聾以新舊分虛熱新聾多熱少陽陽明火多故也宜滋補兼通竅之劑脈證以腎為主遲濡為虛浮動為火浮大為風沉澀為氣數實為熱厚味動胃火則左右俱聾忿怒動膽火則左耳聾色欲動相火則右耳聾三者忿怒為多痰火因膏粱胃熱上升兩耳蟬鳴熱鬱甚則氣閉漸聾眼中流火宜二陳湯加黃柏木通萹蓄瞿麥因酒者通聖散加南星枳殼大黃或滾痰丸風聾因風邪入耳必內作癢或兼頭痛風熱或因郁者防風通聖散先將大黃酒煨又酒炒三遍後入諸藥俱用酒炒煎服風壅連頭目不清者清神散風虛者排風湯桂香散芎芷散濕聾因雨水浸漬必內腫痛涼膈散加羌活防風俱用酒炒或五苓散加陳皮枳殼紫蘇生薑濕痰神芎丸濕熱挾氣木香檳榔丸氣聾因臟氣厥逆上壅入耳痞塞不通必兼眩暈實人因怒者當歸龍薈丸虛人因思者妙香散憂滯者流氣飲子加菖蒲上盛下虛者秘傳降氣湯加菖蒲虛聾因久瀉或大病後風邪乘虛入耳與氣相搏嘈嘈而鳴或時眼見黑花陰虛者四物湯加知母黃柏菖蒲遠志或腎氣丸加磁石破故紙菟絲子黃柏陽虛者八味丸益腎散磁石湯勞聾昏昏憒憒瘦瘁乏力因勞力脫氣者補中益氣湯加菖蒲有火者加知母黃柏茯苓因房勞脫精者人參養榮湯加知柏或補骨脂丸如久聾腎虛氣虛絕不聞者難治耳鳴乃聾之漸惟氣閉多不鳴便聾風熱鳴者解毒湯加生地黃知母或通聖散痰火鳴甚當歸龍薈丸挾濕神芎丸或青木香丸腎虛微鳴滋腎丸氣虛四君子湯下血虛四物湯下陰虛虎潛丸聤耳原有汁液風熱搏擊結核鳴欲聾者外用生豬脂地龍鍋煤等分薑汁和丸棗核大綿裹入耳令潤挑去重者內服柴胡聰耳湯膿耳風熱上壅流膿外用枯礬五分陳皮胭脂俱燒灰各二分麝五釐為末吹耳重者內服犀牛角飲子耳痛如蟲走者風盛干痛者風熱或屬虛火有血水者風濕外用蛇退燒存性為末吹入或枯礬末亦可疼甚用吳茱萸烏頭尖大黃搗爛貼足掌心重者內服東垣鼠黏子湯腎虛水竅耳而能聞聲者水生於金也肺主氣一身之氣貫於耳故能聽聲凡治諸聾必先調氣開鬱間用磁石羊腎丸開竅蓋聾皆痰火鬱結非磁石鎮墜烏桂椒辛菖蒲辛散流通則老痰鬱火何由而開然亦劫劑也愈後以通聖散和之可也暴聾用甘遂為丸塞耳內服單甘草湯稍久用松香五錢溶化入巴豆二十粒蔥汁搗丸綿裹塞耳右聾塞右左聾塞左雙聾次第塞之凍耳用橄欖核燒灰油調搽如爛貝母末干撒百蟲入耳用清油灌入口吸氣久自出如蚰蜒入耳用信花雄黃各一錢為末先用一字點耳中次用貓尿灌之取貓尿以生薑擦牙自出又方用琴絃一段將弦頭略軟二分蘸黐膠入耳黏出凡臥不宜厚被覆塞耳氣久則不通故養生掌摩耳廓以防聾也脈法兩寸脈浮洪上魚為溢兩尺脈短而微或大而數皆屬陰虛法當補陰抑陽左寸洪數心火上炎兩尺脈洪者或數者相火上炎其人必遺精夢與鬼交兩耳蟬鳴或聾治風熱耳聾方犀角散治風毒熱壅心胸痰滯兩耳虛聾頭目重眩神效犀角甘菊花前胡枳殼麩炒去穰菖蒲澤瀉羌活生地黃木通各五錢麥門冬去心一兩甘草炙二錢半上為散每服三錢水煎食後溫服犀角飲子治風熱上壅兩耳聾閉內外腫痛膿水流出犀角鎊菖蒲木通元參赤芍藥赤小豆炒甘菊花各二錢甘草炙一錢上㕮咀加生薑五片水煎溫服如左甚加荊芥子生地黃右甚加桑白皮麥門冬清神散治風氣壅上頭目不清耳常重聽白殭蠶炒去絲甘菊花各半兩羌活荊芥穗木通川芎各四兩木香一作香附防風各三錢石菖蒲四錢甘草二錢上為末每服三錢食後臨臥茶清調下荊芥散治風熱上壅耳閉或耳鳴及出膿汁防風荊芥甘菊花蔓荊子黃芩酒炒升麻木通羌活甘草各等分上銼水煎服茯神散治上焦風熱耳忽聾鳴四肢滿急昏悶不利茯神一兩羌活蔓荊子柴胡薏苡仁防風菖蒲五味子黃耆各半兩麥門冬去心一兩薄荷三錢甘草炙二錢上為末每服三錢入生薑三片水煎食後服桂星散治風虛耳聾辣桂川芎當歸細辛菖蒲木香木通白蒺藜麻黃甘草各一錢南星煨制白芷各一錢半上銼加蔥白二根紫蘇五葉生薑三片水煎服一方加全蠍去毒一錢地黃湯治因瘡毒後腎經熱右耳聽事不真每心中拂意則轉覺重虛鳴疼痛生地黃酒洗一兩半枳殼羌活桑白皮各一兩磁石搗碎水淘二三十次去盡赤汁為度二兩甘草防風黃芩木通各半兩上為粗末每服四錢水煎日二三服不拘時千金腎熱湯治腎熱耳中膿血不聞人聲磁石煅紅淬七次白朮牡蠣各五兩麥門冬芍藥各四兩甘草一兩生地黃汁蔥白各一升大棗十五枚上銼水煎服姜蠍散治耳聾因風虛所致十年內一服即愈乾蠍四十九個去蠆洗焙去風熱生薑切片如蠍大四十九片開痰上二味銀石器內炒至干為細末向晚勿食夜臥酒調作一服至二更以來徐徐儘量飲五更中間百十攢笙響便自此有聞一法五更濃煎蔥白一盞服先三日服黑錫丹效又法蠍先用糯米半升同炒又用姜四十九片放蠍上同炒去米姜不用一方酒三升碎牡荊子二升浸七日去渣任性服盡雖三十年久聾亦愈加減當歸龍薈丸聰耳瀉火當歸酒洗龍膽草酒洗梔子仁炒黃芩青皮各一兩大黃酒蒸蘆薈柴胡各五錢木香二錢半牛膽南星三錢麝香五分上為細末神麯煮糊為丸如綠豆大每服二十丸薑湯下日進三服一七後用針砂酒以通其氣方用針砂一兩穿山甲一錢拌針砂養一晝夜去山甲將針砂用酒一碗浸三四日噙酒口內外用磁石一塊綿裹塞耳中即通戒暴怒色欲明目清耳通聖丸防風二兩荊芥蔓荊子黃芩酒洗黃連酒洗各八錢川芎六錢生地黃酒洗四錢升麻藁本羌活生甘草炒甘草各二錢柴胡一錢四分上為末滴水為丸如桐子大每服一百丸臨臥茶湯下治痰火耳聾方復聰湯治痰火上攻耳聾耳鳴半夏陳皮去白白茯苓甘草炙萹蓄木通瞿麥黃柏炒褐色各一錢上銼加生薑三片水煎空心臨臥各一服通明利氣湯治虛火上升痰氣鬱於耳中或閉或鳴痰火熾盛或憂鬱痞悶咽膈不利煩躁不安橘紅二錢半鹽水浸貝母去心三錢元參酒洗川黃柏酒炒梔子仁炒紫色各二錢生地黃薑汁浸蒼朮米泔浸鹽水炒檳榔白朮瓦焙各一錢半香附米童便浸炒黃芩酒浸豬膽拌炒黃連同黃芩制各一錢半撫芎八分木香五分粉草炙四分上銼作二帖加生薑三片水煎入竹瀝半杯食遠溫服檳榔神芎丸耳聾有濕痰者以此下之大黃黃芩各二兩牽牛滑石各四兩檳榔三兩上為末滴水丸如桐子大每服十丸每次加十丸白湯下治氣閉耳聾方通氣散治氣閉耳聾木通木香枳殼麩炒菖蒲各五錢川芎元胡索陳皮川山甲炮各三錢白芷羌活殭蠶炒全蠍蟬退各二錢甘草一錢五分上為末每服二錢酒調服順氣聰耳湯枳殼麩炒柴胡各二錢烏藥木通青皮醋炒川烏石菖蒲各一錢甘草五分上銼水煎服清聰化痰丸治耳聾耳鳴壅閉不聞聲音乃飲食厚味挾怒氣以動肝胃之火宜用此清竅橘皮鹽水洗去白赤茯苓蔓荊子各一兩枯黃芩酒炒八錢黃連酒炒白芍藥酒浸煨生地黃酒洗柴胡半夏薑汁炒各七錢人參六錢青皮醋炒五錢生甘草四錢上為細末蔥湯浸蒸餅丸如綠豆大每服百丸晚用薑湯茶任下治氣虛耳聾方益氣聰耳湯治飢飽勞役脾胃不足得耳聾之患柴胡升麻蔓荊子葛根各一錢人參黃耆甘草各二錢黃柏鹽酒炒芍藥各五分上銼水煎食遠服蠟彈丸治耳虛聾白茯苓二兩山藥炒三兩杏仁炒一兩去皮尖上研為末用黃蠟一兩熔和為丸如彈子大鹽湯嚼有人止以黃蠟細嚼點好建茶送下亦效山藥茯苓杏仁皆入於太陽山藥大補陰氣惟杏仁利氣乃補中有通也少氣嗌乾者麥門冬人參五味子湯嚼下治腎虛耳聾方滋腎通耳湯治腎虛耳聾而鳴當歸川芎白芍藥生地黃酒炒知母酒炒黃柏酒炒黃芩酒炒柴胡白芷香附各一錢上銼一劑水煎溫服胸膈不快加枳殼青皮各少許滋陰地黃湯治色欲動相火致右耳聾熟地黃一錢六分砂仁炒山藥山茱萸去核當歸酒洗川芎白芍藥各八分牡丹皮澤瀉白茯苓黃柏酒炒知母酒炒石菖蒲遠志各六分上銼一劑空心水煎服或為末煉蜜丸如桐子大每服百丸空心鹽湯下酒亦可亦治大病後耳聾磁石湯治腎虛耳聾面黑飢不欲食腰脅背痛磁石五味子杜仲白朮白石英各二錢黃耆茯苓各一錢上銼水煎服益腎散治腎虛耳聾磁石巴戟沉香菖蒲川椒各一兩上為末每服二錢用豬腎一枚細切和以蔥鹽並藥用濕紙十重包裹煨令熟空心細嚼酒下燒腎散治耳聾磁石一兩炒醋淬七次附子去皮臍一兩炮巴戟一兩川椒一兩去目及閉口者微炒去汗上為末每用豬腎一枚去筋膜細切蔥白韭各一錢入末藥一錢鹽花一字用濕紙包於煻灰火內煨熟空心細嚼酒解薄粥下之十日效衍義云磁石益腎氣腎虛而聾者用之地黃丸一名補骨脂丸治勞損耳聾熟地黃當歸川芎辣桂菟絲子川椒炒破故紙炒白蒺藜炒杜仲炒胡蘆巴炒白芷石菖蒲各二錢半磁石火燒醋淬七次水飛一錢二分半上為末煉蜜丸如桐子大每服五十丸蔥