body:
  text: 卷一百面病附痄腮論難經曰人面獨耐寒者何也蓋人頭者諸陽之會也諸陰脈皆至頸胸中而還獨諸陽脈皆上至頭故令面耐寒也又曰肝外證面青善潔善怒心外證面赤口乾善笑脾外證面黃善噫善思善味肺外證面白善嚏悲愁不樂欲哭腎外證面黑善恐欠東垣曰咽痛頜腫脈洪大面赤者羌活勝濕湯加黃芩桔梗甘草各半錢治之如耳鳴目黃頰頜腫頸肩臑肘臂外後廉痛面赤脈洪大者以羌活防風甘草藁本通其經血加黃連黃芩消其腫以人參黃耆益其元氣而瀉其火邪面赤為邪氣怫鬱在經宜表不宜下飲食不節則胃病胃病則氣短精神少而生大熱者有時而火上行獨燎其面針經曰面熱者足陽明病巴戟丸治肺病面白不悅則為脫氣脫血脫津脫液脫精脫神脈緊者寒也或面白善嚏或面色惡皆寒也以羌活防風甘草藁本四味瀉足太陽少加附子以通其脈面色惡悲恐者更加桂附麵皮里痛者用何首烏為末薑汁調敷以帛蓋定炙熱鞋底熨之或曰痄腮因風熱犯胃須分表裡如外因風熱腫痛在表寒熱者升麻胃風湯在裡二便不利者四順清涼飲如表裡俱解腫痛又不消欲作膿也托裡消毒散治同大頭腫膏粱厚味胃經積熱腮腫作痛或發寒熱者用升麻黃連連翹牛蒡子白芷等分水煎服連耳上太陽部分腫屬風熱加羌活防風連耳下少陽部分腫屬怒火加柴胡山梔牡丹皮連耳後少陰部分腫屬相火加知母黃柏頭面齒牙俱腫內熱口乾者犀角升麻湯齒牙唇口俱腫出血者清胃散加石膏內傷生冷涼藥不能消積食少體倦者補中益氣湯內傷氣血俱虛八物湯加麥門冬五味子傷七情有寒熱者八味逍遙散傷色欲連頤及耳後腫者腎氣丸八味丸十全大補湯不可誤用風藥克伐之劑羅謙甫曰楊郎中之內五十一歲身體肥盛己酉春患頭目昏悶面赤熱多服清上藥不效請予治之診其脈洪大而有力內經云面熱者足陽明病脈經云陽明經氣盛有餘則身以前皆熱況其人素膏粱積熱於胃陽明經多血多氣木實則風熱上行諸陽皆會於頭目故面熱之病生矣先以調胃承氣湯七錢加黃連三錢犀角一錢薄荷三錢行徹其本熱次以升麻加黃連湯去經絡中風熱上行如此則標本之邪俱退矣治面腫面痛方升麻胃風湯治虛風證能食麻木牙關急搐目內蠕瞤胃中有風熱故面獨腫升麻二錢白芷當歸葛根蒼朮各一錢甘草一錢半柴胡藁本羌活黃柏草豆蔻各三分麻黃不去節五分蔓荊子二分上銼加棗煎服一方有白殭蠶三分升麻連翹湯治面腫搭腮因膏粱積熱者升麻黃連連翹牛蒡子白芷各等分上銼水煎服連耳上加羌活耳下加柴胡加味羌活勝濕湯治咽痛頰腫脈洪大面赤者羌活獨活各一錢防風藁本蔓荊子川芎黃芩桔梗甘草各五分上銼水煎食後服丹溪方治膈壅表熱兩腮熱腫乾葛桔梗蘇葉各一錢半升麻薄荷各一錢甘草炙七分上銼加生薑一片水煎服補胃湯治胃虛脛寒不得臥腹痛虛鳴時寒時熱唇乾面目浮腫少氣口苦身體無澤柏子仁去油防風細辛桂心陳皮各一錢川芎吳茱萸人參各一錢甘草五分上銼水煎服乾薑散治胃虛脛寒面浮身枯諸骨節皆痛乾薑二兩人參甘草細辛各一兩半麥門冬桂心當歸各一兩七錢半遠志一兩吳茱萸五錢蜀胡椒七錢半上為細末每服二錢溫酒調服治面熱面寒方升麻黃連湯治面熱升麻葛根各一錢半白藍一錢白芍藥煨七分黃連八分川芎薄荷生犀角甘草各五分荊芥穗四分黃芩三分上銼作一劑水煎食後服忌酒濕面五辛之物升麻附子湯治面寒升麻葛根各一錢白芷黃芩各一錢人參甘草炙草豆蔻各八分益智仁附子童便煮炮各五分上銼一劑加連須蔥白二根水煎食遠溫服治面見五色方升麻順氣湯治憂思飲食失節面色黧黑心懸如飢不飲食氣短而促此陽明經不足也升麻一錢半葛根防風白芷黃芩人參各一錢白芍藥六分蒼朮甘草各五分上銼一劑加棗姜水煎服宜早飯後午前取天氣上升使陽達於面也巴戟丸治肺病面白不悅則為脫氣脫血脫津脫液脫精神川巴戟去心五味子肉蓯蓉酒洗菟絲子炒人參白朮熟地砂仁炒骨碎補去毛茴香牡蠣白龍骨覆盆子益智仁各等分上為末煉蜜丸如桐子大每服三十丸空心食前米飲下日二三服東垣方治面白善嚏或面色惡及脈緊者皆寒也羌活防風甘草藁本附子上銼水煎服面色惡悲恐者更加桂附治面生瘡癤方清上防風湯清上焦火治頭面生瘡癤風熱毒防風一錢連翹白芷桔梗各八分黃芩酒炒川芎各七分荊芥梔子黃連薄荷枳殼甘草各五分上銼一劑水煎食後服入竹瀝尤妙連翹散治面生谷嘴瘡俗名粉刺連翹川芎白芷黃連苦參荊芥桑白皮山梔子炒貝母甘草各等分上銼水煎臨臥服麥門冬膏治面上肺風瘡麥門冬去心一斤橘皮去白四兩上用水煎汁熬成膏入蜜二兩再熬成入水中一夜去火毒每服五匙滾水化開夜用後春容散擦之春容散白附子六錢硫黃五錢枯礬黑鉛炒枯各二錢黃丹飛過輕粉各一錢密陀僧二錢麝香二分上為末先將冷水擦紅處洗後以藥未擦之不可擦破忌酒色惱怒硫黃膏治面部生瘡或鼻赤面生粉刺妙不可言生硫黃香白芷瓜蔞根各半錢膩粉一錢芫青七個去翅足全蠍一個蟬蛻五個上為末用黃蠟麻油和熔入前藥在內臨臥時洗面淨以少許塗之數日間瘡腫自平赤亦自消如風刺粉刺一夕見效仍塗藥勿近眼白附子散治男婦熱瘡似癬或黑瘢點白附子密陀僧白茯苓白芷官粉各等分上為末先用蘿蔔煎湯洗面後用羊乳調成膏敷患處早晨洗去一方治面上粉刺枯礬一兩生硫黃白附子各二錢上共為末唾津調擦臨臥上藥次早洗去一方治面上酒齇鼻紅紫腫硫黃枯礬半夏白鹽炒各二錢上為末水調敷患處立消一方治面上瘡鼻酒刺雄黃鉛粉各一錢硫黃五分上為細末乳汁調塗患處晚上敷次早溫水洗去如此三上即已一方治酒齇鼻輕粉硫黃上共為末粗紙蘸擦之一方治肺毒面鼻赤皰密陀僧不拘多少為末臨臥乳汁調敷面上次日洗去不過三五次而已一方治赤紅爛臉用水銀一錢桕油蠟一兩共搗塗之一方治臉上熱瘡涎出用蒲黃敷上瘥一方治面瘡水調平胃散塗之一方治鼻瘡用杏仁去皮尖為末以乳汁和之擦患處一方治抓破面皮用生薑自然汁調輕粉擦患處更無痕跡治面生䵟斑方瑩肌如玉散治面生䵟點或生小瘡或生疿痤粉刺之類並皮膚瘙癢常用洗面去垢潤肌皂角三斤去皮升麻八兩楮實子五兩綠豆擦淨另搗白及白芷天花粉各一兩甘松砂仁連皮白丁香臘月收各五錢山柰三錢上為末和勻量用洗面不惟馨香亦且去垢一方加藿香五錢樟腦一錢為末煉蜜丸如彈子大清晨洗面最奇一方用糯米飯搗丸玉容散治面上黑䵟雀瘢甘松山柰茅香各五錢白芷白及白斂白殭蠶白附子天花粉各一兩零陵香防風藁本各三錢綠豆粉一兩肥皂二個上為細末每早洗面用之紅玉散治面上一切酒刺風刺黑黶瘢子白芷藿香牙皂去皮子各三錢甘松山柰木賊白丁香各一錢另研天花粉白茯苓各一錢半細辛杏仁去皮另研密陀僧各一錢樟腦五分白及少許上為末臨臥用津唾調或乳汁調敷面上明早溫水洗去其面如玉秘方治面上雀瘢櫻桃枝紫背浮萍白梅肉豬牙皂角焙乾等分上為細末每洗面時用以擦洗七八日其瘢自落神效洗面藥方治面有䵟點或生瘡及粉刺之類並去皮膚瘙癢垢膩潤澤肌膚皂角三斤去皮弦子另搗糯米一升三合綠豆八合揀淨另搗上為末用雞子清調和丸如龍眼大窨干旋用溫漿水磨開敷之皇帝塗容金面方硃砂二錢干胭脂二錢官粉三錢烏梅五個去核川芎少許潮腦五錢上為細末臨睡時津唾調擦面上天明溫水盆洗面二三七日面如童顏乃神仙妙用之法香肥皂丸肥皂角面一斤牙皂末排草藿香各三兩零陵香甘草檀香各二兩白芷丁香木香白丁香防風藁本白斂白及梅桂花綠豆川芎山柰各一兩上為末以砂糖為丸用八白散治勞汗當風寒薄為齇郁乃痤及䵟點之類白丁香白及白殭蠶白牽牛上蒺藜新升麻內白者佳各三兩山柰白蘞白芷各二兩白附子白茯苓各半兩上為末至夜津調塗面明旦以瑩肌如玉散洗之洗面香皂丸白丁香白蘞白及楮實各一兩甘松藁本香附茯苓細辛山柰茅香川芎明膠白芷韶腦各五錢牽牛炒瓜蔞根各三錢肥皂不蛀者一斤半煮去皮子綠豆一升略炒香上為細末以肥皂肉搗膏同綠豆粉和如干再加皂角汁搗二千下丸如彈子大曬乾每日用洗面不可經水肥皂丸去白瘢墨點白癬諸般瘡痕令人面色好白芷白附子白及牙皂白蒺藜白蘞草烏山柰甘松白丁香杏仁豆粉各一兩輕粉密陀僧各半兩孩兒茶二錢肥皂角去皮筋子只要淨肉一茶鍾搗爛樟腦半兩上為末先將肥皂肉搗同雞清和曬去氣息然後和丸一方丁香白芷各一錢麝香一分上為細末用燒酒調入磁器內熬成膏每日用少許洗面令人顏面如玉滋潤手面方冬月用之杏仁天花粉豬胰一具紅棗二枚去皮核上用好酒二盞浸於瓷器內早晚量用潤手面自然皮膚無膩一方治面上雀子瘢萆麻子密陀僧硫黃各二錢上用羊髓和勻臨睡敷上次早洗去一方點疔塗瘤去痣人言雄黃各一錢巴豆一個蟾酥一分上為細末將瘡口用針撥開以藥點上如點瘰癘去蟾酥用輕粉去面上黶子方用石灰水調一盞如稠粥以好糯米全者拌灰中經一宿看米色如水晶爛者以針微刺黶破將米少許塗上經一日剔去不得著水一二日愈又方石灰石鹼各等分上為細末以熱燒酒調塗之或加輕粉尤妙治痄腮方驅風解毒散治痄腮腫痛防風羌活荊芥連翹牛蒡子甘草各等分上銼水煎食後服一方治膏粱厚味胃經積熱腮腫作痛或發寒熱升麻黃連連翹牛蒡子白芷各等分上銼每服五七錢水煎食後服腫連耳上加羌活防風連耳下加柴胡山梔子牡丹皮連耳後加知母黃柏四順清涼飲治積熱壅滯咽腮腫痛二便不利當歸赤芍藥大黃甘草炙各等分上㕮咀每服四錢水煎食後服一方治痄腮竹葉車前草柏子仁上杵碎熱敷患處一方治兩腮腫細辛草烏各等分上為末入蛤粉以豬脂調敷腫處口含白梅置腮邊良久腫退出涎患消矣消時腫必先向下一方治腮腫用赤小豆為末蘸醋調敷之立效一方用雞子清調敷一方石灰不拘多少炒七次地下窨七次醋調敷腫處立消一方治痄腮及喉下諸般腫蝸牛同飛面研勻貼腫處治頰車病方一方凡伸欠頰車磋但開不能合以酒飲之令大醉睡中吹皂角末搐其鼻嚏透即自正牛黃清心丸平江陳氏因驚懼後常用手指中捏拄兩頰遂兩頰破損心中懊憹不安脈數而實諸藥不愈用活幼口議牛黃清心涼膈丸數服即安方見二十五卷火熱門熏面法詳卷一百零二目病門後卷一百零一上目病上論袖珍論曰人之有兩眼猶天地之有兩曜視萬物察細毫何所不至日月有一時之晦者風雷雲雨之所致也眼之失明者四氣七情之為害也大抵眼目為五臟之精華一身之至要故五臟分五輪八卦分八廓五輪者肝屬目曰風輪在眼為烏睛心屬火曰血輪在目為二眥脾屬土曰肉輪在眼為上下胞肺屬金曰氣輪在眼為白睛腎屬水曰水輪在眼為瞳子至若八廓無位有名膽之腑為天廓膀胱之腑為地廓命門之腑為水廓小腸之腑為火廓腎之腑為風廓脾胃之腑為雷廓太陽之腑為山廓三焦之腑為澤廓此雖為眼目之根本而又藉血為之包絡五臟或蘊積風熱或七情之氣鬱結不散上攻眼目各隨五臟所屬而見或腫赤而痛羞澀多淚或生障膜昏暗失明其證七十有二治之須究其所因風則驅散之熱則清涼之氣結則調順之切不可輕用針刀點割偶得其愈出乎僥倖倘或不然為終身之害又且不可過用寒涼之劑或冰其血脈凝而不流亦成痼疾當量人老少氣體虛實用藥又有腎虛者亦能令人眼目無光或生冷翳止當補暖下元以益腎水雖然北方之人患眼最多皆是日冒風沙夜臥熱炕二氣交蒸使然治之多用涼藥北方稟受與南方不同故也八廓意義無據龍木論曰夫眼者乃天地之日月也天地清淨日月光明天地昏暝日月薄蝕經云眼應於肝旺在春三月作魂神寶眼為戶牖所通萬物無不睹之好惡是非自然分別自少及長疾病多般背時調養有乖致使眼目生患凡人多食熱物或食五辛喜怒不時淫欲不節沖寒冒暑坐濕當風恣意喧呼狂情啼叫長夜不寐天日無閒極目視高凝神遠望或久處煙火或博戲經時拈掇多年雕鏤畫繡燈下細書月中讀書皆能耗散精神大能損目更有馳騁田獵冒涉雪霜向日迎風晝夜不息皆是損目之因恣一時之快意為目病之根源所以疾生眼目凡有損性之事必須慎之終身保惜自然無憂永無眼目之患也陳無擇曰病者喜怒不節憂思兼併致臟氣不平鬱而生涎隨氣上厥逢腦之虛浸淫眼系蔭注於目輕則昏澀重則障翳眵淚胬肉白膜遮睛皆內所因或數冒風寒不避暑濕邪中於項乘虛循系以入於腦故生外翳醫論中所謂青風綠風紫風黑風赤風白風白翳黃翳等隨八風所致變生諸證皆外所因或嗜欲不節飲食無時生食五辛熱啖炙煿馳騁田獵冒涉煙霧勞動外睛乃喪明之本所謂恣一時之遊佚為百歲之痼愆皆不內外因治之有方東垣曰按陰陽應象論云諸脈者皆屬於目又曰目得血而能視五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束裹擷筋骨血氣之精而與脈併為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則即隨眼系入於腦則腦轉則引目系急目系急則目眩以轉矣邪中其精其精所中不相比也則精散精散則視歧故見兩物目者五臟六腑之精榮衛魂魄之所常營也神氣之所主也故神勞則魂魄散志意亂是故瞳子黑眼發於陰白眼赤脈法於陽故陰陽合傳而為精明也目者心之使也心者神之舍也故神氣亂而不轉卒然見非常之處精神魂魄散不相得故曰惑也經云十二經脈三百五十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為精其彆氣走於耳而為聽又云心事煩冗飲食失節勞役過度故脾胃虛弱心火太甚則百脈沸騰血脈逆行邪害孔竅天明則星月不明也夫五臟六腑之精氣皆稟受於脾上實於目脾者諸陰之首也目者血氣之宗也故脾虛則五臟之精氣皆失所司不能歸明於目矣心者君火也主神宜靜而安相火代行其令相火者包絡也主百脈皆榮於目既勞役運動熱乃妄行及因邪氣所並而損血脈故諸病生焉凡醫者不理脾胃及養血安神治標不治本是不明正理也又內障瞳子散大論曰凡心包絡之脈出於心中以代心君之行事也與少陽為表裡瞳子散大者少陰心之脈挾目系厥陰肝主木此木火之勢盛也其味則宜苦宜酸宜涼大忌辛辣熱物是瀉木火之邪也飲食中常知此理可也諸辛主散熱則助火故不可食諸酸主收心氣瀉木火也諸苦瀉火熱則益水也尤忌食冷水大寒之物此則能損胃氣不行則元氣不生胃氣下流胸中三焦之火及心火乘於肺上入腦灼髓火主散益瞳子開大大熱之物又助火邪此蓋不可食驗也藥中雲茺蔚子一味辛及主益精益精者助火也故去之乃知黃芩黃連瀉中焦之火芩能瀉上焦肺中之火以酒洗之乃寒因熱用也又去青葙子為助陽火也加五味子以收瞳人開大且火之與氣勢不兩立故內經曰壯火食氣氣食少火少火生氣壯火散氣諸酸之物能助元氣孫真人云五月常服五味助五臟氣以補西方肺金法云以酸補之以辛瀉之辛瀉氣則明矣或曰藥中有當歸其味亦辛而甘其不去者何止辛甘一味以其和血之聖藥況有甘味又欲以為嚮導為諸藥之使耳劉河間曰在腑則為表當除風散熱在臟則為里當熱氣安神如暴失明昏澀翳膜眵淚斑入眼皆表也風熱也宜表散以去之如昏弱不欲視物內障見黑花瞳散皆里也血少神勞腎虛也宜養血補水安神以調之除風散熱者瀉青丸主之養血安神者定志丸主之婦人熟地黃丸主之或有體肥氣盛風熱上行目昏澀槐子散主之此由胸中濁氣上行也重則為痰厥亦能損目常使胸中氣清自無此病也又有因目疾服涼藥多則損氣者久之目漸昏弱乍明乍暗不能視物此則失血之驗也熟乾地黃丸消氣定志丸相須而養之或有視物不明見黑花者此之謂氣弱也宜補腎水駐景丸是也或有暴失明者謂眼諸陽交之會也而陰反閉之此風邪內滿當有不測之病也又曰目眯不明熱也然玄府者無物不有人之臟腑皮毛肌肉筋膜骨髓牙爪至於世之萬物盡皆有之乃氣出於升降之道路門戶也人之眼耳鼻口身意神識能為用者皆升降出入之通利也有所閉塞者不能為用也若目無所見耳無所聞鼻不聞臭舌不知味筋痿骨痹爪強齒腐毛髮墜落皮膚不仁腸胃不能滲泄者悉由熱氣怫鬱玄府閉密而致氣液血脈榮衛精神不能升降出入故也各隨鬱結微甚而為病之輕重故知熱鬱於目則無所見也故目微昏者至近則轉難辨物由目之玄府閉小如隔簾視物之象也或視如蠅翼者三腑有所閉合者也或目昏而見黑花者由熱氣甚而發之於目亢則害承乃制而反出其泣氣液眯之以其至近故雖微而亦見如黑花也樓氏曰誠哉河間斯言也目盲耳聾鼻不聞臭舌不知味手足不能動用者皆由玄府閉塞而神氣出入升降之道路不能利故先賢治目昏花如羊肝丸用羊肝引黃連等藥入肝解肝中請郁蓋肝主目肝中郁解則目之玄府通利而明矣故黃連之類解鬱熱也椒目之類解濕熱也茺蔚之類解氣鬱也芎歸之類解血鬱也木賊之類解積鬱也羌活之類解經郁也磁石之類解頭目郁墜邪氣使下降也蔓菁下氣通中理亦同也凡此諸劑皆治氣血鬱結目昏之法而河間之言信不誣矣至於東垣丹溪治目昏用參耆補血氣亦能明者又必有說通之蓋目主氣血盛則玄府得利出入升降而明虛則玄府無以出入升而昏此則必用參耆四物湯等劑助氣血運行而明也集略論曰內經云諸脈皆屬於目目得血而能視夫目之五輪乃五臟六腑之精華宗脈之所聚其白仁屬肺金肉輪屬脾土赤脈屬心火黑水神光屬腎水兼屬肝木不知目不因火則不病白輪變赤火乘肺也肉輪赤腫火乘脾也黑水神光被翳水乘肝與腎也赤脈貫目火自甚也故目昏赤腫翳膜皆屬於熱經言熱甚目瞑眼黑也能治火者一句可了然亦有痰熱濕熱與夫服食金石燥熱之藥致者或久病後榮衛虛弱肝氣腎陰不足或元氣精氣虛衰及脫營為病皆有虛熱實熱之殊並宜分治風熱內障脈浮弦數赤腫而痛者為實熱當利以清涼風濕者脈浮弦澀腫癢多膠目屬虛寒宜養血溫涼氣熱上壅脈弦而沉癢而澀痛當順氣溫涼痰火上升脈弦而滑當降火清涼陰虛火動虛陽上攻眼不耐視宜滋陰補血又當隨時令而治大抵眼疾肝熱則昏暗心熱則燥痛風濕血少則澀癢腎虛則不耐視清心涼血抑肝補肺滋其腎水此治法也龍木論曰醫眼之法最為多端如患眼不明非止一狀肝腎虛而近視不快脾虛而見白花氣虛而瞻視茫茫血虛則飛蠅散亂血冷則瞳人開張腎虛則瞳仁縮小或不明者氣不和也黑花散亂者乃精血虛也更迎風淚不止者或昏是思慮傷也膀胱損也最宜用和血壯氣切不可用針鐮割點只宜服收花平補之藥也眼中生翳從上生下者難治自下而上易治若頭尾生者亦可治也海藏云目能遠視責其有火不能近視責其無水法當補腎目能近視責其有水不能遠視責其無火法宜補心東垣曰能遠視不能近視者陽氣有餘陰氣不足也乃血虛而氣盛也血虛氣盛者皆火有餘元氣不足火者元氣穀氣真氣之賊也元氣之來也徐而和細細如線邪氣之來緊而強如巨川之水不可遏也能近視不能遠視者陽氣不足陰氣有餘乃氣虛而血盛也血盛者陰火有餘也氣虛者元氣衰弱也此老人桑榆之象也陽主散陽虛則眼稜急而為倒睫拳毛陰主斂陰虛不斂則瞳子散大而為目昏眼花眼生倒睫拳毛者兩目緊急皮縮之所致也蓋內伏熱致陰氣外行當去其內熱併火邪使眼皮緩則拳毛立出翳膜亦退用手法攀出內皮向外刺以三稜針針出熱血以左手指甲迎住針鋒立愈水附木勢上為眼澀為眵為冷淚此皆由肺金之虛而肝木寡於畏也目眶歲久赤爛俗呼為赤瞎是也當以三稜針刺目眶外以瀉濕熱而愈或云風沿眼系上膈有積熱自飲食中挾怒氣而或頑痰痞塞濁氣不降清氣不上升由是火益熾而水益降積而久也眼沿因膿漬而腫於中生細小蟲絲遂年久不愈而多癢者是也用紫金膏以銀釵腳揩去油膩點之試問若果癢者又當去蟲以絕根本蓋紫金膏止是去濕與去風涼血而已若前所謂飲食挾怒成痰又須更與防風通聖散去硝黃為細末以酒拌勻曬乾依法服之禁諸厚味及大料物方盡諸法之要紫金方未詳查東垣蘭室秘藏眼目門還睛紫金丹是此方也丹溪曰目病屬風熱血少神勞腎虛瞳子散大皆辛熱之為也辛主散熱乘之當除風熱涼血益血以收耗散之氣芩連苦寒除邪氣之盛為君歸身地黃養血涼血為臣五味酸寒體浮收瞳散地骨皮天門冬瀉熱補氣或用滋陰地黃丸妙久病昏暗以熟地黃歸身為君以羌活防風甘菊之類佐之暴發赤腫以防風黃芩為君以瀉火黃連當歸為佐以養血羌活柴胡升麻白芷甘草為使白睛紅加白豆蔻少許肥人風熱上壅目痛宜防風羌活荊芥酒芩以散其濕熱瘦人眼痛乃是血少兼熱須用四物湯加龍膽草玄參防風荊芥菊花氣眼著惱便發用明目流氣飲甚妙勞役飲食不節內障昏暗用蔓荊子湯蔓荊子人參黃耆甘草炙黃柏白芍藥酒炒又用四物湯加酒炒芩連柏等藥眼痛用生地黃酒浸搗爛盦眼上用草烏南星乾薑桂枝為末醋糊調貼足心時用牛膝膏洗眼眼黑睛有翳皆用知母黃柏眼睛疼知母黃柏瀉腎火當歸養陰水眼中風淚出食後吞龍薈丸數粒日三次冬月眼暴發痛亦當解散不宜用涼藥一壯年人忽早起視物不見就睡片時略見而不明食減倦甚脈緩大重則散而無力意其受濕所致詢之果臥濕地半月遂以白朮為君黃耆茯苓陳皮為臣附子為使十餘帖而安一老人忽盲他無所苦余以大虛治之急煎人參膏二斤服二日一醫與青礞石藥余曰今夜死矣果然一人形實好熱酒忽目盲脈澀此熱酒所傷胃氣汙濁血死其中而然也以蘇木作湯調人參末服二日鼻及兩掌皆紫黑余曰滯血行矣以四物加蘇木桃仁紅花陳皮調入人參末服數日而愈戴氏曰赤眼有數種氣毒赤者熱壅赤者無非熱壅肝經所主並黑神散消風散等分白湯臨臥調服或洗肝散菊花散龍膽四物湯皆可風眼內眥頭忽成疱三五日間便至膿汁世呼為偷針方初生時其眥上有細紅點如瘡以馬尾穿破即瘥實解太陽經結熱也王節齋曰眼赤腫痛古方用藥內外不同在內湯散用苦寒辛涼之藥以瀉其火在外點洗則用辛熱辛涼之藥以散其邪故點藥莫要於冰片而冰片大辛熱以其辛性甚故藉以拔出火邪而散其熱氣古方用燒酒洗眼或用乾薑末生薑汁點眼者皆此意也蓋赤眼是火邪內炎上攻於目故內治用苦寒之藥是治其本如鍋底之去薪也然火邪既客於目從內出外若外用寒涼以阻逆之則鬱火內攻不得散矣故點藥用辛熱而洗眼用熱湯是火鬱則發因而散之從治法也世人不知冰片為劫藥而誤認為寒常用點眼遂致積熱入目而昏暗障翳故云眼不點不瞎者此也又不知外治忌寒涼而妄將冷水冷物冷藥挹洗當致昏瞎者有之張子和曰聖人雖言目得血而能視然血亦有太過不及也太過則目壅塞而發痛不及則目耗竭而失明故年少之人多太過年老之人多不及但年少之人則無不及年老之人其間猶有太過者不可不察也夫目之內眥太陽經之所起血多氣少目之銳眥少陽經也血少氣多目之上綱太陽經也亦血多氣少目之下綱陽明經也血氣俱多然陽明經起於目兩旁交額之中與太陽少陽俱會於目惟足厥陰經連於目系而已故血太過者太陽陽明之實也血不及者厥陰之虛也故出血者宜太陽陽明蓋此二經血多故也少陽一經不宜出血血少故也刺太陽陽明出血則目愈明刺少陽出血則目愈昏要知無使太過不及以養血而已凡血之為物太多則濫太少則枯人熱則血行疾而多寒則血行遲而少此常理也目者肝之外候也肝主目在五行屬木木之為物太茂則蔽密太衰則枯瘁矣夫目之五輪乃五臟六腑之精華宗脈之所聚其白仁屬肺金肉輪屬脾土赤脈屬心火黑水神光屬腎水兼屬肝木此世俗皆知之矣及有目疾則不知病之理豈知目不因火則不病何以言之白輪變赤火乘肺也肉輪赤腫火乘脾也黑水神光被翳火乘肝與腎也赤脈貫目火自甚也能治火者一句可了故內經曰熱勝則腫凡目暴赤腫起羞明癮澀淚出不止暴寒目瞞皆太熱之所為也治火之法在藥則鹹寒吐之下之在針則神廷上星囟會前頂百會血之翳者可使立退痛者可使立已昧者可使立明腫者可使立消惟小兒不可刺囟會為肉分淺薄恐傷其骨然小兒水在上火在下故目明老人火在上水不足故目昏內經曰血實者宜決之又曰虛者補之實者瀉之如雀目不能夜視及內障暴怒大憂之所致也皆肝主目血少禁出血止宜補肝養腎至於暴赤腫痛皆宜以䤵針刺前五穴出血而已次調鹽油以塗髮根甚者雖至於再至於三可也量其病勢以平為期巢氏曰凡眼內眥頭忽結成疱三五日間便生膿汁世呼為偷針此由熱氣客在眥間熱搏於津液所成但其勢輕者小小結聚汁潰熱歇乃瘥薛氏曰世傳眼眥初生小疱視其背上即有細紅點如瘡以針刺破即瘥故名偷刺實解太陽經結熱也人每試之有驗然巢氏但具所因而不更分經絡其諸名實所過者多矣薛氏曰按龍木論眼疾有七十二般內障二十三候外障四十九候病狀一一不同詳見本論然內障為黑水神光昏翳外障則有翳膜者是今論中雖具諸候而所用藥多本風熱故並略去然內障有因於痰熱氣鬱血熱陽陷陰虛脫營所致種種病因皆略之不議況外障之翳有起於內眥外眥睛上睛下睛中當視其翳色從何絡而來如東垣治例魏邦彥夫人目翳從下而上病自陽明來也緣非五色之正殆肺腎合而為病也乃就畫家以墨調膩粉合成色諦視之與翳色同矣肺腎為病者無疑乃瀉肝腎之邪而以入陽明之藥為之使既效而他日復病作者三其所從來之經與翳色各異因詢此必經絡不調目病未已問之果然如所論治之疾遂不作若此憑其色究其所兼所本之因處治而不愈者蓋邪蘊日久而實元氣陰氣不足所致也當以王道論治庶可但世俗不能守此理遂致失明者多矣羅謙甫云郎中張子敬年六十七歲病眼目昏暗微黑色皮膚不澤六脈弦細而無力一日出視治眼二方問予曰可服否予曰此二方以黃連大苦之藥為君諸風藥為使且人年五十膽汁減而目不明內經云土位之主其瀉以苦諸風藥亦能瀉土人年七十脾胃虛而皮肉枯重瀉其土使脾胃虛而不能營運榮衛之氣滋春元氣胃氣不能上行膈氣吐食諸病生矣又況年高衰弱此藥不服可也只宜慎言語節飲食懲忿窒欲此不治之治也子敬以為然明年春除關西按察使三年致仕回還精神清勝脈遂平和此不可妄服寒涼之劑也內經云征伐無過是謂太惑解之可也海藏妻侄子形肥笄年時得目疾每月或二月一發發則紅腫難開如此者三十服除風散熱等劑左目反有頑翳從銳眥遮瞳人右目亦有翳從下而上經云從內走外者少陽病從下上者陽明病予謂此少陽陽明二經有積滯也脈短滑而實鼓晨則似短澀潔古有云短為有積滯遏抑臟腑宜下之遂用溫白丸減川芎附子下之加龍膽草黃連加東垣五積法從二丸加起每日加一丸加至大利然後減丸又從二丸加起忽一日於利中下黑塊若干如黑豆大而硬堅從此漸痊而翳盡去樓全善曰目疼有二一謂目眥白眼疼一謂目珠黑眼痛蓋目眥白眼疼屬陽故晝則疼甚點苦寒藥則效經所謂白眼赤脈發於陽故也目珠黑眼疼屬陰故夜則疼甚點苦寒藥則反劇經所謂瞳子黑眼法於陰故也夏枯草治目珠疼至夜則疼甚者神效或用苦寒藥點之反疼亦神效蓋目珠者連目本又名目系屬厥陰之經也夜甚及用苦寒藥點之反甚者夜與寒亦陰故也丹溪云夏枯草有補養厥陰血脈之功其草三四月間開花過夏至時陰生則枯蓋稟純陽之氣也至哉斯言故治厥陰目疼如神者以陽治陰也予男至夜目珠及連眉稜骨作疼頭半邊腫痛用黃連膏點之反大痛百藥不效灸厥陰少陽疼隨止半日又作又灸又止月餘遂以夏枯草二兩香附末二兩甘草四錢同為細末每服一錢半用清茶調服下咽則疼減大半至四五日良愈凡目赤痛或大便秘或脈實有力者為有里證宜微利之瀉青丸洗肝散之類是也經云診目痛赤脈從上下者太陽病從下上者陽明病從外走內者少陽病按此論表裡之翳明矣用以治證如鼓應桴也凡赤脈翳初從上而下者屬太陽以太陽主表其病必連眉稜骨痛或腦項疼或半邊頭腫痛是也治法宜溫之散之溫則臘茶鹽川附等分煎服立愈戴立齋常以此證用川附一錢作一服隨愈散則簡要夏枯草散東垣選奇湯之類是也翳膜者風熱重則有之或瘢入眼此肝氣盛而發在表也翳膜已生在表明矣宜發散而去之若反疏利則邪氣內蓄為翳益深邪氣未定謂之熱翳而浮邪氣已走謂之冰翳而沉邪牢而深者謂之陷翳當以焮發之物使其邪氣再動翳膜乃浮佐之以退翳之藥而能自去也病久者不能速效宜以歲月除之新翳所生表散方東垣羌活除翳湯有熱血虛者退云丸之類是也翳從下而治諸方瀉青丸之類翳除盡至期年月日復發者或間一月或二月一發皆為積治如脈滑者宜溫白丸加黃連龍膽草如東垣五治法治之內障在睛里昏暗與不患之眼相似惟瞳仁里有隱隱青白者無隱隱青白者亦有之李氏曰眼病須分表裡外因風中腦戶濕浸頭上熱逼冷灌睛中或久處煙火或食後向火或醉後失枕血滯痰壅或冒砂塵或撞刺撲損湯泡火燒皆傷目之標內因五辛炙煿酒面濕熱痰火房室損精勞役傷氣泣涕刺頭傷血暴喜暴怒暴驚極目遠視夜書細字鏤刻博奕傷神皆傷目之本初起在腑為表當除風散熱久則入臟為里當養血安神然內因初即入里外因久亦帶表悟之五輪八廓亦表裡之謂表證多屬三陽部分里證多屬三陰部分要知以肝為主表裡虛實不過五行生剋之理八廓不必深疑舊設七十二證今纂注於內更不重複便覽五輪白屬肺金之精曰氣輪氣證七情氣滯則血凝紅脂薄如紙傘日久變成白膜者難治熱證白睛潤濕浮而赤腫筋多重者生紅花翳痛澀有淚年深睛變碧色滿目如凝脂赤絡橫直如絲宜四物湯去芎換土當歸加甘草虛證白精枯槁氣沉而濁烏珠屬肝筋之精曰風輪風睛閃兩旁不歸中如轆轤轉關難治熱證赤暈浮漿重者烏珠忽然如針刺痛雙目緊急或突出豆許如蟹睛者忌點或生翳似旋螺尖突起或周圍生翳如鋸齒如棗花四五枚相合赤色刺痛或生翳四邊皆白中間一點黃心或生翳如玉色浮滿不痛者忌針割或生青色翳兩眥澀痛或翳如冰色堅實旁觀逼透瞳人虛證輕者枯黃繞睛重者烏珠上一點圓翳日中見之差小陰處見之差大或一點黑翳如小豆疼痛淚出者忌點又肝虛雀目者曉明晚暗乃所稟血氣有火也年深則盲黃風雀目者木衰土盛終當變黃脹而死宜平胃散以平土氣四物湯以補肝虛經年瞳子色如金者不治不治證生翳橫加劍脊下面微微甚薄不赤不痛或浮翳如水光白色環繞瞳人初生自小眥頭至烏珠上不痛癢無血色相潮或翳如凝脂邊厚邊薄形如缺月色光無暇或生翳經年如銀釘釘入烏珠或因他病生翳初甚微後遍睛俱白內眥屬心外眥屬小腸血之精曰血輪熱證輕者赤脈纏眥重者赤脈漸漸侵睛或眥頭結聚生瘡流出膿汁涎水黏睛上下乃風熱留眼皮中宜白薇丸氣證胬肉攀睛或先赤爛多年肝熱所沖或用力作勞有傷肝氣而成或痛或癢兩眥努出心氣不安憂思不已遂乃攀睛或起筋膜宜大黃黃芩防風薄荷等分入蜜煎服或定志丸上下兩胞屬脾胃肉之精曰肉輪又上胞眼皮內銳眥系足太陽起脈風澀輕者胞弦緊急重者上下眼皮似朱塗而生瘡久則生翳乃風熱也或眼皮有如膠凝腫如桃李時出熱淚乃風毒也宜點花草膏又爛弦風癢甚雙手背揉日久兩眼皮赤爛黏滯經年不安宜三稜針刺目眶外以瀉濕熱內服消風散桑白皮煎湯調服又倒睫拳毛淚出涓涓翳膜漸生乍愈乍發經年不安眼皮漸急如針刺痛瞳仁不安乃脾受風熱當去內熱退火邪令眼皮緩則毛出翳退外用手法翻內眼皮向外以三稜針橫刺用手爪迎其針鋒出血再用木鱉子搗爛綿包成條左患塞右右患塞左鼻中其毛自分先宜瀉肝散後服五退散又上下眼皮俱翻出或一眼皮翻出在外乃脾風熱也熱證輕者眼皮紅赤硬睛疼淚出羞明重者兩眼皮上下初生如粟漸大如米或赤或白不甚疼痛堅硬及肝壅瘀血也宜加味荊黃湯又眼皮內生如雞冠蜆肉或青或黑阻礙睛痛乃脾風熱也須翻出看之用觀音草每日輕輕微微漸漸刮至毫釐血出用金匙挑洗風毒藥水按而止之刮後不時將藥水點入則不復腫黑瞳子屬腎骨之精曰水輪虛證瞳仁散大視物不真火盛則瞳仁焦黃虛冷則瞳仁青綠少勞則痛熱證瞳仁內湧輕者如不患眼人但微有頭旋生花或勞力轉加昏蒙或頭旋相牽瞳仁連鼻膈皆痛時起紅白或黑花吐逆肝熱肝熱則先左肺熱則先右肝肺熱則左右齊發重則生翳瞳仁上如凝脂色澀痛無淚或滑翳如水銀珠子微含黃色遮繞瞳仁或散翳形如魚鱗點或眼皮下起粟子而爛瞳仁痛甚又白翳旋繞瞳仁點點如白花鱗砌皆肝肺相傳風熱也又黑水上橫深瑕盤青色沉沉深入痛甚乃分臟風熱也或血灌瞳仁無翳其痛如刺乃肝血無歸宜通血丸又瞳仁被物撞打驚痛昏暗眼眶停留瘀血宜貼地黃膏次服決明散如撞刺生翳經久覆被物撞轉加昏暗者難治經效散救之又飛絲砂塵入眼瞳仁不安單瞿麥為末鵝涎調敷或新筆蘸京墨點之又湯泡火燒腫痛者不可用冷藥即點待一日後以五行湯溫洗及地黃膏敷之風證則瞳仁青或瞳仁連眥頭皆癢不能收斂乃膽受風熱宜防風一字散不治證瞳仁幹缺痛澀無淚或白藏在黑水下向日細視方見或兩眼相傳疼痛早輕夜重或內障五色相間頭痛無淚日中如坐暗室或雷頭風熱毒氣衝入睛中牽引瞳仁或微或大不見八廓者乾為天廓位兩邊白睛中間屬肺與大腸坎為水廓位瞳子屬腎水艮為山廓位神光屬膽震為雷廓位白睛上截向小眥屬小腸巽為風廓位烏珠瞳仁外屬肝離為火廓位大小眥屬心與命門坤為地廓位上下眼皮屬脾胃兌為澤廓位白睛下截向大眥屬膀胱婦人活血為主有孕忌用麝點小兒眼患多是胎毒及食毒內服敗毒散外洗解毒湯切忌披鐮針灸小兒初生胎風雙目紅而眶邊赤爛至三四歲不愈宜消風散桑白皮煎湯下又小兒通睛欲觀東邊則見西畔若振掉頭腦則睛方轉此肝受驚風宜牛黃丸又小兒眼胞患瘢瘡熱氣衝透睛中疼痛淚出翳如銀片腫澀難開宜柴胡散神醫散又小兒眼皮中初生如麻仁日漸如豆懸垂眼皮上乃風熱攻脾宜五退散加減又小兒疳眼初起澀癢久生瘡翳腫痛或肝風所沖或痢後虛熱上攻者俱忌點宜還睛散痘瘡眼詳疹痘小兒不治證胎中受風五臟不和嘔吐黃汁兩眼青盲不明及初生視物近看轉睛不快至四五歲瞳仁結白昏蒙不見暴赤腫痛者或飲食積熱或天行赤目老幼相似或傷寒後餘熱以致血熱痰壅則目暴赤腫痛為熱癢為風澀為毒不可概用涼藥因成內障亦不可誤用溫藥助熱致令昏澀眵淚胬肉攀睛等狀是成外障決明散主之又有睡覺目赤腫良久無事者血復散於四肢也宜地黃粥又或讀書過度針刺而痛者名曰肝勞但須閉目調護又中惡祟卒痛如針刺或如火灸及太陽穴痛早輕後重宜決明散暴赤後熱流肺經輕則朦朧而已稍重則生云膜如黃膜從下生而上衝黑睛痛澀難開乃脾受風濕毒可治如赤膜從上生下遮覆黑睛名垂簾膜乃客熱上衝也難治又重則生翳障狀如珍珠碎米紅色自下而上者易治狀如梅花葉白綠自上而下者難治治法宜先去翳而後清熱若先去熱則翳難治眵淚熱而交流兩臉赤者屬肝熱之甚或衝風淚出由熱甚而水化制之也又肺受風寒遇風冷則流淚尤甚者白姜入散風淚不止食後吞當歸龍薈丸數粒目昏者熱鬱也甚則乎白日無所見故傷寒病熱極則目盲而不識人目微昏者至近則轉難辨物或如隔簾視或視如蠅翅或見黑花皆目之玄腑閉密而致榮衛精神不能升降故也若患風疹者必多眼暗攻其風則暗自去抑論脾家受毒則眼白亦腫神勞則眼青亦痛心熱則血灌瞳仁傷風則淚亦出虛煩則眼亦昏勞力則眥亦赤生瘡乃風熱侵肺黃乃酒傷於脾最宜活變左眼屬陽右眼屬陰故人之手足左不及右耳目右不及左左眼病則陽經病右眼病則陰經病陽邪日疼陰邪夜疼昏昧羞明者裡虛也上虛屬肝虛必頭暈目眩耳聾下虛屬腎虛必眼花睛痛耳鳴昏花者傷氣昏暗者傷血熱證亦有羞明怕日但內虛全不敢近陽光內障昏蒙外無翳膜因腦脂下凝烏珠轉白或如金色或如綠豆色或如雲煙或見五色治比外障更難如腦脂凝結瞳仁反背者不治黑花者腎虛也五色花為腎虛客熱青花膽虛紅花火盛散杏者瞳仁散大視物杳冥能近視不能遠視者看一成二屬肝腎虛宜腎氣丸地芝丸或加降火之劑能遠視不能近視者屬心虛宜定志丸有肝虛客熱迎風冷淚者歸葵湯古木賊散睛疼有火者滋腎丸無火者杞苓丸外因風則胞白兩眼拘急牽引喎斜癢而青淚肝風毒菊花散腎風毒白蒺藜散明目流氣飲撥雲散白殭蠶散防風一字散犀角飲選用熱則珠突胞腫硬紅刺痛洗肝散洗心散還睛散通肝散瀉肝散決明散羚羊角散蔓荊散加味荊黃湯瀉青丸涼膽丸墜翳洗選用濕則食減身倦如雲霧掩日或忽然不見或略見不明宜鹽術散單蒼朮膏濕熱甚宜神芎丸暴發則目瞞不明皆熱所為也人參敗毒散疼者升麻葛根湯歷考眼科無寒而有虛豈寒泣血而不上攻耶挾痰者則痛甚宜小省風湯南星丸內傷七情氣壅朦朧胞腫而軟酸澀微赤木香流氣飲加川芎蒺藜風與氣搏癢澀渾多淚者羌活石膏散因過思勞神大志丸育神夜光丸因驚恐者定志丸因怒者當歸龍薈丸內傷飲食勞倦損陷胃氣火盛血脈沸騰益氣聰明湯磁砂丸還睛丸氣弱甚者單人參膏補中益氣湯如脾胃熱兼有宿食者秦艽大黃為末砂糖調服利之脾胃濕傷內外障者椒目丸鹽術散傷熱酒胃氣汙濁血死目盲者蘇木煎湯調人參末連鼻與手掌紫黑者四物湯加桃仁紅花蘇木煎湯調人參末服內傷色欲腎氣虛者補腎丸腎精虛者益陰腎氣丸肝血虛者養肝丸生熟地黃丸肝腎虛者駐景丸抑論五臟六腑精華皆稟於脾注於目故理脾胃則氣上而神清也又肝之系雖總於目而照徹光彩實腎精心神所主故補精氣安神者乃治眼之本也熱久復為風冷所乘則眼中不赤而弦赤且爛若風與熱病則內外浮赤而癢甚大概表病肥人多風熱防風黃芩瀉火為君黃連當歸養血為臣柴胡升麻白芷消腫止痛為使白睛紅者加白豆蔻少許瘦人血虛四物龍膽湯或加羌活蔓荊子荊芥玄參山梔仁菊花為佐里證肥人多風虛者防風一字散四生散補肝散還精丸瘦人血虛挾風者通血丸明目地黃丸滋陽地黃丸通用羊肝丸久甚者退翳丸活命羊肝丸眼不過虛實而已白輪變赤火乘肺也肉輪赤腫火乘脾也黑珠五色花翳腎虛火也神光青睛被翳肝虛火也赤脈瘀血貫目澀痛心火自甚也故童子水在上則視明瞭老人火在上則視昏眊實火氣有餘宜前風熱藥中加枳殼杏仁以破氣虛火血不足宜前養陰藥中加知母黃柏以降火黑睛有翳者倍之蓋散有餘之火在於破氣降不足之火在於養陰或勞欲過度或涼藥過多以致渾身手足麻木九竅不利兩目緊急青白翳見大皆視物無力宜補陽湯黃芩湯或加黃柏或菊睛丸經曰壯水之源以鎮陽光滋陰是也壯火之主以消陰翳養陽是也今人不分陰陽專以龍膽辛香石藥擦點而不知辛散損明悲夫外治點洗須要手巧凡暴赤腫血壅氣凝者一時連點三五次亦可如氣血稍虛者宜服藥以塞其源藥水洗之生有云膜方可用點若無翳膜縱久但可洗之卻忌過用涼藥冷洗冰血眼化為水至於針刀火烙古人忌用惟太陽經熱生偷針痣可刺去血如爛翳用茜草根燒灰燈心草蘸點之須臾大痛以百節草刮去他如金針撥轉瞳仁等法另是一家傳授本事方云讀書之苦傷肝損目誠然晉範寧嘗苦目病就張湛求方湛戲之曰古方宋陽氏少得其術以授魯東門伯次授左丘明遂世世相傳以及漢杜子夏晉左太衝凡此諸賢並有目疾得此方云損讀書一減思慮二專內視三簡外觀四旦起晚五夜早眠六凡六物熬以神火下以氣簁蘊於胸中七日然後納諸方寸修之一時近能數其眉睫遠視尺棰之餘長服不已洞見牆壁之外非但明目乃亦延年審如是而行之非可謂之嘲戲亦奇方也泊宅編云舊說眼疾不可浴浴則病甚甚至有失明者承值郎白良云未壯歲之前歲歲患赤眼一道人勸但能斷沐頭則不復病此彥良自此不沐今七十餘更無眼疾或云患赤目以熱水灌足佳若澡浴必致失明醫余云有人患赤眼腫痛脾胃虛弱吃食不得診其肝脈盛脾脈弱服涼藥以治肝則損脾愈吃飲食不得服暖藥以益脾則肝愈盛而加病何以治之但於溫平藥中倍加肉桂不得用茶調恐損脾也肉桂殺肝而益脾故一治而兩得之傳曰木得桂而死又曰凡眼疾有上盛下虛者有上虛下實者虛者宜服補腎藥補其母也實者宜服涼心經藥瀉其子也眼科云所謂補藥者非硫黃附子鹿茸蓯蓉之類是硃砂磁石之類也治眼而補下當用眼藥故也茲為至理脈法在百零二目病下原機啟微後治目暴赤腫痛方洗肝散治風熱上攻暴作赤目腫痛難開隱澀眵淚羌活防風薄荷山梔仁當歸川芎大黃酒浸煨各一兩甘草五錢上為末每服二錢食後熱水調下龍膽四物湯治目赤暴發雲翳疼痛不可忍當歸酒洗川芎赤芍藥生地黃各一錢半姜酒炒羌活防風各一錢龍膽草酒洗防己各八分上銼水煎食後服東垣瀉熱黃連湯治眼暴發赤腫疼痛黃芩酒炒黃連酒炒龍膽草生地黃姜酒炒柴胡各一錢升麻五分上㕮咀水煎午前飯後熱服散熱飲子治眼目暴赤痛腫防風羌活黃芩黃連各二錢上作一服水二盞煎至七分食後溫服如大便秘加大黃二錢如痛甚加當歸生地黃如煩躁不得眠加山梔子救苦湯治眼暴發赤腫瞼高苦疼不住者桔梗連翹細辛羌活太陽升麻陽明柴胡少陽防風藁本黃連紅花各一錢川芎三錢黃芩生地黃黃柏知母各一錢半龍膽草蒼朮各七分當歸身夏月減半甘草炙各五分上銼每服一兩水煎食後服若苦痛則多用苦寒兼治本經之藥再行加減如睛昏加知母黃柏一倍錢氏瀉青丸治目暴發赤腫疼痛當歸川芎防風羌活梔子大黃龍膽草上為末蜜丸雞頭大每服一二丸本事方治目暴赤澀腫疼痛木賊半兩去根細辛半兩洗淨草烏一錢去尖龍膽草半兩去根上銼散每服三大錢水一大盞黑豆半合煎至一二沸入沙糖一塊如彈子大煎至八分去渣食後溫服一應諸眼患並用忌煎煿油麵酢醬熱物及不得嗔怒房色等事則便易獲痊矣點洗方光明湯治一切暴眼白礬一字銅綠杏仁甘草各一錢乾薑三分上件各捶碎用生絹袋盛貯放於磁器內以沸湯浸用紙封蓋定待冷臨臥洗之洗眼湯洗暴赤眼當歸尾黃連各一錢赤芍藥防風各五分杏仁四枚去皮尖上用水半鍾入人乳汁少許浸藥蒸過澄清點眼不拘時一方無杏仁有秦皮各等分用滾水浸一時蒸熱洗眼甚妙五行湯洗暴赤眼及時行腫毒疼痛黃柏一味為末以濕紙裹黃泥包煨候泥干取出每用一彈子大絹包浸水內飯上蒸熟乘熱熏洗極效此方有金木水火土製過故名一方乳汁拌小黃柏皮同煨熱點之黃連膏治一切暴發赤眼宣黃連四兩洗淨切片用水四碗浸一宿慢火煎熬至半盞細絹重濾去渣再熬如糖收入磁罐內用時入冰片少許用銀簪點眼角一方乳汁煎黃連點之治目中百病一方治火眼風眼障眼當歸兼用根梢黃連去毛各四分朴硝白礬各三分銅綠三分上俱捶碎用絲綿裹置瓷器中沸湯一碗浸不拘時先以白湯洗淨次以藥水洗之青天膏治風熱時眼暴赤神效銅綠黃丹水飛官粉各等分上為末煉蜜入水少許調藥令勻於碗內艾葉煙燻黃為度臨用以香油少許調勻貼眼角消毒散治眼赤腫疼痛不定兼治瘡腫不消大黃生五錢黃芩黃柏各一兩上為末每用生蜜水調藥如糊攤在緋絹花子上隨目赤左右貼於太陽穴如干用溫水頻潤五黃膏治目赤黃柏一兩黃芩黃連黃丹大黃各半兩上為細末每一錢蜜水調成膏攤緋絹上隨左右眼赤貼太陽穴赤眼方雞爪黃連銅綠半字大艾葉上將黃連銅綠研末用洗水調膏攤於磁器盞內卻將艾揉軟為丸燒艾炮熏盞內藥乾用沸湯泡澄清以銀簪蘸藥點之救苦丸治眼暴赤發嗔痛甚者黃連一兩川歸一錢甘草一錢上銼細水半碗浸一宿以火熬約至一半綿絞去渣令淨再熬作稠膏攤在碗上倒合以物蓋之用熟艾一大塊如彈子大底下燃之熏膏子令艾盡為度下後項藥硃砂一錢飛腦子五錢乳香沒藥各等分上研入膏和丸如米大每用二丸點眼兩角仰面臥藥化方起一方治火眼用水梨一枚去皮連核嚼碎同生白礬末八分入磁器內搗爛綿帛取汁仍收瓷器內以白綿紙蓋敷待水滲過用婦人帶過銅針不時點眼即愈收藏如法切忌屋塵清明散治暴發爛弦風眼皂礬不拘多少瓦器盛於三伏內曬之至白色須曬十餘日方好再用黃連末十分之一每用少許水和隔紙洗眼立時見效點赤眼方好雞爪黃連剪碎洗淨同白礬少許用紅棗一枚去核將二味盛入棗內濕紙包裹慢火煨熟礬化取出黃連浸人乳內點眼極妙洗眼方治時行害眼並風眼有淚者用皮硝六錢水一鍾煎七分候冷定洗眼每日洗數次眼如童子明每月洗一遍搐鼻散治風熱腫赤難開雄黃硃砂各二錢細辛五錢腦麝二味各少許上為末令病人口含水以少許吹入鼻中吹鼻散治暴發眼痛火硝一錢乳香沒藥各五分雄黃三分黃丹一分飛上為極細末每少許吹入鼻中治目久赤腫痛方明目清肝散治肝經壅熱目腫疼痛柴胡黃連各一錢五分黃芩當歸川芎赤芍藥生地姜酒炒菊花決明子各一錢甘草六分上銼水煎食後服久患翳膜加木賊蟬退白蒺藜各一錢芍藥清肝散治眵多眊矂緊澀羞明赤脈貫睛臟腑秘結者白朮川芎防風羌活桔梗滑石石膏各三分荊芥薄荷前胡黃芩芍藥甘草炙各二分半柴胡山梔知母各二分大黃四分芒硝三分半上㕮咀作一服水煎食後熱服此治風熱不制之病熱甚大便硬者從權用之蓋苦寒之藥也大便不硬者減大黃芒硝羌活勝風湯治眵多眊矂緊澀羞明赤脈貫精頭痛鼻寒腫脹涕淚腦巔沉重眉骨痠疼外翳如雲霧絲縷秤星累蓋柴胡七分白朮黃芩各五分羌活獨活川芎白芷防風薄荷枳殼前胡桔梗各四分荊芥甘草各三分上銼一服水二盞煎至一盞去渣熱服此方為風熱不制而作也又治傷寒愈後之病熱服者熱性炎上令在上散不令流下也生翳者隨翳所見經絡加藥翳凡自內眥而出者加蔓荊子治手太陽足太陽之屬也自銳眥而入客主人斜下者加龍膽草為膽草味苦與膽味合少加人參益三焦之氣加藁本乃太陽經風藥銳眥客主人者足少陽手少陽手太陽之屬也凡自目系而下者倍加柴胡行肝氣加黃連瀉心火目系者足厥陰手少陰之屬也自抵過而上者加木通導小腸中熱五味子酸以收斂抵過者於太陽之屬也柴胡復生湯治紅赤羞明淚多眵少腦巔沉重睛珠痛應太陽眼睫無力常欲垂閉不敢久視久視則痠疼翳陷下所陷者或圓或方或長短如縷如錐如鑿柴胡六分蒼朮茯苓黃芩各五分白芍藥薄荷桔梗炙甘草各四分藁本蔓荊子川芎羌活獨活白芷各三分半五味子二十粒上作一服水兩盞煎至一盞去渣食後熱服當歸養榮湯治睛珠痛甚不可忍余治同上當歸川芎白芍藥熟地黃各一錢防風羌活白芷各七分半上銼一服水二盞煎至一盞去渣食後熱服上方以七情五賊勞役飢飽重傷脾胃脾胃者多血多氣之所脾胃受傷則血亦病血養睛睛珠屬腎今生意己不升發又復血虛不能養睛故睛痛甚不可忍以防風升發生意白芷解利引入胃經為君白芍藥止痛益氣通血承接上下為臣熟地黃補腎水真陰為佐當歸川芎行血補血羌活防風引入少陰經為使血為邪勝睛珠痛者及亡血過多之病俱宜服也服此藥後睛痛雖除眼睫無力常欲垂閉不減者助陽和血湯主之方見後第九十三川芎行經散治目中青黯如物傷狀重者白睛如血貫川芎當歸柴胡枳殼炙甘草各六分桔梗五分防風羌活獨活白芷蔓荊子荊芥薄荷各四分茯苓三分紅花少許上作一服水二盞煎至一盞去渣食後大熱服三因羌活散治風毒上攻眼目昏澀翳膜生瘡及偏正頭疼目小黑花累累者羌活川芎藁本天麻旋覆花青皮南星炮各等分上為末每服二錢入生薑三片薄荷七葉水煎服竹葉瀉經湯治眼目癮澀稍覺眊矂視物微昏內眥開竅如針目痛按之浸浸膿出柴胡梔子羌活升麻炙甘草大黃黃連各五分黃芩六分赤芍藥茯苓澤瀉草決明車前子各四分青竹葉十片上作一服水二盞煎至一盞食後稍熱服消風養血湯治眼痛赤腫荊芥蔓荊子白芷防風川芎麻黃菊花桃仁紅花酒炒各五分當歸酒洗白芍藥炒酒草決明石決明甘草各一錢上銼水煎服連翹散治心熱目赤連翹柴胡山梔子木通瞿麥滑石車前子牛蒡子黃芩防風荊芥當歸赤芍藥生地黃甘草各半兩黃柏蜜炙一兩蟬蛻一錢半上㕮咀每服三錢水一盞半加薄荷煎服洗心散治風痰壅滿心經積熱邪氣上衝眼澀睛痛或腫或赤迎風多淚怕日羞明並皆治之白朮一兩半麻黃當歸荊芥穗大黃面里煨甘草各八錢芍藥入錢上為末每服二錢水一盞加生薑薄荷各少許同煎溫服溫脾散治諸頭風面腫眼赤大黃赤芍藥朴硝麥門冬菊花生地酒炒香附子各等分上㕮咀每服三錢水煎食後服密蒙花散治風氣攻注兩目昏澀多淚羞明並暴赤腫密蒙花土蒺藜炒去尖羌活木賊菊花石決明用鹽同東流水煮沸時取研粉各等分上為末每服二錢臘茶清食後調下撥雲散治風毒上攻眼目昏暗翳膜睛怕日羞明一切風毒眼疾並皆治之羌活防風柴胡甘草炒各等分上為末每服一錢水煎食後服薄荷湯調茶及菊花苗煎湯皆可服忌諸毒物決明子散治風毒上攻眼目腫痛或卒生翳膜或赤澀胬肉或癢或痛羞明多淚川芎羌活赤芍藥石膏黃芩甘菊花木賊決明子石決明蔓荊子甘草各一兩上為末每服三錢加生薑五片水煎食後服草龍膽散治風毒熱氣攻衝眼目暴赤弦澀羞明及腫痛多眵迎風有淚翳膜攀睛胬肉隱痛龍膽草洗法蘆菊花木賊七個草決明微炒甘草炙各二兩川芎香附子炒各四兩上為末每服三錢用麥門冬湯入砂糖少許調服食後或米泔調下亦得又方治眼目暴赤腫痛風熱氣上衝睛疼連眶眼皮眥亦爛瘀肉侵睛時多熱淚及因忿怒逆損肝氣久勞瞻視風沙塵土入眼澀痛致成內外障翳等疾龍膽草蒺藜炒去刺各六兩茯苓四兩菊花去梗五錢赤芍藥八兩防風羌活甘草炙各三兩上為末每服二錢溫酒調食後服車前散治肝經積熱上攻眼目逆順生翳血灌瞳仁羞明多淚密蒙花菊花白蒺藜炒去刺羌活龍膽草黃芩車前子洗草決明粉草各等分上為細末每服二錢食後飲湯調服蟬花散治肝經蘊熱毒氣上攻眼目赤腫多淚羞明一切風毒並宜服之蟬蛻洗淨菊花穀精草羌活白蒺藜炒去刺草決明防風山梔子黃芩川芎荊芥穗蔓荊子密蒙花甘草各等分上為末每服二錢食後茶清調服或荊芥湯調亦可菊花散治肝受風毒眼目赤腫昏暗羞明多淚澀痛菊花去梗六錢白蒺藜炒去尖木賊去節蟬退去頭