body:
  text: 卷四十四痙證論虞氏曰內經曰諸痙項強皆屬於濕痙風強病也項為足之太陽濕兼風化而侵寒水之經濕之極也然太陽所至為屈伸不利太陽之復為腰睢反痛屈伸不便者是又為寒水反勝之虛邪矣又曰諸暴強直皆屬於風原病式曰筋頸強直而不柔和也夫肝木屬風而主筋經曰諸暴強直屬風理宜然也其所謂諸痙項強而屬於濕者何歟蓋太陽陰濕甚則兼風化亢則害承乃制也是故知痙之為病濕為本風為標耳故仲景有剛柔二痙之分不可不辨蓋剛為陽痙而柔為陰痙也若夫太陽發熱無汗惡寒脈弦長頸急胸滿口噤手足攣急咬牙甚則搐搦角弓反張此為剛痙太陽微熱多汗不惡寒脈遲澀弦細四肢不收時時搐搦開目含口此為柔痙大抵因風濕二氣襲於太陽之經亦有輕重之分其風氣勝者為剛痙風性剛急故也濕氣勝者為柔痙濕性柔和故也外有諸虛之候表虛不任風寒亦能成痙是以或產後或金瘡或跌僕撲傷癰疽潰膿之後一切去血過多之證皆能成此疾也此乃虛為本而風為標耳亦有絕無風邪而亦能使人筋脈攣急而為角弓反張之候者血脫無以養筋故也丹溪甚言不可作風治而用風藥恐反燥其餘血而致不救可不慎歟婁氏曰痙者口噤角弓反張者是也丹溪曰痙大率與癇病相似比癇為虛宜帶補多是氣虛有火兼痰宜服人參竹瀝之類不用兼風藥丹溪活套云昔之所謂剛柔二痙者當以虛實論之是也一屬外感一屬內傷屬外感者為剛痙宜用麻黃葛根湯瓜蔞桂枝湯小續命湯在裡者大承氣之類屬內傷者為柔痙宜用補中益氣湯八物湯四物湯之類如以風濕二事分剛柔而治恐誤醫者不勝其多今以虛實分治其理昭然無疑矣趙氏曰按仲景云太陽病發熱無汗而反惡寒曰剛痙發熱汗出而不惡寒曰柔痙病者身熱足寒頸項強急惡寒時頭熱面赤目腫赤獨頭搖動卒口噤背反張者痙也又云太陽病發汗太多致痙風病下之則痙三因方云血氣內虛外為風寒濕熱所中則痙以風散氣故有汗而不惡寒以寒澀血故無汗而惡寒原其所自多由亡血筋無所榮故邪得以襲之所以傷寒汗下過多與夫病瘡人及產後致斯疾者概可見矣大抵此證有外感者有內虛者有因虛而受外邪與虛而挾痰火濕熱及怒氣者所因不同治法亦異諸書只為外感立方然人之病此多是虛證其可以風藥通治之乎海藏曰發汗太多因致痙身熱足寒項強惡寒頭熱而腫目赤頭搖口噤背反張者太陽痙也若低頭視下手足牽引肘膝相扛陽明痙也若一目或左右斜視並一手一足搐搦者少陽痙也汗之止之和之下之各隨其經可使必已李氏曰陽極則為剛痙多類風證宜清熱化痰祛風陰極則為柔痙多類厥證宜溫補化痰降火此丹溪謂實則為剛虛則為柔皆危證也余詳傷寒痙病發則身強不醒癇病發則身軟時醒痙癇相似而實不同或外因風邪或內因七情皆必因痰火而後發痙痰壅發痙不醒或隻手足搐搦左右動搖宜祛風導痰湯加竹瀝薑汁風痰盛者敗毒散加防風天麻黃芩全蠍生薑薄荷或通聖散加人參柴胡間服壽星丸薑汁竹瀝下火盛則遍身戰掉猶火炎而旋轉也火能燥物而使氣液不足宜四物二陳湯加芩連知母黃柏竹瀝童便補而散之實火則胸滿口噤咬牙腳攣臥不著床大便閉者大承氣湯下之仍忌風藥蓋火為風燥之本能治其本則風自散而燥自潤矣七情鬱悶者烏藥順氣散八味順氣散主之諸虛絕無風邪而筋脈拘急角弓反張者乃氣血虛脫無以主持養筋此等尤不可純用風藥經曰諸痙強直皆屬於濕濕極反兼風化制之實非風也虛也故又有言曰虛為本痰火外邪為標氣虛者補中益氣湯加竹瀝或六君子湯加黃耆附子柴胡血虛者四物湯加防風羌活或大秦艽湯痙病比癇更重甚則因而昏死者有之脈法脈經曰太陽病發熱其脈沉而細者為痙痙脈來按之築築然而弦直上下行痙家其脈伏堅直上下痙病發其汗已其脈浛浛胡紺切音感水和泥也如蛇暴腹脹大者為欲解脈如故反伏弦者必痙此痙字恐當作死字太陽病其證備身體強兀兀然脈沉遲此為痙瓜蔞桂枝湯主之治外感陽痙方小續命湯治剛柔二痙通用麻黃去節人參黃芩酒炒芍藥酒炒川芎酒洗防己杏仁去皮尖炒桂枝淨洗甘草各一錢防風附子炮去皮臍各五分上加生薑五片水煎服若柔痙自汗者去麻黃夏間及病有熱者減桂枝一半冬至春初去黃芩麻黃葛根湯治剛痙無汗惡寒麻黃赤芍藥各三錢乾葛四錢半豆豉半合上銼作一服加蔥白三莖水煎稍熱服麻黃加獨活防風湯治發熱無汗反惡寒者名曰剛痙麻黃去節桂枝各一兩芍藥三兩甘草半兩獨活防風各一兩上銼每服一兩水煎溫服葛根湯治太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根一錢半麻黃一錢桂枝芍藥甘草各七分半上銼一服加生薑三片大棗二枚水煎服瓜蔞桂枝湯治太陽病其證備身體強兀兀然脈反沉遲此為柔痙瓜蔞根二兩桂枝芍藥各三兩甘草二兩炙生薑三兩大棗十二枚上銼以水九升煮取三升作三服連飲取微汗如汗不出少頃以熱粥湯發之桂枝加川芎防風湯治發熱自汗而不惡寒者名曰柔痙桂枝芍藥生薑各一兩半甘草防風川芎各一兩大棗六枚上銼每服二兩水三盞煎至一盞溫服柴胡加防風湯治汗後不解乍靜乍燥目直視口噤往來寒熱脈弦者少陽風痙也此方主之柴胡一兩人參黃芩各五錢半夏六錢防風一兩甘草生薑各六錢棗三個上銼每服一兩水煎溫服大承氣湯治剛痙為病胸滿口噤大便實熱臥不著席腳攣急必齘齒此屬陽明裡證也以此下之齘音械齒相切也齘齒上下相抵也大黃七錢半厚朴枳實各一兩芒硝半合上銼碎以水二碗先煎枳樸二味取汁一碗半去渣納大黃再煎至一碗去渣納芒硝更煎一二沸溫服以利為度治外感陰痙方倉公當歸湯治賊風口噤角弓反張發痙無汗當歸防風各七錢半獨活一兩半附子一枚細辛半兩麻黃一兩二錢半上㕮咀以酒五升水三升煮取三升服一升口不開者格口納湯一服當蘇二服小汗三服大汗八物白朮散治陰痙手足厥冷筋脈拘急而無汗者白朮麻黃去根節茯苓五味子羌活各半兩附子炮桂心各三錢良薑一錢上銼每服四錢加生薑五片水煎服凡用麻黃宜斟酌不可過多桂枝加芍藥防風防己湯治發熱脈浮而細者附太陰也必腹痛宜此方桂枝一兩半防風防己各一兩芍藥二兩生薑一兩半大棗六枚上銼每服一兩水三盞煎至一盞半去渣溫服附子防風散治陰痙閉目合口手足厥冷筋脈拘急汗出不止白芷五味子各一兩防風甘草附子乾薑茯苓各七錢半柴胡一兩半桂心半兩上為末每服三錢加生薑四片水煎溫服附子湯治手足逆冷筋脈拘急汗出不止項強口噤痰湧附子炮白朮獨活各五分川芎肉桂各三分上作一服加棗一枚水煎服桂心白朮湯治陰痙手足厥冷筋脈拘急汗出不止白朮桂心附子炮防風川芎甘草各等分上每服五錢加薑棗水煎服治內傷諸痙方十全大補湯治發汗過多因而致痙者此方主之瘡家雖身疼不可發汗發則痙者亦用此方人參黃耆蜜炙茯苓白芍酒炒白朮炒當歸酒洗甘草炙熟地砂仁炒川芎各一錢桂枝五分上銼水煎服黃耆湯治汗多氣虛發痙黃耆蜜炙二錢人參白朮白茯苓白芍藥炒各一錢甘草炙八分桂枝五分上加棗一枚水煎食前服防風當歸湯治發汗過多發熱頭搖口噤背反張者宜去風養血防風當歸川芎地黃酒炒各二錢半上銼水煎服當歸散治血虛及去血過多發痙當歸酒洗二錢川芎熟地砂仁炒防風各一錢芍藥煨一錢半黃耆一錢甘草四分上水煎食前服當歸補血湯治一切去血過多因無血養筋令人四肢攣急口噤如痙當歸半兩酒浸黃耆一兩上銼碎作一服水煎溫服如挾風或兼破傷風者加防風羌活各一錢荊芥穗一錢半甘草五分減去黃耆一半丹溪方一少年痘瘡靨謝後忽口噤不開四肢強直時繞臍痛一陣則冷汗如雨痛定汗止脈極強緊如直弦知此子極勤苦因勞倦傷血瘡後血愈虛感風寒當用辛溫養血辛涼散風服此藥十二帖而安當歸芍藥二味為君川芎青皮鉤藤鉤三味為臣白朮甘草二味為佐桂枝木香黃連三味為使上加紅花少許水煎服荊芥散治新產血虛發痙得汗後中風發熱亦然荊芥穗微炒為末每服三五錢外以大豆黃卷用熱酒沃之取汁調下其效如神治痰火濕氣勞風諸痙方清痰湯治痰火攻作項強口噤角張發痙山梔黃芩各一錢半半夏湯泡橘紅茯苓瓜蔞仁炒去殼枳殼麩炒貝母去心香附童便浸各一錢甘草五分上水煎入竹瀝薑汁各三四匙食遠服去濕清熱散白朮二錢蒼朮米泔浸炒一錢半澤瀉茯苓天花粉山梔各一錢羌活七分甘草四分上水煎食前服祛風清金散治肺熱壅盛痰嗽如膿防風川芎桔梗枳殼旋覆花各一錢山梔黃芩貝母瓜蔞仁茯苓橘紅天門冬去心麥門冬去心各八分五味子十五粒甘草四分上水煎食後服理氣平肝散治七情所傷發痙烏藥香附各一錢半青皮枳殼麩炒芍藥煨川芎柴胡木香各一錢甘草五分上加生薑三片水煎食前服芎枳丸治勞風強上冥視肺熱上壅唾稠川芎枳殼上為末蜜丸如桐子大每服三五十丸食後溫水下日進三服
