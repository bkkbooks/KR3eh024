body:
  text: 卷九十八前陰諸疾論婁氏曰前陰所過之脈有二一曰肝脈二曰督脈經云足厥陰之脈入毛中過陰器抵少腹是肝脈所過也又云督脈者起於少腹以下骨中央女子入系庭孔循陰器男子循莖下至纂與女子等是督脈所過也陰縮者謂前陰受寒入腹內也陰縱者謂前陰受熱挺長不收也經曰足厥陰之經傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣故也陰痿者皆耗散過度傷於肝經所致經云足厥陰之經其病傷於內則不起是也丹溪曰胞兄二十餘歲玉莖挺長腫而痿皮塌常潤磨股不能行兩脅氣上手足倦弱先以小柴胡黃連大劑行其濕熱略加黃柏降其逆上之氣其挺腫漸收減及半但莖中有堅塊未消遂以青皮一味為君佐以散風之劑末服外以絲瓜汁五倍子末敷而愈平江王氏子年三十餘歲忽陰挺長腫而痛脈數而實用朴硝荊芥湯浸洗又用三一承氣湯大下之愈東垣陰痿陰汗及臊臭論云一富者前陰間嘗聞臊臭又因連日飲酒腹中不和求予治之予應之曰夫前陰者足厥陰肝之脈絡循陰器出其挺末凡臭者心之所主散入五方為五臭入肝為臊臭此其一也當於肝經中瀉行間是治其本後於心經中瀉少衝以治其標如惡針當用藥除之治法當求其本連日飲酒夫酒者氣味俱能生濕是風濕熱合於下焦為邪故經云下焦如瀆又云在下者引而竭之酒是濕熱之水亦宜決前陰以去之是合下焦二法治之治方龍膽瀉肝湯治陰囊腫痛或潰爛作痛或睪丸懸掛及一切濕癢臊臭等證柴胡梢澤瀉各一錢車前子木通各五分當歸梢龍膽草生地黃各三分上銼如麻豆大小水煎空心稍熱服便以美膳壓之此藥柴胡入肝為引用澤瀉車前子木通淡滲之味三味以除臊臭是名在下者引而竭之生地黃龍膽草之苦寒瀉酒濕熱更兼車前子之類以徹肝中邪氣肝主血用當歸以滋肝中血不足也一方去柴胡加黃芩山梔子甘草各五分名加減龍膽瀉肝湯濕盛加黃連便秘加大黃柴青瀉肝湯治男子肝火旺極陰莖腫裂健硬不休柴胡半夏黃芩人參甘草黃連青皮各等分上銼水煎服此即小柴胡湯加黃連青皮蓋玉莖萬筋之總小柴胡肝膽正藥加黃連助柴胡瀉肝火青皮瀉肝氣三白散治膀胱蘊熱風濕相乘陰囊腫脹大小便不利白牽牛二兩桑白皮炒白朮木通陳皮各五錢上為細末每服二錢空心姜水調服小兒服半錢固真湯治兩丸冷前陰痿弱陰汗如水小便後有余滴臊氣尻臀並前陰冷惡寒而喜熱膝亦冷正月內定此方升麻柴胡羌活各一錢甘草澤瀉各一錢半龍膽草炒知母炒黃柏各二錢上銼如麻豆大水煎空心熱服以美膳壓之溫腎湯治面色痿黃身黃腳軟弱無力陰汗陰莖有沃色二月定此方麻黃柴胡梢各六分澤瀉二錢防風蒼朮各一錢半白朮升麻各一錢茯苓豬苓各一錢五分黃柏一錢上銼作分二服水煎食前稍熱服一時辰許方食補肝湯治前陰如水冷並冷汗兩腳痿弱無力黃耆七分人參葛根各三分甘草炙五分升麻豬苓各四分白茯苓柴胡羌活陳皮連翹當歸身黃柏炒澤瀉蒼朮曲末知母防風各二分上銼如麻豆大都作一服水二盞煎至一盞去渣空心稍熱服忌酒濕面清震湯治溺黃臊臭淋瀝兩丸如水陰汗浸兩股陰頭亦冷羌活黃柏酒炒各一錢升麻柴胡蒼朮黃芩各五分澤瀉四分麻黃根豬苓防風各三分炙甘草當歸身藁本各二分紅花一分上銼如麻豆大作一服水煎臨臥服忌酒濕面柴胡勝濕湯治兩旁腎冷兩髀陰汗前陰痿弱陰囊濕癢臊氣柴胡甘草生黃柏酒炒各二錢升麻澤瀉各一錢半當歸梢羌活麻黃根漢防己龍膽草茯苓各一錢紅花少許五味子二十個上銼如麻豆大分作二服水煎食前稍熱服忌酒濕面房事仲景八味丸治陽事多痿不振熟地黃八兩澤瀉牡丹皮白茯苓各三兩茱萸肉山藥各四兩附子炮桂心各一兩上為末煉蜜丸如桐子大每服五十丸空心溫酒淡鹽湯任下夏減桂附一半春秋三停減一痰去精足全減桂附只依六味地黃丸椒粉散治前陰兩丸濕癢痛秋冬甚夏月減麻黃根一錢黑狗脊蛇床子各五分小椒當歸梢豬苓各三分斑蝥二個輕粉少許肉桂二分紅花少許上為末干撒上避風寒濕冷處坐臥丹溪方治腎囊濕癢吳茱萸半兩寒水石三錢黃柏二錢半樟腦蛇床子各五錢輕粉白礬白芷檳榔各三錢硫黃二錢上為末先以吳茱萸煎湯洗之後以此藥撒上牡礬丹治陰囊兩旁生瘡或陰濕水出其癢甚苦夜則搔之無足後必自痛又兩腋及腳心汗濕無可奈何者亦宜牡蠣黃丹各二兩枯礬四兩上為末遇夜睡時用手捏藥於癢處擦之不一時又擦三四次後自然平復硫檳散治陰囊上及兩腿上風濕瘡癢檳榔二個破開以黃丹三錢合在內濕紙包煨蛇床子硫黃各四兩全蠍六個輕粉青黛各五分麝香少許上各為末和勻每用少許清油調抹兩掌擦熱抱囊一頃次擦兩腿上柏蛤散治下疳濕瘡黃柏以磁鋒刮末蛤粉末各等分上研勻撒上即愈蓋黃柏去熱蛤粉燥濕故也銅綠散治男婦陰部濕淹瘡五倍子五錢白礬一錢乳香五分輕粉一字銅綠少許上為末洗淨撒之鵝管散治病瘥且犯房玉莖皮破腫痛黃連大黃各一錢鵝管石赤石脂各五分雄黃一分片腦半分上為末津液調敷一方治有人陰冷漸漸冷氣入陰囊腫滿恐死日夜痛悶不得眠取生椒擇洗淨以布囊裹著丸囊令厚半寸須臾熱氣大通日再易之取出瘥一方煮大薊汁服立瘥蟬脫散治陰囊忽腫多坐地為風或蟲蟻吹著用蟬脫五錢水煎洗腫處再溫再洗腫痛立消洗後與五苓散加燈心洗藥洗下疳瘡黃連黃柏當歸白芷獨活防風朴硝荊芥各等分上銼入銅錢五十文烏梅五個鹽一匙水煎溫湯日洗五七次洗後用敷藥敷藥木香檳榔黃連銅青輕粉枯礬螵蛸各等分麝香少許上為末至夜敷上
