body:
  text: 卷二十二上泄瀉滯痢泄瀉滯痢總論潔古曰臟腑瀉利其證多種大抵從風濕熱論之是知寒少熱多寒則不能久也故曰暴泄非陰久泄非陽論云春宜緩形形緩動則肝木乃榮反靜密則是行秋令金能制木風氣內藏夏至則火盛而金去獨火木旺而脾土損矣輕則飧泄身熱脈洪谷不能化重則下痢膿血稠黏裡急後重故曰諸泄稠黏皆屬於火經云溲而便膿血知氣行而血止也宜大黃湯下之是為重劑黃芩芍藥湯是為輕劑是實則瀉其子木能自虛而脾土實矣故經曰春傷於風夏為飧泄此逆四時之氣人所為也此一節熱泄所謂滯下也有自太陰脾經受濕而為水泄虛滑身重微滿不知穀味假令春宜益黃散補之夏宜泄之法曰宜補宜泄宜和宜止和則芍藥湯止則訶子湯久則防變為膿血是脾經傳變於腎謂之賊邪故難愈也若先利而後瀉謂之微邪故易安此皆脾土受濕天之所為也雖聖哲不能逃口食味鼻食氣從鼻而入留滯於脾而為水泄也此一節濕泄所謂泄瀉也有厥陰經動下痢不止其脈沉而遲手足厥逆膿血稠黏此為難治宜麻黃湯小續命湯汗之法云為有表邪縮於內當散之而自愈此一節風泄所謂火泄也有暴下無聲身冷自汗小便清利大便不禁氣難布息脈微嘔吐急以重藥溫之漿水散是也此一節寒泄所謂暴泄也故法曰後重者宜下腹痛者宜和身重者宜除濕脈弦者去風膿血稠黏者以重藥竭之身冷自汗者以毒藥溫之風邪內縮者宜汗之則愈鶩溏為痢鶩音務鴨也便如水而少有結糞者宜溫之而已又曰在表者發之在裡者下之在上者湧之在下者竭之身表熱者內疏之小便澀者分利之又曰盛者和之去者送之過者止之兵法曰避其來銳擊其惰歸此之謂也凡病泄而惡寒太陰傳少陰為土來剋水也用除濕白朮茯苓安脾芍藥桂枝黃連破血火邪不能勝水太陰經不能傳少陰而反助火邪上乘肺經而痢必白膿也加當歸芍藥之類是已又裡急後重脈大而洪實為裡實證而痛甚是有物結墜也宜下之若脈浮大慎不可下雖裡急後重脈沉細而弱者謂寒邪在內而氣散也可溫養而自安裡急後重閉者大腸氣不宣通也宜加檳榔木香宣通其氣若四肢慵倦小便少或不利大便走沉困飲食減少宜調胃去濕白朮芍藥茯苓三味水煎服白朮除脾胃之濕芍藥除胃之濕熱四肢困倦茯苓能通水道走濕如發熱惡寒腹不痛加黃芩為主如未見膿而惡寒乃太陰欲傳少陰也加黃連為主桂枝佐之如腹痛甚加當歸倍芍藥如見血加黃連為主桂枝當歸佐之如煩躁或先便白膿後血或發熱或惡寒非黃連不能止上部血也如惡寒脈沉先血後便非地榆不能除下部血也如惡寒脈沉或腰痛或臍下痛非黃芩不能除中部血也如便膿血相雜而脈浮大慎勿以大黃下之下之必死謂氣下竭也而陽無所收凡陰陽不和惟以分陰陽之法治之又曰暴泄非陰久泄非陽有熱者脈疾身動聲亮暴注下迫此陽也寒者脈沉而細身困鼻息微者姜附湯主之身重不舉朮附湯主之渴引飲者是熱在膈上水多入則自胸膈入胃中胃本無熱因不勝其水胃受水攻故水穀一時下此證當灸大椎三五壯立已乃督脈瀉也如用藥使車前子雷丸白朮茯苓之類五苓散亦可又有寒泄者大腹滿而泄又有鶩溏者是寒泄也鶩者鴨也大便如水其中有少結糞者是也如此者當用天麻附子乾薑之類又法曰泄有虛實寒熱虛則無力不及拈衣便已泄出謂不能禁固也實則數至圊而不便俗云虛坐努責是也裡急後重皆依前法進退大承氣湯主之太陽病為挾熱痢涼膈散主之表證誤下因而下痢不止為挾熱痢陽明為痼瘕進退大承氣湯主之太陰濕勝濡瀉不可下而可溫四逆湯主之少陰蟄風不動禁固可澀赤石脂丸乾薑湯主之厥陰風泄以風治宜小續命湯消風湯主之少陽風氣自動大柴胡湯主之東垣曰胃氣和平飲食入胃精氣則輸於脾上歸於肺行於百脈而養榮衛也若飲食一傷起居不時損其胃氣則上升精華之氣反下降是為飧泄久則太陰傳少陰而為腸澼假令傷寒冷飲食腹滿而脹傳為飧泄者宜溫熱之劑以消導之傷濕熱之物而成膿血者宜苦寒之劑以內疏之風邪下陷者升舉之濕氣內盛者分利之裡急者下之後重者調之腹痛者和之洞泄腸鳴無力不及拈衣其脈細微而弱者溫之收之膿血稠黏數至圊而不能便其脈洪大而有力者下之寒之大抵治病當求其所因察何氣之勝取相剋之藥平之隨其所利而利之以平為期此治之大法也瀉痢久不止或暴下者皆太陰受病不可離甘草芍藥若不受濕則不痢故須用白朮是以聖人立法若四時下痢於芍藥白朮內春加防風夏加黃芩秋加厚朴冬加桂附然更詳外證寒熱處之如裡急後重須加大黃如身困倦須用白朮若自汗逆冷氣息微加桂附以溫之如或後重膿血稠黏雖在盛冬於溫藥內亦加大黃治五泄之法保命集云夫五泄之病其治法各不同者外證各異也胃泄者飲食不化色黃承氣湯脾泄者腹脹滿泄注食即嘔吐逆建中理中湯大腸泄者食已窘迫大便色白腸鳴切痛乾薑附子湯小腸泄者溲而便膿血少腹痛承氣湯大瘕泄者裡急後重數至圊而不能便莖中痛急利小便五泄之病胃小腸大瘕三證皆以清涼飲子主之其泄自止厥陰證加甘草以緩之少陰證裡急後重加大黃又有太陰陽明二證當進退大承氣湯主之太陰證不能食是也當先補而後瀉之乃進藥法也先煎厚朴半兩俱依本方制水一盞半煎至一半服若二三服後未已謂有宿食未消又加枳實二錢同煎服若二三服泄又未已如稍進食尚有熱毒又加大黃三錢推過泄止住藥如泄未止謂腸胃有久塵垢滑黏加芒硝半合宿垢去盡則愈也陽明證能食是也當先瀉而後補謂退藥法也先用大承氣湯五錢水一盞煎至七分稍熱服如利過泄未止去芒硝後稍熱退減大黃一半再煎兩服如熱氣雖已其人必腹滿又減去大黃與枳實厚朴湯又煎三兩服如腹滿退泄亦自愈後服厚朴湯數服則已王損庵云進退承氣法須審之脈證的知有積熱及形病俱實而後可下此以上雖出潔古家珍東垣活法機要而多出於河間保命集之文故其用藥於疏蕩為多觀者會其意毋泥其辭可矣論五泄之變無濕不成張子和曰天之氣一也一之用為風火燥濕寒暑故濕之氣一之一也相乘而為五變其化在天為雨在地為泥在人為脾甚則為泄故風而濕其泄也胃暑而濕其泄也脾燥而濕其泄也大腸熱而濕其泄也小腸寒而濕其泄也大瘕若胃不已變而為飧泄飧泄不已變而為洞泄洞泄不已變而為脾泄寒中此風乘濕之變也若脾泄不已變而為霍亂霍亂不已變而為注下注下不已變而為腫蠱此暑乘濕之變也若大腸泄不已變而為䐜脹䐜脹不已變而為腸鳴腸鳴不已變而為支滿鶩溏此燥乘濕之變也若小腸泄不已變而為腸澼腸澼不已變而為臟毒臟毒不已變而為前後便血此熱乘濕之變也若大瘕泄不已變而為脫肛脫肛不已變而為廣腸痛廣腸痛不已變而為乳痔腸風此寒乘濕之變也凡此二十五變若無濕則終不成疾況脾胃二土共管中州脾好飲脾亦惡濕此泄之所由生也凡下痢之脈微且小者生浮大者死水腫之脈反是浮大者生沉細者死夫病在裡脈沉在表脈浮里當下之表當汗之下痢而脈浮滑水腫者脈沉細表裡受病故不治也凡臟血便血兩手脈俱弦者死絕俱滑大者生血溫身熱者死王太僕則曰若下血而身熱血溫是血去而外逸也血屬火故也七日而死者火之成數也夫飧泄得之於風亦汗可愈或伏驚怖則膽木受邪暴下綠下蓋謂戊己見伐於甲木也嬰兒泄綠水素問有嬰兒風理亦如之洞泄者飧泄之甚但飧泄近於洞泄洞泄久則寒中溫之可也治法曰和之則可也汗之則不可蓋在腑則易治入臟則難攻洞泄寒中自腑而入臟宜和解而勿爭水腫之作者未遽而然也由濕遍於大腸小溲自澀水濕既瀦腫滿日倍面黃腹大肢體如泥濕氣周身難專一法越其高而奪其下發其表而滲其中酸收而辛散淡滲而苦堅用攻劑以救其甚緩劑以平其餘如是則孤精得氣獨魄反陽亦可保形陳莝去而淨腑潔矣彼豆蔻烏梅罌粟囊勿驟用也設病形一變必致大誤或通而塞或塞而通塞塞通通豈限一法世俗止知塞劑之能塞而不知通劑之能塞者拘於方也凡治濕皆以利小便為主諸泄不已宜灸水分穴謂水穀之所別也臍之上一寸半灸五七壯腹鳴如雷水道行之候也凡濕勿針內經雖云繆刺其處莫若以張長沙治傷寒法治之蓋泄者亦四時傷寒之一也仲景曰上湧而下泄表汗而里攻半在表半在裡則宜和解之表裡俱見隨證滲泄此雖以治傷寒其於治濕也同仍察脈以視深淺問年壯以視虛實所投必如其意矣頃商水縣白堤酒監軍昭信病飧泄逾年不愈此邑劉繼先命予藥之為桂枝麻黃湯數兩一劑而愈因作五泄圖摭難素本意書錄於上誠有望於後之君子論泄瀉滯下異狀丹溪云泄瀉之證水穀或化或不化並無努責惟覺困倦若滯下則不然或膿或血或膿血相雜或腸垢或無糟粕或糟粕相雜雖有痛不痛之異然皆裡急後重逼迫惱人卷二十二中泄瀉仲景下痢病脈證並治金匱云夫六腑氣絕於外者手足寒上氣腳縮五臟氣絕於內者利不禁甚者手足不仁下利脈沉弦者下重脈大者為未止脈微弱數為欲自止雖發熱不死下利手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負趺陽者為順也下利有微熱而渴脈弱者當自愈下利脈數有微熱汗出當自愈設脈緊為未解下利脈數而渴者當自愈設不瘥必圊膿血以有熱故也下利脈反弦發熱身汗者自愈下利氣者當利小便下利寸脈反浮數尺中自澀者必圊膿血下利清穀不可攻其表汗出必脹滿下利脈沉而遲其人面少赤身微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也下利後脈絕手足厥冷晬時脈還手足溫者生脈不還者死下利腹脹滿身體疼痛者必溫其里後攻其表溫里宜四逆湯攻表宜桂枝湯下利三部脈皆平按之心下堅者急下之宜大承氣湯下利脈遲而滑者實也利未欲止急下之宜大承氣湯下利脈反滑者當有所去下乃愈大承氣湯下利已瘥至半月日時復發者以病不盡故也當下之宜大承氣湯以上數承氣湯本虛者當別議下利譫語者譫之廉切音詹疾而寐語也有燥矢故也小承氣湯主之下利便膿血者桃花湯主之熱利下重者白頭翁湯主之下利後更煩按之心下濡者為虛煩也梔子豉湯主之下利清穀裡寒外熱汗出而厥者通脈四逆湯主之下利腹痛紫參湯主之乾嘔下利黃芩湯主之蔭按仲景此下利一章後世名醫諸書皆以為法古之所謂下利即今之所謂泄瀉也內有治傷寒數方仲景用治雜病今全錄之使後人知云治傷寒有法治雜病有方者非也傷寒雜病同一法矣論瀉分寒熱病機機要云臟腑瀉利其證多種大抵從風濕熱論是知寒少熱多寒則不能久也故曰暴瀉非陽久瀉非陰大便完穀下有寒有熱熱者脈疾多動音聲響亮暴注下迫此陽也寒者脈沉而細身不動作目睛不了了飲食不下鼻準氣息者姜附湯主之若身重四肢不舉朮附湯主之原病式曰瀉白為寒青黃赤紅黑皆以為熱也大抵瀉利小便清白不澀為寒赤澀者為熱又完穀不化而色不變吐利腥穢澄澈清冷小便清白不澀身涼不渴脈遲細而微者寒也穀雖不化而色變非白煩渴小便赤澀者熱證也凡穀消化者無問色及他證便為熱也寒泄而穀消化者未之有也或火性疾速而熱甚則傳化失常谷不能化而飧泄者亦有之矣仲景云邪熱不殺穀然熱得濕則飧泄也論瀉分三因三因嚴氏云泄瀉一證經中所謂洞泄飧泄溏泄溢泄火逼血而妄行故上溢於口鼻下泄於二便濡泄米穀注下是也所因有內外不內外差殊耳經云春傷於風夏必飧泄又云濕勝則濡泄寒甚則洞泄暑熱盛亦為泄至於七情感動臟氣不平亦致溏泄其如飲食不節過食生冷而成泄瀉者乃脾胃有傷也但停滯泄瀉一證直須積滯已消然後用以斷下藥今人往往便固止之多成痢疾者治法先理中焦次分利水穀治中不效然後斷下劉宗厚曰泄瀉一證古方率以為腸胃虛寒與風冷乘之為論故多行澀熱之劑彼瀉利者豈無積滯豈無熱證乎今觀病機機要所論有屬寒屬風濕屬火之證此因於外而傷者也又云厥陰經動並胃氣下降為瀉利三因所言七情感動臟氣不平亦致溏泄此則因於內而傷者也外則當調六氣內則當平五臟況又有飲食所傷腸胃停滯所致者治法各不同也然更有因胃氣下流而泄者在法則當升舉因風而成飧泄者則當解散因痰積於上焦以致大腸之不固而泄者又當去上焦之痰而不治其泄因脾胃氣虛而泄者又當補中益氣使胃氣升騰而泄自止蓋各求其本而治可也論瀉利有濕有熱有風有寒機要云有太陰經受濕而為水泄虛滑身重微滿不知穀味久則防變而為膿血脾經傳腎謂之賊邪故難愈若先利而後滑謂之微邪故易痊此皆脾土受濕之所為也有厥陰經下利不止其脈沉而遲手足厥逆膿血稠黏此難治宜麻黃湯小續命汗之此有表邪縮於內當瀉表邪而愈有暴下無聲身冷自汗小便自利大便不禁氣難布息脈微嘔吐以重藥溫之漿水散是也論瀉有濕有火有痰有食積有氣虛戴復庵云瀉水腹不痛者濕也腹痛瀉水腸鳴痛一陣瀉一陣者火也或瀉或不瀉者或多或少者痰也腹痛甚而瀉瀉後痛減者食積也飲食入胃輒後之完穀不化者氣虛也論濕兼風寒熱瀉戴氏曰飧泄者水穀不化而完出濕兼風也溏泄者漸下汙積黏垢濕兼熱也鶩泄者所下澄澈清冷小便清白濕兼寒也濡泄者體重軟弱泄下多水濕自甚也滑泄者久下不能禁固濕勝氣脫也羅謙甫曰內經云濕勝則濡泄甲乙經云寒氣客於下焦傳為濡泄夫脾者五臟之至陰其性惡寒濕今寒濕之氣內客於脾故不能裨助胃氣腐熟水穀致清濁不分水入腸間虛莫能制故洞泄如水隨氣而下謂之濡泄法當除濕利小便也治之以對金飲子此段言濕兼寒濕兼熱瀉用益元散參萸丸濕兼風見飧泄條論濕瀉準繩云濕多成五泄濕瀉脈濡細乃太陰經脾土受濕泄水虛滑身重微滿不知穀味口不渴久雨泉溢河溢或運氣濕土司令之時多有此疾宜除濕湯吞戊己丸佐以胃苓湯重者朮附湯統旨云濕瀉者坐臥濕虛或多飲水漿以致濕氣傷脾土不制水梅雨久陰多有此病宜胃苓湯丹溪云水瀉用蒼朮厚朴陳皮神麯茯苓豬苓澤瀉地榆甘草冬加乾薑等分瀉水多者仍用五苓散夏月水瀉桂苓甘露飲又云泄瀉注下用生料五苓散加蒼朮車前子倍白朮為末米湯調服燥濕四苓散加蒼白二術炒李氏曰濕瀉如水傾下腸鳴身重腹不痛外濕者胃苓湯除濕湯或朮附湯加茯苓內濕者白朮芍藥湯白朮茯苓湯二白丸風濕相搏者曲芎丸張子和云夫男子婦人病水濕瀉不止因服豆蔻烏梅薑附峻熱之劑遂令三焦閉溢水道不行水滿皮膚身體痞腫面黃腹大小便赤澀兩足按之陷而復起內經曰諸濕腫滿皆屬脾土可用獨聖散吐之如時月寒涼宜於暖室不透風處用火一盆以藉火力出汗次以導水禹功散量虛實瀉十餘行濕去腫減則愈矣是汗下吐三法齊行既汗下吐訖臟腑空虛宜以淡漿粥養腸胃二三日次服五苓散益元散同煎燈心湯調下如勢未盡更宜服神助散舊名葶藶散可以流濕潤燥分陰陽利小便不利小便非其法也既平之後宜大將息忌魚鹽酒肉果木房室等事如此三年則可矣如或不然決死而不救也此言水濕閉溢者宜汗下吐東垣曰予病脾胃久衰視聽半失此陰盛乘陽加之氣短精神不足此由弦脈令虛多言之過也皆陽氣衰弱不得舒伸伏匿於陰中耳癸卯歲六七月間淫雨陰寒逾月不止時人多病泄利一日予體重肢節疼痛大便泄並下者三而小便閉塞思其治法按內經標本論大小不利無問標本先利小便又云在下者引而竭之亦是先利小便也又云諸泄利小便不利先分別之又云治濕不利小便非其治也皆言當利小便必用淡味滲泄之劑以利之是其法也噫聖人之法雖布在方冊其不盡者可以意求耳今客邪寒濕之淫從外而入里以暴加之若從以上法度用淡滲之劑以除之病雖即已是降之又降是復益其陰而重竭其陽則陽氣愈削而精神愈短矣是陰重強陽重衰反助其邪之謂也故必用升陽風藥則瘥以羌活獨活柴胡升麻各一錢防風炙甘草各半錢㕮咀水煎稍熱服大法云濕寒之勝助風以平之又曰下者舉之得陽氣升騰而去矣又法云客者除之是因曲而為之直也聖人之法可以類推舉一而知百者也若不達升降浮沉之理而一概施治其愈者幸也此言脈強者直升陽除濕論寒瀉準繩云寒瀉脈沉細或弦遲身冷口不渴小便清白或腹中綿綿作疼宜理中湯附子溫中湯漿水散暴泄如水周身汗出一身盡冷脈沉而弱氣少而不能語甚者加吐此謂緊病宜以漿水散治之若太陽經傷動傳太陰下利為鶩溏大腸不能禁固卒然而下中有硬物欲起而又下欲了而又不了小便多清此寒也宜溫之春夏桂枝湯秋冬白朮湯理中湯治泄瀉加橘皮茯苓各一兩名補中湯若溏瀉不已者於補中湯內加附子一兩不喜飲食水穀不化者再加砂仁一兩共成八味仲景云下利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之用此加法則能理下焦矣戴云寒瀉寒氣在腹攻刺作痛洞下清水腹內雷鳴米穀不化者理中湯或附子補中湯吞大已寒丸或附子桂香丸畏食者八味丸原是冷瀉而煩躁引飲轉飲轉瀉者參附湯連理湯如寒瀉服上藥未效宜木香湯或姜附湯六柱湯吞震靈丹養氣丹手足厥逆者兼進硃砂丹藥食方入口而即下者名曰直腸難治如瀉已愈而精神未復舊者宜十補飲寒瀉腹中大疼服前藥外兼進乳豆丸服諸熱藥以溫中並不見效登圊不迭穢物隨出此屬下焦宜桃花丸三十粒訶梨勒丸以澀之按戴方多過於亢熱用者審之論暑熱瀉準繩云熱瀉脈數疾或洪大口乾燥身多動音聲響亮暴注下迫益元散加芩連燈心淡竹葉之屬泄而身熱小便不利口渴者益元散五苓散若火多四苓散加木通黃芩泄而困倦不小便者及脈數虛熱者宜參朮滑石苓通瀉而脈滑堅者實熱宜大承氣湯戴云熱瀉糞色赤黃彈響作疼糞門焦痛糞出穀道猶如湯熱煩渴小便不利宜五苓散吞香連丸凡瀉津液既去口必渴小便多是赤澀未可便作熱論的知熱瀉方用冷劑不然勿妄投以致增劇玉龍丸治一切伏暑泄瀉神效丹溪云濕熱甚下瀉如湯熱者五苓散去桂加黃芩梔子滑石木通之類李氏曰火瀉實火口渴喜冷痛一陣瀉一陣肛門焦痛其來暴速稠黏五苓散去桂加黃芩芍藥或黃芩湯加木通六一散兼嘔者加薑汁又火性急或米穀不化者薑汁炒黃連為丸服虛火氣虛不能泌別水穀者衛生湯陰虛火動不能凝聚者三白湯斂之久者升陰丸暑瀉如水煩渴尿赤暴瀉實者薷苓湯加黃連車前子或桂苓甘露飲虛者六和湯清暑益氣湯有潮熱者柴芩湯升麻葛根湯日久香連丸黃連阿膠丸來復丹子和云殷輔之父年六十餘暑月病泄瀉日五六十行自建碓鎮來請戴人於陳州其父喜飲水家人輩爭止之戴人曰夫暑月年老津液衰少豈可禁水但勸之少飲未及用藥先令速歸以綠豆雞卵十餘枚同煮卵熟取出令豆軟下陳粳米作稀粥攪令寒食雞卵以下之一二頓病減大半蓋粳米雞卵皆能斷痢然後制抑火流濕之藥調順而愈論冷熱瀉準繩云理中湯加茯苓黃連名連理湯用之多有奇功且如今當暑月若的知暑瀉自合用暑藥的知冷瀉自合用熱藥中間有一等盛暑又復內傷生冷非連理湯不可下泄無度泄後卻彈過響肛門熱小便赤澀心下煩渴且又喜冷此藥為宜若原是暑瀉經久下元虛甚日夜頻並暑毒之勢依然而瀉不已復用暑藥決不能取效便用薑桂輩又似難施疑似之間尤宜用此李氏曰似痢非痢寒熱不調之證或熱積於中而以冷物冷藥冰之或水積於中而以熱物熱藥壓之故熱與冷搏而成瀉或澀或溏裡急後重者戊己丸香連丸或理中湯加黃連木香論飧泄即風瀉準繩云飧泄水穀不化而完出者是也史記倉公傳迥風即此迥徒弄切音洞言風洞徹五臟也機要云夫脾胃同濕土之化主腐熟水穀胃氣和平飲食入胃精氣則輸於脾土歸於肺行於百脈而成榮衛若飲食一傷起居不時損其胃氣則上升精華之氣反下降是為飧泄久則太陰傳少陰而為腸澼此論胃氣下降為飧泄又云春宜緩形形緩動則肝木乃榮反靜密則是行秋令金能制木風氣內藏夏至則火盛而金去獨火木旺而脾土損矣輕則飧泄身熱脈洪谷不能化重則下利膿血稠黏良方云經云春傷於風夏必飧泄蓋風喜傷肝春時木旺不受邪反移氣克於脾土脾既受克不能運化因成積滯夏秋之間再感暑濕風冷之氣發動而成利也此論春傷於風夏必飧泄羅謙甫曰經云清氣在下則生飧泄又云久風入中則為腸風飧泄夫脾胃土也氣衝和以化為事今清氣下降而不升則風邪久而干胃是木賊土也故沖和之氣不能化而令物完出謂之飧泄或飲食太過腸胃所傷亦致米穀不化此俗呼水穀利也法當下者舉之而消克之也以加減木香散主之東垣曰清氣在下者乃人之脾胃氣衰不能升發陽氣故用升麻柴胡助甘辛之味以引元氣之升不令下陷為飧泄也又曰凡泄則水穀不化謂之飧泄是清氣在下乃胃氣不升上古聖人皆以升浮藥扶持胃氣一服而愈知病在中焦脾胃也脈訣曰濕多成五泄濕者胃之別名也病本在胃真氣弱真氣者穀氣也不能克化飲食乃濕盛故也以此論之正以脾胃之弱故也初病奪食或絕不食一二日使胃氣日勝泄不作也今已成大泄矣經云治濕不利小便非其治也又云下焦如瀆又云在下者引而竭之唯此證不宜此論其病得之於胃氣下流清氣不升陽道不行宜升宜舉不宜利小便靈樞云頭有疾取之足謂陽病在陰也足有疾取之上謂陰病在陽也中有疾旁取之旁者少陽甲膽是也中者脾胃也脾胃有疾取之足少陽甲膽者甲風是也東方春也胃中谷氣者便是風化也作一體而認故曰胃中濕勝而成泄瀉宜助甲膽風勝以克之又是升陽助清氣上行之法也又一說中焦元氣不足溲便為之變腸為之苦鳴亦緣胃氣不升故令甲氣上行又云風勝濕也大抵此證本胃氣弱不能化食奪食則一日而可止夫奪食之理為胃弱不能克化食則為泄如食不下何以作泄更當以藥滋養元氣令和候泄止漸與食胃勝則安矣若食不化者於升陽風藥內加炒曲同煎兼食入頓至心頭者胃之上口也必口沃沫或食入反出皆胃口停寒其右手關脈中弦按之洪緩是風熱濕相合穀氣不行清氣不升為弦脈之寒所隔故不下也曲之熱亦能去之若反胃者更加半夏生薑入於風藥內同煎奪食少食欲使胃氣強盛也若藥劑大則胃不勝藥泄亦不止當漸漸與之今病既久已至衰弱當以常法治之不可多服餌也人之肉如地之土豈可人而無肉故肉消盡則死矣消瘦之人有必死者八內經有七外經有一又病肌肉去盡勿治之天命也如肌肉不至瘦盡當急療之宜先奪食而益胃氣便與升陽先助真氣次用風藥勝濕以助升騰之氣病可已矣余皆勿論此治之上法也此段論治飧泄宜奪食藥用升陽除濕湯之類是也準繩曰春傷於風夏生飧泄木在時為春在人為肝在天為風風者無形之清氣也當春之時發為溫令反為寒折是三春之月行三冬之令也以是知水為太過矣水既太過金肅愈嚴是所勝者乘之而妄行也所勝者乘之則木虛明矣故經曰從後來者為虛邪木氣既虛火令不及是所生者受病也故所不勝者侮之是以土來木之分變而為飧泄也故經曰清氣在下則生飧泄以其濕令當權故飧泄之候發之於夏也若當春之時木不發生溫令未顯止行冬令是謂傷衛以其陽氣不出地之外也當以麻黃湯發之麻黃味苦味之薄者乃陰中之陽也故從水中補木而瀉水發出津液為汗也若春木既生溫令已顯陽氣出於地之上寒再至而復折之當以輕發之謂已得少陽之氣不必用麻黃也春傷於風夏生飧泄所以病發於夏者以木絕於夏而土旺於長夏濕本有下行之體故飧泄干夏也不病於春者以其春時風雖有傷木實當權故飧泄不病於木之時而發於濕之分也經曰至而不至是為不及所勝妄行所不勝者薄之所生者受病此之謂也準繩云仲景法下利清穀裡寒外熱汗出而厥者通脈四逆湯主之河間法飧泄風冷入中泄利不止脈虛而細日夜數行口乾腹痛不已白朮湯主之東垣云泄利飧泄身熱脈弦腹痛而渴及頭痛微汗宜防風芍藥湯東垣所云內動之風也經云春傷於風夏生飧泄又云久風為飧泄又云虛邪之中人也始於皮膚留而不去傳舍於絡脈留而不去傳舍於經留而不去傳舍於輸留而不去傳舍於伏沖之脈留而不去傳舍於腸胃在腸胃之時賁響腹脹多寒則腸鳴飧泄食不化則非內動之風也潔古云大渴引飲多致水穀一時下者宜灸大椎三五壯或用車前子雷丸白朮茯苓及五苓散等藥淡滲之又如久風為飧泄者則不飲水而完穀出治法當以宣風散導之後服蒼朮防風湯張子和云飧泄以風為根風非汗不出有病此者腹中雷鳴泄注水穀不分小便澀滯皆以脾胃虛寒故耳服豆蔻烏梅粟殼乾薑附子曾無一效中脘臍下灸已數千燥熱轉甚津液涸竭瘦削無力飲食減少延予視之予以應象論曰熱氣在下水穀不分化生飧泄寒氣在上則生䐜脹而氣不散何也陰靜而陽動故也診其脈兩手皆浮大而長身表微熱用桂枝麻黃湯以薑棗煎大劑連進三服汗出終日至旦而愈次以胃風湯和其臟腑調養陰陽食進而愈趙明之米穀不消腹作雷鳴自五月至六月不愈諸醫以為脾受大寒故並用聖散子豆蔻丸雖止一二日藥力盡而復作諸醫不知藥之非反責明之不忌口戴人至而笑曰春傷於風夏必飧泄者米穀不化而直過下出也又曰米穀不化熱氣在下久風入中中者脾胃也風屬甲乙脾胃屬戊己甲乙能克戊己腸中有風故鳴經曰歲木太過風氣流行脾土受邪民病飧泄診其兩手脈皆浮數為病在表也可汗之直斷曰風隨汗出以火二盆暗置床之下不令病人見火恐增其熱紿之入室使服湧劑以麻黃投之乃閉其戶從外鎖之汗出如洗待一時許開戶減火一半須臾汗止泄亦止此治風泄之法也水自內出宜炙宜滲風從外入宜下宜表準繩云經云脾虛則腹滿腸鳴泄食不化又云飧泄取三陰三陰者太陰也宜補中益氣湯以白芍藥代當歸主之又云腎藏志志有餘腹脹飧泄必傷筋血又云肝足厥陰之脈所生病者胸滿嘔逆飧泄視盛虛寒熱陷下施法此皆內因無風者也論氣瀉準繩云氣瀉腸鳴氣走胸膈痞悶腹急而痛瀉則腹下稍可須臾又急亦有腹急氣塞而不通者此由中脘停滯氣不流轉水穀不分所致戴法用大七香丸入米煎服久而不愈者五膈寬中散吞震靈丹仍佐以米飲調香附末調氣散金匱訶梨勒散治氣利論痰瀉統旨云痰瀉者或瀉或不瀉或多或少糞稠黏如膠者是也宜導痰湯去枳殼加蒼白二術或海石丸準繩云痰瀉二陳湯海石青黛黃芩神麯薑汁竹瀝為丸每服三五十丸少者必用吐法吐之方愈李氏曰痰瀉因痰流肺中以致大腸不固二陳湯加白朮神麯實者海青丸虛者六君子湯一男子夜數如廁或教以生薑一兩碎之半夏湯洗與大棗各三十枚水一升瓷瓶中慢火燒為熟水時時呷之數日便已論積滯瀉準繩云積滯泄瀉腹必刺痛方泄者是也或肚腹滿按之堅者亦是也受病淺者宜神麯之類消導之病深而頑者必用進退承氣之類下之方安論飲食瀉準繩云傷食瀉因飲食過多脾胃之氣不足以運化而瀉其人必噫氣如敗卵臭宜治中湯加砂仁半錢麴櫱枳朮丸或七香丸紅丸子雜服食積腹痛而瀉不可遽用治中兜住宜先用消導推蕩之藥或因食一物過傷而瀉後復食之即瀉者以脾為所傷未復而然宜大健脾湯寒者可用仍燒所傷之物存性為末三五錢調服因食冷物停滯傷脾脾氣不暖所傷之物不能消化瀉出而食物如故宜治中湯加乾葛吞酒煮黃連丸有脾氣久虛不受飲食者食畢即腸鳴腹急盡下所食之物方快不食則無事俗名錄食瀉經年累月宜快脾丸因傷於酒每晨起必瀉者宜理中湯加乾葛吞酒煮黃連丸或葛花解酲湯吞之因傷面而瀉者養胃湯加萊菔子炒研一錢痛者更加木香五分瀉甚者去藿香加炮姜如其數論脾虛瀉丹溪云脾瀉當補脾氣健運復常用炒白朮四兩炒神麯三兩炒芍藥三兩半冬月及春初加肉豆蔻去芍藥或湯或丸服如瀉水腹不痛者屬氣虛宜四君子湯倍白朮黃耆升麻柴胡防風之類補以提之而愈準繩云氣虛瀉用四君子湯加曲蘖升麻吞二神加木香丸李氏曰虛瀉困倦無力脾虛飲食所傷有遇飲食即瀉者四君子湯加木香砂仁蓮肉陳糯米為末砂糖調服久者只加升麻白芍藥或平胃蒜肚丸有停蓄飲食數日乃泄腹脹者名濕瀉枳朮丸沒石子丸煩渴或兼嘔者錢氏白朮散參苓白朮散食少腸鳴四肢困倦者升陽除濕湯日止夜瀉者啟脾丸論脾腎虛瀉李云脾瀉久傳腎為腸澼經年不愈者調中健脾丸老人脾腎虛瀉者用吳茱萸鹽水浸透以豶豬臟頭一截洗去脂膜將茱萸入內扎兩頭蒸爛搗丸綠豆大每五十丸米湯下暖膀胱清水道固大腸進飲食腎虛色欲所傷瀉多足冷久則肉消五鼓臍下絞痛或只微響溏瀉一次者吳茱萸散二神丸四神丸陽虛者三味安腎丸金鎖正元丹養氣丹陰虛者腎氣丸準繩云每日五更即泄瀉有酒積有寒積有食積有腎虛俗呼脾腎泄有人每早須大泄一行或腹痛或不腹痛空心服熱藥亦無效有人教以夜食前又進熱藥一服遂安如此常服愈蓋暖藥雖平旦服之至夜力已盡無以敵一夜陰氣之故也有人每五更將天明時必溏利一次有人云此名腎泄服五味子散頓愈有人久泄早必泄一二行泄後便輕快脈滑而少弱先予厚朴和中丸五十丸大下之後以白朮為君枳殼半夏茯苓為臣厚朴炙甘草芩連川芎滑石為佐吳茱萸十餘粒為使生薑煎服十餘帖而愈戴云有每日五更初洞瀉服止瀉藥並無效米飲下五味丸或專以北五味煎飲雖節省飲食大段忌口但得日間上半夜無事近五更其瀉復作此病在腎分水飲下二神丸及椒樸丸或平胃散下小茴香丸二神丸合五味子散名為四神丸治瀉尤妙論肝虛瀉李氏云肝虛忿怒所傷木克脾土門戶不束厥而面青當歸厚朴湯或熟料五積散去麻黃汗多者黃耆建中湯論暴瀉子和云夫暴注瀉水不已內經曰注下也注下水利也暴速甚者屬火宜用水調甘露飲五苓益元散或以長流水煎放冷涼服涼膈通聖亦能治之慎不可驟用罌粟殼乾薑豆蔻之類縱瀉止亦轉生他疾止可分陰陽利水道而已蔭按暴注瀉水屬火是矣而機要復云暴下無聲身冷自汗小便自利氣難布息宜以漿水散重藥溫之則知暴瀉有熱有寒要在辨其有聲無聲與身之冷熱氣之長短不可差也論虛滑久瀉東垣云中焦氣弱脾胃受寒冷大便滑泄腹中雷鳴或因誤下末傳寒中復遇時寒四肢厥逆心胃絞痛冷汗不止此腎之脾胃虛也沉香溫胃丸治之薛氏曰滑瀉若脾胃虛寒下陷者用補中益氣湯加木香肉豆蔻補骨脂若脾氣虛寒不禁者用六君子湯加炮薑肉桂若命門火衰脾土虛寒者用八味丸若脾腎氣血俱虛者用十全大補湯送四神丸若大便滑利小便閉澀或肢體漸腫喘嗽唾痰為脾胃虧損宜金匱加減腎氣丸準繩云保命集云虛滑久而不止者多傳變為利太陰傳少陰是為鬼邪先以厚朴枳實湯防其傳變按此法實者用之虛者不若四神丸實腎之為得也收澀之劑固腸丸訶子散皆治熱滑扶脾丸桃花丸訶子丸赤石脂禹餘糧湯皆治寒滑瀉已愈至明年此月日時復發者有積故也脾主信故至期復發熱積大承氣湯寒積感應丸虛者以保和丸加三稜蓬朮之屬投之統旨云瀉已愈及期年而復發者有積故也宜下之久瀉不愈則胃氣下流男子最忌宜大補脾胃加升麻防風以提其下陷之氣丹溪云脾瀉已久大腸不禁此脾氣已脫宜急澀之以赤石脂肉豆蔻乾薑之類久病大腸氣泄用熟地黃半兩炒白芍藥知母各三錢升麻乾薑各二錢炙甘草一錢為末粥丸服之仍用艾炷如麥粒於百會穴灸三壯如久瀉穀道不合或脫肛此元氣下陷及大腸不行收令而然用白朮芍藥神麯陳皮肉豆蔻訶子肉烏梅為丸以四君子湯加防風升麻煎湯送下論泄而小便不利準繩云小便不利而泄若津液偏滲於大腸大便瀉而小便少者用胃苓散分利之若陰陽已分而小便短少此脾肺氣虛不能生水也宜補中益氣湯加麥門五味陰火上炎而小便赤少此肺氣受傷不能生水也用六味地黃丸加麥門五味腎經陰虛陽無所生而小便短少者用滋腎丸腎氣丸腎經陽虛陰無所化而小便短少者用益氣湯六味丸若誤用滲泄分利復傷陽氣陰無所生而小便益不利則腫脹之證作而疾危矣凡大便泄服理中湯小便不利大便反泄不知氣化之過本肺不傳化以純熱之藥治之是以轉泄少服則不止多服則愈熱所以不分若以青皮陳皮之類治之則可經云膀胱者州都之官津液藏焉氣化則能出矣論泄而口渴引飲準繩云泄而口渴引飲此為津液內亡用錢氏白朮散或補中益氣湯腎水不足之人患泄或過服分利之劑而渴者加減八味丸失治必變小便不利水腫脹滿等危證矣論溢飲羅謙甫云水漬入胃名為溢飲滑泄渴能飲水水下復泄泄而大渴此無藥證當灸大椎此第一椎下陷中手足三陽督脈之會針五分留三呼泄五吸灸以年為壯論治瀉忌用澀藥丹溪云世俗類用澀藥治瀉若積久而虛者或可用之若初得者必變他證為禍不小殊不知瀉多因於濕惟分利小水最為上策論治瀉用吐汗下三法子和云一講僧病泄瀉數年丁香豆蔻乾薑附子官桂烏梅等燥藥燔針燒臍焫腕無有闕者一日發昏不省戴人診兩手脈沉而有力脈訣云下利微小者生脈洪浮大者無瘥以瓜蒂散湧之出寒痰數升又以無憂散泄其虛中之積及燥糞盈斗次以白朮調中湯五苓散益元散調理數日遂起又一僧初聞家遭兵革心氣不足又為寇賊所驚臟腑不調後入京不伏水土以至危篤前後三年八仙丸鹿茸丸燒肝散皆服之不效乃求藥於戴人戴人曰此洞泄也以謀慮久不決而成肝主謀慮甚則乘脾久思則脾濕下流乃上湧痰半盆末後有血數點肝藏血故也又以舟車丸浚川散下數行仍使澡浴出汗自爾日勝一日常以胃風湯白朮散調養之一月而強食復故又李德卿妻因產後病泄一年餘四肢瘦乏諸醫皆斷為死證戴人曰兩手脈皆微小乃痢病之生脈況洞泄屬肝經肝木剋土而成此疾亦是腸澼澼者胃中有積水也先以舟車丸四五十粒又以無憂散三四錢下四五行人皆駭之病羸如此尚可過耶復以導飲丸又導之渴則調以五苓散向晚使人伺之已起而緝床前後約三四十行以胃風湯調之半月而能行一月而安健又劉德源病洞泄逾年食不化肌瘦力乏行步欹傾面色黧黑舉世治痢之藥皆用之無效戴人往問之乃出內經洞泄之說雖不已疑然畏其攻劑夜焚香禱神戴人先以舟車丸無憂散下十餘行殊不困已頗喜食後以檳榔丸磨化其滯待數日病已大減戴人以為去之不盡當再服前藥德源亦欣然請下之又下五行次後數日更以苦劑越之往問其家彼云已下村中收索去也蔭按宗厚曰子和為治大率多用此三法洞泄一證縱其果有積滯鬱結之甚元氣壯實者亦不宜驟用此三法況有積滯雖甚而元氣尤虛者或設使果當用此三法亦當如仲景察證以辨其吐汗下有可不可之殊況仲景治利又有合下合溫之法焉此得非猛浪乎論治瀉活法趙以德云昔聞先生言泄瀉之病其類多端得於六淫五邪飲食所傷之外復有雜合之邪似難執法而治乃見先生治氣暴脫而虛頓瀉不知人口眼俱閉呼吸微甚殆欲絕者急灸氣海飲人參膏十餘斤而愈治陰虛而腎不能司禁固之權者峻補其腎治積痰在肺致其所合大腸之氣不固者湧出上焦之痰則肺氣下降而大腸之虛自復矣治憂思太過脾氣結而不能升舉陷入下焦而成泄瀉者開其鬱結補其脾胃使穀氣升發也凡此之類不可枚舉因問先生治病何其神也先生曰無他圓機活法具在內經熟之自得之矣李氏曰凡瀉皆兼濕初宜分理中焦滲利下焦久則升舉必滑脫不禁然後用藥澀之其間有風勝兼以解表寒勝兼以溫中滑脫澀住虛弱補益食積消導濕則淡滲陷則升舉隨證變用又不可拘於次序與痢大同且補虛不可純用甘溫太甘則生濕清熱亦不可太苦苦則傷脾每兼淡滲利竅為妙子和云昔聞山東楊先生者治府主洞泄不止楊初對病人與眾人談日月星辰躔度及風雷雲雨之變自辰至未而病者聽之忘其圊楊嘗曰治洞泄不已之人先問其所愛之事好棋者與之棋好樂者與之笙笛勿輟蔭按此治脾泄之法也脾有所嗜則氣自聚氣聚則足以收攝虛脫故泄自止耳診法素問云胃脈虛則泄尺寒脈細謂之後泄尺膚寒其脈小者泄少氣泄而脈大者難治病泄脈洪大是逆也靈樞云大便赤瓣飧泄脈小者手足寒難已飧泄脈小手足溫易已腹鳴而滿四肢清泄其脈大是逆也如是者不過十日死矣腹大脹四肢清脫形泄是逆也如是者不及一日死矣仲景診法詳見前脈經云脈滑按之虛絕者其人必下痢肺脈小甚為泄腎脈小甚為洞泄泄注脈緩時小結者生浮大數者死洞泄食不化不得留下膿血脈微小留連者生緊急者死內經曰脈細皮寒少氣泄利前後飲食不入是為五虛死其漿粥入胃泄注止則虛者活若用參朮膏早救之亦有生者脈訣云下利微小則為生脈大浮洪者無瘥日脈訣舉要曰夏月泄瀉脈應暑濕決而數溲脈必虛極治暑濕瀉分利小便虛脫固腸罔或不痊樓氏曰在下則泄瀉不止在上則吐痰不已者皆死蓋氣脫無所管攝故也治濕瀉方燥濕湯白朮二錢白芍藥白茯苓各一錢半澤瀉車前子各一錢甘草五分上銼水煎服水濕瀉加蒼朮傷食停飲加神麯麥芽山楂腹中窄狹飽悶加厚朴枳實木香小便赤澀加豬苓木通炒梔子燥渴引飲加乾葛石膏麥門冬酒積腸中濕熱暴下加黃連蒼朮黃疸加茵陳炒山梔木通冷瀉作痛加木香砂仁山楂炮乾薑久泄胃氣下陷加人參黃耆升麻柴胡久瀉虛滑不禁加肉豆蔻訶子煨木香清晨溏瀉加破故紙茴香肉豆蔻夏月加香薷厚朴勝濕加防風白芷羌活夏秋之間濕熱大行暴注水泄炒黃連蒼朮升麻木通胃苓湯一名對金飲子治脾濕太過胃氣不和腹痛泄瀉水穀不化陰陽不分此平胃散與五苓散合方也蒼朮厚朴陳皮茯苓豬苓澤瀉各一錢白朮一錢官桂甘草各五分上銼加生薑三片棗二枚水煎食遠溫服有熱加薑汁炒黃連一錢口渴加葛根一錢泄瀉注下如水倍加蒼朮白朮加車前子為末空心米湯調下濕熱甚肛門如熱湯者去桂加滑石末二錢黃芩山梔炒各一錢木通八分腹中痛下痢冷喜熱手燙熨口不燥渴者乃寒瀉也三倍桂加肉豆蔻麵裹煨一錢甚者加製附子丁香各八分作丸服平胃散治傷濕泄瀉蒼朮炒三錢厚朴薑製陳皮各二錢甘草炙一錢上作一服加生薑三片紅棗二枚水煎不拘時服如小便赤澀加白茯苓澤瀉如米穀不化飲食傷多加枳實如胸中氣不快心下痞氣加枳殼木香如脾胃困弱不思飲食加人參黃耆如心下痞悶加厚朴減甘草如遇夏加炒黃芩如遇雨水濕潤時加茯苓澤瀉如有痰涎加半夏陳皮如滑脫泄瀉加肉豆蔻如白痢加吳茱萸如赤痢加黃連如胃寒嘔吐加生薑一法加茯苓丁香如氣不舒快中脘痞塞加砂仁香附如飲食進退加神麯麥芽五苓散治泄瀉水多者分利陰陽白茯苓豬苓澤瀉白朮官桂各一錢上為末溫水調服或煎服一方加車前子一方加蒼朮車前子倍白朮一方加人參滑石甘草瀉濕四苓散白朮三分加至一兩半澤瀉一兩茯苓豬苓各五錢蒼朮五錢上銼水煎服甚者二術必用炒芍藥和中湯治男婦泄瀉腹疼兼痢疾紅白蒼朮白朮各一錢厚朴八分白芍藥澤瀉豬苓赤茯苓各七分甘草五分官桂三分見紅白不用上銼加生薑二片棗一枚水煎食遠服白朮茯苓湯治濕瀉又治濕熱食瀉白朮炒白茯苓各五錢上銼水煎服一方有芍藥等分名白朮散白朮芍藥湯機要治太陰脾經受濕水瀉注下體重微滿困弱無力不欲飲食暴泄無數水穀不化先宜和之白朮炒芍藥炒各四錢甘草炒二錢俱炒黃效速上銼水煎服以上二方和中除濕利水三白之妙用如此凡瀉之要藥也蒼朮芍藥湯治泄瀉腹痛甚者蒼朮芍藥各一兩黃芩半兩上銼每服一兩入淡桂半錢水煎服此解散濕熱上中二焦之劑太陰經之藥也升陽除濕湯東垣治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便黃色四肢困弱經云自下而上者引而去之蒼朮炒一錢五分防風升麻柴胡澤瀉豬苓神麯炒各一錢陳皮麥蘖炒甘草炙各八分上銼一服薑棗煎食後熱服如脾胃寒腸鳴加益智仁半夏各一錢非腸鳴不用一方有羌活戊己丸和劑治脾胃不足濕熱乘之泄瀉不止米穀不化黃連去須吳茱萸炒去梗白芍藥炒各三兩上為末麵糊丸如桐子大每服五七十丸空心米飲下日三服堅中丸治脾胃受濕滑泄注下白朮赤茯苓澤瀉黃連黃柏各一兩人參白芍藥陳皮肉豆蔻官桂半夏曲各半兩上為末酒浸蒸餅為丸如桐子大每服五七十丸溫米飲下食前服一方止水瀉並婦人白帶白水極驗白茯苓三兩風化石灰一兩上為末糊丸如桐子大每服二三十丸空心米飲下一方治小瀉用草烏半生半燒灰存性為末醋丸空心井花水下七丸治寒瀉方理中湯治臟腑停寒泄瀉不止人參白朮乾薑炮甘草炙各一錢上銼水煎服泄瀉加橘紅茯苓各一錢溏瀉不已加附子不喜飲食水穀不化加砂仁共成八味桂枝湯治內寒泄瀉春夏宜之桂枝芍藥炒白朮各半兩甘草炙二錢上銼每服半兩水一盞煎七分去渣溫服白朮散治內寒暴瀉秋冬宜之白朮芍藥煨各三錢乾薑炮半兩甘草炙二錢上為粗末每服半兩水煎服甚則除去乾薑加附子三錢謂辛能發散也四桂散濟生治元臟氣虛真陽耗散臍腹冷痛泄瀉不止人參白茯苓附子炮木香各一兩上㕮咀每服三錢水一盞半生薑五片鹽少許煎七分空心溫服滑泄不止加肉豆蔻訶子名六柱散活人書有白朮無訶子漿水散潔古治暴泄如水周身汗出一身盡冷脈沉而弱氣少而不能語甚者加吐此謂緊病宜以此治之半夏二兩良薑二錢半乾薑肉桂甘草炙附子炮各五錢上為細末每服三五錢水煎熱服甚者三四服參附湯得效治冷瀉煩躁引飲轉飲轉瀉人參一兩附子炮半兩上銼每服半兩水二盞生薑十片煎八分溫服無時通脈四逆湯金匱治下利清穀裡寒外熱汗出而厥者附子大一枚生用乾薑三兩強者四兩甘草炙二兩上三味以水三升煮取一升一合去渣分溫再服人參豆蔻散治脾胃虛寒臟腑滑泄人參白朮茯苓甘草炙乾薑煨肉豆蔻煨訶子煨藿香木香各等分上銼每服五錢水煎食前溫服八味湯楊氏治脾胃虛寒氣不升降心腹刺痛臟腑虛滑人參當歸洗焙陳皮肉桂木香丁香各一兩吳茱萸湯泡七次乾薑炮各二兩上銼每服四錢水煎溫服附子溫中湯治中寒腹痛自利米穀不化脾胃虛弱不喜飲食懶言困倦嗜臥附子炮去皮臍乾薑炮各七錢人參甘草炙白芍藥白茯苓白朮各五錢厚朴薑製草豆蔻麵裹煨陳皮各三錢上銼每服五錢或一兩加生薑五片水煎食前溫服實腸散治泄瀉不止肉豆蔻煨訶子炮縮砂陳皮蒼朮炒茯苓各一兩厚朴一兩半木香半兩甘草炙四錢上㕮咀每服三錢薑棗煎服手足冷者加乾薑當歸散治腸胃寒濕濡瀉腹中㽲刺疼痛當歸切焙乾薑炮肉豆蔻炮木香各半兩訶黎勒炮去核黃連去須炒各七錢半上為細末每服三錢用甘草生薑各一分黑豆一合半生半炒水四盞煎作二盞作二次空心日午調服木香散和劑治脾胃虛弱內挾風冷泄瀉注下水穀不化臍腹㽲痛腹中雷鳴及積寒久痢腸滑不禁木香丁香當歸去蘆酒焙肉豆蔻炮甘草炙各二兩附子去皮臍醋煮切片焙赤石脂各一兩藿香葉洗焙四兩訶子皮一兩五錢上為末每服一錢水一盞半生薑二片棗一枚煎六分空心溫服木香散治臟腑虛寒下泄米穀口舌生瘡或嘔吐不食木香破故紙炒各一兩白朮橘紅赤芍藥炒桂心各半兩厚朴制良薑縮砂炒各三錢胡椒吳茱萸泡各一錢肉豆蔻煨檳榔各一個上為末每服三錢用豬肝四兩批薄以藥摻拌量入水醋鹽蔥煮乾空心頓食或丸桐子仁每服百丸粥飲下日三服大藿香散治脾胃虛寒嘔吐霍亂心腹撮痛泄瀉不已最能取效藿香葉去土二兩陳皮去白厚朴薑汁炒青皮去白炒木香人參肉豆蔻麵煨良薑炒大麥芽炒神麯炒訶子煨去核白茯苓甘草炙各一兩白乾薑炮半兩上為末每服四錢吐逆泄瀉不下食或嘔酸苦水用水一大盞煨生薑半塊鹽一捻煎服水泄滑泄腸氣臟毒陳米飲入鹽熱調下赤白痢甘草黑豆湯下脾胃虛冷宿滯酒食痰氣作暈入鹽少許嚼薑棗湯熱服胃氣咳逆生薑自然汁一呷入鹽點服此藥大能消食順氣利膈開胃調中散治虛寒停食嘔吐腸鳴泄瀉藿香葉砂仁蓬朮煨乾薑炮肉桂去粗皮茴香炒草果麥芽炒益智仁橘紅各一錢蒼朮炒神麯炒桔梗各一錢半甘草炙三分上作一服加生薑三片棗一枚水煎入鹽少許溫服玉粉散治冷極泄瀉久作滑腸不禁不思飲食紅豆大附子炮去皮臍乾薑炮各半兩舶上硫黃另研二錢半上為末每服二錢空心半稀半稠粟米飲下至晚又一服重者十服輕者三五服安赤石脂禹餘糧湯仲景治大腸泄瀉服理中湯益甚者利在下焦也此湯主之赤石脂制禹餘糧制各一兩上銼碎分三服每服水一盞半煎至八分去渣溫服補脾丸治滑泄不禁白朮赤石脂肉豆蔻麵裹煨厚朴薑製白姜炮各一兩蓽撥附子炮神麯炒麥蘖炒各半兩上為末醋糊丸如桐子大每服五十丸空心米飲下扶脾丸治脾胃虛寒腹中痛溏泄無度飲食不化白朮茯苓甘草炙訶子皮烏梅肉半夏各二錢神麯炒麥蘖炒各四錢陳皮一錢乾薑肉桂紅豆各五分上為末荷葉裹燒飯為丸如桐子大每服五十丸食前溫水下一方加藿香一錢蔻附丸治元氣不足臟寒泄瀉肉豆蔻麵煨白茯苓各四兩木香不見火二兩乾薑炮附子煨各一兩上為細末薑汁糊丸如桐子大每服五六十丸食前蓮子湯下縮砂丸治大