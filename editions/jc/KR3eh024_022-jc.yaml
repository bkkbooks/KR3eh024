辛甘草炙各五分上銼一服加生薑三片水煎服如欲汗加蔥白三莖胃風湯治風冷乘虛入客腸胃米穀不化泄瀉注下及腸胃濕毒下如豆汁或下瘀血或如魚腦日夜無度久不得愈者人參白朮茯苓當歸川芎芍藥肉桂各等分上銼每服八錢入粟米一撮水煎服如腹痛加木香補本丸蒼朮小椒去目炒各一兩上為細末醋糊丸如桐子大每服五十丸食前水下曲芎丸治脾胃中風濕臟腑滑泄神麯川芎白朮附子炮各等分上為末麵糊丸如桐子大每服三五十丸米飲下蔭按左氏述楚子圍蕭蕭將潰無社告申叔展曰有曲乎有山鞠藭乎鞠藭芎藭也意欲令逃水中以避禍是知芎藭能除濕當加朮附以制之若脾濕而瀉者萬無不中亦治飧泄加減木香散治脾氣下陷谷水不化謂之飧泄木香良薑升麻檳榔人參各二錢半神麯炒二錢肉豆蔻煨吳茱萸炮乾薑炮陳皮砂仁各等分上為細末每服四錢水煎服宜加白朮白朮湯治飧泄風冷入中泄利不止脈虛而細日夜數行口乾腹痛不已白朮二錢當歸厚朴薑製各一錢龍骨艾葉各五分上為末加生薑三片水煎空心服宣風散檳榔二個牽牛四兩半生半炒陳皮甘草各五錢上為末每服三五分蜜湯調下吳茱萸散治腸痹寒濕內搏腹滿氣急大便飧泄吳茱萸湯泡焙炒肉豆蔻乾薑炮甘草炙各半兩縮砂仁陳曲炒白朮各一兩厚朴薑汁炙陳皮去白焙良薑各二兩上為細末每服一錢食前用米飲調服草豆蔻散治腸痹風寒濕內攻腹痛飧泄草豆蔻陳皮去白各一兩官桂白豆蔻仁肉豆蔻當歸木香白朮丁香良薑各半兩上為細末每服一錢食前生薑棗湯調服治氣瀉方五膈寬中散治中脘停滯氣不流轉胸膈痞悶腹痛泄瀉久而不愈厚朴薑汁炙香附子炒各一斤甘草五兩陳皮去白青皮去白縮砂仁丁香各四兩木香三兩白豆蔻去皮二兩上為細末每服二錢姜三片鹽少許沸湯點服不拘時訶黎勒散金匱治氣利訶黎勒十枚上一味為散粥飲和頓服治痰瀉方倍術陳湯治濕痰流注泄瀉白朮倍用半夏陳皮茯苓各一錢甘草五分上銼加生薑三片水煎服一方加神麯加減導痰湯治痰瀉半夏南星橘紅茯苓蒼朮白朮各一錢甘草五分上銼加生薑煎服海石丸治痰積泄瀉海石一兩青黛三錢黃芩二錢神麯一兩留半煮糊丸上為末糊丸桐子大每服三五十丸病少者必用吐法吐之方愈甘遂半夏湯病者脈伏其人慾自利利反快雖利心下續堅滿此為留飲欲去故也此湯主之甘遂大者三枚半夏十二枚芍藥五枚甘草炙指大一枚上四味以水二升煮取半升去渣以蜜半升和藥汁煎取八合頓服之水煮金花丸治有痰而泄痢不止甚則嘔而欲吐利下而不能食由風痰羈絆脾胃之間半夏湯洗天南星洗寒水石燒存性各一兩天麻半兩雄黃一錢半白麵四兩上為末滴水為丸如桐子大每服百丸先煎漿水沸下藥煮令浮為度漉出生薑湯下食前服治積滯瀉方溫脾湯本事治痼冷在腸胃間泄瀉腹痛宜先取去然後調治不可畏虛以養病也厚朴乾薑甘草桂心附子大黃生四錢碎切湯一盞漬半日溺去滓煎湯時和渣下上細銼用水二升半煎八合後下大黃汁再煎六合服蔭按劉宗厚曰按泄利腹痛甚證多有積滯者固宜取去豈但痼冷一端而已須詳證虛實寒熱隨其所宜以調之陳曲丸寶鑑磨積止瀉痢治腹中冷疼陳曲一兩半官桂人參白朮乾薑厚朴當歸甘草炙各半兩上為末煉蜜丸如桐子大每服三五十丸溫酒或淡醋湯下食前日二服進退承氣湯積滯泄瀉腹必刺痛淺者神麯之類消導之深而頑者必用進退承氣湯下之方見前泄瀉滯下總論治飲食瀉方加味治中湯治飲食過多脾胃之氣不足以運化而瀉人參白朮乾薑炮甘草炙陳皮去白青皮砂仁上銼水煎服加味平胃散治食積泄瀉蒼朮厚朴陳皮甘草白朮茯苓半夏神麯山楂澤瀉上銼加生薑三片水煎服大健脾散百一治脾胃虛寒不進飲食白朮四兩川烏炮去皮臍草果仁附子炮去皮尖各二兩橘紅半夏薑汁浸一宿青皮厚朴薑汁製甘草白茯苓肉豆蔻砂仁神麯茴香檀香各一兩蓽澄茄乾薑白豆蔻丁香各半兩上㕮咀每服三錢水一盞半姜七片棗一枚煎七分空心溫服快脾丸魏氏治脾氣久虛不受飲食食畢即腸鳴盡下所食之物方快生薑六兩淨洗切片以飛面四兩和勻就日中曬乾縮砂仁三兩橘皮一兩丁香不見火甘草炙各二兩一方有白朮三兩上為末煉蜜丸如彈子大每服二丸食前薑湯下麴櫱枳朮丸治傷食泄瀉噫氣如敗卵臭白朮米泔浸一日四兩枳實麩炒二兩陳皮去白半夏薑湯泡七次神麯炒麥芽炒山楂肉各一錢五分如胃寒或冬月加砂仁一兩氣滯不行加木香五錢常有痰火又兼胸膈痞悶加黃連茯苓各一兩上為細末用鮮荷葉數片煮湯去葉入老倉米如尋常造飯法甑內以荷葉鋪蓋方全氣味乘熱搗爛以細絹絞精華汁揉拌成劑為丸如桐子大每服百丸食遠白湯送下麴櫱枳朮丸治食積瀉白朮一兩枳實麩炒神麯炒麥蘖炒各一兩上為末蒸餅丸服曲術丸治飲食所傷胸膈痞悶泄瀉神麯蒼朮米泔浸一宿各等分上為細末麵糊丸如桐子大每服三十丸溫米飲下姜曲丸治食積瀉神麯六兩茴香半兩生薑二兩上為末蒸餅丸如桐子大每服五七十丸白湯下二白丸治奉養太過飲食傷脾常瀉或痢白朮二兩山楂神麯炒各一兩半白芍藥半夏黃芩各五錢上為末荷葉包飯煨熟搗丸桐子大空心白湯下五七十丸神應丸治一切冷物冷水及童乳酥油所傷腸痛腸鳴泄瀉水穀不化丁香木香各二錢巴豆去殼油杏仁同巴豆炒黑煙盡研如泥百草霜乾薑各五錢黃蠟二兩上為末先將黃蠟用好醋煮去渣穢再上火春夏入香油半兩秋冬八錢下巴豆杏仁泥攪勻次下丁香木香諸末研勻搓作錠子油紙裹旋丸如桐子大每服三五丸食前溫米湯下木香和中丸治腹痛泄瀉脈滑者神效累驗木香沉香白豆蔻枳實炒檳榔蓬朮青皮陳皮當歸酒洗木通黃芩黃連縮砂牙皂去皮子蜜水炙乾郁李仁三稜各一兩黃柏二兩香附牽牛頭末各三兩大黃四兩上為末水丸每服三錢重白湯或薑湯下平胃散治酒泄飲後獨甚本方加丁香砂仁麥芽神麯各五錢上為末每服三錢空腹米飲調下立愈酒蒸黃連丸治傷於酒每晨起必瀉宜生薑理中湯吞此丸黃連半斤淨用酒二升浸以瓦器置甑上蒸至爛取出曬乾上為末滴水丸如桐子大每服五十丸食前白湯下香茸丸治飲酒多遂成酒泄骨立不能食但再飲一二盞泄作幾年矣嫩鹿茸草火燎去毛用酥炙黃肉豆蔻火煨各一兩生麝香另研一錢上為末白陳米飯為丸如桐子大每服五十丸空腹米飲下熱者服酒煮黃連丸治脾虛瀉方加味六君子湯治一切脾胃虛弱泄瀉之證及傷寒病後米穀不化腸中虛滑發渴微痛久不瘥者及治小兒脾疳泄瀉得痢人參白朮白茯苓黃耆山藥甘草砂仁各一兩厚朴肉豆蔻麵裹煨另研各七錢半上為細末每服二錢用飯湯調服不拘時如渴煎麥門冬湯調服加味四君子湯治虛瀉飲食入胃不住完穀不化人參白朮茯苓甘草炙芍藥炒升麻各一錢上銼水煎服異功散治脾胃虛冷腸鳴腹痛自利不思飲食人參白朮茯苓甘草炙陳皮各等分上為末每服五錢薑棗煎服錢氏白朮散治脾胃氣虛或吐或瀉人參白朮茯苓甘草炙各一錢藿香木香乾葛各五分上銼水煎服參苓白朮散治脾胃氣虛飲食不進或致吐瀉人參白朮茯苓甘草炙山藥蓮肉白扁豆薏苡仁桔梗砂仁各等分上為細末每服二錢棗湯調服或棗肉丸如桐子大每服七十丸空心米湯下衛生湯人參白朮茯苓陳皮甘草炙山藥薏苡仁澤瀉黃連各等分上銼水煎服一方治脾泄雖經年久者半料可愈白朮一兩白茯苓人參甘草炙各三錢廣木香砂仁各二錢蓮肉四兩泡去皮心微炒上為末以陳糯米一升炒熟為末拌勻或蜜或砂糖服黃連芍藥湯治泄瀉腹痛兼痢疾初得先用淡滲通利之劑過六七日後用養胃實腸之藥黃連薑汁炒白芍藥酒炒白朮炒各一錢二分人參甘草炙各八分砂仁炒七分肉豆蔻麵包煨五分木香不見火三分上銼水一鍾半生薑三片煎八分空心溫服補脾丸治脾泄白朮半兩白芍藥二錢上為細末飯丸冬月去芍藥加肉豆蔻澤瀉服之又不止者於內加飛礬一錢半啟脾丸治脾泄瀉五更時候瀉者是也人參白朮茯苓山藥蓮肉去心各一兩甘草陳皮山楂澤瀉各五錢上為細末煉蜜丸如彈子大每服一丸空心米飲下或散服亦好劉草窗治痛瀉方治脾虛肝實泄瀉不止白朮炒三錢芍藥炒二錢陳皮炒一錢半防風一錢上銼水煎服或為丸亦可如久瀉加升麻五分升陽除濕湯東垣治脾胃虛弱不思飲食泄瀉無度小便黃色四肢困弱自下而上引而去之蒼朮一錢柴胡升麻羌活防風澤瀉豬苓神麯各五分陳皮大麥蘖甘草炙各三分上銼水二盞煎一盞去渣空心服如胃寒腸鳴加益智半夏各五分薑棗同煎非腸鳴不用人參升胃湯治一日大便三四次溏而不多有時泄瀉腹鳴小便黃黃耆二錢人參陳皮炙甘草各一錢升麻七分柴胡當歸身益智各五分紅花少許上用水二盞煎一盞食前稍熱服升陽除濕防風湯方見痢門治濕痢方平胃蒜肚丸治脾瀉水瀉便紅下血等證久痢先行後以此藥補之神效蒼朮陳皮厚朴各五兩川椒少許上用豶豬肚一具去脂膜入大蒜裝滿以線縫住用冷水熱水各七碗先將水燒滾入肚煮至水乾為度取出搗爛入前藥末再搗至肚無絲方可丸如桐子大每服二錢白湯下養元散治泄瀉飲食少進糯米一升水浸一宿濾乾燥慢火炒令極熟為細末入山藥末一兩胡椒末少許和勻瓷罐收貯每日侵晨用半盞再入砂糖二匙滾湯調服其味極佳且不厭人大有滋補久服之其精寒不能成孕者亦孕之一方加蓮肉去心芡實山藥各三兩亦效一方單用蓮肉二兩為末空心無根水調服一方治水瀉痢疾如神石蓮肉二錢細茶五錢生薑三錢上蓮肉為末薑茶煎調服治腎虛瀉方五味子散有人每日五更初洞瀉服止瀉藥並無效此名脾腎泄感陰氣而然宜多用五味子以強腎水補養五臟次用吳茱萸除脾中之濕濕少則脾健脾健則制水不走五味子二兩吳茱萸半兩小顆綠色者上二味同炒香熟為細末每服二錢陳米飲下五味子丸治下元虛寒火不生土及腎中之土不足以致關門不閉名曰腎泄亦名脾腎泄人參白朮五味子破故紙炒各二兩白茯苓山藥炒各一兩半吳茱萸川巴戟去心肉豆蔻麵裹煨各一兩龍骨煅五錢上為末酒糊丸如桐子大每服七十丸空心鹽湯下五味子丸本事人參白朮五味子益智仁炒川巴戟去心肉蓯蓉酒浸焙骨碎補去毛土茴香炒覆盆子菟絲子熟地黃洗牡蠣白龍骨各等分上為末煉蜜丸桐子大每服七十丸空心湯下二神丸治脾腎氣虛清晨溏瀉肉豆蔻二兩生破故紙炒四兩上為末以大肥棗四十九枚生薑四兩切片同煮棗爛去姜取棗肉和丸如桐子大每服五十丸空心鹽湯下四神丸治脾胃虛弱大便不實飲食不思或泄瀉腹痛等證肉豆蔻二兩破故紙四兩五味子二兩吳茱萸浸炒一兩上為末生薑八兩紅棗一百枚煮熟取棗肉和丸如桐子大每服五七十丸空心或食前白湯下澹寮四神丸治腎泄脾泄肉豆蔻生二兩破故紙炒四兩茴香炒一兩木香半兩上為細末生薑煮棗肉為丸如桐子大鹽湯下五七十丸一方去木香茴香入神麯麥蘖如前丸服小茴香丸本事舶上茴香炒胡蘆巴破故紙炒香龍骨各一兩木香一兩半胡桃肉三七個研羊腰子三對破開鹽半兩擦炙熟研如泥上為末酒浸蒸餅杵熟丸如桐子大每服三五十丸空心溫酒送下椒樸丸川椒炒去汗川厚朴薑汁炒益智仁炒陳皮白姜茴香炒各等分上用青鹽等分於銀石器內以水浸干藥用慢火煮乾焙燥為細末酒糊丸如梧桐子大每服三十丸至四十丸空心鹽湯溫酒任下椒附丸治腎臟虛寒大便滑瀉椒紅炒桑螵蛸炙龍骨山茱萸肉附子炒鹿茸酒蒸焙上為末酒糊丸每六十丸米飲空心下金鎖正元丹治腎虛泄瀉小便頻數盜汗遺精一切虛冷之證並治之肉蓉洗焙葫蘆巴紫巴戟去心各一斤補骨脂酒浸炒十兩五倍子茯苓各半斤龍骨硃砂各二兩上為末米糊丸如桐子大每服二十丸溫酒鹽湯任下調中健脾丸治脾腎氣虛早晚溏瀉及臟寒久瀉亦宜白朮破故紙訶子肉豆蔻各一兩茯苓陳皮各八錢黃連吳茱萸水洗各七錢神麯六錢木香厚朴小茴香砂仁山藥蓮子各五錢上為末粥丸桐子大每服七十丸蓮子湯下參朮健脾丸滋養元氣補脾胃益腎水溫下元進飲食調中下氣臍腹冷痛泄瀉年久不止此藥溫補脾腎除寒濕大補諸虛蒼朮八兩用鹽水浸二兩米泔浸二兩醋浸二兩蔥白炒二兩人參白朮白茯苓乾山藥炒破故紙酒炒菟絲子酒製枸杞子蓮肉去心各二兩川楝肉五味子牛膝各一兩半川椒去目炒小茴香炒陳皮木香不見火遠志甘草水泡去心各五錢上為末酒糊為丸如桐子大每服八十丸空心鹽湯下以乾物壓之香茸丸治日久冷瀉鹿茸五錢酒浸炙乳香三錢肉豆蔻一兩每個作兩片入乳香在內麵裹煨上為細末陳米飯丸桐子大每服五十丸空心米飯下神聖香姜散治晨泄又名濕泄宣黃連水浸銼片二兩生薑切骰子大四兩上同一處淹一宿銀石器內慢火同炒姜赤黃色為度去姜不用將黃連為末每服二錢茶清調下一劑而愈又用米飯酒調治白痢尤妙如若欲速效一料只作二服治肝虛瀉方當歸厚朴湯治肝經受寒面色青慘厥而泄瀉當歸炒厚朴制各二兩官桂三兩良薑五兩上銼每服三錢水煎食前服蔭按方氏曰按經云腎司閉藏肝司疏泄肝腎氣虛為病泄瀉何也蓋腎處在下大小二便之門戶而肝者又為門戶約束之具肝腎氣實則能閉能束故不泄瀉肝腎氣虛則閉束失職故泄瀉也又肝者脾之賊肝經正虛邪盛木能剋土亦作泄瀉此當歸厚朴湯所以實肝而止瀉也治暴瀉方桂苓甘露飲方見前暑熱條五苓散方見前濕瀉條益元散方見前暑熱條經驗秘方治暴泄注下小便不通車前子一味炒為末每服二錢米飲調下其根葉亦可搗汁服蔭按此藥利水道而不動元氣者歐陽文忠公嘗得暴下國醫不能愈人云市中有此藥三文一帖甚效夫人買進之一服而愈後召賣藥者問其方但用車前子一味為末米飲調下二錢匕以上四方治熱之劑漿水散方見前寒瀉條一方治暴寒水泄不止肉豆蔻三個麵裹置火中煨令面焦去面不用上為細末只作一服用陳米飲調食前服之神驗丹溪云肉豆蔻屬金屬土溫中補脾為有力朝真丹治氣虛傷冷暴作水瀉日夜二三十行腹痛不止夏月路行備急硫黃一兩半枯白礬五錢上同研細用水浸蒸餅去水和丸如桐子大硃砂為衣每服十五丸溫米飲或鹽湯下以上三方治寒之劑治虛滑久瀉方訶子散治泄久腹痛漸已瀉下漸少宜此藥止之訶子一兩半生半熟木香五錢黃連三錢甘草二錢上為細末每服二錢煎白朮芍藥湯調下如止之不已宜因其歸而送之於訶子散內加厚朴一兩竭其邪氣也厚朴枳實湯虛滑久而不止者多傳變為痢太陰傳少陰是為鬼邪先以此藥防其傳變厚朴枳實各一兩訶子一兩半生半熟木香半兩大黃三錢黃連甘草炙各二錢上為細末每服三錢或五錢水一盞半煎至一盞溫服蔭查按此法實者用之虛者不若四神丸實腎之為得也除濕健脾湯治久瀉色蒼而齒疏倦怠食減下墜白朮炒一錢半蒼朮米泔浸炒白茯苓白芍藥醋炒各一錢當歸陳皮各八分豬苓澤瀉各七分厚朴薑汁炒防風各六分升麻柴胡各五分甘草炙四分上銼一劑生薑三片棗一枚水煎早晚熱服久瀉加南星麵包煨七分九寶飲子分利水穀止泄瀉粟殼蜜炙青皮陳皮木通各一錢半赤茯苓黃耆厚朴制車前子炒甘草炙各一錢上㕮咀用水二鍾煎八分食前服止瀉秘方人參白朮乾薑炮訶子去核茯苓木香藿香去土肉豆蔻麵裹煨甘草炙各一錢半上作一服水二鍾煎至一鍾去渣食前服固腸散治脾胃虛弱內受寒氣泄瀉注下水穀不分冷熱不調下痢膿血赤少白多或如魚腦腸滑腹痛遍數頻並心腹脹滿食減乏力陳米炒二十兩木香不見火一兩肉豆蔻生用二兩乾薑甘草炙各二兩半罌粟殼去蒂蓋蜜炙二兩上為細末每服二錢酒一盞生薑二片棗一枚煎至七分不拘時溫服如不飲酒水煎亦得忌酒面魚腥等物八柱散治腸胃虛寒滑泄不禁人參白朮肉豆蔻煨乾薑炒訶子煨附子麵裹煨去皮臍粟殼蜜炒甘草炙各等分上銼一劑姜一片烏梅一個燈草一團水煎溫服家蓮散治經年久瀉冷泄及休息痢經年不止者蓮肉水泡去皮心微火焙乾四兩厚朴薑汁浸炒乾薑炒黑色各一兩上共為末每服二三匙米飲調下日三服固中丸治脾久泄去後氣不快者蒼朮肉豆蔻煨各一兩上為末粥丸桐子大每服五十丸白湯下於固中丸中加破故紙一兩名固下丸治腎久泄東垣方治老人奉養太過飲食傷脾常常泄瀉亦是脾泄白朮炒二兩白芍藥酒炒半兩神麯炒一兩半山楂二兩半夏制半兩黃芩炒半兩上為末青荷葉燒飯丸一方只用白朮芍藥神麯俱炒或散或丸服理氣健脾丸治男婦久瀉不止其效如神白朮炒當歸酒洗各六兩陳皮洗白茯苓各三兩黃連薑汁炒香附童便炒各二兩枳實麩炒一兩五錢山楂肉一兩八錢半夏水泡一兩二錢神麯炒二兩半白芍藥煨一兩木香五錢上為細末荷葉煮飯為丸如桐子大每服八十丸食後白湯下豆蔻飲得效治滑泄如神陳米一兩肉豆蔻麵裹煨五味子赤石脂研各半兩上為末每服二錢粟米湯飲調下日進三服龍骨散治水瀉腹痛不納飲食龍骨當歸炒肉豆蔻麵裹煨木香各一兩厚朴薑汁炙二兩上為細末每服二錢食前粥飲調下南白膠香散治脾胃虛寒滑腸久瀉臍腹疼痛無休止者御米殼醋炒四兩龍骨南白膠香各三兩甘草炙七錢乾薑炮半兩上為粗末每服五錢水煎食前服忌冷物傷胃訶子丸本事治脾胃不和泄瀉不止諸藥不效訶子皮川薑肉豆蔻龍骨木香赤石脂附子各等分上為細末米糊丸如桐子大每服四十丸米飲下蓽撥丸治滑泄寒者宜之蓽撥川薑炮丁香不見火附子炮去皮臍吳茱萸炒良薑胡椒各一兩山茱萸去核草豆蔻各半兩上為末棗肉丸桐子大每服五十丸食前陳米飲下日三服固腸丸得效治臟腑滑泄晝夜無度吳茱萸撿淨黃連去須罌粟殼去梗蒂各等分上為末醋糊丸如桐子大每服三十丸空心米飲下固腸斷下丸治虛寒久瀉滑泄肉豆蔻白朮炒訶子煨白龍骨煨當歸身各一兩乾薑煨粟殼各五錢木香煨三錢上為末酒糊丸如桐子大每服五七十丸清米飲下大斷下丸得效治下利滑數肌肉消瘦飲食不入脈細皮寒氣少不能言有時發虛熱由脾胃虛耗耗則氣奪由穀氣不入胃胃無主以養故形氣消索五臟之液不收謂之五虛此為難治略能食者生附子炮肉豆蔻牡蠣煅白礬枯訶子去核各一兩細辛乾薑炮良薑白龍骨赤石脂酸石榴皮醋煮乾為度焙乾各一兩半上為末米糊丸如桐子大每服三十丸粟米湯下實脾固腸丸治瀉痢日久不止及脾泄無度者白朮土炒四兩人參茯苓甘草炙乾薑炒各二兩蒼朮米泔浸炒厚朴薑汁炒陳皮各一兩五錢肉果麵煨訶子去核粟殼去籽蜜炒各二兩砂仁去殼一兩上為末酒糊丸如桐子大每服七十丸空心米湯下虛寒加附子炮一兩滑脫不禁加龍骨赤石脂俱煅各一兩升氣實臟丸治久瀉元氣下陷脾胃衰憊大腸滑脫肛門墜下日夜無度飲食不思米穀不化湯水直下煩渴引飲津液枯竭肌瘦如柴寒熱互作白朮土炒二兩黃耆蜜炙楝參山藥蓮肉去心芡實各一兩白茯苓升麻酒炒柴胡酒炒乾薑炒黑肉豆蔻麵煨粉草炙各五錢椿根皮酒炒二次四兩上為末阿膠水化開為丸如黍米大每服二錢用糯米半生半炒煎湯送下升陰丸丹溪治久病大腸氣瀉熟地黃五錢白芍藥知母各三錢升麻乾薑各一錢甘草一錢上為末粥丸服再灸百會三五壯固腸丸治虛滑熱瀉樗皮四兩滑石二兩上為末粥丸服丹溪云固腸丸性燥若滯氣未盡者不可遽用乳豆丸得效治滑泄不止諸藥無效肉豆蔻生為末上用通明乳香以酒浸過研成膏丸如梧桐子大每服五十丸空心米飲送下桃花丸和劑治腸胃虛弱冷氣乘之臍腹絞痛下痢純白或冷熱相搏赤白相雜腸滑不禁日夜無度赤石脂乾薑炮各等分上為末麵糊丸如桐子大每服三十丸空心食前米飲送下日三服若痢久虛滑去積不已用蒼朮二兩防風一兩銼水一碗煎至半碗下此丸或赤石脂丸小便利則安震靈丹紫府元君南嶽魏夫人方出道藏一名比金丹治男子真元衰憊五勞七傷臍腹冷痛肢體痠痛上盛下虛頭目暈眩心神恍惚血氣衰微及中風癱瘓手足不遂筋骨拘攣腰膝沉重容枯肌瘦目暗耳聾口苦舌乾飲食無味心腎不足精滑夢遺膀胱疝墜小腸淋瀝夜多盜汗久瀉久痢嘔吐不食八風五痹一切沉寒痼冷服之如神及治婦人血氣不足崩漏虛損帶下久冷胎臟無子禹餘糧火煅醋淬不計遍數手捻得碎為度紫石英丁頭代赭石如禹餘糧炮製赤石脂各四兩以上四味並作小塊入甘鍋內鹽泥固濟候乾用炭十斤煅通紅火盡為度入地埋出火毒二宿滴乳香另研五靈脂去砂石節沒藥去砂石研各二兩硃砂水飛過一兩上八味併為細末以糯米粉煮糊為丸如雞頭實大曬乾出光每一丸空心溫酒或冷水任下常服鎮心神駐顏色溫脾胃理腰膝除屍疰蠱毒闢鬼魅邪癘久服輕身漸入仙道忌豬羊血恐減藥力婦人醋湯下孕婦不可服養氣丹治久冷泄瀉及休息痢疾每服三十丸多服收效方見沉寒痼冷門治久瀉脫肛方丹溪方治久泄穀道不合或脫肛此元氣下陷及大腸不行收令而然白朮芍藥炒神麯炒陳皮肉豆蔻煨訶子肉五倍子烏梅搗上為末和丸以四君子湯加防風升麻煎湯下丹溪方治久瀉脫肛人參黃耆川芎當歸升麻上銼水煎服舉肛丸治泄瀉虛寒脫肛者半夏南星枯白礬各五錢枯紅礬雞冠花炒白附子各五兩訶子皮煅存性黑附子生枳殼各一兩蝟皮二枚炙瓜蔞一枚燒存性胡桃仁十五枚燒存性上為末醋糊作丸空心溫酒下三十丸蔭按吳氏曰濕盛則濡瀉久瀉則胃虛胃虛則臟寒臟寒則無陽以升舉故令肛腸脫而不上燥能去濕故用半夏南星枯能制濕故用紅白枯礬溫能暖臟故用黑白附子若雞冠蝟皮枳殼用以驅風而訶子瓜蔞胡桃仁之灰取其澀以固脫也收肛散治熱瀉脫肛者用此方塗之良熊膽五分孩兒茶三分冰片一分上為細末乳調塗肛上熱汁下而肛收矣蔭按吳氏曰熱則肛門澀澀則便不易出不易出則令人努責之久則令脫肛此與寒脫不同者此則肛門澀寒脫則洞泄而不澀也苦可以勝熱故用熊膽澀可以固脫故用兒茶辛可以拔邪故用冰片此妙方也實腸丸治久瀉久痢脫肛墜下虛滑不禁臭椿樹根皮切碎酒拌炒不拘多少上為末用真阿膠水化開丸如桐子大每服三十五丸空心米湯下卷二十二下滯下論風寒暑濕皆能作痢陳無擇云滯下之證內經所載血溢血泄血便注下古方則有清膿血近世呼痢疾其實一也多由脾胃不和飲食過度停積於腸胃不能克化又為風寒暑濕之氣干之故為此疾傷熱則赤傷冷則白傷風則純下清血傷濕則下如豆汁冷熱交併赤白兼下治法當先用通利之藥疏滌臟腑嚴氏云先以巴豆等劑推其積滯後辨以冷熱風濕之證用藥調治熱赤者清之冷白者溫之傷風而下清血者則祛逐之傷濕而下豆汁者分利之冷熱相併溫涼以調之仍須先調胃氣切不可驟用罌粟訶子之藥止之澀之使停滯不泄多致危殆劉宗厚曰按赤白分冷熱之說河間論之甚詳其云風下清血濕下豆羹汁者蓋謂風喜傷肝肝主血故下清血者為風也濕喜傷脾脾胃為五穀之海無物不受常兼四臟蓋豆汁之色如五色之相雜故下豆羹汁者為濕也又云治法當先通利此迎而奪之之義若有虛者亦宜審之使果有積滯在腸胃者方所當通利然嚴氏謂巴豆等藥使用之於傷冷物則可若用之於熱者為害非輕又云風則祛逐所謂祛逐者果何法何藥歟若以邪氣當祛逐則豈獨於風而寒濕熱為不可耶此又失於明白論滯下分三因陳無擇云古方風停膚腠下瘀血或下鮮血濕毒下如豆羹汁皆外所因之明文也古方有五泄因臟氣鬱結隨其所發便利膿血作青黃赤白黑色一一不同即內所因也又飲食冷熱酒醴醯醢縱情恣欲房室致傷精血腸胃黏溢久積冷熱遂成毒痢皆不內外因治之先推其歲運以平其外察其鬱結以調其內審其所傷以治不內外條然明白不致妄投也辨利色分五臟原病式曰瀉白為寒青黃紅赤黑皆為熱也蓋瀉白者肺之色也由寒水制火不能平金則肺金自甚故色白也利色青者肝木之氣由火甚制金不能平木故色青也或言利色青為寒者誤也仲景少陰病下利清水色純青熱在裡也大承氣湯下之及小兒熱甚急驚利色多青為熱明矣利色黃者由火甚則水必衰而脾土自旺故色黃也利色紅為熱心火之色也或赤熱深甚也至若利色黑亦言熱者由火熱亢甚則反兼水化制之故色黑也故傷寒陽明病熱極則日晡甚則不識人法當大承氣下之大便不黑者易治黑者難治諸痢同法劉宗厚曰世人多以瀉利之青白黑三色為寒黃赤二色為熱今觀河間分五臟之論煥然耳目而知世人之非也或曰內經視絡脈之色曰寒多則凝泣凝泣則青黑熱多則淖澤淖澤則黃赤又曰黃赤則熱多白則寒世俗之論豈非本於此歟愚曰內經論經脈之常色心赤肺白肝青脾黃腎黑也陰絡之色應其經但陽絡之色隨四時而行應無常色遇天氣之寒則經絡凝位故其色多青黑遇天氣之熱則經絡淖澤故其色多黃赤此蓋曰外氣之寒熱而浮絡相應而然凡人之在冬月炎天與夫久坐遠行其面色相應亦皆然非如痢色之出於臟腑隨內氣所感而生也況滯下之證多因濕熱所致內經曰肺熱者色白而毛敗心熱者色赤而脈絡溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒槁此雜論痿亦可見五臟之內熱皆能顯此五色今滯下之論五色意實相同然不可與浮絡之因外氣相應者同語也辨赤白分冷熱之誤原病式曰或言下痢白為寒者誤也若果為寒則不能消穀何由反化為膿也所謂下痢谷反為膿如世之穀肉果菜濕熱甚則自然腐爛潰發化為膿水也其熱為赤熱屬心火故也其濕為黃濕屬脾土故也燥郁為白屬肺金也經曰諸氣憤郁皆屬於肺謂燥金之化也然諸瀉痢皆兼於濕今反言氣燥者謂濕氣甚於腸胃之內腸胃怫熱鬱結而又濕主於痞以致氣液不得宣通因以成腸胃之燥使煩渴不止也如下痢赤白俗言寒熱相兼其說尤誤豈知水火陰陽寒熱者猶權衡也一高則必一下一盛則必一衰豈能寒熱俱甚於腸胃而同為痢乎如熱生瘡瘍而出白膿者豈可以白為寒歟其在皮膚之分屬肺金故色白也次在血脈之分屬心火故為血癤也在肌肉屬脾土故作黃膿在筋脈屬肝木故其膿色帶蒼深至骨屬腎水故紫黑血出也各隨五臟之部而見五色是謂標也本則一出於熱但分淺深而已大法下迫窘痛後重裡急小便赤澀皆屬燥熱而下痢白者必多有之然則為熱明矣劉宗厚曰河間謂赤白不當分冷熱乃屬肺金心火之化又謂五色各屬五臟本則一出於熱其論至當但世患此疾者赤白居多今既不當分冷熱為治若專以辛苦寒退熱此則治本之法所謂心火肺金之化者抑有別歟蓋心主血肺主氣白屬肺金則氣受病也赤屬心火此血受病也赤白相雜血氣俱受病也知此則肝青脾黃腎黑之說亦可得而互明矣論痢疾標本乃氣血心肺之病傳於腸胃準繩曰滯下古以赤為熱白為冷至劉河間李東垣始非之劉謂諸痢皆由乎熱而以赤屬之心火黃屬之脾土白屬之肺金青屬肝木黑乃熱之極而反兼腎水之化其諸瀉利皆兼於濕濕主於痞以致怫鬱氣不得宣通濕熱甚於腸胃之中因以成腸胃之燥故里急後重小便赤澀謂治諸痢莫若以辛苦寒藥而治或微加辛熱佐之辛能開鬱苦能燥濕寒能勝熱使氣宣平而已行血則便血自愈調氣則後重自除李從脾胃病者而論則曰上逆於肺為白下傳於陰為赤衛生寶鑑因謂太陰主瀉傳於少陰為痢由泄亡津液而火就燥腎惡燥居下焦血分也其受邪者故便膿血然亦赤黃為熱青白為寒丹溪謂滯下因火熱下迫而致裡急後重用劉氏之治濕熱李氏之保脾土更復一一較量氣血虛實以施治三家皆發前代之未發而舉其要也予嘗因是而研究之自其五色分五臟者言則可見濕熱之中具有五邪之相挾自其上逆傳氣血者言則可見五臟六腑十二經脈之氣血諸邪皆得傷之而為痢之赤白本自其濕熱為病者言則可見由來致成濕熱之故非一端自其分痢有虛實者言則可見凡在痢病者中所有之證如煩躁者咽乾舌黑者噦噫後重者腹痛者脹滿者腳痛腫弱之類悉有虛實之殊是故予於痢證直斷之種種為邪入胃以成濕熱經絡受傷其氣傷則病於肺血傷則傳於心心肺者氣血之主也氣血所行之方既病安得不歸所主之臟乎而大小腸者心肺之合也出納水穀糟粕轉輸之官胃乃大小腸之總司又是五臟六腑十二經脈稟氣之海苟有內外之邪凡損傷於經臟者或移其邪入胃胃屬土濕之化胃受邪則濕氣不化怫鬱而成濕熱矣或心肺移氣血之病傳之於合大腸獨受其病則氣凝注而成白痢小腸獨受其病則血凝注而成赤痢大小腸通受其病則赤白相混而下胃之濕熱淫於大小腸者亦如之其色兼黃若色之黑者有二如色之焦黑此極熱兼水化之黑也如黑之光若漆者此瘀血也或曰治利從腸胃世人所守之法也今乃復求其初感之邪與初受之經將何為哉曰病在腸胃者是其標也所感之邪與初受之經者是其本也且內經於治標本各有所宜施之先後況所傳變之法又與傷寒表裡無異何可不求之乎豈止此而已至若腸胃自感而病亦當以邪正分或正氣先虛而受邪或因邪而致虛則以先者為本後者為標與夫積之新舊亦如之舊積者停食結痰所化之積也新積者舊積去後而氣血復郁所生者也舊積當先下之新積則不宜下其故何哉蓋腸胃之腐熟水穀轉輸糟粕者皆榮衛灑陳六腑之功今腸胃有邪則榮衛運行至此其機為之阻不能施化故衛氣鬱而不舒榮血泣而不行於是飲食結痰停於胃糟粕留於腸與所鬱氣泣血之積相挾成滯下病矣如是者必當下之以通壅塞利榮衛之行至於升降仍不行衛氣復郁榮血復泣又成新積故病如初若是者不必求邪以治但理衛氣以開通腠理和榮血以調順陰陽陰陽調腠理開則升降之道行其積不治而自消矣然而舊積亦有不可下者先因榮衛之虛不能轉輸其食積必當先補榮衛資腸胃之真氣充溢然後下之庶無失矣予數見俗方惟守十數方治利不過攻之澀之而已矣安知攻病之藥皆是耗氣損血之劑用之不已甚至於氣散血亡五臟空虛精憊神去而死其固澀之又皆足以增其氣鬱血泣之病轉生腹脹下為足腫上為喘呼諸疾作焉世人之法何足守乎論熱藥治痢之誤原病式云或曰白痢既為熱病何故服辛熱之藥亦有愈者耶蓋辛熱之藥能開發腸胃鬱結使氣液宣通流濕潤燥氣和而已蓋病微者可愈甚者鬱結不開其病轉加而死矣凡治熱甚吐瀉亦然夫治諸痢者莫若以辛苦寒藥治或微加辛熱佐之則可蓋辛能發散開通鬱結苦能燥濕寒能勝熱使氣宣平而已如錢氏香連丸之類是也故治諸痢者黃連黃柏為君以其至苦大寒正主濕熱之病乃若世傳辛熱金石毒藥治諸吐瀉下痢或有愈者以其善開鬱結故也然雖亦有驗者或不中效反更加害論治痢通因通用之法子和云夫下利膿血腹痛不止可用調胃承氣湯加薑棗煎更下臟連丸瀉訖以五苓益元調下又一男子瀉痢不止如傾不敢冷坐諸醫皆以為寒治延十載兩手寸脈皆滑余不以為寒所以寒者水也以茶調散湧寒水五七升又以無憂散瀉積水數十行乃通因通用之法也次以淡劑利水道劉宗厚曰按此用吐下以治利本內經通用之說使腸胃虛滑者其可下乎中氣虛弱者其可吐乎今云可下者謂有積滯在腸胃壅塞不通者也可吐者謂有痰飲在膈上不能降以致大腸不能收斂者也論局方用熱藥澀藥之非丹溪曰瀉痢一證局方用鍾乳健脾丸朝真丹訶黎勒丸大溫脾丸等藥皆用熱藥為主澀藥為佐使當為腸虛感寒而成滑者設也彼瀉利者將無熱證耶將無積滯耶內經曰利有膿血多屬滯下夫瀉利證其類尤多先賢曰濕多成泄此確論也然有挾風者固不可得而同矣況風與濕之外又有雜合受邪似難例用澀熱之藥局方出證有兼治裡急者有兼治後重者有兼治裡急後重者此豈非滯下病乎今瀉利與滯下混同論治實實虛虛之患將不俟終日矣經曰暴注下迫皆屬於熱又曰暴注皆屬火又曰下利清白屬於寒屬火熱者二屬水寒者一瀉利一證似乎屬熱者多屬寒者少局方專以澀熱為用若用之於下利青白為寒者或可矣所謂下迫者即裡急後重之謂也其病屬火相火所為其毒甚於熱矣投以澀熱非殺而何又云仲景治痢可下者率用承氣湯加減下之大黃之寒其性善走佐以厚朴之溫善行滯氣緩以甘草之甘飲以湯液灌滌腸胃滋潤輕快積行即止局方用砒丹巴硇類聚成丸其氣凶暴其體重滯積氣已行而毒氣未消猶暴賊手持兵刃使之徘徊瞻顧於堂奧之間縱有愈病之功而腸胃清純之氣豈無損傷之患乎其可溫者乃用薑附溫之局方類以熱藥為主澀藥為佐用之於下痢清白者猶可其裡急後重經所謂下迫者屬火熱加以澀藥非殺而何又云痢疾乃外感兼內傷之候也須分表裡當作表裡治之在表者必惡寒發熱身首俱痛宜以小柴胡湯去人參棗子加蒼朮川芎陳皮生芍藥微汗以散之在裡者必後重窘迫腹痛下積宜早以大小承氣河間酒煎大黃湯之類下之餘邪未盡更以芍藥湯香連丸之類以徹其邪穢積已盡而更衣未息者此大腸不行收令故也宜以固腸丸參香散之類以止澀之噤口者須詳證按法調治切不可輕用粟殼肉豆蔻訶子之類以試之殺人於反掌之間也但凡痢證不問輕重若邪氣正盛而以粟殼之類止遏之雖不死亦成休息痢二三年不能愈也又不可輕用巴豆牽牛等熱毒之藥攻之蓋病因熱毒又得熱毒之劑以火濟火不死何待論滯下亦有挾虛挾寒丹溪曰或問河間之言滯下果無挾虛挾寒者乎否乎予曰泄利之病水穀或化或不化並無努責惟覺困倦若滯下則不然或膿或血或膿血相雜或腸垢或無糟粕或糟粕相混雖有痛不痛大痛之異然皆裡急後重逼迫惱人似乎皆熱證實也予近年涉歷亦有大虛大寒者不可不知敢筆其略以備覽予從叔年逾五十夏間患滯下病腹微痛所下褐色後重頻並穀食大減時有微熱察其脈皆弦而澀似數而稍長卻喜不甚浮大兩手相等視其神氣大減予曰此非滯下乃憂慮所致心血虧脾氣弱耳遂以參術為君當歸陳皮為臣川芎炒芍藥為佐使時暄熱甚少加黃連兩月而安婁長官年三十餘奉養厚者夏秋間患滯下腹大痛有人教服單煮乾姜與一帖則痛定少頃又作又與之定由是服乾薑至三斤八日視之左脈弦而稍大似數右脈弦而大稍減亦似數重取之似緊予曰此必醉飽後吃寒涼太過當作虛寒治之因其多服乾薑遂教用四物湯去地黃加人參白朮陳皮酒紅花茯苓桃仁煎入生薑汁飲之至一月而安金氏婦年近四十秋初尚熱患滯下腹但隱痛夜重於晝全不得睡食亦稍減口乾不飲已得治痢靈砂二帖矣予觀之兩手脈皆澀且不勻神思倦甚飲食全減日與四物湯倍加白朮以陳皮佐之與十數帖而安此三病者若因其逼迫而用竣劑豈不誤人劉宗厚曰按滯下之證古人多與泄瀉同論至三因方始能另立條目蓋實有不同夫病有從外感而得者須分六氣之異外既受傷腸胃鬱結遂成赤白等證當隨其寒熱溫涼以調之有因臟氣發動干犯腸胃而得者須察其何臟相乘以平治之又有因飲食失節而得者則又審其何物所傷以消克之世之感此疾者其因誠不越乎是三者但其受病之後腸胃怫鬱膿血稠黏裡急後重諸方雖有寒熱虛實之論劉河間則以為一出於熱然考之內經似亦熱多而寒少也丹溪則以為亦有挾虛挾寒之證深戒學者須宜識此世之局方不辨三因專用澀熱之藥其失甚矣至河間立說專用苦寒疏下之藥則亦未甚為當何則蓋病有虛實治有先後若病勢暴至元氣壯實積滯膠固須宜下之病久氣脫虛滑不禁者亦宜溫之澀之大抵治利當從仲景河間之法可溫則溫可下則下或解表或利小便或待其自已劉河間分別在表在裡挾風挾熱挾寒等證後之作者無越於斯但氣血一條未嘗表出立論其於芍藥湯下有曰行血則便膿愈調氣則後重除蓋謂溲便膿血血之滯也故曰行血自愈奔迫後重氣之實也故曰調氣自除誠哉是言但膿血赤白亦有氣病血病之分後重裡急亦有氣實血虛之異學者又不可不察葉氏曰按原病式謂痢雖有赤白而一本於熱此足以破局方好行辛熱者之弊然痢之白者不可盡歸於熱亦有因於寒者痢如凍膠或如鼻涕明是冷證此緣多啖生冷脾胃受傷氣凝而滯下生焉非薑桂之辛熱不可也但患此者十之四五耳且寒鬱之久多變為熱薑桂之類始則可用久則又宜通變矣又有濕熱為痢者日久不愈腸胃氣虛未傳寒變或過用冷藥以致腸胃中寒此亦宜有以溫之也論太陰受濕傳腎為膿血痢機要云有太陰受濕而為水泄虛滑身重微滿不知穀味久則傳變而為膿血脾經傳腎謂之賊邪故難愈若先痢而後滑謂之微邪故易痊此皆脾土受濕之所為也東垣治痢大法病機機要云後重則宜下腹痛則宜和身重則除濕脈弦則去風膿血稠黏以重劑竭之身冷自汗以毒藥溫之風邪內縮宜汗之鶩溏為利當溫之又云在外者發之在裡者下之在上者湧之在下者竭之身表熱者內疏之小便澀者分利之又曰盛者和之去者送之至者止之兵法曰避其銳至擊其墮歸此之謂也秘藏云假令傷寒飲食䐜脹滿而傳飧泄者宜溫熱之劑以消導之傷濕熱之物而成膿血者宜苦寒之劑以內疏之風邪下陷者升舉之濕氣內勝者分利之裡急者下之後重者調之腹痛者和之洞泄腸鳴無力不及拈衣其脈弦細而弱者溫之收之膿血稠黏至圊而不能便其脈洪大而有力者寒之下之可按此分風寒濕熱表裡溫補寒下等治至為切當學者尤宜熟玩但其裡急後重腹痛之義未詳再觀論於後論痢先蕩積丹溪云痢初得一二日間元氣未虛必推蕩之此通因通用法調胃承氣及大小承氣湯下後看其氣病血病而用藥氣用參術血用四物五日後不可下脾胃氣虛故也壯實者亦可下虞氏曰此亦大概言之氣血虛者難一二日亦不可下實者十餘日後亦有下之而安者有男子五十餘下利晝有積淡紅色夜無積食自進先吃小胃丹兩服再與四十丸次六十丸去積卻與斷下此惟實者宜之虛者以芍藥湯益元散保和丸之類蕩積準繩云芍藥湯治下血調氣經曰溲而便膿血知氣行而血止也行血則便自安調氣則後重自除益元散治身發熱下痢赤白小便不利蕩胃中積聚下痢勢惡頻並窘痛或久不愈諸藥不止須吐下之以開除濕熱痞悶積滯而使氣液宣行者宜元青丸逐之元珠利積丸亦可元珠云下痢赤白腹滿脹痛裡急上渴引飲小水赤澀此積滯也宜泄其熱中用清腸丸導氣丸推其積滯而利自止矣凡治積聚之證輕則溫而利之清腸丸是也重者天真散舟車丸下之下後勿便補之其或力倦自覺氣少惡食此為挾虛證宜加白朮當歸身尾甚者加人參若又十分重者止用此藥加陳皮補之虛回而痢自止矣丹溪治葉先生患滯下後甚逼迫正合承氣證但氣口虛形雖實而面黃積白此必平日食過飽而胃受傷著忍二三日辛苦遂與參朮陳皮芍藥等補劑十餘帖至三日後胃氣稍完與承氣二帖而安苟不先補完胃氣之傷而遽行承氣豈免後患乎論痢先調氣戴云痢疾古名滯下以氣滯成積積成痢治法當以順氣為先須當開胃故謂無飽死痢疾也準繩云凡痢初發不問赤白裡急後重頻欲登圊及去而所下無多既起而腹內復急宜用藿香正氣散加木香半錢吞感應丸或蘇合香丸吞感應丸統旨云瀉濕熱行滯氣芩連木香檳榔枳殼之類不可無丹溪云古方用厚朴為行凝滯之氣稍行即去之枳殼雖少緩亦不宜久服只用陳皮以和諸藥古方多用粟殼治嗽與痢但要先出病根乃收功後藥也論赤痢準繩云赤痢血色鮮紅或如蛇蟲形而間有血鮮者此屬熱痢宜藿香正氣散加黑豆三十粒五苓散加木香半錢粟米少許下黃連丸或黃連阿膠丸茶梅丸熱甚服上項藥未效宜白頭翁湯赤痢發熱者敗毒散加陳倉米一撮煎若血色暗如瘀服涼藥而所下愈多去愈頻者當作冷痢宜理中湯或四君子湯加肉果一錢木香半錢加減平胃散青六丸治血痢佳諸血痢不止宜多用地榆易簡方云血痢當服胃風湯膠艾湯之類心經伏熱下純血色必鮮紅用犀角生磨汁半鍾硃砂飛研二錢牛黃三分人參末三錢和丸如麻子大燈心龍眼肉煎湯下六七分脾經受濕下血痢用蒼朮地榆湯血痢久不止腹中不痛不裡急後重槐花丸乾薑於火上燒黑不令成灰磁碗合放冷為末每服一錢米飲調下治血痢神效仲景云小腸有寒者其人下重便血可以此治之丹溪云下血者宜涼血和血當歸桃仁黃芩之類或用朴硝有風邪下陷宜升提之蓋風傷肝肝主血故也有濕傷血宜行濕清熱下墜異常積中有紫黑血而又痛甚者此為死血用桃仁細研及滑石行之血痢久不愈者屬陰虛四物湯為主論白痢東垣云大便後有白膿或只便白膿因勞倦氣虛傷大腸也以黃耆人參補之如裡急頻見汙衣者血虛也更加當歸如便白膿少有滑頻見汙衣者氣脫加附子皮甚則加御米殼如氣澀者只以甘藥補氣當安臥不言以養其氣氣澀忌御米殼但服甘藥安臥不言戴云白痢下如凍膠或如鼻涕此屬冷痢宜先多飲除濕湯加木香一錢吞感應丸繼進理中湯亦有下如魫音審魚子色或如臘茶色者亦宜用前白痢藥白臘治後重白膿論冷熱痢李氏曰冷熱不調赤白各半古姜墨丸或乍溏乍澀似痢非痢古萸連丸論暑痢準繩云感暑氣而成痢疾者其人自汗發熱面垢嘔逆渴欲引飲腹內攻刺小便不通痢血頻並宜香薷飲加黃連一錢佐以五苓散益元散白湯調服不愈則用蜜水調感暑成痢疼甚食不進六和湯藿香正氣散各半帖名木香交加散論秋痢準繩云老人深秋患痢發呃逆嘔者黃柏炒燥研末陳米飯為丸小豌豆大每服三十丸人參白朮茯苓三味濃煎湯下連服三劑即愈切不可下丁香等熱藥治冷痢腹中不能食肉豆蔻去皮醋麵裹煨熟搗末粥飲下二錢匕世俗治夏中暑痢疾用黃連香薷飲加甘草芍藥生薑神效者蓋夏月之痢多屬於暑潔古治處暑後秋冬間下痢用厚朴丸大效者蓋秋冬之痢多屬於寒經所謂必先歲氣毋伐天和者是也厚朴丸方見膈氣反胃門論濕痢丹溪云痢如豆汁者濕也蓋脾胃為水穀之海無物不受常兼四臟故有如五色之相染當先通利此迎而奪之之義如虛宜審之李氏曰濕痢腹脹身重下如豆汁或赤黑混濁危證也當歸和血散升陽除濕防風湯升陽益胃湯除濕湯豬苓湯戊己丸論風痢李氏曰風痢惡風鼻塞身痛色青或純下清水古蒼防湯神朮散青色帶白者風寒五積散帶紅胃風湯青綠雜色屬風火濕及五色俱下者乃脾胃食積及四氣相併而作古萸連丸救之論寒痢羅謙甫云至元乙亥廉臺王千戶領兵鎮漣水此地卑濕因勞役過度飲食失節至秋深瘧痢並作月餘不愈飲食全減形容羸瘦時已仲冬求治於予具陳其由診得脈弦細而微如蛛絲身體沉重手足寒逆時復麻痹皮膚痂疥如癘風之狀無力以動心腹痞悶嘔逆不止皆寒濕為病久淹真氣衰弱形氣不足病氣亦不足陰陽皆不足也針經云陰陽皆虛針所不為灸之所為內經云損者益之勞者溫之十劑云補可去弱先以理中湯加附子溫養脾胃散寒濕澀可去脫養臟湯加附子固腸胃止泄痢仍灸諸穴以併除之經曰腑會太倉即中脘也先灸五七壯以溫養脾胃之氣進美飲食次灸氣海百壯生髮元氣滋榮百脈充實肌肉復灸足三里胃之合也三七壯引陽氣下交陰分亦助胃氣後又灸陽輔二七壯接續陽氣令足脛溫暖除清濕之邪迨月餘病退平復海藏云六脈沉緊按之不鼓膀胱勝小腸也或瀉痢不止而腹脹或純便赤血或雜以血膿小便不多而不渴精神短少或面白色脫此失血之故也或面黃氣短此本氣損少之故也小腸者手太陽丙火也膀胱者足太陽壬水也是壬水乘於小腸之位小腸被壬所克而外走也諸手經短而足經長兼五行相剋論之又足經來克手經此火投於水大寒水之證宜溫之可安其與難經一證寒熱相反亦名曰小腸瀉此名火投於水變為寒證又外傷足太陽膀胱經左脈俱浮表陽之候也忽變為內寒亦旺火投盛水而屈丙就壬化脈反不浮而微沉此內病與外病俱有此火投水例非精於脈診者孰能辨之論時疫痢大全良方云有一方一家之內上下傳染長幼相似是疫毒痢也治法雖當察運氣之相勝亦不可狎泥當先察其虛實冷熱首用敗毒散加人參甘草陳皮隨證用之論食毒痢陳無擇云飲食冷熱酒醴醯醢腸胃黏溢久積冷熱遂成毒痢嚴用和云或有飲食冷酒寒物房室勞傷精血而成久毒痢則宜化毒以保衛之劉宗厚曰人之飲食過傷恣食辛熱寒冷之物皆能致傷腸胃腸胃一傷不能運化傳送遂蓄積停滯而為痢經曰飲食不節起居不時者陰受之陰受之則入五臟䐜滿閉塞下為飧泄為腸澼是也治法當先消化食毒或可攻伐然後隨寒熱溫涼以調之此二論本諸內經而世所未言者也李氏曰積痢色黃或如魚腦腹脹痛惡食者保和丸急痛神保丸一切酒食積聚或黃或赤通元二八丹傷酒甚酒蒸黃連丸傷水飲腹脹痛者溫六丸體實者導水丸論蟲疰痢李氏曰蟲疰痢黑如雞肝發渴五內切痛乃服五石湯丸逼損真陰其血自百脈經絡而來茜根丸救之亦有宜溫熱藥者論發熱丹溪云身熱挾外感者不惡寒用小柴胡去人參發熱惡寒身痛此為表證宜微汗和解用蒼朮川芎陳皮芍藥甘草生薑煎服發熱不止者屬陰虛用寒涼藥必兼升藥溫藥李氏曰痢疾初起發熱惡寒頭疼身痛帶表證也熱者九味羌活湯寒者不換金正氣散論腹痛金匱云下痢腹痛紫參湯主之潔古云厚朴丸治處暑後秋冬間腹痛下痢大效丹溪云初下痢腹痛不可用參術然氣虛胃虛者可用初得之亦可用大承氣調胃承氣下之看其氣病血病然後加減用藥腹痛者肺經之氣鬱在大腸之間者以苦梗發之然後用治痢藥氣用氣藥血用血藥其或痢後糟粕未實或食粥稍多或飢甚方食肚中作痛切不可驚恐當以白朮陳皮各半煎湯和之自安粥多及食肉作痛者宜奪食奪食者減其粥食絕其肉味也又云腹痛以白芍甘草為君當歸白朮為佐惡寒者加桂惡熱者加黃柏氣血俱虛腹痛頻並後重不食或產後得此者四君子湯加當歸陳皮煎下保和丸二三十粒東垣云因傷冷水瀉變作赤白痢腹痛減食熱燥四肢困倦無力宜茯苓湯羅謙甫云下痢之後小便利而腹中滿痛不可忍此名陰陽反錯不和之甚也越桃散主之統旨云機要謂腹痛宜和和之一字總言之耳其證有五因內氣鬱結不行宜行氣散郁挾寒者溫中湯火熱者黃芩芍藥湯積滯者木香導滯湯血虛者當歸芍藥湯準繩云仲景建中湯治利不分赤白久新但腹中大痛者神效其脈弦急或澀浮大按之空虛或舉按皆無力者是也下痢膿血稠黏腹痛後重身熱久不愈脈洪疾者芍藥黃芩湯膿血痢無度小便不通腹中痛當歸導氣湯論裡急後重病機云裡急後重脈大而洪實為裡熱甚而閉是有物結墜也若脈浮大甚不宜下雖裡急後重而脈沉細弱者謂寒在內而氣散也可溫養自愈裡急後重閉者大腸經氣不宣通也宜加檳榔木香宜通其氣原病式云下迫後重裡急窘迫急痛也火性急速而能燥物故也仲景云熱利下重者白頭翁湯主之下痢膿血裡急後重日夜無度宜導氣湯潔古云大瘕泄者裡急後重數至圊而不能便莖中痛用清涼飲子主之其泄自止莖中痛者屬厥陰加甘草梢裡急後重多者屬少陰加大黃令急推去舊物則輕矣內經曰因其重而減之又云在下者引而竭之裡急後重數至圊而不能便皆宜進退大承氣湯主之東垣云下痢赤白後重遲澀宜感應丸凡用諸承氣等藥推積之後仍後重者乃陽不升也藥中當加升麻升其陽其重自去也裡急後重數至圊而不能便或少有白膿或少血者慎勿利之宜升陽除濕防風湯丹溪云或曰治後重疏通之劑羅謙甫水煮木香膏東垣白朮安胃散等方已盡矣又有用御米殼等固澀之劑亦愈者何也曰後重本因邪壓大腸墜下故大腸不能升上而重是以用大黃檳榔輩瀉其所壓之邪今邪已瀉其重仍在者知大腸虛滑不能自收而重是以用御米殼等澀劑固其滑收其氣用亦愈也然大腸為邪墜下之重其重至圊後不減大腸虛滑不收之重其重至圊後隨減以此辨之百不失一也其或下墜異常積中有紫黑血而又痛甚此為死血證法當用桃仁泥滑石粉行之或口渴及大便口燥辣是名挾熱即加黃芩或口不渴身不熱喜熱手熨燙是名挾寒則加乾薑後重積與氣墜下服升消藥不愈者用秦艽皂角子煨大黃當歸桃仁枳殼黃連等劑若大腸風盛可作丸服其或下墜在血活之後此為氣滯證宜前藥加檳榔一枚後重當和氣積與氣墜下者當兼升兼消升謂升麻之類消謂木香檳榔之類劉宗厚曰按裡急者窘迫急痛是也後重者大腸墜重而下也夫裡急後重其證不一有因火熱者所謂火性急速而能燥物是也有因氣滯者此大腸經氣壅而不宣通也有因積滯壅盛者是有物結墜也有氣虛者此大腸氣降而不能升也有血虛者所謂虛坐努責是也治法火熱者寒之清之氣滯者調之積滯者去之氣虛而降者升之舉之血虛者補之各察其所因而已論虛坐努責東垣云虛坐而不得大便皆因血虛也血虛則裡急加當歸身凡後重逼迫而得大便者為有物而然今虛坐努責而不得大便知其血虛也故用當歸為君生血藥佐之丹溪云其或氣行血和積少但虛坐努責此為亡血證倍用當歸身尾卻以生地黃生芍藥生桃仁佐之復以陳皮和之血生自安論膿血稠黏羅謙甫曰內經膿血稠黏皆屬相火夫太陰主瀉少陰主痢是先泄其津液而火就燥腎惡燥居下焦血分其受邪者故便膿血然赤黃為熱青白為寒治須兩審治熱以堅中丸豆蔻丸香連丸治寒白膠香散或多熱少寒水煮木香膏虛滑頻數宜止宜澀宜養臟湯潔古云溲而便膿血者小腸泄也脈得五至以上洪大者宜七宣丸脈平和者立秋至春分宜香連丸春分至立秋宜芍藥柏皮丸四時皆宜加減平胃散如有七宣丸證者亦宜服此藥去其餘邪兼平胃氣論滑脫丹溪云其或纏滯退減十之七八穢積未盡糟粕未實當以炒芍藥炒白朮炙甘草陳皮茯苓煎湯下固腸丸三十粒然固腸丸性燥恐尚有滯氣未盡行者但當單飲此湯固腸丸未宜遵用蓋固腸丸者雖有去濕實腸之功其或久痢體虛氣弱滑泄不止又當以訶子肉豆蔻白礬半夏等藥澀之甚者添牡蠣可擇用之然須以陳皮為佐恐太澀亦能作疼又甚者灸天樞氣海此二穴大能止泄仲景云下痢便膿血者桃花湯主之桃花湯主病屬下焦血虛且寒非乾薑之溫石脂之澀且重不能止血用粳米之甘引入腸胃李氏曰滑痢不禁甚則脫肛血分四物湯加參朮地榆樗白皮氣分真人養臟湯大斷下丸靈砂蒼榆湯論脫肛東垣云一老僕脫肛日久近復下痢裡急後重白多赤少不任其苦此非肉食膏粱者也必多蔬食或飲食不節天氣已寒衣蓋又薄寒侵形體不禁而腸頭脫下者寒也滑也真氣不禁形質不收乃血脫也此乃寒滑氣泄不固故形質下脫也當以澀去其脫而除其滑以大熱之劑除寒補陽以補氣之藥升陽益氣以微咸之味固氣上收名之曰訶子皮散一服減半再服全愈戴云脫肛一證最難為藥熱則肛門閉寒則肛門脫內用磁石研末每二錢食前米飲調下外用鐵鏽磨湯蕩洗論大孔開世云痢大便不禁其大孔開如空洞不閉者用蔥和花椒末搗爛塞穀道中並服酸澀固腸之劑收之如御米殼訶子皮之類是也神效論大孔痛丹溪云痢久大孔痛亦有寒熱者熟艾黃蠟訶子燒熏之因熱流於下檳榔木香黃芩黃連加炒乾姜久下赤白大孔痛不可忍炒鹽熨之又炙枳實熨之陳伯天性急好酒色奉養過厚適有事多憂恐患久瘧寒熱無時忽一日大發熱大便所下皆是積滯極臭大孔極痛呻吟不絕其孔陷下予曰此大虛也脈皆弦大而浮遂以瓦片令敲圓如銅錢狀燒紅投童子小便中急取起令乾以紙裹安痛處其時寒恐外寒乘虛而入也以人參當歸陳皮作濃湯飲之食淡味至半月而安趙氏曰仲景治法大孔痛一曰溫之一曰清之若久病身冷自汗脈沉小宜溫暴病身熱脈洪宜清論泄痢而嘔病機云如痢或泄而嘔者胃中氣不和也上焦不和治以生薑橘皮中焦不和治以芍藥當歸桂茯苓下焦不和而寒治以輕熱藥甚治以重熱藥統旨云痢而嘔者謂胃氣不和宜姜橘白朮湯因火逆衝上而嘔者加薑汁炒黃連胃虛而嘔者加人參倍術積滯毒氣上攻而嘔者用木香導滯湯陰虛者四物湯加參朮苓柏陳皮下痢呃逆同治李氏曰下痢嘔吐有寒熱者屬半表柴苓湯頑痰在膈者芩連二陳湯加防風桔梗蘆探吐火衝上者清六丸毒滯上攻者平胃散加黃連木香檳榔虛嘔食少者四君子湯加陳皮厚朴麥門冬竹茹或溫六丸日久陰虛者八物湯合二陳湯加枳梗論下痢呃逆丹溪云呃病自下衝上屬火之象古方悉以胃弱言之殊不知胃弱者陰虛也虛之甚也滯下之久多見此證乃因久下而陰虛也詳見呃逆本門百一選方云噤口痢是毒氣上衝心肺所致用石蓮肉以通心氣劉宗厚曰按痢而能食知胃未病也若脾胃濕熱之毒熏蒸而上以致胃口閉塞而成噤口之證理宜除胃口之邪熱而此云毒氣上衝心肺其毒不知指何者之邪然亦有脾胃虛而得者亦有誤服利劑藥毒犯胃者又有服澀熱之劑太早而邪氣閉遏於胃口者必當求責準繩云痢疾不納食或湯藥入口隨即吐出者俗名噤口有因邪留胃氣伏而不宣脾氣澀而不布故嘔逆而食不得入者有陽氣不足胃中宿食因之未消則噫而食卒不下者有肝乘脾胃發嘔飲食不入縱入亦反出者有水飲所停氣急而嘔谷不得入者有火氣炎熾內格嘔逆而食不得入者有胃氣虛冷食入反出者有胃中邪熱不欲食者有脾胃虛弱不欲食者有穢積在下惡氣熏蒸而嘔逆食不得入者當各從其所因以為治世云以脈證辨之如脾胃不弱問而知其頭疼心煩手足溫熱未嘗多服涼藥者此乃毒氣上衝心肺所以嘔而不食宜用敗毒散每服四錢陳倉米一百粒姜三片棗一枚水一盞半煎八分溫服若其脈微弱或心腹膨脹手足厥冷初病則不嘔因服罌粟殼烏梅苦澀涼藥太過以致聞食先嘔者此乃脾胃虛弱用山藥一味銼如小豆大一半入銀瓦銚內炒熟一半生用同為末飯飲調下丹溪云噤口痢胃中熱甚大虛大熱故也用人參一錢黃連姜炒一錢濃煎汁終日細細呷之如吐再吃但一呷下咽便開痢亦自止神效又用田螺搗盦音諳覆也臍中以引下其熱胃口熱結當開以降之人不知此多用溫藥甘味此以火濟火以滯益滯也亦有誤服熱毒之藥犯胃者當推明而祛其毒用糞蛆焙乾為末米飲調下一錢甚效楊仁齋曰下痢噤口不食者雖曰脾虛蓋亦熱氣閉隔心胸間所致俗用木香則失之溫用山藥則失之閉惟真料參苓白朮散加石菖蒲末以道地粳米飲乘熱調下或用人參茯苓石蓮子肉入些菖蒲為末與之胸次一開自然思食戴復庵用治中湯加木香半錢或縮砂一錢論久痢丹溪云或在下則纏滯在上則嘔食此為毒積未化胃氣未平證當認其寒則溫之熱則清之虛則用參術補之毒解積下食自進矣治族叔年七十稟壯形瘦夏末患泄痢至秋百方不應視之病雖久而神不瘁小便澀少而不赤兩手脈俱澀而頗弦自言胸微悶食亦減因悟此必多年沉積癖在腸胃詢其平生喜食何物曰喜食鯉魚三年無日不用此積痰在肺肺為大腸之臟宜大腸之不固也當與澄其源而流自清以茱萸陳皮青蔥蔍首根生薑煎濃湯和以砂糖飲一碗許自以指探喉中至半時吐痰半升如膠其夜減半次早又服又吐半升而痢自止又與平胃散加白朮黃連旬日而安朱仲苻年近七十右手風攣多年七月患瀉痢百藥不愈診其脈右手浮滑而洪數予曰此必太陰分有積痰肺氣壅鬱不能下降大腸虛而作泄當治上焦遂用蘿蔔子加漿水蜜探之而吐得痰一塊大如碗色如琥珀稠黏如膠痢遂止不服他藥一人患痢百餘日百法不效六脈促急沉弦細弱芤左手為甚晝夜十行視之穢物甚少雖下清涕中有紫黑血絲食全不進此非痢也當作瘀血治之其人問瘀血何事而致予曰飽食急走極力叫罵歐打顛撲多受疼痛盛怒不泄補塞太過大酒大肉皆能致之彼云去歲枉受責杖經涉兩年恐非此等瘀血予曰服吾藥瘀血下則生矣以桃仁乳香沒藥滑石佐以檳榔木香神麯糊為丸以米飲下百粒至夜半不動又依前法下二百粒至天明下穢如爛魚腸者二升半困頓終日漸與粥食而安此方當有大黃無則難下潔古云泄痢久不安膿血稠黏裡急後重日夜無度宜大黃湯用大黃一兩銼用好酒兩大盞浸半日同煮一盞半去渣分為二次頓服之痢止停服未止再服以利為度又服芍藥湯以和之所以徹其毒也丹溪云久痢體虛氣弱滑泄不止又當以訶子肉豆蔻白礬半夏牡蠣之數擇用以澀之然須以陳皮為佐恐太澀亦能作疼又甚者灸天樞氣海天樞穴在臍旁各二寸氣海穴在臍下一寸半李氏曰初病元氣實者可行若五六日脾胃虛者只宜和解及分利小便消導食積無積不成痢也稍久以氣血藥中加升麻柴胡防風蒼朮以提之久甚乃用粟殼肉豆蔻龍骨牡蠣訶子以澀之斂之食少者專調脾胃飲食進而氣血自和蓋痢胃氣為本也其間有裡急甚而無表者即宜通利有虛而不敢通者或和解或即升舉有氣陷下痢如注者即暫止澀有滑脫痛甚者痰火盛也宜吐宜升痰消火降而大腸自斂須憑脈證斷之虛痢困倦穀食難化腹微痛或大痛並無努責血虛淡紅通元二八丹日久四物湯加升麻香附側柏葉氣虛色白如鼻涕凍膠四君子湯理中湯俱加木香肉桂厚朴茯苓散風邪利水道開胃脘日久者補中益氣湯虛甚厥逆脈微者四順散黑錫丹論休息痢準繩云休息痢多因兜住太早積不盡除或因痢愈而不善調理以致時止時作宜四君子湯加陳皮一錢木香半錢吞駐車丸只緣兜住積滯遂成休息再投去積卻用兜劑李氏曰休息痢經年月不瘥有過服涼藥以致氣血虛者八物湯加陳皮阿膠芩連少許或十全大補湯脾胃虛者補中益氣湯參苓白朮散腎虛者四神丸赤石脂丸有誤服澀藥餘毒不散者古芩術湯神效丸六神丸有積者通元二八丹積消毒散脾胃已和氣血將復然後用百中散以止之若更澀早則纏綿胃敗難救論勞痢準繩云勞痢因痢久不愈耗損精血致腸胃空虛變生他證或五心發熱如勞之狀宜蕷蓮飲赤多倍蓮肉白多倍山藥痢後調補宜四君子湯加陳皮一錢半即異攻散或七珍散惡甜者生料平胃散加人參茯苓各半錢李氏曰房勞傷精血成毒者腎氣丸虛勞挾痢者香連豬肚丸凡痢經下後痛墜不減虛坐努責及久不愈者皆陰血虛也胃風湯去桂加熟地黃主之論諸病壞證久下膿血準繩云諸病壞證久下膿血或如死豬肝色或五色雜下頻出無禁有類滯下俗名刮腸此乃臟腑俱虛脾氣欲絕故腸胃下脫若投痢藥則誤矣六柱飲去附子加益智仁白芍藥或可冀其萬一論痢後風準繩云痢後風因痢後下虛不善調理或多行或房勞或感外邪致兩腳痿軟若痛若痹遂成風痢獨活寄生湯吞虎骨四斤丸或用大防風湯或多以骨碎補三分之一同研取汁酒解服外以杜仲牛膝杉木節白芷南星萆薢煎湯熏洗丹溪云痢後風系血入臟腑下未盡復還經絡不得行故也松明節一兩以乳香二錢炒焦存性蒼朮黃柏各一兩紫葳一兩半甘草半兩桃仁去皮不去尖一兩俱為末每服三錢生薑同杵細水蕩起二三沸服鄰人鮑子年二十餘因患血痢用澀藥取效後患痛風號叫撼鄰里予視之曰此惡血入經絡證血受濕熱久為凝濁所下未盡留滯隧道所以作痛經久不治恐成枯細遂與四物湯桃仁紅花牛膝黃芩陳皮甘草煎生薑汁研潛行散入少酒飲之數十帖又與刺委中出黑血近三合而安痢後腳弱漸細小用蒼朮二兩白芍藥龜板各二兩半黃柏五錢粥糊丸以四物湯加陳皮甘草煎湯送下李氏曰愈後余瘀當防三白湯六神丸枳朮丸太和羹選用有手足腫者有遍身歷節痛者俱余瘀留滯經絡不可純用風藥鶴膝風大防風湯五積交加散腳細者蒼龜丸論痢後調理寶鑑云且如瀉痢止脾胃虛難任飲食不可一概用克伐之劑若補養其脾胃氣足自然能飲食宜錢氏方中異功散設或喜嗜飲食太過有傷脾胃而心腹痞滿嘔逆噁心則不拘此例當權用橘皮枳朮丸一服得快勿再服若飲食調節無傷則胃氣和平矣丹溪云痢後糟粕未實或食稍多或飢甚方食腹中作痛者以白朮陳皮等分煎服和之則安氣血俱虛神弱者以參朮當歸芍藥茯苓少加黃連服之或錢氏白朮散診法脈經曰腸澼下膿血脈沉小留連者生洪大數身熱者死又曰腸澼筋攣脈小細安靜者生浮大而緊者死脈訣舉要曰澀則無血厥寒為甚尺微無陰下痢逆冷又曰無積不痢脈宜滑大浮弦急死沉細無害丹溪云下痢純血者如塵腐色者如屋漏者大孔如竹筒者唇如硃紅者俱死如魚腦者身熱脈大者俱半死半生經所謂身涼脈細者生身熱脈大者死亦是大概言之不可以途而論也治痢疾初起方蕩積行氣之劑治痢散治痢疾初起之時不論赤白皆效葛根苦參酒炒陳皮陳松蘿茶各一斤赤芍酒炒麥芽炒山楂炒各十二兩上為末每服四錢小兒減半忌葷腥麵食煎炒開氣發氣諸物本方加川黃連四兩尤效樸黃丸治痢初起腹中實痛不得手按此有宿食也宜下之陳皮厚朴薑汁炒各十二兩大黃酒蒸一斤四兩廣木香四兩上為細末荷葉水泛為丸如綠豆大每服三錢開水下小兒一錢導氣湯治下痢膿血裡急後重日夜無度此方行血調氣深合經旨芍藥二錢當歸一錢半大黃黃芩各二錢黃連木香檳榔各七分上㕮咀作一服水二盞煎一盞去渣溫服如未止再服一方有枳殼五分河間芍藥湯多甘草官桂二味利勢不減漸加大黃窘迫甚者加芒硝一錢如痞滿氣不宣通加枳實一錢木香導氣湯治痢疾初起腹痛紅白相兼裡急後重發熱噤口無問老幼先與一服甚效大黃一錢半黃連芍藥生用各一錢二分厚朴檳榔枳實各一錢當歸茯苓朴硝各八分木香五分上銼水二鍾煎七分空心服一方無枳實小便赤加滑石木通加減導氣湯治痢疾初起不問赤白以此導之白芍藥二錢大黃三錢煎熟入黃連厚朴薑製枳殼麩炒各一錢半黃芩木香檳榔各一錢青皮炒五分上銼加生薑三片水煎食前熱服渣再煎得利數行即愈二帖後不愈去檳榔厚朴枳殼大黃加白朮一錢半白茯苓陳皮各一錢有血加當歸一錢桃仁十個黃連減半食少加炒神麯芍藥湯河間行血調氣經曰溲而便膿血知氣行而血止行血則便膿自愈調氣則後重自除芍藥一兩當歸黃連黃芩各半兩大黃三錢木香檳榔甘草炙官桂各二錢上㕮咀每服五錢水二盞煎至一盞食後溫服如痢不減漸加大黃窘迫甚者加芒硝半兩如痞滿氣不宣通加枳實半兩如臟毒下血加黃柏半兩寧胃散白芍藥炒二錢黃芩炒黃連炒木香枳殼炒各一錢半檳榔一錢甘草炙三分上銼水煎服若腹痛加當歸一錢半砂仁一錢再加木香芍藥各五分若後重加滑石炒一錢半再加枳殼檳榔各五分生芍藥條黃芩各五分若痢已久而後重不去此大腸墜下去檳榔枳殼用條黃芩升麻各一錢以升提之若白痢加白朮茯苓炒滑石陳皮各一錢稍久胃虛減芩連芍藥各七分亦加上數味惟去滑石檳榔枳殼再加縮砂炙乾姜各五分初欲下之再加大黃五錢兼食積加山楂梔子枳實各一錢若紅痢加當歸川芎桃仁各一錢半稍久胃虛減芩連各五分加當歸川芎熟地黃阿膠硃砂陳皮各一錢白朮一錢半若紅白相雜加芎歸桃仁陳皮蒼朮各一錢半若色赤黑相雜此濕勝也及小便赤澀少加木通澤瀉茯苓各一錢山梔五分以分利之若嘔吐食不下加軟石膏一錢半陳皮一錢山梔五分入生薑汁緩呷之以瀉胃口之熱有氣血虛而痢者用四物湯加參朮陳皮黃芩阿膠之類以補之有寒痢者黃連木香酒炒芍藥當歸炒乾薑砂仁厚朴肉桂之類寧胃解毒湯白芍藥一錢五分黃連枳殼炒茯苓各一錢青皮檳榔各七分木香澤瀉甘草各五分上銼一服水二鍾姜三片煎服初感積滯濕熱正熾下之加大黃朴硝各一錢血痢加黃芩炒川芎當歸各六分腹痛加澤瀉延胡索各八分赤白兼下加川芎桃仁滑石炒當歸尾陳皮乾薑炒各五分白痢久者胃虛加白朮黃耆茯苓各一錢去檳榔枳殼黃連赤痢久弱下後未愈去苓連加當歸白芍藥炒白朮熟地黃川芎阿膠珠各一錢濕勝少水少加木通澤瀉茯苓炒山梔各五分下後二便流利惟後重不去以升麻川芎提之痢人氣血兩虛以八物湯養之痢久滑泄腹中已清二便流利加罌粟殼訶子阿膠以止澀之易簡承氣湯大黃五錢枳實米泔潤切三錢甘草二錢上銼先以大黃一半同二味煎服又入一半起去渣溫服氣虛者大黃三錢枳實二錢甘草一錢調胃承氣湯小承氣湯大承氣湯三方見大便燥結門大承氣湯上銼下詳解四味香連丸治痢疾初發三五日內不問赤白每日二服有積自行無積自止木香二兩檳榔一兩黃連炒十兩大黃酒煨四兩上為細末陳曲糊為丸如綠豆大每服七十丸空心米湯下一方下痢色黑用大黃色紫用地榆色紅用黃芩色淡用生薑色白用肉桂色黃用山楂水瀉用粟殼痛甚用木香山梔各煎湯送下如神導氣丸青木香蘿蔔子茴香檳榔黑牽牛各四兩上為細末薄粥丸如桐子大每服三十丸加減導氣丸痢初發三五七日內不問赤白紫紅每日二服有積自行無積自止止後勿服黃連生薑汁炒炒厚朴硝水浸白芍藥半生半炒黃芩炒大黃木香青皮枳殼麩炒各二兩上為末蜜少入薑汁打糊丸如桐子大每服四五十丸白湯下木香檳榔丸治一切氣滯並食積酒毒下痢膿血及米穀不化木香檳榔青皮陳皮枳殼廣朮即莪朮黃連黃柏大黃各一兩黑牽牛香附各二兩上為末滴水丸如桐子大每服五六十丸溫水下加至以利為度一方有當歸黃芩各一兩木香枳殼丸治痢疾裡急後重兼開胸膈進飲食破滯氣散內熱木香檳榔陳皮去白青皮黃連當歸蓬朮煨枳殼麩炒各五錢香附子黃柏各一兩半黑牽牛頭末二兩上為末水丸桐子大每服五七十丸薑湯下元青丸治下痢勢惡頻並窘痛或久不愈諸藥不能止如可下之以開除濕熱痞悶積滯而使氣液宣行者宜以此逐之兼宣利積熱酒食積黃瘦中滿水腫腹脹兼療小兒驚疳積熱乳癖諸證泄瀉勿服黃連黃柏大黃甘遂芫花醋拌炒大戟各五錢牽牛四兩取頭末二兩青黛一兩輕粉二錢上為末水丸小豆大初服十丸每服加十丸空心日午臨臥各一服以快利為度後常服十五丸數日後得食力如利尚未痊再加取利利後卻常服以意消息病去為度後隨證止之小兒丸如黍米大退驚疳積熱不須下者常服十丸此藥峻利非有實積者不宜輕用慎之閘板丹專治一切水瀉痢疾黃丹水飛三兩乳香沒藥各三錢杏仁去皮尖二十四粒巴豆去油膜二十四個黃蠟二兩淨上將四味研為極細末先將黃蠟熔開後將藥末同黃丹拌勻入蠟內攪冷成錠油紙裹封旋丸如桐子大每服大人一丸小兒半丸其效如神忌生冷油膩水瀉白湯下紅痢甘草湯下白痢乾薑湯下紅白相兼甘草乾薑湯下通元二八丹治痢疾奇效如神若腸風下血可常服黃連去毛八兩當歸生地黃白芍藥烏梅肉各五錢上為細末以雄豬肚一個鹽醋洗淨去穢氣煮將熟取出水控干入藥在內置甑中上下用韭菜厚鋪自辰至酉慢火蒸之以銀簪插試有黃色為度乘熱搗三千杵丸如桐子大每服七十丸食後以生薑湯下則行以細茶湯下則止能通能塞故曰通元治積聚空心以薑湯服瀉一二次即除用粥補之治瀉痢飯後以茶湯服即止又方治一切痢黃連枳殼甘草炙烏梅各半兩上㕮咀每服半兩水煎空心服忌魚豬生冷等物三味黃丸子止諸痢黃連八兩枳殼黃柏各四兩上為細末麵糊丸如桐子大每服二三十丸空心飲湯下如裡急後重枳殼湯下犀角丸但是痢服之無不瘥者犀角屑取黑色紋理粗者宣州黃連苦參金州黃柏赤色緊薄者川當歸五味俱另搗取細末各等分上和勻空腹爛煮糯米飲調方寸匕服之日再服忌黏滑油膩生菜治赤痢方芍藥黃連湯保命治大便後下血腹中痛者謂之熱毒下血芍藥當歸黃連各半兩大黃甘草炙各一錢桂枝淡味五分上㕮咀每服半兩水一盞煎至七分食後溫服如痛甚者調木香檳榔末一錢服之黃連湯保命治大便後下血腹中不痛謂之濕毒下血黃連去須當歸各半兩甘草炙二錢上㕮咀每服五錢煎服當歸芍藥湯治血虛下痢當歸川芎各一錢半芍藥炒三錢生地黃黃連炒木香各一錢上銼水煎食前服加味四物湯治下痢純血久不愈屬陰虛當歸酒洗川芎白芍藥炒生地黃酒炒槐花炒黃連炒桃仁去皮尖各等分上銼水煎服解毒金花散治下痢膿血熱毒黃連黃柏各一兩黃芩白朮赤芍藥赤茯苓各半兩上㕮咀每服一