香薷黃連白扁豆厚朴豬苓澤瀉白朮白茯苓白芍藥上銼水煎服薑茶湯治痢疾腹痛不問赤白冷熱蓋姜能助陽茶能助陰二者皆能消散又且調平陰陽至於暑毒酒食毒皆能解之老生薑細切三片細茶葉三錢上用新水煎服一方加連根韭菜同搗汁酒調服仙梅丸治痢疾發熱發渴者細茶烏梅水洗剝去核曬乾上為末生蜜搗作丸如彈子大每服一丸水冷熱隨下一方陳白梅好茶蜜水各半煎服治濕痢方升陽除濕湯自下而上者引而去之蒼朮一錢柴胡羌活防風升麻神麯澤瀉豬苓各五分炙甘草陳皮麥蘖面各三分上作一服水煎空心服如胃寒腸鳴加益智仁半夏各五分生薑三片棗一枚非腸鳴不得用加木香治痢如魚凍者最效升陽除濕防風湯治大便閉或裡急後重數至圊而不能便或少有白膿血少有血慎勿利之升舉其陽則陰氣自降矣蒼朮米泔浸炒四錢防風三錢白朮一錢茯苓白芍藥各一錢上㕮咀作一服除蒼朮另作片子水一碗半煮至二盞納諸藥同煎至一盞稍熱服空心食前服茯苓湯東垣治因傷冷水瀉變交作赤白痢腹痛減食熱燥四肢困倦無力茯苓豬苓各六分澤瀉歸身各四分芍藥一錢半升麻柴胡各一錢蒼朮二分黃芩三分肉桂甘草炙各五分生薑二錢上㕮咀作二服水煎食前稍熱服一方無升麻柴胡加減胃苓湯治暴痢赤白相雜腹痛裡急後重蒼朮厚朴茯苓豬苓澤瀉各八分白朮陳皮甘草炙黃連各一錢木香三分檳榔五分上銼水二鍾煎八分通口服丹溪方治因飲水過多腹脹泄痢帶白蒼朮厚朴白朮茯苓滑石上銼水煎下保和丸又云加炒曲甘草戊己丸治脾經受濕瀉痢不止米穀不化臍腹刺痛黃連吳茱萸去梗炒白芍藥各三兩上為末麵糊丸如桐子大每服五七十丸空心米飲下日三服堅中丸治脾胃受濕滑泄注下黃連黃柏赤茯苓澤瀉白朮各一兩陳皮肉豆蔻白芍藥人參官桂半夏曲各五錢上為末湯浸蒸餅為丸如桐子大每服五七十丸食前溫米飲下治風痢方倉廩湯治痢疾赤白發熱不退腸胃中有風邪熱毒及時行瘟疫沿門闔境皆下痢噤口者服之神效即人參敗毒散加陳倉米人參茯苓甘草川芎枳殼桔梗羌活獨活前胡柴胡陳倉米各等分上㕮咀每服五錢生薑三片水煎不拘時熱服痢後手足疼痛加檳榔木瓜煎若不早治有成鶴膝風者胃風湯治風入腸胃作痢或白或赤或如豆汁或痢久人弱脈虛色如塵腐將危者亦能救治人參白朮茯苓川芎芍藥當歸羌活防風上銼加黍米水煎服腹痛加木香六一順氣湯治痢不問赤白相雜肚痛裡急後重渾身發熱口乾發渴用此通理即止柴胡黃芩芍藥枳實厚朴大黃芒硝甘草上銼劑先將水二鍾煎滾三沸後入藥煎至一碗臨服入鐵鏽水三匙調服防風芍藥湯治泄痢飧泄身熱脈弦腹痛而渴及頭痛微汗防風芍藥黃芩各一兩上㕮咀每服一兩水煎食前服枳實三百丸治腸風久不已而下痢膿血日數十度枳實皂角刺槐花生各五錢上為末煉蜜丸如桐子大每服三十丸米飲酒任下治寒痢方理中湯治脾胃寒濕瀉痢方見泄瀉門溫中湯治痢疾挾寒蒼朮木香乾薑炒各一錢半芍藥炒厚朴薑汁炒青皮砂仁各一錢二分上銼水煎服訶黎散治脾胃虛弱內挾冷氣心脅刺痛嘔吐噁心腸鳴泄瀉水穀不化漸成痢疾訶子肉豆蔻麵裹煨青皮各四兩附子炮去皮一兩肉桂去皮五錢上為末每服三錢水一盞半加生薑三片煎至七分食前溫服地榆散治大人小兒脾胃氣虛冷熱不調下痢膿血赤多白少或純下鮮血裡急後重小便不利地榆炒乾葛各四錢當歸赤芍藥茯苓各三錢乾薑炮甘草炙各二錢罌粟殼蜜炙六錢上為細末每服二錢用熱水調下不拘時木香散治脾胃虛弱內挾風冷泄瀉注下水穀不化腹中絞痛久痢脾滑不禁木香附子醋煮去皮臍赤石脂訶子肉甘草炙各一錢當歸二錢藿香肉豆蔻麵煨各一錢半丁香五分上作一服加生薑三片棗二枚水煎食前服和中飲治痢疾不分赤白近服之無有不效者但發熱噤口者不可服白朮陳皮茯苓芍藥各一錢草果仁七分甘草三分陳倉米二錢砂糖三錢粟殼醋炙一錢半烏梅一個上銼加生薑三片棗一枚水煎服豆蔻燥腸丸治沉寒痼冷泄痢腹痛後重附子炮去皮赤石脂各一兩舶上硫黃良薑炒肉豆蔻乾薑炮各半兩上為末醋糊丸如桐子大每服二十丸米湯下忌生冷硬物及油膩木香豆蔻丸治臟腑極冷傷憊下泄米穀不化及一切冷痢脾泄無不取效惟熱痢熱瀉不治蓋藥性熱也隨證用之木香破故紙各一兩良薑厚朴制砂仁各七錢半陳皮赤芍藥官桂白朮各半兩吳茱萸湯炮胡椒各二錢半肉豆蔻四個麵煨檳榔一兩上為細末用漿水煮豬肝仍用些糊為丸如桐子大每服五七十丸空心米飲下豆蔻固腸丸治脾胃虛寒臟腑頻滑下痢赤白木香赤石脂乾薑縮砂厚朴薑製肉豆蔻麵裹煨各等分上為末麵糊丸如桐子大每服五十丸空心米飲下陳曲丸治腹中冷痛磨積止痢陳曲炒一兩半乾薑炮官桂白朮當歸厚朴人參甘草炙各半兩上為細末煉蜜丸如桐子大每服三五十丸酒送下或淡醋湯亦得食前一日三服白朮調中丸治脾胃不和米穀不消久痢赤白膿血相雜多日羸瘦不思飲食白朮半兩神麯炒四兩人參茯苓豬苓澤瀉各三錢乾薑炮甘草炙各一兩木香二錢官桂一錢半上為末麵糊丸如桐子大每服五七十丸空心淡薑湯下勝金丹乾薑黃蠟各等分上銀石器中化蠟入薑末丸如芥子大每服七丸或十四丸白痢酒下赤痢井花水下石脂神砂丹赤石脂一兩半水飛硃砂一兩細研生附子乾薑各五錢上為細末酒糊丸如黑豆大每服十五丸清水飲下一方治水瀉並赤白痢用草烏大者一兩半將一半燒灰一半生用為細末醋糊丸如綠豆大每服七丸赤痢甘草湯下白痢乾薑湯下水瀉井花水下並空心服忌腥臊熱毒諸冷物一方治氣痢乳汁煎蓽撥服之太平廣記貞觀中太宗苦於氣痢眾醫不效詔問群臣中有能治者當重賞之有衛士進此方服之立瘥治時疫痢方楊子建萬全護命方今有人患痢其脈微小再再尋之又沉而澀此之一候若下白痢其勢雖重庶幾可治若是下血切忌發熱通身發熱者死熱見七日死以上所陳雖未足以達痢之淵源亦足以明其粗跡議者謂如子所言自甲子至於癸亥每六十年中未嘗有一年不生痢疾今世人所患痢疾於數年中間忽止有一年其故何也答曰六十年中未嘗有一年無木土相攻未嘗無土火相郁未嘗無水火相犯但五運之政譬如權衡一年間五行氣數更相承製得其平等則其疾自然不作若或一氣大過一臟有餘痢疾之生應不旋踵予故備陳其粗以開後學之未悟庶幾診療之間無差誤之過者矣但毒痢傷人不一惟水邪犯心為重世人初患痢時先發寒熱投藥治之其熱不退發熱太甚食則嘔逆下痢不止心熱如火只要入涼處只思吃冷水忽思狂走渾身肌肉疼痛著手不得此候十難治其三四也治疫毒痢方須是仔細首尾讀此方論令分明識病根源然後吃藥但毒痢初得時先發寒熱忽頭痛忽壯熱忽轉數行便下赤痢忽赤白相雜忽止下白痢或先下白痢後變成赤痢或先下赤痢後卻變成白痢並宜吃此方但初下痢時先發寒熱頭痛即是寒邪犯心寒氣犯心水火相戰故初病時先發寒熱水火相犯血變於中所以多下赤痢如紫草水如莧菜水無色澤者寒邪犯心之重也先發寒熱而所下之痢止白色者寒邪犯心之未動也先下白痢而後有赤痢之變者寒邪犯心其勢漸加也先下赤痢而後變成白痢者寒邪犯心其勢漸減也赤白相等者水火相犯其勢相等寒濕之氣相搏也忽有赤多而白少忽有赤少而白多此寒邪之勢有多少毒利之病有重輕以白多為輕赤多為重治之之法先奪其寒則其所下之藥一也以太歲分之則丙子丙午甲子甲午庚子庚午丙寅丙申年甲寅甲申年庚寅庚申年並辰戌之年運遇丙甲及庚運所臨其害尤甚及丑未之年宜有此候又兼無問太歲蓋天地變化其候多端難可窮盡今此但世人亦不必撞太歲但看一年中春夏之內多有寒肅之化陽光少見忽寒熱二氣更相交爭忽於夏月多寒濕之化寒邪犯心所受之痢先發寒熱忽頭痛忽先轉數行後有赤痢忽赤白相雜忽止下痢並宜吃此通神散吃後取壯熱便退若兩三盞後壯熱不退更不吃此方自別有方論在下第一通神散麻黃去根節官桂去粗皮各七錢半大川芎白朮各二兩藁本獨活桔梗防風芍藥白芷各半兩牡丹皮甘草各二錢半細辛三錢三分牽牛一錢七分上為細末每服二錢非時熟湯調下和渣熱吃若吃兩三盞後寒熱不退更不必吃自別有方論在下若吃此藥後寒熱已退赤痢已消減便修合第二方第三方藥吃取安效若寒熱已退赤痢未消減更服兩三盞然不可多吃一日只兩盞後赤痢消減忽變成白痢旋次修合第二方吃候出後度數減少便修合第三方吃取平安但六甲之年六庚之歲春夏之內時氣多寒人得痢疾此藥通神若是六甲之年丑未之歲濕化偏多人得痢疾先發寒熱即於方內添草豆蔻一兩同修合也又不問太歲但一年間春夏之內多寒人有痢疾先發寒熱並宜吃此方第二還真散治毒痢初得時先發寒熱吃前方寒熱已退赤痢已消減宜進此方若吃前方藥寒熱未退赤痢未消減更不宜進此藥但天地變化其候非常痢疾證候多端此不得不盡其仔細訶子五枚用麵裹火煨熟不要生亦不要焦去面不用就熱咬破訶子擘去核不用只用皮焙乾上搗羅為細末每服二錢匕以米湯一盞半同藥煎取一盞空心和渣吃若吐出一兩口涎更佳如此吃經數盞大腑漸安出後減少修合第三方藥吃以牢固大腸若吃前方藥壯熱未退血痢未減不可進此藥第三舶上硫黃丸治疫毒痢吃前面兩方病勢已減所下之痢止余些小或下清糞或如鴨糞或如茶湯或如燭油或只餘些小紅色宜吃此方以牢固大腸還復真氣舶上硫黃二兩去砂石細研為末薏苡仁二兩炒杵為末上二味相和令勻滴熟水和為丸如桐子大每服五十丸空心米湯下治食積痢方曲附丸治食積痢香附米神麯川芎梔子滑石山楂紅曲青黛桃仁上為末麵糊丸服曲藭丸治食積作痢及中風濕臟腑滑瀉川芎神麯白朮附子各等分上為細末麵糊丸如桐子大每服三五十丸溫米飲下此治冷飲食作痢熱則流通之理亦治飧泄利積丸治下痢赤白腹滿脹痛裡急上渴引飲小水赤澀此積滯也黃連炒蘿蔔子炒各四兩天水末八兩當歸二兩乳香一兩巴豆一兩去油同黃連一處炒上為末醋糊丸如桐子大弱者十五丸實者二十五丸溫水下黑丸子治脾胃怯弱飲食過傷留滯不化遂成痢下服此藥推導更須斟酌受病淺深增減丸數當逐盡積滯方佳然後徐徐補之烏梅肉杏仁去皮尖另研半夏湯泡七次縮砂各十四粒百草霜六錢巴豆霜去油五分上為細末和勻稀糊為丸如黍米大每服十五丸加至二十丸用白湯送下看人虛實加減丸數服之感應丸治大人小兒瀉痢水穀不分肚腹急痛此藥不損元氣只消積滯丁香乾薑百草霜各一錢木香二錢半肉豆蔻一個麵裹煨杏仁七個去皮尖巴豆七個去皮不去油上除巴豆杏仁百草霜余為細末同拌研令極細於銀器內酒煮黃蠟一兩放冷蠟浮用香油二錢先煎香熟次下蠟同化作汁銚內乘熱拌和前藥勻作錠子旋丸如豌豆大小兒如綠豆大每服五丸或七丸水瀉冷水下頭痛蔥白湯下如要取汗蔥白生薑湯下赤痢甘草湯下白痢乾薑湯下木香丸治痢疾木香三錢淡豆豉一兩洗淨巴豆四十九粒去殼針穿燈上燒存性另研上為末豆豉為丸綠豆大每服三丸紅痢甘草湯下白痢乾薑湯下木香不二丸治痢疾或赤或白或赤白交雜木香不見火肉豆蔻麵裹煨訶子煨取肉各一錢巴豆一兩去殼油另研淡豆豉一錢半一半入藥一半打糊上為末淡豆豉末同面打糊為丸如黃豆大量大小虛實加減每服只許一丸切忌服二丸食前或臨臥冷湯下赤痢地榆湯下白痢乾薑湯下赤白交雜甘草湯下服此藥後多行二三次即佳紅丸子治痢黃蠟五錢撫丹一兩巴豆四十九粒去心膜油木香乳香各四錢槐花二錢半上將蠟石器內熔開濾淨再化入藥末並丹勻待冷成膏油紙包旋丸如粟米大每服三五十丸白痢乾薑湯下赤痢甘草湯下水瀉煨薑湯下聖餅子寶鑑治積滯作痢臍腹作痛久不愈者黃丹密陀僧舶上硫黃各二錢定粉三錢輕粉少許上為細末入白麵四錢滴水和丸捻作餅子陰乾食前溫漿水磨化服之大便黑色為效通神丸治膿血雜痢後重疼痛日久不瘥沒藥五靈脂去砂石研乳香研各一錢巴豆霜研半錢上同研勻滴水為丸如黃米大每服七丸食前煎生木瓜湯下小兒服三丸隨歲加減魚鮓湯治痢下五色膿血或如爛魚腸並無大便腸中攪痛不可忍呻吟叫呼聲聞於外粉霜研輕粉硃砂研硇砂去砂石研白丁香各一錢乳香半錢巴豆二七粒去殼不去油上為末蒸棗肉為丸嬰兒三丸如粟米大二三歲如麻粒大四五歲每服三四丸並旋九煎鮓湯吞下仍間服調胃藥此證緣久積而成故小兒多有之靈砂丹治積痢定痛硇砂硃砂各等分研極細黃蠟五錢巴豆三七粒去殼皮膜同於銀石器內重湯煮一伏時候巴豆紫黑為度去二七粒止用一七粒研細上三味合一處研極勻再熔黃蠟和藥旋丸綠豆大每服二丸至五丸水瀉生薑湯下白痢艾湯下赤痢烏梅湯下服時須極空心服畢一時不可吃食臨臥尤佳次食淡粥一日瘧疾乳香湯麵東不發日晚間服本事方云此藥不動氣服之瀉者止痢者斷疼者愈有積者內化亦不動臟腑大凡痢有沉積者不先去其積雖暫安後必為害嘗記陳侍郎經中庚戌秋過儀真求診初不覺有疾及診視肝脈沉弦附骨取則牢予曰病在左脅有血積必發痛陳曰誠如是前某守九江被詔冒暑涉長江暨抵行朝血痢已數日矣急欲登對醫者以剛劑燥之雖得止數日臍下一塊大如杯旬日如碗大痛發則不可忍故急請公詞以歸耳奈何予曰積痢不可強止故積血結於臍脅下非抵當丸不可渠疑而不肯服次年竟以此終丹溪方或在下則纏滯在上則嘔食此為毒積未化胃氣未平證當認其寒則溫之熱則清之虛則用參術補之毒解積下食自進矣蒼朮白朮茯苓當歸白芍藥生地黃青皮黃連滑石甘草上銼水煎服如裡急後重加黃連滑石桃仁檳榔甚者加大黃嘔者加半夏薑汁治蠱疰痢方茜根丸治一切毒痢及蠱注下血如雞肝心腹煩痛等證茜根犀角升麻地榆當歸黃連枳殼白芍藥各等分上為末醋糊為丸如梧子大每服七十丸空心米飲下姜墨丸治蠱疰痢乾薑炒京墨煅各等分上為末醋糊丸如桐子大每服三五十丸米飲下治痢疾發熱方小柴胡湯治瀉痢身熱挾外感不惡寒柴胡黃芩半夏甘草上銼水煎服丹溪方治痢疾發熱惡寒身痛此為表證宜微汗和解蒼朮川芎陳皮芍藥甘草上加生薑煎服治痢疾腹痛方黃芩芍藥湯東垣治瀉痢腹痛或後重身熱久不愈脈洪疾者及下痢膿血稠黏黃芩芍藥各一兩甘草五錢上㕮咀每服一兩水一盞半煎至一盞溫服無時如痛甚加桂少許蒼朮芍藥湯治痢疾痛甚者蒼朮二兩芍藥一兩黃芩官桂各五錢上㕮咀每服一兩水煎溫服當歸導氣湯東垣治膿血痢無度小便不通腹中痛當歸芍藥各一錢青皮槐花炒各七分澤瀉五分木香檳榔各三分甘草一錢半生地黃酒浸陰乾一錢半或二錢上共為末用水煎食前溫服如小便利去澤瀉治痢止痛如神方川黃連切片淨一兩枳殼切片淨一兩上先用槐花三二兩以水浸片時漉淨同黃連炒老黃色次入枳殼再炒待燥揀出槐花不用止將黃連五錢枳殼五錢作一服水煎七分去渣調乳香沒藥淨末各七分五釐服之次照以前方再服一劑腹痛即止痢即稀神效此方有服之如醉者乃藥力行也不妨建中湯仲景治痢不分赤白新久但腹中大痛者神效其脈弦急或澀浮大按之空虛或舉按皆無力者是也方見霍亂門紫參湯金匱治下痢腹痛紫參半斤甘草三兩上銼以水五升先煮紫參取三升次納甘草煮取一升半分三次溫服神效越桃散治下痢之後小便利而腹中滿痛不可忍此名陰陽反錯不和之甚也大梔子良薑各三錢上為末米飲或酒調下三錢厚朴丸治處暑後秋冬間腹痛下痢大效厚朴蜀椒去目微炒川烏頭炮去皮各一兩五錢紫菀去苗土吳茱萸湯洗菖蒲柴胡桔梗茯苓官桂皂角去皮弦炙乾薑炮人參各二兩黃連二兩半巴豆霜半兩上為細末入巴豆霜和勻煉蜜為丸如桐子大每服三丸漸加至五七丸以利為度生薑湯下食後服黑子丸治痢疾定痛黃蠟五錢杏仁江子砂仁各二十一粒上三件香油燈上燒存性熔蠟和勻加乳香些少丸如米大每服十餘粒治裡急後重方導氣湯治下痢膿血日夜無度裡急後重方見前立效散治赤白痢疾膿血相兼裡急後重疼痛一服立止黃連四兩酒洗用吳茱萸二兩同炒去茱萸不用陳枳殼二兩麩炒去穰上為細末每服三錢空心黃酒調下泄瀉米湯下噤口痢陳米湯下木香黃連湯治下痢膿血裡急後重神效木香黃連川木通川黃柏枳殼麩炒陳皮各二錢半大黃三錢上㕮咀分作二帖用水二盞煎至八分去渣食前溫服木香化滯湯治赤白痢腹中疼痛裡急後重大便窘迫白朮茯苓枳殼麩炒厚朴薑汁炒芍藥各一錢二分人參陳皮澤瀉黃連檳榔各一錢木香七分上㕮咀水煎服白頭翁湯金匱治熱痢重下者白頭翁二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去渣溫服一升不愈再服劉宗厚曰此治痢在下焦腎虛有熱也經云腎欲堅故用純苦之劑以堅之出太陰例藥也以其下痢屬太陰故也清涼飲子治大瘕瀉裡急後重數至圊而不能便莖中痛大黃當歸赤芍藥甘草炙各一錢上作一服用水二鍾煎至一鍾不拘時熱服進承氣湯治太陰證不能食是也當先補而後瀉乃進藥法也先銼厚朴半兩薑製水一盞煎至半盞服若二三服未已胃有宿食不消加枳實二錢同煎服二三服泄又未已如不加食尚有毒熱又加大黃三錢推過泄未止者為腸胃久有塵垢滑黏加芒硝半合垢去盡則安矣後重兼無虛證者宜之若力倦氣少脈虛不能食者不宜此法蓋厚朴枳實大瀉元氣故也退承氣湯治陽明證能食是也當先瀉而後補乃退藥法也先用大承氣五錢水一盞依前法煎至七分稍熱服如瀉未止去芒硝減大黃一半煎二服如熱氣雖已其人心腹滿又減去大黃但與枳實厚朴湯又煎二三服如腹脹滿退泄亦自安後服厚朴湯數服則已水煮木香膏寶鑑治脾胃受濕臟腑滑泄腹中疼痛日夜無度腸鳴水聲不思飲食每欲痢時裡急後重或下赤黃或便膿血等井皆治之木香丁香乳香訶子皮當歸白芍藥青皮陳皮去白厚朴薑製黃連炒藿香甘草炙各一兩肉豆蔻砂仁各一兩半枳實乾薑炮各五錢御米殼蜜水炒六兩上為細末煉蜜丸如彈子大每服一丸水一大盞棗一枚劈開煎至六七分和渣稍熱食前服白朮安胃散寶鑑治一切瀉痢無問膿血相雜裡急後重窘迫日夜無度御米殼三兩去項蒂醋煮一宿茯苓白朮車前子五味子烏梅肉各一兩上為粗末每服五錢水二盞煎至一盞空心溫服升陽除濕防風湯方見前濕痢方二奇散治痢后里急後重枳殼黃耆防風各等分上為末每服二錢用蜜湯調下或米飲調亦得一方治裡急後重好蛤粉穿山甲炒各等分上為末每服一錢空心用好酒調下治虛坐努責方丹溪方治痢疾氣行血積但虛坐努責此為亡血證當歸身尾二錢生地黃生芍藥桃仁陳皮各一錢上銼水煎服治膿血稠黏方七宣丸和劑溲而便膿血者小腸泄也脈得五至以上洪大者大黃麵裹煨十五兩桃仁去皮尖炒六兩枳實麩炒木香訶子皮柴胡各五兩甘草炙四兩上為末煉蜜丸如桐子大每服二十丸食前臨臥各一服米飲下以利為度芍藥柏皮丸治便膿血芍藥黃柏各等分上為細末醋糊丸如桐子大每服五七十丸食前溫湯下治痢滑脫方易簡斷下湯治下痢赤白無問新久長幼白朮茯苓各一錢甘草五分草果連皮一個罌米殼十四枚去筋蒂剪碎用醋浸為粗末上銼作一服用水一大碗加生薑七片棗子烏梅各七個煎至一大盞分二服服之赤痢加烏頭二粒白痢加乾薑五分罌粟殼治痢服之如神但性緊澀多令人嘔逆即以醋製加以烏梅不致為害然嘔吐人則不可服大率痢疾古方謂之滯下多因腸胃素有積滯而成此疾始得之時不可遽止先以巴豆感應丸十餘粒白梅湯下令大便微利仍以前藥服之無不應手取效若脾胃素弱用豆蔻橘紅罌粟殼各等分為末醋煮麵糊為丸桐子大每服五十丸烏梅湯下兼治泄瀉暴下不止一服即愈更令藥力相倍為佳如覺噁心卻以理中湯四物湯加豆蔻木香輩調其胃氣仍以二陳湯煮木香丸以定其嘔逆大凡痢疾乃腹心之患尊年人尤非所宜若果首尾用平和之劑決難取效必致危篤雖欲服此則已晚矣其秦艽地榆黃柏木通之類其性苦寒不必輕服血痢當服胃風湯並膠艾湯之類白者宜服附子理中湯震靈丹之屬更宜審而用之若五色雜下泄瀉無時當用熟烏頭一兩厚朴乾薑甘草各一分生薑煎服今之治痢多用駐車丸黃連阿膠丸之類其中止有黃連肥腸其性本冷若所感積輕及余痢休息不已則服之取效若病稍重則非此可療真人養臟湯治大人小兒臟腑受寒冷熱不調下痢赤白或便膿血如魚腦裡急後重臍腹絞痛或脫肛墜下酒毒濕熱便血並皆治之人參當歸訶子去核木香甘草炙肉豆蔻麵裹煨各一錢芍藥炒白朮各一錢半肉桂五分罌粟去蒂蓋蜜炙二錢上㕮咀作一服用水一盞半煎至八分去渣食前溫服忌酒面生冷魚腥油膩之物臟腑滑泄夜起久不瘥者可加附子四片煎服固腸湯治冷熱不調下痢赤白罌粟殼去蒂蓋醋炙三兩白芍藥炒當歸甘草各一兩陳皮訶子煨去核白姜炮各半兩人參木香各三錢上㕮咀每服四錢水煎空心溫服六神散治瀉痢赤白腹痛不可忍久不止者粟殼青皮去穰陳皮去白烏梅肉乾薑炮各五錢甘草炙三錢上㕮咀每服四錢加乳香二分水煎食前溫服桃花湯金匱治下痢膿血赤石脂一升一半銼一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去渣溫七合納赤石脂末方寸匕日三服若一服愈余藥勿服白膠香散治脾胃虛寒滑腸久瀉臍腹疼痛無休止米殼四兩醋炒龍骨南白膠香各三兩甘草炙七錢乾薑炮半兩上為粗末每服五錢水一盞半煎至一盞溫服食前忌冷物傷胃禹餘糧丸嚴氏治腸胃虛寒滑泄不禁禹餘糧石煅赤石脂煅龍骨蓽撥乾薑炮訶子麵裹煨肉豆蔻麵裹煨附子炮去皮臍各等分上為末醋糊丸如桐子大每服七十丸空心米飲下萬補丸治脾胃久虛大腸積冷下痢白膿或腸滑不固久服諸藥不效服之神驗併產前產後皆可服人參當歸切焙草豆蔻炮去皮嫩茄茸酥炙乳香各一兩半白朮陽起石火燥研細肉桂去皮縮砂仁赤石脂鍾乳粉肉豆蔻麵裹煨沉香白姜炮蓽撥牛乳半盞慢火煎乾茴香炒丁香厚朴薑製白茯苓各一兩地榆大麥蘖炒神麯炒各半兩附子炮去皮臍七錢肉蓯蓉酒浸一宿二兩罌粟殼和米煮二十枚炙上為細末研勻用木瓜十五枚去瓤蒸爛同藥末搗和得所丸如桐子大曬乾每服三十丸食前米飲下頻並者加至五七十丸以上治寒滑之劑一方治痢側柏葉一錢甘草三錢御米殼去頂穰湯泡三次曬乾蜜拌炒黃一錢久者倍之上㕮咀水煎澄清入蜜呷服之先服木香檳榔丸後服此妙本事方黑豆五十粒陳皮半兩罌粟殼十四個甘草二錢上四味半生半炒水煎空心服盡此一劑無不效者遇仙立效散治諸惡痢或赤或白或膿淡相雜裡急後重臍腹結痛或下五色或如魚腦日夜無度或口噤不食不問大人小兒虛弱老人產婦並宜服之罌粟殼去蒂蓋炒黃當歸洗各三兩甘草赤芍藥酸石榴皮地榆各一兩上㕮咀每服五錢水煎空心溫服忌生冷油膩黃耆散治熱痢下赤黃膿腹痛心煩黃耆龍骨當歸各七錢半黃連微炒一兩生乾地黃黃柏黃芩犀角屑地榆各半兩上為細末每服二錢不拘時粥飲調下一方治腸滑久痢神效以石榴一個劈破炭火簇燒令煙盡急取出不令作白灰用碗蓋一宿出火毒為末用酸石榴一個煎湯調下二錢一方治痢五倍子為丸赤痢甘草湯下白痢乾薑湯下各十丸以上治熱滑之劑治痢脫肛方訶子皮散治寒滑氣泄不固形質下脫御米殼去蒂蓋蜜炒五分訶子煨去核七分乾薑炮六分陳皮五分上㕮咀水煎服或為末白湯調服亦可真人養臟湯治冷熱不調下痢赤白裡急後重腹痛脫肛方見前滑脫條地榆芍藥湯治泄痢膿血乃至脫肛者蒼朮八兩地榆卷柏芍藥各三兩上㕮咀每服二兩水煎溫服病退勿服一方加阿膠名蒼榆湯蓋阿膠大腸要藥也治大孔開方一方治痢大便不禁其孔大開如孔洞不閉者用蔥和花椒末搗塞穀道中並服酸澀固腸之劑收之如御米殼訶子皮之類是也神效治大孔痛方一方治下痢大孔痛因熱流於下檳榔木香黃連黃芩乾薑上銼水煎服一方治久下赤白大孔痛不可忍炒鹽熨之又炙枳實熨之一方治痢久大孔急痛亦有寒熱者熟艾黃蠟訶子上燒熏之妙治泄痢而嘔方姜橘白朮湯治胃氣不和下痢兼嘔白朮二錢半橘皮去白生薑各二錢半夏薑湯泡茯苓各一錢半厚朴薑汁炒一錢上銼水煎食前徐徐服因火逆衝上而嘔者加薑汁炒黃連胃虛而嘔者加人參倍白朮芩連二陳湯治頑痰在膈下痢兼嘔二陳湯加黃芩黃連防風桔梗蘆探吐加味平胃散治毒滯上攻痢兼嘔吐本方加黃連木香檳榔水煎服加味四君子湯治下痢虛嘔食少本方加陳皮厚朴麥門冬竹茹水煎服治噤口痢方參連湯治噤口痢人參五錢黃連一兩上銼水煎時時呷之如吐再強飲但得一呷下咽即好一方加石蓮肉三錢尤效外以田螺搗爛盦臍中引熱下行開噤湯治噤口痢砂仁一錢研砂糖七錢細茶五錢生薑五片上銼一劑水二鍾煎至一鍾露一宿次早北面溫服外用木鱉子二錢去殼麝香二分共搗置臍中即思食一方治噤口痢此乃毒氣上衝心肺藉此以通心氣便覺思食石蓮肉曬乾槌碎去殼留心並肉上為末每服二錢陳倉米煎湯調下便覺思食仍以日照東方壁土炒真橘皮為末薑棗略煎服之一方黃連半斤生薑四兩上二味切片同炒待姜焦黃色去姜只用黃連為細末同陳米飯一處搗爛丸如桐子大每服七八十丸赤痢陳米飲下白痢陳皮湯下赤白相兼者陳米橘皮湯下參苓白朮散下痢噤口不食者雖曰脾虛蓋亦熱氣閉塞心胸間所致也以此治之本方加石菖蒲一錢木香少許方見後久痢條倉廩湯治噤口痢有熱乃毒氣衝心食入即吐方見前風痢條治中湯治噤口痢本方加木香半錢或縮砂一錢方見嘔吐門開噤散治嘔逆食不入書云食不得入是有火也故用黃連痢而不食則氣益虛故加人參虛人久痢並用此法人參川黃連姜水炒各五錢石菖蒲七錢不見鐵丹參三錢石蓮子去殼即建蓮中有黑殼者茯苓陳皮一錢五分陳米一撮冬瓜仁去殼一錢五分荷葉蒂二個上銼水煎服不拘時附子理中湯治寒邪中於太陰嘔吐清涎沫腹中冷痛或下痢清穀吐蛔蟲脈來沉細急宜溫之乾薑附子炙甘草各一錢人參二錢白朮二錢上銼水煎服寒甚者加乾薑二錢渴欲得水加人參白朮各一錢當臍有動氣去白朮加肉桂一錢吐多者加生薑一錢五分下痢多者加白朮悸者加茯苓一錢五分腹滿者去參術加陳皮半夏砂仁各八分附子一錢五分蓋溫即是補除附子加木香砂仁即香砂理中湯治久痢方大黃湯治痢久不愈膿血稠黏裡急後重日夜無度脈沉實人不甚困倦者用此微利大黃一兩上銼碎作一服用好酒二鍾浸半日煎至一鍾去渣分作二服頓服之痢止勿服如未止再服以利為度服後再服黃芩芍藥湯以徹其毒黃芩芍藥湯方見前此盪滌邪熱之藥用酒煮者欲其上至頂巔外徹皮毛也上滌除之劑毒滯未盡者用之樸連湯治下痢久不瘥厚朴薑製黃連各等分上㕮咀每服五錢水煎食前溫服調和飲下痢稍久者宜調和白芍藥三錢當歸川芎黃連黃芩桃仁各一錢升麻五分上銼一劑水煎空心服如紅痢依本方白痢加吳茱萸一錢芩連用酒炒赤白痢加白朮茯苓陳皮香附各一錢黃芩芍藥湯治久痢不食身熱後重赤白脫肛白朮白芍藥生用黃連各一錢二分黃芩石蓮肉白茯苓各一錢木香六分上銼水二鍾煎八分不拘時服瓜蔞散治五色痢久不愈者瓜蔞一個黃色者以炭火煨存性用蓋在地下一宿出火毒上研為細末作一服用溫酒調服胡大卿有僕人患痢半年至杭州遇一道人傳此方而愈以上調理之劑胃氣不和者用之參苓白朮散治脾胃虛弱下痢經年不愈飲食不進肌肉消瘦氣力倦怠人參白朮茯苓山藥各一兩白扁豆甘草炙各七錢蓮肉薏苡仁砂仁桔梗各五錢上為細末每服三錢米湯調下或加薑棗煎服或棗肉和丸如桐子大每服七十丸空心米湯下或煉蜜丸如彈子大湯化下參歸芍藥湯治痢久不止用此調理氣血自愈人參當歸酒洗芍藥炒陳皮各一錢白朮茯苓各一錢半砂仁七分甘草五分上銼加烏梅一個燈草一團蓮肉七個水煎溫服氣陷後重不除加升麻加減益氣湯治痢日久不愈不能起床疲弱之甚者白朮白芍藥陳皮各一錢當歸七分黃耆人參澤瀉砂仁地榆各五分升麻甘草炙木香白豆蔻御米殼醋炒各三分上銼一劑水煎服劉草窗方治虛弱患痢人參三錢白朮二錢半白茯苓二錢芍藥炒一錢半神麯炒七分升麻五分蒼朮一錢上銼一服水煎服後重加木香三分檳榔七分黃連炒六分澤瀉六分甘草炙五分酒當歸一錢滑石炒五分防風一錢一方治久痢白朮當歸芍藥陳皮各一錢澤瀉砂仁地榆各五分升麻木香甘草各三分上銼作一帖水煎服以上升補之劑脾胃虛陷者用之機要訶子散治泄痢腹痛漸已泄下微少宜此止之法云大勢已去而宜止之訶子皮一兩半生半熟木香半兩黃連甘草炙各三錢上為細末每服二錢以白朮芍藥湯下如止之不已宜歸而送之加厚朴一兩竭其邪氣也神效參香散治痢疾日久穢積已少腹中不痛或微痛不復窘迫但滑溜不止乃收功之後藥也人參木香各二錢白茯苓肉豆蔻白扁豆各四錢陳皮罌粟殼去蒂穰醋炙各一兩上為細末每服一錢匕清米飲調下食遠服一方赤痢每九分加酒製黃連一分白痢每九分加酒製茱萸一分赤白相雜每服八分加茱萸黃連各一分米湯調服湯泡飲治久痢不愈無分赤白俱可服粟殼蜜水炒三錢烏梅一個去核甘草二分蜜三匙上銼碎用滾水一鍾泡浸一時去渣三次服之一方治瀉及痢米殼去頂隔蒂半生半蜜炙陳皮半生半蜜炙甘草半生半蜜炙各一錢上作一服滾湯浸少時再用重滾湯浸煮去渣通口服小兒減半百中散治久痢消用此止之若更澀早則胃敗不救罌粟殼用薑汁浸一宿炒乾上為末每服二錢米飲調服忌生冷油膩等物三日乳香散治一切痢疾經驗粟殼去頂隔蒂醋炒川芎各一兩乳香沒藥各一錢上為細末大人一錢小兒半錢紅痢蜜湯白痢砂糖湯紅白相兼及少瀉俱薑湯調下忌生冷腥葷聖散子治一切痢疾不拘遠年近日罌粟殼蜜制黃柏炙乾薑當歸枳殼去白甘草炙白採即罌粟子各等分上每服四錢加韭白二條捻碎同水煎不拘時服萬應抵金散治久痢諸藥不效者服此如神不過二服即止粟殼蜜炙石榴皮各二錢蘿蔔子黑豆炒熟各一錢半甘草炙一錢上銼水二鍾煎八分空心服不二散治諸般瀉痢神效罌粟殼青皮去穰陳皮去白各二兩當歸去蘆炒甘草炙甜藤如無只以乾葛代之各一兩上㕮咀每服三錢水一盞煎七分去渣通口服如患赤白痢用酸石榴皮一片同煎極妙斗門散治八種毒痢臟腑撮痛膿血赤白或下瘀血或成片子或有五色相雜日夜頻並兼治噤口惡痢裡急後重久渴不止全不進食他藥不能治者立見神效乾薑炮四兩黑豆炒去皮十二兩地榆甘草炙各六兩白芍藥三兩罌粟殼蜜炒半斤上㕮咀每服三錢水煎溫服神效雞清丸治一切瀉痢木香二兩黃連二兩半肉豆蔻七個大者生用上先為細末取雞子清搜和作餅子於慢火上炙令黃色變紅極干再研為末用麵糊丸如桐子大每服五十丸空心米飲下御米丸治一切瀉痢肉豆蔻訶子肉白茯苓白朮各一兩石蓮肉當歸各半兩乳香三錢罌粟殼蜜炙一兩半上為細末水糊為丸如桐子大每服三五十丸空心米飲下如血痢減豆蔻白朮當歸罌粟殼水煮木香膏治一切下痢日久不止罌粟殼去穰一兩八錢青皮去白二兩四錢甘草炙三兩當歸去蘆訶子煨去核木香不見火各六兩上為末煉蜜丸如彈子大每服一丸水一鍾煎化至六分空心或食前服宣明黃連丸木香黃連訶子肉麵煨各半兩龍骨二錢上為細末飯丸黍米大每服二十丸米飲湯下以上止澀之劑腸胃虛滑者用之蕪荑丸治久痢不瘥有蟲並下部脫肛蕪荑炒黃連去須各二兩蚺蛇膽半兩上為細末煉蜜丸如桐子大每服三十丸食前杏仁湯下日再服一方治腸蠱先下赤後下黃白沫連年不愈兼治痢下應先白後赤若先赤後白為腸蠱用牛膝一兩切椎碎以醇酒一升漬一宿平旦空心服之再服愈治休息痢方異功散治休息痢人參白朮茯苓陳皮各二錢甘草炙一錢上銼加生薑三片棗二枚水煎食前服補中益氣湯治脾胃虛弱下痢經年不瘥方見內傷一人年六十餘患血痢三年諸藥不效余用此方加桃仁倍當歸服二十帖全愈加味八珍湯治過服涼藥以致氣血俱虛而成休息痢四君子合四物湯加陳皮阿膠水煎服如脾胃虛寒加黃耆肉桂如有熱加黃芩黃連加味通元二八丹治痢疾奇效如神凡休息痢十數年不能愈者服此藥數服即愈宣黃連八兩當歸身赤芍藥生地黃南川芎各五錢槐花荊芥穗烏梅肉各一兩上八味各製為細末用雄豬肚一枚以刀刮盡仍用酒洗淨將前藥末裝入線縫嚴密用韭菜鋪底蓋頂以桑柴火蒸一日搗千餘下丸如桐子大每服七八十丸溫水下腸風及便毒下血用漿水湯下凡臟毒痔漏每清晨服一百丸清茶下過十服即愈此藥霜降後合方妙神效丸治誤服澀藥餘毒不散成休息痢膿血不止疼痛困弱當歸烏梅黃連各等分上為細末煉蜜丸甚者蠟丸如桐子大每服三十丸加至五十丸空心厚朴煎湯下一方加阿膠六神丸治同前真調痢要藥黃連木香枳殼茯苓神麯麥芽各等分上為末神麯打糊為丸如桐子大每服五十丸赤痢甘草湯下白痢乾薑湯下赤白痢甘草乾薑湯下蔭按黃連解暑毒清臟腑厚腸胃赤痢倍之木香溫脾胃逐邪氣止下痛白痢倍之枳殼寬腸胃茯苓利水神麯麥芽消積滯真調痢要藥經驗三根飲治休息痢年久不愈者其效如神五倍木根蒼耳草根臭樗木根刮取白皮上各等分細切每服七錢加生薑三片大棗一枚大黑豆三十六粒糯米四十九粒水煎溫服葛根湯專治酒痢葛根枳殼半夏生地黃杏仁去皮尖茯苓各二錢四分黃芩一錢二分甘草炙五分上分作二帖水二盞黑豆百粒生薑五片白梅一個煎至一盞去渣食前溫服木香散治隔年痢不止並治血痢尤捷木香黃連各半兩二味同炒罌粟殼生薑各半兩同炒甘草炙一兩上為細末入麝香少許每服一錢陳米飲下訶黎勒丸治休息痢日夜無度腥臭不可近臍腹撮痛諸藥不效者訶子去核半兩母丁香三十粒椿根白皮二兩上為細末醋糊丸如桐子大每服五十丸陳米飲入醋少許一日三服效麥蘖丸治休息痢不能飲食及羸瘦大麥蘖炒附子炮裂去皮臍陳曲炒官桂去皮烏梅肉炒白茯苓去皮人參各一兩上為細末煉蜜和丸如梧桐子大每服三十丸煮棗肉飲下不拘時一方用七月七日曲一方治休息痢羸瘦黃連去須為末定粉研各半兩大棗二十枚去核上舂棗如泥鋪於紙上安二味藥裹之燒令通赤取出候冷細研為末每服使好精羊肉半斤切作片子用散藥三錢摻在肉上濕紙裹燒熟放冷食之不過三兩服效又方杏仁一兩湯浸去皮尖及雙仁麩炒黃色獺豬肝一具去筋膜切作片上件將肝用水洗去血切作片乾淨鐺納一重肝一重杏仁入盡用童子小便二升入鐺中蓋定慢火煎令小便盡即熟放冷任意食之又方一名羊肝散砂仁一兩去皮肉豆蔻半兩去殼上為細末用羊肝半具細切拌藥以濕紙三五重裹上更以麵裹用慢火燒令熟去面並紙入軟飯搗和為丸如桐子大每服三十丸食前粥飲下一方治赤白痢新舊疾用鹽霜梅三個用黃泥裹於慢火煨乾研為細末用米湯調下張文仲方治休息痢用虎骨炙焦搗末調服日三匙效一方治久痢休息痢虛滑甚者椿根白皮東南行者長流水內漂三日去黃皮切片人參各兩木香煨二錢上銼入粳米一撮煎湯飲之治勞痢方蕷蓮飲治勞痢乾山藥石蓮肉各等分上為細末生薑茶煎湯調下三錢赤多倍蓮肉白多倍山藥七珍散方見脾胃門治諸病壞證久下膿血方加減六柱飲人參白茯苓木香肉豆蔻訶子益智仁白芍藥各等分上㕮咀每服三錢水煎服治痢後發渴方瓜蔞根湯治下痢冷熱相沖氣不和順本因下虛津液耗少口乾咽燥常思飲水毒氣更增煩躁轉甚宜服此藥救之瓜蔞根白茯苓甘草炙各半兩麥門冬去心二錢半上㕮咀每服五錢水一盞半棗二枚擘破煎至七分服陳米湯治吐痢後大渴飲水不止用陳倉米二合水淘淨以水二盞煎至一盞去渣空心溫服晚食前再煎服治痢後渴用糯米二合以水一盞半同煮研絞汁空心頓服之治痢後腫滿方澤漆湯治痢後腫滿氣急喘嗽小便如血澤漆葉微炒五兩桑根白皮炙黃郁李仁湯浸去皮尖炒熟各三兩人參一兩半白朮炒陳皮去白杏仁湯浸去皮尖雙仁炒各一兩上㕮咀每服五錢水二盞生薑三片煎取八分去渣溫服候半時辰再服取下黃水數升或小便利為度茯苓湯治痢後遍身浮腫赤茯苓去黑皮澤漆葉微炒白朮微炒各一兩桑根白皮炙黃黃芩射干防風澤瀉各三兩上㕮咀每服五錢先以水三盞煮大豆一合取二盞去渣納藥煎取一盞分為二服未瘥頻服兩料上二方須以濟生腎氣丸佐之後方虛者禁用治痢後風方二防散治痢後不謹感冒寒濕或涉水履霜以致兩足痹痛如刀劙虎咬之狀膝臏腫大不能行動名鶴膝風此藥神效人參黃耆白朮當歸川芎芍藥熟地黃杜仲薑汁拌炒萆薢各一錢防風防己羌活牛膝各七分甘草炙五分附子童便浸三日去皮臍七分冬月一錢上銼一服加生薑三片大棗二枚水煎空心溫服蒼龜丸治痢後腳弱漸小蒼朮龜板白芍藥各二兩半黃柏五錢上為末粥丸四物湯加陳皮甘草煎湯下一方加黃芩五錢獨活寄生湯方見腰痛門虎骨四斤丸方見腳氣門大防風湯方見痿證門痢後調理方固腸丸治濕熱下痢大便下血去腸胃陳積之後用此以燥下濕而實大腸樗根白皮不拘多少細切略炒上一味為細末米糊為丸如梧桐子大每服三五十丸陳米飲下或用炒芍藥炒白朮炙甘草陳皮茯苓湯下實腸散治久痢去多不分赤白用此末藥換出黃糞來乾山藥炒黃色蓮肉炒去心各一兩炒黃米一合上共為細末用砂糖調熱湯和勻前末藥不幹不稀漸漸調服後用清米湯漱口常服之最效白朮黃芩湯治痢疾雖除更宜調和白朮一兩黃芩七錢甘草三錢上㕮咀每服一兩水煎食前溫服白朮黃耆湯治服前藥痢疾雖除更宜服此補養白朮一兩黃耆七錢甘草三錢上㕮咀每服一兩水煎食前溫服白朮芍藥湯服藥痢疾雖除宜用此補脾胃又治老人奉養太過飲食傷脾時或瀉痢白朮白芍藥各半兩補脾炒用治後重生用腹痛炒用酒浸炒尤妙甘草炙半兩上銼每服一兩水煎服橘皮枳朮丸方見痞滿門蔭按方氏曰痢疾所因有二或因暑月煩渴縱食瓜果生冷內傷腸胃或夜臥失被早起入水寒濕外襲肚腹二者皆令水穀不化鬱而生熱則為濕熱濕熱傷氣則成白痢濕熱傷血則成赤痢氣血俱傷則成赤白痢其證臍腹絞痛或下鮮血或下瘀血或下紫黑血或下白膿或下赤白相雜或如豆汁或如魚腦或如屋漏水裡急後重頻欲登廁日夜無度不可驟用米殼龍骨豆蔻訶子赤石脂等收澀病邪則淹纏而不已也其法痢疾初得一二者元氣未虛以推逐為善若五六日以後脾胃已虛以消導為佳分利小便消導飲食蓋無積不成痢也所用之藥不過辛苦寒涼之劑以開除濕熱鬱積行氣和血使氣血宣行而已若病久挾虛者又當以滋補氣血收澀滑脫甘溫辛熱之藥兼之然濕熱傷氣成白痢者宜調氣理濕為主而兼清熱濕熱傷血成赤痢者宜涼血清熱為主而兼理濕至於氣血俱傷成赤白痢者則相兼而治觀丹溪節齋之用藥可見矣大抵痢疾多屬乎熱熱者火者也火性炎上何以降下於腸間而為痢乎譬之燭光炎上者也為風所感則油遂下流矣痢者皆由積熱在中或為外感風寒所閉或為飲食生冷所遏以致火氣不得舒伸逼迫於下裡急而後重也醫者不察更用檳榔等藥下墜之則降者愈降而痢愈甚矣大法用葛根為君鼓舞胃氣上行也陳茶苦參為臣清濕熱也麥芽山楂為佐消宿食也赤芍藥廣陳皮為使所謂行血則便膿自愈調氣則後重自除也惟於腹中脹痛不可手按者此有宿食更佐以樸黃丸下之若日久脾虛食少痢多者五味異功散加白芍藥黃連木香清而補之氣虛下陷者補中益氣湯升提之若邪熱穢氣塞於胃脘嘔逆不食者開鬱散啟之若久痢變為虛寒四肢厥冷脈微細飲食不消者附子理中湯加桂溫之夫久痢必傷腎不為溫暖元陽誤事者不少可不謹歟可不謹歟
