body:
  text: 卷二中寒論中寒與傷寒不同丹溪曰有卒中天地之寒氣曰中寒仲景論傷寒而未及乎中寒先哲治冒大寒而昏中者用附子理中湯其議藥則得之矣曰傷曰中未有議其異同者夫傷寒有即病有不即病因其舊有鬱熱風寒外束肌腠自密郁發為熱病邪循經而入以漸而深初用麻黃桂枝輩微表而安以病體不甚虛也中寒則倉卒感受其病即發而暴因其腠理疏豁一身受邪難分經絡無熱可發溫補自解此氣太虛也不急治則死準繩曰中寒之證身體強直口噤不語或四肢戰掉或洒洒惡寒或翕翕發熱或卒然眩暈身無汗者此寒毒所中也其異於傷寒何也曰傷寒發熱而中寒不發熱也仲景於傷寒詳之而中寒不成熱者未之及何也曰陽動陰靜動則變生靜則不變寒雖陰邪既鬱而成熱遂從乎陽動傳變不一靡有定方故極推其所之之病不得不詳也其不成熱者則是邪中於陰形之中一定而不移不移則不變不變則止在所中寒處而生病是故略而不必詳也治之先用酒調蘇合香丸輕則五積散加香附一錢麝香少許重則用姜附湯若人漸蘇身體回暖稍能言語須更問其別有何證寒脈緊遲挾氣帶洪攻刺作痛附子理中湯加木香半錢挾風帶浮眩暈不仁加防風一錢挾濕帶濡腫滿疼痛加白朮一錢筋脈牽急加木瓜一錢肢節疼痛加桂一錢亦可灸丹田穴以多為妙大抵中在皮膚則為浮中在肉則為疴為重為聚液分裂而痛中經絡或痛在四肢或痛在胸脅或痛在脛背或小腹痛引睪丸或經脈引注臟腑之膜原為心腹痛或注連臟腑則痛死不知人中於筋骨為筋攣骨痛屈伸不利中腑臟則仲景述在金匱要略中所謂肺中寒者出濁涕肝中寒者兩臂不能舉舌本強善太息胸中痛而不得轉側則吐而汗出也心中寒者其人苦心中如啖蒜狀劇者心痛微背背痛徹心譬如蟲蛀其脈浮者自吐乃愈不言脾腎二臟中寒者闕文也然所謂中寒者乃中五臟所居畔界之郭內阻隔其經臟氣不得出入故病若真中臟則死矣李氏曰傷寒循經漸入中寒不問冬夏或當風取涼或坐地受冷肅殺之氣自皮膚卒入臟腑昏倒四肢拘攣強直厥冷與中風相似但牙緊四肢不動為異耳急用蔥餅熨臍並灸氣海手足溫暖可生如極冷唇青厥逆無脈舌本短縮者須臾即死論中寒本乎腎虛選要曰夫寒者天地嚴凝殺厲之氣也人以腎為根本惟腎則受寒惟寒則傷腎腎氣一虛寒邪交作急痛拘攣戰掉強直昏迷厥冷口噤失音此中寒也無汗惡寒頭痛面慘發熱拘急手足微冷此感寒也霍亂轉筋洞泄下利乾嘔吐逆積飲停痰此寒邪入於腸胃也或為疝瘕或為腳氣痿痹或為腰膝冷痛或為虛勞陰萎或小腹急痛皆寒邪所為也論中寒本乎內虛丹溪曰中寒有卒中天地之寒氣者有口得寒物者用藥主乎溫散從補中益氣湯中加發散藥屬內傷者十居八九其法邪之所湊其氣必虛必先用參耆托住正氣氣虛甚者少加附子以行參耆之氣如果氣虛者方可用此法若胃氣太虛必當溫散理中湯相宜甚者加附子戴氏曰此中寒謂身受肅殺之氣口傷生冷之物因胃氣太虛膚腠疏豁病者脈沉細手足厥冷息微身倦雖身熱亦不渴倦言動者是也宜急溫之遲則不救矣與熱證若相似而實不同凡脈數者或飲水者煩躁動搖者皆熱病寒熱二證若水火然不可得而同治誤則殺人蔭按中寒者寒邪直中三陰也寒為天地殺厲之氣多由氣體虛弱之人或調護失宜沖斥道路一時為寒氣所中則昏不知人口噤失音四肢強直拘急疼痛者先用熱酒薑汁各半盞灌服稍蘇後進理中湯李氏曰內傷勞役感寒困倦補中益氣湯加薑附如內傷生冷感寒腹痛附子理中湯如內傷房室感寒厥冷四逆湯脈脫三建湯煉臍法論寒中三陰李氏曰中寒者寒邪直中三陰也倉卒難分經絡急煎姜附理中湯救之次審中脘疼痛此寒中太陰也理中湯甚者加附子若脈沉足冷此中少陰也四逆湯加吳茱萸或臍腹疼痛五積散加吳茱萸若小腹疼痛此中厥陰也當歸四逆湯加吳茱萸或五味子如陰盛煩躁熱藥冷飲或加些涼藥為引溫中散冷補暖下元陽氣復而寒自消矣切忌吐下方兼補血者寒泣血故也論寒中五臟永類鈐方云肝中寒其脈人迎並左關緊而弦其證惡寒發熱面赤如有汗胸中煩脅下攣急足不得伸心中寒者其脈人迎並左寸緊而洪其證如啖蒜齏甚則心痛徹背惡寒四肢厥自吐昏塞不省脾中寒其脈人迎並右關緊而沉其證心腹脹四肢攣急噯噫不通臟氣不傳或秘或泄肺中寒其脈人迎並右寸緊而澀其證善吐濁涕氣短不能報息洒洒而寒吸吸而咳腎中寒其脈人迎並左尺緊而滑其證色黑氣弱吸吸小氣耳聾腰痛膝下拘疼昏不知人治當審微甚甚則以姜附湯為主微則不換金正氣散加附子附子五積散臍腹痛四肢厥附子理中湯姜附湯入肝加木瓜入肺加桑白皮入脾加朮入心加茯苓論暑月中寒從乎中治海藏云六月大熱之氣反得大寒之病氣難布息身涼脈遲何以治之答曰病有標本病熱為本寒為標用涼則順時而失本用熱則順本而失時故不從乎標本而從乎中治者何用溫是已然既曰溫則不能治大寒之病治大寒者非薑桂不可若用薑桂又似非溫治之例然衰其大半乃止脈得四至余病便無令治之足矣雖用薑桂是亦中治也非溫而何經曰中熱遠熱雖用之不當然勝至可犯亦其理也脈法袖珍論曰中寒脈多遲而緊挾風則脈帶浮眩暈不仁兼濕則脈濡而四肢疼痛治方附子理中湯治五臟中寒口噤強直失音不語手足厥冷兼治胃脘停痰冷氣刺痛人參白朮乾薑炮甘草炙各二錢半附子炮二錢上㕮咀水三鍾煎八分溫服如口噤斡開灌之一方為末煉蜜丸每兩作十丸每服一丸以水一盞化破煎七分服名附子理中丸姜附湯治中寒口噤四肢強直失音不語忽然暈倒口吐涎沫狀如暗風手足厥冷或復煩躁兼治陰證傷寒大便自利而發熱者乾薑熟附子各等分上㕮咀每服四錢水一盞半煎至七分去渣溫服肢節痛加桂挾氣攻刺加木香挾風不仁加防風挾濕加白朮筋脈牽急加木瓜或慮此藥性太燥即以附子理中湯相繼服餌薑附本治傷寒經下後又復發汗內外俱虛身無大熱晝則煩躁夜則安靜不嘔不渴六脈沉伏並宜服此不知脈者更宜審之兼治中脘虛寒久積痰水心腹冷痛霍亂轉筋四肢厥逆四逆湯治傷寒自利脈微欲絕手足厥冷附子一枚去皮臍生用乾薑五錢甘草炙六錢上㕮咀作二劑每服水一盞煎七分溫服不拘時沉附湯治虛寒無陽胃弱乾嘔附子炮乾薑炮各五錢白朮沉香各二錢半甘草炙二錢上㕮咀分二帖每服加生薑五片水煎食前服三建湯大川烏附子天雄並炮各等分上銼每服四錢水二盞加生薑十五片煎服溫中湯治病人脈沉遲或緊皆是胃中寒也及胸膈滿悶身體拘急手足逆冷急宜溫之丁皮厚朴各一兩乾薑白朮陳皮丁香各二錢上為細末每服二錢蔥白煎湯調下不拘時理氣治中湯治寒氣攻心嘔逆心腹絞痛或泄瀉四肢厥冷或疝氣攻築小腹疼痛並宜服之人參白朮炒乾薑炮甘草炙青皮去穰陳皮去白各一錢木香七分上㕮咀作一服加生薑三片水煎食前溫服大建中湯治內虛里急少氣手足厥逆少腹攣急或腹滿眩急不能食起即微汗出陰縮或腹中寒痛不堪勞苦唇口乾精自出或手乍寒乍熱而煩冤痠痛不能久立補中益氣人參當歸各三錢黃耆芍藥酒炒半夏各二錢桂心甘草炙各一錢附子半錢生薑五錢棗三枚上㕮咀用水五盞煎至三盞去渣分三服回陽救急湯治傷寒初起無頭痛無身熱便就怕寒四肢逆冷或過於肘膝或腹痛吐瀉或口吐白沫或流冷涎或戰慄面如刀刮引衣倦臥不渴脈來沉遲無力即是寒中陰經真陰證不從陽經傳來人參白朮茯苓陳皮半夏乾薑肉桂附子炮去皮臍五味子甘草炙上銼一劑加生薑水煎服嘔吐涎沫或小腹痛加鹽炒茱萸無脈加豬膽汁一匙泄瀉不止加黃耆升麻嘔吐不止加生薑汁倉卒無藥可用蔥熨法或艾灸關元氣海二三十壯使熱氣通其內逼邪出於外以復陽氣稍得甦醒灌入薑汁煎服回陽湯生料五積散治感冒寒邪頭疼身痛項強拘急惡寒嘔吐或有腹痛又治傷寒發熱頭疼惡風無問內傷生冷外感風寒及寒濕客於經絡腰腳痠疼及婦人經滯腹痛並皆治之蒼朮米泔浸二錢陳皮去白麻黃去根節各一錢厚朴桔梗枳殼去穰麩炒芍藥當歸白茯苓乾薑爛各八分川芎白芷半夏湯洗官桂各七分甘草炙六分上㕮咀作一服加生薑三片蔥白三根水煎熱服冒寒用煨姜挾氣加吳茱萸婦人調經催生加艾醋附子麻黃湯治中寒濕昏暈緩弱腰脊強急口眼喎斜語聲渾濁胸腹䐜脹氣上喘急不能轉動乾薑附子麻黃人參白朮甘草炙各等分上銼水煎服不換金正氣散治四時傷寒溫疫時氣頭疼壯熱腰背拘急山嵐瘴氣寒熱往來霍亂吐瀉臟腑虛寒下利赤白蒼朮制橘皮去白半夏曲炒厚朴薑製藿香各二錢甘草炙一錢上銼作一服水二鍾生薑五片紅棗二枚煎至一鍾去渣食前稍熱服忌生冷油膩毒物若出遠方不服水土尤宜服之白朮散治陰毒傷寒心間煩躁四肢逆冷白朮附子炮去皮臍川烏炮去皮臍桔梗細辛各一兩乾薑炮半兩上為末每服二錢水一盞煎六分熱服不拘時肉桂散治傷寒服涼藥過多心腹滿脹四肢逆冷昏沉不識人變為陰毒惡證肉桂三錢人參附子當歸白芍藥酒炒陳皮前胡各一兩白朮木香厚朴薑製良薑各三錢吳茱萸五錢上為粗末每服五錢水二鍾生薑三片紅棗三枚煎至八分溫服不拘時人參養胃湯治外感風寒內傷生冷增寒壯熱頭目昏疼遍身麻痹蒼朮制厚朴薑製半夏湯泡各一兩陳皮七錢半人參茯苓藿香葉草果去殼各五錢甘草炙二錢半上銼每服一兩水一鍾半生薑七片烏梅一個煎熱服治飲食傷脾發為痎瘧寒多者加附子名十味不換金散朮附理中丸治中寒心腹急痛人參附子炮去皮臍乾薑白朮甘草炙木香丁香各等分上為細末煉蜜為丸如梧桐子大每服六七十丸白湯食前送下胡椒理中丸白朮五兩陳皮去白良薑蓽撥乾薑甘草炙款冬花細辛胡椒各四兩上為末煉蜜丸如桐子大每服五十丸溫湯酒米飲任下沉香桂附丸治中寒心腹冷痛霍亂轉筋等證沉香附子炮去皮臍乾薑炮良薑炒官桂去粗皮茴香炒川烏炮去皮臍吳茱萸酒浸炒各等分上為細末醋煮麵糊丸如桐子大每服五七十丸米飲下空腹食前日進二服忌生冷硬物真武湯治傷生冷飲食數日以後發熱腹痛頭目昏沉四肢疼痛大便自利小便或利或澀或嘔或咳並宜服之或已經發汗不解仍發熱者心下悸頭眩暈肉瞤動振振欲擗地者此由飲食停留中脘所致白朮白茯苓白芍藥各一兩附子炮一枚上銼每服五錢加生薑五片水煎食前溫服小便利者去茯苓大便利者去芍藥加乾薑咳加五味子細辛乾薑嘔去附子加生薑汁鐵刷湯良薑茴香各二兩甘草炙一兩蒼朮米泔浸一宿八兩上為細末每服二錢生薑三片鹽一捻水煎溫服或熱酒調下霹靂散用附子一枚及半兩者炮熟取出用冷灰培之細研入真臘茶一大錢同和分二服每服水一盞煎六分臨熟入蜜半匙放溫服之大己寒丸蓽撥肉桂各四兩乾薑炮良薑各六兩上為細末水煮麵糊丸如桐子大每服二十粒食前米飲下搐鼻奪命散治陰證及中風不省人事大效藜蘆石菖蒲穀精草東平薄荷頭荊葉各二錢川芎細辛各二錢半上為細末先令患者吃蔥茶一盞後噙水在口次以蘆管吹藥入鼻中即時痰唾涕噴見效一方無細辛名通神散一方治陰毒傷寒用烏豆一合炒令黑煙起入水中煎三五沸服候汗出回陽立瘥灸陰證法氣海穴在臍下一寸五分丹田在臍下二寸關元在臍下三寸用艾火灸二七壯但手足溫暖脈至知人事無汗要有汗汗出即生不暖不省者死熨法治三陰中寒一切虛冷厥逆嘔噦陰盛陽虛及陰毒傷寒四肢厥冷臍腹痛咽喉疼嘔吐下利身背強自汗脈沉細唇青面黑諸虛冷證皆宜用之肥蔥細切麥面各三升鹽二兩用水和勻分作二次於鐺鍋內炒令其熱用重絹包之乘熱熨臍上冷更易一包蔥包既冷再用鹽水拌濕炒焦依前用之至煤爛不用別取蔥面日夜相續熨之不住至身體溫熱脈壯陽氣復來而後止如大小便不通用此亦可行其勢蒸臍法用麝香半夏皂莢各一字為末填臍中用生薑切薄片貼臍上放大艾火灸薑片上蒸灸二七壯灸關元氣海二十壯熱氣通於內寒氣逼於外陰自退而陽自復矣熨臍法用蔥頭縛一把切去葉留白根切餅二寸許連縛四五餅先將麝香硫黃二字填於臍中放蔥餅於臍上以熨斗盛火於蔥餅上熨之如餅爛再換餅熨熱氣入腹以通陽氣如大小便不通以利為止揉臍法用吳茱萸二三合麩皮一升食鹽一合拌勻熱炒以絹包之於腹上下熱揉熨之自然有效也合掌膏治急證傷寒不省人事者不消服藥川烏草烏斑蝥毛豆細辛胡椒明礬乾薑麻黃各等分上共為細末每一次用三錢好醋一匙打糊為丸核桃大安在患人手心兩手合紮緊夾在腿襠內以被蓋暖出汗為度如醒去藥就用黃泥水洗手
