不拘時三解湯此治瘧之奪劑也時行之瘧長幼相似者此方神良麻黃去節柴胡去蘆澤瀉各三錢上㕮咀水煎服蔭按吳氏曰病有三在在表在裡在半表半裡也人在氣交之中鼻受無形之氣藏於分肉之間邪正爭並於表則在表並於里則在裡未有所並則在半表半裡是方也麻黃之辛能泄表邪由汗而泄澤瀉之咸能引里邪由溺而泄柴胡之溫能使半表半裡之邪由中以解則病之三在率治之矣雖然此但可以瀉實耳虛者尤當辨其氣血而補之所謂虛者十補勿一瀉也慎之慎之五神丸治瘧疾一歲之中長幼相似者名曰疫瘧此方塞鼻神良東方青黛五錢麝香二分西方白礬五錢白芷二錢南方官桂五錢硃砂一錢北方巴豆四十九粒去殼黑豆三十六粒中央硫黃五錢雄黃一錢上件各依方位以磁盤盛之於五月初一日虔誠安於本家侍奉神前至初五日午時共為細末用三家粽角為丸如梧桐子大陰乾收貯聽用凡遇患瘧之人於瘧發之日侵晨用綿包裹塞於男左女右鼻中治瘴瘧方太無神朮散治瘧疾因感山嵐瘴氣發時乍寒乍熱一身沉重者名曰瘴瘧此方主之蒼朮泔浸厚朴薑汁炒各一兩陳皮去白二兩甘草炙藿香石菖蒲各一兩五錢上銼每服八錢加姜棗煎服加味平胃散治瘴瘧寒熱作而指甲青黑者蒼朮四錢厚朴陳皮各三錢草果檳榔各二錢甘草一錢上銼作二劑加生薑煎服加味小柴胡湯治瘴瘧迷悶狂妄啞不能言柴胡黃芩半夏人參甘草大黃枳殼上銼水煎服加味涼膈散治同前大黃朴硝甘草各二兩連翹四兩梔子仁黃芩薄荷柴胡檳榔各一兩上銼每服五錢水煎服治鬼瘧方辟邪丹治嵐瘴鬼瘧並日頻日綠豆雄黑豆各四十九粒砒信五分另研硃砂二錢黃丹一錢上為末同入乳缽內滴水為丸分作三十粒每服一粒用東南桃枝取七枝研汁井花水於發日黎明向日吞之祝由科治瘧疾不愈咒曰吾從東南來路逢一池水水裡一條龍九頭十八尾問伊食甚的只吃瘧疾鬼上念一遍吹在果子上念七遍吹七遍在上令病人於五更雞犬不聞時面東而立食訖於靜室中安頓忌食瓜果葷肉熱物此法十治八九無藥處可以救人果者謂桃杏棗慄之類一法郭氏醫方集略云一泉兄曾攜余讀書韓王山寺有一僧病瘧呻吟久之兄曰吾醫汝即愈令僧開襟仰臥兄左手執硃砂筆直畫肚上曰子璋髑髏血模糊手提擲還崔大夫復畫二紙一焚灶前一焚之天地下越二日僧叩首曰吾即日愈矣兄亦不知所以噫僧其病鬼瘧者耶人謂杜詩能祛瘧其此之謂乎截諸瘧方驅瘧湯治一切久新瘧疾一劑截住神效常山草果煨知母貝母去心各等分上銼每服四錢虛弱老人小兒只須三錢酒一盞略煎八分不可過熟熟則不效發日天明後去渣熱服渣以酒浸至將發前再煎熱服奇效如神不能備述一方用雌雄檳榔無草果名不二飲一方用檳榔無貝母煎法俱同洞虛子云至元十五年阿術都元帥南征之時因患瘧疾百法不效至於維揚召官醫診之余親識石其姓者忽為有司驅至帳前但見虎符已下官員露刀守衛元帥臥榻石公自謂必死既而傳命曰元帥久患瘧疾只今便要安可石公尤畏之極信手撮成一劑服之即效大有賞賚後數年其藥僕從余遊宦南荒彼中官吏將校例苦瘧因獲此方隨用即效遂大行於世復會維揚石公再請訂正石公曰尚欠陳皮一味余從而用之則鮮效矣後悟其相戲但依前法四味為的至今四十年矣嘗有婦人每日午後發熱眾醫百計循經用藥日久愈重余道此四味令服醫士莫肯聽從余曰此純熱瘧疾平日治之如探囊取物耳勉其服之即瘥但人惡其酒氣余家親戚老幼才有瘧疾俱能服之元無惡味余因用酒先煮過常山曬乾入藥只用水煎服亦妙不可例謂常山為吐藥而不用萬萬無一人曾吐者蓋瘧者痰疾也常山專能治痰有微吐者乃痰藥相敵而然亦有自然吐者世俗命曰醉瘧豈常山之使然乎常山飲治瘧疾發散不愈漸成勞瘵常山草果知母各三兩二錢良薑二兩烏梅去核甘草各一兩六錢上㕮咀每服五錢水一盞生薑五片棗一枚煎七分溫服截瘧常山飲川常山草果檳榔知母甘草炙烏梅穿山甲慢火煨胖各等分上細末每服五錢水酒各半盞煎至八分露星月一宿發前二時溫服欲吐則順之一云清晨冷服忌熱湯一日七寶飲治一切瘧或先寒後熱或先熱後寒不問鬼瘧食瘧並皆治之一云尺寸脈來弦滑浮大者以此吐之常山一錢厚朴青皮陳皮炙甘草檳榔草果仁各半錢上細切作一服酒水各半盞寒多加酒熱多加水煎八分去渣露一宿再將渣如前煎另放亦露一宿來日當發之早蕩溫面東服少歇再服藥渣大有神效一云空心冷服忌熱茶湯一日至午食溫粥萬安散治一切瘧疾得病之初以其氣壯進此藥以取效氣虛胃弱及妊婦不宜服之蒼朮米泔浸厚朴薑汁炒陳皮去白甘草炙常山酒浸檳榔各一錢半上㕮咀水一盞半煎至一盞去渣露一宿臨發早作二服溫服忌熱物片時一方治久瘧不愈一服便止永不發其效如神常山檳榔各一錢丁香半錢烏梅一個上銼作一服用好酒一盞浸一宿臨發日清晨飲之經驗截瘧神方常山秦艽木通川山甲醋炙黃各一錢辰砂半錢另研烏梅去核大棗各七個上銼以水三盞煎至一盞先以棗和辰砂末食後服藥六和湯人參草果知母貝母檳榔烏梅白芷柴胡各一錢酒拌常山二錢上銼加生薑三片棗一枚酒水同煎露一宿臨發前二時服截瘧方柴胡蒼朮蘇葉檳榔半尖半圓者常山黑豆等分炒去豆青皮陳皮知母貝母草果甘草烏梅一個厚朴量用上銼水二鍾煎至一鍾留當發日五更溫服一日忌茶油膩魚生冷雖用常山以豆炒熟而檳榔用雌雄半則有以制常山不至吐瀉人參截瘧飲治虛人截瘧一切瘧疾並可截之人參白朮茯苓當歸青皮麩炒厚朴薑汁炒柴胡黃芩知母常山酒浸草果去殼鱉甲醋炙各八分烏梅一個桂枝甘草各三分上銼一劑生薑一片棗二枚桃腦七個水煎露一宿臨發日五更空心溫服渣待日午再煎服糖拌烏梅下藥切忌雞魚豆腐麵食及房勞怒氣驅瘧飲治諸瘧久不愈者草果青皮陳皮人參茯苓半夏厚朴蒼朮檳榔白朮甘草各一兩良薑五錢上㕮咀每服七錢生薑五片棗二枚烏梅一個水煎食遠服溫脾散治久瘧不愈紫河車即金線重樓綠豆各一兩生甘草五錢砒一錢五分另研上為末每服五分發前一日夜深新汲水調服十歲者減半再幼又減孕婦不可用忌葷腥生冷酒面三日合服此藥並不吐雖砒有毒有三味得解蔭按此方劫病之捷勝於他方但虛弱久病羸瘦之人終不可輕用如吐不止者以生綠豆細研新汲水調多飲即止養胃丹治久瘧二三年不愈者人參茯苓藿香草果各一兩半夏炮陳皮厚朴薑汁炒各一兩半蒼朮米泔炒常山酒蒸二兩甘草炙五錢烏梅四十九個去核上為末淡薑湯打糊丸如桐子大每服五七十丸薑湯下祛邪丸治新瘧脈浮大寒熱往來麻黃四兩常山大黃知母甘草各二兩上為末煉蜜丸如桐子大每面東服十五丸欲汗冷水下欲下露姜飲下欲吐甘草煎湯露過下勝金丹截瘧如神及諸瘧久不愈者常山酒浸蒸一兩檳榔四兩一方常山四兩檳榔一兩上為末醋糊丸如桐子大每服三十丸於發前一日臨臥用冷酒吞下睡至四更再用冷酒下十五丸至午方可食溫粥忌食熱物並一切生冷一方血虛當歸煎湯下氣虛人參煎湯下痰多貝母煎湯下勝金丸治一切寒熱瘧疾胸膈停痰發散不愈者常山四兩好酒浸一宿曬蒼朮米泔浸曬乾檳榔草果各二兩上各為末將浸常山余酒煮糊丸如桐子大每服五十丸未發前一日臨臥時涼酒送下便臥至雞鳴時再進七十丸忌生冷熱物鬼哭丹治瘧二三日一發者常山一斤醋浸春五夏三秋七冬十日檳榔四兩半夏貝母去心各二兩上為末用雞子清麵糊為丸如桐子大每服三十丸隔夜臨睡冷酒吞服次日再進一服截瘧青蒿丸青蒿一斤冬瓜葉官桂馬鞭草各二兩上為末水丸如胡椒大每一兩分作四服臨發前一二時盡服之截瘧丹五月五日取獨蒜不拘多少舂爛入好黃丹再舂乾溼適均手搓為丸如圓眼核大曬乾收貯但瘧疾一二日發後臨發日雞鳴時以藥一丸略捶碎取井花水面東服之即止雄黃截瘧丸雄黃辰砂各三錢人言一錢甘草二錢綠豆粉一兩五錢上各為細末用綠豆粉打糊為丸如白豆大外用硃砂為衣臨發日五更井花水吞服二丸小兒一丸勿多服斷鬼丹砒二錢雄黃綠豆各五錢上為細末麵糊為丸如箸頭大硃砂為衣每服一丸用桃柳枝各七寸煎湯露一宿臨發日空心面向東服忌食熱物並魚腥油膩十日朱魏丹今人治瘧多用常山砒霜之類發吐取涎縱使得安脾胃不能不損不若此藥最為穩當辰砂光明者阿魏真者各一兩上研勻和稀糊為丸如皂角子大每服一丸空心人參湯下雄黃散治久瘧不能食胸中兀兀欲吐而不吐此藥吐之必愈雄黃瓜蒂赤小豆各等分上為細末每服半錢溫水調下以吐為度不二散人言一兩為末用飛羅面四兩水和軟餅焙乾為末白扁豆細茶各為末二兩上同和勻每服小半錢匕前半日用溫茶調下再用茶蕩淨忌食酒面魚等物藜蘆散大藜蘆為末五分溫齏水調下以吐為度辰砂丸治一切脾胃虛瘧熱毒者信砒甘草各一錢硃砂二錢大豆四十九粒上為末滴水合丸分作四十丸發日日欲出前桃心湯下一丸忌熱性物瘧神丹治諸般瘧疾信砒一兩雄黃一錢上以五月五日用棕子尖左右研三千下日未出不令婦人雞犬見之丸如桐子大未發前一日面東冷水下一丸克效餅子一切瘧疾皆治龍腦麝香定粉各研半兩荷葉焙綠豆末甘草炙各五兩硃砂一兩信醋煮二錢半金箔二十五張為衣上為末爛蜜搜和每服作二十丸捏扁金箔為衣每服一餅以新汲水磨化日發未發時前服之間日發者頭夜服隔數日發者前一日夜服連日服凌晨服雄朱丹一名瘧靈丹雄黑豆四十九粒五月五日以冷水浸從早至巳時去皮服乾研為末信末一錢上再研勻為丸雄黃為衣曬乾收貯少壯人如桐子大衰老人如小黃豆大小小兒如綠豆大臨發時五更面東井花水下一丸不止再服黑豆圓者是雄的一方治脾寒久瘧天南星二枚好信三錢上先將南星開孔將信研末裝入孔內兩星相對用泥固臍炭火煅存性取出研為細末用綠豆粉打糊丸如豆大每服一二丸臨發日五更溫茶清下白湯亦可一方治久瘧青蒿桂枝上二味各為末如寒多倍桂蒿少熱多倍蒿桂少三七分互用各以生薑二兩連皮搗汁和熱酒調服以衣被蓋臥即愈天靈散治瘧如神天靈蓋燒存性為末每服五釐空心黃酒送下斷瘧如聖丹砒二錢蜘蛛大者三個雄黑豆四十九粒上為末水丸如雞頭大如來日發於今晚夜北斗下先獻過次早以紙裹於耳內札一丸立愈如神一粒可治二人治老瘧方鱉甲飲子治瘧疾久不愈脅下痞滿腹中結塊名曰瘧母鱉甲醈煮白朮各三錢黃耆草果檳榔川芎陳皮白芍藥各一錢半厚朴一錢甘草炙六分一方各等分上作一服生薑七片棗一枚烏梅少許水煎食遠服參歸鱉甲飲治老瘧腹脅有塊成瘧母黃耆白朮茯苓當歸酒洗鱉甲醋灸青皮厚朴香附撫芎各八分人參砂仁山楂去子枳實麩炒各五分甘草三分上銼一劑加生薑三片棗二枚烏梅一個水煎食前溫服如制丸藥加阿魏醋煮化和前藥末用水醋少許打糊為丸如桐子大每服三十丸空心米湯吞下山甲湯久瘧瘧母不治者宜服四獸飲間服此湯穿山甲木鱉子各等分上為末每服二錢空心溫酒調下老瘧飲治久瘧結成癥瘕痃癖在胸脅諸藥不愈者蒼朮草果桔梗青皮陳皮良薑各一錢白芷茯苓半夏枳殼甘草炙桂心乾薑炮紫蘇川芎各五分上作一服水二盞入鹽少許煎八分食前服十將軍丸治久瘧不瘥腹有瘧母三稜炮莪朮生青皮陳皮草果砂仁檳榔常山酒蒸烏梅各二兩半夏湯泡七次一兩上先將常山草果二味銼用好酒醋各一碗入瓦器內先浸一宿後入八味藥同浸至晚用瓦銚內炭火煮乾取出曬如無日色用火焙乾為末半酒半醋打糊為丸如梧桐子大每服三四十丸白湯吞下日進三服忌生冷魚腥酸鹹油膩麵食炙煿諸死毒物服四兩至八兩即除根凡有積聚及行瘴濕地方更宜服之鱉甲丸一名瘧母丸善消瘧母鱉甲醋炙二兩香附三稜蓬朮海粉青皮神麯麥芽桃仁紅花各五兩並用醋煮曬乾上為末醋糊丸如桐子大每服五七十丸白湯下一方加當歸川芎赤芍藥等分名陰瘧丸治夜瘧及血虛老瘧丸治久瘧不瘥腹痛有母凡積聚及行瘴濕地方尤宜常山草果各二兩青皮陳皮半夏烏梅三稜蓬朮砂仁檳榔各一兩上用酒醋各一碗入砂鍋內先浸常山草果二味過一宿次入青皮以下諸藥同浸半日煮乾曬為末半酒半醋打糊為丸如桐子大每服三十丸白湯下服至半斤除根清脾丸治瘧三日一發或十日一發白朮一兩半青皮半夏黃芩各一兩人參檳榔草果莪朮醋炒厚朴各半兩薑黃甘草各三錢上為末飯丸如梧桐子大每服六十丸食遠白湯下日三服黃甲丸治瘧母成塊後發熱久不愈川山甲酥炙黃阿魏硃砂檳榔各一兩雄黃木香各五錢上為細末泡黑豆去皮搗成泥為丸如桐子大每服五十丸淡薑湯下忌生冷鱉甲煎丸治瘧疾久不愈內結癥瘕欲成勞瘵者名曰瘧母鱉甲十二片蜂窠炙四分蜣螂炙柴胡各六分烏羽瞿麥桃仁乾薑各二分牡丹皮芍藥䗪蟲各五分赤硝一錢二分黃芩鼠婦炙桂枝石韋去毛厚朴紫葳阿膠炒大黃各三分葶藶熬半夏人參各一分上二十三味取煅灶下灰一斗清酒一斗五升浸灰候酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁納諸藥煎為丸如桐子大空心服七丸日三服蔭按吳氏曰凡瘧疾寒熱皆是邪氣與正氣分爭久之不愈則邪正之氣結而不散按之有形名曰瘧母始雖邪正二氣及其固結之久則頑痰死血皆有之矣然其為患或在腸胃之中或薄腸胃之外不易攻去仲景先取灰酒便是妙處蓋灰從火化能消萬物今人取十灰膏以作爛藥其性可知漬之以酒取其善行若鱉甲鼠婦䗪蟲蜣螂蜂窠者皆善攻結而有小毒以其為血氣之屬用之以攻血氣之凝結同氣相求成功易易耳乃柴胡厚朴半夏皆所以散結氣桂枝丹皮桃仁皆所以破滯氣水穀之氣結則大黃葶藶石韋瞿麥可以平之寒熱之氣交則乾薑黃芩可以調之人參者所以固元氣於克伐之餘阿膠芍藥者所以養陰於峻厲之隊也治瘧脹方蒼朮湯治秋深久瘧胸中無物又無痰癖腹高而食少俗謂瘧氣入腹名曰瘧脹蒼朮四兩草烏頭一錢杏仁三十個上為粗末共作一服水三升煮至一半均作三服一日服盡治瘧痢方加味三白湯治瘧後痢疾用此補脾和血白朮白茯苓白芍藥當歸黃連木香砂仁上銼水煎服香砂白朮湯治瘧後變成痢疾經云瘧後之痢從虛治故用補脾胃為主佐以治痢藥木香砂仁各一錢白朮二錢茯苓芍藥炒陳皮各一錢半甘草炙五分上銼水煎服有熱加炒芩連血痢加當歸生地黃虛加人參裡急後重加枳殼檳榔瘧後調理方對金飲子治瘧疾愈後調理脾胃蒼朮厚朴陳皮甘草上每服四錢薑棗同煎服一方加草果倍用蒼朮名草果平胃散正氣散瘧後溫胃進食藿香草果各四錢半夏陳皮厚朴砂仁甘草炙各一錢上銼加薑棗煎服加減六君子湯治瘧後飲食少進四肢無力面色痿黃人參白朮茯苓半夏陳皮各一錢黃連枳實各八分甘草炙五分上銼加生薑三片水煎食遠服參歸養榮湯治瘧疾截住後用此調養血氣人參白朮茯苓甘草炙當歸芍藥酒炒熟地黃山藥炒蓮肉炒陳皮厚朴砂仁各等分上銼加大棗二枚水煎溫服虛熱虛汗加黃耆去砂仁
