body:
  text: 卷二十三瘧疾內經敘瘧黃帝問曰夫痎瘧皆生於風痎音皆二日一發之瘧張介賓曰痎皆也言諸瘧也其畜作有時者畜邪蓄於經有時而伏也作病見於外不期而發也何也岐伯對曰瘧之始發也先起於毫毛憎寒而毛豎也伸欠乃作伸者伸其四體邪動於經也欠呵欠也陰陽爭引而然寒慄鼓頷鼓者振悚之謂頷者腮頷也腰脊俱痛寒去則內外皆熱頭痛如破渴欲冷飲帝曰何氣使然願聞其道岐伯曰陰陽上下交爭虛實更作陰陽相移也邪之所在則邪實正虛故入於陰則陰實陽虛入於陽則陽實陰虛虛實更作者以陰陽相移易也陽並於陰則陰實而陽虛陽明虛則寒慄鼓頷也陽明者胃氣之所出其主肌肉其脈循頤頰故陽明虛則為寒慄鼓頷巨陽虛則腰背頭項痛腰背頭項皆太陽經也陽虛則寒邪居之故為痛病痛者陰也三陽俱虛兼陽明少陽而言則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒表裡陰邪皆勝也陽盛則外熱陰虛則內熱內外皆熱則喘而渴故欲冷飲也此邪自陰分而復並於陽分並於陽則陽勝陽勝則外內皆熱而喘渴喜冷此皆得之夏傷於暑暑傷於夏其時則熱盛其邪則風寒也如上文曰痎瘧皆生於風金匱真言論曰夏暑汗不出者秋成風虐熱氣盛藏於皮膚之內腸胃之外此榮氣之所舍也風寒在表必鬱而為熱其藏於皮膚之內腸胃之外蓋即經脈間耳榮行脈中故曰此榮氣之所舍也此令人汗空疏腠理開因得秋氣汗出遇風及得之以浴水氣舍於皮膚之內與衛氣並居暑邪內伏者陰邪也秋氣水氣亦陰氣也新邪與衛氣並居則內合伏暑故陰陽相薄而瘧作矣張介賓曰傷暑為瘧何謂陰邪蓋陽暑傷氣其證多汗感而即發邪不能留其留藏不去者惟陰暑耳以其無汗也故凡患瘧者必因於盛暑之時貪涼取快不避風寒或浴以涼水或澡於河流或過食生冷壯者邪不能居未必致病怯者蓄於榮衛則所不免但外感於寒者多為瘧內傷於寒者多為痢使能慎此二者則瘧痢何由來也衛氣者晝日行於陽夜行於陰此氣得陽而外出得陰而內薄是以日作風寒自表而入則與衛氣並居故必隨衛氣以為出入衛氣一日一周是以新感之瘧亦一日一作然則日作之瘧邪在衛耳其氣淺故其治亦易帝曰其間日而作者何也岐伯曰其氣之舍深內薄於陰邪居榮氣之間連乎臟矣陽氣獨發陰邪內著榮為陰衛為陽陽氣獨發者其行本速陰邪內著者其行則遲陰與陽爭不得出一遲一速相拒而爭則陰邪不得與衛氣俱出是以間日而作也帝曰其作日晏與其日蚤者何氣使然岐伯曰邪氣客於風府循膂而下風府督脈穴膂呂同脊骨曰呂象形也一曰夾脊兩旁之肉曰呂下者下行至尾骶也衛氣一日一夜大會於風府衛氣每至明旦則出於足太陽之睛明穴而大會於風府此常度也其明日日下一節若邪氣客於風府必循膂而下其氣漸深則日下一節自陽就陰其會漸遲故其作也晏此先客於脊背也言初感之伏邪也每至於風府則腠理開言衛氣邪氣之會也腠理開則邪氣入邪氣入則病作以此日作稍益晏也會則病作晏則因邪之日下也其出於風府日下一節二十五日下至骶骨項骨三節脊骨二十一節共二十四節邪氣自風府日下一節故於二十五日下至尾骶二十六日入於脊內注於伏膂之內復自後而前故於二十六日入於脊內以注伏膂之脈按歲露篇曰入脊內注於伏沖之脈蓋衝脈之循背者伏行脊膂之間故又曰伏膂也其氣上行九日出於缺盆之中邪在伏膂之脈循脊而上無關節之窒故九日而出缺盆其氣日高其氣日高則自陰就陽其邪日退故作日益蚤也其間日發者由邪氣內薄於五臟橫連募原也此重申上文未盡之義也諸經募原之氣內連五臟募音幕按舉痛篇及全元起本皆作膜原其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也邪在陰分故道遠行遲而間日作也靈樞經云瘧者內薄於五臟橫連募原其道遠其氣深其行遲不能日作故次日乃畜積而作焉詳畜積二字則非一日之義明矣始明邪氣未盛未與衛氣相當故未作必候畜積與衛氣相當故作焉帝曰夫子言衛氣每至於風府腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之發也不當風府其日作者奈何岐伯曰此邪氣客於頭項循膂而下者也凡邪氣客於頭項則必循膂而下此其常也故虛實不同邪中異所則不得當其風府也然邪之所中亦但隨虛實而異其處不必盡當風府也然則所謂日下者惟邪氣耳衛氣周環豈有日下之理但氣至而會其病乃作則邪氣衛氣均為日下一節矣故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病氣至者衛氣之至也至於邪合然後病作故其蓄作則遲早有時衛氣之所在與邪氣相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也府者所以聚物故凡風之所居即為風府衛氣之至與邪相合則腠理開開則邪復入之故無論乎上下左右皆可中邪凡邪所中之處亦皆可稱為風府故曰風無常府也帝曰善夫風之與瘧也此風字指風證為言風之與瘧皆因於風相似同類而風獨常在瘧得有時而休者何也岐伯曰風氣留其處養而不移者也故常在瘧氣隨經絡流變不一者也沉以內薄言其深也即上文薄於五臟橫連募原之謂故衛氣應乃作帝曰瘧先寒而後熱者何也岐伯曰夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之水寒浴水乘涼之類藏於腠理皮膚之中秋傷於風則病成矣因暑受寒則腠理閉汗不出寒邪先伏於皮膚之中得清秋之氣而風襲於外則病發矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧帝曰先熱而後寒者何也岐伯曰此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧其但熱而不寒者陰氣先絕陽氣獨發則少氣煩冤手足熱而欲嘔名曰癉瘧陽邪獨亢故但熱不寒而煩冤少氣表裡俱病故手足熱而欲嘔以熱邪及於胃也帝曰夫病溫瘧與寒瘧而皆安舍舍於何臟安舍者言其何所居也岐伯曰溫瘧者得之冬中於風寒風雖陽邪其氣則寒故風寒可以並言氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外者也腎應冬其主骨髓故冬中風寒而不即病者則邪氣藏於骨髓之中或遇春溫或遇大暑隨觸而發故自內達外而為病也如是者陰虛而陽盛陽盛則熱矣自陰出陽則陰虛陽實也衰則氣復反入陽極而衰故復入於陰分入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧冬中於寒而發為溫瘧即傷寒之屬故傷寒論有溫瘧一證蓋本諸此帝曰癉瘧何如岐伯曰癉瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰肺素有熱者陽盛氣實之人也故邪中於外亦但在陽分而不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍肌肉故命曰癉瘧氣藏於心陽之發也熱在肌肉之間故令人消爍然則癉瘧之所舍者在心肺兩經耳帝曰瘧未發謂瘧未作時也其應何如岐伯曰瘧氣者必更盛更虛當氣之所在也病在陽則熱而脈躁在陰則寒而脈靜欲察其應當求氣之所在故但於證之寒熱脈之躁靜可辨其病之陰陽也極則陰陽俱衰衛氣相離故病得休衛氣集則復病也瘧之或在陰或在陽陰陽盛極氣必俱衰故與衛氣相離而病得休止及衛氣再至則邪正分爭病復作矣蔭按夫衛與邪相併則病作與邪相離則病休其並於陰則寒並於陽則熱離於陰則寒已離於陽則熱已至次日又集而併合則復病也帝曰時有間二日或至數日發或渴或不渴其故何也岐伯曰其間日者邪氣與衛氣客於六腑而有時相失不能相得客猶言會也邪氣深客於府則氣遠會希時與衛氣相失故休數日乃作也瘧者陰陽更勝也或甚或不甚故或渴或不渴陽勝則熱甚故渴也帝曰論言夏傷於暑秋必病瘧今瘧不必應者何也岐伯曰此應四時者也其病異形者反四時也其於春夏冬而病瘧者其病形多異正以四時之氣寒熱各有相反皆能為瘧也其以秋病者寒甚秋以盛熱之後而新涼束之陰陽相激故病為寒甚以冬病者寒不甚陽氣伏藏於內故冬病者雖寒不甚以春病者惡風春時陽氣外泄腠理漸疏余寒未去故病多惡風以夏病者多汗夏時熱甚熏蒸肌表故病此者多汗帝曰夫經言有餘者瀉之不足者補之今熱為有餘寒為不足夫瘧者之寒湯火不能溫也及其熱冰水不能寒也此皆有餘不足之類當此之時良工不能止必須其自衰乃刺之其故何也願聞其說此下言瘧之諸變也須其自衰乃刺之謂不可刺於病發之時岐伯曰經言無刺熇熇之熱不可刺之避其來銳也無刺渾渾之脈渾渾陰陽虛實未定也不得其真刺之恐有所誤無刺漉漉之汗漉音鹿汗大出也邪正未分故不可刺故為其病逆未可治也於此三者而刺之是逆其病氣也夫瘧之始發也陽氣並於陰當是之時陽虛而陰盛外無氣故先寒慄也此陰有餘陽不足也衛氣並於陰分則表虛故曰外無氣陰氣逆極則復出之陽陽與陰復並於外氣極於裡則復出於外則陰虛而陽實故先熱而渴夫瘧氣者並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱瘧者風寒之氣不常也病極則復或陰或陽瘧本不常有先寒後熱者陰極則復於陽也有先熱後寒者陽極則復於陰也至病之發也如火之熱如風雨不可當也其暴如此故名為瘧故經言曰方其盛時必毀病邪方盛之時真氣正衰若加以刺必致毀傷因其衰也事必大昌因其衰止而後取之則邪氣去而事大昌矣此之謂也即上文須其自衰乃刺之謂也夫瘧之未發也陰未並陽陽未並陰因而調之真氣得安邪氣乃亡故工不能治其已發為其氣逆也邪氣正發乃陰陽氣逆之時故不可以強治帝曰善攻之奈何早晏何如岐伯曰瘧之且發也陰陽之且移也必從四末始也陰陽且移必從四末始者以十二經並原之氣皆本於四肢也故凡瘧之將發則四肢先有寒意此即其候陽已傷陰從之故先其時堅束其處故治之者當於先時未發之頃堅束其處謂四關之上也令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之邪氣不得流行乃察其孫絡之堅盛者皆取之北人多行此法砭出其血謂之放寒其義即此此真往而未得並者也故可令真氣自為往來而邪則無能並也凡治瘧先發如食頃乃可治過之則失時也論瘧備三因陳無擇云夫瘧備三因外則感四氣內則動七情飲食飢飽房室勞逸皆能致之經所謂夏傷暑秋痎瘧者此則因時而敘耳不可專以此論外所因證有寒瘧有溫瘧有癉瘧並同素問有濕瘧者寒熱身重骨節煩疼脹滿自汗善嘔因汗出復浴濕舍皮膚及冒雨濕有牝瘧者寒多不熱但慘慼振慄病以時作此則多感陰濕陽不能勝陰也五種瘧疾以外感風寒暑濕與衛氣相併而成除癉瘧獨熱溫瘧先熱牝瘧無熱外諸瘧皆先寒後熱內所因證以蓄怒傷肝氣鬱所致名曰肝瘧以喜傷心心氣耗散所致名曰心瘧以思傷脾氣鬱涎結所致名曰脾瘧以夏傷肺肺氣凝痰所致名曰肺瘧以失志傷腎所致名曰腎瘧所致之症並同素問此五種瘧疾以感氣不和鬱結痰飲所致不內外因有疫瘧者一歲之間長幼相似有鬼瘧者夢寐不祥多生恐怖有瘴瘧者乍熱乍寒乍有乍無南方多病有胃瘧者飲食飢飽傷胃而成世謂食瘧有勞瘧者經年不瘥前後復發微勞不任亦有數年不瘥結成癥瘕在腹脅名曰老瘧亦曰瘧母以上諸證各有方治宜推而用之論瘧疾寒熱皆陰陽二氣所為葉氏曰或問瘧證之論內經詳矣其曰夏傷於暑至秋感風寒而作或為癉瘧或為溫瘧或為寒瘧其寒熱交作之故余已知之然後人又謂風寒暑濕四氣各自為瘧及痰瘧食瘧之論不知其寒熱之生也與內經所言之情同否曰內經言瘧兼風寒暑而成後人則專指一氣而得者也雖所感有不同然以理論之則四氣之所以為寒熱者要皆不外乎陰陽相併之一言耳何以見之邪之襲人或風或寒或暑或濕在表在裡淺深不同人之衛氣一日一夜周於身邪氣所居之地衛氣與之相合則邪隨氣行入里則並於陰而為寒出外則並於陽而為熱此所以為寒熱之往來也不可謂風寒暑三氣相兼與一氣獨得者其寒熱之病機各異也若夫痰食二瘧此自內而得者其情與外感少殊蓋痰鬱於中陰陽痞隔二氣相爭爭則陰勝而為寒陽勝而為熱矣其寒其熱非陰陽之相併乃勝復之道也食瘧者多食動脾之所致也或食積於中而不化或食雖化而脾受傷二者皆能致脾氣之虛脾虛則陰陽之氣失所養而不得其平不平則戰戰則寒熱生矣此寒熱與痰瘧之情相似但彼由陰陽痞隔此由陰陽不平略少異耳醫者能以此數者而推之各得其理則世又有所謂痰瘧瘴瘧鬼瘧之證皆可觸類而長之矣論治瘧須求邪所著處準繩云內經論病諸篇唯瘧論最詳語邪則風寒暑濕四氣皆得留著而病瘧論邪入客處所則有腸胃之外榮氣之舍脊骨之間五臟募原與入客於臟腑淺深不同語其病狀則分寒熱先後遇寒熱之多寡則因反時而病以應令氣生長化收藏之變此皆外邪所致者也及乎語溫瘧在臟者止以風寒中於腎語癉瘧者止以肺素有熱然冬令之寒既得以中於腎則其餘四臟令氣之邪又豈無入客於所屬之臟者乎既肺本氣之熱為瘧則四臟之氣鬱而為熱者又豈不似肺之為瘧乎此殆舉一隅可以三隅反也故陳無擇謂內傷七情飢飽房勞皆得鬱而蘊積痰涎其病氣與衛氣並則作瘧者豈非用此例以推之歟夫如是內外所傷之邪皆因其客在榮氣之舍故瘧有止發之定期榮氣有舍猶行人之有傳舍也故瘧榮衛之氣日行一周歷五臟六腑十二經絡之界分每有一界分必有其舍舍有隨經絡沉內薄之瘧邪故與日行之衛氣相集則病作離則病休其作也不惟脈外之衛虛併入於陰靈樞所謂足陽明與榮俱行者亦虛以從之陽明之氣虛則天真因水穀而充大者亦暫衰所以瘧作之際禁勿治刺恐傷胃氣與天真也必待陰陽並極而退其榮衛天真胃氣離而復集過此邪留所客之地然後治之或當其病未作之先迎而奪之丹溪謂瘧邪得於四氣之初弱者即病胃氣強者伏而不得動至於再感胃氣重傷其病乃作此謂外邪必用汗解虛者先以參朮實胃加藥取汗唯足厥陰最難得汗其汗至足方佳大率取汗非用麻黃輩但開鬱通經其邪熱即散為汗矣又云瘧發於子半之後午之前是陽分受病其病易愈發於午之後寅之前是陰分受病其病難愈必分受病陰陽氣血藥以佐之觀形察色以別之蓋嘗從是法而治形壯色澤者病在氣分則通經開鬱以取汗色稍夭者則補虛取汗挾痰者先實其胃一二日方服劫劑形弱色枯者則不用取汗亦不可劫但補養以通經調之其形壯而色紫黑者病在血分則開其阻滯色枯者補血調氣夫如是者猶為尋常之用至於取汗不得汗理血而汗不足若非更求藥之切中病情直造邪所著處何能愈之乎論瘧為二少陽相合準繩云經曰夏傷於暑秋必痎瘧暑者季夏也季夏者濕土也君火持權不與之子暑濕之令不行也濕令不行則土虧矣所勝妄行木氣太過少陽旺也所生者受病則肺金不足所不勝者侮之故水得以乘之土分土者坤也坤土申之分申為相火水入於土則水火相干陰陽交爭故為寒熱兼木氣終見三焦是二少陽相合也少陽在濕土之分故為寒熱肺金不足灑淅寒熱此皆往來未定之氣也故為痎瘧久而不愈瘧不發於夏而發於秋者以濕熱在酉之分方得其權故發於大暑以後也論瘧分三陽三陰淺深之異機要云經曰夏傷於暑秋必痎瘧傷之淺者近而暴傷之重者遠而為痎痎者久瘧也是知夏傷暑氣閉而不能發泄於外邪氣內行至秋而為瘧也有中三陽者有中三陰者其證各殊同傷寒也在太陽經謂之寒瘧治多汗之在陽明經謂之熱瘧治多下之在少陽經謂之風瘧治多和之此三陽受病謂之暴瘧發在夏至後處暑前此乃傷之淺者近而暴也在陰經不分三經總謂之濕瘧當從太陰經論之發在處暑後冬至前此乃傷之重者遠而為痎痎者老也居西方宜毒藥療之綱目云足太陽之瘧令人腰痛頭重寒從背起頭背腰皆足太陽經之所行故如此先寒後熱熇熇暍暍然皆熱甚貌熱止汗出難已邪在三陽盛於表也汗不易收故曰難已羌活加生地黃湯小柴胡加桂湯足少陽之瘧令人身體解㑊謂不耐煩勞形跡困倦也寒不甚熱不甚病在半表半裡也惡見人見人心惕惕然邪在膽也熱多汗出甚少陽為木火之經故熱多於寒而汗出甚也小柴胡湯足陽明之瘧令人先寒灑淅寒甚久乃熱陽明雖多血多氣之經而寒邪勝之故先為寒久乃熱熱去汗出熱去則邪解故汗出喜見日月光火氣乃快然經脈篇曰陽明病至則惡人與火今反喜見日月光及得火氣乃快然者何也蓋陽明受陽邪胃之實也故惡熱陽明受陰邪胃之虛也故喜暖耳桂枝二白虎一黃芩芍藥加桂湯足太陰之瘧令人不樂脾者心之子脾病則心氣不舒故不樂好太息不嗜食脾不化則上焦痞塞故好太息而不嗜食多寒熱汗出太陰主裡邪不易解故多寒熱汗出病至則善嘔脾脈絡胃上膈挾咽故病至則善嘔嘔已乃衰然必待其嘔已病衰方可取之小建中湯異攻散足少陰之瘧令人嘔吐甚腎脈上貫肝膈入肺中循喉嚨陰邪上衝故為嘔吐甚多寒熱熱多寒少腎病則陰虛陰虛故熱多寒少欲閉戶牖而處病在陰者喜靜其病難已腎為至陰之臟而邪居之故病深難已小柴胡加半夏湯足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便肝脈過陰器抵少腹布脅肋故為腰腹小便之病凡小水不利為癃今曰如癃狀非癃也蓋病不在水而在於肝邪之陷故亦如小便不利而急數欲便也意恐懼氣不足意恐懼者肝氣不足也腹中悒悒不暢之貌四物柴胡苦楝附子湯準繩云或在頭項或在背或在腰脊雖上下遠近之不同在太陽一也或在四肢者風淫之所及隨所傷而作不必盡當風府也先寒而後熱者謂之寒瘧先熱而後寒者謂之溫瘧二者不當治水火當從乎中治中治者少陽也渴者燥勝也不渴者濕勝也瘧雖傷暑遇秋而發其不應也秋病寒甚太陽多也冬寒不甚陽不爭也春病則惡風夏病則多汗汗者皆少陽虛也其病隨四時而作異形如此又有得之於冬而發之於暑邪客於腎足少陰也有藏之於心內熱熏於肺手太陰也至於少氣煩冤手足熱而嘔但熱而不寒謂之癉瘧足陽明也治之奈何方其盛也取之必毀因其衰也治法易老瘧論備矣論五臟皆有瘧其治各異準繩云肺瘧令人心寒肺者心之蓋也以寒邪而乘所不勝故令人心寒寒甚復熱熱間善驚如有所見者寒甚復熱而心氣受傷故善驚如有所見桂枝加芍藥湯心瘧令人煩心甚欲得清水瘧邪在心故煩心甚欲得水以解也反寒多不甚熱心本陽臟為邪所居則陽虛陰盛故反寒多而不甚熱桂枝黃芩湯肝瘧今人色蒼蒼然肝屬木故色蒼蒼然太息肝鬱則氣逆故太息其狀若死者木病則堅強故其狀若死四逆湯通脈四逆湯脾瘧令人寒脾以至陰之臟而瘧邪居之故令人寒腹中痛脾脈自股人腹故腹中痛熱則腸中鳴寒已而熱則脾氣行故腸中鳴鳴已汗出鳴已則陽氣外達故汗出小建中湯芍藥甘草湯腎瘧令人洒洒然腰脊痛宛轉大便難洒洒寒慄貌腎脈貫脊屬腎開竅於二陰故腰脊之痛苦於宛轉而大便難也目眴眴然眴熒絹切音懸眩動貌目視不明水之虧也手足寒手足寒陰之厥也桂枝加當歸芍藥湯論痰能致瘧嚴用和云素問謂瘧生於風又夏傷於暑此四時之氣也或乘涼飲冷當風臥濕飢飽失時致脾胃不和痰積中脘遂成此疾所謂無痰不成瘧一日一發易治間日一發難愈三日一發者尤難愈劉宗厚曰瘧而挾痰則誠有之其引無痰不成瘧之一句則失之偏瘧非脾寒及鬼食辨張子和云夫瘧猶酷虐之虐也以夏傷酷暑而成痰瘧也又有痎瘧老瘧無時而作名痎瘧俗呼妖瘧連歲不已此肝經肥氣之積也多在左脅之下狀如覆杯是為痎瘧久而不已令人瘦也內經既以夏傷於暑而為瘧何後世之醫者皆以脾寒治之世醫既不知邪熱蓄積之深為寒戰遂為寒戰所感又不悟邪熱入而後出於表發為燥渴遂為交爭所感相傳以薑附硫黃平胃異攻散交解飲子治之百千之中幸其一效甚者歸之祟怪豈不大可笑耶又或因夏月飲冷過常傷食生硬之屬指為食瘧此又非也豈知內經之論則不然夏傷於暑遇秋之風因勞而汗元府受風復遇淒滄之水風閉而不出舍於腸胃之外與榮衛並行晝行於陽夜行於陰邪熱淺則連日而作邪熱深則間日而作併入於裡則熱併入於表則寒若此而論了不幹於脾也以時言之治平之時常瘧病少擾攘之時常瘧病多治平之時雖用砒石辰砂有毒之藥治之亦能取效緣治平之時其民夷靜故雖以熱攻熱亦少後患至於擾攘之時其民勞苦內火與外火俱動不可遽用大毒大熱之藥若以熱攻熱熱甚則轉為吐血泄血癰疽瘡瘍嘔吐之疾豈可與夷靜之人同法而治哉又富貴之人勞心役智不可驟用砒石大毒之藥止宜先以白虎湯加人參小柴胡湯五苓散之類頓服立解或不愈者可服神佑丸減用神芎等甚者可大小承氣湯下之五七行或十餘行峻泄夏月積熱暑毒之氣此藥雖泄而無損於臟腑乃所以安臟腑也次以桂苓甘露散石膏知母湯大小柴胡湯人參柴胡飲子量虛實加減而用之此藥皆能治寒熱往來日晡發作與治傷寒其法頗同更不愈者以常山散吐之無不愈者余嘗用張長沙汗下吐三法愈瘧極多大忌錯作脾寒用暴熱之藥治之縱有愈者後必發瘡疽下血之病不死亦危瘧病除嵐瘴一二發必死其餘五臟六腑瘧皆不死如有死者皆方士誤殺之也劉宗厚曰或問俗以瘧為脾寒何也曰此亦有理天地之間唯吳楚閩廣人患此至多為陽氣之所盛其地卑濕長夏之時人多患暍瘧霍亂瀉痢傷濕熱也本暑盛陽極人伏陰在內脾困體倦腠理開發或因納涼於水閣木陰及泉水澡浴而微寒客於肌肉之間經所謂遇夏氣淒滄之小寒迫之是也或勞役飢飽內傷而即病作故指肌肉屬脾發則多惡寒戰慄乃謂之脾寒爾實由風寒濕暍之邪鬱於腠理夏時毛竅疏通而不為病至秋氣斂之際表邪不能發越故進退不已往來寒熱病勢如凌虐人之狀所以名瘧即四時之傷寒故十二經皆能為病古方治法多兼於理內傷取效脾氣和而精氣疏通陰陽和解諸邪悉散此實非脾病也但病氣隨經升降其發早暮日次不等經具病例已詳季世以發表解肌溫經散寒等法亦未嘗執於燥脾劫也又曰既瘧本夏傷於暑為病世有不服藥餌或人與符咒厭之亦止何也曰此夏時天地氣交百物生髮濕熱熏蒸禽蟲吐毒之際人因暑熱汗出神氣虛耗感得時間乖戾之氣為病故與厭之亦止若移精變氣之謂也然古人稱瘧不得為脾寒者正恐人專於溫脾之說不明造化之源而失病機氣宜之要故也論治瘧當順天道東垣曰夏月天氣上行秋月天氣下行治者當順天道如先寒後熱太陽陽明病白虎加桂也此天氣上行宜用之若天氣下行則不宜瀉肺宜瀉命門相火則可矣亦有內傷冷物而作者當先調中後定瘧形治隨應見乃得康寧亦有久而不瘥者當求虛實以脈為期虛補實瀉可使卻疾此之謂也論瘧疾治法袖珍論曰瘧之為疾名狀不一有所謂癉瘧寒瘧溫瘧食瘧牝瘧牡瘧名雖不同皆由外感風寒暑濕之氣與衛氣相搏而成內經云夏傷於暑秋必病瘧然四時有感鬱積七情飢餓失時致令脾胃不和痰留中脘皆成瘧疾其初發也欠伸畏寒戰慄頭痛或先寒後熱或先熱後寒或單寒單熱或寒多熱少或熱多寒少一日一發者易治二日三日一發者難愈大抵瘧脈皆弦弦數者多熱弦遲者多寒弦小緊者宜下弦遲者宜溫弦緊者可發汗及針灸浮大者宜吐治療之法當先發散寒邪不可驟用截補之藥若截早則邪氣停蓄變生他證不能即愈致成勞瘵者有之發散之藥熱多宜小柴胡湯參蘇飲清脾湯之類寒多者宜養胃湯四獸飲發散不退然後以常山飲勝金丸截之而愈久則脾胃虛敗惟宜多進養脾驅痰之藥脾氣一盛自然平復此證既愈尤當節飲食謹勞役防其再作如煙瘴之地居人常患瘧疾又當隨其方土所宜藥性施以治法客旅往來瘴地常宜服平胃散草果飲先以防之虞氏曰經云夏傷於暑秋為痎瘧又曰先寒而後熱者名曰寒瘧先熱而後寒者名曰溫瘧其但熱而不寒者名曰癉瘧丹溪曰痎瘧皆生於風夫痎瘧者老瘧也以其隔三日一作纏綿不去古方多用峻劑恐非稟受怯弱與居養所移者所宜始悟常山烏梅砒丹劫劑或誤投之輕病變重重者必危夫三日一作者邪入於三陰經也作於子午卯酉日者少陰瘧也作於寅申巳亥日者厥陰瘧也作於辰戊丑未日者太陰瘧也瘧得於暑當以汗解或因取涼太過汗郁成痰其初感也弱者即病胃氣強者伏而不動至於再感復因內傷其病乃作宜其難瘥夫感暑與風皆外邪也故非汗多不解今之遘此疾者已經再三劫試胃氣重傷何由得愈欲治此證必先與參術等補劑為君加柴葛等發散漸而取汗得汗而虛又行補養下體屬陰最難得汗補藥力到汗出至足方是佳兆又有感病極深邪氣必自臟傳出至腑其發無時若發於午之後寅之前者血受病也為難愈也須漸趲早亦佳兆也治此病者春夏為易秋冬為難大忌飽食遇發日飽食病愈加重尤當以汗之難易較輕重也經又曰瘧之且發也陰陽之且移也必從四末始陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之謂用三稜針視孫絡出血此直往而未得並者也故今人多以諸般草藥於臂膊內縛之即此遺意耳外有陰虛證每日午後惡寒發熱至晚亦得微汗而解脈必虛濡而數且瘧脈弦而虛脈不大弦為辨耳若誤作瘧治而用常山砒丹及柴胡乾葛等藥多至不救醫者宜以脈證參驗其虛實毋鹵莽以殺人也彭氏曰內經云夏傷於暑秋為痎瘧然無痰不成瘧此先賢確論乍寒乍熱者邪氣與正氣相激搏而然如邪氣陰盛而入內則陽微而外寒如正氣陽復而入內則陰微而外熱亦有單寒而為牝瘧此濕傷陰分也又有單熱而為牡瘧此熱傷陽分也又有三陽瘧三陰瘧屬五臟內經曰瘧屬三陽宜汗宜吐麻黃葛根柴胡常山草果烏梅之屬治之瘧屬三陰宜下宜溫宜和大柴胡湯柴胡生薑湯柴胡四物湯附子理中湯加升柴之類選而用之丹溪曰瘧有暑有風有濕有痰有食機要謂在太陽經為寒瘧治多汗之在陽明經為熱瘧治多下之少陽經為風瘧治多和之此三陽受病謂之暴瘧發在夏至後處暑前乃傷之淺者在三陰經則總謂之溫瘧發在處暑後冬至前乃傷之重者此說良是其三陰經瘧作於子午卯酉日者少陰瘧作於寅申巳亥日者厥陰瘧作於辰戊丑未日者太陰瘧也三日一發者受病一年即三陰瘧間日一發者受病半年一日一發者受病一月二日連發住一日者血氣俱受病俗云脾寒乃因名而迷其實也苟因飲食所傷而得之未必是寒況其他乎暑瘧宜人參白虎湯之類有痰者二陳湯加草果常山柴胡黃芩不食者必從飲食上得之當以食治虛者必用參術一二帖拖住其氣不使下陷後用他藥若無汗要有汗散邪為主帶補若有汗要無汗扶正氣為主帶散邪數發之後便宜截法而除之久則發得中氣虛弱病邪愈深而難治世有砒丹等截藥大毒不可輕用大渴大熱用小柴胡去半夏加知母麥門冬黃連渴用生地黃麥門冬天花粉牛膝知母黃柏乾葛生甘草久瘧二陳湯加川芎蒼朮柴胡乾葛白朮一補一發甚者發寒熱頭痛如破渴而飲水多汗可與參耆芩連梔子川芎蒼白二朮半夏等治之痰滯胸滿熱多寒少大便燥實大柴胡湯利之愈久瘧不得汗以二陳湯倍蒼朮白朮加檳榔小兒瘧疾有痞塊生地黃芍藥各一錢半陳皮川芎炒黃芩半夏各一錢甘草二分加生薑煎調醋炙鱉甲末瘧母用丸藥消導之醋炙鱉甲為君三稜蓬朮香附海粉青皮桃仁紅花神麯麥芽隨證加減為丸醋湯送下老瘧系風暑入在陰分宜用血藥引出陽分而散川芎紅花當歸蒼白朮白芷黃柏甘草煎露一宿服痎瘧者老瘧也三日一發陰經受病也夫瘧得於暑當以汗解或處涼令汗不得泄鬱而成痰又復嗜欲縱恣及輕試劫藥等劑佐以本經引用之藥若得汗而體虛又須重補俟汗通身下過委中方是佳兆仍淡飲食避風冷遠房勞無不愈者常山性暴悍善驅逐然能傷真氣病人稍虛怯者勿用統旨云瘧證不一其名亦殊皆因外感四氣內動七情飲食飢飽房室勞役所致初發之際病勢正熾一二髮間未宜遽截不問寒熱多少且以養胃湯柴平散清脾飲草果飲選用待四五發後便應截住否則發得氣虛病邪愈深而難愈即於清脾飲加常山世有砒丹等截藥大毒不可輕用若氣虛者雖截不效愈截愈虛遂成重疾戒之必先與參術一二帖拖住其氣不使下陷後用他藥大抵無汗要有汗散邪為主小柴胡加葛根紫蘇有汗要無汗扶正為主小柴胡加白朮桂枝瘧是風暑之邪非汗多不解當分所感淺深與夫在陽在陰之分而治也有三日一發者受病一年間日一發者受病半年此二者即老瘧也邪入最深難愈有病二日間一日者氣血俱病亦難愈有一日一發者受病一月其病最淺易愈在陽分者驅邪而即止在陰分者必以升提之藥引至陽分方可截之初發風寒在表雖寒熱過後而身常自疼常自畏風藿香正氣散取微汗風瘧有汗惡風脈浮桂枝羌活湯暑瘧其人面垢口渴雖熱已退亦常自汗白虎湯之類寒瘧無汗惡寒脈緊立積散濕瘧小便不利身體重痛而煩宜滲濕湯加柴胡黃芩草果痰瘧痰涎潮湧或素有痰飲結於胸脅宜二陳湯加常山草果柴胡黃芩食瘧從飲食傷脾得之或瘧已成而猶不忌口或寒熱正作而進食其人必惡食噫氣吞酸胸膈不利宜平胃散加青皮草果砂仁獨熱煩渴者為癉瘧清脾飲去草果加葛根倍柴芩熱多寒少或但熱不寒者為溫瘧又曰牡瘧白虎加桂枝湯寒多熱少或但寒不熱者為寒瘧又曰牝瘧柴胡薑桂湯老瘧風暑入陰在臟宜血藥引出陽分而後散之川芎紅花當歸白朮白芷撫芎黃柏甘草煎露一宿服之經年累月而發者名曰瘧母不宜十分攻之宜四獸飲亦有腹中結塊者鱉甲飲或阿魏丸久瘧成勞以補為先看氣血何虛以補之有痰加痰瘧藥亦要以扶脾胃為本有痰瘧一歲之間長幼相似先以藿香正氣散或小柴胡加減有鬼瘧夢寐不祥多生恐怖辟邪丹有瘴瘧乍寒乍熱乍有乍無嶺南人多有之宜藿香正氣散或迷悶狂妄者啞不能言小柴胡加大黃枳殼亦有寒熱作而指甲青黑者宜生料平胃散加草果檳榔治之嵐瘴最能殺人有一二日發而死者客旅往來常宜服平胃散或草果飲預以防之亦在人之保養何如耳且瘴乃山海嵐霧之氣侵晨弗得出外如不得已而出可飲酒三五鍾以敵其氣庶免侵害瘧後變成痢疾經云瘧後之痢從虛治故用補脾胃為主佐以治痢藥香砂白朮湯醫說云瘧名不同三陰三陽瘧及痰瘧鬼瘧癉瘧外又有寒熱善飢而不能食食已脹滿腹急絞痛病以日作名曰胃瘧六腑無瘧惟胃有者蓋飲食飢飽所傷胃氣而成世謂之食瘧飲食不節變成此證有經年不瘥瘥後復發遠行久立下至微勞力皆不任名曰勞瘧亦有數年不瘥百藥不斷結為症癖在腹脅名曰老瘧亦名瘧母李氏曰瘧疾先要分陰陽陽為外感邪氣而外感之中風暑有汗為陽寒濕無汗為陰陰為內傷正氣而內傷之中氣虛為陽血虛為陰陽為升發在春夏陰為降發在秋冬陽為腑邪淺與榮衛並行故一日一發陰為臟邪深橫連募原不能與正氣並行故間日蓄積乃發或三四日一發久則必有瘧母陽為日發邪淺榮衛晝行背與脊故也陰為夜發邪深榮衛夜行胸與腹故也又有二日連發住一日者及日夜各一發者乃氣血俱受病也陽為子時至巳陰為午時至亥如發寅卯而退於申未或發申未而退於子醜皆謂之陰陽不分須隨證用藥趲早或移時分定陰陽然後陽瘧截住陰瘧升散今俗以似瘧誤治變成溫瘧為分陰陽謬矣不知瘧有凌虐之狀在傷寒久則為壞證在內傷久則為勞瘵豈美疾哉凡陽瘧易治陰瘧難愈其寒熱亦分陰陽陽邪與榮爭而邪火發於外則為熱陰邪與衛爭而正氣退於內則為寒衛虛則先寒榮虛則先熱表邪多則寒多里邪多則熱多表裡相半則寒熱相等諸瘧惟食積挾火寒已復熱熱已復寒謂之寒熱相併又暑瘧單熱濕瘧單寒寒瘧先寒後熱風瘧先熱後寒余皆先寒後熱陰陽寒熱明而瘧知治本矣瘧有三陽三陰三陽氣分受病發在處暑前者俱謂之暴瘧乃傷之淺者三陰血分受病發在處暑後者俱謂之溫瘧乃隔冬感溫氣藏於腎與骨髓至夏秋重感新邪觸發自臟而達之腑乃傷之重者寒瘧屬太陽其病腰背頭項俱痛寒多熱少汗出難已者柴胡加桂湯單寒無汗者五積散古棗附湯熱瘧屬陽明其病目痛鼻燥鼓頷熱多寒少煩渴尿赤者柴苓湯夏月黃連香薷散熱傷氣分單熱而渴者白虎加參湯或黃芩湯加桂少許風瘧屬少陽其病口苦嘔吐噁心脅痛寒熱相等者柴胡桂枝湯風盛筋脈抽搐者烏藥順氣散加柴胡黃芩身疼者敗毒散咳嗽者參蘇飲少陰瘧發於子午卯酉四正之日其病舌乾口燥嘔吐欲閉戶牖輕者小柴胡湯倍半夏重者合四物湯厥陰瘧發於寅申巳亥四旁之日其病小腹痛引陰如淋輕者小建中湯重者四物湯加元胡索金鈴子附子太陰瘧發於辰戊丑未日其病腹滿自利善嘔嘔已乃衰輕者異攻散重者理中湯如濕偏陰分單寒氣虛作泄者古棗附湯附子理中湯身重腹脹者五苓散朮附湯浮腫退黃丸瘴瘧山溪蒸毒令人迷困發狂或啞乍寒乍熱乍有乍無者涼膈散加柴胡檳榔不伏水土者人參養胃湯疫瘧一方長幼相似須參運氣寒熱用藥大概不換金正氣散五積交加散加減如意丹最妙鬼瘧因卒感屍疰容忤寒熱日作夢寐不祥多生恐怖言動異常宜辟邪丹雄朱丹或用燒人場土為丸塞男左女右耳中外感寒多非草果厚朴不能溫散熱多非柴胡黃芩不能清解陽瘧無汗須加柴胡蒼朮葛根甚加麻黃陰瘧無汗須加柴胡升麻川芎有汗須加白朮烏梅以和之陽瘧初起痰在上者祛邪丸然亦三五發後移時乃可用之早則延綿稍久不敢吐者勝金丹三陰瘧便閉者宜下以截之暑瘧黃連香茹飲加大黃青皮烏梅煎服寒瘧二陳湯加青皮良薑煎吞神保丸五粒痰熱胸滿便閉者大柴胡湯瘀血發狂好忘者桃仁承氣湯虛閉麻子仁丸俱清晨一服取下惡水即止內傷瘧皆不食惟七情善食多汗五臟之氣不和略被外邪動痰宜四獸飲量其虛實加各經開鬱行氣之藥勞瘧微微惡寒發熱寒中有熱熱中有寒最難調理或半月十日小勞復來經久不瘥者芎歸鱉甲散主之熱多者生犀散有痞者鱉甲丸氣虛汗多無力飲食不進者六君子湯因勞役昏倦少食者補中益氣湯加黃芩半夏血虛夜發者小柴胡湯合四物湯加升麻紅花知母黃柏水煎露服趲早不愈用勝金丹截之有痞者陰瘧丸如陰虛火動午後寒熱至晚微汗乃解似瘧非瘧也宜加味逍遙散加地骨皮若誤用瘧藥必死氣血俱虛溺頻食少或遺精咳嗽者人參養榮湯加地骨皮烏梅麥門冬或僕厥不省者十全大補湯加柴胡黃芩陽虛去柴芩加附子吞黑錫丹有痞者橘皮煎丸痰瘧外感內傷郁聚成痰熱多頭痛肉跳吐食嘔沫甚則昏迷卒倒宜柴陳湯加草果嘔吐者二陳湯倍白豆蔻流行三焦嘔瘧自止氣虛嘔者單人參湯或用常山炒過久不止者露姜飲截之食瘧因飲食蘊成痰火寒已復熱熱已復寒寒熱交併苦飢不食食則吐痰胸滿腹脹者二陳湯合小柴胡湯或平胃散俱加枳實白朮山楂神麯青皮熱多者清脾飲寒多者人參養胃湯腹痛者紅丸子腹脹因濕痰或瘧氣歸腹者古龍虎丹用杏仁煎湯迎發時下久不愈者用辰砂阿魏等分糊丸皂子大每一丸人參煎湯下截之瘧無痰不成內傷脾胃虛寒宜清利濕痰為主內傷瘧皆汗多陽瘧斂以參朮黃耆陰瘧斂以歸地知柏芍藥大抵有汗要止汗以補其虛無汗要發汗以散其邪稍久者一補一發丹久虛者補中益氣湯加山楂麥芽扶脾自止極忌吐截凡瘧經年不瘥謂之老瘧必有痰水瘀血結成痞塊藏於腹脅作脹乃瘧母也雖內虛者非常山檳榔決不能除但須制熟則不損胃老瘧丸是也血虛者鱉甲丸體盛有水癖者暫用芫花丸仍須以補脾化痰湯藥輔之老瘧飲宜量氣血虛實加減或瘧後痢痢後瘧或瘧痢並作俱以柴苓湯六和湯清脾飲加減分利虛者補脾和血三白湯加黃連木香當歸砂仁或四獸飲補中益氣湯外感汗吐下解祛邪為主內傷斂補養正為主內外相兼又當參酌而論經曰夏傷於暑秋必發瘧又曰諸瘧皆生於風局方主於傷食丹溪主於痰其實因夏傷暑秋感風濕遇七情飲食鬱痰而後發雖三因雜至錯亂氣血然始於暑成於痰故捷徑以祛暑消痰為要斯為正治矣蔭按方氏曰瘧疾之源蓋由暑月中表氣虛而致中氣虛則水穀停聚使痰飲瘀積於胸脅表氣虛則風暑入內使血液稽留於經絡久則痰飲血液拂鬱稠黏膠固痞塞不通人之衛氣晝行陽分二十五度脊與背也夜行陰分二十五度胸與腹也榮衛行到病所不通乃作寒戰股振頭頷中外皆寒腰脊俱痛此邪氣入於內也寒戰俱已內外皆寒頭痛如破渴欲飲水煩滿欲吐自汗此邪火發於外也或獨寒而無熱或寒多而熱少或無汗者宜開鬱豁痰為主用人參養胃湯草果飲子之類以發散之或熱多而寒少或獨熱而無寒或有汗者宜清熱補虛為主用白虎加桂枝湯小柴胡湯之類以發散之用發散藥三五服後則用四獸飲六和湯之類以截之或瘧久在陰分亦須用血藥徹起陽分然後截之可也樓氏曰治先熱後寒者小柴胡湯先寒後熱者小柴胡加桂枝湯多熱但熱者白虎加桂枝湯多寒但寒者柴胡薑桂湯此以瘧之寒熱多少定治法也若多寒而但有寒者其脈或洪實或滑當作實熱治之若便用桂枝誤也如或多熱而但有熱者其脈或空虛或微弱當作虛寒治之若便與白虎亦誤也所以欲學者須先問其寒熱多少又診脈以參之百無一失矣龔氏曰瘧有風瘧暑瘧濕瘧食瘧痰瘧瘧母諸瘧之不同不過風寒暑濕之外感七情五味之內傷所致也然內外失守真邪不分陰陽偏勝寒熱交攻乃成瘧也治療之法當先發散外邪散之不退又須分利陰陽用柴苓湯最效甚者以截藥除之不二散勝金丸之類截之不愈乃氣血大虛要扶胃氣為本人參養胃湯養胃丹之類又有綿延不休越歲不已經汗吐下過榮衛虧損邪氣伏藏脅間結為症癖謂之瘧母老瘧飲黃甲丸之類蓋瘧有新久淺深治有緩急次序宜以脈證參驗量其虛實而療之虞氏曰予壯年過杭同舟有二男子皆年逾四十五各得痎瘧三年矣俱發於寅申巳亥日一人晝發於巳而退於申一人夜發於亥而退於寅予曰俱到杭可買藥俱與痊可晝發者乃陰中之陽病宜補氣解表與小柴胡湯倍柴胡人參加白朮川芎葛根陳皮青皮蒼朮夜發者乃陰中之陰病宜補血疏肝用小柴胡合四物湯加青皮各與十帖令加薑棗煎於未發前二時服每日一帖至八帖同日得大汗而愈永不再舉如瘧證帝曰火熱復惡寒發熱有如瘧狀或一日發或間數日發其故何也凡病寒熱多由外感然有不因風寒而火熱內盛者亦為惡寒發熱其作有期狀雖似瘧而實非瘧證故特為間辨也岐伯曰勝復之氣會遇之時有多少也陰氣多而陽氣少則其發日遠陽氣多而陰氣少則其發日近此勝復相薄盛衰之節瘧亦同法寒熱者陰陽之氣也遲速者陰陽之性也人之陰陽則水火也營衛也有熱而反寒者火極似水也寒而反熱者陰極似陽也陰陽和則血氣勻表裡治陰陽不和則勝復之氣會遇之時各有多少矣故陽入之陰則陰不勝陽而為熱陰出之陽則陽不勝陰而為寒又若陰多陽少則陰性緩而會遇遲故其發日遠陽多陰少則陽性速而會遇蚤故其發日近此勝復盛衰之節雖非瘧證而多變似瘧法亦同然所謂同者皆陰陽出入之理也然同中自有不同則曰是瘧曰非瘧是瘧非瘧者在有邪無邪之辨耳真瘧有邪由衛氣之會以為作止似瘧無邪由水火爭勝以為盛衰此則一責在表一責在裡一治在邪一治在正勿謂法同而治亦同也同與不同之間即殺人生人之岐也學者於此不可不察脈法脈經曰瘧脈自弦微則為虛代散則死要略曰瘧脈自弦弦數多熱弦遲多寒弦而小緊者下之弦遲者宜溫弦緊者可發汗浮大者可吐之弦數者風發也以飲食消息止之心法附錄曰瘧脈多弦但熱則弦而帶數寒則弦而帶遲亦有病久其脈極虛微而無力似乎不弦者然而必於虛微之中見弦但不搏手耳細察可見也或曰脈弦如刀刃者死弦小者生治初瘧方二陳湯治一切瘧疾隨證加減陳皮半夏薑製茯苓甘草炙上銼水煎服丹溪加減法凡瘧證如連日或間日發作惡寒發熱腰背頭項俱痛此屬大陽經瘧也加麻黃羌活藁本防風如連日或間日發作先寒後熱或寒少熱多或但熱不寒目痛鼻孔燥此屬陽明經瘧也加乾葛升麻石膏知母白芷如連日或間日發作或先寒後熱或寒熱間作脅痛口苦或嘔吐噁心此少陽經瘧也倍加柴胡及黃芩人參青皮如於子午卯酉日發寒熱嘔吐舌乾口燥此少陰經瘧也加當歸川芎黃柏黃連柴胡如於辰戊丑未日發寒熱嘔吐不嗜食或腹滿自利此太陰經瘧也加蒼朮白朮柴胡芍藥如於寅申巳亥日發惡寒發熱寒多熱少或腹痛引陰如淋狀善恐此厥陰經瘧也加桂枝附子乾薑又法熱甚加柴胡黃芩渴加知母麥門冬痰加南星薑汁咳嗽加知母貝母前胡飲食少加山楂麥芽神麯有食積加三稜蓬朮青皮大便秘加大黃桃仁小便赤短加澤瀉山梔一方加滑石末車前子瞿麥瘴瘧加檳榔截瘧加常山貝母檳榔內傷無汗加柴胡川芎汗多加黃耆氣虛合四君子湯血虛合四物湯勞瘧加地骨皮鱉甲七情加紫蘇香附久瘧倍參術寒甚加桂附草果夜瘧加升麻柴胡以提之停水倍半夏瘀血加桃仁紅花當吐者加酒蒸常山烏梅入酒以吐之當下者加大黃散邪湯治瘧疾初發增寒壯熱頭疼身痛無汗此藥是無汗要有汗散邪為主川芎白芷麻黃白芍藥防風荊芥紫蘇羌活各一錢甘草三分上銼一劑生薑三片蔥白三根水煎去渣露一宿次早溫服有痰加陳皮有濕加蒼朮夾食加香附正氣湯治瘧疾初發增寒壯熱頭疼口乾有汗此藥是有汗要無汗正氣為主柴胡前胡川芎白芷半夏姜炒檳榔麥冬去心草果去殼青皮去穰茯苓各一錢桂枝甘草各三分上銼一劑生薑三片棗一枚水煎預先熱服麻黃羌活湯治瘧疾頭痛項強脈浮惡風無汗者麻黃去節羌活防風甘草炙各半兩上為粗末每服五錢水一盞半煎至一盞溫服迎發日服吐者加半夏曲等分桂枝羌活湯治瘧疾處暑前後發頭痛項強脈浮惡寒有汗者桂枝羌活防風甘草各半兩上為粗末每服五錢水煎服如吐加半夏曲等分麻黃黃芩湯治瘧疾如前病而夜發者或惡風或惡寒麻黃去節一兩桂枝二錢黃芩五錢甘草炙三錢桃仁二十個去皮尖上為末水煎服桃仁散血緩肝夜發乃陰經有邪用此湯散血中風寒也桂枝芍藥湯治瘧疾寒熱大作不論先後此太陽陽明合病也謂之大爭寒熱作則必戰動經曰熱勝則動也發熱則必汗泄經云汗出不愈知為熱也陽勝陰虛之證當治內實外虛不治恐久而傳入陰經也宜此湯主之桂枝二錢黃耆知母芍藥石膏各半兩上為粗末每服五七錢水煎服桂枝黃芩湯如前藥服之寒熱轉大者知太陽陽明少陽三陽合病也宜此湯和之柴胡三錢黃芩半夏人參各一錢石膏知母各一錢二分桂枝甘草各五分上㕮咀加生薑三片水煎服服後如外邪已罷內邪未已用大柴胡大承氣等湯下之劉守真下瘧疾三方大柴胡湯自寅至巳時發者此謂病在氣也用此湯下之柴胡二錢黃芩半夏各一錢枳實七分大黃三錢人實者加至五六錢方可另下上㕮咀水一鍾半生薑三片棗一枚先煎前四味至七分次下大黃再煎五六沸迎病未發前一時服渣再煎服大承氣湯自午未時至酉時發者此謂半在氣半在血也以此湯下之枳實一錢厚朴制二錢大黃三錢強人加至五錢與硝作一包朴硝二錢半與大黃共作一包上㕮咀作一服水一鍾半生薑三片棗一枚先煎前二味至七分次下硝黃再煎五六沸迎病未發前一時服渣再煎服桃仁承氣湯自酉戌時至丑時發者此謂病在陰分乃在血也以此湯下之桂甘草各一錢半桃仁去皮研爛十五個大黃三錢加至五錢朴硝二錢上㕮咀作一服水一鍾半生薑三片棗一枚先煎前二味至大滾次下桃仁泥入內再煎至七分次下硝黃再煎至五六滾迎病未發前一時服渣再煎服前數藥下後以加減小柴胡湯合五苓散合解毒湯或合白虎湯調治柴苓湯治瘧疾初發寒熱交作病在半表半裡陰陽不分用此分利之柴胡黃芩人參半夏甘草豬苓茯苓澤瀉白朮肉桂上銼一劑加生薑三片棗一枚水煎服無汗加麻黃有汗加桂枝寒多加官桂熱多加黃芩驅邪湯蔭按王節齋曰瘧是風暑之邪有一日一發有二日一發有三日一發有間一日連二日發有日與夜各發有有汗有無汗有上半日發有下半日發有發於夜者治法邪從外入宜發散之然以扶持胃氣為本又須分別陽分陰分而用藥邪瘧及新發熱者可散可截虛瘧及久者宜補氣血若過服截瘧致傷脾胃則必延綿不休慎之柴胡白朮各一錢半蒼朮米泔浸一錢乾葛一錢二分陳皮七分甘草炙七分上銼水煎服若一日一發及午前發者邪在陽分加枯黃芩茯苓半夏各一錢熱甚頭痛再加川芎軟石膏各一錢口渴加石膏知母麥門冬各一錢若間日或三日發午後或夜發者邪入陰分加川芎當歸酒炒芍藥熟地黃酒炒知母各一錢酒洗紅花酒炒黃柏升麻各四分提起陽分方可截之若間一日連發二日或日夜各發者氣血俱病加人參黃耆白茯苓各一錢以補氣川芎當歸白芍藥熟地黃各一錢以補血若陽瘧多汗用黃耆人參白朮以斂之無汗用柴胡蒼朮白朮黃芩乾葛以散之若陰瘧多汗用當歸白芍藥熟地黃黃耆黃柏以斂之無汗用柴胡蒼朮川芎紅花升麻以發之故曰有汗者要無汗正氣為主無汗者要有汗散邪為主若病人胃氣弱飲食少或服截藥傷脾胃而少食者加人參一錢半酒炒芍藥大麥芽各一錢若傷食痞悶或有食積者加神麯麥芽枳實炒各一錢炒黃連五分若痰盛加薑製半夏南星枳實炒各一錢黃芩黃連各六分若欲截之加檳榔黃芩青皮常山各一錢烏梅肉三個若日久虛瘧寒熱不多或無寒而但微熱者邪氣已無只用四君子合四物湯加柴胡黃芩黃耆陳皮以滋補氣血除瘧湯濕瘧則用柴苓湯寒瘧則用桂附二陳湯癉瘧則用參蘇飲風瘧則用烏藥順氣散食瘧則用清脾飲食少則用養胃湯發於三陽宜養胃祛邪三陰宜調脾截補七情內傷善食汗多則用四獸飲久瘧則用升提陽分然後方行截補之藥清而不愈以七寶飲鱉甲烏梅丸斷瘧飲截愈之柴胡茯苓白朮各一錢陳皮半夏泡黃芩甘草乾葛蒼朮米泔浸炒川芎各五分以上三味發散外邪之藥久瘧去之上銼加生薑三片水煎服飲食不思加麥芽青皮山楂各五分陽分汗多加人參黃耆各七分去乾葛陰分加酒炒芍藥一錢歸身生地黃各八分或用升麻四分寒痰停飲加草果仁痰盛加貝母知母炒截瘧加青皮常山檳榔貝母各一錢久瘧邪微潮熱加四君四物去祛邪之藥治溫瘧方清脾飲治癉瘧脈來弦數但熱不寒或熱多寒少口苦咽熱小便赤澀柴胡一錢半黃芩一錢二分半夏洗七次茯苓白朮炒各一錢青皮厚朴薑製草果仁各七分甘草炙五分上㕮咀水二鍾加生薑三片煎八分空心溫服一方治獨熱煩渴者為癉瘧本方去草果加葛根倍柴胡黃芩小柴胡湯治瘧疾熱多寒少或但單熱頭疼口乾胸滿柴胡二兩黃芩半夏人參甘草各七錢半上作五服每加生薑三片棗一枚水煎溫服柴平湯治瘧疾熱多寒少者最效柴胡黃芩半夏人參蒼朮厚朴陳皮甘草上銼加生薑三片水煎服柴胡瓜蔞根湯治瘧疾往來寒熱煩渴引飲柴胡一兩七錢半天花粉一兩黃芩人參甘草炙各七錢半上銼每服一兩生薑五片棗一枚水煎服桂枝石膏湯治瘧疾隔日發先寒後熱熱多寒少桂枝五錢石膏知母各一兩半黃芩一兩上為粗末分三服水煎服間者邪氣所舍深也如外邪已罷內邪未已再下之從卯至午發者宜大柴胡湯下之從午至酉者知邪在內也宜大承氣湯下之從酉至子發者或至寅時發者知邪在血也宜桃仁承氣湯下之前項下藥微利為度以小柴胡湯徹其微邪之氣麻黃石膏湯治溫瘧先熱後寒者以其先有舊熱而後傷寒也此方主之麻黃去節四兩杏仁去皮尖五十枚甘草二兩石膏半斤上銼每服一兩煎服香薷湯治瘧發時獨熱無寒者名曰癉瘧當責之暑此方主之香薷二兩厚朴薑汁炒白扁豆茯神各一兩甘草炙半兩上銼每服一兩水煎服白虎加桂枝湯治瘧疾但熱不寒及有汗者知母六兩石膏一斤甘草炙二兩桂枝三兩梗米二合上銼每服五錢水煎溫服龍虎湯治熱瘧大盛舌卷焦黑鼻如煙色六脈洪弦而緊此乃陽毒之深先以青布摺疊數重新汲水漬之搭於胸上須臾再易如此三次熱勢稍退即服此藥石膏二錢半柴胡黃連各一錢半黃芩黃柏知母各一錢梔子八分半夏七分粳米五十粒上銼一劑加生薑棗煎服大柴胡湯治瘧疾熱多寒少目痛多汗脈大睡臥不安以此湯微利為度如下後餘邪未盡用白芷湯以盡其邪柴胡二錢黃芩半夏芍藥各一錢枳實七分大黃三錢人實者加至五六錢上銼作一服用水一鍾半加生薑三片棗一枚先煎前五味至七分次下大黃再煎五六沸迎病未發前一時服渣再煎服白芷湯白芷一兩知母一兩七錢石膏四兩上為粗末每服半兩水一盞煎服大承氣湯治瘧疾表裡俱熱心腹滿痛小便不利大便燥結或日晡潮熱心胃燥熱而懊憹脈數而沉實者大黃酒洗三錢厚朴薑製二錢枳實麩炒一錢芒硝二錢半上銼一服用水一鍾半先煮厚朴枳實二物至七分納大黃煎至五分去渣納芒硝煎一二沸迎病前一時服以利為度不利再服桃仁承氣湯治夜瘧有實熱者大黃三錢芒硝二錢甘草桂各一錢半桃仁去皮尖十五個上㕮咀作一服水一鍾半先煎桂甘草至大滾次下桃仁再煎至七分次下硝黃再煎至一二沸迎病未發前一時服得微利止治寒瘧方人參養胃湯治瘧疾寒多熱少者須先用此藥發散然後用四獸飲之類截之蒼朮厚朴薑汁炒半夏各一錢五分人參茯苓陳皮草果藿香各一錢甘草炙五分上銼加生薑三片烏梅一個水煎熱服柴胡薑桂湯治瘧疾寒多熱少或但寒而不熱者柴胡四錢桂枝黃芩天花粉各一錢乾薑泡牡蠣煅淬甘草炙各一錢上銼水煎溫服柴胡加桂湯治瘧先寒後熱兼治支結柴胡八錢黃芩半夏人參甘草炙肉桂各二錢上㕮咀每服五錢加生薑七片棗二枚水煎服若渴者去半夏加人參瓜蔞根草果飲治諸瘧通用草果白芷良薑青皮川芎紫蘇甘草炙各一錢上銼一服水煎食遠服定齋草果飲子快脾治瘧草果蒼朮米泔浸厚朴陳皮半夏曲烏梅去核甘草炙各等分上㕮咀每服半兩生薑五片棗二枚水煎不拘時服寒多者加乾薑附子熱多者加柴胡瘴瘧加檳榔白朮散治風寒入留經絡與衛氣相併日發瘧疾寒熱交作麻黃白朮茯苓桂心各一錢陳皮青皮桔梗白芷半夏紫蘇烏梅肉甘草炙各八分乾薑五分上作一服加生薑三片棗二枚水煎食遠服局方雙解飲子治瘧疾闢瘴氣神效東垣云秋暮暑氣衰病熱瘧知其寒也局方雙解飲子是已知此方治寒瘧也肉豆蔻草豆蔻各二個一個用麵裹煨一個生用厚朴二寸一半用生薑汁浸炙一半生用甘草大者二兩一半炙一半生用生薑兩塊如棗大一塊濕紙裹煨一塊生用上㕮咀每服分一半用水一碗煎一大盞去渣空心溫服棗附湯治五臟氣虛發瘧不問寒熱先後及獨作疊作間作並治一方治瘧但寒不熱者棗子七枚生薑七片附子半枚用鹽水浸泡七次去皮臍上銼水煎當發日早溫服果附湯治脾寒瘧疾不愈振寒少