body:
  text: 卷五十三不眠論黃帝曰病而不得眠者何氣使然岐伯曰衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑矣衛氣晝行於陽夜行於陰行陽則寤行陰則寐此其常也若病而失常則或留於陰或留於陽留則陰陽有所偏勝有偏勝則有偏虛而寤寐亦失常矣黃帝曰人之多臥者何氣使然此下言有不因於病而為多臥少臥之異者也岐伯曰此人腸胃大而皮膚濕而分肉不解焉解利也人之臟腑在內內者陰也皮膚分肉在外外者陽也腸胃大則衛氣留久皮膚濕則分肉不解其行遲腸胃大則陰道迂遠肉理濕滯不利則陽道舒遲夫衛氣者晝日常行於陽夜行於陰故陽氣盡則寐陰氣盡則寤故腸胃大則衛氣行留久皮膚濕肉分不解則行遲留於陰也久衛氣留於陰分者久行於陽分者少其氣不精則欲瞑故多臥矣陽氣不精所以多瞑臥也今人有飽食之後即欲瞑者正以水穀之悍氣暴實於中則衛氣盛於陰分而精陽之氣有不能盛之耳世俗但呼為脾倦而不知其有由然也其腸胃小皮膚滑以緩分肉解利衛氣之留於陽也久故多瞑焉黃帝曰其非常經也卒然多臥者何氣使然非常經者言其變也蓋以明邪氣之所致然者岐伯曰邪氣留於上焦上焦閉而不通已食若飲湯衛氣留久於陰而不行故卒然多臥焉邪氣居於上焦而加之食飲則衛氣留閉於中不能外達陽分故猝然多臥然有因病而不能瞑者蓋以邪客於臟則格拒衛氣不得內歸陰分耳海藏曰膽虛不眠寒也酸棗仁去油竹葉湯調服膽實多睡熱也酸棗仁生用末茶薑汁調服一字蔭按葉氏曰不寐有二種有病後虛弱及年高人陽衰而不寐有痰在膽經神不歸舍而不寐虛者四君子湯加酸棗仁黃耆痰者溫膽湯加南星酸棗仁亦有心血不足而然者宜益榮湯龔氏曰驚悸健忘怔忡失志不寐心風皆是膽涎沃心以致心氣不足若用涼劑太過則心火愈微痰涎愈盛而病益深宜理痰氣治方加味四君子湯治病後虛弱及陽衰不寐人參白朮茯苓甘草酸棗仁去油黃耆上銼水煎服以下酸棗仁油俱去淨酸棗湯治虛勞虛煩不得眠酸棗仁二升去油甘草一兩知母茯苓芎藭各二兩一方加生薑二兩上以水八升煮酸棗仁得六升內諸藥煮取三升分溫三服酸棗仁湯治多睡及不睡酸棗仁和皮微炒人參茯苓各等分上銼水煎服每服三錢如不要睡即熱服如要睡即冷服溫膽湯治大病後虛煩不得眠及膽經有痰者半夏七分竹茹枳實各三錢白茯苓甘草炙各二錢二分半陳皮四錢半上銼作二服加薑棗水煎服痰者加南星酸棗仁大病後虛煩者加人參茯神遠志鱉甲丸治膽虛不得眠四肢無力鱉甲酸棗仁羌活牛膝黃耆人參五味子各等分上為細末煉蜜丸如桐子大每服三四十丸溫酒下酸棗仁丸治膽氣實熱痰迷不睡神思不安驚悸怔忡茯神去木酸棗仁炒去油柏子仁炒另研遠志去心防風去蘆各一兩生地黃酒洗枳實各五錢青竹茹二錢半上為末煉蜜丸如桐子大每服七十丸不拘時熱水下高枕無憂散治心膽虛怯晝夜不睡百方不效服此一劑如神人參五錢軟石膏三錢陳皮半夏薑汁炒枳實白茯苓竹茹麥門冬龍眼肉甘草各一錢半酸棗仁炒一錢上銼水煎服牛黃六一散治煩不得眠滑石六兩甘草一兩牛黃上為末每服三錢水調服加味定志丸治勞心膽冷夜臥不睡遠志去骨石菖蒲各二兩人參茯神各三兩酸棗仁去殼炒柏子仁炒去殼各一兩上為末煉蜜丸如桐子大硃砂乳香為衣每服五十丸棗湯下益榮湯治血不足不寐及怔忡驚悸當歸黃耆遠志去心酸棗仁炒柏子仁茯神麥門冬去心白芍藥人參木香各七分紫石英各一錢甘草五分上銼加生薑三片棗二枚水煎食遠服安志膏治失血心神不安言語失常不得安睡等證辰砂另研酸棗仁炒人參白茯苓琥珀另研各五分滴乳香另研一錢上為末每服一錢煎棗湯空心調下半夏湯治膽腑實熱精神恍惚寒熱泄瀉或寢汗憎風善太息半夏縮砂各一錢五分生地酒炒二錢酸棗仁炒三錢黃芩遠志各一錢秫米一合上作一服長流水煎服治要茯苓散治心經實熱口乾煩渴眠臥不安或心神恍惚茯神麥門冬去心各一兩半通草升麻各一兩二錢半紫菀桂心各七錢半知母一兩赤石脂一兩七錢半大棗十二枚淡竹茹五錢上銼每服一兩水煎服一方治虛勞煩悶不得眠大棗十四枚蔥白七莖上以水三升煮取一升去柤頓服一方治虛勞不得眠酸棗榆葉各等分上為末蜜丸如桐子大每服十五丸日再為度
