body:
  text: 卷七瘟疫論瘟疫傷寒論曰春時應暖而復大寒夏時應熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也龐安常曰疫氣之發大則流行天下次則一方次則一鄉次則偏著一家悉由運氣鬱發有勝有伏遷正退位之所致也陶氏曰夫疫氣之中人輕重不一仲景無治法後人用敗毒散治甚得其理然亦有愈有不愈者蓋疫氣有淺深資稟有壯怯怯而受癘氣之深者治之為難壯實而所感又淺則庶幾可愈切不可作傷寒證治而大汗大下也但當從乎中治而用少陽陽明二經藥少陽小柴胡湯陽明升麻葛根湯看所中陰陽經絡脈法而以二方加減治之殊為切當活人云春應暖而清氣折之則實邪在肝升麻解肌湯主之夏應暑而寒氣折之則實邪在心調中湯射干湯半夏桂枝甘草湯選用之秋應涼而反大熱抑之則實邪在肺白虎加蒼朮湯茵陳汁調五苓散冬應寒而反大溫抑之則實邪在腎宜萎蕤湯指掌云疫癘者又非瘟病之比此皆寒熱不調四時不正之氣是以一方之內長幼率皆相似謂之天行時氣治法與傷寒不同又不可拘於日數仲景曰疫氣之行無以脈診蓋隨時以施治也以平為期不可過取四時之中土無正位分居四季當隨其經而取之丹溪曰眾人病一般者此天行時疫也治有三法宜補宜散宜降用大黃黃芩黃連人參桔梗蒼朮防風滑石香附人中黃為末神麯糊為丸每服五七十丸氣虛四君子湯血虛四物湯痰多二陳湯送下甚者加童便瘟疫惟有三因治法可用以其分內外因也當推歲運冬瘟為病非其時而有其氣也冬時嚴寒君心當閉藏而反泄於外而得之左手脈大於右手浮緩而盛按之無力宜補藥帶表龔氏曰冬應寒而反溫春發瘟疫敗毒散主之春應溫而反清涼夏發燥疫大柴胡湯主之夏應熱而反寒秋髮寒疫五積散主之秋應涼而反淫雨冬發濕疫五苓散主之人參敗毒散治四時瘟疫通用羌活沖和湯治瘟疫初感一二日間服之取汗其效速焉陶尚文治瘟疫法若病只在少陽經者小柴胡加防風羌活微發之而愈若病兼陽明經者小柴胡合升麻葛根湯服之若見太陽證便大便泄者以小柴胡去黃芩對五苓散尤當看脈寒熱若無寒去桂留芩若小便不利是膀胱本病加桂五苓散若入太陰經無熱證見者用理中湯此證必須腹痛而瀉明日瀉止痛止仍用小柴胡和之若入少陰經及厥陰經用陰陽傷寒傳經法治之若初看未端的且先以敗毒散治之看歸在何經再隨經施治無不效者若發黃小柴胡合去桂五苓散未退茯苓滲濕湯瘟疫作渴本方加石膏知母濕溫渴蒼朮白虎湯瘟疫發狂不識人大柴胡湯加當歸如大便泄者三黃石膏湯柴苓湯瘟疫胸膈滿悶本方加枳殼橘紅黃連若大便不通大柴胡湯微利之脈法脈陽濡弱陰弦緊更遇溫氣變為瘟疫瘟病二三日體熱腹滿頭痛食飲如故脈直而疾八日死瘟病四五日頭痛腹滿而吐脈來細而強十二日死瘟病八九日頭身不疼目不赤色不變而反利脈來牒牒按之不鼓手時大心下堅十七日死瘟病汗不出出不至足者死厥逆汗自出脈堅強急者生虛軟者死瘟病下利腹中痛甚者死治瘟疫方九味羌活湯又名羌活沖和湯治瘟疫初感一二日間憎寒壯熱頭疼身痛口渴服之取汗而愈其效如神羌活防風蒼朮各一錢半甘草川芎白芷生地黃黃芩各一錢細辛五分上加生薑三片蔥白三根水煎溫服食後取微汗為度如無汗啖稀熱粥助之此藥非獨治三時暴寒春可治溫夏可治熱秋可治濕治雜病亦有神效也六神通解散治時行三月後謂之晚發頭痛身熱惡寒脈洪數先服九味羌活湯不愈後服此藥麻黃五錢石膏滑石黃芩各二兩蒼朮四兩甘草一兩上每服一兩加生薑三片蔥白五寸豆豉五十粒水煎熱服取汗中病則已一方加川芎羌活細辛一方用防風一兩半去麻黃或云秋冬去防風加麻黃凡疫病初起之時用藿香正氣散煎一大鍋每人服一碗以防未然若已病者用九味羌活湯六神通解散皆有奇功劉草窗曰未病之人三五日一服乃卻疫捷法十神湯治時令不正瘟疫妄行感冒發熱或欲出疹此藥不問陰陽兩感風寒並皆治之麻黃去節升麻葛根赤芍藥川芎白芷紫蘇陳皮香附甘草炙各等分上㕮咀每服三錢水一盞半加生薑五片煎七分溫服不拘時如發熱頭痛加連翹蔥白中滿氣實加枳殼人參敗毒散治瘟疫四時通用人參茯苓羌活獨活川芎柴胡枳殼前胡桔梗各一錢甘草五分一方加黃芩上銼加生薑三片薄荷少許水煎服此藥治傷寒瘟疫風濕風眩四肢痛憎寒壯熱項強睛疼不問老人小兒皆可服或嶺南煙瘴之地或瘟疫時行或人多風痰或處卑濕之地腳氣痿弱者此藥不可缺也人中黃丸治疫毒大黃黃芩黃連人參桔梗蒼朮防風滑石香附人中黃各等分上為細末神麯糊為丸每服五七十丸氣虛煎四君子湯下血虛煎四物湯下痰多煎二陳湯下熱甚者加童便造人中黃法冬月以竹一段刮去青留底一節余節打通以大甘草納竹筒內以木塞其上竅以有節一頭插於糞缸中浸一月取出曬乾聽用名曰人中黃大治疫毒又方治瘟病亦治食積痰熱降陰火人中黃飯丸如綠豆大每服十五丸一方治時疫蒼朮白朮山楂川芎陳皮半夏茯苓甘草上銼水煎服如頭痛加酒芩口渴加乾葛身痛加羌活薄桂防風芍藥五瘟丹治四時瘟疫流行傷寒發熱並熱瘧熱病黃連屬火戊癸之年為君黃柏屬水丙辛之年為君黃芩屬金乙庚之年為君甘草屬土甲己之年為君山梔屬木丁壬之年為君香附紫蘇以上各一兩以值年藥為君者倍一兩上七味皆生用於冬至日置為末用錦紋大黃三兩濃煎湯去渣熬成膏和前藥為丸如彈子大硃砂雄黃末為衣再貼金箔每服一丸冷水磨服小柴胡湯治瘟疫內虛發熱胸脅痞悶及在半表半裡非汗非下之證此少陽經藥也柴胡三錢黃芩二錢人參半夏各一錢半甘草七分上加生薑三片棗一枚水煎食前服咳嗽加五味子煩渴加瓜蔞根脅下痞硬加枳實衄血加生地黃白茅花痰盛又喘加桑白皮烏梅升麻葛根湯治大人小兒時氣瘟疫頭痛發熱無汗惡寒及瘡疹發癍此陽明經藥也一云治冬瘟升麻葛根芍藥甘草各等分上㕮咀每服三錢水煎熱服熱甚者用元參去芍藥葛根名升麻湯清熱解肌湯治傷寒瘟疫天行頭痛壯熱葛根一兩黃芩芍藥甘草炙各半兩上㕮咀每服五錢水一盞半棗一枚煎七分溫服日三次如三四日不解脈浮者宜重服發汗脈沉實宜下之柴胡升麻湯治時行瘟疫壯熱惡風頭疼體重鼻塞咽乾痰盛咳嗽涕唾稠黏柴胡去蘆前胡去蘆乾葛赤芍藥石膏炒各一兩荊芥一兩半升麻半兩黃芩桑白皮各六錢半上㕮咀每服五錢水一盞加生薑三片豉十餘粒同煎熱服香葛湯治四時感冒不正之氣頭痛身疼項強寒熱嘔惡痰嗽腹痛泄瀉不問陰陽兩感風寒溫瘴並宜服之升麻葛根芍藥紫蘇香附陳皮去白蒼朮制薄荷各一兩川芎白芷甘草各半兩上㕮咀每服五錢水一盞半生薑三片煎熱服不拘時萎蕤湯治風瘟憎寒壯熱頭疼身痛口渴面腫者此方主之萎蕤二錢半麻黃白薇青木香羌活杏仁川芎甘草各五分石膏甘菊各一錢半上作一服水煎服大青龍加黃芩湯治寒疫頭疼身熱無汗惡風煩躁者此方主之麻黃去節六兩桂枝洗淨甘草各二兩杏仁去皮尖四十枚黃芩七錢生薑三兩石膏如雞子大大棗十二枚上每服五錢水煎溫服取汗白虎加蒼朮湯治濕瘟憎寒壯熱口渴一身盡痛脈沉細者此方主之石膏一斤知母六兩蒼朮制甘草各二兩粳米六合上共分作四服水煎服蔭按若濕毒藏於肌膚更遇於瘟名曰濕瘟濕為陰邪故憎寒瘟為陽邪故壯熱瘟熱入里故口渴濕流百節故一身盡痛濕為陰故脈沉細石膏知母甘草粳米白虎湯也所以解溫熱加蒼朮者取其辛燥能治濕也竹葉石膏場治傷寒時氣表裡俱虛遍身發熱心胸煩悶得汗已解內無津液少氣欲吐石膏一兩麥門冬去心五錢半半夏湯泡二錢半人參甘草炙各二錢上㕮咀每服五錢水一鍾入青竹葉生薑各五片煎至半鍾去渣入粳米百餘粒再煎米熟去米溫服不拘時一云竹葉十片黃連解毒湯治時疫三日已汗解或因飲酒復劇苦煩悶乾嘔口燥呻吟錯語不睡黃連三錢黃芩黃柏梔子各二錢上水煎去渣溫服如腹滿嘔吐或欲作利者每服加半夏三枚生用厚朴茯苓各二錢生薑三片三黃石膏湯治瘟毒表裡俱盛五心煩熱兩目如火鼻乾面赤大渴舌燥者此方主之石膏三錢黃芩黃連黃柏各一錢半麻黃去節梔子各一錢淡豆豉半合上銼作一服水煎連進三五劑愈漏蘆湯治疫癘積熱時生疙瘩頭面洪腫咽嗌填塞及一切危惡疫癘漏蘆升麻大黃黃芩藍葉元參各等分上㕮咀每服二錢水煎服腫熱甚加芒硝二錢消毒丸治疫毒內郁時成疙瘩大黃酒浸牡蠣炙殭蠶炒各等分上為末煉蜜丸如彈子大新水化一丸加桔梗大力子尤妙黃連橘皮湯治瘟毒發癍黃連四兩陳皮枳實杏仁去皮尖麻黃湯泡去節葛根各二兩厚朴薑汁炙甘草各一兩上銼每服五錢水煎溫服黑奴丸治瘟毒發癍煩躁大渴倍常時行熱病六七日未得汗脈洪大或數面赤目脹身痛大熱狂言欲走渴甚又五六日以上不解熱在胸中口噤不能言為壞傷寒醫所不治棄為死人精魄已竭心下尚溫斡開其口灌藥下咽即活黃芩釜底煤芒硝麻黃灶突墨梁上塵小麥奴各一兩大黃一兩三錢上為細末煉蜜為丸如彈子大新汲水化服一丸飲水盡足當發寒寒已汗出乃瘥若時頃不汗再服一丸須見微利若不大渴不可與此藥沃漬法治瘟熱內外皆實喜飲水入水者取新汲井水一大缸使病人坐其水中復以大杓盛水自項沃之水熱則病減矣病人喜飲冷亦聽其大啜毋得阻也行此法者易曰水盛則火滅經曰行水漬之和其中外可使畢已此之謂也甘桔湯治冬溫咽喉腫痛甘草桔梗各等分上細切水煎時時頻呷丹溪方解一切災病用粉草五兩細切微炒量病人吃得多少酒取無灰酒一處研去渣溫服須臾大瀉毒亦隨出雖十分渴亦不可飲水飲水難救老君神明散治瘟疫白朮一錢桔梗一錢細辛附子炮去黑皮各一兩烏頭四兩炮去皮尖上五味為粗末縫絹袋盛帶之居閭里皆無病若有疫癘者溫酒服方寸匕覆取汗得吐則瘥若經三四日抄三四匕以水一碗煮令大沸分三服聖散子時毒流行一切不問陰陽之感連服取瘥不可與傷寒比也若疾疫之行平旦輒煮一釜不問老幼良賤各服一大盞即時氣不入蘇內翰序全文見活人書蒼朮白朮麻黃防風獨活藁本細辛柴胡半夏茯苓枳殼麩炒厚朴薑製藿香甘草芍藥石菖蒲豬苓澤瀉吳茱萸湯泡良薑附子炮去皮脂各半錢草豆蔻十個麵裹煨去皮上㕮咀每服五錢水一盞半煮取八分熱服余渣再煎空心服上二方治疫雖不分陰陽然亦寒多表多者宜之若熱毒內盛者忌用避瘟方宣聖避瘟方臘月二十四日五更取井花水平旦第一汲盛淨器中浸乳香至歲旦五更暖令溫從小至大每人以乳香一小塊飲水三呷嚥下則一年不患時疫潔古雄黃丸避時疫可與病人同床傳著衣服亦不相染雄黃一兩研赤小豆炒丹參鬼箭羽各二兩上為細末煉蜜丸如桐子大每日空心以溫水下五丸冷飲子能避瘟疫時災兼補下元茴香夏用根冬用子遠志去心萆薢蓯蓉各三分附子炮兩個桑螵蛸炙二十枚上共為細末分作二帖每帖大羊腎一具去脂膜用水一碗半煎露一宿空心冷服每季吃四帖屠蘇酒此華佗方也元旦飲之避疫癘一切不正之氣赤朮桂心各七錢半防風一兩大黃桔梗蜀椒各五錢七分菝葜五錢烏頭二錢半赤小豆十四枚上㕮咀以三角縫袋盛之以十二月除夜懸井底至泥元旦日取出置酒中煎數沸舉家東向從少至長序飲之藥渣還投井中歲飲此水一世無病一方無防風赤小豆二味赤朮作白朮神聖避瘟丹蒼朮倍用羌活獨活白芷香附大黃甘松三柰赤箭雄黃各等分上為末麵糊為丸如彈子大黃丹為衣曬乾正月初一日侵晨焚一炷避瘟避瘟丹虎頭骨二兩硃砂雄黃鬼臼蕪荑鬼箭藜蘆上為末煉蜜丸如彈子大囊盛一丸男左女右繫於背上或當病者戶內燒之一切鬼邪不敢進兼治婦人與鬼魅交通吾成子螢火丸主避疫疾惡氣百鬼虎狼蛇虺蜂蠆諸毒五兵白刃盜賊凶害皆避之螢火鬼箭羽去皮蒺藜各一兩雄黃雌黃各二兩礬石一兩燒汁盡羚羊皮煅灶灰鐵錘柄入煅處燒一分半上九味搗為散以雞子黃並雄雞冠一具和之如杏仁大作三角縫囊盛五丸帶左臂上仍可掛於戶上太倉公避瘟丹凡官舍久無人到積濕容易侵入預製此燒之可遠此害極宜於暑月燒之以除瘟疫並散邪氣茅朮一斤臺烏白朮黃連羌活各半斤川烏草烏細辛紫草防風獨活藁本白芷香附當歸荊芥天麻官桂甘松三奈乾薑麻黃芍藥牙皂甘草各四兩麝香三分上為末棗肉丸如彈子大每一丸燒之一方凡入瘟疫之家以麻油塗鼻孔中然後入病家則不相傳既出以紙捻探鼻深入令噴嚏為佳一方用雄黃末水調塗鼻孔中雖與病人同臥亦不相染一方以雄黃蒼朮為細末香油調敷鼻內則邪氣不入一方預飲雄黃燒灑一二盞然後入病家則不相傳染
