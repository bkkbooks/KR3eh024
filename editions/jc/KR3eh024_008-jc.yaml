body:
  text: 卷八大頭瘟論綱目云運氣大頭病皆屬火蓋經所謂上腫者即其屬也經云少陽司天之政寅申之歲風熱參布太陰橫流寒乃時至此皆木火之化火盛則寒水來復民病上怫音佛心郁不舒也腫色變又云少陰司天之政子午之歲熱病生於上清病生於下少陰司天陽明在泉上火下金故熱病生於上清病生於下民病嗌乾腫上終之氣燥令行餘火內格腫於上咳喘燥金之客加於寒水之主金氣收故五氣之餘火內格而為病如此格拒也其治方東垣普濟消毒飲子得之矣丹溪曰大頭天行病乃濕氣在高巔之上用羌活黃芩酒炒大黃酒蒸隨病加減不可用降藥東垣曰夫大頭病者雖為在身在上熱邪伏於已又感天地四時非節瘟疫之氣所著所以成此疾至於潰裂膿出而又染他人所以謂之疫癘也大抵足陽明邪熱太甚資實少陽相火為之熾多在少陽或在陽明甚則逆傳太陽視其腫勢在何部分隨其經而取之濕熱為腫木盛為痛此邪發於首多在兩耳前後所先見出者為主為根治之宜早藥不宜速恐過其病上熱未除中寒已作有傷人命矣此疾是自內而之外也是為血病況頭部受邪現見於無形之處至高之分當先緩而後急先緩者謂邪氣在上所著無形之分既著無形所傳無定若用重劑大瀉之則其邪不去反過其病矣雖用緩藥若急服之或食前或頓服咸失緩之體則藥不能騰昇徐潰無形之邪或藥性味形狀擬象服餌皆須不離緩體及寒藥或炒或酒浸之類是也後急者謂前緩劑已經高分瀉邪氣入於中是到陰部入於中染於內之有形質之所若不速去反損陰分此中治卻為客熱所當急也治客以急此之謂也治主以緩先緩謂也謂陽邪在上陰邪在下各為本家病不從先後錯其緩急不惟不能解其紛而復致其亂矣此所以治主當緩治客當急謂陽分受陽邪陰分受陰邪者主也陽分受陰邪陰分受陽邪者客也凡所謂急者當急去之此治客以急也假令少陽陽明之為病少陽者謂邪出於耳前後也陽明者首面大腫也先以黃芩黃連甘草通炒銼煎少少不住服呷之或一劑畢再用大黃或酒浸或煨又以鼠黏子新瓦上炒㕮咀煎成去渣納芒硝各等分亦時時呷之當食後用徐得微利並邪氣已只服前藥如不已再服後藥依前次第用之取大便利邪已即止如陽明行經加升麻葛根芍藥之類太陽行經加羌活防風荊芥之類選而加之並與上藥相合用之不可獨用也齊氏曰時毒者為四時邪毒之氣而感之於人也其候發於鼻面耳項咽喉赤腫無頭或結核有根令人憎寒發熱頭痛或肢體痛甚者恍惚不安咽喉閉塞人不識者將為傷寒便服解藥一二日腫氣增益方悟始求瘡醫原夫此疾古無方論世俗通為丹瘤病家惡言時毒切恐傳染考之於經曰人身忽經變赤狀如塗丹謂之丹毒此風熱惡毒所為與夫時毒特不同耳蓋時毒初狀如傷寒五七日間乃能殺人治者宜精辨之先診其脈滑數浮洪沉緊弦澀皆其候也蓋浮數者邪氣在表也沉澀者邪氣深也氣實之人急服化毒丹以攻之熱實不利大黃湯下之其有表證者解毒升麻湯以發之或年高氣軟者五香連翹湯主之又於鼻內嗅通氣散取十餘嚏作效若嗅藥不嚏者不可治如嚏出膿血者治之必愈左右看病之人每日用嗅藥嚏之必不傳染其病人每日用嚏藥三五次以泄熱毒此治時毒之良法也經三四日不解者不可大下猶宜和解之服犀角連翹散之類至七八日大小便通利頭目腫起高赤者可服托裡散黃耆散宜針鐮砭割出血泄其毒氣十日外不治自愈也此病若五日以前精神昏亂咽喉閉塞語聲不出頭面不腫食不知味者必死之候治之無功矣然而此病有陰有陽有可汗有可下嘗見粗工但云熱毒就用寒藥殊不知病有微甚治有從逆不可不審也李氏曰大頭腫痛又名雷頭風時行毒濕在高巔之上故頭面痛腫疙瘩甚則咽嗌堵塞害人最速冬過後多病此證似傷寒寒熱身痛治法分表裡三陽連兩目鼻面腫者陽明也發耳前後並頭角者少陽也腦後項下腫起者太陽也脈浮表證多者清震湯或敗毒散加荊防脈沉里證見者宜羌活黃芩俱酒炒大黃酒蒸為主陽明加乾葛升麻芍藥石膏少陽加瓜蔞子牛蒡子太陽加荊芥防風水煎時時呷之取大便邪氣去則止甚者加芒硝或防風通聖散加牛蒡子元參俱用酒炒微微下之咽喉腫痛者用殭蠶一兩大黃二兩蜜丸如彈井水化服凶荒勞役宜普濟消毒飲以安裡虛者加參歸便秘加大黃或人中黃丸亦妙服後俱仰臥使藥氣上行故非便秘熱盛忌用降下之藥若表裡俱解腫不消者用磁鋒砭去血外用通關散倍加躑躅及藜蘆少許搐鼻嚏以泄其毒久不愈欲作膿者內服托裡消毒散體倦食少惡寒者補中益氣湯加桔梗潰後腫赤不消膿清色白者六君子湯加桔梗芎歸元氣素弱脈微者用參朮芎歸陳皮柴胡升麻甘草各等分以升舉陽氣用牛蒡子元參連翹桔梗減半以解熱毒腫赤便屬純陽脈微便屬純陰慎之薛氏曰時毒謂毒發於面鼻耳項也裡實而不利者下之表實而不解者散之表裡俱實而不解者解表攻裡表裡俱解而不消者和之腫甚焮痛者砭去惡血更用消毒之劑不作膿或不潰者托之饑年普患者不宜用峻利當審而治之一男子頭面腫痛服硝黃敗毒之劑愈甚診之脈浮數邪在表尚未解用荊防敗毒散二劑勢退大半更以葛根牛蒡子湯四劑而痊內經云身半以上腫天之氣也身半以下腫地之氣也乃邪客心肺之間上攻頭目而為腫此感四時不正之氣為患與夫膏粱積熱之證不同硝黃之劑非大便秘實不可用若不審其因不辨其虛實表裡概用攻之必致有誤常見饑饉之際芻蕘之人多患之乃是胃氣有損邪氣從之為患不可不察一男子服表散藥愈熾發熱便秘診其脈沉實此邪在裡也以大黃湯下之里證悉退以葛根牛蒡子湯浮腫亦消惟赤腫尚存更以托裡藥潰之而愈一老人冬月頭面耳項俱腫痛甚便秘脈實此表裡俱實病也飲防風通聖散不應遂砭患處出黑血仍投前藥即應又以荊防敗毒散而瘳蓋前藥不應者毒血凝聚上部經絡藥力難達故也惡血既去其藥自效或拘用寒遠寒遠避忌之謂用寒者無犯司氣之寒然攻裡則不遠寒及年高畏用硝黃而用托裡與夫尋常消毒之劑或不砭泄其毒鮮不危矣予嘗治邪在外者用葛根牛蒡子湯人參敗毒散或普濟消毒飲子邪在裡者五利大黃湯梔子仁湯表裡俱不解者防風通聖散表裡俱解而腫不退者犀角升麻湯如腫甚者砭患處出惡血以泄其毒或用通關散取嚏以泄其毒十日外自愈若嚏出膿血即愈欲其作膿者用托裡消毒散欲其收斂者用托裡散此法最為穩當五七日咽喉腫閉言語不出頭面不腫食不知味者不治丹溪曰蛤蟆瘟屬風熱解毒丸下之或防風通聖散加減用之或用小柴胡加防風羌活荊芥薄荷桔梗煎服外以側柏葉自然汁調蚯蚓糞敷之或用丁香尖附子尖南星末醋調敷之或五葉藤汁或車前草汁皆可敷脈法時毒天行其脈滑數浮洪沉緊弦澀皆其候也蓋浮數者邪氣在表也沉澀者邪氣深也治大頭瘟方二黃湯治天行大頭疫瘟黃芩酒炒黃連酒炒生甘草各二兩上銼每服三錢水煎溫服徐徐細呷之如未退再加鼠黏子酒蒸大黃煎入芒硝亦細細頻與服之微利為度腫減後去後三味只服前藥取邪氣已則止前藥各宜加引經藥陽明渴加石膏少陽渴加瓜蔞根陽明行經加升麻葛根芍藥甘草太陽行經加羌活荊芥防風或云頭痛加酒芩口乾加乾葛身痛加羌活桂枝防風芍藥東垣方治大頭天行病羌活黃芩酒炒大黃酒蒸上加減水煎服普濟消毒飲子泰和二年四月民多疫癘初覺憎寒壯熱體重次傳頭面腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭傷寒諸藥雜治終莫能愈漸至危篤東垣曰身半以上天之氣也邪熱客於心肺之間上攻頭目而為腫耳須用下項藥共為細末半用湯調時時服之半用蜜丸噙化服盡良愈活者甚眾時人皆曰天方遂刻諸石以傳永久黃芩酒炒黃連酒炒各五錢人參三錢陳皮去白甘草元參各二錢連翹板藍根馬勃鼠黏子各一錢白殭蠶炒升麻各七分柴胡二分桔梗三分上為末服如上法或加防風川芎薄荷當歸身細切五錢水煎時時稍熱服之如大便秘加酒蒸大黃一錢或二錢以利之牛蒡芩連湯治積熱在上頭頂腫起或面腫多從耳根上起俗名大頭瘟並治煙瘴黃芩酒炒二錢半黃連桔梗石膏各一錢半連翹牛蒡子炒研元參甘草各一錢荊芥防風羌活大黃各三分上銼一劑加生薑一片水煎食後細細呷溫服每一盞做二十次服常令藥在上勿令飲食在後也荊防敗毒散治時毒腫痛發熱左手脈浮數人參茯苓甘草桔梗川芎枳殼柴胡前胡羌活獨活防風荊芥各等分上銼每服七八錢加生薑薄荷水煎服葛根牛蒡子湯治時毒腫痛脈數而少力者葛根牛蒡子半生半炒杵碎貫眾甘草江西豆豉各二錢上銼一劑水一鍾半煎八分食後服五利大黃湯治時毒頭面焮腫赤痛煩渴便秘脈實數大黃煨黃芩升麻各二錢梔子芒硝各一錢二分上作一劑水一鍾半煎六分空心熱服梔子仁湯治時毒頭面腫痛大便秘結脈沉數山梔仁炒牛蒡子炒升麻枳殼麩炒去穰鬱金大黃煨各等分上為細末每服三錢蜜水調下治大頭病兼治喉痹歌人間治疫有仙方一兩殭蠶二大黃薑汁為丸如彈子井花調蜜便清涼內府仙方治腫項大頭病蝦蟆瘟病殭蠶二兩薑黃二錢半蟬退六錢半大黃四兩上為細末薑汁打糊為丸重一錢一枚大人服一丸小兒半丸蜜水調服立愈人黃散治四時疫癘大頭天行等病糞缸岸置風露中年遠者佳水飛研細一兩甘草三錢雄黃辰砂各一錢半上為細末每服二錢煎薄荷桔梗湯調下日三五服煎藥用甘草桔梗茯苓藁本白朮各半錢水煎服二聖救苦丸治傷寒瘟疫不論傳經過經可服大黃四兩酒拌蒸曬乾牙皂二兩上共為末水打稀糊為丸如綠豆大每服五七十丸冷綠豆湯下以汗為度龔氏曰萬曆丙戌春余客大梁屬瘟疫大作其證間巷相染甚至滅門其證頭疼身痛憎寒壯熱頭面頸項赤腫咽喉腫痛昏憒等證此乃冬應寒而反熱人受不正之氣至春發為瘟疫至春發為熱病名曰大頭瘟大熱之證也余用此方以牙皂開關竅而發其表以大黃瀉諸火而通其里一服即汗一汗即愈真仙方也但稟氣稍壯者百發百中虛弱者先以人參敗毒散輕者即愈如未愈用牛蒡芩連湯可收全效一方治疫毒頭腫甘草桔梗鼠黏子大黃芒硝上水煎頻頻細呷之黑白散治大頭病如神烏黑蛇白花蛇各去頭尾酒浸雄黃二錢大黃煨半兩上為極細末每服一二錢白湯調下不拘時五香麻黃湯凡傷寒熱病後忽發浮腫或著頭面或著唇口頸項或著胸背或著四肢或偏著兩足不痛不赤者此方主之麻黃去節防風去蘆獨活去土秦艽去蘆萎蕤枳實麩炒白薇甘草沉香青木香各二錢熏陸香雞舌香各一錢麝香五分上為末水調服通氣散治大頭病焮腫咽喉不利取嚏以泄其毒元胡索一錢五分川芎一錢藜蘆五分豬牙皂角一錢羊躑躅花二分半上為細末用紙捻蘸少許紝於鼻內取嚏為效托裡消毒散治時毒表裡俱解腫尚不退欲其作膿人參黃耆鹽水拌炒當歸酒拌川芎芍藥白朮茯苓各一錢白芷金銀花各七分甘草五分上作一劑用水二鍾煎八分食後服一方治大頭瘟病腫臉頸項者用福建靛花本草綱目藍質浮水面者為靛花三錢燒酒一鍾雞子清一個入內打勻吃下不時而愈腫即消神方也一方治大頭風用大黃芒硝為末以井底泥調塗之此方若在表者忌之在裡者宜之治蝦蟆瘟方防風通聖散蝦蟆瘟屬風熱此方加減用之防風川芎當歸芍藥大黃芒硝連翹薄荷麻黃各五錢桔梗石膏黃芩各一兩荊芥穗白朮山梔各二兩半滑石三兩甘草二兩上銼每服一兩加生薑三片水煎服加味小柴胡湯柴胡黃芩人參半夏甘草防風羌活荊芥薄荷上銼水煎服
