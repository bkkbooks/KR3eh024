皮甘草炙各等分上㕮咀每服四錢加生薑五片水煎溫服婦人腳氣加當歸半兩室女腳痛加赤芍藥一兩半如大便虛秘加枳殼熱者加大黃烏藥平氣湯治腳氣上攻頭目昏眩腳膝痠疼行步艱苦諸氣不和喘滿迫促並皆治之茯神去木甘草炙白芷當歸白朮川芎五味子紫蘇子乾木瓜人參烏藥各等分上㕮咀每服四錢加生薑五片棗二枚水煎溫服大腹皮散治諸證腳氣腫痛小便不利檳榔荊芥穗烏藥陳皮紫蘇葉各一兩蘿蔔子炒半兩沉香不見火桑白皮炙枳殼麩炒各一兩半大腹皮三兩干宣木瓜去穰二兩半紫蘇子一兩上㕮咀每服四錢加生薑五片水煎服不拘時木瓜散治腳氣大腹皮一個木香紫蘇乾木瓜甘草炙羌活各二錢半一方加陳皮茯苓各二錢半上㕮咀分作三服每服水二鍾煎至一鍾通口服一方治腳氣入腹衝心疼痛腫滿大小便秘沉香木香白芍藥羌活真蘇子檳榔各五錢甘草青皮撫芎木瓜各二錢半枳殼二錢上㕮咀每服四錢加生薑三片水煎服茱萸丸治腳氣入腹腹內不仁喘急欲死吳茱萸湯洗淨木瓜去穰切片日曬乾各等分上為末酒糊丸如桐子大每服五十丸至百丸酒飲任下或以木瓜另蒸爛研膏為丸尤妙雞鳴散治腳氣第一品藥不問男女皆可服如人感風濕流注腳痛不可忍如索懸吊叫聲不絕筋脈腫大桔梗半兩吳茱萸二錢紫蘇莖葉三錢上為粗末分作八服每服隔宿用水三大碗慢火煎至半碗去渣再用水二碗煎渣取一小碗兩次煎汁相和安頓床頭次日五更分二三服冷服冬月略溫亦得服了用餅餌壓下至天明大便當下一碗許黑糞水即是原腎家感寒濕毒氣也至早晚前後痛住腫消但只是放遲遲吃物候藥力過此藥不是宣藥並無所忌松節湯治腳氣入腹心腹脹急煩躁腫痛松節炒黃桑白皮蘇葉各一兩檳榔三分甘草五錢上銼每服三錢入燈心草二十根生薑三片水一鍾童便三分煎服杉節湯杉木節四兩檳榔七枚大腹皮一兩青橘葉四十九片上銼一服水煎分三服一日飲盡如大便通利黃水未愈過數日再進一服病根去為度外用杉節橘葉煎湯洗之神效柳子厚救死方無大腹皮用童便三升煮取一升半分二服得快利停後服柳云元和十二年二月得乾腳氣夜成痞絕左脅有塊大如石且死因大寒不知人三日家人號哭滎陽鄭洵美傳杉木湯服半食頃大下三次氣通塊散病蓋死矣會有救者因得不死恐人不幸有類予病故以方傳焉升陽順氣湯治脾氣虛弱胃氣下注令人足跗氣腫者此方主之升麻柴胡草豆蔻陳皮去白當歸各一錢黃耆四分甘草柏皮各五分半夏人參各三分神麯一錢半上銼一服水煎服治腳氣理血方獨活寄生湯治腎氣虛弱為風濕所乘流注腰膝或攣拳掣痛不得屈伸或緩弱冷痹行步無力獨活三兩桑寄生如無以續斷代之細辛牛膝秦艽茯苓白芍藥桂心川芎防風人參熟地當歸杜仲炒甘草炙二兩上銼每服三錢水煎空心服下利者去大黃血滯於下委中穴刺出血妙仍灸腎俞崑崙尤佳神應養真丹治足厥陰經為四氣進襲左癱右瘓痰涎壅盛半身不遂手足頑麻語言蹇澀腳膝無力榮氣凝滯偏身疼痛並治婦人腳氣尤妙當歸川芎白芍藥熟地砂仁炒羌活天麻各一兩上為末煉蜜丸如雞子大每服一丸木瓜菟絲子浸湯下或加木瓜防己金匱八味丸治足少陰經腳氣入腹腹脹疼痛上氣喘急腎經虛寒所致也此證最急以腎乘心水剋火死不旋踵熟地黃八兩砂仁炒澤瀉牡丹皮各三兩山茱萸肉山藥各四兩附子炮桂心各一兩上為末煉蜜丸如桐子大每服五十丸溫酒或淡鹽湯送下婦人淡醋湯下治腳氣屬虛寒方四筋丸治腎經虛寒下攻腰腳筋脈拘攣掣痛不已履地艱辛腳心隱痛一應風寒濕痹腳氣緩弱並宜服之宣州木瓜去穰天麻肉蓯蓉洗淨各一斤焙附子炮去皮臍二兩虎骨酥炙二兩牛膝一斤焙同木瓜天麻蓯蓉四味用無灰酒浸春秋各五日夏三日冬十日上為細末用浸藥酒打糊丸如桐子大每服五十丸空心煎木瓜酒鹽湯任下常服補虛除濕大壯筋骨加味四筋丸治肝腎俱虛精血不足足膝痠疼步履不隨如受風寒濕氣以致腳痛者最宜服之虎脛骨酥炙天麻肉蓯蓉酒浸焙川烏炮去皮各一兩宣木瓜一個去穰蒸川牛膝酒浸一兩半沒藥另研乳香另研各半兩上為末入木瓜膏和酒糊搗為丸如梧桐子大每服七十丸空心溫酒鹽湯任下木瓜丸治腎經虛弱下攻腰膝筋脈拘攣腫滿疼痛行步艱難舉動喘促面色黧黑大小便秘澀熟地黃砂仁炒陳皮去白烏藥各四兩黑牽牛炒三兩杏仁去皮尖牛膝酒浸石楠藤葉當歸酒浸蓯蓉酒浸續斷乾木瓜赤芍藥各一兩上為末酒煮麵糊丸如桐子大每服五十丸空心溫酒下木瓜牛膝丸治寒濕四氣下注腰腳緩弱無力腫急疼痛木瓜大者三四個切開蓋去穰先用糯米漿過鹽焙乾為末卻將鹽末入瓜內令滿仍用蓋釘定蒸二次爛研為膏川烏大者去皮尖用無灰酒一升浸薄切以酒煮乾細研為膏青皮青鹽另研羌活萆薢一方無茴香焙牛膝酒浸狗脊炒去皮毛巴戟海桐皮各一兩上為末入青鹽拌勻將前二膏搜和如硬再入酒杵數於下丸如桐子大每服五十丸空心溫酒鹽湯任下神烏丸治遠年近日乾溼腳氣川烏炮去皮臍炒令變色虎脛骨酥灸海桐皮川萆薢各二兩川牛膝酒浸肉蓯蓉酒浸各一兩半金毛狗脊燎去皮毛半兩上為末用木瓜膏為丸如桐子大每服七十丸空心溫酒下思仙續斷丸治肝腎風虛下注腳膝痛引腰脊一切風毒流注並皆治之思仙術即杜仲炒斷絲生地黃各五兩萆薢四兩防風去蘆薏苡仁五加皮牛膝酒浸川續斷羌活各三兩上為末用酒三升化鹽三兩木瓜半斤去皮子以鹽酒煮成膏杵丸如桐子大每服七十丸空心溫酒鹽湯任下地仙丹治腎氣虛憊風濕流注膝腳痠疼步履無力精神耗散兼治五勞七傷吐血腸風痔漏一切風氣婦人無子等證川椒附子肉蓯蓉各四兩菟絲子覆盆子白附子羌活防風烏藥赤小豆骨碎補萆薢南星牛膝何首烏各二兩白朮茯苓川烏甘草金毛狗脊各一兩人參一兩半地龍木鱉子各三兩黃耆二兩半上為末酒糊丸如桐子大每服四十丸空心溫酒下十全丹治腳氣上攻心腹足心隱痛小腹不仁關節攣痹疼痛無時煩渴引飲大小便或秘或利石斛酒浸狗脊燎去毛萆薢肉蓯蓉牛膝酒浸地仙子茯苓遠志去心各一兩熟地砂仁炒杜仲去皮炒各二兩上為末煉蜜丸如桐子大每服五十丸溫酒鹽湯任下薏苡仁酒治腳痹薏苡仁牛膝各二兩海桐皮五加皮獨活防風杜仲各一兩熟地黃一兩半白朮半兩上銼為粗末散入生絹袋內用好酒五升浸春秋冬二七日夏月盛熱分作數帖逐帖浸酒每日空心溫服一盞或半盞日三四服常令酒氣醺醺不絕久服覺皮膚內如數百條蟲行即風濕氣散虎骨酒去風補血益氣壯筋骨強腳力虎脛骨真者萆薢仙靈脾薏苡仁牛膝熟地黃各二兩上細銼絹袋盛浸酒二斗飲了一盞添入一盞可得百日婦人去牛膝外治方東垣導氣除濕湯活人書曰凡腳氣服補藥及用湯渫洗皆醫之大禁也為南方外感濕氣乘虛襲人為腫痛而言非為北方內受濕氣注下腫痛而言也蓋濕氣不能外達宜淋渫開導泄越其邪此方洗之婁氏曰南方忌洗北方宜洗威靈仙防風荊芥穗當歸地骨皮升麻白芍藥蒴藋葉各等分上銼細用水二斗煮取一斗去渣熱淋洗無時外應散治腳氣用此熏蒸淋洗石楠葉矮橦葉杉片藿香紫金皮藁本獨活大蓼白芷紫蘇羌活上銼碎加大椒五六十粒蔥一握用水二斗煎七分置盆內令病者以足加其上用厚衣蓋覆熏蒸痛處候溫可下手時卻令人淋洗橦音同花可為布五枝湯洗腳氣用桃椰楮桑槐五件枝條煎湯洗腳消腫住痛先吃酒三五杯一方治腳氣衝心用白礬二兩水一斗五升略煎三五沸浸洗一方治寒濕腳氣不可忍者用團魚一個水二斗煮至一斗去團魚用汁加蒼耳尋風藤蒼朮各半斤煎至七升去渣一盆盛之乘熱熏蒸待溫浸洗神效一方用蓖麻子七粒去殼研爛同蘇和香丸和勻貼腳心其痛即止一方用草烏末以麴酒糟搗爛貼患處即止若無曲糟用生薑汁亦可椒湯洗法川椒一兩蔥一握姜如掌大一塊上銼碎用水一盆煎湯洗之椒囊法用川椒三斤實於疏布袋中寘火踏上跣足踏椒囊蓋椒性熱加以火氣則寒濕腳氣自然避去或碎檳榔熟艾各三分之一尤妙一方治腳赤腫杉皮煎濃湯洗數次立愈千金方治嶺南腳氣從足至膝脛腫滿連骨疼者用蓖麻子葉切蒸薄裹三二易即消又方治同前蒴藋根銼碎和酒醋共三分根一分合蒸熟封裹腫上二三日即消亦治不仁一方治腳氣連腿腫滿久不瘥黑附子一兩去皮臍生用搗為末生薑汁調如膏塗敷腫上藥干再塗之候腫消為度一方治腳氣用無名異化牛皮膠調勻貼患處一方治遠行腳腫用之可行千里輕便甚妙防風細辛草烏等分上為末撒入鞋底內如著前鞋即以水微濕過然後撒藥治腳轉筋方一方治腳轉筋疼痛攣急松節二兩銼細乳香一錢上以銀石器內慢火略炒焦存性研細每服一錢至二錢木瓜酒調下一方治腳轉筋取赤蓼莖細切用水四合酒二合煎至四合分二服一方急將大蒜磨腳心令遍熱即瘥一方治腳氣筋骨疼痛用金銀花為末每服二錢熱酒調下或銼碎同木瓜白芍藥官桂當歸甘草酒水各半鍾煎去渣空心熱服蔭按云詢其病之由來察其得之冷熱蓋暑月久坐久立濕地者則熱濕之氣蒸入經絡病發必熱若寒月久坐久立濕地者則冷濕之氣上入經絡痛發則四體酷冷若當風取涼得之者病發則皮肉頑痹諸處瞤動何故得者有冷有熱蓋足有三陰三陽寒中三陽所患必冷暑中三陰所患必熱故有表裡冷熱不同熱者治以冷藥冷者療以熱藥脾受陽毒即熱頑腎受陰濕即寒痹千金方云醫者意也以意消息之耳學者思之
