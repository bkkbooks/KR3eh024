body:
  text: 卷七十七腳氣論論曰腳氣之疾內經名為厥病至漢名為緩風宋齊之後始謂之腳氣名雖不同其實一也所得之由皆由脾腎兩經虛弱坐臥行動之間為風寒暑濕之氣所幹流注而成得此病之始多不令人便覺會因他病乃始發動或奄然大悶經三兩日方覺之先從腳起或緩弱疼痹行起忽倒或兩脛腫滿或足膝枯細或心中怔忡小腹不仁大小便秘澀或舉動轉筋骨節痠疼或惡聞食氣見食吐逆或胸滿氣急壯熱增寒傳足六經外證與傷寒類焉但卒然腳痛為異而其為候也不一治法當究其所自來若寒中三陽所患必冷暑中三陽所患必熱脈浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒也風者汗之濕者燥之熱者清之寒者溫之又當隨四時表裡虛實而治之切不可用補劑及湯淋洗此醫家之大戒也蓋補則氣實多致不救洗淋則邪毒入內亦難治矣治之不早使毒氣入腹衝心攻築作痛喘滿上氣嘔吐異常此則漸致傾危其可忽也東垣曰腳氣之疾實水濕之所為也蓋濕之害人皮肉筋脈而屬於下然亦有二焉一則自外而感一則自內而致其治法自應不同故詳而論之其為病也有證無名腳氣之稱自晉蘇敬始關中河朔無有也惟南方地下水寒其清濕之氣中於人必自足始故經曰清濕襲虛則病起於下或者難曰今茲北方其地則風土高寒其人則腠理致密而亦有此疾者是豈地濕之氣感之而為也答曰南方之疾自外而感者也北方之疾自內而致者也何以言之北方之人常食潼乳又飲酒無節過傷而不厭潼乳之為物其形質則水也酒醴亦然人之水穀入胃胃氣蒸騰其氣與味宣之於經絡化之為血氣外榮四肢內注五臟六腑周而復始以應刻數焉是謂天地之紀此皆元氣充足脾胃之氣無所傷而然也苟元氣不充則胃氣之本自弱飲食既倍則脾胃之氣有傷既不能蒸化所食之物其氣與味亦不能宣暢旁通其水濕之性流下而致之其自外而入者止於下脛腫而痛自內而致者乃或至於手節也經曰足脛腫曰水太陰所至為重跗腫此但言其自外者也所治之法前人方論備矣自內而治者治法則未有也楊大受云腳氣是為壅疾治以宣通之劑使氣不能成壅也壅既成而盛者砭惡血而去其重勢經曰蓄則腫熱砭刺之後以藥治之致音稚密也砭音貶石針也以石刺病也山海經高氏之山多針石又曰北方地高陵居風寒冷冽其俗飲潼酪而肉食凡飲潼酪以飲多飲速者為能經云因而大飲則氣逆又云食入於陰長氣於陽今陽反行陰道是為逆也夫乳酪醇酒者濕熱之物飲之屬也加以奉養太過亦滋其濕水性潤下氣不能呴許御切音昫氣以溫之也故下注於足脛積久而成腫痛此飲食下流之所致也刺志論云谷入多而氣少得之有所脫血濕居下也況潼酪醇酒之濕熱甚於谷者也至真要大論云太陰之勝火氣內郁流散於外足脛跗腫此之謂也故飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也若飲食自倍腸胃乃傷則胃氣不能施化脾氣不能四布故下流乘其肝腎之位注於足脛加之房事不節陰盛陽虛遂成痼疾蔭按李東垣論南方腳氣外感清濕作寒治北方腳氣內傷酒乳作濕熱治此實前人之未發者後學疑之遂成南北二派以理論之不必以南北分寒熱凡外感寒濕者皆屬寒濕不必南方為然凡內傷酒乳者皆屬濕熱不必北方為然但隨脈證及詢其病之由來察其得之寒熱臨證立方施治可也蔭又按孫真人云古人少有此疾自永嘉南渡衣冠之人多有之皆濕鬱於內所致也故凡四時之中皆不得久坐久立濕冷之地亦不得因酒醉汗出脫衣洗足當風取涼皆成腳氣若暑月久坐久立濕地則濕熱之氣蒸人經絡病發必熱而四肢皆痠疼煩悶跗腫寒熱此又山野農夫多有之以久濕傷於外也若冬月久坐久立濕冷之地者則濕冷之氣上入經絡病發則四肢皆酷冷轉筋世有勤工力學之士久坐久立於濕地冷風乘入經絡不覺成病也若欲使之不成病者初覺則灸患處二三十壯則愈不復發矣又經云當風取涼醉以入房能成此病又云婦人產後取涼多有此疾深宜慎之內經論南方者其地下水土弱霧露之所蒸也江東嶺南大率如此春夏之交山林蒸郁風濕毒氣為甚足或感之遂成瘴毒腳氣其候則腳先屈弱漸至痹疼脛微腫小腹不仁頭痛心煩痰壅吐逆時作寒熱便溲不通甚者攻心而勢逆治之誠不可緩支法存所以留意經方偏善此術者豈非江左嶺表此疾得之多歟支法存仰道人晉之名醫也東垣云外臺所錄皆謂南方卑濕霧露所聚之地其民腠理疏陽氣不能外固因而履之則清濕襲虛病起於下此因血虛氣弱受清濕之邪氣與血並行於膚腠邪氣盛正氣少故血氣澀澀則痹虛則弱故令痹弱也後人名曰腳氣初覺即灸患處二三十壯以導引濕氣外出及飲醪醴以通經散邪所制之方寒藥少熱藥多多用麻黃川烏姜附之屬內經云濕淫於外以苦發之麻黃苦溫發之者也川烏辛熱走而不守通行經絡姜附辛甘大熱助陽退陰亦能散清濕之邪又察足之三陰三陽是何經絡所起以引用藥為主治復審六氣中何氣當之治以佐使之藥孫真人云醫者意也隨時增損初無定方真知言哉千金云脈大而緩宜服續命湯二劑立瘥若風盛宜作越婢湯加白朮二兩若脈浮大而緊轉駚宜作竹瀝湯此最惡脈也若細而駚者亦惡脈微而弱宜服風引湯此人脈多是因虛而得之若大虛短氣力乏可間作補湯隨病冷熱而用之若未愈更服竹瀝湯即止竹瀝湯若不及熱服輒停在胸膈更為人患每服當使極熱若服竹瀝湯得下者必佳也若加服數劑病及脈勢未折而苦脹滿者可以大鱉湯下之湯勢盡而不得下可以湯為丸助湯令下下後更服竹瀝湯令脈勢折將息料理乃佳活人云治腳氣屬冷者小續命湯煎成旋入生薑自然汁服之最快丹溪曰腳氣須用升提之藥提起其濕隨氣血用藥治濕治氣使痛除腫退即罷藥如腳氣衝心宜四物湯加炒黃柏再於湧泉穴用附子末津唾調敷上以艾灸泄引熱下濕熱食積痰流注者用蒼朮黃柏防己各一兩南星川芎白芷各七錢犀角檳榔各一兩為末酒糊丸肥人加痰藥血虛加牛膝龜板轉筋皆屬血熱四物湯加酒芩紅花若筋動於足大指上至大腿近腰結住此因奉養厚又為風寒而作必加蒼朮南星以疏其邪心法附錄曰腳氣有濕熱有食積流注有風濕有寒濕勝濕以蒼朮白朮防己川芎為主或六物附子湯或當歸拈痛湯腳氣氣鬱甚者舟車丸除濕丹有飲者東垣開結導飲丸腳氣解表用麻黃左經湯等藥隨經選用有兼痰氣寒濕者五積散加木瓜若雙解以大黃左經湯東垣羌活導滯湯若理血以八味丸或四物加羌活天麻又或四物加黃柏南星或健步丸若疏風養血用獨活寄生湯最效春夏氣溢腫而痛者用香蘇散加五加皮木瓜檳榔川楝子熱而紅腫者敗毒散加木瓜蒼朮秋冬以後用五積散加木瓜牛膝檳榔吳茱萸戴氏曰腳氣逼肺喘嗽宜小青龍湯入檳榔煎服喘急者此係入腹用蘇子降氣湯畏食者平胃散加木瓜嘔逆加陳皮半夏茯苓藿香日久不愈腳脛枯細或寒或熱或冷或癢或一腳偏患軟弱顫曳狀如偏風者小續命湯加木瓜或獨活寄生湯腳心腫痛用大聖散入木瓜豆淋酒調服一錢仍用川椒白芷草烏煎湯洗切不可令下及妄用寒藥得溫則消散矣葉氏曰腳氣始發甚微病者多不自覺亦有覺而自謂病小隱忍冀瘥及至日積月累病勢漸深或入心則恍惚謬妄嘔吐不食或入腎則腰腳腫小便不通沖胸喘急即求救治遂難措手正謂腳氣為危疾者多坐夫不早治之故也千金方云病者初覺便灸所患處二三十壯則愈針經曰有道以來必有道以去灸之導引其濕熱外出此良法也又加濕氣壅滯不得消散者非下之不可蓄熱腫盛者必寒涼乃宜若所謂切不可令下及妄用寒藥者自相矛盾矣予觀此二者皆不可偏廢但要量病施治毋得執疑一說也又曰活人書云腳氣最忌補劑及湯淋洗殊不知人之元虛得此疾作則氣血日衰必使發無休息不加滋補其病何愈外感濕氣淋渫恐助濕邪若內受濕氣不能外達則洗之以開導其壅泄越其邪也治者須參此意樓氏曰南方忌洗北方宜洗李氏曰腳氣須分乾溼濕者筋脈弛長而軟或浮腫或生瘡謂之濕腳氣宜利濕疏風干即熱也乾者筋脈蜷縮攣痛枯細不腫謂之乾腳氣宜潤血清燥內因好食乳酥醇酒濕熱下流肝腎加之房勞故富貴之人亦有腳疾外因久坐久立濕地或貧苦跋涉山溪瘴毒夏月則感濕熱之氣發則四肢多熱冬月則感濕冷之氣發則四肢多冷加以當風取涼汗出洗足醉後入房故成此疾外感止於下脛腫痛內傷或至手節周身初起察其起處隔蒜灸之最妙濕勝則腫除濕湯加檳榔防己脛腫者紅花蒼柏丸肥人加痰藥赤裂腫痛甚者用甘遂為末水調敷腫處另用甘草煎湯服之立消或敗毒散加蒼朮大黃搜風順氣丸濕兼寒則痛五積散不換金正氣散附子六物湯勝駿丸濕兼風則走注不常烏藥順氣散地仙丹甚者用赤芍草烏等分酒糊丸服以劫之挾瘀血者復元通聖散合消風散濕兼熱則腫痛異常加味蒼柏散二炒蒼柏散清燥湯食積濕痰下注者檳榔蒼柏丸軟痹者乃膏粱火乘肝腎以致血氣澀則痹厥不仁虛則軟緩無力或麻木不舉三妙丸搜風順氣丸然腎主骨虛則骨軟陽虛附虎四斤丸陰虛虎潛丸腎氣丸腳軟筋痛者大補陰丸去地黃加白芍藥知母甘草倍牛膝肝主筋虛則腳膝頑麻養真丹肝腎脾俱虛者五獸三匱丹凡濕氣在下隨氣血痰藥中加防風蒼朮升提其濕衝心則恍惚嘔吐不食脈乍大乍小者死宜木香流氣飲蘇子降氣湯吞養正丹有火者四物湯加黃柏以降之再用附子末津調塗湧泉穴引勢下行入腹不仁喘急欲死者木萸散腹脹煩躁者松節湯入肺喘咳小青龍湯加檳榔入肝頭目昏眩喘滿逼促烏藥平氣散入腎腰腳腫脹小便不利目額皆黑左尺絕者死牛膝散加大黃救之如少陰腎氣入心乃水剋火也急宜八味丸救之有腳氣寒熱足腫心煩體痛垂死者杉節湯不食加砂仁青皮木瓜外用桃柳桑槐楮五枝煎湯洗之消腫住痛須先吃酒三五杯最忌熱藥蒸泡恐逼邪入經絡故治腳氣以疏通氣道為佳濕熱流注三陰經絡火鬱成毒腫上於三陽寒熱嘔惡身痛且重者左經湯主之或香蘇散加木瓜檳榔七情再加五加皮木香痛加赤芍藥忍冬藤當歸三陰里證胸滿怔忡遍體轉筋二便閉澀或自利者羌活導滯湯除濕丹導水丸搜風順氣丸挾痰者三花神佑丸挾食積者開結導飲丸裡虛者獨活寄生湯換腿丸表裡兼見者左經湯加大黃腳跟痛有血熱者四物湯加知母黃柏牛膝有痰者加木瓜或開結導飲丸腳轉筋有血熱者四物湯加酒芩紅花有筋動於足大指上至大腿近腰結子者此奉養厚因風寒而作又當加蒼朮南星感濕者除濕丹常用松節二兩乳香一錢慢火焙存性為末每一錢木瓜煎酒調服有踝上生一孔約深半寸至下半日疼異者此濕毒注成漏也用人中白炙出水滴入瘡口其痛遂減不數日即愈蔭按虞氏曰病有內外之殊治無表裡之異宜通用蒼朮白朮之類以治其濕知母黃柏黃芩之類以去其熱當歸芍藥生地黃之類以調其血木瓜檳榔之類以行其氣羌活獨活以利關節而散風濕兼用木通防己川牛膝之類引藥下行及消腫去濕以為此證大法不過如此東垣曰濕淫所勝治以苦溫以苦辛發透關節勝濕為佐以苦寒泄之流濕清熱為臣故立當歸拈痛湯治之其效捷於影響學者更宜詳究焉脈法脈弦者風濡弱者濕洪數者熱遲澀者寒微滑者虛牢堅者實結則因氣散則因憂緊則因怒細則因悲脈訣舉要曰腳氣之脈其狀有四浮弦為風濡弱濕氣遲澀因寒洪數熱鬱風汗濕溫熱下寒熨治腳氣邪注各經方麻黃左經湯治風寒暑濕流注足太陽經腰足攣痹關節重痛憎寒壯熱無汗惡寒或自汗惡風頭痛眩暈等證麻黃去節乾葛細辛白朮米泔浸茯苓防己桂心不見火羌活甘草炙防風各等分上銼為末每服四錢加生薑三片大棗一枚水煎空心服自汗去麻黃加肉桂芍藥重者加白朮陳皮無汗減桂加杏仁澤瀉並等分半夏左經湯治足少陽經為風寒暑濕流注發熱腰脅疼痛頭目眩暈嘔吐不食半夏湯洗七次乾葛細辛白朮麥門冬去心茯苓桂心不見火防風乾薑炮黃芩柴胡小草即遠志苗甘草炙各等分上㕮咀每服四錢加生薑三片棗一枚水煎空心熱服熱悶加竹瀝喘急加杏仁桑白皮大黃左經湯治風寒暑濕流注足陽明經使腳痛赤腫痛不可行大小便秘或惡聞食氣喘滿自汗細辛去苗茯苓羌活大黃蒸甘草炙前胡枳殼去穰麩炒厚朴去皮炒黃芩杏仁去皮尖另研各等分上㕮咀每服四錢加生薑三片棗一枚水煎空心熱服腹痛加芍藥秘結加阿膠喘急加桑白皮紫蘇小便澀少加澤瀉四肢瘡瘍浸淫加升麻並各等分大料左經湯治風寒暑濕流注三陽經腰足拘攣大小便秘澀喘滿煩悶並皆治之麻黃去節乾葛細辛厚朴薑汁炒茯苓防己羌活枳殼麩炒防風麥門冬去心黃芩各一錢桂心柴胡半夏湯泡七次小草白姜甘草炙各五分原方以上各等分上銼加生薑三片棗一枚水煎空心服自汗加牡蠣白朮去麻黃黃腫加澤瀉木通熱甚無汗去桂加橘皮前胡升麻腹痛或利去黃芩加芍藥及炮附子大便秘加大黃竹瀝若喘滿加杏仁桑白皮柴蘇並等分對證加減尤宜審之六物附子湯治四氣流注於足太陰經骨節煩疼四肢拘急自汗短氣小便不利手足或時浮腫附子炮去皮臍肉桂防己各一錢甘草五分炙白朮茯苓各七分半上㕮咀加生薑三片水煎食後溫服換腿丸治足三陰經為風寒暑濕之氣所乘發為攣痹緩弱上攻胸脅肩背下注腳膝疼痛足心發熱行步艱難薏苡仁南星炮石楠葉石斛去根檳榔萆薢炙川牛膝酒浸羌活防風各一兩木瓜四兩黃耆蜜炙當歸酒洗天麻續斷各一兩上為細末酒麵糊丸如桐子大每服五十丸溫酒鹽湯任下一方加炮附子肉桂蒼朮各一兩治腳氣屬風濕方驅風左經湯治風勝自汗走注腫痛或惡寒無汗羌活防風細辛秦艽天麻荊芥獨活防己酒浸曬乾各一錢半甘草五分上銼一服加生薑三片水煎食前服自汗加桂枝三分無汗加麻黃乾葛柴胡各五分香蘇散治風濕腳痛疏通氣道香附子紫蘇葉各二兩陳皮一兩甘草五錢上銼每服四錢加薑蔥煎服加檳榔木瓜名檳蘇散加味敗毒散治足三陽經受風熱毒氣流注腳踝焮赤腫痛寒熱如瘧自汗惡風或無汗惡寒羌活獨活前胡柴胡枳殼桔梗甘草人參茯苓川芎蒼朮大黃各等分上㕮咀每服半兩姜三片水煎服自利及熱不甚者去大黃加防己一方治諸般腳氣一服除根防風去蘆二錢羌活蟬退各三分薄荷五分紫蘇四分上曬乾為末每服五錢以無灰酒半碗熱調服至一時久即用紫蘇半斤忍冬花四兩木饅頭七個蘇木二兩銼為粗末用水以一中桶煎湯傾桶內披厚衣坐於桶上勿令走了藥氣將腳腿熏之當自下而上汗出直至項門其出如水盡為度藥湯分三次添用只一用永除根蒼朮丸治乾溼腳氣筋脈拘攣疼痛不能行蒼朮米泔浸炒四兩乳香沒藥各另研二兩牛膝青鹽各半兩熟艾四錢川烏三錢全蠍炒二錢上為細末以木瓜一個大者切一頭留作蓋去穰入藥於內將蓋拴定於黑豆中蒸令極爛取出去皮連藥研為膏卻入生蒼朮末拌勻為丸如桐子大每服五十丸空心木瓜湯鹽酒任下加減至寶丹治腳氣止疼痛除風濕石膏火煮三十沸白蒺藜炒赤去皮尖各三兩骨碎補去毛炒四兩當歸酒浸檳榔木瓜生用紫金皮去骨各二兩月寶砂醋煮乾五兩淮烏頭三個白膠香三兩淨水煮數十沸令水乾上為末煉蜜丸如彈子大每服一丸嚼生薑一塊空心以好酒一盞送下服後一時久用外應散熏蒸淋洗一方除紫金皮木瓜加防風小黑豆一方加赤芍藥一方除紫金皮石膏加白朮木香川烏活血應痛丸治風濕客於腎經血脈凝滯腳重疼痛項背拘攣不得轉側常服活血脈壯筋骨狗脊去毛四個蒼朮泔浸一宿去皮六斤沒藥十兩另研草烏頭一斤半香附子炒七斤半陳皮去白五升上為末酒糊丸如桐子大每服二十丸溫酒熟水任下加減地仙丹治風冷邪濕留滯下焦足膝拘攣喘滿疼痛地龍去土五靈脂去石烏藥白膠香另研五加皮椒紅炒出汗威靈仙木瓜去穰赤小豆炒川烏炮黑豆炒去皮天仙藤蒼朮米泔浸炒木鱉子去殼油各等分上為末酒糊丸如桐子大每服七十丸空心鹽湯酒任下透骨丹治腳氣川烏一兩煨羌活白茯苓各二兩木香一兩半乳香沉香檳榔木瓜川芎各一兩上為末麵糊丸如桐子大每服六十丸薑湯下治腳氣屬寒濕方撍風散音昝專治寒濕腳氣先以此發散麻黃不去節甘草不去皮淮草烏川萆薢杏仁各等分上㕮咀每服四錢水一盞煎服不可多服加味五積散治寒濕流注兩腿痠疼有兼痰氣者用之尤宜蒼朮肉桂各二錢麻黃陳皮各一錢桔梗九分厚朴甘草炙枳殼麩炒茯苓當歸芍藥乾薑炮各八分白芷半夏湯泡七次川芎各七分木瓜一錢上銼一服加生薑三片蔥白三莖水煎不拘時服五積散去桂加白朮名搜風散治寒濕腳氣愈後可常服之逐寒趁痛散治寒濕腳氣麻黃一錢半官桂紫蘇藿香羌活細辛各一錢白朮茯苓各八分防己一錢二分甘草四分寒甚加乾薑炮附子炮各一錢上銼加生薑三