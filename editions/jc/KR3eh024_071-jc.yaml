body:
  text: 卷七十一眩暈眩音炫目無常主也惑也亂視也暈音運卷也曰旁氣也論原病式曰諸風掉眩皆屬肝木風主動故也所謂風氣甚而頭目眩暈者由風木盛必是金衰不能制木而木復生火風火皆屬陽陽主於動兩動相搏則為旋轉故火本動也焰得風則自然旋轉矣嚴氏曰眩暈之證雖云皆由於肝風上攻所致然體虛之人外感六淫內傷七情皆能眩暈當以脈證別之風則脈浮有汗寒則脈緊無汗暑則脈虛煩悶濕則脈細沉重嘔逆及其七情所感遂使臟氣不平鬱而生涎結而為飲隨氣上逆令人眩暈眉稜骨痛眼不可開寸脈多沉此為異耳若疲勞過度下虛上實金瘡吐衄便利及婦人崩傷產後去血過多皆令眩暈當隨所因而治之劉宗厚曰眩暈一證人皆稱為上實下虛所致而不明言其所以然之故蓋所謂虛者血與氣也所謂實者痰涎風火也原病之由有氣虛者乃清氣不能上升或汗多亡陽所致當升陽補氣有血虛者乃因亡血過多陽無所附而然當益氣補血此皆不足之證也有因痰涎郁遏者宜開痰導郁重則吐下有因風火所動者宜清上降火若因外感而得者嚴氏雖分四氣之異皆當散邪為主此皆有餘之證也世所謂氣不歸元而用丹藥墜鎮沉香降氣之法然香竄散氣丹藥助火其不歸之氣豈能因此而復耶內經所謂治病必求其本氣之歸求其本而用藥則善矣葉氏曰按直指方云淫欲過度腎家不能納氣歸元使諸氣逆奔而上此眩暈出於氣虛也吐衄崩漏肝家不能收攝榮氣使諸血失道妄行此眩暈生於血虛也氣虛者宜益氣補腎湯血虛者宜補肝養榮湯若專用溫藥鎮墜丹藥多致飛越之亢其害有不可勝言者矣丹溪曰痰在上火在下火炎上而動其痰也諸風掉眩皆屬肝木此特一端耳此證屬痰者多蓋無痰不能作眩雖因風者亦必有痰火動其痰二陳湯加黃芩蒼朮羌活挾氣虛者亦治痰為主兼補氣降火藥如東垣白朮半夏天麻湯之類傷濕者除濕湯加川芎去血過多而眩暈者芎歸湯眩暈不可當者以大黃酒炒為末茶湯調下一老婦患赤白帶一年半只是頭眩坐立不得睡之則安專治帶愈其眩自止戴氏曰有因虛致暈雖暈醒時面常欲得暖手按之蓋頭者諸陽之會陽氣不足耳有頭眩證者耳中常鳴頭上有鳥雀嗽嗽之聲且不可全謂耳鳴為虛此頭腦挾風所為也良方曰素問云頭痛巔疾下虛上實過病也在足少陰巨陽在腎與膀胱二經蓋足太陽之脈從巔絡腦而腎與膀胱為表裡陰虛陽實故為是病甚則入腎甚則腑病已而入於臟則腎獨受傷矣徇蒙招尤徇亦作巡行視貌蒙茫昧也招掉搖也尤甚也目眩耳聾下實上虛過在足少陽厥陰其過在肝膽之氣實於下而虛於上也蓋足少陽之脈起於目銳眥上抵頭角下耳後足厥陰之脈連目繫上出額與督脈會於巔故為是病甚則在肝甚則自腑歸臟而併入於肝矣下虛者腎虛也故腎厥則頭痛上虛者肝虛也故肝虛則暈徇蒙者如以物蒙其首招尤不定目眩耳聾皆暈之狀故肝厥頭痛不同也蔭按眩暈咳嗽頭痛三者乃病之標必治其病之本如產後眩暈只補其血脾虛眩暈只補其氣此治其病之本也學者識之薛氏曰按丹溪先生云眩者言其黑運旋運其狀目閉眼暗身轉耳聾如立舟船之上起則欲倒蓋虛極乘寒得之亦不可一途而取軌也若風則有汗寒則掣痛暑則熱悶濕則重滯此四氣乘虛而眩暈也若鬱結生痰而眩暈者此七情虛火上逆也若淫欲過度而眩暈者此腎虛氣不歸源也若吐衄崩漏而眩暈者此肝虛不能攝血也有早起眩暈須臾自定者元氣虛也正元飲下黑錫丹傷濕頭暈用腎著湯加川芎有痰用青州白丸子頭風風熱也久則目昏偏頭風相火也久則目緊便澀皆宜出血以開表之竊謂前證肝虛頭暈用鉤藤散腎虛頭暈六味丸頭暈吐痰養正丹不應八味丸血虛四物湯加參苓白朮不應當歸補血湯氣虛四君子加歸耆不應益氣湯肝木實瀉青丸虛用地黃丸不應川芎散脾氣虛二陳參朮柴胡升麻不應益氣湯加茯苓半夏脾胃有痰半夏白朮天麻湯風痰上壅四神散發熱惡寒八物湯七情氣逆四七湯傷濕而暈除濕湯李氏曰或云眩暈或云眩冒眩言其黑暈言其轉冒言其昏一也虛者內外之邪乘虛入表而上攻實者內外之邪郁痰上結而下虛大抵肥白人多濕痰滯於上火起於下痰因火而上衝所謂無痰不作眩者是也治宜以痰為主兼補氣降火瘦人多腎水虧少相火上炎而眩暈所謂風勝則地動火得風則焰旋是也治宜滋陰降火化痰抑肝此以肥瘦為主亦丹溪常法也後仿此經曰徇蒙招尤徇蒙者如以物蒙其首招尤者招搖不定如立舟車之上起則欲倒眼昏耳聾屋如旋轉甚則卒倒不省人事乃肝所主也又曰諸脈皆繫於目臟腑筋骨氣之精而與脈併為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系入於腦則腦轉腦轉則引目系急而眩矣內傷勞役氣虛不能上升或汗多亡陽宜補中益氣湯色欲傷腎氣逆不能歸元四君子湯加天麻防風或十全大補湯腎氣丸加鹿茸血虛因產後金瘡及吐衄亡血孤陽浮越古芎歸湯加炒乾姜瘀血滯胸加童便老年每早起眩暈須臾自定有風痰虛火者果系陽虛順元散吞黑錫丹以鎮墜之玉機謂丹藥金石助火香竄散氣多致飛越之亢豈能鎮其不歸之氣耶火動其痰眩甚者二陳湯加芩連蒼朮羌活火盛壯實屬陽明者單大黃酒炒為末茶清下或古荊黃湯加防風等分屬太陽少陽者酒芩白芷等分為末茶清下虛火半夏白朮天麻湯七情臟氣不平涎迷心竅眩暈眉稜骨痛眼不可開者七氣湯玉液湯補虛飲外因風者脈浮有汗項強熱者川芎茶調散或參蘇飲加南星黃芩熱甚者川芎石膏散虛者山茱萸散或四物湯或秦艽羌活通用單白芷丸又大風頭眩手足麻痹胃脘發痛乃風寒濕三痹合至必有停飲在上宜量吐之因寒者脈緊無汗四肢拘急筋攣頭掣痛五積散喜熱手按者附子理中湯三五七散因暑者脈虛煩渴十味香薷飲或二陳湯加黃連山梔川芎因濕者脈細頭重吐逆芎術湯芎術除眩湯或腎著湯加川芎風濕玉壺丸凡肝脈溢大必眩宜預防之外感解肌化痰不可妄施汗下內因量施補益昔丹溪治婦人帶下頭眩專治帶而眩自安蓋頭眩頭痛咳嗽病之標也經曰治病必求其本通用二陳湯加減如眩暈氣上衝胸戰搖者只宜茯苓桂術甘草湯加減凡眩暈言亂汗多下利時時自冒者虛極不治脈法脈訣舉要曰風寒暑濕氣鬱生涎下虛上實皆暈而眩風浮寒緊濕細暑虛涎眩而滑虛脈則無治眩暈法尤當審諦先理痰氣次隨證治丹溪曰左手脈數熱多脈澀而芤有血死右手脈實有痰積脈大是久病久一作虛左手人迎脈緩而浮大者屬風又云久病之人氣血俱虛而脈大痰濁不降也治痰火眩暈方加味二陳湯治一切眩暈隨證加減半夏陳皮去白白茯苓各一錢甘草五上銼加生薑三片水煎服風痰加天麻白附子荊芥防風寒痰加乾薑良薑熱痰合解毒湯火動其痰加黃芩黃連蒼朮羌活濕痰合芎辛湯停水心悸合五苓散七情所傷加丁香砂仁白朮酒食傷加乾生薑胸中宿痰眼澀手麻痹發脫健忘者用本方探吐吐後宜服清上辛涼之藥調之痰盛加竹瀝薑汁火盛加童便挾氣虛加人參黃耆白朮或少加炮附子煎入竹瀝薑汁血虛加芎歸或合四物湯加片芩薄荷煎入竹瀝薑汁童便大抵諸般眩暈挾風則加防風荊芥天麻秦艽等藥挾熱加片芩黃連梔子之類挾寒加乾薑官桂附子之屬無有不安者也清眩化痰湯治痰火上攻作眩及氣不降胸滿者半夏湯泡二錢橘紅白茯苓各一錢二分川芎黃芩酒炒各一錢半天麻桔梗枳殼麩炒各一錢炙甘草四分上銼作一服加生薑三片水煎食遠服痰結暈甚者加南星旋覆花各一錢丹溪方治火眩暈南星半夏枳殼桔梗陳皮去白茯苓黃芩酒炒各一錢甘草炙五分上銼加生薑水煎服人參前胡湯治風痰頭暈目眩人參五分前胡南星湯泡半夏湯泡木香枳殼麩炒橘紅赤茯苓紫蘇甘草炙各一錢上銼加生薑五片水煎食後服半夏白朮天麻湯治風痰眩暈噁心欲吐目不敢開如在風雲中半夏陳皮去白麥蘖各七分半人參白朮炒黃耆米泔浸天麻白茯苓神麯炒澤瀉各五分乾薑二分黃柏一分半上銼加生薑三片水煎食遠服香橘飲治氣滯不能運痰而作眩暈木香橘皮去白白朮半夏曲白茯苓砂仁各二錢丁香甘草炙各五分上銼加生薑五片水煎食遠服玉液湯治七情感動氣鬱生涎隨氣上衝頭目眩暈心嘈忡悸眉稜骨痛大半夏湯泡七次去皮臍上薄切片每服四錢加生薑十片水煎入沉香水磨一呷服大效祛痰丸治風頭旋痰逆噁心胸膈不利南星生半夏生赤茯苓去皮陳皮去白乾薑炮各等分上為細末麵糊丸如桐子大每服五十丸米飲下白附子丸治風痰上厥眩暈頭疼全蠍炒半兩白附子炮南星炮旋覆花甘菊花天麻川芎橘紅殭蠶乾薑生用各一兩上為末用生薑半斤取汁打糊丸如桐子大每服五十丸煎荊芥湯下增損黑錫丹治陰陽不升降上熱下冷頭眩暈病至危篤者此方治之即愈或云治早起眩暈須臾自定以為常此因老痰鬱痰所作必須此藥劫之黑錫丹頭二兩肉豆蔻附子炮去皮臍破故紙炒胡蘆巴官桂去皮茴香各一錢青皮去穰炮川楝子陽起石木香沉香各半兩烏藥火煅醋淬七次細研水淘各一分上為細末酒煮麵糊為丸如桐子大每服五七十丸濃煎人參茯苓生薑棗湯送下空心服黑將軍散治眩暈不可當者多是痰火大黃酒炒上為末茶清調下治風熱眩暈方獨活散消風化痰治頭目眩暈獨活去蘆細辛去葉防風去蘆藁本去土川芎蔓荊子旋覆花各一兩石膏研甘草炙各半兩上為末每服一錢加生薑三片水煎食後熱服羌活湯治風頭眩筋脈拘急痰涎壅滯肢節煩疼羌活前胡石膏白茯苓川芎枳殼麩炒黃芩甘菊花防風細辛去葉甘草炙蔓荊子麻黃去根節煮掠去沫焙各等分上㕮咀每服三錢加生薑三片雞蘇三葉水煎服雞蘇即薄荷祛風定暈散治風熱痰飲眩暈及肝氣不清防風去蘆川芎各一錢半羌活蔓荊子天麻黃芩半夏薑湯泡七次枳殼麩炒甘菊花各一錢細辛七分石膏二錢甘草炙五分上銼加生薑三片水煎食後服仙術通聖散治風熱上壅頭目眩暈明耳目消痰飲清神氣防風川芎當歸白芍藥大黃連翹薄荷石膏桔梗黃芩白朮山梔子荊芥穗滑石甘草砂仁藿香甘菊花蒼朮上銼加生薑三片水煎服荊黃湯治風熱頭眩大黃荊芥穗防風各等分上為粗末大作劑料水煎去柤以利為度川芎散治風眩頭暈山藥甘菊花人參茯神小川芎各五錢山茱萸肉一兩上為細末每服二錢溫酒調下日三服不拘時川芎散治眩暈惡風自汗或身體不仁氣上衝胸戰搖如在舟車之上川芎白朮各三錢北細辛白茯苓粉草各一錢桂枝五分上作一服加生薑三片水煎服有痰兼青州白丸子服之人參湯治風頭眩但覺地屋俱轉目閉不敢開人參白朮麥門冬去心當歸酒洗防風各一兩獨活官桂黃耆芍藥各一兩五錢上㕮咀每服五錢水煎食遠服白朮散治風邪在胃頭旋不止復加嘔逆白朮厚朴去皮薑製甘菊花各半兩防風去蘆白芷人參各一兩上㕮咀每服五錢加生薑五片水煎食遠服芎藭散治風頭旋眼目昏痛眩暈倦怠心怔川芎前胡白殭蠶炒人參各一兩蔓荊子天麻酒浸焙防風去蘆各半兩上為細末每服二錢食後溫酒調下蔓荊子散治風氣頭旋暈悶起則欲倒蔓荊子甘菊花半夏羚羊角旁枳殼麩炒茯神去木川芎黃芩防風各七錢半麥門冬去心石膏各一兩地骨皮赤箭細辛甘草炙各半兩上㕮咀每服六錢加生薑三片水煎服芎菊散治諸陽受風頭目旋暈目視昏暗肝氣不清川芎甘菊花旋覆花草決明蟬脫各一錢白殭蠶細辛防風羌活各三分天麻密蒙花荊芥穗甘草炙各五分上為細末每服二錢水煎食後溫服芎藭散婦人患頭風者十居其半每發必掉眩如在車上蓋因氣虛肝有風邪故耳素問云徇蒙招尤目眩耳聾上虛下實過在足少陽厥陰甚則歸肝蓋謂此也余常取此方以授人比他藥捷而效川芎一兩當歸七錢半羌活旋覆花蔓荊子細辛石膏藁本荊芥穗半夏曲防風熟地砂仁炒甘草各半兩上為末每服二錢加生薑三片水煎溫服不拘時鉤藤散治肝厥頭暈清頭目鉤藤陳皮半夏麥門冬茯苓石膏人參甘菊花防風各半兩甘草二錢半上銼每服四錢加生薑七片水煎服一方治肝厥狀如癇疾不醒嘔吐醒後頭虛暈發熱麻黃鉤藤取皮石膏乾葛半夏曲柴胡甘草枳殼甘菊花上銼每服四錢加生薑三片棗一枚水煎服羚羊角散治一切頭眩本因體虛風邪乘於陽明經上注頭面遂入於腦亦因痰水在於胸膈上犯大寒使陽氣不行痰水結聚上衝於頭目令頭轉旋羚羊角茯神各一兩芎藭防風白芷半夏湯泡各半兩枳殼附子各二錢半甘草三錢上銼每服四錢加生薑五片水煎服都梁丸治風吹項背頭目昏黑眩痛香白芷大塊者用沸湯泡洗四五次焙乾上為末煉蜜丸如彈子大每服一丸細嚼用荊芥湯點茶下芎犀丸治偏正頭疼及風眩目運一邊鼻不聞香臭常流清涕或作臭氣一陣服芎蠍等藥不效者服此不十服愈及治噴嚏稠濃川芎硃砂研內一兩為衣石膏研片腦各四兩人參茯苓甘草細辛各二兩犀角生用鎊梔子各一兩麥門冬去心三兩阿膠蛤粉炒一兩半上為細末煉蜜丸如彈子大用硃砂為衣每服一丸或二丸食後細嚼茶酒任下治寒濕眩暈方三五七散治陽虛風寒入腦頭痛目眩轉運如在舟車之上耳內蟬鳴風寒濕痹腳氣緩弱等疾天雄炮去皮臍細辛去土各三兩山茱萸去核乾薑炮各五兩防風去蘆山藥各七兩上為細末每服二錢食前溫酒調服芎術除眩湯治感風濕頭目眩暈川芎附子白朮官桂甘草炙各等分上㕮咀每服三錢加生薑七片水煎食前溫服芎辛湯治風寒在腦或感邪濕頭重痛眩暈欲倒嘔吐不定並皆治之川芎一兩細辛洗去土白朮甘草炙各半兩上㕮咀每服一兩加生薑五片茶牙少許水煎食後臨臥服芎術湯治冒雨中濕眩暈嘔逆頭重不食川芎半夏白朮各一錢二分甘草炙六分上銼作一服加生薑七片水煎溫服一方有附子桂心無半夏治諸虛眩暈方益氣補腎湯治氣虛眩暈人參黃耆蜜炙各一錢二分白朮二錢白茯苓一錢山藥山茱萸各一錢五分甘草炙五分上銼加棗二枚水煎服補肝益榮湯治血虛眩暈當歸酒洗川芎各二錢芍藥煨熟地黃砂仁炒陳皮各一錢半甘菊花一錢甘草五錢上銼水煎食前服如腎虛氣不降者去菊花入前補腎湯加味六君子湯治肥人氣虛痰盛兼挾風邪眩暈不休人參白朮茯苓陳皮去白各一錢半夏一錢半甘草炙荊芥穗各五分上銼加生薑三片大棗一枚水煎去柤入竹瀝一大匙溫服六合湯治風虛頭暈及血虛及去血過多者當歸酒洗川芎各二錢白芍藥煨熟地砂仁炒各一錢半秦艽一錢一方作防風羌活七分上銼水煎食遠服四物二陳湯治體瘦血虛而痰火兼盛者當歸川芎白芍藥熟地砂仁炒陳皮去白半夏白茯苓片芩酒炒各一錢薄荷甘草炙各五分上銼水煎入竹瀝薑汁童便服滋陰健脾湯此治氣血虛損有痰治眩暈之仙劑也白朮一錢五分當歸白茯苓陳皮去白各一錢白芍藥生地姜酒炒各八分人參半夏薑製白茯神去木麥門冬去心遠志去心各七分川芎五分甘草炙四分上銼一劑加薑棗水煎早晚服滋陰安神湯治不時暈倒搐搦痰壅當歸川芎白芍藥熟地砂仁炒人參茯神白朮遠志去心各一錢酸棗仁甘草炙各五分黃連酒炒四分上銼加生薑煎服有痰加南星一錢川芎散治肝腎虛風頭目眩暈或頭痛耳鳴目繫緊急小川芎山藥白茯神甘菊花人參各半兩山茱萸肉一兩上為末每服二錢酒調日三服四神散治血風眩暈頭痛寒熱唾痰菊花當歸酒洗旋覆花去梗葉荊芥穗各一錢上銼加蔥白三寸茶末一錢水煎服正元飲治下元虛敗痰火上湧頭目眩暈臟腑滑泄時或自汗手足逆冷霍亂轉筋等證人參白朮茯苓甘草炙各二兩黃耆炙一兩半川芎山藥薑汁炒烏藥附子炮去皮臍乾葛各一兩肉桂五錢乾薑炮三錢紅豆炒二錢上銼每服三錢加薑棗水入鹽少許煎送黑錫丹黑錫丹治真陽虛敗痰氣壅塞心火炎熾頭目眩暈肉桂沉香附子炮去皮臍胡蘆巴酒浸炒破故紙炒茴香炒木香各一兩硫黃黑錫去灰各二兩上將黑錫硫黃入銚子煉結砂子傾出地上去火毒研細余藥為末和勻再研至黑光色酒糊丸如桐子大陰乾入布袋擦令光潤每服四十丸沉香磁石丸治上盛下虛頭目眩暈耳鳴耳聾沉香另研蔓荊子青鹽另研甘菊花各半兩巴戟去心胡蘆巴磁石火煅醋淬細研水飛川椒去目炒山茱萸去核陽起石火煅研山藥炒附子炮去皮臍各一兩上為細末用酒煎米糊和丸如桐子大每服五十丸加至七十丸空心鹽湯下養正丹治虛風頭眩吐涎不已蓋此藥升降陰陽補接真氣非治頭眩而已黑錫水銀硫黃硃砂各一兩上用砂器熔鉛下水銀攪勻離火少時入硫朱二味再攪候冷為末飯丸綠豆大每服三十丸空心食前棗湯下
