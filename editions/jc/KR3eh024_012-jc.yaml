兩上為細末入粳米粉五升蒸糕曬乾不拘時任意食之米湯送下治脾胃虛寒方理中湯治脾胃虛寒人參白朮乾薑炮甘草炙各等分上銼每服五七錢水煎熱服如手足厥冷飲食不入或腸鳴切痛嘔逆吐瀉加附子炮名附子理中湯治中湯治脾胃不和嘔逆霍亂或中滿虛痞泄瀉等證人參白朮茯苓甘草炙青皮陳皮各等分上每服五錢水煎服如嘔加半夏等分丁香減半名丁香溫中湯加減補中湯治脾冷食不消化人參黃耆白朮甘草炙陳皮砂仁肉豆蔻各等分上銼水煎服人參開胃湯治脾胃不和不思飲食此藥助胃進食人參白朮茯苓甘草炙蓮肉橘紅半夏薑製砂仁木香藿香丁香神麯炒麥芽炒各七分上銼加生薑三片水煎食遠服白朮湯理脾和胃順氣進食人參白朮茯苓甘草炙當歸厚朴乾薑桂心桔梗各等分上㕮咀每服四錢加棗一枚水煎溫服豆蔻橘紅散溫脾養胃升降陰陽和三焦化宿食丁香木香各一兩白豆蔻仁人參白朮橘紅半夏曲厚朴薑製乾薑炮藿香葉神麯炒甘草炙各半兩上㕮咀每服三錢加生薑三片棗一枚水煎溫服加味進食散治脾胃虛冷及久病胃弱全不食者人參一錢厚朴薑製陳皮半夏草果良薑炒麥芽炒附子炮去皮臍肉豆蔻麵裹煨丁香不見火各八分青皮炒七分甘草炙五分上銼作一服加生薑三片棗二枚水煎食遠服附子建中湯治脾氣虛寒腹膈脹滿身體沉重面色萎黃嘔吐不食大便自利附子炮去皮臍肉豆蔻麵煨白豆蔻白朮厚朴薑汁炒丁香乾薑炮神麯炒紅豆各一兩木香不見火胡椒甘草炙各半兩上㕮咀每服四錢加生薑五片棗二枚水煎溫服八味湯治脾胃虛寒氣不升降心腹刺痛臟腑虛滑吳茱萸湯泡七次乾薑炮各二兩人參當歸洗焙陳皮肉桂木香丁香各一兩上㕮咀每服四錢水煎溫服溫胃湯專治服寒藥過多或脾胃虛弱胃脘痛陳皮黃耆各七錢益智仁六錢白豆蔻仁澤瀉乾生薑薑黃各三錢縮砂仁甘草厚朴人參各二錢上為細末每服三錢水一盞煎至七分食前溫服如脈弦惡寒腹痛乃中氣弱也以仲景小建中湯加黃耆錢氏異功散加芍藥選而用之如渴甚者以白朮散倍加葛根養胃湯治脾胃虛寒嘔逆噁心腹脅脹痛腸鳴泄瀉或有外感寒熱如瘧骨節煩疼並皆治之藿香厚朴薑汁炒半夏湯洗茯苓各一兩草果附子炮甘草炙陳皮去白人參各一錢白朮半兩上㕮咀每服四錢加生薑五片棗一枚烏梅半個水煎服補脾湯治脾胃虛寒泄瀉腹滿氣逆嘔吐飲食不消人參茯苓草果去皮乾薑炮各一兩麥芽炒甘草炙各一兩半厚朴薑製陳皮去白白朮各七錢半上㕮咀每服四錢水煎空心服溫脾散開胃進食利氣散寒濕溫中青皮去白陳皮去白縮砂仁舶上茴香炒良薑桔梗白芷厚朴各一兩木香香附麥芽白朮各半兩甘草炙一兩半紅豆乾葛各三錢上㕮咀每服三錢加棗一枚水煎空心服養脾丸治脾胃虛冷心腹脹悶嘔逆噁心泄瀉人參白茯苓大麥芽炒各一兩白朮半兩乾薑炮縮砂去皮各二兩甘草炙一兩半上為末煉蜜丸每兩作八丸每服一丸細嚼薑湯下香砂理中丸治脾胃虛弱感寒停飲心腹卒痛厥冷嘔吐清水飲食不進人參白朮乾薑炮甘草炙各二兩木香不見火砂仁各五錢上為細末煉蜜為丸如桐子大每服七八十丸空心白湯下八味理中丸治脾胃虛寒飲食不化胸膈痞悶或嘔吐痰水或腸鳴泄瀉縮砂仁川薑麥芽各二兩白茯苓神麯炒人參各一兩白朮四兩甘草炙一兩半上為末煉蜜丸每兩分作十丸空心用一丸薑湯嚼下或加半夏曲一兩啟脾丸治脾胃不和氣不升降中滿痞塞心腹膨脹腸鳴泄瀉不思飲食服此最佳人參白朮青皮陳皮神麯炒麥芽炒厚朴薑汁炒砂仁乾薑炮各一兩半甘草炙一兩半上為細末煉蜜丸如彈子大每服一丸食前細嚼米飲下參苓壯脾丸治脾胃虛寒胸脅痞脹心腹刺痛或病後氣衰食不復常及久患瀉痢腸胃虛滑並宜服之人參白朮茯苓肉桂不見火乾薑炮砂仁胡椒山藥白扁豆炒神麯炒麥芽炒各二兩上為細末煉蜜丸如彈子大每服一丸空心細嚼白湯或酒送下和中益氣丸治脾胃不和氣不升降嘔吐減食口苦吞酸胸滿短氣肢體怠惰面色痿黃中焦虛痞不任攻擊臟氣久寒不受峻補又療心胸愊愊如滿五飲停滯不散常服和中益氣進美飲食或大便不通尤宜服之陳皮去白青皮去穰各四兩砂仁二兩人參官桂肉豆蔻茴香微炒京三稜炮各一兩白豆蔻一兩木香不見火丁香各半兩上為細末用白麵打糊丸如桐子大每服六十丸至七十丸食遠生薑湯下沉香溫胃丸治中焦氣弱脾胃受寒飲食不美氣不調和臟腑積冷心腹疼痛大便滑泄腹中雷鳴霍亂吐瀉手足厥逆大便利無度又治下焦陽虛臍腹疼痛及療傷寒陰濕形氣沉困自汗人參白朮茯苓甘草炙當歸白芍藥沉香吳茱萸洗良薑木香不見火各一兩附子炮巴戟酒浸去心乾薑炮茴香各二兩官桂一兩半丁香六錢上為細末用好醋打麵糊丸如桐子大每服五七十丸空心米飲下日三服忌生冷之物生胃丹生胃氣消痰沫開胸膈進飲食粟米四兩溫水浸透炊作飯焙乾乘熱用生薑自然汁和濕再焙乾如是制七次天南星三兩薑汁浸一宿次日用生薑自然汁和紙筋黃土泥裹南星曬乾慢火炊半日泥焦乾取出用人參白朮茯苓各二兩陳皮白豆蔻縮砂麥芽炒半夏曲青皮蓽澄茄石蓮肉各一兩南木香三錢上為末米糊粉丸如綠豆大每服五十丸薑湯下導寧純陽丹治真元虛損心腎不安精神耗散脾土濕敗不能化食所食五味之物不成精液乃成痰涎聚於中脘不能傳導以致大腸燥澀小便反多而赤或時嘔吐酸水久或翻胃結腸蒼朮米泔浸三日再換淨水浸洗切曬乾以青鹽水浸一宿蓮肉好者去心酒浸一宿各四兩上用大公豬肚一個壁土揉洗淨納入前二味以線密縫用無灰酒煮爛取起入石臼中搗爛捏成小餅烘乾研為細末南星四兩淨切細以薑汁一小盞浸宿以灶心土同炒去土不用大半夏四兩湯泡去涎曬乾為末以好醋浸七日蒸熟不麻為度橘皮四兩銼灶心土炒穀芽炒厚朴白朮麥芽炒甘草人參茯苓白豆蔻三稜莪朮縮砂蓽澄茄各一兩木香丁香沉香各半兩粟米四兩薑汁浸炒上為末稀麵糊丸如桐子大每服六七十丸空心米飲下參朮健脾丸滋養脾胃補益元氣進美飲食溫中下氣臍腹冷痛亦能治之蒼朮八兩鹽水醋米泔水各浸二兩蔥白炒二兩人參白朮白茯苓乾山藥破故紙酒浸焙枸杞子菟絲子酒浸焙蓮肉去心各二兩川楝子取肉五味子牛膝各一兩五錢川椒小茴香鹽炒陳皮遠志去心木香不見火各五錢上為末酒糊丸如桐子大每服八十丸至一百丸空心鹽湯下以乾物壓之桂曲丸健脾胃進飲食克化生冷溫中下氣人參白朮陳皮去白砂仁丁香肉豆蔻麵煨甘草炙乾薑良薑蓽撥桂枝各一兩神麯炒二兩上為末湯浸蒸餅丸如桐子大每服七十丸米飲下曲術丸治脾胃停飲腹脅脹滿不進飲食神麯十兩炒白朮五兩官桂乾薑各三兩吳茱萸川椒各二兩上為末薄糊丸如桐子大每服五十丸生薑湯下有飲加半夏曲二兩煎服厚朴丸和脾暖胃治心腹冷痛胸膈虛痞腸鳴腹脹厚朴薑製四兩乾薑炮官桂川椒炒去目各二兩上為末水糊丸如桐子大每服三五十丸食前米飲下治脾腎虛寒方二神丸治脾腎虛寒全不思食或腸鳴泄瀉破故紙炒四兩肉豆蔻生二兩上為末用肥棗四十九個生薑四兩切片同煮棗爛去姜取棗剝去皮核用肉研為膏入藥末杵丸如桐子大每服三四十丸鹽湯下一方加木香二兩名棗肉丸樓氏曰有人全不進食服補脾藥皆不效予授此方服之頓能進食此病不可全作脾氣治蓋腎氣怯弱真元衰削是以不能消化飲食譬之鼎釜之中置諸米穀下無火力終日不熟其何能化黃魯直嘗記服菟絲子淘淨酒浸曬乾日挑數匙以酒下之十日外飲啖如湯沃雪亦知此理也
