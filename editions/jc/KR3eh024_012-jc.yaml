body:
  text: 卷十二脾胃論脾胃調養之宜選要論曰脾胃者屬乎中州土也消化水穀榮養五臟六腑四肢百骸此土能生萬物之義也經云飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布水因氣生氣為水母肺氣所及水精布焉五經並行五經五臟之經絡也合於四時五臟陰陽揆度四時五臟皆合於陰陽揆度以為常也凡人之生皆以胃氣為本又經曰谷入於胃脈道乃行水入於經其血乃成又曰安穀則昌絕谷則亡則脾胃豈可以不保養乎保養之法在乎調其飲食適其寒暄時其飢飽不以生冷傷之不使寒暑侵之不為七情六慾所動則五臟自然平和百病何由而生其或攝生不謹將理失宜或為生冷寒暑七情六慾所傷則變證百出而脾胃虛矣脾胃既虛則五臟六腑四肢百骸將何所榮養耶經云飲食勞倦則傷脾脾傷則內閉九竅上七竅五官也下二竅二陰也外壅肌肉衛氣解散此謂自傷氣之削也真陽受傷元氣如削非由天降自作之耳蓋飲食傷胃勞倦傷脾治療之法當審其脾胃之虛實別其所傷之緣由若傷於飲者飲乃無形之物或微汗散之於表或淡滲利之於下傷於食者或損谷以和之或強脾以磨之果因食物停滯甚盛而作悶亂者吐下以奪之傷於寒者則溫之傷於熱者則清之寒熱共傷者各從其性以和之不可一例過用香燥之藥恐鬱滯久而火邪盛則反劇矣若夫飲食勞倦傷其脾胃使元氣下陷而為中氣不足之證又當從東垣治內傷法必用升補氣血之劑以調之和之溫之養之使生生之氣增益則脾胃壯而完復矣論脾胃分陰陽氣血王節齋曰人之一身脾胃為主胃陽主氣脾陰主血胃司納受脾司運化一納一運化生精氣津液上升糟粕下降斯無病矣人惟飲食不節起居不時損傷脾胃胃損則不能納脾損則不能化脾胃俱損納化皆難元氣斯弱百邪易侵而飽悶痞積關格吐逆腹痛泄痢等證作矣況人於飲食豈能一一節調一或有傷脾胃便損飲食減常元氣漸憊矣故潔古制枳朮之丸東垣發脾胃之論使人常以調理脾胃為主也後人稱為醫中王道厥有旨哉近世論治脾胃者不分陰陽氣血率皆理胃所用之藥又皆辛溫燥熱助火消陰之劑遂致胃火益旺脾陰愈傷清純沖和之氣變為燥熱胃脘乾枯大腸燥結脾臟漸絕而死期迫矣殊不知脾屬土屬濕位居長夏故濕熱之病十居八九況土旺四季寒熱溫涼各隨其時豈可偏用辛熱之劑哉李氏曰脾性濕主乎血陰也胃火化主乎氣陽也太濕則氣滯太乾則血燥濕熱調停則能食能化而氣血生旺苟或寒濕傷脾則停飲難化或不思食燥熱傷胃則停食不消或善食而瘦由是脾胃不和交相為病胃變為寒脾變為熱大概以脈浮緩而遲或帶緊為寒濕脈浮緩而實或細而數為燥熱又肥人多濕瘦人多熱更參以飲食厚薄可也論脾胃虛實傳變東垣曰五臟別論云胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之腑此不能久留輸瀉者也所謂五臟者藏精氣而不瀉也故滿而不能實六腑者傳化物而不藏故實而不能滿所以然者水穀入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿滿而不實也陰陽應象大論云穀氣通於脾山谷土氣脾為土臟故相通六經為川六經者三陰三陽也周流氣血故為人之川腸胃為海九竅為水注之氣言水氣之注也九竅者五臟主之五臟皆得胃氣乃能通利通評虛實論云頭痛耳鳴九竅不利腸胃之所生也胃氣一虛耳目口鼻俱為之病經脈別論云食氣入胃散精於肝淫氣於筋浸淫滋養於筋也食氣入胃濁氣歸心濁氣者食氣之厚者也淫精幹脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑肺主毛心主脈肺藏氣心生血一氣一血稱為父母二臟獨居胸中故曰毛脈合精行氣於腑腑者氣聚之府也是謂氣海亦曰膻中腑精神明留於四臟氣歸於權衡宗氣積於肺神明出於心氣盛則神王故腑氣之精為神明神王則臟安故肺肝脾腎四臟無不賴神明之留以為主宰然後臟氣鹹得其平而歸於權衡矣權衡平也權衡以平氣口成寸以決死生臟腑之氣既得其平則必變見於氣口而成寸尺也氣口者脈之大會百脈俱朝於此故可以決生死飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也又云陰之所生本於五味味得地氣故能生五臟之陰陰之五宮五臟也傷在五味至於五味口嗜而欲食之必自裁製勿使過焉過則傷其正也謹和五味骨正筋柔氣血以流腠理以密如是則骨氣以精謹道如法長有天命平人氣象論云人以水穀為本故人絕水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也五臟以胃氣為本若脈無胃氣而真臟之脈獨見者死如春弦應肝冬石應腎但弦但石而無胃氣是胃氣絕而肝腎之真臟見也然但弦但石雖為真臟若肝無氣則不弦腎無氣則不石亦由五臟不得胃氣而然與真臟無胃者等耳歷觀諸篇而參考之則元氣之充足皆由脾胃之氣無所傷而後能滋養元氣若胃氣之本弱飲食自倍則脾胃之氣既傷而元氣亦不能充此諸病之所由生也內經之旨皎如日星猶恐後人有所未達故靈樞經中復申其說經云水穀入口其味有五各注其海津液各走其道胃者水穀之海其輸上在氣街下至三里胃氣運行之輸上者在氣街即氣衝穴下者至三里在膝下三寸水穀之海有餘水穀留滯於中也則腹滿若不足脾虛不能運胃虛不能納也則肌不受穀食人之所受氣者谷也谷之所注者胃也胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也隧音遂伏道也水穀入胃化氣化血以行於經隧之中經隧者五臟六腑之大絡也又云五穀入於胃也其糟粕津液宗氣分為三隧糟粕之道出於下焦津液之道出於中焦宗氣之道出於上焦故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉榮氣者泌泉水涓流不已也其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉晝夜之百刻也衛氣者出其悍氣之剽疾而先行於四末分肉皮膚之間而不休者也又云中焦之所出亦並胃中中脘之分也出上焦之後下也此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故夫飲食失節寒濕不適脾胃乃傷此固喜怒憂恐損耗元氣資助心火火與元氣不兩立火勝則乘其土位此所以病也調經篇云病生陰者內傷曰陰得之飲食居處陰陽喜怒又云陰虛則內熱有所勞倦形氣少衰穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故為內熱脾胃一傷五亂互作其始病身痛壯熱頭痛目眩肢體沉重四肢不收怠惰嗜臥為熱所傷元氣不能運用故四肢困怠如此聖人著之於經謂人以胃土為本成文演義互相發明不一而止粗工不解讀妄意施用本以活人反以害人今舉經中言病從脾胃所生及養生當實元氣者條陳之生氣通天論云蒼天之氣清淨則志意治順之則陽氣固蒼天之陽氣清淨光明人能法天道之清淨則志意治而不亂陽氣固而不衰雖有賊邪弗能害也此因時之序在乎因時序而調之也故聖人傳受也精神服佩也天氣而通神明失之則內閉九竅外壅肌肉衛氣解散此謂自傷氣之削也陽氣者煩勞則張精絕闢積於夏使人煎厥言起居不節致傷陽氣也闢病也煩勞過度則形氣施張於外精神竭絕於中陽擾陰虧不勝炎熱故病積至夏日以益甚令人五心煩熱如煎如熬孤陽外浮真陰內奪氣逆而厥故名煎厥目盲耳閉潰潰乎若壞都潰潰壞貌都城郭也故蒼天之氣貴清淨陽氣惡煩勞病從脾胃生者一也五常政大論云陰精所奉陰精所奉之地陽氣堅固其人壽陽精所降陽精所降之地陽氣已泄其人夭陰精所奉謂脾胃既和穀氣上升春夏令行故其人壽陽精所降謂脾胃不和穀氣下流收藏令行故其人夭病從脾胃生者一也六節臟象論云脾胃大腸小腸三焦膀胱者倉廩之本營之居也名曰器營者水穀之精氣水穀貯於六腑故為營之所居而皆名曰器能化糟粕轉味而入出者也其華在唇四白唇之四際白肉也其充在肌其味甘其色黃此至陰之類通於土氣脾以陰中之至陰而分王四季故通於土氣此雖若指脾為言而實總結六腑者皆倉廩之本無非統於脾氣也故曰此至陰之類凡十一臟皆取決於膽也五臟六腑共為十一稟賦不同情志亦異必資膽氣庶得各成其用故皆取決於膽也膽者少陽春升之氣春氣升則萬化安故膽氣春升則餘臟從之膽氣不升則飧泄腸澼不一而起矣病從脾胃生者三也經云天食人以五氣地食人以五味臊氣入肝焦氣入心香氣入脾腥氣入肺腐氣入腎也酸先入肝苦先入心甘先入脾辛先入肺咸先入腎也五氣入鼻藏於心肺上使五色修明音聲能彰心主血華於面故五色修明肺主氣發於聲故聲音彰著五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生氣和而化生津液以成精精氣充而神自生人生之道止於是耳此謂之氣者上焦開發宣五穀味熏膚充身澤毛若霧露之溉氣或乖錯人何以生病從脾胃生者四也豈特四者至於經雲天地之邪氣感則害人五臟六腑及形氣俱虛乃受外邪不因虛邪賊邪不能獨傷人諸病從脾胃而生明矣聖人旨意重見疊出詳盡如此且垂戒云法於陰陽和於術數法取法也和調也術數修身養性之法也天以陰陽化生萬物人以陰陽榮養一身陰陽之道順之則生逆之則死故知道者必法則於天地和調於術數也飲食有節所以養內起居有常所以養外不妄作勞保其天真故能形與神俱而盡終其天年度百歲乃去由是言之飲食起居之際可不慎哉論脾胃勝衰東垣曰胃中元氣盛則能食而不傷過時而不肌脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦或少食而肥雖肥而四肢不舉蓋脾實而邪氣盛也又有善食而瘦者胃伏火邪於氣分則能食脾虛則肌肉削即食㑊音亦尺脈緩澀謂之解㑊又病名善食而瘦謂之食㑊也叔和云多食亦肌虛此之謂也夫飲食不節則胃病胃病則氣短精神少而生大熱有時而顯火上行獨燎其面黃帝針經云面熱者足陽明病胃既病則脾無所稟受脾為死陰不主時也位居中央寄王四時不得獨主於時也故亦從而病焉形體勞役則脾病脾病則怠惰嗜臥四肢不收大便泄瀉脾既病則胃不能獨行津液故亦從而病焉大抵脾胃虛弱陽氣不能生長是春夏之令不行五臟之氣不生脾病則下流乘腎土剋水則骨乏無力是為骨蝕音食虧敗曰蝕凡物侵蠹皆曰蝕令人骨髓空虛足不能履地是陰氣重疊此陰盛陽虛之證大法云汗之則愈下之則死若用辛甘之藥滋胃當升當浮使生長之氣旺言其汗者非正發汗也為助陽也夫胃病其脈緩脾病其脈遲且其人當臍有動氣按之牢若痛若火乘土位其脈洪緩更有身熱心中不便之證此陽氣衰弱不能生髮不當於五臟中用藥法治之當從臟氣法時論中升降浮沉補瀉法用藥耳如脈緩病怠惰嗜臥四肢不收或大便泄瀉此濕勝從平胃散若脈弦氣弱自汗四肢發熱或大便泄瀉或皮毛枯槁發脫落從黃耆建中湯脈虛而血弱於四物湯中摘一味或二味以本顯證中加之或真氣虛弱及氣短脈弱從四君子湯或渴或小便閉澀赤黃多少從五苓散去桂摘一二味加正藥中以上五藥當於本證中隨所兼見證加減假令表虛自汗春夏加黃耆秋冬加桂如腹中急縮或脈弦加防風急甚加甘草腹中窄狹或氣短者亦加之腹滿氣不轉者勿加雖氣不轉而脾胃中氣不和者勿去但加厚朴以破滯氣然亦不可多用於甘草五分中加一分可也腹中夯悶此非腹脹乃散而不收可加芍藥收之如肺氣短促或不足者加人參白芍藥中焦用白芍藥則脾中升陽使肝膽之邪不敢犯也腹中窄狹及縮急者去之及諸酸澀藥亦不可用腹中痛者加甘草白芍藥稼穡作甘甘者己也曲直作酸酸者甲也甲己化土此仲景妙法也腹痛兼發熱加黃芩惡寒或腹中覺寒加桂怠惰嗜臥有濕胃虛不能食或沉困或泄瀉加蒼朮自汗加白朮小便不利加茯苓渴亦加之氣弱者加白茯苓人參氣盛者加赤茯苓縮砂仁氣復不能轉運有熱者微加黃連心煩亂亦加之小便少者加豬苓澤瀉汗多津液竭於上勿加之是津液還入胃中欲自行也不渴而小便閉塞不通加炒黃柏知母小便澀者加炒滑石小便淋澀者加澤瀉且五苓散治渴而小便不利無惡寒者不得用桂不渴而小便自利妄見妄聞乃瘀血證用炒黃柏知母以除胸中燥熱竅不利而淋加澤瀉炒滑石只治竅不利者六一散中加木通亦可心臟熱者用錢氏方中導赤散中滿或但腹脹者加厚朴氣不順加橘皮氣滯加青皮一橘皮三氣短小便利者四君子湯中去茯苓加黃耆以補之如腹中氣不轉者更加甘草一半腹中刺痛或周身刺痛者或裡急者腹中不寬快是也或虛坐而大便不得者皆血虛也血虛則裡急或血氣虛弱而目睛痛者皆加當歸身頭痛者加川芎苦頭痛加細辛此少陰頭痛也發脫落及臍下痛加熟地黃予平昔調理脾胃虛弱於此五藥中加減如五臟證中互顯一二證各對證加藥無不驗然終不能使人完復後或有因而再至者亦由督任沖三脈為邪皆胃氣虛弱之所致也法雖依證加減執方療病不依素問法度耳是以檢討素問難經及黃帝針經中說脾胃不足之源乃陽氣不足陰氣有餘當從六氣不足升降浮沉法隨證用藥治之蓋脾胃不足不同餘臟無定體故也其治肝心肺腎有餘不足或補或瀉惟益脾胃之藥為切經言至而不至是為不及所勝妄行所生受病所不勝薄之也至氣至也如春則暖氣至夏則熱氣至者是也至而不至謂時已至而氣不至此不及也不及則所勝者妄行所生者受病所不勝者薄之所生者生我者也如木不及則土無畏所勝妄行也土妄行則水受克所生受病也金因木衰而侮之所不勝薄之也至而不至者謂從後來者為虛邪心與小腸來乘脾胃也脾胃脈中見浮大而弦其病或煩躁悶亂或四肢發熱或口苦舌乾咽乾蓋心主火小腸主熱火熱來乘土位乃濕熱相合故煩躁悶亂也四肢者脾胃也火乘之故四肢發熱也飲食不節勞役所傷以致脾胃虛弱乃血所生病主口中津液不行故口乾咽乾也病人自以為渴醫者治以五苓散謂止渴燥而反加渴燥乃重竭津液以至危亡經云虛則補其母當於心與小腸中以補脾胃之根蒂也甘溫之藥為之主以苦寒之藥為之使以酸味為之臣佐以其心苦緩急食酸以收之心火旺則肺金受邪金虛則以酸補之次以甘溫及甘寒之劑於脾胃中瀉心火之亢盛是治其本也所勝妄行者言心火旺能令母實母者肝木也肝木旺則挾火勢無所畏懼而妄行也故脾胃先受之或身體沉重走注疼痛蓋濕熱相搏而風熱鬱而不得伸附著於有形也或多怒者風熱下陷於地中也或目病而生內障者脾裹血胃主血心主脈脈者血之府也或云心主血又云肝主血肝之竅開於目也或妄見妄聞起妄心夜夢亡人四肢滿閉轉筋皆肝木火盛而為邪也或生痿或生痹或生厥或中風或生惡瘡或作腎痿或為上熱下寒為邪不一皆以熱不得升長而木火遏於有形中也所生受病者言肺受土火木之邪而清肅之氣傷或胸滿少氣短氣者肺主諸氣五臟之氣皆不足而陽道不行也或咳嗽寒熱者濕熱乘其內也所不勝薄之者水乘木之妄行而反來侮土故腎入心為汗入肝為泣入脾為涎入肺為痰為嗽為涕為嚏為水出鼻也一說下元土盛剋水致督任沖三脈盛火旺煎熬令水沸騰而乘脾肺故痰涎唾出於口也下行為陰汗為外腎冷為足不任地為腳下隱痛或水附木勢而上為眼澀為眵侈支切音鴟目傷眥也為冷淚此皆由肺金之虛而寡於畏也夫脾胃不足皆為血病是陽氣不足陰氣有餘故九竅不通諸陽氣根於陰血中陰血受火邪則陰盛陰盛則上乘陽分而陽道不行無生髮升騰之氣也夫陽氣走空竅者也陰氣附形質者也如陰氣附於土陽氣升於天則各安其分也今所立方中有辛甘溫藥者非獨用也復有甘苦大寒之劑亦非獨用也以火酒二製為之使引甘苦寒藥至頂而復入於腎肝之下此所謂升降浮沉之道自耦而奇奇而至耦者也陽分奇陰分耦瀉陰火以諸風藥升發陽氣以滋肝膽之用是令陽氣生上出於陰分末用辛甘溫藥接其升藥使大發散於陽分而令走九竅也經云食入於胃散精於肝淫氣於筋食入於胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑且飲食入胃先行陽道而陽氣升浮也浮者陽氣散滿皮毛升者充塞頭頂則九竅通利也若飲食不節損其胃氣不能克化散於肝歸於心溢於肺食入則昏冒欲睡得臥則食在一邊氣暫得舒是知升發之氣不行者此也經云飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺病人飲入胃遽覺至臍下便欲小便由精氣不輸於脾不歸於肺則心火上攻使口燥咽乾是陰氣大盛其理甚易知也況脾胃病則當臍有動氣按之牢若痛有是者乃脾胃虛無是則非也亦可作明辨矣論大腸小腸五臟皆屬於胃胃虛則俱病東垣曰針經云手陽明大腸手太陽小腸皆屬足陽明胃小腸之穴在巨虛下廉骨下側也大腸之穴在巨虛上廉上側也此二穴皆在足陽明胃三里穴下也三里穴膝下三寸也上廉里下三寸也下廉上廉下三寸也大腸主津小腸主液大腸小腸受胃之榮氣乃能行津液於上焦溉灌皮毛充實腠理若飲食不節胃氣不及大腸小腸無所稟受故津液涸竭焉內經云耳鳴耳聾九竅不利腸胃之所生也此胃弱不能滋養手太陽小腸手陽明大腸故有此證然不止從胃弱而得之故聖人混言腸胃之所生也或曰子謂混言腸胃所生亦有據乎予曰玉機真藏論云脾不及令人九竅不通謂脾為死陰受胃之陽氣能上升水穀之氣於肺上充皮毛散入四臟今脾無所稟不能行氣於臟腑故有此證此則脾虛九竅不通之謂也雖言脾虛亦胃之不足所致耳此不言脾不言腸胃而言五臟者又何也予謂此說與上二說無以異也蓋謂脾不受胃之稟命致五臟所主九竅不能上通天氣皆閉塞不利也故以五臟言之此三者止是胃虛所致耳然亦何止於此胃虛則五臟六腑十二經十五絡四肢皆不得營運之氣而百病生焉豈一端能盡之乎論脾胃虛則九竅不通東垣曰真氣又名元氣乃先身生之精氣也非胃氣不能滋之胃氣者穀氣也榮氣也運氣也生氣也清氣也衛氣也陽氣也又天氣人氣地氣乃三焦之氣分而言之則異其實一也不當作異名異論而觀之飲食勞役所傷自汗小便數陰火乘土位清氣不生陽道不行乃陰血伏火況陽明胃土右燥左熱故化燥火而津液不能停且小便與汗皆亡津液津液至中宮變化為血也脈者血之腑也血亡則七神何依百脈皆從此中變來也人之百病莫大於中風有汗則風邪客之無汗則陽氣固密腠理閉拒諸邪不能傷也或曰經言陽不勝其陰則五臟氣爭九竅不通又脾不及則令人九竅不通名曰重強又五臟不和則九竅不通又頭痛耳鳴九竅不通利腸胃之所生也請析而解之答曰夫脾者陰土也至陰之氣主靜而不動胃者陽土也主動而不息陽氣在於地下乃能生化萬物故五運在上六氣在下其脾長一尺掩太倉太倉者胃之上口也脾受胃稟乃能熏蒸腐熟五穀者也胃者十二經之源水穀之海也平則萬物安病則萬物危五臟之氣上通九竅五臟稟受氣於六腑六腑受氣於胃六腑者在天為風寒暑濕燥火此無形之氣也胃氣和平榮氣上升始生溫熱溫熱者春夏也行陽二十五度六陽升散之極下而生陰陰降則下行為秋冬行陰道為寒涼也胃既受病不能滋養故六腑之氣已絕致陽道不行陰火上行五臟之氣各受一腑之化乃能滋養皮膚血脈筋骨故言五臟之氣已絕於外是六腑生氣先絕五臟無所稟受而氣後絕矣肺本收下又主五氣氣絕則下流與脾土疊於下焦故曰重強胃氣既病則下溜經云濕從下受之脾為至陰本乎地也有形之土下填九竅之源使不能上通於天故曰五臟不和則九竅不通胃者行清氣而上即地之陽氣也積陽成天曰清陽出上竅曰清陽實四肢曰清陽發腠理者也脾胃既為陰火所乘穀氣閉塞而下流即清氣不升九竅為之不利胃之一腑病則十二經元氣皆不足也氣少則津液不行津液不行則血虧故筋骨皮肉血脈皆弱是氣血俱羸弱矣勞役動作飲食飢飽可不慎乎凡有此病者雖不變易他疾已損其天年更加之針灸用藥差誤欲不夭枉得乎論胃虛臟腑經絡皆無所受氣而俱病東垣曰夫脾胃虛則濕土之氣溜於臍下腎與膀胱受邪膀胱主寒腎為陰火二者俱弱潤澤之氣不行大腸者庚也燥氣也主津小腸者丙也熱氣也主液此皆屬胃胃虛則無所受氣而亦虛津液不濡睡覺口燥咽乾而皮毛不澤也甲膽風也溫也主生化周身之血氣丙小腸熱也主長養周身之陽氣亦皆稟氣於胃則能浮散也升發也胃虛則膽及小腸溫熱生長之氣俱不足伏留於有形血脈之中為熱病為中風其為病不可勝紀青赤黃白黑五腑皆滯三焦者乃下焦元氣生髮之根蒂為火乘之是六腑之氣俱衰也腑者府庫之府包含五臟及形質之物而藏焉且六腑之氣外無所主內有所受感天地之風氣而生甲膽感暑氣而生丙小腸感濕化而生戊胃感燥氣而生庚大腸感寒氣而生壬膀胱感天一之氣而生三焦此實父氣無形也風寒暑熱燥火乃溫熱寒涼之別稱也行陽二十五度右遷而升浮降沉之化也其虛也皆由脾胃之弱以五臟論之心火亢甚乘其脾土曰熱中脈洪大而煩悶難經云脾病當臍有動氣按之牢若痛動氣築築然堅牢如有積而硬若似痛也甚則亦大痛有是則脾虛病也無則非也更有一辨食入則困倦精神昏冒而欲睡者脾虧弱也且心火太盛左遷入於肝木之分風濕相搏一身盡痛其脈洪大而弦時緩或為眩運戰搖或為麻木不仁此皆風也脾病體重節痛為痛痹為寒痹為諸濕痹為痿軟失力為大疽大癰若以辛熱助邪則為熱病為中風其變不可勝紀木旺運行北越左遷入地助其腎水水得子助入脾為痰涎自入為唾入肝為淚入肺為涕乘肝木而反克脾土明矣當先於陰分補其陽氣升騰行其陽道而走空竅次加寒水之藥降其陰火黃柏黃連之類是也先補其陽後瀉其陰脾胃俱旺而復於中焦之本位則陰陽氣平矣火曰炎上水曰潤下今言腎主五液上至頭出於空竅俱作泣涕汗涎唾者何也曰病癇者涎沫出於口冷汗出於身清涕出於鼻皆陽蹺陰蹺督沖四脈之邪上行腎水不任煎熬沸騰上行為之也此奇邪為病不繫五行陰陽十二經所拘當從督沖二蹺四穴中奇邪之法治之五臟外有所主內無所受謂外主皮毛血脈肌肉筋骨及各空竅是也若胃氣一虛無所稟受則四臟經絡皆病況脾全藉胃土平和則有所受而生榮周身四臟皆旺十二神守職皮毛固密筋骨柔和九竅通利外邪不能侮也論胃虛元氣不足諸病所生東垣曰夫飲食勞役皆自汗乃足陽明化燥火津液不能停故汗出小便數也邪之大者莫若中風風者百病之長善行而數變雖然無虛邪則風雨寒不能獨傷人必先中虛邪然後賊邪得入矣至於痿厥逆皆由汗出而得之也且冬陽氣伏藏於水土之下如非常泄精陽氣已竭則春令從何而得萬化俱失所矣在人則飲食勞役汗下時出諸病遂生予所以諄諄如此者蓋欲人知所慎也論忽肥忽瘦東垣曰黃帝針經云寒熱少氣血上下行夫氣虛不能寒血虛不能熱血氣俱虛不能寒熱而胃虛不能上行則肺氣無所養故少氣衛氣既虛不能寒也下行乘腎肝助火為毒則陰分氣衰血虧故寒熱少氣血上下行者足陽明胃之脈衰則衝脈並陽明之脈上行於陽分逆行七十二度脈之火大旺逆陽明脈中血上行其血沖滿於上若火時退伏於下則血下行故言血上下行俗謂之忽肥忽瘦者是也經曰熱傷氣又曰壯火食氣故脾胃虛而火勝則必少氣不能衛護皮毛通貫上焦之氣而短少也陰分血虧陽分氣削陰陽之分周身血氣俱少不能寒熱故言寒熱少氣也靈樞經云上焦開發宣五穀味熏膚充身澤毛若霧露之溉此則胃氣平而上行也論天地陰陽生殺之理在升降浮沉之間東垣曰陰陽應象論云天以陽生陰長地以陽殺陰藏歲以春為首正正也寅引也少陽之氣始於泉下引陰升而在天地人之上即天之分百穀草木皆甲折於此時至立夏少陰之火熾於太虛則草木盛茂垂枝布葉乃陽之用陰之體此所謂天以陽生陰長經言歲半以前天氣主之在乎升浮也至秋而太陰之運初自天而下逐陰降而徹地則金振燥令風厲霜飛品物咸殞其枝獨在若乎毫毛至冬則少陰之氣復伏於泉下水冰地坼萬類周密陰之用陽之體也此所謂地以陽殺陰藏經言歲半以後地氣主之在乎降沉也至於春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此則正氣之序也故曰履端於始序則不愆升已而降降已而升如環無端運化萬物其實一氣也設或陰陽錯綜勝復之變自此而起萬物之中人一也呼吸升降效象天地準繩陰陽蓋胃為水穀之海飲食入胃而精氣先輸脾歸肺上行春夏之令以滋養周身乃清氣為天者也升已而下輸膀胱行秋冬之令為傳化糟粕轉味而出乃濁陰為地者也若夫順四時之氣起居有時以避寒暑飲食有節及不暴喜怒以頤神志常欲四時均平而無偏勝則安不然損傷脾真氣下溜或下泄而久不能升是有秋冬而無春夏乃生長之用陷於殞殺之氣而百病皆起或久升而不降亦病焉於此求之則知履端之義矣論陰陽壽夭皆脾胃所為東垣曰五常政大論云陰精所奉其人壽陽精所降其人夭夫陰精所奉者上奉於陽謂春夏生長之氣也陽精所降者下降於陰謂秋冬收藏之氣也且如地之伏陰其精遇春而變動升騰於上即曰生髮之氣升極而浮即曰蕃秀之氣此六氣右遷於天乃天之清陽也陽主生故壽天之元氣其精遇秋而退降墜於下乃為收斂殞殺之氣降極而沉是為閉藏之氣此五運左遷入地乃地之濁陰也陰主殺故夭根於外者名曰氣化氣止則化絕根於內者名曰神機神去則機息皆不升而降也地氣者人之脾胃也脾主五臟之氣腎主五臟之精皆上奉於天二者俱主生化以奉升浮是知春生下長皆從胃中出也故動止飲食各得其所必清必淨不令損胃之元氣下乘腎肝及行秋冬殞殺之令則亦合於天數耳論五臟之氣交變東垣曰五臟別論云五氣入脾藏於心肺難經云肺主鼻鼻和則知香臭潔古云視聽明而清涼香臭辨而溫暖此內受天之氣而外利於九竅也夫三焦之竅開於喉出於鼻鼻乃肺之竅此體也其聞香臭者用也心主五臭舍於鼻蓋九竅之用皆稟長生為近心長生於酉酉者肺故知鼻為心之所用而聞香臭也耳者上通天氣腎之竅也乃腎之體而為肺之用蓋肺長生於子子乃腎之舍而肺居其中而能聽音聲也一說聲者天之陽音者天之陰在地為五律在人為喉之竅在口乃三焦之用肺與心合而為言出於口也此口心之竅開於舌為體三焦於肺為用又不可不知也肝之竅通於目離為火能耀光而見物故分別五色也肝為之舍腎主五精鼻藏氣於心肺故曰主百脈而行陽道經云脫氣者目盲脫精者耳聾心肺有病而鼻為之不利此明耳目口鼻為清氣所奉於天而心勞胃損則受邪也論安養心神調治脾胃東垣曰靈蘭秘典論云心者君主之官神明出焉凡怒忿悲思恐懼皆損元氣夫陰火之熾盛由心生凝滯七情不安故也心脈者神之舍心君不安化而為火火者七神之賊也故曰陰火太盛經營之氣不能頤養於神乃脈病也神無所養津液不行不能生血脈也心之神真氣之別名也得血則生血生則脈旺脈者神之舍若心生凝滯七情離形而脈中唯有火矣善治斯疾者惟在調和脾胃使心無凝滯或生歡欣或逢喜事或天氣暄和居溫和之處或食滋味或眼前見欲愛事則慧然如無病矣蓋胃中元氣得舒伸故也論脾胃虛不可妄用吐藥東垣曰六元政紀論云木鬱則達之者蓋木性當動盪軒舉是其本體今乃鬱於地中無所施為即是風失其性人身有木鬱之證者當開通之乃可用吐法以助風木是木鬱則達之之義也又說木鬱達之者蓋謂木初失其性鬱於地中今既開發行於天上是發而不郁也是木復其性也有餘也有餘則兼其所勝脾土受邪見之於木鬱達之條下不止此一驗也又厥陰司天亦風木旺也厥陰之勝亦風木旺也俱是脾胃受邪見於上條其說不同或者不悟木鬱達之四字之義反作木鬱治之重實其實脾胃又受木製又復其木正謂補有餘而損不足也既脾胃之氣先已不足豈不因此而重絕乎再明胸中窒塞當吐氣口三倍大於人迎是食傷太陰上部有脈下部無脈其人當吐不吐則死以其下部無脈知其木鬱在下也塞道不行而肝氣下絕矣兼肺金主塞而不降為物所隔金能剋木肝木受邪食塞胸咽故曰在下者因而越之仲景云食煩以瓜蒂散吐之如經汗下謂之虛煩又名懊憹痛悔也煩躁不得眠知其木鬱也以梔子豉湯吐之昧者將隔咽不通上支兩脅腹脹胃虛不足乃濁氣在上則生䐜脹之病吐之況胃虛必怒風木已來乘陵胃中內經以鐵落墜之豈可反吐助其風木之邪不宜吐而吐其差舛如天地之懸隔大抵胸中窒塞煩悶不止者宜吐之耳論脾胃弱不可概用克伐羅謙甫曰脾胃弱而飲食難任者不可以概用克伐之劑宜錢氏異功散補之自然能食設或嗜食太過傷脾而痞滿嘔逆權用枳實丸一服慎勿多服婁氏曰子嘗治翁氏久瘧食少汗多先補劑加黃連枳實月餘食反不進汗亦不止因悟謙甫此言遂減去枳連純用補劑又令粥多於藥而食進又於原方內加附子三分半一服而愈論餘臟邪偏勝亦能損傷脾胃李氏曰脾胃為五臟主若風寒暑濕燥一氣偏勝亦能損傷假如脈弦風邪所勝胃風湯黃耆建中湯三白湯脈洪熱邪所勝瀉黃散清胃散調胃承氣湯脈澀燥邪所乘八珍湯錢氏白朮散脈沉細寒邪所乘益黃散人參養胃湯丸附子理中湯丸補真丸脈緩濡無力或時隱伏正氣虛而損也四君子湯參苓白朮散脈緩太過濕邪自甚也平胃散論用藥寒熱方氏曰脾胃虛弱不能運化水穀初時則為寒濕宜用辛香燥熱之劑以散之丹溪曰局方用燥藥為劫濕病也濕得燥則豁然而收苟飲食停積日久濕能生熱熱化為火火能傷氣耗血則為燥熱宜用辛甘苦寒之劑以潤之脈法脈浮滑而疾者食不消脾不磨陽脈滑而緊滑則胃氣實緊則脾氣傷得食不消者此脾不和也治脾胃不和方平胃散治脾胃不和不思飲食心腹脅肋脹滿刺痛口苦無味胸滿短氣嘔噦噁心噫氣吞酸面色痿黃肌體瘦弱怠惰嗜臥體重節痛常多自利或發霍亂及五噎八痞膈氣反胃蒼朮米泔浸五兩陳皮去白厚朴去粗皮薑製各三兩三錢甘草炙二兩上㕮咀每服五錢入生薑二片棗一枚水煎溫服不拘時或去薑棗帶熱空心食前服常服調氣暖胃化宿食消痰飲闢風寒冷濕四時非節之氣如小便赤澀加白茯苓澤瀉如米穀不化食飲多傷加枳實如胸中氣不快心下痞塞加枳殼木香或加砂仁香附如脾胃困弱不思飲食加黃耆人參如心下痞悶腹脹者加厚朴甘草減半如遇夏則加炒黃芩如遇雨水濕潤則加茯苓澤瀉如有痰加半夏陳皮如嗽飲食減少脈弦細加黃耆當歸如脈洪大緩加黃芩黃連如大便硬加大黃三錢芒硝二錢先嚼麵炒桃仁爛以藥送下若瀉脾濕加白朮茯苓丁香為調胃散一法加藿香半夏若水氣腫滿加桑白皮若婦人赤白帶下加黃耆若酒傷加丁香若飲冷傷食加高良薑若滑腸泄瀉加肉豆蔻若風痰四肢沉困加荊芥若腿膝冷痛加牛膝若腿膝濕痹加菟絲子若渾身虛腫拘急加地骨皮若胃寒嘔吐加生薑一方加茯苓丁香若氣不舒快中脘痞塞加砂仁香附三兩生薑煎服若瘧疾寒熱加柴胡若小腸氣痛加苦楝茴香若白痢加吳茱萸若赤痢加黃連若轉筋霍亂加樟木皮加乾薑為厚朴湯與五苓散相半為對金飲子與益元散相合為黃白散加藿香半夏為不換金正氣散與錢氏異功散相合為調胃散丹溪曰或問平胃散之溫和可以補養胃氣乎予曰蒼朮性燥氣烈行濕解表甚為有功厚朴性溫散氣非脹滿實急者不用承氣用之可見矣雖有陳皮甘草之甘緩甘辛亦是決裂耗散之劑實無補土之利經謂土氣太過曰敦阜亦能為病況胃為水穀之海多氣多血故因其病也用之以瀉有餘之氣使之平耳又須察其挾寒氣得寒物者而後投之胃氣和平便須卻藥謂之和平者初非補之之謂豈可以為補劑而常用之乎或曰調胃承氣亦治胃病謂之調者似與平胃之平意義相近何用藥之相遠也予曰調胃承氣治熱中下二焦藥也經云熱淫於內治之鹹寒佐以苦甘功在乎導利而行之以緩平胃散止治濕上焦藥也經曰濕上甚而熱治以苦溫佐以甘辛以汗為效而止或曰治濕不利小便非其治也此非仲景法耶何子言之悖也予曰淡滲治濕因有濕在中下二焦今濕在上宜以微汗而解不欲汗多故不用麻黃葛根輩耳調胃散治陰陽氣不和三焦痞膈腹脹滿嘔吐噁心痰嗽手足虛腫及五種膈氣噎塞脾胃不和飲食減少厚朴薑製陳皮去白半夏薑汁製藿香甘草炙各二兩上為細末每服四錢加生薑三片水煎食前溫服枳縮二陳湯理脾胃順氣寬膈消痰飲砂仁枳實半夏陳皮茯苓甘草炙各一錢上銼一服加生薑五片水煎溫服參苓平胃散治脾胃不和不思飲食心腹脅肋脹滿刺痛口苦無味胸滿短氣嘔噦噁心噫氣吞酸面色痿黃肌體瘦弱怠惰嗜臥體重節痛常多自利或發霍亂及五噎八痞膈氣反胃俱宜服之蒼朮米泔浸八兩厚朴薑製橘皮各五兩甘草炙人參茯苓各二兩上㕮咀每服六錢加生薑三片棗一枚水煎溫服不拘時一方棗肉丸如小豆大每服五十丸薑湯下加味調中健脾湯白朮蒼朮厚朴陳皮茯苓各一錢半夏枳實各八分人參七分甘草五分上銼加生薑三片水煎食遠溫服如頭目眩痛加川芎白芷各一錢如左脅氣滯加青皮柴胡各一錢如右脅痛加枳殼一錢如飲食肉物所傷加神麯麥芽山楂各八分如噁心嘔噦加藿香砂仁各八分如肺經有熱加黃芩七分如小便澀加梔子炒八分如相火動加黃柏知母炒各八分如大便澀加黃芩當歸各一錢如脾熱加芍藥一錢香砂養胃湯理脾胃逐寒邪止嘔吐茯苓一錢陳皮半夏泡厚朴薑汁炒蒼朮砂仁藿香各五分人參四分甘草炙三分上銼水二鍾姜三片棗一枚煎服醒脾育胃湯治中焦之氣不足食後虛痞吞酸完穀不化人參白朮白茯苓各一錢蒼朮厚朴陳皮半夏白芍藥砂仁藿香麥芽各八分枳實五分上銼加生薑三片棗二枚水煎食遠服二陳加白蒼楂芎湯惡食者胸中有物導痰補脾白朮蒼朮山楂川芎半夏陳皮茯苓甘草上加生薑水煎服加味枳朮丸常服補益脾胃調理臟腑白朮四兩補