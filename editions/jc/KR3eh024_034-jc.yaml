body:
  text: 卷三十四五疸論虞氏曰內經云中央黃色入通於脾又云諸濕腫滿皆屬脾土夫黃疸為病肌肉必虛腫而色黃蓋濕熱鬱積於脾胃之中久而不散故其土色形於面與肌膚也蓋脾主肌肉肺主皮毛母能令子虛母病子亦病矣是故有諸中者必形諸於外耳其症有五曰黃汗曰黃疸曰酒疸曰谷疸曰女勞疸雖有五者之分終無寒熱之異丹溪曰不必分五同是濕熱如𨠭曲相似正經所謂知其要者一言而終是也外有傷寒熱病陽明內實當下而不得下當汗而不得汗當分利而不得分利故使濕熱怫鬱內甚皆能令人發黃病也先哲制茵陳五苓散茵陳湯茯苓滲濕湯之類無不應手獲效故曰治濕不利小便非其治也又曰濕在上宜發汗濕在下宜利小便或二法宜並用使上下分消其濕則病無有不安者也陳無擇曰古方敘五疸其實一病黃汗者胃屬陽明陽明蓄熱喜自汗汗出因入水中熱必郁故汗黃也其候身體腫發熱不渴狀如風水汗出染衣如柏汁黃疸者由暴熱用冷水洗浴熱留胃中所致其候身面眼悉黃小便如柏汁谷疸者肌黃髮熱由大食傷胃沖郁所致其候食則腹滿眩暈穀食不消酒疸者由大醉當風入水所致變症最多熱毒流於清氣道中則眼黃鼻癰女勞疸者由大熱交接入水水濕入脾因腎氣虛甚以所勝克入致腎氣上行故有額黑身黃之症其間兼渴與腹滿者俱難治葉氏曰無擇論疸形症雖已詳明但云入水所致然今之病疸者未必盡然皆由內之濕熱太甚郁發於外而為黃耳故丹溪曰同是濕熱不必分五等但要上下分消則病無不安者惟谷疸女勞為難治蓋谷疸元氣胃氣殊傷女勞疸陰陽之氣虛竭二者果能斷厚味絕房欲復得生者亦有之矣丹溪曰不必分五同是濕熱如𨠭曲相似輕者小溫中丸重者大溫中丸熱多加黃連濕多茵陳五苓散加食積藥濕熱因倒胃氣服下藥大便下利者參耆加山梔茵陳甘草方書五疸謂黃疸黃腫酒疸谷疸女勞疸是也戴氏曰因食積者量其虛實下之其餘但利小便為先小便清利則黃自退或曰黃疸倦怠脾胃不和食少胃苓湯小便赤加滑石又曰黃疸用芩連山梔茵陳豬苓澤瀉蒼朮青皮草龍膽等分勞食疸加三稜蓬朮縮砂陳皮神麯治之女勞疸加當歸白朮又曰氣實人心痛渾身發黃用吐藥撫芎山梔桔梗茶薑薤汁探吐之薤下戒切音械菜也薤鴻薈似韭之菜禮月令切蒽若薤或云諸疸口淡怔忡耳鳴腳軟當作虛治宜養榮湯四君子湯切不可過用寒涼強通小便恐腎水枯竭而難治諸失血後多令面黃蓋血為榮面色紅潤者血榮之也今血去則面黃色亦宜養榮湯十全大補湯瘧後並諸病後面黃者俱宜健脾之劑如異功散加黃耆扁豆或參苓白朮散之類暑毒傷脾小便不利亦能成疸煎茆音卯花湯調五苓散葉氏曰疸病須分新久而治新病初起即當消導攻滲加茵陳湯茵陳五苓散茯苓滲濕湯之類無不應手獲效久病又當變法也夫脾胃受傷日久則血氣虛弱必宜補益如參朮健脾湯當歸秦艽散使正氣盛則邪氣退庶可收功又有元氣素弱之人得此疸者猶恐滲利以虛其元反投滋補之劑殊不知邪未除而先補則濕愈盛熱愈增而漸加眼目遍身皆黃雖欲退之必得歲月方愈其不能善治者終不免於斃矣仲景曰諸病黃家但利其小便假令脈浮當以汗解之宜桂枝加黃耆湯谷疸之為病寒熱不食食即頭眩心胸不安久久發黃為谷疸茵陳蒿湯主之黃疸病茵陳五苓散主之諸疸用豬膏半斤亂髮如雞子大三枚以發入膏中煎至發盡分再服病自從小便中出黃疸脈浮而腹中和者宜汗之若腹滿欲嘔吐懊憹而不和者宜吐之不宜汗酒疸或無熱清言了了腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之酒疸心中熱欲吐者吐之即愈如陰症欲吐者韓氏用陳皮湯理中湯類酒疸心中懊憹或熱痛梔子大黃湯主之黃疸腹滿小便不利而赤自汗出此為表和裡實當下之宜大黃硝仁湯主之病黃疸發熱煩喘胸滿口燥者以病發時火劫其汗兩熱相搏然黃家所得從濕故一身盡發熱而黃如肚熱者熱在裡也當下之用調胃承氣湯諸黃腹痛而嘔者宜小柴胡湯黃疸小便色不變欲自利腹滿而喘不可除熱熱除必噦小半夏湯主之諸疸小便色白不可除熱者無熱也若有虛寒證者當作虛勞治之男子黃大便自利當與小建中湯諸疸小便黃赤色者為濕熱額上黑微汗出手足中熱薄暮則發膀胱急小便自利名曰女勞疸腹如水狀不治黃疸之病當以十八日為期治之十日已上宜瘥反劇為難治疸而渴者難治疸而不渴者可治發於陰部其人必嘔發於陽部其人振寒而熱酒疸下之久久變為黑疸目黃面黑心中如啖蒜齏狀大便正黑皮膚爪之不仁其脈微弱雖黑微黃故知難治黃家日晡時發熱而反惡寒此為女勞得之膀胱急少腹滿一身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便黑或時溏此女勞之病非水也腹滿者難治硝石散主之蔭按吳氏曰疸分五症始於仲景之金匱要略此先聖示人以博也不必分五同是濕熱此後賢示人以略也雖然丹溪翁之言不能無弊使後之學者宗其言至於舉一而廢百宜乎視仲景之堂若登天也故古方治疸有吐者有汗者有下者有寒者有溫者有潤者有燥者有軟堅者有消導者有逐血者今曰不必分五則仲景之門猶不入奈何而窺百家之奧乎李氏曰發黃譬如𨠭曲五疸同歸濕熱蓋濕熱熏蒸血熱土色上行面目延及爪甲身體俱黃黃即疸也黃疸須知有乾溼干黃熱勝色黃而明大便燥結濕黃濕勝色黃而晦大便潤利又濕病與黃病相似但濕病在表一身盡痛黃病在裡一身不痛凡疸以十八日為期十日以外入腹喘滿渴多而黑者死要知疸兼雜症最多脾胃稍實更斷厚味可治酒色傷恣口腹者難汗出染衣亦黃身腫者曰黃汗因陽明表熱多汗帶汗入水宜桂枝苦酒湯耆陳湯小溺面目牙齒肢體如金曰黃疸因暴熱用冷水洗浴熱留胃中故食已善飢安臥懶動宜茵陳三物湯加木通瓜蔞仁石膏或單桃根煎湯服之食已頭眩腹脹曰谷疸因胃熱大飢過食停滯胸膈宜小柴胡湯加穀芽枳實山梔或谷疸丸紅丸子傷冷食肢厥者四逆湯加茵陳心胸懊憹欲吐不食腹如水狀足心熱脛滿面發赤斑眼黃鼻癰曰酒疸因大醉當風入水酒毒留於清道初起令病人先含水後以瓜蒂末一字搐鼻吐出黃水次服葛術湯探吐亦可熱者小柴胡湯加茵陳白朮豆豉乾葛黃連澤瀉便閉者梔豉枳實湯加大黃或酒蒸黃連丸如酒後犯房瘀熱入心疸者妙香散痰火入肺成疸咳嗽見血喉腥及婦人血崩龍腦雞蘇丸額上黑微汗手足心熱薄暮即發膀胱小便不利曰女勞疸因大熱犯房入水腎虛從脾土上行虛者四白湯秦艽飲子小菟絲子丸熱者枯礬硝散滋腎丸諸疸發於陰經必嘔小半夏湯發於陽經必有寒熱小柴胡湯加山梔內虛發黃口淡怔忡耳鳴腳軟微寒發熱白濁氣虛四君子湯血虛四物湯合四苓散加茵陳麥門冬氣血俱虛人參養榮湯八味丸如飲食勞役失節中寒生黃者黃耆建中湯理中湯食積者二陳湯加砂仁凡時行感冒及伏暑解毒未盡蓄熱在內及宿食未消皆能發黃大要時疫瘧利發黃瘴疸丸風證色黃帶青小柴胡湯加茵陳寒證色黃帶黯理中湯加茵陳青皮枳實無汗者用麻黃三錢酒煎溫服以汗之暑熱證色黃帶赤五苓散加茵陳最妙瘀血發黃喜狂喜忘便黑詳傷寒治疸表證小柴胡湯微汗之表少里多者茵陳五苓散滲之半表裡者梔子柏皮湯茵陳三物湯一清飲子和之裡急者茵陳湯下之就中尤以滲利為妙通用五苓散為主濕多倍茵陳食積加三稜蓬朮砂仁神麯熱加芩連草龍膽小便不利加山梔胃弱合平胃散去厚朴加茵陳山梔防己枳實疸屬脾胃不可驟用涼藥傷胃輕則嘔噦重則喘滿又酒疸下之則成黑疸不渴便利者俱宜六君子湯加茵陳蒼朮山藥以溫中甚者小溫中丸大溫中丸退黃丸若虛損猶宜滋補肝腎真陽之精一升而邪火自斂若必用茵陳強利小便枯竭肝津腎水則疸病幸痊而雀目腫脹又作慎之脈法脈經曰凡黃候寸口脈近掌無脈口鼻黑色並不可治脈沉渴欲飲水小便不利者必發黃也酒疸者或無熱清言了了腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之酒疸下之久久為黑疸目青面黑心頭如啖蒜齏之狀大便正黑皮膚四肢不仁其脈浮弱顏黑微黃故知難治谷疸寸口脈微而弱微則惡寒弱則發熱當發不發骨節疼痛當煩不煩而極汗出趺陽脈緩而遲胃氣反強飽則煩滿滿則發熱消穀食已則飢谷強肌瘦名曰谷疸陽明病脈遲者食難用飽飽則發寒熱頭眩者必小便難此欲作谷疸雖下之腹滿如故趺陽脈緊而數數則為熱熱則消穀緊則為寒食則滿也尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食已則眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸脈訣舉要曰五疸實熱脈必洪數其或微澀症屬虛弱治黃汗方桂枝加黃耆湯治黃汗身體疼重發熱兩脛自冷此方主之桂枝二錢芍藥三錢甘草炙一錢黃耆三錢生薑五片大棗二枚上作一服水煎食遠服仍飲熱粥以助藥力黃汗者汗出皆黃沾衣有色也得之汗出時入水取浴水從汗孔入濕鬱於表故病黃邪傷其衛故自汗濕熱相搏故身體疼重而發熱病原寒水所傷寒氣屬陰水性就下故兩脛自冷客者除之故用桂枝之辛甘以解肌表之邪泄者收之故用芍藥之酸寒以斂榮中之液虛以受邪故用黃耆之甘溫以實在表之氣辛甘發散為陽故生薑甘草可以為桂枝之佐乃大棗者和脾益胃之物也黃耆湯治黃汗身體腫發熱不渴汗出染衣黃色黃耆去蘆蜜炙赤芍藥茵陳蒿各二兩石膏四兩麥門冬去心豆豉各一兩甘草炙半兩上㕮咀每服五錢水一盞生薑三片煎七分溫服不拘時桂枝苦酒湯治黃汗身腫發熱黃耆三錢芍藥桂枝各八分上水煎入苦酒三匙初服當心煩以苦酒阻故也至六七日稍愈一方用好酒代苦酒如腰以下無汗強痛不食煩躁小便不利本方用桂枝加甘草四分姜煎微汗未汗再服治黃疸方丹溪治黃疸方疸症不必分五同是濕熱此方主之黃芩炒黃連炒梔子炒黑茵陳豬苓澤瀉蒼朮制青皮去穰炒草龍膽各五分谷疸加三稜蓬朮縮砂陳皮神麯上切作一服水煎服蔭按用芩連梔子龍膽之苦所以去熱豬苓澤瀉之淡所以去濕茵陳蒿氣微寒而味苦平為陰中之陽則兼濕熱而治者也故為黃家君主之藥蒼朮所以燥濕青皮所以破滯而谷疸諸品之加乃推陳致新之意也茵陳五苓散治傷寒或伏暑發黃小便不利者此方主之茵陳豬苓茯苓澤瀉白朮各一錢官桂少許一方去桂名加減五苓散上為細末十分和勻先食飯後服方寸匕日三服一云薑棗煎蔭按熱病小便不利濕熱內蓄勢必發黃茵陳黃家神良之品也故諸方多用之豬苓澤瀉茯苓白朮味平而淡故可以導利小水官桂之加取其辛熱能引諸藥直達熱邪蓄結之處經曰甚者從治此之謂也茵陳茯苓湯治發黃小便澀煩躁而渴者此方主之茵陳二錢茯苓豬苓桂枝各一錢滑石一錢半上銼水煎服蔭按熱在內其熱不得泄越故發黃小便澀者熱之所注也煩躁者熱犯上焦清陽之分也渴者邪熱蒸灼不能生液潤喉也是方也茵陳主治黃疸佐以茯苓豬苓則利佐以滑石則利熱佐以桂枝則同氣相求直達邪熱之巢穴內熱既去則津液自生氣自化小便自利煩渴自解身黃自除矣茯苓滲濕湯治黃疸氣熱嘔吐而渴欲飲冷身體面目俱黃小便不利不得安臥不思食白茯苓五分茵陳蒿六分澤瀉豬苓各三分黃芩生黃連山梔防己白朮蒼朮陳皮青皮各二分上㕮咀水煎空心服谷疸去黃芩加枳實一方無黃芩青皮有秦艽葛根必效散治黃疸通用葶藶隔紙炒龍膽草山梔子茵陳黃芩各等分上每服一兩水煎溫服不拘時麻黃醇酒湯治黃疸脈浮宜汗之麻黃三兩上用好清酒五升煮取二升五合頓服盡冬月用酒煮夏月用水煮瓜蒂散諸疸腹滿欲吐鼻燥脈浮者宜以此方吐之瓜蒂赤小豆淡豆豉各五分上為細末水調服一方用瓜蒂二十七枚以水一升煮取五合去渣頓服蔭按但腹滿欲吐邪在上也鼻燥者邪在氣分也脈浮者邪未盡入於裡也吐中有發散之義故吐於浮脈正宜瓜蒂苦而善湧赤小豆平而解熱淡豆豉腐而勝燥此古人之宣劑好如頭額兩太陽痛者令病人噙水一口以瓜蒂散一字吹入鼻中泄出黃水而愈小柴胡湯諸黃腹痛而嘔者宜以此和解之柴胡二錢黃芩一錢半半夏七分甘草五分人參七分上銼一劑生薑三片棗二枚水煎服茵陳梔子大黃湯治發黃小便赤澀大便秘結者此方主之茵陳一兩梔子三枚大黃三錢半上切作一服水三盞煎至盞半溫服蓋茵陳苦寒能利黃疸梔子瀉火屈曲而下能療小便之赤澀大黃能攻大便之秘結大小既利則濕熱兩泄而黃自除矣大黃硝石湯治黃疸腹滿小便不利而赤自汗出此為表和裡實當下之大黃黃柏硝石各四兩梔子十五枚上水煎將熟納硝石頓服黃連散治黃疸大小便秘澀壅熱累效大黃醋拌炒黃連各二兩黃芩甘草炙各一兩上為極細末每服二錢食後溫水調下日三服先用瓜蒂散搐鼻取下黃水卻服此藥搐鼻瓜蒂散治黃疸遍身如金色累效瓜蒂二錢母丁香一錢黍米四十九粒赤小豆半錢上先將瓜蒂為末次入三味再碾至夜令病人先含水一口將藥半字搐入鼻內待吐下水便睡至半夜或次日取下黃水直候利水止即服黃連散或茵陳五苓散病輕者五日病重者半月見效葶藶苦參散治濕熱內甚小便赤澀大便時秘飲食少進諸藥不效因為久黃苦參黃連瓜蒂黃柏大黃各一兩葶藶二兩上為細末每服一錢半清米飲調下以吐利為度隨時看虛實加減梔子柏皮湯治發黃身熱不止大小便利者此方主之梔子十五枚黃柏二兩甘草一兩上切作一服水煎服蔭按發黃身熱不止者陽邪未去也大便利故不用大黃小便利故不用五苓但以梔子柏皮之苦勝其熱甘草之甘緩其勢則治法畢矣治谷疸方茵陳梔子湯治谷疸茵陳一錢茯苓五分山梔仁蒼朮炒白朮各三錢黃芩生六分黃連枳實炒豬苓去皮澤瀉防己陳皮各二分青皮一分上㕮咀作一服用長流水煎食前溫服二服可愈梔子大黃湯發黃身熱腹痛右關脈滑者名曰谷疸此方主之亦治酒疸心中懊憹或熱痛山梔十四枚大黃二兩枳實五枚豆豉一升上以水三升煎至二升分三服蔭按夫發黃身熱少火鬱也腹痛右關脈滑水穀積也故用枳實大黃攻其水穀之積梔子豆豉解其少火之郁又曰梔子豆豉仲景嘗用之以吐懊憹枳實大黃仲景嘗用之以吐胃實故酒疸欲吐谷疸腹痛此方皆主之茵陳散治黃疸食已即飢身體面目爪甲牙齒及小便悉黃寒熱或身體多赤多青皆因酒食過度為風濕所搏熱氣鬱蒸而成茵陳木通大黃炒梔子各一兩石膏二兩瓜蔞一個甘草炙半兩上㕮咀每服五錢生薑五片蔥白一莖水煎不拘時服如大小便秘加枳實赤茯苓葶藶茯苓加減湯治胃疸積熱食已輒飢而黃瘦胸滿脅脹小便悶赤赤茯苓陳皮去白澤瀉桑白皮各三兩赤芍藥白朮各四兩人參官桂各二兩石膏八兩半夏六兩湯洗生薑制焙上為末每服三錢水一盞生薑十片同煎至八分去渣不拘時服如病甚者加大黃朴硝各三兩谷疸丸專治谷疸苦參三兩龍膽草一兩牛膽一個上為細末用牛膽汁入少煉蜜丸如桐子大每服五十丸空心熟水或生薑煎湯送下小溫中丸治黃疸與食積又可制肝燥脾脾虛者以白朮作湯使白朮五兩山楂二兩苦參二兩夏加冬減蒼朮吳茱萸一兩冬加夏去川芎夏減神麯各半斤香附一斤童便浸針砂十兩炒紅醋淬七次再炒另研上為細末醋糊丸如桐子大每服七八十丸食前鹽湯下一方有梔子無白朮山楂苦參茱萸大溫中丸治食積黃腫此調理谷疸酒疸之方也蒼朮米泔浸七日厚朴薑汁炒青皮陳皮去白三稜醋炒蓬朮醋炒各五兩香附一斤醋炒甘草炙一兩針砂二兩醋炒紅七次一方有黃連苦參白朮各五兩上為細末醋糊和丸如梧桐子大每服五十丸空心薑湯下午後薑湯下臨睡溫酒下忌犬肉果菜或云以上二方用針砂不如以青礬代之為妙棗礬丸谷疸身目俱黃此方亦良綠礬半斤火煅通紅棗肉二斤煮去皮搗爛平胃散四兩為衣上共和為丸如桐子大每服三十丸食後薑湯下一方用白礬不用綠礬一方無平胃散蔭按夫水穀癖積於中抑遏肝腎之火久久鬱熱故身目俱黃是方也綠礬鹹寒能軟痰癖而勝濕熱棗肉甘溫能益脾胃而補中宮平胃散者蒼朮厚朴陳皮甘草也蒼朮厚朴所以平胃家敦阜之氣而除積飲陳皮甘草一以利氣一以和中乃調胃之意也針砂丸治谷疸酒疸濕熱發黃等症針砂半斤煅醋淬三次蒼朮四兩米泔浸一宿當歸芍藥川芎各一兩半生地黃二兩薑汁炒香附厚朴薑製神麯炒麥芽炒去面茵陳各一兩青皮陳皮各一兩半三稜蓬朮各二兩薑黃山梔炒升麻乾漆炒無煙各五錢上為細末醋糊丸如桐子大每服六七十丸薑湯下茶黃丸治黃病愛吃茶白朮蒼朮各三兩石膏白芍藥黃芩南星陳皮各一兩薄荷七分上為末砂糖水煮神麯為丸砂糖水下一方石膏白芍黃芩三味水煎服米黃散治黃病愛吃生米白朮一錢半蒼朮一錢三分陳皮白芍藥神麯麥芽山楂茯苓石膏各一錢厚朴七分藿香五分甘草三分上水煎臨服入砂糖一匙調服四寶丹治黃病吃生米茶葉黃泥黑炭使君子肉二兩檳榔南星薑汁製各一兩以上三味諸證通用生米麥芽一斤炒黃泥用壁土一斤炒用黑炭一斤炒上為末用煉蜜丸如桐子大每服五十丸清早砂糖水送下大效治酒疸方葛根湯治酒疸葛根二錢枳實炒山梔豆豉各一錢甘草炙五分上水一鍾煎七分溫服不拘時加減五苓散治飲酒伏暑郁發為疸煩渴引飲小便不利茵陳赤茯苓豬苓白朮澤瀉各二錢上作一服水煎服不拘時酒煮茵陳湯治酒疸遍身眼目發黃如黃金色者茵陳一兩上用好酒一鍾半煎至八分食遠溫服不數服而愈加味小柴胡湯治酒疸本方加茵陳豆豉大黃黃連葛根水煎服梔子大黃湯治酒疸心中懊憹或熱痛方見前谷疸方半濕半熱湯治酒疸身體無熱靜言了了腹滿欲嘔心煩足熱或有癥瘕心中懊憹其脈沉弦緊細半夏茯苓白朮各七分前胡枳殼麩炒黃色甘草炙大戟各五分黃芩茵陳當歸各三分上細切作一服入生薑三片水煎溫服當歸白朮湯治酒疸發黃心下有痃癖堅滿身體沉重妨害飲食小便赤黃此因內虛飲食生冷脾胃痰結所致白朮茯苓各一錢當歸黃芩茵陳各二分半前胡枳實甘草杏仁各六分半夏炮八分上作一服加生薑三片水煎溫服牛黃散子治酒疸食黃及水氣蠱證面目甚黃遍身浮腫肚大如盆黑牽牛春八分夏九分秋七分冬四分大黃春八分夏九分秋七分冬一錢檳榔春八分夏九分秋七分冬四分甘草春八分夏九分秋七分冬四分上為細末每服五錢五更時面東南用井花水調服疾隨下而不動面朝太陽吸氣三口疾速下蠱證全消酒疸宿食俱愈忌生冷發物後服烏藥順氣散一二帖再服十全大補湯數帖治黑疸方礬硝散治女勞疸仲景金匱要略云黃家日晡發熱而反惡寒此為女勞疸得之膀胱急小腹滿額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治此方主之礬石硝石各等分火煅為末上每服二錢以大麥粥湯和服日三服取汗愈若小腸滿急小便不利用滑石石膏各二錢入粳米一撮同煎服之一方治女勞疸茵陳白朮茯苓豬苓澤瀉當歸芍藥甘草滑石麥門冬生地黃姜酒炒上銼水煎服四白湯治色疸白朮白芍藥白茯苓白扁豆人參黃耆炙各一錢甘草炙五分上作一服薑棗煎服白朮湯治酒疸因下後變為黑疸目青面黑心下如啖蒜齏狀大便黑皮膚不仁其脈微而細一云治酒疸及脾經肉疸癖疸勞役疸腎經黑疸白朮桂心葛根各一錢豆豉杏仁炒去皮尖甘草炙各五分枳實三分上作一服水煎食前服熱者去桂術加山梔一錢一方黑疸多死宜急治用土瓜根一斤搗碎絞汁六合頓服當有黃水隨小便出更服之腎疸湯治腎疸目黃渾身金色小便赤澀升麻五分羌活一錢防風五分獨活五分白朮柴胡蒼朮各一錢豬苓一分澤瀉三分白茯苓葛根各五分甘草三分黃柏二分人參神麯各六分上分作二帖水煎食前稍熱服治虛疸方丹溪方治疸脈虛便赤白朮一兩人參豬苓茵陳各半兩澤瀉七錢山梔炒木通各三錢桂枝一錢上銼每服五錢水煎服胃苓湯治黃疸怠倦脾胃不和食少蒼朮厚朴陳皮甘草炙茯苓豬苓白朮澤瀉桂小便赤加滑石上銼水煎服參朮健脾湯治發黃日久脾胃虛弱飲食少思人參白朮各一錢半白茯苓陳皮白芍藥煨當歸酒洗各一錢甘草炙七分上入棗二枚水煎食前服色疸加黃耆白扁豆炒各一錢秦艽飲子治五疸涉虛口淡咽乾發熱微寒秦艽當歸酒浸白芍藥白朮官桂茯苓熟地黃酒蒸陳皮小草川芎半夏湯泡甘草炙各一錢上作一服加生薑五片水煎不拘時服人參養榮湯治五疸腳弱心忪口淡耳響微寒發熱氣急小便白濁當作虛勞治之人參黃耆白朮當歸桂心甘草陳皮各一兩白芍藥三兩熟地黃五味子茯苓各三錢遠志去心五錢上銼每服四錢薑棗煎空心服丹溪方治婦人久勞苦得面黃心悸口苦小便不黃自利食少右脈大於左此虛中為濕也白朮芍藥當歸各五錢黃耆黃芩茯苓人參各三錢陳皮一錢半黃連一錢甘草炙五分上銼分六帖下保和溫中各二十丸補中湯治面黃多汗目眥赤四肢沉重減食腹中時痛咳嗽兩手左脈短右脈弦兼澀右手關脈虛升麻柴胡各二錢歸身二分蒼朮五分澤瀉四分甘草炙八分五味子二十一粒黃耆二錢半神麯三錢紅花少許大麥曲五分上銼作二服水煎食前服治陰黃方茵陳四逆湯治發黃脈沉細而遲肢體逆冷腰以上自汗者此方冷服茵陳二兩附子一枚作八片炮乾薑炮一兩半甘草炙一兩上細切分作四服水煎服蔭按吳氏曰此陰症發黃也陰寒盛於下則戴陽於上故上體見陽症下體見陰症陰盛於下故見陰脈之沉遲兼陰症之四逆陽戴於上故見陽症之發黃上體之自汗也茵陳治黃之要藥故無分於寒熱而用之附子乾薑炙甘草回陽之要品也故有陰寒即用之然必冷服者恐薑附發於上焦陽盛之區而下部陰寒之分反不及也是方也韓祗和李思訓朱奉議咸用之矣使據丹溪翁不必分五同是濕熱之言而執其方以療之則藥與證不相反耶理中加茯苓湯仲景云一婦人年六十歲病振寒轉慄足太陽寒水也呵欠噴嚏足少陽膽也口中津液足陽明不足也心下急痛而疸手少陰受寒足少陰血滯也身熱又欲近火熱在皮膚寒在骨髓也臍下惡寒丹田有寒渾身黃及睛黃皆寒濕也餘證驗之知其為寒溺黃赤而黑又頻數者寒濕勝也病來身重如山便著床枕者陰濕勝也其脈右手關尺命門弦細按之洪而弦弦急為寒加之細者北方寒水雜以緩甚者濕盛出黃色脈洪大者心火受制也左手右按之至骨舉手來實者壬癸腎旺也六脈按之俱空虛者下焦無陽也用藥法先宜以輕劑去其寒濕兼退其洪大之脈以理中加茯苓湯投之按此證雖小便黃赤亦作寒治者蓋以餘證及脈別之也人參白朮甘草乾薑茯苓上水煎熟以冰冷與之此熱因寒用以假寒對足太陽之假熱以乾薑辛熱瀉膀胱之真寒故曰真對真假對假若不愈當朮附湯與之茵陳附子乾薑湯治因天令暑熱冷物傷脾過服寒涼陰氣太勝陽氣欲絕加以陰雨寒濕相合發而為黃其脈緊細按之空虛兩寸脈短不及本位此謂陰症發黃也仲景所謂當於寒濕中求之李氏順云解之而寒涼過劑瀉之而逐寇傷君正此謂也附子三錢炮去皮乾薑炮二錢茵陳一錢二分白朮四分草豆蔻煨一錢白茯苓三錢枳實麩炒半夏制澤瀉各五分橘紅三分上加生薑五片水煎去渣涼服蔭按寒淫於內治以甘熱佐以苦辛濕淫所勝平以苦熱以淡滲之以苦燥之附子乾薑辛甘大熱散其中寒故以為君半夏草蔻辛熱白朮陳皮苦甘溫健脾燥濕故以為臣生薑辛溫以散之澤瀉甘平以滲之枳實苦微寒瀉其痞滿茵陳微苦寒其氣輕浮佐以姜附能去膚腠間寒濕而退其黃故為佐使也服此一二服病去再服理中湯數服氣得平復治時氣發黃方茵陳湯治時行瘀熱在裡鬱蒸不散通身發黃茵陳一兩梔仁一錢半大黃三錢上作一服水煎不拘時服茵陳大黃湯治傷寒大熱發黃面目俱黃小便赤澀茵陳蒿梔子柴胡黃柏黃芩升麻大黃各七分草龍膽三分半上切作一服水煎溫服抵當湯治傷寒熱鬱瘀血內結身黃脈沉細狂言譫語小腹滿小便自利大便黑水蛭三十枚炒褐色虻蟲三十枚去翅足炒桃仁二十枚去皮尖大黃一兩水蛭生池澤兩頭尖小者良腰粗色微赤難死上分作二服水煎服蔭按夫陽邪瘀熱在裡小腹硬滿小便自利而發黃者為蓄血發黃苦走血咸軟堅故用水蛭虻蟲以逐敗血滑利腸寒下熱故用桃仁大黃以下血熱他如桃仁承氣湯亦可酌用瘴疸丸治時行及瘴瘧疫癘忽發黃殺人最急如覺體氣有異者急制服之茵陳山梔大黃芒硝各一兩杏仁六錢常山鱉甲巴豆各四錢豆豉二錢上為末蒸餅為丸如桐子大每服三丸米飲下以吐利為效未效加一丸治黃胖即食勞疳黃褪金丸治黃腫絕妙蒼朮米泔浸白朮各二兩半甘草炙半兩厚朴薑汁拌炒一兩陳皮去白一兩半針砂醋炒紅色香附童便浸各六兩神麯炒黃色麥芽炒微黃各一兩半有塊加三稜蓬朮俱醋煮各一兩半上為細末麵糊為丸每服七八十丸食前用白湯送下忌魚腥酒面生冷之物綠礬丸治黃胖最捷針砂二兩炒紅醋淬綠礬四兩薑汁炒白五倍子半斤神麯半斤炒微黃色上為細末生薑汁煮紅棗為丸如桐子大每服六七十丸溫酒下或米湯亦可蔭按此方神效但愈後宜終身忌蕎麵母豬肉毒物若犯之即死余又嘗見一婦人服此藥後三年不因食物所犯忽無故而死大溫中湯朱先生晚年定者治黃胖香附一斤童便浸春夏一宿秋冬三針砂炒紅醋淬三次一斤苦參春夏二兩秋冬一兩甘草二兩厚朴薑汁炒黑五兩芍藥五兩陳皮三兩山楂五兩蒼朮泔浸五兩白朮茯苓各三兩青皮六兩上俱為細末醋糊為丸如桐子大面黑筋骨露氣實者米飲下五六十丸麵肥白與氣虛羸弱者白朮湯下三四十丸忌一切生冷油膩雞鵝羊鴨生硬並糍粽難化之物服過七日後便覺手掌心涼口唇內有紅暈起調理半月愈暖中丸治黃胖殺肝邪舒脾氣虛者不宜用陳皮蒼朮厚朴制三稜白朮香附各一斤青皮五錢甘草二兩針砂十兩醋炒紅上為末醋糊丸空心鹽薑湯下五十丸晚食前酒下亦可忌狗肉棗礬丸治食勞身目俱黃綠礬不拘多少置砂鍋內炒通赤用米醋點之燒用木炭上研細紅棗肉為丸如桐子大每服五十丸食後薑湯下又小溫中丸治黃胖宜草野貧賤人服蓋其飲食無積但補陰燥濕而已針砂一斤以醋炒為末糯米炒極黃為末一斤上醋糊丸如桐子大每服四五十丸米飲下忌口同前輕者服五兩重者不過七兩愈皂礬丸治黃胖綠礬六兩用米醋於鐵鍋內煮七次以干為度置地上出火氣為末南星一兩為末炒麵一兩大皂角二斤水煮熟揉出膿膠去皮渣濾過再熬入棗子六兩蒸熟去皮核煎成濃膏上共搗和為丸如桐子大每服五丸早晚用薑湯各一服忌油膩煎煿如身上發紅斑時急煎棗湯服之斑自愈紫金丹治男婦患食勞氣勞遍身黃腫欲變成水及久患痃癖小腸膀胱面目忽黃膽礬三錢黃蠟二兩大棗五十枚上以砂鍋或銀石器內用好醋三升先下礬棗慢火熬半日取出棗去皮核次下蠟再慢火熬一二時如膏好入蠟茶二兩同和丸如桐子大每服二三十丸茶酒任下如久患腸風痔漏陳米飲下日三服一日見效宗室趙彥材下血面如蠟不進食蓋病酒也授此方服之終劑血止面鮮潤食亦倍常新安一士人亦如是與三百粒作一服立愈一方治食氣遍身黃胖氣喘食不進心胸渴悶皂角不蛀者去皮及子好醋塗炙令焦為末一錢巴豆七粒去油膜上二味以淡醋研好墨為丸如麻子大每服三丸食後陳皮湯下日三服隔一日增一丸以利為度常服消酒食丹溪方一婦年三十面黃腳痠弱口苦喜茶月經不勻且多倦怠黃耆三分白朮一分黃柏炒秦艽各二分甘草三分木通陳皮各五分芍藥人參當歸各一錢上作一服水煎服又方一婦年六十面黃倦甚足酸口苦脈散而大此濕傷氣也白朮五錢陳皮四錢蒼朮木通黃芩各一錢砂仁人參川芎各二錢黃柏炒一錢甘草炙五分上分六帖水煎食前服又方一人痞後面黃腳痠弱倦怠食飽氣急頭旋黃耆二分蒼朮一錢白朮一錢半木通二錢甘草炙二分黃柏炒三分厚朴制一分陳皮一錢上作一服水煎服又方一人面黃腳痠無力食不化脈虛而少弦口苦肚脹宜補之蒼朮五分木通三分白朮一錢半當歸芍藥陳皮川芎各五分甘草炙二分人參三分上作一服水煎下保和丸四十丸以上諸方俱系除濕補氣之劑虛人疳黃宜選用之治目黃方目黃而身不黃青龍散治風氣傳化腹內疼結而目黃風氣不得泄為熱中煩渴引飲地黃姜酒炒威靈仙防風荊芥穗何首烏去黑皮米泔浸一宿竹刀切各二兩上為末每日三服食後沸湯調下一錢一方治黃疸目黃不除用瓜丁為細末如豆大納鼻中令病人深吸取鼻中黃水出愈
