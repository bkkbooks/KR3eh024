一盞去渣溫服接續三四日有汗慎風和血散痛湯治頭骨痛兩手指及兩膝換痛發時多則五日少則三日晝輕夜重羌活麻黃去節升麻各一錢半桃仁十個柴胡二錢防風黃柏知母各一錢豬苓黃連酒炒各五分防己六分甘草炙二分歸身紅花各一分上㕮咀作四服水煎空心熱服薏苡仁散治濕傷腎腎不養肝肝自生風遂成風濕流注四肢筋骨或入左肩膊肌肉疼痛漸入左指中薏苡仁一兩當歸小川芎乾薑茵芋甘草官桂川烏防風人參羌活白朮麻黃獨活各半兩上為細末每服二錢空心臨臥酒調下日三服附子八物湯治歷節風四肢疼痛如錘鍛不可忍附子炮去皮臍乾薑炮芍藥茯苓半夏桂心人參各三兩白朮四兩銼散每服四錢水煎食前服牛蒡子散治風熱成歷節攻注手指作赤腫麻木甚則攻肩背兩膝遇暑熱或大便秘牛蒡子新豆豉炒羌活各三兩生地黃一兩半黃耆一兩半上為細末湯調二錢空心食前日三服犀角湯治熱毒流入四肢歷節腫痛犀角二兩羚羊角一兩前胡黃芩梔子仁射干大黃升麻各四兩豆豉一升上㕮咀每服五錢水煎服千金方治遊風行走無定或有盤大或如甌或著腹背或著臂或著腳悉治之海藻茯苓防風獨活附子白朮各三兩大黃五兩鬼箭羽當歸各二兩上㕮咀以水二斗漬五日初服二合漸加以知為度一粒金散治腰膝走注疼痛如虎咬之狀不可忍者草烏頭五靈脂各四兩木鱉子去殼白膠香地龍去泥土各一兩當歸沒藥各五錢乳香京墨各二錢半麝香二分半上為細末糯米糊丸桐子大每服一二丸多至三丸溫酒下微汗神效麝香丸治痛風走注狀如蟲齧川烏大者三個生用全蠍二十一個生用黑豆二錢半生用地龍五錢生用麝香半字上為細末糯米糊丸如綠豆大每服七丸甚者十丸夜臥令膈空溫酒下微冷汗一身便瘥趁痛丸治走注歷節諸風軟痛及卒中倒地跌撲傷損草烏頭不去皮三兩熟地黃或生用南星半夏曲白殭蠶烏藥各半兩上為末酒糊丸如桐子大每服五七丸空心溫酒下如卒中倒地薑汁清茶研五七丸灌下立醒如跌撲傷損薑汁和酒研十數丸塗傷處八珍丸治痛風走注腳氣頭風乳香沒藥代赭石穿山甲生用各三錢羌活草烏生用各五錢全蠍二十一個炒川烏生用一兩不去皮尖上為末醋糊丸如桐子大每服二十一丸溫酒送下龍虎丹治痛風走注或麻木不遂或半身痛草烏蒼朮白芷各一兩為粗末用童便薑蔥汁拌發熱盦過當歸牛膝各五錢乳香沒藥各二錢另研上為末酒糊丸如彈子大每服一丸溫酒化下捉虎丹一名一粒金丹治一切風疾走注疼痛手足癱瘓麻木不仁及白虎歷節等風麝香二錢半京墨煅煙盡一錢半乳香沒藥當歸酒洗各七錢半白膠香草烏去皮臍地龍去土木鱉子去油五靈脂各一兩半上為細末糯米糊丸如芡實大每服一丸溫酒化下遠年近日寒濕腳氣臨發時空服一丸取腳面黑汗出為效如初中風不醒人事牙關不開研二丸酒調灌下茵芋丸治歷節腫滿疼痛茵芋硃砂薏苡仁各一兩牽牛一兩半郁李仁半兩上為細末煉蜜杵丸如桐子大輕粉滾為衣每服十丸至十五丸或二十丸五更溫酒下到晚未利可二三服快利為度白粥將息大豆糵散治周身痹注五臟留滯胃中結聚大豆蘖一升炒香熟為末每服半錢溫酒調下空心加至一錢日三服松節酒治歷節風四肢疼痛松節二十斤酒五斗漬三七日服一合日五六次丹溪云松屬金能滲血中之濕松葉酒治歷節痛松葉三十斤酒二石五斗漬三七日服一合日服五六度治肢節痛方麻黃赤芍湯治濕熱流注肢節腫痛麻黃去根節赤芍藥各一錢防風荊芥羌活獨活白芷蒼朮威靈仙片芩酒炒枳實桔梗葛根川芎各五分甘草當歸尾升麻各三分上銼一服水煎服下焦加酒黃柏婦人加酒紅花腫多加檳榔大腹皮澤瀉更加沒藥一錢定痛尤妙瘀血加桃仁大黃防風天麻散治風濕麻痹肢節走注疼痛中風偏枯或暴僕不語及內外風熱壅滯昏眩此散郁開結宣風通氣之妙劑也防風天麻川芎羌活白芷草烏頭白附子荊芥穗當歸甘草炙各半兩白滑石二兩上為細末每服半錢加至一錢熱酒化蜜少許調下覺藥力運行微麻為度或煉蜜為丸如彈子大每服半丸至一丸熱酒化下白湯亦可大羌活湯治風濕相搏肢節疼痛羌活升麻各一錢獨活七分蒼朮防風威靈仙川歸茯苓澤瀉甘草各五分上切作一服水煎空心溫服趁痛散治瘀血濕痰畜於肢節之間而作痛者若痰帶熱者先以舟車丸導水丸神芎丸下之後以此服之乳香沒藥桃仁紅花當歸地龍酒炒牛膝酒浸羌活甘草五靈脂酒淘香附童便浸上為末每服二錢酒調服或加酒炒黃芩黃柏治臂痛方加味二陳湯治臂痛是上焦濕痰橫行經絡中作痛也陳皮半夏茯苓各一錢甘草三分酒芩羌活各一錢威靈仙三錢南星香附各一錢蒼朮一錢半白朮一錢上銼一服加生薑三片水煎服舒筋湯治臂痛不能舉蓋是氣血凝滯經絡不行所致一名通氣飲子一名五痹湯其效如神羌活片子薑黃甘草炙各二錢白朮當歸赤芍藥海桐皮去外皮各一錢上切作一服加生薑三片水煎去渣磨沉香水少許入內溫服上痛食後腰以下痛食前薑黃散治臂痛非風非痰薑黃四兩白朮二兩羌活甘草各一兩上銼每服五錢水煎服茯苓丸治臂痛如神赤茯苓防風細辛白朮澤瀉官桂各半兩瓜蔞根紫菀附子黃耆芍藥甘草炙各三分生地酒炒牛膝酒浸山茱萸各一兩上為細末煉蜜丸如桐子大每服十丸食前溫酒下一方治臂痛紅花炒神麯炒黃上為末調服一方治臂脛痛不計深淺皆效虎脛骨二兩粗舂熬黃羚羊角一兩屑芍藥二兩細切上三物以無灰酒浸之春夏七日秋冬倍日每日空腹飲一杯冬月速要服即以銀器物盛火爐中暖養之三二日即可服也加味控涎丹治肩背臂痛如神甘遂去心紫大戟去皮白芥子真者木鱉子各一兩桂五錢上為末糊丸桐子大臨臥淡薑湯或熱水下五七丸至十丸古半硝丸治中脘停伏痰飲以致臂痛不能舉左右時復轉移半夏二兩風化硝一兩上為末生薑自然汁打糊丸如桐子大每五十丸薑湯下治肩背痛方通氣防風湯肩背痛不可回顧者此太陽氣鬱而不行以風藥散之脊痛項強腰似折項似拔者此太陽經不通也羌活獨活各一錢藁本防風甘草各五分川芎蔓荊子各三錢上銼水煎服當歸拈痛湯治濕熱為病肢節煩痛肩背沉重胸膈不利及遍身疼痛下注於足脛痛不可忍羌活甘草黃芩酒炒茵陳酒炒各五錢人參升麻苦參酒洗葛根蒼朮各二錢白朮一錢半當歸身知母酒洗防風茯苓澤瀉豬苓各三錢上㕮咀每服一兩水煎空心溫服加減當歸飲子治肩背忽痛當歸防風柴胡生地姜酒炒大黃各一兩半芍藥黃芩人參各一兩黃連半兩滑石六兩甘草一兩三錢上㕮咀每服五錢水煎食後服升麻柴胡湯治肩背痛汗出小便數而少者此風熱乘肺使肺氣鬱甚也當瀉風熱則愈升麻柴胡黃耆各一錢羌活防風人參甘草陳皮各五分藁本三分青皮黃芩白豆蔻各二分上㕮咀作一服水煎通口服如面色白脫氣短者不可服黃耆八珍湯治勞力或看書著棋久坐而致脊背疼者服此或服補中益氣湯人參白朮茯苓甘草當歸川芎芍藥熟地黃砂仁沉香炒黃耆上銼水煎服治項頸強痛方加味二陳湯治項強不能回顧動則微痛其脈弦而數實此痰熱客太陽經也用此治之愈陳皮半夏茯苓甘草黃芩酒洗羌活紅花上銼水煎服養神湯治精神短少不得睡項筋腫急難伸禁甘溫宜苦寒柴胡升麻各四錢黃耆橘皮各一錢甘草半夏各七分蒼朮歸身麥芽黃連各五分人參白朮川芎各三分黃芩酒二分黃柏木香各一分上㕮咀每服五錢水煎稍熱服不拘時木瓜煎治筋急項不得轉側木瓜二個沒藥研二兩乳香研二錢半上將木瓜切蓋子去穰納二味於中用蓋子合了竹籤簽定飯上蒸三四次研爛成膏子每服三五匙用生地黃汁半盞無灰酒二盞和之用八分一盞熱化服本事方云有人患此證自午後發至黃昏時定予曰此患必先從足起經言足十二經絡各有筋惟足太陽之筋自足至項大抵筋者肝之合也日中至黃昏天之陽陽中之陰也又云陽中之陰肝也自離至兌陰旺陽弱之時故靈寶畢法云離至乾腎氣足而肝氣弱肝腎二臟受陰氣故發於是時予授此方三服而愈椒附散治腎氣上攻項背不能轉移大附子一枚六錢重者去皮臍為末上未每服二大錢用好椒二十粒用白曲填滿水一盞半生薑七片通煎至七分去椒入鹽空心服本事方云予一親戚患項筋痛連背髀不可轉移服諸風藥皆不效予嘗憶千金髓有腎氣攻背強一證予處此方與之一服頓瘥自爾與人皆無不驗蓋腎氣自腰夾脊上至曹溪穴然後入泥丸宮曹溪一穴非精於搬運者不能透今逆行至此不得通用椒以引歸經則安矣氣上達椒下達故服之愈一方治風項強不得顧視穿地作坑燒令通赤以水灑之令冷納生桃葉鋪其席下臥之令項在葉上以衣著項邊令氣上蒸病人汗出良久即瘥又方治頭項強不得顧視蒸黑大豆一升令變色納囊中枕之治腳腿痛方萆薢丸一名加味二妙丸治兩足濕痹疼痛或如火燎從足跗熱起漸至腰腿或麻痹痿軟皆是濕病此藥主之蒼朮米泔浸四兩黃柏酒浸曬乾二兩萆薢酒浸二兩牛膝酒洗當歸酒洗防己酒浸龜板酒浸三日酥炙虎脛骨酥炙各一兩痿病加肉蓯蓉菟絲子各一兩上為細末酒煮麵糊為丸如桐子大每服一百丸空心淡鹽湯下甜瓜子丸治風濕相搏腰腿疼痛甜瓜子炒二兩木瓜一兩半威靈仙一兩川烏五錢上為末酒糊丸如桐子大每服三十丸溫酒下五積散桔梗去蘆十二兩蒼朮米泔水浸去粗皮二十四兩陳皮去白麻黃去根節枳殼麩炒各六兩厚朴姜炒乾薑各四兩白芷川芎甘草炙茯苓去皮肉桂芍藥當歸各三兩半夏湯泡七次二兩上㕮咀每服四錢加薑蔥水一盞煎七分熱服蔭按風寒濕入於經絡以致氣血凝滯津液留停久則怫鬱堅牢阻礙榮衛難行正邪相爭故作痛也須開鬱行氣破血豁痰則怫鬱開榮衛行而病自已也蓋怫鬱者有形之物也即痰與血也以上諸方有偏於豁痰者有偏於破血者有均治痰血者學者對證施治庶無誤矣
