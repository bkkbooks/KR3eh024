body:
  text: 卷七十八痛風論準繩云肢節腫痛痛屬火腫屬濕兼受風寒而發動於經絡之中流注於肢節之間用麻黃去節赤芍藥各一錢荊芥防風羌活獨活白芷蒼朮威靈仙酒片芩枳實桔梗葛根川芎各五分當歸甘草升麻各二分下焦加酒黃柏腫多加檳榔大腹皮痛多加沒藥婦人加酒紅花又云臂痛者臂為風寒濕所搏或飲液流入或因提挈重物皆致臂痛有腫者有不腫者除飲證外其餘諸痛宜五積散或蠲痛湯或烏藥順氣散因提重傷筋用劫勞散或和氣飲加薑黃半錢以薑黃能入臂故也因坐臥為風濕所搏或睡後手在被外為寒邪所襲遂令臂痛宜五積散及蠲痹湯烏藥順氣散審知是濕蠲痹湯每服加蒼朮三匙防己四分或用五痹湯有飲酒太過濕痰流注者用二陳湯加南星蒼朮桔梗枳殼桂枝酒黃芩有血虛不榮於筋者用蠲痹湯四物湯各半帖和勻煎服有氣血凝滯經絡不行所致者宜舒筋湯東垣云肩背痛不可回顧此手太陽氣鬱而不行以風藥散之準繩云脊痛項強腰似折項似拔沖頭痛此足太陽經不行也羌活勝濕湯主之有因濕熱相搏肩背沉重而疼者當歸拈痛湯有風寒汗出肩背痛中風小便數而欠伸者風熱乘其肺使肺氣鬱甚也當瀉風熱宜通氣防風湯主之有痰飲流注肩背作痛者宜星香散或導痰湯有腎氣不循故道氣逆挾背而上致肩背作痛宜和氣飲加鹽炒小茴香五分炒川椒十粒有看書對奕久坐而致脊背疼者補中益氣湯或八物湯加黃耆丹溪云腳跟痛有血熱有痰血熱者四物湯加黃柏知母牛膝之類痰用五積散加木瓜李氏曰痛風歷節須分勇怯形瘦怯者多內因血虛有火形肥勇者多外因風濕生痰痛多痰火腫多風濕然痰火雖內因六慾七情或病後亡津血熱已自沸騰亦必略感外邪而後發動骨節痛極久則手足蜷攣風濕雖外因涉冷坐濕當風取涼然亦必血熱而後凝滯汙濁所以作痛甚則身體塊瘰痰火風濕全者古龍虎丹主之傷寒周身節痛乃風寒侵入肌骨雜病周身痛者乃風痰壅滯二陳湯加南星羌活蒼朮白芷酒芩竹瀝薑汁或挾瘀血者再加桃仁紅花濕痰瘀血周身兩脅走痛者控涎丹加桃仁泥為丸或小胃丹下之如半身不遂及左右手足蜷攣者烏頭湯微汗之虛者地仙丹詳中風門上體痛者宜祛風熱豁痰二陳湯主之痰熱客太陽頸項強動則微痛者加酒芩羌活紅花濕痰鑽注肢節痛二朮威靈仙乾薑黃柏羌活白芍藥結陽肢腫者倍加黃芩濕痰橫行手臂痛加南星蒼朮酒芩香附威靈仙臂重難舉者加二朮羌活桂枝威靈仙黃芩臂軟難舉者加南星枳實木香薑黃如臂痛不能舉或連指掌腫痛者舒筋湯肩忽痛者小柴胡湯去半夏加防風當歸生地黃大黃黃連滑石肩背痛因食積者單龜板為丸薑湯下肩腿痛者用龜板一兩側柏葉香附各五錢白芥子凌霄花各一錢半為末酒糊丸四物湯加甘草陳皮煎湯下背心常一片冰冷者導痰湯合蘇子降氣湯下體痛者宜流濕行氣四物湯主之陰虛臀尖痛者膀胱有火加知母黃柏及桂少許有痰合二陳湯加澤瀉前胡木香為引痛甚加乳香沒藥熱者大承氣湯下之兩腿痛者加牛膝陳皮吞加味三妙丸兩腿痛甚素虛性急或痢後血流經絡作痛者加桃仁牛膝陳皮甘草薑汁煎熟調潛行散如兩腿間忽一二點痛入骨不可忍者用莞花根為末醋調敷痛處以帕緊扎產後有此疾者亦宜兩足痛者當歸拈痛湯凡痛風丸散佐使在上加羌活威靈仙在下加牛膝防己木通黃柏在手臂加桂枝引至痛處如遍身痛者則問所起處加之風痛百節痠疼無定處久則變成風毒痛入骨髓不移其處虎骨散麝香丸如赤腫灼熱者敗毒散肢節腫痛挾濕熱者麻黃赤芍湯主之外因濕證腫滿身痛如脫者除濕湯寒濕者附子六物湯捉虎丸濕熱者五芩散加蒼朮防風羌活白芷黃柏竹瀝薑汁走注者四妙散肢節腫脈滑者加南星木香檳榔蒼朮黃柏防己濕氣背傴僂足攣成廢者用甘遂一錢為末入豬腰內煨食之上吐下瀉風證黃汗出面微紅掣痛熱者防風通聖散或小續命湯去附子加羌活黃芩虛者烏藥順氣散獨活寄生湯上體金棗丹下體換腿丸風中肩背太陽氣鬱不可回顧或肺氣鬱熱小便數而欠伸宜通氣防風湯羌活勝濕湯風濕相搏痛者甜瓜子丸神仙飛步丹龍虎丹活絡丹乳香黑虎丹活血應痛丸風濕毒生瘡者單蒼耳加羌活防風十分之二為末蜜丸桐子大每服百丸酒下或單豨薟丸一斤加四物湯料各五錢防風羌活各三錢烏藥一錢半為末蜜丸空心茶酒任下風寒濕熱成痹臂髀腰腳骨熱腫痛行步艱難者二妙蒼柏散等分加虎脛骨減半為末水調服暑濕相搏面赤尿赤者五苓散合敗毒散加當歸赤芍或復元通聖散結陽肢腫熱毒流注大便閉者犀角湯痛證肢節掣痛小筋急痹者五積散合順元散加麝一釐鶴膝痛者五積散加松節杉節骨髓痛者虎骨散內因七情肢節胸脅刺痛初必眩暈自汗二陳湯加香附枳殼木香如腰背氣動發痛者枳甘散流氣飲子俱加蔥白煎服後臥少時如思慮傷心痛從背起至胸脅者用人參四分木通二分煎湯吞當歸龍薈丸飲食積痛風初必胸滿嘔吐二陳湯加烏藥枳殼或單蒼耳丸因食厚味積痰脾胃髀樞左右發痛一點延及膝骭即脛骨也腫大惡寒夜劇者潛行散為主加甘草梢蒼朮犀角川芎陳皮牛膝木通白芍入薑汁煎服病稍減去犀角加牛膝龜板歸身尾冬月加桂夏加黃芩又有遍身遊走癢痛狀如蟲齧遇癢而進飲食則蟲亦饜飫其間庶不致頻頻齧也宜麝香丸留飲四肢歷節氣短脈沉久則令人骨節蹉跌恐為癲癇宜導痰湯加減痰飲者古半硝丸氣短倦怠者六君子湯加南星酒濕痛者用黃柏威靈仙各五分蒼朮二錢陳皮芍藥各一錢甘草三分羌活二分水煎服血氣虛勞不能榮養關節腠理作痛者血虛四物湯加龜板秦艽有火者調潛行散有瘀血者加大黃桃仁紅花微利之性急發熱者加酒芩黃柏肢節腫痛脈澀者加桃仁歷年不愈者倍加木通出汗或發紅丹即愈若不愈者痛風丸二妙蒼柏散三妙丸氣虛歷節痛如錘鍛者四君子湯加桂附白芍血氣俱虛挾痰火者八物湯加羌活防風黃柏龜板勞傷者趁痛散血風丸劫勞散陰虛者虎潛丸補陰丸痛風因外風熱風濕得者初起與傷寒相似宜分表裡治之表證九味羌活湯氣虛表實骨節痛者六一散加香附黃芩水煎或薑汁糊丸服里證五積交加散加大黃痰濕熱者導水丸病愈後大便閉稍虛者麻子仁丸驟痛不可忍者用桑寄生焙乾浸酒常服微醉通用史國公浸酒方萬應膏屬內因者宜消瘀血養新血兼理痰火則血自活氣自和痛無不止又不愈者間用升降之劑或專養血補脾如久病及亡血產後病此者俱不宜純用風藥燥血脈法脈經曰少陰脈浮而弱弱則血不足浮則為風風血相搏則疼痛如掣盛人脈澀小短氣自汗出歷節疼不可屈伸此皆飲酒汗出當風所致也寸口脈沉而弱沉則主骨弱則主筋沉則為腎弱則為肝汗出入水中因水傷心歷節黃汗出故曰歷節也味酸則傷筋筋傷則緩名曰泄咸則傷骨骨傷則痿名曰枯枯泄相搏名斷泄榮氣不通衛不獨行榮衛俱微三焦無所御四屬斷絕身體羸瘦獨足腫大黃汗出脛冷假令發熱便為歷節也病歷節疼痛不可屈伸治遍身痛方羌活鞠藭湯治風寒濕氣感之一身盡痛不能轉側發熱口渴手不能近叫呼不止及腳氣腰腿不能動履百節走注疼痛並皆治之羌活二錢蒼朮米泔浸川芎各一錢五分白芷南星薑汁炒當歸黃芩酒炒黃柏酒炒神麯炒桃仁桂枝各一錢防己紅花各五分在上倍羌活桂枝在下加牛膝木通上銼一服加生薑三片水煎病在上食後病在下空心服痛風丸治上中下疼痛南星薑製蒼朮米泔水浸黃柏酒炒各二兩川芎神麯炒各一兩白芷桃仁各五錢威靈仙酒拌羌活桂枝各三錢防己龍膽草各四錢紅花一錢半上為末曲糊丸如桐子大每服一百丸空心白湯下加味二陳湯治風痰壅滯周身疼痛陳皮半夏茯苓甘草南星羌活蒼朮白芷酒芩上銼水煎加竹瀝薑汁服挾瘀血者加桃仁紅花加味四物湯治白虎歷節風當歸川芎白芍藥熟地砂仁炒桃仁牛膝陳皮茯苓白芷龍膽草甘草上水煎服如痛在上屬風加羌活桂枝威靈仙在下屬濕加牛膝防己木通黃柏氣虛者加人參白朮龜板有痰加南星半夏生薑若血虛者倍當歸川芎佐以桃仁紅花丹溪方治痛風神效赤芍藥青皮威靈仙防風木鱉子各一錢半紫威臺芎各七分半甘草五分上切作一服酒煎服蒼朮復煎散治寒濕相合腦後痛惡寒項筋脊強肩背胛攣痛膝臏痛無力行步能食自覺沉重蒼朮四兩羌活一錢升麻柴胡藁本澤瀉白朮各五分黃柏三分紅花少許上銼為末先將蒼朮用水二碗煎至二大盞去渣下諸藥煎至一盞空心溫服微汗為效忌酒面犀角升麻湯治足陽明經絡受風毒傳入經絡血凝滯下行致鼻額唇頰皆痛犀角一兩升麻防風羌活各三兩川芎白附子白芷黃芩各半兩甘草二錢上銼每服四錢水煎食後臥服日二三次丹溪方治飲酒濕痰痛風黃柏酒炒威靈仙酒炒各五錢蒼朮米泔水浸羌活甘草炙各三錢陳皮去白芍藥各一錢上為末每服一錢或二錢沸湯入薑汁調下二妙散治筋骨疼痛因濕熱者黃柏酒浸焙乾二兩蒼朮米泔浸四兩上為細末沸湯入薑汁調服或用蒸餅為丸姜鹽湯送下二味皆有雄壯之氣表實氣實者加酒少許佐之有氣加氣藥血虛加補血藥痛甚者加生薑汁熱服定痛丸治風濕一切痛乳香沒藥金星草五靈脂地龍去土木鱉子去殼各等分上為細末煉蜜丸如彈子大每服一丸溫酒化下或作小丸亦可活絡丹治諸風濕毒留滯經絡注於腳間筋脈拘攣腰腿沉重一切痛風走注或腳筋吊痛上衝心腹川烏草烏乳香沒藥地龍南星各六兩上為末酒糊丸如桐子大每服二十丸空心冷酒荊芥煎湯任下天麻丹治諸風癱瘓及白虎歷節風烏頭八兩蒼朮四兩荊芥防風天麻各二兩全蠍一兩上為細末用豆腐和勻作餅入銅銚以水滿煮藥至半沉半浮存性為度取出待半乾為丸如桐子大以硃砂為衣臨臥時先嚼木瓜一片以好酒吞下二三十丸服後覺昏沉吐涎痰一二時為效虎骨丸治經絡凝滯骨節疼痛筋脈攣急遇陰寒愈甚乳香另研沒藥另研赤芍藥當歸熟地砂仁炒虎骨酥炙各一兩血蠍二錢半另研上為末用木瓜一枚切破去子入乳香末一錢在內麻纏定毋令透氣用好酒二升煮酒盡取木瓜去皮研爛入蜜杵和為丸如桐子大每服三五十丸酒下定痛丸一名虎骨散治風毒邪氣乘虛攻注經絡之間痛無常處晝靜夜甚不得睡臥筋脈拘攣不得屈伸蒼耳子微炒骨碎補自然銅血竭白附子炮赤芍藥當歸肉桂白芷沒藥防風牛膝各三兩五加皮天麻檳榔羌活各一兩虎脛骨酥炙龜板酥炙各二兩上為細末每服一錢溫酒調服加減虎骨散治白虎歷節諸風骨節疼痛晝夜不可忍者虎脛骨三兩沒藥五錢上為末每服二錢溫酒調服活血丹與四物蒼朮各半湯相表裡治遍身骨節疼痛如神熟地黃三兩砂仁炒當歸白朮白芍藥續斷人參各一兩上為細末酒糊丸如桐子大每服七八十丸仍切四物湯與蒼朮各半水煎間服之張子元方治氣血兩虛有痰濁陰火痛風人參山藥海石南星各一兩白朮熟地砂仁炒黃柏酒炒龜板酥炙各二兩鎖陽乾薑燒灰存性各半兩上為末酒糊丸服潛行散治血虛陰火痛風及腰半以下濕熱注痛黃柏四兩酒浸焙乾上為細末每服三錢煎四物湯調下多服取效趁痛散治產後走動氣血升降失常留滯關節筋脈引急遍身疼痛甚則腰背不能俯仰手足不能屈伸兼治男子痛風牛