body:
  text: 卷二十一關格論關格本於陰陽俱盛經曰邪在六腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰脈不利陰脈不利則血留之血留之則陰氣盛矣陰氣太盛則陽氣不得營也陽陰乖亂不能營行彼此格拒不相通也故曰關陽氣太盛則陰氣弗能營也故曰格陰陽俱盛不得相營故曰關格關格者不得盡期而死也關者不得小便格者吐逆上下俱病也四明陳氏曰腑有邪則陽脈盛臟有邪則陰脈盛陰脈盛者陰氣關於下陽脈盛者陽氣格於上然而未至於死陰陽俱盛則既關且格格則吐而食不下關則二陰閉不得大小便而死矣若臟腑氣和而相營陰不覆陽不溢何關格之有論關格本於陰陽不升降準繩云格則吐逆上竅五臟陰極自地而升是行陽道乃東方之氣金石之變上壅是也極則陽道不行反閉於上故令人吐逆是地之氣不能上行也逆而下降反行陰道故氣填塞而不入則氣口之脈大四倍於人迎此清氣反行濁道也故曰格關則不便下竅六腑陽極自天而降是行陰道乃西方之氣膏粱之物下泄是也極則陰道不行反閉於下故不得小便是天之氣不得下通也逆而上行反行陽道故血脈凝滯而不通則人迎之脈大四倍於氣口此濁氣反行清道也故曰關丹溪云有氣虛不運者補氣藥中升降用補中益氣湯加檳榔使清氣升而濁氣降也戴氏曰胸中覺有所礙欲升不升欲降不降欲食不食此為氣之橫格也論關格本於上寒下熱或云寒在胸中遏絶不入無入之理故曰格熱在下焦填塞不通無出之由故曰關格則吐逆關則不得小便云岐子云陰陽易位病名關格胸膈以上陽氣常在則熱為主病身半以下陰氣常在則寒為主病寒反在胸中舌上白胎而水漿不下故曰格格則吐逆熱反在丹田小便不通故曰關關則不得小便胸中有寒以熱藥治之丹田有熱以寒藥治之若胸中寒熱兼有以主客之法治之治主當緩治客當急尺寸反者死陰陽交者死葉氏曰以上二說一則以為陽在下而陰在上一則以為寒在上而熱在下其說雖相反要之皆病勢之所有也丹溪云寒在上熱在下故多死法當吐以提其氣之橫格不必在出痰也用二陳湯探而吐之吐中便有降辨關格病因與陰陽隔絶之病不同準繩云或問關格之病因何如曰內經以臟腑陰陽之病診見於外者則在人迎氣口謂人迎一盛盛猶倍也以人迎寸口相較或此大於彼或彼大於此而有三倍四倍之殊也病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽人迎侯陽陽脈盛而陰無以通故曰格陽寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰寸口候陰陰脈盛而陽無以交故曰關陰人迎與寸口俱盛四倍以上謂盛於平常之脈四倍也為關格關格之脈羸敗也盛極則敗陰陽離絶不能相營故至羸敗不能極盡也於天地之精氣則死矣注謂格者陽盛之極故格拒而食不得入也關者陰盛之極故關閉而溲不通也靈樞亦嘗三言之其二者皆如內經之論人迎氣口之盛分經脈也但更謂盛者是足經盛而躁者是手經至人迎四盛且大且數名曰溢陽溢陽為外格脈口四盛且大且數名曰溢陰溢陰為內關內關不通死不治人迎與太陰脈口俱盛四倍以上命曰關格關格者與之短期凡刺之道從所分人迎一盛二盛三盛瀉其陽補其所合之陰二瀉一補一盛瀉足少陽補足厥陰二盛瀉足太陽補足少陰三盛瀉足陽明補足太陰瀉者二補者一瀉倍於補也脈口亦然瀉其陰補其所合之陽二補一瀉一盛瀉足厥陰補足少陽二盛瀉足少陰補足太陽三盛瀉足太陰補足陽明補者二瀉者一補倍於瀉也皆以上氣和乃止人迎與脈口俱盛三倍以上命曰陰陽俱溢如是者不開即外關內格也則血脈閉塞氣無所行流淫於中五臟內傷矣一言邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰脈不利陰脈不利則血留之血留之則陰氣盛矣陰氣太盛則陽氣不能榮也故曰關陽氣太盛則陰氣不能榮也故曰格陰陽俱盛不得相榮也故曰關格關格者不得盡期而死也由此而觀前之論人迎寸口者為人迎主外氣口主內故分三陰三陽氣之多寡定一盛二盛三盛而言也若此之不言人迎寸口者殆亦有謂焉何則此因論脈度及之而以手足十二經周行上下者是大經隧然一陰一陽經相為臟腑之表裡者即有支橫之路通其內外臟腑之陰陽氣與之相榮故在兩手寸關尺六部以為診法浮則為腑沉則為臟者於陰陽之盛豈盡從其部而見耶故不復言人迎氣口耳及張仲景之言關格者則可見矣如謂寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆又謂心脈洪大而長是心之本脈也上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死又云趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格蓋胃者水穀之海營之居也營者榮衛之根源營之機不動則衛氣不布衛氣不布則脈伏伏則穀不化而吐逆榮氣不行則脈澀澀則食不入如是皆為外格未見內關之病亦通言為關格矣注乃又以澀脈為脾病且脾者陰臟也脾病則陰盛陰盛當為內關豈以外格其飲食不入耶蓋關格之名義格者拒捍其外入者不得內關者閉塞其內出者不得泄豈不明且盡乎後世妄以小便不通為格大便不通為關泛指在下陰陽二竅者為言及乎陰陽之大法者不復窮已抑非獨此也復有以陰陽隔絶之證通為關格之病者是非錯亂有可嘆焉夫隔絶之證具於內經者有曰隔則閉絶上下不通者暴憂之病也注云憂愁則氣閉塞不行血脈斷絶故大小便不得通有曰病久則傳化之行上下不並良醫勿為又有三陽結謂之隔注云小腸膀胱熱結也小腸熱結則血脈躁膀胱熱結則津液固故隔塞而不便又謂三陽積則九竅皆塞又謂陽蓄積病死而陽氣當隔隔者當瀉不亟正治粗乃敗之原此數條其與關格果何如耶丹溪書云必用吐提其氣之橫格不必在出痰也又云有痰二陳湯吐之吐中便有降中氣不運者補氣藥中升降此蓋竊其治小便之法填於條下蹈世俗之弊而不悟悲夫治驗孫尚藥治奉職趙令儀女忽吐逆大小便不通煩亂四肢漸冷無脈凡一日半與大承氣湯一劑至夜半漸得大便脈漸和翼日乃安此關格之病極為難治垂死而活者惟此一人耳脈法兩寸俱盛四倍以上經曰人迎大四倍於氣口名曰格氣口大四倍於人迎名曰關此謂俱盛四倍蓋以其病甚而至於上則遏絶下則閉塞關格俱病者言也準繩云考之王氏脈經從八十一難謂有太過有不及有陰陽相乘有覆有溢有關有格然關之前者陽動也脈當見九分而浮過者法曰太過減者法曰不及遂上魚為溢為外關內格此陰乘之脈也關以後者陰之動也脈當見一寸而沉過者法曰太過減者法曰不及遂入尺為覆為內關外格此陽乘之脈也故覆溢是其真臟之脈人不病自死大抵亦人迎氣口之互見者也治方止吐透格湯陳皮半夏薑湯泡各二錢茯苓厚朴薑湯炒蒼朮炒各一錢半藿香去土砂仁捶碎白豆蔻捶碎各一錢上銼水二鍾煎七分入生薑汁三匙頻頻徐徐服如火熱者去藿砂豆蔻加薑汁炒黃連山梔竹茹鬱結氣滯者加香附貝母檳榔通關導滯散木香檳榔枳殼麩炒厚朴薑汁炒歸鬚各一錢大黃三錢上銼水一鍾半煎八分食前服如小便不通加瞿麥木通滑石各一錢半或用八正散兩枳二陳湯治關格上焦痰壅兩手脈盛是也陳皮半夏各二錢白茯苓一錢半南星枳殼枳實甘草各一錢上銼一劑水煎服用鵝翎於病人咽喉探吐之如病人虛弱不可用也枳縮二陳湯治關格上下不通枳實麩炒一錢砂仁白茯苓貝母陳皮蘇子炒瓜蔞仁厚朴薑汁炒香附童便炒各七分撫芎八分木香沉香各五分甘草三分上銼一劑加生薑三片水煎入竹瀝磨沉木香服木通二陳湯會編治心脾疼後小便不通皆是痰隔於中焦氣滯於下焦陳皮去白半夏薑製白茯苓甘草木通枳殼上加生薑煎服服後探吐若不吐用加味小胃丹或加味控痰丸柏子仁湯人參半夏白茯苓陳皮柏子仁甘草炙麝香少許另研上加生薑煎入麝香調勻和服加郁李仁妙人參散人參麝香片腦少許上為末甘草湯調服檳榔益氣湯會編治關格勞役後氣虛不運者黃耆人參白朮甘草當歸陳皮升麻柴胡枳殼檳榔多用上銼加生薑煎服導氣清利湯會編治關格吐逆大小便不通人參白朮陳皮半夏白茯苓豬苓澤瀉柏子仁藿香木通梔子甘草檳榔枳殼厚朴薑製黑牽牛大黃麝香少許上銼加生薑煎服兼服木香和中丸吐不止灸氣海天樞如又不通用蜜導藿香胃苓散治關格吐逆上下不通藿香蒼朮厚朴陳皮甘草白朮茯苓豬苓澤瀉各一錢桂五分上銼加薑棗煎服既濟丸會編治關格脈沉細手足厥冷者人參熟附子童便浸各一錢麝香少許上為末飯丸如桐子大麝香為衣每服七丸燈心湯下加味麻仁丸會編治關格大小便不通大黃一兩厚朴薑汁炒當歸白芍藥麻仁杏仁去皮尖南木香檳榔枳殼各五錢麝香少許上為末蜜丸熟水下皂角散治大小便關格不通經三五日者大皂角燒存性上為末米湯調下三錢又以豬脂一兩煮熟以汁及脂俱食之又服八正散加檳榔枳殼朴硝桃仁燈心茶根大承氣湯方見泄瀉門一方治關格脹滿大小便不通用獨頭蒜燒熱去皮紙裹納下部灸法治關格證吐逆而小便不利急宜先灸氣海天樞等穴各三七壯其吐必止然後以益元散等藥利小便
