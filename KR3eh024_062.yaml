body:
  text: 卷六十二溺血論丹溪云溺血屬熱用梔子炒水煎服之或用小薊琥珀小薊治下焦結熱血淋因血虛者四物湯加牛膝膏實者用承氣湯下之後以四物加山梔小兒尿血用甘草升麻煎湯調益元散服之蔭按葉氏曰小便血痛者為血淋不痛者為溺血屬熱屬血虛又有因心腎氣結所致或憂勞房室過度此得之虛寒不可專以血得熱而淖濡甚曰淖二者皆致溺血熱用小薊根散或五苓散合四物煎服效虛用四物湯調牛膝膏火動榮血妄行者再加黃柏知母虛寒者十全大補湯加炒蒲黃李氏曰血從精竅中來乃心移熱小腸四物湯加山梔芩連單發灰散入麝半釐淡苦酒湯下單苦酒湯單苦蕒菜飲單琥珀散暴起熱者山梔一味水煎服實熱者承氣湯加當歸下之或小薊飲子後以四物湯加山梔調之心經熱者導赤散暑熱者益元散升麻煎湯下或五苓散久虛者四物湯加山梔牛膝或單牛膝膏房勞傷精火動溺血者膠艾四物湯腎氣丸小菟絲子丸虛甚病久者鹿角膠丸秋石固真丸金櫻膏痛不可忍者單豆豉一撮煎湯溫服甚效此病日久中干非清心靜養不可救也周氏曰尿血乃膀胱蘊熱所致法當清利膀胱滋其化源使血得歸源或云不痛者為溺血不可純用寒涼藥必用辛溫升藥如酒煮酒炒涼藥之類治結熱尿血方梔子湯治暴熱溺血山梔子炒黑色上為細末每服三錢水煎連柤服或用生地黃汁調尤妙小薊飲子治下焦結熱尿血成淋生地黃四兩小薊滑石通草淡竹葉蒲黃炒藕節當歸酒浸梔子炒甘草炙各五錢上銼每服一兩水煎服許令公方治尿血生地黃汁一合生薑汁一合上二物相合頓服瘥當歸承氣湯溺血實者以此下之當歸厚朴枳實大黃芒硝上銼水煎服當歸散治婦人小便出血或時尿血當歸羚羊角屑赤芍藥各半兩生地黃酒洗一兩刺蘇葉七錢半上㕮咀每服八錢水煎食前服小薊琥珀散治血淋小薊琥珀各等分上為末每服三錢水煎服一方單用琥珀為末每服二錢燈心薄荷煎湯下元胡索散治陽邪陷入下焦令人尿血元胡索一兩朴硝三分上用水煎分二次服一方治尿血車前草搗取汁五合空心服之治虛損尿血方加味四物湯治血虛尿血當歸川芎芍藥生地黃牛膝梔子炒上銼水煎空心服一方加黃連棕灰牛膝膏治血淋牛膝三斤去蘆上煎膏一斤空心鹽水化下四錢一方治小便出血當歸四兩上銼碎以酒三升煮一升頓服玉屑膏治尿血並五淋砂石疼痛不可忍受者黃耆人參各等分上為細末用蘿蔔大者切一指厚三指大四五片蜜淹少時蘸蜜炙乾復蘸復炙盡蜜二兩為度勿令焦至熟蘸黃耆人參末吃不以時仍以鹽湯送下鹿角膠丸治房室勞傷小便尿血鹿角膠五錢沒藥另研油頭髮灰各三錢上為末用茅根汁打糊丸如桐子大每服五十丸鹽湯送下發灰散治小便尿血頭髮灰或用自己者佳燒灰存性上研每服二錢以米醋二合湯少許調服井花水調亦得一法茅草根車前子煎湯調下尤妙蔭按本草云發灰能消瘀血通關格利水道破癰疽止血衄又丹溪云發灰補陰甚捷且兼治肺疽心脈內崩吐血一兩口或舌上出血如針孔若鼻衄吹內立已六味六地丸治老人尿血方見虛損門雜方蒲黃散治尿血劫劑此方可服法宜補之破故紙蒲黃炒千年石灰炒各等分為細末每服三錢空心熱酒下一方治小便血生地黃八兩黃芩阿膠各二兩柏葉一把上㕮咀以水八升煮取三升去柤下膠分三服一方加甘草二兩一方治房勞傷中尿血牡蠣桂心黃芩車前子各等分上為末以米飲服方寸匕稍加至二匕日三服一方治小便出血香附子炒成灰蒲黃各等分上為末醋糊丸如桐子大每服二三十丸鹽湯下效不可言一方治尿血不止屬汙血者鬱金一兩為末蔥白一握上用水一盞煎三合去柤溫服日三服姚氏方治小便出血此澀可去脫也龍骨為末方寸匕水調溫服日三服瘥肘後方治淋下血麻根十枚用水五升煮取二升服取血神效冬榮散治小便出血及腸風下血夏枯草燒灰存性為末米飲下一方用涼水下
