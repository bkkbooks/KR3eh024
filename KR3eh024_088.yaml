body:
  text: 卷八十八杖打傷論丹溪云杖瘡用黃柏生地黃紫荊皮此皆要藥也只是血熱作痛用涼藥去瘀血為先須下雞鳴散之類薛氏曰杖瘡胸滿或脅脹宜行血老弱者宜行氣和血更飲童便酒腹痛者宜下血血去多而煩躁者補血如不應用獨參湯瘀肉不潰或潰而不斂宜大補氣血又曰受杖先散瘀血次用排膿托裡之藥蓋叫號則傷氣痛忍則傷血此氣血之虛明矣況脾主肌肉脾氣受傷飲食必減血一冰則肌肉不旺故必理脾脾健肉自生若非參朮歸耆之類培養脾土則肌肉何由而生然又須分病人虛實及有無瘀血停積蓋打撲墜墮皮肉不破肚腹作痛者必有瘀血在內宜以復元活血湯攻之老弱者四物湯加紅花桃仁川山甲補而行之若血去多而煩躁此血虛也名曰亡血以獨參湯補之有打撲墜墮稍輕別無瘀血等證但是疼痛不止者惟和血氣調經脈其痛自止更以養氣血健脾胃無有不效亦有痛傷胃氣作嘔或不飲食者以四君子湯加藿香砂仁當歸治之若有瘀血不先消散而加補劑則成實實之禍設無瘀血而妄行攻利則致虛虛之禍又曰大凡損傷不問壯弱及有無瘀血停積俱宜服熱童便以酒佐之推陳致新其功甚大若脅脹或作痛或發熱煩躁口乾喜冷惟飲熱童便一甌勝服他藥他藥雖亦可取效但有無瘀血恐不能盡識反致誤人惟童便不動臟腑不傷氣血萬無一失嘗詢諸營操軍有墜馬傷者何以愈之俱對曰惟服熱童便則愈此其屢試之驗亦明矣又凡腫痛或傷損者以蔥搗爛熱罨之尤妙大抵杖瘡一證皆瘀血為患宜速治療淺者砭之深者針之更以和血流氣藥和之內潰者開之有腐肉取之以壯胃生血藥托之可保無虞有傷筋骨而作痛者以沒藥降聖丹治之若牙關緊急或腰背反張者以玉真散治之並效治杖瘡消瘀方童便酒初杖畢即飲童便和酒一鍾以免血攻心再用熱豆腐鋪在杖紫色處其氣如蒸其腐即紫復易之須得紫色盡散轉淡紅色為度退血止痛飲治杖後腫痛瘀血不散血氣攻心或增寒壯熱歸尾赤芍藥生地薑酒炒白芷防風荊芥羌活連翹黃連黃芩黃柏梔子薄荷枳殼桔梗知母石膏車前子甘草上銼水煎溫服乳香散一名當歸散治杖瘡神效自然銅半兩醋淬七次乳香沒藥各三錢茴香四錢當歸半兩上為細末每服五錢溫酒調下七味定痛散治杖瘡疼痛白朮當歸乳香各二錢人參甘草沒藥白芷各一錢羌活八分上為細末以水調成膏子每服用無灰冷酒調服一錢隨以熱酒儘量飲最治傷損化瘀散治杖打重血上攻心蘇木歸尾各三錢紅花大黃各二錢上共為末童便一鍾黃酒一鍾煎至一鍾熱服八仙過海治杖打極重血沁膛不治即死半夏薑汁炒巴豆霜當歸乳香沒藥硼砂血竭各等分土鱉倍用上為細末每服八釐好酒送下金箔散治杖打極重痛不可忍昏悶欲死者白蠟一兩生研乳香沒藥各三錢金箔銀箔各二十片上為末每服二錢溫酒調服救刑妙方消腫去毒止疼神效土鱉瓦上焙乾一個為末沉香二分銀硃五分上為末合一處刑後隨用好酒調溫服隔宿不用烏龍解毒散如人受杖責不拘輕重致瘀伏不能動起者及疔甲爛肉連腿前面青疼痛難忍晝夜無眠渾身憎寒壯熱神魂驚怖此藥可治即時可止疼痛善能動履及疔甲痛腫其效如神用木耳四兩入淨砂鍋內炒焦存性為末每服五錢熱酒一碗調服服藥後坐作少時其藥力行開至杖瘡上從肉裡面往外透如針刺瘥甚不時流血水或以藥水洗淨貼上膏藥其杖處疼痛腫硬次日即消散被歐瘢痕方用熟麻油黃酒各二碗同煎數沸服畢臥火燒熱地上一夜痛止腫消無痕有打傷人者仇家陰令術士以此治之次日驗即無一毫傷痕治杖瘡托裡方托裡散治杖瘡金瘡及一切瘡毒因氣血虛不能成膿或膿成不能潰斂膿水清稀久而不瘥人參氣虛多用黃耆鹽水炒白茯苓當歸酒拌芍藥酒炒熟地黃各一錢白朮陳皮各七分上銼水煎服當歸補血湯治杖瘡金瘡等證血氣損傷肌熱大渴引飲目赤面紅晝夜不息其脈洪大而虛重按全無此血氣大虛也誤服涼藥必死黃耆炙一兩當歸酒洗二錢上銼水煎服聖愈湯治杖瘡金瘡癰疽膿血出多熱躁不安或晡熱作渴等證人參川芎生地黃酒洗熟地黃酒洗各一錢當歸酒洗黃耆各五分上銼水煎服十全大補湯治杖瘡氣血俱虛腫痛不消腐而不潰潰而不斂或惡寒發熱自汗盜汗飲食少思肢體倦怠若怯弱之人患處青腫而肉不壞者服之自愈若有瘀血砭刺早者服之自消或潰而膿水清稀肌肉不生或口乾作渴而欲飲湯者尤宜服之人參白朮白茯苓甘草炙當歸川芎白芍藥炒熟地砂仁炒黃耆各一錢肉桂五分上銼作一劑加薑棗水煎服參附湯治金瘡杖瘡失血過多或膿瘀大泄陽隨陰走上氣喘急自汗盜汗氣短頭暈等證人參四錢附子炮去皮臍三錢上銼水煎服陽氣脫陷者倍用之益氣養榮湯治杖後潰爛久不愈者人參白朮倍用茯苓當歸酒拌芍藥熟地砂仁炒陳皮香附貝母桔梗甘草各一錢上㕮咀水煎服往來寒熱加柴胡地骨皮口乾加五味子麥門冬膿清加黃耆膿多加川芎肌肉遲生加白蘞肉桂治杖瘡外敷方五黃散治杖瘡止痛黃丹黃連黃芩黃柏大黃乳香各等分上為細末新水調成膏用緋絹帛上攤貼沒藥散治杖瘡止痛令瘡不移密陀僧沒藥乳香各一兩干胭脂一兩半膩粉半兩上為細末次入龍腦少許若多更妙燒蔥與羊骨髓生用同研如泥攤在緋帛上貼之血灰散治杖瘡石灰七升新豬血一斗上二味和為丸熟燒之破更丸燒三遍止為末敷上一方釜下土為細末以油和塗訖臥羊皮上一方未破者用韭菜蔥頭杵爛貼冷即易之一方用金鳳花科連根帶葉搗爛塗患處如干再塗一夜血散即愈如冬月無鮮的秋間收陰乾為末水和塗之亦效一方並打傷皮不破內損者用蘿蔔搗爛罨之一方用豬膽汁塗之亦妙一方用緑豆粉微炒雞子清調塗上一方用大黃末童便調敷之一方用隔年風化石灰不拘多少取新汲井水一碗銀簪子順攪千餘下如膏鵝翎刷上患處即佳乳香定痛散治杖瘡金瘡及一切瘡瘍潰爛疼痛乳香沒藥各五錢滑石寒水石煅各一兩冰片一錢上為末擦患處痛即止甚效豬蹄湯治一切癰疽杖瘡潰爛消腫毒去惡肉當歸赤芍藥白芷羌活露蜂房蜂多者佳生甘草各五錢上用豬蹄一隻水五碗煮熟取清湯入煎藥煎數沸去渣溫洗隨用膏藥貼之洗藥方先用此藥水洗好的更快防風荊芥苦參各等分上煎水洗後敷生肌散一方用荊芥土當歸生蔥煎湯洗一方只用蔥一味煎洗亦可生肌散乳香沒藥上為細末撒上即止痛生肌杖瘡丹此方甚妙劉寄奴六錢馬鞭草四錢即鐵掃帚上為末蜜調敷如濕者干撒鬱金膏貼杖瘡及一切腫毒鬱金四兩生地黃生豬脂熬去渣淨油一斤上二味銼片入豬油內煎枯去藥渣入淨黃蠟半斤化開又入好潮腦一兩瓷罐收入每用一兩加官粉二錢溶化攪勻攤油紙上貼之杖瘡膏並治頑瘡天疱臁瘡神效密陀僧四兩香油八兩上同入鍋內文武火熬用柳枝數根一順勤攪不要住手待熬成黑色滴水成珠油紙攤貼患處當時痛止拘流膿水自然生肉如有疔甲貼藥即止不二膏大黃黃柏黃連各一兩乳香沒藥輕粉各一錢血竭孩兒茶各二錢片腦二分水銀三錢用官粉三分吐涎以銀磨上為末合和以豬脂四兩煉去渣入黃蠟一兩再煎濾過入藥柳枝攪勻隨瘡大小攤紙貼之白龍膏治杖瘡及遠年近日一切頑瘡黃蠟黃香去黑渣各二兩香油三兩頓溫乳香另研沒藥另研各五分上先將蠟入瓷碗內慢火化開用箸敲碗邊續續入黃香乳沒取碗離火入溫香油於內攪勻待冷入水缸內去火毒三日取出油紙攤藥貼患處立效杖瘡膏藥治受杖責後如死血腫痛宜先刺出惡血然後以此膏貼之三四日平復或早失調理成癰者貼之即散及治諸般癰疽瘡癰毒已潰未潰貼之無不神效甘草肉桂蛇蛻蟬蛻露蜂房連翹白芷白及白蘞白朮蒼朮人參玄參苦參芍藥南星升麻厚朴梔子百合金銀花天花粉川歸川芎川山甲另研羌活獨活黃連黃芩黃柏大黃生地紅花蘇木柴胡鱉甲酥炙為末青木香何首烏防風荊芥穗藿香雲母石花蕊石各一兩亂髮壯年無病男子者一塊乾蟾一隻即風難鳳凰胎一隻即殼中不轉頭雞黃也陰乾用桃柳桑枝各五莖上各細切用香油六斤重浸藥三五日入鍋內熬黑色去渣入黃丹三斤別用槐柳枝不住手攪膏成候溫入後藥末乳香沒藥龍骨輕粉血竭各一兩麝香二錢上攪勻瓷器收貯臨期看瘡大小攤用棒瘡疔痂膏藥止疼痛拔血水消腫去疔痂乳香沒藥孩兒茶雄黃各三錢輕粉一錢官粉一兩黃蠟一兩上先將豬脂入鍋煉出油冷定卻將諸藥研成細末入油攪勻隨將黃蠟化開收入一處又攪勻用油紙攤成膏藥貼患處量瘡大小貼之極能去疔痂收膿水消腫止痛去疔痂藥用雞子清加麝香少許銀簪打成稀水照疔痂處輕輕用簪子尖點上上不多時其疔痂化爛取去上撒藥外貼膏藥一日一換化盡死肉之後三四日換一次不數日如初藥蛆方治杖瘡潰爛生蛆用皂礬煅過為末干撒其內蛆即死如未應佐以柴胡梔子散以清肝火避杖法鬼代丹治打著不痛無名異沒藥乳香地龍去土自然銅醋淬木鱉子去殼各等分上為末煉蜜丸如彈子大每服一丸溫酒下英雄丸臨杖方用打不覺痛任打血不浸心妙不可言乳香沒藥密陀僧自然銅燒紅淬七次地龍即蚯蚓焙乾木鱉子去殼花椒各等分上為末煉蜜丸如彈子大每一丸以酒化服寄杖散用白蠟一兩細細切爛滾酒焠入碗內服之打著不痛
