body:
  text: 卷五十四怔忡驚悸論虞氏曰內經云心者君主之官神明出焉夫怔忡驚悸之候或因怒氣傷肝或因驚氣入膽母能令子虛因而心血為之不足又或遇事繁冗思慮太過則心君亦為之不安故神明不安而怔忡驚悸之證作矣夫怔忡者心中惕惕動搖而不得安靜無時而作者是也驚悸者驀然而跳躍動而有欲厥之狀有時而作者是也亦有因痰飲留結於心胸胃口而為之者不可執以為心虛宜以脈證參究而治之丹溪云怔忡屬血虛有痰有慮便動屬虛時作時止者痰因火動瘦人多是血少肥人多是痰時覺心跳者亦是血少四物湯安神丸之類痰用痰藥又云驚悸屬血虛用硃砂安神丸有痰迷心竅者用治痰藥定志丸加琥珀鬱金假如病因驚而驚是神出舍空則痰生也戴氏曰怔忡者心中不安惕惕然如人將捕者是也心法附錄曰人之所主者心心之所養者血心血一虛神氣不守此驚悸怔忡之所肇端也曰驚悸曰怔忡豈可不辨乎心虛而鬱痰則耳聞大聲目擊異物過險臨危觸事喪志心為之忤使人有惕惕之狀是則為驚悸心虛而停水則胸中滲滴虛氣流動水既上乘心火惡之心不自安使人有怏怏之狀是則為怔忡治之之法驚悸者與之豁痰定悸之劑怔忡者與之逐水消飲之劑所謂扶虛不過調養心血和平心氣而已怏音央怏悵也情不滿足也葉氏曰怔忡或有陰火上衝怔忡不已甚者火炎於上或頭暈眼花或齒落髮脫或手指如杵長大或見異物或腹中作聲此陰火為患也治宜滋陰抑火湯心不安者加養心之劑久服降火藥不愈加附子從治或入參耆亦可有失志之人所求不遂或過誤自咎懊恨嗟嘆不已獨語書空若有所失宜溫膽湯去竹茹加人參柏子仁有痞塞不飲食心中常有所慊愛處暗地或倚門後見人則驚避似失志狀此為卑惵達協切音牒危懼也之病以血不足故耳宜人參養榮湯水氣怔忡者五苓散又曰驚悸或因事有所大驚觸忤心神氣與涎郁遂成驚悸此乃心虛膽怯所為宜養心湯或溫膽湯嘔加人參氣鬱有痰加味四七湯若驚悸眠多異夢隨即驚覺者宜辰砂妙香散溫膽湯加酸棗仁蓮肉或琥珀養心丹又有每臥覺神離體驚悸多魘通夕無寐此是肝經受邪非心病也肝藏魂者也遊魂為變平人肝不受邪故魂宿於肝神靜而得寐今肝經因虛邪氣襲之魂不歸舍是以臥則揚揚若去宜珍珠母丸又曰或問怔忡驚悸之辨曰怔忡者本無所驚心常自怯驚悸者因事有所驚或心有所思而卒動二者若相類而實不同也治之實無大異李氏曰惕惕不自定曰驚悸如人將捕曰怔忡皆緣思慮太過及因大驚大恐以致心虛停痰或耳聞大聲目見異物臨危觸事便覺驚悸甚則心跳欲厥脈弦濡者虛也血虛四物湯茯神湯妙香散硃砂安神丸氣血俱虛人參養榮湯養心湯時作時止者痰也二陳湯加白朮黃連遠志竹瀝薑汁怔忡因驚悸久而成痰在下火在上故也溫膽湯加黃連山梔當歸貝母氣鬱者四七湯加茯神遠志竹瀝薑汁或十味溫膽湯金箔鎮心丸停飲胸中漉漉有聲怏怏不安者二陳湯加茯神檳榔麥門冬沉香或朱雀丸脈法脈經曰寸口脈動而弱動為驚弱為悸跌陽脈微而浮浮為胃氣虛微則不能食此恐懼之脈憂迫所致也寸口脈緊跌陽脈浮胃氣則虛是以悸肝脈動暴有所驚駭脈訣舉要曰心中驚悸脈必代結飲食之悸沉伏動滑治怔忡驚悸因血氣虛者方加味四物湯治心血虛怔忡當歸芍藥生地酒炒川芎茯神熟地黃黃連甘草炙硃砂另研少許上銼水煎成入硃砂末服之食後加減四物湯治瘦人血少怔忡無時但覺心跳者當歸芍藥生地酒炒茯神各一錢遠志酸棗仁各七分以下熟地俱用砂仁炒生地姜酒炒酸棗仁柏子仁油去淨上㕮咀水煎服養心湯治心血虛少神氣不安令人驚悸怔忡黃耆白茯苓茯神半夏曲當歸川芎各半兩柏子仁酸棗仁炒去油人參遠志去心五味子辣桂各二錢半甘草炙四錢上銼每服五錢加生薑三片棗一枚水煎服治停水怔忡加檳榔赤茯苓益榮湯治思慮過度耗傷心血天君不安怔忡恍惚夜多夢寐小便赤白濁當歸酒浸黃耆小草酸棗仁炒柏子仁炒麥門冬去心茯神去木白芍藥紫石英各一兩研木香不見火人參甘草炙各半兩上㕮咀每服四錢加生薑五片大棗一枚水煎服食遠酸棗仁湯治心腎水火不交精血虛耗痰飲內蓄怔忡恍惚夜臥不安遠志去心酸棗仁黃耆白茯苓蓮肉去心當歸酒浸人參茯神各一兩陳皮粉草炙各半兩上㕮咀每服四錢加生薑三片棗一枚以瓦器煎日二服食後臨臥各一服養心安神湯治血虛火動驚悸怔忡當歸身酒洗川芎白芍藥炒陳皮黃連柏子仁炒各五分生地黃酒炒茯神各一錢白朮酸棗仁炒各七分甘草炙三分上銼一服水煎服滋陰抑火湯治陰火上衝怔忡不已黃連芍藥煨生地黃當歸酒洗川芎熟地黃知母各一錢肉桂甘草各五分上用水二鍾煎七分入童便半盞食前服若身如飛揚心跳不安加紫石英人參各一錢補氣湯治氣虛脈浮而軟怔忡無時黃耆二錢人參甘草各一錢麥門冬桔梗各七分上加生薑三片水煎服滋陰安神湯治血氣兩虛不時怔忡眩暈當歸川芎白芍藥人參白朮熟地黃茯神去木遠志去心各一錢酸棗仁甘草各五分黃連酒炒四分上作一服加生薑三片水煎服有痰加南星一錢茯神湯治膽氣虛冷頭痛目眩心神恐畏不能獨處胸中煩悶茯神去木酸棗仁炒黃耆炒柏子仁炒白芍藥炒五味子杵炒各一兩桂心熟地黃人參甘草炒各半兩上銼每服五錢加生薑三片水煎服茯神散治五臟氣血虛弱驚悸怔忡宜用此安神定志茯神去木人參龍齒另研獨活酸棗仁炒各三錢防風遠志去心桂心細辛白朮炒各二錢乾薑炮一錢上為末每服四五錢水煎服或蜜丸亦可茯神補心湯治心血不足善悲愁怒衄血面黃五心煩熱或咽喉痛舌本作強茯神四兩桂心甘草炒各三兩紫石英煅人參各一兩大棗二十枚麥門冬去心三兩赤小豆二十四粒上銼碎用水七升煎至二升半分三服或每服一兩水煎服硃砂安神丸治血虛心煩懊憹驚悸怔忡胸中氣亂硃砂五錢水飛過另研黃連酒洗六錢生地黃一錢五分半酒炒當歸甘草炙各二錢半上五味為細末蒸餅丸如黍米大硃砂為衣每服十五丸食後唾津下安神丸當歸酒洗生地黃酒浸天麻石菖蒲酸棗仁茯神去木遠志去心各一兩辰砂三錢另研為衣上為細末湯浸蒸餅為丸如黍米大每服二十丸食後白湯下定志丸治心氣不足恍惚多忘及怔忡驚悸等證人參一兩白茯神遠志菖蒲各二兩上為細末煉蜜丸如桐子大硃砂為衣每服五十丸食後白湯米飲任下一方去茯神名開心散服二錢匕不時八物定志丸補益心神安定魂魄除膈間痰熱等證人參一兩半石菖蒲遠志茯神去木白茯苓麥門冬去心各一兩白朮半兩牛黃二錢另研上為細末煉蜜丸如桐子大以硃砂為衣每服五十丸不拘時白湯下十四友丸治心血虛耗怔忡驚惕柏子仁遠志黑豆甘草煮去心酸棗仁炒紫石英煅熟地黃酒蒸當歸酒洗白茯苓白茯神去木人參黃耆阿膠蛤粉炒辣桂去皮龍齒煅各一兩硃砂五錢另研為衣上為細末煉蜜丸如綠豆大硃砂為衣每服五六十丸食後臨臥用棗湯或燈火草湯下安志丸治氣血虛夢中多驚人參白茯苓白茯神酸棗仁酒浸隔紙炒當歸遠志柏子仁琥珀各半兩乳香石菖蒲硃砂各二錢半上為末煉蜜丸如桐子大每服三十丸食後白湯下琥珀養心丹治心血虛驚悸夜臥不安或怔忡心跳者琥珀另研二錢龍齒煅另研一兩遠志黑豆甘草同煮去骨石菖蒲茯神人參酸棗仁炒當歸柏子仁各五錢生地黃酒洗七錢黃連三錢牛黃另研一錢硃砂另研各三錢上為細末以豬心血丸如黍米大金箔為衣每服五十丸燈火草煎湯送下平補鎮心丹治心血不足時或怔忡夜多異夢如墮層崖常服安心腎益榮衛人參白茯苓各五錢五味子車前子茯神麥門冬去心肉桂各一兩二錢半遠志甘草水煮去心天門冬去心山藥薑製熟地黃酒蒸龍齒各一兩半酸棗仁二錢半硃砂五錢細研為衣上為細末煉蜜和丸如梧桐子大每服五十丸空心米飲溫酒任下真珠母丸治肝經因虛內受風邪臥則魂散而不守狀如驚悸及心虛不寐者真珠母三錢研熟地黃當歸酒洗各一兩半酸棗仁炒柏子仁去油人參犀角鎊茯神去皮木沉香龍齒煅各半兩虎睛一對麝香一錢上為末煉蜜丸如桐子大辰砂為衣每服五十丸金錢薄荷煎湯下辰砂妙香散治心氣不足驚悸恐怖虛煩不眠夜多盜汗常服補益血氣鎮安心神山藥茯苓茯神黃耆遠志各一兩人參甘草桔梗各五錢木香二錢半麝香辰砂各三錢上為極細末每服二錢食遠用白湯或燈心湯調下參乳丸治心氣不足怔忡自汗人參一兩乳香三錢另研當歸二兩上為細末研勻山藥煮糊和丸如桐子大每服三十丸食後棗湯送下參棗丸一名安志膏治一切驚心慌膽累效人參酸棗仁各一兩辰砂五錢乳香二錢上為末煉蜜丸如彈子大每服一丸薄荷煎湯化下經驗秘方治憂愁思慮傷心令人惕然心跳動驚悸不安之證川歸身酒洗生地黃酒洗遠志去心茯神各五錢石菖蒲黃連各二錢半牛黃一錢另研辰砂二錢另研金箔十五片上以前六味為細末入牛黃辰砂二味豬心血丸如黍米大金箔為衣每服五十丸煎燈心湯下治怔忡驚悸因驚氣痰者方加味二陳湯治怔忡驚悸時作時止心下有痰陳皮半夏茯苓甘草白朮黃連遠志上水煎加竹瀝薑汁服溫膽湯治心膽虛怯觸事易驚或夢寐不祥遂致心驚膽懾氣鬱生涎涎與氣搏變生諸證或短氣悸乏或復自汗半夏湯洗竹茹枳實炒橘皮去白各二兩白茯苓一兩半甘草炙一兩上銼散每服四錢加生薑五片棗一枚水煎食前服十味溫膽湯治證同前半夏枳實麩炒橘紅各二錢白茯苓一錢半酸棗仁遠志去心姜水煮五味子熟地黃酒浸人參各一錢甘草炙五分上作一服加生薑五片棗一枚水煎不拘時服加味四七湯治心氣鬱滯豁痰散驚半夏三錢白茯苓厚朴各一錢半蘇葉茯神遠志各一錢甘草炙五分上作一服加生薑三片棗一枚水煎食遠服一方加石菖蒲一寸茯苓飲子治痰飲蓄於心胃怔忡不已赤茯苓半夏茯神麥門冬去心橘皮各一錢半檳榔沉香甘草各一錢上作一服加生薑三片水煎食遠服加味定志丸治肥人痰迷心膈尋常怔忡驚悸遠志菖蒲各二兩人參一兩白茯苓三兩琥珀鬱金上為末煉蜜丸如桐子大硃砂為衣每服三十丸米湯下一方有天花粉貝母瓜蔞仁辰砂遠志丸治驚悸消風痰石菖蒲遠志人參茯神川芎山藥鐵粉麥冬天麻半夏南星茯苓各一兩北細辛辰砂各半兩上為細末生薑五兩取汁入水煮糊為丸如綠豆大另以硃砂為衣每服二十五丸臨臥生薑湯下小兒減服壯膽鎮驚丸陳皮去白枳實去穰當歸身酒洗生甘草各五錢熟地黃薑汁浸白茯神去木天冬去心遠志甘草水煮去骨各一兩白石英火煅醋淬七次二錢如無以銀箔代之辰砂三錢另研為衣上為末粳米糊為丸如赤小豆大辰砂為衣每服五十丸每飢時白湯送下日服二次茯苓丸石菖蒲辰砂人參遠志茯苓真鐵粉茯神南星牛膽制半夏曲各等分上為細末生薑四兩取汁水煮糊為丸如桐子大別用細末為衣干之每服十粒加至二十粒夜臥生薑湯下朱雀丸治怔忡驚悸等證茯神二兩沉香辰砂各半兩上為細末蒸餅丸如桐子大每服五十丸人參湯下鎮心丹治驚悸辰砂用黃松節酒浸龍齒用遠志苗醋煮上只取辰砂龍齒各等分為末豬心血為丸如芡實大每服一丸以麥門冬荷葉綠豆燈心白蜜水煎豆熟為度臨臥嚥下小兒磨化半丸量歲數與之壽星丸治心膽被驚神不守舍或痰迷心竅恍惚健忘天南星一斤先用炭二十斤燒一地坑通紅去炭火以酒五升傾於地坑內候滲泄盡下南星在坑內以盆覆坑周圍用炭擁定勿令走氣次日取出為末辰砂一兩另研琥珀一兩另研上各為細末和勻用生薑汁煮麵糊為丸如桐子大每服三十丸加至五十丸食後煎人參石菖蒲湯下密陀僧散治驚氣入心喑不能語密陀僧上研為細末茶調一錢匕昔有人為狼及大蛇所驚皆用此一服即愈蓋此物鎮重而燥重故可以鎮心燥故可以劫其驚痰寒水石散治因驚心氣不行鬱而生涎結為飲遂為大疾怔悸隕穫不自勝持少遇驚則發尤宜服之寒水石煅滑石水飛各二錢生甘草一錢上為末每服二錢熱則用新汲水下怯寒則用薑棗湯下加龍膽草少許尤佳半夏麻黃丸治心下悸者半夏麻黃各等分上為末煉蜜丸如小豆大飲服三丸日三服
