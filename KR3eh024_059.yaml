body:
  text: 卷五十九吐血嘔血論論曰人身之血猶水行地中隨氣而行通貫經絡無處不到血為榮氣為衛榮行脈中衛行脈外相隨上下榮養五臟六腑四肢百骸者也苟或榮衛失調而為七情四氣所幹然後變生吐血諸證夫血之妄行固由積熱所致然其證多端難以一概而論有因飲食過飽負重傷胃而吐者有因思慮傷心及積熱而吐衄者有勞傷心肺而吐血咳血者有思慮過多傷脾而吐血者蓋心生血肝藏之而脾為之統故過思傷脾亦能令人吐血治療之法須究其所因傷胃者調胃安血勞心者補益其心志積熱則清之氣鬱則順之傷脾則安之吐而不咳者易治唾中帶紅線者難治為有所損故也久之必成勞瘵之疾至若肺生癰疽或從高墜下傷損內臟皆能吐血又有傷寒不解邪熱在經隨氣上湧而為吐衄血者又當從各類求之大抵血得熱而行得寒而止其脈沉細者順浮大弦數者逆吳氏曰血營氣衛胥有義焉陰在內陽之守也故曰營陽在外陰之微也故曰衛二者宜調而不宜敗血一不調則營守乎中者反出於外而敗之微者迫於熱盛者真陽不足以運血而衛亦敗也原病式曰血溢者上出也心養於血故熱甚則血有餘而妄行或謂嘔吐紫凝血為寒者誤也此非冷凝由熱銷鑠以為稠濁而熱甚則水化制之故赤兼黑而為紫也東垣曰吐血出於胃也實者犀角地黃湯虛者小建中湯加黃連主之血證上行或唾或吐皆逆也若變而為惡痢者順也血上行為逆其治難下行為順其治易故仲景云血證下血者當自愈與此意同若無病之人忽然下痢其病進也今病血證上行而復下行其邪欲去是知吉也丹溪曰血從上出皆是陽盛陰虛有升無降血隨氣上越出上竅法當補陰抑陽陽氣降則血歸經吐血是火載血上錯經妄行脈必大而芤大法四物湯加炒梔子童便薑汁湯下大全良方四生丸尤妙又方童便調香附末服之又方童便多酒少擂側柏葉溫飲之嘔血用韭汁童便薑汁磨入鬱金飲之其血自清如無鬱金以山茶花代之吐血亦有因怒而得者經曰怒則氣逆甚則嘔血吐血不止用乾薑炮為末童便調服此從治之法山梔子最清胃脘之血有先吐血後見痰者是陰虛火動四物為主加痰火藥有先吐痰後血多者是積熱降痰火為急有暴吐紫血成塊者是熱傷血結於中吐出為好用四物湯加清熱等藥調之吐血覺胸中氣寒而吐紫血者桃仁承氣湯下之戴氏曰吐血者榮血溢入濁道留聚膈間滿則吐血名曰內衄宜蘇子降氣湯加人參阿膠飲酒太過傷胃吐血用理中湯加蓮花青皮梔子乾葛川芎勞力太過吐血不止蘇子降氣湯加人參芍藥打損吐血用黑神散童便調服有時或吐血兩口隨即無事數日又發經年纍月不愈者宜黑神散吐血發渴名為血渴四物湯十全大補湯量胃氣虛實用之蔭按李氏曰血證總論血乃水穀之精變化生化於脾主息於心藏於肝布於肺施於腎脈絡臟腑耳目手足資為運用然陰道易虧一有感傷調理失宜以致陽盛陰虛錯經妄行火載則上升挾濕則下行是以上溢清道從鼻而出為衄留滯濁道從胃脘而出為吐唾滲入腸間從下部而出為血痢結於腸胃則成積而為血瘕分經言之嘔吐胃也咳唾衄肺也痰帶血脾也咯血絲腎也溺血小腸膀胱也下血大腸也牙宣胃或腎虛炎也又血從汗孔出者謂之肌衄從舌出者謂之舌衄心與肝也從委中穴出者謂之膕血腎與膀胱也大概逆行難治順行易治無潮者輕有潮者重潮盛脈大者死然瘀血亦能作潮日輕夜重者血屬陰也如九竅出血身熱不臥者即死血隨氣行氣行則行氣止則止氣溫則滑氣寒則凝故涼血必先清氣知血出某經即用某經清氣之藥氣涼則血自歸隊若有瘀血凝滯又當先去瘀而後調氣則其血立止或元氣本虛又因生冷勞役損胃失血者卻宜溫補斂而降之切忌清涼反致停於胸膈不散量之外感四氣邪傳經絡誤汗誤下以致邪逼經血妄行熱證色青多鼻衄者金沸草散去麻黃加桔梗枇杷葉桑白皮或參蘇飲加黃芩寒證色黯鼻衄點滴者九味羌活湯麻黃升麻湯暑熱過甚血色紅甚則黑者茅花煎湯調五苓散暑毒攻心嘔血者枇杷葉散去丁香加黃連濕證色如煙塵多下血者胃風湯當歸和血散時毒身熱吐膿者陽毒升麻湯積熱因飲酒炙煿蓄熱三焦者黃連解毒湯黃連枳殼二味湯龍腦雞蘇丸四生丸大金花丸槐角丸瘀血因打撲損傷瘀積胸膈者犀角地黃湯桃仁承氣湯內傷七情暴喜動心不能主血暴怒傷肝不能藏血積憂傷肺過思傷脾失志傷腎皆能動血治宜開痰行氣二陳湯加酒紅花升麻歸身黃連虛者加參朮及附子一片熱者加山梔牡丹皮茜草生地黃木香氣急者加瓜蔞仁桔梗勞心無汗者茯苓補心湯有汗者歸脾湯素郁者清肝解鬱湯氣壅者蘇子降氣湯如失血後被七情四物湯加木香檳榔陰虛者去木檳加元參黃柏枳殼內傷飲食生冷滯胃清道氣濁血亂者理中湯加乾葛川芎治衄能分陰陽定血脈冷暈倒者加桂附傷酒吐血者四君子湯加乾葛川芎山梔內傷勞役氣衰火盛者單人參湯或四君子湯加蒲黃人乳藕節傷力吐血者豬肝蘸白及末食或花蕊石散內傷氣散汗出沾衣甚如流染者黃耆建中湯妙香散或男胎髮燒灰𨠭之膕血十全大補湯人知百病生於氣而不知血為百病之胎也通用四物湯加減如涼血加芩連山梔之類各隨經絡清之瘀血加紅花桃仁韭汁童便以行之血來暴者加薄荷元參以散之血不止者加蒲黃京墨茅根久不止者加升麻引血歸經血止後加炒黑乾薑引血歸元血虛加龜板血燥加人乳血病每以胃藥收功胃氣一復其血自止他如嘔吐後發熱及傷寒汗下後發熱但用調和胃氣自然熱退可見脾胃能統氣血李氏又曰內傷外感及飲食房勞墜閃五臟有傷血聚膈間從胃脘出者則為嘔吐從鼻出者則為衄陽盛身熱多渴陰盛身涼不渴然血陰也身涼者易愈陽盛多因飲食辛熱傷於肺胃嘔吐出血大薊飲子主之因酒者古葛連丸小調中湯吐膿血者名肺疽桔梗湯大怒氣逆上衝暴甚者四物湯加蘇子陳皮沉香童便或茅根煎湯磨沉香服之若血聚滿膈間則吐者蘇子降氣湯加人參阿膠或暴吐紫黑成塊者瘀血也雖多亦不妨四物湯合解毒湯調之覺胸中氣塞者桃仁承氣湯下之五志火動熱者解鬱湯虛者保命散陰盛多因勞力傷氣吐血解紅心腹絞痛自汗者四君子湯加黃耆柴胡山藥百合前胡薑棗煎服或用蓮心糯米等分為末溫酒下勞傷氣虛挾寒陰陽不為守血亦錯行所謂陽虛陰必走者是也外證必有虛冷之狀法當溫中使血自歸經絡如胃虛不能化食其氣逆上吐衄者理中湯加木香胃寒不能約血者甘草乾薑湯或七氣湯加川芎自汗者小建中湯古桂附湯下虛極而氣壅喘嗽血不歸元者黑錫丹金液丹勞力傷肺唾內有血咽喉不利者雞蘇散如心肺脈破血若湧泉口鼻俱出者不治勞心過度不能統血反上令人煩悶倦怠者茯苓補心湯歸脾湯古方治血多以茯苓茯神為佐者心主血故也思色強力入房勞傷心腎陰虛火動者加減四物湯凡血越上竅者皆是陽盛陰虛有升無降俱宜補陰抑陽氣降則血自歸經矣陰盛陽虛者間有之耳先痰嗽後見血多痰火積熱化痰降火為急不可純用血藥恐泥痰也山梔地黃湯痰帶血者多胃中清血熱蒸而出重者山梔輕者藍實先見血後痰嗽多因虛火妄動四物湯加貝母天花粉化痰山梔牡丹皮麥門冬降火蓋吐血火病也雖挾痰者亦只治火則止凡血不可單行單止蓋血來未多必有瘀於胸膈必先消瘀而後涼之止之然血熱則行宜苦寒涼血為君辛味行氣開鬱為臣升提俾復其位為佐酸澀止塞其源甘溫收補其後涼血犀角地黃湯黃連解毒湯陶氏生地芩連湯四生丸行氣枳梗湯二陳湯枳橘湯古烏附湯滋補血虛加減四物湯昏暈古芎歸湯氣虛人參湯扶脾生脈散清肺生脈飲虛甚者十全大補湯止澀古參柏糊狗膽丸單京墨丸或單用炒乾薑末童便調服善能止血降火久者升提三黃補血湯斷根天門冬丸大阿膠丸女真丹還血歸元參苓白朮散四君子湯腎氣丸瓊玉膏抑論血疾陰火誤用陽燥熱藥則血枯瘦怯勞瘵成矣勞傷誤用寒藥則胸滿膈痛血愈郁矣墜墮閃挫誤行補澀則瘀蓄於胃心下脹滿食入即吐名曰血逆古法以二陳湯去茯苓甘草加赤芍藥等分救之此血疾難調最宜斟酌又曰嘔血與吐血無大異但成盆無聲者為吐成碗有聲者為嘔怒氣逆甚血溢口鼻當抑怒全陰熱者解鬱湯虛者保命散氣虛發熱咽喉痛者甘桔湯加參耆歸地荊芥黃柏水煎入童便韭汁薑汁鬱金少許或單黃柏蜜炙為末麥門冬煎湯下血虛熱熾滋陰降火加減四物湯主之脈法脈經曰脈得諸澀濡弱為亡血太陽脈大而浮必衄吐血脈浮弱按之絶者下血煩咳者必吐血脈極虛芤遲為清穀亡血失精脈芤為失血澀為少血脈弦而緊脅痛肝臟傷主有瘀血吐血唾血脈滑小弱者生實大者死脈極虛芤遲為清穀亡血失精諸書皆無此條東垣曰諸見血身熱脈大者難治難治者邪勝也身涼脈靜者易治易治者正氣復也脈訣舉要曰諸失血證皆見芤脈隨其上下以驗所出大凡失血脈貴沉細設見浮大後必難治初用止血涼血方十灰散治一切嘔血吐血咯血嗽血先用此藥止之大薊小薊柏葉荷葉茅根茜根大黃山梔牡丹皮棕桐皮各等分上各燒灰存性研極細用紙包碗蓋於地上一夕出火毒用時先將白藕搗絞汁或蘿蔔汁磨京墨半碗調服五錢食後服如病勢輕用此立止如血出成升斗者用後藥止之花蕊石散五內崩損湧噴出血升斗用此止之花蕊石火煅存性研如粉上用童子小便一鍾煎溫調服三錢甚者五錢食後服如男用酒一半女用醋一半與小便一處和藥服使瘀血化為黃水服此訖以獨參湯補之用人參二兩大棗五個水二鍾煎不拘時細細服之服後宜熟睡以上二方系葛可久治瘵十方之二摘録於此荊芥散治酒色傷心肺口鼻俱出血荊芥燒灰置地上出火毒上研末每服三錢陳米湯調下黑神散治大人吐血及傷酒食醉後低頭掬重損傷吐血至多汗血妄行口鼻血出但聲未失者投之無不效百草霜即鍋底墨外鄉村人家者妙不拘多少上研細每服一二錢米飲調下日服即愈鼻衄用一捻吹入鼻中立效皮肉破處及灸瘡出血百般用藥不止撒半錢或一字立止京墨丸治吐血衄血京墨二兩上為末用雞子白三個和丸桐子大每服十丸生地黃汁下或用好墨為末每服二錢以白湯化阿膠清調服或用生地黃藕節生梨搗汁磨京墨徐徐服之參柏糊治男婦九竅血如湧泉沙參側柏葉焙乾各一錢半飛羅面三錢上用水調如糊啜服狗膽丸治男婦連日吐血不止五靈脂上為末用狗膽汁和丸如芡實大每一丸薑酒化下不得漱口急進白粥不可太多一方治吐血內崩上氣面色如土乾薑阿膠柏葉各二兩艾一把上㕮咀以水五升煮取一升入馬通汁一升煮取一升服治血虛隨火上行而吐方四生丸治陽乘於陰血熱妄行或吐或衄生荷葉生艾葉生地黃生柏葉各等分上研爛丸如雞子大每服一丸水二盞煎至一盞濾過溫服或鹽湯化下黃連解毒湯治陽毒上竅出血黃連黃芩黃柏梔子炒各三錢上銼水煎服藕汁飲治吐衄不止生藕汁大薊汁生地黃汁各三合生蜜半匙上件藥汁調和令勻每服一小鐘不拘時分一方加生荷葉汁生茅根汁生薑汁名七生湯云岐子犀角地黃湯治主脈浮芤脈浮芤相合血積胸中熱之甚也血在上焦此藥主之生地黃二兩黃連一兩黃芩一兩半大黃半兩上㕮咀每服一兩水煎食後服桃仁承氣湯治吐血覺胸中氣塞上吐紫血以此下之大黃一兩桃仁去皮尖五錢芒硝桂各三錢甘草二錢半上㕮咀每服一兩加生薑水煎服丹溪方治氣上奔吐血心膈疼枳殼三錢青皮二錢生地酒洗木通牡丹皮各一錢半桃仁二十八個川芎黃芩黃連各一錢甘草少許乾生薑桔梗各五分上銼分四帖水煎服三黃補血湯治諸血不止自汗身熱熟地黃一錢生地黃黃耆當歸各八分白芍藥七分柴胡升麻丹皮川芎各五分上銼一服水煎服如血不止加桃仁五分酒大黃斟酌虛實用之內損去柴胡升麻加味四物湯治吐血當歸芍藥側柏葉各一錢半川芎生地薑酒炒梔子炒各一錢上㕮咀水煎入水研京墨二三匙童便半小盞薑汁少許徐徐服之加味四物湯初起常服生地黃酒洗一錢半當歸酒洗川芎赤芍藥酒洗各七分山梔子炒黑麥門冬去心各一錢半牡丹皮元參各一錢知母酒炒白朮炒各五分甘草陳皮各三分黃柏酒炒二分上作一服水煎溫服如身熱加地骨皮枳實黃芩各一錢軟柴胡酒洗五分嘔吐血加知母石膏以瀉胃火咳血加茅根黃芩以瀉肺火唾咯血加梔子黃柏及肉桂少許以瀉腎火吐衄不止加炒黑乾薑柏葉茜根大小薊各一錢大便血不止加炒槐花地榆百草霜各一錢半小便溺血不止倍加梔子更加車前子小薊黃連俱炒半黑各八分諸失血久加升麻阿膠人參入童便薑汁韭汁石膏散治心胸煩熱吐血不止口舌乾燥頭疼石膏麥門冬各二錢黃芩升麻生地黃青竹茹葛根瓜蔞根各一錢甘草炙五分上作一服水煎不拘時服大薊散治飲啖辛熱傷於肺經嘔血出血名曰肺疽大薊根洗犀角鎊升麻桑白皮炙蒲黃炒杏仁去皮尖桔梗各一錢甘草炙五分上㕮咀每服四錢加生薑五片水煎溫服不拘時大補血丸治陰虛吐血當歸一兩生地黃一兩半上以牛膝汁浸三日取起酒洗淨入臼內杵千下為丸如桐子大每服五七十丸白湯下加味芎歸湯治打撲傷損敗血流入胃脘嘔吐黑血或如豆羹汁川芎當歸白芍藥百合水浸半日荊芥穗各等分上銼每服四錢水一盞酒半盞煎七分不拘時服芎藭湯治一切失血過多眩暈不蘇芎藭當歸酒浸各等分上銼每服四錢水煎溫服治氣虛不能攝血而吐方必勝散治血妄流溢或吐或衄小薊並根用人參蒲黃炒當歸熟地砂仁炒川芎烏梅去核各等分上㕮咀每服四錢水煎溫服不拘時雞蘇散即薄荷治虛損氣逆吐血不止雞蘇葉黃芩刺薊生地黃黃耆各一兩當歸赤芍藥各半兩阿膠伏龍肝各二兩上為粗末每服四錢加生薑三片竹茹彈子大一團水煎服側柏散治內損吐血下血因酒太過勞傷於內血氣妄行其出如湧泉口鼻皆流須臾不救服此即安又治男子婦人九竅出血側柏葉一兩五錢蒸乾人參去蘆一兩荊芥穗一兩燒灰上為末每服三錢入飛羅面三錢拌和新汲水調黏如糊相似啜服團參丸治吐血咳嗽服涼藥不得者人參黃耆飛羅面各一兩百合五錢上為末滴水丸如桐子大每服三十丸茅根湯下人參救肺湯治吐血人參升麻柴胡歸梢蒼朮各一錢熟地黃白芍藥黃耆各二錢陳皮蘇木甘草各五分上為粗末作一服水煎稍熱食前服丹溪方治因辛苦吐血或衄夜間發熱口乾身疼食少當作虛勞治白朮六錢半人參青皮炒生地黃芍藥陳皮歸尾甘草炙各半兩川芎三錢紅花五分上銼分十帖水煎稍熱食前服下保和丸十四粒是齋白朮散治積熱吐血咳血若因飲食過度負重傷胃而吐血者最宜服之惟忌食熱面煎煿一切發風之物白朮二兩人參白茯苓黃耆蜜浸各一兩山藥百合去心各七錢半甘草炙五錢柴胡前胡各二錢半上㕮咀每服三錢加生薑三片棗一枚水一鍾煎六分溫服小建中湯治胃虛不能約血吐血自汗桂枝甘草炙各三錢白芍藥六錢大棗三個生薑一錢阿膠炒一合上㕮咀水煎服加味理中湯治飲酒傷胃遂成吐血乾薑炮人參白朮各二兩乾葛甘草炙各五錢上㕮咀每服三錢水煎不拘時溫服河間生地黃散治諸見血無外寒者吐血衄血下血溺血生地黃熟地黃枸杞子地骨皮天門冬去心黃耆白芍藥甘草黃芩各等分上㕮咀每服一兩水煎食前服如脈微身涼每兩加官桂五分麥門冬飲子治脾胃虛弱氣促氣弱精神短少衄血吐血人參五味子各五錢紫菀一錢半黃耆芍藥甘草各一錢當歸身麥門冬去心各五分上㕮咀作二服水煎食後服之天門冬湯治思慮傷心吐血衄血遠志去心甘草水煮白芍藥天門冬去心麥門冬去心黃耆藕節阿膠蛤粉炒沒藥當歸生地黃各一兩人參甘草炙各五錢上㕮咀每服四錢加生薑五片水煎不拘時服歸脾湯治思慮傷脾不能統攝心血以致妄行或吐血下血人參白朮各一錢黃耆龍眼肉茯神去木酸棗仁炒各一錢木香甘草炙五分上銼作一服水煎食遠服一方加當歸遠志蘇子降氣湯治氣逆上衝血聚滿膈間吐血蘇子炒槌碎二錢厚朴薑汁炒當歸前胡各一錢半夏陳皮各一錢半甘草炙肉桂各六分上銼加生薑三片棗一枚水煎服治嘔血方黃柏散治嘔血黃柏蜜炙上搗為末煎麥門冬湯調二錢匕立瘥一方炒褐色作丸服蔭按凡嘔與咯不同聲出於上焦為咯重而短也聲出下焦為嘔濁而長也黃柏苦而潤苦故能瀉火潤故能就下也辨之側柏散治嘔血側柏葉或曬乾或陰乾或瓦焙乾上為末每服三錢米飲調下
